body:
  text: 宋書卷一本紀第一武帝上高祖武皇帝諱裕字德輿小名寄奴彭城縣綏輿里人漢高帝弟楚元王交之後也交生紅懿侯富富生宗正辟強辟強生陽城繆侯德德生陽城節侯安民安民生陽城釐侯慶忌慶忌生陽城肅侯岑岑生宗正平平生東武城令某某生東萊太守景景生明經洽洽生博士弘弘生琅邪都尉悝悝生魏定襄太守某某生邪城令亮亮生晉北平太守膺膺生相國掾熙熙生開封令旭孫旭孫生混始過江居晉陵郡丹徒縣之京口里官至武原令混生東安太守靖靖生郡功曹翹是為皇考高祖以晉哀帝興寧元年歲次癸亥三月壬寅夜生及長身長七尺六寸風骨奇特家貧有大志不治廉隅事繼母以孝謹稱初為冠軍孫無終司馬安帝隆安三年十一月妖賊孫恩作亂於會稽晉朝衛將軍謝琰前將軍劉牢之東討牢之請高祖參府軍事十二月牢之至吳而賊緣道屯結牢之命高祖與數十人覘賊遠近會遇賊至衆數千人高祖便進與戰所將人多死而戰意方厲手奮長刀所殺傷甚衆牢之子敬宣疑高祖淹久恐為賊所困乃輕騎尋之既而衆騎並至賊乃奔退斬獲千餘人推鋒而進平山陰恩遁還入海四年五月恩復入會稽殺衛將軍謝琰十一月劉牢之復率衆東征恩退走牢之屯上虞使高祖戍句章城句章城既卑小戰士不盈數百人高祖常被堅執鋭為士卒先每戰輒摧鋒陷陳賊乃退還浹口于時東伐諸帥御軍無律士卒暴掠甚為百姓所苦唯高祖法令明整所至莫不親賴焉五年春孫恩頻攻句章高祖屢摧破之恩復走入海三月恩北出海鹽高祖追而翼之築城于海鹽故治賊日來攻城城內兵力甚弱高祖乃選敢死之士數百人咸脫甲胄執短兵並鼓噪而出賊震懼奪氣因其懼而奔之並棄甲散走斬其大帥姚盛雖連戰剋勝然衆寡不敵高祖獨深慮之一夜偃旗匿衆若已遁者明晨開門使羸疾數人登城賊遙問劉裕所在曰夜已走矣賊信之乃率衆大上高祖乘其懈怠奮擊大破之恩知城不可下乃進向滬瀆高祖復棄城追之海鹽令鮑陋遣子嗣之以吳兵一千請為前驅高祖曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜高祖多設伏兵兼置旗鼓然一處不過數人明日賊率衆萬餘迎戰前驅既交諸伏皆出舉旗鳴鼓賊謂四面有軍乃退嗣之追奔為賊所沒高祖且戰且退賊盛所領死傷且盡高祖慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏高祖因呼更戰氣色甚猛賊衆以為然乃引軍去高祖徐歸然後散兵稍集五月孫恩破滬瀆殺吳國內史袁山松死者四千人是月高祖復破賊於婁縣六月恩乘勝浮海奄至丹徒戰士十餘萬劉牢之猶屯山陰京邑震動高祖倍道兼行與賊俱至于時衆力既寡加以步遠疲勞而丹徒守軍莫有鬬志恩率衆數萬鼓噪登蒜山居民皆荷擔而立高祖率所領奔擊大破之投巘赴水死者甚衆恩以彭排音敗自載僅得還船雖被摧破猶恃其衆力徑向京師樓船高大值風不得進旬日乃至白石尋知劉牢之已還朝廷有備遂走向鬱洲八月以高祖為建武將軍下邳太守領水軍追討至鬱洲復大破恩恩南走十一月高祖追恩於滬瀆及海鹽又破之三戰並大獲俘馘以萬數恩自是飢饉疾疫死者太半自浹口奔臨海元興元年正月驃騎將軍司馬元顯西伐荊州刺史桓玄玄亦率荊楚大衆下討元顯元顯遣鎮北將軍劉牢之拒之高祖參其軍事次溧洲玄至高祖請擊之不許將遣子敬宣詣玄請和高祖與牢之甥東海何無忌並固諫不從遂遣敬宣詣玄玄剋京邑殺元顯以牢之為會稽內史懼而告高祖曰便奪我兵禍其至矣今當北就高雅於廣陵舉事卿能從我去乎答曰將軍以徑卒數萬望風降服彼新得志威震天下三軍人情都已去矣廣陵豈可得至邪裕當反服還京口耳牢之叛走自縊死何無忌謂高祖曰我將何之高祖曰鎮北去必不免卿可隨我還京口桓玄必能守節北面我當與卿事之不然與卿圖之今方是玄矯情任算之日必將用我輩也桓玄從兄修以撫軍鎮丹徒以高祖為中兵參軍軍郡如故孫恩自奔敗之後徒旅漸散懼生見獲乃於臨海投水死餘衆推恩妹夫盧循為主桓玄欲且緝寧東土以循為永嘉太守循雖受命而寇暴不已五月玄復遣高祖東征時循自臨海入東陽二年正月玄復遣高祖破循於東陽循奔永嘉復追破之斬其大帥張士道追討至于晉安循浮海南走六月加高祖彭城內史桓玄為楚王將謀篡盜玄從兄衛將軍謙屏人問高祖曰楚王勳德隆重四海歸懷朝廷之情咸謂宜有揖讓卿意以為何如高祖既志欲圖玄乃遜辭答曰楚王宣武之子勳德蓋世晉室微弱民望久移乘運禪代有何不可謙喜曰卿謂可爾便當是真可爾十二月桓玄篡帝位遷天子於尋陽桓修入朝高祖從至京邑玄見高祖謂司徒王謐曰昨見劉裕風骨不蓋人傑也每遊集輒引接殷勤贈賜甚厚高祖愈惡之或説玄曰劉裕龍行虎步視瞻不凡恐不為人下宜蚤為其所玄曰我方欲平蕩中原非劉裕莫可付以大事關隴平定然後當別議之耳玄乃下詔曰劉裕以寡制衆屢摧妖鋒泛海窮追十殄其八諸將力戰多被重創自元帥以下至于將士並宜論賞以勳烈先是高祖東征盧循何無忌隨至山陰勸於會稽舉義高祖以為玄未據極位且會稽遙遠事濟為難俟其篡逆事著徐於京口圖之不憂不剋至是桓修還京高祖託以金創疾動不堪步從乃與無忌同船共還建興復之計於是與弟道規沛郡劉毅平昌孟昶任城魏詠之高平檀憑之琅邪諸葛長民太原王元德隴西辛扈興東莞童厚之並同義謀時桓修弟弘為征虜將軍青州刺史鎮廣陵道規為弘中兵參軍昶為州主簿乃令毅潛往就昶聚徒於江北謀起兵殺弘長民為豫州刺史刁逵左軍府參軍謀據歷陽相應元德厚之謀於京邑聚衆攻玄並剋期齊發三年二月己丑朔乙卯高祖託以遊獵與無忌等收集義徒凡同謀何無忌魏詠之詠之弟欣之順之檀憑之憑之從子韶韶弟祗隆道濟道濟從兄範之高祖弟道憐劉毅毅從弟藩孟昶昶族弟懷玉河內向彌管義之陳留周安穆臨淮劉蔚從弟圭之東莞臧熹從弟寶符從子穆生童茂宗陳郡周道民漁陽田演譙國范清等二十七人願從者百餘人丙辰詰旦城開無忌服傳詔服稱詔居前義衆馳入齊聲大呼吏士驚散莫敢動即斬修以徇高祖哭甚慟厚加殯斂孟昶勸弘其日出獵未明開門出獵人昶道規毅等率壯士五六十人因開門直入弘方噉粥即斬之因收衆濟江義軍初剋京城修司馬刁弘率文武佐吏來赴高祖登城謂之曰郭江州已奉乘輿反正於尋陽我等並被密詔誅除逆黨同會今日賊玄之首已當梟於大航矣諸君非大晉之臣乎今來欲何為弘等信之收衆而退毅既至高祖命誅弘毅兄邁先在京師事未發數日高祖遣同謀周安穆報之使為內應邁外雖酬許內甚震懼安穆見其惶駭慮事必泄乃馳歸時玄以邁為竟陵太守邁不知所為便下船欲之郡是夜玄與邁書曰北府人情云何卿近見劉裕何所道邁謂玄已知其謀晨起白之玄驚懼封邁為重安侯既而嫌邁不執安穆使得逃去乃殺之誅元德扈興厚之等召桓謙卞範之等謀拒高祖謙等曰亟遣兵擊之玄曰不然彼兵速鋭計出萬死若行遣水軍不足相抗如有蹉跌則彼氣成而吾事敗矣不如屯大衆於覆舟山以待之彼空行二百里無所措手鋭氣已挫既至忽見大軍必驚懼駭愕我案兵堅陳勿與交鋒彼求戰不得自然散走此計之上也謙等固請乃遣頓丘太守吳甫之右衛將軍皇甫敷北拒義軍玄自聞軍起憂懼無復為計或曰劉裕等衆力甚弱豈辦之有成陛下何慮之甚玄曰劉裕足為一世之雄劉毅家無擔石之儲摴蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成衆推高祖為盟主移檄京邑曰夫治亂相因理不常泰狡焉肆虐或值聖明自我大晉陽九屢構隆安以來難結皇室忠臣碎於虎口貞良弊於豺狼逆臣桓玄陵虐人鬼阻兵荊郢肆暴都邑天未亡難凶力繁興踰年之間遂傾皇祚主上播越流幸非所神器沉淪七廟毀墜夏后之罹浞豷有漢之遭莽卓方之於玄未足為喻自玄纂逆于今歷年亢旱彌時民無生氣加以士庶疲於轉輸文武困於造築父子乖離室家分散豈唯大東有杼軸之悲摽梅有傾筐之塈而已哉仰觀天文俯察人事此而能久孰有可亡凡在有心誰不扼腕裕等所以叩心泣血不遑啓處者也是故夕寐宵興援獎忠烈潛搆崎嶇險過履虎輔國將軍劉毅廣武將軍何無忌鎮北主簿孟昶兗州主簿魏詠之寧遠將軍劉道規龍驤將軍劉藩振威將軍檀憑之等忠烈斷金精貫白日荷戈奮袂志在畢命益州刺史毛璩萬里齊契掃定荊楚江州刺史郭昶之奉迎主上宮于尋陽鎮北參軍王元德等並率部曲保據石頭揚武將軍諸葛長民收集義士已據歷陽征虜參軍庾賾之等潛相連結以為內應同力協規所在蜂起即日斬偽徐州刺史安城王修青州刺史弘首義衆既集文武爭先咸謂不有一統則事無以輯裕辭不獲已遂總軍要庶上憑祖宗之靈下罄義夫之力剪馘逋逆蕩清京輦公侯諸君或世樹忠貞或身荷爵寵而並俯眉猾豎自效莫由顧瞻周道寧不弔乎今日之舉良其會也裕以虛薄才非古人勢接於已踐之機受任於既頽之運丹誠未宣感慨憤躍望霄漢以永懷眄山川以增厲授檄之日神馳賊廷以孟昶為長史總攝後事檀憑之為司馬百姓願從者千餘人三月戊午朔遇吳甫之於江乘甫之玄驍將也其兵甚鋭高祖躬執長刀大呼以衝之衆皆披靡即斬甫之進至羅落橋皇甫敷率數千人逆戰寧遠將軍檀憑之與高祖各御一隊憑之戰敗見殺其衆退散高祖進戰彌厲前後奮擊應時摧破即斬敷首初高祖與何無忌等共建大謀有善相者相高祖及無忌等並當大貴其應甚近惟云憑之無相高祖與無忌密相謂曰吾等既為同舟理無偏異吾徒咸皆富貴則檀不應獨殊深不解相者之言至是而憑之戰死高祖知其事必捷玄聞敷等並沒愈懼使桓謙屯東陵口卞範之屯覆舟山西衆合二萬己未旦義軍食畢棄其餘糧進至覆舟山東使丐士張旗幟於山上以為疑兵玄又遣武騎將軍庾禕之配以精卒利器助謙等高祖躬先士卒以奔之將士皆殊死戰無不一當百呼聲動天地時東北風急因命縱火煙爓張天鼓噪之音震京邑謙等諸軍一時土崩玄始雖遣軍置陳而走意已決別使領軍將軍殷仲文具舟於石頭仍將子姪浮江南走庚申高祖鎮石頭城立留臺官焚桓溫神主於宣陽門外造晉新主立于太廟遣諸將帥追玄尚書王嘏率百官奉迎乘輿司徒王謐與衆議推高祖領揚州固辭乃以謐為録尚書事領揚州刺史於是推高祖為使持節都督揚徐兗豫青冀幽并八州諸軍事領軍將軍徐州刺史先是朝廷承晉氏亂政百司縱弛桓玄雖欲釐整而衆莫從之高祖以身範物先以威禁內外百官皆肅然奉職二三日間風俗頓改且桓玄雖以雄豪見推而一朝便有極位晉氏四方牧守及在朝大臣盡心伏事臣主之分定矣高祖位微於朝衆無一旅奮臂草萊之中倡大義以復皇祚由是王謐等諸人時失民望莫不愧而憚焉諸葛長民失期不得發刁逵執送之未至而玄敗玄經尋陽江州刺史郭昶之備乘輿法物資之玄收略得二千餘人挾天子走江陵冠軍將軍劉毅輔國將軍何無忌振武將軍劉道規率諸軍追討尚書左僕射王愈愈子荊州刺史綏等江左冠族綏少有重名以高祖起自布衣甚相凌忽綏桓氏甥亦有自疑之志高祖悉誅之四月奉武陵王遵為大將軍承制大赦天下唯桓玄一祖後不在赦例初高祖家貧嘗負刁逵社錢三萬經時無以還逵執録甚嚴王謐造逵見之密以錢代還由是得釋高祖名微位薄盛流皆不與相知唯謐交焉桓玄將篡謐手解安帝璽紱為玄佐命功臣及義旗建衆並謂謐宜誅唯高祖保持之劉毅嘗因朝會問謐璽紱所在謐益懼及王愈父子誅謐從弟諶謂謐曰王駒無罪而義旗誅之此是剪除勝己以絶民望兄既桓氏黨附名位如此欲求免得乎駒愈小字也謐懼奔于曲阿高祖箋白大將軍深相保謐迎還復位光祿勳卞承之左衛將軍褚粲遊擊將軍司馬秀役使官人為御史中丞王禎之所糾察謝箋言辭怨憤承之造司宜藏高祖與大將軍箋白粲等備位大臣所懷必盡執憲不允自應據理陳訴而橫興怨忿歸咎有司宜加裁當以清風軌並免官桓玄兄子歆聚衆向歷陽高祖命輔國將軍諸葛長民擊走之無忌道規破玄大將郭銓等于桑落洲衆軍進據尋陽加高祖都督江州諸軍事玄既還荊郢大聚兵衆召水軍造樓船器械率衆二萬挾天子發江陵浮江東下與冠軍將軍劉毅等相遇於崢嶸洲衆軍下擊大破之玄棄衆復挾天子還復江陵玄黨殷仲文奉晉二皇后還京師玄至江陵因西走南郡太守王騰之荊州別駕王康産奉天子入南郡府初征虜將軍益州刺史毛璩遣從孫祐之與參軍費恬送弟喪下有衆二百璩弟子修之時為玄屯騎校尉誘玄以入蜀至枚回洲恬與祐之迎射之益州督護馮遷斬玄首傳京師又斬玄子升於江陵市初玄敗於崢嶸洲義軍以為大事已定追躡不速玄死幾一旬衆軍猶不至玄從子振逃於華容之涌中招聚逆黨數千人晨襲江陵城居民競出赴之騰之康産皆被殺桓謙先匿於沮川亦聚衆以應振為玄舉哀立喪廷謙率衆官奉璽綬于安帝無忌道規既至江陵與桓振戰于靈溪玄黨馮該又設伏于楊林義軍奔敗退還尋陽兗州刺史辛禺懷二會北青州刺史劉該反禺求征該次淮陰又反禺長史羊穆之斬禺傳首京師十月高祖領青州刺史甲仗百人入殿劉毅諸軍復進至夏口毅攻魯城道規攻偃月壘皆拔之十二月諸軍進平巴陵義熙元年正月毅等至江津破桓謙桓振江陵平天子反正三月天子至自江陵詔曰古稱大者天地其次君臣所以列貫三辰神人代序諒理本於造昧而運周於萬葉故盈否時襲四靈通其變王道或昧貞賢拯其危天命所以永固人心所以攸穆雖夏周中傾賴靡申之績莽倫載竊實二代是維或乘資藉號或業隆異世猶詩書以之休詠記策用為美談未有因心撫民而誠發理應援神器於已淪若在今之盛者也朕以寡昧遭家不造越自遘閔屬當屯極逆臣桓玄乘釁縱慝窮凶恣虐滔天猾夏遂誣罔人神肆其篡亂祖宗之基既湮七廟之饗胥殄若墜淵谷未足斯譬皇度有晉天縱英哲使持節都督揚徐兗豫青冀幽并江九州諸軍事鎮軍將軍徐青二州刺史忠誠天亮神武命世用能貞明協契義夫響臻故順聲一唱二溟卷波英風振路宸居清翳暨冠軍將軍毅輔國將軍無忌振武將軍道規舟旗遄邁而元凶傳首回戈疊揮則荊漢霧廓俾宣元之祚永固於嵩岱傾基重造再集於朕躬宗廟歆七百之祜皇基融載新之命念功惟德永言銘懷固已道冠開闢獨絶終古書契以來未之前聞矣雖則功高靡尚理至難文而崇庸命德哲王攸先者將以弘道制治深關盛衰故伊望膺殊命之錫桓文饗備物之禮況宏徵不世顧邈百代者宜極名器之隆以光大國之盛而鎮軍謙虛自衷誠旨屢顯朕重逆仲父乃所以愈彰德美也鎮軍可進位侍中車騎將軍都督中外諸軍事使持節徐青二州刺史如故顯祚大邦啓茲疆宇高祖固讓加録尚書事又不受屢請歸藩天子不許遣百僚敦勸又親幸公第高祖惶懼詣闕陳請天子不能奪是月旋鎮丹徒天子重遣大使敦勸又不受乃改授都督荊司梁益寧雍涼七州并前十六州諸軍事本官如故於是受命解青州加領兗州刺史盧循浮海破廣州獲刺史吳隱之即以循為廣州刺史以其同黨徐道覆為始興相二年三月督交廣二州十月高祖上言曰昔天禍皇室巨狡縱篡臣等義惟舊隸豫蒙國恩仰契信順之符俯厲人臣之憤雖社稷之靈抑亦事由衆濟其翼獎忠勤之佐文武畢力之士敷執在己之謙用虧國體之大輒申攝衆軍先上同謀起義始平京口廣陵二城臣及撫軍將軍毅等二百七十二人并後赴義出都緣道大戰所餘一千五百六十六人又輔國將軍長民故給事中王元德等十人合一千八百四十八人乞正封賞其西征衆軍須論集續上於是尚書奏封唱義謀主鎮軍將軍裕豫章郡公食邑萬戶賜絹三萬匹其餘封賞各有差鎮軍府佐吏降故太傅謝安府一等十一月天子重申前令加高祖侍中進號車騎將軍開府儀同三司固讓詔遣百僚敦勸三年二月高祖還京師將詣廷尉天子先詔獄官不得受詣闕陳讓乃見聽旋于丹徒閏月府將駱冰謀作亂將被執單騎走追斬之誅冰父永嘉太守球球本東陽郡史孫恩之亂起義於長山故見擢用初桓玄之敗以桓沖忠貞署其孫胤至是冰謀以胤為主與東陽太守殷仲文潛相連結乃誅仲文及仲文二弟凡桓玄餘黨至是皆誅夷天子遣兼太常葛籍授公策曰有扈滔天夷羿乘釁亂節干紀實橈皇極賊臣桓玄怙寵肆逆乃摧傾華霍倒拔嵩岱五嶽既夷六地易所公命世英縱藏器待時因心資敬誓雪國恥慨憤陵夷誠發宵寐既而歲月屢遷神器已遠忠孝幽寄實貫三靈爾乃介石勝機宣契畢舉訴蒼天以為正揮義旅而一驅奔鋒數百勢烈激電百萬不能抗限制路日直植城遂使衝鯨潰流暴鱗江漢廟勝遠加重氛載滌二儀廓清三光反照事遂永代功高開闢理微稱謂義感朕心若夫道為身濟猶縻厥爵況乃誠德俱深勳冠天人者乎是用建茲邦國永祚山河言念載懷匪云足報往欽哉俾屏余一人長弼皇晉流風垂祚暉烈無窮其降承嘉策對揚朕命十二月司徒録尚書揚州刺史王謐薨四年正月徵公入輔授侍中車騎將軍開府儀同三司揚州刺史録尚書徐兗二州刺史如故表解兗州先是遣冠軍劉敬宣伐蜀賊譙縱無功而返九月以敬宣挫退遜位不許乃降為中軍將軍開府如故初偽燕王鮮卑慕容德僭號於青州德死兄子超襲位前後屢為邊患五年二月大掠淮北執陽平太守劉千載濟南太守趙元驅略千餘家三月公抗表北討以丹陽尹孟昶監中軍留府事四月舟師發京都泝淮入泗五月至下邳留船艦輜重步軍進琅邪所過皆築城留守鮮卑梁父莒城二戍並奔走慕容超聞王師將至其大將公孫五樓説超宜斷據大峴刈除粟苗堅壁清野以待之彼僑軍無資求戰不得旬月之間折捶以笞之耳超不從曰彼遠來疲勞勢不能久但當引令過峴我以鐵騎踐之不憂不破也豈有預芟苗稼先自弱邪初公將行議者以為賊聞大軍遠出必不敢戰若不斷大峴當堅守廣固刈粟清野以絶三軍之資非唯難以有功將不能自反公曰我揣之熟矣鮮卑貪不及遠計進利剋獲退惜粟苗謂我孤軍遠入不能持久不過進據臨朐退守廣固我一得入峴則人無退心驅必死之衆向懷二之虜何憂不剋彼不能清野固守為諸君保之公既入峴舉手指天曰吾事濟矣六月慕容超遣五樓及廣寧王賀賴盧先據臨朐城既聞大軍至留羸老守廣固乃悉出朐有巨蔑水去城四十里超告五樓曰急往據之晉軍得水則難擊也五樓馳進龍驤將軍孟龍符領騎居前奔往爭之五樓乃退衆軍步進有車四千兩分車為兩翼方軌徐行車悉張幔御者執矟又以輕騎為遊軍軍令嚴肅行伍齊整未及臨朐數里賊鐵騎萬餘前後交至公命兗州刺史劉藩弟并州刺史道憐咨議參軍劉敬宣陶延壽參軍劉懷玉慎仲道索邈等齊力擊之日向昃公遣咨議參軍檀韶直趨臨朐詔率建威將軍向彌參軍胡藩馳往即日陷城斬其牙旗悉虜超輜重超聞臨朐已拔引衆走公親鼓之賊乃大奔超遁還廣固獲超馬偽輦玉璽豹尾等送于京師斬其大將段暉等十餘人其餘斬獲千計明日大軍進廣固即屠大城超退保小城於是設長圍守之圍高三丈外穿三重塹停江淮轉輸館穀於齊土撫納降附華戎歡悅援才授爵因而任之七月詔加公北青冀二州刺史超大將垣遵遵弟苗並率衆歸順公方治攻具城上人曰汝不得張綱何能為也綱者超偽尚書郎其人有巧思會超遣綱稱藩於姚興乞師請救興偽許之而實憚公不敢遣綱從長安還泰山太守申宣執送之及升綱於樓車以示城內城內莫不失色於是使綱大治攻具超求救不獲綱反見虜轉憂懼乃請稱藩求割大峴為界獻馬千匹不聽圍之轉急河北居民荷戈負糧至者日以千數録事參軍劉穆之有經略才具公以為謀主動止必咨焉時姚興遣使告公云慕容見與鄰好又以窮告急今當遣鐵騎十萬徑據洛陽晉軍若不退者便當遣鐵騎長驅而進公呼興使答曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來穆之聞有羌使馳入而公發遣已去以興所言并答具語穆之穆之尤公曰常日事無大小必賜與謀之此宜善詳之云何卒爾便答公所答興言未能威敵正足怒彼耳若燕未可拔羌救奄至不審何以待之公笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寧容先遣信命此是其見我伐燕內已懷懼自張之辭耳九月進公太尉中書監固讓偽徐州刺史段宏先奔索虜十月自河北歸順張綱治攻具成設諸奇巧飛樓木幔之屬莫不畢備城上火石弓矢無所用之六年二月丁亥屠廣固超踰城走征虜賊曹喬胥獲之殺其王公以下納口萬餘馬二千匹送超京師斬于建康市公之北伐也徐道覆仍有窺之志勸盧循乘虛而出循不從道覆乃至番禺説循曰本住嶺外豈以理極於此正以劉公難與為敵故也今方頓兵堅城之下未有旋日以此思歸死士掩襲何劉之徒如反掌耳不乘此機而保一日之安若平齊之後小息甲養衆不過一二年間必璽書徵君若劉公自率衆至豫章遣鋭師過嶺雖復將軍神武恐必不能當也今日之機萬不可失既剋都邑傾其根本劉公雖還無能為也循從之乃率衆過嶺是月寇南康廬陵豫章諸郡守皆委任奔走于時平齊問未至即馳使徵公公之初剋齊也欲停鎮下邳清蕩河洛既而被徵使至即日班師鎮南將軍何無忌與徐道覆戰于豫章敗績無忌被害內外震駭朝廷欲奉乘輿北走就公尋知賊定未至人情小安公至下邳以船運輜重自率精鋭步歸至山陽聞無忌被害則慮京邑失守乃卷甲兼行與數十人至淮上問行旅以朝廷消息人曰賊尚未至劉公若還便無所憂也公大喜單船過江徑至京口衆乃大安四月癸未公至京師解嚴息甲撫軍將軍劉毅抗表南征公與毅書曰吾往習擊妖賊曉其變態新獲姦利其鋒不可輕宜須裝嚴畢與弟同舉又遣毅從弟藩往止之毅不從舟師二萬發自姑孰循之初下也使道覆向尋陽自寇湘中諸郡荊州刺史道規遣軍至長沙為循所敗徑至巴陵將向江陵道覆聞毅上馳使報循曰毅兵衆甚盛成敗事係之於此宜并力摧之若此克捷天下無復事矣根本既定不憂上面不平也循即日發巴陵與道覆連旗而下別有八艚艦九枚起四層高十二丈公以南藩覆沒表送章綬詔不聽五月劉毅敗績于桑落洲棄船步走餘衆不得去者皆為賊所擒初循至尋陽聞公已還不信也既破毅乃審凱入之問並相視失色循欲退還尋陽進平江陵據二州以抗朝廷道覆謂宜乘勝徑進固爭之疑議多日乃見從毅敗問至內外洶擾于時北師始還多創痍疾病京師戰士不盈數千賊既破江豫二鎮戰士十餘萬舟車百里不絶奔敗還者並聲其雄盛孟昶諸葛長民懼寇漸逼欲擁天子過江公不聽昶固請不止公曰今重鎮外傾強寇內逼人情危駭莫有固志若一旦遷動便自瓦解土崩江北亦豈可得至設令得至不過延日月耳今兵士雖少自足以一戰若其克濟則臣主同休苟厄運必至我當以死衛社稷橫尸廟門遂其由來以身許國之志不能遠竄於草間求活也我計決矣卿勿復言昶恐其不濟乃為表曰臣裕北討衆並不同唯臣贊裕行計致使強賊乘間社稷危逼臣之罪也今謹引分以謝天下封表畢乃仰藥而死於是大開賞募投身赴義者一同登京城之科發居民治石頭城建牙戒嚴時議者謂宜分兵守諸津要公以為賊衆我寡若分兵屯則人測虛實且一處失利則沮三軍之心今聚衆石頭隨宜應赴既令賊無以測多少又於衆力不分若徒旅轉集徐更論之耳移屯石頭乃柵淮斷查浦既而羣賊大至公策之曰賊若於新亭直進其鋒不可當宜且回避勝負之事未可量也若回泊西岸此成擒耳道覆欲自新亭白石焚舟而上循多疑少決每欲以萬全為慮謂道覆曰大軍未至孟昶便望風自裁大勢言之自當計日潰亂今決勝負於一朝既非必定之道且殺傷士卒不如按兵待之公于時登石頭城以望循軍初見引向新亭公顧左右失色既而回泊蔡洲道覆猶欲上循禁之自是衆軍轉集修治越城築查浦藥園廷尉三壘皆守以實衆冠軍將軍劉敬宣屯北郊輔國將軍孟懷玉屯丹陽郡西建武將軍王仲德屯越城廣武將軍劉懷默屯建陽門外使寧朔將軍索邈領鮮卑具裝虎班突騎千餘匹皆被練五色自淮北至于新亭賊並聚觀咸畏憚之然猶冀京邑及三吳有應之者遣十餘艦來拔石頭柵公命神弩射之發輒摧陷循乃止不復攻柵設伏兵於南岸使羸老悉乘舟艦向白石公憂其從白石步上乃率劉毅諸葛長民北出拒之留參軍徐赤特戍南岸命堅守勿動公既去賊焚查浦步上赤特軍戰敗死沒有百餘人赤特棄餘衆單舸濟淮賊遂率數萬屯丹陽郡公率諸軍馳歸衆憂賊過咸謂公當徑還拒戰公先分軍還石頭衆莫之曉解甲息士洗浴飲食之乃出列陳於南塘以赤特違處分斬之命參軍褚叔度朱齡石率徑勇千餘人過淮羣賊數千皆長刀矛鋋精甲曜日奮躍爭進齡石所領多鮮卑善步矟並結陳以待之賊短兵弗能抗死傷者數百人乃退走會日莫衆亦歸劉毅之敗豫州主簿袁興國反叛據歷陽以應賊琅邪內史魏順之遣將謝寶討斬之興國司馬襲寶順之不救而退公怒斬之順之詠之之弟也於是功臣震懾莫敢不用命六月更授公太尉中書監加黃鉞受黃鉞餘固辭以司馬庾悅為建威將軍江州刺史自東陽出豫章七月庚申羣賊自蔡洲南走還屯尋陽遣輔國將軍王仲德廣川太守劉鍾河間太守蒯恩追之公還東府大治水軍皆大艦重樓高者十餘丈盧循遣其大將荀林寇江陵桓謙先於江陵奔羌又自羌入蜀偽主譙縱以為荊州刺史謙及譙道福率軍二萬出寇江陵適與林會相去百餘里荊州刺史道規斬謙于枝江破林於江津追至竹町斬之初循之走也公知其必寇江陵登遣淮陵內史索邈領馬軍步道援荊州又遣建威將軍孫季高率衆三千自海道襲番禺江州刺史庾悅至五畝嶠賊遣千餘人據斷嶠道悅前驅鄱陽太守虞丘進攻破之公治兵大辦十月率兗州刺史劉藩寧朔將軍檀韶等舟師南伐以後將軍劉毅監太尉留守府後事皆委焉是月徐道覆率衆三萬寇江陵荊州刺史道規又大破之斬首萬餘級道覆走還盆口初公之遣索邈也邈在道為賊所斷道覆敗後方達自循東下江陵斷絶京邑之問傳者皆云已沒及邈至方知循走循初自蔡洲南走留其親黨范崇民五千人高艦百餘戍南陵王仲德等聞大軍且至乃進攻之十一月大破崇民軍焚其舟艦收其散卒循廣州守兵不以海道為防是月建威將軍孫季高乘海奄至而城池峻整兵猶數千季高焚賊舟艦悉力而上四面攻之即日屠其城循父以輕舟奔始興季高撫其舊民戮其親黨勒兵謹守初公之遣季高也衆咸以海道艱遠必至為難且分撤見力二三非要公不從敕季高曰大軍十二月之交必破妖虜卿今時當至廣州傾其巢窟令賊奔走之日無所歸投季高受命而行如期剋捷循方治兵旅舟艦設諸攻備公欲御以長算乃屯軍雷池賊揚聲不攻雷池當乘流徑下公知其欲戰且慮賊戰敗或於京江入海遣王仲德以水艦二百於吉陽下斷之十二月循道覆率衆數萬方艦而下前後相抗莫見舳艫之際公悉出輕利鬬艦躬提幡鼓命衆軍齊力擊之又上步騎於西岸右軍參軍庾樂生乘艦不進斬而徇之於是衆軍並踊騰爭先軍中多萬鈞神弩所至莫不摧陷公中流蹙之因風水之勢賊艦悉泊西岸岸上軍先備火具乃投火焚之煙爓張天賊衆大敗追奔至夜乃歸循等還尋陽初分遣步軍莫不疑怪及燒賊艦衆乃悅服召王仲德請還為前驅留輔國將軍孟懷玉守雷池循聞大軍上欲走向豫章乃悉力柵斷左里大軍至左里將戰公所執麾竿折折幡沈水衆並怪懼公歡笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進遁兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼略遣劉藩孟懷玉輕軍追之循收散卒尚有數千人徑還廣州道覆還保始興公旋自左里天子遣侍中黃門勞師于行所
