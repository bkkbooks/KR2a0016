body:
  text: 宋書卷三本紀第三武帝下永初元年夏六月丁卯設壇於南郊即皇帝位柴燎告天策曰皇帝臣裕敢用玄牡昭告皇天后帝晉帝以卜世告終歷數有歸欽若景運以命于裕夫樹君宰世天下為公德充帝王樂推攸集越俶唐虞降暨漢魏靡不以上哲格文祖元勳陟帝位故能大拯黔首垂訓無窮晉自東遷四維不振宰輔焉依為日巳久難棘隆安禍成元興遂至帝主遷播宗祀堙滅裕雖地非齊晉衆無一旅仰憤時難俯悼橫流投袂一麾則皇祀克復及危而能持顛而能扶姦宄具殲僭偽必滅誠興廢有期否終有數至於大造晉室撥亂濟民因藉時來實尸其重加以殊俗慕義重譯來庭正朔所暨咸服聲教至乃三靈垂象山川告祥人神協祉歲月滋著是以羣公卿士億兆夷人僉曰皇靈降鑒於上晉朝款誠於下天命不可以久淹宸極不可以暫曠遂逼羣議恭茲大禮猥以寡德託於兆民之上雖仰畏天威略是小節顧深永懷祗懼若霣敬簡元辰升壇受禪告類上帝用酬萬國之情克隆天保永祚于有宋惟明靈是饗禮畢備法駕幸建康宮臨太極前殿詔曰夫世代迭興承天統極雖遭遇異塗因革殊事若乃功濟區宇道振生民興廢所階異世一揆朕以寡薄屬當艱運藉否終之期因士民之力用獲拯溺匡世撥亂安國寧民業未半古功參曩烈晉氏以多難仍遘曆運巳移欽若前王憲章令軌用集大命于朕躬惟德匪嗣辭不獲申遂祗順三靈饗茲景祚燔柴于南郊受終于文祖猥當與能之期爰集樂推之運嘉祚肇開隆慶惟始思俾休嘉惠茲兆庶其大赦天下改晉元熙二年為永初元年賜民爵二級魚衆寡孤獨不能自存者人穀五斛逋租宿債勿復收其有犯鄉論清議贓汙淫盜一皆蕩滌洗除與之更始長徒之身特皆原遣亡官失爵禁錮奪勞一依舊準封晉帝為零陵王全食一郡載天子旍旗乘五時副車行晉正朔郊祀天地禮樂制度皆用晉典上書不為表答表勿稱詔追尊皇考為孝穆皇帝皇妣為穆皇后尊王太后為皇太后詔曰夫微禹之感歎深後昆盛德必祀道隆百世晉氏封爵咸隨運改至於德參微管勳濟蒼生愛人懷樹猶或勿翦雖在異代義無泯絶降殺之宜一依前典可降始興公封始興縣公廬陵公封柴桑縣公各千戶始安公封荔浦縣侯長沙公封醴陵縣侯康樂公可即封縣侯各五百戶以奉晉故丞相王導太傅謝安大將軍溫嶠大司馬陶侃車騎將軍謝玄之祀其宣力義熙豫同艱難者一仍本秩無所減降封晉臨川王司馬寶為西豐縣侯食邑千戶庚午以司空道憐為太尉封長沙王追封司徒道規為臨川王尚書僕射徐羡之加鎮軍將軍右衛將軍謝晦為中領軍宋國領軍檀道濟為護軍將軍中領軍劉義欣為青州刺史立南郡公義慶為臨川王又詔曰夫銘功紀勞有國之要典慎終追舊在心之所隆自大業創基十有七載世路迍邅戎車歲動自東徂西靡有寧日實賴將帥竭心文武盡效寧內拓外迄用有成威靈遠著寇逆消蕩遂當揖讓之禮猥饗天人之祚念功簡勞無忘鑒寐凡厥誠勤宜同國慶其酬賞復除之科以時論舉戰亡之身厚加復贈乙亥立桂陽公義真為廬陵王彭城公義隆為宜都王第四皇子義康為彭城王丁丑詔曰古之王者巡狩省方躬覽民物搜揚幽隱拯災恤患用能風澤遐被遠至邇安朕以寡暗道謝前哲因受終之期託兆庶之上鑒寐屬慮思求民瘼才弱事艱若無津濟夕惕永念心馳遐域可遣大使分行四方旌賢舉善問所疾苦其有獄訟虧濫政刑乖愆傷化擾治未允民聽者皆當具以事聞萬事之宜無失厥中暢朝廷乃眷之旨宣下民壅隔之情戊寅詔曰百官事殷俸薄祿不代耕雖國儲未豐要令公私周濟諸供給昔減半者可悉復舊六軍見祿粗可不在此例其餘官僚或自本俸素少者亦疇量增之己卯改晉泰始曆為永初曆秋七月丁亥原放劫賊餘口沒在臺府者諸流徙家並聽還本土又運舟材及運船不復下諸郡輸出悉委都水別量臺府所須皆別遣主帥與民和市即時裨直不復責租民求辦又停廢虜車牛不得以官威假借又以市稅繁苦優量減降從征關洛殞身戰場幽沒不反者贍賜其家己丑陳留王曹虔嗣薨辛卯復置五校三將官增殿中將軍員二十人餘在員外戊戌後將軍雍州刺史趙倫之進號安北將軍征虜將軍北徐州刺史劉懷慎進號北平將軍征西大將軍開府儀同三司楊盛進號車騎大將軍甲辰鎮西將軍李歆進號征西將軍平西將軍乞佛熾盤進號安西大將軍征東將軍高句驪王高璉進號征東大將軍鎮東將軍百濟王扶餘映進號鎮東大將軍置東宮冗從僕射旅賁中郎將官戊申遷神主於太廟車駕親奉壬子詔曰往者軍國務殷事有權制劫科峻重施之一時今王道惟新政和法簡可一除之還遵舊條反叛淫盜三犯補冶士本謂一事三犯終無悛革主者頃多并數衆事合而為三甚違立制之旨普更申明八月戊午西中郎將荊州刺史宜都王義隆進號鎮西將軍辛酉開亡叛赦限內首出蠲租布二年先有資狀黃籍猶存者聽復本注諸舊郡縣以北為名者悉除寓立於南者聽以南為號又制有無故自殘傷者補冶士實由政刑煩苛民不堪命可除此條罷青州併兗州戊辰詔曰彭沛下邳三郡首事所基情義繾綣事由情奬古今所同彭城桑梓本鄉加隆攸在優復之制宜同豐沛其沛郡下邳可復租布三十年辛未追諡妃臧氏為敬皇后癸酉立王太子為皇太子乙亥詔曰朕承曆受終猥饗天命荷積善之祚藉士民之力七廟備文率由令範先后祗嚴獲遂宣訓蒸嘗肇建情敬無違加以儲宮備禮皇基彌固國慶家禮爰集旬日豈豫一人獨荷茲慶其見刑罪無輕重可悉原赦限百日以今為始先因軍事所發奴僮各還本主若死亡及勳勞破免亦依限還直閏月壬午朔詔曰晉世帝后及藩王諸陵守衛宜便置格其名賢先哲見優前代或立德著節或寧亂庇民墳塋未遠並宜灑掃主者具條以聞丁酉特進左光祿大夫孔季恭加開府儀同三司辛丑詔曰主者處案雖多所咨詳若衆官命議宜令明審自頃或總稱參詳於文漫略自今有厝意者皆當指名其人所見不同依舊繼啓又詔曰諸處冬使或遣或不事役宜省今可悉停唯元正大慶不在其例郡縣遣冬使詣州及都督府亦停之九月壬子朔置東宮殿中將軍十人員外二十人壬申置都官尚書冬十月辛卯改晉所用王肅祥禫二十六月儀依鄭玄二十七月而後除十二月辛巳朔車駕臨延賢堂聽訟二年春正月辛酉車駕祠南郊大赦天下丙寅斷金銀塗以揚州刺史廬陵王義真為司徒以尚書僕射鎮軍將軍徐羡之為尚書令揚州刺史丙子南康揭陽蠻反郡縣討破之己卯禁喪事用銅釘罷會稽郡府二月己丑車駕幸延賢堂策試諸州郡秀才孝廉揚州秀才顧練豫州秀才殷朗所對稱旨並以為著作佐郎戊申制中二千石加公田一頃三月乙丑初限荊州府置將不得過二千人吏不得過一萬人州置將不得過五百人吏不得過五千人兵士不在此限夏四月己卯朔詔曰淫祠惑民費財前典所絶可並下在所除諸房廟其先賢及以勳德立祠者不在此例戊申車駕於華林園聽訟己亥以左衛將軍王仲德為冀州刺史五月己酉置東宮屯騎步兵翊軍三校尉官甲戌車駕又幸華林園聽訟六月壬寅詔曰杖罰雖有舊科然職務殷碎推坐相尋若皆有其實則體所不堪文行而巳又非設罰之意可籌量粗為中否之格車駕又於華林園聽訟甲辰制諸署敕吏四品以下又府署所得輒罰者聽統府寺行四十杖秋七月己巳地震八月壬辰車駕又於華林園聽訟九月己丑零陵王薨車駕三朝率百僚舉哀于朝堂一依魏明帝服山陽公故事太尉持節監護葬以晉禮冬十月丁酉詔曰兵制峻重務在得宜役身死叛輒考傍親流遷彌廣未見其極遂令冠帶之倫淪陷非所宜革以弘泰去其密科自今犯罪充兵合舉戶從役者便付營押領其有戶統及謫止一身者不得復侵濫服親以相連染己亥以涼州胡帥大沮渠蒙遜為鎮軍大將軍開府儀同三司涼州刺史癸卯車駕於延賢堂聽訟以員外散騎常侍應襲為寧州刺史三年春正月甲辰朔詔刑罰無輕重悉皆原降壬子以前冀州刺史王仲德為徐州刺史癸丑以尚書令揚州刺史徐羡之為司空録尚書事刺史如故撫軍將軍江州刺史王弘進號衛將軍開府儀同三司太子詹事傅亮為尚書僕射中領軍謝晦為領軍將軍乙卯以輔國將軍毛德祖為司州刺史乙丑詔曰古之建國教學為先弘風訓世莫尚於此發蒙啓滯咸必由之故爰自盛王迄于近代莫不敦崇學藝修建庠序自昔多故戎馬在郊旍旗卷舒日不暇給遂令學校荒廢講誦蔑聞軍旅日陳俎豆藏器訓誘之風將墜于地後生大懼於牆面故老竊歎於子襟此國風所以永思小雅所以懷古今王略遠屆華域載清仰風之士日月以冀便宜博延胄子陶奬童蒙選備儒官弘振國學主者考詳舊典以時施行二月丁丑詔曰豫州南臨江滸北接河洛民荒境曠轉輸艱遠撫蒞之宜各有其便淮西諸郡可立為豫州自淮以東為南豫州以豫州刺史彭城王義康為南豫州刺史征虜將軍劉粹為豫州刺史又分荊州十郡還立湘州左衛將軍張邵為湘州刺史戊寅以徐州之梁還屬豫州三月上不豫太尉長沙王道憐司空徐羡之尚書僕射傅亮領軍將軍謝晦護軍將軍檀道濟並入侍醫藥羣臣請祈禱神祇上不許唯使侍中謝方明以疾告廟而巳丁未以司徒廬陵王義真為車騎將軍開府儀同三司南豫州刺史上疾瘳己未大赦天下時秦雍流戶悉南入梁州庚申送紵絹萬匹荊雍州運米委州刺史隨宜賦給辛酉亡命刁彌攻京城得入太尉留府司馬陸仲元討斬之夏四月乙亥封仇池公楊盛為武都王平南將軍楊撫進號安南將軍丁亥以車騎司馬徐琰為兗州刺史庚寅左光祿大夫開府儀同三司孔季恭薨五月上疾甚召太子誡之曰檀道濟雖有幹略而無遠志非如兄韶有難御之氣也徐羡之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也小卻可以會稽江州處之又為手詔曰朝廷不須復有別府宰相帶揚州可置甲士千人若大臣中任要宜有爪牙以備不祥人者可以臺見隊給之有征討悉配以臺見軍隊行還復舊後世若有幼主朝事一委宰相母后不煩臨朝仗既不許入臺殿門要重人可詳給班劍癸亥上崩于西殿時年六十秋七月己酉葬丹陽建康縣蔣山初寧陵上清簡寡欲嚴整有法度未嘗視珠玉輿馬之飾後庭無紈綺絲竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金創上大悅命搗碎分付諸將平關中得姚興從女有盛寵以之廢事謝晦諫即時遣出財帛皆在外府內無私藏宋臺既建有司奏東西堂施局腳牀銀塗釘上不許使用直腳牀釘用鐵諸主出適遣送不過二十萬無錦繡金玉內外奉禁莫不節儉性尤簡易常著連齒木屐好出神虎門逍遙左右從者不過十餘人時徐羡之住西州嘗幸羡之便步出西掖門羽儀絡驛追隨巳出西明門矣諸子旦問起居入閣脫公服止著裙帽如家人之禮孝武大明中壞上所居陰室於其處起玉燭殿與羣臣觀之牀頭有土鄣壁上挂葛燈籠麻繩拂侍中袁顗盛稱上儉素之德孝武不答獨曰田舍公得此以為過矣故能光有天下克成大業者焉史臣曰漢氏載祀四百比祚隆周雖復四海橫潰而民繫劉氏惵惵黔首未有遷奉之心魏武直以兵威服衆故能坐移天曆鼎運雖改而民未忘漢及魏室衰孤怨非結下晉藉宰輔之柄因皇族之微世擅重權用基王業至於宋祖受命義越前模晉自社廟南遷祿去王室朝權國命遞歸台輔君道雖存主威久謝桓溫雄才蓋世勳高一時移鼎之業巳成天人之望將改自斯以後晉道彌昏道子開其禍端元顯成其末釁桓玄藉運乘時加以先父之業因基革命人無異心高祖地非桓文衆無一旅曾不浹旬夷凶翦暴祀晉配天不失舊物誅內清外功格區宇至於鍾石變聲柴天改物民巳去晉異於延康之初功實靜亂又殊咸熙之末所以恭皇高遜殆均釋負若夫樂推所歸謳歌所集魏晉采其名高祖收其實矣盛哉
