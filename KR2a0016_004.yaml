body:
  text: 宋書卷四本紀第四少帝少帝諱義符小字車兵武帝長子也母曰張夫人晉義熙二年生於京口武帝晚無男及帝生甚悅年十歲拜豫章公世子帝有旅力善騎射解音律宋臺建拜宋世子元熙元年進為宋太子武帝受禪立為皇太子永初三年五月癸亥武帝崩是日太子即皇帝位大赦尊皇太后曰太皇太后六月壬申以尚書僕射傅亮為中書監司空徐羨之領軍將軍謝晦及亮輔政戊子太尉長沙王道憐薨秋九月丁未有司奏武皇帝配南郊武敬皇后配北郊冬十一月戊午有星孛于營室十二月庚戌魏軍克滑臺明年春正月己亥朔大赦改元為景平元年文武進位二等辛丑祀南郊虜將達奚卬破金墉進圍虎牢毛德祖擊虜敗之虜退而復合拓跋木末又遣安平公涉歸寇青州癸卯河南郡失守乙卯有星孛于東壁二月丁丑太皇太后崩沮渠蒙遜吐谷渾阿犲並遣使朝貢庚辰爵蒙遜為驃騎大將軍封河西王以阿犲為安西將軍沙州刺史封澆河公辛未富陽人孫法光反寇山陰會稽太守禇淡之遣山陰令陸劭討敗之三月壬寅孝懿皇后祔葬于興寧陵是月高麗國遣使朝貢甲子豫州刺史劉粹遣軍襲許昌殺虜潁川太守庾龍乙丑虜騎寇高平初虜自河北之敗請修和親及聞高祖崩因復侵擾河洛之地騷然矣夏四月檀道濟北征次臨朐焚虜攻具乙未魏軍克虎牢執司州刺史毛德祖以歸秋七月癸酉尊所生張夫人為皇太后丁丑以旱詔赦五歲刑以下罪人冬十月己未有星孛于氐指尾貫攝提向大角仲月在危季月掃天倉而後滅是歲魏主拓跋嗣薨子燾立十二月丙寅省寧州之江陽犍為安上三郡合為宋昌郡二年春二月癸巳朔日有蝕之廢南豫州刺史廬陵王義真為庶人徙新安郡乙未以皇弟義恭為冠軍將軍南豫州刺史乙巳大風天有五色雲占者以為有兵高麗國遣使貢獻執政使使者誅義真于新安夏五月江州刺史王弘南兗州刺史檀道濟入朝帝居處所為多過失乙酉皇太后令曰王室不造天禍未悔先帝創業弗永棄世登遐義符長嗣屬當天位不謂窮凶極悖一至於此大行在殯宇內哀惶幸災肆於悖詞喜容表於在慼至乃徵召樂府鳩集伶官優倡管絃靡不備奏珍羞甘膳有加平日採擇媵御產子就宮靦然無怍醜聲四達及懿后崩背重加天罰親與左右執紼歌呼推排梓宮抃掌笑謔殿省備聞加復日夜媟狎羣小慢戲興造千計費用萬端帑藏空虛人力殫盡刑罰苛虐幽囚日增居帝王之位好皁隸之役處萬乘之尊悅廝養之事親執鞭撲毆擊無辜以為笑樂穿池築觀朝成暮毀徵發工匠疲極兆民遠近歎嗟人神怨怒社稷將墜豈可復嗣守洪業君臨萬邦今廢為營陽王一依漢昌邑晉海西故事鎮西將軍宜都王仁明孝弟著自幼辰德業沖粹識心明允宜纂洪統光臨億兆主者詳依典故以時奉迎未亡人嬰此百罹雖存若隕永悼情事撫心摧塞始徐羨之傅亮將廢帝諷王弘檀道濟求赴國訃弘等來朝使中書舍人邢安泰潘盛為內應是旦道濟謝晦領兵居前羨之等隨後因東掖門開入自雲龍門盛等先戒宿衞莫有禦者時帝於華林園為列肆親自酤賣又開瀆聚土以象破岡埭與左右引船唱呼以為歡樂夕游天淵池即龍舟而寢其朝未興兵士進殺二侍者於帝側傷帝指夫出東閤就收璽紱羣臣拜辭送於東宮遂幽於吳郡是日赦死罪以下太后令奉還璽紱檀道濟入守朝堂六月癸丑徐羨之等使中書舍人邢安泰弒帝於金昌亭帝有勇力不即受制突走出昌門追以門關踣之致殞時年十九上闕則創業之君自天所啟守文之主其難乎哉
