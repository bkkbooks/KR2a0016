body:
  text: 宋書卷七本紀第七前廢帝前廢帝諱子業小字法師孝武帝長子也元嘉二十六年正月甲申生世祖鎮尋陽子業留京邑三十年世祖入伐元凶被囚侍中下省將見害者數矣卒得無恙世祖踐阼立為皇太子始未之東宮中庶子二率並入直永福省大明二年出居東宮四年講孝經於崇正殿七年加元服八年閏五月庚申世祖崩其日太子即皇帝位大赦天下太宰江夏王義恭解尚書令加中書監驃騎大將軍柳元景加尚書令甲子置録尚書太宰江夏王義恭録尚書事驃騎大將軍柳元景加開府儀同三司丹陽尹永嘉王子仁為南豫州刺史六月辛未詔曰朕以眇身夙紹洪業敬御天威欽對靈命仰遵凝緒日鑒前圖實可以拱默守成詒風長世而寶位告始萬宇改屬惟德弗明昧于大道思宣睿範引茲簡恤可具詢執事詳訪民隱凡曲令密文繁而傷治關市僦稅事施一時而姦吏舞文妄興威福加以氣緯舛互偏頗滋甚宜其寬徭輕憲以救民切御府諸署事不須廣雕文篆刻無施於今悉宜并省以酬氓願藩王貿貨一皆禁斷外便具條以聞戊寅以豫州之淮南郡復為南梁郡復分宣城還置淮南郡庚辰以南海太守袁曇遠為廣州刺史秋七月己亥鎮軍將軍雍州刺史晉安王子勛改為江州刺史中護軍宗賣心為安西將軍雍州刺史鎮北將軍徐州刺史湘東王彧為護軍將軍中軍將軍義陽王昶為征北將軍徐州刺史庚戌婆皇國遣使獻方物崇皇太后曰太皇太后皇后曰皇太后乙卯罷南北二馳道孝建以來所改制度還依元嘉丙辰追崇獻妃為獻皇后乙丑撫軍將軍南徐州刺史新安王子鸞解領司徒八月丁卯領軍將軍王玄謨為鎮北將軍青冀二州刺史己巳以青冀二州刺史蕭惠開為益州刺史己丑皇太后崩京師雨水庚寅遣御史與官長隨宜賑恤九月辛丑護軍將軍湘東王彧為領軍將軍癸卯以尚書左僕射劉遵考為特進右光祿大夫乙卯文穆皇后祔葬景寧陵冬十月甲戌太常建安王休仁為護軍將軍戊寅輔國將軍宗越為司州刺史庚辰原除揚南徐州大明七年逋租十二月乙酉以尚書右僕射顏師伯為尚書僕射壬辰以王畿諸郡為揚州以揚州為東揚州癸巳以車騎將軍揚州刺史豫章王子尚為司徒揚州刺史去歲及是歲東諸郡大旱甚者米一升數百京邑亦至百餘餓死者十有六七孝建以來又立錢署鑄錢百姓因此盜鑄錢轉僞小商貨不行永光元年春正月乙未朔改元大赦天下乙巳省諸州臺傳戊午以領軍將軍湘東王彧為衛將軍南豫州刺史護軍將軍建安王休仁為領軍將軍祕書監山陽王休祐為豫州刺史左衛將軍桂陽王休範為中護軍南豫州刺史尋陽王子房為東揚州刺史二月乙丑減州郡縣田祿之半庚寅鑄二銖錢三月甲辰罷臨江郡五月己亥割郢州隨郡屬雍州丙午以後軍司馬張牧為交州刺史六月己巳左軍長史劉道隆為梁南秦二州刺史乙亥安西將軍雍州刺史宗賣心卒壬午衛將軍南豫州刺史湘東王彧改為雍州刺史尚書令驃騎大將軍柳元景加南豫州刺史秋八月辛酉越騎校尉戴法興有罪賜死庚午以尚書僕射顏師伯為尚書左僕射吏部尚書王景文為尚書右僕射癸酉帝自率宿衛兵誅太宰江夏王義恭尚書令驃騎大將軍柳元景尚書左僕射顏師伯廷尉劉德願改元為景和元年文武賜位二等以領軍將軍建安王休仁為安西將軍雍州刺史衛將軍湘東王彧還為南豫州刺史甲戌司徒揚州刺史豫章王子尚領尚書令射聲校尉沈文秀為青州刺史左軍司馬崔道固為冀州刺史乙亥詔曰昔凝神佇逸磻溪讚道湛慮思才傅巖毗化朕位御三極風澄萬宇資鈇電斷正卯斯戮思所以仰宣遺烈俯弘景祚每結夢庖鼎瞻言板築有劬日昃無忘昧旦可甄訪郡國招聘閭部其有孝性忠節幽居遁棲信誠義行廉正表俗文敏博識幹事治民務加旌舉隨才引擢庶官克順彝倫咸叙主者精加詳括稱朕意焉以始興公沈慶之為太尉鎮北將軍青冀二州刺史王玄謨為領軍將軍庚辰以石頭城為長樂宮東府城為未央宮罷東揚州并揚州甲申以北邸為建章宮南第為長楊宮以冠軍將軍邵陵王子元為湘州刺史丙戌原除吳吳興義興晉陵琅邪五郡大明八年以前逋租己丑復立南北二馳道九月癸巳車駕幸湖熟奏鼓吹戊戌車駕還宮庚子以南兗州刺史永嘉王子仁為南徐州刺史丹陽尹始安王子真為南兗州刺史辛丑撫軍將軍南徐州刺史新安王子鸞免為庶人賜死丙午以兗州刺史薛安都為平北將軍徐州刺史丁未衛將軍湘東王彧加開府儀同三司特進右光祿大夫劉遵考為安西將軍南豫州刺史寧朔將軍殷孝祖為兗州刺史戊申以前梁南秦二州刺史柳元怙復為梁南秦二州刺史己酉車駕討征北將軍徐州刺史義陽王昶內外戒嚴昶奔于索虜辛亥右將軍豫州刺史山陽王休祐進號鎮西大將軍甲寅以安西長史袁顗為雍州刺史戊午以左民尚書劉思考為益州刺史是日解嚴車駕幸瓜步開百姓鑄錢冬十月癸亥曲赦徐州丙寅車駕還宮以建安王休仁為護軍將軍己卯東陽太守王藻下獄死以宮人謝貴嬪為夫人加虎賁靸戟鸞輅龍旗出警入蹕實新蔡公主也乙酉以鎮西大將軍豫州刺史山陽王休祐為鎮軍大將軍開府儀同三司十一月壬辰寧朔將軍何邁下獄死新除太尉沈慶之薨壬寅立皇后路氏四廂奏樂赦揚南徐二州護軍將軍建安王休仁加特進左光祿大夫中護軍桂陽王休範遷職丁未皇子生少府劉勝之子也大赦天下贓汙淫盜悉皆原除賜為父後者爵一級壬子以特進左光祿大夫護軍將軍建安王休仁為驃騎大將軍開府儀同三司戊午南平王敬猷廬陵王敬先安南侯敬淵並賜死時帝凶悖日甚誅殺相繼內外百司不保首領先是訛言云湘中出天子帝將南巡荊湘二州以厭之先欲誅諸叔然後發引太宗與左右阮佃夫王道隆李道兒密結帝左右壽寂之姜産之等十一人謀共廢帝戊午夜帝於華林園竹林堂射鬼時巫覡云此堂有鬼故帝自射之壽寂之懷刀直入姜産之為副帝欲走寂之追而殞之時年十七太皇太后令曰司徒領護軍八座子業雖曰嫡長少稟凶毒不仁不孝著自髫齔孝武棄世屬當辰曆自梓宮在殯喜容靦然天罰重離歡恣滋甚逼以內外維持忍虐未露而凶慘難抑一旦肆禍遂縱戮上宰殄輔臣子鸞兄弟先帝鍾愛含怨既往枉加屠酷昶茂親作扞橫相徵討新蔡公主逼離夫族幽置深宮詭云薨殞襄事甫爾喪禮頓釋昏酣長夜庶事傾遺朝賢舊勳棄若遺土管絃不輟珍羞備膳詈辱祖考以為戲謔行游莫止淫縱無度肆宴園陵規圖發掘誅剪無辜籍略婦女建樹僞豎莫知誰息拜嬪立后慶過典宗室密戚遇若婢僕鞭捶陵曳無復尊卑南平一門特鍾其酷反天滅理顯暴萬端苛罰酷令終無紀極夏桀殷辛未足以譬闔朝業業人不自保百姓遑遑手足靡厝行穢禽獸罪盈三千高祖之業將泯七廟之享幾絶吾老疾沈篤每規禍鴆憂煎漏刻氣命無幾開闢以降所未嘗聞遠近思奮十室而九衛將軍湘東王體自太祖天縱英聖文皇鍾愛寵冠列藩吾早識神睿特兼常禮潛運宏規義士投袂獨夫既殞懸首白旗社稷再興宗祏永固人鬼屬心大命允集且勳德高邈大業攸歸宜遵漢晉纂承皇極主者詳舊典以時奉行未亡人餘年不幸嬰此百艱永尋情事雖存若殞當復奈何當復奈何葬廢帝丹陽秣陵縣南郊壇西帝幼而狷急在東宮每為世祖所責世祖西巡子業啓參承起居書迹不謹上詰讓之子業啓事陳謝上又答曰書不長進此是一條耳聞汝素都懈怠狷戾日甚何以頑固乃爾邪初踐阼受璽紱悖然無哀容始猶難諸大臣及戴法興等既殺法興諸大臣莫不震懾於是又誅羣公元凱以下皆被毆捶牽曳內外危懼殿省騷然初太后疾篤遣呼帝帝曰病人間多鬼可畏那可往太后怒語侍者將刀來破我腹那得生如此寧馨兒及太后崩後數日帝夢太后謂之曰汝不孝不仁本無人君之相子尚愚悖如此亦非運祚所及孝武險虐滅道怨結人神兒子雖多並無天命大運所歸應還文帝之子其後湘東王紹位果文帝子也故帝聚諸叔京邑慮在外為患山陰公主淫恣過度謂帝曰妾與陛下雖男女有殊俱託體先帝陛下六宮萬數而妾唯駙馬一人事不均平一何至此帝乃為主置面首左右三十人進爵會稽郡長公主秩同郡王食湯沐邑二千戶給鼓吹一部加班劍二十人帝每出與朝臣常共陪輦主以吏部郎褚淵貌美就帝請以自侍帝許之淵侍主十日備見逼迫誓死不回遂得免帝所幸閹人華願兒官至散騎常侍加將軍帶郡帝少好讀書頗識古事自造世祖誄及雜篇章往往有辭采以魏武帝有發丘中郎將摸金校尉乃置此二官以建安王休仁山陽王休祐領之其餘事迹分見諸列傳史臣曰廢帝之事行著于篇若夫武王數殷紂之釁不能絓其萬一霍光書昌邑之過未足舉其毫釐假以中才之君有一于此足以霣社殘宗樜宮瀦廟況總斯惡以萃一人之體乎其得亡亦為幸矣
