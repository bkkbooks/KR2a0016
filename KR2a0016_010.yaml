body:
  text: 宋書卷十本紀第十順帝順皇帝諱準字仲謀小字智觀明帝第三子也泰始五年七月癸丑生七年封安成王食邑三千戶仍拜撫軍將軍置佐史廢帝即位為揚州刺史元徽二年進號車騎將軍都督揚南豫二州諸軍事給鼓吹一部刺史如故四年又進號驃騎大將軍開府儀同三司班劍三十人都督刺史如故元徽五年七月戊子夜廢帝殞奉迎王入居朝堂壬辰即皇帝位升明元年改元大赦天下賜文武位二等甲午鎮軍將軍齊王出鎮東城輔政作相丙申詔曰露臺息構義光漢德雉裘焚制事隆晉道故以檢奢軌化敦儉馭俗頃甸服未靜師旅連年委蓄屢空勞敝莫偃而丹雘之飾糜耗難訾寶賂之費徵賦靡計今車服儀制實宜約損使徽章有序勿得侈溢可罷省御府二署凡工麗雕鐫傷風毀治一皆禁斷庶永昭憲則弘茲始政征西大將軍荊州刺史沈攸之進號車騎大將軍開府儀同三司尚書左僕射中領軍鎮軍將軍南兗州刺史齊王為司空録尚書事驃騎大將軍刺史如故中書令衛將軍開府儀同三司撫軍將軍劉秉為尚書令加中軍將軍安西將軍郢州刺史晉熙王燮為撫軍將軍揚州刺史南陽王翽為郢州刺史辛丑尚書右僕射王僧虔為尚書僕射右衛將軍劉韞為中領軍金紫光祿大夫王琨為右光祿大夫給司空齊王錢五百萬布五千匹癸卯車駕謁太廟丙午以安西參軍明慶符為青冀二州刺史武陵王贊為郢州刺史新除郢州刺史南陽王翽為湘州刺史司空南兗州刺史齊王改領南徐州刺史征虜將軍李安民為南兗州刺史雍州大水八月壬子遣使賑恤蠲除稅調以驃騎長史劉澄之為南豫州刺史山陽太守于天寶新吳縣子秦立有罪下獄死戊午改平準署辛酉以宣城太守李靈謙為兗州刺史癸亥司徒袁粲鎮石頭丁卯原除元年以前逋調復郡縣祿田戊辰崇拜帝所生陳昭華為皇太妃庚午司空長史謝朏衛軍長史江斆中書侍郎褚炫武陵王文學劉候入直殿省參侍文義齊王固讓司空庚辰以為驃騎大將軍開府儀同三司九月己丑詔曰昔聖王既沒淳風已衰龜書永湮龍圖長祕故三代之末德刑相擾世淪物競道陂人諛然猶正士比轂奇才接軫朕襲運金樞纂靈瑤極負扆巡政日晏忘疲永言興替望古盈慮姬夏典載猶傳緗帙漢魏餘文布在方冊故元封興茂才之制地節創獨行之品振維務本存乎得人今可宣下州郡搜揚幽仄摽采鄉邑隨名薦上朕將親覽甄其茂異庶野無遺彥永激遐芬己酉廬陵王皓薨冬十一月己酉倭國遣使獻方物丙午員外散騎侍郎胡羡生行越州刺史以交州刺史沈景德為廣州刺史十二月丁巳以驍騎將軍王廣之為徐州刺史車騎大將軍荊州刺史沈攸之舉兵反丁卯録公齊王入守朝堂侍中蕭嶷鎮東府戊辰內外纂嚴己巳以郢州刺史武陵王贊為安西將軍荊州刺史征虜將軍雍州刺史張敬兒進號鎮軍將軍右衛將軍黃回為平西將軍郢州刺史督諸軍前鋒南討征虜將軍呂安國為湘州刺史都官尚書王寬加平西將軍庚午新除左衛將軍齊王世子奉新除撫軍將軍揚州刺史晉熙王燮鎮尋陽之盆城壬申以驍騎將軍周盤龍為廣州刺史是日司徒袁粲據石頭反尚書令劉秉黃門侍郎劉述冠軍王蘊率衆赴之黃回及輔國將軍孫曇瓘屯騎校尉王宜興輔國將軍任候伯左軍將軍彭文之密相響應中領軍劉韞直閣將軍卜伯興在殿內同謀録公齊王誅韞等於省內軍主蘇烈王天生薛道淵戴僧靜等陷石頭斬粲於城內秉述蘊踰城走追擒之並伏誅其餘無所問豫州刺史劉懷珍雍州刺史張敬兒廣州刺史陳顯達並舉義兵司州刺史姚道和梁州刺史范柏年湘州行事庾佩玉擁衆懷二甲戌大赦天下乙亥以尚書僕射王僧虔為尚書左僕射新除中書令王延之為尚書右僕射吳郡太守劉遐據郡反輔國將軍張瓌討斬之閏月辛巳屯騎校尉王宜興有罪伏誅癸巳沈攸之攻圍郢城前軍長史柳世隆固守攸之弟登之作亂於吳興吳興太守沈文季討斬之己亥內外戒嚴假録公齊王黃鉞辛丑寧朔將軍北秦州刺史武都王楊文度進號征西將軍乙巳録公齊王出頓新亭二年春正月沈攸之遣將公孫方平據西陽辛酉建寧太守張謨擊破之丁卯沈攸之自郢城奔散己巳華容縣民斬送之左將軍豫州刺史劉懷珍進號平南將軍辛未鎮軍將軍雍州刺史張敬兒克江陵斬攸之子光琰荊州平同逆皆伏誅丙子解嚴以新除侍中柳世隆為尚書右僕射是日録公齊王旋鎮東府丁丑以江州刺史邵陵王友為安南將軍南豫州刺史左衛將軍齊王世子為江州刺史侍中蕭嶷為領軍鎮軍將軍雍州刺史張敬兒進號征西將軍平西將軍郢州刺史黃回進號鎮西將軍二月庚辰以尚書左僕射王僧虔為尚書令尚書右僕射王延之為尚書左僕射癸未録公齊王加授太尉衛將軍褚淵為中書監司空甲申曲赦荊州丙戌撫軍將軍揚州刺史晉熙王燮進號中軍將軍開府儀同三司戊子蠲雍州緣沔居民前被水災者租布三年辛卯郢州刺史新除鎮南將軍黃回為鎮北將軍南兗州刺史南兗州刺史李安民為郢州刺史癸巳以山陰令傅琰為益州刺史丙申左軍將軍彭文之有罪下獄死行湘州事任候伯殺前湘州行事庾佩玉傳首京邑三月庚戌以廣州刺史周盤龍為司州刺史輔國將軍劉悛為廣州刺史丙子給太尉齊王羽葆鼓吹夏四月己卯以游擊將軍垣崇祖為兗州刺史辛卯新除鎮北將軍南兗州刺史黃回有罪賜死甲午輔國將軍淮南宣城二郡太守蕭映行南兗州刺史五月戊午倭國王武遣使獻方物以武為安東大將軍輔國將軍行湘州事任候伯有罪伏誅六月己丑以前新會太守趙超民為交州刺史丁酉以輔國將軍楊文弘為北秦州刺史武都王八月辛卯太尉齊王表斷奇飾麗服凡十有四條乙未以江州刺史齊王世子為領軍將軍撫軍將軍丙申以領軍蕭嶷為江州刺史九月乙巳朔日有蝕之丙午加太尉齊王黃鉞都督中外諸軍事太傅領揚州牧劍履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人中軍將軍揚州刺史晉熙王燮為司徒戊申行南兗州刺史蕭映為南兗州刺史甲寅給太傅齊王三望車己未芮芮國遣使獻方物癸酉武陵內史張淡有罪下獄死冬十月丁丑寧朔將軍淮南宣城二郡太守蕭晃為豫州刺史孫曇瓘先逃亡己卯擒獲伏誅壬寅立皇后謝氏減死罪一等五歲刑以下悉原十一月壬子立故武昌太守劉琨息頒為南豐縣王癸亥臨澧侯劉晃謀反晃及黨與皆伏誅甲子改封南陽王翽為隨郡王改隨陽郡十二月丙戌皇后見于太廟戊子高麗國遣使獻方物三年春正月甲辰以江州刺史蕭嶷為鎮西將軍荊州刺史尚書左僕射王延之為安南將軍江州刺史安西長史蕭順之為郢州刺史乙卯太傅齊王表諸負官物質役者悉原除辛亥以驍騎將軍王玄邈為梁南秦二州刺史領軍將軍撫軍將軍齊王世子加尚書僕射進號中軍大將軍開府儀同三司丙辰加太傅齊王前部羽葆鼓吹丁巳詔太傅府依舊辟召以征西將軍雍州刺史張敬兒為護軍將軍新除給事黃門侍郎蕭長懋為雍州刺史二月丙子安南將軍南豫州刺史邵陵王友薨三月癸卯朔日有蝕之甲辰崇太傅為相國總百揆封十郡為齊公備九錫之禮加璽紱遠游冠位在諸王上加相國緑綟綬其驃騎大將軍揚州牧南徐州刺史如故丙午以中軍大將軍蕭賾為南豫州刺史齊公世子副二相國緑綟綬庚戌臨川王綽謀反綽及黨與皆伏誅丁巳以齊國初建給錢五百萬布五千匹絹千匹夏四月壬申進齊公爵為齊王增封十郡甲戌安西將軍武陵王贊薨丙戌命齊王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂八佾設鐘簴宮縣進世子為太子王子王女王孫爵命之號一如舊儀辛卯天祿永終禪位于齊壬辰帝遜位于東邸既而遷居丹陽宮齊王踐阼封帝為汝陰王待以不臣之禮行宋正朔上書不為表答表不為詔建元元年五月己未殂于丹陽宮時年十三諡曰順帝六月乙酉葬于遂寧陵史臣曰聖王膺録自非接亂承微則天曆不至也自三五以來受命之主莫不乘淪亡之極然後符樂推之運水德遷謝其來久矣豈止於區區汝陰揖禪而已哉
