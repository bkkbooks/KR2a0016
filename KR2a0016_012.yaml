body:
  text: 宋書卷十二志第二律曆中夫天地之所貴者生也萬物之所尊者人也役智窮神無幽不察是以動作云為皆應天地之象古先聖哲擬辰極制渾儀夫陰陽二氣陶育羣品精象所寄是為日月羣生之性章為五才五才之靈五星是也曆所以擬天行而序七耀紀萬國而授人時黃帝使大撓造六甲容成制曆象羲和占日常儀占月少昊氏有鳳鳥之瑞以鳥名官而鳳鳥氏司曆顓頊之代南正重司天北正黎司地堯復育重黎之後使治舊職分命羲和欽若昊天故虞書曰朞三百有六旬六日以閏月定四時成歲其後授舜曰天之曆數在爾躬舜亦以命禹爰及殷周二代皆創業革制而服色從之順其時氣以應天道萬物羣生蒙其利澤三王既謝史職廢官故孔子正春秋以明司曆之過秦兼天下自以為水德以十月為正服色上黑漢興襲秦正朔北平侯張蒼首言律曆之事以顓頊曆比於六曆所失差近施用至武帝元封七年太中大夫公孫卿壺遂太史令司馬遷等言曆紀廢壞宜改正朔易服色所以明受之於天也乃詔遂等造漢曆選鄧平長樂司馬可及人間治曆者二十餘人方士唐都分天部落下閎運算轉曆其法積八十一寸則一日之分也閎與鄧平所治同於是皆觀星度日月行更以算推如閎平法一月之日二十九日八十一分日之四十三詔遷用鄧平所造八十一分律曆以平為太史丞至元鳳三年太史令張壽王上書以為元年用黃帝調曆今陰陽不調更曆之過詔下主曆使者鮮于妄人與治曆大司農中丞麻光等二十餘人雜候晦朔弦望二十四氣又詔丞相御史大將軍右將軍史各一人雜候上林清臺課諸疏密凡十一家起三年盡五年壽王課疏遠又漢元年不用黃帝調曆劾壽王逆天地大不敬詔勿劾復候盡六年太初曆第一壽王曆乃太史官殷曆也壽王再劾不服竟下吏至孝成時劉向總六曆列是非作五紀論向子歆作三統曆以說春秋屬辭比事雖盡精巧非其實也班固謂之密要故漢曆志述之校之何承天等六家之曆雖六元不同分章或異至今所差或三日或二日數時考其遠近率皆六國及秦時人所造其術斗分多上不可檢於春秋下不驗於漢魏雖復假稱帝王祇足以惑時人耳光武建武八年太僕朱浮上言曆紀不正宜當改治時所差尚微未遑考正明帝永平中待詔楊岑張盛景防等典治曆但改易加時弦望未能綜校曆元也至元和二年太初失天益遠宿度相覺浸多候者皆知日宿差五度冬至之日在斗二十一度晦朔弦望先天一日章帝召治曆編欣李梵等綜校其狀遂下詔書稱春秋保乾圖曰三百年斗曆改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以繆錯琁璣不正文象不稽冬至之日日在斗二十一度先立春一日則四分之立春日也而以折獄斷大刑於氣已逆用望平和蓋亦遠矣今改行四分以遵堯順孔奉天之文同心敬授儻獲咸熙於是四分法施行黃帝以來諸曆以為冬至在牽牛初者皆黜焉和帝永元十四年待詔太史霍融上言官漏刻率九日增減一刻不與天相應或時差至二刻半不如夏曆密其年十一月甲寅詔曰漏所以節時分定昏明昏明長短起於日去極遠近日道周圜不可以計率分官漏九日增減一刻違失其實以晷景為刻密近有驗今下晷景漏刻四十八箭其二十四氣日所在并黃道去極晷景漏刻昏明中星並列載于續漢律曆志安帝延光三年中謁者亶誦上書言當用甲寅元河南梁豐云當復用太初尚書郎張衡周興皆審曆數難誦豐或不能對或云失誤衡等參案儀注考往校今以為九道法最密詔下公卿詳議太尉愷等參議太初過天一度月以晦見西方元和改從四分四分雖密於太初復不正皆不可用甲寅元與天相應合圖讖可施行議者不同尚書令忠上奏天之曆數不可任疑從虛以非易是亶等遂寢靈帝熹平四年五官郎中馮光沛相上計掾陳晃等言曆元不正故盜賊為害曆當以甲寅為元不用庚申乞本庚申元經緯明文詔下三府與儒林明道術者詳議羣臣會司徒府集議議郎蔡雍曰曆數精微術無常是漢興承秦曆用顓頊元用乙卯百有二歲孝武皇帝始改太初元用丁丑行之百八十九歲孝章帝改從四分元用庚申今光等以庚申為非甲寅為是按曆法黃帝顓頊夏殷周魯各自有元光晃所援則殷曆元也昔始用太初丁丑之後六家紛錯爭訟是非張壽王挾甲寅元以非漢曆雜候清臺課在下第太初效驗無所漏失是則雖非圖讖之元而有效於前者也及用四分以來考之行度密於太初是又新元有效於今者也故延光中亶誦亦非四分言當用甲寅元公卿參議竟不施行且三光之行遲速進退不必若一故有古今之術今術之不能上通於古亦猶古術不能下通於今也又光晃以考靈耀為本二十八宿度數至日所在錯異不可參校元和二年用至今九十二歲而光晃言陰陽不和姦臣盜賊皆元之咎元和詔書文備義著非羣臣議者所能變易三公從雍議以光晃不敬正鬼薪法詔書勿治罪何承天曰夫曆數之術若心所不達雖復通人前識無救其為敝也是以多歷年歲未能有定四分於天出三百年而盈一日積代不悟徒云建曆之本必先立元假言讖緯遂關治亂此之為蔽亦已甚矣劉歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其說采為太玄班固謂之最密著于漢志司彪因曰自太初元年始用三統曆施行百有餘年曾不憶劉歆之生不逮太初二三君子言曆幾乎不知而妄言歟光和中穀城門候劉洪始悟四分於天疏闊更以五百八十九為紀法百四十五為斗分造乾象法又制遲疾曆以步月行方於太初四分轉精微矣魏文帝黃初中太史丞韓翊以為乾象減斗分太過後當先天造黃初曆以四千八百八十三為紀法一千二百五為斗分其後尚書令陳羣奏以為曆數難明前代通儒多共紛爭黃初之元以四分曆久遠疏闊大魏受命宜正曆明時韓翊首建黃初猶恐不審故以乾象互相參校歷三年更相是非舍本即末爭長短而疑尺丈竟無時而決按三公議皆綜盡曲理殊塗同歸欲使效之璿璣各盡其法一年之間得失足定合於事宜奏可明帝時尚書郎楊偉制景初曆施用至于晉宋古之為曆者鄧平能修舊制新劉洪始減四分又定月行遲疾楊偉斟酌兩端以立多少之衷因朔積分設差以推合朔月蝕此三人漢魏之善曆者然而洪之遲疾不可以檢春秋偉之五星大乖於後代斯則洪用心尚疏偉拘於同出上元壬辰故也魏明帝景初元年改定曆數以建丑之月為正改其年三月為孟夏四月其孟仲季月雖與正歲不同至於郊祀迎氣祭祠蒸嘗巡狩搜田分至啓閉班宣時令皆以建寅為正三年正月帝崩復用夏正楊偉表曰臣攬載籍斷考曆數時以紀農月以紀事其所由來遐而尚矣乃自少昊則玄鳥司分顓頊帝嚳則重黎司天唐帝虞舜則羲和掌日三代因之則世有日官日官司曆則頒之諸侯諸侯受之則頒于境內夏后之代羲和湎淫廢時亂日則書載胤征由此觀之審農時而重人事者歷代然也逮至周室既衰戰國橫騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流而怪蟄蟲之不藏也是時也天子不協時司曆不書日諸侯不受職日御不分朔人事不恤廢棄農時仲尼之撥亂於春秋託褒貶糾正司曆失閏則譏而書之登臺頒朔則謂之有禮自此以降暨于秦漢乃復以孟冬為歲首閏為後九月中節乖錯時月紕繆加時後天蝕不在朔纍載相襲久而不革也至武帝元封七年始乃寤其繆焉於是改正朔更曆數使大才通人造太初曆校中朔所差以正閏分課中星得度以考疏密以建寅之月為正朔以黃鍾之月為曆初其曆斗分太多後遂疏闊至元和二年復用四分曆施而行之至于今日考察日蝕率常在晦是則斗分太多故先密後疏而不可用也是以臣前以制典餘日推考天路稽之前典驗之食朔詳而精之更建密歷則不先不後古今中天以昔在唐帝協日正時允釐百工咸熙庶績也欲使當今國之典禮凡百制度皆韜合往古郁然備足乃改正朔更曆數以大呂之月為歲首以建子之月為曆初臣以為昔在帝代則法曰顓頊曩自軒轅則曆曰黃帝暨至漢之孝武革正朔更曆數改元曰太初因名太初曆今改元為景初宜曰景初曆臣之所建景初曆法數則約要施用則近密治之則省功學之則易知雖復使研桑心算隸首運籌重黎司晷羲和察景以考天路步驗日月究極精微盡術數之極者皆未如臣如此之妙也是以纍代曆數皆疏而不密自黃帝以來改革不已壬辰元以來至景初元年丁巳歲積四千四十六算上此元以天正建子黃鍾之月為曆初元首之歲夜半甲子朔旦冬至元法萬一千五十八紀法千八百四十三紀月二萬二千七百九十五章歲十九章月二百三十五章閏七通數十三萬四千六百三十日法四千五百五十九餘數九千六百七十周天六十七萬三千一百五十歲中十二氣法十二沒分六萬七千三百一十五沒法九百六十七月周二萬四千六百三十八通法四十七會通七十九萬一百一十朔望合數六萬七千三百一十五入交限數七十二萬二千七百九十五通周十二萬五千六百二十一周日日餘二千五百二十八周虛二千三十一斗分四百五十五甲子紀第一紀首合朔月在日道𩹉交會差率四十一萬二千九百一十九遲疾差率十萬三千九百四十七甲戌紀第二紀首合朔月在日道𩹉交會差率五十一萬六千五百二十九遲疾差率七萬三千七百六十七甲申紀第三紀首合朔月在日道𩹉交會差率六十二萬一百三十九遲疾差率四萬三千五百八十七甲午紀第四紀首合朔月在日道𩹉交會差率七十二萬三千七百四十九遲疾差率一萬三千四百七甲辰紀第五紀首合朔月在日道𩹉交會差率三萬七千二百四十九遲疾差率一十萬八千八百四十八甲寅紀第六紀首合朔月在日道𩹉交會差率十四萬八百五十九遲疾差率七萬八千六百六十八交會紀差十萬三千六百一十求其數之所生者置一紀積月以通數乘之會通去之所去之餘紀差之數也以之轉加前紀則得後紀加之未滿會通者則紀首之歲天正合朔月在日道𩹉滿去之則月在日道表加表滿在𩹉加𩹉滿在表遲疾紀差三萬一百八十求其數之所生者置一紀積月以通數乘之通周去之餘以減通周所減之餘紀差之數也以之轉減前紀則得後紀不足減者加通周求次元紀差率轉減前元甲寅紀差率餘則次元甲子紀差率也求次紀如上法也推朔積月術曰置壬辰元以來盡所求年外所求以紀法除之所得算外所入紀第也餘則入紀年數年以章月乘之如章歲而一為積月不盡為閏餘閏餘十二以上其年有閏閏月以無中氣為正推朔術曰以通數乘積月為朔積分如日法而一為積日不盡為小餘以六十去積日餘為大餘大餘命以紀算外所求年天正十一月朔日也求次月加大餘二十九小餘二千四百一十九小餘滿日法從大餘命如前次月朔日也小餘二千一百四十以上其月大也推弦望加朔大餘七小餘千七百四十四小分一小分滿二從小餘小餘滿日法從大餘大餘滿六十去之餘命以紀算外上弦日也又加得望下弦後月朔其月蝕望者定小餘如所近中節間限限數以下者算上為日望在中節前後各四日以還者視限數望在中節前後各五日以上者視間限推二十四氣術曰置所入紀年外所求以餘數乘之滿紀法為大餘不盡為小餘大餘滿六十去之餘命以紀算外天正十一月冬至日也求次氣加大餘十五小餘四百二小分十一小分滿氣法從小餘小餘滿紀法從大餘命如前次氣日