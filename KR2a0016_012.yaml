百八十四日行百一十二度更順遲日行十二分九十二日行四十八度而留不行十一日而旋逆日行六十二分之十七六十二日退十七度而復留十一日復順遲日行十二分九十二日行四十八度而復疾日行十四分百八十四日行百一十二度在日前夕伏西方順七十二日百七十九萬二千六百一十五分行星五十六度百二十四萬九千三百四十五分而與日合凡一終七百八十日三百五十八萬五千二百三十分行星四百一十五度二百四十九萬八千六百九十分土晨與日合伏十九日三百八十四萬七千六百七十五分半行星二度六百四十九萬一千一百二十一分半而晨見東方在日後順行百七十二分之十三八十六日行六度半而留不行三十二日半而旋逆日行十七分之一百二日退六度而復留不行三十二日半復順日行十三分八十六日行六度半在日前夕伏西方順十九日三百八十四萬七千六百七十五分半行星二度六百四十九萬一千一百二十一分半而與日合凡一終三百七十八日六十七萬五千三百六十四分行星十二度五百九十六萬二千二百五十六分金晨與日合伏六日退四度而晨見東方在日後而逆遲日行五分之三十日退六度留不行七日而旋順遲日行四十五分之三十三四十五日行三十三度而順疾日行一度九十一分之十四九十一日行百五度而順益疾日行一度九十一分之二十一九十一日行百一十二度在日後而晨伏東方順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而與日合一合二百九十二日十九萬四千九百九十分行星如之金夕與日合伏順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而夕見西方在日前順疾日行一度九十一分之二十一九十一日行百一十二度而更順遲日行一度十四分九十一日行百五度而順益遲日行四十五分之三十三四十五日行三十三度而留不行七日而旋逆日行五分之三十日退六度在日前夕伏西方逆六日退四度而與日合凡再合一終五百八十四日三十八萬九千九百八十分行星如之水晨與日合伏十一日退七度而晨見東方在日後逆疾一日退一度而留不行一日而旋順遲日行八分之七八日行七度而順疾日行一度十八分之四十八日行二十二度在日後晨伏東方順十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而與日合凡一合五十七日二千三十四萬四千二百六十一分行星如之水夕與日合伏十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而夕見西方在日前順疾日行一度十八分之四十八日行二十二度而更順遲日行八分之七八日行七度而留不行一日而旋逆一日退一度在日前夕伏西方逆十一日退七度而與日合凡再合一終百一十五日千八百九十六萬一千三百九十五分行星如之五星曆步術以法伏日度餘加星合日度餘餘滿日度法得一從全命之如前得星見日及度餘也以星行分母乘見度分如日度法得一分不盡半法以上亦得一而日加所行分分滿其母得一度逆順母不同以當行之母乘故分如故母而一當行分也留者承前逆則減之伏不書度除斗分以行母為率分有損益前後相御凡五星行天遲疾留逆雖大率有常至犯守逆順難以術推月之行天猶有遲疾況五星乎唯日之行天有常進退有率不遲不疾不外不內人君德也求木合終歲數法以木日度法乘一木終之日內分周天除之即得也求木合終合數法以木日度法乘周天滿紀法所得復以周天除之即得五星皆放此也魏黃初元年十一月小己卯蔀首己亥歲十一月己卯朔旦冬至臣偉上劉氏在蜀不見改曆當是仍用漢四分法吳中書令闞澤受劉洪乾象法於東萊徐嶽字公河故孫氏用乾象曆至于吳亡晉武帝泰始元年有司奏王者祖氣而奉其終晉於五行之次應尚金金生於己事於酉終於丑宜祖以酉日臘以丑日改景初曆為泰始曆奏可史臣按鄒衍五德周為火行衍生在周時不容不知周氏行運且周之為曆年八百秦氏即有周之建國也周之火木其事易詳且五德更王唯有二家之說鄒衍以相勝立體劉向以相生為義據以為言不得出此二家者假使即劉向之說周為木行秦氏代周改其行運若不相勝則克木者金相生則木實生火秦氏乃稱水德理非謬然斯則劉氏所證為不值矣臣以為張蒼雖是漢臣生與周接司秦柱下備覩圖書且秦雖滅學不廢術數則有周遺文雖不畢在據漢水行事非虛作賈誼取秦云漢土德蓋以是漢代秦詳論二說各有其義張蒼則以漢水勝周火廢秦不班五德賈誼則以漢土勝秦水以秦為一代論秦漢雖殊而周為火一也然則相勝之義於事為長若同蒼黜秦則漢水魏土晉木宋金若同賈誼取秦則漢土魏木晉金宋火也難者云漢高斷蛇而神母夜哭云赤帝子殺白帝子然則漢非火而何斯又不然矣漢若為火則當云赤帝不宜云赤帝子也白帝子又何義況乎蓋由漢是土德土生乎火秦是水德水生乎金斯則漢以土為赤帝子秦以水德為白帝子也難者又曰向云五德相勝今復云土為赤帝子何也答曰五行自有相勝之義自有相生之義不得以相勝廢相生相生廢相勝也相勝者以土勝水耳相生者土自火子義豈相關崔實四民月令曰祖者道神黃帝之子曰纍祖好遠遊死道路故祀以為道神嵇含祖道賦序曰漢用丙午魏用丁未晉用孟月之酉曰莫識祖之所由說者云祈請道神謂之祖有事於道者君子行役則列之於中路喪者將遷則稱名於階庭或云百代遠祖名諡雕滅墳塋不復存於銘表游魂不得託於廟祧故以初歲良辰建華蓋揚綵旌將以招靈爽庶衆祖之來憑云爾晉武帝時侍中平原劉智推三百年斗曆改憲以為四分法三百年而減一日以百五十為度法三十七為斗分飾以浮說以扶其理江左中領軍琅邪王朔之以其上元歲在甲子善其術欲以九萬七千歲之甲子為開闢之始何承天云悼於立意者也景初日中晷景即用漢四分法是以漸就乖差其推五星則甚疏闊晉江左以來更用乾象五星法以代之猶有前却宋太祖頗好曆數太子率更令何承天私撰新法元嘉二十年上表曰臣授性頑惰少所關解自昔幼年頗好曆數耽情注意迄于白首臣亡舅故祕書監徐廣素善其事有既往七曜曆每記其得失自太和至太元之末四十許年臣因比歲考校至今又四十載故其疏密差會皆可知也夫圓極常動七曜運行離合去來雖有定勢以新故相涉自然有毫末之差連日纍歲積微成著是以虞書著欽若之典周易明治曆之訓言當順天以求合非為合以驗天也漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉捨易而不為役心於難事此臣所不解也堯典云日永星火以正仲夏今季夏則火中又宵中星虛以殷仲秋今季秋則虛中爾來二千七百餘年以中星檢之所差二十七八度則堯令冬至日在須女十度左右也漢之太初曆冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕檢之則景初今之冬至應在斗十七又史官受詔以土圭測景考校二至差三日有餘從來積歲及交州所上檢其增減亦相符驗然則今之二至非天之二至也天之南至日在斗十三四矣此則十九年七閏數微多差復改法易章則用算滋繁宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之間而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上曆表云自古及今凡諸曆數皆未能並己之妙何此不曉亦何以云是故臣更建元嘉曆以六百八為一紀半之為度法七十五為室分以建寅之月為歲首雨水為氣初以諸法閏餘一之歲為章首冬至從上三日五時日之所在移舊四度又月有遲疾合朔月蝕不在朔望亦非曆意也故元嘉皆以盈縮定其小餘以正朔望之日伏惟陛下允迪聖哲先天不違劬勞庶政寅亮鴻業究淵思於往籍探妙旨於未聞窮神知化罔不該覽是以愚臣欣遇盛明效其管穴伏願以臣所上元嘉法下史官考其疏密若謬有可採庶或補正闕謬以備萬分詔曰何承天所陳殊有理據可付外詳之太史令錢樂之兼丞嚴粲奏曰太子率更令領國子博士何承天表更改元嘉曆法以月蝕檢今冬至日在斗十七以土圭測影知冬至已差三日詔使付外檢署以元嘉十一年被勑使考月蝕土圭測影檢署由來用偉景初法冬至之日日在斗二十一度少檢十一年七月十六日望月蝕加時在卯到十五日四更二唱丑初始蝕到四唱蝕既在營室十五度末景初其日日在軫三度以月蝕所衝考之其日日應在翼十五度半又到十三年十二月十六日望月蝕加時在酉到亥初始食到一更三唱蝕既在鬼四度景初其日日在女三以衝考之其日日應在牛六度半又到十四年十二月十六日望月蝕加時在戌之半到二更四唱亥末始蝕到三更一唱食既在井三十八度景初其日日在斗二十五以衝考之其日日應在斗二十二度半到十五年五月十五日望月蝕加時在戌其日月始生而已蝕光已生四分之一格在斗十六度許景初其日日在井二十四考取其衝其日日應在井二十又到十七年九月十六日望月蝕加時在子之少到十五日未二更一唱始蝕到三唱蝕十五分之十二格在昴一度半景初其日在房二以衝考之則其日日在氐十三度半凡此五蝕以月衝一百八十二度半考之冬至之日日並不在斗二十一度少並在斗十七度半間悉如承天所上又去十一年起以土圭測影其年景初法十一月七日冬至前後陰不見影到十二年十一月十八日冬至其十五日影極長到十三年十一月二十九日冬至其二十六日影極長到十四年十一月十一日冬至其前後並陰不見到十五年十一月二十一日冬至十八日影極長到十六年十一月二日冬至其十月二十九日影極長到十七年十一月十三日冬至其十日影極長到十八年十一月二十五日冬至二十一日影極長到十九年十一月六日冬至其三日影極長到二十年十一月十六日冬至其前後陰不見影尋校前後以影極長為冬至並差三日以月蝕檢日所在已差四度土圭測影冬至又差三日今之冬至乃在斗十四間又如承天所上又承天法每月朔望及弦皆定大小餘於推交會時刻雖審皆用盈縮則月有頻三大頻二小比舊法殊為異舊日蝕不唯在朔亦有在晦及二日公羊傳所謂或失之前或失之後愚謂此一條自宜仍舊員外散騎郎皮延宗又難承天若晦朔定大小餘紀首值盈則退一日便應以故歲之晦為新紀之首承天乃改新法依舊術不復每月定大小餘如延宗所難太史所上有司奏治曆改憲經國盛典爰及漢魏屢有變革良由術無常是取協當時方今皇猷載暉舊域光被誠應綜核晷度以播維新承天曆術合可施用宋二十二年普用元嘉曆詔可
