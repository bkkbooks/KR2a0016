body:
  text: 宋書卷十五志第五禮二古者天子巡狩之禮布在方策至秦漢巡幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典唯後漢諸帝頗有古禮焉魏文帝值參分初創方隅事多皇輿亟動略無寧歲蓋應時之務又非舊章也明帝凡三東巡所過存問高年恤人疾苦或賜穀帛有古巡幸之風焉齊王正始元年巡洛陽賜高年力田各有差晉武帝泰始四年詔刺史二千石長吏曰古之王者以歲時巡狩方嶽其次則二伯述職不然則行人巡省撢人誦志故雖幽遐側微心無壅隔人情上通上指遠喻至于魚衆寡罔不得所用垂風遺烈休聲猶存朕在位纍載如臨深泉夙興夕惕明發不寐坐而待旦思四方水旱災眚為之怛然勤躬約己欲令事事當宜常恐衆吏用情誠心未著萬機兼猥慮有不周政刑失謬而弗獲備覽百姓有過在豫一人惟歲之不易未遑卜征巡省之事人之未乂其何以恤之今使使持節侍中副給事黃門侍郎銜命四出周行天下親見刺史二千石長吏申喻朕心懇誠至意訪求得失損益諸宜觀省政治問人間患苦周典有之曰其萬民利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝犯令為一書其札喪凶荒厄貧為一書其康樂和親安平為一書每國辨異之以反命于王以周知天下之故斯舊章前訓今率由之還具條奏俾朕昭然鑒于幽遠若親行焉大夫君子其各悉乃心各敬乃事嘉謀令圖苦言至戒與使者盡之無所隱諱方將虛心以俟其勉哉勗之稱朕意焉摯虞新禮議曰魏氏無巡狩故事新禮則巡狩方嶽柴望告至設壝宮如禮諸侯之覲者擯及執贄皆如朝儀而不建其旗臣虞案覲禮諸侯覲天子各建其旗章所以殊爵命示等威詩稱君子至止言觀其旗宜定新禮建旗如舊禮然終晉世巡狩廢矣宋武帝永初元年詔遣大使分行四方舉善旌賢問其疾苦元嘉四年二月乙卯太祖東巡丁卯至丹徒己巳告覲園陵三月甲戌幸丹徒離宮升京城北顧乙亥饗父老舊勳于丹徒行宮加賜衣裳各有差蠲丹徒縣其年租布之半繫囚見徒五歲刑以下悉皆原遣登城三戰及先大將家并青泥關頭敗沒餘口老疾單孤又諸戰亡家不能自存者並隨宜隱恤二十六年二月己亥上東巡辛丑幸京城辛亥謁二陵丁巳會舊京故老萬餘人往還饗勞孤疾勤勞之家咸蒙恤賚發赦令蠲徭役其時皇太子監國有司奏儀注某曹關某事云云被令儀宜如是請為箋如左謹關右署衆官如常儀尚書僕射尚書左右丞某甲死罪死罪某事云云參議以為宜如是事諾奉行某年月日某曹上右箋儀準於啓事年月右方關門下位及尚書官署其言選事者依舊不經它官太常主者寺押某署令某甲辭言某事云云求告報如所稱詳檢相應今聽如所上處事諾明詳旨申勒依承不得有虧符到奉行年月日起尚書某曹右符儀某曹關太常甲乙啓辭押某署令某甲上言某事云云請臺告報如所稱主者詳檢相應請聽如所上事諾別符申攝奉行謹關年月日右關事儀準於黃案年月日右方關門下位年月下左方下附列尚書衆官署其尚書名下應云奏者今言關餘皆如黃案式某曹關司徒長史王甲啓辭押某州刺史丙丁解騰某郡縣令長李乙書言某事云云請臺告報如所稱尚書某甲參議以為所論正如法令告報聽如所上請為令書如左謹關右關門下位及尚書署如上儀司徒長史王甲啓辭押某州刺史丙丁解騰某郡縣令長李乙書言某事云云州府緣案允值請臺告報年月日尚書令某甲上建康宮無令稱僕射右令日下司徒令報聽如某所上某宣攝奉行如故事文書如千里驛行年月朔日子尚書令某甲下無令稱僕射司徒承書從事到上起某曹右外上事內處報下令書儀某曹關某事云云令如是請為令書如右謹關右關署如前式令司徒某事云云令如是其下所屬奉行如故事文書如千里驛行年月日子下起某曹右令書自內出下外儀令書前某官某甲令以甲為某官如故事年月日侍御史某甲受右令書板文準於詔事板文尚書下云云奏行如故事右以準尚書勑儀起某曹右並白紙書凡內外應關箋之事一準此為儀其經宮臣者依臣禮拜刺史二千石誡敕文曰制詔云云某動靜屢聞右若拜詔書除者如舊文其拜令書除者令代制詔餘如常儀辭關板文云某官糞土臣某甲臨官稽首再拜辭制曰右除糞土臣及稽首云云某官某甲再拜辭以令曰代制曰某官宮臣者稱臣皇太子夜開諸門墨令銀字棨傳令信太史每歲上其年曆先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御坐尚書令以下就席位尚書三公郎以令著録案上奉以入就席伏讀訖賜酒一巵官有其注傅咸曰立秋一日白路光於紫庭白旗陳於玉階然則其日旗路皆白也晉成帝咸和五年六月丁未有司奏讀秋令兼侍中散騎侍郎荀奕兼黃門侍郎散騎侍郎曹宇駁曰尚書三公曹奏讀秋令儀注新荒以來舊典未備臣等參議光祿大夫臣華議武皇帝以秋夏盛暑常闕不讀令在春冬不廢也夫先王所以從時讀令者蓋後天而奉天時正服尊嚴之所重今服章多闕如比熱隆赫臣等謂可如議依故事闕而不讀詔可六年三月有司奏今月十六日立夏案五年六月三十日門下駁依武皇夏闕讀令今正服漸備四時讀令是祗述天和隆赫之道謂今故宜讀夏令奏可宋文帝元嘉六年六月辛酉朔駙馬都尉奉朝請徐道娛上表曰謹案晉博士曹弘之議立秋御讀令上應著緗幘遂改用素相承至今臣淺學管見竊有惟疑伏尋禮記月令王者四時之服正云駕倉龍載赤旗衣白衣服黑玉季夏則黃文極於此無白冠則某履某舄也且幘又非古服出自後代上附於冠下不屬衣冠固不革而幘豈容異色愚謂應與冠同色不宜隨節變綵土令在近謹以上聞如或可採乞付外詳議太學博士荀萬秋議伏尋幘非古者冠冕之服禮無其文案蔡雍獨斷云幘是古卑賤供事不冠人所服又董仲舒止雨書曰其執事皆赤幘知並不冠之服也漢元始用衆臣率從故司馬彪輿服志曰尚書幘名曰納言迎氣五郊各如其色從章服也自茲相承迄于有晉大宋受命禮制因循斯既歷代成準謂宜仍舊有司奏謹案道娛啓事以土令在近謂幘不宜變萬秋雖云幘宜仍舊而不明無讀土令之文今書舊事于左魏臺雜訪曰前後但見讀春夏秋冬四時令至於服黃之時獨闕不讀今不解其故魏明帝景初元年十二月二十一日散騎常侍領太史令高堂隆上言曰黃於五行中央土也王四季各十八日土生於火故於火用事之末服黃三季則否其令則隨四時不以五行為分也是以服黃無令其後太祖常謂土令三公郎每讀時令皇帝臨軒百僚備位多震悚失常儀宋唯世祖世劉協太宗世謝緯為三公郎善於其事人主及公卿並屬目稱歎協見宗室傳緯謝綜弟也舊說後漢有郭虞者有三女以三月上辰産二女上巳産一女二日之中而三女並亡俗以為大忌至此月此日不敢止家皆於東流水上為祈禳自潔濯謂之禊祠分流行觴遂成曲水史臣案周禮女巫掌歲時祓除釁浴如今三月上巳如水上之類也釁浴謂以香薰草藥沐浴也韓詩曰鄭國之俗三月上巳之溱洧兩水之上招魂續魄秉蘭草拂不祥此則其來甚久非起郭虞之遺風今世之度水也月令暮春天子始乘舟蔡雍章句曰陽氣和暖鮪魚時至將取以薦寢廟故因是乘舟禊於名川也論語暮春浴乎沂自上及下古有此禮今三月上巳祓於水濱蓋出此也雍之言然張衡南都賦祓於陽濱又是也或用秋漢書八月祓於霸上劉楨魯都賦素秋二七天漢指隅人胥祓除國子水嬉又是用七月十四日也自魏以後但用三日不以巳也魏明帝天淵池南設流杯石溝燕羣臣晉海西鍾山後流杯曲水延百僚皆其事也官人循之至今漢文帝始革三年喪制臨終詔曰天下吏民臨三日皆釋服無禁取婦嫁女祠祀飲酒食肉其當給喪事者無跣絰帶無過三寸當臨者皆旦夕各十五舉音服大紅十五日小紅十四日纖七日而釋服文帝以己亥崩乙巳葬其間凡七日自是之後天下遵令無復三年之禮案尸子禹治水為喪法曰毀必杖哀必三年是則水不救也故使死於陵者葬於陵死於澤者葬於澤桐棺三寸制喪三日然則聖人之於急病必為權制也但漢文治致升平四海寧晏廢禮開薄非也宣帝地節四年詔曰今百姓或遭衰絰凶災而吏徭事不得葬傷孝子心自今諸有大父母父母喪者勿徭事使得收斂送終盡其子道至成帝時丞相翟方進事父母孝謹母終既葬三十六日除服視事自以為身備漢相不敢踰國家典章然而原涉行父喪三年顯名天下河間惠王行母喪三年詔書褒稱以為宗室儀表薛修服母喪三年而兄宣曰人少能行之遂兄弟不同宣卒以此獲譏於世是則喪禮見貴常存矣至漢平帝崩王莽欲眩惑天下示忠孝使六百石以上皆服喪三年及莽母死但服天子弔諸侯之服一弔再會而已而令子新都侯宇服喪三年及元后崩莽乃自服三年之禮事皆姦妄天下疾之漢安帝初長吏多避事棄官乃令自非父母服不得去職是後吏又守職居官不行三年喪服其後又開長吏以下告寧言事者或以為刺史二千石宜同此制帝從之建光元年尚書孟布奏宜復如建武永平故事絶刺史二千石告寧及父母喪服又從之至桓帝永興二年復令刺史二千石行三年服永壽二年又使中常侍以下行三年服至延熹元年又皆絶之後漢世諸帝不豫並告泰山弘農廬江常山潁川南陽河東東郡廣陵太守禱祠五嶽四瀆遣司徒分詣郊廟社稷魏武臨終遺令曰天下尚未安定未得遵古百官臨殿中者十五舉音葬畢便除服其將兵屯戍者不得離部帝以正月庚子崩辛丑即殯是月丁卯葬葬畢反吉是為不踰月也諸葛亮受劉備遺詔既崩羣臣發喪滿三日除服到葬復如禮其郡國太守相尉縣令長三日便除服此則魏蜀喪制又並異於漢也孫權令諸居任遭三年之喪皆須交代乃去然多犯者嘉禾六年使羣臣議立制胡綜以為宜定大辟之科又使代未至不得告告者抵罪顧雍等同綜議從之其後吳令孟仁聞喪輒去陸遜陳其素行得減死一等自此遂絶晉宣帝崩文景並從權制及文帝崩國內行服三日武帝亦遵漢魏之典既葬除喪然猶深衣素冠降席撤膳太宰司馬孚太傅鄭沖太保王祥太尉何曾司徒領中領軍司馬望司空荀顗車騎將軍賈充尚書令裴秀尚書僕射武陔都護大將軍郭建侍中郭綏中書監荀勗中軍將軍羊祜等奏曰臣聞禮典軌度豐殺隨時虞夏商周咸不相襲蓋有由也大晉紹承漢魏有革有因期於足以興化致治而已故未皆得返情太素同規上古也陛下既已俯遵漢魏降喪之典以濟時務而躬蹈大孝情過乎哀素冠深衣降席撤膳雖武丁行之於殷世曾閔履之於布衣未足以喻方今荊蠻未夷庶政未乂萬機事殷動勞神慮豈遑全遂聖旨以從至情加歲時變易期運忽過山陵彌遠攀慕永絶臣等以為陛下宜回慮割情以康時濟治輒敕御府易服內省改坐太官復膳諸所施行皆如舊制詔曰每感念幽冥而不得終苴絰於草土以存此痛況當食稻衣錦誠佹然激切其心非所以相解也吾本諸生家傳禮來久何心一旦便易此情於所天相從已多可試省孔子答宰我之言無事紛紜也言及悲剝奈何奈何孚等重奏伏讀明詔感以悲懷輒思仲尼所以抑宰我之問聖思所以不能已已甚深甚篤然今者干戈未戢武事未偃萬機至重天下至衆陛下以萬乘之尊履布衣之禮服粗席藁水飲疏食殷憂內盈毀悴外表而躬勤萬機坐而待旦降心接下仄不遑食所以勞力者如斯之甚是以臣等悚息不寧誠懼神氣用損以疚大事輒敕有司改坐復常率由舊典惟陛下察納愚款以慰皇太后之心又詔曰重覽奏議益以悲剝不能自勝奈何奈何三年之喪自古達禮誠聖人稱心立哀明恕而行也神靈日遠無所告訴雖薄於情食旨服美朕更所不堪也不宜反覆重傷其心言用斷絶奈何奈何帝遂以此禮終三年後居太后之喪亦如之泰始二年八月詔書曰此上旬先帝棄天下日也便以周年吾當復何時一得叙人子情邪思慕煩毒欲詣陵瞻侍以盡哀憤主者具行備太宰司馬孚尚書令裴秀尚書僕射武陔等奏陛下至孝蒸蒸哀思罔極衰麻雖除毀悴過禮疏食粗服有損神和今雖秋節尚有餘暑謁見山陵悲感摧傷羣下竊用悚息平議以為宜惟遠體降抑聖情以慰萬國詔曰孤煢忽爾日月已周痛慕摧感永無逮及欲奉瞻山陵以哀僨體氣自佳其又已涼便當行不得如所奏也主者便具行備又詔曰昔者哀適三十日便為梓宮所棄遂離衰絰感痛豈可勝言顧漢文不使天下盡哀亦先帝至謙之志是以自割不以副諸君子有三年之愛而身禮廓然當見山陵何心而無服其以衰絰行孚等重奏臣聞上古喪期無數後世乃有年月之漸漢文帝隨時之義制為短喪傳之于後陛下以社稷宗廟之重萬方億兆之故既從權制釋降衰麻羣臣庶僚吉服今者謁陵以哀慕若加衰絰近臣期服當復受制進退無當不敢奉詔詔曰亦知不在此麻布耳然人子情思為欲令哀喪之物在身蓋近情也羣臣自當案舊制期服之義非先帝意也孚等又奏臣聞聖人制作必從時宜故五帝殊樂三王異禮此古今所以不同質文所以迭用也陛下隨時之宜既降心克己俯就權制既除衰麻而行心喪之禮今復制服義無所依若君服而臣不服雖先帝厚恩亦未之敢安也參量平議宜如前奏臣等敢固以請詔曰患情不能企及耳衣服何在諸君勤勤之至豈苟相違泰始四年皇太后崩有司奏前代故事倚廬中施白縑帳蓐素牀以布巾裹𠙽草軺輦板輿細犢車皆施縑𩹉詔不聽但令以布衣車而已其餘居喪之制一如禮文有司又奏大行皇太后當以四月二十五日安厝故事虞著衰服既虞而除其內外官僚皆就朝晡臨位御除服訖各還所次除衰服詔曰夫三年之喪天下之達禮也受終身之愛而無數年之報奈何葬而便即吉情所不忍也有司又奏世有險易道有汙隆所遇之時異誠有由然非忽禮也方今戎馬未散王事至殷更須聽斷以熙庶績昔周康王始登翌室猶戴冕臨朝降於漢魏既葬除釋諒暗之禮自遠代而廢矣唯陛下割高宗之制從當時之宜敢固以請詔曰攬省奏事益增感剝夫三年之喪所以盡情致禮葬已便除所不堪也當吾哀懷言用斷絶奈何奈何有司又固請詔曰不能篤孝勿以毀傷為憂也誠知衣服末事耳然今思存草土率常以吉物奪之乃所以重傷至心非見念也每代禮典質文皆不同此身何為限以近制使達喪闕然乎羣臣又固請帝流涕久之乃許文帝崇陽陵先開一日遣侍臣侍梓宮又遣將軍校尉當直尉中監各一人將殿中將軍以下及先帝時左右常給使詣陵宿衛文明皇后崩及武元楊后崩天下將吏發哀三日止泰始元年詔諸將吏二千石以下遭三年喪聽歸終寧庶人復除徭役太康七年大鴻臚鄭默母喪既葬當依舊攝職固陳不起於是始制大臣得終喪三年然元康中陳準傅咸之徒猶以權奪不得終禮自茲至今往往以為成比也晉文帝之崩也羊祜謂傅玄曰三年之喪自天子達漢文除之毀禮傷義今上有曾閔之性實行喪禮喪禮實行何為除服若因此守先王之法不亦善乎玄曰漢文以末世淺薄不能復行國君之喪故因而除之數百年一旦復古恐難行也祜曰且使主上遂服猶為善乎玄曰若上不除而臣下除此為但有父子無復君臣三綱之道虧矣習鑿齒曰傅玄知無君臣之傷教而不知兼無父子為重豈不蔽哉且漢廢君臣之喪不降父子之服故四海黎庶莫不盡情於其親三綱之道二服用於私室而王者獨盡廢之豈所以孝治天下乎詩云猷之未遠其傅玄之謂也泰始十年武元楊皇后崩博士張靖議太子宜依漢文權制割情除服博士陳逵議太子宜令服重尚書僕射盧欽尚書魏舒杜預奏諒暗之制乃因自古是以高宗無服喪之文唯稱不言而已漢文限三十六日魏氏以既虞為斷皇太子與國為體理宜釋服博士段暢承述預旨推引禮傳以成其說既卒哭太子及三夫人以下皆隨御除服自漢文用權禮無復禁歷代遵用之至晉孝武崩太傅録尚書會稽王道子議山陵之後通婚嫁不得作樂以一朞為限宋高祖崩葬畢吏民至于宮掖悉通樂唯殿內禁宋武帝永初元年黃門侍郎王準之議鄭玄喪制二十七月而終學者多云得禮晉初用王肅議祥禫共月遂以為制江左以來唯晉朝施用搢紳之士猶多遵玄議宜使朝野一體詔可晉惠帝永康元年愍懷太子薨帝依禮服長子三年羣臣服齊衰朞晉孝武太元二十一年孝武帝崩李太后制三年之制宋武帝永初三年武帝崩蕭太后制三年之服晉惠帝太安元年三月皇太孫尚薨有司奏御服齊衰朞詔通議散騎常侍謝衡以為諸侯之太子誓與未誓尊卑體殊喪服云為嫡子長殤謂未誓也已誓則不殤也中書令卞粹曰太子始生故已尊重不待命誓若衡議已誓不殤則元服之子當斬衰三年未誓而殤則雖十九當大功九月誓與未誓其為升降也微斬與大功其為輕重也遠而今注云諸侯不降嫡殤重嫌於無服以大功為重嫡之服大功為重嫡之服則雖誓無復有三年之理明矣男能奉衛社稷女能奉婦道各以可成之年而有已成之事故可無殤非孩之謂也謂殤後者尊之如父猶無所加而止殤服況以天子之尊為無服之殤行成人之制邪凡諸宜重之殤皆士大夫不加服而令至尊獨居其重未之前聞也博士蔡克同粹祕書監摯虞議太子初生舉以成人之禮則殤理除矣太孫亦體君傳重由位成而服全非以年也天子無服殤之儀絶朞故也於是御史以上皆服齊衰晉康帝建元元年正月晦成恭杜皇后周忌有司奏至尊朞年應改服詔曰君親名教之重也權制出於近代耳於是素服如舊非漢魏之典晉孝武太元九年崇德太后禇氏崩后於帝為從嫂或疑其服太學博士徐藻議資父事君而敬同又禮傳其夫屬乎父道者妻皆母道也則夫屬君道妻亦后道矣服后宜以資母之義魯譏逆祀以明尊尊今上躬奉康穆哀皇及靖后之祀致敬同於所天豈可敬之以君道而服廢於本親謂應服齊衰朞於是帝制朞服晉安帝隆安四年太皇太后李氏崩尚書祠部郎徐廣議太皇太后名位允正體同皇極理制備盡情禮彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號文公服三年之喪子於父之所生體尊義重且禮祖不厭孫宜遂服無屈而緣情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰朞永安皇后無服但一舉哀百官亦一朞詔可宋文帝元嘉十七年七月壬子元皇后崩兼司徒給事中劉溫持節監喪神虎門設凶門柏歷至西上閣皇太子於東宮崇正殿及永福省並設廬諸皇子未有府第者於西廨設廬元嘉十七年元皇后崩皇太子心喪三年禮心喪者有禫無禫禮無成文世或兩行皇太子心喪畢詔使博議有司奏喪禮有禫以祥變有漸不宜便除即吉故其間服以綅縞也心喪已經十三月大祥十五月祥禫變除禮畢餘一朞不應復有禫宣下以為永制詔可孝武孝建三年三月有司奏故散騎常侍右光祿大夫開府儀同三司義陽王師王偃喪逝至尊為服緦三月成服仍即公除至三月竟未詳當除服與不又皇后依朝制服心喪行喪三十日公除至祖葬日臨喪當著何服又舊事皇后心喪服終除之日更還著未公除時服然後就除未詳今皇后除心制日當依舊更服為但釋心制中所著布素而已勒禮官處正太學博士王膺之議尊卑殊制輕重有級五服雖同降厭則異禮天子止降旁親外舅緦麻本在服例但衰絰不可以臨朝饗故有公除之議雖釋衰襲冕尚有緦麻之制愚謂至尊服三月既竟猶宜除釋又議吉凶異容情禮相稱皇后一月之限雖過二功之服已釋哀情所極莫深於尸柩親見之重不可以無服案周禮為兄弟既除喪已及其葬也反服其服輕喪雖除猶齊衰以臨葬舉輕明重則其理可知也愚謂王右光祿祖葬之日皇后宜反齊衰又議喪禮即遠變除漸輕情與日殺服隨時改權禮既行服制已變豈容終除之日而更重服乎案晉泰始三年武帝以朞除之月欲反重服拜陵頻詔勤勤思申棘心于時朝議譬執亦遂不果愚謂皇后終除之日不宜還著重服直當釋除布素而已太常丞朱膺之議凡云公除非全除之稱今朝臣私服亦有公除猶自窮其本制膺之云晉武拜陵不遂反服此時是權制既除衰麻不可以重制耳與公除不同愚謂皇后除心制日宜如舊反服未公除時服以申創巨之情餘同膺之議國子助教蘇瑋生議案三日成服即除及皇后行喪三十日禮無其文若並謂之公除則可粗相依准凡諸公除之設蓋以王制奪禮葬及祥除皆宜反服未有服之於前不除於後雖有齊斬重制猶為功緦除喪夫公除暫奪豈可遂以即吉邪愚謂至尊三月服竟故應依禮除釋皇后臨祖及一周祥除並宜反服齊衰尚書令中軍將軍建平王宏議謂至尊緦制終止舉哀而已不須釋服餘同朱膺之議前祠部郎中周景遠議權事變禮五服俱革緦麻輕制不容獨異謂至尊既已公除至三月竟不復有除釋之義其餘同朱膺之議重加研詳以宏議為允詔可大明二年正月有司奏故右光祿大夫王偃喪依格皇后服朞心喪三年應再周來二月晦檢元嘉十九年舊事武康公主出適二十五月心制終盡從禮即吉昔國哀再周孝建二年二月其月末諸公主心制終則應從吉于時猶心禫素衣二十七月乃除二事不同領儀曹郎朱膺之議詳尋禮文心喪不應有禫皇代考檢已為定制元嘉季年禍難深酷聖心天至喪紀過哀是以出適公主還同在室即情變禮非革舊章今皇后二月晦宜依元嘉十九年制釋素即吉以為永準詔可文帝元嘉十五年皇太子妃祖父右光祿大夫殷和喪變除之禮儀同皇后晉孝武太元十五年淑媛陳氏卒皇太子所生也有司參詳母以子貴贈淑媛為夫人置家令典喪事太子前衛率徐邈議喪服傳稱與尊者為體則不服其私親又君父所不服子亦不敢服故王公妾子服其所生母練冠麻衣既葬而除非五服之常則謂之無服從之宋孝武大明五年閏月皇太子妃薨樟木為櫬號曰樟宮載以龍輴造陵於龍山置大匠卿斷草司空告后土謂葬曰山塋祔文元皇后廟之陰室在正堂後壁之外北向御服大功九月設位太極東宮堂殿中監黃門侍郎僕射並從服從服者御服衰乃從服他日則否宮臣服齊衰三月其居宮者處寧假大明五年閏月有司奏依禮皇太后服太子妃小功五月皇后大功九月右丞徐爰參議宮人從服者若二御哭臨應著衰時從服者悉著衰非其日如常儀太子既有妃朞服詔見之日還著公服若至尊非哭臨日幸東宮太子見亦如之宮臣見至尊皆著朱衣大明五年閏月有司奏皇太子妃薨至尊皇后並服大功九月皇太后小功五月未詳二御何當得作鼓吹及樂博士司馬興之議案禮齊衰大功之喪三月不從政今臨軒拜授則人君之大典今古既異賒促不同愚謂皇太子妃祔廟之後便可臨軒作樂及鼓吹右丞徐爰議皇太子妃雖未山塋臨軒拜官舊不為礙樟棺在殯應縣而不作祔後三御樂宜使學官擬禮上興之又議案禮大功至則辟琴瑟誠無自奏之理但王者體大理絶凡庶故漢文既葬悉皆復吉唯縣而不樂以此表哀今准其輕重侔其降殺則下流大功不容撤樂以終服夫金石賓饗之禮簫管警塗之衛實人君之盛典當陽之威飾固亦不可久廢於朝又禮無天王服嫡婦之文直後學推貴嫡之義耳既已制服成喪虛懸終窆亦足以甄崇冢正標明禮歸矣爰參議皇太子朞服內不合作樂及鼓吹明帝泰始中陳貴妃父金寶卒貴妃制服三十日滿公除晉穆帝時東海國言哀王薨踰年嗣王乃來繼不復追服羣臣皆已反吉國妃亦宜同除詔曰朝廷所以從權制者以王事奪之非為變禮也婦人傳重義大若從權制義將安託於是國妃終三年之制孫盛曰廢三年之禮開偷薄之源漢魏失之大者也今若以丈夫宜奪以王事婦人可終本服是為吉凶之儀雜陳於宮寢綵素之制乖異於內外無乃情禮俱違哀樂失所乎蕃國寡務宜如聖典可無疑矣宋文帝元嘉四年八月太傅長沙景王神主隨子南兗州刺史義欣鎮廣陵備所加殊禮下船及至鎮入行廟大司馬臨川烈武王神主隨子荊州刺史義慶江陵亦如之元嘉二十三年七月白衣領御史中丞何承天奏尚書刺海鹽公主所生母蔣美人喪海鹽公主先離婚今應成服撰儀注參詳宜下二學禮官博士議公主所服輕重太學博士顧雅議今既咸用士禮便宜同齊衰削杖布帶疏履朞禮畢心喪三年博士周野王議又云今諸王公主咸用士禮譙王衡陽王為所生太妃皆居重服則公主情禮亦宜家中朞服為允其博士庾邃之顏測殷明王淵之四人同雅議何惔王羅雲二人同野王議如所上臺案今之諸王雖行士禮是施於傍親及自己以下至於為帝王所厭猶一依古典又永初三年九月符修儀亡廣德三主以餘尊所厭猶服大功海鹽公主體自宸極當上厭至尊豈得遂服臺據經傳正文并引事例依源責失而博士顧雅周野王等捍不肯怗方稱自有宋以來皇子蕃王皆無厭降同之士禮著於故事緦功之服不廢於末戚顧獨貶於所生是申其所輕奪其所重奪其所重豈緣情之謂臺伏尋聖朝受終于晉凡所施行莫不上稽禮文兼用晉事又太元中晉恭帝時為皇子服其所生陳氏練冠縓緣此則前代施行故事謹依禮文者也又廣德三公主為所生母符修儀服大功此先君餘尊之所厭者也元嘉十三年第七皇子不服曹婕妤止於麻衣此厭乎至尊者也博士既不據古又不依今背違施行見事而多作浮辭自衛乃云五帝之時三王之季又言長子去斬衰除禫杖皆是古禮不少今世博士雖復引此諸條無救於失又詰臺云蕃國得遂其私情此義出何經記臣案南譙衡陽太妃並受朝命為國小君是以二王得遂其服豈可為美人比例尋蕃王得遂者聖朝之所許也皇子公主不得申者由有厭而然也臺登重更責失制不得過十日而復不酬答既被催攝二三日甫輸怗辭雖理屈事窮猶聞義恥服臣聞喪紀有制禮之大經降殺攸宜家國舊典古之諸侯衆子猶以尊厭況在王室而欲同之士庶此之僻謬不俟言而顯太常統寺曾不研却所謂同乎失者亦未得之宜加裁正弘明國典謹案太學博士顧雅國子助教周野王博士王羅雲顏測殷明何惔王淵之前博士遷員外散騎侍郎庾邃之等咸蒙抽飾備位前疑既不謹守舊文又不審據前准遂上背經典下違故事率意妄作自造禮章太常臣敬叔位居宗伯問禮所司騰述往反了無研却混同茲失亦宜及咎請以見事並免今所居官解野王領國子助教雅野王初立議乖舛中執捍愆失未違十日之限雖起一事合成三愆羅雲掌押捍失三人加禁固五年詔敬叔白衣領職餘如奏元嘉二十九年南平王鑠所生母吳淑儀薨依禮無服麻衣練冠既葬而除有司奏古者與尊者為體不得服其私親而比世諸侯咸用士禮五服之內悉皆成服於其所生反不得遂於是皇子皆申母服孝武帝孝建元年六月己巳有司奏故第十六皇弟休倩薨夭年始及殤追贈諡東平沖王服制未有成准輒下禮官詳議太學博士陸澄議案禮有成人道則不為殤今既追胙土宇遠崇封秩圭黻備典成孰大焉典文式昭殤名去矣夫典文垂式元服表身猶以免孺子之制全丈夫之義安有名頒爵首而可服以殤禮有司尋澄議無明證却使秉正更上澄重議竊謂贈之為義所以追加名器故贈公者便成公贈卿者便成卿贈之以王得不為王乎然則有在生而封或既沒而爵俱受帝命不為吉凶殊典同備文物豈以存亡異數今璽策咸秩是成人之禮羣后臨哀非下殤之制若喪用成人親以殤服末學含疑未之或辨敢求詳衷如所稱左丞臣羊希參議尋澄議既無畫然前例不合准據案禮子不殤父臣不殤君君父至尊臣子恩重不得以幼年而降又曰尊同則服其親服推此文旨旁親自宜服殤所不殤者唯施臣子而已詔可孝建元年六月湘東國刺稱國太妃以去三十年閏六月二十八日薨未詳周忌當在六月為取七月勒禮官議正博士丘邁之議案吳商議閏月亡者應以本正之月為忌謂正閏論雖各有所執商議為允宜以今六月為忌左僕射建平王宏謂邁之議不可准據案晉世及皇代以來閏月亡者以閏之後月祥宜以來七月為祥忌及大明元年二月有司又奏太常鄱陽哀王去年閏三月十八日薨今為何月末祥除下禮官議正博士傅休議尋三禮喪遇閏月數者數閏歲數者沒閏閏在朞內故也鄱陽哀王去年閏三月薨月次節物則定是四月之分應以今年四月末為祥晉元明二帝並以閏二月崩以閏後月祥先代成准則是今比太常丞庾蔚之議禮正月存親故有忌日之感四時既已變人情亦已衰故有二祥之殺是則祥忌皆以同月為議而閏亡者明年必無其月不可以無其月而不祥忌故必宜用閏所附之月閏月附正公羊明議故班固以閏九月為後九月月名既不殊天時亦不異若用閏之後月則春夏永革節候亦舛設有人以閏臘月亡者若用閏後月為祥忌則祥忌應在後年正月祥涉三載既失周朞之義冬亡而春忌又乖致感之本譬今年末三十日亡明年末月小若以去年二十九日親尚存則應用後年正朝為忌此必不然則閏亡可知也通關並同蔚之議三月末祥大明五年七月有司奏故永陽縣開國侯劉叔子夭喪年始四歲傍親服制有疑太學博士虞和領軍長史周景遠司馬朱膺之前太常丞庾蔚之等議並云宜同成人之服東平沖王服殤實由追贈異於已受茅土博士司馬興之議應同東平殤服左丞荀萬秋等參議南面君國繼體承家雖則佩觿未闕成德君父名正臣子不容服殤故云臣不殤君子不殤父推此則知傍親故依殤制東平沖王已經前議若升仕朝列則為大成故鄱陽哀王追贈太常親戚不降愚謂下殤以上身居封爵宜同成人年在無服之殤以登官為斷今永陽國臣自應全服至於傍親宜從殤禮詔景遠議為允後廢帝元徽二年七月有司奏第七皇弟訓養母鄭修容喪未詳服制下禮官正議太學博士周山文議案庶母慈己者小功五月鄭玄云其使養之不命為母子亦服庶母慈己之服愚謂第七皇弟宜從小功之制參議並同漢魏廢帝喪親三年之制而魏世或為舊君服三年者至晉泰始四年尚書何楨奏故辟舉綱紀吏不計違適皆反服舊君齊衰三月於是詔書下其奏所適無貴賤悉同依古典魏武以正月崩魏文以其年七月設伎樂百戲是魏不以喪廢樂也晉武帝以來國有大喪未除正會亦廢樂太安元年太子喪未除正會亦廢樂穆帝永和中為中原山陵未修復頻年會輒廢樂是時太后臨朝后父褚裒薨元會又廢樂晉世孝武太元六年為皇后王氏喪亦廢樂宋大喪則廢樂漢獻帝建安末魏武帝作終令曰古之葬者必在瘠薄之地其規西原上為壽陵因高為基不封不樹周禮冢人掌公墓之地凡諸侯居左右以前卿大夫居後漢制亦謂之陪陵其公卿大臣列將有功者宜陪壽陵其廣為兆域使足相容魏武以送終制衣服四篋題識其上春秋冬夏日有不諱隨時以斂金珥珠玉銅鐵之物一不得送文帝遵奉無所增加及受禪刻金璽追加尊號不敢開埏乃為石室藏璽埏首示陵中無金銀諸物也漢禮明器甚多自是皆省矣文帝黃初三年又自作終制禮國君即位為椑存不忘亡也壽陵因山為體無封無樹無立寢殿造園邑通神道夫葬者藏也欲人之不能見也禮不墓祭欲存亡之不黷也皇后及貴人以下不隨王之國者有終沒皆葬澗西前又已表其處矣此詔藏之宗廟副在尚書祕書三府明帝亦遵奉之明帝性雖崇奢然未遽營陵墓也晉宣帝豫自於首陽山為土藏不墳不樹作顧命終制斂以時服不設明器文景皆謹奉成命無所加焉景帝崩喪事制度又依宣帝故事武帝泰始四年文明王皇后崩將合葬開崇陽陵使太尉司馬望奉祭進皇帝蜜璽綬於便房神坐魏氏金璽此又儉矣泰始二年詔曰昔舜葬蒼梧農不易畝禹葬會稽巿不改肆上惟祖考清簡之旨外欲移陵十里內居人一切停之江左元明崇儉且百度草創山陵奉終省約備矣成帝咸康七年杜后崩詔外官五日一入臨內官旦一入而已過葬虞祭禮畢止有司奏大行皇后陵所作凶門柏歷門號顯陽端門詔曰門如所處凶門柏歷大為煩費停之案蔡謨說以二瓦器盛死者之祭繫於木表裹以葦席置於庭中近南名為重今之凶門是其遺象也禮既虞而作主今未葬未有主故以重當之禮稱為主道此其義也范堅又曰凶門非古古有懸重形似凶門後人出之門外以表喪俗遂行之薄帳即古弔幕之類也是時又詔曰重壤之下豈宜崇飾無用陵中唯潔掃而已有司又奏依舊選公卿以下六品子弟六十人為挽郎詔又停之孝武帝太元四年九月皇后王氏崩詔曰終事唯從儉速又詔遠近不得遣山陵使有司奏選挽郎二十四人詔停宋文帝元嘉十七年元皇后崩詔亦停選挽郎漢儀五供畢則上陵歲歲以為常魏則無定禮齊王在位九載始一謁高平陵而曹爽誅其後遂廢終魏世晉宣帝遺詔子弟羣官皆不得謁陵於是景文遵旨至武帝猶再謁崇陽陵一謁峻平陵然遂不敢謁高原陵至惠帝復止也逮江左初元帝崩後諸公始有謁陵辭陵之事蓋由眷同友執率情而舉非洛京之舊也成帝時中宮亦年年拜陵議者以為非禮於是遂止以為永制至穆帝時褚太后臨朝又拜陵帝幼故也至孝武崩驃騎將軍司馬道子命曰今雖權制釋服至於朔望諸節自應展情陵所以一周為斷於是至陵變服單衣爐煩瀆無準非禮意也至安帝元興元年尚書左僕射桓謙奏曰百僚拜陵起於中興非晉舊典積習生常遂為近法尋武皇帝詔乃不使人主諸王拜陵豈唯百僚謂宜遵奉於是施行及義熙初又復江左之舊宋明帝又斷羣臣初拜謁陵而辭如故自元嘉以來每歲正月輿駕必謁初寧陵復漢儀也世祖太宗亦每歲拜初寧長寧陵漢以後天下送死奢靡多作石室石獸碑銘等物建安十年魏武帝以天下雕弊下令不得厚葬又禁立碑魏高貴鄉公甘露二年大將軍參軍太原王倫卒倫兄俊作表德論以述倫遺美云祗畏王典不得為銘乃撰録行事就刊於墓之陰云爾此則碑禁尚嚴也此後復弛替晉武帝咸寧四年又詔曰此石獸碑表既私褒美興長虛僞傷財害人莫大於此一禁斷之其犯者雖會赦令皆當毀壞至元帝太興元年有司奏故驃騎府主簿故恩營葬舊君顧榮求立碑詔特聽立自是後禁又漸頽大臣長吏人皆私立義熙中尚書祠部郎中裴松之又議禁斷於是至今順帝升明三年四月壬辰御臨軒遣使奉璽綬禪位於齊王懸而不樂宋明帝泰始二年九月有司奏皇太子所生陳貴妃禮秩既同儲宮未詳宮臣及朝臣並有敬不妃主在內相見又應何儀博士王慶緒議百僚內外禮敬貴妃應與皇太子同其東朝臣隸理歸臣節太常丞虞願等同慶緒尚書令建安王休仁議稱禮云妾既不得體君班秩視子為序母以子貴經著明文內外致敬貴妃誠如慶緒議天子姬嬪不容通音介於外雖義可致虔不應有箋表參詳休仁議為允詔可泰豫元年後廢帝即位崇所生陳貴妃為皇太妃有司奏皇太妃位亞尊極未詳國親舉哀格當一同皇太后為有降異又於本親朞以下當猶服與不前曹郎王燮之議案喪服傳妾服君之黨得與女君同如此皇太妃服宗與太后無異但太后既以尊降無服太妃儀不應殊故悉不服也計本情舉哀其禮不異又禮諸侯絶朞皇太妃雖云不居尊極不容輕於諸侯謂本親朞以下一無所服有慘自宜舉哀親疏二儀準之太后兼太常丞司馬燮之議禮妾服君之庶子及女君之黨皆謂大夫士耳妾名雖總而班有貴賤三夫人九嬪位視公卿大夫猶有貴妾而況天子諸侯之妾為他妾之子無服既不服他妾之子豈容服君及女君餘親況皇太后妃貴亞相極禮絶羣后崇輝盛典有踰東儲尚不服朞太妃豈應有異若本親有慘舉哀之儀宜仰則太后參議以燮之議為允太妃於國親無服故宜緣情為諸王公主於至尊是朞服者反其太妃王妃三夫人九嬪各舉哀宋孝武帝孝建三年八月戊子有司奏雲杜國解稱國子檀和之所生親王求除太夫人檢無國子除太夫人先例法又無科下禮官議正太學博士孫豁之議春秋母以子貴王雖為妾是和之所生案五等之例鄭伯許男同號夫人國子體例王合如國所生太常丞庾蔚之議母以子貴雖春秋明義古今異制因革不同自頃代以來所生蒙榮唯有諸王既是王者之嬪御故宜見尊於蕃國若功高勳重列為公侯亦有拜太夫人之禮凡此皆朝恩曲降非國之所求子男妾母未有前比祠部郎中朱膺之議以為子不得爵父母而春秋有母以子貴當謂傳國嗣君母本先公嬪媵所因藉有由故也始封之身所不得同若殊績重勳恩所特錫時或有之不由司存所議參議以蔚之為允詔可大明二年六月有司奏凡侯伯子男世子喪無嗣求進次息為世子檢無其例下禮官議正博士孫武議案晉濟北侯荀勗長子連卒以次子輯拜世子先代成準宜為今例博士傅郁議禮記微子立衍商禮斯行仲子舍孫姬典攸貶歷代遵循靡替于舊今胙土之君在而世子卒厥嗣未育非捨孫之謂愚以為次子有子自宜紹為世孫若其未也無容遠搜輕屬承綱繼體傳之有由父在立子允稱情典曹郎諸葛雅之議案春秋傳云世子死有母弟則立之無則立長年均擇賢義均則卜古之制也今長子早卒無嗣進立次息以為世子取諸左氏理義無違又孫武所據晉濟北侯荀勗長子卒立次子亦近代成例依文採比竊所允安謂宜開許以為永制參議為允詔可大明十二年十一月有司奏興平國解稱國子袁愍孫母王氏應除太夫人檢無國子除太夫人例下禮官議正太學博士司馬興之議案禮下國卿大夫之妻皆命天子以斯而推則子男之母不容獨異博士程彥議以為五等雖差而承家事等公侯之母崇號得從子男於親尊秩宜顯故春秋之義母以子貴固知從子尊與國均也彥參議以興之議為允除王氏為興平縣開國子太夫人詔可大明四年九月有司奏陳留國王曹虔秀長兄虔嗣早卒秀襲封之後生子銑以繼虔嗣今依例應拜世子未詳應以銑為世子為應立次子鍇太學博士王溫之江長議並為應以銑為正嗣太常陸澄議立鍇右丞徐爰議謂禮後大宗以其不可乏祀諸侯世及春秋成義虔嗣承家傳爵身為國王雖薨沒無子猶列昭穆立後之日便應即纂國統于時既無承繼虔秀以次襲紹虔嗣既列廟饗故自與世數而遷豈容蒸嘗無闕橫取他子為嗣為人胤嗣又應恭祀先父案禮文公子不得禰諸侯虔嗣無緣降廟就寢銑本長息宜還為虔秀世子詔如爰議宋文帝元嘉十三年七月有司奏御史中丞劉式之議每至出行未知制與何官分道應有舊科法唯稱中丞專道傳詔荷信詔喚衆官應詔者行得制令無分別他官之文既無畫然定則準承有疑謂皇太子正議東儲不宜與衆同例中丞應與分道揚州刺史丹陽尹建康令並是京輦土地之主或檢校非違或赴救水火事應神速不宜稽駐亦合分道又尋六門則為行馬之內且禁衛非違並由二衛及領軍未詳京尹建康令門內之徒及公事亦得與中丞分道與不其准參舊儀告報參詳所宜分道聽如臺所上其六門內既非州郡縣部界則不合依門外其尚書令二僕射所應分道亦悉與中丞同孝武帝大明六年五月詔立凌室藏冰有司奏季冬之月冰壯之時凌室長率山虞及輿隸取冰於深山窮谷涸陰沍寒之處以納于凌陰務令周密無泄其氣先以黑牡秬黍祭司寒於凌室之北仲春之月春分之日以黑羔秬黍祭司寒啓冰室先薦寢廟二廟夏祠用鑑盛冰室一鑑以禦溫氣蠅蚋三御殿及太官膳羞並以鑑供冰自春分至立秋有臣妾喪詔贈祕器自立夏至立秋不限稱數以周喪事繕制夷盤隨冰借給凌室在樂游苑內置長一人保舉吏二人三公黃閣前史無其義史臣按禮記士與天子同公侯大夫則異鄭玄注士賤與君同不嫌也夫朱門洞啓當陽之正色也三公之與天子禮秩相亞故黃其閣以示謙不敢斥天子蓋是漢來制也張超與陳公箋拜黃閣將有日月是也史臣按今朝士詣三公尚書丞郎詣令僕射尚書並門外下車履度門閫乃納屐漢世朝臣見三公並拜丞郎見八座皆持板揖事在漢儀及漢舊儀然則並有敬也陳蕃為光祿勳范滂為主事以公儀詣蕃執板入閣至坐蕃不奪滂板滂投板振衣而去郭泰責蕃曰以階級言之滂宜有敬以類數推之至閣宜省然後敬止在門其來久矣
