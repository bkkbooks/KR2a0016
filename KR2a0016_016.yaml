body:
  text: 宋書卷十六志第六禮三國之大事在祀與戎自書契經典咸崇其義而聖人之德莫大於嚴父者也故司馬遷著封禪書班固備郊祀志上紀皇王正祀下録郡國百神司馬彪又著祭祀志以續終漢中興以後其舊制誕章粲然弘備自茲以降又有異同故復撰次云爾漢獻帝延康元年十一月己丑詔公卿告祠高廟遣兼御史大夫張音奉皇帝璽綬策書禪帝位于魏是時魏文帝繼王位南巡在潁陰有司乃為壇於潁陰之繁陽故城庚午登壇魏相國華歆跪受璽紱以進於王既受畢降壇視燎成禮而返未有祖配之事魏文帝黃初二年正月郊祀天地明堂是時魏都洛京而神祇兆域明堂靈臺皆因漢舊事四年七月帝將東巡以大軍當出使太常以一特牛告祠南郊自後以為常及文帝崩太尉鍾繇告諡南郊皆是有事於郊也明帝太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝是時二漢郊禋之制具存魏所損益可知也四年八月帝東巡過繁昌使執金吾臧霸行太尉事以特牛祠受禪壇後漢紀章帝詔高邑祠即位壇此雖前代已行之事然為壇以祀天而壇非神也今無事於上帝而致祀於虛壇未詳所據也景初元年十月乙卯始營洛陽南委粟山為圓丘詔曰蓋帝王受命莫不恭承天地以彰神明尊祀世統以昭功德故先代之典既著則禘郊祖宗之制備也昔漢氏之初承秦滅學之後採托殘缺以備郊祀自甘泉后土雍宮五畤神祇兆位多不經見並以興廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏世系出自有虞氏今祀圓丘以始祖帝舜配號圓丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祇以武宣皇后配宗祀皇考高祖文皇帝於明堂以配上帝十二月壬子冬至始祀皇皇帝天于圓丘以始祖有虞帝舜配自正始以後終魏世不復郊祀孫權初稱尊號於武昌祭南郊告天文曰皇帝臣孫權敢用玄牡昭告皇皇后帝漢饗國二十有四世歷年四百三十有四行氣數終祿胙運盡普天弛絶率土分崩孽臣曹丕遂奪神器丕子睿繼世作慝竊名亂制權生於東南遭值期運承乾秉戎志在拯世奉辭行罰舉足為民羣臣將相州郡百城執事之人咸以為天意已去於漢漢氏已終於天皇帝位虛郊祀無主休徵嘉瑞前後雜沓曆數在躬不得不受權畏天命敢不敬從謹擇元日登壇柴燎即皇帝位唯爾有神饗之左右有吳永綏天極其後自以居非中土不復修設中年羣臣奏議宜修郊祀權曰郊祀當於中土今非其所重奏曰普天之下莫非王土王者以天下為家昔周文武郊於酆鎬非必中土權曰武王伐紂即阼於鎬京而郊其所也文王未為天子立郊於酆見何經典復奏曰伏見漢書郊祀志匡衡奏徙甘泉河東郊於長安言文王郊於酆權曰文王德性謙讓處諸侯之位明未郊也經傳無明文由匡衡俗儒意說非典籍正義不可用也虞喜志林曰吳主糾駁郊祀追貶匡衡凡在見者莫不慨然稱善也何承天曰案權建號繼天而郊享有闕固非也末年雖一南郊而遂無北郊之禮環氏吳紀權思崇嚴父配天之義追上父堅尊號為吳始祖如此說則權末年所郊堅配天也權卒後三嗣主終吳世不郊祀則權不享配帝之禮矣劉備章武元年即皇帝位設壇建安二十六年夏四月丙午皇帝臣備敢用玄牡昭告皇天上帝后土神祇漢有天下曆數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復享今曹操阻兵安忍子丕載其凶逆竊居神器羣臣將士以為社稷墮廢備宜修之嗣武二祖龔行天罰備惟否德懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天之威又懼漢邦將湮于地謹擇元日與百僚登壇受皇帝璽綬修燔瘞告類于大神惟大神尚饗祚于漢家永綏四海章武二年十月詔丞相諸葛亮營南北郊于成都魏元帝咸熙二年十二月甲子使持節侍中太保鄭沖兼太尉司隸校尉李喜奉皇帝璽綬策書禪帝位于晉丙寅晉設壇場于南郊柴燎告類未有祖配其文曰皇帝臣炎敢用玄牡明告于皇皇后帝魏帝稽協皇運紹天明命以命炎曰昔者唐堯禪位虞舜虞舜又以禪禹邁德垂訓多歷年載暨漢德既衰太祖武皇帝撥亂濟民扶翼劉氏又用受禪于漢粵在魏室仍世多故幾於顛墜實賴有晉匡拯之德用獲保厥肆祀弘濟于艱難此則晉之有大造于魏也誕惟四方之民罔不祗順開國建侯宣禮明刑廓清梁岷苞懷揚越函夏興仁八紘同軌遐邇馳義祥瑞屢臻天人協應無思不服肆豫憲章三后用集大命于茲炎惟德不嗣辭不獲命於是羣公卿士百辟庶僚黎獻陪隸暨于百蠻君長僉曰皇天鑒下求民之瘼既有成命固非克讓所得距違天序不可以無統人神不可以曠主炎虔奉皇運畏天之威敢不欽承休命敬簡元辰升壇受禪告類上帝以永答民望敷佑萬國惟明德是饗泰始二年正月詔曰有司前奏郊祀權用魏禮朕不慮改作之難今便為永制衆議紛互遂不時定不得以時供饗神祀配以祖考日夕歎企貶食忘安其便郊祀時羣臣又議五帝即天也五氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而已北郊又除先后配祀帝悉從之二月丁丑郊祀宣皇帝以配天宗祀文皇帝於明堂以配上帝是年十一月有司又議奏古者丘郊不異宜并圓丘方澤於南北郊更修治壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祠圓丘於南郊自是後圓丘方澤不別立至今矣太康十年十月乃更詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望四望非地則明上帝不得為天也往者衆議除明堂五帝位考之禮文正經不通且詩序曰文武之功起於后稷故推以配天焉宣帝以神武創業既已配天復以先帝配天於義亦不安其復明堂及南郊五帝位晉武帝太康三年正月帝親郊祀皇太子皇弟皇子悉侍祠非前典也愍帝都長安未及立郊廟而敗元帝中興江南太興元年始更立郊兆其制度皆太常賀循依據漢晉之舊也三月辛卯帝親郊祀饗配之禮一依武帝始郊故事初尚書令刁協國子祭酒杜夷議宜須旋都洛邑乃修之司徒荀組據漢獻帝居許即便立郊自宜於此修奉驃騎王導僕射荀嵩太常華中書侍郎庾亮皆同組議事遂施行按元帝紹命中興依漢氏故事宜享明堂宗祀之禮江左不立明堂故闕焉明帝太寧三年七月始詔立北郊未及建而帝崩故成帝咸和八年正月追述前旨於覆舟山南立之是月辛未祀北郊始以宣穆張皇后配地魏氏故事非晉舊也康帝建元元年正月將北郊有疑議太常顧和表曰泰始中合二至之祀於二郊北郊之月古無明文或以夏至或同用陽復漢光武正月辛未始建北郊此則與南郊同月及中興草創百度從簡合北郊於一丘憲章未備權用斯禮蓋時宜也至咸和中議別立北郊同用正月魏承後漢正月祭天以地配而稱周禮三王之郊一用夏正於是從和議是月辛未南郊辛巳北郊帝皆親奉安帝元興三年三月宋高祖討桓玄走之己卯告義功于南郊是年帝蒙塵江陵未返其明年應郊朝議以為宜依周禮宗伯攝職三公行事尚書左丞王訥之獨曰既殯郊祀自是天子當陽有君存焉禀命而行何所辨也齊之與否豈如今日之比乎議者又云今宜郊故是承制所得命三公行事又郊天極尊唯一而已故非天子不祀也庶人以上莫不蒸嘗嫡子居外庶子執事禮文炳然未有不親受命而可祭天者又武皇受禪用二月郊元帝中興以三月郊今郊時未過日望輿駕無為欲速而無據使皇輿旋返更不得親奉遂從訥之議晉恭帝元熙二年五月遣使奉策禪帝位于宋永初元年六月丁卯設壇南郊受皇帝璽紱柴燎告類策曰皇帝臣裕敢用玄牡昭告皇皇后帝晉帝以卜世告終曆數有歸欽若景運以命于裕夫樹君司民天下為公德充帝王樂推攸集越俶唐虞降暨漢魏靡不以上哲格文祖元勳陟帝位故能大拯黔黎垂訓無窮晉自東遷四維弗樹宰輔焉依為日已久難棘隆安禍成元興遂至帝王遷播宗祀湮滅裕雖地非齊晉衆無一旅仰憤時難俯悼橫流投袂一麾則皇祚剋復及危而能持顛而能扶姦宄具殲僭僞必滅誠否終必泰興廢有期至於撥亂濟民大造晉室因藉時運以尸其勞加以殊俗慕義重譯來款正朔所暨咸服聲教至乃三靈垂象山川告祥人神和協歲月茲著是以羣公卿士億兆夷人僉曰皇靈隆鑒於上晉朝款誠於下天命不可以久淹宸極不可以暫曠遂逼羣議恭茲大禮猥以寡德託于兆民之上雖仰畏天威略是小節顧深永懷祗懼若厲敬簡元日升壇受禪告類上帝用酬萬國之嘉望克隆天保永祚于有宋惟明靈是饗永初元年皇太子拜告南北郊永初二年正月上辛上親郊祀文帝元嘉三年車駕西征謝晦幣告二郊孝武帝孝建元年六月癸巳八座奏劉義宣臧質干時犯順滔天作戾連結淮岱謀危宗社質反之始戒嚴之日二郊廟社皆已遍陳其義宣為逆未經同告輿駕將發醜徒冰消質既梟懸義宣禽獲二寇俱殄並宜昭告檢元嘉三年討謝晦之始普告二郊太廟賊既平蕩唯告太廟太社不告二郊禮官博議太學博士徐宏孫勃陸澄議禮無不報始既遍告今賊已禽不應不同國子助教蘇瑋生議案王制天子巡狩歸假于祖禰又曾子問諸侯適天子告于祖奠于禰命祝史告于社稷宗廟山川告用牲幣反亦如之諸侯相見反必告于祖禰乃命祝史告至于前所告者又云天子諸侯將出必以幣帛皮圭告于祖禰反必告至天子諸侯雖事有小大其禮略鈞告出告至理不得殊鄭云出入禮同其義甚明天子出征類于上帝推前所告者歸必告至則宜告郊不復容疑元嘉三年唯告廟社未詳其義或當以禮記唯云歸假祖禰而無告郊之辭果立此義彌所未達夫禮記殘缺之書本無備體折簡敗字多所闕略正應推例求意不可動必徵文天子反行告社亦無成記何故告郊獨當致嫌但出入必告蓋孝敬之心既以告歸為義本非獻捷之禮今輿駕竟未出宮無容有告至之文若陳告不行之禮則為未有前准愚謂祝史致辭以昭誠信苟其義舛於禮自可從實而闕臣等參議以應告為允宜並用牲告南北二郊太廟太社依舊公卿行事詔可孝建二年正月庚寅有司奏今月十五日南郊尋舊儀廟祠至尊親奉以太尉亞獻南郊親奉以太常亞獻又廟祠行事之始以酒灌地送神則不灌而郊初灌同之於廟送神又灌議儀不同於事有疑輒下禮官詳正太學博士王祀之議案周禮大宗伯佐王保國以吉禮事鬼神祇禋祀昊天則今太常是也以郊天太常亞獻又周禮外宗云王后不與則贊宗伯鄭玄云后不與祭宗伯攝其事又說云君執圭瓚祼尸大宗伯執璋瓚亞獻中代以來后不廟祭則應依禮大宗伯攝亞獻也而今以太尉亞獻鄭注禮月令云三王有司馬無太尉太尉秦官也蓋世代彌久宗廟崇敬攝后事重故以上公亞獻又議履時之思情深於霜露室戶之感有懷於容聲不知神之所在求之不以一處鄭注儀禮有司云天子諸侯祭於祊而繹繹又祭也今廟祠闕送神之祼將移祭於祊繹明在於留神未得而殺禮郊廟祭殊故灌送有異太常丞朱膺之議案周禮大宗伯使掌典禮以事神為上職總祭祀而昊天為首今太常即宗伯也又尋袁山松漢百官志云郊祀之事太尉掌亞獻光祿掌三獻太常每祭祀先奏其禮儀及行事掌贊天子無掌獻事如儀志漢亞獻之事專由上司不由秩宗貴官也今宗廟太尉亞獻光祿三獻則漢儀也又賀循制太尉由東南道升壇明此官必預郊祭古禮雖由宗伯然世有因革上司亞獻漢儀所行愚謂郊祀禮重宜同宗廟且太常既掌贊天子事不容兼又尋灌事禮記曰祭求諸陰陽之義也殷人先求諸陽樂三闋然後迎牲則殷人後灌也周人先求諸陰灌用鬯達於淵泉既灌然後迎牲則周人先灌也此謂廟祭非謂郊祠案周禮天官凡祭祀贊王祼將之事鄭注云祼者灌也唯人道宗廟有灌天地大神至尊不灌而郊未始有灌於禮未詳淵儒注義炳然明審謂今之有灌相承為失則宜無灌通關八座丞郎博士並同膺之議尚書令建平王宏重參議謂膺之議為允詔可大明二年正月丙午朔有司奏今月六日南郊輿駕親奉至時或雨魏世值雨高堂隆謂應更用後辛晉時既出遇雨顧和亦云宜更告徐禪云晉武之世或用丙或用己或用庚使禮官議正并詳若得遷日應更告廟與不博士王燮之議稱遇雨遷郊則先代成議禮傳所記辛日有徵郊特牲曰郊之用辛也周之始郊日以至鄭玄注曰三王之郊一用夏正用辛者取其齊戒自新也又月令曰乃擇元日祈穀于上帝注曰元日謂上辛郊祭天也又春秋載郊有二成十七年九月辛丑郊公羊曰曷用郊用正月上辛哀元年四月辛巳郊穀梁曰自正月至于三月郊之時也以十二月下辛卜正月上辛如不從以正月下辛卜二月上辛如不從以二月下辛卜三月上辛以斯明之則郊祭之禮未有不用辛日者也晉氏或丙或己或庚並有別議武帝以十二月丙寅南郊受禪斯則不得用辛也又泰始二年十一月己卯始并圓丘方澤二至之祀合於二郊三年十一月庚寅冬至祠天郊于圓丘是猶用圓丘之禮非專祈穀之祭故又不得用辛也今之郊饗既行夏時雖得遷却謂宜猶必用辛也徐禪所據或為未宜又案郊特牲曰受命于祖廟作龜于禰宮鄭玄注曰受命謂告退而卜也則告義在郊非為告日今日雖有遷而郊祀不異愚謂不宜重告曹郎朱膺之議案先儒論郊其議不一周禮有冬至日圓丘之祭月令孟春有祈穀于上帝鄭氏說圓丘祀昊天上帝以帝嚳配所謂禘也祈穀祀五精之帝以后稷配所謂郊也二祭異時其神不同諸儒云圓丘之祭以后稷配取其所在名之曰郊以形體言之謂之圓丘名雖有二其實一祭晉武捨鄭而從諸儒是以郊用冬至日既以至日理無常辛然則晉代中原不用辛日郊如徐禪議也江左以來皆用正月當以傳云三王之郊各以其正晉不改正朔行夏之時故因以首歲不以冬日皆用上辛近代成典也夫祭之禮過時不舉今在孟春郊時未過值雨遷日於禮無違既已告日而以事不從禋祀重敬謂宜更告高堂隆云九日南郊十日北郊是為北郊可不以辛也尚書何偃議鄭玄注禮記引易說三王之郊一用夏正周禮凡國大事多用正歲左傳又啓蟄而郊則鄭之此說誠有據矣衆家異議或云三王各用其正郊天此蓋曲學之辨於禮無取固知穀梁三春皆可郊之月真所謂膚淺也然用辛之說莫不必同晉郊庚己參差未見前徵愚謂宜從晉遷郊依禮用辛燮之以受命作龜知告不在日學之密也右丞徐爰議以為郊祀用辛有礙遷日禮官祠曹考詳已備何偃據禮不應重告愚情所同尋告郊剋辰於今宜改告事而已次辛十日居然展齊養牲在滌無緣三月謂毛血告牷之後雖有事礙便應有司行事不容遷郊衆議不同參議宜依經遇雨遷用後辛不重告若殺牲薦血之後值雨則有司行事詔可明帝泰始二年十一月辛酉詔曰朕載新寶命仍離多難戎車遄駕經略務殷禋告雖備弗獲親禮今九服既康百祀咸秩宜聿遵前典郊謁上帝有司奏檢未有先准黃門侍郎徐爰議虞稱肆類殷述昭告蓋以創世成功德盛業遠開統肇基必享上帝漢魏以來聿遵斯典高祖武皇帝克伐僞楚晉安帝尚在江陵即於京師告義功于郊兆伏惟泰始應符神武英斷王赫出討戎戒淹時雖司奉弗虧親謁尚闕謹尋晉武郊以二月晉元禋以三月有非常之慶必有非常之典不得拘以常祀限以正月上辛愚謂宜下史官考擇十一月嘉吉車駕親郊奉謁昊天上帝高祖武皇帝配饗其餘祔食不關今祭尚書令建安王休仁等同爰議參議為允詔可泰始六年正月乙亥詔曰古禮王者每歲郊享爰及明堂自晉以來間年一郊明堂同日質文詳略疏數有分自今可間二年一郊間歲一明堂外可詳議有司奏前兼曹郎虞願議郊祭宗祀俱主天神而同日殷薦於義為黷明詔使圓丘報功三載一享明堂配帝間歲昭薦詳辰酌衷實允懋典緣咨參議並同曹郎王延秀重議改革之宜實如聖旨前虞願議蓋是仰述而已未顯後例謹尋自初郊間二載明堂間一年第二郊與第三明堂還復同歲願謂自始郊明堂以後宜各間二年以斯相推長得異歲通關八座同延秀議後廢帝元徽二年十月丁巳有司奏郊祀明堂還復同日間年一修漢文帝初祭地祇於渭陽以高帝配武帝立后土社祠於汾陰亦以高帝配漢氏以太祖兼配天地則未以后配地也王莽作相引周禮享先妣為配北郊夏至祭后土以高后配自此始也光武建武中不立北郊故后地之祇常配食天壇山川羣望皆在營內凡一千五百一十四神中元年建北郊使司空馮魴告高廟以薄后代呂后配地江左初未立北壇地祇衆神共在天郊也晉成帝立二郊天郊則六十二神五帝之佐日月五星二十八宿文昌北斗三台司命軒轅后土太一天一太微鈎陳北極雨師雷電司空風伯老人六十二神也地郊則四十四神五嶽四望四海四瀆五湖五帝之佐沂山嶽山白山霍山醫無閭山蔣山松江會稽山錢唐江先農凡四十四也江南諸小山蓋江左所立猶如漢西京關中小水皆有祭秩也二郊所秩官有其注宋武帝永初三年九月司空羡之尚書令亮等奏曰臣聞崇德明祀百王之令典憲章天人自昔之所同雖因革殊時質文異世所以本情篤教其揆一也伏惟高祖武皇帝允協靈祇有命自天弘日靜之勤立蒸民之極帝遷明德光宅八表太和宣被玄化遐通陛下以聖哲嗣徽道孚萬國祭禮久廢思光鴻烈饗帝嚴親今實宜之高祖武皇帝宜配天郊至於地祇之配雖禮無明文先代舊章每所因循魏晉故典足為前式謂武敬皇后宜配北郊蓋述懷以追孝躋聖敬於無窮對越兩儀允洽幽顯者也明年孟春有事於二郊請宣攝內外詳依舊典詔可晉武帝太康二年冬有司奏三年正月立春祠時日尚寒可有司行事詔曰郊祀禮典所重中間以軍國多事臨時有所妨廢故每從奏可自今方外事簡唯此為大親奉禋享固常典也成帝祠南郊遇雨侍中顧和啓宜還更剋日詔可漢明帝據月令有五郊迎氣服色之禮因採元始中故事兆五郊于洛陽祭其帝與神車服各順方色魏晉依之江左以來未遑修建宋孝武大明五年四月庚子詔曰昔文德在周明堂崇祀高烈惟漢汶邑斯尊所以職祭罔愆氣令斯正鴻名稱首濟世飛聲朕皇考太祖文皇帝功耀洞元聖靈昭俗內穆四門仁濟羣品外薄八荒威憺殊俗南腦徑越西髓剛戎裁禮興稼穡之根張樂協四氣之紀匡飾墳序引無題之外旌延寶臣盡盛德之範訓深劭農政高刑厝萬物棣通百神薦祉動協天度下沿地德故精緯上靈動殖下瑞諸侯軌道河溓海夷朕仰憑洪烈入子萬姓皇天降祐迄將一紀思奉揚休德永播無窮便可詳考姬典經始明堂宗祀先靈式配上帝誠敬克展幽顯咸秩惟懷永遠感慕崩心有司奏伏尋明堂辟雍制無定文經記參差傳說乖舛名儒通哲各事所見或以為名異實同或以為名實皆異自漢暨晉莫之能辨周書云清廟明堂路寢同制鄭玄注禮義生於斯諸儒又云明堂在國之陽丙巳之地三里之內至於室宇堂個戶牖達向世代湮緬難得該詳晉侍中裴頠西都碩學考詳前載未能制定以為尊祖配天其義明著廟宇之制理據未分直可為殿以崇嚴祀其餘雜碎一皆除之參詳鄭玄之注差有準據裴頠之奏竊謂可安國學之南地實丙巳爽塏平暢足以營建其出方攴宇規範宜擬則太廟唯十有二間以應朞數依漢汶上圖儀設五帝位太祖文皇帝對饗祭皇天上帝雖為差降至於三載恭祀理不容異自郊徂宮亦宜共日禮記郊以特牲詩稱明堂羊牛吉蠲雖同質文殊典且郊有燔柴堂無禋燎則鼎俎彝簋一依廟禮班行百司搜材簡工權置起部尚書將作大匠量物商程剋今秋繕立乃依頠議但作大殿屋雕畫而已無古三十六戶七十二牖之制六年正月南郊還世祖親奉明堂祠祭五時之帝以文皇帝配是用鄭玄議也官有其注大明五年九月甲子有司奏南郊祭用三牛廟四時祠六室用二牛明堂肇建祠五帝太祖文皇帝配未詳祭用幾牛太學博士司馬興之議案鄭玄注禮記大傳稱孝經郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝配五帝也夫五帝司方位殊功一牲牢之用理無差降太祖文皇帝躬成天地則道兼覆載左右羣生則化洽四氣祖宗之稱不足彰無窮之美金石之音未能播勳烈之盛故明堂聿修聖心所以昭玄極泛配宗廟先儒所以得禮情愚管所見謂宜用六牛博士虞和議祀帝之名雖五而所生之實常一五德之帝迭有休王各有所司故有五室宗祀所主要隨其王而饗焉主一配一合用二牛祠部郎顏奐議祀之為義並五帝以為言帝雖云五牲牢之用謂不應過郊祭廟祀宜用二牛明帝泰始七年十月庚子有司奏來年正月十八日祠明堂尋舊南郊與明堂同日並告太廟未審今祀明堂復告與不祠部郎王延秀議案鄭玄云郊者祭天之名上帝者天之別名也神無二主故明堂異處以避后稷謹尋郊宗二祀既名殊實同至於應告不容有異守尚書令袁粲等並同延秀議魏明帝世中護軍蔣濟奏曰夫帝王大禮巡狩為先昭祖揚禰封禪為首是以自古革命受符未有不蹈梁父登泰山刊無竟之名紀天人之際者也故司馬相如謂有文以來七十二君或從所繇於前謹遺跡於後太史公曰主上有聖明而不宣布有司之過也然則元功懿德不刊山梁之石無以顯帝王之功布生民不朽之觀也語曰當君而歎堯舜之美譬猶人子對厥所生譽他人之父今大魏振百王之弊亂拯流遁之艱危接千載之衰緒繼百世之廢治自武文至于聖躬所以參成天地之道綱維人神之化上天報應嘉瑞顯祥以比往古其優衍豐隆無所取喻至於歷世迄今未發大禮雖志在掃盡殘盜蕩滌餘穢未遑斯事若爾三苗堀強於江海大舜當廢東巡之儀徐夷跳梁於淮泗周成當止岱嶽之禮也且昔歲破吳虜於江漢今茲屠蜀賊於隴右其震蕩內潰在不復淹就當探其窟穴無纍於封禪之事也此儀久廢非倉卒所定宜下公卿廣纂其禮卜年考時昭告上帝以副天下之望臣待罪軍旅不勝大願冒死以聞詔曰聞濟斯言使吾汗出流足自開闢以來封禪者七十餘君爾故太史公曰雖有受命之君而功有不洽是以中間曠遠者千有餘年近數百載其儀闕不可得記吾何德之修敢庶茲乎濟豈謂世無管仲以吾有桓公登泰山之志乎吾不敢欺天也濟之所言華則華矣非助我者也公卿侍中尚書常侍省之而已勿復有所議亦不須答詔也帝雖拒濟議而實使高堂隆草封禪之儀以天下未一不欲便行大禮會隆卒故不行晉武帝平吳混一區宇太康元年九月庚寅尚書令衛瓘尚書左僕射山濤右僕射魏舒尚書劉實張華等奏曰聖德隆茂光被四表諸夏清幽荒率從神策廟算席卷吳越孫晧稽顙六合為家巍巍之功格于天地宜同古典勒封東嶽告三府太常為儀制瓘等又奏臣聞肇自生民則有后辟載祀之數莫之能紀立德濟世揮揚仁風以登封泰山者七十有四家其諡號可知者十有四焉沈淪寂寞曾無遺聲者不可勝記自黃帝以前古傳昧略唐虞以來典謨炳著三王代興體業繼襲周道既沒秦氏承之至于漢魏而質文未復大晉之德始自重黎實佐顓頊至于夏商世序天地其在于周不失其緒金德將升世濟明聖外平蜀漢海內歸心武功之盛實由文德至于陛下受命踐阼弘建大業羣生仰流唯獨江湖沅湘之表凶桀負固歷代不賓神謀獨斷命將出討兵威暫加數旬蕩定羈其鯨鯢赦其罪逆雲覆雨施八方來同聲教所被達于四極雖黃軒之征大禹遠略周之奕世何以尚今若夫玄石素文底號前載象以姓表言以事告河圖洛書之徵不是過也加以騶虞麟趾衆瑞並臻昔夏殷以丕崇為祥周武以烏魚為美咸曰休哉然符瑞之應備物之盛未有若今之富者也宜宣大典禮中嶽封泰山禪梁父發德號明至尊享天休篤黎庶勒千載之表播流後之聲俾百代之下莫不興起斯帝王之盛業天人之至望也詔曰今逋寇雖殄外則障塞有警內則民黎未康此盛德之事所未議也瓘等又奏今東漸于海西被流沙大漠之陰日南北戶莫不通屬茫茫禹跡今實過之則天人之道已周巍巍之功已著宜有事梁父修禮地祇登封泰山致誠上帝以答人神之願乞如前奏詔曰今陰陽未和政刑未當百姓未得其所豈可以勒功告成邪瓘又奏臣聞處帝王之位者必有曆運之期天命之應濟生民之大功者必有盛德之容告成之典無不可誣有不可讓自古道也而明詔謙沖屢辭其禮雖盛德攸在推而未居夫三公職典天地實掌民物國之大事取議於此漢氏封禪非是官也不在其事臣等前奏蓋陳祖考之功天命又應陛下之德合同四海述古考今宜修此禮至於剋定歲月須五府上議然後奏聞請寫詔及奏如前下議詔曰雖蕩清江表皆臨事者之勞何足以告成方望羣后思隆大化以寧區夏百姓獲與之休息斯朕日夜之望無所復下諸府矣勿復為煩瓘等又奏臣聞唐虞二代濟世弘功之君莫不仰答天心俯協民志登介丘履梁父未有辭焉者蓋不可讓也今陛下勳高百王德無與二茂績宏規巍巍之業固非臣等所能究論而聖旨勞謙屢自抑損時至弗應推美不居闕皇代之上儀塞神祇之款望使大晉之典謨不同風於三五臣等誠不敢奉詔請如前奏施行詔曰方當共弘治道以康庶績且俟他年無復紛紜也太康元年冬王公有司又奏自古聖明光宅四海封禪名山著於史籍作者七十四君矣舜禹之有天下巡狩四嶽躬行其道易著觀民省方禮有升中于天詩頌陟其高山皆載在方策文王為西伯以服事殷周公以魯蕃列于諸侯或享于岐山或有事泰山徒以聖德猶得為其事自是以來功薄而僭其儀者不可勝言號諡不泯以至于今況高祖宣皇帝肇開王業海外有截世宗景皇帝濟以大功輯寧區夏太祖文皇帝受命造晉蕩定蜀漢陛下應期龍興混一六合澤被羣生威震無外昔漢氏失統吳蜀鼎峙兵興以來近將百年地險俗殊民望絶塞以為分外其日久矣大業之隆重光四葉不羈之寇二世而平非聰明神武先天弗違孰能巍巍其有成功若茲者歟臣等幸以千載得遭運會親奉大化目覩太平至公之美誰與為讓宜祖述先朝憲章古昔勒功岱嶽登封告成弘禮樂之制正三雍之典揚名萬世以顯祖宗是以不勝大願敢昧死以聞請告太常具禮儀上復詔曰所議誠前烈之盛事也方今未可以爾便報絶之宋太祖在位長久有意封禪遣使履行泰山舊道詔學士山謙之草封禪儀注其後索虜南寇六州荒毀其意乃息世祖大明元年十一月戊申太宰江夏王義恭表曰惟皇天崇稱大道始行揖讓迄于有晉雖聿修前緒而跡淪言廢蔑記於竹素者焉可單書紹乾維建徽號流風聲被絲管自無懷以來可傳而不朽者七十有四君罔仁厚而道滅鮮義澆而德宣鍾律之先曠世綿絶難得而聞丘索著明者尚有遺炳故易稱先天弗違後天奉時蓋陶唐姚姒商姬之主莫不由斯道也是以風化大洽光熙于後炎漢二帝亦踵曩則因百姓之心聽輿人之頌龍駕帝服鏤玉梁甫昌言明稱告成上靈況大宋表祥唐虞受終素德山龍啓符金玉顯瑞異采騰於軫墟紫煙藹於邦甸錫冕兆九五之徵文豹赴天曆之會誠二祖之幽慶聖后之冥休道冠軒堯惠深亭毒而猶執沖約未言封禪之事四海竊以恧焉臣聞惟皇配極惟帝祀天故能上稽乾式照臨黔首協和穹昊膺茲多福高祖武皇帝明並日月光振八區拯已溺之晉濟橫流之世撥亂寧民應天受命鴻徽洽于海表威稜震乎沙外太祖文皇帝體聖履仁述業興禮正樂頌作象曆明達通於神祇玄澤被乎上下仁孝命世睿武英挺遭運屯否三才湮滅乃龍飛五洲鳳翔九江身先八百之期斷出人鬼之表慶煙應高牙之建風耀符發迹之辰親翦凶逆躬清昏壒天地革始夫婦更造豈與彼承業繼緒拓復禹跡車一其軌書罔異文者同年而議哉今龍麟已至鳳皇已儀比李已實靈茅已茂雕氣降氛於宮榭珍露呈味於禁林嘉禾積穗於殿甍連理合幹於園皆耀質離宮植根蘭囿至夫霜毫玄文素翮頳羽泉河山嶽之瑞草木金石之祥方畿憬塗之謁抗驛絶祖之奏彪炳雜沓粵不可勝言太平之應茲焉富矣宜其從天人之誠遵先王之則備萬乘整法駕修封泰山瘞玉岱趾延喬松於東序詔韓岐於西廂麾天閽使啓關謁紫宮朝太一奏鈞天詠雲門贊揚幽奧超聲前古豈不盛哉伏願時命宗伯具茲典度詔曰太宰表如此昔之盛王永保鴻名常為稱首由斯道矣朕遭家多難入纂絶業德薄勳淺鑒寐崩愧頃麟鳳表禎茅禾兼瑞雖符祥顯見恧乎猶深庶仰述先志拓清中宇禮祇謁神朕將試哉四年四月辛亥有司奏曰臣聞崇號建極必觀俗以樹教正位居體必採世以立言是以重代列聖咸由厥道玄勳上烈融章未分鳴光委緒歇而罔藏若其顯諡騰軌則系綴聲采徵略聞聽爰洎姬漢風流尚存遺芬餘榮綿映紀緯雖年絶世祀代革精華可得騰金綵奏玉潤鏤迹以燻今鐫德以麗遠而四望埋禋歌之禮日觀弛修封之容豈非神明之業難崇功基之迹易泯自茲以降訖于季末莫不欲英弘徽位詳固洪聲豈徒深默修文淵幽馭世而已諒以縢非虛奏書匪妄埋擊雨恕神淳廕復樹安得紫壇肅祗竹宮載竚散火投郊流星奔座寶緯初基厭靈命曆德振弛維功濟淪象玄浸紛流華液幽潤規存永馭思詳樹遠太祖文皇帝以啓遘泰運景望震凝采樂調風集禮宣度祖宗相映軌迹重暉聖上韞籙蕃河竚翔衡漢金波掩照華耀停明運動時來躍飛風舉澄氛海岱開景中區歇神還靈頽天重耀儲正凝位於兼明袞嶽蕃華於元列故以祥映昌基繫發篆素重以班朝待典飾令詳儀纂綜淪蕪搜騰委逸奏玉郊宮禋圭玄畤景集天廟脉壤祥農節至昕陽川丘夙禮綱威巡石養表綏中甸史流其詠民挹其風於是涵迹視陰振聲威響歷代之渠沈望內安侯之長賢王入侍殊生詭氣奉俗還鄉羽族卉儀懷音革狀邊帛絶書權光弛燭天岱發靈宗河開寶崇丘淪鼎振采泗淵雲皇王嶽摛藻漢并角即音栖翔禁袞甲霜咮翾舞川肆榮泉流鏡後昭河源故以波沸外關雲蒸內澤若其雪趾青毳玄文朱綵日月郊甸擇木弄音重以榮露騰軒蕭雲掩閣鎬潁孳萌移華淵禁山輿竚衡雲鶼竦翼海鰈泳流江茅吐蔭校書之列仰筆以飾辭濟代之蕃獻邑以待禮豈非神協氣昌物瑞雲照蒱軒龜軫泉淳芳太宰江夏王臣義恭咀道遵英抽奇麗古該潤圖史施詳閟載表以功懋往初德耀炎昊升文中岱登牒天關耀冠榮名摛振聲號而道謙稱首禮以虛挹將使玄祇缺觀幽瑞乖期梁甫無盛德之容介丘靡升聞之響加窮泉之野獻八代之駟交木之鄉奠絶金之楛肅靈重表珍符兼貺伏惟陛下謨詳淵載衍屬休章依徵聖靈潤色聲業諏辰稽古肅齊警列儒僚展采禮官相儀懸蕤動音洪鍾竦節陽路整衛正途清禁於是績環珮端玉藻鳴鳳竚律騰駕流文間綵比象之容昭明紀數之服徽焯天陳容藻神行翠蓋懷陰羽華列照乃詔聯事掌祭賓客贊儀金支宿縣鏞石潤響命五神以相列闢九關以集靈警衛兵而開雲先雨祇以灑路霞凝生闕煙起成宮臺冠丹光壇浮素靄爾乃臨中壇備盛禮天降祥錫壽固皇根谷動神音山傳稱響然後辨年問老陳詩觀俗歸薦告神奉遺清廟光美之盛彰乎萬古淵祥之烈溢乎無窮豈不盛歟臣等生接昌辰肅懋明世束教管聞未足言道且章志湮微代往淪絶拘採遺文辨明訓誥簉訪鄒魯草縢書堙玉之禮具竦石繩金之儀和芝潤瑛鐫璽乾封懼弗軌屬上徽輝當王則謹奉儀注以聞詔曰天生神物昔王稱愧況在寡德敢當鴻貺今文軌未一可停此奏漢獻帝建安十八年五月以河北十郡封魏武帝為魏公是年七月始建宗廟于鄴自以諸侯禮立五廟也後雖進爵為王無所改易延康元年文帝繼王位七月追尊皇祖為太王丁夫人曰太王后黃初元年十一月受禪又追尊太王曰太皇帝皇考武王曰武皇帝明帝太和三年六月又追尊高祖大長秋曰高皇夫人吳氏曰高皇后並在鄴廟廟所祠則文帝之高祖處士曾祖高皇祖太皇帝共一廟考太祖武皇帝特一廟百世不毀然則所祠止於親廟四室也至明帝太和三年十一月洛京廟成則以親盡遷處士主置園邑使令丞奉薦而使行太傅太常韓暨行太廟宗正曹恪持節迎高皇以下神主共一廟猶為四室而已至景初元年六月羣公有司始更奏定七廟之制曰大魏三聖相承以成帝業武皇帝肇建洪基撥亂夷險為魏太祖文皇帝繼天革命應期受禪為魏高祖上集成大命清定華夏興制禮樂宜為魏烈祖更於太祖廟北為二祧其左為文帝廟號曰高祖昭祧其右擬明帝號曰烈祖穆祧三祖之廟萬世不毀其餘四廟親盡迭遷一如周后稷文武廟祧之禮孫盛魏氏春秋曰夫諡以表行廟以存容皆於既歿然後著焉所以原始要終以示百世者也未有當年而逆制祖宗未終而豫自尊顯昔華樂以厚斂致譏周人以豫凶違禮魏之羣司於是乎失正矣文帝甄后賜死故不列廟明帝即位有司奏請追諡曰文昭皇后使司空王朗持節奉策告祠于陵三公又奏曰自古周人始祖后稷又特立廟以祀姜嫄今文昭皇后之於後嗣聖德至化豈有量哉夫以皇家世妃之尊神靈遷化而無寢廟以承享祀非以報顯德昭孝敬也稽之古制宜依周禮先妣別立寢廟奏可以太和元年二月立廟于鄴四月洛邑初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟至景初元年十二月己未有司又奏文昭皇后立廟京師永傳享祀樂舞與祖廟同廢鄴廟魏文帝黃初二年六月以洛京宗廟未成乃祠武帝於建始殿親執饋奠如家人禮何承天曰案禮將營宮室宗廟為先庶人無廟故祭於寢帝者行之非禮甚矣漢獻帝延康元年七月魏文帝幸譙親祠譙陵此漢禮也漢氏諸陵皆有園寢者承秦所為也說者以為古前廟後寢以象人君前有朝後有寢也廟以藏主四時祭祀寢有衣冠象生之具以薦新秦始出寢起於墓側漢因弗改陵上稱寢殿象生之具古寢之意也及魏武帝葬高陵有司依漢立陵上祭殿至文帝黃初三年乃詔曰先帝躬履節儉遺詔省約子以述父為孝臣以繫事為忠古不墓祭皆設於廟高陵上殿屋皆毀壞車馬還竹罒戊衣服藏府以從先帝儉德之志及文帝自作終制又曰壽陵無立寢殿造園邑自後至今陵寢遂絶孫權不立七廟以父堅嘗為長沙太守長沙臨湘縣立堅廟而已權既不親祠直是依後漢奉南頓故事使太守祠也堅廟又見尊曰始祖廟而不在京師又以民人所發吳芮冢材為屋未之前聞也於建鄴立兄長沙桓王策廟於朱爵橋南權疾太子所禱即策廟也權卒子亮代立明年正月於宮東立權廟曰太祖廟既不在宮南又無昭穆之序及孫晧初立追尊父和曰文皇帝晧先封烏程侯即改葬和於烏程西山號曰明陵置園邑二百家於烏程立陵寢使縣令丞四時奉祠寶鼎元年遂於烏程分置吳興郡使太守執事有司尋又言宜立廟京邑寶鼎二年遂更營建號曰清廟遣守丞相孟仁太常姚信等備官僚中軍步騎以靈輿法駕迎神主於明陵親引仁拜送於庭比仁還中吏手詔日夜相繼奉問神靈起居動止巫覡言見和被服顏色如平日晧悲喜悉召公卿尚書詣閣下受賜靈輿當至使丞相陸凱奉三牲祭於近郊晧於金城外露宿明日望拜於東門之外又拜廟薦饗比七日三祭倡伎晝夜娛樂有司奏祭不欲數數則黷宜以禮斷情然後止劉備章武元年四月建尊號於成都是月立宗廟祫祭高祖已下備紹世而起亦未辨繼何帝為禰亦無祖宗之號劉禪面縛北地王諶哭於昭烈之廟此則備廟別立也魏元帝咸熙元年增封晉文帝進爵為王追命舞陽宣文侯為晉宣王忠武侯為晉景王是年八月文帝崩諡曰文王武帝泰始元年十二月丙寅受禪丁卯追尊皇祖宣王為宣皇帝伯考景王為景皇帝考文王為文皇帝宣王妃張氏為宣穆皇后景王夫人羊氏為景皇后二年正月有司奏天子七廟宜如禮營建帝重其役詔宜權立一廟於是羣臣奏議上古清廟一宮尊遠神祇逮至周室制為七廟以辨宗祧聖旨深弘遠跡上世敦崇唐虞舍七廟之繁華遵一宮之尊遠昔舜承堯禪受終文祖遂陟帝位蓋三十載月正元日又格于文祖此則虞氏不改唐廟因仍舊宮可依有虞氏故事即用魏廟奏可於是追祭征西將軍豫章府君潁川府君京兆府君與宣皇帝景皇帝文皇帝為三昭三穆是時宣皇未升太祖虛位所以祠六世與景帝為七廟其禮則據王肅說也七月又詔曰主者前奏就魏舊廟誠亦有準然於祗奉神明情猶未安宜更營造崇正永制於是改創宗廟十一月追尊景帝夫人夏侯氏為景懷皇后太康元年靈壽公主修麗祔于太廟周漢未有其準魏明帝則別立廟晉又異魏也八年因廟陷當改治羣臣又議奏曰古者七廟異所自宜如禮詔又曰古雖七廟自近代以來皆一廟七室於禮無廢於情為亦隨時之宜也其便仍舊至十年乃更改築於宣陽門內窮壯極麗然坎位之制猶如初爾廟成帝率百官遷神主于新廟自征西以下車服導從皆如帝者之儀摯虞之議也至世祖武皇帝崩則遷征西及惠帝崩又遷豫章而惠帝世愍懷太子太子二子哀太孫臧沖太孫尚並祔廟元帝世懷帝殤太子又祔廟號為陰室四殤懷帝初又策諡武帝楊后曰武悼皇后改葬峻陽陵側別立弘訓宮不列於廟元帝既即尊位上繼武帝於禮為禰如漢光武上繼元帝故事也是時西京神主堙滅虜庭江左建廟皆更新造尋以登懷帝之主又遷潁川位雖七室其實五世蓋從刁協以兄弟為世數故也于時百度草創舊禮未備三祖毀主權居別室太興三年將登愍帝之主於是乃定更制還復豫章潁川二主于昭穆之位以同惠帝嗣武帝故事而惠懷愍三帝自從春秋尊尊之義在廟不替也至元帝崩則豫章復遷然元帝神位猶在愍帝之下故有坎室者十也至明帝崩而潁川又遷猶十室也于時續廣太廟故三遷主並還西儲名之曰祧以準遠廟成帝咸和三年蘇峻覆亂京都溫嶠等入伐立行廟於白石告先帝先后曰逆臣蘇峻傾覆社稷毀棄三正汙辱海內臣亮等手刃戎首龔行天罰惟中宗元皇帝肅祖明皇帝明穆皇后之靈降鑒有罪剿絶其命翦此羣凶以安宗廟臣等雖隕首摧軀猶生之年咸康七年五月始作武悼皇后神主祔于廟配饗世祖成帝崩而康帝承統以兄弟一世故不遷京兆始十一室也康帝崩京兆遷入西儲同謂之祧如前三祖遷主之禮故正室猶十一也穆帝崩而哀帝海西並為兄弟無所登降咸安之初簡文皇帝上繼元皇帝世秩登進於是潁川京兆二主復還昭穆之位至簡文崩潁川又遷孝武皇帝太元十六年改作太廟殿正室十六間東西儲各一間合十八間棟高八丈四尺堂基長三十九丈一尺廣十丈一尺堂集方石庭以磚尊備法駕遷神主于行廟征西至京兆四主及太子太孫各用其位之儀服四主不從帝者之儀是與太康異也諸主既入廟設脯醢之奠及新廟成帝主還室又設脯醢之奠十九年二月追尊簡文母會稽太妃鄭氏為簡文皇帝宣太后立廟太廟道西及孝武崩京兆又遷如穆帝之世四祧故事安帝隆安四年以孝武母簡文李太后帝母宣德陳太后祔于宣鄭太后之廟元興三年三月宗廟神主在尋陽已立新主于太廟權告義事四月輔國將軍何無忌奉送神主還丙子百官拜迎于石頭戊寅入廟安帝崩未及禘而天祿終焉宋武帝初受晉命為宋王建宗廟於彭城依魏晉故事立一廟初祠高祖開封府君曾祖武原府君皇祖東安府君皇考處士府君武敬臧后從諸侯五廟之禮也既即尊位乃增祠七世右北平府君六世相國掾府君為七廟永初初追尊皇考處士為孝穆皇帝皇妣趙氏為穆皇后三年孝懿蕭皇后崩又祔廟高祖崩神主升廟猶從昭穆之序如魏晉之制虛太祖之位也廟殿亦不改構又如晉初之因魏也文帝元嘉初追尊所生胡婕妤為章皇太后立廟西晉宣太后地孝武昭太后明帝宣太后並祔章太后廟晉元帝太興三年正月乙卯詔曰吾雖上繼世祖然於懷愍皇帝皆北面稱臣今祠太廟不親執觴酌而令有司行事於情禮不安可依禮更處太常華議今聖上繼武皇帝宜準漢世祖故事不親執觴爵又曰今上承繼武帝而廟之昭穆四世而已前太常賀循博士傅純以為惠懷及愍宜別立廟然臣愚謂廟室當以容主為限無拘常數殷世有二祖三宗若拘七室則當祭禰而已推此論之宜還復豫章潁川全祠七廟之禮驃騎長史溫嶠議凡言兄弟不相入廟既非禮文且光武奮劍振起不策名於孝平務神其事以應九世之讖又古不共廟故別立焉今上以策名而言殊於光武之事躬奉蒸嘗於經既正於情又安矣太常欲還二府君以全七世嶠謂是宜驃騎將軍王導從嶠議嶠又曰其非子者可直言皇帝敢告某皇帝又若以一帝為一世則不祭禰反不及庶人於是帝從嶠議悉施用之孫盛晉春秋曰陽秋傳云臣子一例也雖繼君位不以後尊降廢前敬昔魯僖上嗣莊公以友于長幼而升之為逆準之古義明詔是也穆帝永和二年七月有司奏十月殷祭京兆府君當遷祧室昔征西豫章潁川三府君毀主中興之初權居天府在廟門之西咸康中太常馮懷表續奉還於西儲夾室謂之為祧疑亦非禮今京兆遷入是為四世遠祖長在太祖之上昔周室太祖世遠故遷有所歸今晉廟宣皇為主而四祖居之是屈祖就孫也殷祫在上是代太祖也領司徒蔡謨議四府君宜改築別室若未展者當入就太廟之室人莫敢卑其祖文武不先不窋殷祭之日征西東面處宣皇之上其後遷廟之主藏於征西之祧祭薦不絶護軍將軍馮懷表議禮無廟者為壇以祭可別立室藏之至殷禘則祭于壇也輔國將軍譙王司馬無忌等議諸儒謂太王王季遷主藏於文武之祧如此府君遷主宜在宣皇帝廟中然今無寢室宜變通而改築又殷祫太廟征西東面尚書郎孫綽與無忌議同曰太祖雖位始九五而道以從暢替人爵之尊篤天倫之道所以成教本而光百代也尚書郎徐禪議禮去祧為壇去壇為墠歲祫則祭之今四祖遷主可藏之石室有禱則祭於壇墠又遣禪至會稽訪處士虞喜喜答曰漢世韋玄成等以毀主瘞於園魏朝議者云應埋兩階之間且神主本在太廟若今別室而祭則不如永藏又四君無追號之禮益明應毀而無祭於是撫軍將軍會稽王司馬昱尚書劉劭等奏四祖同居西祧藏主石室禘祫乃祭如先朝舊儀時陳留范宣兄子問此禮宣答曰舜廟所祭皆是庶人其後世遠而毀不居舜上不序昭穆今四君號猶依本非以功德致禮也若依虞主之瘞則猶藏子孫之所若依夏主之埋則又非本廟之階宜思其變別築一室親未盡則禘祫處宣帝之上親盡則無緣下就子孫之列其後太常劉遐等同蔡謨議博士張憑議或疑陳於太祖者皆其後毀之主憑案古義無別前後之文也禹不先鯀則遷主居太祖之上亦可無疑矣安帝義熙九年四月將殷祭詔博議遷毀之禮大司馬琅邪王司馬德文議泰始之初虛太祖之位而緣情流遠上及征西故世盡則宜毀而宣皇帝正太祖之位又漢光武帝移十一帝主於洛邑則毀主不設理可推矣宜從范宣之言築別室以居四府君之主永藏而不祀也大司農徐廣議四府君嘗處廟室之首歆率土之祭若埋之幽壤於情理未必咸盡謂可遷藏西儲以為遠祧而禘饗永絶也太尉咨議參軍袁豹議仍舊無革殷祠猶及四府君情理為允祠部郎臧燾議四府君之主享祀禮廢則亦神所不依宜同虞主之瘞埋矣時高祖輔晉與大司馬議同須後殷祀行事改制晉孝武帝太元十二年五月壬戌詔曰昔建太廟每事從儉約思與率土致力備禮又太祖虛位明堂未建郊祀國之大事而稽古之制闕然便可詳議祠部郎徐邈議圓丘郊祀經典無二宣皇帝嘗辨斯義而檢以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安武皇帝建廟六世三昭三穆宣皇帝創基之主實惟太祖親則王考四廟在上未及遷世故權虛東向之位也兄弟相及義非二世故當今廟祀世數未足而欲太祖正位則違事七之義矣又禮曰庶子王亦禘祖立廟蓋謂支胤授位則親近必復京兆府君於今六世宜復立此室則宣皇未在六世之上須前世既遷乃太祖位定爾京兆遷毀宜藏主於石室雖禘祫猶弗及何者傳稱毀主升合乎太祖升者自下之名不謂可降尊就卑也太子太孫陰室四主儲嗣之重升祔皇祖所託之廟世遠應遷然後從食之孫與之俱毀明堂圓方之制綱領已舉不宜闕配帝之祀且王者以天下為家未必一邦故周平光武無廢於二京也周公宗祀文王漢明配以世祖自非惟新之考孰配上帝邈又曰明堂所配之神積疑莫辨按易殷薦上帝以配祖考祖考同配則上帝亦為天而嚴父之義顯周禮旅上帝者有故告天與郊祀常禮同用四圭故並言之若上帝者是五帝經文何不言祀天旅五帝祀地旅四望乎人帝之與天帝雖天人之通謂然五方不可言上帝諸侯不可言大君也書無全證而義容彼此故泰始太康二紀之間興廢迭用矣侍中車胤議同又曰明堂之制既其難詳且樂主於和禮主於敬故質文不同音器亦殊既茅茨廣廈不一其度何必守其形範而不知弘本順民乎九服咸寧河朔無塵然後明堂辟雍可崇而修之中書令王珉意與胤同太常孔汪議泰始開元所以上祭四府君誠以世數尚近可得饗祠非若殷周先世王迹所因也向使京兆爾時在七世之外自當不祭此四王推此知既毀之後則殷禘所絶矣吏部郎王忱議明堂則天象地儀觀之大宜俟皇居反舊然後修之驃騎將軍會稽王司馬道子尚書令謝石意同忱議於是奉行一無所改晉安帝義熙二年六月白衣領尚書左僕射孔安國啓云元興三年夏應殷祠昔年三月皇輿旋軫其年四月便應殷而太常博士徐乾等議云應用孟秋臺尋校自太和四年相承皆用冬夏乾等既伏應孟冬回復追明孟秋非失御史中丞范泰議今雖既祔之後得以蒸嘗而無殷薦之比太元二十一年十月應殷烈宗以其年九月崩至隆安三年國家大吉乃修殷事又禮有喪則廢吉祭祭新主於寢今不設別寢既祔祭於廟故四時蒸嘗以寄追遠之思三年一禘以習昭穆之序義本各異三年喪畢則合食太祖遇時則殷無取於限三十月也當是內臺常以限月成舊就如所言有喪可殷隆安之初果以喪而廢矣月數少多復遲速失中至於應寢而修意所未譬安國又啓范泰云今既祔遂祭於廟故四時蒸嘗如泰此言殷與蒸嘗其本不同既祔之後可親蒸嘗而不得親殷也太常劉瑾云章后喪未一周不應祭臣尋升平五年五月穆皇帝崩其年七月山陵十月殷興寧三年二月哀皇帝崩太和元年五月海西夫人庾氏薨時為皇后七月葬十月殷此在哀皇再周之內庾夫人既葬之後二殷策文見在廟又文皇太后以隆安四年七月崩陛下追述先旨躬服重制五年十月殷再周之內不以廢事今以小君之哀而泰更謂不得行大禮臣尋永和十年至今五十餘載用三十月輒殷皆見於注記是依禮五年再殷而泰所言非真難臣乃以聖朝所用遲速失中泰為憲司自應明審是非若臣所啓不允即當責失奏彈而愆墮稽停遂非忘舊請免泰瑾官丁巳詔皆白衣領職於是博士徐乾皆免官初元興三年四月不得殷祠進用十月若計常限則義熙三年冬又當殷若更起端則應用來年四月領司徒王謐丹陽尹孟昶議有非常之慶必有非常之禮殷祭舊准不差蓋施於經常爾至於義熙之慶經古莫二雖曰旋幸理同受命愚謂理運惟新於是乎始宜用四月中領軍謝混太常劉瑾議殷無定日考時致敬且禮意尚簡去年十月祠雖於日有差而情典允備宜仍以為正太學博士徐乾議三年一祫五年一禘經傳記籍不見補殷之文員外散騎侍郎領著作郎徐廣議尋先事海西公太和六年十月殷祠孝武皇帝寧康二年十月殷祠若依常去前三十月則應用四月也于時蓋當有故而遷在冬但未詳其事太元元年十月殷祠依常三十月則應用二年四月也是追計辛未歲十月未合六十月而再殷何邵甫注公羊傳云祫從先君來積數為限自僖八年至文二年知為祫祭如此履端居始承源成流領會之節遠因宗本也昔年有故推遷非其常度寧康太元前事可依雖年有曠近之異然追計之理同矣愚謂從復常次者以推歸正之道也左丞劉潤之等議太元元年四月應殷而禮官墮失建用十月本非正期不應即以失為始也宜以反初四月為始當用三年十月尚書奏從王謐議以元年十月為始也宋孝武帝孝建元年十二月戊子有司奏依舊今元年十月是殷祠之月領曹郎范泰參議依永初三年例須再周之外殷祭尋祭再周來二年三月若以四月殷則猶在禫內下禮官議正國子助教蘇瑋生議案禮三年喪畢然後祫於太祖又云三年不祭唯天地社稷越紼行事且不禫即祭見譏春秋求之古禮喪服未終固無祼享之義自漢文以來一從權制宗廟朝聘莫不皆吉雖祥禫空存無綅縞之變蒸嘗薦祀不異平日殷祠禮既弗殊豈獨以心憂為礙太學博士徐宏議三年之喪雖從權制再周祥變猶服縞素未為純吉無容以祭謂來四月未宜便殷十月則允太常丞臣朱膺之議虞禮云中月而禫是月也吉祭猶未配謂二十七月既禫祭當四時之祭日則未以其妃配哀未忘也推此而言未禫不得祭也又春秋閔公二年吉禘于莊公鄭玄云閔公心懼於難務自尊成以厭其禍凡二十二月而除喪又不禫云又不禫明禫內不得禘也案王肅等言於魏朝云今權宜存古禮俟畢三年舊說三年喪畢遇禘則禘遇祫則祫鄭玄云禘以孟夏祫以孟秋今相承用十月如宏所上公羊之文如為有疑亦以魯閔設服因言喪之紀制爾何必全許素冠可吉禘縱公羊異說官以禮為正亦求量宜郎中周景遠參議永初三年九月十日奏傅亮議權制即吉御世宜爾宗廟大禮宜依古典則是皇宋開代成準謂博士徐宏太常丞朱膺之議用來年十月殷祠為允詔可宋殷祭皆即吉乃行大明七年二月辛亥有司奏四月應殷祠若事中未得為得用孟秋與不領軍長史周景遠議案禮記云天子祫禘祫嘗祫蒸依如禮文則夏秋冬三時皆殷不唯用冬夏也晉義熙初僕射孔安國啓議自太和四年相承殷祭皆用冬夏安國又啓永和十年至今五十餘年用三十月輒殷祠博士徐乾據禮難安國乾又引晉咸康六年七月殷祠是不專用冬夏于時晉朝雖不從乾議然乾據禮及咸康故事安國無以奪之今若以來四月未得殷祠遷用孟秋於禮無違參議據禮有證謂用孟秋為允詔可晉武帝咸寧五年十一月己酉弘訓羊太后崩宗廟廢一時之祀天地明堂去樂且不上胙升平五年十月己卯殷祠以穆帝崩後不作樂初永嘉中散騎常侍江統議曰陽秋之義去樂卒事是為吉祭有廢樂也故升平末行之其後太常江逌表穆帝山陵之後十月殷祭從太常丘夷等議撤樂逌尋詳今行漢制無特祀之別既入廟吉禘何疑於樂史臣曰聞樂不怡故申情於遏密至於諒暗奪服慮政事之荒廢是以乘權通以設變量輕重而降屈若夫奏音之與寢聲非有損益於機務縱復回疑於兩端固宜緣恩而從戚矣宋世國有故廟祠皆懸而不樂
