body:
  text: 宋書卷十七志第七禮四宋文帝元嘉三年五月庚午以誅徐羡之等讎恥已雪幣告太廟元嘉三年十二月甲寅西征謝晦告太廟太社晦平車駕旋軫又告元嘉六年七月太學博士徐道娛上議曰伏見太廟蒸嘗儀注皇帝行事畢出便坐三公已上獻太祝送神于門然後至尊還拜百官贊拜乃退謹尋清廟之道所以肅安神也禮曰廟者貌也神靈所馮依也事亡如存若常在也既不應有送神之文自陳豆薦俎車駕至止並弗奉迎夫不迎而送送而後辭暗短之情實用未達按時人私祠誠皆迎送由於無廟庶感降來格因心立意非王者之禮也儀禮雖太祝迎尸于門此乃延尸之儀豈是敬神之典恐於禮有疑謹以議上有司奏下禮官詳判博士江邃議在始不迎明在廟也卒事而送節孝思也若不送而辭是舍親也辭而後送是遣神也故孝子不忍違其親又不忍遣神是以祝史送神以成蒸嘗之義博士賀道期議樂以迎來哀以送往祭統迎牲而不迎尸詩云鐘鼓送尸鄭云尸神象也與今儀注不迎而後送若合符契博士荀萬秋議古之事尸與今之事神其義一也周禮尸出送于廟門拜尸不顧詩云鐘鼓送尸則送神之義其來久矣記曰迎牲而不迎尸別嫌也尸在門外則疑於臣入廟中則全於君君在門外則疑於君入廟則全於臣是故不出者明君臣之義邃等三人謂舊儀為是唯博士陳珉同道娛議參詳邃等議雖未盡然皆依擬經禮道娛珉所據難從今衆議不一宜遵舊體詔可元嘉六年九月太學博士徐道娛上議曰祠部下十月三日殷祠十二日蒸祀謹按禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間祀也蓋歷歲節月無定天子諸侯先後弗同禮稱天子祫嘗諸侯蒸祫有田則祭無田則薦鄭注天子先祫然後時祭諸侯先時祭然後祫有田者既祭又薦新祭以首時薦以仲月然則大祭四祀其月各異天子以孟月殷仲月蒸諸侯孟月嘗仲月祫也春秋僖公八年秋七月禘文公二年八月大事于太廟穀梁傳曰著祫嘗也昭公十五年二月有事于武宮左傳曰禮也又周禮仲冬享蒸月令季秋嘗稻晉春蒸曲沃齊十月嘗太公此並孟仲區別不共之明文矣凡祭必先卜日用丁巳如不從進卜遠日卜未吉豈容二事推期而往理尤可知尋殷蒸祀重祭薦禮輕輕尚異月重寧反同且祭不欲數數則瀆今隔旬頻享恐於禮為煩自經緯墳誥都無一月兩獻先儒舊説皆云殊朔晉代相承未審其原國事之重莫大乎祀愚管膚淺竊以惟疑請詳告下議寢不報元嘉七年四月乙丑有司奏曰禮喪服傳云有死於宮中者則為之三月不舉祭今礿祀既戒而掖庭有故下太常依禮詳正太學博士江邃袁朗徐道娛陳珉等議參互不同殿中曹郎中領祠部謝元議以為遵依禮傳使有司行事於義為安輒重參詳宗廟敬重饗祀精明雖聖情罔極必在親奉然苟曰有疑則情以禮屈無所稱述於義有據請聽如元所上詔可元嘉十年十二月癸酉太祝令徐閏刺署典宗廟社稷祠祀薦五牲牛羊豕雞並用雄其一種市買由來送雌竊聞周景王時賓起見雄雞自斷其尾曰雞憚犧不祥今何以用雌求下禮官詳正勒太學依禮詳據博士徐道娛等議稱案禮孟春之月是月也犧牲無用牝如此是春月不用雌爾秋冬無禁雄雞斷尾自可是春月太常丞司馬操議尋月令孟春命祀山林川澤犧牲無用牝若如學議春祠三牲以下便應一時俱改以從月令何以偏在一雞重更勒太學議答博士徐道娛等又議稱凡宗祀牲牝不一前惟月令不用牝者蓋明在春必雄秋冬可雌非以山林同宗廟也四牲不改在雞偏異相承來久義或有由誠非末學所能詳究求詳議告報如所稱令參詳閏所稱粗有證據宜如所上自今改用雄雞孝武帝孝建三年五月丁巳詔以第四皇子出紹江夏王太子睿為後有司奏皇子出後檢未有告廟先例輒勒二學禮官議正應告與不告者為告幾室太學博士傅休議禮無皇子出後告廟明文晉太康四年封北海王實紹廣漢殤王後告于太廟漢初帝各異廟故告不必同自漢明帝以來乃共堂各室魏晉依之今既共堂若獨告一室而闕諸室則於情未安太常丞庾亮之議案禮大事則告祖禰小事則特告禰今皇子出嗣宜告禰廟祠部朱膺之議以為有事告廟蓋國之常典今皇子出紹事非常均愚以為宜告賀循云古禮異廟唯謁一室是也既皆共廟而闕於諸帝於情未安謂循言為允宜在皆告兼右丞殿中郎徐爰議以為國之大事必告祖禰皇子出嗣不得謂小昔第五皇子承統廬陵備告七廟參議以爰議為允詔可大明元年六月己卯朔詔以前太子步兵校尉祗男歆紹南豐王朗有司奏朗先嗣營陽告廟臨軒檢繼體為舊不告廟臨軒下禮官議正太學博士王燮之議南豐昔別開土宇以紹營陽義同始封故有臨軒告廟之禮今歆奉詔出嗣則成繼體先爵猶存事是傳襲不應告廟臨軒祠部郎朱膺之議南豐王嗣爵封已絶聖恩垂矜特詔繼茅土復申義同始封為之告廟臨軒殿中郎徐爰議營陽繼體皇基身亡封絶恩詔追封錫以一城既始啓建茅土故宜臨軒告廟今歆繼後南豐彼此俱為列國長沙南豐自應各告其祖豈關太廟事非始封不合臨軒同博士王燮之議參詳爰議為允詔可大明三年六月乙丑有司奏來七月十五日嘗祠太廟章皇太后廟輿駕親奉而乘輿辭廟親戎太子合親祠與不且今月二十四日第八皇女夭案禮宮中有故三月不舉祭皇太子入住上宮於事有疑下禮官議正太學博士司馬興之議竊惟國之大事在祀與戎皇太子有撫軍之道而無專御之義戎既如之祀亦宜然案祭統夫祭之道孫為王父尸又云祭有昭穆所以別父子太子監國雖不攝至於宗廟則昭穆實存謂事不可亂又云有故則使人準此二三太子無奉祀之道又皇女夭札則實同宮一體之哀理不得異設令得祀令猶無親奉之義博士郁議案春秋太子奉社稷之粢盛長子主器出可守宗廟以為祭主易彖明文監國之重居然親祭皇女夭札時既同宮三月廢祭於禮宜停二議不同尚書參議宜以郁議為允詔可大明三年十一月乙丑朔有司奏四時廟祠吉日已定遇雨及舉哀舊停親奉以有司行事先下使禮官博議於禮為得遷日與不博士江長議禮記祭統君之祭也有故則使人而君不失其儀鄭玄云君雖不親祭禮無闕君德不損愚以為有故則必使人者明無遷移之文苟有司充事謂不宜改日太常丞陸澄議案周禮宗伯之職若王不與祭祀則攝位鄭君曰王有故行其祭事也臣以為此謂在致齋祭事盡備神不可瀆齋不可久而王有他故則使有司攝焉晉泰始七年四月世祖將親祠于太廟庚戌車駕夕牲辛亥雨有司行事此雖非人故蓋亦天硋也求之古禮未乖周制案禮記孔子答曾子當祭而日蝕太廟火如牲至未殺則廢然則祭非無可廢之道也但權所為之輕重耳日蝕廟火變之甚者故乃牲至尚猶可廢推此而降可以理尋今散齋之內未及致齋而有輕哀甚雨日時展事可以延敬不愆義情無傷正典改擇令日夫何以疑愚謂散齋而有舉哀若雨可更遷日唯入致齋及日月逼晚者乃使有司行事耳又前代司空顧和啓南郊車駕已出遇雨宜遷日更郊事見施用郊之與廟其敬可均至日猶遷況散齋邪殿中郎殷淡議曾子問日蝕太廟火牲未殺則廢縱有故則使人清廟敬重郊禋禮大故廟焚日蝕許以可遷輕哀微故事不合改是以鼷鼠食牛改卜非禮晉世祖有司行事顧司空之改郊月既不見其當時之宜此不足為準愚謂日蝕廟火天譴之變乃可遷日至於舉哀小故不宜改辰衆議不同參議既有理據且晉氏遷郊宋初遷祠並有成準謂孟月散齋之中遇雨及舉輕哀宜擇吉更遷無定限數唯入致齋及侵仲月節者使有司行事詔可大明五年十月甲寅有司奏今月八日蒸祠二廟公卿行事有皇太子獻妃服前太常丞庾蔚之議禮所以有喪廢祭由祭必有樂皇太子以元嫡之重故主上服妃不以尊降既正服大功愚謂不應祭有故三公行事是得祭之辰非今之比卿卒猶不繹況於太子妃乎博士司馬興之議夫緦則不祭禮之大經卿卒不繹春秋明義又尋魏代平原公主薨高堂隆議不應三月廢祠而猶云殯葬之間權廢事改吉芬馥享祠尋此語意非使有司此無服之喪尚以未葬為廢況皇太子妃及大功未祔者邪上尋禮文下準前代不得蒸祠領軍長史周景遠議案禮緦不祭大功廢祠理不俟言今皇太子故妃既未山塋未從權制則應依禮廢蒸嘗至尊以大功之服於禮不得親奉非有故之謂亦不使公卿行事右丞徐爰議以為禮緦不祭蓋惟通議大夫以尊貴降絶及其有服不容復異祭統云君有故使人可者謂於禮應祭君不得齋祭不可闕故使臣下攝奉不謂君不應祭有司行事也晉咸寧四年景獻皇后崩晉武帝伯母宗廟廢一時之祀雖名號尊崇粗可依準今太子妃至尊正服大功非有故之比既未山塋謂蒸祠宜廢尋蔚之等議指歸不殊闕蒸為允過卒哭祔廟一依常典詔可大明七年二月丙辰有司奏鑾輿巡搜江左講武校獵獲肉先薦太廟章太后廟并設醢酒公卿行事及獻妃陰室室長行事太學博士虞和議檢周禮四時講武獻牲各有所施振旅春搜則以祭社茇舍夏苗則以享礿治兵秋獮則以祀祊大閲冬狩則以享蒸案漢祭祀志唯立秋之日白郊事畢始揚威武名曰貙劉乘輿入囿躬執弩以射牲以鹿麑太宰令謁者各一人載獲車馳送陵廟然則春田薦廟未有先準兼太常丞庾蔚之議和所言是搜狩不失其時此禮久廢今時和表晏講武教人又虔供乾豆先薦二廟禮情俱允社主土神司空土官故祭社使司空行事太廟宜使上公參議搜狩之禮四時異議禮有損益時代不同今既無復四方之祭三殺之儀曠廢來久禽獲牲物面傷翦毛未成禽不獻太宰令謁者擇上殺奉送先薦廟社二廟依舊以太尉行事詔可明帝泰豫元年七月庚申有司奏七月嘗祠至尊諒暗之內為親奉與不使下禮官通議伏尋三年之制自天子達漢文愍秦餘之弊於是制為權典魏晉以來卒哭而祔則就吉案禮記王制三年不祭唯祭天地社稷為越紼而行事鄭玄云唯不敢以卑廢尊也范宣難杜預段暢所以闕宗廟祭者皆人理所奉哀戚之情同於生者譙周祭志稱禮身有喪則不為吉祭緦麻之喪於祖考有服者則亦不祭為神不饗也尋宮中有故雖在無服亦廢祭三月有喪不祭如或非若三年之內必宜親奉者則應禘序昭穆而今必須免喪然後禘祫故知未祭之意當似可思起居注晉武有二喪兩期之中並不自祠亦近代前事也伏惟至尊孝越姬文情深明發公服雖釋純哀內䗿推訪典例則未應親奉有司祗應祭不為曠仰思從敬竊謂為允臣等參議甚有明證宜如所上詔可後廢帝元徽二年十月丙寅有司奏至尊親祠太廟文皇帝太后之日孝武皇帝及昭皇太后雖親非正統而嘗經北面未詳應親執爵與不下禮官議太學博士周山文議案禮尊者尊統上卑者尊統下孝武皇帝於至尊雖親非正統而祖宗之號列于七廟愚謂親奉之日應執觴爵昭皇太后既親非禮正宜使三公行事博士顏燮等四人同山文兼太常丞韓賁議晉景帝之於世祖肅祖之於孝武皆傍尊也親執觴杓今孝武皇帝於至尊親為伯父功列祖宗奉祠之日謂宜親執按昭皇太后於主上親無名秩情則疏遠庶母在我猶子祭孫止況伯父之庶母愚謂昭后觴爵可付之有司前左丞孫緬議晉世祖宗祠顯宗烈宗肅祖並是晉帝之伯今朝明準而初無有司行事之禮愚謂主上親執孝武皇帝觴爵有愜情敬昭皇太后君母之貴見尊一時而與章宣二廟同饗閟宮非唯不躬奉乃宜議其毀替請且依舊三公行事詔緬議為允宋孝武帝孝建元年十月戊辰有司奏章皇太后廟毀置之禮二品官議者六百六十三人太傅江夏王義恭以為經籍殘偽訓傳異門諒言之者罔一故求之者鮮究是以六宗之辨舛於兼儒迭毀之論亂於羣學章皇太后誕神啓聖禮備中興慶流胙胤德光義遠宜長代崇芬奕葉垂則豈得降侔通倫反遵常典夫議者成疑實傍紀傳知一爽二莫窮書旨按禮記不代祭爰及慈母置辭令有所施穀梁於孫止別主立祭則親執虔祀事異前志將由大君之宜其職彌重人極之貴其數特中且漢代鴻風遂登配祔晉氏明規咸留薦祀遠考史策近因暗見未應毀之於義為長所據公羊祇足堅秉安可以貴等帝王祭從士庶緣情訪制顛越滋甚謂應同七廟六代乃毀六百三十六人同義恭不毀散騎侍郎王法施等二十七人議應毀領曹郎中周景遠重參議義恭等不毀議為允詔可大明二年二月庚寅有司奏皇代殷祭無事於章后廟高堂隆議魏文思后依周薑嫄廟禘祫及徐邈答晉宣太后殷薦舊事使禮官議正博士孫武議按禮記祭法置都立邑設廟祧壇墠而祭之乃為親疏多少之數是故王立七廟遠廟為祧鄭云天子遷廟之主昭穆合藏於二祧之中祫乃祭之王制曰祫禘鄭云祫合也合先君之主於祖廟而祭之謂之祫三年而夏禘五年而秋祫謂之五年再殷祭又禘大祭也春秋文公二年大事于太廟傳曰毀廟之主陳于太祖未毀廟之主皆升合食太祖傳曰合族以食序以昭穆祭統曰有事于太廟則羣昭羣穆咸在不失其倫今殷祠是合食太祖而序昭穆章太后既屈於上不列正廟若迎主入太廟既不敢配列於正序又未聞於昭穆之外別立為位若徐邈議今殷祠就別廟奉薦則乖禘祫大祭合食序昭穆之義邈云陰室四殤不同祫就祭此亦其義也喪服小記殤與無後從祖祔食祭法王下祭殤鄭玄云祭適殤於廟之奧謂之陰厭既從祖食於廟奧是殤有位於奧非就祭別宮之謂今章太后廟四時饗薦雖不於孫止若太廟禘祫獨祭別宮與四時蒸嘗不異則非禘大祭之義又無取於祫合食之文謂不宜與太廟同殷祭之禮高堂隆答魏文思后依薑嫄廟禘祫又不辨祫之義而改祫大饗蓋有由而然耳守文淺學懼乖禮衷博士王燮之議按禘小祫大禮無正文求之情例如有可準推尋祫之為名雖在合食而祭典之重於此為大夫以孝饗親尊愛罔極既殷薦太祖亦致盛祀於小廟譬有事於尊者可以及卑故高堂隆所謂獨以祫故而祭之也是以魏之文思晉之宣后雖並不序於太廟而猶均禘於薑嫄其意如此又徐邈所引四殤不祫就而祭之以為別饗之例斯其證矣愚謂章皇太后廟亦宜殷薦太常丞孫緬議以為祫祭之名義在合食守經據古孫武為詳竊尋小廟之禮肇自近魏晉之所行足為前準高堂隆以祫而祭有附情敬徐邈引就祭四殤以證別饗孫武據殤祔於祖謂廟有殤位尋事雖同廟而祭非合食且七廟同宮始自後漢禮之祭殤各祔厥祖既豫祫則必異廟而祭愚謂章廟殷薦推此可知祠部朱膺之議閟宮之祀高堂隆趙怡並云周人祫歲俱祫祭之魏晉二代取則奉薦名儒達禮無相譏非不愆不忘率由舊章愚意同王燮之孫緬議詔曰章皇太后追尊極號禮同七廟豈容獨闕殷薦隔茲盛祠閟宮遙祫既行有周魏晉從饗式範無替宜述附前典以宣情敬明帝泰始二年正月孝武昭太后崩五月甲寅有司奏晉太元中始正太后尊號徐邈議廟制自是以來著為通典今昭皇太后於至尊無親上特制義服祔廟之禮宜下禮官詳議博士王略太常丞虞願議正名存義有國之徽典臣子一例史傳之明文今昭皇太后正位母儀尊號允著祔廟之禮宜備彝則母以子貴事炳聖文孝武之祀既百代不毀則昭后之祔無緣有虧愚謂神主應入章后廟又宜依晉元皇帝之於愍帝安帝之於永安后祭祀之日不親執觴爵使有司行事時太宗宣太后已祔章太后廟長兼儀曹郎虞和議以為春秋之義庶母雖名同崇號而實異正嫡是以猶考別宮而公子主其祀今昭皇太后既非所生益無親奉之理周禮宗伯職云若王不與祭則攝位然則宜使有司行其禮事又婦人無常秩各以夫氏為定夫亡以子為次昭皇太后即正位在前宣太后追尊在後以從序而言宜躋新禰于上參詳和議為允詔可泰始二年六月丁丑有司奏來七月嘗祀二廟依舊車駕親奉孝武皇帝室至尊親進觴爵及拜伏又昭皇太后室應拜及祝文稱皇帝諱又皇后今月二十五日虔見於禰拜孝武皇帝昭皇太后並無明文下禮官議正太學博士劉緄議尋晉元北面稱臣於愍帝蒸嘗奉薦亦使有司行事且兄弟不相為後著於魯史以此而推孝武之室至尊無容親進觴爵拜伏其日親進章皇太后廟經昭皇太后室過前議既使有司行事謂不應進拜昭皇太后正號久定登列廟祀詳尋祝文宜稱皇帝諱案禮婦無見兄之典昭后位居傍尊致虔之儀理不容備孝武昭后二室牲薦宜闕太常丞虞願議夫蒸嘗之禮事存繼嗣故傍尊雖近弟姪弗祀君道雖高臣無祭典按晉景帝之於武帝屬居伯父武帝至祭之日猶進觴爵今上既纂祠文皇於孝武室謂宜進拜而已觴爵使有司行事按禮過墓則軾過祀則下凡在神祇尚或致恭況昭太后母臨四海至尊親曾北面兄母有敬謂宜進拜祝文宜稱皇帝諱尋皇后廟見之禮本修虔為義今於孝武論其嫂叔則無通問之典語其尊卑亦無相見之義又皇后登御之初昭后猶正位在宮敬謁之道久已前備愚謂孝武昭太后二室並不復薦告參議以願議為允詔可後廢帝元徽二年十月壬寅有司奏昭太后廟毀置下禮官詳議太常丞韓賁議按君母之尊義發春秋庶後饗薦無間周典七廟承統猶親盡則毀況伯之所生而無服代祭稽之前代未見其準都令史殷匪子議昭皇太后不係於祖宗進退宜毀議者云妾祔於妾祖姑祔既必告毀不容異應告章皇太后一室按記云妾祔於妾祖姑無妾祖姑則易牲而祔於女君可也始章太后於昭太后論昭穆而言則非妾祖姑又非女君於義不當伏尋昭太后名位允極昔初祔之始自上祔於趙后即安于西廟並皆幣告諸室古者大事必告又云每事必告禮牲幣雜用檢魏晉以來互有不同元嘉十六年下禮官辨正太學博士殷靈祚議稱吉事用牲凶事用幣自茲而後吉凶為判已是一代之成典今事雖不全凶亦未近吉故宜依舊以幣遍告二廟又尋昭太后毀主無義陳列於太祖博士欲依虞主埋於廟兩階之間按階間本以埋告幣埋虞主之所昔虞喜云依五經典議以毀主祔於虞主埋於廟之北牆最為可據昭太后神主毀之埋之後上室不可不虛置太后便應上下升之既升之頃又應設脯醢以安神今禮官所議謬略未周遷毀事大請廣詳訪左僕射劉秉等七人同匪子左丞王諶重參議謂以幣遍告二廟埋毀殷主於北牆宣太后上室仍設脯醢以安神匪子議為允詔可魏明帝太和三年詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外蕃援立而董宏等稱引亡秦或誤朝議遂尊恭皇立廟京師又寵蕃妾使比長信僭差無禮人神弗佑非罪師丹忠正之諫用致丁傅焚如之禍自是之後相踵行之其令公卿有司深以前代為誡後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛君上妄建非正之號謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策藏之宗廟著于令典是後高貴常道援立皆不外尊也晉愍帝建興四年司徒梁芬議追尊之禮帝既不從而左僕射索綝等亦稱引魏制以為不可故追贈吳王為太保而已元帝太興二年有司言琅邪恭王宜稱皇考賀循議云禮典之義子不敢以己爵加其父號帝又從之二漢此典棄矣魏明帝有愛女曰淑涉三月而夭帝痛之甚追封諡為平原懿公主葬於南陵立廟京師無前典非禮也宋孝武帝孝建元年七月辛酉有司奏東平沖王年稚無後唯殤服五月雖臣不殤君應有主祭而國是追贈又無其臣未詳毀靈立廟為當它祔與不輒下禮官詳議太學博士臣徐宏議王既無後追贈無臣殤服既竟靈便合毀記曰殤與無後者從祖祔食又曰士大夫不得祔於諸侯祔於祖之為士大夫者按諸侯不得祔於天子沖王則宜祔諸祖之廟為王者應祔長沙景王廟詔可大明四年丁巳有司奏安陸國土雖建而奠酹之所未及營立四時薦饗故祔江夏之廟宣王所生夫人當應祠不太學博士傅郁議應廢祭右丞徐爰議按禮慈母妾母不世祭鄭玄注以其非正故傳曰子祭孫止又云為慈母後者為祖庶母可也注稱緣為慈母後之義父妾無子亦可命己庶子為之後也考尋斯義父母妾之祭不必唯子江夏宣王太子體自元宰道戚之胤遭時不幸聖上矜悼降出皇愛嗣承徽緒光啓大蕃屬國為祖始王夫人載育明懿則一國之正上無所厭哀敬得申既未獲祔享江夏又不從祭安陸即事求情愚以為宜依祖母有為後之義謂合列祀于廟二議不同參議以爰議為允詔可大明六年十月丙寅有司奏故晉陵孝王子雲未有嗣安廟後三日國臣從權制除釋朔望周忌應還臨與不祭之日誰為主太常丞庾蔚之議既葬三日國臣從權制除釋而靈筵猶存朔望及期忌諸臣宜還臨哭變服衣爐使上卿主祭王既未有後又無三年服者期親服除而國尚存便宜立廟為國之始祖服除之日神主暫祔食祖廟諸王不得祖天子宜祔從祖國廟還居新廟之室未有嗣之前四時饗薦常使上卿主之左丞徐爰參議以蔚之議為允詔可大明七年正月庚子有司奏故宣貴妃加殊禮未詳應立廟與不太學博士虞和議曲禮云天子有后有夫人檀弓云舜葬蒼梧三妃未之從昏義云后之立六宮有三夫人然則三妃即三夫人也后之有三妃猶天子之有三公也按周禮三公八命諸侯七命三公既尊於列國諸侯三妃亦貴於庶邦夫人據春秋傳仲子非魯惠元嫡尚得考彼別宮今貴妃是秩天之崇班理應立此新廟左丞徐爰議宣貴妃既加殊命禮絶五宮考之古典顯有成據廟堂克構宜選將作大匠參詳以和爰議為允詔可大明七年三月戊戌有司奏新安王服宣貴妃齊衰期十一月練十三月縞十五月祥心喪三年未詳宣貴妃祔廟應在何時入廟之日當先有祔為但入新廟而已若在大祥及禫中入廟者遇四時便得祭不新安王在心制中得親奉祭不太學博士虞和議春秋傳云祔而作主蒸嘗禘於廟嘗為吉祭之名大祥及禫未得入廟應在禫除之後也新安王心喪之內若遇時節便應吉祭於廟親奉亦在無嫌祔之為言以後亡者祔於先廟也小記云諸侯不得祔於天子今貴妃爵視諸侯居然不得祔於先后又別考新宮無所宜祔且卒哭之後益無祔理左丞徐爰議以禮有損益古今異儀雖云卒哭而祔祔而作主時之諸侯皆禫終入廟且麻衣縓緣革服於元嘉苫絰變除申情於皇宋況宣貴妃誕育睿蕃葬加殊禮靈筵廬位皆主之哲王考宮創祀不得關之朝廷謂禫除之後宜親執奠爵之禮若有故三卿行事貴妃上厭皇姑下絶列國無所應祔參議和議大體與爰不異宜以爰議為允詔可大明七年十一月癸未有司奏晉陵國刺孝王廟依廬陵等國例一歲五祭二國以王有衡陽王服今年內不祠尋國未有嗣王三卿主祭應同有服之例與不博士顏僧道議禮記云所祭者亡服則祭今晉陵王於衡陽小功宜依二國同廢太常丞庾蔚之議緦不祭者據主為言也晉陵雖未有嗣宜依有嗣致服依闕祭之限衡陽為族伯緦麻則應祭三月兼左丞徐爰議嗣王未立將來承胤未知疏近豈宜空計服屬以虧祭敬參議以爰議為允詔可大明八年正月壬辰有司奏故齊敬王子羽將來立後未詳便應作主立廟為須有後之日未立廟者為於何處祭祀遊擊將軍徐爰議以為國無後於制除罷始封之君宜存繼嗣皇子追贈則為始祖臣不殤君事著前準豈容虛闕蒸嘗以俟有後謂宜立廟作主三卿主祭依舊通關博議以爰議為允令便立廟廟成作主依晉陵王近例先暫祔廬陵孝獻王廟祭竟神主即還新廟未立後之前常使國上卿主祭禮云共工氏之霸九州其子句龍曰后土能平九土故祀以為社周以甲日祭之用日之始也社所以神地之道地載萬物天垂象取財於地取法於天是以尊天而親地故教民美報焉家主中霤而國主社示本也故言報本反始烈山氏之有天下其子曰農能殖百穀其裔曰柱佐顓頊為稷官主農事周棄係之法施於人故祀以為稷禮王為羣姓立社曰太社王自為立社曰王社故國有二社而稷亦有二也漢魏則有官社無稷故常二社一稷也晉初仍魏無所增損至太康九年改建宗廟而社稷壇與廟俱徙乃詔曰社實一神其并二社之祀於是車騎司馬傅咸表曰祭法二社各有其義天子尊事郊廟故冕而躬耕躬耕也者所以重孝享之粢盛致殷薦於上帝也穀梁傳曰天子親耕以供粢盛親耕謂自報自為立社者為籍而報也國以人為本人以穀為命故又為百姓立社而祈報焉事異報殊此社之所以有二也王景侯之論王社亦謂春祈籍田秋而報之也其論太社則曰王者布下圻內為百姓立之謂之太社不自立之於京師也景侯此論據祭法大夫以下成羣立社曰置社景侯解曰今之里社是也景侯解祭法則以置社為人間之社矣而別論復以太社為人間之社未曉此旨也太社天子為民而祀故稱天子社郊特牲曰天子太社必受霜露風雨夫以羣姓之衆王者通為立社故稱太社若夫置社其數不一蓋以里所為名左氏傳盟于清丘之社是也人間之社既已不稱太矣若復不立之京都當安所立乎祭法又曰王為羣姓立七祀自為立七祀言自為者自為而祀也為羣姓者為羣姓而祀也太社與七祀其文正等説者窮此因云墳籍但有五祀無七祀也按祭五祀國之大祀七者小祀周禮所云祭凡小祀則墨冕之屬也景侯解大厲曰如周杜伯鬼有所歸乃不為厲今云無二社者稱景侯祭法不謂無二則曰口傳無其文也夫以景侯之明擬議而後為解而欲以口論除明文如此非但二社當是思惟景侯之後解亦未易除也前被敕尚書召誥社于新邑唯一太牢不立二社之明義也按郊特牲曰社稷太牢必援一牢之文以明社之無二則稷無牲矣説者則曰舉社以明稷苟可舉社以明稷何獨不可舉一以明二國之大事在祀與戎若有過而除之不若過而存之況存之有義而除之無據乎周禮封人掌設社壝無稷字今帝社無稷蓋出於此然國主社稷故經傳動稱社稷周禮王祭稷則絺冕此王社有稷之文也封人設壝之無稷字説者以為略文從可知也謂宜仍舊立二社而加立帝社之稷時成粲議稱景侯論太社不立京都欲破鄭氏學咸重表以為如粲之論景侯之解文以此壞大雅云乃立冢土毛公解曰冢土太社也景侯解詩即用此説禹貢惟土五色景侯解曰王者取五色土為太社封四方諸侯各割其方色土者覆四方也如此太社復為立京都也不知此論從何出而與解乖上違經記明文下壞景侯之解臣雖頑蔽少長學問不能默已謹復續上劉實與咸議同詔曰社實一神而相襲二位衆議不同何必改作其便仍舊一如魏制至元帝建武元年又依洛京立二社一稷其太社之祝曰地德普施惠存無疆乃建太社保佑萬邦悠悠四海咸賴嘉祥其帝社之祝曰坤德厚載王畿是保乃建帝社以神地道明祀惟辰景福來造禮左宗廟右社稷歷代遵之故洛京社稷在廟之右而江左又然也吳時宮東門雩門疑吳社亦在宮東與其廟同所也宋仍舊無所改作魏氏三祖皆親耕籍此則先農無廢享也其禮無異聞宜從漢儀執事告祠以太牢晉元哀帝並欲籍田而不遂儀注亦闕略宋文帝元嘉二十一年春親耕乃立先農壇於籍田中阡西陌南高四尺方二丈為四出陛陛廣五尺外加埒去阡陌各二十丈車駕未到司空大司農率太祝令及衆執事質明以一太牢告祠祭器用祭社稷器祠畢班餘胙於奉祠者舊典先農又常列於郊祭云漢儀皇后親桑東郊苑中蠶室祭蠶神曰苑窳婦人寓氏公主祠用少牢晉武帝太康九年楊皇后躬桑于西郊祀先蠶壇高一丈方二丈為四出陛陛廣五尺在採桑壇東南帷宮之外去帷宮十丈皇后未到太祝令質明以一太牢告祠謁者一人監祠畢徹饌班餘胙於從桑及奉祠者魏文帝黃初二年六月庚子初禮五嶽四瀆咸秩羣祀瘞沈圭璋六年七月帝以舟軍入淮九月壬戌遣使者沈璧于淮禮也魏明帝太和四年八月帝東巡遣使者以特牛祠中嶽禮也魏元帝咸熙元年帝行幸長安遣使者以璧幣禮華山禮也晉穆帝升平中何琦論修五嶽祠曰唐虞之制天子五載一巡狩省時之方柴燎五嶽望于山川遍于羣神故曰因名山升中于天所以昭告神祇饗報功德是以災厲不作而風雨寒暑以時降逮三代年數雖殊而其禮不易五嶽視三公四瀆視諸侯著在經記所謂有其舉之莫敢廢也及秦漢都西京涇渭長水雖不在祀典以近咸陽故盡得比大川之祠而正立之祀可以闕哉自永嘉之亂神州傾覆茲事替矣唯灊之天柱在王略之內舊臺選百石吏卒以奉其職中興之際未有官守廬江郡常遣大吏兼假四時禱賽春釋寒而冬請冰咸和迄今已復墮替計今非典之祠可謂非一考其正名則淫昏之鬼推其糜費則四民之蠹而山川大神更為簡闕禮俗頽紊人神雜擾公私奔蹙漸以滋繁良由頃國家多難日不暇給草建廢滯事有未遑今元憝已殲宜修舊典嶽瀆之域風教所被來蘇之人咸蒙德澤而神祇禋祀未之或甄巡狩柴燎其廢尚矣崇明前典將俟皇輿北旋稽古憲章大釐制度其五嶽四瀆宜遵修之處但俎豆牲牢祝嘏文辭舊章靡記可令禮官作式歸諸誠簡以達明德馨香如斯而已其諸妖孽可粗依法令先去其甚俾邪正不瀆不見省宋孝武帝大明七年六月丙辰有司奏詔奠祭霍山未審應奉使何官用何牲饌進奠之日又用何器殿中郎丘景先議修祀川嶽道光列代差秩圭璋義昭聯册但業曠中葉儀漏典文尋姬典事繼宗伯漢載持節侍祠血祭埋沈經垂明範酒脯牢具悉有詳例又名山著圭幣之異大冢有嘗禾之加山海祠霍山以太牢告玉此準酌記傳其可言者也今皇風緬暢輝祀通嶽愚謂宜使以太常持節牲以太牢之具羞用酒脯時穀禮以赤璋纁幣又鬯人之職凡山川四方用蜃則盛酒當以蠡杯其餘器用無所取説按郊望山瀆以質表誠器尚陶匏籍以茅席近可依準山川以兆宜為壇域參議景先議為允令以兼太常持節奉使牲用太牢加以璋幣器用陶匏時不復用蜃宜同郊祀以爵獻凡肴饌種數一依社祭為允詔可晉武帝咸寧二年春久旱四月丁巳詔曰諸旱處廣加祈請五月庚午始祈雨于社稷山川六月戊子獲澍雨此雩禜舊典也太康三年四月十年二月又如之是後修之至今魏文帝黃初二年正月詔曰昔仲尼資大聖之才懷帝王之器當衰周之末無受命之運乃退考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不宗其文以述作仰其聖以成謀茲可謂命世大聖億載之師表者也以遭天下大亂百祀隳廢舊居之廟毀而不修褒成之後絶而莫繼闕里不聞講頌之聲四時不覩蒸嘗之位斯豈所謂崇化報功盛德百世必祀者哉其以議郎孔羡為宗聖侯邑百戶奉孔子祀命魯郡修舊廟置百戶吏卒以守衛之晉武帝泰始三年十一月改封宗聖侯孔震為奉聖亭侯又詔太學及魯國四時備三牲以祀孔子明帝太寧三年詔給事奉聖亭侯孔亭四時祠孔子祭宜如泰始故事亭五代孫繼之博塞無度常以祭直顧進替慢不祀宋文帝元嘉八年有司奏奪爵至十九年又授孔隱之兄子熙先謀逆又失爵二十八年更以孔惠雲為奉聖侯後有重疾失爵孝武大明二年又以孔邁為奉聖侯邁卒子荂嗣有罪失爵魏齊王正始二年三月帝講論語通五年五月講尚書通七年十二月講禮記通並使太常釋奠以太牢祀孔子於辟雍以顏淵配晉武帝泰始七年皇太子講孝經通咸寧三年講詩通太康三年講禮記通惠帝元康三年皇太子講論語通元帝太興三年皇太子講論語通太子並親釋奠以太牢祠孔子以顏淵配成帝咸康元年帝講詩通穆帝升平元年三月帝講孝經通孝武寧康三年七月帝講孝經通並釋奠如故事穆帝孝武並權以中堂為太學宋文帝元嘉二十二年四月皇太子講孝經通釋奠國子學如晉故事漢東海恭王薨明帝出幸津門亭發哀魏時會喪及使者弔祭用博士杜希議皆去玄冠加以布巾魏武帝少時漢太尉橋玄獨先禮異焉故建安中遣使祠以太牢文帝黃初六年十二月過梁郡又以太牢祠之黃初二年正月帝校獵至原陵遣使者以太牢祠漢世祖宋文帝元嘉二十五年四月丙辰車駕行幸江寧經司徒劉穆之墓遣使致祭焉孝武帝大明三年二月戊申行幸籍田經左光祿大夫袁湛墓遣使致祭大明五年九月庚午車駕行幸經司空殷景仁墓遣使致祭大明七年十一月南巡乙酉遣使祭晉大司馬桓溫征西將軍毛璩墓劉禪景耀六年詔為丞相諸葛亮立廟於沔陽先是所居各請立廟不許百姓遂私祭之而言事者或以為可立於京師乃從人意皆不納步兵校尉習隆中書侍郎向充等言於禪曰昔周人懷邵伯之美甘棠為之不伐越王思范蠡之功鑄金以存其象自漢興已來小善小德而圖形立廟者多矣況亮德範遐邇勳蓋季世興王室之不壞實斯人是賴而蒸嘗止於私門廟象闕而莫立百姓巷祭戎夷野祀非所以存德念功述追在昔也今若盡從人心則瀆而無典建之京師又逼宗廟此聖懷所以惟疑也愚以為宜因近其墓立之於沔陽使屬所以時賜祭凡其故臣欲奉祠者皆限至廟斷其私祀以崇正禮於是從之何承天曰周禮凡有功者祭於大蒸故後代遵之以元勳配饗充等曾不是式禪又從之並非禮也漢時城陽國人以劉章有功於漢為之立祠青州諸郡轉相放效濟南尤盛至魏武帝為濟南相皆毀絶之及秉大政普加除翦世之淫祀遂絶至文帝黃初五年十一月詔曰先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山川澤非此族也不在祀典叔世衰亂崇信巫史至乃宮殿之內戶牖之間無不沃酹甚矣其惑也自今其敢設非禮之祭巫祝之言皆以執左道論著于令明帝青龍元年又詔郡國山川不在祀典者勿祠晉武帝泰始元年十二月詔昔聖帝明王修五嶽四瀆名山川澤各有定制所以報陰陽之功而當幽明之道故也然以道蒞天下者其鬼不神其神不傷人也故祝史薦而無愧詞是以其人敬慎幽冥而淫祀不作末代信道不篤僭禮瀆神縱欲祈請曾不敬而遠之徒偷以求幸妖妄相扇舍正為邪故魏朝疾之其按舊禮具為之制使功著於人者必有其報而妖淫之鬼不亂其間二年正月有司奏春分祠厲殃及禳祠詔曰不在祀典除之宋武帝永初二年普禁淫祀由是蔣子文祠以下普皆毀絶孝武孝建初更修起蔣山祠所在山川漸皆修復明帝立九州廟於雞籠山大聚羣神蔣侯宋代稍加爵位至相國大都督中外諸軍事加殊禮鍾山王蘇侯驃騎大將軍四方諸神咸加爵秩漢安帝元初四年詔曰月令仲秋養衰老授几杖行糜鬻方今八月案比之時郡縣多不奉行雖有糜鬻粳秕泥土相和半不可飲食按此詔漢時猶依月令施政事也
