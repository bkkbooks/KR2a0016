body:
  text: 宋書卷十八志第八禮五秦滅禮學事多違古漢初崇簡不存改作車服之儀多因秦舊至明帝始乃修復先典司馬彪輿服志詳之矣魏代唯作指南車其餘雖小有改易不足相變晉立服制令辨定衆儀徐廣車服注略明事目並行於今者也故復列以通數代典事上古聖人見轉蓬始為輪輪行可載因為輿任重致遠流運無極後代聖人觀北斗魁方杓曲攜龍角為帝車曲其輈以便駕系本云奚仲始作車案庖羲畫八卦而為大輿服牛乘馬以利天下奚仲乃夏之車正安得始造乎系本之言非也車服以庸著在唐典夏建旌旗以表貴賤周有六職百工居其一焉一器而羣工致其巧車最居多明堂位曰鸞車有虞氏之路也大路殷路也乘路周路也殷有山車之瑞謂桑根車殷人制為大路禮緯曰山車垂句句曲也言不揉治而自曲也周之五路則有玉金象革木五者之飾備於考工記輿方法地蓋圓象天輻以象日月二十八弓以象列宿玉金象者飾車諸末因為名也革者漆革木者漆木也玉路建大常以祀金路建大旗以賓象路建大赤以朝革路建大白以戎木路建大麾以田黑色夏所尚也秦閲三代之車獨取殷制古曰桑根車秦曰金根車也漢氏因秦之舊亦為乘輿所謂乘殷之路者也禮論輿駕議曰周則玉輅最尊漢之金根亦周之玉路也漢制乘輿金根車輪皆朱斑重轂兩轄飛軨轂外復有轂施轄其外復設轄施銅貫其中東京賦曰重輪二轄疏轂飛軨飛軨以赤油為之廣八寸長三尺注地繫兩軸頭謂之飛軨也以金薄繆龍為輿倚較較在箱上文畫蕃蕃箱也文虎伏軾龍首銜軛鸞雀立衡文畫轅翠羽蓋黃𩹉所謂黃屋也金華施橑末建大常十二旒畫日月升龍駕六黑馬施十二鸞金為叉髦插以翟尾又加氂牛尾大如斗置左騑馬軛上所謂左纛輿也路如周玉路之制應劭漢官鹵簿圖乘輿大駕則御鳳皇車以金根為副又五色安車五色立車各五乘建龍旗駕四馬施八鸞餘如金根之制猶周金路也其車各如方色所謂五時副車俗謂為五帝車也江左則闕矣白馬者朱其鬣安車者坐乘又有建華蓋九重甘泉鹵簿者道車五乘游車九乘在乘輿車前又有象車最在前試橋道晉江左駕猶有之凡婦人車皆坐乘故周禮王后有安車而王無也漢制乘輿乃有之天子所御駕六其餘副車皆駕四案書稱朽索御六馬逸禮王度記曰天子駕六諸侯駕五卿駕四大夫三士二庶人一楚平王駕白馬梁惠王以安車駕三送淳于髠大夫之儀周禮四馬為乘毛詩天子至大夫同駕四士駕二袁盎諫漢文馳六飛魏時天子亦駕六晉先蠶儀皇后安車駕六以兩轅安車駕五為副江左以來相承無六駕四而已宋孝武大明三年使尚書左丞荀萬秋造五路禮圖玉路建赤旗無蓋改造依擬金根而赤漆畫玉飾諸末建青旗十有二旒駕玄馬四施羽葆蓋以祀即以金根為金路建大青旗十有二旒駕玄馬四羽葆蓋以賓象革木路周官輿服志禮圖並不載其形段並依擬玉路漆畫羽葆蓋象飾諸末建立赤旗十有二旒以視朝革路建赤旗十有二旒以即戎木路建赤麾以田象革駕玄木駕赤四馬舊有大事法駕出五路各有所主不俱出也大明中始制五路俱出親耕籍田乘三蓋車一名芝車又名耕根車置耒耜於軾上戎車立乘夏曰鉤車殷曰寅車周曰元戎建牙麾邪注之載金鼓羽幢置甲弩於軾上獵車輞幰輪畫繆龍繞之一名踏猪車魏文帝改曰踏虎車指南車其始周公所作以送荒外遠使地域平漫迷於東西造立此車使常知南北鬼谷子云鄭人取玉必載司南為其不惑也至于秦漢其制無聞後漢張衡始復創造漢末喪亂其器不存魏高堂隆秦朗皆博聞之士爭論於朝云無指南車記者虛說明帝青龍中令博士馬鈞更造之而車成晉亂復亡石虎使解飛姚興使令狐生又造焉安帝義熙十三年宋武帝平長安始得此車其制如鼓車設木人於車上舉手指南車雖回轉所指不移大駕鹵簿最先啓行此車戎狄所制機數不精雖曰指南多不審正回曲步驟猶須人功正之范陽人祖沖之有巧思常謂宜更構造宋順帝升明末齊王為相命造之焉車成使撫軍丹陽尹王僧虔御史中丞劉休試之其制甚精百屈千回未常移變晉代又有指南舟索虜拓跋燾使工人郭善明造指南車彌年不就扶風人馬嶽又造垂成善明鴆殺之記里車未詳所由來亦高祖定三秦所獲制如指南其上有鼓車行一里木人輒擊一槌大駕鹵簿以次指南輦車周禮王后五路之卑者也后宮中從容所乘非王車也漢制乘輿御之或使人挽或駕果下馬漢成帝欲與班婕妤同輦是也後漢陰就外戚驕貴亦輦井丹譏之曰昔桀乘人車豈此邪然則輦夏后氏末代所造也井丹譏陰就乘人而不云僭上豈貴臣亦得乘之乎未知何代去其輪傅玄子曰夏曰余車殷曰胡奴周曰輜車輜車即輦也魏晉御小出常乘馬亦多乘輿車輿車今之小輿犢車軿車之流也漢諸侯貧者乃乘之其後轉見貴孫權云車中八牛即犢車也江左御出又載儲偫之物漢代賤軺車而貴輜軿魏晉賤輜軿而貴軺車又有追鋒車去小平蓋加通幔如軺車而駕馬又以雲母飾犢車謂之雲母車臣下不得乘時以賜王公晉氏又有四望車今制亦存又漢制唯賈人不得乘馬車其餘皆乘之矣除吏赤蓋杠餘則青蓋杠云周禮王后亦有五路重翟厭翟安車翟車輦車凡五也漢制太皇太后皇太后皇后法駕乘重翟羽蓋金根車駕青交絡青帷裳雲畫轅黃金塗五末蓋爪施金華駕三馬左右騑其非法駕則紫罽軿車按字林軿車有衣蔽無後轅其有後轅者謂之輜應劭漢官明帝永平七年光烈陰皇后葬魂車鸞路青羽蓋駕駟馬龍旗九旒前有方相鳳皇車大將軍妻參乘太僕妻御女騎夾轂此前漢舊制也晉先蠶儀注皇后乘油畫雲母安車駕六騩馬騩淺黑色也油畫兩轅安車駕五騩馬為副公主油畫安車駕三三夫人青交絡安車駕三皆以紫絳罽軿車駕三為副九嬪世婦軿車駕二宮人輜車駕一王妃公侯特進夫人封君皂交絡安車駕三漢制貴人公主王妃封君油軿皆駕二右騑而已漢制太子皇子皆安車朱斑輪倚虎較伏鹿軾黑文畫蕃青蓋金華施橑末黑文畫轅黃金塗五末皇子為王錫以此乘故曰王青蓋車皆左右騑駕五旗旗九旒畫降龍皇孫乘緑蓋車亦駕三魏晉之制太子及諸王皆駕四晉元帝太興三年太子釋奠詔曰未有高車可乘安車高車即立乘車也公及列侯安車朱斑輪倚鹿較伏熊軾黑蕃者謂之軒皂繒蓋駕二右騑王公旗八旒侯七旒卿五旒皆降龍公卿中二千石二千石郊陵法駕出皆大車立乘駕四後導從大車駕二右騑他出乘安車其去位致仕皆賜安車四馬中二千石皆皂蓋朱蕃銅五末駕二右騑晉令王公之世子攝命治國者安車駕三旗七旒其侯世子五旒傅暢故事三公安車駕三特進駕二卿一漢制公列侯中二千石二千石夫人會廟及蠶各乘其夫之安車右騑加皂交絡帷裳皆皂非公會則乘漆布輜軿銅五末晉武帝太康四年詔依漢故事給九卿朝車駕及安車各一乘傅暢故事尚書令詔車黑耳後戶僕射但後戶無耳中書監令如僕射漢制乘輿御大駕公卿奉引太僕御大將軍參乘備千乘萬騎屬車八十一乘古者諸侯二車九乘秦滅九國兼其車服故八十一乘也漢遵弗改漢都長安時祠天於甘泉用之都洛陽上原陵又用之大喪又用之法駕則河南尹洛陽令奉引奉車郎御侍中參乘屬車三十六乘凡屬車皆皂蓋赤𩹉後漢祠天郊用法駕祠宗廟用小駕小駕減損副車也前驅有九斿雲罕皮軒鸞旗車皆大夫載之鸞旗者編羽旄列繫幢傍也金鉦黃金戊黃門鼓車乘輿之後有屬車尚書御史載之最後一車懸豹尾豹尾以前比於省中每出警蹕清道建五旗太僕奉駕條上鹵簿尚書郎侍御史令史皆執注以督整車騎所謂護駕也春秋上陵尤省於小駕直事尚書一人從其餘令史以下皆從行所謂先置也薛綜東京賦注以雲罕九斿為旌旗別名亦不辨其形案魏命晉王建天子旌旗置旄頭雲罕是知雲罕非旌旗也徐廣車服注以為九斿斿車九乘雲罕疑是罕詩曰齊侯田獵弋百姓苦之罕本施遊獵遂為行飾乎潘嶽籍田賦先五路九旗次言瓊鈒雲罕若罕為旗則嶽不應頻句於九旗之下又以其物匹鈒宜是今網明矣此說為得之皮軒以虎皮為軒也徐又引淮南子軍正執豹皮以制正其衆禮記前有士師則載虎皮乘輿豹尾亦其義類乎五旗者五色各一旗以木牛承其下徐又云木牛蓋取其負重而安穩也五旗纏竿即禮記德車結旌不盡飾也戎事乃散之又武車綏旌垂舒之也史臣案今結旌綏旌同而德車武車之所不建又木牛之義亦未灼然可曉又案周禮辨載法物莫不詳究然無相風網旄頭之屬此非古制明矣何承天謂戰國並爭師旅數出懸烏之設務察風祲宜是秦矣晉武嘗問侍臣旄頭何義彭推對曰秦國有奇怪觸山截水無不崩潰唯畏旄頭故虎士服之則秦制也張華曰有是言而事不經臣謂壯士之怒髮踊衝冠義取於此摯虞決疑無所是非也徐爰曰彭張之說各言意義無所承據案天文畢昴之中謂之天街故車駕以罼罕前引畢方昴圓因其象星經昴一名旄頭故使執之者冠皮毛之冠也輕車古之戰車也輪輿洞朱不巾不蓋建矛幢麾置弩於軾上駕二射聲校尉司馬吏士載以次屬車漢儀曰出稱警入稱蹕說者云車駕出則應稱警入則應稱蹕也而今俱唱之史臣以為警者警戒也蹕者止行也今從乘輿而出者並警戒以備非常也從外而入乘輿相干者蹕而止之也董巴司馬彪云諸侯王遮迾出入稱警設蹕武剛車有巾有蓋在前為先驅又在輕車之後為殿也駕一史記衛青征胸奴以武剛車為營是也漢制大行載轀輬車四輪其飾如金根加施組連璧交絡四角金龍首銜璧垂五采析羽流蘇前後雲氣畫帷裳文畫曲蕃長與車等太僕御駕六白駱馬以黑藥灼其身為虎文謂之布施馬既下馬斥賣車藏城北祕宮今則馬不虎文不斥賣車則毀也自漢霍光晉安平齊王賈充王導謝安宋江夏王葬以殊禮者皆大輅黃屋載轀輬車晉令曰乘傳出使遭喪以上即自表聞聽得白服乘騾車到副使攝事徐廣車服注傳聞騾車者犢車裝而馬車轅也又車無蓋者曰科車晉武帝時護軍將軍羊琇乘羊車司隸校尉劉毅奏彈之詔曰羊車雖無制猶非素者所服江左來無禁也舊有充庭之制臨軒大會陳乘輿車輦旌鼓於殿庭張衡東京賦云龍路充庭鸞旗拂霓晉江左廢絶宋孝武大明中修復上古寢處皮毛未有制度後代聖人見鳥獸毛羽及其文章與草木華采之色因染絲綵以作衣裳為玄黃之服以法乾坤上下之儀觀鳥獸冠胡之形制冠冕纓蕤之飾虞氏作繢采章彌文夏后崇約猶美黻冕咎繇陳謨則稱五服五章皆後王所不得異也周監二代典制詳密故辨師掌六冕司服掌六服設擬等差各有其序禮記冠義曰冠者禮之始嘉事之重者也太古布冠齊則緇之夏曰毋追殷曰章甫周曰委貌此皆三代常所囗囗周之祭冕繅采備飾故夫子曰服周之冕以盡美稱之至秦以戰國即天子位滅去古制郊祭之服皆以袀玄至漢明帝始採周官禮記尚書諸儒說還備袞冕之服魏明帝以公卿袞衣黼黻之文擬於至尊復損略之晉以來無改更也天子禮郊廟則黑介幘平冕今所謂平天冠也皂表朱緑𩹉廣七寸長尺二寸垂珠十二旒以朱組為纓衣皂上絳下前三幅後四幅衣畫而裳繡為日月星辰山龍華蟲藻火粉米黼黻之象凡十二章也素帶廣四寸朱𩹉以朱緣裨飾其側中衣以絳緣其領袖赤皮蔽膝蔽膝古之韍也絳袴絳襪赤舄未加元服者空頂介幘其釋奠先聖則皂紗裙絳緣中衣絳袴襪黑舄其臨軒亦袞冕也其朝服通天冠高九寸金博山顏黑介幘絳紗裙皂緣中衣其拜陵黑介幘菚單衣其雜服有青赤黃白緗黑色介幘五色紗裙五梁進賢冠遠遊冠平上幘武冠其素服白爐單衣漢儀立秋日獵服緗幘晉哀帝初博士曹弘之等儀立秋御讀令不應緗幘求改用素詔從之宋文帝元嘉六年奉朝請徐道娛表不應素幘詔門下詳議帝執宜如舊遂不改進賢冠前高七寸後高三寸長八寸梁數隨貴賤古之緇布冠也文儒者之所服上公卿助祭於郊廟皆平冕王公八旒卿七旒以組為纓色如其綬王公衣山龍以下九章也卿衣華蟲以下七章也行鄉射禮則公卿委貌冠以皂絹為之形如覆杯與皮辨同制長七寸高四寸衣黑而裳素其中衣以皂緣領袖其執事之人皮辨以鹿皮為之武冠昔惠文冠本趙服也一名大冠凡侍臣則加貂蟬應劭漢官曰說者以金取堅剛百鍊不耗蟬居高食潔口在腋下貂內徑悍而外溫潤此因物生義非其實也其實趙武靈王變胡而秦滅趙以其君冠賜侍臣故秦漢以來侍臣有貂蟬也徐廣車服注稱其意曰北土寒涼本以貂皮𧒄額附施於冠因遂變成首飾乎侍中左貂常侍右貂法冠本楚服也一名柱後一名獬豸說者云獬豸獸知曲直以角觸不正者也秦滅楚以其君冠賜法官謁者高山冠本齊服也一名側注冠秦滅齊以其君冠賜謁者魏明帝以其形似通天遠遊乃毀變之樊噲冠廣九寸制似平冕殿門衛士服之漢將樊噲常持鐵盾鴻門之會項羽欲害漢王乃裂裳以苞盾戴入見羽漢承秦制冠有十三種魏晉以來不盡施用今志其施用者也幘者古賤人不冠者之服也漢元帝額有壯髮始引幘服之王莽頂禿又加其屋也漢注曰冠進賢者宜長耳今介幘也冠惠文者宜短耳今平上幘也知時各隨所宜後遂因冠為別介幘服文吏平上服武官也童子幘無屋者示未成人也又有納言幘後收又一重方三寸又有赤幘騎吏武吏乘輿鼓吹所服救日蝕文武官皆免冠著赤幘對朝服示威武也宋乘輿鼓吹黑幘武冠漢制祀事五郊天子與執事所服各如方色百官不執事者自服常服以從常服絳衣也魏祕書監秦靜曰漢氏承秦改六冕之制俱玄冠絳衣而已晉名曰五時朝服有四時朝服又有朝服凡兵事總謂之戎尚書云一戎衣而天下定周禮革路以即戎又曰兵事韋辨服以韋為辨又以為衣裳春秋左傳戎服將事又云晉郤至衣韋之跗注先儒云絳色今時伍伯衣說者云五霸兵戰猶有綬紱冠纓漫胡則戎服非袴褶之制未詳所起近代車駕親戎中外戒嚴之服無定色冠黑帽綴紫褾褾以繒為之長四寸廣一寸腰有絡帶以代鞶革中官紫褾外官絳褾又有纂嚴戎服而不綴褾行留文武悉同其畋獵巡幸則唯從官戎服帶鞶革文官不下纓武官脫冠宋文帝元嘉中巡幸搜狩皆如之救宮廟水火亦如之漢制太后入廟祭神服紺上皂下親蠶青上縹下皆深衣深衣即單衣也首飾剪氂幗漢制皇后謁廟服紺上皂下親蠶青上縹下首飾假髻步搖八雀九華加以翡翠晉先蠶儀注皇后十二塔步搖大手髻衣純青之衣帶綬佩今皇后謁廟服袿王老大衣謂之褘衣公主三夫人大手髻七塔蔽髻九嬪及公夫人五塔世婦三塔公主會見大手髻其長公主得有步搖公主封君以上皆帶綬以采組為緄帶各如其綬色公特進列侯夫人卿校世婦二千石命婦年長者紺繒幗佐祭則皂絹上下助蠶則青絹上下自皇后至二千石命婦皆以蠶衣為朝服劉向曰古者天子至于士王后至于命婦必佩玉尊卑各有其制禮記曰天子佩白玉而玄組綬公侯山玄玉而朱組綬卿大夫水蒼玉而緇組綬士佩瓀玫而縕組綬縕赤黃色綬者所貫佩相承受也上下施韍如蔽膝貴賤亦各有殊五霸之後戰兵不息佩非兵器韍非戰儀於是解去佩韍留其繫襚而已秦乃以采組連結於襚轉相結受謂之綬漢承用之至明帝始復制佩而漢末又亡絶魏侍中王粲識其形乃復造焉今之佩粲所制也皇后至命婦所佩古制不存今與外同制秦組綬仍又施之漢制自天子至于百官無不佩刀司馬彪志具有其制漢高祖為泗水亭長拔劍斬白蛇雋不疑云劍者君子武備張衡東京賦紆黃組腰干將然則自人君至士人又帶劍也自晉代以來始以木劍代刃劍乘輿六璽秦制也漢舊儀曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽此則漢遵秦也初高祖入關得秦始皇藍田玉璽螭虎紐文曰受天之命皇帝壽昌高祖佩之後代名曰傳國璽與斬白蛇劍俱為乘輿所寶傳國璽魏晉至今不廢斬白蛇劍晉惠帝武庫火燒之今亡晉懷帝沒胡傳國璽沒於劉聰後又屬石勒及石勒弟石虎死胡亂晉穆帝代乃還天府虞喜志林曰傳國璽自在六璽之外天子凡七璽也漢注曰璽印也自秦以前臣下皆以金玉為印龍虎紐唯所好秦以來以璽為稱又獨以玉臣下莫得用漢制皇帝黃赤綬四采黃赤縹紺皇后金璽綬亦如之於禮士綬之色如此後代變古也吳無刻玉工以金為璽孫晧造金璽六枚是也又有麟鳳龜龍璽馬鴨頭雜印今代則闕也皇太子金璽龜紐纁朱綬四采赤黃縹紺給五時朝服遠遊冠亦有三梁進賢冠佩瑜玉諸王金璽龜紐纁朱綬四采赤黃縹紺給五時朝服遠遊冠亦有三梁進賢冠佩山玄玉郡公金章玄朱綬給五時朝服進賢三梁冠佩山玄玉太宰太傅太保丞相司徒司空金章紫綬給五時朝服進賢三梁冠佩山玄玉相國則緑綟綬三采緑紫紺綟草名也其色緑大司馬大將軍太尉凡將軍位從公者金章紫綬給五時朝服武冠佩山玄玉郡侯金章青朱綬給五時朝服進賢三梁冠佩水蒼玉驃騎車騎將軍凡諸將軍加大者征鎮安平中軍鎮軍撫軍前左右後將軍征虜冠軍輔國龍驤將軍金章紫綬給五時朝服武冠佩水蒼玉貴嬪夫人貴人金章文曰貴嬪夫人貴人之章紫綬佩于闐玉淑妃淑媛