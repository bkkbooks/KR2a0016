車履色無過緑青白奴婢衣食客加不得服白幘蒨絳金黃銀叉鐶鈴草保衣鉺履色無過純青諸去官及薨卒不祿物故家人所服皆得從故官之例諸王皆不得私作禁物及罽碧校鞍珠玉金銀錯刻鏤雕飾無用之物天子坐漆牀居朱屋史臣按左傳丹桓宮之楹何休注公羊亦有朱屋以居所從來久矣漆牀亦當是漢代舊儀而漢儀不載尋所以必朱必漆者其理有可言焉夫珍木嘉樹其品非一莫不植根深岨致之未易藉地廣之資因人多之力則役苦費深為敝滋重是以上古聖王采椽不之則懼刻桷雕楹莫知其限也哲人縣鑑微遠杜漸防萌知采椽不愜後代之心不不為將來之用故加朱施漆以傳厥後散木凡材皆可入用遠探幽旨將在斯乎殿屋之為圓淵方井兼植荷華者以厭火祥也古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳帶也紳垂三尺笏者有事則書之故常簪筆今之白筆是其遺象三臺五省二品文官簪之王公侯伯子男卿尹及武官不簪加內侍位者乃簪之手板則古笏矣尚書令僕射尚書手板頭復有白筆以紫皮裹之名笏朝服肩上有紫生夾囊綴之朝服外俗呼曰紫荷或云漢代以盛奏事負荷以行未詳也魏文帝黃初三年詔賜漢太尉楊彪几杖待以客禮延請之日使挾杖入朝又令著鹿皮冠彪辭讓不聽乃使服布單衣皮辨以見傅玄子曰漢末王公名士多委王服以幅巾為雅是以袁紹崔鈞之徒雖為將帥皆著木宜巾魏武以天下凶荒資財乏匱擬古皮辨裁縑帛以為爐合乎簡易隨時之義以色別其貴賤本施軍飾非為國容也徐爰曰俗說爐本未有歧荀文若巾之行觸樹枝成歧謂之為善因而弗改通以為慶弔服巾以葛為之形如爐而橫著之古尊卑共服也故漢末妖賊以黃為巾時謂之黃巾賊今國子太學生冠之服單衣以為朝服執一卷經以代手板居士野人皆服巾焉徐爰曰帽名猶冠也義取於蒙覆其首其本纚也古者有冠無幘冠下有纚以繒為之後世施幘於冠因裁纚為帽自乘輿宴居下至庶人無爵者皆服之史臣案晉成帝咸和九年制聽尚書八座丞郎門下三省侍郎乘車白帢低幘出入掖門又二宮直官著烏紗爐然則士人宴居皆著帢矣而江左時野人已著帽士人亦往往而然但其頂圓耳後乃高其屋云古者人君有朝服有祭服有宴服有弔服弔服皮辨疑衰今以單衣黑幘為宴會服拜陵亦如之以單衣白夾為弔服修敬尊秩亦服之也單衣古之深衣也今單衣裁製與深衣同唯絹帶為異深衣絹帽以居喪單衣素帢以施吉晉武帝泰始三年詔太宰安平王孚服侍中之服賜大司馬義陽王望袞冕之服四年又詔趙樂安燕王服散騎常侍之服十年賜彭城王袞冕之服僞楚桓玄將篡亦加安帝母弟太宰琅邪王袞冕服宋興以來王公貴臣加侍中散騎常侍乃得服貂璫也宋孝武孝建元年丞相南郡王義宣二年雍州刺史武昌王渾又有異圖世祖嫌侯王強盛欲加減削其年十月己未大司馬江夏王義恭驃騎大將軍竟陵王誕表改革諸王車服制度凡九條表在義恭傳上因諷有司更增廣條目奏曰車服以庸虞書茂典名器慎假春秋明誡是以尚方所制禁嚴漢律諸侯竊服雖親必罪自頃以來下僭彌盛器服裝飾樂舞音容通於王公達于衆庶上下無辨民志靡一今表之所陳實允禮度九條之格猶有未盡謹共附益凡二十四條聽事不得南向坐施帳并竹世蕃國官正冬不得跣登國殿及夾侍國師傳令及油公主王妃傳令不得朱服輿不得重杠鄣扇不得雉尾劍不得鹿盧形槊毦不得孔雀白鷩夾轂隊不得絳襖平乘誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得莊面蔽花正冬會不得鐸舞杯柈舞長蹻伎榊舒丸劍博山伎緣大橦伎升五案伎自非正冬會奏舞曲不得舞諸妃主不得著袞帶信幡非臺省官悉用絳郡縣內史相及封內官長於其封君既非在三罷官則不復追敬不合稱臣正宜上下官敬而已諸鎮常行車前後不得過六隊白直夾轂不在其限刀不得過銀銅為裝諸王女封縣主諸王子孫襲封王王之妃及封侯者夫人行並不得鹵簿諸王子繼體為王者婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子車輿不得油幢軺車不在其限平乘舫皆平兩頭作露平形不得擬像龍舟悉不得朱油帳不得作五花及豎筍形若先有器物者悉輸送臺臧書到後二十日期若有竊玩犯禁者及統司無舉糾並臨時議罪詔可車前五百者卿行旅從五百人為一旅漢氏一統故去其人留其名也宋孝武孝建二年十一月乙巳有司奏侍中祭酒何偃議自今臨軒乘輿法服燾華蓋登殿宜依廟齊以夾御侍中常侍夾扶上殿及應為王公興又夾扶畢還本位求詳議曹郎中徐爰參議宜如省所稱以為永准詔可孝建三年五月壬戌有司奏案漢胡廣蔡雍並云古者諸侯二車九乘秦滅六國兼其車服故王者大駕屬車八十一乘尚書御史乘之最後一車懸豹尾法駕則三十六乘檢晉江左逮至于今乘輿出行副車相承五乘尚書令建平王宏參議八十一乘義兼九國三十六乘無所准並不出經典自雍廣傳說又是從官所乘非帝者副車正數江左五乘儉不中禮案周官云上公九命二車九乘侯伯七命車七乘子男五命車五乘然則帝王十二乘詔可大明元年九月丁未朔有司奏未有皇太后出行副車定數下禮官議正博士王燮之議周禮后六服五路之數悉與王同則副車之制不應獨異又記云古者后立六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治天子立六官三公九卿二十七大夫八十一元士以聽天下之外治鄭注云后象王立六宮而居之亦正寢一燕寢五推所立每與王同禮無降亦明矣皇太后既禮均至極彌不應殊謂並應同十二乘通關為允詔可大明四年正月戊辰尚書左丞荀萬秋奏籍田儀注皇帝冠通天冠朱紘青介幘衣青紗袍侍中陪乘奉車郎秉轡案漢輿服志曰通天冠乘輿常服也若斯豈可以常服降千畝邪禮記曰昔者天子為籍千畝冕而朱紘躬秉耒耜鄭玄注周官司服曰六服同冕尊故也時服雖變冕制不改又潘嶽籍田賦云常伯陪乘太僕秉轡推此輿駕籍田宜冠冕璪十二旒朱紘黑介幘衣青紗袍常伯陪乘太僕秉轡宜改儀注一遵二禮以為定儀詔可大明四年正月己卯有司奏南郊親奉儀注皇帝初著平天冠火龍黼黻之服還變通天冠絳紗袍廟祠親奉舊儀皇帝初服與郊不異而還變著黑介幘單衣即事乖體謂宜同郊還亦變著通天冠絳紗袍又舊儀乘金根車今五路既備依禮玉路以祀亦宜改金根車為玉路詔可大明六年八月壬戌有司奏漢儀注大駕鹵簿公卿奉引大將軍參乘太僕卿御法駕侍中參乘奉車郎御晉氏江左大駕未立故郊祀用法駕宗廟以小駕至於儀服二駕不異拜陵御服單衣幘百官陪從朱衣而已亦謂之小駕名實乖舛考尋前記大駕上陵北郊周禮宗廟於昊天有降宜以大駕郊祀法駕祠廟小駕上陵如為從序今改祠廟為法駕鹵簿其軍幢多少臨時配之至尊乘玉路以金路象路革路木路小輦輪御軺衣書等車為副其餘並如常儀詔可大明七年二月甲寅輿駕巡南豫兗二州冕服御玉路辭二廟改服通天冠御木路建大麾備春搜之典明帝泰始四年五月甲戌尚書令建安王休仁參議天子之子與士齒讓達於辟雍無生而貴者也既命而尊禮同上公周制五等車服相涉公降王者一等而已王以金路賜同姓諸侯象及革木以賜異姓侯伯在朝卿士亦準斯禮按如此制則東宮應乘金路自晉武過江禮儀疏舛王公以下車服卑雜唯有東宮禮秩崇異上次辰極下絶侯王而皇太子乘石山安車義不見經事無所出禮所謂金玉路者正以金玉飾輅諸末耳左右前後同以漆畫秦改周輅制為金根通以金薄周匝四面漢魏二晉因循莫改逮于大明始備五輅金玉二制並類金根造次瞻覩殆無差別若錫之東儲於禮嫌重非所以崇峻陛級表示等威且春秋之義降下以兩臣子之義宜從謙約謂東宮車服宜降天子二等驂駕四馬乘象輅降龍碧旗九葉進不斥尊退不逼下沿古酌時於禮為衷詔可泰始四年八月甲寅詔曰車服之飾象數是遵故盛皇留範列聖垂制朕近改定五路酌古代今修成六服沿時變禮所施之事各有條便可付外載之典章朕以大冕純玉繅玄衣黃裳乘玉輅郊祀天宗祀明堂又以法冕五綵繅玄衣絳裳乘金路祀太廟元正大會諸侯又以飾冠冕四綵繅紫衣紅裳乘象輅小會宴饗餞送諸侯臨軒會王公又以繡冕三綵繅朱衣裳乘革路征伐不賓講武校獵又以紘冕二綵繅青衣裳乘木輅耕稼饗國子又以通天冠朱紗袍為聽政之服泰始六年正月戊辰有司奏被敕皇太子正冬朝賀合著袞冕九章衣不儀曹郎丘仲起議案周禮公自袞冕以下鄭注袞冕以至卿大夫之玄冕皆其朝聘天子之服也伏尋古之上公尚得服袞以朝皇太子以儲副之尊率土瞻仰愚謂宜式遵盛典服袞冕九旒以朝賀兼左丞陸澄議服冕以朝實著經典秦除六冕之制至漢明帝始與諸儒還備古章自魏晉以來宗廟行禮之外不欲令臣下服袞冕故位公者每加侍官今皇太子承乾作副禮絶羣后宜遵聖王之盛典革近代之陋制臣等參議依禮皇太子元正朝賀應服袞冕九章衣以仲起議為允撰載儀注詔可後廢帝即位尊所生陳貴妃為皇太妃輿服一如晉孝武太妃故事唯省五牛旗及赤旗
