body:
  text: 宋書卷十九志第九樂一易曰先王作樂崇德殷薦之上帝以配祖考自黃帝至于三代名稱不同周衰凋缺又為鄭衛所亂魏文侯雖好古然猶昏睡於古樂於是淫聲熾而雅音廢矣及秦焚典籍樂經用亡漢興樂家有制氏但能記其鏗鏘鼓舞而不能言其義周存六代之樂至秦唯餘韶武而已始皇改周舞曰五行漢高祖改韶舞曰文始以示不相襲也又造武德舞舞人悉執干戚以象天下樂己行武以除亂也故高祖廟奏武德文始五行之舞周又有房中之樂秦改曰壽人其聲楚聲也漢高好之孝惠改曰安世高祖又作昭容樂禮容樂昭容生於武德禮容生於文始五行也漢初又有嘉至樂叔孫通因秦樂人制宗廟迎神之樂也文帝又自造四時舞以明天下之安和蓋樂先王之樂者明有法也樂己所自作者明有制也孝景采武德舞作昭德舞薦之太宗之廟孝宣采昭德舞為盛德舞薦之世宗之廟漢諸帝奏文始四時五行之舞焉武帝時河間獻王與毛生等共采周官及諸子言樂事者以著樂記獻八佾之舞與制氏不相殊其內史中丞王定傳之以授常山王禹禹成帝時為謁者數言其義獻記二十四卷劉向校書得二十三篇然竟不用也至明帝初東平憲王蒼總定公卿之議曰宗廟宜各奏樂不應相襲所以明功德也承文始五行武德為大武之舞又制舞哥一章薦之光武之廟漢末大亂衆樂淪缺魏武平荊州獲杜夔善八音嘗為漢雅樂郎尤悉樂事於是以為軍謀祭酒使創定雅樂時又有鄧靜尹商善訓雅樂哥師尹胡能哥宗廟郊祀之曲舞師馮肅服養曉知先代諸舞夔悉總領之遠考經籍近采故事魏復先代古樂自夔始也而左延年等妙善鄭聲惟夔好古存正焉文帝黃初二年改漢巴渝舞曰昭武舞改宗廟安世樂曰正世樂嘉至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳳翔舞育命舞曰靈應舞武德舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其衆哥詩多即前代之舊唯魏國初建使王粲改作登哥及安世巴渝詩而已明帝太和初詔曰禮樂之作所以類物表庸而不忘其本者也凡音樂以舞為主自黃帝雲門以下至於周大武皆太廟舞名也然則其所司之官皆曰太樂所以總領諸物不可以一物名武皇帝廟樂未稱其議定廟樂及舞舞者所執綴兆之制聲哥之詩務令詳備樂官自如故為太樂太樂漢舊名後漢依讖改太豫樂官至是改復舊於是公卿奏曰臣聞德盛而化隆者則樂舞足以象其形容音聲足以發其哥詠故薦之郊廟而鬼神享其和用之朝廷則君臣樂其度使四海之內遍知至德之盛而光輝日新者禮樂之謂也故先王殷薦上帝以配祖考蓋當其時而制之矣周之末世上去唐虞幾二千年韶簫南籥武象之樂風聲遺烈皆可得而論也由斯言之禮樂之事弗可以已今太祖武皇帝樂宜曰武始之樂武神武也武又跡也言神武之始又王跡所起也高祖文皇帝樂宜曰咸熙之舞咸皆也熙興也言應受命之運天下由之皆興也至於羣臣述德論功建定烈祖之稱而未制樂舞非所以昭德紀功夫哥以詠德舞以象事於文文武為斌兼秉文武聖德所以章明也臣等謹制樂舞名章斌之舞昔簫韶九奏親於虞帝之庭武象大武亦振於文武之阼特以顯其德教著其成功天下被服其光輝習詠其風聲者也自漢高祖文帝各逮其時而為武德四時之舞上考前代制作之宜以當今成業之美播揚弘烈莫盛於章斌焉樂志曰鐘磬干戚所以祭先王之廟又所以獻酬酳酢也在宗廟之中君臣莫不致敬族長之中長幼無不從和故仲尼答賓牟賈之問曰周道四達禮樂交通傳云魯有禘樂賓祭用之此皆祭禮大享通用盛樂之明文也今有事於天地宗廟則此三舞宜並以為薦享及臨朝大享亦宜舞之然後乃合古制事神訓民之道關於萬世其義益明又臣等思惟三舞宜有總名可名大鈞之樂鈞平也言大魏三世同功以至隆平也於名為美於義為當尚書奏宜如所上帝初不許制章斌之樂三請乃許之於是尚書又奏祀圓丘以下武始舞者平冕黑介幘玄衣裳白領袖絳領袖中衣絳合幅袴絳糸末黑韋鞮咸熙舞者冠委貌其餘服如前章斌舞者與武始咸熙舞者同服奏於朝庭則武始舞者武冠赤介幘生絳袍單衣絳領袖皂領袖中衣虎文畫合幅袴白布黑韋鞮咸熙舞者進賢冠黑介幘生黃袍單衣白合幅袴其餘服如前奏可史臣案武始咸熙二舞冠制不同而云章斌與武始咸熙同服不知服何冠也侍中繆襲又奏安世哥本漢時哥名今詩哥非往時之文則宜變改案周禮注云安世樂猶周房中之樂也是以往昔議者以房中哥后妃之德所以風天下正夫婦宜改安世之名曰正始之樂自魏國初建故侍中王粲所作登哥安世詩專以思詠神靈及說神靈鑒享之意襲後又依哥省讀漢安世哥詠亦說高張四縣神來燕享嘉薦令儀永受厥福無有二南后妃風化天下之言今思惟往者謂房中為后妃之歌者恐失其意方祭祀娛神登堂哥先祖功德下堂哥詠燕享無事哥后妃之化也自宜依其事以名其樂哥改安世哥曰享神哥奏可案文帝已改安世為正始而襲至是又改安世為享神未詳其義王粲所造安世詩今亡襲又奏曰文昭皇后廟置四縣之樂當銘顯其均奏次第依太祖廟之名號曰昭廟之具樂尚書奏曰禮婦人繼夫之爵同牢配食者樂不異文昭皇后今雖別廟至於宮縣樂器音均宜如襲議奏可散騎常侍王肅議曰王者各以其禮制事天地今說者據周官單文為經國大體懼其局而不知弘也漢武帝東巡封禪還祠太一于甘泉祭后土于汾陰皆盡用其樂言盡用者為盡用宮縣之樂也天地之性貴質者蓋謂其器之不文爾不謂庶物當復減之也禮天子宮縣舞八佾今祀圓丘方澤宜以天子制設宮縣之樂八佾之舞衛臻繆襲左延年等咸同肅議奏可肅又議曰說者以為周家祀天唯舞雲門祭地唯舞咸池宗廟唯舞大武似失其義矣周禮賓客皆作備樂左傳王子頽享五大夫樂及遍舞六代之樂也然則一會之日具作六代樂矣天地宗廟事之大者賓客燕會比之為細王制曰庶羞不踰牲燕衣不踰祭服可以燕樂而踰天地宗廟之樂乎周官以六律六呂五聲八音六舞大合樂以致鬼神以和邦國以諧萬民以安賓客以說遠人夫六律六呂五聲八音皆一時而作之至於六舞獨分擘而用之所以不厭人心也又周官韎師掌教樂祭祀則帥其屬而舞之大享亦如之韎東夷之樂也又鞮鞻氏掌四夷之樂與其聲哥祭祀則吹而哥之燕亦如之四夷之樂乃入宗廟先代之典獨不得用大享及燕日如之者明古今夷夏之樂皆主之於宗廟而後播及其餘也夫作先王樂者貴能包而用之納四夷之樂者美德廣之所及也高皇帝太皇帝太祖高祖文昭廟皆宜兼用先代及武始大鈞之舞有司奏宜如肅議奏可肅私造宗廟詩頌十二篇不被哥晉武帝泰始二年改制郊廟哥其樂舞亦仍舊也漢光武平隴蜀增廣郊祀高皇帝配食樂奏青陽朱明西皓玄冥雲翹育命之舞北郊及祀明堂並奏樂如南郊迎時氣五郊春哥青陽夏哥朱明並舞雲翹之舞秋哥西皓冬哥玄冥並舞育命之舞季夏哥朱明兼舞二舞章帝元和二年宗廟樂故事食舉有鹿鳴承元氣二曲三年自作詩四篇一曰思齊皇姚二曰六騏驎三曰竭肅雍四曰陟叱根合前六曲以為宗廟食舉加宗廟食舉重來上陵二曲合八曲為上陵食舉減宗廟食舉承元氣一曲加惟天之命天之曆數二曲合七曲為殿中御食飯舉又漢太樂食舉十三曲一曰鹿鳴二曰重來三曰初造四曰俠安五曰歸來六曰遠期七曰有所思八曰明星九曰清涼十曰涉大海十一曰大置酒十二曰承元氣十三曰海淡淡魏氏及晉荀勗傅玄並為哥辭魏時以遠期承元氣海淡淡三曲多不通利省之魏雅樂四曲一曰鹿鳴後改曰於赫詠武帝二曰騶虞後改曰巍巍詠文帝三曰伐檀後省除四曰文王後改曰洋洋詠明帝騶虞伐檀文王並左延年改其聲正旦大會太尉奉璧羣后行禮東箱雅樂郎作者是也今謂之行禮曲姑洗箱所奏按鹿鳴本以宴樂為體無當於朝享往時之失也晉武泰始五年尚書奏使太僕傅玄中書監荀勗黃門侍郎張華各造正旦行禮及王公上壽酒食舉樂哥詩詔又使中書郎成公綏亦作張華表曰按魏上壽食舉詩及漢氏所施用其文句長短不齊未皆合古蓋以依詠弦節本有因循而識樂知音足以制聲度曲法用率非凡近所能改二代三京襲而不變雖詩章詞異興廢隨時至其韻逗曲折皆繫於舊有由然也是以一皆因就不敢有所改易荀勗則曰魏氏哥詩或二言或三言或四言或五言與古詩不類以問司律中郎將陳頎頎曰被之金石未必皆當故勗造晉哥皆為四言唯王公上壽酒一篇為三言五言此則華勗所明異旨也九年荀勗遂典知樂事使郭瓊宋識等造正德大豫之舞而勗及傅玄張華又各造此舞哥詩勗作新律笛十二枚散騎常侍阮咸譏新律聲高高近哀思不合中和勗以其異己出咸為始平相晉又改魏昭武舞曰宣武舞羽籥舞曰宣文舞咸寧元年詔定祖宗之號而廟樂同用正德大豫之舞至江左初立宗廟尚書下太常祭祀所用樂名太常賀循答云魏氏增損漢樂以為一代之禮未審大晉樂名所以為異遭離喪亂舊典不存然此諸樂皆和之以鍾律文之以五聲詠之於哥詞陳之於舞列宮縣在下琴瑟在堂八音迭奏雅樂並作登哥下管各有常詠周人之舊也自漢氏以來依放此禮自造新詩而已舊京荒廢今既散亡音韻曲折又無識者則於今難以意言于時以無雅樂器及伶人省太樂并鼓吹令是後頗得登哥食舉之樂猶有未備明帝太寧末又詔阮孚等增益之成帝咸和中乃復置太樂官鳩集遺逸而尚未有金石也初荀勗既以新律造二舞又更修正鍾磬事未竟而勗薨惠帝元康三年詔其子黃門侍郎藩修定金石以施郊廟尋值喪亂遺聲舊制莫有記者庾亮為荊州與謝尚共為朝廷修雅樂亮尋薨庾翼桓溫專事軍旅樂器在庫遂至朽壞焉晉氏之亂也樂人悉沒戎虜及胡亡鄴下樂人頗有來者謝尚時為尚書僕射因之以具鍾磬太元中破苻堅又獲樂工楊蜀等間練舊樂於是四箱金石始備焉宋文帝元嘉九年太樂令鍾宗之更調金石十四年治書令史奚縱又改之語在律曆志晉世曹毗王珣等亦增造宗廟哥詩然郊祀遂不設樂何承天曰世咸傳吳朝無雅樂案孫晧迎父喪明陵唯云倡伎晝夜不息則無金石登哥可知矣承天曰或云今之神絃孫氏以為宗廟登哥也史臣案陸機孫權誄肆夏在廟雲翹承囗機不容虛設此言又韋昭孫休世上鼓吹鐃哥十二曲表曰當付樂官善哥者習哥然則吳朝非無樂官善哥者乃能以哥辭被絲管寧容止以神絃為廟樂而已乎宋武帝永初元年七月有司奏皇朝肇建廟祀應設雅樂太常鄭鮮之等八十八人各撰立新哥黃門侍郎王韶之所撰哥辭七首並合施用詔可十二月有司又奏依舊正旦設樂參詳屬三省改太樂諸哥舞詩黃門侍郎王韶之立三十二章合用教試日近宜逆誦習輒申攝施行詔可又改正德舞曰前舞大豫舞曰後舞元嘉十八年九月有司奏二郊宜奏登哥又議宗廟舞事録尚書江夏王義恭等十二人立議同未及列奏值軍興事寢二十二年南郊始設登哥詔御史中丞顏延之造哥詩廟舞猶闕孝建二年九月甲午有司奏前殿中曹郎荀萬秋議按禮祭天地有樂者為降神也故易曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考周官曰作樂於圜丘之上天神皆降作樂於方澤之中地祇皆出又曰乃奏黃鍾哥大呂舞雲門以祀天神乃奏大簇哥應鍾舞咸池以祀地祇由斯而言以樂祭天地其來尚矣今郊享闕樂竊以為疑祭統曰夫祭有三重焉獻之屬莫重於祼聲莫重於升哥舞莫重於武宿夜此周道也至於秦奏五行魏舞咸熙皆以用享爰逮晉氏泰始之初傅玄作晉郊廟哥詩三十二篇元康中荀藩受詔成父勗業金石四縣用之郊廟是則相承郊廟有樂之證也今廟祠登哥雖奏而象舞未陳懼闕備禮夫聖王經世異代同風雖損益或殊降殺迭運未嘗不執古御今同規合矩方茲休明在辰文物大備禮儀遺逸罔不具舉而況出祇降神輟樂於郊祭昭德舞功有闕於廟享謂郊廟宜設備樂於是使內外博議驃騎大將軍竟陵王誕等五十一人並同萬秋議尚書左僕射建平王宏議以為聖王之德雖同創制之禮或異樂不相沿禮無因襲自寶命開基皇符在運業富前王風通振古朝儀國章並循先代自後晉東遷日不暇給雖大典略備遺闕尚多至於樂號廟禮未該往正今帝德再昌大孝御宇宜討定禮本以昭來葉尋舜樂稱韶漢改文始周樂大武秦革五行眷夫祖有功而宗有德故漢高祖廟樂稱武德太宗廟樂曰昭德魏制武始舞武廟制咸熙舞文廟則祖宗之廟別有樂名晉氏之樂正德大豫及宋不更名直為前後二舞依據昔代義舛事乖今宜釐改權稱以凱容為韶舞宣烈為武舞祖宗廟樂總以德為名若廟非不毀則樂無別稱猶漢高文武咸有嘉號惠景二主樂無餘名章皇太后廟依諸儒議唯奏文樂何休杜預范寧注初獻六羽並不言佾者佾則干在其中明婦人無武事也郊祀之樂無復別名仍同宗廟而已尋諸漢志永至等樂各有義況宜仍舊不改爰及東晉太祝唯送神而不迎神近議者或云廟以居神如在也不應有迎送之事意以為並乖其衷立廟居靈四時致享以申孝思之情夫神升降無常何必安所處故祭義云樂以迎來哀以送往鄭注云迎來而樂樂親之來送往而哀哀其享否不可知也尚書曰祖考來格漢書安世房中歌曰神來宴娛詩云三后在天又詩云神保遹歸注曰歸於天地也此並言神有去來則有送迎明矣即周肆夏之名備迎送之樂古以尸象神故儀禮祝有迎尸送尸近代雖無尸豈可闕迎送之禮又傅玄有迎神送神哥辭明江左不迎非舊典也散騎常侍丹陽尹建城縣開國侯顏竣議以為德業殊稱則干羽異容時無沿制故物有損益至於禮失道愆稱習忘反中興釐運視聽所革先代繆章宜見刊正郊之有樂蓋生周易周官歷代著議莫不援准夫掃地而祭器用陶匏唯質與誠以章天德文物之備理固不然周官曰國有故則旅上帝及四望又曰四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望四望非地則知上帝非天孝經云郊祀后稷以配天宗祀文王於明堂以配上帝則豫之作樂非郊天也大司樂職奏黃鍾哥大呂舞雲門以祀天神鄭注天神五帝及日月星辰也王者以夏正月祀其所受命之帝於南郊則二至之祀又非天地考之衆經郊祀有樂未見明證宗廟之禮事炳載籍爰自漢元迄乎有晉雖時或更制大抵相因為不襲名號而已今樂曲淪滅知音世希改作之事臣聞其語正德大豫禮容具存宜殊其徽號飾而用之以正德為宣化之舞大豫為興和之舞庶足以光表世烈悅被後昆前漢祖宗廟處各異主名既革舞號亦殊今七廟合食庭殿共所舞蹈之容不得廟有別制後漢東平王蒼已議之矣又王肅韓祗以王者德廣無外六代四夷之舞金石絲竹之樂宜備奏宗廟愚謂蒼肅祗議合於典禮適於當今左僕射建平王宏又議竣據周禮孝經天與上帝連文重出故謂上帝非天則易之作樂非為祭天也按易稱先王以作樂崇德殷薦之上帝以配祖考尚書云肆類于上帝春秋傳曰告昊天上帝凡上帝之言無非天也天尊不可以一稱故或謂昊天或謂上帝或謂昊天上帝不得以天有數稱便謂上帝非天徐邈推周禮國有故則旅上帝以知禮天旅上帝同是祭天言禮天者謂常祀也旅上帝者有故而祭也孝經稱嚴父莫大於配天故云郊祀后稷以配天宗祀文王於明堂以配上帝既天為議則上帝猶天益明也不欲使二天文同故變上帝爾周禮祀天之言再見故鄭注以前天神為五帝後冬至所祭為昊天竣又云二至之祀又非天地未知天地竟應以何時致享記云掃地而祭器用陶匏旨明所用質素無害以樂降神萬秋謂郊宜有樂事有典據竣又云東平王蒼以為前漢諸祖別廟是以祖宗之廟可得各有舞樂至於祫祭始祖之廟則專用始祖之舞故謂後漢諸祖共廟同庭雖有祖宗不宜入別舞此誠一家之意而未統適時之變也後漢從儉故諸祖共廟猶以異室存別廟之禮晉氏以來登哥誦美諸室繼作至於祖宗樂舞何猶不可迭奏苟所詠者殊雖復共庭亦非嫌也魏三祖各有舞樂豈復是異廟邪衆議並同宏祠南郊迎神奏肆夏皇帝初登壇奏登哥初獻奏凱容宣烈之舞送神奏肆夏祠廟迎神奏肆夏皇帝入廟門奏永至皇帝詣東壁奏登哥初獻奏凱容宣烈之舞終獻奏永安送神奏肆夏詔可孝建二年十月辛未有司又奏郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登哥不及三公行事左僕射建平王宏重參議公卿行事亦宜奏登哥有司又奏元會及二廟齊祠登哥依舊並於殿庭設作尋廟祠依新儀注登哥人上殿弦管在下今元會登哥人亦上殿弦管在下並詔可文帝章太后廟未有樂章孝武大明中使尚書左丞殷淡造新哥明帝又自造昭太后宣太后哥詩後漢正月旦天子臨德陽殿受朝賀舍利從西方來戲於殿前激水化成比目魚跳躍嗽水作霧翳日畢又化成黃龍長八九丈出水遊戲炫耀日光以兩大絲繩繫兩柱頭相去數丈兩倡女對舞行於繩上相逢切肩而不傾魏晉訖江左猶有夏育扛鼎巨象行乳神龜抃舞背負靈嶽桂樹白雪畫地成川之樂焉晉成帝咸康七年散騎侍郎顧臻表曰臣聞聖王制樂贊揚治道養以仁義防其邪淫上享宗廟下訓黎民體五行之正音協八風以陶氣以宮聲正方而好義角聲堅齊而率禮弦哥鍾鼓金石之作備矣故通神至化有率舞之感移風改俗致和樂之極末世之伎設禮外之觀逆行連倒頭足入筥之屬皮膚外剝肝心內摧敦彼行葦猶謂勿踐矧伊生民而不惻愴加以四海朝覲言觀帝庭耳聆雅頌之聲目覩威儀之序足以踏天頭以履地反兩儀之順傷彝倫之大方今夷狄對岸外御為急兵食七升忘身赴難過泰之戲日禀五斗方掃神州經略中甸若此之事不可示遠宜下太常纂備雅樂簫韶九成惟新於盛運功德頌聲永著于來葉此乃詩所以燕及皇天克昌厥後者也雜伎而傷人者皆宜除之流簡儉之德邁康哉之詠清風既行民應如草此之謂也愚管之誠唯垂采察於是除高絙紫鹿跂行鱉食及齊王捲衣笮兒等樂又減其禀其後復高絙紫鹿焉宋文帝元嘉十三年司徒彭城王義康於東府正會依舊給伎總章工馮大列相承給諸王伎十四種其舞伎三十六人太常傅隆以為未詳此人數所由唯杜預注左傳佾舞云諸侯六六三十六人常以為非夫舞者所以節八音者也八音克諧然後成樂故必以八人為列自天子至士降殺以兩兩者減其二列爾預以為一列又減二人至士止餘四人豈復成樂按服虔注傳云天子八八諸侯六八大夫四八士二八其義甚允今諸王不復舞佾其總章舞伎即古之女樂也殿庭八八諸王則應六八理例坦然又春秋鄭伯納晉悼公女樂二八晉以一八賜魏絳此樂以八人為列之證也若如議者唯天子八則鄭應納晉二六晉應賜絳一六也自天子至士其文物典章尊卑差級莫不以兩未有諸侯既降二列又一列輒減二人近降太半非唯八音不具於兩義亦乖杜氏之謬可見矣國典事大宜令詳正事不施行民之生莫有知其始也含靈抱智以生天地之間夫喜怒哀樂之情好得惡失之性不學而能不知所以然而然者也怒則爭鬬喜則詠哥夫哥者固樂之始也詠哥不足乃手之舞之足之蹈之然則舞又哥之次也詠哥舞蹈所以宣其喜心喜而無節則流淫莫反故聖人以五聲和其性以八音節其流而謂之樂故能移風易俗平心正體焉昔有娀氏有二女居九成之臺天帝使燕夜往二女覆以玉筐既而發視之燕遺二卵五色北飛不反二女作哥始為北音禹省南土嵞山之女令其妾候禹於嵞山之陽女乃作哥始為南音夏后孔甲田於東陽萯山天大風晦冥迷入民室主人方乳或曰后來是良日也必大吉或曰不勝之子必有殃后乃取以歸曰以為余子誰敢殃之後析橑斧破斷其足孔甲曰嗚呼有命矣乃作破斧之哥始為東音周昭王南征殞於漢中王右辛餘靡長且多力振王北濟周公乃封之西翟徙宅西河追思故處作哥始為西音此蓋四方之哥也黃帝帝堯之世王化下洽民樂無事故因擊壤之歡慶雲之瑞民因以作哥其後風衰雅缺而妖淫靡漫之聲起周衰有秦青者善謳而薛談學謳於秦青未窮青之伎而辭歸青餞之於郊乃撫節悲歌聲震林木響遏行雲薛談遂留不去以卒其業又有韓娥者東之齊至雍門匱糧乃鬻哥假食既而去餘響繞梁三日不絶左右謂其人不去也過逆旅逆旅人辱之韓娥因曼聲哀哭一里老幼悲愁垂涕相對三日不食遽而追之韓娥還復為曼聲長哥一里老幼喜躍抃舞不能自禁忘向之悲也乃厚賂遣之故雍門之人善哥哭效韓娥之遺聲衛人王豹處淇川善謳河西之民皆化之齊人綿駒居高唐善哥齊之右地亦傳其業前漢有虞公者善哥能令梁上塵起若斯之類並徒哥也爾雅曰徒哥曰謠凡樂章古詞今之存者並漢世街陌謠謳江南可采蓮烏生十五白頭吟之屬是也吳哥雜曲並出江東晉宋以來稍有增廣子夜哥者有女子名子夜造此聲晉孝武太元中琅邪王軻之家有鬼哥子夜殷允為豫章時豫章僑人庾僧度家亦有鬼哥子夜殷允為豫章亦是太元中則子夜是此時以前人也鳳將雛哥者舊曲也應璩百一詩云為作陌上桑反言鳳將雛然則鳳將雛其來久矣將由訛變以至於此乎前溪哥者晉車騎將軍沈充所制阿子及歡聞哥者晉穆帝升平初哥畢輒呼阿子汝聞不語在五行志後人演其聲以為二曲團扇哥者晉中書令王珉與嫂婢有情愛好甚篤嫂捶撻婢過苦婢素善哥而珉好捉白團扇故制此哥督護哥者彭城內史徐逵之為魯軌所殺宋高祖使府內直督護丁旿收斂殯埋之逵之妻高祖長女也呼旿至閣下自問斂送之事每問輒歎息曰丁督護其聲哀切後人因其聲廣其曲焉懊哥者晉隆安初民間訛謠之曲語在五行志宋少帝更制新哥太祖常謂之中朝曲六變諸曲皆因事制哥長史變者司徒左長史王廞臨敗所制讀曲哥者民間為彭城王義康所作也其哥云死罪劉領軍誤殺劉第四是也凡此諸曲始皆徒哥既而被之弦管又有因弦管金石造哥以被之魏世三調哥詞之類是也古者天子聽政使公卿大夫獻詩耆艾修之而後王斟酌焉秦漢闕采詩之官哥詠多因前代與時事既不相應且無以垂示後昆漢武帝雖頗造新哥然不以光揚祖考崇述正德為先但多詠祭祀見事及其祥瑞而已商周雅頌之體闕焉鞞舞未詳所起然漢代已施於燕享矣傅毅張衡所賦皆其事也曹植鞞舞哥序曰漢靈帝西園故事有李堅者能鞞舞遭亂西隨段煨先帝聞其舊有技召之堅既中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新哥五篇不敢充之黃門近以成下國之陋樂焉晉鞞舞哥亦五篇又鐸舞哥一篇幡舞哥一篇鼓舞伎六曲並陳於元會今幡鼓哥詞猶存舞並闕鞞舞即今之鞞扇舞也又云晉初有杯槃舞公莫舞史臣按杯槃今之齊世寧也張衡舞賦云歷七槃而縱躡王粲七釋云七槃陳於廣庭近世文士顏延之云遞間關於槃扇鮑昭云七槃起長袖皆以七槃為舞也搜神記云晉太康中天下為晉世寧舞矜手以接杯槃反覆之此則漢世唯有槃舞而晉加之以杯反覆之也公莫舞今之巾舞也相傳云項莊劍舞項伯以袖隔之使不得害漢高祖且語莊云公莫古人相呼曰公云莫害漢王也今之用巾蓋像項伯衣袖之遺式按琴操有公莫渡河曲然則其聲所從來已久俗云項伯非也江左初又有拂舞舊云拂舞吳舞檢其哥非吳詞也皆陳於殿庭揚泓拂舞序曰自到江南見白符舞或言白鳩舞云有此來數十年察其詞旨乃是吳人患孫晧虐政思屬晉也又有白紵舞按舞詞有巾袍之言紵本吳地所出宜是吳舞也晉俳歌又云皎皎白緒節節為雙吳音呼緒為紵疑白紵即白緒鞞舞故二八桓玄將即真太樂遣衆伎尚書殿中郎袁明子啓增滿八佾相承不復革宋明帝自改舞曲哥詞並詔近臣虞和並作又有西傖羌胡諸雜舞隨王誕在襄陽造襄陽樂南平穆王為豫州造壽陽樂荊州刺史沈攸之又造西烏飛哥曲並列於樂官哥詞多淫哇不典正前世樂飲酒酣必起自舞詩云屢舞仙仙是也宴樂必舞但不宜屢爾譏在屢舞不譏舞也漢武帝樂飲長沙定王舞又是也魏晉已來尤重以舞相屬所屬者代起舞猶若飲酒以杯相屬也謝安舞以屬桓嗣是也近世以來此風絶矣孝武大明中以鞞拂雜舞合之鍾石施於殿庭順帝升明二年尚書令王僧虔上表言之並論三調哥曰臣聞風雅之作由來尚矣大者繫乎興衰其次者著於率舞在於心而木石感鏗鏘奏而國俗移故鄭相出郊辨聲知戚延陵入聘觀樂知風是則音不妄啓曲豈徒奏哥倡既設休戚已徵清濁是均山琴自應斯乃天地之靈和升降之明節今帝道四達禮樂交通誠非寡陋所敢裁酌伏以三古缺聞六代潛響舞詠與日月偕湮精靈與風雲俱滅追餘操而長懷撫遺器而太息此則然矣夫鍾縣之器以雅為用凱容之制八佾為體故羽籥擊拊以相諧應季氏獲誚將在於此今總章舊佾二八之流袿服既殊曲律亦異推今校古皎然可知又哥鍾一肆克諧女樂以哥為稱非雅器也大明中即以宮縣合和鞞拂節數雖會慮乖雅體將來知音或譏聖世若謂鍾舞已諧不欲廢罷別立哥鍾以調羽佾止於別宴不關朝享四縣所奏謹依雅則斯則舊樂前典不墜於地臣昔已制哥磬猶在樂官具以副鍾配成一部即義沿理如或可安又今之清商實由銅雀二魏氏三祖風流可懷京洛相高江左彌重諒以金縣干戚事絶於斯而情變聽改稍復零落十數年間亡者將半自頃家競新哇人尚謠俗務在噍危不顧律紀流宕無涯未知所極排斥典正崇長煩淫士有等差無故不可以去禮樂有攸序長幼不可以共聞故喧醜之製日盛於廛里風味之韻獨盡於衣冠夫川震社亡同災異戒哀思靡漫異世齊歡咎徵不殊而欣畏並用竊所未譬也方今塵靜畿中波恬海外雅頌得所實在茲辰臣以為宜命典司務勤課習緝理舊聲迭相開曉凡所遺漏悉使補拾曲全者祿厚藝敏者位優利以動之則人思自勸風以靡之可不訓自革反本還源庶可跂踵詔曰僧虔表如此夫鍾鼓既陳雅頌斯辨所以憓感人祇化動翔泳頃自金籥弛韻羽佾未凝正俗移風良在茲日昔阮咸清識王度昭奇樂緒增修異世同功矣便可付外遵詳樂器凡八音曰金曰石曰土曰革曰絲曰木曰匏曰竹八音一曰金金鍾也鎛也錞也鐲也鐃也鐸也鍾者世本云黃帝工人垂所造爾雅云大鍾曰鏞書曰笙鏞以間是也中者曰剽剽音瓢小者曰棧棧音盞晉江左初所得棧鍾是也縣鍾磬者曰筍虡橫曰筍從曰虡蔡雍曰寫鳥獸之形大聲有力者以為鍾虡清聲無力者以為磬虡擊其所縣知由其虡鳴焉鎛如鍾而大史臣案前代有大鍾若周之無射非一皆謂之鍾鎛之言近代無聞焉錞錞于也圜如碓頭大上小下今民間猶時有其器周禮以金錞和鼓鐲鉦也形如小鍾軍行鳴之以為鼓節周禮以金鐲節鼓鐃如鈴而無舌有柄執而鳴之周禮以金鐃止鼓漢鼓吹曲曰鐃哥鐸大鈴也周禮以金鐸通鼓八音二曰石石磬也世本云叔所造不知叔何代人爾雅曰形似犂錧以玉為之大曰毊毊音囂八音三曰土土塤也世本云暴新公所造亦不知何代人也周畿內有暴國豈其時人乎燒土為之大如鵝卵鋭上平底形似稱錘六孔爾雅云大者曰土郎等小者如雞子八音四曰革革鼓也鞉也節也大曰鼓小曰朄又曰應應劭風俗通曰不知誰所造以桴擊之曰鼓以手搖之曰鞉鼓及鞉之八面者曰雷鼓雷鞉六面者曰靈鼓靈鞉四面者曰路鼓路鞉周禮以雷鼓祀天神以靈鼓鼓社祭以路鼓鼓鬼享鼓長八尺者鼖鼓以鼓軍事長丈二尺者曰鼛鼓凡守備及役事則鼓之今世謂之下鼜鼜周禮音戚今世音切豉反長六尺六寸者曰晉鼓金奏則鼓之應鼓在大鼓側詩云應朄懸鼓是也小鼓有柄曰鞀大鞀謂之鞞月令仲夏修鞀鞞是也然則鞀鞞即鞉類也又有鼉鼓焉節不知誰所造傅玄節賦云黃鍾唱哥九韶興舞口非節不詠手非節不拊此則所從來亦遠矣八音五曰絲絲琴瑟也筑也箏也琵琶空侯也琴馬融笛賦云宓羲造琴世本云神農所造爾雅大琴曰離二十絃今無其器齊桓曰號鍾楚莊曰繞梁相如曰燋尾伯喈曰緑綺事出傅玄琴賦世云燋尾是伯喈琴伯喈傳亦云爾以傅氏言之則非伯喈也瑟馬融笛賦云神農造瑟世本宓羲所造爾雅云瑟二十七絃者曰灑今無其器筑不知誰所造史籍唯云高漸離善擊筑箏秦聲也傅玄箏賦序曰世以為蒙恬所造今觀其體合法度節究哀樂乃仁智之器豈亡國之臣所能關思哉風俗通則曰筑身而瑟絃不知誰所改作也琵琶傅玄琵琶賦曰漢遣烏孫公主嫁昆彌念其行道思慕故使工人裁箏筑為馬上之樂欲從方俗語故名曰琵琶取其易傳於外國也風俗通云以手琵琶因以為名杜摯云長城之役弦鼗而鼓之並未詳孰實其器不列四廂空侯初名坎侯漢武帝賽滅南越祠太一后土用樂令樂人侯暉依琴作坎侯言其坎坎應節奏也侯者因工人姓爾後言空音訛也古施郊廟雅樂近世來專用於楚聲宋孝武帝大明中吳興沈懷遠被徙廣州造繞梁其器與空侯相似懷遠後亡其器亦絶八音六曰木木柷也敔也並不知誰所造樂記曰聖人作為椌楬塤篪所起亦遠矣柷如漆筒方二尺四寸深尺八寸中有椎柄連底挏之今左右擊敔狀如伏虎背上有二十七鉏鋙以竹長尺名曰籈橫擽之以節樂終也八音七曰匏匏笙也竽也笙隨所造不知何代人列管匏內施簧管端宮管在中央三十六簧曰竽宮管在左傍十九簧至十三簧曰笙其它皆相似也竽今亡大笙謂之巢小者謂之和其笙中之簧女媧所造也詩傳云吹笙則簧鼓矣蓋笙中之簧也爾雅曰笙十九簧者曰巢漢章帝時零陵文學奚景於舜祠得笙白玉管後世易之以竹乎八音八曰竹竹律也呂也簫也管也篪也籥也笛也律呂在律曆志簫世本云舜所造爾雅曰編二十三管長尺四寸者曰山犮十六管長尺二寸者筊筊音爻凡簫一名籟前世有洞簫其器今亡蔡雍曰簫編竹有底然則雍時無洞簫矣管爾雅曰長尺圍寸併漆之有底大者曰簥簥音驕中者曰篞小者曰篎篎音妙古者以玉為管舜時西王母獻白玉琯是也月令均琴瑟管簫蔡雍章句曰管者形長尺圍寸有孔無底其器今亡篪世本云暴新公所造舊志云一曰管史臣案非也雖不知暴新公何代人而非舜前人明矣舜時西王母獻管則是已有其器新公安得造篪乎爾雅曰篪大者尺四寸圍三寸曰沂沂音銀一名翹小者尺二寸今有胡篪出於胡吹非雅器也籥不知誰所造周禮有籥師掌教國子秋冬吹籥今凱容宣烈舞所執羽籥是也蓋詩所云左手執籥右手秉翟者也爾雅云籥如笛三孔而短小廣雅云七孔大者曰産中者曰仲小者曰箹箹音握笛案馬融長笛賦此器起近世出於羌中京房備其五音又稱丘仲工其事不言仲所造風俗通則曰丘仲造笛武帝時人其後更有羌笛爾三說不同未詳孰實鹿各杜摯笳賦云李伯陽入西戎所造漢舊注曰箛號曰吹鞭晉先蠶儀注三車駕住吹小箛發吹大箛箛即鹿各也又有胡笳漢舊箏笛録有其曲不記所出本末鼓吹蓋短簫鐃哥蔡雍曰軍樂也黃帝岐伯所作以揚德建武勸士諷敵也周官曰師有功則愷樂左傳曰晉文公勝楚振旅凱而入司馬法曰得意則愷樂愷哥雍門周說孟嘗君鼓吹于不測之淵說者云鼓自一物吹自竽籟之屬非簫鼓合奏別為一樂之名也然則短簫鐃哥此時未名鼓吹矣應劭漢鹵簿圖唯有騎執箛箛即笳不云鼓吹而漢世有黃門鼓吹漢享宴食舉樂十三曲與魏世鼓吹長簫同長簫短簫伎録並云絲竹合作執節者哥又建初録云務成黃爵玄雲遠期皆騎吹曲非鼓吹曲此則列於殿庭者為鼓吹今之從行鼓吹為騎吹二曲異也又孫權觀魏武軍作鼓吹而還此又應是今之鼓吹魏晉世又假諸將帥及牙門曲蓋鼓吹斯則其時謂之鼓吹矣魏晉世給鼓吹甚輕牙門督將五校悉有鼓吹晉江左初臨川太守謝摛每寢輒夢聞鼓吹有人為其占之曰君不得生鼓吹當得死鼓吹爾摛擊杜韜戰沒追贈長水校尉葬給鼓吹焉謝尚為江夏太守詣安西將軍庾翼於武昌咨事翼與尚射曰卿若破的當以鼓吹相賞尚射破的便以其副鼓吹給之今則甚重矣角書記所不載或云出羌胡以驚中國馬或云出吳越舊志云古樂有籟缶今並無史臣按爾雅籟自是簫之一名耳詩云坎其擊缶毛傳曰盎謂之缶築城相杵者出自梁孝王孝王築睢陽城方十二里造倡聲以小鼓為節築者下杵以和之後世謂此聲為睢陽曲至今傳之魏晉之世有孫氏善弘舊曲宋識善擊節倡和陳左善清哥列和善吹笛郝索善彈箏朱生善琵琶尤發新聲傅玄著書曰人若欽所聞而忽所見不亦惑乎設此六人生於上世越古今而無儷何但夔牙同契哉案此說則自茲以後皆孫朱等之遺則也
