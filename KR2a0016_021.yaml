body:
  text: 宋書卷二十一志第十一樂三但歌四曲出自漢世無弦節作伎最先一人倡三人和魏武帝尤好之時有宋容華者清徹好聲善倡此曲當時特妙自晉以來不復傳遂絕相和漢舊歌也絲竹更相和執節者歌本一部魏明帝分為二更遞夜宿本十七曲朱生宋識列和等復合之為十三曲相和駕六龍氣出倡武帝詞駕六龍乘風而行行四海外路下之八邦歷登高山臨谿谷乘雲而行行四海外東到泰山仙人玉女下來翺游驂駕六龍飲玉漿河水盡不東流解愁腹飲玉漿奉持行東到蓬萊山上至天之門玉闕下引見得入赤松相對四面顧望視正焜煌開王心正興其氣百道至傳告無窮閉其口但當愛氣壽萬年東到海與天連神仙之道出窈入冥常當專之心恬憺無所愒欲閉門坐自守天與期氣願得神之人乘駕雲車驂駕白鹿上到天之門來賜神之藥跪受之敬神齊當如此道自來華陰山自以為大高百丈浮雲為之蓋仙人欲來出隨風列之雨吹我洞簫鼓瑟琴何誾誾酒與歌戲今日相樂誠為樂玉女起起移數時鼓吹一何嘈嘈從西北來時仙道多駕煙乘雲駕龍鬱何蓩蓩遨游八極乃到崐崘之山西王母側神仙金止玉亭來者為誰赤松王喬乃德旋之門樂共飲食到黃昏多駕合坐萬歲長宜子孫游君山甚為真磪磈砟硌爾自為神乃到王母臺金階玉為堂芝草生殿旁東西廂客滿堂主人當行觴坐者長壽遽何央長樂甫始宜孫子常願主人增年與天相守厥初生精列武帝詞厥初生造化之陶物莫不有終期莫不有終期聖賢不能免何為懷此憂願螭龍之駕思想崐崘居思想崐崘居見期於迂怪志意在蓬萊志意在蓬萊周孔聖徂落會稽以墳丘會稽以墳丘陶陶誰能度君子以弗憂年之暮奈何過時時來微江南可採蓮江南古詞江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北天地間度關山武帝詞天地間人為貴立君牧民為之軌則車轍馬迹經緯四極絀陟幽明黎庶繁息於鑠賢聖總統邦域封建五爵井田刑獄有燔丹書無普赦贖臯陶甫刑何有失職嗟哉後世改制易律勞民為君役賦其力舜漆食器畔者十國不及唐堯採椽不世歎伯夷欲以厲俗侈惡之大儉為恭德許由推讓豈有訟曲兼愛尚同疏者為戚東光乎東光乎古詞東光乎倉梧何不乎倉梧多腐粟無益諸軍糧諸軍游蕩子蚤行多悲傷登山有遠望十五文帝詞登山而遠望谿谷多所有楩柟千餘尺衆草之盛茂華葉燿人目五色難可紀雉雊山雞鳴虎嘯谷風起號羆當我道狂顧動牙齒惟漢二十二世薤露武帝詞惟漢二十二世所任誠不良沐猴而冠帶智小而謀強猶豫不敢斷因狩執君王白虹為貫日己亦先受殃賊臣持國柄殺主滅宇京蕩覆帝基業宗廟以燔喪播越西遷移號泣而且行瞻彼洛城郭微子為哀傷關東有義士蒿里行武帝詞關東有義士興兵討羣凶初期會孟津乃心在咸陽軍合力不齊躊躇而雁行勢利使人爭嗣還自相戕淮南弟稱號刻璽於北方鎧甲生蟣蝨萬姓以死亡白骨露於野千里無雞鳴生民百遺一念之絕人腸對酒歌太平時對酒武帝詞對酒歌太平時吏不呼門王者賢且明宰相股肱皆忠良咸禮讓民無所爭訟三年耕有九年儲倉穀滿盈斑白不負戴雨澤如此五穀用成郤走馬以糞其土田爵公侯伯子男咸愛其民以黜陟幽明子養有若父與兄犯禮法輕重隨其刑路無拾遺之私囹圄空虛冬節不斷人耄耋皆得以壽終恩德廣及草木昆蟲雞鳴高樹顛雞鳴古詞雞鳴高樹顛狗吠深宮中蕩子何所之天下方太平刑法非有貸柔協正亂名黃金為君門璧玉為軒闌堂上有雙尊酒作使邯鄲倡劉玉碧青甓後出郭門王舍後有方池池中雙鴛鴦鴛鴦七十二羅列自成行鳴聲何啾啾聞我殿東箱兄弟四五人皆為侍中郎五日一時來觀者滿道傍黃金絡馬頭熲熲何煌煌桃生露井上李樹生桃傍蟲來齧桃根李樹代桃僵樹木身相代兄弟還相忘烏生八九子烏生古詞烏生八九子端坐秦氏桂樹間唶我秦氏家有游遨蕩子工用睢陽強蘇合彈左手持強彈兩丸出入烏東西唶我一丸即發中烏身烏死魂魄飛揚上天阿母生烏子時乃在南山巖石間唶我人民安知烏子處蹊徑窈窕安從通白鹿乃在上林西苑中射工尚復得白鹿脯哺唶我黃鵠摩天極高飛後宮尚復得烹煮之鯉魚乃在洛水深淵中釣鉤尚得鯉魚口唶我人民生各各有壽命死生何須復道前後平陵東平陵古詞平陵東松栢桐不知何人劫義公劫義公在高堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黃犢棄故鄉亦在瑟調東西門行陌上桑文帝詞棄故鄉離室宅遠從軍旅萬里客披荊棘求阡陌側足獨窘步路局笮虎豹嘷動雞驚禽失羣鳴相索登南山奈何蹈槃石樹木叢生鬱差錯寢蒿草蔭松栢涕泣雨面霑枕席伴旅單稍稍日零落惆悵竊自憐相痛惜今有人陌上桑楚詞鈔今有人山之阿被服薜荔帶女蘿既含睇又宜笑子戀慕予善窈窕乘赤豹從文貍辛夷車駕結桂旗被石蘭帶杜衡折芳拔荃遺所思處幽室終不見天路險艱獨後來表獨立山之上雲何容容而在下杳冥冥羌晝晦東風飄颻神靈雨風瑟瑟木搜搜思念公子徒以憂駕虹蜺陌上桑武帝詞駕虹蜺乘赤雲登彼九疑歷玉門濟天漢至崐崘見西王母謁東君交赤松及羨門受要祕道愛精神食芝英飲醴泉柱杖桂枝佩秋蘭絕人事游渾元若疾風游歘飄飄景未移行數千壽如南山不忘愆清商三調歌詩荀勗撰舊詞施用者平調周西短歌行武帝詞六解周西伯昌懷此聖德參分天下而有其二修奉貢獻臣節不墜崇侯讒之是以拘繫一解後見赦原賜之斧鉞得使征伐為仲尼所稱達及德行猶奉事殷論其美二解齊桓之功為霸之首九合諸侯一匡天下一匡天下不以兵車正而不譎其德傳稱三解孔子所歎并稱夷吾民受其恩賜與廟胙命無下拜小白不敢爾天威在顏咫尺四解晉文亦霸躬奉天王受賜珪瓚秬鬯肜弓盧弓矢千虎賁三百人五解威服諸侯師之者尊八方聞之名亞齊桓河陽之會詐稱周王是以其名紛葩六解秋風燕歌行文帝詞七解秋風蕭瑟天氣涼草木搖落露為霜一解羣燕辭歸鵠南翔念君客游多思腸二解慊慊思歸戀故鄉君何淹留寄它方三解賤妾煢煢守空房憂來思君不敢忘四解不覺淚下霑衣裳援瑟鳴弦發清商五解短歌微吟不能長明月皎皎照我牀六解星漢西流夜未央牽牛織女遙相望爾獨何辜限河梁七解仰瞻短歌行文帝詞六解仰瞻帷幕俯察几筵其物如故其人不存一解神靈倏忽棄我遐遷靡瞻靡恃泣涕連連二解呦呦游鹿銜草鳴麑翩翩飛鳥挾子巢棲三解我獨孤煢懷此百離憂心孔疚莫我能知四解人亦有言憂令人老嗟我白髮生一何早五解長吟永歎懷我聖考曰仁者壽胡不是保六解別日燕歌行文帝詞六解別日何易會日難山川悠遠路漫漫一解鬱陶思君未敢言寄書浮雲往不還二解涕零雨面毀形顏誰能懷憂獨不歎三解耿耿伏枕不能眠披衣出戶步東西四解展詩清歌聊自寬樂往哀來摧心肝悲風清厲秋氣寒羅帷徐動經秦軒五解仰戴星月觀雲間飛鳥晨鳴聲氣可憐留連顧懷不自存六解對酒短歌行武帝詞六解對酒當歌人生幾何譬如朝露去日苦多一解慨當以慷憂思難忘以何解愁唯有杜康二解青青子衿悠悠我心但為君故沈吟至今三解明明如月何時可掇憂從中來不可斷絕四解呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙五解山不厭高水不厭深周公吐哺天下歸心六解清調晨上秋胡行武帝詞晨上散關山此道當何難晨上散關山此道當何難牛頓不起車墮谷間坐槃石之上彈五弦之琴作為清角韻意中述煩歌以言志晨上散關山一解有何三老公卒來在我傍有何三老公卒來在我傍員揜被裘似非人謂卿云何困苦以自怨徨徨所欲來到此間歌以言志有何三老公二解我居崐崘山所謂者真人我居崐崘山所謂者真人道深有可得名山歷觀遨游八極枕石漱流飲泉沈吟不決遂上升天歌以言志我居崐崘山三解去去不可追長恨相牽攀去去不可追長恨相牽攀夜夜安得寐惆悵以自憐正而不譎辭賦依因經傳所過西來所傳歌以言志去去不可追四解又本晨上散關山此道當何難有何三老公卒來在傍我居我崐崘山所謂真人去不可追長相牽攀北上苦寒行武帝詞六解北上太行山艱哉何巍巍羊腸坂詰屈車輪為之摧一解樹木何蕭瑟北風聲正悲熊羆對我蹲虎豹夾道啼二解谿谷少人民雪落何霏霏延頸長歎息遠行多所懷三解我心何佛鬱思欲一東歸水深橋梁絕中道正裴回四解迷惑失徑路暝無所宿棲行行日以遠人馬同時飢五解擔囊行取薪斧冰持作糜悲彼東山詩悠悠使我哀六解願登秋胡行武帝詞五解願登泰華山神人共遠游經歷崐崘山到蓬萊飄颻八極與神人俱思得神藥萬歲為期歌以言志願登泰華山一解天地何長久人道居之短世言伯陽殊不知老赤松王喬亦云得道得之未聞庶以壽考歌以言志天地何長久二解明明日月光何所不光昭二儀合聖化貴者獨人不萬國率土莫非王臣仁義為名禮樂為榮歌以言志明明日月光三解四時更逝去晝夜以成歲大人先天而天弗違不戚年往世憂不治存亡有命慮之為蚩歌以言志四時更逝去四解戚戚欲何念歡笑意所之盛壯智惠殊不再來愛時進趣將以惠誰氾氾放逸亦同何為歌以言志戚戚欲何念五解上謁董桃行古詞五解吾欲上謁從高山山頭危嶮大難遙望五嶽端黃金為闕班璘但見芝草葉落紛紛一解百鳥集來如煙山獸紛綸麟辟邪其端鵾雞聲鳴但見山獸援戲相拘攀二解小復前行玉堂未心懷流還傳教出門來門外人何求所言欲從聖道求一得命延三解教敕凡吏受言采取神藥若木端白兔長跪擣藥蝦蟆丸奉上陛下一玉柈服此藥可得即仙四解服爾神藥無不歡喜陛下長生老壽四面肅肅稽首天神擁護左右陛下長與天相保守五解蒲生塘上行武帝詞五解蒲生我池中其葉何離離傍能行儀儀莫能縷自知衆口鑠黃金使君生別離一解念君去我時獨愁常苦悲想見君顏色感結傷心脾今悉夜夜愁不寐二解莫用豪賢故棄捐素所愛莫用魚肉貴棄捐葱與薤莫用麻枲賤棄捐菅與蒯三解倍恩者苦栝蹶船常苦沒教君安息定慎莫致倉卒念與君一共離別亦當何時共坐復相對四解出亦復苦愁入亦復苦愁邊地多悲風樹木何蕭蕭今日樂相樂延年壽千秋五解悠悠苦寒行明帝詞五解悠悠發洛都荓我征東行征行彌二旬屯吹龍陂城一解顧觀故壘處皇祖之所營屋室若平昔棟宇無邪傾二解奈何我皇祖潛德隱聖形雖沒而不朽書貴垂休名三解光光我皇祖軒燿同其榮遺化布四海八表以肅清四解雖有吳蜀寇春秋足燿兵徒悲我皇祖不永享百齡賦詩以寫懷伏軾淚霑纓五解瑟調朝日善哉行文帝詞五解朝日樂相樂酣飲不知醉悲弦激新聲長笛吐清氣一解弦歌感人腸四坐皆歡說寥寥高堂上涼風入我室二解持滿如不盈有德者能卒君子多苦心所愁不但一三解慊慊下白屋吐握不可失眾賓飽滿歸主人苦不悉四解比翼翔雲漢羅者安所羈沖靜得自然榮華何足為五解上山善哉行文帝詞六解上山采薇薄莫苦饑溪谷多風霜露沾衣一解野雉羣雊猿猴相追還望故鄉鬱何壘壘二解高山有崖林木有支憂來無方人莫之知三解人生若寄多憂何為今我不樂歲月其馳四解湯湯川流中有行舟隨波轉薄有似客游五解策我良馬被我輕裘載馳載驅聊以忘憂六解朝游善哉行文帝詞五解朝游高臺觀夕宴華池陰大酋奉甘醪狩人獻嘉禽一解齊倡發東舞秦箏奏西音有客從南來為我彈清琴二解五音紛繁會拊者激微吟淫魚乘波聽踴躍自浮沈三解飛鳥翻翔舞悲鳴集北林樂極哀情來憀亮摧肝心四解清角豈不妙德薄所不任大哉子野言弭弦且自禁五解古公善哉行武帝詞七解古公亶甫積德垂仁思弘一道哲王於豳一解太伯仲雍王德之仁行施百世斷髮文身二解伯夷叔齊古之遺賢讓國不用餓殂首山三解智哉山甫相彼宣王何用杜伯累我聖賢四解齊桓之霸賴得仲父後任豎刁蟲流出戶五解晏子平仲積德兼仁與世沈德未必思命六解仲尼之世王國為君隨制飲酒揚波使官七解自惜善哉行武帝詞六解自惜身薄祜夙賤罹孤苦既無三徙教不聞過庭語一解其窮如抽裂自以思所怙雖懷一介志是時其能與二解守窮者貧賤惋歎淚如雨泣涕於悲夫乞活安能覩三解我願於天窮琅邪傾側左雖欲竭忠誠欣公歸其楚四解快人曰為歎抱情不得顯行天教人誰知莫不緒五解我願何時隨此歎亦難處今我將何照於光耀釋銜不如雨六解我徂善哉行明帝詞八解我徂我征伐彼蠻虜練師簡卒爰正其旅一解輕舟竟川初鴻依浦桓桓猛毅如羆如虎二解發砲若雷吐氣成雨旄旍指麾進退應矩三解百馬齊轡御由造父休休六軍咸同斯武四解兼塗星邁亮茲行阻行行日遠西背京許五解游弗淹旬遂屆揚土奔寇震懼莫敢當御六解虎臣列將怫鬱充怒淮泗肅清奮揚微所七解運德燿威惟鎮惟撫反斾言歸告入皇祖八解赫赫善哉行明帝詞四解赫赫大魏王師徂征冒暑討亂振燿威靈一解汎舟黃河隨波潺湲通渠回越行路綿綿二解采旄蔽日旗旒翳天淫魚瀺灂游戲深淵三解唯塘泊從如流不為單握揚楚心惆悵歌采薇心綿綿在淮肥願君速捷蚤旋歸四解來日善哉行古詞六解來日大難口燥脣乾今日相樂皆當喜歡一解經歷名山芝草翻翻仙人王喬奉藥一丸二解自惜袖短內手知寒慚無靈輒以報趙宣三解月沒參橫北斗闌干親交在門饑不及餐四解歡日尚少戚日苦多以何忘憂彈箏酒歌五解淮南八公要道不煩參駕六龍游戲雲端六解大曲東門東門行古詞四解出東門不顧歸來入門悵欲悲盎中無斗儲還視桁上無縣衣一解拔劍出門去兒女牽衣啼它家但願富貴賤妾與君共餔糜二解共餔糜上用倉浪天故下為黃口小兒今時清廉難犯教言君復自愛莫為非三解今時清廉難犯教言君復自愛莫為非行吾去為遲平慎行望吾歸四解西山折楊柳行文帝詞四解西山一何高高高殊無極上有兩仙僮不飲亦不食與我一丸藥光耀有五色一解服藥四五日身體生羽翼輕舉乘浮雲倏忽行萬億流覽觀四海芒芒非所識二解彭祖稱七百悠悠安可原老聃適西戎于今竟不還王喬假虛詞赤松垂空言三解達人識真偽愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀四解羅敷豔歌羅敷行古詞三解日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷喜蠶桑采桑城南隅青絲為籠係桂枝為籠鉤頭上倭墮髻耳中明月珠緗綺為下紫綺為上襦行者見羅敷下擔捋頿須少年見羅敷脫帽著帩頭耕者忘其犂鋤者忘其鋤來歸相怒怨但坐觀羅敷一解使君從南來五馬立歭躇使君遣吏往問是誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寧可共載不羅敷前置詞使君一何愚使君自有婦羅敷自有夫二解東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭腰中鹿盧劍可直千萬餘十五府小史二十朝大夫三十侍中郎四十專城居為人潔白鬑鬑頗有須盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊三解前有豔詞曲後有趨西門西門行古詞六解出西門步念之今日不作樂當待何時一解夫為樂為樂當及時何能坐愁怫鬱當復待來茲二解飲醇酒炙肥牛請呼心所歡可用解愁憂三解人生不滿百常懷千歲憂晝短而夜長何不秉燭游四解自非仙人王子喬計會壽命難與期五解人壽非金石年命安可期貪財愛惜費但為後世嗤六解一本燭游後行去之如雲除弊車羸馬為自推無自非以下四十八字默默折楊柳行古詞四解默默施行違厥罰隨事來末喜殺龍逢桀放於鳴條一解祖伊言不用紂頭縣白旄指鹿用為馬胡亥以喪軀二解夫差臨命絕乃云負子胥戎王納女樂以亡其由余璧馬禍及虢二國俱為墟三解三夫成市虎慈母投杼趨卞和之刖足接予歸草廬四解園桃煌煌京洛行文帝詞五解夭夭園桃無子空長虛美難假偏輪不行一解淮陰五刑鳥得弓藏保身全名獨有子房大憤不收褒衣無帶多言寡誠祇令事敗二解蘇秦之說六國以亡傾側賣主車裂固當賢矣陳軫忠而有謀楚懷不從禍卒不救三解禍夫吳起智小謀大西河何健伏尸何劣四解嗟彼郭生古之雅人智矣燕昭可謂得臣仲連齊之高士北辭千金東蹈滄海五解白鵠豔歌何嘗一曰飛鵠行古詞四解飛來雙白鵠乃從西北來十十五五羅列成行一解妻卒被病行不能相隨五里一反顧六里一裴回二解吾欲銜汝去口噤不能開吾欲負汝去毛羽何摧頹三解樂哉新相知憂來生別離躇躊顧羣侶淚下不自知四解念與君離別氣結不能言各各重自愛道遠歸還難妾當守空房閉門下重關若生當相見亡者會黃泉今日樂相樂延年萬歲期念與下為趨曲前有豔碣石步出夏門行武帝詞四解雲行雨步超越九江之臯臨觀異同心意懷游豫不知當復何從經過至我碣石心惆悵我東海雲行至此為豔東臨碣石以觀滄海水何淡淡山島竦峙樹木叢生百草豐茂秋風蕭瑟洪濤湧起日月之行若出其中星漢粲爛若出其𩹉幸甚至哉歌以詠志觀滄海一解孟冬十月北風裴回天氣肅清繁霜霏霏鵾雞晨鳴鴻雁南飛鷙鳥潛藏熊羆窟棲錢鎛停置農收積場逆旅整設以通賈商幸甚至哉歌以詠志冬十月二解鄉土不同河朔隆寒流澌浮漂舟船行難錐不入地蘴藾深奧水竭不流冰堅可蹈士隱者貧勇俠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志河朔寒三解神龜雖壽猶有竟時騰蛇乘霧終為土灰驥老伏櫪志在千里烈士暮年壯心不已盈縮之期不但在天養怡之福可得永年幸甚至哉歌以詠志神龜雖壽四解何嘗豔歌何嘗行古詞五解何嘗快獨無憂但當飲醇酒炙肥牛一解長兄為二千石中兄被貂裘二解小弟雖無官爵鞍馬魚𠫓魚𠫓往來王侯長者遊三解但當在王侯殿上快獨摴蒲六博對坐彈四解男兒居世各當努力蹙迫日暮殊不久留五解少小相觸抵寒苦常相隨忿恚安足諍吾中道與卿共別離約身奉事君禮節不可虧上慚滄浪之天下顧黃口小兒奈何復老心皇皇獨悲誰能知少小下為趨曲前為豔置酒野田黃雀行空侯引亦用此曲東阿王詞四解置酒高殿上親交從我游中廚辦豐膳烹羊宰肥牛秦箏何慷慨齊瑟和且柔一解陽阿奏奇舞京洛出名謳樂飲過三爵緩帶傾庶羞主稱千金壽賓奉萬年酬二解久要不可忘薄終義所尤謙謙君子德磬折欲何求盛時不再來百年忽我遒三解驚風飄白日光景馳西流生存華屋處零落歸山丘先民誰不死知命復何憂四解為樂滿歌行古詞四解為樂未幾時遭世險巇逢此百離伶丁荼毒愁懣難支遙望辰極天曉月移憂來闐心誰當我知一解戚戚多思慮耿耿不寧禍福無形唯念古人遜位躬耕遂我所願以茲自寧自鄙山棲守此一榮二解莫秋冽風起西蹈滄海心不能安攬衣起瞻夜北斗闌干星漢照我去去自無它奉事二親勞心可言三解窮達天所為智者不愁多為少憂安貧樂正道師彼莊周遺名者貴子熙同巇往者二賢名垂千秋四解飲酒歌舞不樂何須善哉照觀日月日月馳驅轗軻世間何有何無貪財惜費此一何愚命如鑿石見火居世竟能幾時但當歡樂自娛盡心極所熙怡安善養君德性百年保此期頤飲酒下為趨夏門步出夏門行一曰隴西行明帝詞二解步出夏門東登首陽山嗟哉夷叔仲尼稱賢君子退讓小人爭先惟斯二子于今稱傳林鍾受謝節改時遷日月不居誰得久存善哉殊復善弦歌樂情一解商風夕起悲彼秋蟬變形易色隨風東西乃眷西顧雲霧相連丹霞蔽日采虹帶天弱水潺潺落葉翩翩孤禽失羣悲鳴其間善哉殊復善悲鳴在其間二解朝游清泠日莫嗟歸朝游上為豔蹙迫日莫烏鵲南飛繞樹三匝何枝可依卒逢風雨樹折枝摧雄來驚雌雌獨愁棲夜失羣侶悲鳴裴回芃芃荊棘葛生綿綿感彼風人惆悵自憐月盈則沖華不再繁古來之說嗟哉一言蹙迫下為趨王者布大化櫂歌行明帝詞五解王者布大化配乾稽后祇陽育則陰殺晷景應度移一解文德以時振武功伐不隨重華干戚有苗服從媯二解蠢爾吳蜀虜馮江棲山阻哀哀王士民瞻仰靡依怙三解皇上悼愍斯宿昔奮天怒發我許昌宮列舟于長浦四解翌日乘波揚棹歌悲且涼大常拂白日旗幟紛設張五解將抗旄與鉞燿威於彼方伐罪以弔民清我東南疆將抗下為趨洛陽行雁門太守行古詞八解孝和帝在時洛陽令王君本自益州廣漢民少行宦學通五經論一解明知法令歷世衣冠從溫補洛陽令治行致賢擁護百姓子養萬民二解外行猛政內懷慈仁文武備具料民富貧移惡子姓名五篇著里端三解傷殺人比伍同罪對門禁鎦矛八尺捕輕薄少年加笞決罪詣馬市論四解無妄發賦念在理寃敕吏正獄不得苛煩財用錢三十買繩禮竿五解賢哉賢哉我縣王君臣吏衣冠奉事皇帝功曹主簿皆得其人六解臨部居職不敢行恩清身苦體夙夜勞勤治有能名遠近所聞七解天年不遂蚤就奄昏為君作祠安陽亭西欲令後世莫不稱傳八解白頭吟與櫂歌同調古詞五解晴如山上雲皎若雲間月聞君有兩意故來相決絕一解平生共城中何嘗斗酒會今日斗酒會明旦溝水頭蹀踥御溝上溝水東西流二解郭東亦有樵郭西亦有樵兩樵相推與無親為誰驕三解淒淒重淒淒嫁娶亦不啼願得一心人白頭不相離四解竹竿何嫋嫋魚尾何離簁男兒欲相知何用錢刀為𧕂如五馬噉萁川上高士嬉今日相對樂延年萬歲期五解一本云詞曰上有紫羅咄咄奈何楚調怨詩明月東阿王詞七解明月照高樓流光正裴回上有愁思婦悲歎有餘哀一解借問歎者誰自云客子妻夫行踰十載賤妾常獨棲二解念君過於渴思君劇於饑君為高山柏妾為濁水泥三解北風行蕭蕭烈烈入吾耳心中念故人淚墮不能止四解沈浮各異路會合當何諧願東北風吹我入君懷五解君懷常不開賤妾當何依恩情中道絕流止任東西六解我欲竟此曲此曲悲且長今日樂相樂別後莫相忘七解
