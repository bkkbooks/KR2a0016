body:
  text: 宋書卷二十五志第十五天文三晉簡文咸安元年十二月辛卯熒惑逆行入太微二年三月猶不退占曰國不安有憂是時帝有桓溫之逼懷憂慘七月帝崩咸安二年正月己酉歲星犯填星在須女占曰為內亂五月歲星形色如太白占曰進退如度姦邪息變色亂行主無福歲星囚於仲夏當細小而明此其失常也又為臣強六月太白晝見在七星乙酉太白犯輿鬼占曰國有憂七月帝疾甚詔桓溫曰少子可輔者輔之如不可君自取之賴侍中王坦之毀手詔改使如王導輔政故事溫聞之大怒將誅坦之等內亂之應也是月帝崩咸安二年五月丁未太白犯天關占曰兵起六月庾希入京城十一月盧悚入宮並誅滅晉孝武寧康元年正月戊申月奄心大星案占災不在王者則在豫州一曰主命惡之三月丙午月奄南斗第五星占曰大臣有憂憂死亡一曰將軍死七月桓溫薨寧康二年正月丁巳有星孛于女虛經氐亢角軫翼張九月丁丑有星孛于天市十一月癸酉太白奄熒惑在營室占曰金火合為爍此災皆為兵喪太元元年五月氐賊苻堅伐涼州七月氐破涼州虜張天錫十一月桓沖發三州軍軍淮泗桓豁亦遣軍備境上寧康二年閏月己未月奄牽牛南星占曰左將軍死三年五月北中郎將王坦之薨寧康三年六月辛卯太白犯東井占曰秦地有兵九月戊申熒惑奄左執法占曰執法者死太元元年苻堅破涼州十月尚書令王彪之卒晉孝武太元元年四月丙戌熒惑犯南斗第三星丙申又奄第四星占曰兵大起中國飢一曰有赦八月癸酉太白晝見在氐氐兗州分野九月熒惑犯哭泣星遂入羽林占曰天子有哭泣事中軍兵起十一月己未月奄左角占曰天子有兵一曰國有憂三年六月熒惑守羽林占曰禁兵大起九月壬午太白晝見在角兗州分元年五月大赦三年八月氐賊韋鍾入漢中東下苻融寇樊鄧慕容暐圍襄陽氐兗州刺史彭超圍彭城四年二月襄陽城陷賊獲朱序彭超捨彭城獲吉挹彭超等聚廣陵三河衆五萬於是征虜謝石次涂中右衛毛安之游擊河間王曇之等次堂邑發丹陽民丁使尹張涉屯衛京都六月兗州刺史謝玄討賊大破之餘燼皆走是時中外連兵比年荒儉是年又發揚州萬人戍夏口太元四年十一月丁巳太白犯哭星占曰天子有哭泣事五年七月丙子辰星犯軒轅占曰女主當之九月癸未皇后王氏崩太元六年十月乙卯有奔星東南經翼軫聲如雷星說曰光迹相連曰流絶迹而去曰奔案占楚地有兵一曰軍破民流十二月氐荊州刺史梁成襄陽太守閻震率衆伐竟陵桓石虔擊大破之生禽震斬首七千獲生萬人聲如雷將帥怒之象也七年九月朱綽擊襄陽拔將六百餘家而還太元七年十一月太白晝見在斗占曰吳有兵喪八年四月甲子太白又晝見在參占曰魏有兵喪是月桓沖征沔漢楊亮伐蜀並拔城略地八月苻堅自將號百萬九月攻沒壽陽十月劉牢之破堅將梁成斬之殺獲萬餘人謝玄等又破堅於淝水斬其弟融堅大衆奔潰九年六月皇太后褚氏崩八月謝玄出屯彭城經略中州十年八月苻堅為其將姚萇所殺太元十年十二月己丑太白犯歲星占曰為兵饑是時河朔未一兵連在外冬大饑太元十一年三月戊申太白晝見在東井占曰秦有兵臣強六月甲午歲星晝見在胃占曰魯有兵臣強十二年慕容垂寇東阿翟遼寇河上姚萇假號安定苻登自立隴上呂光竊據涼土太元十一年三月客星在南斗至六月乃沒占曰有兵一曰有赦是後司雍兗冀常有兵役十二年正月大赦八月又赦太元十二年二月戊寅熒惑入月占曰有亂臣死相若有戮者一曰女親為敗天下亂是時琅邪王輔政王妃從兄國寶以姻昵受寵又陳郡人袁悅昧私苟進交遘主相扇揚朋黨十三年帝殺悅於是主相有隙亂階興矣太元十二年十月庚午太白晝見在斗十三年閏月戊辰天狗東北下有聲十二月戊子辰星入月在危占曰賊臣欲殺主不出三年必有內惡是月熒惑在角亢形色猛盛占曰熒惑失其常吏且棄其法諸侯亂其政自是後慕容垂翟遼姚萇苻登慕容永並阻兵爭強十四年正月彭城妖賊又稱號於皇丘劉牢之破滅之三月張道破合鄉圍泰山向欽之擊走之是年翟遼又攻沒滎陽侵略陳項于時政事多弊治道陵遲矣太元十四年十二月熒惑入羽林乙未月犯歲星占並同上十五年翟遼陸掠司兗衆軍纍討弗克鮮卑又跨略并冀七月旱八月諸郡大水兗州又蝗太元十五年七月壬申有星孛于北河戒經太微三台文昌入北斗長十餘丈八月戊戌入紫微乃滅占曰北河戒一名胡門胡門有兵喪掃太微入紫微王者當之三台為三公文昌為將相將相三公有災入北斗強國發兵諸侯爭權大夫憂十一月太白入羽林占曰天子為軍自守有反臣二十一年九月孝武帝崩隆安元年王恭殷仲堪桓玄等並發兵表誅王國寶朝廷從而殺之并斬其從弟緒司馬道子由是失勢禍亂成矣太元十六年十一月癸巳月奄心前星占曰太子憂是時太子常有篤疾太元十七年九月丁丑歲星熒惑填星同在亢氐占曰三星合是謂驚位絶行內外有兵喪與飢改立王公太元十八年正月乙酉熒惑入月占曰憂在宮中非賊乃盜也一曰有亂臣若有戮者二十一年九月帝暴崩內殿兆庶宣言夫人張氏潛行大逆于時朝政暗緩不加顯戮但默責而已又王國寶邪狡卒伏其辜太元十八年二月有客星在尾中至九月乃滅占曰燕有兵喪十九年四月己巳月奄歲星在尾占曰為飢燕國亡二十年慕容垂遣息寶伐什圭為圭所破死者數萬人二十一年垂死國遂衰亡太元十九年十月癸丑太白犯歲星在斗占曰為飢為內兵斗吳越分至隆安元年王恭等舉兵顯王國寶之罪朝廷赦之是後連歲水旱民飢太元二十年六月熒惑入天囷占曰天下飢七月丁亥太白入太微占曰太白入太微國有憂晝見為兵喪九月有蓬星如粉絮東南行歷女虛至哭星占曰蓬星見不出三年必有亂臣戮死於市十二月己巳月犯楗閉及東西咸占曰楗閉司心腹喉舌東西咸主陰謀是時王國寶交構朝政二十一年九月帝崩隆安元年王恭等舉兵而朝廷戮王國寶王緒又連歲水旱兼三方動衆民飢太元二十一年三月太白連晝見在羽林占曰有強臣有兵喪中軍兵起四月壬午太白入天囷占曰為飢六月歲星犯哭星占曰有哭泣事是年九月孝武帝崩隆安元年王恭舉兵脅朝廷於是中外戒嚴戮王國寶以謝之晉安帝隆安元年正月癸亥熒惑犯哭星占曰有哭泣事二月歲星熒惑皆入羽林占曰軍兵起四月丁丑太白晝見在東井秦有兵喪是月王恭舉兵內外戒嚴尋殺王國寶等六月羌賊攻洛陽郗恢遣兵救之姚萇死子略代立什圭自號於中山隆安元年六月庚午月奄太白在太微端門外占曰國受兵乙酉月奄歲星在東壁占曰為飢衛地有兵八月熒惑守井鉞占曰大臣有誅二年六月戊辰攝提移度失常歲星晝見在胃胃兗州分是年六月郗恢遣鄧啓方等以萬人殘虜於滑臺滑臺衛地也啓方等敗而還九月王恭庾楷殷仲堪桓玄等並舉兵表誅王愈司馬尚之兄弟於是內外戒嚴大發民衆仲堪軍至尋陽禽江州刺史王愈楷將段方攻尚之於楊湖為所敗方死王恭司馬劉牢之反恭恭敗桓玄至白石亦奔退仲堪還江陵三年冬荊州刺史殷仲堪為桓玄所殺隆安二年閏月太白晝見在羽林丁丑月犯東上相三年五月辛酉月又奄東上相辛未辰星犯軒轅星占悉同上是年正月楊佺期破郗恢奪其任殷仲堪又殺之六月鮮卑攻沒青州十月羌賊攻沒洛陽桓玄破荊雍殺殷仲堪楊佺期孫恩聚衆攻沒會稽殺內史王凝之劉牢之東討走之四年七月太皇太后李氏崩隆安四年正月乙亥月犯填星在牽牛占曰吳越有兵喪女主憂二月己丑有星孛于奎長三丈上至閣道紫宮西蕃入斗魁至三台太微帝座端門占曰彗拂天子廷閣易主之象經三台入北斗占同上條六月乙未月又犯填星在牽牛辛酉又犯哭星十月奄歲星在北河占曰為飢十二月戊寅有星孛于貫索天市天津占曰貴臣獄死內外有兵喪天津為賊斷王道天下不通十二月太白在斗晝見至五年正月乙卯案占災在吳越三月甲寅流星赤色衆多西行經牽牛虛危天津閣道貫太微紫宮占曰星者庶民類衆多西流之象徑行天子庭主弱臣強諸侯兵不制七月癸亥大角星散搖五色占曰王者流散丁卯月犯天關占曰王者憂九月庚子熒惑犯少微又守之占曰處士誅十月戊子月犯東蕃次相四年五月孫恩復破會稽殺內史謝琰遣高雅之等討之七月太皇太后李氏崩十月妖賊大破高雅之於餘姚死者十七八五年二月孫恩攻句章高祖拒之五月吳郡內史袁山松出戰為所殺死者數千人六月孫恩至京口高祖擊破之恩軍蒲洲於是內外戒嚴營陳屯守柵斷淮口恩遣別將攻廣陵殺三千餘人恩遁據郁洲是月高祖又追破之九月桓玄表至逆旨陵上十月司馬元顯大治水軍將以伐玄元興元年正月桓玄東下是月孫恩在臨海人衆餓死散亡恩亦投水死盧循自稱征虜將軍領其餘衆略有永嘉晉安之地二月帝戎服遣西軍丁卯桓玄至姑孰破歷陽司馬尚之見殺劉牢之降于玄三月玄剋京都殺司馬元顯放太傅道子七月大飢人相食浙江東餓死流亡十六七吳郡吳興戶口減半又流奔而西者萬計十月桓玄遣將擊劉軌破走奔青州四年玄遂篡位遷帝尋陽晉安帝元興元年三月戊子太白犯五諸侯因晝見四月辛丑月奄辰星七月戊寅熒惑在東井熒惑犯輿鬼積尸占並同上八月庚子太白犯歲星在上將東南占曰楚兵飢一曰災在上將丙寅太白奄右執法九月癸未太白犯進賢占曰賢者誅十月客星色白如粉絮在太微西至十二月入太微占曰兵入天子庭二年二月歲星犯西上將六月甲辰奄斗第四星占曰大臣誅不出三年八月癸丑太白犯房北第二星九月己丑歲星犯進賢熒惑犯西上將十月甲戌太白犯泣星十一月丁丑熒惑犯填星辛巳月犯熒惑十二月乙巳月奄軒轅第二星占悉同上元年冬索頭破羌軍二年十二月桓玄篡位放遷帝后於尋陽以永安何皇后為零陵君三年二月高祖盡誅桓氏元興三年正月戊戌熒惑逆行犯太微西上相占曰天子戰於野上相死二月甲辰月奄歲星於左角占曰天下兵起丙辰熒惑逆行在左執法西北占曰執法者憂四月甲午月奄軒轅第二星填星入羽林十二月熒惑太白皆犯羽林占同上是年二月丙辰高祖殺桓修等三月己未破走桓玄遣軍西討辛酉誅左僕射王愈及子荊州刺史綏桓玄劫帝如江陵五月玄下至崢嶸洲義軍破滅之桓振又攻沒江陵幽劫天子明年正月衆軍攻之振走乘輿乃旋七月永安何皇后崩三月桓振又襲江陵荊州刺史司馬休之敗走是月劉懷肅擊振滅之其年二月巴西人譙縱殺益州刺史毛璩及璩弟西夷校尉瑾跨有西土自號蜀王晉安帝義熙元年三月壬辰月奄左執法占同上丁酉月奄心前星占曰豫州有災太白犯東井占曰秦有兵四月己卯月犯填星在東壁占曰其地亡國一曰貴人死七月庚辰太白比晝見在翼軫占曰為臣強荊州有兵喪己未月奄填星在東壁占曰其國以伐亡一曰民流八月丁巳月犯斗第一星占曰天下有兵一曰大臣憂案江左來南斗有災則吳越會稽丹陽豫章廬江各隨其星應之淮南失土殆不占耳史闕其說故不列焉九月戊子熒惑犯少微占曰處士誅庚寅熒惑犯右執法癸卯熒惑犯左執法占並同上十月丁巳月奄填星營室占同七月十一月丙戌太白奄鉤鈐占曰喉舌臣憂十二月己卯歲星犯天江占曰有兵亂河津不通是年六月索頭寇沛土使僞豫州刺史索度真戍相縣太傅長沙景王討破走之十一月荊州刺史魏詠之薨二年二月司馬國璠等攻沒弋陽四月羌伐仇池仇池公楊盛擊走之九月益州刺史司馬榮期為其參軍楊承祖所害時文處茂討蜀屢有功會榮期死乃退三年十二月司徒揚州刺史王謐薨四年正月太保武陵王遵薨三月左僕射孔安國卒五年高祖討鮮卑并定舊兗之地義熙二年二月己丑月犯心後星占曰豫州有災四月癸丑月犯太微西上將己未月犯房南第二星乙丑歲星犯天江占悉同上五月癸未月犯左角占曰左將軍死天下有兵壬寅熒惑犯氐占曰氐為宿宮人主憂六月庚午熒惑犯房北第二星八月癸亥熒惑犯斗第五星丁巳犯建星九月壬午熒惑犯哭星又犯泣星占悉同上十二月丙午月奄太白在危占曰齊亡國一曰強國君死丁未熒惑太白皆入羽林是年二月甲戌司馬國璠等攻沒弋陽三年正月鮮卑寇北徐州至下邳八月遣劉敬宣伐蜀十二月司徒王謐薨四年正月武陵王遵薨五年鮮卑復寇淮北四月高祖大軍討之六月大戰臨朐城進圍廣固十月什圭為其子僞清河公所殺六年二月拔廣固禽慕容超坑斬其衆三千餘人義熙三年正月丙子太白晝見在奎二月庚寅月奄心後星占悉同上癸亥熒惑填星太白辰星聚於奎婁從填星也其說見上九年五月己丑太白晝見在參占曰益州有兵喪臣強六月辛卯熒惑犯辰星在翼占曰天下兵起八月己卯太白奄熒惑又犯執法占曰奄熒惑有大兵辛卯熒惑犯左執法九月壬子熒惑犯進賢是年正月丁巳鮮卑寇北徐至下邳八月劉敬宣伐蜀不克而旋四年三月左僕射孔安國卒七月司馬國璠等攻沒鄒山魯郡太守徐雍破走之姚略遣衆征佛佛大為所破五年高祖討鮮卑六年三月妖賊徐道覆殺鎮南將軍江州刺史何無忌於豫章四月妖賊盧寇湘中巴陵五月丙子循道覆敗撫軍將軍豫州刺史劉毅於桑落洲毅僅以身免丁丑循等至蔡洲遣別將焚京口庚辰賊攻焚查浦查浦戍將距戰不利高祖遣軍渡淮擊大破之司馬國璠寇碭山竺夔討破之七月妖賊南走據尋陽高祖遣劉鍾等追之八月孫季高乘海伐廣州桓謙以蜀衆聚枝江盧循將荀林略華容相去百里臨川烈武王討謙之又討林林退走鄱陽太守虞丘進破賊別帥於上饒九月烈武王使劉遵擊荀林於巴陵斬之桓道兒率蔡猛向大薄又遣劉基討之斬猛十月高祖以舟師南征是時徐道覆率二萬餘人攻荊州烈武王距之戰於江津大破之梟殄其十八九道覆棄戰船走十一月劉鍾破賊軍於南陵癸丑益州刺史鮑陋卒于白帝譙道福攻沒其衆庚戌孫季高襲廣州剋之十二月高祖在大雷與賊交戰大破之賊走左里進擊又破死者十八九賊還廣州劉藩等追之七年二月藩拔始興城斬徐道覆盧循還番禺攻圍孫季高不能剋走交州交州刺史杜慧度斬之四月到彥之攻譙道福於白帝拔之義熙四年正月庚子熒惑犯天江占同上五月丁未月奄斗第二星占同上壬子填星犯天廩占曰天下飢倉粟少六月己丑太白犯太微西上將己卯又犯左執法十月戊子熒惑入羽林占悉同上五年高祖討鮮卑六年左僕射孟昶仰藥卒是後南北軍旅運轉不息義熙五年二月甲子月犯昴占曰胡不安天子破胸奴四月甲戌熒惑犯辰星在東井占同三年五月戊戌歲星入羽林占同上九月壬寅月犯昴占同二月十月熒惑犯氐占同二年閏月丁酉月犯昴占同二月辛亥熒惑犯鉤鈐占同元年十二月辛丑太白犯歲星在奎占曰大兵起魯有兵己酉月奄心大星占曰王者惡之是年四月高祖討鮮卑什圭為其子所殺十一月西虜攻安定姚略自以大衆救之六年二月鮮卑滅皆胡不安之應也是時鮮卑跨魯地又魯有兵之應也五月盧循逼郊甸宮衛被甲義熙六年三月丁卯月奄房南第二星占曰災在次相己巳又奄斗第五星占曰斗主兵兵起一曰將軍死太白犯五諸侯占曰諸侯有誅五月甲子月奄斗第五星占同三月己亥月奄昴占曰國有憂一曰有白衣之會六月己丑月犯房南第二星甲午太白晝見占並同上七月己亥月犯輿鬼占曰國有憂一曰秦有兵八月壬午太白犯軒轅大星甲申月犯心前星災在豫州丙戌月犯斗第五星占悉同上五月丁亥月奄牛宿南星占曰天下有大誅乙未太白犯少微丙午太白在少微而晝見九月甲寅太白犯左執法丁丑填星犯畢占曰有邊兵是年三月始興太守徐道覆反江州刺史何無忌討之大敗於豫章無忌死之四月盧循寇湘中沒巴陵五月循等大破豫州刺史劉毅毅僅以身免循率衆逼京畿是月左僕射孟昶懼王威不振仰藥自殺七年二月劉藩梟徐道覆首杜慧度斬盧循並傳首京都八年六月臨川烈武王道規薨時為豫州八月皇后王氏崩九月兗州刺史劉藩尚書僕射謝混伏誅高祖西討劉毅斬之十二月遣益州刺史朱齡石伐蜀九年諸葛長民伏誅林邑王范胡達將萬餘人寇九真九真太守杜慧期距破之七月朱齡石滅蜀義熙七年四月辛丑熒惑入輿鬼占曰秦有兵一曰雍州有災六月太白晝見在翼占同元年己亥填星犯天關占曰臣謀主庚子月犯歲星在畢占曰有邊兵且飢七月丁卯歲星犯填星在參占曰歲填合為內亂一曰益州戰不勝亡地五虹見東方占曰天子黜聖人出八月乙未月犯歲星在參占曰益州兵飢太白犯房南第二星十一月丙午太白犯哭泣星占悉同上七月朱齡石剋蜀蜀民尋又反又討滅之八年誅劉藩謝混滅劉毅皇后王氏崩九年誅諸葛長民十一年討荊州刺史司馬休之雍州刺史魯宗之破之也義熙八年正月庚戌月犯歲星在畢占同上七月癸亥月奄房北第二星占同上甲申太白犯填星在東井占曰秦有大兵己未月犯井鉞八月戊申月犯泣星十月辛亥月奄天關占曰有兵十月丁丑填星犯東井占曰大人憂十二月癸卯填星犯井鉞是年八月皇后王氏崩九月誅劉藩謝混滅劉毅九年三月誅諸葛長民西虜攻羌安定戍剋之十二月朱齡石伐蜀九年七月朱齡石滅蜀義熙九年二月丙午熒惑填星皆犯東井占曰秦有兵三月壬辰歲星熒惑填星太白聚于東井從歲星也熒惑入輿鬼太白犯南河初義熙三年四星聚奎奎婁徐州分是時慕容超僭號於齊侵略徐兗連歲寇抄至于淮泗姚興譙縱僭僞秦蜀盧循木末南北交侵五年高祖北殄鮮卑是四星聚奎之應也九年又聚東井東井秦分十三年高祖定關中又其應也而縱循羣凶之徒皆已剪滅於是天人歸望建國舊徐元熙二年受終納禪皆其徵也星傳曰四星若合是謂太陽其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者奄有四方無德受罰離其國家滅其宗廟今案遺文所存五星聚者有三周漢以王齊以霸周將伐殷五星聚房齊桓將霸五星聚箕漢高入秦五星聚東井齊則永終侯伯卒無更紀之事是則五星聚有不易行者矣四星聚者有九漢光武晉元帝並中興而魏宋並更紀是則四星聚有以易行者矣昔漢平帝元始四年四星聚柳張各五日柳張三河分後有王莽赤眉之亂而光武興復於洛晉懷帝永嘉六年四星聚牛女後有劉聰石勒之亂而元皇興復揚土漢獻帝初平元年四星聚心又聚箕尾心豫州分後有董卓李傕暴亂黃巾黑山熾擾而魏武迎帝都許遂以兗豫定是其應也一曰心為天王大兵升殿天下大亂之兆也韓馥以為尾箕燕興之祥故奉幽州牧劉虞虞既距之又尋滅亡固已非矣尾為燕又為吳此非公孫度則孫權也度偏據僻陋然亦郊祀備物皆為改漢矣建安二十二年四星又聚二十五年而魏文受禪此為四星三聚而易行矣蜀臣亦引後聚為劉備之應案太元十九年義熙三年九月四星各一聚而宋有天下與魏同也魚豢云五星聚冀方而魏有天下熒惑入輿鬼占曰兵喪太白犯南河占曰兵起後皆有應五月壬辰太白犯右執法晝見占同上七月庚午月奄鉤鈐占曰喉舌臣憂九月庚午歲星犯軒轅大星己丑月犯左角十年正月丁卯月犯畢占曰將相有以家坐罪者二月己酉月犯房北星五月壬寅月犯牽牛南星乙丑歲星犯軒轅大星占悉同上六月丙申月奄氐占曰將死之國有誅者七月庚辰月犯天關占曰兵起熒惑犯井鉞填星犯輿鬼遂守之占曰大人憂宗廟改八月丁酉月奄牽牛南星占同上九月填星犯輿鬼占曰人主憂丁巳太白入羽林十二月己酉月犯西咸占曰有陰謀十一年三月丁巳月入畢占曰天下兵起一曰有邊兵己卯填星入輿鬼閏月丙午填星又入輿鬼占曰為旱為疫為亂臣五月甲申彗星出天市掃帝座在房心房心宋之分野案占得彗柄者興除舊布新宋興之象癸卯熒惑從行入太微甲辰犯右執法六月己未太白犯東井占曰秦有兵戊寅犯輿鬼占曰國有憂七月辛丑月犯畢占同上八月壬子月犯氐占同上庚申太白從行從右掖門入太微丁卯奄左執法十一月癸亥月入畢占同上乙未月入輿鬼而暈占曰主憂財寶出一曰暈有赦十二年五月甲申月犯歲星在左角占曰為飢留房心之間宋之分野與武王伐紂同得歲者王于時晉始封高祖為宋公六月壬子太白從行入太微右掖門己巳月犯畢占同上七月月犯牛宿占曰天下有大誅十月丙戌月入畢占同上十三年五月丙子月犯軒轅丁亥犯牽牛癸巳熒惑犯右執法八月己酉月犯牽牛丁卯月犯太微占曰人君憂九月壬辰熒惑犯軒轅十月戊申月犯畢占悉同上月犯箕占曰國有憂甲寅月犯畢占同上乙卯填星犯太微留積七十餘日占曰亡君之戒壬戌月犯太微占同上十一月月入太微奄填星占曰王者惡之十四年三月癸丑太白犯五諸侯占同上四月壬申月犯填星於張占曰天下有大喪五月庚子月犯太微占同上壬子有星孛于北斗魁中占曰有聖人受命七月甲辰熒惑犯輿鬼占曰秦有兵丁巳月犯東井占曰軍將死癸亥彗星出太微西柄起上相星下芒漸長至十餘丈進掃北斗紫微中台占曰彗出太微社稷亡天下易王入北斗紫微帝宮空一曰天下得聖主八月甲子太白犯軒轅癸酉填星入太微犯右執法因留太微中積二百餘日乃去占曰填星守太微亡君之戒有徙王九月乙未太白入太微犯左執法丁巳月入太微占曰大人憂十月癸巳熒惑入太微犯西蕃上將仍從行至左掖門內留二十日乃逆行至恭帝元熙元年三月五日出西蕃上將西三尺許又從還入太微時填星在太微熒惑繞填星成鉤己其年四月二十七日丙戌從端門出占曰熒惑與填星鉤己天下更紀甲申月入太微占同上十一年正月高祖討司馬休之魯宗之等潰奔長安五月林邑寇交州交州刺史杜慧度距戰于九真大為所敗十二年七月高祖伐羌十月前驅定陝洛十三年三月索頭大衆緣河為寇高祖討之奔退其別帥托跋嵩交戰又大破之嵩衆殲焉進復攻關八月擒姚泓司兗秦雍悉平索頭凶懼十四年高祖還彭城受宋公十一月左僕射前將軍劉穆之卒明年西虜寇長安雍州刺史朱齡石諸軍陷沒官軍舍而東十二月安帝崩母弟琅邪王踐阼是曰恭帝晉恭帝元熙元年正月丙午三月壬寅月犯太微占悉同上乙卯辰星犯軒轅六月庚辰太白犯太微七月月犯歲星己卯月犯太微太白晝見占悉同上自義熙元年至是太白經天者九日蝕者四皆從上始革代更王臣民失君之象也是夜太白犯哭星十二月丁巳月太白俱入羽林二年二月庚午填星犯太微占悉同上元年七月高祖受宋王二年六月晉帝遜位高祖入宮
