body:
  text: 宋書卷二十九志第十九符瑞下嘉禾五穀之長王者德盛則二苗共秀於周德三苗共穗於商德同本異穟於夏德異本同秀漢宣帝元康四年嘉穀玄稷降于郡國漢章帝元和中嘉禾生郡國漢安帝延光二年六月嘉禾生九真百五十六本七百六十八穗漢桓帝建和二年四月嘉禾生大司農帑藏漢桓帝永康元年八月嘉禾生魏郡魏文帝黃初元年郡國三言嘉禾生吳孫權黃龍三年十月會稽南始平言嘉禾生孫權赤烏七年秋宛陵言嘉禾生晉武帝泰始八年十月瀘水胡王彭護獻嘉禾晉武帝太康四年十二月嘉禾生扶風雍太康五年七月嘉禾生豫章南昌太康八年閏三月嘉禾生東夷校尉園太康八年九月嘉禾生東萊掖晉愍帝建興元年八月癸亥嘉禾生襄平縣一莖七穗建興二年六月嘉禾生平州治三實同蒂建興三年七月嘉禾生襄平縣異體同蒂宋文帝元嘉二年十月嘉禾生潁川陽翟太守垣苗以聞元嘉九年三月嘉禾生義陽豫州刺史長沙王義欣以獻元嘉十年八月嘉禾生汝南苞信豫州刺史長沙王義欣以獻元嘉十一年八月嘉禾一莖九穗生北汝陰太守王玄謨以獻元嘉二十年六月嘉禾一莖九穗生上庸新安梁州刺史劉真道以獻元嘉二十一年嘉禾生新野鄧縣雍州刺史蕭思話以獻元嘉二十二年六月嘉禾生籍田一莖九穗元嘉二十二年七月癸酉嘉禾生平虜陵徐州刺史臧質以獻元嘉二十二年九月嘉禾生太尉府田太尉江夏王義恭以聞元嘉二十二年九月嘉禾生揚州東耕田刺史始興王濬以聞元嘉二十二年嘉禾生華林園百六十穗園丞陳襲祖以聞元嘉二十二年嘉禾生潁川曲陽豫州刺史趙伯符以獻元嘉二十三年七月乙丑嘉禾旅生籍田籍田令褚熙伯以聞元嘉二十三年七月庚午嘉禾生丹陽椒唐里揚州刺史始興王濬以聞元嘉二十三年七月庚辰嘉禾生醴湖屯屯主王世宗以聞元嘉二十三年八月己酉嘉禾生華林園園丞陳襲祖以聞元嘉二十三年九月庚申嘉禾生沛郡蕭征北大將軍衡陽王義季以聞元嘉二十三年嘉禾生江夏汝南荊州刺史南譙王義宣以聞元嘉二十四年七月乙卯嘉禾旅生華林園及景陽山園丞梅道念以聞太尉江夏王義恭上表曰臣聞居高聽卑上帝之功天且弗違聖王之德故能影響二儀甄陶萬有鑒觀今古採驗圖緯未有道闕化虧而禎物著明者也自皇運受終辰曜交和是以卉木表靈山淵效寶伏惟陛下體乾統極休符襲逮若乃鳳儀西郊龍見東邑海酋獻改緇之羽河祇開俟清之源三代象德不能過也有幽必闡無遠弗屆重譯歲至休瑞月臻前者躬籍南畝嘉穀仍植神明之應在斯尤盛四海既穆五民樂業思述汾陽經始靈囿蘭林甫樹嘉露頻流板築初就祥穟如積太平之符於是乎在臣以寡立承乏槐鉉沐浴芳津預覩冥慶不勝抃之情謹上嘉禾甘露頌一篇不足稱揚美烈追用悚汗其頌曰二象攸分三靈樂主齊應合從在今猶古天道誰親唯仁斯輔皇功帝績理冠區宇四民均極我后體茲惟機惟神敬昭文思九族既睦萬邦允釐德以位道致雍熙於穆不已顯允東儲生知夙睿嶽茂淵虛因心則哲令問弘敷繼徽下武儷景辰居軒制合宮漢興未央矧伊聖朝九有已康率由舊典思燭前王乃造陵霄遂作景陽有藹景陽天淵之涘清暑爽立雲堂特起植類斯育動類斯止極望江波遍對嶽峙化德惟達休瑞惟懋誕降嘉種呈祥初構甘露春凝禎穟秋秀含滋匪烈嗣歲仍富昔在放勳曆莢數朝降及重華倚扇清庖鑠矣皇慶比物競昭倫彼典策被此風謠資臣六蔽任兼兩司既恧仲袞又慚鄭緇豈忘衡泌樂道明時敢述休祉愧闕令辭中領軍吉陽縣侯沈演之奏上嘉禾頌曰煥炳禎圖昭晰瑞典運傾方閟時亨始顯綈狀既章鳥文斯辨於皇聖辟承物紀遠明兩辰麗昌輝天衍其一理妙位崇事神業盛淵渥德澤虛寂道政協化安心調樂移性玉衡從體瑤光得正巨星垂采景雲立慶其二極仁所被罔幽不攘至和所感靡況弗彰鴛出丹穴鸚起西湘白鹿踰海素鳥越江結響穹陰儀形鍾陽其三治人奉天乃勤乃格黛耒俶載高廩已積嘉禾重穋甘露流液擢秀辰畦揚穎角澤離穟合豪榮區蔭斥其四盈箱徵殷貫桑表周今我大宋靈貺綢繆帝終撝謙繹思勿休躬薦宗廟溫恭率由降福以誠孝享虔羞其五頒趾推功登徽睿詔恩覃隱顯賞延荒徼河溓海夷山華嶽耀憬琛敻賮兼澤委效日表地外改服請教其六茂對盛時綏萬屢豐厭厭歸素秩秩大同上藏諸用下知所從仰式王度俯歌南風鴻名稱首永保無窮其七元嘉二十四年八月乙巳嘉禾生魚城內晉陵南徐州刺史廣陵王誕以聞元嘉二十五年六月壬寅嘉禾旅生華林園十株七百穗園丞梅道念以聞元嘉二十五年六月壬子嘉禾生籍田籍田令褚熙伯以獻元嘉二十五年七月壬辰嘉禾生北海青冀二州刺史杜坦以獻元嘉二十五年八月丙午嘉禾生太尉江夏王義恭果園江夏國典書令陳穎以聞元嘉二十五年八月壬子嘉禾生建康化義里令丘珍孫以獻元嘉二十五年八月癸丑嘉禾生華林園園丞梅道念以獻元嘉二十五年十一月嘉禾生巴東荊州刺史南譙王義宣以聞元嘉二十六年五月癸酉嘉禾生建康禁中里揚州刺史始興王濬以獻元嘉二十六年六月甲寅嘉禾生籍田籍田令褚熙伯以獻元嘉二十六年七月嘉禾生巴東朐荊州刺史南譙王義宣以獻元嘉二十七年十月己丑嘉禾生北海青州刺史杜坦以聞元嘉二十八年七月戊戌嘉禾生廣陵邵伯埭兗州刺史江夏王義恭以聞孝武帝孝建二年六月癸巳嘉禾二株生江夏王義恭東田孝建二年九月己丑朔嘉禾異畝同穎生齊郡廣饒縣孝建三年七月庚午嘉禾生吳興武康孝武帝大明元年五月戊午嘉禾一株五莖生清暑殿鴟尾中大明元年八月甲申嘉禾生青州異根同穗大明三年九月乙亥嘉禾生北海都昌縣青州刺史顏師伯以聞大明六年八月辛未嘉禾生樂陵青冀二州刺史劉道隆以聞明帝泰始二年七月己酉嘉禾生會稽永興太守巴陵王休若以獻漢章帝元和中嘉麥生郡國晉武帝太康十年六月嘉麥生扶風郡一莖四穗是歲收三倍宋文帝元嘉二十三年醴湖屯生嘉粟一莖九穗屯主王世宗以聞元嘉二十五年六月壬子嘉黍生籍田籍田令褚熙伯以獻吳孫權黃龍三年由拳野稻生改由拳為禾興吳孫亮五鳳元年交址稗草化為稻宋文帝元嘉二十三年吳郡嘉興鹽官縣野稻自生三十許種揚州刺史始興王濬以聞元嘉二十八年七月癸卯尋陽柴桑菽粟旅生彌漫原野江州刺史建平王宏以聞漢章帝元和中嘉瓜生郡國漢安帝元初三年三月東平陵有瓜異處共生八瓜同蒂漢桓帝建和二年七月河東有嘉瓜兩體共蒂晉武帝太康三年六月嘉瓜異體同蒂生河南洛陽輔國大將軍王濬園晉武帝太康元年十二月戊子嘉瓠生寧州寧州刺史費統以聞宋文帝元嘉二十五年四月戊辰嘉瓠生京邑新園園丞徐道興以獻孝武帝大明五年五月嘉瓜生建康蔣陵里丹陽尹王僧朗以獻明帝泰始二年八月戊午嘉瓜生南豫州南豫州刺史山陽王休祐以獻文帝元嘉七年七月乙酉建康簷湖二蓮一蒂元嘉十六年七月壬申華林池雙蓮同幹元嘉十年七月己丑華林天淵池芙蓉異花同蒂元嘉十九年八月壬子揚州後池二蓮合華刺史始興王濬以獻元嘉二十年五月廬陵郡池芙蓉二花一蒂太守王淵以聞元嘉二十年六月壬寅華林天淵池芙蓉二花一蒂園丞陳襲祖以聞元嘉二十年夏永嘉郡後池芙蓉二花一蒂太守臧藝以聞元嘉二十年七月吳興郡後池芙蓉二花一蒂太守孔山士以聞元嘉二十年揚州後池芙蓉二花一蒂刺史始興王濬以獻元嘉二十一年六月丙午華林園天淵池二蓮同幹園丞陳襲祖以聞元嘉二十二年四月樂遊苑池二蓮同幹苑丞梅道念以聞元嘉二十二年七月東宮玄圃園池二蓮同幹內監殿守舍人宮勇民以聞元嘉二十三年六月壬寅華林天淵池芙蓉二花一蒂園丞陳襲祖以聞元嘉二十三年六月辛丑太子西池二蓮共幹池統胡永祖以聞元嘉二十三年八月己酉魚邑三周池二蓮同幹園丞徐道興以聞孝武帝孝建二年六月庚寅玄武湖二蓮同幹孝武帝大明五年籍田芙蓉二花同蒂大司農蕭邃以獻明帝泰始二年八月丙辰五城澳池二蓮同幹都水使者羅僧愍以獻泰始二年八月己未豫州刺史山陽王休祐獻蓮二花一蒂泰始五年六月甲子嘉蓮生湖熟南臺侍御史竺曾度以聞泰始六年六月壬子嘉蓮生東宮玄圃池皇太子以聞晉武帝泰始二年六月壬申嘉奈一蒂十實生酒泉泰始七年六月己亥東宮玄圃池芙蓉二花一蒂皇太子以獻晉成帝咸和六年鎮西將軍庾亮獻嘉橘一蒂十二實晉安帝隆安三年武陵臨沅獻安石榴一蒂六實雲有五色太平之應也曰慶雲若雲非雲若煙非煙五色紛縕謂之慶雲漢宣帝神爵四年春齋戒之莫神光顯著薦鬯之夕神光交錯或降于天或登于地或從四方來集于壇上漢章帝元和三年正月車駕北巡以太牢祠北嶽山見黃白氣宋孝武帝大明元年五月壬子紫氣從景陽樓上層出狀如煙回薄良久明帝泰始二年三月丙午黃紫雲從景陽樓出隨風回久乃消華林園令臧延之以聞泰始二年六月己卯日入後有黃白赤白氣東西竟天光明潤澤久乃消泰始四年十一月辛未崇寧陵令上書言自大明八年至今四年二月宣太后陵明堂前後數有光及五色雲又芳香四滿又五采雲在松下狀如車蓋泰始七年四月戊申夜京邑崇虛館堂前有黃氣狀如寶蓋高十許丈漸有五色道士陸修靜以聞白兔王者敬耆老則見漢光武建武十三年九月南越獻白兔章帝元和中白兔見郡國魏文帝黃初中郡國十九言白兔見晉武帝泰始五年七月己亥白兔見北海即墨即墨長獲以獻晉武帝咸寧二年十月癸亥白兔二見河南陽翟陽翟令華衍獲以獻咸寧四年六月白兔見天水晉武帝太康二年八月壬子白兔見彭城太康二年十月白兔見趙國平鄉趙王倫獲以獻太康四年十一月癸未白兔見北地富平太康八年十二月庚戌白兔見陳留酸棗關內侯成公忠獲以獻晉穆帝永和十二年九月甲申白兔見鄱陽太守王耆之以獻并上頌一篇晉穆帝升平三年十二月庚申北中郎將郗曇獻白兔晉海西公太和九年四月陽穀獻白兔晉孝武帝太元十五年三月白兔見淮南壽陽晉安帝義熙二年四月無錫獻白兔義熙二年四月壽陽獻白兔宋文帝元嘉六年九月長廣昌陽淳于邈獲白兔青州刺史蕭思話以獻元嘉八年閏六月丁亥司徒府白從伊生於淮南繁昌獲白兔以獻元嘉十三年七月甲戌濟南朝陽王道獲白兔青州刺史段宏以獻元嘉十四年正月丙申白兔見山陽縣山陽太守劉懷之以獻元嘉十五年七月壬申山陽師齊獲白兔南兗州刺史江夏王義恭以獻元嘉二十二年三月白兔見東萊當利青州刺史杜驥以聞元嘉二十四年七月丁巳白兔見兗州刺史徐瓊以聞元嘉二十四年七月己酉白兔見東莞太守趙球以獻元嘉二十七年二月壬辰白兔見竟陵荊州刺史南譙王義宣以獻元嘉二十七年六月丙午白兔見南汝陰豫州刺史南平王鑠以獻孝武帝孝建二年正月庚戌白兔見淮南太守申坦以聞孝建三年閏三月乙丑白兔見平原獲以獻孝武大明元年六月庚子白兔見即墨獲以獻大明六年八月辛未白兔見北海青冀二州刺史劉道隆以獻大明六年六月乙丑白兔見青冀二州刺史劉道隆以獻斗殞精王者孝行溢則見闕赤烏周武王時銜穀至兵不血刃而殷服漢章帝元和中赤烏見郡國吳孫權赤烏元年有赤烏集於殿前吳孫