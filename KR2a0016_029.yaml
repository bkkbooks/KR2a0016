陽王子房以聞大明六年二月乙丑木連理生晉陵南徐州刺史新安王子鸞以聞大明六年四月戊辰木連理生營陽湘州刺史建安王休仁以聞大明六年八月乙丑木連理生彭城城內徐州刺史王玄謨以聞大明七年正月己酉珊瑚連理生鬱林安始太守劉勔以聞明帝泰始二年七月木連理生丹陽秣陵泰始四年三月庚戌太子西池冬生樹連理園丞周𦩘猗以獻泰始六年四月丙午木連理生會稽永興太守蔡興宗以聞泰始六年十二月壬辰木連理生豫章南昌太守劉愔之以聞泰始七年二月戊寅木連理生吳郡錢唐太守王延之以聞升明二年木連理生豫州界內刺史劉懷珍以聞比目魚王者德及幽隱則見闕珊瑚鉤王者恭信則見闕芝草王者慈仁則生食之令人度世漢武帝元封二年甘泉宮內産芝九莖連葉漢宣帝元康四年金芝九莖産于函德殿銅池中漢明帝永平十七年春芝生前殿漢桓帝建和元年四月芝草生中黃藏府宋從帝升明二年宣城山中生紫芝一株在所獲以獻明月珠王者不盡介鱗之物則出漢高后景帝時會稽人朱仲獻三寸四寸珠漢章帝元和中郡國獻明珠巨鬯三禺之禾一稃二米王者宗廟修則出黃帝時南夷乘白鹿來獻鬯漢章帝元和中秬秠生郡國華平其枝正平王者有德則生德剛則仰德弱則低漢章帝元和中華平生郡國平露如蓋以察四方之政其國不平則隨方而傾闕蓂莢一名歷莢夾階而生一日生一葉從朔而生望而止十六日日落一葉若月小則一葉萎而不落堯時生階闕萐甫一名倚扇狀如蓬大枝葉小根根如絲轉而成風殺蠅堯時生於廚闕朱草草之精也世有聖人之德則生漢光武建武中元元年五月京師有赤草生水涯漢章帝元和中朱草生郡國魏文帝初朱草生文昌殿側宋文帝元嘉十一年朱草生蜀郡郫縣王之家益州刺史甄法崇以聞景星大星也狀如半月於晦朔助月為明闕賓連闊達生於房室王者御后妃有節則生闕渠搜禹時來獻裘闕浪井不鑿自成王者清靜則應闕西王母舜時來獻白環白琯闕越常周公時來獻白雉象牙闕漢平帝元始元年正月越常重譯獻白雉一黑雉二詔三公薦宗廟漢光武建武十三年九月南越獻白雉漢章帝元和中白雉見郡國漢桓帝永康元年十一月白雉見西河漢獻帝延康元年四月丁巳饒安縣言白雉見又郡國十九言白雉見晉武帝咸寧元年四月丁巳白雉見安豐松滋咸寧元年十二月丙午白雉見梁國睢陽梁王肜獲以獻咸寧三年十一月白雉見渤海饒安相阮溫獲以獻晉武帝太康元年九月庚戌白雉見中山晉愍帝建興三年十二月戊午白雉見襄平建興三年十二月戊午白雉見安帝義熙七年五月白雉見豫章南昌宋文帝元嘉五年五月庚辰白雉見東莞莒縣太守劉玄以聞元嘉十六年二月白雉見陳郡豫州刺史長沙王義欣以獻元嘉十八年二月癸亥白雉見南汝陰宋縣太守文道恩以獻元嘉二十年六月白雉見高平方與縣徐州刺史臧質以獻元嘉二十六年三月戊寅白雉見東安沛郡各一徐兗二州刺史武陵王獲以獻孝武帝大明二年三月己巳白雉雌雄各一見海陵南兗州刺史竟陵王誕以獻大明五年十二月白雉見秦郡南兗州刺史晉安王子勛以獻大明八年二月丁卯白雉見南郡江陵荊州刺史臨海王子頊以獻前廢帝永光元年正月丙午白雉見渤海青州刺史王玄謨以獻永光元年三月甲午朔白雉見新蔡豫州刺史劉德願以獻黃銀紫玉王者不藏金玉則黃銀紫玉光見深山宋明帝泰始二年八月於赭圻城南得紫玉一段圍三尺二寸長一尺厚七尺太宗攻為二爵以獻武文二廟玉女天賜妾也禮含文嘉曰禹卑宮室盡力溝洫百穀用成神龍女降闕地珠王者不以財為寶則生珠闕天鹿者純靈之獸也五色光耀洞明王者道備則至闕角端者日行萬八千里又曉四夷之語明君聖主在位明達方外幽遠之事則奉書而至闕周印者神獸之名也星宿之變化王者德盛則至闕飛菟者神馬之名也日行三萬里禹治水勤勞歷年救民之害天應其德而至闕澤獸黃帝時巡狩至於東濱澤獸出能言達知萬物之精以戒於民為時除害賢君明德幽遠則來闕鐤者幽隱之獸也有明王在位則來為時辟除災害闕騕者神馬也與飛菟同亦各隨其方而至以明君德也闕同心鳥王者德及遐方四夷合同則至闕趹蹄者后土之獸自能言語王者仁孝於國則來禹治水而至闕紫達王者仁義行則見闕小鳥生大鳥王者土地開闢則至闕河精者人頭魚身師曠時所受讖也闕延嬉王者孝道行則至闕大貝王者不貪財寶則出闕威蕤王者禮備則生於殿前闕醴泉水之精也甘美王者修理則出漢光武建武中元元年五月醴泉出京師及郡國飲醴泉者痼病皆愈獨眇者蹇者不差魏文帝初邵國二言醴泉出宋文帝元嘉十二年衡陽湘鄉醴泉出縣庭荊州刺史臨川王義慶以聞孝武帝孝建三年九月甲戌細仗隊省井泉春夏深不盈尺忽至一丈有五色水清澄醴味汲引不窮孝武帝大明二年三月壬子北汝陰樓煩平地出醴泉豫州刺史宗賣心以聞明帝泰豫元年四月乙酉會稽山陰思義醴泉出太守蔡興宗以聞日月揚光日者人君象也人君不假臣下之權則日月揚光明闕芝英者王者親近耆老養有道則生漢章帝元和中芝英生郡國碧石者玩好之物棄則至闕玉甕者不汲而滿王者清廉則出闕山車者山藏之精也不藏金玉山澤以時通山海之饒以給天下則山成其車闕雞駭犀王者賤難得之物則出闕陵出黑丹王者修至孝則出闕神鼎者質文之精也知吉知凶能重能輕不炊而沸五味自生王者盛德則出漢武帝元鼎元年五月五日得鼎汾水上漢明帝永平六年二月廬江太守獻寶鼎出王雒山雒或作雄漢章帝建初七年十月車駕西巡至槐里右扶風禁上美陽得銅器於岐山似酒尊詔在道晨夕以為百官熱酒漢和帝永元元年竇憲征胸奴於漠北酒泉得仲山甫鼎容五斗吳孫權赤烏十二年六月戊戌寶鼎出臨平湖又出東部酃縣吳孫晧寶鼎元年八月在所言得大鼎晉成帝咸和元年十月辛卯宣城舂穀縣山岸崩獲石鼎重二斤受斛餘晉成帝咸康五年豫章南昌民掘地得銅鍾四枚太守褚裒以獻晉穆帝升平五年二月乙未南掖門有馬足陷地得銅鍾一枚宋文帝元嘉十三年四月辛丑武昌縣章山水側自開出神鼎江州刺史南譙王義宣以獻元嘉十九年九月戊申廣陵肥如石梁澗中出石鍾九口大小行次引列南向南兗州刺史臨川王義慶以獻元嘉二十一年十二月新陽獲古鼎於水側有篆書四十二字雍州刺史蕭思話以獻元嘉二十二年豫章豫寧縣出銅鍾江州刺史廣陵王紹以獻孝武帝孝建三年四月丁亥臨川宜黃縣民田中得銅鍾七口內史傅徽以獻孝建三年四月甲辰晉陵延陵得古鍾六口徐州刺史竟陵王誕以獻孝武帝大明七年六月江夏蒲圻獲銅路鼓四面獨足郢州刺史安陸王子綏以獻明帝泰始四年二月丙申豫章望蔡獲古銅鍾高一尺七寸圍二尺八寸太守張辨以獻泰始五年五月壬戌豫章南昌獲古銅鼎容斛七斗江州刺史王景文以獻泰始七年六月甲寅義陽郡獲銅鼎受一斛并蓋並隱起鏤豫州刺史段佛榮以獻從帝升明二年九月建寧萬歲山澗中得銅鍾長二尺一寸豫州刺史劉懷珍以獻漢宣帝元康二年夏神雀集雍元康三年春神雀集泰山宣帝元康三年春五色雀以萬數飛過屬縣元康四年三月神雀五采以萬數飛過集長樂未央北宮高寢甘泉泰畤殿元康四年神雀仍集漢宣帝五鳳三年正月神雀集京師漢明帝永平十七年春神雀五色集京師漢章帝元和中神雀見郡國宋文帝元嘉二十二年白鵲見新野鄧縣雍州刺史蕭思話以聞元嘉二十六年五月癸酉白鵲見建康崇孝里揚州刺史始興王濬以獻孝武帝大明七年三月辛巳白鵲見汝南安陽太守申令孫以獻晉惠帝永嘉元年五月白鼠見東宮皇太子獲以獻宋明帝泰始三年二月壬寅白鼠見樂安青州刺史沈文秀以獻漢昭帝始元元年二月黃鵠下建章宮太液池中漢章帝元和二年二月車駕東巡柴祭岱宗禮畢黃鵠三十從西南來經祠壇上東北過漢武帝太初三年二月五日行幸東海獲赤雁魏文帝初鑊中生赤魚孫權時神雀巢朱雀門孫晧天璽元年臨海郡吏伍曜在海水際得石樹高三尺餘枝莖紫色詰屈傾靡有光采山海經所載玉碧樹之類也晉武帝泰始二年六月壬申白鴿見酒泉延壽延壽長王音以獻晉成帝咸和九年五月癸酉白鵝見吳國錢塘內史虞潭以獻安帝義熙元年南康雩都嵩山有金雞青黃色飛集巖間宋文帝元嘉二十二年湘州刺史南平王鑠獻赤鸚鵡孝武帝大明三年正月丙申媻皇國獻赤白鸚鵡各一宋文帝元嘉二十四年十月甲午揚州刺史始興王濬獻白鸚鵡孝武帝大明五年正月丙子交州刺史垣閎獻白孔雀明帝泰始三年五月乙亥白鴝鵒見京兆雍州刺史巴陵王休若以獻漢桓帝延熹九年四月濟陰東郡濟北平原河水清宋文帝元嘉二十四年二月戊戌河濟俱清龍驤將軍青冀二州刺史杜坦以聞文帝元嘉二十五年五月征北長史廣陵太守范邈上言所領輿縣前有大浦控引潮流水常淤濁自比以來源流清潔纖鱗呈形古老相傳以為休瑞孝武帝孝建三年九月濟河清冀州刺史垣護之以聞孝武帝大明五年九月庚戌河濟俱清平原太守申纂以聞明帝泰始元年二月丙寅揚淮水清潔有異於常州治中從事史張緒以聞漢光武建武初野繭穀充給百姓其後耕蠶稍廣二事漸息吳孫權黃龍三年夏野蠶繭大如卵宋文帝元嘉十六年宣城宛陵廣野蠶成繭大如雉卵彌漫林谷年年轉盛孝武帝大明三年五月癸巳宣城宛陵縣石亭山生野蠶三百餘里太守張辨以聞孝武帝大明三年十一月己巳肅慎氏獻楛矢石砮高麗國譯而至大明五年正月戊午元日花雪降殿庭時右衛將軍謝莊下殿雪集衣還白上以為瑞於是公卿並作花雪詩史臣按詩云先集為霰韓詩曰霰英也花葉謂之英離騷云秋菊之落英左思云落英飄颻是也然則霰為花雪矣草木花多五出花雪獨六出明帝泰始二年五月甲寅赭中獲石柏長三尺二寸廣三尺五寸揚州刺史建安王休仁以獻泰始三年十一月乙卯盱眙獲石柏寧朔將軍段佛榮以獻漢和帝在位十七年郡國言瑞應八十餘品帝讓而不宣
