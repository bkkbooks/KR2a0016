body:
  text: 宋書卷三十志第二十五行一昔八卦兆而天人之理著九疇序而帝王之應明雖可以知從德獲自天之祐違道陷神聽之罪然未詳舉徵效備考幽明雖時列鼎雉庭穀之異然而未究者衆矣至於鑑悟後王多有所闕故仲尼作春秋具書祥眚以驗行事是則九疇陳其義於前春秋列其效於後也逮至伏生創紀大傳五行之體始詳劉向廣演洪範休咎之文益備故班固斟酌經傳詳紀條流誠以一王之典不可獨闕故也夫天道雖無聲無臭然而應若影響天人之驗理不可誣司馬彪纂集光武以來以究漢事王沈魏書志篇闕凡厥災異但編帝紀而已自黃初以降二百餘年覽其災妖以考之事常若重規沓矩不謬前說又高堂隆郭景純等據經立辭終皆顯應闕而不序史體將虧今自司馬彪以後皆撰次論序斯亦班固遠采春秋舉遠明近之例也又按言之不從有介蟲之孽劉歆以為毛蟲視之不明有螺蟲之孽劉歆以為羽蟲按月令夏蟲羽秋蟲毛宜如歆說是以舊史從之五行精微非末學所究凡已經前議者並即其言以釋之未有舊說者推準事理以俟來哲五行傳曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直謂木失其性而為災也又曰貌之不恭是謂不肅厥咎狂厥罰雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥惟金沴木班固曰蓋工匠為輪矢者多傷敗及木為變怪皆為不曲直也木不曲直魏文帝黃初六年正月雨木冰按劉歆說木不曲直也劉向曰冰者陰之盛木者少陽貴臣象也此人將有害則陰氣脅木木先寒故得雨而冰也是年六月利成郡兵蔡方等殺太守徐質據郡反多所脅略并聚亡命遣二校尉與青州刺史共討平之太守古之諸侯貴臣有害之應也一說以木冰為甲兵之象是歲既討蔡方又八月天子自將以舟師征吳戎卒十餘萬連旍數百里臨江觀兵晉元帝太興三年二月辛未雨木冰後二年周顗戴淵刁協劉隗皆遇害與春秋同事是其應也一曰是後王敦攻京師又其象也晉穆帝永和八年正月乙巳雨木冰是年殷浩北伐明年軍敗十年廢黜又曰荀羡殷浩北伐桓溫入關之象也晉孝武帝太元十四年十二月乙巳雨木冰明年二月王恭為北蕃八月庾楷為西蕃九月王國寶為中書令尋加領軍將軍十七年殷仲堪為荊州雖邪正異規而終同摧滅是其應也一曰苻堅雖敗關河未一丁零鮮卑侵略司兗竇揚勝扇逼梁雍兵役不已又其象也吳孫亮建興二年諸葛恪征淮南行後所坐聽事棟中折恪妄興徵役奪民農時作為邪謀傷國財力故木失其性致毀折也及旋師而誅滅於周易又為棟橈之凶也晉武帝太康五年五月宣帝廟地陷梁折八年正月太廟殿又陷改作廟築基及泉其年九月遂更營新廟遠致名材雜以銅柱陳協為匠作者六萬人十年四月乃成十一月庚寅梁又折按地陷者分離之象梁折者木不曲直也孫盛曰于時後宮殿有孽火又廟梁無故自折先是帝多不豫益惡之明年帝崩而王室頻亂遂亡天下晉惠帝太安二年成都王穎使陸機率衆向京師擊長沙王乂軍始引而牙竿折俄而戰敗機被誅穎尋奔潰卒賜死初河間王顒謀先誅長沙廢太子立穎長沙知之誅其黨卞粹等故穎來伐機又以穎得遐邇心將為漢之代王遂委質於穎為犯從之將此皆姦謀之罰木不曲直也王敦在武昌鈴下儀仗生華如蓮花狀五六日而萎落此木失其性而為變也干寶曰鈴閣尊貴者之儀鈴下主威儀之官今狂花生於枯木又在鈴閣之間言威儀之富榮華之盛皆如狂花之發不可久也其後終以逆命沒又加戮是其應也一說此花孽也於周易為枯楊生華桓玄始篡龍旗竿折玄田獵出入不絶昏夜飲食恣奢土水妨農又多姦謀故木失其性也夫旗所以擬三辰章著明也旗竿之折高明去矣在位八十日而敗宋明帝泰始二年五月丙午南琅邪臨沂黃城山道士盛道度堂屋一柱自然夜光照室內此木失其性也或云木腐自光廢帝升明元年吳興餘杭舍亭禾菌樹生李實禾菌樹民間所謂胡頽樹貌不恭魏文帝居諒暗之始便數出遊獵體貌不重風尚通脫故戴凌以直諫抵罪鮑勛以忤旨極刑天下化之咸賤守節此貌之不恭也是以享國不永後祚短促春秋魯君居喪不哀在戚而有嘉容穆叔謂之不度後終出奔蓋同事也魏尚書鄧揚行步弛縱筋不束體坐起傾倚若無手足此貌之不恭也管輅謂之鬼躁鬼躁者凶終之徵後卒誅死晉惠帝元康中貴遊子弟相與為散髮倮身之飲對弄婢妾逆之者傷好非之者負譏希世之士恥不與焉蓋胡翟侵中國之萌也豈徒伊川之民一被髮而祭者乎晉惠帝元康中賈謐親貴數入二宮與儲君遊戲𣰋降下心又嘗同奕爭道成都王穎厲色曰皇太子國之儲二賈謐何敢無禮謐猶不悛故及於禍齊王冏既誅趙倫因留輔政坐拜百官符敕臺府淫醟專驕不一朝覲此狂恣不肅之容也天下莫不高其功而慮其亡也冏終弗改遂至夷滅太元中人不復著帩頭頭者元首帩者令髮不垂助元首為儀飾者也今忽廢之若人君獨立無輔以至危亡也其後桓玄篡位舊為屐者齒皆達楄上名曰露卯太元中忽不徹名曰陰卯其後多陰謀遂致大亂晉安帝義熙七年晉朝拜授劉毅世子毅以王命之重當設饗宴親請吏佐臨視至日國僚不重白默拜於中王人將反命毅方知大以為恨免郎中令劉敬叔官識者怪焉此墮略嘉禮不肅之妖也陳郡謝靈運有逸才每出入自扶接者常數人民間謠曰四人挈衣裙三人捉坐席是也此蓋不肅之咎後坐誅宋明帝泰始中幸臣阮佃夫勢傾朝廷室宇豪麗車服鮮明乘車常偏向一邊違正立執綏之體時人多慕效此亦貌不恭之失也時偏左之化行方正之道廢矣後廢帝常單騎遊遨出入市里營寺未嘗御輦終以殞滅雨魏明帝太和元年秋數大雨多暴雷電非常至殺鳥雀案楊阜上疏此雨之罰也時帝居喪不哀出入弋獵無度奢侈繁興奪民農時故木失其性而雨為災也太和四年八月大雨霖三十餘日伊洛河漢皆溢歲以凶饑孫亮太平二年二月甲寅大雨震電乙卯雪大寒案劉歆說此時當雨而不當大大雨雨之罰也於始震電之明日而雪大寒又寒之罰也劉向以為既已震電則雪不當復降皆失時之異也天戒若曰為君失時賊臣將起先震電而後雪者陰見間隙起而勝陽逆殺之禍將及也亮不悟尋見廢此與春秋魯隱同也晉武帝泰始六年六月大雨霖甲辰河洛沁水同時並溢流四千九百餘家殺二百餘人沒秋稼千三百六十餘頃晉武太康五年七月任城梁國暴雨害豆麥太康五年九月南安霖雨暴雪折樹木害秋稼魏郡淮南平原雨水傷秋稼是秋魏郡西平郡九縣霖雨暴水霜傷秋稼晉惠帝永寧元年十月義陽南陽東海霖雨淹害秋麥晉成帝咸康元年八月乙丑荊州之長沙攸醴陵武陵之龍陽三縣雨水浮漂屋室殺人傷損秋稼宋文帝元嘉二十一年六月京邑連雨百餘日大水孝武帝大明元年正月京邑雨水大明五年七月京邑雨水大明八年八月京邑雨水明帝太始二年六月京邑雨水順帝升明三年四月乙亥吳郡桐廬縣暴風雷電揚砂折木水平地二丈流漂居民服妖魏武帝以天下凶荒資財乏匱始擬古皮辨裁縑帛為白帢以易舊服傅玄曰白乃軍容非國容也干寶以為縞素凶喪之象帢毀辱之言也蓋革代之後攻殺之妖也初為白帢橫縫其前以別後名之曰顏俗傳行之至晉永嘉之間稍去其縫名無顏帢而婦人束髮其緩彌甚紒之堅不能自立髮被于額目出而已無顏者愧之言也覆額者慚之貌其緩彌甚言天下忘禮與義放縱情性及其終極至乎大恥也永嘉之後二帝不反天下愧焉魏明帝著繡帽被縹紈半袖嘗以見直臣楊阜阜諫曰此於禮何法服邪帝默然近服妖也縹非禮之色褻服不二今之人主親御非法之章所謂自作孽不可禳也帝既不享永年身沒而祿去王室後嗣不終遂亡天下魏明帝景初元年發銅鑄為巨人二號曰翁仲置之司馬門外案古長人見為國亡長狄見臨洮為秦亡之禍始皇不悟反以為嘉祥鑄銅人以象之魏法亡國之器而於義竟無取焉蓋服妖也魏尚書何晏好服婦人之服傅玄曰此服妖也夫衣裳之制所以定上下殊內外也大雅云玄袞赤舄鉤膺鏤鍚歌其文也小雅云有嚴有翼共武之服詠其武也若內外不殊王制失服妖既作身隨之亡末嬉冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也吳婦人之修容者急束其髮而劘角過于耳蓋其俗自操束大急而廉隅失中之謂也故吳之風俗相驅以急言論彈射以刻薄相尚居三年之喪者往往有致毀以死諸葛患之著正交論雖不可以經訓整亂蓋亦救時之作也孫休後衣服之制上長下短又積領五六而裳居一二干寶曰上饒奢下儉逼上有餘下不足之妖也至孫晧果奢暴恣情於上而百姓雕困於下卒以亡國是其應也晉興後衣服上儉下豐著衣者皆厭紤蓋裙君衰弱臣放縱下掩上之象也陵遲至元康末婦人出兩襠加乎脛之上此內出外也為車乘者苟貴輕細又數變易其形皆以白篾為純古喪車之遺象乘者君子之器蓋君子立心無事不崇實也干寶曰及晉之禍天子失柄權制寵臣下掩上之應也永嘉末六宮才人流徙戎翟內出外之應也及天下亂擾宰輔方伯多負其任又數改易不崇實之應也晉武帝泰始後中國相尚用胡貊盤及為羌貊炙貴人富室必置其器吉享嘉會皆此為先太康中天下又以氈為桬頭及絡帶襟口百姓相戲曰中國必為胡所破也氈産於胡而天下以為桬頭帶身襟口胡既三制之矣能𣰋敗乎干寶曰元康中氐羌反至于永嘉劉淵石勒遂有中都自後四夷迭據華土是其應也晉武帝太康後天下為家者移婦人於東方空萊北庭以為園囿干寶曰夫王朝南向正陽也后北宮位太陰也世子居東宮位少陽也今居內於東是與外俱南面也亢陽𣰋陰婦人失位而干少陽之象也賈后讒戮愍懷俄而禍敗亦及昔初作履者婦人圓頭男子方頭圓者順從之義所以別男女也晉太康初婦人皆履方頭此去其圓從與男無別也太康之中天下為晉世寧之舞手接杯槃反覆之歌曰晉世寧舞杯槃夫樂生人心所以觀事故記曰總干山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也又曰其治民勞者舞行綴遠其治民逸者舞行綴近今接杯槃於手上而反覆之至危也杯槃者酒食之器也而名曰晉世寧者言晉世之士偷苟於酒食之間而其知不及遠晉世之寧猶杯槃之在手也晉惠帝元康中婦人之飾有五兵佩又以金銀瑁之屬為斧鉞戈戟以當笄干寶曰男女之別國之大節故服物異等贄幣不同今婦人而以兵器為飾又妖之大也遂有賈后之事終以兵亡天下元康中婦人結髮者既成以繒急束其環名曰擷子紒始自中宮天下化之其後賈后果害太子元康中天下始相倣為胓杖以柱掖其後稍施其錞住則植之夫木東方之行金之臣也扶者杖體之器胓其頭者尤便用也必傍柱掖者傍救之象也王室多故而元帝以蕃臣樹德東方維持天下柱掖之應也至社稷無主海內歸之遂承天命建都江外獨立之應也元康末至太安間江淮之域有敗編自聚于道多者或至四五十量干寶嘗使人散而去之或投林草或投坑谷明日視之悉復如故民或云見狸銜而聚之亦未察也寶說曰夫編者人之賤服最處于下而當勞辱下民之象也敗者疲斃之象也道者地理四方所以交通王命所由往來也故今敗編聚於道者象下民罷病將相聚為亂絶四方而壅王命之象也在位者莫察太安中發壬午兵百姓嗟怨江夏男子張昌遂首亂荊楚從之者如流於是兵革歲起天下因之遂大破壞此近服妖也晉孝懷永嘉以來士大夫竟服生箋單衣遠識者怪之竊指擲曰此則古者繐衰之布諸侯大夫所以服天子也今無故畢服之殆有應乎其後愍懷晏駕不獲厥所晉元帝太興以來兵士以絳囊縛紒紒在首莫上焉周易乾為首坤為囊坤臣道也晉金行赤火色金之賊也以朱囊縛紒臣道上侵之象也到永昌元年大將軍王敦舉兵內攻六軍散潰舊為羽扇柄刻木象其骨形羽用十取全數也晉中興初王敦南征始改為長柄下出可捉而減其羽用八識者尤之曰夫羽扇翼之名也創為長柄者執其柄制羽翼也以十改八者將以未備奪已備也是時為衣者又上短帶至于掖著帽者以帶縛項下逼上上無地也下袴者直幅為口無殺下大失裁也尋有兵亂三年而再攻京師晉海西初嗣位迎官忘設豹尾識者以為不終之象近服妖也晉司馬道子於府北園內為酒爐列肆使姬人酤鬻酒肴如裨販者數遊其中身自買易因醉寓寢動連日夜漢靈帝嘗若此干寶以為君將失位降在皂隸之象也道子卒見廢徙以庶人終桓玄篡立殿上施絳綾帳鏤黃金為顏四角金龍銜五色羽葆流蘇羣下竊相謂曰頗類輀車此服妖也晉末皆冠小冠而衣裳博大風流相倣輿臺成俗識者曰此禪代之象也永初以後冠還大云宋文帝元嘉六年民間婦人結髮者三分髮抽其鬟直向上謂之飛天紒始自東府流被民庶時司徒彭城王義康居東府其後卒以陵上徙廢孝武帝世豫州刺史劉德願善御車世祖嘗使之御畫輪幸太宰江夏王義恭第德願挾牛杖催世祖云日暮宜歸又求益僦車世祖甚歡此事與漢靈帝西園蓄私錢同也孝武世幸臣戴法興權亞人主造圓頭履世人莫不效之其時圓進之俗大行方格之風盡矣明帝初司徒建安王休仁統軍赭圻制烏紗帽反抽帽裙民間謂之司徒狀京邑翕然相尚休仁後果以疑逼致禍龜孽晉惠帝永熙初衛瓘家人炊飯墮地盡化為螺出足起行螺龜類近龜孽也干寶曰螺被甲兵象也於周易為離離為戈兵明年瓘誅雞禍魏明帝景初二年廷尉府中有雌雞變為雄不鳴不將干寶曰是歲晉宣帝平遼東百姓始有與能之議此其象也然晉三后並以人臣終不鳴不將又天意也晉惠帝元康六年陳國有雞生雄雞無翅既大墜坑而死王隱曰雄胤嗣象坑地事為母象賈后誣殺愍懷殆其應也晉惠帝太安中周玘家有雌雞逃承霤中六七日而下奮翼鳴將獨毛羽不變其後有陳敏之事敏雖控制江表終無綱紀文章殆其象也卒為玘所滅雞禍見玘家又天意也晉元帝太興中王敦鎮武昌有雌雞化為雄天戒若曰雌化為雄臣陵其上其後王敦再攻京師晉孝武太元十三年四月廣陵高平閻嵩家雄雞生無右翅彭城到象之家雞無右足京房易傳曰君用婦人言則雞生妖晉安帝隆安元年八月琅邪王道子家青雌雞化為赤雄不鳴不將後有桓玄之事具如其象隆安四年荊州有雞生角角尋墮落是時桓玄始擅西夏狂慢不肅故有雞禍角兵象尋墮落者暫起不終之妖也晉安帝元興二年衡陽有雌雞化為雄八十日而冠萎衡陽桓玄楚國封略也後篡位八十日而敗徐廣以為玄之象也宋文帝元嘉十二年華林園雌雞漸化為雄後孝武即位皇太后令行于外亦猶漢宣帝時雌雞為雄至哀帝時元后與政也明帝泰始中吳興東遷沈法符家雞有四距青眚青祥晉武帝咸寧元年八月丁酉大風折太社樹有青氣出焉此青祥也占曰東莞當有帝者明年元帝生是時帝大父武王封東莞由是徙封琅邪孫盛以為中興之表晉室之亂武帝子孫無孑遺社樹折之應又風之罰也晉惠帝元康中洛陽南山有作聲曰韓尸尸識者曰韓氏將死也言尸尸者盡死意也其後韓謐誅而韓族殲焉此青祥也金沴木魏文帝黃初七年正月幸許昌許昌城南門無故自崩帝心惡之遂不入還洛陽此金沴木木動也五月宮車晏駕京房易傳曰上下咸悖厥妖城門壞晉元帝太興二年六月吳郡米廩無故自壞是歲大饑死者數千晉明帝太寧元年周筵自歸王敦既立宅宇而所起五間六架一時躍出墮地餘桁猶亘柱頭此金沴木也明年五月錢鳳謀亂遂族滅筵而湖熟尋亦為墟矣晉安帝元興元年正月丙子司馬元顯將西討桓玄建牙揚州南門其東者難立良久乃正近沴妖也尋為桓玄所禽元興三年五月樂賢堂壞天意若曰安帝嚚眊不及有樂賢之心故此堂見沴也晉安帝義熙九年五月乙酉國子聖堂壞宋文帝元嘉十七年劉斌為吳郡郡堂屋西頭鴟尾無故落地治之未畢東頭鴟尾復落頃之斌誅
