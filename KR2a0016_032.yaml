body:
  text: 宋書卷三十二志第二十二五行三五行傳曰棄法律逐功臣殺太子以妾為妻則火不炎上謂火失其性而為災也又曰視之不明是謂不哲厥咎舒厥罰懊厥極疾時則有草妖時則有裸蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火裸蟲劉歆傳以為羽蟲火不炎上魏明帝太和五年五月清商殿災初帝為平原王納河南虞氏為妃及即位不以為后更立典虞車工卒毛嘉女是為悼皇后后本仄微非所宜升以妾為妻之罰也魏明帝青龍元年六月洛陽宮鞠室災二年四月崇華殿災延于南閣繕復之至三年七月此殿又災帝問高堂隆此何咎也於禮寧有祈禳之義乎對曰夫災變之發皆所以明教誡也唯率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君苟飾宮室不知百姓空竭故天應之以旱火從高殿起也案舊占災火之發皆以臺榭宮室為誡今宜罷散民役務從節約清掃所災之處不敢於此有所營造萐莆嘉禾必生此地以報陛下虔恭之德不從遂復崇華殿改曰九龍以郡國前後言龍見者九故以為名多棄法度疲民逞欲以妾為妻之應也吳孫亮建興元年十二月武昌端門災改作端門又災內殿案春秋魯雉門及兩觀災董仲舒以為天意欲使定公誅季氏若曰去其高顯而奢僭者也漢武帝世遼東高廟災其說又同今此與二事頗類也且門者號令所出殿者聽政之所是時諸葛恪秉政而矜慢放肆孫峻總禁旅而險害終著武昌孫氏尊號所始天戒若曰宜除其貴要之首者恪果喪衆殄民峻授政於綝綝廢亮也或曰孫權毀徹武昌以增太初宮諸葛恪有遷都意更起門殿事非時宜故見災也京房易傳曰君不思道厥妖火燒宮吳孫亮太平元年二月朔建業火人火之也是秋孫綝始秉政矯以亮詔殺呂據滕胤明年又輒殺朱異棄法律逐功臣之罰也吳孫休永安五年二月白虎門北樓災六年十月石頭小城火燒西南百八十丈是時嬖人張布專擅國勢多行無禮而韋昭盛冲終斥不用兼遣察戰等為使驚擾州郡致使交趾反亂是其咎也吳孫晧建衡二年三月大火燒萬餘家死者七百人案春秋齊火劉向以為桓公好內聽女口妻妾數更之罰也晧制令詭暴蕩棄法度勞臣名士誅斥甚衆後宮萬餘女謁數行其中隆寵佩皇后璽者又多矣故有大火晉武帝太康八年三月乙丑震災西閣楚王所止坊及臨商觀窗十年四月癸丑崇賢殿災十月庚辰含章鞠室修成堂前廡丙坊東屋輝章殿南閣火時有上書者曰漢王氏五侯兄弟迭任今楊氏三公並在大位天變屢見竊為陛下憂之楊珧由是乞退是時帝納馮紞之間廢張華之功聽楊駿之讒離衛瓘之寵此逐功臣之罰也明年宮車晏駕其後楚王承竊發之旨戮害二公身亦不免震災其坊又天意乎晉惠帝元康五年閏月庚寅武庫火張華疑有亂先固守然後救災是以纍代異寶王莽頭孔子履漢高斷白蛇劍及二百萬人器械一時蕩盡是後愍懷見殺殺太子之罰也天戒若曰夫設險擊柝所以固其國儲積戎器所以戒不虞今冢嗣將傾社稷將泯禁兵無所復施皇旅又將誰衛帝后不悟終喪四海是其應也張華閻纂皆曰武庫火而氐羌反太子見廢則四海可知矣元康八年十一月高原陵火是時賈后凶恣賈謐擅朝惡積罪稔宜見誅絶天戒若曰臣妾之不可者雖親貴莫比猶宜忍而誅之如吾燔高原陵也帝既眊弱而張華又不納裴頠劉卞之謀故后遂與謐誣殺太子也干寶云高原陵火太子廢其應也漢武帝世高園便殿火董仲舒對與此占同晉惠帝永康元年帝納皇后羊氏后將入宮衣中忽有火衆咸怪之太安二年后父玄之以成都之逼憂死永興元年成都遂廢后處之金墉城而殺其叔父同之是後還立立而復廢者四又詔賜死荀藩表全之雖末還在位然憂逼折辱終古未聞此孽火之應晉惠帝永興二年七月甲午尚書諸曹火延崇禮闥及閣道夫百揆王化之本王者棄法律之應也清河王覃入為晉嗣不終于位又殺太子之罰也晉孝懷帝永嘉四年十一月襄陽火死者三千餘人是時王如自號大將軍司雍二州牧衆四五萬攻略郡縣以為己邑都督力屈嬰城自守賊遂攻逼襄陽此下陵上陽失節火災出也晉元帝太興中王敦鎮武昌武昌火起興衆救之救於此而發於彼東西南北數十處俱應數日不絶班固所謂濫炎妄起雖興師不能救之之謂也干寶曰此臣而君行亢陽失節之災也晉元帝永昌二年正月癸巳京都大火三月饒安東光安陵三縣火燒七千餘家死者萬五千人晉明帝太寧元年正月京都火是時王敦威侮朝廷多行無禮內外臣下咸懷怨毒極陰生陽故有火災與董仲舒說春秋陳火同事也晉穆帝永和五年六月震災石虎太武殿及兩廂端門光爛照天金石皆盡火月餘乃滅是年四月石虎死矣其後胡遂滅亡晉海西太和中郗愔為會稽六月大旱災火燒數千家延及山陰倉米數百萬斛炎烟蔽天不可撲滅晉孝武帝寧康元年三月京都風火大起是時桓溫入朝志在陵上少主踐位人懷憂恐此與太寧火同事晉孝武帝太元十年正月立國子學學生多頑嚚因風放火焚房百餘間是後考課不厲賞黜無章有育才之名無收賢之實書云知人則哲此不哲之罰先兆也太元十三年十二月乙未延賢堂災丙申螽斯則百堂及客館驃騎庫皆災于時朝多弊政衰陵日兆不哲之罰皆有象類主相不悟終至亂亡云晉安帝隆安二年三月龍舟二乘災是水沴火也晉安帝元興元年八月庚子尚書下舍曹火元興三年盧循攻略廣州刺史吳隱之閉城固守是年十月壬戌夜大火起時民人避寇盈滿城內隱之懼有應賊但務嚴兵不先救火由是府舍焚燒蕩盡死者萬餘人因遂散潰悉為賊擒殆與襄陽火同占也晉安帝義熙四年七月丁酉尚書殿中吏部曹火義熙十一年京都所在大行火災吳界尤甚火防甚峻猶自不絶王弘時為吳郡白日在聽事上見天上有一赤物下狀如信幡徑集路南人家屋上火即復大發弘知天為之災不罪火主宋文帝元嘉五年正月戊子京邑大火元嘉七年十二月乙亥京邑火延燒太社北牆元嘉二十九年三月壬午京邑大火風雷甚壯後廢帝元徽三年正月己巳京邑大火元徽三年二月戊辰京邑大火燒二岸數千家燠庶徵之燠劉向班固以冬亡冰及霜不殺草應之京房易傳又曰夏則暑殺人冬則物華實吳孫亮建興元年九月桃李華孫權世政煩賦重民雕於役是時諸葛恪始輔政息校官原逋責除關梁崇寬厚此舒緩之應也一說桃李寒華為草妖或屬華孽魏元帝景元三年十月桃李華自高貴弒死之後晉文王深樹恩德事崇優緩此其應也晉穆帝永和九年十二月桃李華是時簡文輔政事多弛略舒緩之應也宋順帝升明元年十月於潛桃李奈結實草妖漢獻帝建安二十五年春正月魏武帝在洛陽將起建始殿伐濯龍祠樹而血出又掘徙梨根傷亦血出帝惡之遂寢疾是月崩蓋草妖又赤祥也是歲魏文帝黃初元年也吳孫亮五鳳元年六月交趾稗草化為稻昔三苗將亡五穀變種此草妖也其後亮廢蜀劉禪景耀五年宮中大樹無故自折譙周憂之無所與之言乃書柱曰衆而大其之會具而授若何復言曹者衆也魏者大也衆而大天下其當會也具而授如何復有立者乎蜀果亡如周言此草妖也吳孫晧天璽元年吳郡臨平湖自漢末穢塞是時一夕忽開除無草長老相傳此湖塞天下亂此湖開天下平吳尋亡而九服為一吳孫晧天紀三年八月建業有鬼目菜生工黃狗家依緣棗樹長丈餘莖廣四寸厚三分又有砶菜生工吳平家高四尺如枇杷形上圓徑一尺八寸下莖廣五寸兩邊生葉緣色東觀案圖名鬼目作芝草砶菜作平慮遂以狗為侍芝郎平為平慮郎皆銀印青綬干寶曰明年晉平吳王濬止船正得平渚姓名顯然指事之徵也黃狗者吳以土運承漢故初有黃龍之瑞及其季年而有鬼目之妖託黃狗之家黃稱不改而貴賤大殊天道精微之應也晉惠帝元康二年春巴西郡界竹生花紫色結實如麥外皮青中赤白味甘元康九年六月庚子有桑生東宮西廂日長尺餘甲辰枯死此與殷太戊同妖太子不能悟故至廢戮也班固稱野木生朝而暴長小人將暴居大臣之位危亡國家象朝將為墟也是後孫秀張林尋用事遂至大亂晉惠帝永康元年四月丁巳立皇孫臧為皇太孫五月甲子就東宮桑又生於西廂明年趙倫篡位鴆殺臧此與愍懷同妖也永康元年四月壯武國有桑化為柏是月張華遇害晉孝懷帝永嘉三年冬項縣桑樹有聲如解材民謂之桑林哭案劉向說桑者喪也又為哭聲不祥之甚是時京師虛弱胡寇交逼司馬越無衛上國之心四年冬委而南出至五年春薨于此城石勒邀其衆圍而射之王公以下至庶人死者十餘萬人又剖越棺焚其尸是敗也中原無所請命洛京尋沒桑哭之應也永嘉六年五月無錫縣有四株茱萸樹相樛而生狀若連理先是郭景純筮延陵偃鼠遇臨之益曰後當復有妖樹生若瑞而非辛螫之木也儻有此東南數百里必有作逆者其後徐馥作亂此草妖也郭以為木不曲直永嘉六年七月豫章郡有樟樹久枯是月忽更榮茂與昌邑枯社復生同占懷帝不終其祚元帝由支族興之應也晉明帝太寧元年九月會稽剡縣木生如人面是後王敦稱兵作逆禍敗無成漢哀靈之世並有此妖而人貌備具故其禍亦大今此但人面而已故其變亦輕晉成帝咸和六年五月癸亥曲阿有柳樹倒地六載是月忽復起生咸和九年五月甲戌吳雄家有死榆樹是日因風雨起生與漢上林斷柳起生同象初康帝為吳王于時雖改封琅邪而猶食吳郡為邑是帝越正體饗國之象也曲阿先亦吳地象見吳邑雄舍又天意也晉哀帝興寧三年五月癸卯盧陵西昌縣修明家有死栗樹是日忽起生時孝武年四歲而簡文居蕃四海宅心及得位垂統則祚隆孝武識者竊曰西昌修明之祥帝諱實應之矣是與漢宣帝頗同象也晉海西太和元年涼州楊樹生松天戒若曰松不改柯易葉楊者柔脆之木此永久之業將集危亡之地是後張天錫降氐晉孝武太元十四年六月建寧同樂縣枯木斷折忽然自立相屬京房易傳曰棄正作淫厥妖木斷自屬妃后有專木仆反立是時治道方僻多失其正其後張夫人專寵及帝崩兆庶歸咎張氏焉晉安帝元興三年荊江二界生竹實如麥晉安帝義熙二年九月揚州營揚武將軍營士陳蓋家有苦砶菜莖高四尺六寸廣三尺二寸此殆與吳終同象也義熙中宮城上御道左右皆生蒺藜草妖也蒺藜有刺不可踐而行生宮牆及馳道天戒若曰人君拱默不能聽政雖居宸極猶若空宮雖有御道未嘗馳騁皆生蒺藜若空廢也義熙八年太社生薰樹于壇側薰於文尚黑宋水德將王之符也羽蟲之孽魏文帝黃初四年五月有鵜鶘鳥集靈芝池案劉向說此羽蟲之孽又青祥也詔曰此詩人所謂汙澤者也曹詩刺恭公遠君子近小人今豈有賢智之士處于下位否則斯鳥胡為而至哉其博舉天下俊德茂才獨行君子以答曹人之刺於是楊彪管寧之徒咸見薦舉此謂覩妖知懼者也雖然不能優容亮直而多溺偏私矣京房易傳曰辟退有德厥妖水鳥集于國井黃初末宮中有燕生鷹口爪俱赤此與商紂宋隱同象景初元年又有燕生巨鷇於衛國涓桃里李蓋家形若鷹吻似燕案劉向說此羽蟲之孽又赤眚也高堂隆曰此魏室之大異宜防鷹揚之臣於蕭牆之內其後晉宣王起遂有魏室漢獻帝建安二十三年禿鶖鳥集鄴宮文昌殿後池明年魏武王薨魏文帝黃初三年又集雒陽芳林園池七年又集其夏文帝崩景初末又集芳林園池前世再至輒有大喪帝惡之其年明帝崩蜀劉禪建興九年十月江陽至江州有鳥從江南飛渡江北不能達墮水死者以千餘是時諸葛亮連年動衆志吞中夏而終死渭南所圖不遂又諸將分爭頗喪徒旅鳥北飛不能達墮水死皆有其象也亮竟不能過渭又其應乎此與漢楚國烏鬬墮泗水粗類矣魏明帝青龍三年戴鵀巢巨鹿人張臶家臶博學有高節不應袁紹高幹之命魏太祖亦不至優游嘉遁門徒數百太守王肅雅敬焉時年百餘歲謂門人曰戴鵀陽鳥而巢于門陰此凶祥也乃援琴歌詠作詩一首旬日而卒按占羽蟲之孽也魏明帝景初元年陵霄閣始構有鵲巢其上鵲體白黑雜色此羽蟲之孽又白黑祥也帝以問高堂隆對曰詩云惟鵲有巢惟鳩居之今興起宮室而鵲來巢此宮室未成身不得居之之象天意若曰宮室未成將有它姓制御之不可不深慮於是帝改容動色吳孫權赤烏十二年四月有兩烏銜鵲墮東館權使領丞相朱據燎鵲以祭案劉歆說此羽蟲之孽又黑祥也視不明聽不聰之罰也是時權意溢德衰信讒好殺二子將危將相俱殆覩妖不悟加之以燎昧道之甚者也明年太子和廢魯王霸賜死朱據左遷陸議憂卒是其應也東館典教之府鵲墮東館又天意乎吳孫權太元二年正月封前太子和為南陽王遣之長沙有鵲巢其帆檣和故宮僚聞之皆憂慘以為檣末傾危非久安之象是後果不得其死吳孫亮建興二年十一月大鳥五見于春申吳人以為鳳皇明年改元為五鳳漢桓帝時有五色大鳥司馬彪云政治衰缺無以致鳳乃羽蟲孽耳孫亮未有德政孫峻驕暴方甚此與桓帝同事也案瑞應圖大鳥似鳳而為孽者非一疑皆是也吳孫晧建衡三年西苑言鳳皇集以之改元義同於亮晉武帝泰始四年八月翟雉飛上閶闔門趙倫既篡洛陽得異鳥莫能名倫使人持出周旋城邑匝以問人積日宮西有小兒見之逆自言曰服留鳥翳持者即還白倫倫使更求小兒至又見之將入宮密籠鳥閉兒戶中明日視悉不見此羽蟲之孽又妖之甚者也趙倫篡位有鶉入太極殿雉集東堂按太極東堂皆朝享聽政之所而鶉雉同日集之者天意若曰不當居此位也詩云鵲之疆疆鶉之奔奔人之無良我以為君其此之謂乎昔殷宗感雉雊懼而修德倫覩二物曾不知戒故至滅亡也晉孝懷帝永嘉元年二月洛陽東北步廣里地陷有鵝出蒼色者飛翔沖天白者止焉此羽蟲之孽又黑白祥也董養曰步廣周之狄泉盟會地也白者金色蒼為胡象其可盡言乎是後劉淵石勒相繼擅華懷愍二帝淪滅非所晉孝懷帝世周玘家有鵝在籠中而頭斷籠外玘亡後家誅晉明帝太寧三年八月庚戌有鳥二蒼黑色翼廣一丈四尺其一集司徒府射而殺之其一集市北家人舍亦獲焉此羽蟲之孽又黑祥也閏月戊子帝崩後有蘇峻祖約之亂晉成帝咸和二年正月有五鷗鳥集殿庭此又白祥也是時庾亮苟違衆謀將召蘇峻有言不從之咎故白祥先見也三年二月峻果作亂宮室焚毀化為汙萊其應也晉成帝咸康八年七月白鷺集殿屋是時康帝始即位此不永之祥也後涉再朞而帝崩劉向曰野鳥入處宮室將空張瓘在涼州正朝放隹雀諸鳥出手便死左右放者悉飛去晉孝武帝太元十六年正月鵲巢太極東頭鴟尾又巢國子學堂西頭十八年東宮始成十九年正月鵲又巢其西門此殆與魏景初同占學堂風教所聚西門金行之祥也晉安帝義熙三年龍驤將軍朱猗戍壽陽婢炊飯忽有羣烏集竈競來啄噉婢驅逐不去有獵狗咋殺烏鵲餘者因共啄狗即死又噉其肉唯餘骨存五年六月猗死宋武帝永初三年臨軒拜徐羡之為司空百僚陪位有二野鸛集太極鴟尾鳴呼少帝景平二年春鸛巢太廟西鴟尾驅去復還文帝元嘉二年春有江鷗鳥數百集太極殿前小階內明年誅徐羡之等羊禍晉成帝咸和二年五月司徒王導羊生無後足此羊禍也京房易傳曰足少者下不勝任也明年蘇峻入京都導與成帝俱幽石頭僅乃免身是其應也宋孝武帝大明七年永平郡獻三角羊羊禍也赤眚赤祥公孫淵時襄平北市生肉長圍各數尺有頭目口喙無手足而動搖此赤眚也占曰有形不成有體無聲其國滅亡淵尋為魏所誅吳戍將鄧嘉殺猪祠神治畢縣之忽見一人頭往食肉嘉引弓射中之咋咋作聲繞屋三日近赤祥也後人白嘉謀北叛闔門被誅京房易妖曰山見葆江于邑邑有兵狀如人頭赤色吳諸葛恪將見誅盥洗水血臭侍者授衣衣亦臭此近赤祥也晉武帝太康七年十一月河陰有赤雪二頃此赤祥也後涉四載而帝崩王宮遂亂晉惠帝元康五年三月呂縣有流血東西百餘步此赤祥也元康末窮凶極亂僵尸流血之應也干寶以為後八載而封雲亂徐州殺傷數萬人是其應也晉惠帝永康元年三月尉氏雨血夫政刑舒緩則有常燠赤祥之妖此歲正月送愍懷太子幽于許宮天戒若曰不宜緩恣姦人將使太子冤死惠帝愚眊不悟是月愍懷遂斃於是王室釁成禍流天下淖齒殺齊閔王日天雨血沾衣天以告也此之謂乎京房易傳曰歸獄不解茲謂追非厥咎天雨血茲謂不親民有怨心不出三年無其宗人又曰佞人祿功臣戮天雨血晉愍帝建興四年十二月丙寅丞相府斬督運令史淳于伯血逆流上柱二丈三尺此赤祥也是時後將軍褚裒鎮廣陵丞相揚聲北伐伯以督運稽留及役使臧罪依征軍法戮之其息訴稱伯督運事訖無所稽乏受賕役使罪不及死兵家之勢先聲後實實是屯戍非為征軍自四年以來運漕稽停皆不以軍興法論僚佐莫之理及有此變司直彈劾衆官元帝又無所問於是頻旱三年干寶以為寃氣之應也郭景純曰血者水類同屬於坎坎為法家水平潤下不宜逆流此政有咎失之徵也
