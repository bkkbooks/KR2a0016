大雷義熙九年十一月甲戌雷乙亥又雷宋文帝元嘉四年十一月癸丑雷元嘉五年六月丙寅震太廟破東鴟尾徹壁柱元嘉六年正月丙寅雷且雪元嘉七年十月丙子雷元嘉八年十二月庚辰雷元嘉九年十一月甲戌雷且雪元嘉十四年震初寧陵口標四破至地十七年廢大將軍彭城王義康骨肉相害自此始也前廢帝景和元年九月甲午雷震明帝泰始二年九月辛巳雷震泰始四年十月辛卯雷震泰始四年十一月癸卯朔雷震泰始五年十一月乙巳雷震泰始六年十一月庚午雷後廢帝元徽三年九月戊戌雷元徽三年九月丁未雷元徽三年九月戊午雷震元徽三年十月辛未雷甲戌又雷從帝升明三年二月二十四日丙申震建陽門鼓妖晉惠帝元康九年三月有聲若牛出許昌城十二月廢太子幽于許宮按春秋晉文公柩有聲如牛劉向以為鼓妖其說曰聲如此怒象也將有急怒之謀以生兵甲之禍此其類也明年賈后遣黃門孫慮殺太子擊以藥杵聲聞于外蘇峻在歷陽外營將軍鼓自鳴如人弄鼓者峻手自斫之曰我鄉土時有此則城空矣俄而作亂夷滅此聽不聰之罰鼓妖先作也石虎末洛陽城西北九里石牛在青石趺上忽鳴喚聲聞四十里虎遣人打落兩耳及尾鐵釘釘四腳晉孝武太元十五年三月己酉朔東北有聲如雷案劉向說以為雷當託於雲猶君託於臣無雲而雷此君不恤下下民將叛之象也及帝崩而天下漸亂孫恩桓玄交陵京邑吳興長城縣夏架山有石鼓長丈餘面徑三尺所下有盤石為足鳴則聲如金鼓三吳有兵晉安帝隆安中大鳴後有孫靈秀之亂魚孽魏齊王嘉平四年五月有二魚集于武庫屋上此魚孽也王肅曰魚生於淵而亢於屋介鱗之物失其所也邊將其殆有棄甲之變乎後果有東關之敗干寶又以為高貴鄉公兵禍之應二說皆與班固旨同晉武帝太康中有鯉魚二見武庫屋上干寶曰武庫兵府魚有鱗甲亦兵類也魚既極陰屋上太陽魚見屋上象至陰以兵革之禍干太陽也至惠帝初誅楊駿廢太后矢交館閣元康末賈后謗殺太子尋亦誅廢十年間母后之難再興是其應也自是禍亂構矣京房易妖曰魚去水飛入道路兵且作蝗蟲魏文帝黃初三年七月冀州大蝗民饑案蔡雍說蝗者在上貪苛之所致也是時孫權歸從帝因其有西陵之役舉大衆襲之權遂背叛晉武帝泰始十年六月蝗是時荀賈任政疾害公直晉孝懷帝永嘉四年五月大蝗自幽并司冀至于秦雍草木牛馬毛鬣皆盡是時天下兵亂漁獵生民存亡所繫唯司馬越苟晞而已而競為暴刻經略無章晉愍帝建興四年六月大蝗去歲胡寇頻攻北地馮翊麴允等悉衆禦之是時又禦劉曜為曜所破西京遂潰晉元帝太興元年六月蘭陵合鄉蝗害禾稼乙未東莞蝗蟲縱廣三百里害苗稼太興元年七月東海彭城下邳臨淮四郡蝗蟲害禾豆太興元年八月冀青徐三州蝗食生草盡至于二年是時中州淪喪暴亂滋甚太興二年五月淮陵臨淮淮南安豐廬江諸郡蝗食秋麥太興三年五月癸丑徐州及揚州江西諸郡蝗吳民多餓死去年王敦并領荊州苛暴之釁自此興矣又是年初徐州刺史蔡豹帥衆伐周撫晉孝武帝太元十五年八月兗州蝗是時丁零寇兗豫鮮卑逼河南征戍不已太元十六年五月飛蝗從南來集堂邑縣界害苗稼是年春發取江州兵營甲士二千人家口六七千人配護軍及東宮後尋散亡殆盡又邊將連有征役豕禍吳孫晧寶鼎元年野豕入右大司馬丁奉營此豕禍也後奉見遣攻穀陽無功反晧怒斬其導軍及舉大衆北出奉及萬彧等相謂曰若至華里不得不各自還也此謀泄奉時雖已死晧追討穀陽事殺其子溫家屬皆遠徙豕禍之應也龔遂曰山野之獸來入宮室宮室將空又其象也晉孝懷帝永嘉中壽春城內有豕生兩頭而不活周馥取而觀之時通數者竊謂曰夫豕北方之畜胡狄象也兩頭者無上也生而死不遂也天意若曰勿生專利之謀將自致傾覆也周馥不悟遂欲迎天子令諸侯俄為元帝所敗是其應也石勒亦尋渡淮百姓死者十八九晉愍帝建武元年有豕生八足聽不聰之罰也京房易傳曰凡妖作各象其類足多者所任邪也是後有劉隗之變晉成帝咸和六年六月錢塘民家豭豕生兩子皆人面如胡人狀其身猶豕京房易妖曰豕生人頭豕身者邑且亂亡此豭豕而産異之甚者也晉孝武帝太元十年四月京都有豕一頭二身八足十三年京都民家豕産子一頭二身八足並與建武同妖也是後宰相沈酗不恤朝政近習用事漸亂國綱至於大壞也黑眚黑祥晉孝懷帝永嘉五年十二月黑氣四塞近黑祥也宋文帝元嘉二十六年三月幸京口有黑氣暴起占有兵明年虜南寇至瓜步飲馬于江火沴水晉武帝太康五年六月任城魯國池水皆赤如血案劉向說近火沴水也聽之不聰之罰也京房易傳曰淫於色賢人潛國家危厥異水流赤晉穆帝升平三年二月涼州城東池中有火四年四月姑臧澤水中又有火此火沴水之妖也明年張天錫殺中護軍張雍雍執政臣也晉安帝元興二年十月錢塘平湖水赤桓玄諷吳郡使言開除以為己瑞俄而玄敗
