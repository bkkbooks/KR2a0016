body:
  text: 宋書卷三十三志第二十三五行四五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下謂水失其性而為災也又曰聽之不聰是謂不謀厥咎急厥罰寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水魚孽劉歆傳以為介蟲之孽謂蝗屬也水不潤下魏文帝黃初四年六月大雨霖伊洛溢至津陽城門漂數千家流殺人初帝即位自鄴遷洛營造宮室而不起宗廟太祖神主猶在鄴嘗於建始殿饗祭如家人之禮終黃初不復還鄴而圓丘方澤南北郊社稷等神位未有定所此簡宗廟廢祭祀之罰也京房易傳曰顓事有知誅罰絶理厥災水其水也雨殺人已隕霜大風天黃饑而不損茲謂泰厥災水殺人避遏有德茲謂狂厥災水水流殺人也已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰厥水流入國邑隕霜殺穀吳孫權赤烏八年夏茶陵縣鴻水溢出流漂二百餘家十三年秋丹陽故鄣等縣又鴻水溢案權稱帝三十年竟不於建業創七廟但有父堅一廟遠在長沙而郊禋禮闕嘉禾初羣臣奏宜郊祀又弗許末年雖一南郊而北郊遂無聞焉且三江五湖衡霍會稽皆吳楚之望亦不見秩反禮羅陽妖神以求福助天意若曰權簡宗廟不禱祠廢祭祀示此罰欲其感悟也太元元年又有大風涌水之異是冬權南郊疑是鑒咎徵乎還而寢疾明年四月薨一曰權時信納譖訴雖陸議勳重子和儲二猶不得其終與漢安帝聽讒免楊震廢太子同事也且赤烏中無年不用兵百姓愁怨八年秋將軍馬茂等又圖逆云魏明帝景初元年九月淫雨過常冀兗徐豫四州水出沒溺殺人漂失財産帝自初即位便淫奢極欲多占幼女或奪士妻崇飾宮室妨害農戰觸情恣欲至是彌甚號令逆時饑不損役此水不潤下之應也吳孫亮五鳳元年夏大水亮即位四年乃立權廟又終吳世不上祖宗之號不修嚴父之禮昭穆之數有闕亮及休晧又並廢二郊不秩羣神此簡宗廟不祭祀之罰也又是時孫峻專政陰勝陽之應乎吳孫休永安四年五月大雨水泉涌溢昔歲作浦里塘功費無數而田不可成士卒死叛或自賊殺百姓愁怨陰氣盛也休又專任張布退盛沖等吳人賊之之應也吳孫休永安五年八月壬午大雨震電水泉涌溢晉武帝泰始四年九月青徐兗豫四州大水七年六月大雨霖河洛伊沁皆溢殺二百餘人帝即尊位不加三后祖宗之號泰始二年又除明堂南郊五帝坐同稱昊天上帝一位而已又省先后配地之禮此簡宗廟廢祭祀之罰與漢成帝同事一曰昔歲及此年藥蘭泥白虎文秦涼殺刺史胡烈牽弘遣田璋討泥又司馬望以大衆次淮北禦孫晧內外兵役西州饑亂百姓愁怨陰氣盛也咸寧初始上祖宗號太熙初還復五帝位晉武帝咸寧元年九月徐州水二年七月癸亥河南魏郡暴水殺百餘人八月荊州郡國五大水去年采擇良家子女露面入殿帝親簡閲務在姿色不訪德行有蔽匿者以不敬論搢紳愁怨天下非之陰盛之應也咸寧三年六月益梁二州郡國八暴水殺三百餘人七月荊州大水九月始平郡大水十月青徐兗豫荊益梁七州又水是時賈充等用事日盛而正人疏外者多咸寧四年七月司冀兗豫荊揚郡國二十大水晉武帝太康二年六月泰山江夏大水泰山流三百家殺六千餘人江夏亦殺人是時平吳後王濬為元功而詆劾妄加荀賈為無謀而並蒙重賞收吳姬五千納之後宮此其應也太康四年七月司豫徐兗荊揚郡國二十大水傷秋稼壞屋室有死者太康六年三月青涼幽冀郡國十五大水太康七年九月西方安定等郡國八大水太康八年六月郡國八大水晉惠帝元康二年有水災元康五年五月潁川淮南大水六月城陽東莞大水殺人荊揚徐兗豫五州又大水是時帝即位已五載猶未郊祀蒸嘗亦多不身親近簡宗廟廢祭祀之罰也班固曰王者即位必郊祀天地望秩山川若乃不敬鬼神政令違逆則霧水暴至百川逆溢壞鄉邑溺人民水不潤下也元康六年五月荊揚二州大水按董仲舒說水者陰氣盛也是時賈后亂朝寵樹賈郭女主專政之應也元康八年五月金墉城井水溢漢成帝時有此妖班固以為王莽之象及趙倫篡位即此應也倫廢帝於此城井溢所在又天意乎元康八年九月荊揚徐兗冀五州大水是時賈后暴戾滋甚韓謐驕猜彌扇卒害太子旋亦禍滅元康九年四月宮中井水沸溢晉惠帝永寧元年七月南陽東海大水是時齊王冏秉政專恣陰盛之應晉惠帝太安元年七月兗豫徐冀四州水時將相力政無尊主心晉孝懷帝永嘉四年四月江東大水是時王導等潛懷翼戴之計陰氣盛也晉元帝太興三年六月大水是時王敦內懷不臣傲佷作威後終夷滅太興四年七月大水明年有石頭之敗晉元帝永昌二年五月荊州及丹陽宣城吳興壽春大水晉明帝太寧元年五月丹陽宣城吳興壽陽大水是時王敦疾害忠良威權震主尋亦誅滅晉成帝咸和元年五月大水是時嗣主幼沖母后稱制庾亮以元舅民望決事禁中陰勝陽也咸和二年五月戊子京都大水是冬蘇峻稱兵都邑塗炭咸和四年七月丹陽宣城吳興會稽大水是冬郭默作亂荊豫共討之半歲乃定咸和七年五月大水是時帝未親務政在大臣陰勝陽也晉成帝咸康元年八月長沙武陵大水是年三月石虎掠騎至歷陽四月圍襄陽於是加王導大司馬集徒旅又使趙胤路永劉仕王允之陳光五將軍各帥衆戍衛百姓愁怨陰氣盛也晉穆帝永和四年五月大水是時幼主沖弱母后臨朝又將相大臣各爭權政與咸和初同事也永和五年五月大水永和六年五月大水永和七年七月甲辰夜濤水入石頭死者數百人去年殷浩以私忿廢蔡謨遐邇非之又幼主在上而殷桓交惡選徒聚甲各崇私權陰勝陽之應也一說濤入石頭江右以為兵占是後殷浩桓溫謝尚荀羡連年征伐晉穆帝升平二年五月大水是時桓溫權制朝廷征伐是專升平五年四月大水晉海西太和六年六月京都大水平地數尺侵及太廟朱雀大航纜斷三艘流入大江丹陽晉陵吳國吳興臨海五郡又大水稻稼蕩沒黎庶饑饉初四年桓溫北伐敗績十喪其九五年又征淮南踰歲乃克百姓愁怨之應也晉簡文帝咸安元年十二月壬午濤水入石頭明年妖賊盧竦率其屬數百人入殿略取武庫三庫甲仗游擊將軍毛安之討滅之晉孝武帝太元三年六月大水是時孝武幼弱政在將相太元五年大水去年氐賊攻沒襄陽又向廣陵於是逼徙江淮民悉令南渡三州失業道饉相望謝玄雖破句難等自後征戍不已百姓愁怨之應也太元六年六月荊江揚三州大水太元十年夏大水初八年破苻堅自後有事中州役無已歲兵民愁怨之應也太元十三年十二月濤水入石頭明年丁零鮮卑寇擾司兗鎮戍西北疲於奔命太元十五年七月兗州大水是時緣河紛爭征戍勤悴太元十七年六月甲寅濤水入石頭毀大航漂船舫有死者京口西浦亦濤入殺人永嘉郡潮水涌起近海四縣人民多死後四年帝崩而王恭再攻京師京師亦發大衆以禦之太元十九年七月荊州彭城大水傷稼太元二十年荊州彭城大水太元二十一年五月癸卯大水是時政事多弊兆庶非之晉安帝隆安三年五月荊州大水去年殷仲堪舉兵向京都是年春又殺郗恢陰盛作威之應也仲堪尋亦敗亡隆安五年五月大水是時司馬元顯作威陵上又桓玄擅西夏孫恩亂東國陰勝陽之應也晉安帝元興二年十二月桓玄篡位甚明年二月庚寅夜濤水入石頭是時貢使商旅方舟萬計漂敗流斷骸胔相望江左雖有濤變未有若斯之甚三月義軍克京都玄敗走遂夷滅元興三年二月己丑朔夜濤水入石頭漂沒殺人大航流敗晉安帝義熙元年十二月己未濤水入石頭義熙二年十二月己未夜濤水入石頭明年駱球父環潛結桓胤殷仲文等謀作亂劉雅亦謀反凡所誅滅數十家義熙三年五月丙午大水義熙四年十二月戊寅濤水入石頭明年王旅北討鮮卑義熙六年五月丁巳大水乙丑盧循至蔡洲義熙八年六月大水義熙九年五月辛巳大水義熙十年五月丁丑大水戊寅西明門地穿涌水出毀門扉及限七月乙丑淮北災風大水殺人義熙十一年七月丙戌大水淹漬太廟百官赴救明年王旅北討關河宋文帝元嘉五年六月京邑大水七年右將軍到彥之率師入河元嘉十一年五月京邑大水十三年司空檀道濟誅元嘉十二年六月丹陽淮南吳吳興義興五郡大水京邑乘船元嘉十八年五月江水泛溢沒居民害苗稼明年右軍將軍裴方明率雍梁之衆伐仇池元嘉十九年二十年東諸郡大水元嘉二十九年五月京邑大水孝武帝孝建元年八月會稽大水平地八尺後二年虜寇青冀州遣羽林軍卒討伐孝武帝大明元年五月吳興義興大水大明四年八月雍州大水大明四年南徐南兗州大水後廢帝元徽元年六月壽陽大水順帝升明元年七月雍州大水甚於關羽樊城時升明二年二月於潛翼異山一夕五十二處水出流漂居民七月丙午朔濤水入石頭居民皆漂沒寒庶徵之寒劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽草皆常寒之罰也京房易傳曰有德遭險茲謂逆命厥異寒誅罰過深當燠而寒盡六日亦為雹害正不誅茲謂養賊寒七十二日殺飛禽道人始去茲謂傷其寒物無霜而死涌水出戰不量敵茲謂辱命其寒雖雨物不茂吳孫權嘉禾三年九月朔隕霜傷穀按劉向說誅罰不由君出在臣下之象也是時校事呂一專作威福與漢元帝時石顯用事隕霜同應班固書九月二日陳壽言朔皆明未可以傷穀也一後亦伏誅京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土隙間不教而誅茲謂虐其霜反在草下嘉禾四年七月雨雹又隕霜案劉向說雹者陰脅陽是時呂一作威用事詆毀重臣排陷無辜自太子登以下咸患毒之而一反獲封侯寵異與春秋公子遂專任雨雹同應也漢安帝信讒多殺無辜亦雨雹董仲舒曰凡雹皆為有所脅行專一之政故也吳孫權赤烏四年正月大雪平地深三尺鳥獸死者太半是年夏全琮等四將軍攻略淮南襄陽戰死者千餘人其後權以讒邪數責讓陸議議憤恚致卒與漢景武大雪同事也赤烏十一年四月雨雹是時權聽讒將危太子其後朱據屈晃以忤意黜辱陳象以忠諫族誅而太子終廢此有德遭險誅罰過深之應也晉武帝泰始六年冬大雪泰始七年十二月大雪明年有步闡楊肇之敗死傷甚衆泰始九年四月辛未隕霜是時賈充親黨比周用事與魯定公漢元帝時隕霜同應也晉武帝咸寧三年八月平原安平上黨秦郡霜害三豆咸寧三年八月河間暴風寒冰郡國五隕霜傷穀是後大舉征吳馬隆又帥精勇討涼州咸寧五年五月丁亥巨鹿魏郡雨雹傷禾麥辛卯雁門雨雹傷秋稼咸寧五年六月庚戌汲郡廣平陳留滎陽雨雹丙辰又雨雹損傷秋麥千三百餘頃壞屋百三十餘間癸亥安定雨雹七月丙申魏郡又雨雹閏月壬子新興又雨雹八月庚子河東弘農又雨雹兼傷秋稼三豆晉武帝太康元年三月河東高平霜雹傷桑麥四月河南河內河東魏郡弘農雨雹傷麥豆五月東平平陽上黨雁門濟南雨雹傷禾麥三豆太康元年四月庚午畿內縣二及東平范陽縣雨雹癸酉畿內縣五又雨雹是時王濬有大功而權戚互加陷抑帝從容不斷陰脅陽之應也太康二年二月辛酉殞霜于濟南琅邪傷麥壬申琅邪雨雪傷麥三月甲午河東隕霜害桑太康二年五月丙戌城陽章武琅邪傷麥庚寅河東樂安東平濟陰弘農濮陽齊國