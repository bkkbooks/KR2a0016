body:
  text: 宋書卷三十七志第二十七州郡三荊州郢州湘州雍州梁州秦州荊州刺史漢治武陵漢壽魏晉治江陵王敦治武昌陶侃前治沔陽後治武昌王廙治江陵庾亮治武昌庾翼進襄陽復還夏口桓溫治江陵桓沖治上明王忱還江陵此後遂治江陵宋初領郡三十一後分南陽順陽襄陽新野竟陵為雍州湘川十郡為湘州江夏武陵屬郢州隨郡義陽屬司州北義陽省凡餘十一郡文帝世又立宋安左郡領拓邊綏慕樂寧慕化仰澤革音歸德七縣後省改汶陽郡又度屬今領郡十二縣四十八戶六萬五千六百四去京都水三千三百八十南郡太守秦立漢高帝元年為臨江國景帝中二年復故晉武帝太康元年改曰新郡尋復故宋初領縣九後州陵監利度屬巴陵旌陽文帝元嘉十八年省併枝江二漢無旌陽見晉太康地志疑是吳所立凡餘六縣戶一萬四千五百四十四口七萬五千八十七江陵公相漢舊縣華容公相漢舊縣晉武太康元年省後復立當陽男相漢舊縣臨沮伯相漢舊縣晉太康永寧地志屬襄陽後度編縣男相漢舊縣枝江侯相漢舊縣南平內史吳南郡治江南領江陵華容諸縣晉武帝太康元年分南郡江南為南平郡治作唐後治江安領縣四戶一萬二千三百九十二口四萬五千四十九去州水二百五十去京都水三千五百無陸江安侯相晉武帝太康元年立孱陵侯相二漢舊縣屬武陵晉太康地志屬南平作唐侯相前漢無後漢屬武陵晉太康地志屬南平南安令晉武帝分江安立天門太守吳孫休永安六年分武陵立充縣有松梁山山有石石開處數十丈其高以努仰射不至其上名天門因此名郡充縣後省孝武孝建元年度郢州明帝泰始三年復舊領縣四戶三千一百九十五去州水一千二百陸六百去京都水三千五百澧陽令晉武帝太康四年立臨澧令晉武帝太康四年立零陽令漢舊縣屬武陵漊中令二漢無晉太康地志有疑是吳立宜都太守太康地志王隱地道何志並云吳分南郡立張勃吳録云劉備立按吳志呂蒙平南郡據江陵陸遜別取宜都獲秭歸枝江夷道縣初權與劉備分荊州而南郡屬備則是備分南郡立宜都非吳立也習鑿齒云魏武平荊州分南郡枝江以西為臨江郡建安十五年劉備改為宜都領縣四戶一千八百四十三口三萬四千二百二十去州水三百五十無陸去京都水三千七百三十夷道令漢舊縣佷山男相前漢屬武陵後漢屬南郡晉武帝太康元年改為興山後復舊宜昌令何志晉武帝立按太康永寧地志並無疑是此後所立夷陵令漢舊縣吳改曰西陵晉武帝太康元年復舊巴東公相譙周巴記云初平元年荊州帳下司馬趙韙建議分巴郡諸縣安漢以下為永寧郡建安六年劉璋改永寧為巴東郡以涪陵縣分立丹興漢葭二縣立巴東屬國都尉後為涪陵郡晉太康地志巴東屬梁州惠帝太安二年度益州穆帝永和初平蜀度屬荊州永初郡國志無巴渠黽陽二縣領縣七戶一萬三千七百九十五口四萬五千二百三十七去州水一千三百去京都水四千六百八十魚復侯相漢舊縣屬巴郡劉備章武二年改為永安晉武帝太康元年復舊朐令漢舊縣屬巴郡新浦令何志新立南浦令劉禪建興八年十月益州牧閻宇表改羊渠立羊渠不詳何志吳立漢豐令何志不注置立太康地志巴東有漢昌縣疑是巴渠令何志不注置立黽陽令何志不注置立晉末平吳時峽中立武陵郡有黽陽黔陽縣咸寧元年並省汶陽太守何志新立先屬梁州文帝元嘉十一年度宋初有四縣後省汶陽縣今領三縣戶九百五十八口四千九百一十四去州水七百陵四百去京都四千一百僮陽令何志新立沮陽令何志新立高安令何志新立南義陽太守義陽郡別見晉末以義陽流民僑立宋初有四縣孝武孝建二年以平陽縣併厥西平陽本為郡江左僑立魏世分河東為平陽郡晉末省為縣今領縣二戶一千六百七口九千七百四十一厥西令二漢無晉太康地志屬義陽平氏令漢舊名屬南陽新興太守魏志建安二十年省雲中定襄五原朔方四郡郡立一縣合為此郡屬并州晉江左僑立宋初六縣後省雲中漢舊名屬雲中孝武孝建二年又省九原縣漢舊名屬五原併定襄宕渠流寓立併廣牧凡今領縣三戶二千三百一口九千五百八十四定襄令漢舊名廣牧男相漢舊名屬朔方新豐令漢舊名屬京兆僑流立南河東太守河東郡秦立晉成帝咸康三年征西將軍庾亮以司州僑戶立宋初八縣孝武孝建二年以廣戚前漢屬沛後漢晉太康地志屬彭城江左流寓立併聞喜弘農江左立僑郡後併省為縣臨汾併松滋安邑併永安臨汾安邑漢舊名臨汾後屬平陽今領縣四戶二千四百二十三口一萬四百八十七去州水一百二十去京都水三千五百聞喜令故曲沃秦改為左邑漢武帝元鼎六年行幸至此聞南越破改名聞喜永安令前漢彘縣順帝陽嘉二年更名後屬平陽松滋令前漢屬廬江後漢無晉屬安豐疑是有流民寓荊土故立譙縣令別見譙流民寓立建平太守吳孫休永安三年分宜都立領信陵興山秭歸沙渠四縣晉又有建平都尉領巫北井泰昌建始四縣晉武帝咸寧元年改都尉為郡於是吳晉各有建平郡太康元年吳平併合五年省建始縣後復立永初郡國有南陵建始信陵興山永新永寧平樂七縣今並無按太康地志無南陵永新永寧平樂新鄉五縣疑是江左所立信陵興山沙渠疑是吳立建始晉初所立也領縣七戶一千三百二十九口二萬八百一十四去州水陸一千去京都水四千三百八十巫令漢舊縣秭歸侯相漢舊縣歸鄉公相何志故屬秭歸吳分按太康地志云秭歸有歸鄉故夔子國楚滅之而無歸鄉縣何志所言非也北井令晉太康地志有先屬巴東晉武帝泰始五年度建平泰昌令晉太康地志有沙渠令晉起居注太康元年立按沙渠是吳建平郡所領吳平不應方立不詳新鄉令永寧太守晉安帝僑立為長寧郡宋明帝以名與文帝陵同改為永寧宋初五縣後省綏安晉安帝立孝武孝建二年後以僮陽晉安帝立併長寧綏寧晉安帝立併上黃今領縣二戶一千一百五十七口四千二百七十四去州陸六十去京都三千四百三十長寧侯相晉安帝立上黃男相宋初屬襄陽後度二漢晉並無此縣武寧太守晉安帝隆安五年桓玄以沮漳降蠻立領縣二戶九百五十八口四千九百一十四樂鄉令晉安帝立長林男相晉安帝立郢州刺史魏文帝黃初三年以荊州江北諸郡為郢州其年罷并荊非今地吳又立郢州孝武孝建元年分荊州之江夏竟陵隨武陵天門湘州之巴陵江州之武昌豫州之西陽又以南郡之州陵監利二縣度屬巴陵立郢州天門後還荊領郡六縣三十九戶二萬九千四百六十九口十五萬八千五百八十七去京都水二千一百江夏太守漢高帝立本屬荊州永初郡國及何志並治安陸此後治夏口又有安陸曲陵曲後別郡領縣七戶五千七十二口二萬三千八百一十汝南侯相本沙羡土晉末汝南郡民流寓夏口因立為汝南縣沙羡令漢舊縣吳省晉武太康元年復立治夏口孝武太元三年省併沙陽後以其地為汝南實土沌陽子相江左立孝昌侯相永初郡國何志並無徐志有疑是孝武世所立惠懷子相江左立沙陽男相二漢舊縣本名沙羡屬武昌晉武帝太康元年更名又立沙羡而沙陽徙今所治文帝元嘉十六年度巴陵孝武孝建元年度江夏羡陽子相晉惠帝世安陸人朱伺為陶侃將求分安陸東界為此縣蒲圻男相晉武帝太康元年立本屬長沙文帝元嘉十六年度巴陵孝武孝建元年度江夏竟陵太守晉惠帝元康九年分江夏西界立何志又有宋縣徐無領縣六戶八千五百九十一口四萬四千三百七十五去州水一千四百去京都水三千四百萇壽令明帝泰始六年立竟陵侯相漢舊縣屬江夏新市子相漢舊縣屬江夏霄城侯相永初郡國有何徐不注置立新陽男相永初郡國有何徐不注置立雲杜侯相漢舊縣屬江夏武陵太守前漢地理志高帝立續漢郡國志云秦昭王立名黔中郡高帝五年更名本屬荊州領縣十戶五千九十口三萬七千五百五十五去州水一千去京都水三千臨沅男相漢舊縣龍陽侯相晉太康地理志何志吳立漢壽伯相前漢立後漢順帝陽嘉三年更名吳曰吳壽晉武帝復舊沅南令漢光武建武二十六年立遷陵侯相漢舊縣辰陽男相漢舊縣舞陽令前漢作無陽後漢無晉太康地志有酉陽長漢舊縣黚陽長二漢無晉太康地志有沅陵令漢舊縣巴陵太守文帝元嘉十六年分長沙之巴陵蒲圻下雋江夏之沙陽四縣立屬湘州孝武孝建元年割南郡之監利州陵度江夏屬郢州二年又度長寧之綏安屬巴陵何志訖元嘉二十年巴陵郡以十六年立應在何志而闕領縣四戶五千一百八十七口二萬五千三百一十六去州水五百去京都水二千五百巴陵男相晉武帝太康元年立屬長沙本領度支校尉立郡省下雋侯相漢舊縣屬長沙監利侯相按晉起居注太康四年復立南郡之監利縣尋復省之言由先有而被省也疑是吳所立又是吳所省孝武孝建元年度州陵侯相漢舊縣屬南郡晉武帝太康元年復立疑是吳所省也孝武孝建元年度明帝泰始四年以綏安縣併州陵武昌太守晉起居注太康元年改江夏為武昌郡領縣三戶二千五百四十六口一萬一千四百一十一去京都水一千一百武昌侯相魏文帝黃初二年孫權改鄂為武昌陽新侯相吳立鄂令漢舊縣屬江夏吳改鄂為武昌晉武帝太康元年復立鄂縣而武昌如故西陽太守本縣名二漢屬江夏魏立弋陽郡又屬焉晉惠帝又分弋陽為西陽國屬豫州宋孝武孝建元年度郢州明帝泰始五年又度豫後又還郢永初郡國何徐並有弋陽縣今領縣十戶二千九百八十三口一萬六千一百二十去州水二百八十去京都水一千七百二十西陽令漢舊縣屬江夏後屬弋陽西陵男相漢舊縣屬江夏後屬弋陽孝寧侯相本軑縣漢舊縣孝武自此伐逆即位改名蘄陽令二漢江夏郡有蘄春縣吳立為郡晉武帝太康元年省蘄春郡而縣屬弋陽後屬新蔡孝武大明八年還西陽義安令明帝泰始二年以來流民立蘄水左縣長文帝元嘉二十五年以豫部蠻民立建昌南川長風赤亭魯亭陽城彭波遷溪東丘東安西安南安房田希水高坡直水蘄水清石十八縣屬西陽孝武大明八年赤亭彭波併陽城其餘不詳何時省東安左縣長前廢帝永光元年復以西陽蘄水直水希水三屯為縣建寧左縣長孝武大明八年省建寧左郡為縣屬西陽徐志有建寧縣當是此後為郡希水左縣長陽城左縣長本屬建寧左郡孝武大明八年省西陽之赤亭陽城彭波三縣併建寧之陽城縣而以縣屬西陽湘州刺史晉懷帝永嘉元年分荊州之長沙衡陽湘東邵陵零陵營陽建昌江州之桂陽八郡立治臨湘成帝咸和三年省安帝義熙八年復立十二年又省宋武帝永初三年又立文帝元嘉八年省十六年又立二十九年又省孝武孝建元年又立建昌郡晉惠帝元康九年分長沙東北下雋諸縣立成帝咸康元年省元嘉十六年立巴陵郡屬湘州後度郢領郡十縣六十二戶四萬五千八十九口三十五萬七千五百七十二去京都水三千三百長沙內史秦立宋初十縣下雋蒲圻巴陵屬巴陵今領縣七戶五千六百八十四口四萬六千二百一十三臨湘侯相漢舊縣醴陵侯相後漢立瀏陽侯相吳立吳昌侯相後漢立曰漢昌吳更名羅縣侯相漢舊縣攸縣子相漢舊縣建寧子相吳立衡陽內史吳孫亮太平二年分長沙西部都尉立領縣七戶五千七百四十六口二萬八千九百九十一去州水二百二十去京都水三千七百湘西令吳立湘南男相漢舊縣屬長沙益陽侯相漢舊縣屬長沙湘鄉男相前漢無後