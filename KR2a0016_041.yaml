body:
  text: 宋書卷四十一列傳第一后妃帝祖母號太皇太后母號皇太后妃號皇后漢舊制也晉武帝採漢魏之制置貴嬪夫人貴人是為三夫人位視三公淑妃淑媛淑儀修華修容修儀婕妤容華充華是為九嬪位視九卿其餘有美人才人中才人爵視千石以下高祖受命省二才人其餘仍用晉制貴嬪魏文帝所制夫人魏武帝初建魏國所制貴人漢光武所制淑妃魏明帝所制淑媛魏文帝所制淑儀修華晉武帝所制修容魏文帝所制修儀魏明帝所制婕妤容華前漢舊號充華晉武帝所制美人漢光武所制世祖孝建三年省夫人修華修容置貴妃位比相國進貴嬪位比丞相貴人位比三司以為三夫人又置昭儀昭容昭華以代修華修儀修容又置中才人充衣以為散位昭儀漢元帝所制昭容世祖所制昭華魏明帝所制中才人晉武帝所制充衣前漢舊制太宗泰始元年省淑妃昭華中才人充衣復置修華修儀修容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪婕妤容華充華承徽列榮凡五職班亞九嬪美人中才人才人三職為散役其後太宗留心後房擬外百官備位置內職列其名品于後後宮通尹準録尚書紫極戶主光興戶主官品第一各置一人並銓六宮後宮列準尚書令銓六宮紫極中監尹銓六宮光興中監尹銓六宮宣融戶主銓六宮紫極房帥置一人光興房帥置一人官品第二各置一人後宮司儀準左僕射銓人士後宮司政準右僕射銓人士參議女林準銀青光祿銓人士中臺侍御尹銓六宮宣融便殿中監尹銓六宮采藝房主銓六宮南房主銓六宮中藏女典銓六宮典坊銓六宮樂正銓六宮內保銓人士學林祭酒銓人士昭陽房帥置一人徽音房帥置一人宣融房帥置一人官品第三各置一人後宮都掌治職置二人準左右丞位比尚書銓人士後宮殿中治職置一人準左民尚書銓人士後宮源典治職置一人準祠部尚書銓人士後宮穀帛治職置一人準度支尚書中傅置一人銓人士後宮校事女史置一人銓人士紫極中監女史置一人銓人士光興中監女史置一人銓人士紫極房參事置人無定數銓人士有限外宣融房參事置人無定數銓人士有限外中臺侍御奏案女史置一人銓人士贊樂女史置一人銓人士中訓女史置一人銓人士女祝史置一人紫極中監典置一人光興中監典置一人典樂帥置人無定數有限外紫極房廉帥祭酒置一人光興房廉帥祭酒置一人宣融房廉帥祭酒置一人官品第四後宮通關參事置一人景德房參事置人無定數銓人士采藝房參事置人無定數銓人士南房參事置人無定數銓人士內房參事置一人銓人士校學女史置一人銓人士後宮中房帥置二人後宮源典帥置二人後宮穀帛帥置二人中臺帥置一人中臺侍御起居帥置二人中臺侍御詔誥帥置二人斯男房帥置一人宣豫房帥置一人景德房帥置一人采藝房帥置一人中藏帥置一人內坊帥置一人南房帥置一人外華房帥置一人招慶房帥置一人紫極諸房廉帥置人無定數有限外紫極中監省帥置一人紫極殿帥置六人光興殿帥置四人徽音監帥置一人徽章監帥置一人宣融便殿中監典置一人清商帥置人無定數總章帥置人無定數左西章帥置人無定數右西章帥置人無定數中廚帥置一人官品第五中臺侍御執衛置人無定數中臺侍御監閨帥置二人中臺侍御監司帥置二人宣融便殿帥置一人永巷帥置一人後宮都掌內史置二人後宮殿中內史置一人後宮源典內史置一人後宮穀帛內史置二人後宮監臨內史置二人中臺侍御執法內史置一人中臺侍御典內史置二人中臺侍御節度內史置二人中臺侍御應內史置六人紫極房內史置一人光興房內史置一人助教置一人綵製帥置人無定數裝飾帥置人無定數繡帥置人無定數織帥置人無定數學林館帥置一人宮閨帥置一人教堂帥置人無定數有限外監解帥置人無定數纍室帥置人無定數行病帥置人無定數官品第六合堂帥置二人御清帥置一人監夜帥置一人諸房禁防置人無定數三廂禁防置三人諸房廚帥各置一人中廚廉置三人應閨置六人諸應閣置人無定數宮閨史置一人官品第七諸房中掾各置一人中藏掾各置二人比五品敕吏紫極供殿直倀光興供殿直倀總章伎倀侍御扶侍主衣準二衛五品敕吏比六品供殿左右紫極置二十人光興置十人左右守藏置四人典樂人比諸房禁防作倀比王官供殿給使紫極置二十人光興置十人典殿置人無定數比官人紫極三廂給事置十人全堂給使置五人宮閨給使置六人比房孝穆趙皇后諱安宗下邳僮人也祖彪字世範治書侍御史父裔字彥胄平原太守后以晉穆帝升平四年嬪孝皇晉哀帝興寧元年四月二日生高祖其日后以産疾殂于丹徒官舍時年二十一葬晉陵丹徒縣東鄉練璧里雩山宋初追崇號諡陵曰興寧永初二年有司奏曰大孝之德盛於榮親一人有慶光被萬國是以靈文寵於西京壽張顯於隆漢故平原太守趙裔故洮陽令蕭卓並外屬尊戚不逮休寵臣等仰述聖思遠稽舊章並可追贈光祿大夫加金章紫綬裔命婦孫可豫章郡建昌縣君卓命婦趙可吳郡壽昌縣君孫氏東莞人也其年又詔曰推恩之禮在情所同故內樹宗子外崇后屬爰自漢魏咸遵斯典外祖趙光祿蕭光祿名器雖隆茅土未建並宜追封開國縣侯食邑五百戶於是追封裔臨賀縣侯裔長子宣之仕至江乘令蚤卒無子以弟孫襲之繼宣之紹封襲之卒子祖憐嗣齊受禪國除宣之弟倫之自有傳孝懿蕭皇后諱文壽蘭陵蘭陵人也祖亮字保祚侍御史父卓字子略洮陽令孝穆后殂孝皇帝娉后為繼室生長沙景王道憐臨川烈武王道規義熙七年拜豫章公太夫人高祖為宋王又加太妃之號高祖以十二年北伐仍停彭城壽陽至元熙二年入朝因受晉禪在外凡五年后常留東府高祖踐阼有司奏曰臣聞道積者慶流德洽者禮備故祗敬表於崇高嘉號彰於盛典伏惟太妃母儀之德化穆不言保翼之訓光被洪業雖幽明同慶而稱謂未窮稽之前代禮有準宜式遵舊章允副羣望臣等請上宋王太后號皇太后故有司奏猶稱太妃也上以恭孝為行奉太后素謹及即大位春秋已高每旦入朝太后未嘗失時刻少帝即位加崇曰太皇太后景平元年崩于顯陽殿時年八十一遺令曰孝皇背世五十餘年古不祔葬且漢世帝后陵皆異處今可於塋域之內別為一壙孝皇陵墳本用素門之禮與王者制度奢儉不同婦人禮有所從可一遵往式乃開別壙與興寧陵合墳初高祖微時貧約過甚孝皇之殂葬禮多闕高祖遺旨太后百歲後不須祔葬至是故稱后遺旨施行卓初與趙裔俱贈金紫光祿大夫又追封封陽縣侯妻下邳趙氏封吳郡壽昌縣君卓子源之襲爵源之見子思話傳武敬臧皇后諱愛親東莞人也祖汪字山甫尚書郎父俊字宣乂郡功曹后適高祖生會稽宣長公主興弟高祖以儉正率下后恭謹不違及高祖興復晉室居上相之重而后器服粗素不為親屬請謁義熙四年正月甲午殂於東城時年四十八追贈豫章公夫人還葬丹徒高祖臨崩遺詔留葬京師於是備法駕迎梓宮祔葬初寧陵宋初追贈俊金紫光祿大夫妻高密叔孫氏封遷陵永平鄉君俊子燾燾弟熹熹子質自有傳武帝張夫人諱闕不知何郡縣人也義熙初得幸高祖生少帝又生義興恭長公主惠媛永初元年拜為夫人少帝即位有司奏曰臣聞嚴親敬始所因者本克孝之道由中被外伏惟夫人德並坤元徽音光劭發祥兆慶誕啓聖明宜崇極徽號允備盛則從春秋母以子貴之義遵漢晉推愛之典謹上尊號為皇太后宮曰永樂少帝既廢太后還璽紱隨居吳縣太祖元嘉元年拜營陽王太妃三年薨少帝司馬皇后諱茂英河內溫人晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜皇太子妃少帝即位立為皇后元嘉元年降為營陽王妃又為南豐王太妃十六年薨時年四十七武帝胡婕妤諱道安淮南人義熙初為高祖所納生文帝五年被譴賜死時年四十二葬丹徒高祖踐阼追贈婕妤太祖即位有司奏曰臣聞德厚者禮尊慶深者位極故閟宮既構咏歌先妣園陵崇衛聿追來孝伏惟先婕妤柔明塞淵光備六列德昭坤範訓洽母儀用能啓祚聖明奄宅四海嚴親莫逮天祿永違臣等遠準春秋近稽漢晉謹上尊號曰章皇太后陵曰熙寧立廟於京師太后兄子元慶位至奉朝請文帝袁皇后諱齊媯陳郡陽夏人左光祿大夫敬公湛之庶女也母本卑賤后年五六歲方見舉後適太祖初拜宜都王妃生子劭東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五萬三五十匹後潘淑妃有寵愛傾後宮咸言所求無不得后聞之欲知信否乃因潘求三十萬錢與家以觀上意信宿便得因此恚恨甚深稱疾不復見上上每入必他處回避上數掩伺之不能得始興王濬諸庶子問訊后未嘗視也后遂憤恚成疾元嘉十七年疾篤上執手流涕問所欲言后視上良久乃引被覆面崩于顯陽殿時年三十六上甚相悼痛詔前永嘉太守顏延之為哀策文甚麗其辭曰龍輁纚綍容翟結驂皇塗昭列神路幽嚴皇帝親臨祖饋躬瞻宵載飾遺儀於組旒想徂音乎珩珮悲黼筵之移御痛翬褕之重晦降輿客位撤奠殯階乃命史臣誄德述懷其辭曰倫昭儷升有物有憑圓精初鑠方祇始凝昭哉世族祥發慶膺祕儀景胄圖光玉繩昌輝在陰柔明將進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章增絢象服是加言觀惟則俾我王風始基嬪德蕙問川流芳猷淵塞方江泳漢再謠南國伊昔不造洪化中微用集寶命仰陟天機釋位公宮登耀紫闈欽若皇姑允迪前徽孝達寧親敬行宗祀進思才淑傍綜圖史發音在咏動容成紀壼政穆宣房樂昭理坤則順成星軒潤飾德之所屆惟深必測下節震騰上清朓側有來斯雍無思不極謂道輔仁司化莫晰象物方臻祲告沴太和既融收華委世蘭殿長陰椒塗弛衛嗚呼哀哉戒涼在肂杪秋即穸霜夜流唱曉月升魄八神警引五輅遷迹噭噭儲嗣哀哀列辟灑零玉墀雨泗丹掖撫存悼亡感今懷昔嗚呼哀哉南背國門北首山園僕人案節服馬顧轅遙酸紫蓋眇泣素軒滅綵清都夷體壽原邑野淪藹戎夏悲嚾來芳可述往駕弗援嗚呼哀哉策既奏上自益撫存悼亡感今懷昔八字以致其意焉有司奏諡宣皇后上特詔曰元初后生劭自詳視之馳白太祖此兒形貌異常必破國亡家不可舉便欲殺之太祖狼狽至后殿戶外手撥幔禁之乃止后亡後常有小小靈應沈美人者太祖所幸也嘗以非罪見責應賜死從后昔所住徽音殿前度此殿有五間自后崩後常閉美人至殿前流涕大言曰今日無罪就死先后若有靈當知之殿諸窗戶應聲豁然開職掌遽白太祖太祖驚往視之美人乃得釋大明五年世祖詔曰昔漢道既靈博平輝絶魏國方安嘉憲啓策皆因心所弘酌典沿誥亡外祖親王夫人柔德淑範光啓坤載屬內位闕正攝饋閨庭儀被芳闈聞宣戚里永言感遠思追榮秩宜式傍鴻則敬登徽序乃追贈豫章郡新淦縣平樂鄉君后之所生母也又詔趙蕭臧光祿袁敬公平樂鄉君墓先未給塋戶加世數已遠胤嗣衰陵外戚尊屬不宜使墳塋蕪穢可各給蠻戶三以供灑掃后父湛自有傳文帝路淑媛諱惠男丹陽建康人也以色貌選入後宮生孝武帝拜為淑媛年既長無寵常隨世祖出蕃世祖入討元凶淑媛留尋陽上即位遣建平王宏奉迎有司奏曰臣聞曆集周邦徽音克嗣氣淳漢國沙麓發祥昔在上代業隆祚遠未有不敷陰教以闡洪基膺淑慶以載聖哲者也伏惟淑媛柔明內昭徽儀外範合靈初迪則庶姬仰耀引訓蕃閫則家邦被德民應惟和神屬惟祉故能誕鍾睿躬用集大命固靈根於既殞融盛烈乎中興載厚化深聲詠允緝宜式諧舊典恭享極號謹奉尊號曰皇太后宮曰崇憲太后居顯陽殿上於閨房之內禮敬甚寡有所御幸或留止太后房內故民間喧然咸有醜聲宮掖事祕莫能辨也孝建二年追贈太后父興之散騎常侍興之妻徐氏餘杭縣廣昌鄉君大明四年太后弟子撫軍參軍瓊之上表曰先臣故懷安令道慶賦命乖辰自違明世敢緣衛戍請名之典特乞雲雨微垂灑潤詔付門下有司承旨奏贈給事中瓊之及弟休之茂之並超顯職太后頗豫政事賜與瓊之等財物家纍千金居處服器與帝子相侔瓊之宅與太常王僧達並門嘗盛車服衛從造僧達僧達不為之禮瓊之以訴太后太后大怒告上曰我尚在而人皆陵我家死後乞食矣欲罪僧達上曰瓊之年少自不宜輕造詣王僧達貴公子豈可以此事加罪大明五年太后隨上巡南豫州妃主以下並從廢帝即位號太皇太后太宗踐阼號崇憲太后初太宗少失所生為太后所攝養太宗盡心袛事而太后撫愛亦篤及上即位供奉禮儀不異舊日有司奏曰夫德敷於內典章必遠化覃于外徽號宜宣伏惟皇太后懿聖自天母儀允著義明八遠道變九圍聖明登御景胙攸改皇太后宜即前號別居外宮詔曰朕備丁艱罰蚤嬰孤苦特蒙崇憲太后聖訓撫育昔在蕃閫常奉藥膳中迫凶威抱懷莫遂今泰運初啓情典獲申方欲親奉晨昏盡歡閨禁不得如所奏尋崩時年五十五遷殯東宮門題曰崇憲宮上又詔曰朕幼集荼蓼夙憑德訓龕暴定業實資仁範恩著屯夷有兼常慕夫禮沿情施義循事立可特齊衰三月以申追仰之心諡曰昭皇太后葬世祖陵東南號曰修寧陵先是晉安王子勛未平巫者謂宜開昭太后陵以為厭勝修復倉卒不得如禮上性忌慮將來致災泰始四年夏詔有司曰崇憲昭太后修寧陵地大明之世久所考卜前歲遭諸蕃之難禮從權宜奉營倉卒未暇營改而塋隧之所山原卑陋頃年頽壞日有滋甚費修整終無永固且詳考地形殊乖相勢朕蚤蒙慈遇情禮兼常思使終始之義載彰幽顯史官可就巖山左右更宅吉地明審龜筮須選令辰式遵舊典以禮創制今中宇雖寧邊虜未息營就之功務在從簡舉言尋悲情如切割有司奏北疆未緝戎役是務禮之詳略各沿時宜臣等參議修寧陵玄宮補治毀壞權施油殿暫出梓宮事畢即窆於事為允詔可瓊之為衡陽內史先后卒廢帝景和中以休之為黃門侍郎茂之左軍將軍並封開國縣侯邑千戶又追贈興之侍中金紫光祿大夫諡曰孝侯道慶散騎常侍光祿大夫開府儀同三司諡曰敬侯立道慶女為皇后以休之為侍中茂之黃門郎太宗廢幼主欲説太后之心乃下令書曰太皇太后蚤垂愛遇沿情即事同於天屬前車騎咨議參軍路休之前丹陽丞路茂之崇憲密戚蚤延榮貫並懷所勳宜殊飾休之可黃門侍郎領步兵校尉茂之可中書侍郎太宗未即位故稱令書茂之又遷司徒從事中郎休之桂陽王休範鎮北咨議參軍太宗殺世祖諸子因此陷休之等宥其諸子孝武文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝豫章王子尚山陰公主楚玉臨淮康哀公主楚佩皇女楚琇康樂公主修明世祖在蕃后甚有寵上入伐凶逆后留尋陽與太后同還京都立為皇后大明四年后率六宮躬桑于西郊皇太后觀禮上下詔曰朕卜祥大昕測辰拂羽爰詔六宮親蠶川室皇太后降鑾從御佇蹕觀禮緑蘧既具玄紞方修庶儀發椒闈化動中縣妃主以下可量加班錫廢帝即位尊曰皇太后宮曰永訓其年崩于含章殿時年三十八祔葬景寧陵后父偃字子遊晉丞相導玄孫尚書嘏之子也母晉孝武帝女鄱陽公主宋受禪封永成君偃尚高祖第二女吳興長公主諱榮男少歷顯官黃門侍郎祕書監侍中元嘉末為散騎常侍右衛將軍世祖即位以后父授金紫光祿大夫領義陽王師常侍如故遷右光祿大夫常侍王師如故偃謙虛恭謹不以世事關懷孝建二年卒時年五十四追贈開府儀同三司本官如故諡曰恭公長子藻位至東陽太守尚太祖第六女臨川長公主諱英媛公主性妒而藻別愛左右人吳崇祖前廢帝景和中主讒之於廢帝藻坐下獄死主與王氏離婚泰始初以主適豫章太守庾沖遠未及成禮而沖遠卒宋世諸主莫不嚴妒太宗每疾之湖熟令袁慆妻以妒忌賜死使近臣虞通之撰妒婦記左光祿大夫江湛孫斆當尚世祖女上乃使人為斆作表讓婚曰伏承詔旨當以臨汝公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流室貧業寡年近將冠皆已有室荊叉布裙足得成禮每不自解無偶迄茲媒訪莫尋素族弗問自惟門慶屬降公主天恩所覃容及醜末懷憂抱惕慮不獲免徵命所當果膺茲舉雖門泰宗榮於臣非幸仰緣聖貸冒陳愚實自晉氏以來配尚王姬者雖纍經美胄亟有名才至如王敦懾氣桓溫斂威真長佯愚以求免子敬灸足以違詔王偃無仲都之質而倮露於北階何瑀闕龍工之姿而投軀於深井謝莊殆自同於矇叟殷沖幾不免於強鉏彼數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訴制勒甚於僕隸防間過於婢妾往來出入人理之常當賓待客朋從之義而令掃轍息駕無窺門之期廢筵抽席絶接對之理非唯交友離異乃亦兄弟疏闊第令受酒肉之賜制以動靜監子荷錢帛之私節其言笑姆嬭爭媚相勸以嚴妮媼競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未間是非聽言語則謬於虛實姆嬭敢恃耆舊唯贊妒忌尼媼自倡多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故敝必責頭領又出入之宜繁省難衷或進不獲前或入不聽出不入則嫌於欲疏求出則疑有別意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至於夜步月而弄琴晝拱袂而披卷一生之內與此長乖又聲影裁聞則少婢奔迸裾袂向席則老醜叢來左右整刷以疑寵見嫌賓客未冠以少容致斥禮則有列媵象則有貫魚本無嫚嫡之嫌豈有輕婦之誚況今義絶傍私虔恭正匹而每事必言無儀適設辭輒言輕易我又竊聞諸主集聚唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其意不可貸借固實常辭或言野敗去或言人笑我雖家曰私理有甚王憲發口所言同科律王藻雖復強佷頗經學涉戲笑之事遂為寃魂褚曖憂憤用致夭絶傷理害義難以具聞夫螽斯之德實致克昌專妒之行有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毀族淪門豈伊身眚前後嬰此其人雖衆然皆患彰遐邇事隔天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道弘物以典處親以公臣之鄙懷可得自盡如臣門分世荷殊榮足守前基便預提拂清官顯宦或由才升一叨婚戚咸成恩假是以仰冒非宜披露丹實非唯止陳一己規全身願實乃廣申諸門憂患之切伏願天慈照察特賜蠲停使燕雀微羣得保叢蔚蠢物含生自己彌篤若恩詔難降披請不申便當刊膚剪髮投山竄海太宗以此表遍示諸主於是臨川長公主上表曰妾遭隨奇薄絶於王氏私庭囂戾致此分異今孤疾煢然假息朝夕情寄所鍾唯在一子契闊荼炭持兼憐愍否泰枯榮繫以為命實願申其門釁還為母子推遷僶俯未及自聞先朝慈愛鑑妾丹衷若賜使息徹歸第定省仰揆天旨或有可尋今事迫誠切不顧典憲敢緣恩燾觸冒披聞特乞還身王族守養弱嗣雖死之日實甘於生許之藻弟懋升明末貴達懋弟攸太宰從事中郎蚤卒追贈黃門侍郎弟臻升明末顯宦前廢帝何皇后諱令婉廬江灊人也孝建三年納為皇太子妃大明五年薨于東宮徽光殿時年十七葬諡曰獻妃上更為太子置內職二等曰保林曰良娣納南中郎長史太山羊瞻女為良娣宜都太守袁僧惠女為保林廢帝即位追崇獻妃曰獻皇后太宗踐阼遷后與廢帝合葬龍山北后父瑀字稚玉晉尚書左僕射澄曾孫也祖融大司農瑀尚高祖少女豫章康長公主諱欣男公主先適徐喬美容色聰敏有智數太祖世禮待特隆瑀豪競於時與平昌孟靈休東海何勗等並以輿馬驕奢相尚公主與瑀情愛隆密何氏外姻疏戚莫不沾被恩紀瑀歷位清顯至衛將軍大明八年公主薨瑀墓開世祖追贈金紫光祿大夫加散騎常侍子邁尚太祖第十女新蔡公主諱英媚邁少以貴戚居顯宦好犬馬馳逐多聚才力之士有墅在江乘縣界去京師三十里邁每遊履輒結駟連騎武士成羣大明末為豫章王子尚撫軍咨議參軍加寧朔將軍南濟陰太守廢帝納公主於後宮偽言薨殞殺一婢送出邁第殯葬行喪禮常疑邁有異圖邁亦招聚同志欲因行幸廢立事覺廢帝自出討邁誅之太宗即位追封建寧縣侯食邑五百戶子曼倩嗣齊受禪國除瑀兄子亮孝建初為桂陽太守丞相南郡王義宣為逆遣參軍王師壽斷桂陽道以防廣州刺史宗賣心亮收斬之官至新安內史亮弟恢廢帝元徽初為廣州剌史未之鎮坐國哀期晦不到免官復起為都官尚書未拜卒恢弟誕司徒右長史誕弟衍最知名性躁動太宗初為建安王休仁司徒從事中郎仍除黃門郎未拜竟求轉司徒司馬得司馬復求太子右率拜右率一二日復求侍中旬日之間求進無已不得侍中以怨詈賜死文帝沈婕妤諱容姬不知何許人也納於後宮為美人生明帝拜為婕妤元嘉三十年卒時四十葬建康之莫府山世祖即位追贈湘東國太妃太宗即位有司奏曰昔豳都追遠正邑纏哀緬慕德義敬奉園陵先太妃德履端華徽景明峻風光宸掖訓流國闈鞠聖誕靈蚤捐鴻祚臣等遠模漢册近儀晉典謹上尊號為皇太后下禮官議諡諡曰宣太后陵號曰崇寧以太后弟道慶為給事中泰始三年卒追贈通直散騎常侍賜爵縣侯又追贈太后父散騎常侍母王氏成樂鄉君明恭王皇后諱貞風琅邪臨沂人也元嘉二十五年拜淮陽王妃太宗改封又為湘東王妃生晉陵長公主伯姒建安長公主伯媛太宗即位立為皇后上嘗宮內大集而婦人觀之以為歡笑后以扇障面獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而婦人形體以此為樂外舍之為歡適實與此不同帝大怒遣后令起后兄揚州刺史景文以此事語從舅陳郡謝緯曰后在家為儜弱婦人不知今段遂能剛正如此廢帝即位尊為皇太后宮曰弘訓廢帝失德太后每加勗譬始者猶見順從後狂慝轉甚漸不悅元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加鴆害已令太醫藥左右人止之曰若行此事官便應作孝子豈復得出入狡獪帝曰汝語大有理乃止順帝即位齊王秉權宗室劉晃劉綽卜伯興等有異志太后頗與相關順帝禪位太后與帝遜于東邸因遷居丹陽宮拜汝陰王太妃順帝殂於丹陽更立第京邑建元元年薨于第時年四十四追加號諡葬以宋后禮父僧朗事別見景文傳明帝陳貴妃諱妙登丹陽建康人屠家女也世祖常使尉司採訪民間子女有姿色者太妃家在建康縣界家貧有草屋兩三間上出行問尉曰御道邊那得此草屋當由家貧賜錢三萬令起瓦屋尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宮在路太后房內經二三年再呼不見幸太后因言於上以賜太宗始有寵一年許衰歇以乞李道兒尋又迎還生廢帝故民中皆呼廢帝為李氏子廢帝後每自稱李將軍或自謂李統太宗即位拜貴妃禮秩同皇太子妃廢帝踐阼有司奏曰臣聞河龍啓聖理浹民神郊電基皇慶爍天地故資敬之道粹古銘風沿貴之誼眇代凝則伏惟貴妃含和日晷表淑星樞徽音峻古柔光照世聲華帝掖軌秀天嬪景發皇明祚昌睿命而備物之章未煥彝策遠酌前王允陟鴻典臣等參議謹上尊號曰皇太妃輿服一如晉孝武帝太后故事置家令一人改諸國太妃曰太妃妃音怡宮曰弘化追贈太妃父金寶散騎常侍金寶妻王氏永世縣成樂鄉君升明初降為蒼梧王太妃伯父照宗中書通事舍人叔佛念步兵校尉兄敬元通直郎南魯郡太守佛念大通貨賄侵亂朝政升明初賜死後廢帝江皇后諱簡圭濟陽考城人北中郎長史智淵孫女泰始五年太宗訪求太子妃而雅信小數名家女多不合后弱小門無強廕以卜筮最吉故為太子納之諷朝士州郡令獻物多者將直百金始興太守孫奉伯止獻琴書其外無餘物上大怒封藥賜死既而原之太子即帝位立為皇后帝既廢降為蒼梧王妃智淵自有傳明帝陳昭華諱法容丹陽建康人也太宗晚年痿疾不能內御諸弟姬人有懷孕者輒取以入宮及生男皆殺其母而以與六宮所愛者養之順帝桂陽王休範子也以昭華為母焉明帝崩昭華拜安成王太妃順帝即位進為皇太妃順帝禪位去皇太妃之號順帝謝皇后諱梵境陳郡陽夏人右光祿大夫莊孫女也升明二年立為皇后順帝禪位降為汝陰王妃莊自有傳史臣曰飲食男女人之大欲存焉故聖人順民情而為之度王宮六列士室二等皆司事設防典文曲立若夫義篤閫闈化形邦國古先哲王有以之致治者矣夫后妃專夕配以德升姬嬙並御進非色幸欲使情有覃被愛罔偏流專貞內表妖蠱外息至於娉納有章俔天作儷必四嶽之後雖正位天閨禮亢尊極而衰厭易兆恩宴難留一謝屬車之塵永隔青蒲之地是故元后慎終良有以也自元嘉以降內職稍繁椒庭綺觀千門萬戶而淫葬怪飾變炫無窮自漢氏昭陽之輪奐魏室九華之照曜曾不能概其萬一徒以所選止於軍署之內徵引極乎厮皂之間非若晉氏採擇濫及冠冕也且愛止帷房權無外授戚屬餼賚歲時不過肴漿斯為美矣及太祖之傾惑潘嫗謀及婦人大明之淪溺殷姬並后匹嫡至使多難起於肌膚并命行於同産又況進於此者乎以斯言之三代二漢之亡於淫嬖非不幸也
