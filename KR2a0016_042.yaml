body:
  text: 宋書卷四十二列傳第二劉穆之王弘劉穆之字道和小字道民東莞莒人漢齊悼惠王肥後也世居京口少好書傳博覽多通為濟陽江敳所知敳為建武將軍琅邪內史以為府主簿初穆之嘗夢與高祖俱泛海忽值大風驚懼俯視船下見有二白龍夾舫既而至一山峯瑖聳秀林樹繁密意甚悅之及高祖克京城問何無忌曰急須一府主簿何由得之無忌曰無過劉道民高祖曰吾亦識之即馳信召焉時穆之聞京城有叫譟之聲晨起出陌頭屬與信會穆之直視不言者久之既而反室壞布裳為褲往見高祖高祖謂之曰我始舉大義方造艱難須一軍吏甚急卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉卒之際當略無見踰者高祖笑曰卿能自屈吾事濟矣即於坐受署從平京邑高祖始至諸大處分皆倉卒立定並穆之所建也遂委以腹心之任動止咨焉穆之亦竭節盡誠無所遺隱時晉綱寬弛威禁不行盛族豪右負勢陵縱小民窮蹙自立無所重以司馬元顯政令違舛桓玄科條繁密穆之斟酌時宜隨方矯正不盈旬日風俗頓改遷尚書祠部郎復為府主簿記室録事參軍領堂邑太守以平桓玄功封西華縣五等子義熙三年揚州刺史王謐薨高祖次應入輔劉毅等不欲高祖入議以中領軍謝混為揚州或欲令高祖於丹徒領州以內事付尚書僕射孟昶遣尚書右丞皮沈以二議咨高祖沈先見穆之具説朝議穆之偽起如廁即密疏白高祖曰皮沈始至其言不可從高祖既見沈且令出外呼穆之問曰卿云沈言不可從其意何也穆之曰昔晉朝失政非復一日加以桓玄篡奪天命已移公興復皇祚勳高萬古既有大功便有大位位大勳高非可持久公今日形勢豈得居謙自弱遂為守藩之將邪劉孟諸公與公俱起布衣共立大義本欲匡主成勳以取富貴耳事有前後故一時推功非為委體心服宿定臣主之分也力敵勢均終相吞咀揚州根本所係不可假人前者以授王謐事出權道豈是始終大計必宜若此而已哉今若復以他授便應受制於人一失權柄無由可得而公功高勳重不可直置疑畏交加異端互起將來之危難可不熟念今朝議如此宜相酬答必云在我厝辭又難唯應云神州治本宰輔崇要興喪所階宜加詳擇此事既大非可懸論便暫入朝共盡同異公至京彼必不敢越公更授餘人明矣高祖從其言由是入輔從征廣固還拒盧循常居幕中畫策決斷衆事劉毅等疾穆之見親每從容言其權重高祖愈信仗之穆之外所聞見莫不大小必白雖復閭里言謔塗陌細事皆一二以聞高祖每得民間委密消息以示聰明皆由穆之也又愛好賓遊坐客滿布耳目以為視聽故朝野同異穆之莫不必知雖復親昵短長皆陳奏無隱人或譏之穆之曰以公之明將來會自聞達我蒙公恩義無隱諱此張遼所以告關羽欲叛也高祖舉止施為穆之皆下節度高祖書素拙穆之曰此雖小事然宣彼四遠願公小復留意高祖既不能厝意又稟分有在穆之乃曰但縱筆為大字一字徑尺無嫌大既足有所包且其勢亦美高祖從之一紙不過六七字便滿凡所薦達不進不止常云我雖不及荀令君之舉善然不舉不善穆之與朱齡石並便尺牘嘗於高祖坐與齡石答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢也轉中軍太尉司馬八年加丹陽尹高祖西討劉毅以諸葛長民監留府總攝後事高祖疑長民難獨任留穆之以輔之加建威將軍置佐吏配給實力長民果有異謀而猶豫不能發乃屏人謂穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流遠伐而以老母稚子委節下若一毫不盡豈容如此邪意乃小安高祖還長民伏誅十年進穆之前將軍給前軍府年布萬匹錢三百萬十一年高祖西伐司馬休之中軍將軍道憐知留任而事無大小一決穆之遷尚書右僕射領選將軍尹如故十二年高祖北伐留世子為中軍將軍監太尉留府轉穆之左僕射領監軍中軍二府軍司將軍尹領選如故甲仗五十人入殿入居東城穆之內總朝政外供軍旅決斷如流事無擁滯賓客輻輳求訴百端內外咨稟盈階滿室目覽辭訟手答箋書耳行聽受口並酬應不相參涉皆悉贍舉又數客昵賓言談賞笑引日亘時未嘗倦苦裁有間暇自手寫書尋覽篇章校定墳籍性奢豪食必方丈旦輒為十人饌穆之既好賓客未嘗獨餐每至食時客止十人以還者帳下依常下食以此為常嘗白高祖曰穆之家本貧賤贍生多闕自叨忝以來雖每存約損而朝夕所須微為過豐自此以外一毫不以負公十三年疾篤詔遣正直黃門郎問疾十一月卒時年五十八高祖在長安聞問驚慟哀惋者數日本欲頓駕關中經略趙魏穆之既卒京邑任虛乃馳還彭城以司馬徐羡之代管留任而朝廷大事常決穆之者並悉北咨穆之前軍府文武二萬人以三千配羡之建威府餘悉配世子中軍府追贈穆之散騎常侍衛將軍開府儀同三司高祖又表天子曰臣聞崇賢旌善王教所先念功簡勞義深追遠故司勳秉策在勤必書德之休明沒而彌著故尚書左僕射前將軍臣穆之爰自布衣協佐義始內端謀猷外勤庶政密勿軍國心力俱盡及登庸朝右尹司京畿翼新王化敷讚百揆頃戎車遠役居中作扞撫寄之勳實洽朝野方宣讚盛猷緝隆聖世志績未究遠邇悼心皇恩褒述班同三事榮哀兼備寵靈已厚臣伏思尋自義熙草創艱患未弭外虞既殷內難彌結時屯世故靡歲暫寧豈臣以寡乏負荷國重實賴穆之匡翼之益豈唯讜言嘉謀溢于民聽若乃忠規遠畫潛慮密謨造膝詭辭莫見其際功隱於視聽事隔於皇朝者不可稱記所以陳力一紀克遂有成出征入輔幸不辱命微夫人之左右未有寧濟其事者矣履謙居寡守之彌固每議及封賞輒深自抑絶所以勳高當年而未沾茅社撫事永傷胡寧可昧謂宜加贈正司追甄土宇俾大賚所及永秩於善人忠正之烈不泯於身後臣契闊屯泰旋觀始終金蘭之分義深情密是以獻其乃懷布之朝聽於是重贈侍中司徒封南昌縣侯食邑千五百戶高祖受禪思佐命元勳詔曰故侍中司徒南昌侯劉穆之深謀遠猷肇基王迹勳造大業誠實匪躬今理運惟新蕃屏並肇感事懷人實深悽悼可進南康郡公邑三千戶故左將軍青州刺史王鎮惡荊郢之捷剋翦放命北伐之勳參迹方叔念勤惟績無忘厥心可進龍陽縣侯增邑千五百戶諡穆之曰文宣公太祖元嘉九年配食高祖廟庭二十五年四月車駕行幸江寧經穆之墓詔曰故侍中司徒南康文宣公穆之秉德佐命翼亮景業謀猷經遠元勳克茂功銘鼎彝義彰典策故已嗣徽前哲宣風後代者矣近因遊踐瞻其塋域九原之想情深悼歎可致祭墓所以申永懷穆之三子長子慮之嗣仕至員外散騎常侍卒子雍嗣先是郡縣為封國者內史相並於國主稱臣去任便止至世祖孝建中始革此制為下官致敬河東王歆之嘗為南康相素輕雍後歆之與雍俱豫元會並坐雍性嗜酒謂歆之曰卿昔嘗見臣今不能見勸一杯酒乎歆之因斆孫晧歌答之曰昔為汝作臣今與汝比肩既不勸汝酒亦不願汝年雍所至嗜食瘡痂以為味似鰒魚嘗詣孟靈休靈休先患灸瘡瘡痂落牀上因取食之靈休大驚答曰性之所嗜靈休瘡痂未落者悉褫取以飴雍雍既去靈休與何勗書曰劉雍向顧見噉遂舉體流血南康國吏二百許人不問有罪無罪遞互與鞭鞭瘡痂常以給膳卒子肜嗣大明四年坐刀斫妻奪爵土以弟彪紹封齊受禪降為南康縣侯食邑千戶穆之中子式之字延叔通易好士纍遷相國中兵參軍太子中舍人黃門侍郎寧朔將軍宣城淮南二郡太守在任贓貨狼藉揚州刺史王弘遣從事檢校從事呼攝吏民欲加辨覆式之召從事謂曰治所還白使君劉式之於國家粗有微分偷數百萬錢何有況不偷邪吏民及文書不可得從事還具白弘弘曰劉式之辨如此奔亦由此得停還為太子右率左衛將軍吳郡太守卒追贈征虜將軍從征關洛有功封德陽縣五等侯諡曰恭侯長子敳世祖初黃門侍郎敳弟衍大明末以為黃門郎出為豫章內史晉安王子勛稱偽號以為中護軍事敗伏誅衍弟瑀字茂琳少有才氣為太祖所知始興王濬為南徐州以瑀補別駕從事史為濬所遇瑀性陵物護前不欲人居己上時濬征北府行參軍吳郡顧邁輕薄而有才能濬待之甚厚深言密事皆與參之瑀乃折節事邁深布情款家內婦女間事言語所不得至者莫不倒寫備説邁以瑀與之款盡深相感信濬所言密事悉以語瑀瑀與邁共進射堂下瑀忽顧左右索單衣幘邁問其所以瑀曰公以家人待卿相與言無所隱而卿於外宣泄致使人無不知我是公吏何得不啓因而白之濬大怒啓太祖徙邁廣州邁在廣州值蕭簡為亂為之盡力與簡俱死瑀遷從事中郎領淮南太守元嘉二十九年出為寧遠將軍益州刺史元凶弒立以為青州刺史瑀聞問即起義遣軍并送資實於荊州世祖即位召為御史中丞還至江陵值南郡王義宣為逆瑀陳其不可言甚切至義宣以為丞相左司馬俱至梁山瑀猶乘其蜀中船舫又有義宣故部曲潛於梁山洲外下投官軍除司徒左長史明年遷御史中丞瑀使氣尚人為憲司甚得志彈王僧達云廕籍高華人品冗末朝士莫不畏其筆端尋轉右衛將軍瑀願為侍中不得謂所親曰人仕宦不出當入不入當出安能長居戶限上因求益州世祖知其此意許之孝建三年除輔國將軍益州刺史既行甚不得意至江陵與顏竣書曰朱修之三世叛兵一旦居荊州青油幕下作謝宣明面見向使齋師以長刀引吾下席於吾何有政恐胸奴輕漢耳其年坐奪人妻為妾免官大明元年起為東陽太守明年遷吳興太守侍中何偃嘗案云參伍時望瑀大怒曰我於時望何參伍之有遂與偃絶及為吏部尚書意彌憤憤族叔秀之為丹陽尹瑀又與親故書曰吾家黑面阿秀遂居劉安衆處朝廷不為多士其年疽發背何偃亦發背瑀疾已篤聞偃亡歡躍叫呼於是亦卒諡曰剛子子卷南徐州別駕卷弟藏尚書左丞穆之少子貞之中書黃門侍郎太子右衛率寧朔將軍江夏內史卒官子裒始興相以贓貨繫東冶內穆之女適濟陽蔡祐年老貧窮世祖以祐子平南參軍孫為始安太守王弘字休元琅邪臨沂人也曾祖導晉丞相祖洽中領軍父珣司徒弘少好學以清恬知名與尚書僕射謝混善弱冠為會稽王司馬道子驃騎參軍主簿時農務頓息末役繁興弘以為宜建屯田陳之曰近面所咨立屯田事已具簡聖懷南畝事興時不可失宜早督田畯以要歲功而府資役單刻控引無所雖復厲以重勸肅以嚴威適足令囹圄充積而無救於事實也伏見南局諸冶募吏數百雖資以廩贍收入甚微愚謂若回以配農必功利百倍矣然軍器所須不可都廢今欲留銅官大冶及都邑小冶各一所重其功課一準揚州州之求取亦當無乏餘者罷之以充東作之要又欲二局田曹各立典軍募吏依冶募比例并聽取山湖人此皆無損於私有益於公者也其中亦應疇量分判番假及給廪多少自可一以委之本曹親局所統必當練悉且近東曹板水曹參軍納之領此任其人頗有幹能自足了其事耳頃年以來斯務弛廢田蕪廩虛實亦由此弘過蒙飾擢志輸短效豈可相與寢默有懷弗聞邪至於當否尊自當裁以遠鑒若所啓謬允者伏願便以時施行庶歲有務農之勤倉有盈廪之實禮節之興可以垂拱待也道子欲以為黃門侍郎珣以其年少固辭珣頗好積聚財物布在民間珣薨弘悉燔燒券書一不收責餘舊業悉以委付諸弟未免喪後將軍司馬元顯以為咨議參軍加寧遠將軍知記室事固辭不就道子復以為咨議參軍加建威將軍領中兵又固辭時內外多難在喪者皆不終其哀唯弘固執得免桓玄剋京邑收道子付廷尉臣吏畏恐莫敢瞻送弘時尚在喪獨於道側拜攀車涕泣論者稱焉高祖為鎮軍召補咨議參軍以功封華容縣五等侯遷琅邪王大司馬從事中郎出為寧遠將軍琅邪內史尚書吏部郎中豫章相盧循寇南康諸郡弘奔尋陽高祖復命為中軍咨議參軍遷大司馬右長史轉吳國內史義熙十一年徵為太尉長史轉左長史從北征前鋒已平洛陽而未遣九錫弘銜使還京師諷旨朝廷時劉穆之掌留任而旨反從北來穆之愧懼發病遂卒而高祖還彭城弘領彭城太守宋國初建遷尚書僕射領選太守如故奏彈謝靈運曰臣聞間厥有家垂訓大易作威專戮致誡周書斯典或違刑茲無赦世子左衛率康樂縣公謝靈運力人桂興其嬖妾殺興江涘棄尸洪流事發京畿播聞遐邇宜加重劾肅正朝風案世子左衛率康樂縣公謝靈運過蒙恩奬頻叨榮授聞禮知禁為日已久而不能防間閫闈致茲紛穢罔顧憲軌忿殺自由此而勿治典刑將替請以見事免靈運所居官上臺削爵土收付大理治罪御史中丞都亭侯王準之顯居要任邦之司直風聲噂曾不彈舉若知而弗糾則情法斯撓如其不知則尸昧已甚豈可復預班清階式是國憲請免所居官以侯還散輩中內臺舊體不得用風聲舉彈此事彰赫曝之朝野執憲蔑聞羣司循舊國典既頽所虧者重臣弘忝承人乏位副朝端若復謹守常科則終莫之糾正所以不敢拱默自同秉彝違舊之愆伏須準裁高祖令曰靈運免官而已餘如奏端右肅正風軌誠副所期豈拘常儀自今為永制十四年遷監江州豫州之西陽新蔡二郡諸軍事撫軍將軍江州刺史至州省賦簡役百姓安之永初元年加散騎常侍以佐命功封華容縣公食邑二千戶三年入朝進號衛將軍開府儀同三司高祖因宴集謂羣公曰我布衣始望不至此傅亮之徒並撰辭欲盛稱功德弘率爾對曰此所謂天命求之不可得推之不可去時人稱其簡舉少帝景平二年徐羡之等謀廢立召弘入朝太祖即位以定策安社稷進位司空封建安郡公食邑千戶上表固辭曰臣聞趙武稱隨會夫子之家事治言於晉國無隱情臣千載幸會謬荷榮遇雖以智能虛薄政績蔑聞而言無隱情竊所庶幾向令天啓其心預定大策而名編司勳功不見紀固將請不賞之罪懸龍蛇之書豈當稽違成命苟修小節但無功勤暴之四海進闕君子勞心之謀退微小人勞力之效而聖朝僭賞於上愚臣苟忝於下則為厚誣當時永貽口實竊財之誚比此為輕惟塵盛猷虧玷為大微躬所惜一朝亦盡非唯仰塵國紀實亦俯畏友朋憂心彌疹胡顏靡託且凡人之交尚申知己況在明主可用理干所以敢遂愚狷守之以死乃見許加使持節侍中改監為都督進號車騎大將軍開府刺史如故徐羡之等以廢弒之罪將見誅弘既非首謀弟曇首又為上所親委事將發密使報弘羡之等誅徵弘為侍中司徒揚州刺史録尚書給班劍三十人上西征謝晦弘與驃騎彭城王義康居守入住中書下省引隊仗出入司徒府權置參軍五年春大旱弘引咎遜位曰臣聞三才雖殊其致則一故世道休明五福攸應政有失德咎徵必顯臣抑又聞之台輔之職論道讚契上佐人主燮理陰陽位以德授則和氣淳穆寇竊非據則謫見于天是以陳平有辭不濫主者之局邴吉停駕大懼牛喘之由斯固有國之所同天人之遠旨陛下聖哲御世光隆中興宜休徵表祥醴泉毖涌而頃陰陽隔并亢旱成災秋無嚴霜冬無積雪疾厲之氣彌歷四時此豈非任失其人覆餗之咎臣以庸短自輩凡流謬逢嘉運叨恩在昔陛下忘其不腆又重之以今任正位槐鼎統理神州珥貂衣袞總録朝端內外要重頓萃微躬窮極寵貴人臣莫比令德居之猶或難稱矧伊陋昧何以克任此之易了不俟明識但受命之始屬值時艱六戎親戒憂及社稷誠是臣下致節忘身之時當有何心塵撓聖聽所以僶俯從事循牆馳驅志在宣力慮不及遠既鯨鯢折首西夏底定便宜訴其本懷避賢謝拙而常人偷安日甘一日實亦仰佩天眷未能自已荏苒推遷忽及三載遂令負乘之釁彰著幽明愆伏之災患纏氓庶上缺皇朝緝熙之美下增官謗覆折之災伏念惶赧五情飛散雖曰厚顏何以寧處不遠而復大易攸稱小懲大戒細人之福近復之美非所敢觖懲戒之幸竊懷庶幾今履端惟始朝慶禮畢輒還私門思愆家巷庶微塞天譴少弭謗讟伏願鑑其所守即而許之臨啓愧塞不自宣盡先是彭城王義康為荊州刺史鎮江陵平陸令河南成粲與弘書曰僕聞軌物設教必隨時制宜世代盈虛亦與之消息夫勢之所處非親不居是以周之宗盟異姓為後權軸之要任歸二南斯前代之明謨當今之顯轍明公位極台鼎四海具瞻劬勞夙夜義同吐握而總録百揆兼牧畿甸功實盛大莫之與儔天道福謙宜存挹損驃騎彭城王道德昭備上之懿弟宗本歸源所應推先宜入秉朝政翊贊皇猷竟陵衡陽春秋已長又宜出據列蕃齊光魯衛明公高枕論道燮理陰陽則天下和平災害不作福慶與大宋升降享年與松喬齊久名垂萬代豈不美歟弘本有退志挾粲言由是固自陳請乃降為衛將軍開府儀同三司六年弘又上表曰臣聞異姓為後宗周之明義親不在外有國之所先故魯長滕君春秋所美楚出棄疾前史垂誡矧乃茂親明德道光一時述職侯甸朝政弗及而以庶族庸陋浮華之臣超踰先典居中贊契豈所以憲章古式緝熙治道驃騎將軍臣義康徽猷淵邈明德彌劭敷政江漢化被荊南搢紳屬情想樂當務周旦之寄不謀同詞分陝雖重比此為輕臣實空暗階恩踰越俯積素餐仰玷盛化公私二三無一而可昔孫叔未進優孟見𥕢展季在下臧文貽譏況道隆地昵義兼前禮臣於古人無能為役負乘竊位萬物謂何雖曰厚顏胡寧以處斯亡之懼實疚其心乞解州録以允民望伏願陛下遠存至公近鑑丹款俯順朝野改授親賢豈唯下臣獲免大戾凡厥衆隸孰不慶幸若天眷罔已脫復遲回請出臣表逮聞外內朝議輿誦或有可擇詔曰省表遠擬隆周經國之體近述大易卑牧之志三復沖旨良用憮然公體道淵虛明識經遠毗翼艱難勳猷光茂俾朕獲辰居垂拱司契委成豈容高遜總録固辭神州使成務有虧以重朕之不德邪深存體國所望夤亮驃騎親賢之寄地均旦奭還入內輔參讚機務輒敬從所執義康由是代弘為司徒與之分録弘又表曰近冒表聞披陳愚管實冀天鑒體其至誠而奉被還詔未蒙酬察徒塵聖覽仰延優旨顧影慚惶罔識攸厝臣忝荷要重四載于今既違前史量力之誡又微古人進賢之美尸位固寵日積官謗旋觀周行興愧已厚況在親賢朝野歸德甫思引身曷云能補惟塵大典虧喪已多不悟天眷之隆復垂恩奬名器弗改蒙寵如舊愚惑自揆茫若無涯臣義康既總録百揆毗讚盛化忝廁下風咨憑有所內朝細務庶可免竭神州任重望實兼該臣何人斯寇竊不已為爾推遷覆敗將及就無人事之愆必有陰陽之患伏念惟憂疢如疾首不知何理可以自安但成旨已決渙汗難反加臣懦劣少無此志進不能抗言陳辭以死自固退不能重繭置冰鮮食為瘠祗畏天威遂復俯仰至於攝督所部料綜文案曹局吏役所須不多其餘文武皆為冗長相府初建或有未充請留職僚同事而已自此以外及諸資實一送司徒臣受恩深重休戚是預義無虛飾苟自貶損伏願聖察特垂許順不令誠訴見其抑奪上又詔曰衛軍表如此司徒宜須事力可順公雅懷割二千人配府資儲不煩事送弘博練治體留心庶事斟酌時宜每存優允與八座丞郎疏曰同伍犯法無士人不罪之科然每至詰謫輒有請訴若垂恩宥則法廢不可行依事糾責則物以為苦怨宜更為其制使得優苦之衷也又主守偷五匹常偷四十匹並加大辟議者咸以為重宜進主守偷十匹常偷五十匹死四十匹降以補兵既得小寬民命亦足以有懲也想各言所懷左丞江奧議士人犯盜贓不及棄市者刑竟自在贓汙淫盜之目清議終身經赦不原當之者足以塞愆聞之者足以鑒誡若復雷同羣小謫以兵役愚謂為苦符伍雖比屋鄰居至於士庶之際實自天隔舍藏之罪無以相關奴客與符伍交接有所藏蔽可以得知是以罪及奴客自是客身犯愆非代郎主受罪也如其無奴則不應坐右丞孔默之議君子小人既雜為符伍不得不以相檢為義士庶雖殊而理有聞察譬百司居上所以下不必躬親而後同坐是故犯違之日理自相關今罪其養子典計者蓋義存戮僕如此則無奴之室豈得宴安但既云復士宜令輸贖常盜四十匹主守五匹降死補兵雖大存寬惠以紓民命然官及二千石及失節士大夫時有犯者罪乃可戮恐不可以補兵也謂此制可施小人士人自還用舊律尚書王準之議昔為山陰令士人在伍謂之押符同伍有愆得不及坐士人有罪符伍糾之此非士庶殊制實使即刑當罪耳夫束修之胄與小人隔絶防檢無方宜及不逞之士事接羣細既同符伍故使糾之于時行此非唯一處左丞議奴客與鄰伍相關可得檢察符中有犯使及刑坐即事而求有乖實理有奴客者類多使役東西分散住家者少其有停者左右驅馳動止所須出門甚寡典計者在家十無其一奴客坐伍濫刑必衆恐非立法當罪本旨右丞議士人犯偷不及大辟者宥補兵雖欲弘士懼無以懲邪乘理則君子違之則小人制嚴於上猶冒犯之以其宥科犯者或衆使畏法革心乃所以大宥也且士庶異制意所不同殿中郎謝元議謂事必先正其本然後其末可理本所以押士大夫於符伍者所以檢小人邪為使受檢於小人邪案左丞稱士庶天隔則士無弘庶之由以不知而押之於伍則是受檢於小人也然則小人有罪士人無事僕隸何罪而令坐之若以實相交關責其聞察則意有未因何者名實殊章公私異令奴不押符是無名也民乏資財是私賤也以私賤無名之人豫公家有實之任公私混淆名實非允由此而言謂不宜坐還從其主於事為宜無奴之士不在此例若士人本檢小人則小人有過己應獲罪而其奴則義歸戮僕然則無奴之士未合宴安使之輸贖於事非謬二科所附惟制之本耳此自是辨章二本欲使各從其分至於求之管見宜附前科區別士庶於義為美盜制按左丞議士人既終不為兵革幸可同寬宥之惠不必依舊律於議咸允吏部郎何尚之議按孔右丞議士人坐符伍為罪有奴罪奴無奴輸贖既許士庶緬隔則聞察自難不宜以難知之事定以必知之法夫有奴不賢無奴不必不賢今多僮者傲然於王憲無僕者怵迫於時網是為恩之所霑在程卓法之所設必加顏原求之鄙懷竊所未愜謝殿中謂奴不隨主於名分不明誠是有理然奴僕實與閭里相關今都不問恐有所失意同左丞議弘議曰尋律令既不分別士庶又士人坐同伍罹謫者無處無之多為時恩所宥故不盡親謫耳吳及義興適有許陸之徒以同符合給二千石論啓丹書己未間會稽士人云十數年前亦有四族坐此被責以時恩獲停而王尚書云人舊無同伍坐所未之解恐蒞任之日偶不值此事故邪聖明御世士人誠不憂至苦然要須臨事論通上干天聽為紛擾不如近為定科使輕重有節也又尋甲符制蠲士人不傳符耳令史復除亦得如之共相押領有違糾列了無等衰非許士人閭里之外也諸議云士庶緬絶不相參知則士人犯法庶民得不知若庶民不許不知何許士人不知小民自非超然簡獨永絶塵粃者比門接棟小以為意終自聞知不必須日夕來往也右丞百司之言粗是其況如衰陵士人實與里巷關接相知情狀乃當於冠帶小民今謂之士人便無小人之坐署為小民輒受士人之罰於情於法不其頗歟且都令不及士流士流為輕則小人令使徵預其罰便事至相糾閭伍之防亦為不同謂士人可不受同伍之謫耳罪其奴客庸何傷邪無奴客可令輸贖又或無奴僮為衆所明者官長二千石便當親臨列上依事遣判又主偷五匹常偷四十匹謂應見優量者實以小吏無知臨財易昧或由疏慢事蹈重科求之於心常有可愍故欲小進匹數寬其性命耳至於官長以上荷蒙祿榮付以局任當正己明憲檢下防非而親犯科律亂法冒利五匹乃已為弘矣士人無私相偷四十匹理就使至此致以明罰固其宜耳並何容復加哀矜且此輩士人可殺不可謫有如諸論本意自不在此也近聞之道路聊欲共論不呼乃爾難精既衆議糾紛將不如其已若呼不應停寢謂宜集議奏聞決之聖旨太祖詔衛軍議為允弘又上言舊制民年十三半役十六全役當以十三以上能自營私及公故以充役而考之見事猶或未盡體有強弱不皆稱年且在家自隨力所能堪不容過苦移之公役動有定科循吏隱恤可無其患庸宰守常已有勤劇況值苛政豈可稱言乃有務在豐役增進年齒孤遠貧弱其敝尤深至令依寄無所生死靡告一身之切逃竄求免家人遠討胎孕不育巧避羅憲實亦由之今皇化惟新四方無事役召之宜應存乎消息十五至十六宜為半丁十七為全丁從之其後弘寢疾弘表屢乞骸骨上輒優詔不許九年進位太保領中書監餘如故其年薨時年五十四即贈太保中書監給節加羽葆鼓吹增班劍為六十人侍中録尚書刺史如故諡曰文昭公配食高祖廟廷其年詔曰乃者三逆煽禍實繁有徒爰初遵養暨于明罰外虞內慮實惟艱難故太保華容縣公弘故衛將軍華故左光祿大夫曇首抱義懷忠乃情同至籌謀廟堂竭盡智力經綸夷險簡自朕心國恥既雪允膺茅土而並執謙挹志不命踰故用佇朝典將有後命盛業不究相係殞落永懷傷歎痛恨無已弘可增封千戶華曇首封開國縣侯食邑各千戶護軍將軍建昌公彥之深誠密謨比蹤齊望其復先食邑以酬忠勳又詔聞王太保家便已匱乏清約之美同規古人言念始終情增悽歎可賜錢百萬米千斛世祖大明五年車駕遊幸經弘墓下詔曰故侍中中書監太保録尚書事揚州刺史華容文昭公弘德猷光劭鑒識明遠故散騎常侍左光祿大夫太子詹事豫寧文侯曇首夙尚恬素理心貞正並綢繆先眷契闊屯夷內亮王道外流徽譽以國圖令勳民思茂惠朕薄巡都外瞻覽墳塋永言想慨良深于懷便可遣使致祭墓所弘明敏有思致既以民望所宗造次必存禮法凡動止施為及書翰儀體後人皆依倣之謂為王太保家法雖歷任藩輔不營財利薨亡之後家無餘業而輕率少威儀性又褊隘人忤意者輒面加責辱少時嘗摴蒲公城子野舍及後當權有人就弘求縣辭訴頗切此人嘗以蒲戲得罪弘詰之曰君得錢會戲何用祿為答曰不審公城子野何在弘默然子錫嗣少以宰相子起家為員外散騎歷清職中書郎太子左衛率江夏內史高自位遇太尉江夏王義恭當朝錫箕踞大坐殆無推敬卒官子僧亮嗣齊受禪降爵為侯食邑五百戶弘少子僧達別有傳弘弟虞廷尉卿虞子深有美名官至新安太守虞弟抑光祿大夫抑弟孺侍中孺弟曇首別有傳弘從父弟練晉中書令珉子也元嘉中歷顯官侍中度支尚書練子釗世祖大明中亦經清職黃門郎臨海王子頊晉安王子勛征虜前軍長史左民尚書太宗初為司徒左長史隨司徒建安王休仁出赭圻時居母憂加冠軍將軍忤犯休仁出為始興相休仁恚之不已太宗乃收付廷尉賜死史臣曰晉綱弛紊其漸有由孝武守文於上化不下及道子昏德居宗憲章墜矣重之以國寶啓亂加之以元顯嗣虐而祖宗之遺典羣公之舊章莫不葉散冰離掃地盡矣主威不樹臣道專行國典人殊朝綱家異編戶之命竭於豪門王府之蓄變為私藏由是禍基東妖難結天下蕩蕩然王道不絶者若綖高祖一朝創義事屬橫流改亂章布平道尊主卑臣之義定於馬捶之間威令一施內外從禁以建武永平之風變太元隆安之俗此蓋文宣公之為也為一代宗臣配饗清廟豈徒然哉
