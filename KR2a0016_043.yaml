body:
  text: 宋書卷四十三列傳第三徐羡之傅亮檀道濟徐羡之字宗文東海郯人也祖寧尚書吏部郎江州刺史未拜卒父祚之上虞令羡之少為王雅太子少傅主簿劉牢之鎮北功曹尚書祠部郎不拜桓修撫軍中兵曹參軍與高祖同府深相親結義旗建高祖版為鎮軍參軍尚書庫部郎領軍司馬與謝混共事混甚知之補琅邪王大司馬參軍司徒左西屬徐州別駕從事史太尉咨議參軍義熙十一年除鷹揚將軍琅邪內史仍為大司馬從事中郎將軍如故高祖北伐轉太尉左司馬掌留任以副二劉穆之初高祖議欲北伐朝士多諫唯羡之默然或問何獨不言羡之曰吾位至二品官為二千石志願久充今二方已平拓地萬里唯有小未定而公寢食不忘意量乖殊何可輕豫劉穆之卒高祖命以羡之為吏部尚書建威將軍丹陽尹總知留任甲仗二十人出入轉尚書僕射將軍尹如故十四年大司馬府軍人朱興妻周坐息男道扶年三歲先得癇病周因其病發掘地生埋之為道扶姑女所告正周棄市刑羡之議曰自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故尚弘物之理母之即刑由子明法為子之道焉有自容之地雖伏法者當罪而在宥者靡容愚謂可特申之遐裔從之高祖踐阼進號鎮軍將軍加散騎常侍上初即位思佐命之功詔曰散騎常侍尚書僕射鎮軍將軍丹陽尹徐羡之監江州豫州之西陽新蔡諸軍事撫軍將軍江州刺史華容侯王弘散騎常侍護軍將軍作唐男檀道濟中書令領太子詹事傅亮侍中中領軍謝晦前左將軍江州刺史宜陽侯檀韶使持節雍梁南北秦四州荊州之河北諸軍事後將軍雍州刺史關中侯趙倫之使持節督北徐兗青三州諸軍事征虜將軍北徐州刺史南城男劉懷慎散騎常侍領太子左衛率新淦侯王仲德前冠軍將軍北青州刺史安南男向彌左衛將軍灄陽男劉粹使持節南蠻校尉佷山子到彥之西中郎司馬南郡相宜陽侯張邵參西中郎將軍事建威將軍河東太守資中侯沈林子等或忠規遠謀扶讚洪業或肆勤樹績弘濟艱難經始圖終勳烈惟茂並宜與國同休饗茲大賚羡之可封南昌縣公弘可華容縣公道濟可改封永修縣公亮可建城縣公晦可武昌縣公食邑各二千戶韶可更增邑二千五百戶仲德可增邑二千二百戶懷慎彥之各進爵為侯粹改封建安縣侯並增邑為千戶倫之可封霄城縣侯食邑千戶邵可封臨沮縣伯林子可封漢壽縣伯食邑六百戶開國之制率遵舊章羡之遷尚書令揚州刺史加散騎常侍進位司空録尚書事常侍刺史如故羡之起自布衣又無術學直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望沈密寡言不以憂喜見色頗工奕觀戲常若未解當世倍以此推之傅亮蔡廓常言徐公曉萬事安異同高祖不豫加班劍三十人宮車晏駕與中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命少帝詔曰平理獄訟政道所先朕哀荒在疚未堪親覽司空尚書令可率衆官月一決獄帝後失德羡之等將謀廢立而廬陵王義真輕動多過不任四海乃先廢義真然後廢帝時謝晦為領軍以府舍內屋敗應治悉移家人出宅聚將士於府內鎮北將軍南兗州刺史檀道濟先朝舊將威服殿省且有兵衆召使入朝告之以謀事將發道濟入宿領軍府中書舍人邢安泰潘盛為內應其日守關道濟領兵居前羡之等繼其後由東掖門雲龍門入宿衛先受處分莫有動者先是帝於華林園為列肆親自酤賣又開瀆聚土以像破岡率左右唱呼引船為樂是夕寢於龍舟在天淵池兵士進殺二人又傷帝指扶帝出東閣收璽綬羣臣拜辭衛送故太子宮遷於吳郡侍中程道惠勸立第五皇弟義恭羡之不許遣使殺義真於新安殺帝於吳縣時為帝築宮未成權居金昌亭帝突走出昌門追者以門關擊之倒地然後加害太祖即阼進羡之司徒餘如故改封南平郡公食邑四千戶固讓加封有司奏車駕依舊臨華林園聽訟詔曰政刑多所未悉可如先二公推訊元嘉二年羡之與左光祿大夫傅亮上表歸政曰臣聞元首司契運樞成務臣道代終事盡宣翼冕旒之道理絶於上皇拱己之事不行於中古故高宗不言以三齡為斷冢宰聽政以再期為節百王以降罔或不然陛下聖德紹興負荷洪業億兆顒顒思陶盛化而聖旨謙挹委成羣司自大禮告終鑽燧三改大明佇照遠邇傾屬臣等雖率誠屢聞未能仰感敢藉品物之情謹因蒼生之志伏願陛下遠存周文日昃之道近思皇室締構之艱時攬萬機躬親朝政廣闢四聰博詢庶業則雍熙可臻有生幸甚上未許羡之等重奏曰近陳寫下情言為心罄奉被還詔鑒許未回豈惟愚臣秉心有在詢之朝野人無異議何者形風四方實繫王德一國之事本之一人雖世代不同時殊風異至於主運臣贊古今一揆未有渾心委任而休明可期此之非宜布自遐邇臣等荷遇二世休戚以均情為國至豈容順默重披丹心冒昧以請上猶辭羡之等又固陳曰比表披陳辭誠俱盡詔旨沖遠未垂聽納三復屏營伏增憂歎臣聞克隆先構幹蠱之盛業昧旦丕顯帝王之高義自皇宋創運英聖有造殷憂未闕艱患仍䗿賴天命有底聖明承業時屯國故猶在民心泰山之安未易可保昏明隆替繫在聖躬斯誠周詩夙興之辰殷王待旦之日豈得無為拱己復玄古之風逡巡虛挹徇匹夫之事伏願以宗廟為重百姓為心弘大業以嗣先軌隆聖道以增前烈愚瞽所獻情盡於此上乃許之羡之仍遜位退還私第兄子佩之及侍中程道惠吳興太守王韶之等並謂非宜敦勸甚苦復奉詔攝任三年正月詔曰民生於三事之如一愛敬同極豈惟名教況乃施侔造物義在加隆者乎徐羡之傅亮謝晦階因緣之才荷恩在昔擢自無聞超居要重卵翼而長未足以譬永初之季天禍橫流大明傾曜四海遏密實受顧託任同負圖而不能竭其股肱盡其心力送往無復言之節事居闕忠貞之效將順靡記匡救蔑聞懷寵取容順成失德雖末因懼禍以建大策而逞其悖心不畏不義播遷之始謀肆鴆毒至止未幾顯行怨殺窮凶極虐荼酷備加顛沛皂隸之手告盡逆旅之館都鄙哀愕行路飲涕故廬陵王英秀明遠徽風夙播魯衛之寄朝野屬情羡之等暴蔑求專忌賢畏逼造構貝錦成此無端罔主蒙上橫加流屏矯誣朝旨致茲禍害寄以國命而翦為仇讎旬月之間再肆鴆毒痛感三靈怨結人鬼自書契以來棄常安忍反易天明未有如斯之甚者也昔子家從弒鄭人致討宋肥無辜蕩澤為戮況逆亂倍於往釁情痛深於國家此而可容孰不可忍即宜誅殛告謝存亡而于時大事甫爾異同紛結匡國之勳實著莫大之罪未彰是以遠酌民心近聽輿訟雖欲討亂慮或難圖故忍戚含哀懷恥纍載每念人生實難情事未展何嘗不顧影慟心伏枕泣血今逆臣之釁彰暴遐邇君子悲情義徒思奮家讎國恥可得而雪便命司寇肅明典刑晦據有上流或不即罪朕當親率六師為其遏防可遣中領軍到彥之即日電發征北將軍檀道濟絡驛繼路符衛軍府州以時收翦已命征虜將軍劉粹斷其走伏罪止元凶餘無所問感惟永往心情崩絶氛霧既袪庶幾治道爾日詔召羡之行至西明門外時謝晦弟石胡子肖反為黃門郎正直報亮云殿內有異處分亮馳報羡之羡之回還西州乘內人問訊車出郭步走至新林入陶竈中自剄死時年六十三羡之初不應召上遣中領軍到彥之右衛將軍王華追討羡之死野人以告載尸付廷尉子喬之尚高祖第六女富陽公主官至竟陵王文學喬之及弟乞奴從誅初羡之年少時嘗有一人來謂之曰我是汝祖羡之因起拜之此人曰汝有貴相而有大厄可以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣住在縣內嘗暫出而賊自後破縣縣內人無免者雞犬亦盡唯羡之在外獲全隨從兄履之為臨海樂安縣嘗行經山中見黑龍長丈餘頭有角前兩足皆具無後足曳尾而行及拜司空守關將入彗星晨見危南又當拜時雙鸛集太極東鴟尾鳴喚兄子佩之輕薄好利高祖以其姻戚纍加寵任為丹陽尹吳郡太守景平初以羡之秉權頗豫政事與王韶之程道惠中書舍人邢安泰潘盛相結黨與時謝晦久病連灸不堪見客佩之等疑其託疾有異圖與韶之道惠同載詣傅亮稱羡之意欲令亮作詔誅之亮答以為己等三人同受顧命豈可相殘戮若諸君果行此事便當角巾步出掖門耳佩之等乃止羡之既誅太祖特宥佩之免官而已其年冬佩之又結殿中監茅亨謀反并告前寧州刺史應襲以亨為兗州襲為豫州亨密以聞襲亦告司徒王弘佩之聚黨百餘人殺牛犒賜條牒時人並相署置期明年正會於殿中作亂未及數日收斬之傅亮字季友北地靈州人也高祖咸司隸校尉父瑗以學業知名位至安成太守瑗與郗超善超嘗造瑗瑗見其二子迪及亮亮年四五歲超令人解亮衣使左右持去初無吝色超謂瑗曰卿小兒才名位宦當遠踰於兄然保家傳祚終在大者迪字長猷亦儒學官至五兵尚書永初二年卒追贈太常亮博涉經史尤善文詞初為建威參軍桓謙中軍行參軍桓玄篡位聞其博學有文采選為祕書郎欲令整正祕閣未及拜而玄敗義旗初丹陽尹孟昶以為建威參軍義熙元年除員外散騎侍郎直西省典掌詔命轉領軍長史以中書郎滕演代之亮未拜遭母憂服闋為劉毅撫軍記室參軍又補領軍司馬七年遷散騎侍郎復代演直西省仍轉中書黃門侍郎直西省如故高祖以其久直勤勞欲以為東陽郡先以語迪迪大喜告亮亮不答即馳見高祖曰伏聞恩旨賜擬東陽家貧忝祿私計為幸但憑廕之願實結本心乞歸天宇不樂外出高祖笑曰謂卿之須祿耳若能如此甚協所望會西討司馬休之以為太尉從事中郎掌記室以太尉參軍羊徽為中書郎代直西省亮從征關洛還至彭城宋國初建令書除侍中領世子中庶子徙中書令領中庶子如故從還壽陽高祖有受禪意而難於發言乃集朝臣宴飲從容言曰桓玄暴篡鼎命已移我首唱大義復興皇室南征北伐平定四海功成業著遂荷九錫今年將衰暮崇極如此物戒盛滿非可久安今欲奉還爵位歸老京師羣臣唯盛稱功德莫曉此意日晚坐散亮還外乃悟旨而宮門已閉亮於是叩扉請見高祖即開門見之亮入便曰臣暫宜還都高祖達解此意無復他言直云須幾人自送亮曰須數十人便足於是即便奉辭亮既出已夜見長星竟天亮拊髀曰我常不信天文今始驗矣至都即徵高祖入輔永初元年遷太子詹事中書令如故以佐命功封建城縣公食邑二千戶入直中書省專典詔命以亮任總國權聽於省見客神虎門外每旦車常數百兩高祖登庸之始文筆皆是記室參軍滕演北征廣固悉委長史王誕自此後至于受命表策文誥皆亮辭也演字彥將南陽西鄂人官至黃門郎祕書監義熙八年卒二年亮轉尚書僕射中書令詹事如故明年高祖不豫與徐羡之謝晦並受顧命給班劍二十人少帝即位進為中書監尚書令景平二年領護軍將軍少帝廢亮率行臺至江陵奉迎太祖既至立行門於江陵城南題曰大司馬門率行臺百僚詣門拜表威儀禮容甚盛太祖將下引見亮哭慟甚哀動左右既而問義真及少帝薨廢本末悲號嗚咽侍側者莫能仰視亮流汗沾背不能答於是布腹心於到彥之王華等深自結納太祖登阼加散騎常侍左光祿大夫開府儀同三司本官悉如故司空府文武即為左光祿府又進爵始興郡公食邑四千戶固讓進封元嘉三年太祖欲誅亮先呼入見省內密有報之者亮辭以嫂病篤求暫還家遣信報徐羡之因乘車出郭門騎馬奔兄迪墓屯騎校尉郭泓收付廷尉伏誅時年五十三初至廣莫門上遣中書舍人以詔書示亮并謂曰以公江陵之誠當使諸子無恙初亮見世路屯險著論名曰演慎曰大道有言慎終如始則無敗事矣易曰括囊無咎慎不害也又曰藉之用茅何咎之有慎之至也文王小心大雅詠其多福仲由好勇馮河貽其苦針虞書著慎身之譽周廟銘陛坐之側因斯以談所以保身全德其莫尚於慎乎夫四道好謙三材忌滿祥萃虛室鬼瞰高屋豐屋有蔀家之災鼎食無百年之貴然而徇欲厚生者忽而不戒知進忘退者曾莫之懲前車已摧後鑾不息乘危以庶安行險而徼幸於是有顛墜覆亡之禍殘生夭命之釁其故何哉流溺忘反而以身輕於物也故昔之君子同名爵於香餌故傾危不及思憂患而豫防則針石無用洪流壅於涓涓合拱挫於纖辰口介焉是式色斯而舉悟高鳥以風逝鑑醴酒而投紱夫豈敝著而後謀通患結而後思復云爾而已哉故詩曰慎爾侯度用戒不虞言防萌也夫單以營內喪表張以治外失中齊秦有守一之敗偏恃無兼濟之功冰炭滌於胸心巖牆絶於四體夫然故形神偕全表𩹉寧一營魄內澄百骸外固邪氣不能襲憂患不能及然可以語至而言極矣夫以嵇子之抗心希古絶羈獨放五難之根既拔立生之道無纍人患殆乎盡矣徒以忽防於鍾呂肆言於禹湯禍機發於豪端逸翩鎩於垂舉觀夫貽書良友則匹厚味於甘鴆囗囗囗囗囗囗囗囗其懼患也若無轡而乘奔其慎禍也猶履冰而臨谷或振褐高棲揭竿獨往或保約違豐安于卑位故漆園外楚忌在龜犧商洛遐遁畏此駟馬平仲辭邑殷鑒於崔慶張臨挹滿灼戒乎桑霍若君子覽茲二塗則賢鄙之分既明全喪之實又顯非知之難慎之惟艱慎也者言行之樞管乎夫據圖揮刃愚夫弗為臨淵登峭莫不惴栗何則害交故慮篤患切而懼深故詩曰不敢暴虎不敢馮河慎微之謂也故庖子涉族怵然為戒差之一毫弊猶如此況乎觸害犯機自投死地禍福之具內充外斥陵九折於卭僰泛衝波於呂梁傾側成於俄頃性命哀而莫救嗚呼嗚呼故語有之曰誠能慎之福之根也曰是何傷禍之門爾言慎而已矣亮布衣儒生僥幸際會既居宰輔兼總重權少帝失德內懷憂懼作感物賦以寄意焉其辭曰余以暮秋之月述職內禁夜清務隙遊目藝苑于時風霜初戒蟄類尚繁飛蛾翔羽翩翾滿室赴軒幌集明燭者必以燋滅為度雖則微物矜懷者久之退感莊生異鵲之事與彼同迷而忘反鑒之道此先師所以鄙智及齊客所以難日論也悵然有懷感物興思遂賦之云爾在西成之暮晷肅皇命於禁中聆蜻蛚於前廡鑒朗月於房櫳風蕭瑟以陵幌霜溰溰而被墉憐鳴蜩之應節惜落景之懷東嗟勞人之萃感何夕永而慮充眇今古以遐念若循環之無終詠倚相之遺矩希董生之方融鑽光燈而散帙溫聖哲之遺蹤墳素杳以難暨九流紛其異封領三百於無邪貫五千於有宗考舊聞於前史訪心迹於汙隆豈夷阻之在運將全喪之由躬遊翰林之彪炳嘉美手於良工辭存麗而去穢旨既雅而能通雖源流之深浩且揚榷而發蒙習習飛蚋飄飄纖蠅緣幌求隙望爓思陵糜蘭膏而無悔赴朗燭而未懲瞻前軌之既覆忘改轍於後乘匪微物之足悼悵永念而撫膺彼人道之為貴參二儀而比靈稟清矌以授氣修緣督而為經照安危於心術鏡纖兆於未形有徇末而捨本或耽欲而忘生碎隨侯於微爵捐所重而要輕矧昆蟲之所昧在智士其猶嬰悟雕陵於莊氏幾鑒濁而迷清仰前修之懿軌知吾迹之未并雖宋元之外占曷在豫之克明豈知反之徒爾喟投翰以增情初奉迎大駕道路賦詩三首其一篇有悔懼之辭曰夙棹發皇邑有人祖我舟餞離不以幣贈言重琳球知止道攸貴懷祿義所尤四牡倦長路君轡可以收張邴結晨軌疏董頓夕輈東隅誠已謝西景逝不留性命安可圖懷此作前修敷衽銘篤誨引帶佩嘉謀迷寵非豫志厚德良未酬撫躬愧疲朽三省慚爵浮重明照蓬艾萬品同率由忠誥豈假知式微發直謳亮自知傾覆求退無由又作辛有穆生董仲道讚稱其見微之美長子演祕書郎先亮卒演弟悝湛逃亡湛弟都徙建安郡世祖孝建之中並還京師檀道濟高平金鄉人左將軍韶少弟也少孤居喪備禮奉姊事兄以和謹致稱高祖創義道濟從入京城參高祖建武軍事轉征西討平魯山禽桓振除輔國參軍南陽太守以建義勳封吳興縣五等侯盧循寇逆羣盜互起郭寄生等聚作唐以道濟為揚武將軍天門太守討平之又從劉道規討桓謙荀林等率厲文武身先士卒所向摧破及徐道覆來逼道規親出拒戰道濟戰功居多遷安遠護軍武陵內史復為太尉參軍拜中書侍郎轉寧朔將軍參太尉軍事以前後功封作唐縣男食邑四百戶補太尉主簿咨議參軍豫章公世子為征虜將軍鎮京口道濟為司馬臨淮太守又為世子西中郎司馬梁國內史復為世子征虜將軍司馬加冠軍將軍義熙十二年高祖北伐以道濟為前鋒出淮肥所至諸城戍望風降服進剋許昌獲偽寧朔將軍潁川太守姚坦及大將楊業至成臯偽兗州刺史韋華降徑進洛陽偽平南將軍陳留公姚洸歸順凡拔城破壘俘四千餘人議者謂應悉戮以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是戎夷感悅相率歸之者甚衆進據潼關與諸軍共破姚紹長安既平以為征虜將軍琅邪內史世子當鎮江陵復以道濟為西中郎司馬持節南蠻校尉又加征虜將軍遷宋國侍中領世子中庶子兗州大中正高祖受命轉護軍加散騎常侍領石頭戍事聽直入殿省以佐命功改封永修縣公食邑二千戶徙為丹陽尹護軍如故高祖不豫給班劍二十人出監南徐兗之江北淮南諸郡軍事鎮北將軍南兗州刺史景平元年虜圍青州刺史竺夔於東陽城夔告急加道濟使持節監征討諸軍事與王仲德救東陽未及至虜燒營焚攻具遁走將追之城內無食乃開窖取久穀窖深數丈出穀作米已經再宿虜去已遠不復可追乃止還鎮廣陵徐羡之將廢廬陵王義真以告道濟道濟意不同屢陳不可不見納羡之等謀欲廢立諷道濟入朝既至以謀告之將廢之夜道濟入領軍府就謝晦宿晦其夕竦動不得眠道濟就寢便熟晦以此服之太祖未至道濟入守朝堂上即位進號征北將軍加散騎常侍給鼓吹一部進封武陵郡公食邑四千戶固辭進封又增督青州徐州之淮陽下邳琅邪東莞五郡諸軍事及討謝晦道濟率軍繼到彥之彥之戰敗退保隱圻會道濟至晦本謂道濟與羡之等同誅忽聞來上人情凶懼遂不戰自潰事平遷都督江州荊州之江夏豫州之西陽新蔡晉熙四郡諸軍事征南大將軍開府儀同三司江州刺史持節常侍如故增封千戶元嘉八年到彥之伐索虜已平河南尋復失之金墉虎牢並沒虜逼滑臺加道濟都督征討諸軍事率衆北討軍至東平壽張縣值虜安平公乙旃眷道濟率寧朔將軍王仲德驍騎將軍段宏奮擊大破之轉戰至高梁亭虜寧南將軍濟州刺史壽昌公悉頰庫結前後邀戰道濟分遣段宏及臺隊主沈虔之等奇兵擊之即斬悉頰庫結道濟進至濟上連戰二十餘日前後數十交虜衆盛遂陷滑臺道濟於歷城全軍而反進位司空持節常侍都督刺史並如故還鎮尋陽道濟立功前朝威名甚重左右腹心並經百戰諸子又有才氣朝廷疑畏之太祖寢疾纍年屢經危殆彭城王義康慮宮車晏駕道濟不可復制十二年上疾篤會索虜為邊寇召道濟入朝既至上間十三年春將遣道濟還鎮已下船矣會上疾動召入祖道收付廷尉詔曰檀道濟階緣時幸荷恩在昔寵靈優渥莫與為比曾不感佩殊遇思答萬分乃空懷疑二履霜日久元嘉以來猜阻滋結不義不昵之心附下罔上之事固已暴之民聽彰於遐邇謝靈運志凶辭醜不臣顯著納受邪説每相容隱又潛散金貨招誘剽猾逋逃必至實繁彌廣日夜伺隙希冀非望鎮軍將軍仲德往年入朝屢陳此迹朕以其位居台鉉豫班河嶽彌縫容養庶或能革而長惡不悛凶慝遂遘因朕寢疾規肆禍心前南蠻行參軍龐延祖具悉姦狀密以啓聞夫君親無將刑茲罔赦況罪釁深重若斯之甚便可收付廷尉肅正刑書事止元惡餘無所問於是收道濟及其子給事黃門侍郎植司徒從事中郎粲太子舍人隰征北主簿承伯祕書郎遵等八人並於廷尉伏誅又收司空參軍薛彤付建康伏法又遣尚書庫部郎顧仲文建武將軍茅亨至尋陽收道濟子夷雍演及司空參軍高進之誅之薛彤進之並道濟腹心有勇力時以比張飛關羽初道濟見收脫幘投地曰乃復壞汝萬里之長城雍子孺乃被宥世祖世為奉朝請史臣曰夫彈冠出里結組登朝道申於夷路運艱於險轍是以古人裴回於出處交戰乎臨岐若其任重於身恩結自主雖復據鼎承劍悠然不以存歿為懷當二公受言西殿跪承顧託若使死而可再固以赴蹈為期也及逢權定之機當震主之地甫欲攘抑後禍御蔽身災使桐宮有卒迫之痛淮王非中霧之疾若以社稷為存亡則義異於此但彭城無燕剌之釁而有楚英之戮若使一昆延曆亦未知定終所在也謝晦言不以賊遺君父豈徒言哉
