body:
  text: 宋書卷四十七列傳第七劉懷肅孟懷玉弟龍符劉敬宣檀祗劉懷肅彭城人高祖從母兄也家世貧窶而躬耕好學初為劉敬宣寧朔府司馬東征孫恩有戰功又為龍驤司馬費令聞高祖起義棄縣來奔京邑平定振武將軍道規追桓玄以懷肅為司馬玄留何淡之郭銓等戍桑落洲進擊破之潁川太守劉統平除高平太守玄既死從子振大破義軍於楊林義軍退尋陽懷肅與江夏相張暢之攻淡之於西塞破之偽鎮東將軍馮該戍夏口東岸孟山圖據魯山城桓仙客守偃月壘皆連壁相望懷肅與道規攻之躬擐甲胄陷二城馮該走石城生擒仙客義熙元年正月振敗走道規遣懷肅平石城斬馮該及其子山靖三月桓振復襲江陵荊州刺史司馬休之出奔懷肅自雲杜馳赴日夜兼行七日而至振勒兵三萬旗幟蔽野躍馬橫矛躬自突陳流矢傷懷肅額衆懼欲奔懷肅瞋目奮戰士氣益壯於是士卒爭先臨陳斬振首江陵既平休之反鎮執懷肅手曰微子之力吾無所歸矣偽輔國將軍符嗣馬孫偽龍驤將軍金符青樂志等屯結江夏懷肅又討之梟樂志等道規加懷肅督江夏九郡權鎮夏口除通直郎仍為輔國將軍淮南歷陽二郡太守二年又領劉毅撫軍司馬軍郡如故以義功封東興縣侯食邑千戶其冬桓石綏司馬國璠陳襲於胡桃山聚衆為寇懷肅率步騎討破之江淮間羣蠻及桓氏餘黨為亂自請出討既行失旨毅上表免懷肅官三年卒時年四十一追贈左將軍無子弟懷慎以子蔚祖嗣封官至江夏內史蔚祖卒子道存嗣太祖元嘉末為太尉江夏王義恭咨議參軍世祖伐元凶義軍至新亭道存出奔元凶殺其母以徇前廢帝景和中為義恭太宰從事中郎義恭敗以黨與下獄死懷肅次弟懷敬澀訥無才能初高祖産而皇妣殂孝皇帝貧薄無由得乳人議欲不舉高祖高祖從母生懷敬未期乃斷懷敬乳而自養高祖高祖以舊恩懷敬纍見寵授至會稽太守尚書金紫光祿大夫懷敬子真道為錢唐令元嘉十三年東土飢上遣揚州治中從事史沈演之巡行在所演之上表曰宰邑敷政必以簡惠成能蒞職闡治務以利民著績故王奐見紀於前叔卿流稱於後竊見錢唐令劉真道餘杭令劉道錫皆奉公恤民恪勤匪懈百姓稱詠訟訴希簡又翦蕩凶非屢能擒獲災水之初餘杭高堤崩潰洪流迅激勢不可量道錫躬先吏民親執板築塘既還立縣邑獲全經歷諸縣訪核名實並為二邦之首最治民之良宰上嘉之各賜穀千斛以真道為步兵校尉十四年出為梁南秦二州刺史十八年氐賊楊難當侵寇漢中真道率軍討破之而難當寇盜猶不已太祖遣龍驤將軍裴方明率禁兵五千受真道節度十九年方明至武興率太子積弩將軍劉康祖後軍參軍梁坦陳彌裴肅之安西參軍段叔文魯尚期始興王國常侍劉僧秀綏遠將軍馬洗振武將軍王奐之等進次潭谷去蘭臯數里難當遣其建節將軍苻弘祖啖元等固守蘭臯鎮北將軍苻德義於外為遊軍難當子撫軍大將軍和重兵繼其後方明進擊大破之於濁水斬弘祖并三千餘級遣康祖追之過蘭臯二千餘里和又遣德義助戰康祖又大破之和退保修城難當遣建忠將軍楊林振威將軍姚憲領二千騎就和方明又率諸將攻之和敗走追至赤亭難當席卷奔叛方明遣康祖直趣百頃偽丞相楊萬壽等一時歸降難當第三息虎先戍陰平難當既走虎逃竄民間生禽之送京都斬于建康市秦州刺史胡崇之西鎮百頃行至濁水為索虜所邀擊敗沒以真道為建威將軍雍州刺史方明輔國將軍梁南秦二州刺史方明辭不拜詔曰往年氐豎楊難當造為叛亂俯首者衆其長史楊萬壽建節將軍姚憲情不違順屢進矢言及凶醜宵遁闔境崩擾建忠將軍呂訓衛倉儲以候王師寧朔將軍薑檀果烈懇到志在宣力濁水之捷厥庸顯然近者協贊義奮乃心無替略陽苻昭誠係本朝亦同斯舉俘擒偽將獨克武興推鋒致效隕命寇手並事著屯險感于豫懷宜蒙旌榮慰存亡可贈萬壽龍驤將軍昭武都太守憲補員外散騎侍郎訓駙馬都尉奉朝請檀征西大將軍司馬仇池太守宜並內徙可符雍梁二州厚加贍恤呂訓略陽氐人呂先子也又詔曰故晉壽太守薑道盛前討仇池志輸誠力即戎著效臨財能清近先登濁水殞身鋒鏑誠節俱亮矜悼于懷可贈給事中賜錢十萬道盛注古文尚書行於世真道方明並坐破仇池斷割金銀諸雜寶貨又藏難當善馬下獄死劉康祖等繫免各有差方明河東人為劉道濟振武中兵參軍立功蜀土歷潁川南平昌太守皆坐贓私免官孟懷玉平昌安丘人也高祖珩晉河南尹祖淵右光祿大夫父綽義旗後為給事中光祿勳追贈金紫光祿大夫世居京口高祖東伐孫恩以懷玉為建武司馬豫義旗從平京城進定京邑以功封鄱陽縣侯食邑千戶高祖鎮京口以懷玉為鎮軍參軍下邳太守義熙三年出為寧朔將軍西陽太守新蔡內史除中書侍郎轉輔國將軍領丹陽府兵戍石頭盧循逼京邑懷玉於石頭岸連戰有功為中軍咨議參軍賊帥徐道覆屢欲以精鋭登岸畏懷玉不敢上及循南走懷玉與衆軍追躡直至嶺表徐道覆屯結始興懷玉攻圍之身當矢石旬月乃陷仍南追循循平又封陽豐縣男食邑二百五十戶復為太尉咨議參軍征虜將軍八年遷江州刺史尋督江州豫州之西陽新蔡汝南潁川司州之農揚州之松滋六郡諸軍事南中郎將刺史如故時荊州刺史司馬休之居上流有異志故授懷玉此任以防之十一年加持節丁父艱懷玉有孝性因抱篤疾上表陳解不許又自陳弟仙客出繼喪主唯己乃見聽未去任其年卒官時年三十一追贈平南將軍子元卒無子國除懷玉別封陽豐男子慧熙嗣坐廢祭祀奪爵慧熙子宗嗣竟陵太守中大夫龍符懷玉弟也驍果有膽氣幹力絶人少好遊俠結客於閭里早為高祖所知既克京城以龍符為建武參軍江乘羅落覆舟三戰並有功參鎮軍軍事封平昌縣五等子加寧遠將軍淮陵太守與劉藩向彌征桓歆桓石康破斬之除建威將軍東海太守索虜斛蘭索度真侵邊彭沛騷擾高祖遣龍符建威將軍道憐北討一戰破之追斛蘭至光水溝邊被創奔走高祖伐廣固以龍符為車騎參軍加龍驤將軍廣川太守統步騎為前鋒軍達臨朐與賊爭水龍符單騎衝突應手破散即據水源賊遂退走龍符乘勝奔逐後騎不及賊數千騎圍繞攻之龍符奮矟接戰每一合輒殺數人衆寡不敵遂見害時年三十三高祖深加痛悼追贈青州刺史又表曰故龍驤將軍廣川太守孟龍符忠勇果毅隕身王事宜蒙甄表以顯貞節聖恩嘉悼寵贈方州龍符投袂義初前驅效命推鋒三捷每為衆先及西劋桓歆北殄索虜朝議爵賞未及施行會今北伐復統前旅臨朐之戰氣冠三軍于時逆徒實繁控弦掩澤龍符匹馬電躍所向摧靡奮戈深入知死弗吝賊超奔遁依險鳥聚大軍因勢方軌長驅考其庸績豫參濟不竊謂宜班爵土以褒勳烈乃追封臨沅縣男食邑五百戶無子弟仙客以子微生嗣封太祖元嘉中有罪奪爵徙廣州以微生弟彥祖子佛護襲爵齊受禪國除孝武大明初諸流徙者悉聽還本微生巳死子係祖歸京都有筋幹異力能儋負數人入隸羽林為殿中將軍二年索虜寇青冀世祖遣軍援之係祖自占求行戰於杜梁挺身入陳所殺狼籍遂見殺詔書追贈潁川郡太守劉敬宣字萬壽彭城人漢楚元王交後也祖建征虜將軍父牢之鎮北將軍敬宣八歲喪母晝夜號泣中表異之輔國將軍桓序鎮蕪湖牢之參序軍事四月八日敬宣見衆人灌佛乃下頭上金鏡以為母灌因悲泣不自勝序歎息謂牢之曰卿此兒既為家之孝子必為國之忠臣起家為王恭前軍參軍又參會稽世子元顯征虜軍事隆安二年王恭起兵於京口以誅司馬尚之兄弟為名牢之時為恭前軍司馬輔國將軍晉陵太守置佐領兵而恭以豪戚自居甚相陵忽牢之心不能平及恭此舉使牢之為前鋒太傅會稽王道子與牢之書備言禍福使以兵反恭牢之呼敬宣謂曰王恭昔蒙先帝殊恩今居伯舅之重義心未彰唯兵是縱吾不能審恭事捷之日必能奉戴天子緝穆宰相與不今欲奉國威靈以明逆順汝以為何如敬宣曰朝廷雖無成康之隆未有桓靈之亂而恭怙亂阻兵志陵京邑大人與恭親無骨肉分非君臣雖共事少時意好不協今日討之於情何有牢之至竹里斬恭大將顏延遣敬宣率高雅之等還京襲恭恭方出城耀軍馳騎橫擊之一時散潰元顯進號後將軍以敬宣為咨議參軍加寧朔將軍三年孫恩為亂東土騷擾牢之自表東討軍次虎體賊皆死戰敬宣請以騎傍南山趣其後吳賊畏馬又懼首尾受敵遂大敗進平會稽尋加臨淮太守遷後軍從事中郎五年孫恩又入浹口高祖戍句章賊頻攻不能拔敬宣請往為援賊恩於是退遠入海是時四方雲擾朝廷微弱敬宣每慮艱難未已高祖既纍破妖賊功名日盛故敬宣深相憑結情好甚隆元顯進號驃騎敬宣仍隨府轉軍郡如故元顯驕淫縱肆羣下化之敬宣每預燕會未嘗飲酒調戲之來無所酬答元顯甚不説尋進號輔國將軍餘如故元興元年牢之南討桓玄元顯為征討大都督日夜昏酣牢之驟詣門不得相見帝出餞行方遇公坐而已桓玄既至溧洲遣信説牢之牢之以道子昏暗元顯淫凶慮平玄之日亂政方始假手於玄誅除執政然後乘玄之隙可以得志於天下將許玄降敬宣諫曰方今國家亂擾四海鼎沸天下之重在大人與玄玄藉先父之基據荊南之勢雖無姬文之德實為參分之形一朝縱之使陵朝廷威望既成則難圖也董卓之變將生於今牢之怒曰吾豈不知今日取玄如反覆手但平玄之後令我那驃騎何遣敬宣為任玄板為其府咨議參軍玄既得志害元顯廢道子以牢之為征東將軍會稽太守牢之與敬宣謀共襲玄期以明旦值爾日大霧府門晚開日旰敬宣不至牢之謂所謀已泄率部曲向白洲欲奔廣陵而敬宣還京口迎家牢之尋求不得謂已為玄所擒乃自縊死敬宣奔喪哭畢即渡江就司馬休之高雅之等俱奔洛陽往來長安各以子弟為質求救於姚興興與之符信令關東募兵得數千人復還至彭城間收聚義故玄遣孫無終討冀州刺史劉軌軌要敬宣雅之等共據山陽破之不剋又進昌平澗戰不利衆各離散乃俱奔鮮卑慕容德敬宣素曉天文知必有興復晉室者尋夢丸土服之既覺喜曰丸者桓也桓既吞矣吾復本土乎乃結青州大姓諸崔封并要鮮卑大帥免逵謀滅德推休之為主剋日垂發時劉軌為德司空大被委任雅之又欲要軌敬宣曰此公年老吾觀其有安齊志必不動不可告也雅之以為不然遂告軌軌果不從謀頗泄相與殺軌而去至淮泗間會高祖平京口手書召敬宣左右疑其詐敬宣曰吾固知其然矣下邳不誘我也即便馳還既至京師以敬宣為輔國將軍晉陵太守襲封武岡縣男是歲安帝元興三年也桓歆率氐賊楊秋寇歷陽敬宣與建威將軍諸葛長民大破之歆單騎走渡淮斬楊秋於練固而還遷建威將軍江州刺史敬宣固辭言於高祖曰讎恥既雪四海清蕩所願反身草澤以終餘年恩遇不遺遂復僶俯即目所忝已為優渥且盤龍無忌猶未遇寵賢二弟位任尚卑一朝先之必貽朝野之責不許敬宣既至江州課集軍糧搜召舟乘軍戎要用常有儲擬故西征諸軍雖失利退據因之每即振復其年桓玄兄子亮自號江州刺史寇豫章亮又遣苻宏寇廬陵敬宣並討破之初劉毅之少也為敬宣寧朔參軍時人或以雄傑許之敬宣曰夫非常之才當別有調度豈得便謂此君為人豪邪其性外寬而內忌自伐而尚人若一旦遭逢亦當以陵上取禍耳毅聞之深以為恨及在江陵知敬宣還乃使人言於高祖曰劉敬宣父子忠國既昧今又不豫義始猛將勞臣方須報如敬宣之比宜令在後若使君不忘平生欲相申起者論資語事正可為員外常侍耳聞已授其郡實為過優尋知復為江州尤所駭惋敬宣愈不自安安帝反正自表解職於是散徹賜給宅宇月給錢三十萬高祖數引與遊宴恩款周洽所賜錢帛車馬及器服玩好莫與比焉尋除冠軍將軍宣城內史襄城太守宣城多山縣郡舊立屯以供府郡費用前人多發調工巧造作器物敬宣到郡悉罷私屯唯伐竹木治府舍而已亡叛多首出遂得三千餘戶高祖方大相寵任欲先令立功義熙三年表遣敬宣率衆五千伐蜀國子博士周祗書諫高祖曰自義旗之建所征無不必克此可謂天人交助信順之徵也今大難已夷君臣俱泰頃五穀轉豐民無飢苦劫盜之患亦為弭息此誠漸足無事宜大寧治本蜀賊宜平六合宜一非為不爾也古人有言天時不如地利地利不如人和今往伐蜀萬有餘里泝流天險動經時歲若此軍直指成都徑禽譙氏者復是將帥奮威一快之舉耳然益土荒殘野無青草成都之內殆無孑遺計得彼利與今行軍之費不足相補也而今往艱險雨雪方降驅三州三吳之人投之三巴三蜀之土其中疾病死亡豈可稱計此一疑也賊必不守窮城將決力戰今我往勞困彼來甚逸若忽使師行不利人情波駭大勢挫衄此二疑也且千里饋糧士有飢色況今泝險萬里所在無儲若連兵不解運漕不繼雖韓白之將何以成功此三疑也今云可征者皆云彼親離衆叛愚謂不然彼以一匹夫而能致今日之事若衆力離散亦何以至此官所遣兵皆烏合受募之人亦必無千人一心有前無退矣為治者固先定其內而理其外先安其近而懷其遠自頃狂狡不息誅戮相繼未可謂人和也天險如彼未可謂地利也毛修之家讎不雪不應以得死為恨劉敬宣蒙生存之恩亦宜性命仰報今將軍欲驅二死之甘心而忘國家之重計愚情竊所未安闕門之外非所宜豫苟其有心不覺披盡不從假敬宣節監征蜀諸軍事郡如故既入峽分遣振武將軍巴東太守溫祚以二千人揚聲外水自率益州刺史鮑陋輔國將軍文處茂龍驤將軍時延祖由墊江而進敬宣率先士卒轉戰而前達遂寧郡之黃虎去成都五百里偽輔國將軍譙道福等悉衆距險相持六十餘日大小十餘戰賊固守不敢出敬宣不得進食糧盡軍中多疾疫死者太半引軍還譙縱送毛璩一門諸喪其妻女文處茂母何并諸士人喪柩浮之中流敬宣皆拯接致歸為有司所奏免官削封三分之一五年高祖伐鮮卑除中軍咨議參軍加冠軍將軍從至臨朐慕容超出軍距戰敬宣與兗州刺史劉藩等奮擊大破之龍驤將軍孟龍符戰沒敬宣并領其衆圍廣固屢獻規略盧循逼京師敬宣分領鮮卑虎班突騎置陳甚整循等望而畏之遷使持節督馬頭淮西諸軍郡事鎮蠻護軍淮南安豐二郡太守梁國內史將軍如故循既走仍從高祖南討轉左衛將軍加散騎常侍敬宣寬厚善待士多伎藝弓馬音律無事不善時尚書僕射謝混自負才地少所交納與敬宣相遇便盡禮著歡或問混曰卿未嘗輕交於人而傾蓋於萬壽何也混曰人之相知豈可以一塗限孔文舉禮太史子義夫豈有非之者邪初敬宣回師於蜀劉毅欲以重法繩之高祖既相任待又何無忌明言於毅謂不宜以私憾傷至公若必文致為戮己當入朝以廷議決之毅雖止猶謂高祖曰夫生平之舊豈可孤信光武悔之於龐萌曹公失之於孟卓公宜深慮之毅出為荊州謂敬宣曰吾忝西任欲屈卿為長史南蠻豈有見輔意乎敬宣懼禍及以告高祖高祖笑曰但令老兄平安必無過慮出為使持節督北青州軍郡事征虜將軍北青州刺史領清河太守尋領冀州刺史時高祖西討劉毅豫州刺史諸葛長民監太尉軍事貽敬宣書曰盤龍狼戾專恣自取夷滅異端將盡世路方夷富貴之事相與共之敬宣報曰下官自義熙以來首尾十載遂忝三州七郡今此杖節常懼福過禍生實思避盈居損富貴之旨非所敢當遣使呈長民書高祖謂王誕曰阿壽故為不負我也十一年正月進號右將軍司馬道賜者晉宗室之賤屬也為敬宣參軍至高祖西征司馬休之道賜乃陰結同府辟閭道秀及左右小將王猛子等謀反道賜自號齊王以道秀為青州刺史規據廣固舉兵應休之敬宣召道秀有所論因屏人左右悉出戶猛子逡巡在後取敬宣備身刀殺敬宣時年四十五文武佐吏即討道賜猛子等皆斬之先是敬宣未死嘗夜與僚佐宴集空中有放一隻芒屩於坐中墜敬宣食槃上長三尺五寸已經人著耳鼻間並欲壞頃之而敗喪至高祖臨哭甚哀子祖嗣宋受禪國除檀祗字恭叔高平金鄉人左將軍韶第二弟也少為孫無終輔國參軍隨無終東征孫恩屢有戰功復為王誕龍驤參軍從高祖克京城參建武軍事至羅落檀憑之戰沒之後仍以憑之所領兵配祗京邑既平參鎮軍事加振武將軍隸振武大將軍道規追討桓玄每戰克捷江陵平定道規遣祗征溳沔亡命桓道兒張靖苻嗣等皆悉平之除龍驤將軍秦郡太守北陳留內史又為寧朔將軍竟陵太守不拜破桓亮於長沙苻宏於湘東武陵內史庾悅疾病道規以祗代悅加寧朔將軍封西昌縣侯食邑千戶五年入為中書侍郎盧循逼京邑加輔國將軍領兵屯西明門外循退走祗率所領步道援江陵未發遇疾停八年遷右衛將軍出為輔國將軍宣城內史即本號督江北淮南軍郡事青州刺史廣陵相進號征虜將軍加節十年亡命司馬國璠兄弟自北徐州界聚衆數百潛得過淮因天夜陰暗率百許人緣廣陵城得入叫喚直上聽事祗驚起出門將處分賊射之傷股乃入祗語左右賊乘暗得入欲掩我不備但打五鼓懼曉必走矣賊聞鼓鳴謂為曉於是奔散追討殺百餘人祗降號建武將軍十一年進號右將軍十二年高祖北伐而亡命司馬寇塗中秦郡太守劉基求救分軍掩討即破斬之十四年宋國初建天子詔曰宋國始立內外草創禁旅王要總司須才右將軍祗可為宋領軍將軍加散騎常侍祗性矜豪樂在外放恣不願內遷甚不得志發疾不自治其年卒廣陵時年五十一贈散騎常侍撫軍將軍諡曰威侯子獻嗣元熙中卒無子祗次子朗紹封朗卒子宣明嗣宣明卒子逸嗣齊受禪國除史臣曰劉敬宣與高祖恩結龍潛義分早合雖興復之始事隔逢迎而深期久要未之或爽隆赫之任義止於人存飾終之數無聞於身後恩禮之有厚薄者將有以乎
