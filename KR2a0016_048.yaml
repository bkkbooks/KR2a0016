body:
  text: 宋書卷四十八列傳第八朱齡石弟超石毛脩之傅弘之朱齡石字伯兒沛郡沛人也家世將帥祖騰建威將軍吳國內史伯父憲及斌並為西中郎袁真將佐憲為梁國內史斌為汝南內史大司馬桓溫伐真於壽陽真以憲兄弟與溫潛通並殺之齡石父綽逃走歸溫攻戰常居先不避矢石壽陽平真已死綽輒發棺戮尸溫怒將斬之溫弟沖苦請得免綽為人忠烈受沖更生之恩事沖如父參沖車騎軍事西陽廣平太守及沖薨綽歐血死沖諸子遇齡石如兄弟齡石少好武事頗輕佻不治崖檢舅淮南蔣氏人才儜劣齡石使舅臥於聽事一頭剪紙方一寸帖著舅枕自以刀子懸擲之相去八九尺百擲百中舅雖危懼戰慄為畏齡石終不敢動舅頭有大瘤齡石伺舅眠密往割之舅即死初為殿中將軍常追隨桓脩兄弟為脩撫軍參軍在京口高祖克京城以為建武參軍從至江乘將戰齡石言於高祖曰世受桓氏厚恩不容以兵刃相向乞在軍後高祖義而許之事定以為鎮軍參軍遷武康令加寧遠將軍喪亂之後武康人姚係祖招聚亡命專為劫盜所居險阻郡縣畏憚不能討齡石至縣偽與係祖親厚召為參軍係祖恃其兄弟徒黨強盛謂齡石必不敢圖己乃出應召齡石潛結腹心知其居處塗徑乃要係祖宴會叱左右斬之乃率吏人馳至其家掩其不備莫有得舉手者悉斬係祖兄弟殺數十人自是一郡得清高祖又召為參軍補徐州主簿遷尚書都官郎尋復為參軍從征鮮卑坐事免官廣固平復為參軍盧循至石頭領中軍循選敢死之士數千人上南岸高祖遣齡石領鮮卑步矟過淮擊之率厲將士皆殊死戰殺數百人賊乃退齡石既有武幹又練吏職高祖甚親委之盧循平以為寧遠將軍寧蠻護軍西陽太守義熙八年高祖西伐劉毅齡石從至江陵九年遣諸軍伐蜀令齡石為元帥以為建威將軍益州刺史率寧朔將軍臧熹河間太守蒯恩下邳太守劉鍾龍驤將軍朱林等凡二萬人發自江陵尋加節益州諸軍事初高祖與齡石密謀進取曰劉敬宣往年出黃虎無功而退賊謂我今應從外水往而料我當出其不意猶從內水來也如此必以重兵守涪城以備內道若向黃虎正陊其計今以大衆自外水取成都疑兵出內水此制敵之奇也而慮此聲先馳賊審虛實別有函書全封付齡石署函邊曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧熹朱林於中水取廣漢使羸弱乘高艦十餘由內水向黃虎衆軍乃倍道兼行譙縱果備內水使其大將譙道福以重兵戍涪城遣其前將軍秦州刺史侯輝尚書僕射蜀郡太守譙詵等率衆萬餘屯彭模夾水為城十年六月齡石至彭模諸將以賊水北城險阻衆多咸欲先攻其南城齡石曰不然雖寇在北今屠南城不足以破北若盡銳以拔北壘南城不麾而自散也七月齡石率劉鍾蒯恩等攻城詰朝戰至日昃焚其樓櫓四面並登斬侯輝譙詵仍回軍以麾南城即時散潰凡斬大將十五級諸營守以次土崩衆軍乃舍船步進龍驤將軍臧熹至廣漢病卒朱林至廣漢復破譙道福別軍乘船陷牛脾城斬其大將譙撫譙縱聞諸處盡敗奔于涪城巴西人王志斬送偽尚書令馬躭封府庫以待王師道福聞彭模不守率精銳五千兼行來赴聞縱已走道福衆亦散乃逃于獠中巴西民杜瑤縛送之斬于軍門桓謙弟恬隨謙入蜀為寧蜀太守至是亦斬焉高祖之伐蜀也將謀元帥而難其人乃舉齡石衆咸謂自古平蜀皆雄傑重將齡石資名尚輕慮不克辦諫者甚衆高祖不從乃分大軍之半猛將勁卒悉以配之臧熹敬皇后弟也資位在齡石之右亦令受其節度是行亦不淹時一戰克捷衆咸服高祖之知人又美齡石之善於其事齡石遣司馬沈叔任戍涪蜀人侯產德作亂攻涪城叔任擊破之斬產德初齡石平蜀所戮止縱一祖之後產德事起多所連結乃窮加誅剪死者甚衆進號輔國將軍尋進監梁州之巴西梓潼宕渠南漢中秦州之安固懷寧六郡諸軍事以平蜀功封豐城縣侯食邑千戶十一年徵為太尉諮議參軍加冠軍將軍十二年北伐遷左將軍本號如故配以兵力守衞殿省劉穆之甚加信仗內外諸事皆與謀焉高祖還彭城以齡石為相國右司馬十四年安西將軍桂陽公義真被徵以齡石持節督關中諸軍事右將軍雍州刺史敕齡石若關右必不可守可與義真俱歸齡石亦舉城奔走龍驤將軍王敬先戍曹公壘齡石自潼關率餘衆就敬先虜斷其水道衆渴不能戰城陷虜執齡石及敬先還長安見殺時年四十子景符嗣景符卒子祖宣嗣坐輒之封八年不反及不分姑國秩奪爵更以祖宣弟隆紹封齊受禪國除齡石弟超石亦果銳善騎乘雖出自將家兄弟並閑尺牘桓謙為衞將軍以補行參軍又參何無忌輔國右軍軍事徐道覆破無忌得超石以為參軍至石頭超石說其同舟人乘單舸走歸高祖高祖甚喜之以為徐州主簿超石收迎桓謙身首躬營殯葬遷車騎參軍事尚書都官郎尋復補中兵參軍寧朔將軍沛郡太守西伐劉毅使超石率步騎出江陵未至而毅平及討司馬休之遣冠軍將軍檀道濟及超石步軍出大薄魯宗之聞超石且至自率軍逆之未戰而江陵平從至襄陽領新野太守追宗之至南陽而還義熙十二年北伐超石為前鋒入河索虜托跋嗣姚興之壻也遣弟黃門郎青冀州刺史安平公乙旃眷襄州刺史托跋道生青州刺史阿薄干步騎十萬屯河北常有數千騎緣河隨大軍進止時軍人緣河南岸牽百丈河流迅急有漂渡北岸者輒為虜所殺略遣軍裁過岸虜便退走軍還即復東來高祖乃遣白直隊主丁旿率七百人及車百乘於河北岸上去水百餘步為却月陣兩頭抱河車置七仗士事畢使竪一白毦虜見數百人步牽車上不解其意並未動高祖先命超石戒嚴二千人白毦既舉超石馳往赴之并齎大弩百張一車益二十人設彭排於轅上虜見營陣既立乃進圍營超石先以軟弓小箭射虜虜以衆少兵弱四面俱至嗣又遣南平公托跋嵩三萬騎至遂肉薄攻營於是百弩俱發又選善射者叢箭射之虜衆既多弩不能制超石初行別齎大鎚并千餘張矟乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四虜虜衆不能當一時奔潰臨陣斬阿薄干首虜退還半城超石率胡藩劉榮祖等追之復為虜所圍奮擊盡日殺虜千計虜乃退走高祖又遣振武將軍徐猗之五千人向越騎城虜圍猗之以長戟結陣超石赴之未至悉奔走大軍進克蒲坂以超石為河東太守戍守之賊以超石衆少復還攻城超石戰敗退走數日乃及大軍高祖自長安東還超石常令人水道至彭城除中書侍郎封興平縣五等侯關中擾亂高祖遣超石慰勞河洛始至蒲坂值齡石自長安東走至曹公壘超石濟河就之與齡石俱沒為佛佛所殺時年三十七毛脩之字敬文滎陽陽武人也祖虎生伯父璩並益州刺史父瑾梁秦二州刺史脩之有大志頗讀史籍荊州刺史殷仲堪以為寧遠參軍桓玄克荊州仍為玄佐歷後軍太尉相國參軍解音律能騎射玄甚遇之及篡位以為屯騎校尉隨玄西奔玄敗於崢嶸洲復還江陵人情離散議欲西奔漢川脩之誘令入蜀馮遷斬玄於枚回洲脩之力也晉安帝反正於江陵除驍騎將軍下至京師高祖以為鎮軍諮議參軍加寧朔將軍旬月遷右衞將軍既有斬玄之謀又伯父並在蜀土高祖欲引為外助故頻加榮爵及父瑾為譙縱所殺高祖表為龍驤將軍配給兵力遣令奔赴又遣益州刺史司馬榮期及文處茂時延祖等西討脩之至宕渠榮期為參軍楊承祖所殺承祖自稱鎮軍將軍巴州刺史脩之退還白帝承祖自下攻之不拔脩之使參軍嚴綱等收合兵衆漢嘉太守馮遷率兵來會討承祖斬之時文處茂猶在巴郡脩之遣振武將軍張季仁五百兵係處茂等荊州刺史道規又遣奮武將軍原導之領千人受脩之節度脩之遣原導之與季仁俱進時益州刺史鮑陋不肯進討脩之下都上表曰臣聞在生所以重生實有生理可保臣之情地生途已竭所以未淪於泉壤借命於朝露者以日月貞照有兼映之輝庶憑天威誅夷讎逆自提戈西赴備嘗時難遂使齊斧停柯狡豎假息誠由經路有暨亦緣制不自己撫影窮號泣望西路益州刺史陋始以四月二十九日達巴東頓白帝以俟廟略可乘之機宜踐投袂之會屢愆臣雖効死寇庭而理絕救援是以束骸載馳訴寃象魏昔宋害申丹楚莊有遺履之憤況忘家殉國尠有臣門節冠風霜人所矜悼伍員不虧君義而申包不忘國艱俟會佇鋒因時乃發今臣庸踰在昔未蒙宵邁之旗是以仰辰極以希照眷西土以灑淚也公私懷恥仰望洪恩豈宜遂享名器比肩人伍求情既所不容即實又非所繼但以方仗威靈要須綜攝乞解金紫寵私之榮賜以鷹揚折衝之號臣之於國理無虛請自臣涉道情慮荒越疹毒交纏常慮性命隕越要當躬先士卒身馳賊庭手斬凶醜以攄莫大之釁然後就死之日即化如歸闔門靈爽豈不謝先帝於玄宮高祖哀其情事乃命冠軍將軍劉敬宣率文處茂時延祖諸軍伐蜀軍次黃虎無功而退譙縱由此送脩之父伯及中表喪口累並得俱還盧循逼京邑脩之服未除起為輔國將軍尋加宣城內史戍姑孰為循黨阮賜所攻擊破之循走劉毅還姑孰脩之領毅後軍司馬坐長置吏僮免將軍內史官毅西鎮江陵以為衞軍司馬輔國將軍南郡太守脩之雖為毅將佐而深自結高祖高祖討毅先遣王鎮惡襲江陵脩之與諮議參軍任集之等並力戰高祖宥之時遣朱齡石伐蜀脩之固求行高祖慮脩之至蜀必多所誅殘土人既與毛氏有嫌亦當以死自固故不許還都除黃門侍郎復為右衞將軍脩之不信鬼神所至必焚除房廟時蔣山廟中有佳牛好馬脩之並奪取之高祖討司馬休之以為諮議參軍冠軍將軍領南郡相高祖將伐羌先遣脩之復芍陂起田數千頃及至彭城又使營立府舍轉相國右司馬將軍如故時洛陽已平即本號為河南河內二郡太守行司州事戍洛陽修治城壘高祖既至案行善之賜衣服玩好當時計直二千萬先是劉敬宣女嫁高祖賜錢三百萬雜綵千匹時人並以為厚賜王鎮惡死脩之代為安西司馬將軍如故值桂陽公義真已發長安為佛佛虜所邀軍敗脩之與義真相失走將免矣始登一岅岅甚高峻右衞軍人叛走已上岅嘗為脩之所罰者以戟擲之傷額因墜岅遂為佛佛所擒佛佛死其子赫連昌為索虜托跋燾所獲脩之并沒初脩之在洛敬事嵩高山寇道士道士為燾所信敬營護之故得不死遷于平城脩之嘗為羊羹以薦虜尚書尚書以為絕味獻之於燾燾大喜以脩之為太官令稍被親寵遂為尚書光祿大夫南郡公太官令尚書如故其後朱脩之沒虜亦為燾所寵脩之相得甚歡脩之問南國當權者為誰朱脩之答云殷景仁脩之笑曰吾昔在南殷尚幼少我得歸罪之日便應巾韝到門邪經年不忍問家消息久之乃訊訪脩之具答并云賢子元矯甚能自處為時人所稱脩之悲不得言直視良久乃長歎曰嗚呼自此一不復及初荒人去來言脩之勸誘燾侵邊并教燾以中國禮制太祖甚疑責之脩之後得還具相申理上意乃釋脩之在虜中多畜妻妾男女甚多元嘉二十三年死於虜中時年七十二元矯歷宛陵江乘溧陽令傅弘之字仲度北地泥陽人傅氏舊屬靈州漢末郡境為虜所侵失土寄寓馮翊置泥陽富平二縣靈州廢不立故傅氏悉屬泥陽晉武帝太康三年復立靈州縣傅氏還屬靈州弘之高祖晉司徒祗後封靈州公不欲封本縣故祗一門還復泥陽曾祖暢祕書丞沒胡生子洪晉穆帝永和中胡亂得還洪生韶梁州刺史散騎常侍韶生弘之少倜儻有大志為本州主簿舉秀才不行桓玄將篡新野人庾仄起兵於南陽襲雍州刺史馮該該走弘之時在江陵與仄兄子彬謀殺荊州刺史桓石康以荊州刺史應仄彬從弟宏知其謀以告石康石康收彬殺之繫弘之於獄桓玄以弘之非造謀又白衣無兵衆原不罪義旗建輔國將軍道規以為參軍寧遠將軍魏興太守盧循作亂桓石綏自上洛甲口自號荊州刺史徵陽令王天恩自號梁州刺史襲西城時韶為梁州遣弘之討石綏等並斬之除太尉行參軍從征司馬休之署後部賊曹仍為建威將軍順陽太守高祖北伐弘之與扶風太守沈田子等七軍自武關入偽上洛太守脫身奔走進據藍田招懷戎晉晉人龐斌之戴養胡人康橫等各率部落歸化弘之素善騎乘高祖至長安弘之於姚泓馳道內緩服戲馬或馳或驟往反二十里中甚有姿制羌胡聚觀者數千人並驚惋歎息初上馬以馬鞭柄策挽致兩股內及下馬柄孔猶存進為桂陽公義真雍州治中從事史除西戎司馬寧朔將軍略陽太守徐師高反叛弘之討平之高祖歸後佛佛偽太子赫連瓌率衆三萬襲長安弘之又領步騎五千於池陽大破之殺傷甚衆瓌又抄掠渭南弘之又於寡婦人渡破瓌獲賊三百掠七千餘口及義真東歸佛佛傾國追躡於青泥大戰弘之身貫甲冑氣冠三軍軍敗陷沒佛佛逼令降弘之不為屈時天寒裸弘之弘之叫罵見殺時年四十二史臣曰三代之隆畿服有品東漸西被無遺遐荒及漢氏闢土通譯四方風教淺深優劣已遠晉室播遷來宅揚越關朔遙阻隴汧遐荒區甸分其內外山河判其表𩹉而羌戎雜合久絕聲教固宜待以荒服羈縻而已也若其懷道畏威奉王受職則通以書軌班以王規若負其岨遠屈強邊垂則距險閉關禦其寇暴桓溫一世英人志移晉鼎自非兵屈霸上戰衂枋頭則光宅之運中年允集高祖無周世累仁之基欲力征以君四海實須外積武功以收天下人望止欲挂斾龍門折衝冀趙跨功桓氏取高昔人地未闢於東晉威獨振於江南然後可以變國情愜民志撫歸運而膺寶策豈不知秦川不足供養百二難以傳後哉至舉咸陽而棄之非失算也此四將藉歸衆難固之情已至於俱陷為不幸矣
