body:
  text: 宋書卷四十九列傳第九孫處蒯恩劉鍾虞丘進孫處字季高會稽永興人也籍注季高故字行於世少任氣高祖東征孫恩季高義樂隨高祖平定京邑以為振武將軍封新夷縣五等侯廣固之役先登有功盧循之難於石頭扞柵戍越城查浦破賊於新亭高祖謂季高曰此賊行破應先傾其巢窟令奔走之日無所歸投非卿莫能濟事遣季高率衆三千泛海襲番禺初賊不以海道為防季高至東衝去城十餘里城內猶未知循守戰士猶有數千人城池甚固季高先焚舟艦悉力登岸會天大霧四面陵城即日克拔循父嘏長史孫建之司馬虞夫等輕舟奔始興即分遣振武將軍沈田子等討平始興南康臨賀始安嶺表諸郡循於左里奔走而衆力猶盛自嶺道還襲廣州季高距戰二十餘日循乃破走所殺萬餘人追奔至鬱林會病不得窮討循遂得走向交州義熙七年四月季高卒於晉康時年五十三追贈龍驤將軍南海太守封候官縣侯食邑千戶九年高祖念季高之功乃表曰孫季高嶺南之勳已蒙褒贈臣更思惟盧循稔惡一紀據有全域若令根本未拔投奔有所招合餘燼猶能為虞縣師遠討方勤廟算而季高泛海萬里投命洪流波激電邁指日遄至遂奄定南海覆其巢窟使循進退靡依輕舟遠迸曾不旬月妖凶殲殄蕩滌之功實庸為大往年所贈猶為未優愚謂宜更贈一州即其本號庶令忠勳不湮勞臣增厲重贈交州刺史將軍如故子宗世卒子欽公嗣欽公卒子彥祖嗣齊受禪國除蒯恩字道恩蘭陵承人也高祖征孫恩縣差為征民充乙士使伐馬芻恩常負大束兼倍餘人每捨芻於地歎曰大丈夫彎弓三石奈何充馬士高祖聞之即給器仗恩大喜自征妖賊常為先登多斬首級既習戰陳膽力過人誠心忠謹未嘗有過失甚見愛信於婁縣戰箭中左目從平京城進定京邑以寧遠將軍領幢隨振武將軍道規西討虜桓仙客克偃月壘遂平江陵義熙二年賊張堅據應城反恩擊破之封都鄉侯從伐廣固又有戰功盧循逼京邑恩戰于查浦賊退走與王仲德等追破循別將范崇民於南陵循既走還廣州恩又領千餘人隨劉藩追徐道覆於始興斬之遷龍驤將軍蘭陵太守高祖西征劉毅恩與王鎮惡輕軍襲江陵事在鎮惡傳以本官為太尉長兼行參軍領衆二千隨益州刺史朱齡石伐蜀至彭模恩所領居前大戰自朝至日昃勇氣益奮賊破走進平成都擢為行參軍改封北至縣五等男高祖伐司馬休之及魯宗之恩與建威將軍徐逵之前進逵之敗沒恩陳于隄下宗之子軌乘勝擊恩矢下如雨呼聲震地恩整厲將士置陳堅嚴軌屢衝之不動知不可攻乃退高祖善其能將軍持重江陵平定復追魯軌於石城軌棄城走恩追至襄陽宗之奔羌恩與諸將追討至魯陽關乃還恩自從征討每有危急輒率先諸將常陷堅破陳不避艱嶮凡百餘戰身被重創高祖録其前後功勞封新寧縣男食邑五百戶高祖世子為征虜將軍恩以大府佐領中兵參軍隨府轉中兵參軍高祖北伐留恩侍衛世子命朝士與之交恩益自謙損與人語常呼官位而自稱為鄙人撫待士卒甚有紀綱衆咸親附之遷咨議參軍轉輔國將軍淮陵太守世子開府又為從事中郎轉司馬將軍太守如故入關迎桂陽公義真義真還至青碸為佛佛虜所追恩斷後力戰連日義真前軍奔散恩軍人亦盡為虜所執死於虜中子國才嗣國才卒子慧度嗣慧度卒無子國除劉鍾字世之彭城彭城人也少孤依鄉人中山太守劉回共居幼有志力常慷慨於貧賤隆安四年高祖伐孫恩鍾願從餘姚浹口攻句章海鹽婁縣皆摧堅陷陳每有戰功為劉牢之鎮北參軍督護高祖每有戎事鍾不辭艱劇專心盡力甚見愛信義旗將建高祖版鍾為郡主簿明日從入京城將向京邑高祖命曰預是彭沛鄉人赴義者並可依劉主簿於是立為義隊在左右連戰皆捷明日桓謙屯于東陵卞範之屯覆舟山西高祖疑賊有伏兵顧視左右正見鍾謂之曰此山下當有伏兵卿可率部下稍往撲之鍾應聲馳進果有伏兵數百一時奔走桓玄西奔其夕高祖止桓謙故營遣鍾宿據東府轉鎮軍參軍督護桓歆寇歷陽遣鍾助豫州刺史魏詠之討之歆即奔迸除南齊國內史封安丘縣五等侯自陳情事改葬父祖及親屬十喪高祖厚加資給轉車騎長史兼行參軍司馬叔璠與彭城劉謐劉懷玉等自蕃城攻鄒山魯郡太守徐雍失守鍾率軍討平之從征廣固孟龍符陷沒鍾率左右直入取其尸而反除振武將軍中兵參軍代龍符領廣川太守盧循逼京邑徐赤特軍違處分敗于南岸鍾率麾下距柵身被重創賊不得入循南走鍾與輔國將軍王仲德追之循先留別帥范崇民以精兵高艦據南陵夾屯兩岸鍾自行覘賊天霧賊鉤得其舸鍾因率左右攻艦戶賊遽閉戶距之鍾乃徐還與仲德攻崇民崇民敗走鍾追討百里燒其船乘又隨劉藩追徐道覆於始興斬之補太尉行參軍寧朔將軍下邳太守代孟懷玉領石頭戍事高祖討劉毅鍾率軍繼王鎮惡江陵平定仍隨朱齡石伐蜀為前鋒由外水至于彭模去成都二百里偽冠軍征討督護譙亢等兩岸連營層樓重柵衆號三萬鍾于時腳疾不能行齡石乃詣鍾謀曰今天時盛熱而賊嚴兵固險攻之未必可拔祇增疲困計其人情恇撓必不久安且欲養鋭息兵以伺其隙隙而乘之乃可捷事然決機兩陳公本有所委卿意謂何鍾曰不然前揚聲言大衆向內水譙道福不敢舍涪城今重軍卒至出其不意蜀人已破膽矣賊今阻兵守險是其懼不敢戰非能持久堅守也因其凶懼盡鋭攻之其勢必克鼓行而進成都必不能守矣今若緩兵相守彼將知人虛實涪軍忽并來力距我人情既安良將又集此求戰不獲軍食無資當為蜀子虜耳齡石從之明日進攻陷其二城斬其大將侯輝譙詵徑平成都以廣固功封永新縣男食邑五百戶遷給事中太尉參軍事龍驤將軍高陽內史領石頭戍事高祖討司馬休之前軍將軍道憐留鎮東府領屯兵冶亭羣盜數百夜襲鍾壘距擊破之時大軍外討京邑擾懼鍾以不能鎮遏降號建威將軍平蜀功應封四百戶男以先有封爵減戶以賜次子敬順高昌縣男食邑百戶尋復本號龍驤將軍十二年高祖北伐復留鎮居守增其兵力又命府置佐史荊州刺史道憐獻名馬三匹并精麗乘具高祖悉以賜鍾三子十四年遷右衛將軍龍驤將軍如故元熙元年卒時年四十三子敬義嗣敬義官至馬頭太守卒子國重嗣齊受禪國除鍾次子高昌男敬順卒子國須嗣須卒無子國除虞丘進字豫之東海郯人也少時隨謝玄討苻堅有功封關內侯隆安中從高祖征孫恩戍句章城被圍數十日無日不戰身被數創至餘姚呵浦破賊張驃追至海鹽故治及婁縣於蒲濤口與孫恩水戰又被重創追恩至鬱洲又至石鹿頭還海鹽大柱頻戰有功元興元年又從高祖東征臨海於石步固與盧循相守二十餘日二年又從高祖至東陽破徐道覆其年又至臨松穴破賊追至永嘉千江又至安固纍戰皆有功三年從平京城定京邑除燕國內史義熙二年除龍驤將軍封龍川縣五等侯從高祖伐廣固於臨朐破賊盧循逼京邑孟昶諸葛長民等建議奉天子過江進廷議不可面折昶等高祖甚嘉之獻計伐樹樹柵石頭除鄱陽太守將軍如故統馬步十八隊於東道出鄱陽至五畝嶠循遣將英紏為上饒令千餘人守故城進攻破之循又遣童敏之為鄱陽太守據郡進從餘干步道趣鄱陽敏之退走追破之斬首數百復隨劉藩至始興討斬徐道覆八年除寧蠻護軍尋陽太守領文武二千從征劉毅事平補太尉行參軍尋加振威將軍九年以前後功封望蔡縣男食邑五百戶加龍驤將軍討司馬休之又有戰功軍還除輔國將軍山陽太守宋臺令書除秦郡太守督陳留郡事將軍如故元熙二年宋王令書以為高祖第四子義康右將軍司馬永初二年遷太子右衛率明年卒官時年六十追論討司馬休之功進爵為子增邑三百戶子耕嗣耕卒子襲祖嗣襲祖卒世寶嗣齊受禪國除史臣曰詩云無言不酬無德不報此諸將並起自豎夫出於皂隸芻牧之下徒以心一乎主故能奮其鱗翼至於推鋒轉戰百死而不顧一生蓋由其心一也遂饗封侯之報詩人之言信矣
