body:
  text: 宋書卷五十一列傳第十一宗室長沙景王道憐臨川烈武王道規營浦侯遵考長沙景王道憐高祖中弟也初為國子學生謝琰為徐州命為從事史高祖克京城進平京邑道憐常留家侍慰太后桓玄走大將軍武陵王遵承制除員外散騎侍郎尋遷建威將軍南彭城內史時北青州刺史劉該反引索虜為援清河陽平二郡太守孫全聚衆應之義熙元年索虜托跋開遣僞豫州刺史索度真大將軍斛斯蘭寇徐州攻相縣執巨鹿太守賀申進圍寧朔將軍羊穆之於彭城穆之告急道憐率衆救之軍次陵柵斬全進至彭城真蘭退走道憐率寧遠將軍孟龍符龍驤將軍孔隆及穆之等追真蘭走奔相城又追躡至光水溝斬劉該虜衆見殺及赴水死略盡高祖鎮京口進道憐號龍驤將軍又領堂邑太守戍石頭明年加使持節監征蜀諸軍事率冠軍將軍劉敬宣等伐譙縱而文處茂溫祚據險不得進故不果行以義勳封新興縣五等侯四年代諸葛長民為并州刺史義昌太守將軍內史如故猶戍石頭時鮮卑侵逼自彭城以南民皆保聚山陽淮陰諸戍並不復立道憐請據彭城以漸修創朝議以彭城縣遠使鎮山陽進號征虜將軍督淮北軍郡事北東海太守并州刺史義昌太守如故以破索度真功封新渝縣男食邑五百戶從高祖征廣固常為軍鋒及城陷慕容超將親兵突圍走道憐所部獲之加使持節進號左將軍七年解并州加北徐州刺史移鎮彭城八年高祖伐劉毅徵為都督兗青二州晉陵京口淮南諸郡軍事兗青州刺史持節將軍太守如故還鎮京口九年甲仗五十人入殿以廣固功改封竟陵縣公食邑千戶減先封戶邑之半以賜次子義宗十年進號中軍將軍加散騎常侍給鼓吹一部明年討司馬休之道憐監留府事甲仗百人入殿江陵平以為都督荊湘益秦寧梁雍七州諸軍事驃騎將軍開府儀同三司領護南蠻校尉荊州刺史持節常侍如故北府文武悉配之道憐素無才能言音甚楚舉止施為多諸鄙拙高祖雖遣將軍佐輔之而貪縱過甚畜聚財貨常若不足去鎮之日府庫為之空虛高祖平定三秦方思外略徵道憐還為侍中都督徐兗青三州揚州之晉陵諸軍事守尚書令徐兗二州刺史持節將軍如故元熙元年解尚書令進位司空出鎮京口高祖受命進位太尉封長沙王食邑五千戶持節侍中都督刺史如故永初二年朝正入住殿省先是廬陵王義真為揚州刺史太后謂上曰道憐汝布衣兄弟故宜為揚州上曰寄奴於道憐豈有所惜揚州根本所寄事務至多非道憐所了太后曰道憐年出五十豈當不如汝十歲兒邪上曰車士雖為刺史事無大小悉由寄奴道憐年長不親其事於聽望不足太后乃無言車士義真小字也三年春高祖不豫加班劍三十人時道憐入朝留司馬陸仲元居守刁逵子彌為亡命率數十人入京城仲元擊斬之先是府史陳告彌有異謀至是賜錢二十萬除縣令五月宮車晏駕道憐疾患不堪臨喪六月薨年五十五追贈太傅持節侍中都督刺史如故祭禮依晉太宰安平王故事鸞輅九旒黃屋左纛轀輬挽歌二部前後部羽葆鼓吹虎賁班劍百人太祖元嘉九年詔曰古者明王經國司勳有典平章以馭德刑班瑞以疇功烈銘徽庸於鼎彝配祫祀於清廟是以從饗先王義存商誥祭於大蒸禮著周典自漢迄晉世崇其文王猷既昭幽顯咸秩先皇經緯天地撥亂受終駿命爰集光宅區宇雖聖明淵運三靈允協抑亦股肱翼亮之勤祈父宣力之效故使持節侍中都督南徐兗二州揚州之晉陵京口諸軍事太傅南徐兗二州刺史長沙景王故侍中大司馬臨川烈武王故司徒南康文宣公穆之侍中衛將軍開府儀同三司録尚書事揚州刺史華容縣開國公弘使持節散騎常侍都督江州豫州西陽新蔡晉熙四郡軍事征南大將軍開府儀同三司江州刺史永修縣開國公道濟故左將軍青州刺史龍陽縣開國侯鎮惡或履道廣流秉德沖邈或雅量高劭風鑒明遠或識唯知正才略開邁咸文德以熙帝載武功以隆景業固以侔蹤姬旦方伊邵者矣朕以寡德纂戎鴻緒每惟道勳思遵令典而大常未銘從祀尚闕鑒寐欽屬永言深懷便宜敬是前式憲茲嘉禮勒功天府配祭廟庭俾示徽章垂美長世茂績遠猷永傳不朽道憐六子義欣義慶義融義宗義賓義綦義欣嗣為員外散騎侍郎不拜歷中領軍征虜將軍青州刺史魏郡太守將軍如故戍石頭元嘉元年進號後將軍加散騎常侍三年以本號為南兗州刺史七年到彥之率大衆入河義欣進彭城為衆軍聲援彥之退敗青齊搔擾將佐慮寇大至勸義欣委鎮還都義欣堅志不動遷使持節監豫司雍并四州諸軍事豫州刺史將軍如故給鼓吹一部鎮壽陽于時土境荒毀人民雕散城郭頽敗盜賊公行義欣綱維補緝隨宜經理劫盜所經立討誅之制境內畏服道不拾遺城府庫藏並皆完實遂為盛藩強鎮時淮西江北長吏悉勞人武夫多無政術義欣陳之曰江淮左右土瘠民疏頃年以來荐饑相襲百城雕弊於今為甚綏牧之宜必俟良吏勞人武夫不經政術統內官長多非才授東南殷實猶或簡能況賓接荒垂而可輯柔頓闕願勑選部必使任得其人庶得不勞而治芍陂良田萬餘頃堤堨久壞秋夏常苦旱義欣遣咨議參軍殷肅循行修理有舊溝引卑水入陂不治積久樹木榛塞肅伐木開榛水得通注旱患由是得除十年進號鎮軍將軍進監為都督十一年夏入朝太祖厚加恩禮十六年薨時年三十六追贈散騎常侍征西將軍開府儀同三司持節都督刺史如故諡曰成王子悼王瑾字彥瑜官至太子屯騎校尉三十年為元凶所殺世祖即位追贈散騎常侍子粲早夭粲弟纂字元績嗣官至步兵校尉順帝升明三年薨會齊受禪國除瑾弟祗字彥期大明中為中書郎太宰江夏王義恭領中書監服親不得相臨表求解職世祖詔曰昔二王兩謝俱至崇禮自今三臺五省悉同此例太宗初為南兗州刺史都官尚書謀應晉安王子勛為逆伏誅祗弟楷祕書郎為元凶所殺追贈通直郎楷弟瞻晉安太守與子勛同逆伏誅瞻弟韞字彥文步兵校尉宣城太守子勛為亂大衆屯據鵲尾攻逼宣城于時四方牧守莫不同逆唯韞棄郡赴朝廷太宗嘉其誠以為黃門郎太子中庶子侍中加荊湘州南兗州刺史吳興太守侍中領左軍將軍又改領驍騎將軍撫軍將軍雍州刺史侍中領右衛將軍改領左衛將軍散騎常侍中領軍升明元年謀反伏誅韞人才凡鄙以有宣城之勳特為太宗所寵在湘州及雍州使善畫者圖其出行鹵簿羽儀常自披玩嘗以此圖示征西將軍蔡興宗興宗戲之陽若不解畫者指韞形像問曰此何人而在輿上韞曰此正是我其庸鄙如此韞弟弼武昌太守亦與子勛同逆伏誅弟鑒員外散騎侍郎蚤卒鑑弟協字彥和侍中吳興太守後廢帝元徽元年卒協弟皓字彥明侍中左衛將軍冠軍將軍吳興太守未拜元徽四年卒追贈右將軍皓弟述東陽太守黃門郎與從弟秉同逆事敗走白山追禽伏誅義欣弟義慶出繼臨川烈武王道規義慶弟義融永初元年封桂陽縣侯食邑千戶凡王子為侯者食邑皆千戶義融歷侍中左衛將軍領太子中庶子五兵尚書領軍有質幹善於用短楯元嘉十八年卒追贈車騎將軍諡曰恭侯子孝侯覬嗣官至太子翊軍校尉為元凶所殺世祖即位追贈散騎常侍無子弟襲以子晃繼封升明二年與員外散騎侍郎安成戢仁祖荒人王武連羽林副彭元俊等謀反國除襲字茂德太子舍人安成太守晉安王子勛為逆襲據郡距之子勛遣軍攻圍不能下太宗嘉之以為郢州刺史封建陵縣侯食邑五百戶建陵縣屬蒼梧郡以道遠改封臨澧縣侯泰始六年卒於中護軍追贈護軍將軍加散騎常侍諡曰忠侯襲亦庸鄙在郢州暑月露草王上聽事綱紀正伏閣怪之訪問乃知是襲子旻嗣升明二年改封東昌縣侯與兄晃俱伏誅襲弟彪祕書郎弟實太子舍人並蚤卒實弟爽海陵太守義融弟義宗幼為高祖所愛字曰伯奴賜爵新渝縣男永初元年進爵為侯歷黃門侍郎太子左衛率元嘉八年坐門生杜德靈放橫打人還第內藏義宗隱蔽之免官德靈雅有姿色為義宗所愛寵本會稽郡吏謝方明為郡方明子惠連愛幸之為之賦詩十餘首乘流遵歸渚篇是也又為侍中太子詹事加散騎常侍征虜將軍南兗州刺史二十一年卒追贈散騎常侍平北將軍諡曰惠侯愛士樂施兼好文籍世以此稱之子懷侯玠嗣琅邪秦郡太守為元凶所殺追贈散騎常侍無子弟秉以子承繼封秉字彥節初為著作郎歷羽林監越騎校尉中書黃門侍郎太宗泰始初為侍中頻徙左衛將軍丹陽尹太子詹事吏部尚書時宗室雖多材能甚寡秉少自砥束甚得朝野之譽故為太宗所委五年出為前將軍淮南宣城二郡太守不拜還復本任復為侍中守祕書監領太子詹事未拜遷使持節都督南徐徐兗豫青冀六州諸軍事後將軍南徐州刺史加散騎常侍後廢帝即位改都督郢州豫州之西陽司州之義陽二郡諸軍事郢州刺史持節常侍如故未拜留為尚書左僕射參選元徽元年領吏部加兵五百人尋領衛尉辭不拜桂陽王休範為逆中領軍劉勔出守石頭秉權兼領軍將軍所給加兵自隨入殿二年加散騎常侍丹陽尹解吏部封當陽縣侯食邑千戶與齊王袁粲褚淵分日入直決機事四年遷中書令加撫軍將軍常侍尹如故順帝即位轉尚書令中領軍將軍如故時齊王輔政四海屬心秉知鼎命有在密懷異圖袁粲鎮石頭不識天命沈攸之舉兵反齊王入屯朝堂粲潛與秉及諸大將黃回等謀欲作亂本期夜會石頭旦乃舉兵秉素恇怯騷動擾不自安再餔後便自丹陽郡車載婦女盡室奔石頭部曲數百赫奕滿道既至見粲粲驚曰何遽便來事今敗矣秉曰今得見公萬死亦何恨從弟中領軍韞直在省內與直閣將軍卜伯興謀其夜共攻齊王會秉去事覺齊王夜使驍騎將軍王敬則收韞韞已戒嚴敬則率壯士直前韞左右皆披靡因殺之伯興亦伏誅粲敗秉踰城出走於檐湖見擒與二子承俁並死秉時年四十五秉妻蕭氏思話女也元徽中朝廷危殆妻常懼禍敗每謂秉曰君富貴已足故應為兒子作計年垂五十殘生何足吝邪秉不能從秉弟謨奉朝請謨弟遐字彥道亦奉朝請員外散騎侍郎與嫡母殷養女雲敷私通殷每禁之殷暴病卒未大殮口鼻流血疑遐潛加毒害為有司所糾世祖徙之始安郡永光中得還太宗世歷黃門侍郎都官尚書吳郡太守兄秉既死齊王遣誅之遐人才甚凡自諱名常對賓客曰孝武無道枉我殺母其頑騃若此秉當權遐纍求方伯秉曰我在用汝作州於聽望不足遐曰富貴時則云不可相關從坐之日為得免不至是果死焉義宗弟義賓元嘉二年封新野縣侯六年以新野荒敝改封興安縣侯黃門郎祕書監左衛將軍位至輔國將軍徐州刺史二十五年卒追贈後將軍諡曰肅侯子惠侯綜嗣卒子憲嗣升明三年齊受禪國除綜弟琨晉平太守義賓弟義綦元嘉六年封營道縣侯凡鄙無識知每為始興王濬兄弟所戲弄濬嘗謂義綦曰陸士衡詩云營道無烈心其何意苦阿父如此義綦曰下官初不識何忽見苦其庸塞可笑類若此歷右衛將軍湘州刺史孝建二年卒贈平南將軍諡曰僖侯子長猷嗣官至步兵校尉升平三年卒齊受禪國除臨川烈武王道規字道則高祖少弟也少倜儻有大志高祖奇之與謀誅桓玄時桓弘鎮廣陵以為征虜中兵參軍高祖克京城道規亦以其日與劉毅孟昶共斬弘收衆濟江進平京邑玄敗走晉大將軍武陵王遵承制以道規為振武將軍義昌太守與劉毅何無忌追玄玄西走江陵留郭銓何淡之等固守盆口義軍既至賊列艦距之淡之空設羽儀旗幟於一舫而別在它船無忌欲攻羽儀所在衆悉不同曰淡之必不在此舫雖得無益也無忌曰淡之不在此舫固不須言也既不在此則戰士必弱我以徑兵攻之必可禽也禽之之日彼必以為失其軍主我徒咸謂已得賊帥我勇而彼懼懼而薄之破之必矣道規喜曰此名計也因往彼攻之即禽此舫因鼓譟倡曰已斬何淡之賊徒及義軍並以為然因縱兵賊衆奔敗即克盆口進平尋陽因復馳進遇玄於崢嶸洲道規等兵不滿萬人而玄戰士數萬衆並憚之欲退還尋陽道規曰不可彼衆我寡強弱異勢今若畏懦不進必為所乘雖至尋陽豈能自固玄雖竊名雄豪內實恇怯加已經奔敗衆無固心決機兩陳將雄者克昔光武昆陽之戰曹操官渡之師皆以少制多共所聞也今雖才謝古人豈可先為之弱因麾衆而進毅等從之大破玄軍郭銓與玄單舸走江陵不復能守欲入蜀為馮遷所斬義軍遇風不進桓謙桓振復據江陵毅留巴陵道規與無忌俱進攻桓謐於馬頭桓蔚於寵洲皆破之無忌欲乘勝直造江陵道規曰兵法屈申有時不可苟進諸桓世居西楚羣小皆為竭力振勇冠三軍難與爭勝且可頓兵養鋭徐以計策縻之不憂不克也無忌不從果為振所敗乃退還尋陽繕治舟甲復進軍夏口僞鎮軍將軍馮該戍夏口東岸揚武將軍孟山圖據魯山城輔國將軍桓仙客守偃月壘於是毅攻魯山城道規無忌攻偃月並克之生禽仙客山圖其夕該遁走進平巴陵謙振遣使求割荊江二州奉歸晉帝不許會南陽太守魯宗之起義攻襄陽僞雍州刺史桓蔚走江陵宗之進至紀南振自往距之使桓謙留守時毅道規已次馬頭馳往襲謙奔走即日克江陵城振大破宗之而歸聞城已陷亦走無忌翼衛天子還京師道規留夏口江陵之平也道規推毅為元功無忌為次功自居其末進號輔國將軍督淮北諸軍事并州刺史義昌太守如故時荊州湘江豫猶多桓氏餘燼往往屯結復以本官進督江州之武昌荊州之江夏隨郡義陽綏安豫州之西陽汝南潁川新蔡九郡諸軍事隨宜剪撲皆悉平之以義勳封華容縣公食邑三千戶遷使持節都督荊寧秦梁雍六州司州之河南諸軍事領護南蠻校尉荊州刺史將軍如故辭南蠻以授殷叔文叔文被誅乃復還領善於為治刑政明理士民莫不畏而愛之劉敬宣征蜀不克道規以督統降為建威將軍盧循寇逼京邑道規遣司馬王鎮之及揚武將軍檀道濟廣武將軍到彥之等赴援朝廷至尋陽為賊黨荀林所破循即以林為南蠻校尉分兵配之使乘勝伐江陵揚聲云徐道覆已克京邑而桓謙自長安入蜀譙縱以謙為荊州刺史厚加資給與其大將譙道福俱寇江陵正與林會林屯江津謙軍枝江二寇交逼分絶都邑之問荊楚既桓氏義舊並懷異心道規乃會將士告之曰桓謙今在近畿聞者頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者雍州刺史魯宗之率衆數千自襄陽來赴或謂宗之未可測道規乃單馬迎之宗之感悅衆議欲使檀道濟到彥之與宗之共擊道規曰盧循擁隔中流扇張同異桓謙荀林更相首尾人懷危懼莫有固心成敗之機在此一舉非吾自行其事不決乃使宗之居守委以腹心率諸軍攻謙諸將佐皆固諫曰今遠出討謙其勝難必荀林近在江津伺人動靜若來攻城宗之未必能固脫有差跌大事去矣道規曰諸君不識兵機耳荀林愚豎無它奇計以吾去未遠必不敢向城吾今取謙往至便克沈疑之間已自還反謙敗則林破膽豈暇得來且宗之獨守何為不支數日解南蠻校尉印以授咨議參軍劉遵馳往攻謙水陸齊進謙大敗單舸走欲下就林追斬之還至浦口林又奔散劉遵率軍追林至巴陵斬之初謙至枝江江陵士庶皆與謙書言城內虛實咸欲謀為內應至是參軍曹仲宗檢得之道規悉焚不視衆於是大安進號征西將軍先是桓歆子道兒逃于江西出擊義陽郡與盧循相連結循使蔡猛助之道規遣參軍劉基破道兒於大薄臨陳斬猛徐道覆率衆三萬奄至破冢魯宗之已還襄陽追召不及人情大震或傳循已平京師遣道覆上為刺史江漢士庶感焚書之恩無復二志道規使劉遵為游軍自距道覆於豫章口前驅失利道規壯氣愈厲激揚三軍遵自外橫擊大破之斬首萬餘級赴水死者殆盡道覆單舸走還盆口初使遵為游軍衆咸云今強敵在前唯患衆少不應割削見力置無用之地及破道覆果得游軍之力衆乃服焉遵字慧明臨淮海西人道規從母兄蕭氏舅也官至右將軍宣城內史淮南太守義熙十年卒追贈撫軍將軍追封監利縣侯食邑七百戶道規進號征西大將軍開府儀同三司加散騎常侍固辭俄而寢疾改授都督豫江二州揚州之宣城淮南廬江歷陽安豐堂邑六郡諸軍事豫州刺史持節常侍將軍如故以疾不拜八年閏月薨于京師時年四十三追贈侍中司徒加班劍二十人諡曰烈武公平桓謙功進封南郡公邑五千戶高祖受命贈大司馬追封臨川王食邑如先道規無子以長沙景王第二子義慶為嗣初太祖少為道規所養高祖命紹焉咸以禮無二繼太祖還本而定義慶為後義慶為荊州廟主當隨往江陵太祖詔曰褒崇道勳經國之盛典尊親追遠因心之所隆故侍中大司馬臨川烈武王體道欽明至德淵邈睿哲自天孝友光備爰始協規則翼贊景業陵威致討則克剪梟鯨逮妖逆交侵方難孔棘勢踰纍人無固志王神謨獨運靈武宏發輯寧內外誅覆羣凶固已化被江漢勳高微管遠猷侔於二南英雄邁於兩獻者矣朕幼蒙殊愛德廕特隆豐恩慈訓義深情戚永惟仁範感慕䗿懷今當擁移寢祏初祀西夏思崇嘉禮式備徽章庶以昭宣風度允副幽顯其追崇丞相加殊禮鸞輅九旒黃屋左纛給節鉞前後部羽葆鼓吹虎賁班劍百人侍中如故及長沙太妃檀氏臨川太妃曹氏後薨祭皆給鸞輅九旒黃屋左纛轀輬車挽歌一部前後部羽葆鼓吹虎賁班劍百人義慶幼為高祖所知常曰此我家豐城也年十三襲封南郡公除給事不拜義熙十二年從伐長安還拜輔國將軍北青州刺史未之任徙督豫州諸軍事豫州刺史復督淮北諸軍事豫州刺史將軍並如故永初元年襲封臨川王徵為侍中元嘉元年轉散騎常侍祕書監徙度支尚書遷丹陽尹加輔國將軍常侍並如故時有民黃初妻趙殺子婦遇赦應徙送避孫讎義慶曰案周禮父母之仇避之海外雖遇市朝鬬不反兵蓋以莫大之寃理不可奪含戚枕戈義許必報至於親戚為戮骨肉相殘故道乖常憲記無定准求之法外裁以人情且禮有過失之宥律無讎祖之文況趙之縱暴本由於酒論心即實事盡荒耄豈得以荒耄之王母等行路之深讎臣謂此孫忍愧銜悲不違子義共天同域無虧孝道六年加尚書左僕射八年太白星犯右執法義慶懼有災禍乞求外鎮太祖詔譬之曰玄象茫昧既難可了且史家諸占各有異同兵星王時有所干犯乃主當誅以此言之益無懼也鄭僕射亡後左執法嘗有變王光祿至今平安日蝕三朝天下之至忌晉孝武初有此異彼庸主耳猶竟無他天道輔仁福善謂不足橫生憂懼兄與後軍各受內外之任本以維城表𩹉經之盛衰此懷實有由來之事設若天必降災寧可千里逃避邪既非遠者之事又不知吉凶定所若在都則有不測去此必保利貞者豈敢苟違天邪義慶固求解僕射乃許之加中書令進號前將軍常侍尹如故在京尹九年出為使持節都督荊雍益寧梁南北秦七州諸軍事平西將軍荊州刺史荊州居上流之重地廣兵強資實兵甲居朝廷之半故高祖使諸子居之義慶以宗室令美故特有此授性謙虛始至及去鎮迎送物並不受十二年普使內外羣官舉士義慶上表曰詔書疇咨羣司延及連牧旌賢仄陋拔善幽遐伏惟陛下惠哲光宣經緯明遠皇階藻曜風猷日升而猶詢衢室之令典遵明臺之睿訓降淵慮於管庫紆聖思乎版築故以道邈往載德高前王臣敢竭虛暗祗承明旨伏見前臨沮令新野庾實秉真履約愛敬淳深昔在母憂毀瘠過禮今罹父疚泣血有聞行成閨庭孝著鄰黨足以敦化率民齊教軌俗前徵奉朝請武陵龔祈恬和平簡貞潔純素潛居研志耽情墳籍亦足鎮息頽競奬勗浮動處士南郡師覺才學明敏操介清修業均井泄志固冰霜臣往年辟為州祭酒未汙其慮若朝命遠暨玉帛遐臻異人間出何遠之有義慶留心撫物州統內官長親老不隨在官舍者年聽遣五吏餉家先是王弘為江州亦有此制在州八年為西土所安撰徐州先賢傳十卷奏上之又擬班固典引為典以述皇代之美十六年改授散騎常侍都督江州豫州之西陽晉熙新蔡三郡諸軍事衛將軍江州刺史持節如故十七年即本號都督南兗徐兗青冀幽六州諸軍事南兗州刺史尋加開府儀同三司為性簡素寡嗜欲愛好文義才詞雖不多然足為宗室之表受任歷藩無浮淫之過唯晚節奉養沙門頗致費損少善騎乘及長以世路艱難不復跨馬招聚文學之士近遠必至太尉袁淑文冠當時義慶在江州請為衛軍咨議參軍其餘吳郡陸展東海何長瑜鮑照等並為辭章之美引為佐史國臣太祖與義慶書常加意斟酌鮑照字明遠文辭贍逸嘗為古樂府文甚遒麗元嘉中河濟俱清當時以為美瑞照為河清頌其序甚工其辭曰臣聞善談天者必徵象於人工言古者先考績於今鴻犧以降遐哉邈乎鏤山嶽雕篆素昭德垂勳可謂多矣而史編唐堯之功載格于上下樂登文王之操稱於昭于天素狐玄玉聿彰符命朴牛大蚓爰定祥曆魚鳥動色禾雉興讓皆物不盈眥而美溢金石詩人於是不作頌聲為之而寢庸非惑歟自我皇宋之承天命也仰符應龍之精俯協河龜之靈君圖帝寶粲爛瑰英固業光曩代事華前德矣聖上天飛踐極迄茲二十四載道化周流玄澤汪濊地平天成上下含熙文同軌通表𩹉禔福耀德中區黎庶知讓觀英遐表夷貉懷惠恤勤秩禮罷露臺之金紓國振民傾巨橋之粟約違迫脅奢去泰甚燕無留飲畋不盤樂物色異人優游據正顯不失心幽無怨氣精照日月事洞天情故不勞杖斧之臣號令不嚴而自肅無辱鳳舉之使靈怪不召而自彰萬里神行飆塵不起農商野廬邊城偃柝冀馬南金填委內府馴象西爵充羅外囿阿紈綦組之饒衣覆宗國漁鹽嵵梓之利傍贍荒遐士民殷富五陵既有慚德宮宇宏麗三川莫之能比閭閈有盈歌吹無絶朱輪疊轍華冕重肩豈徒世無窮人民獲休息朝呼韓罷酤鐵而已哉是以嘉祥纍仍福應尤盛青丘之狐丹穴之鳥栖阿閣遊禁園金芝九莖木禾六刃秀銅池發膏畝宜以協調律呂謁薦郊廟煙霏霧集不可勝紀然而聖上猶昧旦夙興若有望而未至閎規遠圖如有追而莫及神明之貺推而弗居也是以琬碑鏐檢盛典蕪而不治朝神省方大化抑而未許崇文協律之士蘊頌於外坐朝陪宴之臣懷揄揚於內三靈佇眷九壤注心既有日矣歲宮乾維月躔蒼陸長河臣濟異源同清澄波萬壑潔瀾千里斯誠曠世偉觀昭啓皇明者也語曰影從表瑞從德此其效焉宣尼稱鳳鳥不至河不出圖傳曰俟河之清人壽幾何皆傷不可見也然則古人所不見者今殫見之矣孟軻曰千載一聖是旦暮也豈不大哉夫四皇六帝樹聲長世大寶也澤浸羣生國富刑清鴻德也制禮裁樂惇風遷俗文教也誅箠逋羯束顙絳闕武功也鳴鳥躍魚滌穢河渠至祥也大寶鴻德文教武功其崇如此幽明協贊民祇與能厥應如彼唯天為大堯實則之皇哉唐哉疇與為讓抑又聞之勢之所覃者淺則美之所傳者近道之所感者深則慶之所流者遠是以豐功韙命潤色縢策盛德形容藻被歌頌察之上代則奚斯吉甫之徒鳴玉鑾於前視之中古則相如王褒之屬施金羈於後絶景揚光清埃繼路班固稱漢成之世奏御者千有餘篇文章之盛與三代同風由是言之斯乃臣子舊職國家通義不可輟也臣雖不敏寧不勉乎世祖以照為中書舍人上好為文章自謂物莫能及照悟其旨為文多鄙言纍句當時咸謂照才盡實不然也臨海王子頊為荊州照為前軍參軍掌書記之任子頊敗為亂兵所殺義慶在廣陵有疾而白虹貫城野麕入府心甚惡之固陳求還太祖許解州以本號還朝二十一年薨於京邑時年四十二追贈侍中司空諡曰康王子哀王燁字景舒嗣官至通直郎為元凶所殺追贈散騎常侍子綽字子流嗣官至步兵校尉升明三年反伏誅國除綽弟綰早卒燁弟衍太子舍人衍弟鏡宣城太守鏡弟穎前將軍穎弟倩南新蔡太守遵考高祖族弟也曾祖淳皇曾祖武原令混之弟官至正員郎祖巖海西令父涓子彭城內史遵考始為將軍振武參軍預討盧循封鄉侯自建威將軍彭城內史隨高祖北伐時高祖諸子並弱宗室唯有遵考長安平定以督并州司州之北河東北平陽北雍州之新平安定五郡諸軍事輔國將軍并州刺史領河東太守鎮蒲坂關中失守南還除游擊將軍遷冠軍將軍晉帝遜位居秣陵宮遵考領兵防衛高祖初即大位下推恩之詔曰遵考服屬之親國戚未遠宗室無多宜蒙寵爵可封營浦縣侯食邑五百戶以本號為彭城沛二郡太守景平元年遷右衛將軍元嘉二年出為征虜將軍淮南太守明年轉使持節領護軍入直殿省出為使持節督雍梁南北秦四州荊州之南陽竟陵順陽襄陽新野隨六郡諸軍事征虜將軍寧蠻校尉雍州刺史襄陽新野二郡太守遵考為政嚴暴聚斂無節五年為有司所糾上不問赦還都七年除太子右衛率加給事中明年督南徐兗州之江北淮南諸軍事征虜將軍南兗州刺史領廣陵太守又徵為侍中領後軍將軍徙太常九年遷右衛將軍加散騎常侍十二年坐厲疾不待對免常侍以侯領右衛明年復本官十五年又領徐州大中正太子中庶子本官如故其年監徐兗二州豫州之梁郡諸軍事前將軍徐兗二州刺史未之鎮留為侍中領左衛將軍明年出為使持節監豫司雍并四州南豫州之梁郡弋陽馬頭荊州之義陽四郡諸軍事前將軍豫州刺史領南梁郡太守二十一年坐統內旱百姓饑詔加賑給而遵考不奉符旨免官起為散騎常侍五兵尚書遷吳興太守秩中二千石二十五年徵為領軍二十七年索虜南至瓜步率軍出江上假節蓋三十年復出為使持節監豫州刺史元凶弒立進號安西將軍遣外監徐安期仰捷祖防守之遵考斬安期等起義兵應南譙王義宣義宣加遵考鎮西將軍夏侯獻率衆至瓜步承候世祖又坐免官孝建元年魯爽臧質反起為征虜將軍率衆屯臨沂縣仍除吳興太守明年徵為湘州刺史未行遷尚書左僕射三年轉丹陽尹加散騎常侍復為尚書右僕射領太子右衛率明年又除領軍將軍加散騎常侍五年復遷尚書右僕射金紫光祿大夫常侍如故明年轉左僕射常侍如故又領徐州刺史大中正崇憲太僕前廢帝即位遷特進右光祿大夫常侍太僕如故景和元年出督南豫州諸軍事安西將軍南豫州刺史太宗即位以為侍中特進右光祿大夫領崇憲太僕給親侍三十人崇憲太后崩太僕解餘如故泰始五年賜几杖太官四時賜珍味疾病太醫給藥固辭几杖後廢帝即位進左光祿大夫餘如故元徽元年卒時年八十二追贈左光祿大夫開府儀同三司侍中如故諡曰元公遵考無才能直以宗室不遠故歷朝顯遇年老有疾失明子澄之順帝升明末貴達澄之弟琨之為竟陵王誕司空主簿誕作亂以為中兵參軍不就縶繫數十日終不受乃殺之追贈黃門郎詔吏部尚書謝莊為之誄遵考從弟思考亦被遇歷朝官極清顯為豫章會稽太守益徐州刺史凡經十郡三州泰始元年卒於散騎常侍金紫光祿大夫時年七十五追贈特進常侍光祿如故史臣曰餘妖內侮偏衆西臨荀桓交逼荊楚之勢危矣必使上略未盡一算或遺則城壞壓境上流之難方結敵資三分有二之形北向而爭天下則我全勝之道未可或知烈武王覽羣才揚盛策一舉磔勍寇非曰天時抑亦人謀也降年不永遂不得與大業始終惜矣哉
