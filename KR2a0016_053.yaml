body:
  text: 宋書卷五十三列傳第十三張茂度子永庾登之弟炳之謝方明江夷張茂度吳郡吳人張良後也名與高祖諱同故稱字良七世孫為長沙太守始遷於吳高祖嘉曾祖澄晉光祿大夫祖彭祖廣州刺史父敞侍中尚書吳國內史茂度郡上計吏主簿功曹州命從事史並不就除琅邪王衛軍參軍員外散騎侍郎尚書度支郎父憂不拜服闋為何無忌鎮南參軍頃之出補晉安太守盧循為寇覆沒江州茂度及建安太守孫蚪之並受其符書供其調役循走俱坐免官復以為始興相郡經賊寇廨宇焚燒民物凋散百不存一茂度創立城寺弔死撫傷收集離散民戶漸復在郡一周徵為太尉參軍尋轉主簿揚州治中從事史高祖西伐劉毅茂度居守留州事悉委之軍還遷中書侍郎出為司馬休之平西司馬河南太守高祖將討休之茂度聞知乘輕船逃下逢高祖於中路以為録事參軍太守如故江陵平驃騎將軍道憐為荊州茂度仍為咨議參軍太守如故還為揚州別駕從事史高祖北伐關洛復任留州事出為使持節督廣交二州諸軍事建武將軍平越中郎將廣州刺史綏靜百越嶺外安之以疾求還復為道憐司馬丁繼母憂服闋除廷尉轉尚書吏部郎太祖元嘉元年出為使持節督益寧二州梁州之巴西梓潼宕渠南漢中秦州之懷寧安固六郡諸軍事冠軍將軍益州刺史三年太祖討荊州刺史謝晦詔益州遣軍襲江陵晦已平而軍始至白帝茂度與晦素善議者疑其出軍遲留時茂度弟邵為湘州刺史起兵應大駕上以邵誠節故不加罪被代還京師七年起為廷尉加奉車都尉領本州中正入為五兵尚書徙太常以腳疾出為義興太守加秩中二千石上從容謂茂度曰勿復以西蜀介懷對曰臣若不遭陛下之明墓木拱矣頃之解職還家徵為都官尚書加散騎常侍固辭以疾就拜光祿大夫加金章紫綬茂度內足於財自絶人事經始本縣之華山以為居止優遊野澤如此者七年十八年除會稽太守素有吏能在郡縣職事甚理明年卒官時年六十七諡曰恭子茂度同郡陸仲元者晉太尉玩曾孫也以事用見知歷清資吏部郎右衛將軍侍中吳郡太守自玩洎仲元四世為侍中時人方之金張二族弟子真元嘉十年為海陵太守中書舍人秋當為太祖所信委家在海陵父死還葬橋路毀壞不通喪車縣求發民修治子真不許司徒彭城王義康聞而善之召為國子博士司徒左西掾州治中臨海東陽太守茂度子演太子中舍人演弟鏡新安太守皆有盛名並早卒鏡弟永永字景雲初為郡主簿州從事轉司徒士曹參軍出補餘姚令入為尚書中兵郎先是尚書中條制繁雜元嘉十八年欲加治撰徙永為刪定郎掌其任二十二年除建康令所居皆有稱績又除廣陵王誕北中郎録事參軍永涉獵書史能為文章善隸書曉音律騎射雜藝觸類兼善又有巧思益為太祖所知紙及墨皆自營造上每得永表啓輒執玩咨嗟自歎供御者了不及也二十三年造華林園玄武湖並使永監統凡諸制置皆受則於永徙為江夏王義恭太尉中兵參軍越騎校尉振武將軍廣陵南沛二郡太守二十八年又除江夏王義恭驃騎中兵參軍沛郡如故永既有才能所在每盡心力太祖謂堪為將二十九年以永督冀州青州之濟南樂安太原三郡諸軍事揚威將軍冀州刺史督王玄謨申坦等諸將經略河南攻碻磝城纍旬不能拔其年八月七日夜虜開門燒樓及攻車士卒燒死及為虜所殺甚衆永即夜撤圍退軍不報告諸將衆軍驚擾為虜所乘死敗塗地永及申坦並為統府撫軍將軍蕭思話所收繫於歷城獄太祖以屢征無功諸將不可任責永等與思話詔曰虜既乘利方向盛冬若脫敢送死兄弟父子自共當之耳言及增憤可以示張永申坦又與江夏王義恭書曰早知諸將輩如此恨不以白刃驅之今者悔何所及三十年元凶弒立起永督青州徐州之東安東莞二郡諸軍事輔國將軍青州刺史司空南譙王義宣起義又板永為督冀州青州之濟南樂安太原三郡諸軍事輔國將軍冀州刺史永遣司馬崔勳之中兵參軍劉則二軍馳赴國難時蕭思話在彭城義宣慮二人不相諧緝與思話書勸與永坦懷又使永從兄長史張暢與永書曰近有都信具汝刑網之原可謂雖在縲紲而腹心無愧矣蕭公平厚先無嫌隙見汝翰迹言不相傷何其滔滔稱人意邪當今世故艱迫義旗雲起方藉羣賢共康時難當遠慕廉藺在公之德近效平勃忘私之美忽此蒂芥剋申舊情公亦命蕭示以疏達兼令相報共遵此旨事平召為江夏王義恭大司馬從事中郎領中兵時使百僚獻讜言永以為宜立諫官開不諱之路講師旅示安不忘危世祖孝建元年臧質反遣永輔武昌王渾鎮京口其年出為揚州別駕從事史明年召入為尚書左丞時將士休假年開三番紛紜道路永建議曰臣聞開兵從稼前王以之兼隙耕戰遞勞先代以之經遠當今化寧萬里文同九服捐金走驥於焉自始伏見將士休假多蒙三番程會既促裝赴在早故一歲之間四馳遙路或失遽春耜或違要秋登致使公替常儲家闕舊粟考定利害宜加詳改愚謂交代之限以一年為制使征士之念勞未及積遊農之望收功歲成斯則王度無騫民業斯植矣從之大明元年遷黃門侍郎尋領虎賁中郎將本郡中正三年遷廷尉上謂之曰卿既與釋之同姓欲使天下須無寃民加寧朔將軍尚書吏部郎司徒右長史尋陽王子房冠軍長史四年立明堂永以本官兼將徐州刺史薛安都纍戰剋捷破薛索兒等事在安都傳又遷散騎常侍鎮軍將軍太子詹事權領徐州刺史又都督徐兗青冀四州諸軍事又為使持節都督南兗徐二州諸軍事南兗州刺史常侍將軍如故時太宗即位除吏部尚書未拜會四方反叛復以為吳興太守加冠軍將軍假節未拜以將軍假節徙為吳郡太守率軍東討又為散騎常侍太子詹事未拜遷使持節監青冀幽并四州諸軍事前將軍青冀二州刺史統諸將討徐州刺史薛安都纍戰剋捷破薛索兒等事在安都傳又遷散騎常侍鎮軍將軍太子詹事權領徐州刺史又都督徐兗青冀四州諸軍事又為使持節都督南兗徐二州諸軍事南兗州刺史常侍將軍如故時薛安都據彭城請降而誠心不款太宗遣永與沈攸之以重兵迎之加督前鋒軍事進軍彭城安都招引索虜之兵既至士卒離散永狼狽引軍還為虜所追大敗復值寒雪士卒離散永腳指斷落僅以身免失其第四子三年徙都督會稽東陽臨海永嘉新安五郡諸軍事會稽太守將軍如故以北討失律固求自貶降號左將軍永痛悼所失之子有兼常哀服制雖除猶立靈座飲食衣服待之如生每出行常別具名車好馬號曰侍從有事輒語左右報郎君以破薛索兒功封孝昌縣侯食邑千戶在會稽賓客有謝方童等坐贓下獄死永又降號冠軍將軍四年遷使持節督雍梁南北秦四州郢州之竟陵隨二郡諸軍事右將軍雍州刺史未拜停為太子詹事加散騎常侍本州大中正六年又加護軍將軍領石頭戌事給鼓吹一部七年遷金紫光祿大夫尋復領護軍後廢帝即位進右光祿大夫加侍中領安成王師加親信二十人又領本州中正出為吳郡太守秩中二千石侍中右光祿如故元徽二年遷使持節都督南兗徐青冀益五州諸軍事征北將軍南兗州刺史侍中如故永少便驅馳志在宣力年雖已老志氣未衰優遊間任意甚不樂及有此授喜悅非常即日命駕還都未之鎮值桂陽王休範作亂永率所領出屯白下休範至新亭大桁不守前鋒遂攻南掖門永遣人覘賊既返唱云臺城陷矣永衆於此潰散永亦棄軍奔走還先所住南苑以永舊臣不加罪止免官削爵永亦愧歎發病三年卒時年六十六順帝升明二年追贈侍中右光祿大夫子瓌升明末達官永弟辨太宗亦見任遇歷尚書吏部郎廣州刺史大司農辨弟岱升明末吏部尚書庾登之字元龍潁川陵人也曾祖冰晉司空祖蘊廣州刺史父廓東陽太守登之少以強濟自立初為晉會稽王道子太傅參軍義旗初又為高祖鎮軍參軍以預討桓玄功封曲江縣五等男參大司馬琅邪王軍事豫州別駕從事史大司馬主簿司徒左西曹屬登之雖不涉學善於世事王弘謝晦江夷之徒皆相知友轉太尉主簿義熙十二年高祖北伐登之擊節驅馳退告劉穆之以母老求郡于時士庶咸憚遠役而登之二三其心高祖大怒除吏名大軍發後乃以補鎮蠻護軍西陽太守入為太子庶子尚書左丞出為新安太守謝晦為撫軍將軍荊州刺史請為長史南郡太守仍為衛軍長史太守如故登之與晦俱曹氏壻名位本同一旦為之佐意甚不愜到廳箋唯云即日恭到初無感謝之言每入覲見備持箱囊几席之屬一物不具不坐晦常優容之晦拒王師欲使登之留守登之不許語在晦傳晦敗登之以無任免罪禁錮還家元嘉五年起為衡陽王義季征虜長史義季年少未親政衆事一以委之尋加南東海太守入為司徒右長史尚書吏部郎司徒左長史南東海太守府公彭城王義康專覽政事不欲自下厝懷而登之性剛每陳己意義康甚不悅出為吳郡太守州郡相臨執意無改因其蒞任贓貨以事免官弟炳之時為臨川內史登之隨弟之郡優遊自適俄而除豫章太守便道之官登之初至臨川吏民咸相輕侮豫章與臨川接境郡又華大儀迓光赫土人並驚歎焉十八年遷江州刺史疾篤徵為中護軍未拜二十年卒時年六十二即以為贈子沖遠太宗鎮姑孰為衛軍長史卒於豫章太守追贈侍中炳之字仲文初為祕書太子舍人劉粹征北長史廣平太守兄登之為謝晦長史炳之往省之晦時位高權重朝士莫不加敬炳之獨與抗禮時論健之為尚書度支郎不拜出補錢唐令治民有績轉彭城王義康驃騎主簿未就徙為丹陽丞炳之既未到府疑於府公禮敬下禮官博議中書侍郎裴松之議曰案春秋桓八年祭公逆王后于紀公羊傳曰女在國稱女此其稱王后何王者無外其辭成矣推此而言則炳之為吏之道定於受命之日矣其辭已成在官無外名器既正則禮亦從之且今宰牧之官拜不之職未接之民必有其敬者以既受王命則成君民之義故也吏之被勑猶除者受拜民不以未見闕其被禮吏安可以未到廢其節乎愚懷所見宜執吏禮從之遷司徒左西屬左將軍竟陵王義宣未親府板炳之為咨議參軍衆務悉委焉後將軍長沙王義欣鎮壽陽炳之為長史南梁郡太守轉鎮軍長史太守如故出為臨川內史後將軍始興王濬鎮湘州以炳之為司馬領長沙內史濬不之任除南泰山太守司馬如故于時領軍將軍劉湛協附大將軍彭城王義康而與僕射殷景仁有隙凡朝士遊殷氏者不得入劉氏之門獨炳之遊二人之間密盡忠於朝廷景仁稱疾不朝見者歷年太祖常令炳之銜命去來湛不疑也義康出藩湛伏誅以炳之為尚書吏部郎與右衛將軍沈演之俱參機密頃之轉侍中本州大中正遷吏部尚書領義陽王師內外歸附勢傾朝野炳之為人強急而不耐煩賓客干訴非理者忿詈形於辭色素無術學不為衆望所推性好潔士大夫造之者去未出戶輒令人拭席洗牀時陳郡殷沖亦好淨小史非淨浴新衣不得近左右士大夫小不整潔每容接之炳之好潔反是沖每以此譏焉領選既不緝衆論又頗通貨賄炳之請急還家吏部令史錢泰主客令史周伯齊出炳之宅咨事泰能彈琵琶伯齊善歌炳之因留停宿尚書舊制令史咨事不得宿停外雖有八座命亦不許為有司所奏上於炳之素厚將恕之召問尚書右僕射何尚之尚之具陳炳之得失又密奏曰夫為國為家何嘗不謹用前典今苟欲通一人慮非哲王御世之長術炳之所行非曖昧而已臣所聞既非一旦又往往眼見事如丘山彰彰若此遂縱而不糾不知復何以為治晉武不曰明主斷鬲令事遂能奮發華廙見待不輕廢錮纍年後起止作城門校尉耳若言炳之有誠於國未知的是何事政當云與殷景仁不失其舊與劉湛亦復不疏且景仁當時事意豈復可蔑朝士兩邊相推亦復何限縱有微誠復何足掩其惡今賈充勳烈晉之重臣雖事業不勝不聞有大罪諸臣進説便遠出之陛下聖睿反更遲遲於此炳之身上之釁既自藉藉交結朋黨構扇是非實足亂俗傷風諸惡紛紜過於范曄所少賊一事耳伏願深加三思試以諸聲傳普訪諸可顧問者羣下見陛下顧遇既重恐不敢苦相侵傷顧問之日宜布嫌責之旨若不如此亦當不辨有所得失臣憃既有所啓要欲盡其心如無可納伏願宥其觸忤之罪時炳之自理不諳臺制令史並言停外非嫌太祖以炳之信受失所小事不足傷大臣尚之又陳曰炳之呼二令史出宿令史咨都令史駱宰宰云不通吏部曹亦咸知不可令史具向炳之説不得停之意炳之了不聽納此非為不解直是苟相留耳由外悉知此而誣於信受羣情豈了陛下不假為之辭雖是令史出乃遠虧朝典又不得謂之小事謝晦望實非今者之疇一事錯誤免侍中官王珣時賢小失桓胤春搜之謬皆白衣領職況公犯憲制者邪不審可有同王桓白衣例不於任使無損兼可得以為肅戒孔萬祀居左丞之局不念相當語駱宰云炳之貴要異他尚書身政可得無言耳又云不癡不聾不成姑公敢作此言亦為異也太祖猶優遊之使尚之更陳其意尚之乃備言炳之愆過曰尚書舊有增置幹二十人以元凱丞郎幹之假疾病炳之常取十人私使詢處幹闕不得時補近得王師猶不遣還臣令人語之先取人使意常未安今既有手力不宜復留得臣此信方復遣耳大都為人好率懷行事有諸紜紜不悉可曉臣思張遼之言關羽雖兄弟曹公父子豈得不言觀今人憂國實寡臣復結舌日月之明或有所蔽然不知臣者豈不謂臣有爭競之迹追以悵悵臣與炳之周旋俱被恩接不宜復生厚薄太尉昨與臣言説炳之有諸不可非唯一條遠近相崇畏震動四海凡短人辦得致此更復可嘉虞秀之門生事之纍味珍肴未嘗有乏其外別貢豈可具詳炳之門中不問大小誅求張幼緒幼緒轉無以堪命炳之先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然市令盛馥進數百口材助營宅恐人知作虛買券劉道錫驟有所輸傾南俸之半劉雍自謂得其力助事之如父夏中送甘蔗若新發於州國吏運載樵荻無輟於道諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之選用不平不可一二太尉又云炳之都無共事之體凡所選舉悉是其意政令太尉知耳論虞秀之作黃門太尉不正答和故得停太尉近與炳之疏欲用德願兒作州西曹炳之乃啓用為主簿即語德願德願謝太尉前後漏泄賣恩亦復何極縱不加罪故宜出之士庶忿疾之非直項羽楚歌而已也自從裴劉刑罰以來諸將陳力百倍今日事實好惡可問若赫然發憤顯明法憲陛下便可間臥紫闥無復一事也太祖欲出炳之為丹陽又以問尚之尚之答曰臣既乏賈生應對之才又謝汲公犯顏之直至於侍坐仰酬每不能盡昨出伏復深思祇有愚滯今之事迹異口同音便是彰著政未測得物之數耳可為蹈罪負恩無所復少且居官失和未有此比陛下遲遲舊恩未忍窮法為弘之大莫復過此方復有尹京赫赫之授恐悉心奉國之人於此而息貪狼恣意者歲月滋甚非但虧點王化乃治亂所由如臣所聞天下論議炳之常塵纍日月未見一豪增輝今曲阿在水南恩寵無異而協首郡之榮乃更成其形勢便是老王雅也古人云無賞罰雖堯舜不能為治也陛下豈可坐損皇家之重迷一凡人事若復在可否之間亦不敢苟陳穴管今之枉直明白灼然而睿王令王反更不悟令賈誼劉向重生豈不慷慨流涕於聖世邪臣昔啓范曄當時亦懼犯觸之尤苟是愚懷所挹政自不能不舒達所謂雖九死而不悔者也謂炳之且外出若能修改在職著稱還亦不難而可得少明國典粗酬四海之誚今愆釁如山榮任不損炳之若復有彰大之罪誰復敢以聞述且自非殊勳異績亦何足塞今日之尤歷觀古今未有衆過藉藉受貨數百萬更得高官厚祿如今者也臣每念聖化中有此事未嘗不痛心疾首設令臣等數人縱橫狼藉復如此不審當復云何處之近啓賈充遠鎮今亦何足分外出恐是策之良者臣知陛下不能採臣言故是臣不能盡己之愚至耳今蒙恩榮者不少臣何為獨懇懇於斯實是尊主樂治之意伏願試更垂察又曰臣見劉伯寵大慷慨炳之所行云有人送張幼緒幼緒語人吾雖得一縣負三十萬錢庾沖遠乃當送至新林見縛束猶未得解手荀萬秋嘗詣炳之值一客姓夏侯主人問有好牛不云無問有好馬不又云無政有佳驢耳炳之便答甚是所欲客出門遂與相聞索之劉道錫云是炳之所舉就道錫索嫁女具及祠器乃當百萬數猶謂不然選令史章龍向臣説亦歎其受納之過言實得嫁女具銅爐四人舉乃勝細葛斗帳等物不可稱數在尚書中令奴酤酃酒利其百十亦是立臺閣所無不審少簡聖聽不恐仰傷日月之明臣竊為之歎息太祖乃可有司之奏免炳之官是歲元嘉二十五年也二十七年卒於家時年六十三太祖録其宿誠追復本官二子季遠弘遠謝方明陳郡陽夏人尚書僕射景仁從祖弟也祖鐵永嘉太守父沖中書侍郎家在會稽謝病歸除黃門侍郎不就為孫恩所殺追贈散騎常侍方明隨伯父吳興太守邈在郡孫恩寇會稽東土諸郡皆響應吳興民胡桀郜驃破東遷縣方明勸邈避之不從賊至被害方明逃竄遂免初邈舅子長樂馮嗣之及北方學士馮翊仇玄達俱往吳興投邈並舍之郡學禮待甚簡二人並忿慍遂與恩通謀恩嘗為嗣之等從者夜入郡見邈衆遁不悟本欲於吳興起兵事趣不果乃遷於會稽及郜等攻郡嗣之玄達並豫其謀劉牢之謝琰等討恩恩走入海嗣之等不得同去方更聚合方明結邈門生義故得百餘人掩討嗣之等悉禽而手刃之于時荒亂之後吉凶禮廢方明合門遇禍資産無遺而營舉凶事盡其力用數月之間葬送並畢平世備禮無以加也頃之孫恩重沒會稽謝琰見害恩購求方明甚急方明於上虞載母妹奔東陽由黃蘗嶠出鄱陽附載還都寄居國子學流離險厄屯苦備經而貞立之操在約無改元興元年桓玄剋京邑丹陽尹卞範之勢傾朝野欲以女嫁方明使尚書吏部郎王騰譬説備至方明終不回桓玄聞而賞之即除著作佐郎補司徒王謐主簿從兄景仁舉為高祖中兵主簿方明事思忠益知無不為高祖謂之曰愧未有瓜衍之賞且當與卿共豫章國祿屢加賞賜方明嚴恪善自居遇雖處暗室未嘗有墯容無他伎能自然有雅韻從兄混有重名唯歲節朝宗而已丹陽尹劉穆之權重當時朝野輻輳不與穆之相識者唯有混方明郗僧施蔡廓四人而已穆之甚以為恨方明廓後往造之大悅白高祖曰謝方明可謂名家駒直置便自是台鼎人無論復有才用頃之轉從事中郎仍為左將軍道憐長史高祖命府內衆事皆咨決之隨府轉中軍長史尋更加晉陵太守復為驃騎長史南郡相委任如初嘗年終江陵縣獄囚事無輕重悉散聽歸家使過正三日還到罪應入重者有二十餘人綱紀以下莫不疑懼時晉陵郡送故主簿弘季盛徐壽之並隨在西固諫以為昔人雖有其事或是記籍過言且當今民情偽薄不可以古義相許方明不納一時遣之囚及父兄皆驚喜涕泣以為就死無恨至期有重罪二人不還方明不聽討捕其一人醉不能歸逮二日乃反餘一囚十日不至五官朱千期請見欲白討之方明知為囚事使左右謝五官不須入囚自當反囚逡巡墟里不能自歸鄉村責讓之率領將送遂竟無逃亡者遠近咸歎服焉遭母憂去職服闋為宋臺尚書吏部郎高祖受命遷侍中永初三年出為丹陽尹有能名轉會稽太守江東民戶殷盛風俗峻刻強弱相陵姦吏蜂起符書一下文攝相續又罪及比伍動相連坐一人犯吏則一村廢業邑里驚擾狗吠達旦方明深達治體不拘文法闊略苛細務存綱領州臺符攝即時宣下緩民期會展其辦舉郡縣監司不得妄出貴族豪士莫敢犯禁除比伍之坐判久繫之獄前後征伐每兵運不充悉發倩士庶事既寧息皆使還本而屬所刻害或即以補吏守宰不明與奪乖舛人事不至必被抑塞方明簡汰精當各慎所宜雖服役十載亦一朝從理東土至今稱詠之性尤愛惜未嘗有所是非承代前人不易其政有必宜改者則以漸移變使無迹可尋元嘉三年卒官年四十七子惠連幼而聰敏年十歲能屬文族兄靈運深相知賞事在靈運傳本州辟主簿不就惠連先愛會稽郡吏杜德靈及居父憂贈以五言詩十餘首文行於世坐被徙廢塞不豫榮伍尚書僕射殷景仁愛其才因言次白太祖臣小兒時便見世中有此文而論者云是謝惠連其實非也太祖曰若如此便應通之元嘉七年方為司徒彭城王義康法曹參軍是時義康治東府城城塹中得古冢為之改葬使惠連為祭文留信待成其文甚美又為雪賦亦以高麗見奇文章並傳於世十年卒時年二十七既早亡且輕薄多尤纍故官位不顯無子弟惠宣竟陵王誕司徒從事中郎臨川內史江夷字茂遠濟陽考城人也祖晉護軍將軍父敳驃騎咨議參軍夷少自藻厲為後進之美州辟主簿不就桓玄篡位以為豫章王文學義旗建高祖板為鎮軍行參軍尋參大司馬琅邪王軍事轉以公事免頃之復補主簿豫討桓玄功封南郡州陵縣五等侯孟昶建威府司馬中書侍郎中軍太尉從事中郎征西大將軍道規長史南郡太守尋轉太尉咨議參軍領録事遷長史入為侍中大司馬從府公北伐拜洛陽園陵進至潼關還領寧遠將軍琅邪內史本州大中正高祖命大司馬府琅邪國事一以委焉宋臺初建為五兵尚書高祖受命轉掌度支出為義興太守加秩中二千石以疾去職尋拜吏部尚書為吳郡太守營陽王於吳縣見害夷臨哭盡禮又以兄疾去官復為丹陽尹吏部尚書加散騎常侍遷右僕射夷美風儀善舉止歷任以和簡著稱出為湘州刺史加散騎常侍未之職病卒時年四十八遺命薄斂蔬奠務存儉約追贈前將軍本官如故子湛別有傳史臣曰為國之道食不如信立人之要先質後文士君子當以體正為基蹈義為本然後飾以藝能文以禮樂苟或難備不若文不足而質有餘也是以小心翼翼可祗事於上帝嗇夫喋喋終不離於虎圈江夷謝方明謝弘微王惠王球學義之美未足以成名而貞心雅體廷臣所罕及詩云溫溫恭人惟德之基信矣
