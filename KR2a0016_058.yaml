body:
  text: 宋書卷五十八列傳第十八王惠謝弘微王球王惠字令明琅邪臨沂人太保弘從祖弟也祖劭車騎將軍父默左光祿大夫惠幼而夷簡為叔父司徒謐所知恬靜不交遊未嘗有雜事陳郡謝瞻才辨有風氣嘗與兄弟羣從造惠談論鋒起文史間發惠時相酬應言清理遠瞻等慚而退高祖聞其名以問其從兄誕誕曰惠後來秀令鄙宗之美也即以為行太尉參軍事府主簿從事中郎世子建府以為征虜長史仍轉中軍長史時會稽內史劉懷敬之郡送者傾京師惠亦造別還過從弟球球問向何所見惠曰惟覺即時逢人耳常臨曲水風雨暴至座者皆馳散惠徐起姿制不異常日世子為荊州惠長史如故領南郡太守不拜宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可令減袁曜卿也既而曰吾得其人矣乃以惠居之遷世子詹事轉尚書吳興太守少帝即位以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官者得輒聚置閣上及去職印封如初時談者以廓之不拜惠之即拜雖事異而意同也兄鑒頗好聚斂廣營田業惠意甚不同謂鑒曰何用田為鑒怒曰無田何由得食惠又曰亦復何用食為其標寄如此元嘉三年卒時年四十二追贈太常無子謝弘微陳郡陽夏人也祖韶車騎司馬父思武昌太守從叔峻司空琰第二子也無後以弘微為嗣弘微本名密犯所繼內諱故以字行童幼時精神端審時然後言所繼叔父混名知人見而異之謂思曰此兒深中夙敏方成佳器有子如此足矣年十歲出繼所繼父於弘微本緦麻親戚中表素不相識率意承接皆合禮衷義熙初襲峻爵建昌縣侯弘微家素貧儉而所繼豐泰唯受書數千卷國吏數人而已遺財祿秩一不關豫混聞而驚歎謂國郎中令漆凱之曰建昌國祿本應與北舍共之國侯既不措意今可依常分送弘微重違混言乃少有所受混風格高峻少所交納唯與族子靈運瞻曜弘微並以文義賞會嘗共宴處居在烏衣巷故謂之烏衣之遊混五言詩所云昔為烏衣遊戚戚皆親姪者也其外雖復高流時譽莫敢造門瞻等才辭辨富弘微每以約言服之混特所敬貴號曰微子謂瞻等曰汝諸人雖才義豐辨未必皆愜衆心至於領會機賞言約理要故當與我共推微子常云阿遠剛躁負氣阿客博而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又云微子異不傷物同不害正若年逮六十必至公輔嘗因酣宴之餘為韻語以奬勸靈運瞻等曰康樂誕通度實有名家韻若加繩染功剖瑩乃瓊瑾宣明體遠識穎達且沈俊若能去方執穆穆三才順阿多標獨解弱冠纂華胤質勝誡無文其尚又能峻通遠懷清悟采采摽蘭訊直轡鮮不躓抑用解偏吝微子基微尚無倦由慕藺勿輕一簣少進往將千仞數子勉之哉風流由爾振如不犯所知此外無所慎靈運等並有誡厲之言唯弘微獨盡褒美曜弘微兄多其小字也遠即瞻字靈運小名客兒晉世名家身有國封者起家多拜員外散騎侍郎弘微亦拜員外散騎琅邪王大司馬參軍義熙八年混以劉毅黨見誅妻晉陵公主改適琅邪王練公主雖執意不行而詔其與謝氏離絶公主以混家事委之弘微混仍世宰輔一門兩封田業十餘處僮僕千人唯有二女年數歲弘微經紀生業事若在公一錢尺帛出入皆有文簿遷通直郎高祖受命晉陵公主降為東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是九載而室宇修整倉廩充盈門徒業使不異平日田疇墾闢有加於舊東鄉君嘆曰僕射平生重此子可謂知人僕射為不亡矣中外姻親道俗義舊見東鄉之歸者入門莫不歎息或為之涕流感弘微之義也性嚴正舉止必循禮度事繼親之黨恭謹過常伯叔二母歸宗兩姑晨夕瞻奉盡其誠敬內或傳語通訊輒正其衣冠婢僕之前不妄言笑由是尊卑小大敬之若神太祖鎮江陵宋初封宜都王以琅邪王球為友弘微為文學母憂去職居喪以孝稱服闋踰年菜蔬不改除鎮西咨議參軍太祖即位為黃門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書吏部郎參預機密尋轉右衛將軍諸故吏臣佐並委弘微選擬居身清約器服不華而飲食滋味盡其豐美兄曜歷御史中丞城王義康驃騎長史元嘉四年卒弘微蔬食積時哀戚過禮服雖除猶不噉魚肉沙門釋慧琳詣弘微弘微與之共食猶獨蔬素慧琳曰檀越素既多疾頃者肌色微損即吉之後猶未復膳若以無益傷生豈所望於得理弘微答曰衣冠之變禮不可踰在心之哀實未能已遂廢食感咽歔欷不自勝弘微少孤事兄如父兄弟友穆之至舉世莫及也弘微口不言人短長而曜好臧否人物曜每言論弘微常以它語亂之六年東宮始建領中庶子又尋加侍中弘微志在素宦畏忌權寵固讓不拜乃聽解中庶子每有獻替及論時事必手書焚草人莫之知上以弘微能營膳羞嘗就求食弘微與親故經營既進之後親人問上所御弘微不答別以餘語酬之時人比漢世孔光八年秋有疾解右衛領太子右衛率還家議欲解弘微侍中以率加吏部尚書固陳疾篤得免九年東鄉君薨資財巨萬園宅十餘所又會稽吳興琅邪諸處太傅司空琰時事業奴僮猶有數百人公私咸謂室內資財宜歸二女田宅僮僕應屬弘微弘微一無所取自以私祿營葬混女夫殷睿素好樗蒱聞弘微不取財物乃濫奪其妻妹及伯母兩姑之分以還戲責內人皆化弘微之讓一無所爭弘微舅子領軍將軍劉湛性不堪其非謂弘微曰天下事宜有裁衷卿此不治何以治官弘微笑而不答或有譏之曰謝氏纍世財産充殷君一朝戲責理之不允莫此為大卿親而不言譬棄物江海以為廉耳設使立清名而令家內不足亦吾所不取也弘微曰親戚爭財為鄙之甚今內人尚能無言豈可導之使爭今分多共少不至有乏身死之後豈復見關東鄉君葬混墓開弘微牽疾臨赴病遂甚十年卒時年四十二時有一長鬼寄司馬文宣家云受遣殺弘微弘微疾增劇輒豫告文宣弘微既死與文宣分別而去弘微臨終語左右曰有二封書須劉領軍至可於前燒之慎勿開也書皆是太祖手勑上甚痛惜之使二衛千人營畢葬事追贈太常子莊別有傳王球字倩玉琅邪臨沂人太常惠從父弟也父謐司徒球少與惠齊名美容止除著作佐郎不拜尋除琅邪王大司馬行參軍轉主簿豫章公世子中軍功曹宋國建初拜世子中舍人高祖受命仍為太子中舍人宜都王友轉咨議參軍以疾去職元嘉四年起為義興太守從兄弘為揚州服親不得相臨加宣威將軍在郡有寬惠之美徙太子右衛率入為侍中領冠軍將軍又領本州大中正徙中書令侍中如故遷吏部尚書球公子簡貴素不交遊筵席虛靜門無異客尚書僕射殷景仁領軍劉湛並執重權傾動內外球雖通家姻戚未嘗往來頗好文義唯與琅邪顏延之相善居選職接客甚希不視求官書疏而銓衡有序朝野稱之本多羸疾屢自陳解遷光祿大夫加金章紫綬領廬陵王師兄子履進利為行深結劉湛委誠大將軍彭城王義康與劉斌孔胤秀等並有異志球每訓厲不納自大將軍從事中郎轉太子中庶子流涕訴義康不願違離以此復為從事中郎太祖甚銜之及湛誅之夕履徒跣告球球命為取履先溫酒與之謂曰常日語汝何如履怖懼不得答球徐曰阿父在汝亦何憂命左右扶郎還齋上以球故履得免死廢於家十七年球復為太子詹事大夫王師如故未拜會殷景仁卒因除尚書僕射王師如故素有腳疾録尚書江夏王義恭謂尚書何尚之曰當今乏才羣下宜加勠力而王球放恣如此恐宜以法糾之尚之曰球有素尚加又多疾應以淡退求之未可以文案責也猶坐白衣領職時羣臣詔見多不即前卑疏者或至數十日大臣亦有十餘日不被見者唯球輒去未嘗肯停十八年卒時年四十九追贈特進金紫光祿大夫加散騎常侍無子從孫奐為後大明末吳興太守或人問史臣曰王惠何如答之曰令明簡又問王球何如答曰倩玉淡又問謝弘微何如曰簡而不失淡而不流古之所謂名臣弘微當之矣
