body:
  text: 宋書卷六十三列傳第二十三王華王曇首殷景仁沈演之王華字子陵琅邪臨沂人太保弘從祖弟也祖薈衛將軍會稽內史父廞太子中庶子司徒左長史居在吳晉隆安初王恭起兵討王國寶時廞丁母憂在家恭檄令起兵廞即聚衆應之以女為貞烈將軍以女人為官屬國寶既死恭檄廞罷兵廞起兵之際多所誅戮至是不復得已因舉兵以討恭為名恭遣劉牢之擊廞廞敗走不知所在長子泰為恭所殺華時年十三在軍中與廞相失隨沙門釋曇永逃竄時牢之搜檢覔華甚急曇永使華提衣幞隨後津邏咸疑焉華行遲永呵罵云奴子怠懈行不及我以杖捶華數十衆乃不疑由此得免遇赦還吳少有志行以父存亡不測布衣蔬食不交遊如此十餘年為時人所稱美高祖欲收其才用乃發廞喪問使華制服服闋高祖北伐長安領鎮西將軍北徐州刺史辟華為州主簿仍轉鎮西主簿治中從事史歷職著稱太祖鎮江陵以為西中郎主簿遷咨議參軍領録事太祖進號鎮西復隨府轉太祖未親政政事悉委司馬張邵華性尚物不欲人在己前邵性豪每行來常引夾轂華出入乘牽車從者不過二三以矯之嘗於城內相逢華陽不知是邵謂左右此鹵簿甚盛必是殿下出行乃下牽車立於道側及邵至乃驚邵白服登城為華所糾坐被徵華代為司馬南郡太守行府州事太祖入奉大統以少帝見害疑不敢下華建議曰羡之等受寄崇重未容便敢背德廢主若存慮其將來受禍致此殺害蓋由每生情多寧敢一朝頓懷逆志且三人勢均莫相推伏不過欲握權自固以少主仰待耳今日就徵萬無所慮太祖從之留華總後任上即位以華為侍中領驍騎將軍未拜轉右衛將軍侍中如故先是會稽孔寧子為太祖鎮西咨議參軍以文義見賞至是為黃門侍郎領步兵校尉寧子先為高祖太尉主簿陳損益曰隆化之道莫先於官得其才枚卜之方莫若人慎其舉雖復因革不同損益有物求賢審官未之或改師錫僉曰煥乎欽明之誥拔茅征吉著於幽賁之爻晉師有成瓜衍作賞楚乘無入蒍賈不賀今舊命惟新幽人引領韶之盡美已備於振綱武之未盡或存於理目雖九官之職未可備舉親民之選尤宜在先愚欲使天朝四品官外及守牧各舉一人堪為二千石長吏者以付選官隨缺用得賢受賞失舉任罰夫惟帝之難豈庸識所易然舉爾所知非求多人因百官之明孰與一識之見執咎在己豈容徇物之私今非以選曹所銓果於乖謬衆職所舉必也惟良蓋宜使求賢闢其廣塗考績取其少殿若才實拔羣進宜尚德治阿之宰不必計年免徒之守豈限資秩自此以還故當才均以資資均以地宰蒞之官誠曰吏職然監觀民瘼翼化宣風則隱厚之求急於刀筆能事之功接於德心以此論才行之年歲豈惟政無秕蠹民庇手足而已將使公路日清私請漸塞士多心競仁必由己處士砥自求之節仕子藏交馳之情寧子庸微不識治體冒昧陳愚退懼違謬寧子與華並有富貴之願自羡之等秉權日夜構之於太祖寧子嘗東歸至金昌亭左右欲泊船寧子命去之曰此弒君亭不可泊也華每間居諷詠常誦王粲登樓賦曰冀王道之一平假高衢而騁力出入逢羡之等每切齒憤吒歎曰當見太平時不元嘉二年寧子病卒三年誅羡之等華遷護軍侍中如故宋世惟華與南陽劉湛不為飾讓得官即拜以此為常華以情事異人未嘗預宴集終身不飲酒有燕不之詣若宜有論事者乘車造門主人出車就之及王弘輔政而弟曇首為太祖所任與華相埒華嘗謂己力用不盡每歎息曰宰相頓有數人天下何由得治四年卒時年四十三追贈散騎常侍衛將軍九年上思誅羡之之功追封新建縣侯食邑千戶諡曰宣侯世祖即位配饗太祖廟庭子定侯嗣官至左衛將軍卒子長嗣太宗泰始二年坐罵母奪爵以長弟終紹封後廢帝元徽三年終上表乞以封還長許之齊受禪國除華從父弟鴻五兵尚書會稽太守王曇首琅邪臨沂人太保弘少弟也幼有業尚除著作郎不就兄弟分財曇首唯取圖書而已辟琅邪王大司馬屬從府公修復洛陽園陵與從弟球俱詣高祖時謝晦在坐高祖曰此君並膏粱盛德乃能屈志戎旅曇首答曰既從神武之師自使懦夫有立志晦曰仁者果有勇高祖悅行至彭城高祖大會戲馬臺豫坐者皆賦詩曇首文先成高祖覽讀因問弘曰卿弟何如卿弘答曰若但如民門戶何寄高祖大笑曇首有識局智度喜慍不見於色閨門之內雍雍如也手不執金玉婦女不得為飾玩自非祿賜所及一毫不受於人太祖為冠軍徐州刺史留鎮彭城以曇首為府功曹太祖鎮江陵自功曹為長史隨府轉鎮西長史高祖甚知之謂太祖曰王曇首沈毅有器度宰相才也汝每事咨之景平中有龍見西方半天騰上廕五綵雲京都遠近聚觀太史奏曰西方有天子氣太祖入奉大統上及議者皆疑不敢下曇首與到彥之從兄華固勸上猶未許曇首又固陳并言天人符應上乃下率府州文武嚴兵自衛臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀在平乘戶外不解帶者數旬既下在道有黃龍出負上所乘舟左右皆失色上謂曇首曰此乃夏禹所以受天命我何德以堪之及即位又謂曇首曰非宋昌獨見無以致此以曇首為侍中尋領右衛將軍領驍騎將軍以朱容子為右軍將軍誅徐羡之等平謝晦曇首及華之力也元嘉四年車駕出北堂嘗使三更竟開廣莫門南臺云應須白虎幡銀字棨不肯開門尚書左丞羊玄保奏免御史中丞傅隆以下曇首繼啓曰既無墨敕又闕幡棨雖稱上旨不異單刺元嘉元年二年雖有再開門例此乃前事之違今之守舊未為非禮但既據舊史應有疑却本末曾無此狀猶宜反咎其不請白虎幡銀字棨致門不時開由尚書相承之失亦合糾正上特無所問更立科條遷太子詹事侍中如故晦平後上欲封曇首等會宴集舉酒勸之因拊御牀曰此坐非卿兄弟無復今日時封詔已成出以示曇首曇首曰近日之事釁難將成賴陛下英明速斷故罪人斯戮臣等雖得仰憑天光效其毫露豈可因國之災以為身幸陛下雖欲私臣當如直史何上不能奪故封事遂寢時兄弘録尚書事又為揚州刺史曇首為上所親委任兼兩宮彭城王義康與弘並録意常怏怏又欲得揚州形於辭旨以曇首居中分其權任愈不悅曇首固乞吳郡太祖曰豈有欲建大厦而遺其棟梁者哉賢兄比屢稱疾固辭州任將來若相申許者此處非卿而誰亦何吳郡之有時弘久疾屢遜位不許義康謂賓客曰王公久疾不起神州詎合臥治曇首勸弘減府兵力之半以配義康義康乃悅七年卒太祖為之慟中書舍人周赳侍側曰王家欲衰賢者先殞上曰直是我家衰耳追贈左光祿大夫加散騎常侍詹事如故九年以預誅羡之等謀追封豫寧縣侯邑千戶諡曰文侯世祖即位配饗太祖廟庭子僧綽嗣別有傳少子僧虔升明末為尚書令殷景仁陳郡長平人也曾祖融晉太常祖茂散騎常侍特進左光祿大夫父道裕蚤亡景仁少有大成之量司徒王謐見而以女妻之初為劉毅後軍參軍高祖太尉行參軍建議宜令百官舉才以所薦能否為黜陟遷宋臺祕書郎世子中軍參軍轉主簿又為驃騎將軍道憐主簿出補衡陽太守入為宋世子洗馬仍轉中書侍郎景仁學不為文敏有思致口不談義深達理體至於國典朝儀舊章記注莫不撰録識者知其有當世之志也高祖甚知之遷太子中庶子少帝即位入補侍中纍表辭讓又固陳曰臣志幹短弱歷著出處值皇塗隆泰身荷恩榮階牒推遷日月頻積失在叨餮患不自量而奉聞今授固守愚心者竊惟殊次之寵必歸器望喉脣之任非才莫居三省諸躬無以克荷豈可苟順甘榮不知進退上虧朝舉下貽身咎求之公私未見其可顧涯審分誠難庶幾踰方越序易以誡懼所以俯仰周偟無地寧處若惠澤廣流蘭艾同潤回改前旨賜以降階雖實不敏敢忘循命臣忤違之愆既已屢積寧當徒尚浮采塵黷天聽丹情悾款仰希照察詔曰景仁退挹之懷有不可改除黃門侍郎以申君子之請尋領射聲頃之轉左衛將軍太祖即位委遇彌厚俄遷侍中左衛如故時與侍中右衛將軍王華侍中驍騎將軍王曇首侍中劉湛四人並時為侍中俱居門下皆以風力局幹冠冕一時同升之美近代莫及元嘉三年車駕征謝晦司徒王弘入居中書下省景仁長直共掌留任晦平代到彥之為中領軍侍中如故太祖所生章太后早亡上奉太后所生蘇氏甚謹六年蘇氏卒車駕親往臨哭下詔曰朕夙罹偏罰情事兼常每思有以光隆懿戚少申罔極之懷而禮文遺逸取正無所監之前代用否又殊故惟疑纍年在心未遂蘇夫人奄至傾殂情禮莫寄追思遠恨與事而深日月有期將卜窀穸便欲粗依春秋以貴之義式遵二漢推恩之典但動藉史筆傳之後昆稱心而行或容未允可時共詳論以求其中執筆永懷益增感塞景仁議曰至德之感靈啓厥祥文母俔天實熙皇祚主上聿遵先典號極徽崇以貴之義禮盡於此蘇夫人階緣戚屬情以事深寒泉之思實感聖懷明詔爰發詢求厥中謹尋漢氏推恩加爵于時承秦之弊儒術蔑如自君作故罔或前典懼非盛明所宜軌蹈晉監二代朝政之所因君舉必書哲王之所慎體至公者懸爵賞於無私奉天統者每屈情以申制所以作孚萬國貽則後昆臣豫蒙博逮謹露庸短上從之丁母憂葬竟起為領軍將軍固辭上使綱紀代拜遣中書舍人周赳輿載還府九年服闋遷尚書僕射太子詹事劉湛代為領軍與景仁素善皆被遇於高祖俱以宰相許之湛尚居外任會王弘華曇首相係亡景仁引湛還朝共參政事湛既入以景仁位遇本不踰己而一旦居前意甚憤憤知太祖信仗景仁不可移奪乃深結司徒彭城王義康欲倚宰相之重以傾之十二年景仁復遷中書令護軍僕射如故尋復以僕射領吏部護軍如故湛愈忿怒義康納湛言毀景仁於太祖太祖遇之益隆景仁對親舊歎曰引之令入入便噬人乃稱疾解職表疏纍上不見許使停家養病發詔遣黃門侍郎省疾湛議遣人若劫盜者於外殺之以為太祖雖知當有以終不能傷至親之愛上微聞之遷景仁於西掖門外晉鄱陽主第以為護軍府密邇宮禁故其計不行景仁臥疾者五年雖不見上而密表去來日中以十數朝政大小必以問焉影迹周密莫有窺其際者收湛之日景仁使拂拭衣冠寢疾既久左右皆不曉其意其夜上出華林園延賢堂召景仁猶稱腳疾小牀輿以就坐誅討處分一皆委之代義康為揚州刺史僕射領吏部如故遣使者授印綬主簿代拜拜畢便覺其情理乖錯性本寬厚而忽更苛暴問左右曰今年男婚多女嫁多是冬大雪景仁乘輿出聽事觀望忽驚曰當閣何得有大樹既而曰我誤邪疾轉篤太祖謂不利在州司使還住僕射下省為州凡月餘卒或云見劉湛為祟時年五十一追贈侍中司空本官如故諡曰文成公上與荊州刺史衡陽王義季書曰殷僕射疾患少日奄忽不救其識具經遠奉國竭誠周遊繾綣情兼常痛民望國器遇之為難惋歎之深不能已已汝亦同不往矣如何世祖大明五年行幸經景仁墓詔曰司空文成公景仁德量淹正風識明允徽績忠謨夙達先照惠政茂譽實留民屬近瞻丘墳感往興悼可遣使致祭子道矜幼而不慧官至太中大夫道矜子太宗世為侍中度支尚書屬父疾積久為有司所奏詔曰道矜生便有病無更橫疾因愚習惰久妨清序可降為散騎常侍沈演之字臺真吳興武康人也高祖充晉車騎將軍吳國內史曾祖徑冠軍陳祐長史戍金墉城為鮮卑慕容恪所陷不屈節見殺追贈東陽太守祖赤黔廷尉卿父叔任少有幹質初為揚州主簿高祖太尉參軍吳山陰令治皆有聲朱齡石伐蜀為齡石建威府司馬加建威將軍平蜀之功亞於元帥即本號為西夷校尉巴西梓潼郡太守戍涪城東軍既反二郡強宗侯勱羅奧聚衆作亂四面雲合遂至萬餘人攻城急叔任東兵不滿五百推布腹心衆莫不為用出擊大破之逆黨皆平高祖討司馬休之齡石遣叔任率軍來會時高祖領鎮西將軍命為司馬及軍還以為揚州別駕從事史以平蜀全涪之功封寧新縣男食邑四百四十戶出為建威將軍益州刺史以疾還都義熙十四年卒時年五十長子融之蚤卒演之年十一尚書僕射劉柳見而知之曰此童終為令器家世為將而演之折節好學讀老子日百遍以義理業尚知名襲父別爵吉陽縣五等侯郡命主簿州辟從事史西曹主簿舉秀才嘉興令有能名入為司徒祭酒南譙王義宣左軍主簿錢唐令復有政績復為司徒主簿丁母憂起為武康令固辭不免到縣百許日稱疾去官服闋除司徒左西掾州治中從事史元嘉十二年東諸郡大水民人飢饉吳義興及吳郡之錢唐升米三百以演之及尚書祠部郎江邃並兼散騎常侍巡行拯恤許以便宜從事演之乃開倉廩以賑飢民民有生子者口賜米一斗刑獄有疑枉悉制遣之百姓蒙賴轉別駕從事史領本郡中正深為義康所待故在府州前後十餘年後劉湛劉斌等結黨欲排廢尚書僕射殷景仁演之雅仗正義與湛等不同湛因此讒之於義康嘗因論事不合旨義康變色曰自今而後我不復相信演之與景仁素善盡心於朝庭太祖甚嘉之以為尚書吏部郎十七年義康出藩誅湛等以演之為右衛將軍景仁尋卒乃以後軍長史范曄為左衛將軍與演之對掌禁旅同參機密二十年遷侍中右衛將軍如故太祖謂之曰侍中領衛望實優顯此蓋宰相便坐卿其勉之上欲伐林邑朝臣不同唯廣州刺史陸徽與演之贊成上意及平賜羣臣黃金生口銅器等物演之所得偏多上謂之曰廟堂之謀卿參其力平此遠夷未足多建茅土俟廓清京都鳴鸞東岱不憂河山不開也二十一年詔曰總司戎政翼贊東朝惟允之舉匪賢莫授侍中領右衛將軍演之清業貞審器思沈濟右衛將軍曄才應通敏理懷清要並美彰出內誠亮在公能克懋厥猷樹績所蒞演之可中領軍曄可太子詹事曄懷逆謀演之覺其有異言之太祖曄尋事發伏誅遷領國子祭酒本州大中正轉吏部尚書領太子右衛率雖未為宰相任寄不異也素有心氣疾病歷年上使臥疾治事性好舉才申濟屈滯而謙約自持上賜女伎不受二十六年車駕拜京陵演之以疾不從上還宮召見自勉到坐出至尚書下省暴卒時年五十三太祖痛惜之追贈散騎常侍金紫光祿大夫諡曰貞侯演之昔與同使江邃字玄遠濟陽考城人頗有文義官至司徒記室參軍撰文釋傳於世演之子睦至黃門郎通直散騎常侍世祖大明初坐要引上左右俞欣之訪評殿省內事又與弟西陽王文學勃忿不睦坐徙始興郡勃免官禁錮勃好為文章善彈琴能圍而輕薄逐利歷尚書殿中郎太宗泰始中為太子右衛率加給事中時欲北討使勃還鄉里募人多受貨賄上怒下詔曰沈勃琴書藝業口有美稱而輕躁耽酒幼多罪愆比奢淫過度妓女數十聲酣放縱無復劑限自恃吳興土豪比門義故脅説士庶告索無已又輒聽募將委役還私託注病叛遂有數百周旋門生競受財貨少者至萬多者千金考計贓物二百餘萬便宜明罰敕法以正典刑故光祿大夫演之昔受深遇忠績在朝尋遠矜懷能無弘律可徙勃西垂令一思愆悔於是徙付梁州廢帝元徽初以例得還結事阮佃夫王道隆等復為司徒左長史為廢帝所誅順帝即位追贈本官勃弟統大明中為著作佐郎先是五省官所給幹僮不得雜役太祖世坐以免官者前後百人統輕役過差有司奏免世祖詔曰自頃幹僮多不祗給主可量聽行杖得行幹杖自此始也演之兄融之子暢之襲寧新縣男大明中為海陵王休茂北中郎咨議參軍為休茂所殺追贈黃門郎子曄嗣齊受禪國除史臣曰元嘉初誅滅宰相蓋王華孔寧子之力也彼羣公義雖往結恩實今疏而任即曩權意非昔主居上六之窮爻當來寵之要轍顛覆所基非待他釁況於廢殺之重其隙易乘乎夫殺人而取其璧不知在己興纍傾物而移其寵不忌自我難持若二子永年亦未知來禍所止也有能戒彼而悟此則所望於來哲
