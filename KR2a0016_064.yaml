body:
  text: 宋書卷六十四列傳第二十四鄭鮮之裴松之何承天鄭鮮之字道子滎陽開封人也高祖渾魏將作大匠祖襲大司農父遵尚書郎襲初為江乘令因居縣境鮮之下帷讀書絕交游之務初為桓偉輔國主簿先是兗州刺史滕恬為丁零翟遼所沒屍喪不反恬子羨仕宦不廢議者嫌之桓玄在荊州使羣僚博議鮮之議曰名教大極忠孝而已至乎變通抑引每事輒殊本而尋之皆是求心而遺跡跡之所乘遭遇或異故聖人或就跡以助教或因跡以成罪屈申與奪難可等齊舉其阡陌皆可略言矣天可逃乎而伊尹廢君君可脅乎而鬻權見善忠可愚乎而箕子同仁自此以還殊實而齊聲異譽而等美者不可勝言而欲令百代之下聖典所闕正斯事於一朝豈可易哉然立言明理以古證今當使理厭人情如滕羨情事者或終身隱處不關人事或昇朝理務無譏前哲通滕者則以無譏為證塞滕者則以隱處為美折其兩中則異同之情可見矣然無譏前哲者厭情之謂也若王陵之母見烹於楚陵不退身窮居終為社稷之臣非為榮也鮑勛蹇諤魏朝亡身為效觀其志非貪爵也凡此二賢非滕之諭夫聖人立教猶云有禮無時君子不行有禮無時政以事有變通不可守一故耳若滕以此二賢為證則恐人人自賢矣若不可人人自賢何可獨許其證譏者兼在於人不但獨證其事漢魏以來記闕其典尋而得者無幾人至乎大晉中朝及中興之後楊臻則七年不除喪三十餘年不關人事溫公則見逼於王命庾左丞則終身不著袷高世遠則為王右軍何驃騎所勸割無有如滕之易者也若以縗麻非為哀之主無所復言矣文皇帝以東關之役尸骸不反者制其子弟不廢婚宦明此孝子已不自同於人倫有識已審其可否矣若其不爾居宗輔物者但當即聖人之教何所復明制於其間哉及至永嘉大亂之後王敦復申東關之制於中興原此是為國之大計非謂訓範人倫盡於此也何以言之父讎明不同戴天日而為國不可許復讎此自以法奪情即是東關永嘉之喻也何妨綜理王務者布衣以處之明教者自謂世非橫流凡士君子之徒無不可仕之理而雜以情譏謂宜在貶裁耳若多引前事以為通證則孝子可顧法而不復讎矣文皇帝無所立制於東關王敦無所明之於中興每至斯會輒發之於宰物是心可不喻乎且夫求理當先以遠大若滄海橫流家國同其淪溺若不仕也則人有餘力人有餘力則國可至乎亡家可至乎滅當斯時也匹婦猶亡其身況大丈夫哉既其不然天下之才將無所理滕但當盡陟岵之哀擬不仕者之心何為證喻前人以自通乎且名為大才之所假而小才之所榮榮與假乘常已有慚德無欣工進何有情事乎若其不然則工進無欣何足貴於千載之上邪苟許小才榮其位則滕不當顧常疑以自居乎所謂柳下惠則可我則不可也且有生之所宗者聖人聖人之為教者禮法即心而言則聖人之法不可改也而秦以郡縣治天下莫之能變漢文除肉刑莫之能復彼聖人之為法猶見改於後王況滕賴前人而當必通乎若人皆仕未知斯事可俟後聖與不況仕與不仕各有其人而不仕之所引每感三年之下見議者弘通情紀每傍中庸又云若許譏滕則恐亡身致命之仕以此而不盡何斯言之過與夫忠烈之情初無計而後動若計而後動則懼法不盡命若有不盡則國有常法故古人軍敗於外而家誅於內苟忠發自內或懼法於外復有踟顧望之地邪若有功不賞有罪不誅可致斯喻耳無有名教翼其子弟而子弟不致力於所天不致力於所天則王經忠不能救主孝不顧其親是家國之罪人耳何所而稱乎夫恩宥十世非不隆也功高賞厚非不報也若國憲無負於滕恬則羨之通塞自是名教之所及豈是勸沮之本乎議者又以唐虞邈矣孰知所歸尋言求意將所負者多乎後漢亂而不亡前史猶謂數公之力魏國將建荀令君正色異議董昭不得枕蘇則之膝賈充受辱於庾純以此而推天下之正義終自傳而不沒何為發斯歎哉若以時非上皇便不足復言多者則夷齊於奭望子房於四人亦無所復措其言矣至於陳平默順避禍以權濟屈皆是衞生免害非為榮也滕今生無所衞鞭塞已冥義安在乎昔陳壽在喪使婢丸藥見責鄉閭阮咸居哀騎驢偷婢身處王朝豈可以阮獲通於前世便無疑於後乎且賢聖抑引皆是究其始終定其才行故雖事有驚俗而理必獲申郤詵葬母後園而身登宦所以免責以其孝也日磾殺兒無譏以其忠也今豈可以二事是忠孝之所為便可許殺兒葬母後園乎不可明矣既其不可便當究定滕之才行無所多辯也滕非下官鄉親又不周旋才能非所能悉若以滕謀能決敵才能周用此自追蹤古人非議所及若是士流故謂宜如子夏受曾參之詞可謂善矣而子夏無不孝之稱也意之所懷都盡於此自非名理何緣多其往復如其折中裁之居宗桓偉進號安西轉補功曹舉陳郡謝絢自代曰蓋聞知賢弗推臧文所以竊位宣子能讓晉國以之獲寧鮮之猥承人乏謬蒙過眷既恩以義隆遂再叨非服知進之難屢以上請然自退之志未獲暫申夙夜懷冰敢忘其懼伏見行參軍謝絢清悟審正理懷通美居以端右雖未足舒其采章升庸以漸差可以位擬人請乞愚短甘充下列授為賢牧實副羣望入為員外散騎侍郎司徒左西屬大司馬琅邪王錄事參軍仍遷御史中丞性剛直不阿強貴明憲直繩甚得司直之體外甥劉毅權重當時朝野莫不歸附鮮之盡心高祖獨不屈意於毅毅甚恨焉義熙六年鮮之使治書侍御史丘洹奏彈毅曰上言傳詔羅道盛輒開牋遂盜發密事依法棄市奏報行刑而毅以道盛身有侯爵輒復停宥桉毅勳德光重任居次相既殺之非己無緣生之自由又奏之於先而弗請於後閫外出疆非此之謂中丞鮮之於毅舅甥制不相糾臣請免毅官詔無所問時新制長吏以父母疾去官禁錮三年山陰令沈叔任父疾去職鮮之因此上議曰夫事有相權故制有與奪此有所屈而彼有所申未有理無所明事無所獲而為永制者也當以去官之人或容詭託之事詭託之事誠或有之豈可虧天下之大教以末傷本者乎且設法蓋以衆苞寡而不以寡違衆況防杜去官而塞孝愛之實且人情趨於榮利辭官本非所防所以為其制者莅官不久則奔競互生故杜其欲速之情以申考績之實今省父母之疾而加以罪名悖義疾理莫此為大謂宜從舊於義為允從之於是自二品以上父母沒者墳墓崩毀及疾病族屬輒去並不禁錮劉毅當鎮江陵高祖會於江寧朝士畢集毅素好摴蒱於是會戲高祖與毅斂局各得其半積錢隱人毅呼高祖併之先擲得雉高祖甚不說良久乃答之四坐傾矚既擲五子盡黑毅意色大惡謂高祖曰知公不以大坐席與人鮮之大喜徒跣繞牀大叫聲聲相續毅甚不平謂之曰此鄭君何為者無復甥舅之禮高祖少事戎旅不經涉學及為宰相頗慕風流時或言論人皆依違之不敢難也鮮之難必切至未嘗寬假要須高祖辭窮理屈然後置之高祖或有時慚恧變色動容既而謂人曰我本無術學言義尤淺比時言論諸賢多見寬容唯鄭不爾獨能盡人之意甚以此感之時人謂為格佞自中丞轉司徒左長史太尉諮議參軍俄而補侍中復為太尉諮議十二年高祖北伐以為右長史鮮之曾祖墓在開封相去三百里乞求拜省高祖以騎送之宋國初建轉奉常佛佛虜陷關中高祖復欲北討行意甚盛鮮之上表諫曰伏思聖略深遠臣之愚管無所措其意然臣愚見竊有所懷虜凶狡情狀可見自關中再敗皆是帥師違律非是內有事故致外有敗傷虜聞殿下親御六軍必謂見伐當重兵守潼關其勢然也若陵威長驅臣實見其未易若輿駕頓洛則不足上勞聖躬如此則進退之機宜在熟慮賊不敢乘勝過陝遠懾大威故也今盡用兵之算事從屈申遣師撲討而南夏清晏賊方懼將來永不敢動若輿駕造洛而反凶醜更生揣量之心必啟邊戎之患此既必然江南顒顒傾注輿駕忽聞遠伐不測師之深淺必以殿下大申威靈未還人情恐懼事又可推往年西征劉鍾危殆前年劫盜破廣州人士都盡三吳心腹之內諸縣屢敗皆由勞役所致又聞處處大水加遠師民敝敗散自然之理殿下在彭城劫盜破諸縣事非偶爾皆是無賴凶慝凡順而撫之則百姓思安違其所願必為亂矣古人所以救其煩穢正在於斯漢高身困平城呂后受匈奴之辱魏武軍敗赤壁宣武喪師枋頭神武之功一無所損況偏師失律無虧於廟堂之上者邪即之事實非敗之謂唯齡石等可念耳若行也或速其禍反覆思惟愚謂不煩殿下親征小劫西虜或為河洛之患今正宜通好北虜則河南安河南安則濟泗靜伏願聖鑑察臣愚懷高祖踐阼遷太常都官尚書鮮之為人通率在高祖坐言無所隱時人甚憚焉而隱厚篤實贍卹親故性好游行命駕或不知所適隨御者所之尤為高祖所狎上嘗於內殿宴飲朝貴畢至唯不召鮮之坐定謂羣臣曰鄭鮮之必當自來俄而外啟尚書鮮之詣神虎門求啟事高祖大笑引入其被親遇如此永初二年出為丹陽尹復入為都官尚書加散騎常侍以從征功封龍陽縣五等子出為豫章太守秩中二千石元嘉三年王弘入為相舉鮮之為尚書右僕射四年卒時年六十四追贈散騎常侍金紫光祿大夫文集傳於世子愔位至尚書郎始興太守裴松之字世期河東聞喜人也祖昧光祿大夫父珪正員外郎松之年八歲學通論語毛詩博覽墳籍立身簡素年二十拜殿中將軍此官直衞左右晉孝武太元中革選名家以參顧問始用琅邪王茂之會稽謝輶皆南北之望舅庾楷在江陵欲得松之西上除新野太守以事難不行拜員外散騎侍郎義熙初為吳興故鄣令在縣有績入為尚書祠部郎松之以世立私碑有乖事實上表陳之曰碑銘之作以明示後昆自非殊功異德無以允應茲典大者道勳光遠世所宗推其次節行高妙遺烈可紀若乃亮采登庸績用顯著敷化所莅惠訓融遠述詠所寄有賴鐫勒非斯族也則幾乎僭黷矣俗敝偽興華煩已久是以孔悝之銘行是人非蔡邕制文每有愧色而自時厥後其流彌多預有臣吏必為建立勒銘寡取信之實刊石成虛偽之常真假相蒙殆使合美者不貴但論其功費又不可稱不加禁裁其敝無已以為諸欲立碑者宜悉令言上為朝議所許然後聽之庶可以防遏無徵顯彰茂實使百世之下知其不虛則義信於仰止道孚於來葉由是並斷高祖北伐領司州刺史以松之為州主簿轉治中從事史既克洛陽松之居州行事宋國初建毛德祖使洛陽高祖敕之曰裴松之廊廟之才不宜久尸邊務今召為世子洗馬與殷景仁同可令知之于時議立五廟樂松之以妃臧氏廟樂亦宜與四廟同除零陵內史徵為國子博士太祖元嘉三年誅司徒徐羨之等分遣大使巡行天下通直散騎常侍袁渝司徒左西掾孔邈使揚州尚書三公郎陸子真起部甄法崇使荊州員外散騎常侍范雍司徒主簿龐遵使南兗州前尚書右丞孔默使南北二豫州撫軍參軍王歆之使徐州冗從僕射車宗使青兗州松之使湘州尚書殿中郎阮長之使雍州前竟陵太守殷道鸞使益州員外散騎常侍李耽之使廣州郎中殷斌使梁州南秦州前員外散騎侍郎阮園客使交州駙馬都尉奉朝請潘思先使寧州並兼散騎常侍班宣詔書曰昔王者巡功羣后述職不然則有存省之禮聘覜之規所以觀民立政命事考績上下偕通遐邇咸被故能功昭長世道歷遠年朕以寡闇屬承洪業夤畏在位昧于治道夕惕惟憂如臨淵谷懼國俗陵頹民風凋偽眚厲違和水旱傷業雖躬勤庶事思弘攸宜而機務惟殷顧循多闕政刑乖謬未獲具聞豈誠素弗孚使羣心莫盡納隍之愧在予一人以歲時多難王道未壹卜征之禮廢而未修眷彼氓庶無忘攸恤今使兼散騎常侍渝等申令四方周行郡邑親見刺史二千石官長申述至誠廣詢治要觀察吏政訪求民隱旌舉操行存問所疾禮俗得失一依周典每各為書還具條奏俾朕昭然若親覽焉大夫君子其各悉心敬事無惰乃力其有咨謀遠圖謹言中誠陳之使者無或隱遺方將敬納良規以補其闕勉哉勗之稱朕意焉松之反使奏曰臣聞天道以下濟光明君德以廣運為極古先哲后因心溥被是以文思在躬則時雍自洽禮行江漢而美化斯遠故能垂大哉之休詠廓造周之盛則伏惟陛下神叡玄通道契曠代冕旒華堂垂心八表咨敬敷之未純慮明揚之靡暢清問下民哀此魚眾寡渙焉大號周爰四達遠猷形於雅誥惠訓播乎遐陬是故率土仰詠重譯咸說莫不謳吟踊躍式銘皇風或有扶老攜幼稱歡路左誠由亭毒既流故忘其自至千載一時於是乎在臣謬蒙銓任忝厠顯列猥以短乏思純八表無以宣暢聖旨肅明風化黜陟無序搜揚寡聞慚懼屏營不知所措奉二十四條謹隨事為牒伏見癸卯詔書禮俗得失一依周典每各為書還具條奏謹依事為書以繫之後松之甚得奉使之義論者美之轉中書侍郎司冀二州大中正上使注陳壽三國志松之鳩集傳記增廣異聞既成奏上上善之曰此為不朽矣出為永嘉太守勤恤百姓吏民便之入補通直為常侍復領二州大中正尋出為南琅邪太守十四年致仕拜中散大夫尋領國子博士進太中大夫博士如故續何承天國史未及撰述二十八年卒時年八十子駰南中郎參軍松之所著文論及晉紀駰注司馬遷史記並行於世何承天東海郯人也從祖倫晉右衞將軍承天五歲失父母徐氏廣之姊也聰明博學故承天幼漸訓義儒史百家莫不該覽叔父為益陽令隨之官隆安四年南蠻校尉桓偉命為參軍時殷仲堪桓玄等互舉兵以向朝廷承天懼禍難未已解職還益陽義旗初長沙公陶延壽以為其輔國府參軍遣通敬於高祖因除瀏陽令尋去職還都撫軍將軍劉毅鎮姑孰版為行參軍毅嘗出行而鄢陵縣史陳滿射鳥箭誤中直帥雖不傷人處法棄市承天議曰獄貴情斷疑則從輕昔驚漢文帝乘輿馬者張釋之劾以犯蹕罪止罰金何者明其無心於驚馬也故不以乘輿之重加以異制今滿意在射鳥非有心於中人按律過誤傷人三歲刑況不傷乎微罰可也出補宛陵令趙惔為寧蠻校尉尋陽太守請為司馬尋去職高祖以為太尉行參軍高祖討劉毅留諸葛長民為監軍長民密懷異志劉穆之屏人問承天曰公今行濟否云何承天曰不憂西不時判別有一慮耳公昔年自左里還入石頭甚脫爾今還宜加重複穆之曰非君不聞此言頃日願丹徒劉郎恐不復可得也除太學博士義熙十一年為世子征虜參軍轉西中郎中軍參軍錢唐令高祖在壽陽宋臺建召為尚書祠部郎與傅亮共撰朝儀永初末補南臺治書侍御史謝晦鎮江陵請為南蠻長史時有尹嘉者家貧母熊自以身貼錢為嘉償責坐不孝當死承天議曰被府宣令普議尹嘉大辟事稱法吏葛滕籤母告子不孝欲殺者許之法云謂違犯教令敬恭有虧父母欲殺皆許之其所告惟取信於所求而許之謹尋事原心嘉母辭自求質錢為子還責嘉雖虧犯教義而熊無請殺之辭熊求所以生之而今殺之非隨所求之謂始以不孝為劾終於和賣結刑倚旁兩端母子俱罪滕籤法文為非其條嘉所存者大理在難申但明教爰發矜其愚蔽夫明德慎罰文王所以恤下議獄緩死中孚所以垂化言情則母為子隱語敬則禮所不及今捨乞宥之評依請殺之條責敬恭之節於飢寒之隸誠非罰疑從輕寧失有罪之謂也愚以謂降嘉之死以普春澤之恩赦熊之愆以明子隱之宜則蒲亭雖陋可比德於盛明䄡魚微物不獨遺於今化事未判值赦並免晦進號衞將軍轉諮議參軍領記室元嘉三年晦將見討其弟黃門郎石胡密信報之晦問承天曰若果爾卿令我云何承天曰以王者之重舉天下以攻一州大小既殊逆順又異境外求全上計也其次以腹心領兵戍於義陽將軍率衆於夏口一戰若敗即趨義陽以出北境其次也晦良久曰荊楚用武之國兵力有餘且當決戰走不晚也使承天造立表檄晦以湘州刺史張邵必不同己欲遣千人襲之承天以為邵意趨未可知不宜便討時邵兄茂度為益州與晦素善故晦止不遣兵前益州刺史蕭摹之前巴西太守劉道產去職還江陵晦將殺之承天盡力營救皆得全免晦既下承天留府不從及到彥之至馬頭承天自詣歸罪彥之以其有誠宥之使行南蠻府事七年彥之北伐請為右軍錄事及彥之敗退承天以才非軍旅得免刑責以補尚書殿中郎兼左丞吳興餘杭民薄道舉為劫制同籍朞親補兵道舉從弟代公道生等並為大功親非應在補讁之例法以代公等母存為朞親則子宜隨母補兵承天議曰尋劫制同籍朞親補兵大功不在此例婦人三從既嫁從夫夫死從子今道舉為劫若其叔尚存制應補讁妻子營居固其宜也但為劫之時叔父已沒代公道生並是從弟大功之親不合補讁今若以叔母為朞親令代公隨母補兵既違大功不讁之制又失婦人三從之道由於主者守朞親之文不辨男女之異遠嫌畏負以生此疑懼非聖朝恤刑之旨謂代公等母子並宜見原故司徒掾孔邈奏事未御邈已喪殯議者謂不宜仍用邈名更以見官奏之承天又議曰既沒之名不合奏者非有它義正嫌於近不祥耳奏事一郤動經歲時盛明之世事從簡易曲嫌細忌皆應蕩除承天為性剛愎不能屈意朝右頗以所長侮同列不為僕射殷景仁所平出為衡陽內史昔在西與士人多不協在郡又不公清為州司所糾被收繫獄值赦免十六年除著作佐郎撰國史承天年已老而諸佐郎並名家年少潁川荀伯子謿之常呼為嬭母承天曰卿當云鳳凰將九子嬭母何言邪尋轉太子率更令著作如故時丹陽丁況等久喪不葬承天議曰禮所云還葬當謂荒儉一時故許其稱財而不求備丁況三家數十年中葬輒無棺櫬實由淺情薄恩同於禽獸者耳竊以為丁寶等同伍積年未嘗勸之以義繩之以法十六年冬既無新科又未申明舊制有何嚴切欻然相糾或由鄰曲分爭以興此言如聞在東諸處此例既多江西淮北尤為不少若但讁此三人殆無整肅開其一端則互相恐動里伍縣司競為姦利財賂既逞獄訟必繁懼虧聖明烹鮮之美臣愚謂況等三家且可勿問因此附定制旨若民人葬不如法同伍當即糾言三年除服之後不得追相告列於事為宜十九年立國子學以本官領國子博士皇太子講孝經承天與中庶子顏延之同為執經頃之遷御史中丞時索虜侵邊太祖訪羣臣威戎御遠之略承天上表曰伏見北藩上事虜犯青兗天慈降鑑矜此黎元博逮羣策經綸戎政臣以愚陋預聞訪及竊尋獫狁告難爰自上古有周之盛南仲出車漢氏方隆衛霍宣力雖飲馬瀚海揚旍祁連事難役繁天下騷動委輸負海貲及舟車凶狡倔強未肯受弱得失報復裁不相補宣帝末年值其乖亂推亡固存始獲稽服自晉喪中原戎狄侵擾百餘年間未暇以北虜為念大宋啟祚兩燿靈武而懷德畏威用自款納陛下臨御以來羈縻遵養十餘年中貢譯不絕去歲三王出鎮思振遠圖獸心易駭遂生猜懼背違信約深搆攜隙貪禍恣毒無因自反恐烽燧之警必自此始臣素庸懦才不經武率其管窺謹撰安邊論意及淺末懼無可採若得詢之朝列辨覈同異庶或開引羣慮研盡衆謀短長畢陳當否可見其論曰漢世言備匈奴之策不過二科武夫盡征伐之謀儒生講和親之約課其所言互有遠志加塞漠之外胡敵掣肘必未能摧鋒引日規自開張當由往年冀土之民附化者衆二州臨境三王出藩經略既張宏圖將舉士女延望華夷慕義故昧於小利且自矜侈外示餘力內堅偽衆今若務存遵養許其自新雖未可羈致北闕猶足鎮靜邊境然和親事重當盡廟算誠非愚短所能究言若追蹤衛霍瀚海之志時事不等致功亦殊寇雖習戰來久又全據燕趙跨帶秦魏山河之險終古如一自非大田淮泗內實青徐使民有贏儲野有積穀然後分命方召總率虎旅精卒十萬使一舉盪夷則不足稍勤王師以勞天下何以言之今遺黎習亂志在偷安非皆恥為左衽遠慕冠冕徒以殘害剝辱視息無寄故繈負歸國先後相尋虜既不能校勝循理攻城略地而輕兵掩襲急在驅殘是其所以速怨召禍滅亡之日今若遣軍追討報其侵暴大翦幽冀屠城破邑則聖朝愛育黎元方濟之以道若但欲撫其歸附伐罪弔民則駿馬奔走不肯來征徒興巨費無損於彼復奇兵深入殺敵破軍苟陵患未盡則困獸思鬬報復之役將遂無已斯秦漢之末策輪臺之所悔也安邊固守於計為長臣以安邊之計備在史策李牧言其端嚴尤申其要大略舉矣曹孫之霸才均智敵江淮之間不居各數百里魏捨合肥退保新城吳城江陵移民南涘濡須之戍家停羨溪及襄陽之屯民夷散雜晉宣王以為宜徙沔南以實水北曹爽不許果亡柤中此皆前代之殷鑒也何者斥候之郊非畜牧之所轉戰之地非耕桑之邑故堅壁清野以俟其來整甲繕兵以乘其敝雖時有古今勢有強弱保民全境不出此塗要而歸之有四一曰移遠就近二曰浚復城隍三曰纂偶車牛四曰計丁課仗良守疆其土田驍帥振其風略蒐獵宣其號令俎豆訓其廉恥縣爵以縻之設禁以威之徭稅有程寬猛相濟比及十載民知義方然後簡將授奇揚旌雲朔風卷河冀電掃嵩燕弧折卻代馬摧足秦首斬其右臂吳蹄絕其左肩銘功於燕然之阿饗徒於金微之曲寇雖亂亡有徵昧弱易取若天時人事或未盡符抑銳俟機宜審其算若邊戍未增星居布野勤惰異教貧富殊資疆埸之民多懷彼此虜在去就不根本業難可驅率易在振蕩又狡虜之性食肉衣皮以馳騁為儀容以游獵為南畝非有車輿之安宮室之衛櫛風沐雨不以為勞露宿草寢維其常性勝則競利敗不羞走彼來或驟而此已奔疲且今春踰濟既獲其利乘勝忸未虞天誅比及秋末容更送死猋騎蟻聚輕兵鳥集並踐禾稼焚爇閭井雖邊將多略未審何以禦之若盛師連屯廢農必衆馳車奔馹起役必遲散金行賞損費必大換土客戍怨曠必繁孰若因民所居並修農戰無動衆之勞有扞衛之實其為利害優劣相縣也一曰移遠就近以實內地今青兗舊民冀州新附在界首者二萬家此寇之資也今悉可內徙青州民移東萊平昌北海諸郡兗州冀州移泰山以南南至下邳左沭右沂田良野沃西阻蘭陵北阨大峴四塞之內其號險固民性重遷闇於圖始無虜之時喜生咨怨今新被鈔掠餘懼未息若曉示安危居以樂土宜其歌抃就路視遷如歸二曰浚復城隍以增阻防舊秋冬收斂民人入保所以警備暴客使防衛有素也古之城池處處皆有今雖頹毀猶可修治粗計戶數量其所容新徙之家悉著城內假其經用為之閭伍納稼築場還在一處婦子守家長吏為師丁夫匹婦春夏佃牧秋冬入保寇至之時一城千室堪戰之士不下二千其餘羸弱猶能登陴鼓譟十則圍之兵家舊說戰士二千足抗羣虜三萬矣三曰纂偶車牛以飾戎械計千家之資不下五百耦牛為車伍伯兩參合鉤連以衛其衆設使城不可固平行趨險賊所不能干既已族居易可檢括號令先明民知夙戒有急徵發信宿可聚四曰計丁課仗勿使有闕千家之邑戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自衛弓簳利鐵民不辦得者官以漸充之數年之內軍用粗備矣臣聞軍國異容施於封畿之內兵農並修在於疆埸之表攻守之宜皆因其習任其怯勇山陵川陸之形寒暑溫凉之氣各由本性易則害生是故戍申作刺怨起及瓜今若以荊吳銳師遠屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也管子治齊寄令在民商君為秦設以耕戰終申威定覇行其志業非苟任強實由有數梁用走卒其邦自滅齊用技擊厥衆亦離漢魏以來茲制漸絕蒐田非復先王之禮治兵徒逞耳目之欲有急之日民不知戰至乃廣延賞募奉以厚秩發遽奔救天下騷然方伯刺史拱手坐聽自無經略唯望朝廷遣軍此皆忘戰之害不教之失也今移民實內浚治城隍族居聚處課其騎射長吏簡試差品能不甲科上第漸就優別明其勳才表言州郡如此則屯部有常不遷其業內護老弱外通宦塗朋曹素定同憂等樂情由習親蓺因事著晝戰見貌足相識夜戰聞聲足相救斯教戰之一隅先哲之遺術論者必以古城荒毀難可修復今不謂頓便加功整麗如舊但欲先定民居營其閭術墉壑存者因而即之其有毀缺權時柵斷足以禦彼輕兵防遏游騎假以方將漸就完立車牛之賦課仗之宜攻守所資軍國之要今因民所利導而率之耕農之器為府庫之寶田蠶之氓兼捍城之用千家總倍旅之兵萬戶具全軍之衆兵強而敵不戒國富而民不勞比於優復隊伍坐食廩糧者不可同年而校矣今承平來久邊令弛縱弓簳利鐵既不都斷往歲棄甲垂二十年課其所住理應消壞謂宜申明舊科嚴加禁塞諸商賈往來幢隊挾藏者皆以軍法治之又界上嚴立關候杜廢間蹊城保之境諸所課仗並加雕鐫別造程式若有遺鏃亡刃及私為竊盜者皆可立驗於事為長又鉅野湖澤廣大南通洙泗北連青齊有舊縣城正在澤內宜立式修復舊堵利其埭遏給輕艦百艘寇若入境引艦出戰左右隨宜應接據其師津毀其航漕此以利制車運我所長亦禦敵之要也承天素好弈頗用廢事太祖賜以局子承天奉表陳謝上答局子之賜何必非張武之金邪承天又能彈箏上又賜銀裝箏一面承天與尚書左丞謝元素不相善二人競伺二臺之違累相糾奏太尉江夏王義恭歲給資費錢三千萬布五萬匹米七萬斛義恭素奢侈用常不充二十一年逆就尚書換明年資費而舊制出錢二十萬布五百匹以上並應奏聞元輒命議以錢二百萬給太尉事發覺元乃使令史取僕射孟顗命元時新除太尉諮議參軍未拜為承天所糾上大怒遣元長歸田里禁錮終身元時又舉承天賣茭四百七十束與官屬求貴價承天坐白衣領職元字有宗陳郡陽夏人臨川內史靈運從祖弟也以才學見知卒於禁錮二十四年承天遷廷尉未拜上欲以為吏部已受密旨承天宣漏之坐免官卒於家年七十八先是禮論有八百卷承天刪減并合以類相從凡為三百卷并前傳雜語纂文論並傳於世又改定元嘉歷語在律歷志史臣曰治邊之術前世言之詳矣夫戎夷狡黠飄迅難虞必宜完其障塞謹其烽柝使來逕可防去塗易梗然後乃能禁暴止姦養威攘寇漢世案秦舊迹嚴塞以限外夷吳魏交戰亦以江淮為疆埸莫不先憑地險却保民和且守且耕伺隙乘釁高祖受命王略未遠雖綿河作守而兵孤援闊盛衰既兆用啟戎心蓋由王業始基經創多闕先內後外以至於此乎自茲以降分青置境無圍守之宜闕耕戰之略恃寇不來遂無其備周漢二策在宋頓亡遂致胡馬橫行曾無藩落之固使士民跼蒼天蹐厚地繫虜俘囚而無所控告哀哉承天安邊論博而篤矣載之云爾
