body:
  text: 宋書卷六十六列傳第二十六王敬弘何尚之王敬弘琅邪臨沂人也與高祖諱同故稱字曾祖廙晉驃騎將軍祖胡之司州刺史父茂之晉陵太守敬弘少有清尚起家本國左常侍衛軍參軍性恬靜樂山水為天門太守敬弘妻桓玄姊也敬弘之郡玄時為荊州遣信要令過敬弘至巴陵謂人曰靈寶見要正當欲與其姊集聚耳我不能為桓氏贅壻乃遣別船送妻往江陵妻在桓氏彌年不迎山郡無事恣其遊適纍日不回意甚好之轉桓偉安西長史南平太守去官居作唐縣界玄輔政及篡位屢召不下高祖以為車騎從事中郎徐州治中從事史征西將軍道規咨議參軍時府主簿宗協亦有高趣道規並以事外相期嘗共酣飲致醉敬弘因醉失禮為外司所白道規即更引還重申初宴召為中書侍郎始攜家纍自作唐還京邑久之轉黃門侍郎不拜仍除太尉從事中郎出為吳興太守舊居餘杭縣悅是舉也尋徵為侍中高祖西討司馬休之敬弘奉使慰勞通事令史潘尚於道疾病敬弘單船送還都存亡不測有司奏免官詔可未及釋朝服值赦復官宋國初建為度支尚書遷太常高祖受命補宣訓衛尉加散騎常侍永初三年轉吏部尚書常侍如故敬弘每被除召即便祗奉既到宜退旋復解官高祖嘉其志不苟違也復除廬陵王師加散騎常侍自陳無德不可師範令王固讓不拜又除祕書監金紫光祿大夫加散騎常侍本州中正又不就太祖即位又以為散騎常侍金紫光祿大夫領江夏王師元嘉三年為尚書僕射關署文案初不省讀嘗豫聽訟上問以疑獄敬弘不對上變色問左右何故不以訊牒副僕射敬弘曰臣乃得訊牒讀之政自不解上甚不悅六年遷尚書令敬弘固讓表求還東上不能奪改授侍中特進左光祿大夫給親信二十人讓侍中特進求減親信之半不許及東歸車駕幸冶亭餞送十二年徵為太子少傅敬弘詣京師上表曰伏見詔書以臣為太子少傅承命震惶喜懼交悸臣抱疾東荒志絶榮觀不悟聖恩猥復加寵東宮之重四海瞻望非臣薄德所可居之今內外英秀應選者多且版築之下豈無高逸而近私愚朽污辱清朝嗚呼微臣永非復大之一物矣所以牽曳闕下者實瞻望聖顏貪繫表之旨臣如此而歸夕死無恨詔不許表疏屢上終以不拜東歸上時不豫自力見焉十六年以為左光祿大夫開府儀同三司侍中如故又詣京師上表曰臣比自啓聞謂誠心已達天鑒玄邈未蒙在宥不敢宴處牽曳載馳臣聞君子行道忘其為身三復斯言若可庶勉顧惜惛耄志與願違禮年七十老而傳家家道猶然況於在國伏願陛下矜臣西夕愍臣一至特回聖恩賜反其所則天道下濟愚心盡矣竟不拜東歸二十三年重申前命又表曰臣躬耕南澧不求聞達先帝拔臣於蠻荊之域賜以國士之遇陛下嗣徽特蒙眷齒由是感激委質聖朝雖懷犬馬之誠遂無塵露之益年向九十生理殆盡永絶天光淪沒丘壑謹冒奉表傷心久之明年薨於餘杭之舍亭山時年八十八追贈本官順帝升明二年詔曰夫塗祕蘭幽貞芳載越徽猷沈遠懋禮彌昭故侍中左光祿大夫開府儀同三司敬弘神韻沖簡識宇標峻德敷象魏道藹丘園高挹榮冕凝心塵外清光粹範振俗淳風兼以纍朝延賞聲華在詠而嘉篆闕文猷策韜采尚想遙芬興懷寢寤便可詳定輝諡式旌追典於是諡為文貞公敬弘形狀短小而坐起端方桓玄謂之彈八勢所居舍亭山林澗環周備登臨之美時人謂之王東山太祖嘗問為政得失敬弘對曰天下有道庶人不議上高其言左右常使二老婢戴五絛五辮著青紋袴襦飾以朱粉女適尚書僕射何尚之弟述之敬弘嘗往何氏看女值尚之不在寄齊中臥俄頃尚之還敬弘使二婢守閣不聽尚之入云正熱不堪相見君可且去尚之於是移於它室子恢之被召為祕書郎敬弘為求奉朝請與恢之書曰祕書有限故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之敬弘見兒孫歲中不過一再相見見輒克日恢之嘗請假還東定省敬弘克日見之至日輒不果假日將盡恢之乞求奉辭敬弘呼前既至閣復不見恢之於閣外拜辭流涕而去恢之至新安太守中大夫恢之弟瓚之世祖大明中吏部尚書金紫光祿大夫諡曰貞子瓚之弟升之都官尚書升之子延之升明末為尚書左僕射江州刺史何尚之字彥德廬江灊人也曾祖準高尚不應徵辟祖惔南康太守父叔度恭謹有行業姨適沛郡劉璩與叔度母情愛甚篤叔度母蚤卒奉姨有若所生姨亡朔望必往致哀并設祭奠食並珍新躬自臨視若朔望應有公事則先遣送祭皆手自料簡流涕對之公事畢即往致哀以此為常至三年服竟義熙五年吳興武康縣民王延祖為劫父睦以告官新制凡劫身斬刑家人棄市睦既自告於法有疑時叔度為尚書議曰設法止姦本於情理非謂一人為劫闔門應刑所以罪及同産欲開其相告以出為惡之身睦父子之至容可悉共逃亡而割其天屬還相縛送螫毒在手解腕求全於情可愍理亦宜宥使凶人不容於家逃刑無所乃大絶根源也睦既糾送則餘人無應復告並合從原從之後為金紫光祿大夫吳郡太守加秩中二千石太保王弘稱其清身潔己元嘉八年卒尚之少時頗輕薄好摴蒲既長折節蹈道以操立見稱為陳郡謝混所知與之遊處家貧起為臨津令高祖領征西將軍補府主簿從征長安以公事免還都因患勞疾積年飲婦人乳乃得差以從征之勞賜爵都鄉侯少帝即位為廬陵王義真車騎咨議參軍義真與司徒徐羡之尚書令傅亮等不協每有不平之言尚之諫戒不納義真被廢入為中書侍郎太祖即位出為臨川內史入為黃門侍郎尚書吏部郎左衛將軍父憂去職服闋復為左衛領太子中庶子尚之雅好文義從容賞會甚為太祖所知十二年遷侍中中庶子如故尋改領游擊將軍十三年彭城王義康欲以司徒左長史劉斌為丹陽尹上不許乃以尚之為尹立宅南郭外置玄學聚生徒東海徐秀廬江何曇黃回潁川荀子華太原孫宗昌王延秀魯郡孔惠宣並慕道來遊謂之南學女適劉湛子黯而湛與尚之意好不篤湛欲領丹陽乃徙尚之為祠部尚書領國子祭酒尚之甚不平湛誅遷吏部尚書時左衛將軍范曄任參機密尚之察其意趣異常白太祖宜出為廣州若在內釁成不得不加以鈇鉞屢誅大臣有虧皇化上曰始誅劉湛等方欲超升後進曄事跡未彰便豫相黜斥萬方將謂卿等不能容才以我為信受讒說但使共知如此不憂致大變也曄後謀反伏誅上嘉其先見國子學建領國子祭酒又領建平王師乃徙中書令中護軍二十二年遷尚書右僕射加散騎常侍是歲造玄武湖上欲於湖中立方丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑役人工尚之又諫宜加休息上不許曰小人常自暴背此不足為勞時上行幸還多侵夕尚之又表諫曰萬乘宜重尊不可輕此聖心所鑒豈假臣啓輿駕比出還多冒夜羣情傾側實有未寧清道而動帝王成則古今深誡安不忘危若值汲黯辛毗必將犯顏切諫但臣等碌碌每存順默耳伏願少採愚誠思垂省察不以人廢適可以慰四海之望亦優詔納之先是患貨重鑄四銖錢民間頗盜鑄多翦鑿古錢以取銅上患之二十四年録尚書江夏王義恭建議以一大錢當兩以防翦鑿議者多同尚之議曰伏覽明命欲改錢制不勞採鑄其利自倍實救弊之弘算增貨之良術求之管淺猶有未譬夫泉貝之興以估貨為本事存交易豈假數多數少則幣重數多則物重多少雖異濟用不殊況復以一當兩徒崇虛價者邪凡創制改法宜從民情未有違衆矯物而可久也泉布廢興未容驟議前代赤仄白金俄而罷息六貨憒亂民泣於市良由事不畫一難用遵行自非急病權時宜守久長之業煩政曲雜致遠常泥且貨偏則民病故先王立井田以一之使富不淫侈貧不過匱雖茲法久廢不可頓施要宜而近粗相放擬若今制遂行富人資貨自倍貧者彌增其困懼非所以欲均之意又錢之形式大小多品直云大錢則未知其格若止於四銖五銖則文皆古篆既非下走所識加或漫滅尤難分明公私交亂爭訟必起此最是其深疑者也命旨兼慮翦鑿日多以至消盡鄙意復謂殆無此嫌民巧雖密要有蹤跡且用錢貨銅事可尋檢直由屬所怠縱糾察不精致使立制以來發覺者寡今雖有懸金之名竟無酬與之實若申明舊科禽獲即報畏法希賞不日自定矣愚者之議智者擇焉猥參訪逮敢不輸盡吏部尚書庾炳之侍中太子左衛率蕭思話中護軍趙伯符御史中丞何承天太常郗敬叔並同尚之議中領軍沈演之以為龜貝行於上古泉刀興自有周皆所以阜財通利實國富民者也歷代雖遠資用彌便但採鑄久廢兼喪亂纍仍糜散湮滅何可勝計晉遷江南疆境未廓或土習其風錢不普用其數本少為患尚輕今王略開廣聲教遐暨金鏹所布爰逮荒服昔所不及悉已流行之矣用彌廣而貨愈狹加復競竊翦鑿銷毀滋繁刑禁雖重姦避方密遂使歲月增貴貧室日虛暋作肆力之氓徒勤不足以供贍誠由貨貴物賤常調未革弗思釐改為弊轉深斯實親教之良時通變之嘉會愚謂若以大錢當兩則國傳難朽之寶家贏一倍之利不俟加憲巧源自絶施一令而衆美兼無興造之費莫盛於茲矣上從演之議遂以一錢當兩行之經時公私非便乃罷二十五年遷左僕射領汝陰王師常侍如故二十八年轉尚書令領太子詹事二十九年致仕於方山著退居賦以明所守而議者咸謂尚之不能固志太子左衛率袁淑與尚之書曰昨遣修問承丈人已晦志山田雖曰年禮宜遵亦事難斯貴俾疏班邴魏通美於前策龔貢山衛淪慚乎曩篇規逮休告雪滌素懷冀尋幽之歡畢棲玄之適但淑逸操偏迥野性瞢滯果茲沖寂必沈樂忘歸然而已議塗聞者謂丈人徽明未耗譽業方籍儻能屈事康道降節殉務舍南瀕之操淑此行永決矣望眷有積約日無誤尚之宅在南澗寺側故書云南瀕毛詩所謂于以採蘋南澗之瀕也詔書敦勸上又與江夏王義恭詔曰今朝賢無多且羊孟尚不得告謝尚之任遇有殊便未宜申許邪義恭答曰尚之清忠貞固歷事唯允雖年在懸車而體獨充壯未相申許下情所同尚之復攝職羊即羊玄保孟即孟顗字彥重平昌安丘人兄昶貴盛顗不就徵辟昶死後起家為東陽太守遂歷吳郡會稽丹陽三郡侍中僕射太子詹事復為會稽太守卒官贈左光祿大夫子劭尚太祖第十六女南郡公主女適彭城王義康巴陵哀王休若尚之既還任事上待之愈隆是時復遣軍北伐資給戎旅悉以委之元凶弒立進位司空領尚書令時三方興義將佐家在都邑劭悉欲誅之尚之誘說百端並得免世祖即位復為尚書令領吏部遷侍中左光祿大夫領護軍將軍尋辭護軍加特進復以本官領尚書令丞相南郡王義宣車騎將軍臧質反義宣司馬竺超民臧質長史陸展兄弟並應從誅尚之上言曰刑罰得失治亂所由聖賢留心不可不慎竺超民為義宣司馬賊既遁走一夫可禽若反覆昧利即當取之非唯免愆亦可要不義之賞而超民曾無此意微足觀過知仁且為官保全城府謹守庫藏端坐待縛今戮及兄弟與向始末無論者復成何異陸展盡質復灼然便同之巨逆於事為重臣豫蒙顧待自殊凡隸苟有所懷不敢自默超民坐者由此得原時欲分荊州置郢州議其所居江夏王義恭以為宜在巴陵尚之議曰夏口在荊江之中正對沔口通接雍梁實為津要由來舊鎮根基不易今分取江夏武陵天門竟陵隨五郡為一州鎮在夏口既有見城浦大容舫竟陵出道取荊州雖水路與去江夏不異諸郡至夏口皆從流並為利便湘州所領十一郡其巴陵邊帶長江去夏口密邇既分湘中乃更成大亦可割巴陵屬新州於事為允上從其議荊揚二州戶口半天下江左以來揚州根本委荊以閫外至是並分欲以削臣下之權而荊揚並因此虛耗尚之建言復合二州上不許大明二年以為左光祿開府儀同三司侍中如故尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今日何不著鹿皮冠慶之纍辭爵命朝廷敦勸甚篤尚之謂曰主上虛懷側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色愛尚文義老而不休與太常顏延之論議往反傳於世立身簡約車服率素妻亡不娶又無姬妾秉衡當朝畏遠權柄親戚故舊一無薦舉既以致怨亦以此見稱復以本官領中書令四年疾篤詔遣侍中沈懷文黃門侍郎王釗問疾薨于位時年七十九追贈司空侍中中書令如故諡曰簡穆公子偃別有傳尚之弟悠之義興太守侍中太常與琅邪王微相善悠之卒微與偃書曰吾與義興直恨相知之晚每惟君子知我若夫嘉我小善矜余不能唯賢叔耳悠之弟愈之新安太守愈之弟翌之都官尚書悠之子顒之尚太祖第四女臨海惠公主太宗世官至通直常侍史臣曰江左以來樹根本於揚越任推轂於荊楚揚土自廬蠡以北臨海而極大江荊部則包括湘沅跨巫山而掩鄧塞民戶境域過半於天下晉世幼主在位政歸輔臣荊揚司牧事同二陝宋室受命權不能移二州之重咸歸密戚是以義宣藉西楚強富因十載之基嫌隙既樹遂規問鼎而建郢分揚矯枉過直藩城既剖盜實人單閫外之寄於斯而盡若長君南面威刑自出至親在外事不患強若運經盛衰時艱主弱雖近臣懷禍止有外憚呂宗不競實由齊楚興喪之源於斯尤著尚之言并合可謂識治也矣
