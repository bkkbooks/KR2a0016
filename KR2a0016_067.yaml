body:
  text: 宋書卷六十七列傳第二十七謝靈運謝靈運陳郡陽夏人也祖玄晉車騎將軍父瑍生而不慧為祕書郎蚤亡靈運幼便穎悟玄甚異之謂親知曰我乃生瑍瑍那得生靈運靈運少好學博覽羣書文章之美江左莫逮從叔混特知愛之襲封康樂公食邑二千戶以國公例除員外散騎侍郎不就為琅邪王大司馬行參軍性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也撫軍將軍劉毅鎮姑孰以為記室參軍毅鎮江陵又以為衛軍從事中郎毅伏誅高祖版為太尉參軍入為祕書丞坐事免高祖伐長安驃騎將軍道憐居守版為咨議參軍轉中書侍郎又為世子中軍咨議黃門侍郎奉使慰勞高祖於彭城作撰征賦其序曰蓋聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於運剝喪易以橫流皇晉河汾來遷吳楚數歷九世年踰十紀西秦無一援之望東周有三辱之憤可謂積禍纏釁固以久矣況乃陵塋幽翳情敬莫遂日月推薄帝心彌遠慶靈將升時來不爽相國宋公得一居貞回乾運軸內匡寰表外清遐陬每以區宇未統側席盈慮值天祚攸興昧弱授機龜筮元謀符瑞景徵於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熙十有二年五月丁酉敬戒九伐申命六軍治兵于京畿次師于汳上靈檣千艘雷輜萬乘羽騎盈塗飛旍蔽日別命羣帥誨謨惠策法奇於三略義祕於六韜所以鉤棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻捷宏功懋德獨絶古今天子感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬悴於征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮遡薄泗汳詳觀城邑周覽丘墳眷言古迹其懷已多昔皇祖作藩受命淮徐道固苞桑勳由仁積年月多歷市朝已改永為洪業纏懷清曆於是采訪故老尋履往迹而遠感深慨痛心殞涕遂寫集聞見作賦撰征俾事運遷謝託此不朽其詞曰系烈山之洪緒承火正之明光立熙載於唐后申讚事於周王疇庸命而順位錫寶圭以徹疆歷尚代而平顯降中葉以繁昌業服道而德徽風行世而化揚投前蹤以永冀省輶質以遠傷睽謀始于蓍蔡違用舍於行藏庇常善之罔棄憑曲成之不遺昭在幽而偕煦賞彌久而愈私顧晚草之薄弱仰青春之葳蕤引蔓穎於松上擢纖枝於蘭逵施隆貸而有渥報涓塵而無期歡太階之休明穆皇道之緝熙惟王建國辨方定隅內外既正華夷有殊惟昔小雅逮于班書戎蠻孔熾是殛是誅所以宣王用棘於獫狁高帝方事於胸奴然侵鎬至涇自塞及平窺郊伺鄙慕攜王之矯虔階喪亂之未寧竊強秦之三輔陷隆周之兩京雄崤澠以制險據繞霤而作扃家永懷於故壤國願言於先塋俟太平之曠期屬應運之聖明坤寄通於四瀆乾假照於三辰水潤土以顯比火炎天而同人惟上相之睿哲當草昧而經綸總九流以貞觀協五才而平分時來之機悟先於介石納隍之誡一援於生民龜筮允臧人鬼同情順天行誅司典詳刑樹牙選徒秉鉞抗旍弧矢罄楚孝之心智戈棘單吳子之精靈迅三翼以魚麗襄兩服以雁逝陳未列於都甸威已振於秦薊灑嚴霜於渭城被和風於洛汭就終古以比猷考墳册而莫契昔西怨於東徂今北伐而南悲豈朝野之情動萬乘之幽思歌零雨於豳風興採薇於周詩慶金墉之凱定眷戎車之遷時佇千里而感遠涉弦望而懷期詔微臣以勞問奉王命於河湄夕飲餞以俶裝旦出宿而言辭歲既晏而繁慮日將邁而戀乖闕敬恭於桑梓謝履長於庭階冒沈雲之暗藹迎素雪之紛霏凌結湍而凝清風矜籟以揚哀情在本而易阜物雖末而難懷眷余勤以就路苦憂來其城頽爾乃經雉門啓浮梁眺鍾巖越查塘覽永嘉之紊維尋建武之緝綱于時內慢神器外侮戎狄君子橫流庶萌分析主晉有祀福祿來格明兩降覽三七辭厄元誕德以膺緯肇回光於陽宅明思服於下武興繼代以消逆簡文因心以秉道故沖用而刑廢孝武捨己以杖賢亦寧外而治內觀日化而就損庶雍熙之可對閔隆安之致寇傷龜玉之毀碎漏妖凶於滄洲纏釁難而盈紀時焉依於晉鄭國有蹙於百里賴英謨之經營弘兼濟以忘己主寰內而緩虞澄海外以漬滓至如昏祲蔽景鼎祚傾基黍離有歎鴻雁無期瞻天命之貞符秉順動而履機率駿民之思效普邦國而同歸蕩積霾之穢氛啓披陰之光暉反平陵之杳藹復七廟之依稀務役簡而農勸每勞賞而忠甄燮時雍於祖宗掃逋醜於漢渚滌僭逆於岷山羈巢處於西木引鼻飲於源淵惠要襋而思韙援冠辨而來虔視冶城而北屬懷文獻之收揚匪元首之康哉孰股肱之惟良譬觀曲而識節似綴組以成章業彌纏而彌微事愈有而莫傷次石頭之雙岸究孫氏之初基幸漢庶之漏網憑江介以抗維初鵲起於富春果鯨躍於川湄匝三世而國盛歷五偽而宗夷察成敗之相仍猶脣亡而齒寒載十二而謂紀豈蜀滅而吳安衆咸昧於謀兆羊獨悟於理端請廣武以誨情樹襄陽以作藩拾建業其如遺沿萬里而誰難疾魯荒之詖辭惡京陵之譖言責當朝之憚貶對曩籍而興歎敦怙寵而判違敵既勍而國圮彼問鼎而何階必先賊於君子原性分之異託雖殊塗而歸美或卷舒以愚智或治亂其如矢謝昧迹而託規卒安身以全里周顯節而犯逆抱正情而喪己薄四望而尤眄歎王路之中鯁蠢于越之妖燼敢淩蹈於五嶺崩雙嶽於中流擬凶威於荊郢隱雷霆於帝坐飛芒鏃於宮省于時朝有遷都之議人無守死之志師旅痛於久勤城墉闕於素備安危勢在不侔衆寡形於見事於赫淵謀研其神策緩轡待機追奔躡迹遇雷池而振曜次彭蠡而殲滌穆京甸以清晏撤多壘而寧役造白石之祠壇懟二豎之無君踐掖庭以幽辱凌祧社而火焚愍文康之罪己嘉忠武之立勳道有屈於災蝕功無謝於如仁訊落星之饗旅索舊棲於吳餘迹階戺而不見橫榛卉以荒除彼生成之樂辰亦猶今之在余慨齊吟於爽鳩悲唐歌於山樞弔偽孫於塗首率君臣以奉疆時運師以伐罪偏投書於武王迄西北之落紐乏東南以振綱誠巨平之先覺實中興之後祥據左史之攸徵胡影迹之可量過江乘而責始知遇雄之無謀厭紫微之宏凱甘陵波而遠遊越雲夢而南泝臨浙河而東浮彀連弩於川上候蛟龍於中流爰薄方與乃屆歐陽入夫江都之域次乎廣陵之鄉易千里之曼曼泝江流之湯湯洊赤圻以經復越二門而起漲眷北路以興思看東山而怡目林叢薄路逶迤石參差山盤曲水激瀨而駿奔日映石而知旭審兼照之無偏怨歸流之難濯羡輕魵之涵泳觀翔鷗之落啄在飛沈其順從顧微躬而緬邈於是抑懷蕩慮揚榷易難利涉以吉天險以艱于敵伊阻在國斯便勾踐行霸於琅邪夫差爭長於黃川葛相發歎而思正曹后愧心於千魂登高堞以詳覽知吳濞之衰盛戒東南之逆氣成劉后之駴聖藉鹽鐵之殷阜臨淮楚之剽輕盛几杖而弭心怒抵局而遂爭忿爰盎之扶禍惜徒傷於家令匪條侯之忠毅將七國之陵正褒漢藩之治民並訪賢以招明侯文辨其誰在曰鄒陽與枚生據忠辭於吳朝執義説於梁庭敷高才於兔園雖正言而免刑闕里既已千載深儒流於末學欽仲舒之睟容遵縫掖於前躅對園囿而不窺下帷幕而論屬相端非之兩驕遭弘偃之雙慝恨有道之無時步險塗以側足聞宣武之大閲反師旅於此廛自皇運之都東始昌業以濟難抗素旄於秦嶺揚朱旗於巴川懼帝系之墜緒故黜昏而崇賢嘉收功以垂世嗟在嗣而覆旃德非陟而繼宰釁踰禹其必顛造步丘而長想欽太傅之遺武思嘉遁之餘風紹素履之落緒民志應而願稅國屯難而思撫譬乘舟之待楫象提釣之假縷總出入於和就兼仁用於默語弘九流以四維復先陵而清舊宇却西州之成功指東山之歸豫惜圖南之啓運恨鵬翼之未舉發津潭而迥邁逗白馬以舲貫射陽而望溝濟通淮而薄角城城坡兮淮驚波平原遠兮路交過面艽野兮悲橋梓遡急流兮苦磧沙敻千里而無山緬百谷而有居被宿莽以迷徑覩生煙而知墟謂信美其可娛身少長於樂土實長歎於荒餘具瘁值歲寒之窮節視層雲之崔巍聆悲之掩屑彌晝夜以滯淫怨凝陰之方結望新晴於落日起明光於躋月眷轉蓬之辭根悼朔雁之赴越披微物而疚情此思心其可説問徭役其幾時駭閲景於興沒感曰歸於采薇豫來思於雨雪豈初征之懼對冀鸛鳴之在垤踰宿騖吾楫於邳鄉奚車正以事夏虺左相以輔湯綿三代而享邑厠踐土之一匡嗟仲幾之寵侮遂捨存以徵亡喜薛宰之善對美士彌之能綱升曲垣之逶迤訪淮陰之所都原入跨之達恥俟遭時以遠圖捨西楚以擇木逮南漢以定謨亂孟津而魏滅攀井陘而趙徂播靈威於齊橫振餘猛於龍且觀讓通而告狶曷始智而終愚迄沂上而停枻登高圯而不進石幽期而知賢張揣景而示信本文成之素心要王子於雲仞豈無纍於清霄直有概於貞吝始熙績於武關卒敷功於皇胤處夷險以解挫弘憂虞以時順矜若華之翳晷哀飛驂之落駿傷粒食而興念眷逸翮而思振戾臣山而東顧美相公之前代嗟殘虜之將糜熾餘猋於海濟驅鮐稚於淮曲暴魚衆孤於泗澨託末命雲冀靈武之北閲惟授首之在晨當盛暑而選徒肅嚴威以振響漸溫澤而沾腴既雲撤於朐城遂席卷於齊都曩四關其奚阻道一變而是孚傷炎季之崩弛長逆布以滔天假父子以詐愛借兄弟以偽恩相魏武以譎狂宄謨奮於東藩桴未譟於東郭身已馘於樓門審貢牧於前説證所作於舊徐聆泗川之浮磬玩夷水之蠙珠草漸苞於熾壤桐孤幹於嶧隅慨禹迹於尚世惠遺文於夏書紛征邁之淹留彌懷古於舊章商伯文於故服咸徵名於彭殤眺靈壁之曾峯投呂縣之迅梁想蹈水之行歌雖齊汨其何傷啓仲尼之嘉問告性命以依方豈苟然於迂論聆寓言於達莊於是濫石橋登戲臺策馬釣渚息轡城隅永感四山零淚雙渠怨物華之推驛慨舟壑之遞遷謂徂歲之悠闊結幽思之方根感皇祖之徽德爰識沖而量淵降俊明以鏡鑒回風猷以昭宣道既底於國難惠有覃於黎元士頌歌於政教民謠詠於渥恩兼採草巳之致美協漢廣之發言強虎氐之搏翼灟雲網於所禁驅黔萌以蘊崇取園陵而湮沈錫殘落於河西序淪胥於漢陰攻方城而折扃擾譙潁其誰任世闕才而貽亂時得賢而興治救祖考之邦壤在幽人而枉志體飛書之遠情悟犒師之通識逮明達之高覽契古今而同事拔淵謨於潛機騁神鋒於雲斾驅斥澤而風靡蹙坑谷而鳥竄中華免夫左衽江表此焉緩帶既剋黜於肥六又作鎮於彭沛晏皇塗於國內震天威於河外掃東齊而已寧指西崤而將泰值秉均而代謝實大業之興廢心無忝於樂生事有像於燕惠抱明哲之不伐奉宏勳而是稅捐七州以爰來歸五湖以投袂屈盛績於平生申遠期於暮歲訪曩載於宋鄙採陽秋於魯經晉申好於東吳鄭憑威於南荊故反師於曹門將以塞於夷庚納五叛以長寇伐三邑以侵彭美西鉏之忠辭快韓厥之奇兵追項王之故臺迹霸楚之遺端挺宏志於總角奮英勢於弱冠氣蓋天而倒日力拔山而傾湍始起於勾越中電激於衡關興偏慮於攸吝忘即易於所難忌陳錦而莫照思反鄉而有歎且夫殺義害嬰而豐疑緤賢不策失位誰持逮理屈而愈閉方怨天而懷悲對駿騅以發憤傷虞姝於末詞陟亞父之故營諒謀始之非託遭衰嬴之崩綱值威炎之結絡迄皓首於阜陵猶謬覺於然諾視一人於三傑豈在己之庸弱置豐沛而不舉故自同於俎鑊發卞口而遊歷迄西山而弭轡觀終古之幽憤懷元王之沖粹丁戰國之權爭方恬心於道肆學浮丘以就德友三儒以成類潔流始於初源纍仁基於前美撥楚族之休烈傳芳素於來祀強見譽於清虛德致稱於千里或避寵以辭姻或遺榮而不仕政直言以安身駿絶才以喪己驅信道之成終表昧世之虧始悟介焉之已差則不俟於終日既防萌於未著雖念德其何益爾乃孟陬發節雷隱蟄驚散葉荑柯芳花飾萌麥萋萋於旄丘柳依依於高城相雎鳩之集河觀鳴鹿之食蘋沂泗遠兮清川急秋冬近兮緒風襲風流蕙兮水增瀾訴愁襟兮鑑戚顏愁盈根而薀際戚發條而成端嗟我行之彌日待征邁而言旋荷慶雲之優渥周雙七於此年陶逸豫於京甸違險難於行川轉歸舷而眷戀望修檣而流漣願關鄴之遄清遲華鑾之凱旋穆淳風於六合溥洪澤於八埏頒賢愚於大小順規矩於方圓固四民之獲所宜稅稷於萊田苦邯鄲之難步庶行迷之易痊長守朴以終稔亦拙者之政焉仍除宋國黃門侍郎遷相國從事中郎世子左衛率坐輒殺門生免官高祖受命降公爵為侯食邑五百戶起為散騎常侍轉太子左衛率靈運為性褊激多愆禮度朝廷唯以文義處之不以應實相許自謂才能宜參權要既不見知常懷憤憤廬陵王義真少好文籍與靈運情款異常少帝即位權在大臣靈運構扇異同非毀執政司徒徐羡之等患之出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意遊遨遍歷諸縣動踰旬朔民間聽訟不復關懷所至輒為詩詠以致其意焉在郡一周稱疾去職從弟晦曜弘微等並與書止之不從靈運父祖並葬始寧縣并有故宅及墅遂移籍會稽修營別業傍山帶江盡幽居之美與隱士王弘之孔淳之等縱放為娛有終焉之志每有一詩至都邑貴賤莫不競寫宿昔之間士庶皆遍遠近欽慕名動京師作山居賦并自注以言其事曰古巢居穴處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黃屋實不殊於汾陽即事也山居良有異乎市廛抱疾就間順從性情敢率所樂而以作賦揚子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宮觀遊獵聲色之盛而山野草木水石穀稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以遠矣覽者廢張左之艷辭尋臺皓之深意去飾取素儻值其心耳意實言表而書不盡遺迹索意託之有賞其辭曰謝子臥疾山頂覽古人遺書與其意合悠然而笑曰夫道可重故物為輕理宜存故事斯忘古今不能革質文咸其常合宮非縉雲之館衢室豈放勛之堂邁深心於鼎湖送高情於汾陽嗟文成之却粒願追松以遠遊嘉陶朱之鼓棹乃語種以免憂判身名之有辨權榮素其無留孰如牽犬之路既寡聽鶴之塗何由哉理以相得為適古人遺書與其意合所以為笑孫權亦謂周瑜公瑾與孤意合夫能重道則輕物存理則忘事古今質文可謂不同而此處不異縉雲放勛不以天居為所樂故合宮衢室皆非淹留鼎湖汾陽乃是所居文成張良却粒棄人間事從赤松子遊陶朱范蠡臨去之際亦語文種云云謂二賢既權榮素故身名有判也牽犬李斯之歎聽鶴陸機領成都衆大敗後云思聞華亭鶴唳不可復得若夫巢穴以風露貽患則大壯以棟宇袪弊宮室以瑤琁致美則白賁以丘園殊世惟上託於巖壑幸兼善而罔滯雖非市朝而寒暑均也雖是築構而飾朴兩逝易云上古穴居野處後世聖人易之以宮室上棟下宇以蔽風雨蓋取諸大壯琁堂自是素故曰白賁最是上爻也此堂世異矣謂巖壑道深於丘園而不為巢穴斯免得寒暑之適雖是築構無妨非朝市云云昔仲長願言流水高山應璩作書邙阜洛川勢有偏側地闕周員銅陵之奧卓氏充釽摫之端金谷之麗石子致音徽之觀徒形域之薈蔚惜事異於栖盤至若鳳叢二臺雲夢青丘漳渠淇園橘林長洲雖千乘之珍苑孰嘉遁之所遊且山川之未備亦何議於兼求仲長子云欲使居有良田廣宅在高山流川之畔溝池自環竹木周布場囿在前果園在後應璩與程文信書云故求道田在關之西南臨洛水北據邙山託崇岫以為宅因茂林以為蔭謂二家山居不得周員之美揚雄蜀都賦云銅陵衍卓王孫採山鑄銅故漢書貨殖傳云卓氏之臨卭公擅山川揚雄方言梁益之間裁木為器曰釽裂帛為衣曰摫金谷石季倫之別廬在河南界有山川林木池沼水碓其鎮下邳時過遊賦詩一代盛集謂二地雖珍麗然制作非栖盤之意也鳳臺秦穆公時秦女所居以致簫史叢臺趙之崇館張衡謂趙築叢臺於前楚建章華於後楚之雲夢大中居長飲賦楚靈王遊雲夢之中息於荊臺之上前方淮之水左洞庭之波右顧彭蠡之濤南望巫山之阿遂造章華之臺亦見諸史淮南青丘齊之海外皆獵所司馬相如云秋田乎青丘倣徨乎海外漳渠史起為魏文侯所起溉水之所淇園衛之竹園在淇水之澳詩人所載橘林蜀之園林揚子雲蜀都賦亦云橘林左太沖謂戶有橘柚之園長洲吳之苑囿左亦謂長洲之茂苑因江海洲渚以為苑囿故表此園之珍靜千乘宴嬉之所非幽人憩止之鄉且山川亦不能兼茂隨地勢所遇耳覽明達之撫運乘機緘而理默指歲暮而歸休詠宏徽於刊勒狹三閭之喪江矜望諸之去國選自然之神麗盡高棲之意得余祖車騎建大功淮肥江左得免橫流之禍後及太傅既薨遠圖已輟於是便求解駕東歸以避君側之亂廢興隱顯當是賢達之心故選神麗之所以申高棲之意經始山川實基於此仰前哲之遺訓俯性情之所便奉微軀以宴息保自事以乘間愧班生之夙悟慚尚子之晚研年與疾而偕來志乘拙而俱旋謝平生於知遊棲清曠於山川謂經始此山遺訓於後也性情各有所便山居是其宜也易云向晦入宴息莊周云自事其心此二是其所處班嗣本不染世故曰夙悟尚平未能去纍故曰晚研想遲二人更以年衰疾至志寡求拙曰乘并可山居曰與知遊別故曰謝平生就山川故曰棲清曠其居也左湖右江往渚還汀面山背阜東阻西傾抱含吸吐款跨紆縈綿聯邪亘側直齊平枚乘曰左江右湖其樂無有此吳客説楚公子之詞當謂江都之野彼雖有江湖而乏山巖此憶江湖左右與之同而山嶽形勢池城所無也往渚還汀謂四面有水面山背阜亦謂東西有山便是四水之𩹉也抱含吸吐謂中央復有川款跨紆縈謂邊背相連帶迂回處謂之邪亘平正處謂之側直近東則上田下湖西溪南谷石鱬石滂閔硎黃竹決飛泉於百仞森高薄於千麓寫長源於遠江派深毖於近瀆上田在下湖之水口名為田口下湖在田之下下處並有名山川西溪南谷分流谷鄣水畎入田口西溪水出始寧縣西谷鄣是近山之最高峯者西溪便是之背入西溪之𩹉得石鱬以石為阻故謂為鱬石滂在西溪之東從縣南入九里兩面峻峭數十丈水自上飛下比至外溪封墱十數里皆飛流迅激左右巖壁緑竹閔硎在石滂之東溪逶迤下注良田黃竹與其連南界莆中也近南則會以雙流縈以三洲表𩹉回遊離合山川崿崩飛於東峭槃傍薄於西阡拂青林而激波揮白沙而生漣雙流謂剡江及小江此二水同會於山南便合流注下三洲在二水之口排沙積岸成此洲漲表𩹉離合是其貌狀也崿者謂回江岑在其山居之南界有石跳出將崩江中行者莫不駭栗槃者是縣故治之所在江之用槃石竟渚並帶青林而連白沙也近西則楊賓接峯唐皇連縱室壁帶溪曾孤臨江竹緣浦以被緑石照澗而映紅月隱山而成陰木鳴柯以起風楊中元賓並小江之近處與山相接也唐皇便從北出室石室在小江口南岸壁小江北岸並在楊中之下壁高四十丈色赤故曰照澗而映紅曾山之西孤山之南王子所經始並臨江皆被以緑竹山高月隱便謂為陰鳥集柯鳴便謂為風也近北則二巫結湖兩通沼橫石判盡休周分表引修隄之逶迆吐泉流之浩溔山下而回澤瀨石上而開道大小巫湖中隔一山外周回在圻西北邊浦出江並是美處義熙中王穆之居大巫湖經始處所猶在兩皆長溪外出山之後四五里許𩹉亦隔一山出新鱬橫山野舍之北面常石野舍之西北巫湖舊唐故曰修隄長溪甚遠故曰泉流常石故曰山下而回澤𩹉漫石數里水從上過故曰瀨石上而開道休山東北周里山在休之南並是北邊遠東則天台桐柏方石太平二韭四明五奧三菁表神異於緯牒驗感應於慶靈淩石橋之莓苔越楢溪之紆縈天台桐柏七縣餘地南帶海二韭四明五奧皆相連接奇地所無高於五嶽便是海中三山之流韭以菜為名四明方石四面自然開窗也五奧者曇濟道人蔡氏郗氏謝氏陳氏各有一奧皆相掎角並是奇地三菁太平之北太平天台之始方石直上萬丈下有長溪亦是縉雲之流云此諸山並見圖緯神仙所居往來要徑石橋過楢溪人迹之艱不復過此也遠南則松針棲雞唐嵫漫石嵊對嶺孟分隔入極浦而邅回迷不知其所適上嶔崎而蒙籠下深沈而澆激棲雞在保口之上別浦入其中周回甚深四山之𩹉松針在棲雞之上緣江唐嵫入太平水路上有瀑布數百丈漫石在唐嵫下郗景興經始精舍亦是名山之流嵊與分界去山八十里故曰遠南前嶺鳥道正當五十里高左右所無就下地形高乃當不稱遠望山甚奇謂白爍尖者最高下有良田王敬弘經始精舍曇濟道人住孟山名曰孟埭芋薯之體田清溪秀竹回開巨石有趣之極此中多諸浦澗傍依茂林迷不知所通嶔崎深沈處處皆然不但一處遠西則下闕遠北則長江永歸巨海延納昆漲緬曠島嶼綢沓山縱橫以布護水回沈而縈浥信荒極之綿眇究風波之睽合江從山北流窮上虞界謂之三江口便是大海老子謂海為百谷王以其善處下也海人謂孤山為昆薄洲有山謂之島嶼即洲也漲者沙始起將欲成嶼縱橫無常於一處回沙相縈擾也大荒東極故為荒極風波不為睽合也徒觀其南術之岸測深相渚知淺洪濤滿則曾石沒清瀾減則沈沙顯及風興濤作水勢奔壯于歲春秋在月朔望湯湯驚波滔滔駭浪電激雷崩飛流灑漾淩絶壁而起岑橫中流而連薄始迅轉而騰天終倒底而見壑此楚二心醉於吳客河靈懷慚於海若南術是其臨江舊宅門前對江三轉曾山路窮四江對岸西面常石此二山之間西南角岸孤山此二山皆是狹處故曰生勇門以南上便大閬故曰成衍岸高測深渚下知淺也江中有孤石沈沙隨水增減春秋朔望是其盛時故枚乘云楚太子有疾吳客問之舉秋濤之美得以瘳病太子國之儲二故曰楚二河靈河伯居河所謂河靈懼於海若事見莊周秋水篇爾其舊居曩宅今園枌槿尚援基井具存曲術周乎前後直陌矗其東西豈伊臨溪而傍沼乃抱阜而帶山考封域之靈異實茲境之最然葺駢梁於巖麓棲孤棟於江源敞南戶以對遠嶺闢東窗以矚近田田連岡而盈疇嶺枕水而通阡葺室在宅𩹉山之東麓東窗矚田兼見江山之美三間故謂之駢梁門前一棟枕上存江之嶺南對江上遠嶺此二館屬望殆無優劣也阡陌縱橫塍埒交經導渠引流脈散溝并蔚蔚豐秫苾苾香粳送夏蚤秀迎秋晚成兼有陵陸麻麥粟菽候時覘節遞藝遞熟供粒食與漿飲謝工商與衡牧生何待於多資理取足於滿腹許由云偃鼠飲河不過滿腹謂人生食足則歡有餘何待多須邪工商衡牧似多須者若少私寡欲充命則足但非田無以立耳自園之田自田之湖泛濫川上緬邈水區濬潭澗而窈窕除菰洲之紆餘毖溫泉於春流馳寒波而秋徂風生浪於蘭渚日倒景於椒塗飛漸榭於中沚取水月之歡娛旦延陰而物清夕棲芬而氣敷顧情交之永絶覬雲客之暫如此皆湖中之美但患言不盡意萬不寫一耳諸澗出源入湖故曰濬潭澗澗長是以窈窕除菰以作洲言所以紆餘也水草則萍藻薀菼雚蒲芹蓀蒹菰蘋蘩蕝荇菱蓮雖備物之偕美獨扶渠之華鮮播緑葉之鬱茂含紅敷之繽翻怨清香之難留矜盛容之易闌必充給而後搴豈蕙草之空殘卷叩弦之逸曲感江南之哀歎秦箏倡而溯遊往唐上奏而舊愛還搴出離騷叩弦是采菱歌江南是相和曲云江南采蓮秦箏倡蒹茄萹唐上奏蒲生詩皆感物致賦魚藻蘋蘩荇亦有詩人之詠不復具本草所載山澤不一雷桐是別和緩是悉參核六根五華九實二冬並稱而殊性三建異形而同出水香送秋而擢蒨林蘭近雪而揚猗卷柏萬代而不殞伏苓千歲而方知映紅葩於緑蒂茂素蕤於紫枝既住年而增靈亦驅妖而斥疵本草所出藥處於今不復依隨土所生耳此境出藥甚多雷公桐君古之采藥醫緩古之良工故曰別悉參核者雙核桃杏人也六根者苟七根五茄根葛根野葛根根也五華者堇華芫華檖華菊華旋覆華也九實者連前實槐實柏實兔絲實女貞實蛇床實蔓荊實蓼實也二冬者天門麥門冬三建者附子天雄烏頭水香蘭草林蘭支子卷柏伏苓並皆仙物凡此衆藥事悉見於神農其竹則二箭殊葉四苦齊味水石別谷巨細各彙既修竦而便娟亦蕭森而蓊蔚露夕沾而悽陰風朝振而清氣捎玄雲以拂杪臨碧潭而挺翠蔑上林與淇澳驗東南之所遺企山陽之遊踐遲鸞鷖之棲託憶崑園之悲調慨伶倫之哀籥衛女行而思歸詠楚客放而防露作二箭一者苦箭大葉一者笄箭細葉四苦青苦白苦紫苦黃苦水竹依水生甚細密吳中以為宅援石竹本科叢大以充屋榱巨者竿挺之屬細者無菁之流也修竦便娟蕭森蓊蔚皆竹貌也上林關中之禁苑淇澳衛地之竹園方此皆不如東南會稽之竹箭唯此地最富焉山陽竹林之遊鸞鷖棲食之所崑山之竹任為笛黃帝時伶倫斬其厚均者吹之為黃鍾之宮衛女思歸作竹竿之詩楚人放逐東方朔感江潭而作七諫其木則松柏檀櫟桐榆檿柘穀棟楸梓柳樗剛柔性異貞脆質殊卑高沃塉各隨所如幹合抱以隱岑杪千仞而排虛淩岡上而喬竦蔭澗下而扶疏沿長谷以傾柯攢積石以插衢華映水而增光氣結風而回敷當嚴徑而蔥倩承和煦而芬腴送墜葉於秋晏遲含萼於春初皆木之類選其美者載之山脊曰岡岡上澗下長谷積石各隨其方離騷云青春受謝白曰昭只詩云萼不也植物既載動類亦繁飛泳騁透胡可根源觀貌相音備列山川寒燠順節隨宜匪敦草木竹植物魚鳥獸動物獸有數種有騰者有走者走者騁騰者透謂種類既繁不可根源但觀其貌狀相其音聲則知山川之好興節隨宜自然之數非可敦戒也魚則鱧鮒鱮鱒鯇鰱鯿魴鮪鯊鱖鱨鯉鯔鱣輯采雜色錦爛雲鮮唼藻戲浪泛苻流淵或鼓鰓而湍躍或掉尾而波旋鱸鮆乘時以入浦沿瀨以出泉音優鱧音禮鮒音附鱮音鱒音寸袞反鯇音晥鰱音連鯿音毖仙反魴音房鮪音痏鯊音沙鱖音居綴反鱨音上羊反鯔音比之反鱣音竹仚反皆説文字林音詩云錦衾有爛故云錦爛鱸鮆一時魚音感音迅皆出溪中石上以為玩鳥則鵾鴻鶂鵠鷺鴇雞鵲繡質鶷鸐綬章晨鳧朝集時鷮山梁海鳥違風朔禽避涼荑生歸北霜降客南接響雲漢侶宿江潭聆清哇以下聽載王子而上參薄回涉以辨翰映明壑而自耽鵾音昆鴻音洪鶂音溢左傳云六鶂退飛字如此鵠音下竺反音秋鷺音路鴇音保音相唐公之馬與此鳥色同故謂為音相雞鵲鶷鸐見張茂先博物志鸐音翟亦雉之美者此四鳥並美采質鳧音符野鴨也常待晨而飛鷮音已消反長尾雉也論語云山梁雌雉時哉時哉海鳥爰居臧文仲不知其鳥以為神也事見左傳朔禽雁也寒月轉往衡陽禮記霜始降雁來賓歲莫云雁北向政是陽初生時荑生歸北霜降客南山雞映水自玩其羽儀者山上則猿貍獾犴獌猰山下則熊羆豺虎羱鹿麕擲飛枝於窮崖踔空絶於深硎蹲谷底而長嘯攀木杪而哀鳴猿音袁音魂貍音力之反獾音火丸反犴音五懸反獌音曼似獾而長狼之屬一曰貙猰音安黠反音弋生反貍之黃黑者一曰似豺音在皆反羱音元野羊大角麕音鬼珉反音京能踔擲虎長嘯猿哀鳴鳴聲可玩緡綸不投置羅不披磻弋靡用蹄筌誰施鑑虎狼之有仁傷遂欲之無崖顧弱齡而涉道悟好生之咸宜率所由以及物諒不遠之在斯撫鷗而悅豫杜機心於林池八種皆是魚獵之具自少不殺至乎白首故在山中而此歡永廢莊周云虎狼仁獸豈不父子相親世云虎狼暴虐者政以其如禽獸而人物不自悟其毒害而言虎狼可疾之甚苟其遂欲豈復崖限自弱齡奉法故得免殺生之事苟此悟萬物好生之理易云不遠復無祇悔庶乘此得以入道莊周云海人有機心鷗鳥舞而不下今無害彼之心各説豫於林池也敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之弘誓拯羣物之淪傾豈寓地而空言必有貸以善成欽鹿野之華苑羡靈鷲之名山企堅固之貞林希菴羅之芳園雖綷容之緬邈謂哀音之存建招提於幽峯冀振錫之息肩庶鐙王之贈席想香積之惠餐事在微而思通理匪絶而可溫賈誼弔屈云恭承嘉惠敬承亦此之流聚落是墟邑謂歌哭諍訟有諸喧譁不及山野為僧居止也經教欲令在山中皆有成文老子云善貸且善成此道惠物也鹿苑説四真諦處靈鷲山説般若法華處堅固林説泥洹處菴羅園説不思議處今旁林藝園制苑仿佛在昔依然託想雖綷容緬邈哀音若存也招提謂僧不能常住者可持作坐處也所謂息肩鐙王香積事出維摩經論語云溫故知新理既不絶更宜復溫則可待為己之日用也爰初經略杖策孤征入澗水涉登嶺山行陵頂不息窮泉不停櫛風沐雨犯露乘星研其淺思罄其短規非龜非筮擇良選奇翦榛開徑尋石覓崖四山周回雙流逶迤面南嶺建經臺倚北阜築講堂傍危峯立禪室臨浚流列僧房對百年之高木納萬代之芬芳抱終古之泉源美膏液之清長謝麗塔於郊郭殊世間於城傍欣見素以抱朴果甘露於道場云初經略躬自履行備諸苦辛也罄其淺短無假於龜筮貧者既不以麗為美所以即安茅茨而已是以謝郊郭而殊城傍然清虛寂漠實是得道之所也苦節之僧明發懷抱事紹人徒心通世表是遊是倚石構草寒暑有移至業莫矯觀三世以其夢撫六度以取道乘恬知以寂泊含和理之窈窕指東山以冥期實西方之潛兆雖一日以千載猶恨相遇之不早謂曇隆法流二法師也二公辭恩愛棄妻子輕舉入山外緣都絶魚肉不入口糞掃必在體物見之絶歎而法師處之夷然詩人西發不勝造道者其亦如此往石門瀑布中路高棲之遊昔告離之始期生東山沒存西方相遇之欣實以一日為千載猶慨恨不早賤物重己棄世希靈駭彼促年愛是長生冀浮丘之誘接望安期之招迎甘松桂之苦味夷皮褐以頽形羡蟬蛻之匪日撫雲霓其若驚陵名山而屢過巖室而披情雖未階於至道且緬絶於世纓指松菌而興言良未齊於殤彭此一章仙學者雖未及佛道之高然出於世表矣浮丘公是王子喬師安期先生是馬明生師二事出列仙傳洞真經云今學仙者亦明師以自發悟故不辭苦味頽形也莊周云和以天倪倪者崖也數經歷名山遇余巖室披露其情性且獲長生方之松菌殤彭邈然有間也山作水役不以一牧資待各徒隨節競逐陟嶺刊木除榛伐竹抽笋自篁擲篛于谷楊勝所拮秋冬獲野有蔓草獵涉櫻薁亦醞山清介爾景福苦以术成甘以熟慕椹高林剝芨巖椒掘蒨陽崖擲陰摽晝見搴茅宵見索綯芟菰翦蒲以薦以茭既泥既埏品收不一其灰其炭咸各有律六月採蜜八月朴栗備物為繁略載靡悉此一章謂是山作及水役採拾諸事也然漁獵之事皆不載楊楊桃也山間謂之木子音覆字出字林詩人云六月食鬱及薁獵涉字出爾雅术术酒味苦酒味甘並至美兼以療病治核术治痰冷椹音甚味似菰菜而勝刊木而作之謂之慕芨音及採以為紙蒨音倩採以為泄音鮮採以為飲採蜜撲栗各隨其月也若乃南北兩居水通陸阻觀風瞻雲方知厥所兩居謂南北兩處各有居止峯崿阻絶水道通耳觀風瞻雲然後方知其處所南山則夾渠二田周嶺三苑九泉別澗五谷異巘羣峯參差出其間連岫復陸成其坂衆流溉灌以環近諸堤擁抑以接遠遠堤兼陌近流開湍淩阜泛波水往步還還回往匝枉渚員巒呈美表趣胡可勝單抗北頂以葺館瞰南峯以啓軒羅曾崖於戶𩹉列鏡瀾於窗前因丹霞以頳楣附碧雲以翠椽視奔星之俯馳顧之未牽鵾鴻翻翥而莫及何但燕雀之翩翾氿泉傍出潺湲於東簷桀壁對跱硿於西霤修竹葳蕤以翳薈灌木森沈以蒙茂蘿曼延以攀援花芬薰而媚秀日月投光於柯間風露披清於岫夏涼寒燠隨時取適階基回互橑櫺乘隔此焉卜寢玩水弄石邇即回眺終歲罔斁傷美物之遂化怨浮齡之如借眇遁逸於人羣長寄心於雲霓南山是開創卜居之處也從江樓步路跨越山嶺綿亘田野或升或降當三里許塗路所經見也則喬木茂竹緣畛彌阜橫波疏石側道飛流以為寓目之美觀及至所居之處自西山開道迄于東山二里有餘南悉連嶺疊鄣青翠相接雲煙霄路殆無倪際從徑入谷凡有三口方壁西南石門世南池東南皆別載其事緣路初入行於竹徑半路闊以竹渠澗既入東南傍山渠展轉幽奇異處同美路北東西路因山為鄣正北狹處踐湖為池南山相對皆有崖巖東北枕壑下則清川如鏡傾柯盤石被隩映渚西巖帶林去潭可二十丈許葺基構宇在巖林之中水衛石階開窗對山仰眺曾峯俯鏡濬壑去巖半嶺復有一樓迥望周眺既得遠趣還顧西館望對窗戶緣崖下者密竹蒙徑從北直南悉是竹園東西百丈南北百五十五丈北倚近峯南眺遠嶺四山周回溪澗交過水石林竹之美巖岫隈曲之好備盡之矣刊翦開築此焉居處細趣密玩非可具記故較言大勢耳越山列其表側傍緬為異觀也因以小湖鄰於其隈衆流所湊萬泉所回氿濫異形首毖終肥別有山水路邈緬歸氿濫肥毖皆是泉名事見於詩云此萬泉所湊各有形勢求歸其路乃界北山棧道傾虧蹬閣連卷復有水徑繚繞回圓瀰瀰平湖泓泓澄淵孤岸竦秀長洲芊綿既瞻既眺曠矣悠然及其二川合流異源同口赴隘入險俱會山首瀨排沙以積丘峯倚渚以起阜石傾瀾而捎巖木映波而結藪徑南漘以橫前轉北崖而掩後隱叢灌故悉晨暮託星宿以知左右往反經過自非巖澗便是水徑洲島相對皆有趣也山川澗石州岸草木既標異於前章亦列同於後牘山匪砠而是岵川有清而無濁石傍林而插巖泉協澗而下谷淵轉渚而散芳岸靡沙而映竹草迎冬而結葩樹凌霜而振緑向陽則在寒而納煦面陰則當暑而含雪連岡則積嶺以隱嶙舉峯則羣竦以嶻浮泉飛流以寫空沈波潛溢於洞穴凡此皆異所而咸善殊節而俱悅土山載石曰殂山有林曰岵此章謂山川衆美亦不必有故總其最居山之後事亦皆有尋求也春秋有待朝夕須資既耕以飯亦桑貿衣藝菜當肴採藥救頽自外何事順性靡違法音晨聽放生夕歸研書賞理敷文奏懷凡厥意謂揚較以揮且列于言誡特此推謂寒待綿纊暑待絺綌朝夕餐飲設此諸業以待之藥以療疾又在其外事之相推自不得不然至於聽講放生研書敷文皆其所好韓非有揚較班固亦云揚較古今其義一也左思曰為左右揚較而陳之北山二園南山三苑百果備列乍近乍遠羅行布株迎早候晚猗蔚溪澗森疏崖巘杏壇園橘林栗圃桃李多品梨棗殊所枇杷林檎帶谷映渚椹梅流芬於回巒椑柿被實於長浦莊周云漁父見孔子杏壇之上維靡詰經樹園揚雄蜀都賦云橘林左太沖亦云戶有橘柚之園桃李所殖甚多棗梨事出北河濟之間淮潁諸處故云殊所也畦町所藝含蘂藉芳蓼蕺薺葑菲蘇薑緑葵眷節以懷露白薤感時而負霜寒蔥摽倩以陵陰春藿吐苕以近陽葑菲見詩柏舟中管子曰北伐山戎得寒蔥庾闡云寒蔥挺園灌蔬自供不待外求者也弱質難頽齡易喪撫鬢生悲視顏自傷承清府之有術冀在衰之可壯尋名山之奇藥越靈波而憩轅採石上之地黃摘竹下之天門托曾嶺之細辛拔幽澗之溪蓀訪鍾乳於洞穴訊丹陽於紅泉此皆住年之藥即近山之所出有采拾欲以消病也安居二時冬夏三月遠僧有來近衆無闕法鼓朗響頌偈清發散華霏蕤流香飛越析曠劫之微言説像法之遺旨乘此心之一豪濟彼生之萬理啓善趣於南倡歸清暢於北機非獨愜於豫情諒僉感於君子山中兮清寂羣紛兮自絶周聽兮匪多得理兮俱悅寒風兮搔屑面陽兮常熱炎光兮隆熾對陰兮霜雪愒曾臺兮陟雲根坐澗下兮越風穴在茲城而諧賞傳古今之不滅衆僧冬夏二時坐謂之安居輒九十日衆遠近聚萃法鼓頌偈華香四種是齋講之事析説是齋講之議乘此之心可濟彼之生南倡者都講北機者法師山中靜寂實是講説之處兼有林木可隨寒暑得清和以為適也好生之篤以我而觀懼命之盡吝景之歡分一往之仁心拔萬族之險難招驚魂於殆化收危形於將闌漾水性於江流吸雲物於天端覩騰翰之頏頡視鼓鰓之往還馳騁者儻能狂愈猜害者或可理攀云物皆好生但以我而觀便可知彼之情吝景懼命是好生事也能放生者但有一往之仁心便可拔萬族之險難水性雲物各尋其生老子云馳騁田獵令人心發狂猜害者以忍害為心見放生之理或可得悟也哲人不存懷抱誰質糟粕猶在啓縢剖帙見柱下之經二覩濠上之篇七承未散之全朴救已頽於道術嗟夫六藝以宣聖教九流以判賢徒國史以載前紀家傳以申世模篇章以陳美刺論難以核有無兵技醫日龜策筮夢之法風角冢宅算數律曆之書或平生之所流覽並於今而棄諸驗前識之喪道抱一德而不渝莊周云輪扁語齊桓公公之所讀書聖人之糟粕縢者金縢之流也柱下老子濠上莊子二七是篇數也云此二書最有理過此以往皆是聖人之教獨往者所棄伊昔齠實愛斯文援紙握管會性通神詩以言志賦以敷陳針銘誄頌咸各有倫爰暨山棲彌歷年紀幸多暇日自求諸己研精靜慮貞觀厥美懷秋成章含笑奏理謂少好文章及山棲以來別緣既闌尋慮文詠以盡暇日之適便可得通神會性以永終朝若乃乘攝持之告評養達之篇畏絶迹之不遠懼行地之多艱均上皇之自昔忌下衰之在旃投吾心於高人落賓名於聖賢廣滅景於崆洞許遁音於箕山愚假駒以表谷涓隱巖以搴芳萊庇蒙以織畚皓棲商而頤志卿寢茂而敷詞鄭別谷而永逝梁去霸而之會高居唐而胥宇臺依崖而穴墀咸自得以窮年眇貞思於所遺老子云善攝生者莊子云謂之不善持生又云養生有無崖達生者不務生之所無奈何絶迹上皇下衰賓名義亦皆出莊周廣成子在崆洞之上黃帝之師也許由隱於箕山堯以天下讓而不取愚公居于駒阜齊桓公逐鹿入山見之涓子隱於宕山好餌术告伯陽琴心三篇庚桑楚得老子之道居礨之山楚狂接輿楚王聞其賢使使者聘之於是遂遊諸名山在蜀峨眉山上徐無鬼巖棲魏侯勞之問先生苦山林矣乃肯見寡人無鬼問君絀嗜欲屏好惡則耳目察矣常采芋栗老萊子耕於蒙山之陽著書十五篇言道家之事織畚為業四皓避秦亂入商洛深山漢袓召不能出司馬長卿高才而處世不樂預公卿大事病免家居茂陵鄭子真耕隱谷口大將軍王鳳禮聘不屈遂與弟子別於山阿終身不反梁伯鸞隱霸陵山中耕織以自娛後復入會稽山臺孝威居武安山下依崖為土室采藥自給高文通居西唐山從容自娛也暨其窈窕幽深寂漠虛遠事與情乖理與形反既耳目之靡端豈足迹之所踐薀終古於三季俟通明於五眼權近慮以停筆抑淺知而絶簡謂此既非人迹所求更待三明五通然後可踐履耳故停筆絶簡不復多云冀夫賞音悟夫此旨也太祖登祚誅徐羡之等徵為祕書監再召不起上使光祿大夫范泰與靈運書敦奬之乃出就職使整理祕閣書補足遺闕又以晉氏一代自始至終竟無一家之史令靈運撰晉書粗立條流書竟不就尋遷侍中日夕引見賞遇甚厚靈運詩書皆兼獨絶每文竟手自寫之文帝稱為二寶既自以名輩才能應參時政初被召便以此自許既至文帝唯以文義見接每侍上宴談賞而已王曇首王華殷景仁等名位素不踰之並見任遇靈運意不平多稱疾不朝直穿池植援種竹樹堇驅課公役無復期度出郭遊行或一日百六七十里經旬不歸既無表聞又不請急上不欲傷大臣諷旨令自解靈運乃上表陳疾上賜假東歸將行上書勸伐河北曰自中原喪亂百有餘年流離寇戎湮沒殊類先帝聰明神武哀濟羣生將欲蕩定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡況陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事並非其才且遘紛京師豈慮託付遂使孤城窮陷莫肯拯赴忠烈囚朔漠綿河三千翻為寇有晚遣鎮戍皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染逆虜窮苦備罹徵調賦斂靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜舍末遠師隴外東虜乘虛呼可掩襲西軍既反得據關中長圍咸陽還路已絶雖遣救援停住河東遂乃遠討大城欲為首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於內時來之會莫復過此觀兵耀威實在茲日若相持未已或生事變忽值新起之衆則異於今苟乖其時難為經略雖兵食倍多則萬全無必矣又歷觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云既見天殃又見人災乃可以謀昔魏氏之強平定荊冀乃乘袁劉之弱晉世之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史策者也自羌平之後天下亦謂虜當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼關失守用緩天誅假延歲月日來至今十有二載是謂一紀曩有前言況五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若渴飢注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵強不必乘會於我為易貴在得時器械既充衆力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野強富之實昭然可知為國長久之計孰若一往之費邪或懲關西之敗而謂河北難守二境形勢表𩹉不同關西雜居種類不一昔在前漢屯軍霸上通火甘泉況乃遠戍之軍值新故交代之際者乎河北悉是舊戶差無雜人連嶺判阻三關作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言胸奴慢侮賈誼憤歎方於今日皆為魗矣晉武中主耳值孫晧虐亂天祚其德亦由巨平奉策荀賈折謀故能業崇當年區宇一統況今陛下聰明聖哲天下歸仁文德與武功並震霜威共素風俱舉協以宰輔賢明諸王美令嶽牧宣烈虎臣盈朝而天威遠命亦何敵不滅矧伊頑虜假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸罝蒙賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞靈運以疾東歸而遊娛宴集以夜續晝復為御史中丞傅隆所奏坐以免官是歲元嘉五年靈運既東還與族弟惠連東海何長瑜潁川荀雍泰山羊璿之以文章賞會共為山澤之遊時人謂之四友惠連幼有才悟而輕薄不為父方明所知靈運去永嘉還始寧時方明為會稽郡靈運嘗自始寧至會稽造方明過視惠連大相知賞時長瑜教惠連讀書亦在郡內靈運又以為絶倫謂方明曰阿連才悟如此而尊作常兒遇之何長瑜當今仲宣而飴以下客之食尊既不能禮賢宜以長瑜還靈運靈運載之而去荀雍字道雍官至員外散騎郎璿之字曜璠臨川內史為司空竟陵王誕所遇誕敗坐誅長瑜文才之美亞於惠連雍璿之不及也臨川王義慶招集文士長瑜自國侍郎至平西記室參軍嘗於江陵寄書與宗人何勗以韻語序義慶州府僚佐云陸展染鬢髮欲以媚側室青青不解久星星行復出如此者五六句而輕薄少年遂演而廣之凡厥人士並為題目皆加劇言苦句其文流行義慶大怒白太祖除為廣州所統曾城令及義慶薨朝士詣第哀何勗謂袁淑曰長瑜便可還也淑曰國新喪宗英未宜便以流人為念廬陵王紹鎮尋陽以長瑜為南中郎行參軍掌書記之任行至板橋遇暴風溺死靈運因父祖之資生業甚厚奴僮既衆義故門生數百鑿山浚湖功役無已尋山陟嶺必造幽峻巖嶂千重莫不備盡登躡常著木履上山則去前齒下山去其後齒嘗自始寧南山伐木開徑直至臨海從者數百人臨海太守王琇驚駭謂為山賊徐知是靈運乃安又要琇更進琇不肯靈運贈琇詩曰邦君難地嶮旅客易山行在會稽亦多徒衆驚動縣邑太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言會稽東郭有回踵湖靈運求決以為田太祖令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運既不得回踵又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毀傷之與顗遂構讎隙因靈運橫恣百姓驚擾乃表其異志發兵自防露板上言靈運馳出京都詣闕上表曰臣自抱疾歸山于今三載居非郊郭事乖人間幽棲窮巖外緣兩絶守分養命庶畢餘年忽以去月二十八日得會稽太守臣顗二十七日疏云比日異論噂此雖相了百姓不許寂默今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山陰防衛彰赫彭排馬槍斷截衢巷偵邏縱橫戈甲竟道不知微臣罪為何事及見顗雖曰見亮而裝防如此唯有罔懼臣昔忝近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虛聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚羣或勇冠鄉邦劍客馳逐未聞俎豆之學欲為逆節之罪山棲之士而構陵上之釁今影迹無端假謗空設終古之酷未之或有匪吝其生實悲其痛誠復內省不疚而抱理莫申是以牽曳疾病束骸歸款仰憑陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳太祖知其見誣不罪也不欲使東歸以為臨川內史加秩中二千石在郡遊放不異永嘉為有司所糾司徒遣使隨州從事鄭望生收靈運靈運執録望生興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子追討禽之送廷尉治罪廷尉奏靈運率部衆反叛論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕乃詔曰靈運罪釁纍仍誠合盡法但謝玄勳參微管宜宥及後嗣可降死一等徙付廣州其後秦郡府將宗齊受至塗口行達桃墟村見有七人下路亂語疑非常人還告郡縣遣兵隨齊受掩討遂共格戰悉禽付獄其一人姓趙名欽山陽縣人云同村薛道雙先與謝康樂共事以去九月初道雙因同村成國報欽云先作臨川郡犯事徙送廣州謝給錢令買弓箭刀楯等物使道雙要合鄉里健兒於三江口篡取謝若得者如意之後功勞是同遂合部黨要謝不及既還飢饉緣路為劫盜有司又奏依法收治太祖詔於廣州行棄市刑臨死作詩曰龔勝無餘生李業有終盡𩣉公理既迫霍生命亦殞悽悽凌霜葉網網衝風菌邂逅竟幾何修短非所愍送心自覺前斯痛久已忍恨我君子志不獲巖上泯詩所稱龔勝李業猶前詩子房魯連之意也時元嘉十年年四十九所著文章傳於世子鳳蚤卒史臣曰民稟天地之靈含五常之德剛柔迭用喜慍分情夫志動於中則歌詠外發六義所因四始攸繫升降謳謠紛披風什雖虞夏以前遺文不覩稟氣懷靈理無或異然則歌咏所興宜自生民始也周室既衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石高義薄雲天自茲以降情志愈廣王褒劉向揚班崔蔡之徒異軌同奔遞相師祖雖清辭麗曲時發乎篇而蕪音纍氣固亦多矣若夫平子艷發文以情變絶唱高蹤久無嗣響至于建安曹氏基命二祖陳王咸蓄盛藻甫乃以情緯文以文被質自漢至魏四百餘年辭人才子文體三變相如巧為形似之言班固長於情理之説子建仲宣以氣質為體並標能擅美獨映當時是以一世之士各相慕習原其飈流所始莫不同祖風騷徒以賞好異情故意製相詭降及元康潘陸特秀律異班賈體變曹王縟旨星稠繁文綺合綴平臺之逸響採南皮之高韻遺風餘烈事極江右有晉中興玄風獨振為學窮於柱下博物止乎七篇馳騁文辭義單乎此自建武暨乎義熙歷載將百雖綴響聯辭波屬雲委莫不寄言上德託意玄珠遒麗之辭無聞焉爾仲文始革孫許之風叔源大變太元之氣爰逮宋氏顏謝騰聲靈運之興會標舉延年之體裁明密並方軌前秀垂範後昆若夫敷衽論心商榷前藻工拙之數如有可言夫五色相宣八音協暢由乎玄黃律呂各適物宜欲使宮羽相變低昂互節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異妙達此旨始可言文至於先士茂製諷高歷賞子建函京之作仲宣霸岸之篇子荊零雨之章正長朔風之句並直舉胸情非傍詩史正以音律調韻取高前式自騷人以來多歷年代雖文體稍精而此祕未覩至於高言妙句音韻天成皆暗與理合匪由思至張蔡曹王曾無先覺潘陸謝顏去之彌遠世之知音者有以得之知此言之非謬如曰不然請待來哲
