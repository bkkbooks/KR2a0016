body:
  text: 宋書卷六十九列傳第二十九劉湛范曄劉湛字弘仁南陽涅陽人也祖耽父柳並晉左光祿大夫開府儀同三司湛出繼伯父淡襲封安衆縣五等男少有局力不尚浮華博涉史傳諳前世舊典弱年便有宰世情常自比管夷吾諸葛亮不為文章不喜談議本州辟主簿不就除著作佐郎又不拜高祖以為太尉行參軍賞遇甚厚高祖領鎮西將軍荊州刺史以湛為功曹仍補治中別駕從事史復為太尉參軍世子征虜西中郎主簿父柳亡於江州州府送故甚豐一無所受時論稱之服終除祕書丞出為相國參軍謝晦王弘並稱其有器幹高祖入受晉命以第四子義康為冠軍將軍豫州刺史留鎮壽陽以湛為長史梁郡太守義康弱年未親政府州軍事悉委湛府進號右將軍仍隨府轉義康以本號徙為南豫州湛改領歷陽太守為人剛嚴用法姦吏犯贓百錢以上皆殺之自下莫不震肅廬陵王義真出為車騎將軍南豫州刺史湛又為長史太守如故義真時居高祖憂使帳下備膳湛禁之義真乃使左右索魚肉珍羞於齊內別立帳會湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒一碗酒亦何傷長史事同一家望不為異酒既至湛因起曰既不能以禮自處又不能以禮處人景平元年召入拜尚書吏部郎遷右衛將軍出督廣交二州諸軍事建威將軍平越中郎將廣州刺史嫡母憂去職服闋為侍中撫軍將軍江夏王義恭鎮江陵以湛為使持節南蠻校尉領撫軍長史行府州事時王弘輔政而王華王曇首任事居中湛自謂才能不後之不願外出是行也謂為弘等所斥意甚不平常曰二王若非代邸之舊無以至此可謂遭遇風雲湛負其志氣常慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季圭琰於江陵病卒湛求自送喪還都義恭亦為之陳請太祖答義恭曰吾亦得湛啓事為之酸懷乃不欲苟違所請但汝弱年新涉庶務八州殷曠專斷事重疇咨委仗不可不得其人量算二三未獲便相順許今答湛啓權停彼葬頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罰豫關失得者必宜悉相委寄義恭性甚狷隘年又漸長欲專政事每為湛所裁主佐之間嫌隙遂構太祖聞之密遣使詰讓義恭并使深加諧緝義恭具陳湛無居下之禮又自以年長未得行意雖奉詔旨頗有怨言上友于素篤欲加酬順乃詔之曰事至於此甚為可歎當今乏才委授已爾宜盡相彌縫取其可取棄其可棄汝疏云泯然無際如此甚佳彼多猜不可令萬一覺也汝年已長漸更事物且羣情矚望不以幼昧相期何由故如十歲時動止咨問但當今所專必是小事耳亦恐量此輕重未必盡得彼之疑怨兼或由此邪先是王華既亡曇首又卒領軍將軍殷景仁以時賢零落白太祖徵湛八年召為太子詹事加給事中本州大中正與景仁並被任遇湛常云今世宰相何難此政可當我南陽郡漢世功曹耳明年景仁轉尚書僕射領選護軍將軍湛代為領軍將軍十二年又領詹事湛與景仁素發又以其建議徵之甚相感說及俱被時遇猜隙漸生以景仁專管內任謂為間己時彭城王義康專秉朝權而湛昔為上佐遂以舊情委心自結欲因宰相之力以回主心傾黜景仁獨當時務義康屢構之於太祖其事不行義康僚屬及湛諸附隸潛相約勒無敢歷殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐵干祿由敬文暗淺上負生成合門慚懼無地自處敬文之姦諂無愧如此義康擅勢專朝威傾內外湛愈推崇之無復人臣之禮上稍不能平湛初入朝委任甚重日夕引接恩禮綢繆善論治道并諳前世故事致銓理聽者忘疲每入雲龍門御者便解駕左右及羽儀隨意分散不夕不出以此為常及至晚節驅煽義康凌轢朝廷上意雖內離而接遇不改上嘗謂所親曰劉班初自西還吾與語常看日早晚慮其當去比入吾亦看日早晚慮其不去湛小字班虎故云班也遷丹陽尹金紫光祿大夫加散騎常侍詹事如故十七年所生母亡時上與義康形迹既乖釁難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日正賴口舌爭之故得推遷耳今既窮毒無復此望禍至其能久乎十月詔曰劉湛階藉門蔭少叨榮位往佐歷陽姦詖夙著謝晦之難潛使密告求心即事久宜誅屏朕所以棄罪略瑕庶收後效寵秩優忝踰越倫匹而凶忍忌克剛愎靡厭無君之心觸遇斯發遂乃合黨連羣構扇同異附下蔽上專弄威權薦子樹親互為表𩹉邪附者榮曜九族秉理者推陷必至旋觀姦慝為日已久猶欲弘納遵養冀或悛革自邇以來凌縱滋甚悖言懟容罔所顧忌陰謀潛計睨兩宮豈唯彰暴國都固亦達于四海比年七曜違度震蝕表災侵陽之徵事符幽顯搢紳含憤義夫興歎昔齊魯不綱禍傾邦國昭宣電斷漢祚方延便收付廷尉肅明刑典於獄伏誅時年四十九子黯大將軍從事中郎黯及二弟亮儼並從誅湛弟素黃門侍郎徙廣州湛初被收歎曰便是亂邪仍又曰不言無我應亂殺我自是亂法耳入獄見素曰乃復及汝邪相勸為惡惡不可為相勸為善正見今日如何湛生女輒殺之為士流所怪范曄字蔚宗順陽人車騎將軍泰少子也母如厠産之額為磚所傷故以磚為小字出繼從伯弘之襲封武興縣五等侯少好學博涉經史善為文章能隸書曉音律年十七州辟主簿不就高祖相國掾彭城王義康冠軍參軍隨府轉右軍參軍入補尚書外兵郎出為荊州別駕從事史尋召為祕書丞父憂去職服終為征南大將軍檀道濟司馬領新蔡太守道濟北征曄憚行辭以腳疾上不許使由水道統載器仗部伍軍還為司徒從事中郎頃之遷尚書吏部郎元嘉九年冬彭城太妃薨將葬祖夕僚故並集東府曄弟廣淵時為司徒祭酒其日在直曄與司徒左西屬王深宿廣淵許夜中酣飲開北牖聽挽歌為樂義康大怒左遷曄宣城太守不得志乃刪衆家後漢書為一家之作在郡數年遷長沙王義欣鎮軍長史加寧朔將軍兄皓為宜都太守嫡母隨皓在官十六年母亡報之以疾曄不時奔赴及行又攜妓妾自隨為御史中丞劉損所奏太祖愛其才不罪也服闋為始興王濬後軍長史領南下邳太守及濬為揚州未親政事悉以委曄尋遷左衛將軍太子詹事曄長不滿七尺肥黑禿眉鬚善彈琵琶能為新聲上欲聞之屢諷以微旨曄僞若不曉終不肯為上彈上嘗宴飲歡適謂曄曰我欲歌卿可彈曄乃奉旨上歌既畢曄亦止弦初魯國孔熙先博學有縱橫才志文史星算無不兼善為員外散騎侍郎不為時所知久不得調初熙先父默之為廣州刺史以贓貨得罪下廷尉大將軍彭城王義康保持之故得免及義康被黜熙先密懷報效欲要朝廷大臣未知誰可動者以曄意志不滿欲引之而熙先素不為曄所重無因進說曄外甥謝綜雅為曄所知熙先嘗經相識乃傾身事綜與之結厚熙先藉嶺南遺財家甚富足始與綜諸弟共博故為拙行以物輸之綜等諸年少既屢得物遂日夕往來情意稍款綜乃引熙先與曄為數曄又與戲熙先故為不敵前後輸曄物甚多曄既利其財寶又愛其文藝熙先素有詞辨盡心事之曄遂相與異常申莫逆之好始以微言動曄曄不回熙先乃極辭譬說曄素有閨庭論議朝野所知故門胄雖華而國家不與姻娶熙先因以此激之曰丈人若謂朝廷相待厚者何故不與丈人婚為是門戶不得邪人作犬豕相遇而丈人欲為之死不亦惑乎曄默然不答其意乃定時曄與沈演之並為上所知待每被見多同曄若先至必待演之俱入演之先至嘗獨被引曄又以此為怨曄纍經義康府佐見待素厚及宣城之授意好乖離綜為義康大將軍記室參軍隨鎮豫章綜還申義康意於曄求解晚隙復敦往好曄既有逆謀欲探時旨乃言於上曰臣歷觀前史二漢故事諸蕃王政以訞詛幸災便正大逆之罰況義康姦心釁跡彰著遐邇而至今無恙臣竊惑焉且大梗常存將重階亂骨肉之際人所難言臣受恩深重故冒犯披露上不納熙先素善天文云太祖必以非道晏駕當由骨肉相殘江州應出天子以為義康當之綜父述亦為義康所遇綜弟約又是義康女夫故太祖使綜隨從南上既為熙先所奬說亦有酬報之心廣州人周靈甫有家兵部曲熙先以六十萬錢與之使於廣州合兵靈甫一去不反大將軍府史仲承祖義康舊所信念屢銜命下都亦潛結腹心規有異志聞熙先有誠密相結納丹陽尹徐湛之素為義康所愛雖為舅甥恩過子弟承祖因此結事湛之告以密計承祖南下申義康意於蕭思話及曄云本欲與蕭結婚恨始意不果與范本情不薄中間相失傍人為之耳有法略道人先為義康所供養粗被知待又有王國寺法靜尼亦出入義康家內皆感激舊恩規相拯拔並與熙先往來使法略罷道本姓孫改名景玄以為臧質寧遠參軍熙先善於治病兼能診脉法靜尼妹夫許耀領隊在臺宿衛殿省嘗有病因法靜尼就熙先乞治為合湯一劑耀疾即損耀自往酬謝因成周旋熙先以耀膽幹可施深相待結因告逆謀耀許為內應豫章胡遵世藩之子也與法略甚款亦密相酬和法靜尼南上熙先遣婢採藻隨之付以箋書陳說圖讖法靜還義康餉熙先銅匕銅鑷袍段奩等物熙先慮事泄鴆採藻殺之湛之又謂曄等臧質見與異常歲內當還已報質悉攜門生義故其亦當解人此旨故應得健兒數百質與蕭思話款密當仗要之二人並受大將軍眷遇必無異同思話三州義故衆力亦不減質郡中文武及合諸處偵邏亦當不減千人不憂兵力不足但當勿失機耳乃略相署置湛之為撫軍將軍揚州刺史曄中軍將軍南徐州刺史熙先左衛將軍其餘皆有選擬凡素所不善及不附義康者又有別簿並入死目熙先使弟休先先為檄文曰夫休否相乘道無泰狂狡肆逆明哲是殛故小白有一匡之勳重耳有翼戴之德自景平肇始皇室多故大行皇帝天誕英姿聰明睿哲拔自藩國嗣位統天憂勞萬機垂心庶務是以邦內安逸四海同風而比年以來姦豎亂政刑罰乖淫陰陽違舛致使釁起蕭牆危禍萃集賊臣趙伯符積怨含毒遂縱姦凶肆兵犯蹕禍流儲宰崇樹非類傾墜皇基罪百浞過十玄莽開闢以來未聞斯比率土叩心華夷泣血咸懷亡身之誠同思糜軀之報湛之曄與行中領軍蕭思話行護軍將軍臧質行左衛將軍孔熙先建威將軍孔休先忠貫白日誠著幽顯義痛其心事傷其目投命奮戈萬殞莫顧即日斬伯符首及其黨與雖豺狼即戮王道惟新而普天無主羣萌莫係彭城王體自高祖聖明在躬德格天地勳溢區宇世路威夷勿用南服龍潛鳳栖于茲六稔蒼生飢德億兆渴化豈唯東征有鴟梟之歌陝西有勿翦之思哉靈祇告徵祥之應讖記表帝者之符上答天心下愜民望正位辰極非王而誰今遣行護軍將軍臧質等齎皇帝璽綬星馳奉迎百官備禮駱驛繼進並命羣帥鎮戍有常若干撓義徒有犯無貸昔年使反湛之奉賜手勑逆誡禍亂預覩斯萌令宣示朝賢共拯危溺無斷謀事失於後機遂使聖躬濫酷大變奄集哀恨崩裂撫心摧哽不知何地可以厝身輒督厲頓死而後已熙先以既為大事宜須義康意旨曄乃作義康與湛之書宣示同黨曰吾凡人短才生長富貴任情用己有過不聞與物無喜怒違實致使小人多怨士類不歸禍敗已成猶不覺悟退加尋省方知自招刻肌刻骨何所復補然至於盡心奉上誠貫幽顯拳拳謹慎惟恐不及乃可恃寵驕盈實不敢故為欺罔也豈苞藏逆心以招灰滅所以推誠自信不復防護異同率意信心不顧萬物議論遂致讒巧潛構衆惡歸集甲姦險好利負吾事深乙凶愚不齒扇長無賴丙丁趨走小子唯知諂進伺求長短共造虛說致令禍陷骨肉誅戮無辜凡在過釁竟有何徵而刑罰所加同之元惡傷和枉理感徹天地吾雖幽逼日苦命在漏刻義慨之士時有音信每知天文人事及外間物情土崩瓦解必在朝夕是為釁起羣賢濫延國家夙夜憤踊心腹交戰朝之君子及士庶白黑懷義秉理者寧可不識時運之會而坐待橫流邪除君側之惡非唯一代況此等狂亂罪骩終古所無加之翦戮易於摧朽邪可以吾意宣示衆賢若能同心奮發族裂逆黨豈非功均創業重造宋室乎但兵凶戰危或致侵濫若有一豪犯順誅及九族處分之要委之羣賢皆當謹奉朝廷動止聞啓往日嫌怨一時豁然然後吾當謝罪北闕就戮有司苟安社稷暝目無恨勉之勉之二十二年九月征北將軍衡陽王義季右將軍南平王鑠出鎮上於武帳岡祖道曄等期以其日為亂而差互不得發於十一月徐湛之上表曰臣與范曄本無素舊中忝門下與之鄰省屢來見就故漸成周旋比年以來意態轉見傾動險忌富貴情深自謂任遇未高遂生怨望非唯攻伐朝士譏謗聖時乃上議朝廷下及藩輔驅扇同異恣口肆心如此之事已具上簡近員外散騎侍郎孔熙先忽令大將軍府吏仲承祖騰曄及謝綜等意欲收合不逞規有所建以臣昔蒙義康接盼又去歲羣小為臣妄生風塵謂必嫌懼深見勸誘兼云人情樂亂機不可失讖緯天文並有徵驗曄尋自來復具陳此并說臣論議轉惡全身為難即以啓聞被敕使相酬引究其情狀於是悉出檄書選事及同惡人名手墨翰跡謹封上呈凶悖之甚古今罕比由臣暗於交士聞此逆謀臨啓震惶荒情無措詔曰湛之表如此良可駭惋曄素無行檢少負瑕釁但以才藝可施故收其所長頻加榮爵遂參清顯而險利之性有過溪壑不識恩遇猶懷怨憤每存容養冀能悛革不謂同惡相濟狂悖至此便可收掩依法窮詰其夜先呼曄及朝臣集華林東閣止於客省先已於外收綜及熙先兄弟並皆款服于時上在延賢堂遣使問曄曰以卿粗有文翰故相任擢名爵期懷於例非少亦知卿意難厭滿正是無理怨望驅扇朋黨而已云何乃有異謀曄倉卒怖懼不即首款上重遣問曰卿與謝綜徐湛之孔熙先謀逆並已答款猶尚未死徵據見存何不依實曄對曰今宗室磐石蕃嶽張跱設使竊發僥幸方鎮便來討伐幾何而不誅夷且臣位任過重一階兩級自然必至如何以滅族易此古人云左手據天下之圖右手刎其喉愚夫不為臣雖凡下朝廷許其粗有所及以理而察臣不容有此上復遣問曰熙先近在華林門外寧欲面辨之乎曄辭窮乃曰熙先苟誣引臣臣當如何熙先聞曄不服笑謂殿中將軍沈邵之曰凡諸處分符檄書疏皆范曄所造及治定云何於今方作如此抵踏邪上示以墨迹曄乃具陳本末曰久欲上聞逆謀未著又冀其事消弭故推遷至今負國罪重分甘誅戮其夜上使尚書僕射何尚之視之問曰卿事何得至此曄曰君謂是何尚之曰卿自應解曄曰外人傳庾尚書見憎計與之無惡謀逆之事聞孔熙先說此輕其小兒不以經意今忽受責方覺為罪君方以道佐世使天下無寃弟就死之後猶望君照此心也明日仗士送曄付廷尉入獄問徐丹陽所在然後知為湛之所發熙先望風吐款辭氣不橈上奇其才遣人慰勞之曰以卿之才而滯於集書省理應有異志此乃我負卿也又詰責前吏部尚書何尚之曰使孔熙先年將三十作散騎郎那不作賊熙先於獄中上書曰囚小人猖狂識無遠概徒狥意氣之小感不料逆順之大方與第二弟休先首為姦謀干犯國憲膾脯醢無補尤戾陛下大明含弘量苞天海録其一介之節猥垂優逮之詔恩非望始沒有遺榮終古以來未有斯比夫盜馬絶纓之臣懷璧投書之士其行至賤其過至微由識不世之恩以盡軀命之報卒能立功齊魏致勳秦楚囚雖身陷禍逆名節俱喪然少也慷慨竊慕烈士之遺風但墜崖之木事絶升躋覆盆之水理乖收汲方當身膏鈇鉞詒誡方來若使魂而有靈結草無遠然區區丹抱不負夙心貪及視息少得申暢自惟性愛羣書心解數術智之所周力之所至莫不窮攬究其幽微考論既往誠多審驗謹略陳所知條牒如故別狀願且勿遺棄存之中書若囚死之後或可追存庶九泉之下少塞釁責所陳並天文占候讖上有骨肉相殘之禍其言深切曄在獄與綜及熙先異處乃稱疾求移考堂欲近綜等見聽與綜等果得隔壁遙問綜曰始被收時疑誰所告綜云不知曄曰乃是徐童童徐湛之小名仙童也在獄為詩曰禍福本無兆性命歸有極必至定前期誰能延一息在生已可知來緣無識好醜共一丘何足異枉直豈論東陵上寧辨首山側雖無嵇生琴庶同夏侯色寄言生存子此路行復即曄本意謂入獄便死而上窮治其獄遂經二旬曄更有生望獄吏因戲之曰外傳詹事或當長繫曄聞之驚喜綜熙先笑之曰詹事嘗共疇昔事時無不攘袂瞋目及在西池射堂上躍馬顧盼自以為一世之雄而今擾攘紛紜畏死乃爾設令今時賜以性命人臣圖主何顏可以生存曄謂衛獄將曰惜哉薶如此人將曰不忠之人亦何足惜曄曰大將言是也將出市曄最在前於獄門顧謂綜曰今日次第當以位邪綜曰賊帥為先在道語笑初無暫止至市問綜曰時欲至未綜曰勢不復久曄既食又苦勸綜綜曰此異病篤何事強飯曄家人悉至市監刑職司問須相見不曄問綜曰家人以來幸得相見將不暫別綜曰別與不別亦何所存來必當號泣正足亂人意曄曰號泣何關人向見道邊親故相瞻望亦殊勝不見吾意故欲相見於是呼前曄妻先下撫其子回罵曄曰君不為百歲阿家不感天子恩遇身死固不足塞罪奈何枉殺子孫曄乾笑云罪至而已曄所生母泣曰主上念汝無極汝曾不能感恩又不念我老今日奈何仍以手擊曄頸及頰曄顏色不怍妻云罪人阿家莫念妹及妓妾來別曄悲涕流漣綜曰舅殊不同夏侯色曄收淚而止綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多也曄轉醉子藹亦醉取地土及果皮以擲曄呼曄為別駕數十聲曄問曰汝恚我邪藹曰今日何緣復恚但父子同死不能不悲耳曄常謂死者神滅欲著無鬼論至是與徐湛之書云當相訟地下其謬亂如此又語人寄語何僕射天下決無佛鬼若有靈自當相報收曄家樂器服玩並皆珍麗妓妾亦盛飾母住止單陋唯有一盛樵薪弟子冬無被叔父單布衣曄及子藹遙叔蔞孔熙先及弟休先景先思先熙先子桂甫桂甫子白民謝綜及弟約仲承祖許耀諸所連及並伏誅曄時年四十八曄兄弟子父已亡者及謝綜弟緯徙廣州藹子魯連吳興昭公主外孫請全生命亦得遠徙世祖即位得還曄性精微有思致觸類多善衣裳器服莫不增損制度世人皆法學之撰和香方其序之曰麝本多忌過分必害沈實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬱金多和羅之屬並被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當彌增於尤疾也此序所言悉以比類朝士麝本多忌比庾炳之零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沈實易和以自比也曄獄中與諸甥姪書以自序曰吾狂釁覆滅豈復可言汝等皆當以罪人棄之然平生行己任懷猶應可尋至於能不意中所解汝等或不悉知吾少懶學問晚成人年三十許政始有向耳自爾以來轉為心化推老將至者亦當未已也往往有微解言乃不能自盡為性不尋注書心氣惡小苦思便憒悶口機又不調利以此無談功至於所通解處皆自得之於胸懷耳文章轉進但才少思難所以每於操筆其所成篇殆無全稱者常恥作文士文患其事盡於形情急於藻義牽其旨韻移其意雖時有能者大較多不免此纍政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性旨趣千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性別宮商識清濁斯自然也觀古今文人多不全了此處縱有會此者不必從根本中來言之皆有實證非為空談年少中謝莊最有其分手筆差易文不拘韻故也吾思乃無定方特能濟難適輕重所稟之分猶當未盡但多公家之言少於事外遠致以此為恨亦由無意於文名故也本未關史書政覺其不可解耳既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名既任情無例不可甲乙辨後贊於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深旨既有裁味故約其詞句至於循吏以下及六夷諸序論筆勢縱放實天下之奇作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復未果贊自是吾文之傑思殆無一字空設奇變不窮同合異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絶處亦復何異邪其中體趣言之不盡弦外之意虛響之音不知所從而來雖少許處而旨態無極亦嘗以授人士庶中未有一豪似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名曄自序並實故存之藹幼而整潔衣服竟歲未嘗有塵點死時年二十曄少時兄晏常云此兒進利終破門戶終如晏言史臣曰古之人云利令智昏甚矣利害之相傾劉湛識用才能實苞經國之略豈不知移弟為臣則君臣之道用變兄成主則兄弟之義殊乎而義康數懷姦計苟相崇說與夫推長戟而犯魏闕亦何以異哉
