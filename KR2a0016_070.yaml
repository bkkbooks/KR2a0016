body:
  text: 宋書卷七十列傳第三十袁淑袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風氣年數歲伯父湛謂家人曰此非凡兒至十餘歲為姑夫王弘所賞不為章句之學而博涉多通好屬文辭采遒豔縱橫有才辨本州命主簿著作佐郎太子舍人並不就彭城王義康命為司徒祭酒義康不好文學雖外相禮接意好甚疏劉湛淑從母兄也欲其附己而淑不以為意由是大相乖失以久疾免官補衡陽王義季右軍主簿遷太子洗馬以腳疾不拜衛軍臨川王義慶雅好文章請為咨議參軍頃之遷司徒左西屬出為宣城太守入補中書侍郎以母憂去職服闋為太子中庶子元嘉二十六年遷尚書吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中嶽席卷趙魏檢玉岱宗今其時也臣逢千載之會願上封禪書一篇太祖笑曰盛德之事我何足以當之出為始興王征北長史南東海太守淑始到府濬引見謂曰不意舅遂垂屈佐淑答曰朝廷遣下官本以光公府望還為御史中丞時索虜南侵遂至瓜步太祖使百官議防禦之術淑上議曰臣聞函車之獸離山必斃絶波之鱗宕流則枯羯寇遺醜趨致畿甸蟻萃螽集聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晉輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵於能濟矣乃者燮定攜遠阻違授律由將有弛拙故士少鬬志圍潰之衆匪寇傾淪攻制之師空自班散濟西徑騎急戰旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使潞子入患伊川來擾紛殄姬風泯毒禹績騰書有渭陰之迫懸烽均咸陽之警然而切揣虛實伏匿先彰校索伎能譎詭既顯綿地千里彌行阻深表𩹉躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸陷溢痁禍洊興芻藁已單米粟莫係水宇襟帶進必傾霣河隘扁固退亦墮滅所謂栖烏於烈火之上養魚於叢棘之中或謂損緩江右寬繕淮內竊謂拯扼閩城舊史為允棄遠涼土前言稱非限此要荒猶弗委割況聯被京國咫尺神甸數州摧掃列邑殲痍山淵反覆草木塗地今丘賦千乘井算萬集肩摩倍於長安締袂百於臨淄什一而籍實慊氓願履畝以稅既協農和戶競戰心人含鋭志皆欲贏糧請奮釋緯乘城謂宜懸金鑄印要壯果之士重幣甘辭招摧決之將舉薦板築之下抽登臺皂之間賞之以焚書報之以相爵俄而昭才賀闕異能間至戎貪而無謀肆而不整迷乎向背之次謬於合散之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謠言緡命宜選敢悍數千騖行潛掩偃旗裹甲鉗馬銜枚檜稽而起晨壓未陳旌譟亂舉火鼓四臨使景不暇移塵不及起無不禽鎩獸讋冰解霧散掃洗噍類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還徑兗部徑卒梗其歸塗必剪元雄懸首麾下乃將隻輪不反戰轊無旋矣於是信臣騰威武士繕力緹組接陰鞞柝聯響若其偽遁瀛漲出沒無際楚言漢旆顯默如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命憑城借一則當因威席卷乘機芟剿泗汴秀士星流電燭徐阜嚴兵雨湊雲集蹶亂桑溪之北搖潰浣海以南絶其心根勿使能植銜索之枯幾何不𢀿是由涸澤而漁焚林而狩若浚風之輕籜杲日之拂浮霜既而尉洽荷掠之餘望吊網悲之鬼然後天行樞運猋舉煙升青蓋西巡翠華東幸經啓州野舉無遺策俾高闕再勒燕然後銘方乃奠山沉河創禮輯策闡耀炎昊之遺則貫軼商夏之舊文今衆賈拳勇而將術疏怯意者稔泰日積承平歲久邑無驚赴之急家緩餽戰之勤闕閲訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選攉論深切躬擐盡幽斬帶尋遠設有沉明能照俊偉自宣誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數達昏明益損之宜能睽合民心愚睿物性登丹墀而敷策躡青蒲而揚謀上説辰鑒下弭素言足以安民紓國救災恤患則宜拔過寵貴之上褒升戚舊之右別其旗章榮其班祿出得專譽使不稟命降席折節同廣武之請設壇致禮均淮陰之授必有要盟之功竊符之捷夷裔暴很內外侮棄始附之衆分茷無序蠱以威利勢必攜離首順之徒靡然自及今淶繹故典瀍土纓緌翦焉幽播折首凶狡是猶眇者願明痿之思步動商遄會功終易感劫晉在於善覘全鄭實寄良諜多縱反間汨惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汨以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辨則堅圍可解馳羽而巖邑易傾必府鬲土崩枝幹瓦裂故燕樂相悔項范交疑矣或乃言約功深事邇應廣齊圉反駕趙養還君盡輿誦之道畢能事之效臣幸得出內層禁遊息明代澤與身泰恩隨年行無以逢迎昌運潤飾鴻法今塗有遺鏃蠆未息蜂敢思涼識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終朝之抗辭杜耿之言事咸云及經之棘猶闕上算燭郛之敬裁收下策自恥懦木智不綜微敢露昧見無昭採淑喜為誇誕每為時人所謿始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑淑與濬書曰袁司直之視館敢寓書於上國之宮尹日者猥枉泉賦降委弊邑弊邑敬事是遑無或違二懼非郊贈之禮覲饗之資不虞君王惠之於是也是有懵焉弗圖旦夕發咫尺之記籍左右而請以為胥授失旨爰速先幣曾是附庸臣委末學孤聞者如之何勿疑且亦聞之前志曰七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也藉恐二三諸侯有以觀大國之政是用敢布心腹弊室弱生砥節清廉好是潔直以不邪之故而貧聞天下寧有昧夫嗟金者哉不腆供賦束馬先璧以俟命唯執事所以圖之遷太子左衛率元凶將為弒逆其夜淑在直二更許呼淑及蕭斌等流涕謂曰主上信讒將見罪廢內省無過不能受枉明旦便當行大事望相與勠力淑及斌並曰自古無此願加善思劭怒變色左右皆動斌懼乃曰臣昔忝伏事常思效節況憂迫如此輒當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼時嘗患風或是疾動耳劭愈怒因問曰事當克不淑曰居不疑之地何患不克但既克之後為天地之所不容大禍亦旋至耳願急息之劭左右引淑衣曰此是何事而可言罷因賜淑等袴褶又就主衣取錦截三尺為一段又中破分斌淑及左右使以縛袴淑出還省繞牀行至四更乃寢劭將出已與蕭斌同載呼淑甚急淑眠終不起劭停車奉化門催之相續徐起至車後劭使登車又辭不上劭因命左右與手刃見殺於奉化門外時年四十六劭即位追贈太常賜賵甚厚世祖即位使顏延之為詔曰夫輕道重義亟聞其教世弊國危希遇其人自非達義之至識正之深者孰能抗心衛主遺身固節者哉故太子左衛率淑文辨優洽秉尚貞賣心當要逼之切意色不橈厲辭道逆氣震凶黨虐刃交至取斃不移古之懷忠隕難未云出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中太尉諡曰忠憲公又詔曰袁淑以身殉義忠烈邈古遺孤在疚特所矜懷可厚加賜恤以慰存亡淑及徐湛之江湛王僧綽卜天與四家於是長給稟祿文集傳於世子幾敳稜凝標敳世祖步兵校尉凝太宗世御史中丞出為晉陵太守太宗初與四方同反兵敗歸降以補劉湛冠軍府主簿淑諸子並早卒史臣曰天長地久人道則異於斯蕣華朝露未足以言也其間夭遽曾何足云宜任心去留不以存沒嬰心徒以靈化悠遠生不再來雖天行路嶮而未之斯遇謂七尺常存百年可保也所以據洪圖而輕天下吝寸陰而敗尺璧若乃義重乎生空炳前誥投軀殉主世罕其人若無陽源之節丹青何貴焉爾
