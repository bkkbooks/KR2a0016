body:
  text: 宋書卷七十三列傳第三十三顏延之顏延之字延年琅邪臨沂人也曾祖含右光祿大夫祖約零陵太守父顯護軍司馬延之少孤貧居負郭室巷甚陋好讀書無所不覽文章之美冠絕當時飲酒不護細行年三十猶未婚妹適東莞劉憲之穆之子也穆之既與延之通家又聞其美將仕之先欲相見延之不往也後將軍吳國內史劉柳以為行參軍因轉主簿豫章公世子中軍行參軍義熙十二年高祖北伐有宋公之授府遣一使慶殊命參起居延之與同府王參軍俱奉使至洛陽道中作詩二首文辭藻麗為謝晦傅亮所賞宋國建奉常鄭鮮之舉為博士仍遷世子舍人高祖受命補太子舍人雁門人周續之隱居廬山儒學著稱永初中徵詣京師開館以居之高祖親幸朝彥畢至延之官列猶卑引升上席上使問續之三義續之雅仗辭辯延之每折以簡要既連挫續之上又使還自敷釋言約理暢莫不稱善徙尚書儀曹郎太子中舍人時尚書令傅亮自以文義之美一時莫及延之負其才辭不為之下亮甚疾焉廬陵王義真頗好辭義待接甚厚徐羨之等疑延之為同異意甚不悅少帝即位以為正員郎兼中書尋徙員外常侍出為始安太守領軍將軍謝晦謂延之曰昔荀勗忌阮咸斥為始平郡今卿又為始安可謂二始黃門郎殷景仁亦謂之曰所謂俗惡俊異世疵文雅延之之郡道經汨潭為湘州刺史張邵祭屈原文以致其意曰恭承帝命建旟舊楚訪懷沙之淵得捐佩之浦弭節羅潭艤舟汨渚敬祭楚三閭大夫屈君之靈蘭薰而摧玉貞則折物忌堅芳人諱明潔曰若先生逢辰之缺溫風迨時飛霜急節嬴芊遘紛昭懷不端謀折儀尚貞蔑椒蘭身絕郢闕迹遍湘干比物荃蓀連類龍鸞聲溢金石志華日月如彼樹芬實穎實發望汨心欷瞻羅思越藉用可塵昭忠難闕元嘉三年羨之等誅徵為中書侍郎尋轉太子中庶子頃之領步兵校尉賞遇甚厚延之好酒疎誕不能斟酌當世見劉湛殷景仁專當要任意有不平常云天下之務當與天下共之豈一人之智所能獨了辭甚激揚每犯權要謂湛曰吾名器不升當由作卿家吏湛深恨焉言於彭城王義康出為永嘉太守延之甚怨憤乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康曰鸞翮有時鎩龍性誰能馴詠阮籍曰物故可不論塗窮能無慟詠阮咸曰屢薦不入官一麾乃出守詠劉伶曰韜精日沉飲誰知非荒宴此四句蓋自序也湛及義康以其辭旨不遜大怒時延之已拜欲黜為遠郡太祖與義康詔曰降延之為小邦不政有謂其在都邑豈動物情罪過彰著亦士庶共悉直欲選代令思愆里閭猶復不悛當驅往東土乃志難恕自可隨事錄治殷劉意咸無異也乃以光祿勳車仲遠代之延之與仲遠世素不協屏居里巷不豫人間者七載中書令王球名公子遺務事外延之慕焉球亦愛其材情好甚款延之居常罄匱球輒贍之晉恭思皇后葬應須百官湛之取義熙元年除身以延之兼侍中邑吏送札延之醉投札於地曰顏延之未能事生焉能事死閑居無事為庭誥之文今刪其繁辭存其正著于篇曰庭誥者施於閨庭之內謂不遠也吾年居秋方慮先草木故遽以未聞誥爾在庭若立履之方規鑒之明已列通人之規不復續論今所載咸其素蓄本乎性靈而致之心用夫選言務一不尚煩密而至於備議者蓋以網諸情非古語曰得鳥者羅之一目而一目之羅無時得鳥矣此其積意之方道者識之公情者德之私公通可以使神明加嚮私塞不能令妻子移心是以昔之善為士者必捐情反道合公屏私尋尺之身而以天地為心數紀之壽常以金石為量觀夫古先垂戒長老餘論雖用細制每以不朽見銘繕築末迹咸以可久承志況樹德立義收族長家而不思經遠乎曰身行不足遺之後人欲求子孝必先慈將責弟悌務為友雖孝不待慈而慈固植孝悌非期友而友亦立悌夫和之不備或應以不和猶信不足焉必有不信儻知恩意相生情理相出可使家有參柴人皆由損夫內居德本外夷民譽言高一世處之逾默器重一時體之滋沖不以所能干衆不以所長議物淵泰入道與天為人者士之上也若不能遺聲欲人出己知柄在虛求不可校得敬慕謙通畏避矜踞思廣監擇從其遠猷文理精出而言稱未達論問宣茂而不以居身此其亞也若乃聞實之為貴以辯畫所克見聲之取榮謂爭奪可獲言不出於戶牖自以為道義久立才未信於僕妾而曰我有以過人於是感苟銳之志馳傾觖之望豈悟已挂有識之裁入修家之誡乎記所云千人所指無病自死者也行近於此者吾不願聞之矣凡有知能預有文論若不練之庶士校之羣言通才所歸前流所與焉得以成名乎若呻吟於牆室之內喧囂於黨輩之間竊議以迷寡聞妲語以敵要說是短算所出而非長見所上適值尊朋臨座稠覽博論而言不入於高聽人見棄於衆視則慌若迷塗失偶黶如深夜撤燭銜聲茹氣腆默而歸豈識向之夸慢祇足以成今之沮喪邪此固少壯之廢爾其戒之夫以怨誹為心者未有達無心救得喪多見誚耳此蓋臧獲之為豈識量之為事哉是以德聲令氣愈上每高忿言懟議每下愈發有尚於君子者寧可不務勉邪雖曰人情不能素盡故當以遠理勝之么算除之豈可不務自異而取陷庸品乎富厚貧薄事之懸也以富厚之身親貧薄之人非可一時同處然昔有守之無怨安之不悶者蓋有理存焉夫既有富厚必有貧薄豈其證然時乃天道若人皆厚富是理無貧薄然乎必不然也若謂富厚在我則宜貧薄在人可乎又不可矣道在不然義在不可而橫意去就謬生希幸以為未達至分蠶溫農飽民生之本躬稼難就止以僕役為資當施其情願庀其衣食定其當治遞其優劇出之休饗後之捶責雖有勸恤之勤而無霑曝之苦務前公稅以遠吏讓無急傍費以息流議量時發斂視歲穰儉省贍以奉己損散以及人此用天之善御生之得也率下多方見情為上立長多術晦明為懿雖及僕妾情見則事通雖在畎畝明晦則功博若奪其常然役其煩務使威烈雷霆猶不禁其欲雖棄其大用窮其細瑕或明灼日月將不勝其邪故曰孱焉則差的焉則闇是以禮道尚優法意從刻優則人自為厚刻則物相為薄耕收誠鄙此用不忒所謂野陋而不以居心也含生之氓同祖一氣等級相傾遂成差品遂使業習移其天識世服沒其性靈至夫願欲情嗜宜無間殊或役人而養給然是非大意不可侮也隅奧有竈齊侯蔑寒犬馬有秩管燕輕饑若能服溫厚而知穿弊之苦明周之德厭滋旨而識寡嗛之急仁恕之功豈與夫比肌膚於草石方手足於飛走者同其意用哉罰慎其濫惠戒其偏罰濫則無以為罰惠偏則不如無惠雖爾眇末猶扁庸保之上事思反己動類念物則其情得而人心塞矣抃博蒲塞會衆之事諧調哂謔適坐之方然失敬致侮皆此之由方其剋瞻彌喪端儼況遭非鄙慮將醜折豈若拒其容而簡其事靜其氣而遠其意使言必諍厭賓友清耳笑不傾撫左右悅目非鄙無因而生侵侮何從而入此亦持德之管籥爾其謹哉嫌惑疑心誠亦難分豈唯厚貌蔽智之明深情怯剛之斷而已哉必使猜怨愚賢則嚬笑入戾期變犬馬則步顧成妖況動容竊斧束裝濫金又何足論是以前王作典明慎議獄而僭濫易意朱公論璧光澤相如而倍薄異價此言雖大可以戒小遊道雖廣交義為長得在可久失在輕絕久由相敬絕由相狎愛之勿勞當扶其正性忠而勿誨必藏其枉情輔以藝業會以文辭使親不可褻疏不可間每存大德無挾小怨率此往也足以相終酒酌之設可樂而不可嗜嗜而非病者希病而遂眚者幾既眚既病將蔑其正若存其正性紓其妄發其唯善戒乎聲樂之會可簡而不可違違而不背者鮮矣背而非弊者反矣既弊既背將受其毀必能通其礙而節其流意可為和中矣善施者豈唯發自人心乃出天則與不待積取無謀實並散千金誠不可能贍人之急雖乏必先使施如王丹受如杜林亦可與言交矣浮華怪飾滅質之具奇服麗食棄素之方動人勸慕傾人顧盻可以遠識奪難用近欲從若覩其淫怪知生之無心為見奇麗能致諸非務則不抑自貴不禁自止夫數相者必有之徵既聞之術人又驗之吾身理可得而論也人者兆氣二德禀體五常二德有奇偶五常有勝殺及其為人寧無叶沴亦猶生有好醜死有夭壽人皆知其懸天至於丁年乖遇中身迂合者豈可易地哉是以君子道命愈難識道愈堅古人恥以身為溪壑者屏欲之謂也欲者性之煩濁氣之蒿蒸故其為害則燻心智耗真情傷人和犯天性雖生必有之而生之德猶火含煙而煙妨火桂懷蠹而蠹殘桂然則火勝則煙滅蠹壯則桂折故性明者欲簡嗜繁者氣惛去明即惛難以生矣是以中外羣聖建言所黜儒道衆智發論是除然有之者不患誤深故藥之者苦術淺所以毀道多而於義寡頓盡誠難每指可易能易每指亦明之末廉嗜之性不同故畏慕之情或異從事於人者無一人我之心不以己之所善謀人為有明矣不以人之所務失我能有守矣己所謂然而彼定不然弈之蔽悅彼之可而忘我不可學嚬之蔽將求去蔽者念通怍介而已流言謗議有道所不免況在闕薄難用算防接應之方言必出己或信不素積嫌間所襲或性不和物尤怨所聚有一于此何處逃毀苟能反悔在我而無責於人必有達鑒昭其情遠識迹其事日省吾躬月料吾志寬默以居潔靜以期神道必在何恤人言喭曰富則盛貧則病矣貧之病也不唯形色粗黶或亦神心沮廢豈但交友疎棄必有家人誚讓非廉深識遠者何能不移其植故欲蠲憂患莫若懷古懷古之志當自同古人見通則憂淺意遠則怨浮昔有琴歌於編蓬之中者用此道也夫信不逆彰義必幽隱交賴相盡明有相照一面見旨則情固丘岳一言中志則意入淵泉以此事上水火可蹈以此託友金石可弊豈待充其榮實乃將議報厚之篚筐然後圖終如或與立茂思無忽祿利者受之易易則人之所榮蠶穡者就之艱艱則物之所鄙艱易既有勤倦之情榮鄙又間向背之意此二塗所為反也以勞定國以功施人則役徒屬而擅豐麗自埋於民自事其生則督妻子而趨耕織必使陵侮不作懸企不萌所謂賢鄙處宜華野同泰人以有惜為質非假嚴刑有為德不慕厚貴有惜者以理葬有者與物終世有位去則情盡斯無惜矣又有務謝則心移斯不矣又非徒若此而已或見人休事則懃蘄結納及聞否論則處彰離貳附會以從風隱竊以成釁朝吐面譽暮行背毀昔同稽款今猶叛戾斯為甚矣又非唯若此而已或憑人惠訓藉人成立與人餘論依人揚聲曲存禀仰甘赴塵軌衰沒畏遠忌聞影迹又蒙蔽其善毀之無度心短彼能私樹己拙自崇輩罔顧高識有人至此實蠹大倫每思防避無通閭伍覩驚異之事或涉流傳遭卒迫之變反思安順若異從己發將尸謗人迫而又迕愈使失度能夷異如裴楷處逼如裴遐可稱深士乎喜怒者有性所不能無常起於褊量而止於弘識然喜過則不重怒過則不威能以恬漠為體寬愉為器則為美矣大喜蕩心微抑則定甚怒煩性小忍即歇故動無愆容舉無失度則物將自懸人將自止習之所變亦大矣豈唯蒸性染身乃將移智易慮故曰與善人居如入芷蘭之室久而不知其芬與之化矣與不善人居如入鮑魚之肆久而不知其臭與之變矣是以古人慎所與處唯夫金真玉粹者乃能盡而不汙爾故曰丹可滅而不能使無赤石可毀而不可使無堅苟無丹石之性必慎浸染之由能以懷道為念必存從理之心道可懷而理可從則不議貧議所樂爾或云貧何由樂此未求道意道者瞻富貴同貧賤理固得而齊自我喪之未為通議苟議不喪夫何不樂或曰溫飽之貴所以榮生饑寒在躬空曰從道取諸其身將非篤論此又通理所用凡養生之具豈間定實或以膏腴夭性有以菽藿登年中散云所足在內不由於外是以稱體而食貧歲愈嗛量腹而炊豐家餘飡非粒實息耗意有盈虛爾況心得優劣身獲仁富明白入素氣志如神雖十旬九飯不能令饑業席三屬不能為寒豈不信然且以己為度者無以自通彼量渾四游而斡五緯天道弘也振河海而載山川地道厚也一情紀而合流貫人靈茂也昔之通乎此數者不為剖判之行必廣其風度無挾私殊博其交道靡懷曲異故望塵請友則義士輕身一遇拜親則仁人投分此倫序通允禮俗平一上獲其用下得其和世務雖移前休未遠人之適主吾將反本夫人之生暫有心識幼壯驟過衰耗騖及其間夭鬱既難勝言假獲存遂又云無幾柔麗之身亟委土木剛清之才遽為丘壤回遑顧慕雖數紀之中爾以此持榮曾不可留以此服道亦何能平進退我生遊觀所達得貴為人將在含理含理之貴惟神與交幸有心靈義無自惡偶信天德逝不上慚欲使人沈來化志符往哲勿謂是賒日鑿斯密著通此意吾將忘老如曰不然其誰與歸偶懷所撰略布衆條若備舉情見顧未書一贍身之經別在田家節政奉終之紀自著燕居畢義劉湛誅起延之為始興王濬後軍諮議參軍御史中丞在任縱容無所舉奏遷國子祭酒司徒左長史坐啟買人田不肯還直尚書左丞荀赤松奏之曰求田問舍前賢所鄙延之唯利是視輕冒陳聞依傍詔恩拒捍餘直垂及周年猶不畢了昧利苟得無所顧忌延之昔坐事屏斥復蒙抽進而曾不悛革怨誹無已交遊闒茸沈迷麴糵橫興譏謗詆毀朝士仰竊過榮增憤薄之性私恃顧盻成強梁之心外示寡求內懷奔競干祿祈遷不知極已預讌班觴肆罵上席山海含容每存遵養愛兼彫蟲未忍遐棄而驕放不節日月彌著臣聞聲問過情孟軻所恥況聲非外來問由己出雖心智薄劣而高自比擬客氣虛張曾無愧畏豈可復弼亮五教增曜台階請以延之訟田不實妄干天聽以強凌弱免所居官詔可復為祕書監光祿勳太常時沙門釋慧琳以才學為太祖所賞愛每召見常升獨榻延之甚疾焉因醉白上曰昔同子參乘袁絲正色此三台之坐豈可使刑餘居之上變色延之性既褊激兼有酒過肆意直言曾無遏隱故論者多不知云居身清約不營財利布衣蔬食獨酌郊野當其為適傍若無人二十九年上表自陳曰臣聞行百里者半於九十言其末路之難也愚心常謂為虛方今乃知其信臣延之人薄寵厚宿塵國言而雪効無從榮牒增廣曆盡身彫日叨官次雖容載有塗而妨穢滋積早欲啟請餘算屏蔽醜老但時制行及歸慕無賒是以腆冒愆非簡息干黷耗歇難支質用有限自去夏侵暑入此秋變頭齒眩疼根痼漸劇手足冷痺左胛尤甚素不能食頃向減半本猶賴服食比倦悸遠晚年疾所催顧景引日臣班叨首卿位尸封典肅祗朝校尚恧匪任而陵廟衆事有以疾怠宮府覲慰轉闕躬親息馼庸微過宰近邑回澤爰降實加將監乞解所職隨就藥養伏願聖慈特垂矜許禀恩明世負報冥暮仰企端闈上戀罔極不許明年致事元凶弒立以為光祿大夫先是子竣為世祖南中郎諮議參軍及義師入討竣參定密謀兼造書檄劭召延之示以檄文問曰此筆誰所造延之曰竣之筆也又問何以知之延之曰竣筆體臣不容不識劭又曰言辭何至乃爾延之曰竣尚不顧老父何能為陛下劭意乃釋由是得免世祖登阼以為金紫光祿大夫領湘東王師子竣既貴重權傾一朝凡所資供延之一無所受器服不改宅宇如舊常乘羸牛笨車逢竣鹵簿即屏往道側又好騎馬遨游里巷遇知舊輒據鞍索酒得酒必頹然自得常語竣曰平生不喜見要人今不幸見汝竣起宅謂曰善為之無令後人笑汝拙也表解師職加給親信三十人孝建三年卒時年七十三追贈散騎常侍特進金紫光祿大夫如故諡曰憲子延之與陳郡謝靈運俱以詞彩齊名自潘岳陸機之後文士莫及也江左稱顏謝焉所著並傳於世竣別有傳竣弟測亦以文章見知官至江夏王義恭大司徒錄事參軍蚤卒太宗即位詔曰延之昔師訓朕躬情契兼款前記室參軍濟陽太守馼伏勤蕃朝綢繆恩舊可擢為中書侍郎馼延之第三子也史臣曰出身事主雖義在忘私至於君親兩事既無同濟為子為臣各隨其時可也若夫馳文道路軍政儀成敗所因非繫乎此而據筆數罪陵讎犯逆餘彼慈親垂之虎吻以此為忠無聞前誥夫自忍其親必將忍人之親自忘其孝期以申人之孝食子放鹿斷可識矣記云八十者一子不從政九十者家不從政豈不以年薄桑榆憂患將及雖有職王朝許以辭事況顛沛之道慮在未測者乎自非延年之辭允而義愜夫豈或免
