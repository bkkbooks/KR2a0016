body:
  text: 宋書卷七十六列傳第三十六朱修之宗賣心王玄謨朱修之字恭祖義陽平氏人也曾祖燾晉平西將軍祖序豫州刺史父諶益州刺史修之自州主簿遷司徒從事中郎文帝謂曰卿曾祖昔為王導丞相中郎卿今又為王弘中郎可謂不忝爾祖矣後隨到彥之北伐彥之自河南回留修之戍滑臺為虜所圍數月糧盡將士熏鼠食之遂陷於虜初修之母聞其被圍既久常憂之忽一旦乳汁驚出母號泣告家人曰吾今已老忽復有乳汁斯不祥矣吾兒其不利乎後問至修之果以此日陷沒託跋燾嘉其守節以為侍中妻以宗室女修之潛謀南歸妻疑之每流涕問其意修之深嘉其義竟不告也後鮮卑馮弘稱燕王治黃龍城託跋燾伐之修之與同沒人邢懷明並從又有徐卓者復欲率南人竊發事泄被誅修之懷明懼奔馮弘弘不禮留一年會宋使傳詔至修之名位素顯傳詔見即拜之彼國敬傳詔謂為天子邊人見其致敬於修之乃始加禮時魏屢伐弘或説弘遣修之歸求救遂遣之泛海至東萊遇猛風柁折垂以長索船乃復正海師望見飛鳥知其近岸須臾至東萊元嘉九年至京邑以為黃門侍郎纍遷江夏內史雍州刺史劉道産卒羣蠻大動修之為征西司馬討蠻失利孝武初為寧蠻校尉雍州刺史加都督修之在政寬簡士衆悅附及荊州刺史南郡王義宣反檄修之舉兵修之偽與之同而遣使陳誠於帝帝嘉之以為荊州刺史加都督義宣聞修之不與己同乃以魯秀為雍州刺史擊襄陽修之命斷馬鞍山道秀不得前乃退及義宣敗於梁山單舟南走修之率衆南定遺寇時竺超民執義宣修之至乃殺之以功封南昌縣侯修之治身清約凡所贈貺一無所受有餉或受之而旋與佐吏賭之終不入己唯以撫納羣蠻為務徵為左民尚書轉領軍將軍去鎮秋毫不犯計在州然油及牛馬穀草以私錢十六萬償之然性儉剋少恩情姊在鄉里飢寒不立修之未嘗供贍嘗往視姊姊欲激之為設菜羹粗飯修之曰此乃貧家好食致飽而去先是新野庾彥達為益州刺史攜姊之鎮分祿秩之半以供贍之西土稱焉修之後墜車折腳辭尚書領崇憲太僕仍加特進金紫光祿大夫以腳疾不堪獨行特給扶侍卒贈侍中特進如故諡貞侯宗賣心字元幹南陽人也叔父炳高尚不仕賣心年少時炳問其志賣心曰願乘長風破萬里浪炳曰汝不富貴即破我家矣兄泌娶妻始入門夜被劫賣心年十四挺身拒賊賊十餘人皆披散不得入室時天下無事士人並以文義為業炳素高節諸子羣從皆好學而賣心獨任氣好武故不為鄉曲所稱江夏王義恭為征北將軍南兗州刺史賣心隨鎮廣陵時從兄綺為征北府主簿綺嘗入直而給吏牛泰與綺妾私通賣心殺泰綺壯其意不責也元嘉二十二年伐林邑賣心自奮請行義恭舉賣心有膽勇乃除振武將軍為安西參軍蕭景憲軍副隨交州刺史和之圍區粟城林邑遣將范毗沙達來救區粟和之遣偏軍拒之為賊所敗又遣賣心賣心乃分軍為數道偃旗潛進討破之拔區粟入象浦林邑王范陽邁傾國來拒以具裝被象前後無際士卒不能當賣心曰吾聞師子威服百獸乃製其形與象相禦象果驚奔衆因潰散遂克林邑收其異寶雜物不可勝計賣心一無所取衣櫛蕭然文帝甚嘉之後為隨郡太守雍州蠻屢為寇建威將軍沈慶之率賣心及柳元景等諸將分道攻之羣蠻大潰又南新郡蠻帥田彥生率部曲反叛焚燒郡城屯據白楊山元景攻之未能下賣心率其所領先登衆軍隨之羣蠻由是畏服三十年孝武伐元凶以賣心為南中郎咨議參軍領中兵孝武即位以為左衛將軍封洮陽侯功次柳元景孝建中纍遷豫州刺史監五州諸軍事先是鄉人庾業家甚富豪方丈之膳以待賓客而賣心至設以菜葅粟飯謂客曰宗軍人慣噉粗食賣心致飽而去至是業為賣心長史帶梁郡賣心待之甚厚不以前事為嫌大明三年竟陵王誕據廣陵反賣心表求赴討乘驛詣都面受節度上停輿慰勉賣心聳躍數十左右顧盻上壯之及行隸車騎大將軍沈慶之初誕誑其衆云宗賣心助我及賣心至躍馬繞城呼曰我宗賣心也事平入為左衛將軍五年從獵墮馬腳折不堪朝直以為光祿大夫加金紫賣心有佳牛堪進御官買不肯賣坐免官明年復職廢帝即位為寧蠻校尉雍州刺史加都督卒贈征西將軍諡曰肅侯泰始二年詔以賣心配食孝武廟子羅雲卒子元寶嗣王玄謨字彥德太原祁人也六世祖宏河東太守綿竹侯以從叔司徒允之難棄官北居新興仍為新興鴈門太守其自云爾祖牢仕慕容氏為上谷太守陷慕容德居青州父秀早卒玄謨幼而不羣世父蕤有知人鑒常笑曰此兒氣概高亮有太尉彥雲之風武帝臨徐州辟為從事史與語異之少帝末謝晦為荊州請為南蠻行參軍武寧太守晦敗以非大帥見原元嘉中補長沙王義欣鎮軍中兵參軍領汝陰太守時虜攻陷滑臺執朱修之以歸玄謨上疏曰王途始開隨復淪塞非惟天時抑亦人事虎牢滑臺豈惟將之不良抑亦本之不固本之不固皆由民憚遠役臣請以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趣淆澠征士無遠徭之思吏士有屢休之歌若欲以東國之衆經營牢洛道途既遠獨克實難玄謨每陳北侵之策上謂殷景仁曰聞王玄謨陳説使人有封狼居胥意後為興安侯義賓輔國司馬彭城太守義賓薨玄謨上表以彭城要兼水陸請以皇子撫臨州事乃以孝武出鎮及大舉北征以玄謨為寧朔將軍前鋒入河受輔國將軍蕭斌節度玄謨向碻磝戍主奔走遂圍滑臺積旬不克虜主託跋燾率大衆號百萬鞞鼓之聲震動天地玄謨軍衆亦盛器械甚精而玄謨專依所見多行殺戮初圍城城內多茅屋衆求以火箭燒之玄謨恐損亡軍實不從城中即撤壞之空地以為窟室及魏救將至衆請發車為營又不從將士多離怨又營貨利一匹布責人八百梨以此倍失人心及託跋燾軍至乃奔退麾下散亡略盡蕭斌將斬之沈慶之固諫曰佛狸威震天下控弦百萬豈玄謨所能當且殺戰將以自弱非良計也斌乃止初玄謨始將見殺夢人告曰誦觀音經千遍則免既覺誦之得千遍明日將刑誦之不輟忽傳呼停刑遣代守碻磝江夏王義恭為征討都督以為碻磝不可守召令還為魏軍所追大破之流矢中臂二十八年正月還至歷城義恭與玄謨書曰聞因敗為成臂上金瘡得非金印之徵也元凶弒立玄謨為冀州刺史孝武伐逆玄謨遣濟南太守垣護之將兵赴義事平除徐州刺史加都督及南郡王義宣與江州刺史臧質反朝庭假玄謨輔國將軍拜豫州刺史與柳元景南討軍屯梁山夾岸築偃月壘水陸待之義宣遣劉諶之就臧質陳軍城南玄謨留老弱守城悉精兵接戰賊遂大潰加都督前將軍封曲江縣侯中軍司馬劉沖之白孝武言玄謨在梁山與義宣通謀上意不能明使有司奏玄謨多取寶貨虛張戰簿與徐州刺史垣護之並免官尋復為豫州刺史淮上亡命司馬黑石推立夏侯方進為主改姓李名弘以惑衆玄謨討斬之遷寧蠻校尉雍州刺史加都督雍土多僑寓玄謨請土斷流民當時百姓不願屬籍罷之其年玄謨又令九品以上租使貧富相通境內莫不嗟怨民間訛言玄謨欲反時柳元景當權元景弟僧景為新城太守以元景之勢制令南陽順陽上庸新城諸郡並發兵討玄謨玄謨令內外晏然以解衆惑馳啓孝武具陳本末帝知其虛馳遣主書吳喜公撫慰之又答曰梁山風塵初不介意君臣之際過足相保聊復為笑伸卿眉頭玄謨性嚴未嘗妄笑時人言玄謨眉頭未曾伸故帝以此戲之後為金紫光祿大夫領太常及建明堂以本官領起部尚書又領北選孝武狎侮羣臣隨其狀貌各有比類多鬚者謂之羊顏師伯缺齒號之曰齴劉秀之儉吝呼為老慳黃門侍郎宗靈秀體肥拜起不便每至集會多所賜與欲其瞻謝傾踣以為歡笑又刻木作靈秀父光祿勳叔獻像送其家廳事柳元景垣護之並北人而玄謨獨受老傖之目凡所稱謂四方書疏亦如之嘗為玄謨作四時詩曰堇荼供春膳粟漿充夏餐匏醬調秋菜白醝解冬寒又寵一昆崘奴子名白主常在左右令以杖擊羣臣自柳元景以下皆罹其毒玄謨尋遷平北將軍徐州刺史加都督時北土飢饉乃散私穀十萬斛牛千頭以振之轉領軍將軍孝武崩與柳元景等俱受顧命以外監事委玄謨時朝政多門玄謨以嚴直不容徙青冀二州刺史加都督少帝既誅顏師伯柳元景等狂悖益甚以領軍徵玄謨子姪咸勸稱疾玄謨曰吾受先帝厚恩豈可畏禍苟免遂行及至屢表諫諍又流涕請緩刑去殺以安元元少帝大怒明帝即位禮遇甚優時四方反叛以玄謨為大統領水軍南討以腳疾聽乘輿出入尋除車騎將軍江州刺史副司徒建安王於赭圻賜以諸葛亮筒袖鎧頃之為左光祿大夫開府儀同三司領護軍遷南豫州刺史加都督玄謨性嚴剋少恩而將軍宗越御下更苛酷軍士謂之語曰寧作五年徒不逢王玄謨玄謨猶自可宗越更殺我年八十一薨諡曰莊公子深早卒深子繢嗣史臣曰修之宗賣心皆以將帥之材懷廉潔之操有足稱焉玄謨雖苛剋少恩然觀其大節亦足為美當少帝失道多所殺戮而能冒履不測傾心輔弼斯可謂忘身徇國者歟
