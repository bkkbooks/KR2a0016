body:
  text: 宋書卷七十八列傳第三十八蕭思話劉延孫蕭思話南蘭陵人孝懿皇后弟子也父源之字君流歷中書黃門郎徐兗二州刺史冠軍將軍南琅邪太守永初元年卒追贈前將軍思話年十許歲未知書以博誕遊遨為事好騎屋棟打細腰鼓侵暴鄰曲莫不患毒之自此折節數年中遂有令譽好書史善彈琴能騎射高祖一見便以國器許之年十八除琅邪王大司馬行參軍轉相國參軍父憂去職服闋拜羽林監領石頭戍事襲爵封陽縣侯轉宣威將軍彭城沛二郡太守涉獵書傳頗能隸書解音律便弓馬元嘉元年謝晦為荊州欲請為司馬思話拒之五年遷中書侍郎仍督青州徐州之東莞諸軍事振武將軍青州刺史時年二十七亡命司馬朗之元之可之兄弟聚黨於東莞發干縣謀為寇亂思話遣北海太守蕭汪之討斬之餘黨悉平八年除竟陵王義宣左軍司馬南沛郡太守未及就徵索虜南寇檀道濟北伐既而回師思話懼虜大至乃棄鎮奔平昌思話先使參軍劉振之戍下邳聞思話奔亦委城走虜定不至而東陽積聚已為百姓所焚由是徵下廷尉仍繫尚方初在青州常所用銅斗覆在藥下忽於斗下得二死雀思話曰斗覆而雙雀殞其不祥乎既而被繫九年仇池大饑益梁州豐稔梁州刺史甄法護在任失和氐帥楊難當因此寇漢中乃自徒中起思話督梁南秦二州諸軍事橫野將軍梁南秦二州刺史既行聞法護已委鎮北奔西城遣司馬建威將軍南漢中太守蕭承之五百人前進又遣西戎長史蕭汪之係之承之緣路收合士衆得精兵千人十年正月進據磝頭難當焚掠漢中引衆西還留其輔國將軍梁秦二州刺史趙溫守梁州魏興太守薛健據黃金承之進屯磝頭遣陰平太守蕭坦赴黃金薛健副姜寶據鐵城鐵城與黃金相對去一里斫樹塞道坦進攻二戍拔之二月趙溫又率薛健及其寧朔將軍馮翊太守蒲早子來攻坦營坦奮擊大破之坦被創賊退保西水承之司馬錫文祖進據黃金蕭汪之步騎五百相繼而至平西將軍臨川王義慶遣龍驤將軍裴方明三千人赴承之等進黃金早子健等退保下桃思話先遣行參軍王靈濟率偏軍出洋川因向南城僞陵江將軍趙英堅守險靈濟擊破之生禽英南城空虛因資無所復引軍還與承之合三月承之率衆軍進據峨公固難當遣其子和率趙溫蒲早子及左衛將軍呂平寧朔將軍司馬飛龍步騎萬餘跨漢津結柴其間立浮橋悉力攻承之合圍數十重短兵接戰弓矢無復用賊悉衣犀革戈矛所不能加承之乃截矟長數尺以大斧椎之一矟輒貫十餘賊賊不能當因大敗燒柴奔走退據大桃閏月承之及方明臺軍至龍驤將軍楊平興幢主殿中將軍梁坦直入角弩追之賊又敗走殺傷虜獲甚多漢中平悉收沒地置戍葭萌水先是桓玄篡晉以桓希為梁州希敗走氐楊盛據有漢中刺史范元之傅歆悉治魏興唯得魏興上庸新城三郡其後索邈為刺史乃治南城為賊所焚燒不可固思話遷鎮南鄭加節進號寧朔將軍徵承之為太子屯騎校尉法護中山無極人過江寓居南郡弟法崇元嘉十年自少府為益州刺史法護委鎮之罪統府所收於獄賜死太祖以法崇受任一方令獄官言法護病卒太祖使思話上平定漢中本末下之史官十四年遷使持節臨川王義慶平西長史南蠻校尉太祖賜以弓琴手敕曰丈人頃何所作事務之暇故以琴書為娛耳所得不曰義邪眷想常不忘情想亦同之前得此琴云是舊物亦有名京邑今以相借因是戴顒意於彈撫響韻殊勝直爾嘉也并往桑弓一張材理乃快先所常用既久廢射又多病略不能制之便成老公令人歎息良材美器宜在盡用之地丈人真無所與讓也十六年衡陽王義季代義慶又除安西長史餘如故十九年徵為侍中領前軍將軍未就徵復先職明年遷持節監雍州梁南北秦四州荊州之南陽竟陵順陽襄陽新野隨六郡諸軍事寧蠻校尉雍州刺史襄陽太守二十二年除侍中領太子右率二十四年改領左衛將軍嘗從太祖登鍾山北嶺中道有磐石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又領南徐州大中正明年復監雍梁南北秦四州荊州之竟陵隨二郡諸軍事右將軍寧蠻校尉雍州刺史如故二十六年徵為吏部尚書詔思話曰沈尚書暴病不救其體業貞審立朝盡公年時尚可方相委任奄忽不永痛惋特深銓管要機通塞所寄丈人才用體國二三惟允思話以去州無復事力倩府軍身九人太祖戲之曰丈人終不為田父於里閭何應無人使邪未拜二十七年遷護軍將軍是年春虜攻懸瓠太祖將大舉北討朝士僉同莫或異議思話固諫不從乃領精甲三千助鎮彭城虜退即代世祖為持節監徐兗青冀四州豫州之梁郡諸軍事撫軍將軍兗徐二州刺史二十九年統揚武將軍冀州刺史張永衆軍圍碻磝初鎮軍咨議參軍申坦與王玄謨圍滑臺不克免官青州刺史蕭斌板坦行建威將軍濟南平原二郡太守守歷城令任仲仁又為坦副並前鋒入河五月發沿口永司馬崔訓建武將軍齊郡太守胡景世率青州軍來會七月思話及衆軍並至碻磝治三攻道太祖遣員外散騎侍郎徐爰宣旨督戰張永胡景世當東攻道申坦任仲仁西攻道崔訓南攻道賊夜地道出燒崔訓樓及蟆車又燒胡景世樓及攻具尋又毀崔訓攻道城不可拔思話馳來退師攻城凡十八日解圍還歷下崔訓以樓見燒又不能固攻道被誅於碻磝永坦並繫獄詔曰得撫軍將軍思話啓事碻磝不拔士卒疲勞且班師清濟更圖進討此鎮山川嚴阻控臨河朔形勝之要擅名自古宜除其授以允望實思話可解徐州為冀州餘如故彭城文武復量分配即鎮歷城尋為江夏王義恭所奏免官元凶弒立以為使持節監徐青兗冀四州豫州之梁郡諸軍事徐兗二州刺史將軍如故思話即率部曲還彭城起義以應世祖遣使奉箋曰下官近在歷下始奉國諱所承使人不知闊狹既還在路漸有所聞猶謂人倫無容有此私懷感慨未敢在言奉被今教果出慮表重增哀惋不能自勝此實天地所不覆載人神所不容忍率土民氓莫不憤咽況下官蒙荷榮渥義兼常志此月五日被驛使追命騎還朝切齒拊心輒已鍾疾雖百口在都一非所顧正欲遣啓受規略會奉今旨悲懼兼情伏承司徒英圖電發殿下神武霜斷臧質忠義並到不謀同時仗順沿流席卷江甸前驅風邁已應在近下官復練始集遣輔國將軍申坦龍驤將軍梁坦二軍分配精甲五千申坦為統便以即日水陸齊下下官悉率文武駱驛繼發憑威策懦勢同振朽開泰有期悲欣交集世祖至新亭坦亦進克京口上即位徵為散騎常侍尚書左僕射固辭不受拜改為中書令丹陽尹常侍如故時京邑多有劫掠二旬中十七發引咎陳遜不許明年出為使持節都督徐兗青冀幽五州豫州之梁郡諸軍事安北將軍徐州刺史加鼓吹一部未行而江州刺史臧質反復以為使持節都督江州豫州之西陽晉熙新蔡三郡諸軍事江州刺史事平分荊江豫三州置郢州復都督郢湘二州諸軍事鎮西將軍郢州刺史持節常侍如故鎮夏口孝建二年卒時年五十追贈征西將軍開府儀同三司持節常侍都督刺史如故諡曰穆侯思話宗戚令望蚤見任待凡歷州十二杖節監都督九焉所至雖無皎皎清節亦無穢黷之纍愛才好士人多歸之長子惠開嗣別有傳次子惠明亦有世譽歷黃門郎御史中丞司徒左長史吳興太守後廢帝元徽末卒官第四子惠基順帝升明末為侍中源之從父弟摹之丹陽尹追贈征虜將軍子斌亦為太祖所遇彭城王義康鎮豫章以為大將軍咨議參軍豫章太守歷南蠻校尉侍中輔國將軍青冀二州刺史元嘉二十七年統王玄謨等衆軍北伐斌遣將軍崔猛攻虜青州刺史張淮之於樂安淮之棄城走先是猛與斌參軍傅融分取樂安及碻磝樂安水道不通先并定碻磝至是又克樂安既而攻圍滑臺不拔斌追還歷下事在王玄謨傳二十八年亡命司馬順則詐稱晉室近屬自號齊王聚衆據梁鄒城又有沙門自稱司馬百年號安定王亡命秦凱之祖元明等各據村屯以應順則初梁鄒戍主宣威將軍樂安渤海二郡太守崔勳之出州故順則因虛竊據勳之司馬曹敬會拒戰不敵出走斌即遣勳之率行建威將軍濟南平原二郡太守申坦長流參軍羅文昌等諸軍討順則攻之不克勳之等始謂城內出於逼附軍至即應奔逃而並為賊堅守殺傷官軍甚多斌又遣府司馬建武將軍齊郡太守龐秀之總諸軍祖元明又據安丘城斌更遣振武將軍劉武之及軍主劉回精兵千人討司馬百年斬之順則既失據衆稍離阻文昌遣道連僞投賊賊信納之潛以官賞格示衆城內賊黨李繼叔等並有歸順心道連謀泄為賊所殺繼叔踰城出降賊黨於是大離乃四面進攻衝車所衝輒三五丈崩落時南門樓上擲下一級并垂繩釣取外人外人上賊並放仗云向已斬順則所投首是也秦凱之走河北斌坐滑臺退敗免官久之復起為南平王鑠右軍長史其後事迹在二凶傳斌弟簡歷位長沙內史廣陵王誕為廣州未之鎮以簡為安南咨議參軍南海太守行府州事東海王褘代誕簡仍為前軍咨議太守如故世祖入討元凶遣輔國將軍南海太守鄧琬討簡固守經時城陷伏誅斌簡諸子並誅滅龐秀之河南人也以斌故吏賊劭甚加信委以為遊擊將軍奔世祖於新亭時劭諸將未有降者唯秀之先至事平以為梁州刺史秀之子弟為劭所殺者將十人而酣宴不廢坐免官後又為徐州刺史太子右衛率孝建元年卒追贈本官加散騎常侍子彌之順帝升明末廣興公相秀之弟況之太宗世亦為始興相劉延孫彭城呂人雍州刺史道産子也初為徐州主簿舉秀才彭城王義康司徒行參軍尚書都官郎為錢唐令世祖撫軍廣陵王誕北中郎中兵參軍南清河太守世祖為徐州補治中從事史時索虜圍縣瓠分軍送所掠民口在汝陽太祖詔世祖遣軍襲之議者舉延孫為元帥固辭無將用舉劉泰之自代泰之既行太祖大怒免延孫官為世祖鎮軍北中郎中兵參軍南中郎咨議參軍領録事世祖伐逆府缺上佐轉補長史尋陽太守行留府事世祖即位以為侍中領前軍將軍下詔曰朕藉羣能之力雪莫大之恥以眇眇之身託于王公之上思所以策勳樹良永寧世烈新除侍中領前軍將軍延孫率懷忠敏器局沈正協贊義初誠力俱盡左衛將軍竣立志開亮理思清要茂策忠謨經綸惟始俾積基更造咸有勤焉宜顯授龜社大啓邦家延孫可封東昌縣侯竣建城縣侯食邑各二千戶其年侍中改領衛尉孝建元年遷丹陽尹臧質反叛上深以東土為憂出為冠軍將軍吳興太守置佐史事平徵為尚書右僕射領徐州大中正遣至江陵分判枉直行其誅賞三年又出為南兗州刺史加散騎常侍仍徙為使持節監雍梁南北秦四州郢州之竟陵隨二郡諸軍事鎮軍將軍寧蠻校尉雍州刺史以疾不行留為侍中護軍又領徐州大中正素有勞患其年增篤詔遣黃門侍郎宣旨問疾大明元年除金紫光祿大夫領太子詹事中正如故其年又出為鎮軍將軍南徐州刺史先是高祖遺詔京口要地去都邑密邇自非宗室近戚不得居之延孫與帝室雖同是彭城人別屬呂縣劉氏居彭城縣者又分為三里帝室居綏輿里左將軍劉懷肅居安上里豫州刺史劉懷武居叢亭里及呂縣凡四劉雖同出楚元王由來不序昭穆延孫於帝室本非同宗不應有此授時司空竟陵王誕為徐州上深相畏忌不欲使居京口遷之於廣陵廣陵與京口對岸欲使腹心為徐州據京口以防誕故以南徐授延孫而與之合族使諸王序親三年南兗州刺史竟陵王誕有罪不受徵延孫馳遣中兵參軍杜幼文率兵起討既至誕已閉城自守乃還誕遣使劉公泰齎書要之延孫斬公泰送首京邑復遣幼文率軍渡江受沈慶之節度其年進號車騎將軍加散騎常侍給鼓吹一部五年詔延孫曰舊京樹親由來常準卿前出所有別議今此防久弭當以還授小兒徵延孫為侍中尚書左僕射領護軍將軍延孫疾病不任拜起上使於五城受封版乘船自青溪至平昌門仍入尚書下舍又欲以代朱修之為荊州事未行明年卒時年五十二上甚惜之下詔曰故侍中尚書左僕射領護軍將軍東昌縣開國侯延孫風局簡正體識沈明綢繆心膂自蕃升朝契闊唯舊幾將二紀靈業中圮則首贊宏圖義令既舉則任均蕭寇器允棟幹勳實佐時歷事兩宮出內尹牧惠政茂績著自民聽忠謨令節簡乎朕心方燮和台階永毗國道奄至薨殞震慟兼深考終定典宜盡哀敬可贈司徒給班劍二十人侍中僕射侯如故有司奏諡忠穆詔為文穆又詔曰故司徒文穆公延孫居身寡約家素貧虛每念清美良深悽歎葬送資調固當闕乏可賜錢三十萬米千斛子質嗣太宗泰始中有罪國除延孫弟延熙義興太守在孔覬傳史臣曰延孫接發蕃日固出顏袁矣風飈局力又無等級可言而隆名盛寵必擇而後授何哉良以休運甫開沈疾方被雖宿恩內積而安私外簡夫侮因事狎敬由近疏疏必相思狎必相厭厭思一殊榮禮自隔遂得為一世宗臣蓋由此也子曰事君數斯疏矣然乎然乎
