body:
  text: 宋書卷七十九列傳第三十九文五王竟陵王誕廬江王褘武昌王渾海陵王休茂桂陽王休範竟陵王誕字休文文帝第六子也元嘉二十年年十一封廣陵王食邑二千戶二十一年監南兗州諸軍事北中郎將南兗州刺史出鎮廣陵尋以本號徙南徐州刺史二十六年出為都督雍梁南北秦四州荊州之竟陵隨二郡諸軍事後將軍雍州刺史以廣陵雕弊改封隨郡王上欲大舉北討以襄陽外接關河欲廣其資力乃罷江州軍府文武悉配雍州湘州入臺稅租雜物悉給襄陽及大舉北伐命諸蕃並出師莫不奔敗唯誕中兵參軍柳元景先克弘農關陝三城多獲首級關洛震動事在元景傳會諸方並敗退故元景引還徵誕還京師遷都督廣交二州諸軍事安南將軍廣州刺史當鎮始興未行改授都督會稽東陽新安臨海永嘉五郡諸軍事安東將軍會稽太守給鼓吹一部元凶弒立以揚州浙江西屬司隸校尉浙江東五郡立會州以誕為刺史世祖入討遣沈慶之兄子僧榮間報誕又遣寧朔將軍顧彬之自魯顯東入受誕節度誕遣參軍劉季之與彬之并勢自頓西陵以為後繼劭遣將華欽庾導東討與彬之等相逢於曲阿之奔牛塘路甚狹左右皆悉入菰葑彬之軍人多齎籃屐於菰葑中夾射之欽等大敗事平徵誕為持節都督荊湘雍益寧梁南北秦八州諸軍事衛將軍開府儀同三司荊州刺史誕以位號正與濬同惡之請求回改乃進號驃騎將軍加班劍二十人餘如故南譙王義宣不肯就徵以誕為侍中驃騎大將軍揚州刺史開府如故改封竟陵王食邑五千戶顧彬之以奔牛之功封陽新縣侯食邑千戶季之零陽縣侯食邑五百戶明年義宣舉兵反有荊江兗豫四州之力勢震天下上即位日淺朝野大懼上欲奉乘輿法物以迎義宣誕固執不可然後處分帝加誕節仗士五十人出入六門上流平定誕之力也初討元凶與上同舉兵有奔牛之捷至是又有殊勳上性多猜頗相疑憚而誕造立第舍窮極工巧園池之美冠於一時多聚才力之士實之第內精甲利器莫非上品上意愈不平孝建二年乃出為使持節都督南徐兗二州諸軍事太子太傅南徐州刺史侍中如故上以京口去都密邇猶疑之大明元年秋又出為都督南兗南徐兗青冀幽六州諸軍事南兗州刺史餘如故誕既見猜亦潛為之備至廣陵因索虜寇邊修治城隍聚糧治仗嫌隙既著道路常云誕反三年建康民陳文紹上書曰私門有幸亡大姑元嘉中蒙入臺六宮薄命早亡先朝賜贈美人又聽大姑二女出入問訊父饒司空誕取為府史使入山圖畫道路勤劇備至不敢有辭不復聽歸消息斷絶姑二女去年冒啓歸訴蒙陛下聖恩賜敕解饒吏名誕見符至大怒喚饒入交問汝欲死邪訴臺求解饒即答官比不聽通家信消息斷絶若是姊為啓聞所不知誕因問饒汝那得入臺饒被問依實啓答既出誕主衣莊慶畫師王強語饒汝今年敗汝姊誤汝官云小人輩敢持臺家逼我饒因叛走歸誕即遣王強將數人逐突入家內縛録將還廣陵至京口客舍乃陊死井中託云饒懼罪自殺抱痛懷冤冒死歸訴吳郡民劉成又詣闕上書告誕謀反稱息道龍昔伏事誕親見姦狀又見誕在石頭城內修乘輿法物習倡警蹕道龍私獨憂懼向伴侶言之語頗漏泄誕使大吏令監內執道龍道龍逸走誕怒鞭殺監又捕殺道龍又豫章民陳談之上書訴枉稱弟詠之昔蒙誕采録隨從歷鎮大駕南下為誕奉送箋書經涉危險時得上聞聖明登阼恩澤周普回改小人使命微勤賜署臺位詠之見誕與左右小人莊慶傅元祀潛圖姦逆言詞醜悖每云天下方是我家有汝等不憂不富貴又常疏陛下年紀姓諱往巫鄭師憐家祝詛詠之既聞此語又不見其事恐一旦事發橫罹其罪密以告建康右尉黃宣達并有啓聞希以自免元祀弟知詠之與宣達來往自嫌言語漏泄即具以告誕誕大怒令左右飲詠之酒逼使大醉因言詠之乘酒罵詈遂被害自顧冤枉事有可哀其年四月上乃使有司奏曰臣聞神極尊明大儀所以貞觀皇天峻邈玄化所以幽宣故能經緯氓俗大庇黔首庶道被八紘不遺疏賤之賞威格天區豈漏親貴之罰此不刊之鴻則古今之訓謹按元嘉之末天綱崩褫人神哀憤含生喪氣司空竟陵王誕義兼臣子任居藩維進不能泣血提戈忘身徇節退不能閉關拒險焚符斬使遂至拜受偽爵欣承榮寵沈淪姦逆肆于昏放以妻故司空臣湛之女誅亡餘類單舟遄遣披猖千里事哀行路賊忍無親莫此為甚故山陰令傅僧祐誠亮國朝義均休戚重門峻衛不能拒折簡之使巖險千里不能庇匹夫之身乃更助虐憑凶抽兵勒刃遂使頓仆牢穽死不旋踵妻子播流庭筵莫立見之者流涕聞之者含嘆及神鋒首路欃槍東指風卷四嶽電掃三江誕猶持疑兩端陰規進退陛下頻遣書檄告譬殷勤方改姦圖末乃奉順分遣弱旅永塞符文宴安所蒞身不越境悖禮忘情不顧物議彎弧躍馬務是畋遊致奔牛有崩碎之陳新亭無獨克之術假威義鋭乞命皇旅竟有何勞而論功伐既𤧊祲廓清大明升曜幽顯宅心遠邇雲集誕忽星行之悲違開泰之慶遲回顧望淹踰旬朔逆黨陳叔兒等泉寶巨億資貨不資誕收籍所得不歸天府辭稱天軍實入私室又太官東傳舊有獻御喪亂既平猶加斷遏珍羞庶品回充私膳於號諱之辰遽甘滋之品當惟新之始絶苞苴之貢忠孝兩忘敬愛俱盡乃徵引巫史潛考圖緯自謂體應符相富貴可期悖意醜言不可勝載遂復遙諷朝廷占求官爵侮蔑宗室詆毀公卿不義不昵人道將盡荷任神州方懷姦慝每窺向宸御妄生規幸多樹淫祀顯肆𤧊詛遂在石頭潛修法物傳警稱蹕擬則天行皆已駭暴觀聽彰布朝野昔內難甫寧珍瑋散佚有御刀利刃擅價諸夏天府禁器歷代所珍誕密加購賞頓藏私室賊義宣初平餘黨逃命誕含縱罔忌私竊招納名工細巧悉匿私第又引義宣故將裘興為己腹心事既彰露猶執欺罔公文面啓矯稱舊隸加以營宇制館僭擬天居引石徵材專擅興發驅迫士族役同輿皂殫木土之姿窮吞并之勢故會稽宣長公主受遇二祖禮級尊崇臣湛之亡身徇國追榮典軍誕以廣拓宅宇地妨藝植輒逼遺孤頓相驅徙遂令神主宵遷改卜委巷宗戚含傷行路掩涕又緣溪兩道積代通衢誕拓宇開垣擅斷其一致使徑塗擁隔川陸阻礙神怒民怨毒遍幽顯故丞相臨川烈武王臣道規名德茂親勳光常策異禮殊榮受自先旨者嗣王臣義慶受任西夏靈寢暫移先帝親枉鑾輿拜辭路左恩冠終古事絶常班誕又以廟居宅前固請毀換詔旨不許怨懟彌極有靦面目豺狼為性規牧江都希廣兵力天德尚弘甫申所請仍謂應住東府宜為中台貪冒無厭人莫與比雖聖慈全救每垂容納而虐戾不悛姦詖彌甚受命還鎮猜怨愈深忠規正諫必加鴆毒諂瀆膚躁是與比周又矯稱符勑設榜開募事發辭寢委罪自下及録事徐靈壽以常署受坐將就囚執舀韓近恭中護軍遣吏夏嗣伯密相屬請求寬桎梏且王僧達臨刑之啓事高闍即戮之辭皆稱潛驛往來遙相要契醜聲穢問宣著遐邇含識能言孰不憤歎又獲吳郡民劉成豫章民陳談之建康民陳文紹等並如訴狀則姦情猜志歲月增積昔周德初升公旦有流言之釁魯道方泰季子斷逵泉之誅近則淮厲覆車於前義康襲軌於後變發柴奇禍成范謝亦皆以義奪親情為憲屈況乃上悖天經下誣政道結釁於無妄之辰希幸於文明之日皇穹所不覆厚土所不容夫無禮之誡臣子所宜服膺干紀之刑有國所應慎守臣等參議宜下有司絶誕屬籍削爵土收付延尉法獄治罪諸所連坐別下考論伏願遠尋宗周之重近監興亡之由割恩棄私俯順羣議則卜世靈根於茲克固鴻勳盛烈永永無窮陛下如復隱忍未垂三思則覆皇基於七百擠生民於塗炭此臣等所以夙夜危懼不敢避鈇鉞之誅者也上不許有司又固請乃貶爵為侯遣令之國上將誅誕以義興太守垣閬為兗州刺史配以羽林禁兵遣給事中戴明寶隨閬襲誕使閬以之鎮為名閬至廣陵誕未悟也明寶夜報誕典籤蔣成使明晨開門為內應成以告府舍人許宗之宗之奔入告誕誕驚起呼左右及素所畜養數百人執蔣成勒兵自衛明旦將曉明寶與閬率精兵數百人卒至天明而門不開誕已列兵登陴自在門上斬蔣成焚兵籍赦作部徒繫囚開門遣腹心率壯士擊明寶等破之閬即遇害明寶奔逃自海陵界得還上乃遣車騎大將軍沈慶之率大衆討誕誕焚燒郭邑驅居民百姓悉使入城分遣書檄要結近遠時山陽內史梁曠家在廣陵誕執其妻子遣使要曠曠斬使拒之誕怒滅其家誕奉表投之城外曰往年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯協從朝野恍惚感懷憂懼陛下欲建百官羽儀星馳推奉臣前後固執方賜允俞社稷獲全是誰之力陛下接遇殷勤纍加榮寵驃騎揚州旬月移授恩秩頻加復賜徐兗仰屈皇儲遠相餞送臣一遇之感感此何忘庶希偕老永相娛慰豈謂陛下信用讒言遂令無名小人來相掩襲不任枉酷即加誅剪雀鼠貪生仰違詔勑今親勒部曲鎮扞徐兗先經何福同生皇家今有何愆便成胡越陵鋒奮戈萬沒豈顧蕩定之期冀在旦夕右軍宣簡爰及武昌皆以無罪並遇枉酷臣有何過復致於此陛下宮帷之醜豈可三緘臨紙悲塞不知所言世祖忿誕左右腹心同籍期親並誅之死者以千數或有家人已死方自城內叛出者車駕出頓宣武堂內外纂嚴慶之進廣陵誕幢主韓道元來降豫州刺史宗賣心徐州刺史劉道隆率衆來會誕中兵參軍柳光宗參軍何康之劉元邁幢主索智朗謀開城北門歸順未期而康之所鎮隊主石貝子先衆出奔康之懼事泄夜與智朗斬關而出誕禽光宗殺之光宗柳元景從弟也康之母在城內亦為誕所殺誕見衆軍大集欲棄城北走留中兵參軍申靈賜居守自將騎步數百人親信並隨聲云出戰邪趨海陵道誕將周豐生馳告慶之慶之遣龍驤將軍武念追躡誕行十餘里衆並不欲去請誕還城誕曰我還卿能為我盡力不衆皆曰願盡力左右楊承伯牽誕馬曰死生且還保城欲持此安之速還尚得入不然敗矣慶之所遣將戴寶之單騎前至刺誕殆獲誕懼乃馳還武念去誕遠未及至故誕得向城既至曰城上白鬚非沈公邪左右曰申中兵誕乃入以靈賜為驃騎府録事參軍王璵之為中軍長史世子景粹為中軍將軍州別駕范義為中軍長史其餘府州文武皆加秩先是右衛將軍垣護之左軍將軍崔道固屯騎校尉龐孟虯太子旅賁中郎將殷孝祖破索虜還至廣陵上並使受慶之節度司州刺史劉季之誕故佐也驍果有膂力梁山之役又有戰功增邑五百戶在州貪殘司馬翟弘業諫爭甚苦季之積忿置毒藥食中殺之少年時宗賣心共蒲戲曾手侮加賣心賣心深銜恨至是賣心為豫州刺史都督司州季之慮賣心為禍乃委官間道欲歸朝廷會誕反季之至盱眙盱眙太守鄭瑗以季之素為誕所遇疑其同逆因邀道殺之送首詣道隆時誕亦遣間信要季之及季之首至沈慶之送以示誕季之缺齒垣護之亦缺誕謂衆曰此垣護之頭非劉季之也太宗初即位鄭瑗為山陽王休祐驃騎中兵參軍豫州刺史殷琰與晉安王子勛同逆休祐遣瑗及左右邢龍符説琰琰不受鄭氏壽陽強族瑗即使琰鎮軍子勛責琰舉兵遲晚琰欲自解釋乃殺龍符送首瑗固爭不能得及壽陽城降瑗隨輩同出龍符兄僧愍時在城外謂瑗構殺龍符輒殺瑗即為劉勔所録後見原僧愍尋擊虜於淮西戰死此四人者並由橫殺旋受身禍論者以為有天道焉誕幢主公孫安期率兵隊出降誕初閉城拒使記室參軍賀弼固諫再三誕怒抽刃向之乃止或勸弼出降弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背唯當死明心耳乃服藥自殺弼字仲輔會稽山陰人也有文才贈車騎參軍山陽海陵二郡太守長史如故幢主王璵之賞募數百人從東門出攻龍驤將軍程天祚營斷其弩弦天祚擊破之即走還城誕又加申靈賜南徐州刺史軍主馬元子踰城歸順追及殺之乃於城內建列立壇誓誕將歃血其所署輔國將軍孟玉秀曰陛下親歃羣臣皆稱萬歲初誕使黃門呂曇濟與左右素所信者將世子景粹藏於民間謂曰事若濟斯命全脫如其不免可深埋之分以金寶齊送出門並各散走唯曇濟不去攜負景粹十餘日乃為沈慶之所捕得斬之誕所署平南將軍虞季充又出降書上使慶之於桑里置烽火三所誕又遣千餘人自北門攻強弩將軍苟思達營龍驤將軍宗越擊破之開東門掩攻劉道隆營復為殷孝祖及員外散騎侍郎沈攸之所破誕又加申靈賜左長史王璵之右長史范義左司馬左將軍孟玉秀右司馬右將軍范義母妻子並在城內有勸義出降義曰我人吏也且豈能作何康活邪義字明休濟陽考城人也早有世譽五月十九日夜有流星大如斗杆尾長十餘丈從西北來墜城內是謂天狗占曰天狗所墜下有伏尸流血誕又遣二百人出東門攻劉道産營別遣疑兵二百人出北門沈攸之於東門奮短兵接戰大破之門者又為苟思達所破誕又遣數百人出東門攻寧朔司馬劉勔營攸之又破之廣陵城舊不開南門云開南門者不利其主至誕乃開焉彭城邵領宗在城內陰結死士欲襲誕先欲布誠於慶之乃説誕求為間諜見許領宗既出致誠畢復還城內事泄誕鞭二百考問不服遂支解之上遣送章二紐其一曰竟陵縣開國侯食邑一千戶募賞禽誕其二曰建興縣開國男三百戶募賞先登若克外城舉一烽克內城舉兩烽禽誕舉三烽上又遣屯騎校尉談金前虎賁中郎將鄭景玄率羽林兵隸慶之誕復遣三百人自南門攻劉勔土山為勔所破慶之填治攻道值夏雨不得攻城上每璽書催督之前後相繼及晴再怒使太史擇發日將自濟江太宰江夏王義恭上表諫曰誕素無才略畜養又寡自拒王命士庶離散城內乏糧器械不足徒賴免兵倉頭三四百人造次相附恩怨夙結臣始短慮謂一旬可殄而假息流遷七十餘日上將受律羣蕃嶽峙鋭卒精旅動以萬計大威所震未有成功臣雖凡怯猶懷憤踊陛下入翦封豕出討長蛇兵不血刃再興七百而蕞爾小醜遂延晷漏致皇赫斯怒將動乘輿此實臣下素食駑鈍之責行留百司莫不仰慚俯愧今盛暑被甲日費千金天威一麾孰不幸甚臣伏尋晉文王征淮南淹師出二百日方能制寇今誕糇糧垂竭背逆者多慶之等轉悟遲重之非漸見乘機之利且成旨頻降必應旦夕夷殄愚又以廣陵塗近人信易達雖為江水約示不難且覩理者寡暗塞者衆忽見雲旗移次京都既當祗悚四方之志必有未達臣愚伏重思計今寧不當計小醜省生命以安遐邇之情又以長江險闊風波難期王者尚不乘危況乃泛不測之水昔魏文濟江遂有遺州之名今雖先天不違動干休慶龍舟所幸理必利涉然居安慮危不可不懼私誠款款冒啓赤心追用悚汗不自宣盡七月二日慶之率衆軍進攻剋其外城乘勝而進又剋小城誕聞軍入與申靈賜走趨後園隊主沈胤之義征客周滿胡思祖馳至誕執玉鐶刀與左右數人散走胤之等追及誕於橋上誕舉刀自衛胤之傷誕面因墜水引出殺之傳首京邑時年二十七因葬廣陵貶姓留氏同黨悉誅殺城內男為京觀死者數千女口為軍賞誕母殷妻徐並自殺追贈殷長寧園淑妃嘉梁曠誠節擢為後將軍封周滿山陽縣侯食邑四百五十戶胤之耒陽子食邑三百五十戶胡思祖高平縣男食邑二百戶臨川內史羊璿之以先協附誕伏誅誕為南徐州刺史在京夜大風飛落屋瓦城門鹿牀倒覆誕心惡之及遷鎮廣陵入城衝風暴起揚塵晝晦又中夜間坐有赤光照室見者莫不怪愕左右侍直眠中夢人告之曰官須髮為矟毦既覺已失髻矣如此者數十人誕甚怪懼大明二年發民築治廣陵城誕循行有人干輿揚聲大罵曰大兵尋至何以辛苦百姓誕執之問其本末答曰姓夷名孫家在海陵天公去年與道佛共議欲除此間民人道佛苦諫得止大禍將至何不立六慎門誕問六慎門云何答曰古時有言禍不入六慎門誕以其言狂悖殺之又五音士忽狂易見鬼驚怖啼哭曰外軍圍城城上張白布帆誕執録二十餘日乃赦之城陷之日雲霧晦暝白虹臨北門亘屬城內八年前廢帝即位義陽王昶為征北將軍徐州刺史道經廣陵上表曰竊聞淮南中霧眷求遺緒楚英流殛愛存丘墓並難結兩臣義開二主法雖事斷禮或情申伏見故賊劉誕稱戈犯節自貽逆命膏斧嬰戮在憲已彰但尋屬忝皇枝位叨列辟一以罪終魂骸莫赦生均宗籍死同匹豎旅窆委雜封樹不修今歲月愈邁愆流釁往踐境興懷感事傷目陛下繼明升運咸與惟新大德方臨哀矜未及夫欒布哭市義犯雷霆田叔鉗赭志於夷戮況在天倫何獨無感伏願稽若前準降申丹志乞薄改楄柎微表窀穸則朽骨知榮窮泉識荷臨紙哽慟辭不自宣詔曰征北表如此省以慨然誕及妻女並可以庶人禮葬并置守衛太宗泰始四年又更改葬祭以少牢廬江王褘字休秀文帝第八子也元嘉二十二年年十歲封東海王食邑二千戶二十六年以為侍中後軍將軍領石頭戍事遷冠軍將軍南彭城下邳二郡太守散騎常侍領戍如故出為會稽太守將軍如故二十九年遷使持節都督廣交二州荊州之始興臨賀始安三郡諸軍事車騎將軍平越中郎將廣州刺史元凶弒立進號安南將軍未之鎮世祖踐阼復為會稽太守加撫軍將軍明年徵為祕書監加散騎常侍尋出為撫軍將軍江州刺史進號平南將軍置吏大明二年徵為散騎常侍中書令領驍騎將軍給鼓吹一部常侍如故又出為南豫州刺史常侍將軍如故以本號開府儀同三司領國子祭酒常侍如故五年詔曰昔韓衛異姓宗周之明憲三封殊級往晉之令典唯皇家創典盡弘斯義朕應天命光宅四海思所以憲章前式崇建懿親永垂畫一著于甲令諸弟國封並可增益千戶七年進司空常侍祭酒如故前廢帝即位加中書監太宗踐阼進太尉加侍中中書監給班劍二十人改封廬江王太祖諸子褘尤凡劣諸兄弟蚩鄙之南平王鑠蚤薨鑠子敬淵婚褘往視之白世祖借伎世祖答曰婚禮不舉樂且敬淵等孤苦倍非宜也至是太宗與建安王休仁詔曰人既不比數西方公汝便為諸王之長時褘住西州故謂之西方公也泰始五年河東柳欣慰謀反欲立褘褘與相酬和欣慰要結征北咨議參軍杜幼文左軍參軍宋祖珍前鄀令王隆伯等褘使左右徐虎兒以金合一枚餉幼文銅鉢二枚餉祖珍隆伯幼文具奏其事上乃下詔曰昔周室既盛二叔流言漢祚方隆七蕃迷叛斯實事彰往代難興自古雖聖賢御極宇內紓患太尉廬江王藉慶皇枝蚤升寵樹幼無立德長缺修聲淡薄親情厚結行路狎昵羣細疏澀人士自朕撥亂定宇受命應天實尚敦睦克敷友于故崇殊爵超居上台而公常懷不平表於事迹公若德深望重宜膺大統朕初平暴亂豈敢當璧自然推符奉璽天祚有歸且朕雖居尊極不敢自恃宗室之事無不咨公不虞志欲難滿妄生窺怨積慝在襟遂謀社稷曩者四方遘禍兵斥畿甸搢紳憂惶親賢同憤唯公獨幸厥災深抃時難晝則從禽遊肆夜則縱酒弦歌側耳視陰企賊休問司徒休仁等並各令弟事兼家國推鋒履險各伐一方蒙霜踐棘辛勤已甚況身被矢石否泰難虞悠悠之人尚有信分公未曾有一函之使遺半紙之書志棄五弟以餌讎賊自謂身非勳烈義不參謀必期凶逆道申以圖輔相及皇威既震羣凶肅蕩九有同慶萬國含欣而公容氣更沮下帷晦迹每覘天察宿懷協左道呪詛禱請謹事邪巫常被髮跣足稽首北極遂圖畫朕躬勒以名字或加之矢刃或烹之鼎鑊公在江州得一漢女云知吉凶能行厭呪大設供養朝夕拜伏衣裝嚴整敬事如神令其祝詛孝武并及崇憲祈皇室危弱統天稱己巫稱神旨必得如願後事發覺委罪所生徼幸焿僅得自免近又有道士張寶為公見信事既彰露肆之于法公不知慚懼猶加營理遣左右二人主掌殯含顯行邪志罔顧吏司又挾閹豎陳道明交關不逞傳驛音意投金散寶以為信誓又使府史徐虎兒招引邊將要結禁旅規害台輔圖犯宮掖公受性不仁才非治用昔忝江州無稱被徵前蒞會稽以罪左黜公稽古寡聞嚴而無理言不暢寒暑惠不及帷房朝野所輕搢紳同侮豈堪輔相之地寧任蒞民之職非唯一朝有自來矣大明之世迄于永光公常留中未嘗外撫何以在今方起嫌怨公少即長人情無哀戚侍拜長寧從祀宗廟顏無戚狀淚不垂臉兄弟長幼靡有愛心昔因孝武御筵置酒心誠不著于時義陽念遇本薄遭公此譖益被猜嫌朕當時狼狽不暇自理賴崇憲太后譬解百端少蒙申亮得免殃責景和狂主醜毒橫流初誅宰輔豺志方扇於建章宮召朕兄弟逼酒使醉公因酒勢遂肆苦言云朕及休仁與太宰親數往必清間贈貺豐厚朕當時惶駭五內崩墜于其語次劣得小止往又經在尋陽長公主第兄弟共集忽中坐忿怒厲色見指以朕行止出入每不能同若得稱心規肆忿憾惟公此旨蚤欲見滅而天道愛善朕獲南面不長惡逆挫公毒心自大明積費國弊民凋加景和奢虐府藏罄盡朕在位甫爾恤義具瞻仍值終阻蜂起日耗萬金公卿庶民傾産歸獻積受台奉資畜優廣朕踐阼之初公請故太宰東傳餘錢見入數百萬內不充養外不助國散賜諂諛遍惠趨隸推心考行事類斯比羣小交構遂生異圖籍籍之義轉盈民口公若地居衡寄任專八柄德育於民勳高於物勢不自安於事為可公既才均櫟木牽以曲全因高無民得守虛靜而坐作凶咎自囗深釁由朕誠感無素爰至於此永尋多難惋慨實深凡人所行各有本志朕博愛尚仁為日已久尚能含讎恕罪著于觸事豈容於公不相隱忍但禍萌易漸去惡宜疾負荷之重寧得坐觀且蔓草難除燎火須撲狡扇之徒宜時誅剪已詔司戮肅正典刑公身居戚長情禮兼至準之常科顧有惻怛宜少申國憲以弔不臧今以淮南宣城歷陽三郡還立南豫州降公為車騎將軍開府儀同三司南豫州刺史削邑千戶侍中王如故出鎮宣城上遣腹心楊運長領兵防衛同黨柳欣慰徐虎兒陳道明寧敬之閭丘邈之樊平祖孟敬祖並伏誅明年六月上又令有司奏褘忿懟有怨言請免官削爵土付宛陵縣獄依法窮治不許乃遣大鴻臚持節兼宗正為副奉詔責褘逼令自殺時年三十五即葬宣城子充明輔國將軍南彭城東莞二郡太守廢徙新安歙縣後廢帝即位聽還京邑順帝升明二年卒時年二十八無子武昌王渾字休淵文帝第十子也元嘉二十四年年九歲封汝陰王食邑二千戶為後軍將軍加散騎常侍索虜南寇破汝陰郡徙渾為武昌王少而凶戾嘗出石頭怨左右人拔防身刀斫之元凶弒立以為中書令山陵夕裸身露頭往散騎省戲因彎弓射通直郎周朗中其枕以為笑樂世祖即位授征虜將軍南彭城東海二郡太守出鎮京口孝建元年遷使持節監雍梁南北秦四州荊州之竟陵隨二郡諸軍事寧蠻校尉雍州刺史將軍如故渾至鎮與左右人作文檄自號楚王號年為永光元年備置百官以為戲笑長史王翼之得其手迹封呈世祖上使有司奏免為庶人下太常絶其屬籍徙付始安郡上遣員外散騎侍郎戴明寶詰渾曰我與汝親則同氣義則君臣遣任西蕃以同盤石云何一旦反欲見圖文檄處分事迹炳然不忠不義乃可至此豈唯天道助順逆志難充如其凶圖獲逞天下誰當相容前事不遠足為鑑戒加以頻歲釁難非起外人唯應相與厲精以固七百汝忽復構此良可悲惋國雖有典我亦何忍極法好自將養以保松喬之壽逼令自殺即葬襄陽時年十七大明四年聽還葬母江太妃墓次太宗即位追封為武昌縣侯王翼之字季弼琅邪臨沂人晉黃門侍郎徽之孫也官至御史中丞會稽太守廣州刺史諡曰肅子海陵王休茂文帝第十四子也孝建二年年十一封海陵王食邑二千戶大明二年以為使持節都督雍梁南北秦四州郢州之竟陵隨二郡諸軍事北中郎將寧蠻校尉雍州刺史進號左將軍增邑千戶時司馬庾深之行府事休茂性急疾欲自專深之及主帥每禁之常懷忿怒左右張伯超至所親愛多罪過主帥常加呵責伯超懼罪謂休茂曰主帥密疏官罪過欲以啓聞如此恐無好休茂曰為何計伯超曰唯當殺行事及主帥且舉兵自衛此去都數千里縱大事不成不失入虜中為王休茂從之夜挾伯超及左右黃靈期蔡捷世滕穆之王寶龍來承道彭叔兒魏公子陳伯兒張駟奴楊興劉保余雙等率夾轂隊於城內殺典籤楊慶出金城殺司馬庾深之典籤戴雙集徵兵衆建牙馳檄使佐吏上車騎大將軍開府儀同三司加黃鉞侍讀博士荀詵諫爭見殺伯超專任軍政殺害自己休茂左右曹萬期挺身斫休茂被創走見殺休茂出城行營咨議參軍沈暢之等率衆閉門拒之休茂馳還不得入義成太守薛繼考為休茂盡力攻城殺傷甚衆暢之不能自固遂得入城斬暢之及同謀數十人其日參軍尹玄慶起義攻休茂生禽之將出中門斬首時年十七母妻皆自殺同黨悉伏誅城中撓亂無相統領時尚書右僕射劉秀之弟恭之為休茂中兵參軍衆共推行府州事繼考以兵脅恭之使作啓事云立義自乘驛還都上以為永嘉王子仁北中郎咨議參軍河南太守封冠軍縣侯食邑四百戶尋事泄伏誅恭之坐繫尚方以玄慶為射聲校尉有司奏絶休茂屬籍貶姓為留上不許即葬襄陽庾深之字彥靜新野人也以事先朝見知元嘉二十九年自輔國長史為長沙內史南郡王義宣為荊湘二州加深之寧朔將軍督湘州七郡明年義宣為逆深之據巴陵拒之轉休茂司馬見害之旦子孫亦死追贈深之冠軍將軍雍州刺史荀詵員外散騎侍郎曹萬期始平太守桂陽王休範文帝第十八子也孝建三年年九歲封順陽王食邑二千戶大明元年改封桂陽王為冠軍將軍南彭城下邳太守三年出為江州刺史尋加征虜將軍邑千戶入為祕書監領前軍將軍七年遷左衛將軍加給事中前廢帝永光元年轉中護軍領崇憲衛尉太宗定亂以為使持節都督南徐徐南兗兗四州諸軍事鎮北將軍南徐州刺史給鼓吹一部時薛安都據彭城反叛遣從子索兒南侵休範進據廣陵督北討諸軍事加南兗州刺史進征北大將軍加散騎常侍還京口解兗州增邑二千戶受五百戶泰始五年徵為中書監中軍將軍揚州刺史常侍如故明年出為使持節都督江郢司廣交五州豫州之西陽新蔡晉熙湘州之始興四郡諸軍事征南大將軍江州刺史尋加開府儀同三司未拜改授都督南徐徐南兗兗青冀六州諸軍事驃騎大將軍南徐州刺史持節常侍開府如故未拜以驃騎大將軍還為江州進督越州諸軍事給三望車一乘太宗遺詔進位司空改常侍為侍中加班劍三十人休範素凡訥少知解不為諸兄所齒遇太宗常指左右人謂王景文曰休範人才不及此以我弟故生便富貴釋氏願生王家良有以也及太宗晚年晉平王休祐以狠戾致禍建安王休仁以權逼不見容巴陵王休若素得人情又以此見害唯休範謹澀無才能不為物情所向故得自保而常懷憂懼慮禍及及太宗晏駕主幼時艱素族當權近習秉政休範自謂宗戚莫二應居宰輔事既不至怨憤彌結招引勇士繕治器械行人經過尋陽者莫不降意折節重加問遺留則傾身接引厚相資給於是遠近同應至者如歸朝廷知其有異志密相防禦雖未表形迹而釁難已成母荀太妃薨葬廬山以示不還之志解侍中時夏口闕鎮朝議以居尋陽上流欲樹置腹心重其兵力元徽元年乃以第五皇弟晉熙王燮為郢州刺史長史王奐行府州事配以資力出鎮夏口慮為休範所撥留自太子洑去不過尋陽休範大怒欲舉兵襲朝廷密與典籤新蔡人許公輿謀之表治城池修起樓堞多解榜板擬以備用其年進位太尉明年五月遂舉兵反虜發百姓船乘使軍隊稱力請受付以榜解板合手裝治二三日間便悉整辦率衆二萬鐵騎數百匹發自尋陽晝夜取道書與袁粲褚淵劉秉曰夫治政任賢宜親疏相輔得其經緯則結繩可及失其規矩則危亡可期漢承戰國之餘傷周室衰殄立磐石之宗而致七國之亂魏革漢典創於前失遂使諸王絶朝聘之禮是以根疏葉枯政移異族今宗室衰微自昔未有泰寧之世足以為譬孤子忝枝皇族預關興毀雖欲忘言其可得乎高祖武皇帝升睿三光滌紛四表太祖文皇帝欽明冠古資乾承曆秉鉞西服鳴鑾東京搜賢選能納奇賞異孝武皇帝歧嶷天縱先機雷發陵波靜亂宏業中興儲嗣不腆遂貽禍難于時建安王以家難頻遘宜立長主明皇帝恢朗淵懿仁潤含遠奉戴南面允合天人而太尉以年長居卑怨心形色柳欣慰等規行不軌事迹披猖驃騎以忤顏失旨應對不順在蕃刻削怨結人鬼先帝明於號令豈枉法為親二王之釁實自由己但司徒巴陵王勞謙為國中流事難有不世之勳奉時如天事兄猶父非唯令友信為國器唐叔之忠而受管蔡之罪親戚哀憤行路嗟歎王地籍光潔德厭民望並無寸罪受斃讒邪先帝穆於友于留心親戚去昔事平之後面受詔誨禮則君臣樂則兄弟升級賜賞動不移年撫慰孜孜如不足豈容一旦牆致此禍害良有由也先帝寢疾彌年體疲膳少雖神照無虧而慮有失德補闕拾遺責在左右于時出入臥內唯有運長道隆羣細無狀因疾遘禍見上不和知無瘳拯慮晏駕之日長王作輔奪其寵柄不得自專是以內假帝旨外託朝議諛辭詭貌萬類千端升進姦回屠斥賢哲外矯天則內誣人鬼是以星紀違常羲望失度昔魏顆擇命春秋美之秦穆殉良詩有明刺臣子之節得失必書不及匡諫猶以為罪交間蒼蠅驅扇禍戮爵以貨重才由貧輕先帝舊人無罪黜落薦致鄉親遍布朝省諂諛親狎者飛榮玉除靜立貞粹者柴門生草事先關己雖非必行若不咨詢雖是必抑海內遠近人誰不知未解執事不加斧鉞遂致先帝有殺弟之名醜聲遺於君父格以古義豈得為忠先帝崩殂若無天地理痛常情便應赴泣但兄弟枉酷已陷讒細孤子已下復觸姦機是以望陵墳而摧裂想鑾旗而抽慟雖復才違寄寵而地屬負荷顧命之辰曾不見及分崩之際詔出兩豎天誘其衷得居乎外若受制羣邪則玉石同碎矣以宇宙之基一旦受制卑瑣劉氏家國使小人處分終古以來未有斯酷昔石顯曹節方今為優而望之仲舉由以致弊至於遭逢醜慝豈有古今者乎諸賢胄籍冠冕世歷忠貞位非恩樹勳豈寵結憂國勤王社稷之鎮豈可含縱讒凶坐觀傾覆自惟宋室未殞得以推移者正內賴諸賢防勒姦軌外有孤子跨據中流而人非金石何能支久使一虧落則本根莫庇當今主上沖幼宜明典章征虜之鎮不見慰省逆旅往來尚有顧眄骨肉何讎逼使離隔禽獸之心橫生疑二經由此者每加約截同惡相求有若市賈以孤子知其情狀恐以此乘之鉗勒州郡過見防禦近遣西南二使統內宣傳不容恐懼即遣啓並有別書若以孤子有過便應鳴鼓見伐如其不爾宜令各有所歸與殺不辜憲有常辟三公之使無罪而斬鄙雖不肖天子之季父卑小主者敢不如是乎孤子承奉今上如事先朝夙宵恭謹散心雲日晦望表驛相從江衢有何虧違頓至於此既已甘心其可再乎如往來所説以孤子納士為尤此輩懼其身罪豈為國計在昔四豪列國公子猶博引廣納門客三千況孤子位居鼎司捍衛畿甸且今與昔異咸所知也狡虜陵掠江淮侵逼主上年稚宗室衰微邪僭用命親賢結舌疆埸嬰塗炭之苦征夫有勤役之勞瓜時不代齊猶致禍況長淮戍卒歷年怨思不務拓遠強邊而先事國君親戚以此求心何事非亂又以繕治盆壘復致囂聲自晉宋之災積貯百萬孤子到鎮曾不數千里且修城池整郭邑為治常理復何足致嫌邪若以中流清蕩則任農夫不應實力強兵作鎮姑孰俱防寇豈得獨嫌於此昔成王之明而為流言致惑若使金縢不開則周公無以自保樂毅歸趙不忍謀燕況孤子禮則君臣恩猶父子者乎所以枕戈泣血祇以兄弟之讎爾觀其不逞之意豈可限量設使遂其虐志諸君欲安坐得乎脣亡齒寒理不難見桂蠹必除人邪必翦枉突徙薪何勞多力望便執録二豎以謝寃魂則先帝不失順悌之名宋世無枉筆之史此州地居形要路枕九江控弦跨馬越關而至重氣輕死排藪競出練甲照水總戈成林劋此纖隸何患不克但千鈞之弩不為鼷鼠發機欲使薰蕕內辨晉陽外息爾功有所歸不亦可乎便當投命有司謝罪天闕同奉溫凊齊心庶事伊霍之任非君而誰周邵之職頗以自許左提右挈無愧古人昔平勃剛斷産祿蚤誅張溫趑趄文臺扼腕事之樞機得失俄頃往車今轍庶無惑焉近持此意申之沈攸其憤難不解諸王致此既知禍原鋭然奮發蓄兵厲卒以俟同舉張興世發都日受制凶黨揚帆直逝遂不見遇孤子近遣信申述姦禍方大惆惋追恨前迷比者信使每申勤款王奐佐郢兵權在握厥督屠枉朝野嗟痛猶父之怨寧可與之比肩孤子此舉增其慷慨義之所勸其應猶響諸君或未得此意故先告懷徙倚一隅遲及委問孤子哀疾毀窮盡無日庶規史鰌死不忘本臨紙荒哽言不詮第大雷戍主杜道欣馳下告變道欣至一宿休範已至新林朝廷震動平南將軍齊王出次新亭壘領軍將軍劉勔前兗州刺史沈懷明據石頭征北將軍張永屯白下衛將軍袁粲中軍褚淵尚書左僕射劉秉等入衛殿省時事起倉卒不暇得更處分開南北二武庫隨將士意取休範於新林步上及新亭壘自臨城南於臨滄觀上以數十人自衛屯騎校尉黃回見其可乘乃偽往請降并宣齊王意旨休範大悅以二子德宣德嗣付回與為質至即斬之回與越騎校尉張敬兒直前斬休範首持還左右並奔散初休範自新林分遣同黨杜耳丁文豪杜墨蠡等直向朱雀門休範雖死墨蠡等不相知聞王道隆率羽林兵在朱雀門內聞賊至急召劉勔勔自石頭來赴仍進桁南戰敗死之墨蠡等乘勝直入朱雀門王道隆為亂兵所殺墨蠡等唱太尉至休範之死也齊王遣隊主陳靈寶齎首詣臺道逢賊棄首於水挺身得達雖唱云已平而無以為據衆愈疑惑張永棄衆於白下沈懷明於石頭奔散撫軍典籤茅恬開東府納賊墨蠡徑至杜姥宅中書舍人孫千齡開承明門出降宮省恇擾無復固志時庫藏賞賜已盡皇太后太妃剔取宮內金銀器物以充用羽林監陳顯達率所領於杜姥宅與墨蠡戰破之至宣陽御道諸賊一時奔散斬墨蠡文豪及同黨薑伯玉柳仲虔任天助等許公輿走還新蔡村民斬送之晉熙王燮自夏口遣軍平尋陽德嗣弟青牛智藏並伏誅詔建康秣陵二縣收斂諸軍死者并殺賊尸並加藏埋史臣曰語有之投鼠而忌器信矣阮佃夫王道隆專用主命臣行君道識義之徒咸思戮以馬劍休範馳兵象魏矢及君屋忠臣義士莫不銜膽爭先夫以邪附君猶或自免況於仗正順以爭主哉
