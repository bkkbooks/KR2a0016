body:
  text: 宋書卷八十一列傳第四十一劉秀之顧琛顧覬之劉秀之字道寶東莞莒人司徒劉穆之從兄子也世居京口祖爽尚書都官郎山陰令父仲道高祖克京城以補建武參軍與孟昶留守事定以為餘姚令卒官秀之少孤貧有志操十許歲時與諸兒戲於前渚忽有大蛇來勢甚猛莫不顛沛驚呼秀之獨不動衆並異焉東海何承天雅相知器以女妻之兄欽之為朱齡石右軍參軍隨齡石敗沒秀之哀戚不歡宴者十年景平二年除駙馬都尉奉朝請家貧求為廣陵郡丞仍除撫軍江夏王義恭平北彭城王義康行參軍出為無錫陽羨烏程令並著能名元嘉十六年遷建康令除尚書中兵郎重除建康性纖密善糾擿微隱政甚有聲吏部尚書沈演之每稱之於太祖世祖鎮襄陽以為撫軍錄事參軍襄陽令襄陽有六門堰良田數千頃堰久決壞公私廢業世祖遣秀之修復雍部由是大豐改領廣平太守二十五年除督梁南北秦三州諸軍事寧遠將軍西戎校尉梁南秦二州刺史時漢川饑儉境內騷然秀之善於為政躬自儉約先是漢川悉以絹為貨秀之限令用錢百姓至今受其利二十七年大舉北伐遣輔國將軍楊文德巴西梓潼二郡太守劉弘宗受秀之節度震蕩汧隴秀之遣建武將軍錫千秋二千人向子午谷南口府司馬竺宗之三千人向駱谷南口威遠將軍梁尋千人向斜谷南口氐賊楊高為寇秀之討之斬高兄弟元凶弒逆秀之聞問即日起兵求率衆赴襄陽司空南譙王義宣不許事寧遷使持節督益寧二州諸軍事寧朔將軍益州刺史折留俸祿二百八十萬付梁州鎮庫此外蕭然梁益二州土境豐富前後刺史莫不營聚蓄多者致萬金所攜賓僚並京邑貧士出為郡縣皆以苟得自資秀之為治整肅以身率下遠近安悅焉南譙王義宣據荊州為逆遣參軍王曜徵兵於秀之秀之即日斬曜戒嚴遣中兵參軍韋山松萬人襲江陵出峽竺超民遣將席天生逆之山松一戰即梟其首進至江陵為魯秀所敗山松見殺其年進號征虜將軍改督為監持節刺史如故以起義功封康樂縣侯食邑六百戶明年遷監郢州諸軍事郢州刺史將軍如故未就大明元年徵為右衞將軍明年遷丹陽尹先是秀之從叔穆之為丹陽與子弟於廳事上飲宴秀之亦與焉廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉時賒市百姓物不還錢市道嗟怨秀之以為非宜陳之甚切雖納其言竟不從用廣陵王誕為逆秀之入守東城其年遷尚書右僕射四年改定制令疑民殺長吏科議者謂值赦宜加徙送秀之以為律文雖不顯民殺官長之旨若值赦但止徙送便與悠悠殺人曾無一異民敬官長比之父母行害之身雖遇赦謂宜長付尚方窮其天命家口令補兵從之明年領太子右衞率五年雍州刺史海陵王休茂反為土人所誅遣秀之以本官慰勞分別善惡事畢還都出為使持節散騎常侍都督雍梁南北秦四州郢州之竟陵隨二郡諸軍事安北將軍寧蠻校尉雍州刺史上車駕幸新亭視秀之發引將徵為左僕射事未行八年卒時年六十八上甚痛惜之詔曰秀之識局明遠才應通暢誠著蕃朝績宣累嶽往歲逆臣交構首義萬里及職司端尹贊戎兩宮嘉謀徽譽實彰朝野漢南法繁民嗛屬佇良牧故暫輟心膂外弘風規出未踰朞德庇西服詳考古烈旅觀終始淳心忠概無以尚茲方式亮皇猷入衞根本奄至薨逝震慟于朕心生榮之典未窮寵數哀終之禮宜盡崇飾兼履謙守約封社弗廣興言悼往益增痛恨可贈侍中司空持節都督刺史校尉如故并增封邑為千戶諡為忠成公秀之野率無風采而心力堅正上以其莅官清潔家無餘財賜錢二十萬布三百匹子景遠嗣官至前軍將軍景遠卒子儁齊受禪國除秀之弟粹之晉陵太守顧琛字弘瑋吳郡吳人也曾祖和晉司空祖履之父惔並為司徒左西掾琛謹確不尚浮華起家州從事駙馬都尉奉朝請少帝景平中太皇太后崩除大匠丞彭城王義康右軍驃騎參軍晉陵令司徒參軍尚書庫部郎本邑中正元嘉七年太祖遣到彥之經略河南大敗悉委棄兵甲武庫為之空虛後太祖宴會有荒外歸化人在坐上問琛庫中仗猶有幾許琛詭答有十萬人仗舊武庫仗祕不言多少上既發問追悔失言及琛詭對上甚喜尚書寺門有制八座以下門生隨入者各有差不得雜以人士琛以宗人顧碩頭寄尚書張茂度門名而與碩頭同席坐明年坐遣出免中正凡尚書官大罪則免小罪則遣出遣出者百日無代人聽還本職琛仍為彭城王義康所請補司徒錄事參軍山陰令復為司徒錄事遷少府十五年出為義興太守初義康請琛入府欲委以腹心琛不能承事劉湛故尋見斥外十九年徙東陽太守欲使琛防守大將軍彭城王義康固辭忤旨廢黜還家積年二十七年索虜南至瓜步權假琛建威將軍尋除東海王褘冠軍司馬行會稽郡事隨王誕代褘復為誕安東司馬元凶弒立分會稽五郡置會州以誕為刺史即以琛為會稽太守加五品將軍置將佐誕起義加冠軍將軍事平遷吳興太守孝建元年徵為五兵尚書未拜復為寧朔將軍吳郡太守以起義功封永新縣五等侯大明元年吳縣令張闓坐居母喪無禮下廷尉錢唐令沈文秀判劾違謬應坐被彈琛宣言於衆闓被劾之始屢相申明又云當啟文秀留縣世祖聞之大怒謂琛賣惡歸上免官琛母老仍停家琛及前西陽太守張牧並司空竟陵王誕故佐誕待琛等素厚三年誕據廣陵反遣客陸延稔齎書板琛為征南將軍牧為安東將軍琛子前尚書郎寶素為諮議參軍寶素弟前司空參軍寶先為從事中郎牧兄前吳郡丞濟為冠軍將軍從弟前司空主簿晏為諮議參軍時世祖以琛素結事誕或有異志遣使就吳郡太守王曇生誅琛父子會延稔先至琛等即執斬之遣二子送延稔首啟世祖曰劉誕猖狂遂構釁逆凡在含齒莫不駭惋臣等預荷國恩特百常憤忽以今月二十四日中獲賊誕疏欲見邀誘臣即共執錄偽使并得誕與撫軍長史沈懷文揚州別駕孔道存撫軍中兵參軍孔璪前司兵參軍孔桓之前司空主簿張晏書具列本郡太守王曇生臣即日便應星馳歸骨輦轂臣母年老身在侍養輒遣息寶素寶先束骸詣闕世祖所遣誅琛使其日亦至僅而獲免上嘉之召琛出以為西陽王子尚撫軍司馬牧為撫軍中兵參軍琛母孔氏時年百餘歲晉安帝隆安初琅邪王廞於吳中為亂以女為貞烈將軍悉以女人為官屬以孔氏為司馬及孫恩亂後東土飢荒人相食孔氏散家糧以賑邑里得活者甚衆生子皆以孔為名焉琛仍為吳興太守明年坐郡民多翦錢及盜鑄免官六年起為大司農都官尚書新安王子鸞北中郎司馬東海太守行南徐州事隨府轉撫軍司馬太守如故前廢帝即位復為吳郡太守太宗泰始初與四方同反兵敗奉母奔會稽臺軍既至歸降寶素與琛相失自殺琛尋丁母憂服闋起為員外常侍中散大夫後廢帝元徽三年卒時年八十六寶先大明中為尚書水部郎先是琛為左丞荀萬秋所劾及寶先為郎萬秋猶在職自陳不拜世祖詔曰敕違糾慢憲司之職若理有不公自當更有釐正而自頃劾無輕重輒致私絕此風難長主者嚴為其科寶先蓋依附世准不足問先是宋世江東貴達者會稽孔季恭季恭子靈符吳興丘淵之及琛吳音不變淵之字思玄吳興烏程人也太祖從高祖北伐留彭城為冠軍將軍徐州刺史淵之為長史太祖即位以舊恩歷顯官侍中都官尚書吳郡太守卒於太常追贈光祿大夫顧覬之字偉仁吳郡吳人也高祖謙字公讓晉平原內史陸機姊夫祖崇大司農父黃老司徒左西掾覬之初為郡主簿謝晦為荊州以為南蠻功曹仍為晦衞軍參軍晦愛其雅素深相知待王弘辟為揚州主簿仍為弘衞軍參軍鹽官令衡陽王義季右軍主簿尚書都官郎護軍司馬時大將軍彭城王義康秉權殷劉之隙已著覬之不欲與殷景仁久接事乃辭脚疾自免歸在家每夜常於牀上行脚家人竊異之而莫曉其意後義康徙廢朝廷多以異同受禍復為東遷山陰令山陰民戶三萬海內劇邑前後官長晝夜不得休事猶不舉覬之理繁以約縣用無事晝日垂簾門階閑寂自宋世為山陰務簡而績修莫能尚也還為揚州治中從事史廣陵王誕廬陵王紹北中郎左軍司馬揚州別駕從事史尚書吏部郎嘗於太祖坐論江左人物言及顧榮袁淑謂覬之曰卿南人怯懦豈辦作賊覬之正色曰卿乃復以忠義笑人淑有愧色元凶弒立朝士無不移任唯覬之不徙官世祖即位遷御史中丞孝建元年出為義陽王昶東中郎長史寧朔將軍行會稽郡事尋徵為右衞將軍領本邑中正明年出為湘州刺史善於莅民治甚有績大明元年徵守度支尚書領本州中正二年轉吏部尚書四年致仕不許時沛郡相縣唐賜往比邨朱起母彭家飲酒還因得病吐蠱蟲十餘枚臨死語妻張死後刳腹出病後張手自破視五藏悉糜碎郡縣以張忍行刳剖賜子副又不禁駐事起赦前法不能決律傷死人四歲刑妻傷夫五歲刑子不孝父母棄市並非科例三公郎劉勰議賜妻痛遵往言兒識謝及理考事原心非存忍害謂宜哀矜覬之議曰法移路尸猶為不道況在妻子而忍行凡人所不行不宜曲通小情當以大理為斷謂副為不孝張同不道詔如覬之議加左軍將軍出為吳郡太守八年復為吏部尚書加給事中未拜欲以為會稽不果還為吳郡太守幸臣戴法興權傾人主而覬之未嘗降意左光祿大夫蔡興宗與覬之善嫌其風節過峻覬之曰辛毗有云孫劉不過使吾不為三公耳及世祖晏駕法興遂以覬之為光祿大夫加金章紫綬太宗泰始初四方同反覬之家尋陽尋陽王子房加以位號覬之不受曰禮年六十不服戎以其筋力衰謝非復軍旅之日況年將八十殘生無幾守盡家門不敢聞命孔覬等不能奪時普天叛逆莫或自免唯覬之心迹清全獨無所與太宗甚嘉之東土既平以為左將軍吳郡太守加散騎常侍泰始二年復為湘州刺史常侍將軍如故三年卒時年七十六追贈鎮軍將軍常侍刺史如故諡曰簡子覬之家門雍睦為州鄉所重五子約緝綽縝緄綽私財甚豐鄉里士庶多負其責覬之每禁之不能止及後為吳郡誘綽曰我常不許汝出責定思貧薄亦不可居民間與汝交關有幾許不盡及我在郡為汝督之將來豈可得凡諸券書皆何在綽大喜悉出諸文券一大廚與覬之覬之悉焚燒宣語遠近負三郎責皆不須還凡券書悉燒之矣綽懊歎彌日覬之常謂秉命有定分非智力所移唯應恭己守道信天任運而闇者不達妄求僥倖徒虧雅道無關得喪乃以其意命弟子愿著定命論其辭曰仲尼云道之將行命也道之將廢命也丘明又稱天之所支不可壞天之所壞不可支卜商亦曰死生有命富貴在天孟軻則以不遇魯侯為辭斯則運命奇偶生數離合有自來矣馬遷劉向揚雄班固之徒著書立言咸以為首世之論者多有不同嘗試申之曰夫生之資氣清濁異源命之稟數盈虛乖致是以心貌詭貿性運舛殊故有邪正昏明之差修夭榮枯之序皆理定於萬古之前事徵於千代之外冲神寂鑒一以貫之至乃卜相末技巫史賤術猶能豫題興亡逆表成敗禍福指期識照不能徙吉凶素著威衞不能防若夏氓宅生於帝宮豈蠲殘傷之祟漢臣衍貨於天府寧免餧斃之魂且又善惡之理雖詳而禍福之驗常昧逆順之體誠分而吉凶之効常隱智絡天地猶罹沈牖之災明照日月必嬰深匡之難增信積德離患於長飢席義枕仁徼禍於促算何則理運苟其必至聖明其猶病諸況乃蕞迹流惑之徒投心顓蒙之域而欲役慮以揣利害策情以算窮通其為重傷豈不惑甚是以通人君子閑泰其神沖緩其度不矯俗以延聲不依世以期榮審乎無假自求多福榮辱修夭夫何為哉問曰夫書稱惠迪貽吉易載履信逢祐前哲餘議亦以將迎有會淪塞無兆宣攝有方夭閼無命善游銷魂於深梁工騎燼生於曠野明珠招駭於闇至蟠木取悅於先容是以罕樂以陽施長世景惠以陰德遐紀彭竇以繕衞延命盈忌以荒湎促齡陳張稱台鼎之崇嚴辛衍宰司之盛若乃遊惡蹈凶處逆踐禍宣昭史策易以研正至如神仙所序天竺所書事雖難徵理未易詰留滯傾光思聞通裁對曰子可謂扶繩而辨循刻而議若乃宣攝有方豈非吉運所屬將迎有會實亦凶數自挻若夫陽施陰德長世遐年揆厥所原孰往非命研復來旨讎校往說起予惟商未識所異資生稟運參差萬殊逆順吉凶理數不一原夫飡椒非養生之術咀劍豈衞性之經命之所延人肉其骨而含嚼膏粱時或嬰患深澗乖徼寵之津空谷絕探榮之轍運之所集物稊其枯而俯仰竿牘終然離沮爾乃蹻跖橫行曾原窘步湯周延世詡邑絕緒吉凶徵應糾纆若茲畢萬保軀宓賤琖領梁野之言豈不或妄穀南魯北甘此促生彭翁竇叟將以何術晉平趙敬淫放已該漢主魏相奚獨傷夭同異若斯是非孰正至如雷濱凝分挫志遠圖棘津陰拱振功高世樊生沖矯鑴旌善之文華子高抗銘懲非之策皆士衡所云同川而異歸者也殊塗均致實繁有徵即理易推在言可略昔兩都全盛六合殷昌霧集貴寵之閭雲動權豪之術鈞貿貽談豈唯陳張而已觀夫二子才未越衆而此以藉榮揮價彼獨擯景淪聲通否之運斷可知矣嚴辛不安時任命而委罪亮直亦地脈之徒歟若神仙所序顯明修習齊強燕平厥驗未著李覃董芬其効安在喬松之侶雲飛天居夷列之徒風行水息良由理數懸挺實乃鍾茲景命天竺遺文星華方策因造前定果報指期貧豪莫差修夭無爽有允瑣辭無愆鄙說統而言之孰往非命冥期前定各從所歸善惡無所矯其趨愚智焉能殊其理若乃得議其工失蚩其拙操之則慄舍之則悲斯固染情於近累豈不貽誚於通識問曰清論光心英辯溢目求諸鄙懷良有未盡若動止皆運險易自天理定前期靡非闇至玉門犁丘叡識弗免豈非聖愚齊致仁虐同功昏明之用將何施而可對曰夫聖人懷虛以涵育凝明以洞照惟虛也故無往而不通惟明也故無來而不燭涸海流金弗染溫涼之岨嚴兵猛兕無累爪刃之災忘生而生愈全遺神而神彌暢若玉門犁丘蓋同迹於人故同人有患然而均心於天亦均天無害大賢則體備形器慮盡藏假靜默以居否深拱以違礥皆數在清全故鍾茲妙識是以稟仲尼之道不在奔車之上資伯夷之運不處覆舟之下若乃越難趨險逡巡弗獲履危踐機僶俛從事愚之所司聖亦何為及中下之流馳心妄動是非舛斡倚伏移貿故北宮意逆而功順東門心晦而迹明宣應遺筮而逢吉張松協數而遘禍且智防有紀患累無方爾乃猘狗逐而華子奔腐鼠遺而虞氏滅匣猨逸而林木殘櫝珠亡而池水竭凡厥條流曲難詳備傜形役思其効安徵豈若澡雪靈府洗練神宅據道為心依德為慮使迹窮則義斯暢身泰則理兼通豈不美哉何必遺此而取彼問曰夫建極開化樹聲貽則典防之興由來尚矣必乃幽符懸兆冥數指期善惡前徵是非素定名教之道不亦幾乎息哉對曰天生蒸民樹之物則教義所稟豈非冥數何則形氣之具必有待而存顓蒙之倫豈無因而立必假纖紈以安生藉粱豢以延祀資信禮以繕性秉廉義以劾情聖人聰明深懿履道測化通體天地同情日月仰觀俯察撫運裁風於是乎昭日星之紀正霜雨之度張雲霞之明衍風露之渥浮舟翼滯騰駕振幽又乃甄理三才辨綜五德弘鋪七體之端宣昭八經之緒是以時雍在運羣方自通抱德煬和全真保性故信食相資代為脣齒富教相假遞成輔車今弛棄纖紈損絕粱豢必云徼生委命豈不已曉其迷至乎湮斥廉義屏黜信禮責以祈存推數遂乃未辨其惑連類若斯乖妄滋甚然則教義之道生運所資寵辱榮枯常由此作斯固命中之一物非所以為難也問曰循復前旨既以理命縣兆生數冥期研覆後文又云依仗名教帥循訓範若藉數任天則放情蕩思拘訓馴範則防慮檢喪函矢殊用矛戈異適雙美之談豈能兩遂對曰夫性運乖舛心貌詭殊請布末懷略言其要若乃吉命所鍾縱情蹈道訓性而順因心則靈凶數所挻率由踐逆聞言不信長惡無悛此愚智不移聲訓所遺者也其有見善如不及從諫如順流是則命待教全運須化立譬以良醫之室病者所存至如澄神清魂平心實氣無妄之痾勿藥有喜所謂縱情蹈道無假隱括若膏肓之疾長桑不治體府之病陽慶弗理此則率由踐逆自絕調御至乃趙儲之命宜永須扁鵲而後全齊后之數必延待文摯而後濟亦猶運鍾循奬彝範所興善惡無主唯運所集而異膏粱方丈沈疾弗顧瑤碧盈尺阽危弗存夫靜躁之容造次必於是曲直之性顛沛不可移是以夷惠均聖而異方遵竦齊通而殊事雖復鉗桎羿奡思服巢許之情捶勒曾史言膺蹻跖之慮不然之事斷可知也必幽符鑽仰冥數修習雖存陵惰其可得乎故運屬波流勢無防慮命徼山立理無放情用殊函矢雙美奚躓談異矛戈兩濟何傷問曰夫君臣恩深師資義固所以霑榮塗施提飾荷聲故刳心流腸捐生以亢節火妻灰子埋名以償義若幽期天兆則明敭可遺冥數自賓則感効宜絕豈其然乎對曰論之所明原本以為理難之所疑即末以為用蓋陰閉之巧不傳萌漸之調長絕故知妄言賞理古人所難吾所謂命固以綿絡古今彌貫終始爰及君臣父子師友夫妻皆天數冥合神運玄至逮乎睽愛離會既命之所甄昏爽順戾亦運之所漸爾乃松柳異質薺荼殊性故疾風知勁草嚴霜識貞木何異忠孝之質資行夙昭至於刻志酬生題誠復施殉節投命馴義忘己亦由石雖可毀堅不可銷丹雖可磨赤不可滅因斯而言君臣師資既幽期自賓心力感効亦冥數天兆夫獨何怪哉愿字子恭父淵之散騎侍郎愿好學有文辭於世大明中舉秀才對策稱旨擢為著作佐郎太子舍人早卒史臣曰孝建啟基西楚放命難連淮濟勢盛江服朱脩之著節漢南劉秀之推鋒萬里並誠載艱一忠惟帝念而踰峴之鋒戰有獨克出硤之師舟無隻反雖霜霰並時而計功則異也及定終之命等數相懸蓋由義結蕃朝故恩有厚薄雖故舊不遺聞之前訓隆名爽實亦無取焉
