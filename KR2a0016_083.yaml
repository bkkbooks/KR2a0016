body:
  text: 宋書卷八十三列傳第四十三宗越吳喜黃回宗越南陽葉人也本河南人晉亂徙南陽宛縣又土斷屬葉本為南陽次門安北將軍趙倫之鎮襄陽襄陽多雜姓倫之使長史范覬之條次氏族辨其高卑覬之點越為役門出身補郡吏父為蠻所殺殺其父者嘗出郡越於市中刺殺之太守夏侯穆嘉其意擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬常刀楯步出單身挺戰衆莫能當每一捷郡將輒賞錢五千因此得市馬後被召出州為隊主世祖鎮襄陽以為揚武將軍領臺隊元嘉二十四年啓太祖求復次門移戶屬冠軍縣許之二十七年隨柳元景北伐領馬幢隸柳元怙有戰功事在元景傳還補後軍參軍督護隨王誕戲之曰汝何人遂得我府四字越答曰佛貍未死不憂不得咨議參軍誕大笑隨元景伐西陽蠻因值建義轉南中郎長兼行參軍新亭有戰功世祖即位以為江夏王義恭大司馬行參軍濟陽太守尋加龍驤將軍臧質魯爽反越率軍據歷陽爽遣將軍鄭德玄前據大峴德玄分遣偏師楊胡興劉蜀馬步三千進攻歷陽越以步騎五百於城西十餘里拒戰大破斬胡興蜀等爽平又率所領進梁山拒質質敗走越戰功居多因追奔至江陵時荊州刺史朱修之未至越多所誅戮又逼略南郡王義宣子女坐免官繫尚方尋被宥復本官追論前功封築陽縣子食邑四百戶遷西陽王子尚撫軍中兵參軍將軍如故大明三年轉長水校尉竟陵王誕據廣陵反越領馬軍隸沈慶之攻誕及城陷世祖使悉殺城內男丁越受旨行誅躬臨其事莫不先加捶撻或有鞭其面者欣欣然若有所得所殺凡數千人四年改封始安縣子戶邑如先八年遷新安王子鸞撫軍中兵參軍加輔國將軍其年督司州豫州之汝南新蔡汝陽潁川四郡諸軍事寧朔將軍司州刺史尋領汝南新蔡二郡太守前廢帝景和元年召為遊擊將軍直閣頃之領南濟陰太守進爵為侯增邑二百戶又加冠軍將軍改領南東海太守遊擊如故帝凶暴無道而越及談金童太一並為之用命誅戮羣公及何邁等莫不盡心竭力故帝憑其爪牙無所忌憚賜與越等美女金帛充牣其家越等武人粗強識不及遠咸一往意氣皆無復二心帝將欲南巡明旦便發其夕悉聽越等出外宿太宗因此定亂明晨越等並入上撫接甚厚越改領南濟陰太守本官如故越等既為廢帝盡力慮太宗不能容之上接待雖厚內並懷懼上亦不欲使其居中從容謂之曰卿等遭罹暴朝勤勞日久苦樂宜更應得自養之地兵馬大郡隨卿等所擇越等素已自疑及聞此旨皆相顧失色因謀作難以告沈攸之攸之具白太宗即日收越等下獄死越時年五十八越善立營陳每數萬人止頓越自騎馬前行使軍人隨其後馬止營合未嘗參差及沈攸之代殷孝祖為南討前鋒時孝祖新死衆並懼攸之歎曰宗公可惜故有勝人處而御衆嚴酷好行刑誅睚眥之間動用軍法時王玄謨御下亦少恩將士為之語曰寧作五年徒不逐王玄謨玄謨尚可宗越殺我談金荒中傖人也在荒中時與薛安都有舊後出新野居牛門村及安都歸國金常隨征討自北入崤陝及巴口建義副安都排堅陷陳氣力兼人平元凶及梁山破臧質每有戰功稍至建平王宏中軍參軍事加建武將軍尋轉龍驤將軍南下邳太守參軍如故孝建三年遷屯騎校尉直閣領南清河太守景和元年前廢帝誅羣公金等並為之用帝下詔曰屯騎校尉南清河太守談金強弩將軍童太一車騎中兵參軍沈攸之誠略沈果忠幹勇鷙消蕩氛翳首制鯨凶宜裂河山以酬勳義金可封平都縣男太一宜陽縣男攸之東興縣男食邑各三百戶金遷驍騎將軍增邑百戶太一東莞人也自強弩遷左軍將軍增邑百戶金太一並與宗越俱死越州里劉胡武念佼長生蔡那曹欣之並以將帥顯劉胡事在鄧琬傳武念新野人也本三五門出身郡將蕭思話為雍州遣土人龐道符統六門田念為道符隨身隊主後大府以念有健名且家富有馬召出為將世祖臨雍州念領隊奉迎時沔中蠻反世祖之鎮緣道討伐部伍至大堤巖洲蠻數千人忽至乘高矢射雨下念馳赴奮擊應時摧退即擢為參軍督護其後每軍旅常有戰功世祖孝建中為建威將軍桂陽太守竟陵王誕反念以江夏王義恭太宰參軍龍驤將軍隸沈慶之攻廣陵城誕出城走既而復還念追之不及坐免官復以為冗從僕射出為龍驤將軍南陽太守前廢帝景和中為右軍將軍直閣封開國縣男食邑三百戶太宗初即位四方反叛遣念乘驛還雍州綏慰西土因以為南陽太守念既至人情並向之劉胡遣腹心數騎詐詣念降於坐縛念袁顗斬之送首詣晉安王子勛念黨袁處珍逃亡至壽陽為逆黨劉順所得考楚備至秉義不移後得叛奔劉勔太宗嘉之以為奉朝請追贈念冠軍將軍南陽新野二郡太守封綏安縣侯食邑四百戶泰始四年綏安縣省改封邵陵縣佼長生廣平人也出身為縣將大府以其有膂力召為府將朱修之拒魯秀於峴南長生有戰功稍見任使太宗初為建安王休仁司徒中兵參軍加寧朔將軍南討有功封遷陵縣侯食邑八百戶後為張悅寧遠司馬寧蠻校尉泰始五年卒追贈征虜將軍雍州刺史蔡那南陽冠軍人也家素富而那兄局善接待賓客客至無少多皆資給之以此為郡縣所優異蠲其調役那始為建福戍主漸至大府將佐太宗初為建安王休仁司徒中兵參軍南討那子弟皆在襄陽為劉胡所執胡每戰輒懸之城外那進戰愈猛以功封平陽縣侯食邑五百戶稍至劉韞撫軍司馬寧蠻校尉加寧朔將軍泰豫元年以本號為益州刺史宋寧太守未拜卒追贈輔師將軍餘如故諡曰平侯曹欣之新野人也積勤勞後廢帝元徽初為軍主以平桂陽王休範功封新市縣子食邑五百戶為左軍驍騎將軍加輔國將軍元徽四年以本號為徐州刺史鍾離太守進號冠軍將軍順帝升明二年徵為散騎常侍驍騎將軍三年卒吳喜吳興臨安人也本名喜公太宗減為喜初出身為領軍府白衣吏少知書領軍將軍沈演之使寫起居注所寫既畢暗誦略皆上口演之嘗作讓表未奏失本喜經一見即便寫赴無所漏脫演之甚知之因此涉獵史漢頗見古今演之門生朱重民入為主書薦喜為主書書吏進為主圖令史太祖嘗求圖書喜開卷倒進之太祖怒遣出會太子步兵校尉沈慶之征蠻啓太祖請喜自隨使命去來為世祖所知賞世祖於巴口建義喜遇病不堪隨慶之下事平世祖以喜為主書稍見親遇擢為諸王學官令左右尚方令河東太守殿中御史大明中黟歙二縣有亡命數千人攻破縣邑殺害官長豫章王子尚為揚州在會稽再遣主帥領三千人水陸討伐遂再往失利世祖遣喜將數十人至二縣誘説羣賊賊即日歸降太宗初即位四方反叛東兵尤急喜請得精兵三百致死於東上大説即假建武將軍簡羽林勇士配之議者以喜刀筆主者不嘗為將不可遣中書舍人巢尚之曰喜昔隨沈慶之屢經軍旅性既勇決又習戰陳若能任之必有成績諸人紛紛皆是不別才耳喜乃率員外散騎侍郎竺超之殿中將軍杜敬真馬步東討既至永世得庾業劉延熙書送尋陽王子房檄文與喜書曰知統戎旅已次近路卿所在著名今日何為立忠於彼邪想便倒戈共受河山之賞喜報書曰前驅之人忽獲來翰披尋狂惑良深悵駭聖主以神武撥亂德盛勳高羣逆交扇滅在晷刻君等勳義之烈世荷國恩事愧鳴梟不懷食椹今練勒所部星言進邁相見在近不復多陳喜孝武世見驅使常充使命性寬厚所至人並懷之及東討百姓聞吳河東來便望風降散故喜所至克捷事在孔覬傳遷步兵校尉將軍如故封竟陵縣侯食邑千戶東土平定又率所領南討遷輔國將軍尋陽太守南賊退走喜追討平定荊州遷前軍將軍增邑三百戶泰始四年改封東興縣侯戶邑如先仍除使持節督交州廣州之鬱林寧浦二郡諸軍事輔國將軍交州刺史不行又除右軍將軍淮陵太守假輔師將軍兼太子左衛率五年轉驍騎將軍假號太守兼率如故其年虜寇豫州喜統諸軍出討大破虜於荊亭偽長社公遁走戍主帛乞奴歸降軍還復以本位兼左衛將軍六年又率軍向豫州拒索虜加節督豫州諸軍事假冠軍將軍驍騎太守如故明年還京都初喜東征白太宗得尋陽王子房及諸賊帥即於東梟斬東土既平喜見南賊方熾慮後翻覆受禍乃生送子房還都凡諸大主帥顧琛王曇生之徒皆被全活上以喜新立大功不問也而內密銜之及平荊州恣意剽虜贓私萬計又嘗對賓客言漢高魏武本是何人上聞之益不説其後誅壽寂之喜內懼因啓中散大夫上尤疑駭至是會上有疾為身後之慮以喜素得人情疑其將來不能事幼主乃賜死時年四十五喜將死之日上召入內殿與共言謔酬接甚款既出賜以名饌并金銀御器敕將命者勿使食器宿喜家上素多忌諱不欲令食器停凶禍之室故也喜未死一日上與劉勔張興世齊王詔曰吳喜出自卑寒少被驅使利口任詐輕狡萬端自元嘉以來便充刀筆小役賣弄威恩苟取物情處處交結皆為黨與衆中常以正直為詞而內實阿媚每仗計數運其佞巧甘言説色曲以事人不忠不平彰於觸事從來作諸署主意所不協者覔罪委頓之以示清直而餘人恣意為非一不檢問故甚得物情昔大明中黟歙二縣有亡命數千人攻破縣邑殺害官長劉子尚在會稽再遣主帥領三千精甲水陸討伐再往失利孝武以喜將數十人至二縣説誘羣賊賊即歸降詭數幻惑乃能如此故每豫驅馳窮諸狡慝及泰始初東討正有三百人直造三吳凡再經薄戰而自破岡以東至海十郡無不清蕩百姓聞吳河東來便望風自退若非積取三吳人情何以得弭伏如此其統軍寬慢無章放恣諸將無所裁檢故部曲為之致力觀其意趣止在賊平之後應力為國計喜初東征發都指天畫地云得劉子房即當屏除袁標等皆加斬戮使略無生口既平之後緩兵施恩納罪人之貨誘諸賊帥令各逃藏受賂得物不可稱紀聽諸賊帥假稱為降而擁衛子房遂得生歸朝庭收羅羣逆皆作爪牙撫接優密過於義士推此意正是聞南賊大盛殷孝祖戰亡人情大惡慮逆徒得志規以自免喜善為姦變每以計數自將於朝廷則三吳首獻慶捷於南賊則不殺其黨頗著陰誠當云東人恇怯望風自散皆是彼無處分非其苦相逼迫保全子房及顧琛等足表丹誠進退二塗可以無患南賊未平唯以軍糧為急西南及北道斷不通東土新平商運稀簡朝廷乃至鬻官賣爵以救災困斗斛收斂猶有不充喜在赭圻軍主者頓偷一百三十斛米初不問罪諸軍主皆云宜治喜不獲已止與三十鞭又不責備凡所曲意類皆如此喜至荊州公私殷富錢物無復孑遺喜乘兵威之盛誅求推檢凡所課責既無定科又嚴令驅蹙皆使立辦所使之人莫非姦猾因公行私迫脅在所入官之物侵竊過半納資請託不知厭已西難既殄便應還朝而解故槃停託云扞蜀實由貨易交關事未回展又遣人入蠻矯詔慰勞賧伐所得一以入私又遣部下將吏兼因土地富人往襄陽或蜀漢屬託郡縣侵官害民興生求利千端萬緒從西還大艑小艒爰及草舫錢米布絹無船不滿自喜以下逮至小將人人重載莫不兼資喜本小人多被使役經由水陸州郡殆遍所至之處輒結物情妄竊善稱聲滿天下密懷姦惡人莫之知喜軍中諸將非劫便賊唯云賊何須殺但取之必得其用雖復羸弱亦言健兒可惜天下未平但令以功贖罪處遇料理反勝勞人此輩所感唯喜莫云恩由朝廷凶惡不革出醜聲勞人義士相與歎息並云我等不愛性命擊擒此賊朝廷不肯殺去反與我齊今天下若更有賊我不復能擊也此等既隨喜行多無功效或隱在衆後或在幔屋中眠賊既破散與勞人同受爵賞既被詰問辭白百端云此輩既見原宥擊賊有功那得不依例加賞褚淵往南選諸將卒喜為軍中經為賊者就淵求官倍於義士淵以喜最前獻捷名位已通又為統副難相違拒是以得官受賞反多義人義人雖忿喜不平又懷其寬弛往歲竺超之聞四方反叛人情畏賊無敢求為朝廷行者乃慨然攘步隨喜出征為其軍副身經臨敵自東還失喜意説超之多酒不堪驅使遂相委棄高敬祖年雖少宿氣力實健其有處分為軍中所稱喜薄其衰老云無所施正以二人忠清與己異行超之為人乃多飲酒計喜軍中主帥豈無飲酒者特是不利超之故以酒致言耳敬祖既無餘事直云年老託為乞郡潛相遣斥其餘主帥並貪濁諂媚之流皆提攜東西不相離捨喜聞天壤間有罪人死或應繫者必啓以入軍皆得官爵厚被處遇應入死之人緣己得活非唯得活又復如意人非木石何能不感設令吾攻喜門此輩誰不致力但是喜不敢生心耳喜軍中人皆是喜身爪牙豈關於國喜自得軍號以來多置吏佐是人加板無復限極為兄弟子姪及其同堂羣從乞東名縣連城四五皆灼然巧盜侵官奪私亡命罪人州郡不得討崎嶇蔽匿必也黨護臺州符旨殆不復行船車牛犢應為公家所假借者託之於喜吏司便不敢問它縣奴婢入界便略百姓牛犢輒牽殺噉州郡應及役者並入喜家喜兄茹公等悉下取錢盈村滿里諸吳姻親就人間徵求無復紀極百姓嗷然人人悉苦喜具知此初不禁呵索惠子罪不甚江悆既已被恩得免憲辟小小忤意輒加刑斬張悅賊中大帥逼迫歸降沈攸之録付喜云殺活當由朝廷將帥征伐既有常體自應執歸之有司喜即便打鎖解襦與著對膝圍仍造重義私惠招物觸事如斯張靈度凶愚小人背叛之首喜在西輒恕其罪私將下都與之周旋情若同體狼子野心獨懷毒性遂與柳欣慰等謀立劉褘吾使喜録之而喜密報令去去未得遠為建康所録喜背國親惡乃至於是初從西反圖兼右丞貪因事物以行私詐吾患其諂曲抑而不許從此怨懟意用不平喜西救汝陰縱肆兵將掠暴居民姦人婦女逼奪雞犬虜略縱橫緣路官長莫敢呵問脫誤有縛録一人喜輒大怒百姓呼嗟人人失望近段佛榮求還乃欲用喜代之西人聞其當來皆欲叛走云吳軍中人皆是生劫若作刺史吾等豈有活路既無他計正當叛投虜耳夫伐罪弔民用清國道豈有殘虐無辜剝奪為務害政妨國罔上附下罪釁若此而可久容臧文仲有云見有善於其君如孝子之養父母見有惡於君若鷹鸇之逐鳥雀耿弇不以賊遺君父前史以為美談而喜軍中五千人皆親經反逆攜養左右豈有奉上之心喜意志張大每稱漢高魏武本是何人近忽通啓求解軍任乞中散大夫喜是何人乃敢作此舉止且當今邊疆未寧正是喜輸蹄領之日若以自處之宜當節儉廉慎靜掃閉門不與外物交關專心奉上何得以其蜼螭高自比擬當是自顧愆釁事宣遐邇又見壽寂之流徙施修林被擊物惡傷類內懷憂恐故興此計圖欲自安朝廷之士及大臣藩鎮喜殆無所畏者畏者唯吾一人耳人生修短不可豫量若吾壽百年世間無喜何所虧損若使吾四月中疾患不得治力天下豈可有喜一人尋喜心迹不可奉守文之主豈可遭國家間隙有可乘之會邪世人多云時可畏國政嚴歷觀有天下御億兆杖威齊衆何代不然故上古象刑民淳不犯後聖懲偽易以剠墨唐堯至仁不赦四凶之罪漢高大度而急三傑之誅且太公為治先華士之刑宣尼作宰肆少正之戮自昔力安社稷功濟蒼生班劍引前笳鼓陪後不能保此者歷代無數養之以福十分有一耳至若喜之深罪其得免乎夫富之與貴雖以績致之必由道德守之故善始者未足稱奇令終者乃可重耳凡置官養士本在利國當其為利愛之如赤子及其為害畏之若仇讎豈暇遠尋初功而應忍受終敝耳將之為用譬如餌藥當人羸冷資散石以全身及熱勢發動去堅積以止患豈憶始時之益不計後日之損存前者之賞抑當今之罰非忘其功勢不獲已耳喜罪釁山積志意難容雖有功效不足自補交為國患焉得不除且欲防微杜漸憂在未萌不欲方幅露其罪惡明當嚴詔切之令自為其所卿諸人將相大臣股肱所寄賞罰事重應與卿等論之卿意並謂云何及喜死發詔賻賜子徽民襲爵齊受禪國除黃回竟陵郡軍人也出身充郡府雜役稍至傳教臧質為郡轉齋帥及去職將回自隨質為雍州回復為齋帥質討元凶回隨從有功免軍戶質在江州擢領白直隊主隨質於梁山敗走向豫章為臺軍主謝承祖所録付江州作部遇赦得原回因下都於宣陽門與人相打詐稱江夏王義恭馬客鞭二百付右尚方會中書舍人戴明寶被繫差回為戶伯性便辟勤緊奉事明寶竭盡心力明寶尋得原赦委任如初啓免回以領隨身隊統知宅及江西墅事性有功藝觸類多能明寶甚寵任之回拳捷果徑勇力兼人在江西與諸楚子相結屢為劫盜會太宗初即位四方反叛明寶啓太宗使回募江西楚人得快射手八百假回寧朔將軍軍主隸劉勔西討於死虎破杜叔寶軍除山陽王休祐驃騎行參軍龍驤將軍攻合肥破之纍遷至將校以功封葛陽縣男食邑二百戶後廢帝元徽初桂陽王休範為逆回以屯騎校尉領軍隸齊王於新亭創詐降之計事在休範傳回見休範可乘謂張敬兒曰卿可取之我誓不殺諸王敬兒即日斬休範事平轉回驍騎將軍加輔師將軍進爵為侯改封聞喜縣增邑千戶四年遷冠軍將軍南琅邪濟陽二郡太守建平王景素反回又率軍前討假節城平之日回軍先入又以景素讓張倪奴回增邑五百戶進號征虜將軍加散騎常侍太守如故明年遷右衛將軍常侍如故沈攸之反以回為使持節督郢州司州之義陽諸軍事平西將軍郢州刺史給鼓吹一部率衆出新亭為前鋒未發而袁粲據石頭為亂回與新亭諸將帥任候伯彭文之王宜興孫曇瓘等謀應粲粲事發候伯等並乘船赴石頭唯曇瓘先至得入候伯等至而粲已平回本期詰旦率所領從御道直向臺門攻齊王於朝堂事既不果齊王撫之如舊回與宜興素不協慮或反告因其不從處分斬之宜興吳興人也形狀短小而果徑有膽力少年時為劫不須伴郡討逐圍繞數十重終莫能擒太宗泰始中為將在壽陽間擊索虜每以少制多挺身深入無所畏憚虜衆值宜興皆引避不敢當稍至寧朔將軍羽林監以平建平王景素功封長壽縣男食邑三百戶至是為屯騎校尉加輔國將軍回進軍未至郢州而沈攸之敗走回至鎮進號鎮西將軍改督為都督回不樂停郢州固求南兗遂率部曲輒還改封安陸郡公增邑二千戶并前三千七百戶改都督南兗徐兗青冀五州諸軍事鎮北將軍南兗州刺史加散騎常侍持節如故齊王以回終為禍亂乃上表曰黃回出自厮伍本無信行仰值泰始謬被驅馳階藉風雲纍叨顯伍及沈攸之作逆事切戎機臣暗於知人冀其搏噬遣統前鋒竟不接刃軍至郢城乘威迫脅陵掠所加必先尊貴武陵王馬器服咸被虜奪城內文武剝剔靡遺及至還都縱恣彌甚先朝御服猶有二輿弓劍遺思尚在車府回遂啓求以擬私用僭侮無厭罔顧天極又廣納逋亡多受劫盜親信此等並為爪牙觀其凶狡憂在不測惡積罪著非可含忍應加劋除以明國憲尋其釁狀實宜極法但嘗經將帥微有塵露罪疑從輕事炳前策請在降減特原餘嗣臣過荷隆寄言必罄誠謹陳管穴式遵弘典伏願聖明特垂允鑒臣思不出位誠昧甄才追言既往伏增慚恧詔曰黃回擢自凡豎夙負疵釁貰以憲綱收其搏噬雖勤效纍著而屢懷干紀新亭背叛投拜寇埸異規既扇廟律幾殆幸得張敬兒提戈直奮元惡受戮及景素結逆履霜歲久乃密通音譯潛送器杖氛沴克霽狡謀方顯每存容掩冀能悛革故裂茅升爵均榮勳寵凶詖有本險慝滋深搆誘敬兒志相攻陷悖圖未遂很戾彌甚近軍次郢鎮劫逼府主兼挾私計多所徵索主局咨疑便加捶楚專肆暴慢罔顧彝則膺牧西蕃徽賁惟厚曾不知感猶懷忿怨李安民述任河濟星管未周貪據襟要苦祈回奪黷謁弗已叨侈無度遂請求御輿僭擬私飾又招萃賊黨初不啓聞傷風蠹化莫此之甚宜明繩裁肅正刑書便收付廷尉依法窮治回死時年五十二子僧念尚書左民郎竟陵相未發從誅回既貴祗事戴明寶甚謹言必自名每至明寶許屏人獨進未嘗敢坐躬至帳下及入內料檢有無隨乏供送以此為常先是王蘊為湘州潁川庾佩玉為蘊寧朔府長史長沙內史蘊去職南中郎將湘州刺史南陽王翽未之任權以佩玉行府州事先遣中兵參軍臨湘令韓幼宗領軍戍防湘州與佩玉共事不美及沈攸之為逆佩玉幼宗各不相信幼宗密圖佩玉知其謀襲殺幼宗回至郢州遣輔國將軍任候伯行湘州事候伯以佩玉兩端輒殺之湘州刺史呂安國之鎮齊王使安國誅候伯彭文之泰山人也以軍功稍至龍驤將軍討建平王景素功封葛陽縣男食邑三百戶順帝初為輔國將軍左軍將軍南濮陽太守直閣領右細仗蕩主沈攸之平後齊王收之下獄賜死孫曇瓘吳郡富陽人也驍果有氣力以軍功稍進至是為寧朔將軍越州刺史於石頭叛走逃竄經時後於秣陵縣禽獲伏誅回同時為將者臨淮任農夫沛郡周寧民南郡高道慶並以武用顯農夫稍至強弩將軍太宗初以東討功封廣晉縣子食邑五百戶東土平定仍又南討增邑二百戶歷射聲校尉左軍將軍時桂陽王休範在江州有異志朝廷慮其下以農夫為輔師將軍淮南太守戍姑孰以防之休範尋率衆向京邑奄至近道農夫棄戍還都休範平以戰功改封孱陵縣侯增邑千戶并前千七百戶出為輔師將軍豫州刺史尋進號冠軍將軍明年入為驍騎將軍加通直散騎常侍前世加官唯散騎常侍無通直員外之文太宗以來多因軍功至大位資輕加常侍者往往通直員外焉五年加征虜將軍改通直為散騎常侍驍騎如故其年卒追贈左將軍常侍如故諡曰貞肅候伯即農夫弟也周寧民於鄉里起義討薛安都亦以軍功至軍校泰始初封贛縣男食邑三百戶官至寧朔將軍徐州刺史鍾離太守高道慶亦至軍校驍遊以平桂陽王休範功封樂安縣男食邑三百戶建平王景素反道慶領軍北討而與景素通謀及事平自啓求增邑五百戶詔加二百并前五百戶道慶凶險暴橫求欲無已有失其意輒加捶拉往往有死者朝廷畏之如虎狼齊王與袁粲等議收付廷尉賜死史臣曰夫豎人匹夫濟其身業非世亂莫由也以亂世之情用於治日其得不亡亦為幸矣
