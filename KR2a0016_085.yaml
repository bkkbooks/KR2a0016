body:
  text: 宋書卷八十五列傳第四十五謝莊王景文謝莊字希逸陳郡陽夏人太常弘微子也年七歲能屬文通論語及長韶令美容儀太祖見而異之謂尚書僕射殷景仁領軍將軍劉湛曰藍田出玉豈虛也哉初為始興王濬後軍法曹行參軍轉太子舍人廬陵王文學太子洗馬中舍人廬陵王紹南中郎諮議參軍又轉隨王誕後軍諮議並領記室分左氏經傳隨國立篇製木方丈圖山川土地各有分理離之則州別郡殊合之則宇內為一元嘉二十七年索虜寇彭城虜遣尚書李孝伯來使與鎮軍長史張暢共語孝伯訪問莊及王微其名聲遠布如此二十九年除太子中庶子時南平王鑠獻赤鸚鵡普詔羣臣為賦太子左衞率袁淑文冠當時作賦畢齎以示莊莊賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時之傑也遂隱其賦元凶弒立轉司徒左長史世祖入討密送檄書與莊令加改治宣布莊遣腹心門生具慶奉啟事密詣世祖曰賊劭自絕於天裂冠毀冕窮弒極逆開闢未聞四海泣血幽明同憤奉三月二十七日檄聖迹昭然伏讀感慶天祚王室叡哲重光殿下文明在嶽神武居陝肅將乾威龔行天罰滌社稷之仇雪華夷之恥使弛墜之構更獲締造垢辱之甿復得明目伏承所命柳元景司馬文恭宗売心沈慶之等精甲十萬已次近道殿下親董銳旅授律繼進荊鄢之師岷漢之衆舳艫萬里旌斾虧天九土冥符羣后畢會今獨夫醜類曾不盈旅自相暴殄省闥橫流百僚屏氣道路以目檄至輒布之京邑朝野同欣里頌塗歌室家相慶莫不望景聳魂瞻雲佇足先帝以日月之光照臨區宇風澤所漸無幽不洽況下官世荷寵靈叨恩踰量謝病私門幸免虎口雖志在投報其路無由今大軍近次永清無遠欣悲踊躍不知所裁世祖踐阼除侍中時索虜求通互市上詔羣臣博議莊議曰臣愚以為獯獫棄義唯利是視關市之請或以覘國順之示弱無明柔遠距而觀釁有足表強且漢文和親豈止彭陽之寇武帝修約不廢馬邑之謀故有餘則經略不足則閉關何為屈冠帶之邦通引弓之俗樹無益之軌招塵點之風交易爽議既應深杜和約詭論尤宜固絕臣庸管多蔽豈識國儀恩誘降逮敢不披盡時驃騎將軍竟陵王誕當為荊州徵丞相荊州刺史南郡王義宣入輔義宣固辭不入而誕便克日下船莊以丞相既無入志驃騎發便有期如似欲相逼切於事不便世祖乃申誕發日義宣竟亦不下上始踐阼欲宣弘風則下節儉詔書事在孝武本紀莊慮此制不行又言曰詔云貴戚競利興貨廛肆者悉皆禁制此實允愜民聽其中若有犯違則應依制裁糾若廢法申恩便為令有所屈此處分伏願深思無緣明詔既下而聲實乖爽臣愚謂大臣在祿位者尤不宜與民爭利不審可得在此詔不拔葵去織實宜深弘孝建元年遷左衞將軍初世祖嘗賜莊寶劍莊以與豫州刺史魯爽送別爽後反叛世祖因宴集問劍所在答曰昔以與魯爽別竊為陛下杜郵之賜上甚說當時以為知言于時搜才路乃上表曰臣聞功照千里非特燭車之珍德柔鄰國豈徒祕璧之貴故詩稱殄悴誓述榮懷用能道臻無積化至恭己伏惟陛下膺慶集圖締宇開縣夕爽選政昃旦調風采言廝輿觀謠仄遠斯實辰階告平頌聲方製臣竊惟隆陂所漸治亂之由何嘗不興資得才替因失士故楚書以善人為寶虞典以則哲為難進選之軌既弛中代登造之律未闡當今必欲崇本康務庇民濟俗匪更惉懘奚取九成升曆中陽英賢起於徐沛受籙白水茂異出於荊宛寧二都智之所產七隩才之所集實遇與不遇用與不用耳今大道光亨萬務俟德而九服之曠九流之艱提鈞懸衡委之選部一人之鑒易限而天下之才難原以易限之鑒鏡難原之才使國罔遺授野無滯器其可得乎昔公叔與僎同升管仲取臣於盜趙文非親士疎嗣祁奚豈諂讎比子茹茅以彙作範前經舉爾所知式昭往牒且自古任薦賞罰弘明成子舉三哲而身致魏輔應侯任二士而己捐秦相臼季稱冀缺而疇以田采張勃進陳湯而坐以褫爵此先事之盛准亦後王之彝鑒如臣愚見宜普命大臣各舉所知以付尚書依分銓用若任得其才舉主延賞有不稱職宜及其坐重者免黜輕者左遷被舉之身加以禁錮年數多少隨愆議制若犯大辟則任者刑論又政平訟理莫先親民親民之要實歸守宰故黃霸治潁川累稔杜畿居河東歷載或就加恩秩或入崇輝寵今莅民之職自非公私必應代換者宜遵六年之制進獲章明庸墮退得民不勤擾如此則下無浮謬之愆上靡棄能之累考績之風載泰槱薪之歌克昌臣生屬亨路身漸鴻猷遂得奉詔左右陳愚於側敢露芻言懼氛典有詔莊表如此可付外詳議事不行其年拜吏部尚書莊素多疾不願居選部與大司馬江夏王義恭牋自陳曰下官凡人非有達概異識俗外之志實因羸疾常恐奄忽故少來無意於人間豈當有心於崇達邪頃年乘事回薄遂果饕非次既足貽誚明時又亦取愧朋友前以聖道初開未遑引退及此諸夏事寧方陳微請發志未伸仍荷今授被恩之始具披寸心非惟在己知尤實懼塵穢彝序禀生多病天下所悉兩脅癖疾殆與生俱一月發動不減兩三每至一惡痛來逼心氣餘如綖利患數年遂成痼疾吸吸惙惙常如行尸居死病而不復道者豈是疾痊直以荷恩深重思答殊施牽課瘵以綜所忝眼患五月來便不復得夜坐閉帷避風日晝夜惽懵為此不復得朝謁諸王慶吊親舊唯被敕見不容停耳此段不堪見賓已數十日持此苦生而使銓綜九流應對無方之訴實由聖慈罔已然當之信自苦劇若才堪事任而體氣休健承寵異之遇處自效之塗豈苟欲思閑辭事邪家素貧弊宅舍未立兒息不免粗糲而安之若命寧復是能忘微祿正以復有切於此處故無復他願耳今之所希唯在小閑下官微命於天下至輕在己不能不重屢經披請未蒙哀恕良由誠淺辭訥不足上感家世無年亡高祖四十曾祖三十二亡祖四十七下官新歲便三十五加以疾患如此當復幾時見聖世就其中煎若此實在可矜前時曾啟願三吳敕旨云都不須復議外出莫非過恩然亦是下官生運不應見一閑逸今不敢復言此當付之來生耳但得保餘年無復物務少得養痾此便是志願永畢在衡門下有所懷動止必聞亦無假居職患於不能裨補萬一耳識淺才常羸疾如此孤負主上擢授之恩私心實自哀愧入年便當更申前請以死自固但庸近所訴恐未能仰徹公恩盼弘深粗照誠懇願侍坐言次賜垂拯助則苦誠至心庶獲哀允若不蒙降祐下官當於何希冀邪仰憑愍察願不垂吝三年坐辭疾多免官大明元年起為都官尚書奏改定刑獄曰臣聞明慎用刑厥存姬典哀矜折獄實暉呂命罪疑從輕既前王之格範寧失弗經亦列聖之訓用能化致升平道臻恭己逮漢文傷不辜之罰除相坐之令孝宣倍深文之吏立鞫訊之法當是時也號稱刑清陛下踐位親臨聽訟億兆相賀以為無寃民矣而比囹圄未虛頌聲尚缺臣竊謂五聽之慈弗宣於宰物三宥之澤未洽於民謠頃年軍旅餘弊劫掠猶繁監司討獲多非其實或規免身咎不慮國患楚對之下鮮不誣濫身遭鈇鑕之誅家嬰孥戮之痛比伍同閈莫不及罪是則一人罰謬坐者數十昔齊女告天臨淄臺殞孝婦寃戮東海陽此皆符變靈祗初感景緯臣近兼訊見重囚八人旋觀其初死有餘罪詳察其理實並無辜恐此等不少誠可怵惕也舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長有案驗之名而無研究之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覈辯必收聲吞釁然後就戮若二千石不能決乃度廷尉神州統外移之刺史刺史有疑亦歸臺獄必令死者不怨生者無恨庶鬻棺之諺輟歎於終古兩造之察流詠於方今臣學闇申韓才寡治術輕陳庸管懼乖國憲上時親覽朝政常慮權移臣下以吏部尚書選舉所由欲輕其勢力二年下詔曰八柄馭下以爵為先九德咸事政典居首銓衡治樞興替攸寄頃世以來轉失厥序徒秉國鈞終貽權謗今南北多士勳勤彌積物情善否實繫斯任官人之詠維聖克允則哲之美粵帝所難加澆季在俗讓議成風以一人之識當羣品之誚望沈浮自得庸可致乎吏部尚書可依郎分置并詳省閑曹又別詔太宰江夏王義恭曰分選詔旦出在朝論者亦有同異誠知循常甚易改舊生疑但吏部尚書由來與錄共選良以一人之識不辦洽通兼與奪威權不宜專一故也前述宣先旨敬從來奏省錄作則永貽後昆自此選舉之要唯由元凱一人若通塞乖衷而訴達者尠且違令與物理至隔閡前王盛主猶或難之況在寡闇尤見其短又選官裁病即嗟誚滿道人之四體會盈有虛旬日之間便至怨詈況實有假託不由寢頓者邪一詣不前貧苦交困則兩邊致患互不相體校之以實並有可哀若職置二人則無此弊兼選曹樞要歷代斯重人經此職便成貴塗己心外議咸不自限故范曄魯爽舉兵滅門以此言之實由榮厚勢驅殷繁所至設可擬議此授唯有數人本積歲月稍加引進而理無前期多生慮表或嬰艱抱疾事至回移官人之任決不可闕一來一去向人已周非有黜責已貴難賤既成妨長置之無所盛衰遞襲便是一段世臣相處之方臣主生疑所以彌覺此職宜在降階監令端右足處時望無人則闕異於九流今但直銓選部有減前資物情好猜橫立別解本旨向意終不外宣唯有從郎分置視聽自改選既輕先民情已變有堪其任大展遷回兼常之宜以時稍進本職非復重官可得不須帶帖數過居之盡無詒怪自中分荊揚于時便有意於此正訝改革不少容生駭惑爾來多年欲至歲下處分會何偃致故應有親人故近因此施行本意詔文不得委悉故復紙墨具陳於是置吏部尚書二人省五兵尚書莊及度支尚書顧覬之並補選職遷右衞將軍加給事中時河南獻舞馬詔羣臣為賦莊所上其詞曰天子馭三光總萬宇挹雲經之留憲裁河書之遺矩是以德澤上昭天下漏泉符瑞之慶咸屬榮懷之應必躔月晷呈祥乾維效氣賦景河房承靈天駟陵原郊而漸影躍采淵而泳質辭水空而南傃去輪臺而東洎乘玉塞而歸寶奄芝庭而獻祕及其養安騏校進駕龍涓輝大馭於國皁賁上襄於帝閑超益野而踰綠地軼蘭池而轢紫燕五王晦其術十氏懵其玄東門豈或狀西河不能傳既艹巳以均性又佩蘅以崇躅卷雄神於綺文蓄奔容於帷燭蘊糸袞雲之銳景戢追電之逸足方疊鎔於丹縞亦聯規於朱駮觀其雙璧應範三封中圖玄骨滿燕室虛陽理竟潛策紆汗飛赭沫流朱至於肆夏已升采齊既薦始徘徊而龍俛終沃若而鸞眄迎調露於飛鍾赴承雲於驚箭寫秦坰之彌塵狀吳門之曳練窮虞庭之蹈蹀究遺野之環袨若夫蹠實之態未卷凌遠之氣方攄歷岱野而過碣石跨滄流而軼姑餘朝送日於西坂夕歸風於北都尋瓊宮於倏瞬望銀臺於須臾若乃日宣重光德星昭衍國稱梁岱佇蹕史言壇場望踐鄗上之瑞彰江間之禎闡榮鏡之運既臻會昌之曆已辨感五繇之程符鑒羣后之薦典聖主將有事於東嶽禮也於是順斗極乘次躔戒懸日於昭旦命月題於上年騑騑翼翼泛修風而浮慶煙肅肅雍雍引八神而詔九仙下齊郊而掩配林集嬴里而降祊田蒲軒次巘瑄璧承巒金檢茲發玉牒斯刊盛節之義洽升中之禮殫億兆悅精祇歡聆萬歲於曾岫燭神光於紫壇是以擊轅之蹈撫埃之舞相與而歌曰聳朝蓋兮泛晨霞靈之來兮雲漢華山有壽兮松有茂祚神極兮貺皇家然後悟聖朝之績號慶榮之烈比盛乎天地爭明乎日月茂實冠於胥庭鴻名邁於勛發業底於告成道臻乎報謁巍巍乎蕩蕩乎民無得而稱焉又使莊作舞馬歌令樂府歌之五年又為侍中領前軍將軍于時世祖出行夜還敕開門莊居守以棨信或虛執不奉旨須墨詔乃開上後因酒讌從容曰卿欲效郅君章邪對曰臣聞蒐巡有度郊祀有節盤于遊田著之前誡陛下今蒙犯塵露晨往宵歸容恐不逞之徒妄生矯詐臣是以伏須神筆乃敢開門耳改領游擊將軍又領本州大中正晉安王子勛征虜長史廣陵太守加冠軍將軍改為江夏王義恭太宰長史將軍如故六年又為吏部尚書領國子博士坐選公車令張奇免官事在顏師伯傳時北中郎將新安王子鸞有盛寵欲令招引才望乃使子鸞板莊為長史府尋進號撫軍仍除長史臨淮太守未拜又除吳郡太守莊多疾不樂去京師復除前職前廢帝即位以為金紫光祿大夫初世祖寵姬殷貴妃薨莊為誄云贊軌堯門引漢昭帝母趙婕妤堯母門事廢帝在東宮銜之至是遣人詰責莊曰卿昔作殷貴妃誄頗知有東宮不將誅之或說帝曰死是人之所同政復一往之苦不足為深困莊少長富貴今且繫之尚方使知天下苦劇然後殺之未晚也帝然其言繫於左尚方太宗定亂得出及即位以莊為散騎常侍光祿大夫加金章紫綬領尋陽王師頃之轉中書令常侍王師如故尋加金紫光祿大夫給親信二十人本官並如故泰始二年卒時年四十六追贈右光祿大夫常侍如故諡曰憲子所著文章四百餘首行於世長子颺晉平太守女為順帝皇后追贈金紫光祿大夫王景文琅邪臨沂人也名與明帝諱同祖穆臨海太守伯父智少簡貴有高名高祖甚重之常云見王智使人思仲祖與劉穆之謀討劉毅而智在焉它日穆之白高祖曰伐國重事也公云何乃使王智知高祖笑曰此人高簡豈聞此輩論議其見知如此為太尉諮議參軍從征長安留為桂陽公義真安西將軍司馬天水太守還為宋國五兵尚書晉陵太守加秩中二千石封建陵縣五等子追贈太常父僧朗亦以謹實見知元嘉中為侍中勤於朝直未嘗違惰太祖嘉之以為湘州刺史世祖大明末為尚書左僕射太宗初以后父為特進左光祿大夫又進開府儀同三司固讓乃加侍中特進尋薨追贈開府諡曰元公景文出繼智幼為從叔球所知美風姿好言理少與陳郡謝莊齊名太祖甚相欽重故為太宗娶景文妹而以景文名與太宗同高祖第五女新安公主先適太原王景深離絕當以適景文固辭以疾故不成婚起家太子太傅主簿轉太子舍人襲爵建陵子出為江夏王義恭始興王濬征北後軍二府主簿武陵王文學世祖撫軍記室參軍南廣平太守轉諮議參軍仍度安北鎮軍府出為宣城太守元凶弒立以為黃門侍郎未及就世祖入討景文遣間使歸款以父在都邑不獲致身及事平頗見嫌責猶以舊恩除南平王鑠司空長史不拜出為東陽太守入為御史中丞祕書監領越騎校尉不拜遷司徒左長史上以散騎常侍舊與侍中俱掌獻替欲高其選以景文及會稽孔覬俱南北之望並以補之尋復為左長史坐姊墓開不臨赴免官大明二年復為祕書監太子右衞率侍中五年出為安陸王子綏冠軍長史輔國將軍江夏內史行郢州事又徵為侍中領射聲校尉右衞將軍加給事中太子中庶子右衞如故坐與奉朝請毛法因蒱戲得錢百二十萬白衣領職尋復為侍中領中庶子未拜前廢帝嗣位徙祕書監侍中如故以父老自解出為江夏王義恭太宰長史輔國將軍南平太守永光初為吏部尚書景和元年遷右僕射太宗即位加領左衞將軍時六軍戒嚴景文仗士三十人入六門諸將咸云平殄小賊易於拾遺景文曰敵固無小蜂蠆有毒何可輕乎諸軍當臨事而懼好謀而成先為不可勝乃制勝之術耳尋遷丹陽尹僕射如故遭父憂起為冠軍將軍尚書左僕射丹陽尹固辭僕射改授散騎常侍中書令中軍將軍尹如故又辭不拜仍出為使持節散騎常侍都督江州郢州之西陽豫州之新蔡晉熙三郡諸軍事安南將軍江州刺史讓常侍服闋乃受太宗翦除暴主又平四方欲引朝望以佐大業乃下詔曰夫良圖宣國賞崇彝命殊績顯朝策勤王府安南將軍江州刺史景文風度淹粹理懷清暢體兼望實誠備夷岨寶曆方啟密贊義機妖徒干紀預毗廟略宜登茅社永傳厥祚朕澄氛寧樞實資多士疏爵疇庸實膺徽烈尚書右僕射領衞尉興宗識懷詳正思局通敏吏部尚書領太子左衞率淵器情閑茂風業韶遠並謀參軍政績亮時艱拓宇開邑實允勳典景文可封江安縣侯食邑八百戶興宗可始昌縣伯淵可南城縣伯食邑五百戶景文固讓不許乃受五百戶進號鎮南將軍尋給鼓吹一部後以江州當徙鎮南昌領豫章太守餘如故州不果遷頃之徵為尚書左僕射領吏部揚州刺史加太子詹事常侍如故不願還朝求為湘州刺史不許時又謂景文在江州不能潔己景文與上幸臣王道隆書曰吾雖寡於行己庶不負心既愧殊效誓不上欺明主竊聞有為其貝錦者云營生乃至巨萬素無此能一旦忽致異術必非平理唯乞平心精檢若此言不虛便宜肆諸市朝以正風俗脫其妄作當賜思罔昧之由吾踰忝轉深足以致謗念此驚懼何能自測區區所懷不願望風容貸吾自了不作偷猶如不作賊故以密白想為申啟景文屢辭內授上手詔譬之曰尚書左僕射卿己經此任東宮詹事用人雖美職次正可比中書令耳庶姓作揚州徐干木王休元殷鐵並處之不辭卿清令才望何愧休元毗贊中興豈謝干木綢繆相與何後殷鐵邪司徒以宰相不應帶神州遠遵先旨京口鄉基義重密邇畿內又不得不用驃騎陝西任要由來用宗室驃騎既去巴陵理應居之中流雖曰閑地控帶三江通接荊郢經塗之要由來有重鎮如此則揚州自成闕刺史卿若有辭更不知誰應處之此選大備與公卿疇懷非聊爾也固辭詹事領選徙為中書令常侍僕射揚州如故又進中書監領太子太傅常侍揚州如故景文固辭太傅上遣新除尚書右僕射褚淵宣旨以古來比例六事詰難之不得已乃受拜時太子及諸皇子並小上稍為身後之計諸將帥吳喜壽寂之之徒慮其不能奉幼主並殺之而景文外戚貴盛張永累經軍旅又疑其將來難信乃自為謠言曰一士不可親弓長射殺人一士王字弓長張字也景文彌懼乃自陳求解揚州曰臣凡猥下劣方圜無算特逢聖私頻叨不次乘非其任理宜覆折雖加恭謹無補橫至夙夜燋戰無地容處六月中得臣外甥女殷妻蔡疏欲令其兒啟聞乞祿求臣署入云凡外人通啟先經臣署于時驚怖即欲封疏上呈更思此家落漠庶非通謗且廣聽察幸無復所聞比日忽得兗州都送迎西曹解季遜板云是臣屬既不識此人即問郗顒方知虛託比十七日晚得征南參軍事謝儼口信云臣使人略奪其婢臣遣李武之問儼元由答云使人謬誤誤之與實雖所不知聞此之日唯有憂駭臣之所知便有此三變臣所不覺尤不可思若守爵散輩寧當招此誠由闇拙非復可防自竊州任倏已七月無德而祿其殃將至且傅職清峻亢禮儲極以臣凡走豈可暫安荷恩懼罪不敢執固焦魂褫氣憂迫失常況臣髮醜人羣病絕力効穢朝點列顧無與等獨息易駭慚懼難持伏願薄回矜愍全臣身計大夫之俸足以自周久懷欣羨未敢干請仰希慈宥照臣款誠上詔答曰去五月中病始差未堪勞役使卿等看選牒署竟請敕施行此非密事外間不容都不聞然傳事好訛由來常患殷妻匹婦耳閨閤之內傳聞事復作一兩倍落漠兼謂卿是親故希卿署不必云選事獨關卿也妻雖是傳聞之僻大都非可駭異且舉元薦凱咸由疇諮可謂唐堯不明下干其政邪悠悠好詐貴人及在事者屬卿偶不悉耳多是其周旋門生輩作其屬託貴人及在事者永無由知非徒止於京師乃至州郡縣中或有詐作書疏灼然有文迹者諸舍人右丞輩及親近驅使人慮有作其名載禁物求停檢校強賣猥物與官仍求交直或屬人求乞州郡資禮希蠲呼召及虜發船車並啟班下在所有即駐錄但卿貴人不容有此啟由來有是何故獨驚人居貴要但問心若為耳大明之世巢徐二戴位不過執戟權亢人主顏師伯白衣僕射橫行尚書中令袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑今既省錄令便居昔之錄任置省事及幹童並依錄格粲作令來亦不異為僕射人情向粲淡淡然亦復不改常以此居貴位要任當有致憂兢理不卿今雖作揚州太子傅位雖貴而不關朝政可安不懼差於粲也想卿虛心受榮而不為累貴高有危殆之懼卑賤有溝壑之憂張單雙災木雁兩失有心於避禍不如無心於任運夫千仞之木既摧於斧斤一寸之草亦瘁於踐蹋高崖之修榦與深谷之淺條存亡之要巨細一揆耳晉卿畢萬七戰皆獲死於牖下蜀相費禕從容坐談斃於刺客故甘心於履危未必逢禍縱意於處安不必全福但貴者自惜故每憂其身賤者自輕故易忘其己然為教者每誡貴不誡賤言其貴滿好自恃也凡名位貴達人以在懷泰則觸人改容不則行路嗟愕至如賤者否泰不足以動人存亡不足以絓數死於溝瀆死於塗路者天地之間亦復何限人不以係意耳以此而推貴何必難處賤何必易安但人生也自應卑慎為道行己用心務思謹惜若乃吉凶大期正應委之理運遭隨參差莫不由命也既非聖人不能見吉凶之先正是依俙於理言可行而為之耳得吉者是其命吉遇不吉者是其命凶以近事論之景和之世晉平庶人從壽陽歸亂朝人皆為之戰慄而乃遇中興之運袁顗圖避禍於襄陽當時皆羨之謂為陵霄駕鳳遂與義嘉同滅駱宰見幼主語人云越王長頸鳥喙可與共憂不可與共樂范蠡去而全身文種留而遇禍今主上口頸頗有越王之狀我在尚書中久不去必危遂求南江小縣諸都令史住京師者皆遭中興之慶人人蒙爵級宰值義嘉染罪金木纏身性命幾絕卿耳眼所聞見安危在運何可預圖邪時上既有疾而諸弟並已見殺唯桂陽王休範人才本劣不見疑出為江州刺史慮一旦晏駕皇后臨朝則景文自然成宰相門族強盛藉元舅之重歲暮不為純臣泰豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門戶故有此處分死時年六十追贈車騎將軍開府儀同三司常侍中書監刺史如故諡曰懿侯長子絢字長素年七歲讀論語至周監於二代外祖何尚之戲之曰耶耶乎文哉絢即答曰草翁風必偃少以敏惠見知及長篤志好學官至祕書丞年二十四先景文卒諡曰恭世子子婼襲封齊受禪國除景文兄子蘊字彥深父楷太中大夫人才凡劣故蘊不為羣從所禮常懷恥慨家貧為廣德令會太宗初即位四方叛逆蘊遂感激為將假寧朔將軍建安王休仁司徒參軍令如故景文甚不悅語之曰阿益汝必破我門戶阿益者蘊小字也事寧封吉陽縣男食邑三百戶為中書黃門郎晉陵義興太守所莅並貪縱在義興應見收治以太后故止免官廢帝元徽初復為黃門郎東陽太守未之郡值桂陽王休範逼京邑蘊領兵於朱雀門戰敗被創事平除侍中出為寧朔將軍湘州刺史蘊輕躁薄於行業時沈攸之為荊州刺史密有異志蘊與之結厚及齊王輔朝政蘊攸之便連謀為亂會遭母憂還都停巴陵十餘日更與攸之成謀時齊王世子為郢州行事蘊至郢州謂世子必下慰之欲因此為變據夏口與荊州連橫世子覺其意稱疾不往又嚴兵自衞蘊計不得行乃下及攸之為逆蘊密與司徒袁粲等結謀事在粲傳事敗走鬬場追禽斬於秣陵市景文弟子孚大明末為海鹽令泰始初天下反叛唯孚獨不同逆官至司徒記室參軍史臣曰王景文弱年立譽聲芳籍甚榮貴之來匪由勢至若泰始之朝身非外戚與袁粲羣公方驂並路傾覆之災庶幾可免庾元規之讓中書令義在此乎
