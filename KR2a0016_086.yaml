body:
  text: 宋書卷八十六列傳第四十六殷孝祖劉勔殷孝祖陳郡長平人也曾祖羡晉光祿勳父祖並不達孝祖少誕節好酒色有氣幹太祖元嘉末為奉朝請員外散騎侍郎世祖以其有武用除奮武將軍濟北太守入為積射將軍大明初索虜寇青州上遣孝祖北援受刺史顏師伯節度纍與虜戰頻大破之事在師伯傳還授太子旅賁中郎將加龍驤將軍竟陵王誕據廣陵為逆孝祖隸沈慶之攻誕又有戰功遷西陽王子尚撫軍寧朔將軍南濟陰太守出為盱眙太守將軍如故還為虎賁中郎將仍除寧朔將軍陽平東平二郡太守又遷濟南南郡將軍如故前廢帝景和元年以本號督兗州諸軍事兗州刺史太宗初即位四方反叛孝祖外甥司徒參軍潁川葛僧韶建議銜命徵孝祖入朝上遣之時徐州刺史薛安都遣薛索兒等屯據津徑僧韶間行得至説孝祖曰景和凶狂開闢未有朝野危極假命漏刻主上聖德天挺神武在躬曾不浹辰夷凶翦暴更造天地未足為言國亂朝危宜立長主公卿百辟人無異議泰平之隆非旦則夕而羣小相煽構造無端貪利幼弱競懷希望使天道助逆羣凶事申則主幼時艱權柄不一兵難互起豈有自容之地舅少有立功之志長以氣節成名若便能控濟河義勇還奉朝廷非唯匡主靜亂乃可以垂名竹帛孝祖具問朝廷消息僧韶隨方酬譬并陳兵甲精強主上欲委以前驅之任孝祖即日棄妻子率文武二千人隨僧韶還都時普天同逆朝廷唯保丹陽一郡而永世縣尋又反叛義興賊垂至延陵內外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士人情於是大安進孝祖號冠軍假節督前鋒諸軍事遣向虎檻拒對南賊御仗先有諸葛亮筒袖鎧帽二十五石弩射之不能入上悉以賜孝祖孝祖負其誠節凌轢諸將臺軍有父子兄弟在南者孝祖並欲推治由是人情乖離莫樂為用進使持節都督兗州青冀幽四州諸軍事撫軍將軍刺史如故時賊據赭圻孝祖將進攻之與大統王玄謨別悲不自勝衆並駭怪泰始二年三月三日與賊合戰常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自標顯若善射者十手攢射欲不斃得乎是日於陳為矢所中死時年五十二追贈散騎常侍征北將軍持節都督如故封秭歸縣侯食邑千戶四年追改封建安縣諡曰忠侯孝祖子悉為薛安都所殺以從兄子慧達繼封齊受禪國除劉勔字伯猷彭城人也祖懷義始興太守父穎之汝南新蔡二郡太守征林邑遇疾卒勔少有志節兼好文義家貧為廣州增城令廣州刺史劉道錫引為揚烈府主簿元嘉二十七年索虜南侵道錫遣勔奉使詣京都太祖引見之酬對稱旨除寧遠將軍綏遠太守元嘉末蕭簡據廣州為亂勔起義討之燒其南門廣州刺史宗賣心又命為軍府主簿以功封大亭侯除員外散騎侍郎孝建初荊江反叛宗賣心以勔行寧朔將軍湘東內史領軍出安陸會事平以本號為晉康太守又徙鬱林太守大明初還都徐州刺史劉道隆請為寧朔司馬竟陵王誕據廣陵為逆勔隨道隆受沈慶之節度事平封金城縣五等侯除西陽王子尚撫軍參軍入直閣先是遣費沈伐陳檀不克乃除勔龍驤將軍西江督護鬱林太守勔既至率軍進討隨宜翦定大致名馬并獻珊瑚連理樹上甚悅還除新安王子鸞撫軍中兵參軍遭母憂不拜前廢帝即位起為振威將軍屯騎校尉入直閣太宗即位加寧朔將軍校尉如故江州刺史晉安王子勛為逆四方響應勔以本官領建平王景素輔國司馬進據梁山會豫州刺史殷琰反叛徵勔還都假輔國將軍率衆討琰甲仗三十人入六門復兼山陽王休祐驃騎司馬餘如故破琰將劉順於宛唐杜叔寶於橫塘事在琰傳除輔國將軍山陽王休祐驃騎咨議參軍梁郡太守假節不拜琰嬰城固守自始春至于末冬薛道標龐孟虯並向壽陽勔內攻外禦戰無不捷善撫將帥以寬厚為衆所依將軍王廣之求勔所自乘馬諸將帥並忿廣之叨冒勸勔以法裁之勔歡笑即時解馬與廣之復除使持節督廣交二州諸軍事平越中郎將廣州刺史將軍如故不拜及琰開門請降勔約令三軍不得妄動城內士民秋毫無所失百姓感悅咸曰來蘇百姓生為立碑改督益寧二州諸軍事益州刺史持節將軍如故又不拜還京都拜太子左衛率封鄱陽縣侯食邑千戶琰初求救索虜虜大衆屯據汝南泰始三年以勔為征虜將軍督西討前鋒諸軍事假節置佐本官如故先是常珍奇據汝南與琰為逆琰降因據戍降虜事在琰傳至是引虜西河公長社公攻圍輔國將軍汝陰太守張景遠景遠與軍主楊文萇拒擊大破之景遠尋病卒太宗嘉其功追贈冠軍將軍豫州刺史追封含洭縣男食邑三百戶以文萇代為汝陰太守除勔右衛將軍仍以為使持節都督豫司二州諸軍事征虜將軍豫州刺史餘如故四年除侍中領射聲校尉又不受進號右將軍其年虜遣汝陽司馬趙懷仁步騎五百寇武津縣勔遣龍驤將軍曲元德輕兵進討虜衆驚散虜子都公閼于拔又率三百人防運車千兩於汝陽臺東水上結營元德單騎直入斬拔首因進攻汝陽臺即陷外壘獲車一千三百乘斬首一百五十級勔又使司徒參軍孫曇瓘督弋陽以西會虜寇義陽曇瓘大破之虜上其北豫州租有車二千兩勔招荒人邀擊於許昌虜衆奔散焚燒米穀淮西人賈元友上書太宗勸北攻懸瓠可收陳郡南頓汝南新蔡四郡之地上以其所陳示勔使具條答勔對曰元友稱虜主幼弱姦偽競起內外規亂天亡有期臣以為獯醜侵縱蹈藉王境盤據州郡百姓殘亡去冬衆軍失耕今春連城圍逼國家復境之略實有不遑滅虜未及元友又云有七千餘家穀米豐積可供二萬人數年資儲臣又以為二萬人歲食米四十八萬斛五年合須米二百四十萬斛既理不容有恐事難稱言元友又云虜於懸瓠開驛保虜已先據若不足恃此不須缺俱是攻城便應先圖懸瓠何更越先取郾以受腹背之災且七千餘家豐積而虜猶當遠運為糧是威不制民民非異計元友又云虜欲水陸運糧以救軍命可襲之機在於今日臣又以為開立驛道據守堅城觀其形候不似蹙弱可乘之機恐為難驗元友又云四郡民人遭虜二十七年之毒皆欲雪讎報恥伏待朝威臣又以為垣式寶等受國重恩今猶驅略車營翻還就賊蓋是戀本之情深非報怨之宜何可輕試元友又云請敕荊雍兩州遣二千精兵從義陽依西山北下直據郾城臣又以為郾城是賊驛路要戍且經蠻接嶮數百里中裹糧潛進方出平地攻賊堅城自古名將未有能以此濟者假其剋捷不知足南抗懸瓠北捍長社與不且賊擁據數城水陸通便而今使官以二千斷其資運於事為難元友又云虜圍逼汝陰遊魂二歲為張景遠所挫不敢渡淮臣又以為景遠兵力寡弱不能自固遠遣救援方得少剋今定是為賊所畏不景遠前所摧傷裁至數百虜步騎四萬猶不敢前而今必勸國家以輕兵遠討指掌可克言理相背莫復過此元友又云龍山雉水魯奴王景直等並受朝爵馬步萬餘進討之宜唯須敕命臣以為魯奴與虜交關彌歷年世去歲送誠朝廷誓欲立功自蒙榮爵便即逃遁殊類姦猾豈易暗期兼王景直是一亡命部曲不過數十人既不可言又未足恃萬餘之言似不近實元友又云四郡恨忿此非類車營連結廢田二載生業已盡賊無所資糧儲已罄斷其運道最是要略臣又以斷運須兵兵應資食而當此過懸瓠二百里中使兵食兼足何處求辦臣竊尋元嘉以來傖荒遠人多干國議負儋歸闕皆勸討虜魯爽誕説實挫國威徒失兵力虛費金寶凡此之徒每規近説從來信納皆詒後悔界上之人唯視強弱王師至境必壺漿候塗裁見退軍便抄截蜂起首領回師何嘗不為河畔所弊太宗納之元友議遂寢勔與常珍奇書勸令反虜珍奇乃與子超越羽林監垣式寶於譙殺虜子都公費拔等凡三千餘人勔馳驛以聞太宗大喜以珍奇為使持節都督司北豫二州諸軍事平北將軍司州刺史汝南新蔡縣侯食邑千戶超越輔國將軍北豫州刺史潁川汝陽三郡太守安陽縣男式寶輔國將軍陳南頓二郡太守真陽縣男食邑三百戶珍奇為虜所攻引軍南出虜追擊破之珍奇走依山得至壽陽超越式寶為人所殺五年汝陰太守楊文萇又頻破虜於荊亭及戍西詔進勔號平西將軍豫州刺史餘如故不拜其年徵拜散騎常侍中領軍勔以世路糾紛有懷止足求東陽郡上以勔啓遍示朝臣自尚書僕射袁粲以下莫不稱贊咸謂宜許上曰巴陵建平二王並有獨往之志若世道寧晏皆當申其所請勔經始鍾嶺之南以為棲息聚石蓄水倣佛丘中朝士愛素者多往遊之六年改常侍為侍中其年南兗州刺史齊王出鎮淮陰以勔為使持節都督南徐兗青冀五州諸軍事平北將軍侍中中領軍如故出鎮廣陵固辭侍中軍號許之以為假平北將軍七年解都督假號并節太宗臨崩顧命以為守尚書右僕射中領軍如故給鼓吹一部廢帝即位加兵五百人元徽初月犯右執法太白犯上將或勸勔解職勔曰吾執心行己無愧幽明若才輕任重災眚必及天道密微避豈得免桂陽王休範為亂奄至京邑加勔使持節領軍置佐史鎮扞石頭既而賊衆屯朱雀航南右軍王道隆率宿衛向朱雀聞賊已至急信召勔勔至命閉航道隆不聽催勔渡航進戰率所領於航南戰敗臨陳死之時年五十七事平詔曰夫義實天經忠惟人則篆素流采金石宣輝自非識洞情靈理感生極豈有捐軀衛主舍命匡朝者哉故持節鎮軍將軍守尚書右僕射中領軍鄱陽縣開國侯勔思懷亮粹體業淹明弘勳樹績譽洽華野綢繆顧託契闊屯夷方倚謀猷翌康帝道逆蕃扇禍逼擾京甸援桴誓旅奉律行師身與事滅名隨操遠朕用傷悼震慟于厥心昔王允秉誠卞壼峻節均風往德歸茂先軌泉途就永寃逝無追思崇徽策式光惇史可贈散騎常侍司空本官侯如故諡曰忠昭公子悛嗣順帝升明末為廣州刺史齊受禪國除勔弟斆泰始中為寧朔將軍交州刺史於道遇病卒先有都鄉侯爵諡曰質侯史臣曰吳漢平蜀城內流血霑踝而其後無聞於漢陸抗定西陵步氏禍及嬰孩而機雲為戮上國劉勔克壽春士民無遺芻委粒之歎莫不扶老攜幼歌唱而出重圍美矣
