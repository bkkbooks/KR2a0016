body:
  text: 宋書卷八十七列傳第四十七蕭惠開殷琰蕭惠開南蘭陵人征西將軍思話子也初名慧開後改慧為惠少有風氣涉獵文史家雖貴戚而居服簡素初為祕書郎著作並名家年少惠開意趣與人多不同比肩或三年不共語外祖光祿大夫沛郡劉成戒之曰汝恩戚家子當應將迎時俗緝外內之歡如汝自業將無小傷多異以取天下之疾患邪惠開曰人間宜相緝和甚如慈旨但不幸耿介恥見作凡人畫龍未成故遂至於多忤耳轉太子舍人與汝南周朗同官友善以偏奇相尚轉尚書水部郎始興王濬征北府主簿南徐州治中從事史徙汝陰王友又為南徐州別駕中書侍郎江夏王義恭大將軍大司馬從事中郎孝建元年自太子中庶子轉黃門侍郎與侍中何偃爭積射將軍徐沖之事偃任遇甚隆惠開不為之屈偃怒使門下推彈之惠開乃上表解職曰陛下未照臣愚故引參近侍臣以職事非長故委能何偃凡諸當否不敢參議竊見積射將軍徐沖之為偃命所黜臣愚懷謂有可申故聊設微異偃恃恩使貴欲使人靡二情便訶脅主者手定文案割落臣議專載己辭雖天照廣臨竟未見察臣理違顏咫尺致茲壅濫則臣之受劾蓋何足悲但不順侍中臣有其咎當而行之不知何過且議之不允未有彈科省心揆天了知在宥臣不能謝愆右職改意重臣刺骨鑠金將在朝夕乞解所忝保拙私庭時偃寵方隆由此忤旨別敕有司以屬疾多免惠開官思話素恭謹操行與惠開不同常以其峻異每加嫌責及見惠開自解表自歎曰兒子不幸與周朗周旋理應如此杖之二百尋重除中庶子丁父艱居喪有孝性家素事佛凡為父起四寺南岸南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩蓋鮮而兄弟甚多若使全關一人則在我所讓若使人人等分又事可悲恥寺衆既立自宜悉供僧衆由此國秩不復下均服除除司徒左長史大明二年出為海陵王休茂北中郎長史寧朔將軍襄陽太守行雍州州府事善於為政威行禁止襲封封陽縣侯還為新安王子鸞冠軍長史行吳郡事惠開妹當適桂陽王休範女又當適世祖子發遣之資應須二千萬乃以為豫章內史聽其肆意聚納由是在郡著貪暴之聲入為尚書吏部郎不拜徙御史中丞世祖與劉秀之詔曰今以蕭惠開為憲司冀當稱職但一往服領已自殊有所震及在任百僚畏憚之八年入為侍中詔曰惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞母憂去職起為持節督青冀二州諸軍事輔國將軍青冀二州刺史不行改督益寧二州刺史持節將軍如故惠開素有大志至蜀欲廣樹經略善於述事對賓僚及士人說收牂柯越嶲以為內地綏討蠻濮闢地徵租聞其言者以為大功可立太宗即位進號冠軍將軍又進平西將軍改督為都督晉安王子勛反惠開乃集將佐謂之曰湘東太祖之昭晉安世祖之穆其於當璧並無不可但景和雖昏本是世祖之嗣不任社稷其次猶多吾奉武文之靈兼荷世祖之眷今便當投袂萬里推奉九江乃遣巴郡太守費欣壽領二千人東下為巴東人任叔兒起義所邀欣壽敗沒陝口道不復通更遣州治中程法度領三千人步出梁州又為氐賊楊僧嗣所斷先是惠開為治多任刑誅蜀土咸懷猜怨及聞欣壽沒法度又不得前晉原一郡遂反於是諸郡悉應之並來圍城城內東兵不過二千凡蜀人惠開疑之皆悉遣出子勛尋平蜀人並欲屠城以望厚賞惠開每遣軍出戰未嘗不捷前後所摧破殺傷不可勝計外衆逾合勝兵者十餘萬人時天下已平太宗以蜀土險遠赦其誅責遣惠開弟惠基步道使蜀具宣朝旨惠基既至涪而蜀人志在屠城不欲使王命遠達遏留惠基不聽進惠基率部曲破其渠帥馬興懷等然後得前惠開奉旨歸順城圍得解時太宗遣惠開宗人寶首水路慰勞益州寶首欲以平蜀為功更奬說蜀人於是處處蜂起凡諸離散者一時還合渠帥趙燕句文章等與寶首屯軍于上去成都六十里衆號二十萬人惠開欲遣擊之將佐咸曰攻破蜀賊誠不為難但慰勞使至未獲奉受而遣兵相距何以自明本心惠開曰今水陸四斷表啓路絶寶首或相誣陷謂我不奉朝旨我之欲戰本在通使使若得通則誠心達矣乃作啓事具陳事情使腹心二人帶啓戒之曰須賊破路開便躍馬馳去遣宋寧太守蕭惠訓別駕費欣業萬兵並進與戰大破之生禽寶首囚於成都縣獄所遣使至上使執送寶首除惠開晉平王休祐驃騎長史南郡太守不拜泰始四年還至京師初惠開府録事參軍到希微負蜀人債將百萬為責主所制未得俱還惠開與希微共事不厚以為隨其同上不能攜接得還意恥之中凡有馬六十匹悉以乞希微償責其意趣不常皆如是先劉瑀為益州張悅代之瑀去任凡所攜將佐有不樂反者必逼制將還語人曰隨我上豈可為張悅作西門客邪惠開自蜀還資財二千餘萬悉散施道路一無所留五年又除桂陽王休範征北長史南東海太守其年會稽太守蔡興宗之郡而惠開自京口請假還都相逢於曲阿惠開先與興宗名位略同又經情款自以負釁摧屈慮興宗不能詣己戒勒部下蔡會稽部伍若借問慎不得答惠開素嚴自下莫敢違犯興宗見惠開舟力甚盛不知為誰遣人歷舫訊惠開有舫十餘事力二三百人皆低頭直去無一人答者復為晉平王休祐驃騎長史太守如故六年除少府加給事中惠開素剛至是益不得志寺內所住齊前有嚮種花草甚美惠開悉剗除列種白楊樹每謂人曰人生不得行胸懷雖壽百歲猶為夭也發病歐血吐如肝胏者甚多除巴陵王休若征西長史寧朔將軍南郡太守未拜七年卒時年四十九子睿嗣齊受禪國除惠開與諸弟並不睦惠基使益州遂不相見與同産弟惠明亦著嫌隙云殷琰陳郡長平人也父道鸞衡陽王義季右軍長史琰少為太祖所知見遇與琅邪王景文相初為江夏王義恭征北行參軍始興王濬後軍主簿出為鄱陽晉熙太守豫州治中從事史廬陵內史臧質反棄郡奔北皖琰性有計數欲進退保全故不還都邑事平坐繫尚方頃之被宥除海陵王國郎中令不拜臨海王子頊為冠軍將軍吳興太守以琰為録事參軍行郡事復為豫州別駕太宰戶曹屬丹陽丞尚書左丞少府尋陽王子房冠軍司馬行南豫州隨府轉右軍司馬又徙巴陵王休若左軍司馬前廢帝永光元年除黃門侍郎出為山陽王休祐右軍長史南梁郡太守休祐入朝琰仍行府州事太宗泰始元年以休祐為荊州欲以吏部郎張岱為豫州刺史會晉安王子勛反即以琰督豫司二州南豫州之梁郡諸軍事建武將軍豫州刺史以西汝陰太守龐道隆為琰長史殿中將軍劉順為司馬順勸琰同子勛琰家纍在京邑意欲奉順而土人前右軍參軍杜叔寶前陳南頓二郡太守皇甫道烈道烈從弟前馬頭太守景度前汝南潁川二郡太守龐天生前睢陽令夏侯季子等並勸琰同逆琰素無部曲門義不過數人無以自立受制於叔寶等太宗遣冗從僕射柳倫領軍助驃騎大將軍山陽王休祐又遣中兵參軍鄭瑗說琰令還二人至即與叔寶合叔寶者杜坦之子既土豪鄉望內外諸軍事並專之弋陽太守卜天生據郡同逆斷梁州獻馬得百餘匹邊城令宿僧護起義斬天生傳首京邑太宗嘉之以為龍驤將軍封建興縣侯食邑三百戶時綏戎將軍汝南新蔡二郡太守周矜起義於懸瓠收兵得千餘人袁顗遣信誘矜司馬汝南人常珍奇以金鈴為信珍奇即日斬矜送首詣顗顗以珍奇為汝南新蔡二郡太守太宗追贈矜本官以義陽內史龐孟虯為司州刺史領隨郡太守孟虯不受命起兵同子勛子勛召孟虯出尋陽而以孟虯子定光行義陽郡事太宗知琰逼迫土人事不獲已猶欲羇縻之以琰兄前中書郎瑗為司徒右長史子邈為山陽王休祐驃騎參軍子勛遣使以琰為輔國將軍梁郡太守後又加豫州假節督南豫數郡杜叔寶求琰上佐龐道隆慮其為禍乃請奉表使尋陽琰即以叔寶為長史梁郡太守休祐步入朝家內猶分停壽陽琰資給供贍事盡豐厚二年正月太宗遣輔國將軍劉勔率寧朔將軍呂安國西討休祐出鎮歷陽為諸軍總統時徐州刺史薛安都亦據彭城反募能生禽琰安都封千戶縣侯賜布絹各二千匹二月勔進軍小峴初合肥戍主南汝陰太守薛元寶委郡奔子勛前太守朱輔之據城歸順琰遣攻輔之輔之敗走琰以前右軍參軍裴季為南汝陰太守季又歸順太宗即而授之琰所用象縣令許道蓮亦率二百人歸降太宗以為馬頭太守三月上又遣寧朔將軍劉懷珍段僧愛龍驤將軍姜産之馬步三軍助勔討琰義軍主黃回募江西楚人千餘斬子勛所置馬頭太守王廣元以回為龍驤將軍淮西人前奉朝請鄭墨率子弟部曲及淮右郡起義於陳郡城有衆一萬太宗以為司州刺史後虜寇淮西戰敗見殺追贈冠軍將軍是月劉順柳倫皇甫道烈龐天生等馬步八千人東據宛唐去壽陽三百里勔率衆軍並進去順數里立營在道遇雨旦始至壘塹未立順欲擊之時琰所遣諸軍並受節度而以皇甫道烈土豪柳倫臺之所遣順本卑微不宜統督唯二軍不受命至是道烈倫不同順不能獨進乃止既而勔營壘漸立不可復攻因相持守四月勔録事參軍王起前部賊曹參軍甄淡等五人委勔奔順順因此出軍攻勔順幢主樊僧整與臺馬軍主驃騎中兵參軍段僧愛交矟鬬僧整刺僧愛殺之追贈屯騎校尉僧愛勇冠三軍軍中並懼太宗又遣太尉司馬垣閎率軍來會步兵校尉龐沈之助裴季戍合肥初淮南人周伯符說休祐求起義兵休祐不許固請乃遣之杖策單行至安豐收得八百餘人於淮西為遊兵珍奇所置弋陽太守郭確遣將軍郭慈孫擊伯符於金丘琰又遣中兵參軍杜叔寶助之慈孫等為伯符所敗並投水死太宗以伯符為驃騎參軍叔寶本謂臺軍停住歷陽不辦進順等至無不瓦解唯齎一月日糧既與勔相持軍食盡報叔寶送食叔寶乃發車千五百乘載米餉順自以五千精兵防送之勔聞之軍副呂安國曰劉順精甲八千而我衆不能居半相持既久強弱勢殊苟復推遷則無以自立所賴在彼糧將竭我食有餘耳若使叔寶米至非唯難可復圖我亦不能持久今唯有間道襲其米車出彼不意若能制之將不戰走矣勔以為然乃以疲弱守營簡選千百精手配安國及軍主黃回等間路出順後於橫塘抄之安國始行計叔寶尋至止齎二日熟食食盡叔寶不至將士並欲還安國曰卿等旦已一食今晚米車不容不至若其不至夜去不晚叔寶果至以米車為函箱陳叔寶於外為遊軍幢主楊仲懷領五百人居前與安國回等相會仲懷部曲並欲退就叔寶并力擊安國仲懷曰賊至不擊復欲何待且統軍在後政三二里間比吾交手何憂不至即便前戰回所領並淮南楚子天下精兵衆力既倍合戰便破之於陳殺仲懷仲懷所領五百人死盡叔寶至而仲懷及士卒伏尸蔽野回等欲乘勝擊之安國曰彼將自走不假復擊退軍三十里止宿夜遣騎參候叔寶果棄米車奔走安國即復夜往燒米車驅牛二千餘頭而還劉順聞米車見燒叔寶又走五月一日夜衆潰奔還壽陽仍走淮西就常珍奇勔於是方軌而進叔寶斂居民及散卒嬰城自守勔與諸軍分營城外黃回立航渡肥水叔寶遣馬步三千欲破航并柵斷小峴埭回擊大破之焚其船柵休祐與琰書曰君本文弱素無武幹是遠近所悉且名器清顯不應復有分外希覬近者之事當是劫於凶豎不能守節今大軍長驅已造城下勢孤援絶禍敗交至顧昔情款猶有惻然聖上垂天地之仁開不世之澤好生惡殺遐邇所聞顧琛王曇生等皆軍敗迸走披草乞活尚蒙恩恕晏處私門今神鋒所臨前無橫陳況窮城弱衆殘傷之餘而欲自固乎若開門歸順自可不失富貴將佐小大並保榮爵何故苟困土民自求齏膾身膏斧鑊妻息并盡老兄垂白東市受刑邪幸自思之信言不爽有如皎日上又遣王道隆齎詔宥琰罪勔又與琰書曰昔景和凶悖行絶人倫昏虐險穢諫諍杜塞遂殘毀陵廟芟刈百僚縱毒窮凶靡有紀極于時人神回遑莫能自保中外士庶咸願一匡豫職在直衛目所備覩主上神機天發指麾克定橫流塗炭一朝太平扶危拯急實冠終古而四方持疑成此乖逆資斧所臨每從偃簡足下以衣冠華胄信概夙昭附戾從違猶見容養賢兄長史階升清列賢子參軍亦塞國網間者進軍宛唐計由劉順退衆閉城當時未了過蒙朝恩謬充將帥蚤承風素情有依然今皇威遠申三方蹙弱勝敗之勢皎然可覽王御史昨至主上敕驃騎教賢兄賢子書今悉遣送百代以來未有弘恩曲宥乃至於此且朝廷方宣示大義惟新王道何容摽虛辭於士女失國信於一州以足下明識淵見想必不俟終日如其孤背亭毒弗忌屠陷者便當窮兵肆武究法極刑將恐貴門無復祭祀之主墳壟乏掃灑之望進謝忠臣退慚孝子名實兩喪沒有餘責扶力略白幸加研覽琰本無反心事由力屈叔寶等有降意前後屢遣送誠箋而衆心持疑莫能相一故歸順之計每多愆塞嬰城愈固弋陽西山蠻田益之起義攻郭確於弋陽以益之為輔國將軍督弋陽西山事六月勔築長圍始合田益之率蠻衆萬餘人攻龐定光於義陽定光遣從兄文生拒之為益之所破見殺遂圍其城定光求救於子勛子勛以定光父孟虯為司州刺史率精兵五千救義陽并解壽陽之圍常珍奇又自懸瓠遣三千人援定光屯軍柳水益之不戰望風奔散孟虯乘勝進軍向壽陽初常珍奇遣周當垣式寶率數百人送仗與琰式寶驍勇絶衆因留守北門乃率所領開門掩襲勔入其營勔逃避得免式寶得勔衣帽而去勔於是乃竪長圍治攻道於東南角并填塹東南角有高樓隊主趙法進計曰外若進攻必先攻樓樓頽落既傷將士又使人情沮壞不如先自毀之從其言勔用草茅苞土擲以塞塹擲者如雲城內乃以火箭射之草未及燃後土續至一二日塹便欲滿趙法進復獻計以鐵珠子灌之珠子流滑悉緣隙得入草於是火燃二日間草盡塹中土不過二三寸勔乃作大蝦蟆車載土牛皮蒙之三百人推以塞塹琰戶曹參軍虞挹之造碻車擊之以石車悉破壞初廬江太守王子仲棄郡奔尋陽廬江人起義休祐遣員外散騎侍郎陸悠之助之劉胡遣其輔國將軍薛道標渡江煽動羣蠻規自廬江掩襲歷陽悠之衆弱退保譙城司徒建安王休仁遣參軍沈靈寵馳據廬江道標後一日方至悠之自譙城來會因與道標相持七月龐孟虯至弋陽勔遣呂安國垣閎龍驤將軍陳顯達驃騎參軍孟次陽拒之孟虯軍副呂興壽與安國有舊率所領降安國進軍破孟虯於蓼潭義軍主陳肫又破之於汝水孟虯走向義陽義陽已為王玄謨子曇善起義所據乃逃於蠻中淮西人鄭叔舉起義擊常珍奇以為北豫州刺史八月皇甫道烈柳倫等二十一人聞孟虯敗並開門出降勔因此又與琰書曰柳倫來奔具相申述方承足下迹纏穢亂心秉忠誠惘默窮愁不親戎政去冬開天之始愚迷者多如足下流比進非社稷宗臣退無顧命寄託朝廷既不偏相嫌責足下亦復無所獨愧程天祚已舉城歸順龐孟虯又繼迹奔亡劉胡困於錢溪袁顗欲戰不得推理揆勢亦安能久且南方初起連州十六擁徒百萬仲春以來無戰不北摧陷殄滅十無一二南憑袁顗弱卒北恃足下孤城以茲定業恐萬無一理方今國網疏略示舉宏維比日相白想亦已具矣且倫等皆是足下腹心牙爪所以攜手相捨非有怨恨也了知事不可濟禍害已及故耳夫擁數千烏合抗天下之兵傾覆之狀豈不易曉假令六蔽之人猶當不為其事況復足下少祖名教疾沒世無稱者邪所以復有此白者實惜華州重鎮鞠為茂草兼傷貴門一日屠滅足下若能封府庫開四門宣語文武示以禍福先遣咫尺之書表達誠款然後素車白馬來詣轅門若令足下髮膚不全兒姪雕耗者皇天后土實聞此言至辭不華寧復多白薛道標猶在廬江劉胡又分兵揚聲向壽陽及合肥勔遣許道蓮馳赴合肥助裴季文又遣黃回孟次陽及屯騎校尉段佛榮武衛將軍王廣之繼之道標率其黨薛元寶等攻合肥勔所遣諸軍未至為道標所陷季文及武衛將軍葉慶祖力戰死之勔馳遣垣閎總統諸軍攻合肥是月劉胡敗走尋陽平定太宗遣叔寶從父弟季文至琰城下與叔寶語說四方已定勸令時降叔寶曰我乃信汝恐為人所誑耳叔寶閉絶子勛敗問有傳者即殺之時琰子邈東在京邑繫建康太宗送邈與琰令說南賊已平之問自建康出便防送就道議者以為宜聽邈與伯父瑗私相見不爾無以解城內之惑不從邈至叔寶等果疑守備方固十月薛道標突圍與十餘騎走奔淮西投常珍奇薛元寶歸降先是晉熙太守閻湛之據郡同逆至是沈靈寵自廬江攻之湛之未知尋陽已敗固守不降靈寵乃取諸將破劉胡文書置車中攻城僞敗棄車而走湛之得書大駭其夜奔逃十一月常珍奇乞降慮不見納又求救於索虜太宗即以珍奇為司州刺史領汝南新蔡二郡太守虜亦遣僞帥張窮奇騎萬匹救之十二月虜至汝南珍奇開門納虜淮西七縣民並連營南奔劉順亦棄虜歸順南賊降者太宗並送琰城下令與城內交言由是人情沮喪琰將降先送休祐內人出城然後開門時琰有疾以板自輿與諸將帥面縛請罪勔並撫宥無所誅戳自將帥以下財物資貨皆以還之纖毫無所失虜騎救琰至師水聞城陷乃破義陽殺掠數千人而去垣式寶尋復反叛投常珍奇以平琰功劉懷珍封艾縣侯食邑四百戶垣閎樂鄉縣侯孟次陽攸縣子王廣之蒲圻縣子陳顯達彭澤縣子呂安國鍾武縣子食邑各三百戶黃回葛陽縣男食邑二百戶送琰及僞節還京都久之為王景文鎮南咨議參軍兼少府泰豫元年除少府加給事中後廢帝元徽元年卒時年五十九琰性和雅靜素寡嗜欲諳前世舊事事兄甚謹少以名行見稱在壽陽被攻圍積時為城內所懷附揚州刺史王景文征西將軍蔡興宗司空褚淵並與之友善云史臣曰夫求忠臣必於孝子之門蓋以類得之也昔啓方說主迹表遺親鄧攸淳行愛兼猶子雖禀分參差情紀難一而均薄等厚未之或偏惠開親禮雖篤弟隙尤著方寸之內孝友異情險於山川有驗於此也
