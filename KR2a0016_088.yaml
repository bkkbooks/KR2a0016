body:
  text: 宋書卷八十八列傳第四十八薛安都沈文秀崔道固薛安都河東汾陰人也世為強族同姓有三千家父廣為宗豪高祖定關河以為上黨太守安都少以勇聞身長七尺八寸便弓馬索虜使助秦州刺史北賀汨擊反胡白龍子滅之由是為偽雍秦二州都統州各有刺史都總統其事元嘉二十一年索虜主拓跋燾擊芮芮大敗安都與宗人薛永宗起義永宗營汾曲安都襲得弘農會北地人蓋吳起兵遂連衡相應燾自率衆擊永宗滅其族進擊蓋吳安都料衆寡不敵率壯士辛靈度等棄弘農歸國太祖延見之求北還構扇河陝招聚義衆上許之給錦百匹雜繒三百匹復襲弘農虜已增戍城不可克蓋吳又死乃退還上洛世祖鎮襄陽板為揚武將軍北弘農太守虜漸強盛安都乃歸襄陽從叔沈亦同歸國官至綏遠將軍新野太守二十七年隨王誕版安都為建武將軍隨柳元景向關陝率步騎居前所向克捷事在元景傳軍還誕版為後軍行參軍二十九年除始興王濬征北行參軍加建武將軍魯爽向虎牢安都復隨元景北出即據關城期俱濟河取蒲坂會爽退安都復率所領隨元景引還仍伐西陽五水蠻世祖伐逆轉參軍事加寧朔將軍領馬軍與柳元景俱發四月十四日至朱雀航橫矛瞋目叱賊將皇甫安民等曰賊弒君父何心事之世祖踐阼除右軍將軍五月四日率所領騎為前鋒直入殿庭賊尚有數百人一時奔散以功封南鄉縣男食邑五百戶安都從征關陝至臼口夢仰頭視天正見天門開謂左右曰汝見天門開不至是歎曰夢天開乃中興之象邪從弟道生亦以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乘馬從數十人令左右執矟欲往殺淑之行至朱雀航逢柳元景元景遙問薛公何處去安都躍馬至車後曰小子庾淑之鞭我從弟今指往刺殺之元景慮其不可駐乃紿之曰小子無宜適卿往與手甚快安都既回馬復追呼之別宜與卿有所論令下馬入車既入車因責讓之曰卿從弟服章言論與寒細不異雖復人士庾淑之亦何由得知且人身犯罪理應加罰卿為朝庭勳臣宜崇奉法憲云何放恣輒欲於都邑殺人非唯科律所不容主上亦無辭以相宥因載之俱歸安都乃止其年以憚直免官孝建元年復除左軍將軍二月魯爽反叛遣安都及冗從僕射胡子反龍驤將軍宗越率步騎據歷陽爽遣將鄭德玄戍大峴德玄使前鋒楊胡與輕兵向歷陽安都遣宗越及歷陽太守程天祚逆擊破之斬胡與及其軍副德玄復使其司馬梁嚴屯峴東安都幢主周文恭晨往偵候因而襲之悉禽賊未敢進世祖詔安都留三百人守歷陽渡還採石遷輔國將軍竟陵內史四月魯爽使弟瑜率三千人出小峴爽尋以大衆阻大峴又遣安都步騎八千度江與歷陽太守張幼緒等討爽安都軍副建武將軍談金率數十騎挑戰斬其偏帥幼緒恇怯輒引軍退還安都復還歷陽臧質久不至世祖復遣沈慶之濟江督統諸軍爽軍食少引退慶之使安都率輕騎追之四月丙戌及爽於小峴爽自與腹心壯騎斷後談金先薄之不能入安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽纍世梟猛生習戰陳咸云萬人敵安都單騎直入斬之而反時人皆云關羽之斬顏良不是過也進爵為侯增邑五百戶并前千戶時王玄謨距南郡王義宣臧質於梁山安都復領騎為支軍賊有水步營在蕪湖安都遣將呂興壽率數十騎襲之賊衆驚亂斬首及赴水死者甚衆義宣遣將劉諶之及質攻玄謨玄謨命衆軍擊之使安都引騎出賊陳右其副建武將軍談金三歷賊陳乘其隙縱騎突之諸將係進是朝賊馬軍發蕪湖欲來會戰望安都騎甚盛隱山不敢出賊陳東南猶堅安都橫擊陷之賊遂大潰安都隊主劉元儒於艦中斬諶之首轉太子左衛率大明元年虜向無鹽東平太守劉胡出戰失利二月遣安都領馬軍北討東陽太守沈法系水軍向彭城並受徐州刺史申坦節度上戒之曰賊若可及便盡力殄之若度已回可過河耀威而反時虜已去坦求回軍討任榛見許安都當向左城左城去滑臺二百餘里安都以去虜鎮近軍少不宜分行至東坊城遇任榛三騎討擒其一餘兩騎得走任榛聞知皆得逃散時天旱水泉多竭人馬疲困不能遠追安都法系並白衣領職坦繫尚方任榛大抵在任城界積世逋叛所聚所在皆𣗥榛深密難為用師故能久自保藏屢為民患安都明年復職改封武昌縣侯加散騎常侍七年又加征虜將軍為太子左衛率十年終世祖世不轉前廢帝即位遷右衛將軍加給事中永光元年出為使持節督兗州諸軍事前將軍兗州刺史景和元年代義陽王昶督徐州豫州之梁郡諸軍事平北將軍徐州刺史太宗即位進號安北將軍給鼓吹一部安都不受命舉兵同晉安王子勛初安都從子索兒前廢帝景和中為前軍將軍直閣從誅諸公封武安縣男食邑三百戶太宗即位以為左將軍直閣如故安都將為逆遣密信報之又遣數百人至瓜步迎接時右衛將軍柳光世亦與安都通謀泰始二年正月索兒光世並在省安都信催令速去二人俱自省逃出安都諸子及家纍席卷北奔青州刺史沈文秀冀州刺史崔道固並皆同反文秀遣劉彌之張靈慶崔僧琁三軍道固遣子景徵傅靈越領衆並應安都彌之等南出下邳靈越自泰山道向彭城時濟陰太守申闡據睢陵城起義索兒率靈越等攻之安都使同黨裴祖隆守下邳城彌之等至下邳改計歸順因進軍攻祖隆僧琁不同率所領歸安都索兒聞彌之有異志舍睢陵馳赴下邳彌之等未戰潰散並為索兒所執見殺時太宗以申令孫為徐州代安都令孫進據淮陽密有反志遣人告索兒曰欲相從順而百口在都可進軍見攻若戰敗被執家人可得免禍索兒乃遣靈越向淮陽令孫出城為相距之形既而奔散北投索兒索兒使令孫説闡令降闡既降索兒執闡及令孫並殺之索兒因引軍渡淮軍糧不給掠奪百姓穀食太宗遣齊王率前將軍張永寧朔將軍垣山寶王寬員外散騎侍郎張置震蕭順之龍驤將軍張季和黃文玉等諸軍北討其年五月軍次平原索兒等率馬步五千列陳距戰擊大破之索兒又虜掠民穀固守石梁齊王又率鎮北參軍趙曇之呂湛之擊之索兒軍無資實所資野掠既見攻逼無以自守於是奔散又追破之於葛家白鵠索兒走向樂平縣界為申令孫子孝叔所斬安都子道智大將范雙走向合肥詣南汝陰太守裴季降時武衛將軍王廣之領軍隸劉勔攻殷琰於壽陽傅靈越奔逃為廣之軍人所生禽厲聲曰我傅靈越也汝得賊何不即殺生送詣勔勔躬自慰勞詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不禽主上皆加以曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越答曰薛公舉兵淮北威震天下不能專任智勇委付子姪致敗之由實在於此然事之始末備皆參豫人生歸於一死實無面求活勔壯其意送還京師太宗欲加原宥靈越辭對如一終不回改乃殺之靈越清河人也時輔國將軍山陽內史程天祚據郡同安都攻圍彌時然後歸順子勛平定安都遣別駕從事史畢衆愛下邳太守王煥等奉啓書詣太宗歸款曰臣庸隸荒萌偷生上國過蒙世祖孝武皇帝過常之恩犬馬有心實感恩遇是以晉安始唱投誠孤往不期生榮實存死報今天命大歸羣迷改屬輒率領所部束骸待誅違拒之罪伏聽湯鑊索兒之死也安都使柳光世守下邳至是亦率所領歸降太宗以四方已平欲示威於淮外遣張永沈攸之以重軍迎之安都謂既已歸順不應遣重兵懼不免罪乃遣信要引索虜三年正月索虜遣博陵公尉遲苟人城陽公孔伯恭二萬騎救之永等引退安都開門納虜虜即授安都徐州刺史河東公四年三月召還桑乾五年死於虜中時年六十初安都起兵長史蘭陵儼密欲圖之見殺安都未向桑乾前軍將軍裴祖隆謀殺苟人舉彭城歸順事泄見誅員外散騎侍郎孫耿之擊索兒戰死及劉彌之張靈慶皆戰敗見殺並為太宗所哀追贈儼光祿勳祖隆寧朔將軍兗州刺史耿之羽林監彌之輔國將軍青州刺史靈慶寧朔將軍冀州刺史安都子伯令環龍亡命梁雍二州之間三年率亡命數千人襲廣平執太守劉冥虬攻順陽克之略有義成扶風置立守宰雍州刺史巴陵王休若遣南陽太守張敬兒新野太守劉攘兵擊破之並禽先是東安東莞二郡太守張讜守團城在彭城東北始同安都末亦歸順太宗以為東徐州刺史復為虜所沒沈文秀字仲遠吳興武康人司空慶之弟子也父劭之南中郎行參軍文秀初為郡主簿功曹史慶之貴後文秀起家為東海王褘撫軍行參軍又度義陽王昶東中郎府東遷錢唐令西陽王子尚撫軍參軍武康令尚書庫部郎本邑中正建康令坐為尋陽王鞭殺私奴免官加杖一百尋復官前廢帝即位為建安王休仁安南録事參軍射聲校尉景和元年遷督青州徐州之東莞東安二郡諸軍事建威將軍青州刺史時帝狂悖無道內外憂危文秀將之鎮部曲出屯白下説慶之曰主上狂暴如此土崩將至而一門受其寵任萬物皆謂與之同心且此人性情無常猜忌特甚將來之禍事又難測今因此衆力圖之易於反掌千載一時萬不可失慶之不從文秀固請非一言輒流涕終不回文秀既行慶之果為帝所殺慶之死後帝遣直閣江方興領兵誅文秀方興未至太宗已定亂馳驛駐之方興既至為文秀所執尋見釋遣還京師時晉安王子勛據尋陽反叛六師外討徵兵於文秀文秀遣劉彌之張靈慶崔僧琁三軍赴朝廷時徐州刺史薛安都已同子勛遣使報文秀以四方齊舉勸令同逆文秀即令彌之等回應安都彌之等尋歸順事在安都傳彌之青州強姓門族甚多諸宗從相合率奔北海據城以拒文秀平原樂安二郡太守王玄默據琅邪清河廣川二郡太守王玄邈據盤陽城高陽勃海二郡太守劉乘民據臨濟城並起義文秀司馬房文慶謀應之為文秀所殺文秀遣軍主解彥士攻北海陷之乘民從弟伯宗合率鄉兵復克北海因率所領向青州所治東陽城文秀拒之伯宗戰敗被創弟天愛扶持將去伯宗曰丈夫當死戰場以身殉國安能歸死兒女手中乎弟可速去無為兩亡乃見殺追贈龍驤將軍長廣太守太宗遣青州刺史明僧皓東莞東安二郡太守李靈謙率軍伐文秀玄邈乘民僧皓等並進軍攻城每戰輒為文秀所破離而復合如此者十餘泰始二年八月尋陽平定太宗遣尚書度支郎崔元孫慰勞諸義軍隨僧皓戰敗見殺追贈寧朔將軍冀州刺史上遣文秀弟文炳詔文秀曰皇帝問前督青州徐州之東莞東安二郡諸軍事建威將軍青州刺史朕去歲撥亂功振普天於卿一門特有殊澤卿得延命至今誰之力邪何故背國負恩遠同逆豎今天下已定四方寧一卿獨守窮城何所歸奉且卿百口在都兼有墳墓想情非木石猶或顧懷故指遣文炳具相宣示凡諸逆節親為戎首一不加罪文炳所具卿獨何人而能自立便可速率部曲同到軍門別詔有司一無所問如其不爾國有常刑非惟戮及弟息亦當夷卿墳壟既以謝齊土百姓亦以勞將士之心故有今詔三年二月文秀歸命請罪即安本任先是冀州刺史崔道固亦據歷城同逆為土人起義所攻與文秀俱遣信引虜虜遣將慕輿白曜率大衆援之文秀已受朝命乃乘虜無備縱兵掩擊殺傷甚多虜乃進軍圍城文秀善於撫御將士咸為盡力每與虜戰輒摧破之掩擊營寨往無不捷太宗進文秀號輔國將軍其年八月虜蜀郡公拔式等馬步數萬人入西郭直至城下文秀使輔國將軍垣諶擊破之九月又逼城東十月進攻南郭文秀使員外散騎侍郎黃彌之等邀擊斬獲數千四年又進文秀號右將軍封新城縣侯食邑五百戶虜青州刺史王隆顯於安丘縣又為軍主高崇仁所破死者數百人虜圍青州積久太宗所遣救兵並不敢進乃以文秀弟征北中兵參軍文靜為輔國將軍統高密北海平昌長廣東萊五郡軍事從海道救青州文靜至東萊之不其城為虜所斷遏不得進因保城自守又為虜所攻屢戰輒剋太宗加其東青州刺史四年不其城為虜所陷文靜見殺文秀被圍三載外無援軍士卒為之用命無離叛者日夜戰鬬甲胄生蟣虱五年正月二十四日遂為虜所陷城敗之日解釋戎衣緩服靜坐命左右取所持節虜既入兵刃交至問曰青州刺史沈文秀何在文秀厲聲曰身是因執之牽出聽事前剝取衣服時白曜在城西南角樓裸縛文秀至曜前執之者令拜文秀曰各二國大臣無相拜之禮曜命還其衣為設酒食宀元攴送桑乾其餘為亂兵所殺死者甚衆太宗先遣尚書功論郎何如真選青州文武亦為虜所殺文秀在桑乾凡十九年齊之永明四年病死時年六十一崔道固清河人也世祖世以幹用見知歷太子屯騎校尉左軍將軍大明三年出為齊北海二郡太守民焦恭破古冢得玉鎧道固檢得獻之執繫恭入為新安王子鸞北中郎咨議參軍永嘉王子仁左軍司馬景和元年出為寧朔將軍冀州刺史鎮歷城泰始二年進號輔國將軍又進號征虜將軍時徐州刺史薛安都同逆上即還道固本號為徐州代之道固不受命遣子景微軍主傅靈越率衆赴安都既而為土人起義所攻屢戰失利閉門自守會四方平定上遣使宣慰道固奉詔歸順先是與沈文秀共引虜虜既至固守距之因被圍逼虜每進輒為道固所摧三年以為都督冀青兗幽并五州諸軍事前將軍冀州刺史加節又進號平北將軍其年為虜所陷被送桑乾死於虜中史臣曰春秋列國大夫得罪皆先致其邑而後去唯邾莒三臣書以叛人之目蓋重地也安都勤王之略義闕於藩屏以地外奔罪同於三叛詩云誰生厲階至今為梗其此之謂乎
