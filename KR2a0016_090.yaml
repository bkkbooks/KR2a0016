body:
  text: 宋書卷九十列傳第五十明四王邵陵殤王友隨陽王翽新興王嵩始建王禧明帝十二子陳貴妃生後廢帝謝修儀生皇子法良陳昭華生順帝徐婕妤生第四皇子鄭修容生皇子智井次晉熙王燮與皇子法良同生泉美人生邵陵殤王友次江夏王躋與第四皇子同生徐良人生武陵王贊杜修華生隨陽王翽次新興王嵩與武陵王贊同生又泉美人生始建王禧智井燮躋贊並出繼法良未封第四皇子未有名早夭邵陵殤王友字仲賢明帝第七子也後廢帝元徽二年太尉江州刺史桂陽王休範反誅皇室寡弱友年五歲出為使持節督江州豫州之西陽新蔡晉熙三郡諸軍事南中郎將江州刺史封邵陵王食邑二千戶府州文案及臣吏不諱有無之有順帝即位進號左將軍改督為都督昇明二年徙都督南豫豫司三州諸軍事安南將軍南豫州刺史歷陽太守三年薨無子國除隨陽王翽字仲儀明帝第十子也元徽四年年六歲封南陽王食邑二千戶昇明元年為使持節督郢州司州之義陽諸軍事西中郎將郢州刺史未拜徙督湘州諸軍事南中郎將湘州刺史持節如故未之鎮進號前將軍二年以南陽荒遠改封隨陽王以本號停京師齊受禪降封舞陰縣公食邑千五百戶謀反賜死新興王嵩字仲岳明帝第十一子元徽四年年六歲封新興王食邑二千戶齊受禪降封定襄縣公食邑千五百戶謀反賜死始建王禧字仲安明帝第十二子也元徽四年年六歲封始建王食邑二千戶齊受禪降封荔浦縣公食邑千五百戶謀反賜死史臣曰太宗負螟之慶事非己出枝葉不茂豈能庇其本根侯服于周斯為幸矣
