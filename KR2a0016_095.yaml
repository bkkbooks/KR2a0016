body:
  text: 宋書卷九十五列傳第五十五索虜索頭虜姓託跋氏其先漢將李陵後也陵降胸奴有數百千種各立名號索頭亦其一也晉初索頭種有部落數萬家在雲中惠帝末并州刺史東嬴公司馬騰於晉陽為胸奴所圍索頭單于猗遣軍助騰懷帝永嘉三年弟盧率部落自雲中入雁門就并州刺史劉琨求樓煩等五縣琨不能制且欲倚盧為援乃上言盧兄有救騰之功舊勳宜録請移五縣民於新興以其地處之琨又表封盧為代郡公愍帝初又進盧為代王增食常山郡其後盧國內大亂盧死子又幼弱部落分散盧孫什翼鞬勇壯衆復附之號上洛公北有沙漠南據陰山衆數十萬其後為苻堅所破執還長安後聽北歸鞬死子開字涉圭代立先是鮮卑慕容垂僭號中山晉孝武太元二十一年垂死開率十萬騎圍中山明年四月剋之遂王有中州自稱曰魏號年天賜元年治代郡桑乾縣之平城立學官置尚書曹開頗有學問曉天文其俗以四月祠天六月末率大衆至陰山謂之却霜陰山去平城六百里深遠饒樹木霜雪未嘗釋蓋欲以暖氣却寒也死則潛埋無墳壟處所至於葬送皆虛設棺柩立冢槨生時車馬器用皆燒之以送亡者開暴虐好殺民不堪命先是有神巫誡開當有暴禍唯誅清河殺萬民乃可以免開乃滅清河一郡常手自殺人欲令其數滿萬或乘小輦手自執劍擊檐輦人腦一人死一人代每一行死者數十夜變易寢處人莫得知唯愛妾名萬人知其處萬人與開子清河王私通慮事覺欲殺開令萬人為內應夜伺開獨處殺之開臨死曰清河萬人之言乃汝等也是歲安帝義熙五年開次子齊王嗣字木末執清河王對之號哭曰人生所重者父云何反逆逼令自殺嗣代立諡開道武皇帝十三年高祖西伐長安嗣先娶姚興女乃遣十萬騎屯結河北以救之大為高祖所破事在朱超石等傳於是遣使求和自是使命歲通高祖遣殿中將軍沈範索季孫報使反命已至河未濟嗣聞高祖崩問追執範等絶和親太祖即位方遣範等歸永初三年十月嗣自率衆至方城遣鄭兵將軍揚州刺史山陽公達奚斤吳兵將軍廣州刺史蒼梧公公孫表尚書滑稽領步騎二萬餘人於滑臺西南東燕縣界石濟南渡輜重弱纍自隨滑臺戍主寧遠將軍東郡太守王景度馳告冠軍將軍司州刺史毛德祖戍虎牢遣司馬翟廣率參軍龐咨上黨太守劉談之等步騎三千拒之軍次卷縣土樓虜徙營滑臺城東二里造攻具日往脅城德祖以滑臺戍人少使翟廣募軍中壯士遣寧遠將軍劉芳之率領助景度守芳之將八十餘人突得入城德祖又遣討虜將軍弘農太守竇應明領五百人建武將軍竇霸領二百五十人並以水軍相繼發咸受翟廣節度初亡命司馬楚之等常藏竄陳留郡界虜既南渡馳相要結驅扇疆埸大為民患德祖遣長社令王法政率五百人據邵陵將軍劉憐領二百騎至雍丘以防之楚之於白馬縣襲憐為憐所破會臺送軍資至憐往迎之而酸棗民王玉知憐南馳以告虜虜將滑稽領千乘襲倉垣兵吏悉踰城散走陳留太守嚴嫩為虜所獲虜即用王玉為陳留太守給兵守倉垣十一月虜悉力攻滑臺城城東北崩壞王景度出奔景度司馬陽瓚堅守不動衆潰抗節不降為虜所殺竇應明擊虜輜重於石濟破之殺賊五百餘人斬其戍主連內頭張索兒等應明自石濟赴滑臺聞城已沒遂進屯尹卯竇霸馳就翟廣虜既剋滑臺并力向廣等力不敵引退轉鬬而前二日一夜裁行十許里虜步軍續至廣等矢盡力竭大敗廣霸談之等各單身迸還虜乘勝遂至虎牢德祖出步騎欲擊之虜退屯土樓又退還滑臺長安魏昌藍田三縣民居在虎牢下德祖皆使入城虜別遣黑矟公率三千人至河陽欲南渡取金墉德祖遣振威將軍河陰令竇晃五百人戍小壘緱氏令王瑜四百人據監倉鞏令臣琛五百人固小平參軍督護張季五百人屯牛蘭又遣將領馬隊與洛陽令楊毅合二百騎緣河上下隨機赴接十二月虜置守於洛川小壘德祖遣翟廣馳往擊之虜退走廣安立守防修治城塢復還虎牢豫州刺史劉粹遣治中高道瑾領步騎五百據項又遣司馬徐瓊繼之臺遣將輔伯遣姚珍杜坦梁靈宰等水步諸軍續進徐州刺史王仲德率軍次湖陸黑矟公遣長史將千人逼竇晃楊毅晃等逆擊禽之生獲二百人其後鄭兵將軍五千騎掩襲晃等黑矟渡與并力四面攻壘晃等力少衆散晃毅皆被重創虜將安平公鵝青二軍七千人南渡於碻磝東下至泗瀆口去尹卯百許里兗州刺史徐琰委軍鎮走於是泰山諸郡並失守鄭兵與公孫表及宋兵將軍交州刺史交址侯普幾萬五千騎復向虎牢於城東南五里結營分步騎自成臯開向虎牢外郭西門德祖逆擊殺傷百餘人虜退還保營鎮北將軍檀道濟率水軍北救車騎將軍廬陵王義真遣龍驤將軍沈叔狸三千人就豫州刺史劉粹量宜赴援少帝景平元年正月鄭兵分軍向洛攻小壘小壘守將竇晃拒戰陷沒河南太守王涓之棄金墉出奔自虜分軍向洛德祖每戰輒破之嗣自率大衆至鄴鄭兵既剋金墉復還虎牢德祖於城內穴地入七丈二道出城外又分作六道出虜陳後募敢死之士四百人參軍范道基率二百人為前驅參軍郭王符劉規等以二百人為後係出賊圍外掩襲其後虜陳擾亂斬首數百級焚燒攻具虜雖退散隨復更合虜又遣楚兵將軍徐州刺史安平公涉歸幡能健越兵將軍青州刺史臨菑侯薛道千陳兵將軍淮州刺史壽張子張模東擊青州所向城邑皆奔走冠軍將軍青州刺史竺夔鎮東陽城聞虜將至斂衆固守龍驤將軍濟南太守垣苗率二府郡文武奔就夔夔與將士盟誓居民不入城者使移就山阻燒除禾稼令虜至無所資虜衆向青州前後濟河凡六萬騎三月三萬騎前追脅城內文武一千五百人而半是羌蠻流雜人情駭懼竺夔夜遣司馬車宗領五百人出城掩擊虜衆披退間二日虜步騎悉至繞城四圍列陳十餘里至晡退還安水結營去城二十里大治攻具日日分步騎常來逼城夔夜使殿中將軍竺宗之參軍賈元龍等領百人於楊水口兩岸設伏虜將阿伏斤領三百人晨渡水兩岸伏發虜騎四迸殺傷數十人梟阿伏斤首虜又進營水南去城西北四里嗣自鄴遣兵益虎牢增圍急攻鄭兵於虎牢率步騎三千攻潁川太守李元德於許昌車騎參軍王玄謨領千人助元德守與元德俱散敗虜即用潁川人庾龍為潁川太守領騎五百並發民丁以戍城德祖出軍擊公孫表大戰從朝至晡殺虜數百會鄭兵軍從許昌還合圍德祖大敗失甲士千餘人退還固城嗣又於鄴遣萬餘人從白沙口過河於濮陽城南寒泉築壘朝議以項城去虜不遠非輕軍所抗使劉粹召高道瑾還壽陽若沈叔狸已進亦宜且追粹以虜攻虎牢未復南向若便攝軍捨項城則淮西諸郡無所憑依沈叔狸已頓肥口又不宜便退時李元德率散卒二百人至項劉粹使助高道瑾戍守請宥其奔敗之罪朝議並許之檀道濟至彭城以青司二州並急而所領不多不足分赴青州道近竺夔兵弱先救青州竺夔遣人出城作東西南塹虜於城北三百餘步鑿長圍夔遣參軍閭茂等領善射五十人依牆射虜虜騎數百馳來圍牆牆內納射固牆死戰虜下馬步進短兵接城上弓弩俱發虜乃披散虜遂填外塹引高樓四所蝦蟆車二十乘置長圍內夔先鑿城北作三地道令通外塹復鑿𩹉塹內去城二丈作子塹遣三百餘人出地道欲燒虜攻具時回風轉爓火不得燃虜兵矢橫下士卒多傷斂衆還入虜填三塹盡平唯餘子塹蝦蟆車所不及虜以橦攻城夔募人力於城上係大磨石堆之又出於子塹中用大麻絙張骨骨攻車近城從地道中多人力挽令折虜復於城南掘長圍進攻逾急夔能持重垣苗有膽幹故能堅守移時然被攻日久城轉毀壞戰士多死傷餘衆困乏旦暮且陷檀道濟王仲德兼行赴之劉粹遣李元德襲許昌庾龍奔迸將宋晃追躡斬龍首元德因留綏撫并上租糧虜悅勃大肥率三千餘騎破高平郡所統高平方與任城金鄉亢父等五縣殺略二千餘家殺其男子驅虜女弱兗州刺史鄭順之戍湖陸以兵卒不敢出冠軍將軍申宣戍彭城去高平二百餘里懼虜至移郭外居民并諸營署悉入小城嗣又遣并州刺史伊樓拔助鄭兵攻虎牢填塞兩塹德祖隨方抗拒頗殺虜而將士稍零落四月壬申虜聞道濟將至焚燒器械棄青州走竺夔上言東陽城被攻毀壞不可守移鎮長廣之不其城夔以固守功進號前將軍封建陵縣男食邑四百戶夔字祖季東莞人也官至金紫光祿大夫嗣率大衆至虎牢停三日自督攻城不能下回軍向洛陽留三千人益鄭兵停洛數日渡河北歸虜安平公等諸軍從青州退還徑趨滑臺檀道濟王仲德步軍乏糧追虜不及道濟於泰山分遣仲德向尹卯道濟停軍湖陸仲德未至尹卯聞虜已遠還就道濟共裝治水軍虜安平公諸軍就滑臺西就鄭兵共攻虎牢虎牢被圍二百日無日不戰德祖徑兵戰死殆盡而虜增兵轉多虜撞外城德祖於內更築三重仍舊為四賊撞三城已毀德祖唯保一城晝夜相拒將士眼皆生創死者太半德祖恩德素結衆無離心德祖昔在北與虜將公孫表有舊表有權略德祖患之乃與交通音問密遣人說鄭兵云表與之連謀每答表書輒多所治定表以書示鄭兵鄭兵倍疑之言於嗣誅表虜衆盛檀道濟諸救軍並不敢進劉粹據項城沈叔狸屯高橋二十一日虜作地道偷城內井井深四十丈山勢峻峭不可得防至其月二十三日人馬渴乏飢疫體皆乾燥被創者不復出血虜因急攻遂剋虎牢自德祖及翟廣竇霸凡諸將佐及郡守在城內者皆見囚執唯上黨太守劉談之參軍范道基將二百人突圍南還城將潰將士欲扶德祖出奔德祖曰我與此城并命義不使此城亡而身在也嗣重其固守之節勒衆軍生致之故得不死司空徐羡之尚書傅亮領軍將軍謝晦表曰去年逆虜縱肆陵暴河南司州刺史臣德祖竭誠盡力抗對強寇孤城獨守將涉朞年救師淹緩舉城淪沒聖懷垂悼遠近嗟傷陛下殷憂諒暗委政自下臣等謀猷淺蔽託付無成遂令致節之臣抱忠傾覆將士殲辱王略虧挫上墜先規下貽國恥稽之朝典無所辭責雖有司撓筆未加准繩豈宜尸祿昧安殊寵乞蒙屏固以申國法不許德祖滎陽陽武人也晉末自鄉里南歸初為冠軍參軍輔國將軍道規為荊州德祖為之將佐復為高祖太尉參軍高祖北伐以為王鎮惡龍驤司馬加建武將軍為鎮惡前鋒斬賊寧朔將軍趙玄石於柏谷破弘農太守尹雅於梨城又破賊大帥姚難於涇水斬其鎮北將軍姚強鎮惡剋立大功蓋德祖之力也長安平定以為龍驤將軍扶風太守仍遷秦州刺史將軍如故時佛佛虜為寇復以德祖為王鎮惡征虜司馬尋復為桂陽公義真安西參軍南安太守將軍如故復徙馮翊太守高祖東還以德祖督司州之河東平陽二郡諸軍輔國將軍河東太守代并州刺史劉遵考戍蒲坂長安不守合部曲還彭城除世子中兵參軍將軍如故又除督司州之河東平陽河北雍州之京兆豫州之潁川兗州之陳留九郡軍事滎陽太守將軍如故又加京兆太守高祖踐阼進號冠軍論前後功封觀陽縣男食邑四百戶又除督司雍并三州豫州之潁川兗州之陳留諸軍事司州刺史將軍如故太祖元嘉六年死於虜中時年六十五世祖大明元年以德祖弟子熙祚第二息詡之紹德祖封虜既剋虎牢留兵居守餘衆悉北歸少帝曰故寧遠司馬濮陽太守陽瓚滑臺之逼厲誠固守投命均節在危無撓古之忠烈無以加之可追贈給事中并存恤遺孤以慰存亡尚書令傅亮議瓚家在彭城宜即以入臺絹一百匹粟三百斛賜給文士顏延之為誄焉龍驤將軍兗州刺史徐琰東郡太守王景度並坐失守鉗髠居作琰五歲景度四歲時宣威將軍潁川太守李元德戍許昌仍除滎陽太守督二郡軍事其年十一月虜遣軍并招集亡命攻逼許昌城以土人劉遠為滎陽太守李元德欲出戰兵仗少至夜悉排女牆散潰元德復奔還項城虜又圍汝陽太守王公度將十餘騎突圍奔項城虜又破邵陵縣殘害二千餘家盡殺其男丁驅略婦女一萬二千口劉粹遣將姚聳夫率軍助守項城又遣司馬徐瓊五百人繼之虜掘破許昌城又毀壞鍾離城以立疆界而還嗣死諡曰明元皇帝子燾字佛貍代立母杜氏冀州人入其宮內生燾燾年十五六不為嗣所知遇之如僕隸嗣初立慕容氏女為后又娶姚興女並無子故燾得立壯健有筋力勇於戰鬬忍虐好殺夷宋畏之攻城臨敵皆親貫甲胄元嘉五年使大將吐伐斤西伐長安生禽赫連昌于安定封昌為公以妹妻之昌弟赫連定在隴上吐伐斤乘勝以騎三萬討定定設伏於隴山彈箏谷破之斬吐伐斤盡坑其衆定率衆東還後剋長安燾又自攻不剋乃分軍戍大城而還燾常使昌侍左右常共單馬逐鹿深入山澗昌素有勇名諸將咸謂昌不可親燾曰天命有在亦何所懼親遇如初復攻長安剋之定西走為吐谷渾慕璝所禽赫連氏有名衛臣者種落在朔方塞外部落千餘戶朔方以西西至上郡東西千餘里漢世徙謫民居之土地良沃苻堅時衛臣入塞寄田春來秋去堅雲中護軍賈雍掠其田者獲生口馬牛羊堅悉以還之衛臣感恩遂稱臣入居塞內其後漸強盛衛臣死子佛佛驍猛有謀算遠近雜種皆附之姚興與相抗興覆軍喪衆前後非一關中為之傷殘高祖入長安佛佛震懾不敢動高祖東還即入寇北地安西將軍義真之歸也佛佛遣子昌破之青泥俘囚諸將帥遂有關中自稱尊號號年曰真興元年京兆人韋玄隱居養志有高名姚興備禮徵不起高祖辟為相國掾宋臺通直郎又並不就佛佛召為太子庶子玄應命佛佛大怒曰姚興及劉公相徵召並不起我有命即至當以我殊類不可理其故耶殺之元嘉二年佛佛死昌立至是為燾所兼燾西定隴右東滅黃龍海東諸國並遣朝貢太祖踐阼便有志北略七年三月詔曰河南中國多故湮沒非所遺黎荼炭每用矜懷今民和年豐方隅無事宜時經理以固疆埸可簡甲卒五萬給右將軍到彥之統安北將軍王仲德兗州刺史竺靈秀舟師入河驍騎將軍段宏精騎八千直指虎牢豫州刺史劉德武徑勇一萬以相掎角後將軍長沙王義欣可權假節率見力三萬監征討諸軍事便速備辦月內悉發先遣殿中將軍田奇銜命告燾河南舊是宋土中為彼所侵今當修復舊境不關河北燾大怒謂奇曰我生頭髮未燥便聞河南是我家地此豈可得河南必進軍今權當斂戍相避須冬行地淨河冰合自更取之後將軍長沙王義欣出鎮彭城總統羣帥告司兗二州曰夫王者之兵以義德相濟非徒疆理土地恢廣經略將以大庇蒼生保全黎庶是以蒙踐霜雪踰歷險難匡國寧民肅清四表昔我高祖武皇帝誕膺明命爰造區夏內夷篡逆外寧寇亂靈武紛紜雷動風舉響軼龍堆聲浮雲朔陵天振地拔山蕩海於是華域肅清謳歌允集王綱帝典煥哉惟文太和烟熅流澤洋溢中葉諒暗委政冢宰黠虜乘釁侵侮上國遂令司兗良民復蹈非所周鄭遺黎重隔王化聖皇踐阼重光開朗明哲柔遠以隆中興遐夷慕義雲騰波涌方將蹈德履信被藝襲文增修業統作規于後勤施洽於三方惠和雍於北狄夫養魚者除其猵獺育禽者去其豺狼故智士研其慮勇夫厲其節嘉謀動蒼天精氣貫辰緯莫府忝任稟承廟算翦爪明衣誓不顧命提吳楚之徑卒總八州之鋭士紅旗絳天素甲奪日虎步中原龍超河渚興雲散雨慰大旱之思弔民伐罪積後己之情師以順動何征而不克況乎遵養耆昧綏復境土而已哉昔淮泗初開狡徒縱逸王旅入關羣豎飆扇襄邑之戰素旗授首半城之役伏尸蔽野支解體分羽翼摧挫加以搆難西虜結怨黃龍控弦熸滅首尾逼畏蜂屯蟻聚假息旦夕豈復能超蹈長河以當堂堂之陳哉夫順從貴速歸德惡晚賞褒先附威加後服是以秦趙羇旅披榛委誠施紱乘軒剖符州郡慕容姚泓恃強作禍提挈萬里卒嬰鈇鉞皆目前之誠驗往世之所知也聖上明發愛恤以道懷二州士民若能審決安危翻然革面率其支黨歸投軍門者當表言天臺隨才用如其迷心不悛竄首巢穴長圍既周臨衝四至雖欲壺漿厥篚其可得乎幸加三思詳擇利害彥之進軍虜悉斂河南一戍歸河北太祖以前征虜司馬南廣平太守尹沖為督司雍并三州豫州之潁川兗州之陳留二郡諸軍事奮威將軍司州刺史戍虎牢十一月虜大衆南渡河彥之敗退洛陽滑臺虎牢諸城並為虜所沒尹沖及司馬滎陽太守崔模抗節不降投塹死沖字子順天水冀人也先為姚興吏部郎與興子廣平公弼結黨欲傾興太子泓泓立沖與弟弘俱逃叛南歸至是追贈前將軍太祖與江夏王義恭書曰尹沖誠節志概繼蹤古烈以為傷惋不能已已上以滑臺戰守彌時遂至陷沒乃作詩曰逆虜亂疆埸邊將嬰寇仇堅城效貞節攻戰無暫休覆瀋不可拾離機難復收勢謝歸塗單於焉見幽囚烈烈制邑守舍命蹈前修忠臣表年暮貞柯見嚴秋楚莊投袂起終然報強讎去病辭高館卒獲舒國憂戎事諒未殄民患焉得瘳撫劍懷感激志氣若雲浮願想淩扶搖弭斾拂中州爪牙申威靈帷幄騁良籌華裔混殊風率土浹王猷惆悵懼遷逝北顧涕交流其後燾又遣使通好并求婚姻太祖每依違之十七年燾號太平真君元年十九年虜鎮東將軍武昌王宜勒庫莫提移書益梁二州往伐仇池侵其附屬而移書越詣徐州曰我大魏之興德配二儀與造化並立夏殷以前功業尚矣周秦以來赫赫堂堂垂耀先代逮我烈祖重之聖明應運龍飛廓清燕趙聖朝承王業之資奮神武之略遠定三秦西及葱嶺東平遼碣海隅服從北暨鍾山萬國納貢威風所扇想彼朝野備聞威德往者劉石苻姚遞據三郡司馬琅邪保守揚越綿綿連連綿歷年紀數窮運改宋氏受終仍晉之舊遠通聘享故我朝庭解甲息心東南之略是為不欲違先故之大信也而彼方君臣苞藏禍心屢為邊寇去庚午年密結赫連侵我牢洛致師徒喪敗舉軍囚俘我朝庭仁弘不窮人之非不遂人之過與彼交和前好無改昔南秦王楊玄識達天運於大化未及之前度越赫連遠歸忠款玄既即世弟難當忠節愈固上請納女連婚宸極任土貢珍自比內郡漢南白雉登俎御羞朝庭嘉之授以專征之任不圖彼朝計疆埸之小疵不相關移竊興師旅亡我賓屬難當將其妻子及其同義告敗關下聖朝憮然顧謂羣臣曰彼之違信背和與牢洛為三一之為甚其可再乎是若可忍孰不可忍是以分命吾等磬聲之臣助難當報復使持節侍中都督雍秦二州諸軍事安西將軍建興公吐奚愛弼率南秦王楊難當自祁山南出直衝建安令南秦自遣信臣招集舊戶使持節侍中都督雍梁益四州諸軍事安西將軍開府儀同三司淮陰公皮豹子員外散騎常侍平南將軍南益州刺史建德公庫拔阿浴河引出斜谷厄白馬之險散騎常侍安南將軍雍州刺史南平公娥後延出自駱谷直截漢水冠軍將軍南蠻校尉荊州刺史建平公宗𣭏使持節員外散騎常侍冠軍將軍梁州刺史順陽公劉買德平遠將軍永安侯若干內亦千出自子午東襲梁漢使持節侍中都督荊梁南雍三州諸軍事領護南蠻校尉征南大將軍開府儀同三司荊州刺史故晉譙王司馬文思寧遠將軍荊州刺史襄陽公魯軌南趨荊州使持節都督洛豫州及河內諸軍事鎮南大將軍開府儀同三司淮南王直勤它大翰為其後繼使持節侍中都督梁益寧三州諸軍事領護西戎校尉鎮西大將軍開府儀同三司揚州刺史晉琅邪王司馬楚之南趣壽春使持節侍中都督揚豫兗徐四州諸軍事征南將軍徐兗二州刺史東安公刁雍東趣廣陵南至京口使持節侍中都督青兗徐三州諸軍事征東將軍青徐二州刺史東海公故晉元顯子司馬天助直趣濟南十道並進連營五千步騎百萬隱隱桓桓以此屠城何城不潰以此奮擊何堅不摧邵陵踐土區區齊晉尚能克勝強楚以致一匡況大魏以沙漠之突騎兼咸夏之徑卒哉若衆軍就臨將令南海北泛江湖南溢高岸墊為浦澤深谷積為丘陵晉餘黎民將雲集霧聚仇池之師焿山谷之中何能自固彼之所謂肆忿於目前之小得以至於敗亡之大失也昔信陵君濟窮鳩之危義士歸之故我朝廷欲救難當投命之誠為此舉動既而愛惜前好猶復沈吟多殺生生在之一亡十仁者之所不為吾等別愛後自馳檄相譬書若攝兵還反復南秦之國則諸軍同罷好穆如初若距我義言很愎遂往敗國亡身必成噬齊之悔望所列上彼朝惠以報告徐州答移曰知以楊難當投命告敗比之窮鳩欲動衆以相存拯救危恤難有國者之所用心雖然移書之言亦已過矣何者楊氏先世以來受晉爵號修職守藩為我西服十載之中再造逆亂號年建義猖狂妄作為臣不忠宜加誅討又知難當稱臣彼國宜是顧畏首尾兩屬求全果是純臣服事於魏何宜與人和親而聽臣下縱逸昔景平之末國祚中微彼乘我內難侵我司兗是以七年治兵義在經略三帥涉河秋豪不犯但崇此信誓不負約言耳彼伺我軍仍相掩襲俘我甲士翦我邊民是彼有兩曲我有二直也司馬楚文思亡命竄伏魯軌刁雍實為蠆尾而擁其逋逃開其疆埸元顯無子焉得天助謬稱假託何足以云又譏竊興師旅不相關移若如來言又非所受黃龍國主受我正朔且渠茂虔父子歸款彼皆殘滅俘馘豈有先言況仇池奉晉十世事宋三葉九伐所加何傷於彼僕聞師曲為老義作亂雄言貴稱情不在夸大移書本詣梁益而謬來鄙府大人不遠幸無過談二十年燾以國授其太子下書曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除逆掃清不順武功既昭而文教未闡非所以崇太平之治也今者域內安逸百姓富昌軍國異容宜定制度為萬世之法夫陰陽有往復四時有代序授子任賢安全相附所以休息疲勞式固長久成其祿福古今不易之典也諸朕功臣勤勞日久皆當致仕歸第雍容高爵頤神養壽朝請隨時饗宴朕前論道陳謀而已不須復親有司苦劇之職其令皇太子嗣理萬機總統百揆更舉賢良以被列職皆取後進明能廣啓選才之路擇人授任而黜陟之故孔子曰後生可畏焉知來者之不如今主者明為科制宣勑施行於是王公以下上書太子皆稱臣首尾與表同唯用白紙為異是歲燾伐芮芮虜大敗而還死者十六七不聽死家發哀犯者誅之二十三年虜安南平南府又移書兗州以南國僑置州不依城土多濫北境名號又欲遊獵具區兗州答移曰夫皇極肇建實膺神明之符生民初載實稟沖和之氣故司牧之功宣於上代仁義之道興自諸華在昔有晉混一區宇九譯承風遐戎嚮附永嘉失御天綱圮裂石容苻姚遞乘非據或棲息趙魏或保聚邠岐我皇宋屬當歸曆受終晉氏北臨河濟西盡咸汧弔民伐罪流澤五都魏爾時祗德悔禍思用和輯交通使命以祈天衷來移所謂分疆畫境其志久定者也俄而不其信虞我國憂侵牢及洛至于清濟往歲入河且欲綏理舊城是以頓兵南澨秋豪無犯軍師不能奉遵廟算保有成功回斾之日重失司兗來移云不因土立州招引亡命夫古有分土而無分民德之休明四方繈負昔周道方隆靈臺初構民之附化八十萬家彼不思弘善政而恐人之棄己縱威肆虐老弱無遺詳觀今古略聽輿誦未有窮凶以延期安忍而懷衆者也若必宜因土立州則彼立徐揚豈有其地往年貴主獻書云強者為雄斯則棄德任力逆行倒施有一於此何以能振復加欲游獵具區觀化南國今治道方融遠人必至開館飾邸則有司存來歲元辰天人協慶鸞旗省方東巡稽嶺若欲邀恩宜赴茲會懷德貴蚤無或後期又稱馳獵積年野無飛伏此邦解網舍前矜蜫育鷇七澤八藪禽獸豐碩虞候搜算義非所吝三代肆覲其典雖呼韓入漢厥儀猶全饋餼之秩每存豐厚先是虜中謠言滅虜者吳也燾甚惡之二十三年北地瀘水人蓋吳年二十九於杏城天台舉兵反虜諸戎夷普並響應有衆十餘萬燾聞吳反惡其名纍遣軍擊之輒敗吳上表歸順曰自靈祚南遷禍纏神土二京失統豹狼縱毒蒼元蹈犬噬之悲舊都哀荼蓼之痛臣以庸鄙杖義因機乘寇虜天亡之期藉二州思奮之憤故創迹天台爰暨咸雍義風一鼓率土響同威聲既張士卒效勇師不崇朝羣狡震裂殄逆鱗於函關掃凶迹於秦土非仰協宋靈俯允羣願焉能若斯者哉今平城遺虐連兵大壇東西狼顧威形莫接長安孤危河洛不戍平陽二世連土宇擁率部落控弦五萬東屯潼塞任質軍門私署安西將軍常山白廣平練甲高平進師汧隴北漠護軍結駟連騎提戈載驅胡蘭洛生等部曲數千擬擊僞鎮闔境顒顒仰望皇澤伏願陛下給一旅之衆北臨河陝賜臣威儀兼給戎械進可以厭捍凶寇覆其巢窟退可以宣國威武鎮御舊京使中都有鳴鸞之響荒餘懷來蘇之德謹遣使人趙綰馳表丹誠燾遣軍屢敗乃自率大衆攻之吳又上表曰臣聞天無二日地無二主昔中都失統九域分崩羣凶丘列於天邑飛梟鴟目於四海先皇慈懷內發愍及戎荒翦僞羌於長安雪黎民之荼炭政教既被民始寧蘇天未忘難禍亂仍起獫狁侏張侵暴中國使長安為豺狼之墟鄴洛為蜂蛇之藪縱毒生民虐流兆庶士女能言莫不歎憤傾首東望仰希拯接咸同旱苗之待天澤赤子之望慈親臣仰恩天時以義伐暴輒東西結連南北樹黨五州同盟迭相要契仰馮威靈千里雲集冀廓除榛莽以待王師義夫始臻莫不瓦解虜主二月四日傾資倒庫與臣連營接刃交鋒無日不戰獲賊過半伏尸蔽野伏願特遣偏師賜垂拯接若天威既震足使姦虜潰亡遺民小大咸蒙生造太祖詔曰北地蓋吳起衆秦川華戎響附奮其義勇頻煩克捷屢遣表疏遠效忠款志梟逆虜以立勳績宜加爵號褒奬乃誠可以為使持節都督關隴諸軍事安西將軍雍州刺史北地郡公使雍梁遣軍界上以相援接燾攻吳大小數十戰不能剋太祖遣使送雍秦二州所統郡及金紫以下諸將印合一百二十一紐與吳使隨宜假授屠各反叛吳自攻之為流矢所中死吳弟吾生率餘衆入木面山皆尋破散其年太原民顏白鹿私行入荒為虜所録相州刺史欲殺之白鹿詐云青州刺史杜驥使其歸誠相州刺史送白鹿至桑乾燾喜曰我外家也使其司徒崔浩作書與驥使司徒祭酒王琦齎書隨白鹿南歸遣從弟高梁王以重軍延驥入太原界攻冀州刺史申恬於歷城恬擊破之杜驥遣其寧朔府司馬夏侯祖歡中兵參軍吉淵馳往赴援虜破略太原得四千餘口牛六千餘頭尋又寇兗青冀三州遂及清東殺略甚衆太祖思弘經略詔羣臣曰吾少覽篇籍頗愛文義遊玄玩采未能息卷自纓紼世務情兼家國徒存日昃終有慚德而區宇未一師饉代有永言斯瘼彌干其慮加疲疾稍增志隨時往屬思之功與事而廢殘虐遊魂齊民塗炭乃眷北顧無忘弘拯思總羣謀掃清逋逆感慨之來遂成短韻卿等體國情深亦當義篤其懷也詩曰季父鑒禍先辛生識機始崇替非無徵興廢要有以自昔淪中畿倏焉盈百祀不覩南雲陰但見胡風起亂極治必形塗泰由積否方欲滌遺氛矧乃穢邊鄙眷言悼斯民納隍良在己逝將振宏羅一麾同文軌時乎豈再來河清難久俟駘駟安局步騏驥志千里梁傅畜義心伊相抱深恥賞契將誰寄要之二三子無令齊晉朝取愧鄒魯士時疆埸之民多相侵盜二十五年虜寧南將軍豫州刺史北井侯若庫辰樹蘭移書豫州曰僕以不德荷國榮寵受任邊州經理民物宣播政化鷹揚萬里雖盡節奉命未能令上化下布而下情上達也比者以來邊民擾動互有反逆無復為害自取誅夷死亡之餘雉菟逃竄南入宋界聚合逆黨頻為寇掠殺害良民略取資財大為民患此之界局與彼通連兩民之居烟火相接來往不絶情僞繁興是以南姦北入北姦南叛以類推之日月彌甚姦宄之人數得侵盜之利雖加重法不可禁止僕常申令境局料其姦源而彼國牧守縱不禁御是以遂至滋蔓寇擾疆埸譬猶蚤虱疥癬雖為小痾令人終歲不安當今上國和通南北好合唯邊境民庶要約不明自古列國封疆有畔各自禁斷無復相侵如是可以保之長久垂之永世故上表臺閣馳書明曉自今以後魏宋二境宜使人迹不過自非聘使行人無得南北邊境之民烟火相望雞狗之聲相聞至老死不相往來不亦善乎又能此亡彼歸彼亡此致則自我國家所望於仁者之邦也右將軍豫州刺史南平王鑠答移曰知以邊氓擾動多有叛逆欲杜絶姦宄兩息民患又欲迭送奔亡禁其來往申告嘉貺實獲厥心但彼和好以來矢言每缺侵軼之弊屢違義舉任情背畔專肆暴略豈唯竊犯王黎乃害及行使頃誅討蠻髦事止畿服或有狐奔鼠竄逃首北境而輒便苞納待之若舊資其糧仗縱為寇賊往歲擅興戎旅禍加孩耄罔顧善鄰之約不惟疆域之限來示所云彼並行之雖豐辭盈觀即事違實興嫌長亂實彼之由反以為言將違躬厚之義疆埸之民有自來矣且相期有素本不介懷若於本欲消姦弭暴永存匪石宜先謹封守斥遣諸亡驚蹄逸鏃不妄入境則邊城之下外戶不閉王制嚴明豈當獨負來信若亡命奔越侵盜彼民斯固刑之所取無勞遠及自荷閫外思闡皇猷每申勑守宰務敦義讓往誠未布能不愧怍當重約示以副至懷二十七年燾自率步騎十萬寇汝南初燾欲為邊寇聲云獵於梁川太祖慮其侵犯淮泗乃敕邊戍小寇至則堅守拒之大衆來則拔民戶歸壽陽諸戍偵候不明虜奄來入境宣威將軍陳南頓二郡太守鄭琨綏遠將軍汝陽潁川二郡太守郭道隱並棄城奔走虜掠抄淮西六郡殺戮甚多攻圍懸瓠城城內戰士不滿千人先是汝南新蔡二郡太守徐遵之去郡南平王鑠時鎮壽陽遣右軍行參軍陳憲行郡事憲嬰城固守燾盡鋭以攻之憲自登郭城督戰起樓臨城飛矢雨集衝車攻破南城憲於內更築扞城立柵以補之虜肉薄攻城死者甚衆憲將士死傷亦過半燾唯恐壽陽有救兵不以彭城為慮燾遣從弟永昌王庫仁真步騎萬餘將所略六郡口北屯汝陽時世祖鎮彭城太祖遣隊主吳香爐乘驛敕世祖遣千騎齎三日糧襲之世祖發百里內馬得千五百匹衆議舉別駕劉延孫為元帥延孫辭不肯行舉參軍劉泰之自代世祖以問司馬王玄謨長史張暢暢等並贊成之乃分為五軍以泰之為元帥與安北騎兵行參軍垣謙之田曹行參軍臧肇之集曹行參軍尹定武陵國左常侍杜幼文五人各領其一謙之領泰之軍副殿中將軍程天祚督戰至譙城更簡閲人馬得精騎千一百匹直向汝陽虜不意奇兵從北來大營在汝陽北去城三里許泰之等至虜都不覺馳入襲之殺三千餘人燒其輜重營內有數區屋屋中皆有帳器仗甚精食具皆是金銀帳內諸大主帥悉殺之諸亡口悉得東走大呼云官軍痛與手虜衆一時奔散因追之行已經日人馬疲倦引還汝南城內有虜一幢馬步可五百登城望知泰之無後繼又有別帥巨鹿公餘嵩自虎牢至因引出擊泰之泰之軍未食旦戰已疲勞結陳未及定垣謙之先退因是驚亂棄仗奔走行迷道趨水水深岸高人馬悉走水爭渡泰之獨不去曰喪敗如此何面復還下馬坐地為虜所殺肇之溺水死天祚為虜所執謙之定幼文及將士免者九百餘人馬至者四百匹世祖降安北之號為鎮軍將軍玄謨延孫免官暢免所領沛郡謙之伏誅定幼文付尚方燾初聞汝陽敗又傳彭城有係軍大懼謂其衆曰但聞淮南遣軍乃復有奇兵出今年將墮人計中即燒攻具欲走會泰之死問續至乃停壽陽遣劉康祖救懸瓠燾亦遣任城公拒康祖與戰破之斬任城燾攻城四十二日不拔死者甚多任城又死康祖救軍漸進乃委罪大將多所斬戮倍道奔走太祖嘉憲固守詔曰右軍行參軍行汝南新蔡二郡軍事陳憲盡力捍禦全城摧寇忠敢之效宜加顯擢可龍驤將軍汝南新蔡二郡太守又以布萬匹委憲分賜汝南城內文武吏民戰守勤勞者燾雖不剋懸瓠而虜掠甚多南師屢無功為燾所輕侮與太祖書曰彼前使間諜月斗略姦人竊聞朱修之申謨近復得胡崇之敗軍之將國有常刑乃皆用為方州虞我之隙以自慰慶得我普鍾蔡一豎子何所損益無異得我舉國之民厚加奉養禽我卑將衛拔非其身各便宀元攴腰苦役以辱之觀此所行足知彼之大趣辨校以來非一朝一夕也頃關中蓋吳反逆扇動隴右氐羌彼復使人就而誘勸之丈夫遺以弓矢婦人遺以環釧是曹正欲譎誑取賂豈有遠相順從為大丈夫之法何不自來取之而以貨月斗引誘我邊民募往者復除七年是賞姦人也我今來至此土所得多少孰與彼前後得我民戶邪彼今若欲保全社稷存劉氏血食者當割江以北輸之攝守南度如此釋江南使彼居之不然可善敕方鎮刺史守宰嚴供張之具來秋當往取揚州大勢已至終不相縱頃者往索真珠璫略不相與今所馘截髑髏可當幾許珠璫也彼往日北通芮芮西結赫連蒙遜吐谷渾東連馮弘高麗凡此數國我皆滅之以此而觀彼豈能獨立芮芮吳提已死其子菟害真襲其凶迹以今年二月復死我今北征先除有足之寇彼若不從命來秋當復往取以彼無足故不先致討諸方已定不復相釋我往之日彼作何方計為塹城自守為築垣以自鄣也彼土小雨水便迫掖彼能水中射我也我顯然往取揚州不若彼翳行竊步也彼來偵諜我已禽之放還其人目所盡見委曲善問之彼前使裴方明取仇池既得疾其勇功不能容有臣如此尚殺之烏得與我校邪彼非敵也彼常願欲共我一過交戰我亦不癡復不是苻堅何時與彼交戰晝則遣騎圍繞夜則離彼百里宿去彼人民好降我者驅來不好者盡刺殺之近有穀米我都噉盡彼軍復欲食噉何物能過十日邪彼吳人正有斫營伎我亦知彼情離彼百里止宿雖彼軍三里安邏使首尾相次彼募人以來裁五十里天自明去此募人頭何得不輸我也彼謂我攻城日當掘塹圍守欲出來斫營我亦不近城圍彼止築隄引水灌城取之彼揚州城南北門有兩江水此二水引用自可如人意也知彼公時舊臣都已殺盡彼臣若在年幾雖老猶有智策今已殺盡豈不天資我也取彼亦不須我兵刃此有能祝婆羅門使鬼縛彼送來也此後復求通和聞太祖有北伐意又與書曰彼此和好居民連接為日已久而彼無厭誘我邊民其有往者復之七年去春南巡因省我民即使驅還自天地啓闢已來爭天下者非唯我二人而已今聞彼自來設能至中山及桑乾川隨意而行來亦不迎去亦不送若厭其區宇者可來平城居我往揚州住且可博其土地傖人謂換易為博彼年已五十未嘗出戶雖自力而來如三歲嬰兒復何知我鮮卑常馬背中領上生活更無餘物可以相與今送獵白鹿馬十二匹并藥等物彼來馬力不足可乘之道里來遠或不服水土藥自可療其年大舉北討下詔曰虜近雖摧挫獸心靡革驅逼遺氓復規竊暴比得河朔秦雍華戎表疏歸訴困棘跂望綏拯潛相糾結以候王師并陳芮芮此春因其來掠掩襲巢窟種落畜牧所亡太半連歲相持于今未解又猜虐互發親黨誅殘根本危敝自相殘殄芮芮間使適至所說並符遠輸誠款誓為犄角遐邇注情既宜赴奬且水雨豐澍舟楫流通經略之會實在茲日可遣寧朔將軍王玄謨率太子步兵校尉沈慶之鎮軍咨議參軍申坦等戈船一萬前驅入河使持節督青冀幽三州徐州之東安東莞二郡諸軍事輔國將軍青冀二州刺史霄城侯蕭斌推三齊之鋒為之統帥持節都督徐兗青冀幽五州豫州之梁郡諸軍事鎮軍將軍徐兗二州刺史武陵王駿總四州之衆水陸並驅太子左衛率始興縣五等侯臧質勒東宮禁兵統驍騎將軍安復縣開國侯王方回建武將軍安蠻司馬新康縣開國男劉康祖右軍參軍事梁坦步騎十萬徑造許洛使持節督豫司雍秦并五州諸軍事右將軍豫州刺史領安蠻校尉南平王鑠悉荊河之師方軌繼進東西齊舉宜有董一使持節侍中都督揚南徐二州諸軍事太尉領司徒録尚書太子太傅國子祭酒江夏王義恭德望兼崇風略遐被即可三府文武并被以中儀精卒出次徐方為衆軍節度別府司空府使所督諸鎮各遣虎旅數道爭先督梁南北秦三州諸軍事綏遠將軍西戎校尉梁南北秦三州刺史秀之統輔國將軍楊文德宣威將軍巴西梓潼二郡太守劉弘宗連旗深入震蕩汧隴護軍將軍封陽縣開國侯蕭思話部龍驤將軍杜坦寧遠將軍竟陵太守南城縣開國侯劉德願籍荊雍之徑攬羣師之鋭宜由武關稜威震喴指授之宜委司空義宣議量是歲軍旅大起王公妃主及朝士牧守各獻金帛等物以助國用下及富室小民亦有獻私財至數十萬者又以兵力不足尚書左僕射何尚之參議發南兗州三五民丁父祖伯叔兄弟仕州居職從事及仕北徐兗為皇弟皇子從事庶姓主簿諸皇弟皇子府參軍督護國三令以上相府舍者不在發例其餘悉倩暫行征符到十日𨩙束緣江五郡集廣陵緣淮三郡集盱眙又募天下弩手不問所從若有馬步衆藝武力之士應科者皆加厚賞有司又奏軍用不充揚南徐兗江四州富有之民家資滿五十萬僧尼滿二十萬者並四分換一過此率計事息即還歷城建武府司馬申元吉率馬步餘人向碻磝取泗瀆口虜碻磝戍主濟州刺史王買德憑城拒戰元吉破之買德棄城走獲奴婢一百四十口馬二百餘匹驢騾二百生羊各千餘頭七百領驣細車三百五十乘地倉四十二所粟五十餘萬斛城內居民私儲又二十萬斛虜田五穀三百頃鐵三萬斤大小鐵器九千餘口餘器仗雜物稱此玄謨攻滑臺不剋燾自率大衆渡河玄謨敗走燾從弟永昌王庫仁真發關西兵趨汝潁從弟高梁王阿斗碸自青州道燾自碻磝並南出諸鎮悉斂民保城其十一月至鄒山鄒山戍主宣威將軍魯陽平二郡太守崔耶利敗沒燾登鄒山見秦始皇刻石使人排倒之遣楚王樹洛真南康侯杜道俊進軍清西至蕭城步尼公進軍清東至留城世祖遣參軍馬文恭至蕭城江夏王義恭遣軍主嵇玄敬至留城並為覘候蕭城虜偃旗旌文恭斥候不明卒與相遇乃捨汴趣南山東至山而虜圍合文恭戰敗僅以身免玄敬亦與留城虜相值幢主華欽繼其後虜望玄敬後有軍引去趨苞橋至欲渡清西沛縣民燒苞橋夜於林中擊鼓虜謂官軍大至爭渡苞水水深溺死殆半先是燾遣員外散騎侍郎王老壽乘驛就太祖乞黃甘太祖餉甘十簿甘蔗千挺并就求馬曰自頃歲成民阜朝野無虞春末當東巡吳會以盡游豫臨滄海探禹穴陟姑蘇之臺搜長洲之苑舟楫雖盛寡於良駟想能惠以逸足令及此行老壽反命未出境虜兵深入乃録還虜又破尉武戍執戍主左軍長兼行參軍王羅漢先是南平王鑠以三百人配羅漢出戍而尉武東北有小壘因據之或曰賊盛不足自固南依卑林寇至易以免羅漢以受命來此不可輒去是日虜攻之矢盡力屈遂沒虜法獲生將付其三郎大帥連鎖鎖頸後羅漢夜斷三郎頭抱鎖亡走得入盱眙城永昌王破劉康祖於尉武引衆向壽陽自青岡屯孫叔敖冢脅壽陽城又焚掠馬頭鍾離南平王鑠保城固守燾自彭城南出十二月於盱眙渡淮破胡崇之等軍留尚書韓元興數千人守盱眙自率大衆南向中書郎魯秀出廣陵高梁王阿斗碸出山陽永昌王於壽陽出橫江凡所經過莫不殘害燾至瓜步壞民屋宇及伐蒹葦於滁口造箄筏聲欲渡江太祖大具水軍為防禦之備初領軍將軍劉遵考率軍向彭城至小澗虜已斷道召還與左軍將軍尹弘守橫江少府劉興祖守白下建威將軍黃門侍郎蕭元雍守裨洲羽林左監孟宗嗣守新洲上建武將軍泰容守新洲下征北中兵參軍事向柳守貴洲司馬到元度守蒜山咨議參軍沈曇慶守北固尚書褚湛之先行京陵仍守西津徐州從事史蕭尚之守練壁征北參軍管法祖守譙山徐州從事武仲河守博落尚書左丞劉伯龍守採石尋遷建武將軍淮南太守仍總守事遊邏上接于湖下至蔡洲陳艦列營周亘江畔自採石至于暨陽六七百里船艦蓋江旗甲星燭皇太子出戍石頭城前將軍徐湛之守石頭倉城都水使者樂詢尚書水部郎劉淵之並以裝治失旨付建康乘輿數幸石頭及莫府山觀望形勢購能斬佛狸伐頭者封八千戶開國縣公賞布絹各萬匹金銀各百斤斬其子及弟僞相大軍主封四百戶開國縣侯布絹各五千匹自此以下各有差又募人仭冶葛酒置空村中欲以毒虜竟不能傷燾鑿瓜步山為盤道於其頂設屋燾不飲河南水以駱駝負河北水自隨一駱駝負三十斗遣使餉太祖駱駝名馬求和請婚上遣奉朝請田奇餉以珍羞異味燾得黃甘即噉之并大進酃酒左右有耳語者疑食中有毒燾不答以手指天而以孫兒示奇曰至此非唯欲為功名實是貪結姻援若能酬酢自今不復相犯秋毫又求嫁女與世祖二十八年正月朔燾會於山上并及土人會竟掠民戶燒邑屋而去虜初緣江舉烽火尹弘曰六夷如此必走正月二日果退初太祖聞虜寇逆焚燒廣陵城府船乘使廣陵南沛二郡太守劉懷之率人民一時渡江虜以海陵多陂澤不敢往山陽太守蕭僧珍亦斂居民及流奔百姓悉入城臺送糧仗給盱眙賊逼分留山陽又有數萬人攻具當往滑臺亦留付郡城內垂萬家戰士五千餘人有白米陂去郡數里僧珍逆下諸處水注令滿須賊至決以灌之虜既至不敢停引去自廣陵還因攻盱眙盡鋭攻城三十日不能剋乃燒攻具退走燾凡破南兗徐兗豫青冀六州殺略不可稱計而其士馬死傷過半國人並尤之是歲燾病死諡為太武皇帝初燾有六子長子晃字天真為太子次曰晉王燾所住屠蘇為疾雷擊屠蘇倒見壓殆死左右皆號泣晉王不悲燾怒賜死次曰秦王烏奕肝與晃對掌國事晃疾之訴其貪暴燾鞭之二百遣鎮枹罕次曰燕王次曰吳王名可博真次曰楚王名樹洛真燾至汝南瓜步晃私遣取諸營鹵獲甚衆燾歸聞知大加搜檢晃懼謀殺燾燾乃詐死使其近習召晃迎喪於道執之及國罩以鐵籠尋殺之以烏奕肝有武用以為太子會燾死使嬖人宗愛立博真為後宗愛博真恐為奕肝所危矯殺之而自立號年承平博真懦弱不為國人所附晃子濬字烏雷直勤素為燾所愛燕王謂國人曰博真非正不宜立直勤嫡孫應立耳乃殺博真及宗愛而立濬為主號年為正平先是虜寧南將軍魯爽兄弟率衆歸順二十九年太祖更遣張永王玄謨及爽等北伐青州刺史劉興祖建議伐河北曰河南阻飢野無所掠脫意外固守非旬月可拔稽留大衆轉輸方勞伐罪弔民事存急速今僞帥始死兼逼暑時國內猜擾不暇遠赴關內之衆裁足自守愚謂宜長驅中山據其關要冀州已北民人尚豐兼麥已向熟資因為易向義之徒必應響赴若中州震動黃河以南自當消潰臣城守之外可有二千人今更發三千兵假別駕崔勳之振威將軍領所發隊并二州望族從蓋柳津直衝中山申坦率歷城之衆可有二千駱驛俱進較略二軍可七千許人既入其心腹調租發車以充軍用若前驅乘勝張永及河南衆軍便宜一時濟河使聲實兼舉愚計謬允宜並建司牧撫柔初附定州刺史取大嶺冀州刺史向井陘并州刺史屯雁門幽州刺史塞軍都相州刺史備大行因事指麾隨宜加授畏威欣寵人百其懷濟河之日請大統版假常忿將率憚於深遠勳之等慷慨之誠誓必死效若能成功清一可待若不克捷不為大傷並催促裝束伏聽敕旨上意止存河南不納玄謨攻碻磝不克退還世祖即位索虜求互市江夏王義恭竟陵王誕建平王宏何尚之何偃以為宜許柳元景王玄謨顏竣謝莊和之褚湛之以為不宜許時遂通之大明二年虜寇青州為刺史顏師伯所破退走前廢帝永光元年濬死諡文成皇帝子弘之字第豆胤代立景和中北討徐州刺史義陽王昶昶單騎奔虜太宗泰始初江州刺史晉安王子勛為逆四方反徐州刺史薛安都青州刺史沈文秀冀州刺史歷城鎮主崔道固等亦各舉兵虜謀欲納昶下書曰易稱利用行師書云龔行天罰必觀時而後施因機而後舉故夏伐有扈四海以平晉定吳會萬方以一今宋室衰微凶難洊起國有殺君之逆邦罹崩離之難起自蕭牆釁流合境僞使持節散騎常侍都督徐南北兗青冀幽七州豫州之梁郡諸軍事征北將軍儀同三司徐州刺史義陽王昶踵微子之蹤蹈項伯之迹知機體運歸款闕庭朕錫以顯爵班同親舊昶弟湘東王進不能扶危定傾退不能降身高謝阻兵安忍篡位自立既無闔閭靜亂之功而有無知悖禮之變怠棄三正慢易天常覆敗之徵既兆危亡之應已著僞江州刺史晉安王復稱大號自立一隅荊郢二州刺史安陸臨海王劉子綏子頊大擅威令不相祗伏徐州刺史彭城鎮主薛安都青州刺史沈文秀冀州刺史歷城鎮主崔道固等皆彼之要藩懼及禍難擁衆獨據各無定主仰觀天象俯察人謀六軍燮伐之期率土同軌之日朕承休烈屬當泰運思播靈武廓寧九服豈可得臨萬乘之機遘時來之遇而不討其讎逆振其艱患哉今可分命諸軍以行九伐使持節征東大將軍安定王直勤伐伏玄侍中尚書左僕射安西大將軍平北公直勤美晨散騎常侍殿中尚書平北將軍山陽公呂羅漢領隴右之衆五萬沿漢而東直指襄陽使持節征南大將軍勃海王直勤天賜侍中尚書令安東大將軍始平王直勤渴言侯散騎常侍殿中尚書令安西將軍西陽王直勤蓋戶千領幽冀之衆七萬濱海而南直指東陽使持節征南將軍京兆王直勤子推侍中司徒安南大將軍新建王獨孤侯尼須散騎常侍西平公韓道人領江雍之衆八萬出洛陽直至壽陽使持節征南大將軍宜陽王直勤新成侍中太尉征東大將軍直勤駕頭拔羽直征東將軍北平公拔敦及義陽王劉昶領定相之衆十萬出濟兗直造彭城與諸軍剋期同到會于秣陵納昶反國定其社稷使荊揚沾德義之風江漢被來蘇之惠邊疆將吏不得因宋衰亂有所侵損以傷我國家存救之義主者明宣所部咸使聞知稱朕意焉既而晉安王子勛事平太宗遣張永沈攸之北討薛安都大懼遣使引虜虜遣萬騎救之永攸之敗退虜攻青冀二州並剋執沈文秀崔道固又下書朕承天序臨御兆民思闡皇風以隆治道而荊吳僭傲跨跱一方天降其殃以罰有罪篡戮發於蕭牆毒害嬰於羣庶徐州刺史薛安都司州刺史常珍奇深體逆順歸誠獻款遭難已飢饉荐臻或以糊口之功私力竊盜或不識王命藏竄山藪或為囚徒先被執繫元元之命甚可哀愍其曲赦淮北三州之民自天安二年正月三十日壬寅昧爽以前諸犯死罪以下繫囚見徒一切原遣唯子殺父母孫殺祖父母弟殺兄妻殺夫奴殺主不從赦例若亡命山澤百日不首復其初罪今陽春之初東作方興三州之民各安其業以就農桑有饑窮不自存通其市糶之路鎮統之主勤加慰納遵用輕典以蒞新化若綏導失中令民逃亡加罪無縱其普宣下咸使聞知朕意焉此後虜復和親信餉歲至朝庭亦厚相報答泰豫元年虜狹石鎮主白虎公安陽鎮主莫索公貞陽鎮主鵝落生襄陽王桓天生等引山蠻馬步二萬餘人攻圍義陽縣義陽戍司州刺史王贍遣從弟司空行參軍思遠撫軍行參軍王叔瑜擊大破之虜退走自索虜破慕容據有中國而芮芮虜有其故地蓋漢世胸奴之北庭也芮芮一號大又號亦胸奴別種自西路通京師三萬餘里僭稱大號部衆殷強歲時遣使詣京師與中國亢禮西域諸國焉耆鄯善龜茲姑墨東道諸國並役屬之無城郭逐水草畜牧以帳為居隨所遷徙其土地深山則當夏積雪平地則極望數千里野無青草地氣寒凉馬牛齕枯噉雪自然肥健國政疏簡不識文書刻木以記事其後漸知書契至今頗有學者去北海千餘里與丁零相接常南擊索虜世為仇讎故朝庭每羈縻之其東有槃槃國趙昌國渡流沙萬里又有粟特國太祖世並奉表貢獻粟特大明中遣使獻生師子火浣布汗血馬道中遇寇失之史臣曰久矣胸奴之與中國並也自漢氏以前綿跨年世紛梗外區驚震中宇周無上算漢收下策魏代分離種落遷散數十年間外郡無風塵之警邊城早開晚閉胡馬不敢南臨至于晉始姦黠漸著密邇畿封窺候疆埸俘民略畜者無歲月而闕焉元康以後風雅雕喪五胡遞襲翦覆諸華及涉圭以鐵馬長驅席卷趙魏負其衆力遂與上國爭衡矣高祖宏圖盛略欲以苞括宇宙為念逮于懸旗清洛飲馬長涇北狄衄鋭挫鋒閉重嶮而自固于時戎車外動王命相屬裳冕委蛇軺軒繼路舊老懷思古之情行人或為之殞涕自是關河響動表𩹉寧一宮車甫晏戎心外駭覆我牢滑翦我伊瀍是以太祖忿之開定司兗而兵無勝略棄師隕衆委甲橫原捐州亘水荊吳鋭卒逸氣未攄偏城孤將銜寃就虜遂蹙境延寇僅保清東自是兵摧勢弱邊隙稍廣壯騎陵突鳴鏑日至芻牧年傷禾麥歲犯小則囚虜吏民大則俘執長守羽書繼塗奔命相屬青徐兗冀之間蕭然矣而自木末以來並有賢才狡算妙識兵權深通戰術屬軖凌厲氣冠百夫故能威服華甸志雄羣虜至於狸伐纂僞彌煽凶威英圖武略事駕前古雖冒頓之鷙勇石之驍強不能及也遂西吞河右東舉龍碣總括戎荒地兼萬里雖裂土分區不及魏晉而華氓戎落衆力兼倍至乃連騎百萬南向而斥神華胡旆映江穹帳遵渚京邑荷檐士女喧惶天子內鎮羣心外御羣寇役竭民徭費殫府實舉天下以攘之而力猶未足也既而虜縱歸師殲纍邦邑剪我淮州俘我江縣喋喋黔首局高天蹐厚地而無所控告強者為轉尸弱者為繫虜自江淮至于清濟戶口數十萬自免湖澤者百不一焉村井空荒無復鳴雞吠犬時歲惟暮春桑麥始茂故老遺氓還號舊落桓山之響未足稱哀六州蕩然無復餘蔓殘搆至於乳燕赴時銜泥靡託一枝之間連窠十數春雨裁至增巢已傾雖事舛吳宮而殲亡匪異甚矣哉覆敗之至於此也太祖懲禍未深復興外略頓兵堅城棄甲河上是我有再敗敵有三勝也自此以後通互市納和親而侵疆軼戍于歲連屬逮泰始搆紛邊將外叛致夷引寇亡我四州高祖劬勞日昃思一區宇旍旗卷舒僅而後克後主守文刑德不樹一舉而棄司兗再舉而喪徐方華服蕭條鞠為茂草豈直天時抑由人事夫地勢有便習用兵有短長胡負駿足而平原悉車騎之地南習水鬬江湖固舟楫之鄉代馬胡駒出自冀北楩柟豫章植乎中土蓋天地所以分區域也若謂裘之民可以決勝於荊越必不可矣而曰樓船之夫可以爭鋒於燕冀豈或可乎虞詡所謂走不逐飛蓋以我徒而彼騎也因此而推勝負殆可以一言蔽之
