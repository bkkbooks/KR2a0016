body:
  text: 宋書卷一百列傳第六十自序昔少逃金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處太原帝顓頊嘉之封諸汾川其後四國沈姒蓐黃沈子國今汝南平輿沈亭是也春秋之時列於盟會定公四年諸侯會召陵伐楚沈子不會晉使蔡伐沈滅之以沈子嘉歸其後因國為氏自茲以降譜諜罔存秦末有沈逞徵丞相不就漢初逞曾孫保封竹邑侯保子遵自本國遷居九江之壽春官至齊王太傅敷德侯遵子達驃騎將軍達子乾尚書令乾子弘南陽太守弘子勗河內守勗子奮御史中丞奮子恪將作大匠恪子謙尚書關內侯謙子靖濟陰太守靖子戎字威卿仕州為從事説降劇賊尹良漢光武嘉其功封為海昏縣侯辭不受因避地徙居會稽烏程縣之餘不鄉遂世家焉順帝永建元年分會稽為吳郡復為吳郡人靈帝初平五年分烏程餘杭為永安縣吳孫晧寶鼎二年分吳郡為吳興郡復為郡人雖邦邑屢改而築室不遷晉武帝平吳後太康二年改永安為武康縣史臣七世祖延始居縣東鄉之博陸里餘烏村王父從官京師義熙十一年高祖賜館于建康都亭里之運巷戎子酆字聖通零陵太守致黃龍芝草之瑞第二子滸字仲高安平相少子景河間相演之慶之曇慶懷文其後也滸子鸞字建光少有高名州舉茂才公府辟州別駕從事史時廣陵太守陸稠鸞之舅也以義烈政績顯名漢朝復以女妻鸞年二十三早卒子直字伯平州舉茂才亦有清名年二十八卒子儀字仲則少有至行兄瑜十歲儀九歲而父亡居喪過禮毀瘠過於成人外祖會稽盛孝章漢末名士也深加憂傷每撫慰之曰汝並黃中沖爽終成奇器何為逾制自取殄滅邪三年禮畢殆至滅性故兄弟並以孝著瑜早卒儀篤學有雅才以儒素自業時海內大亂兵革並起經術道弛士少全行而儀淳深隱默守道不移風操貞整不妄交納唯與族子仲山叔山及吳郡陸公紀友善州郡禮請二府交辟公車徵並不屈以壽終子憲字元禮左中郎新都都尉定陽侯才志顯於吳朝子矯字仲桓以節氣立名仕為立武校尉偏將軍封列侯建威將軍新都太守孫晧時有將帥之稱吳平後為鬱林長沙太守並不就太康末卒子陵字景高太傅東海王越辟為從事元帝之為鎮東將軍命參軍事徐馥作亂殺吳興太守袁琇陵討平之子延字思長桓溫安西參軍潁川太守子賀字子寧桓沖南中郎參軍圍袁真於壽陽遇疾卒子警字世明惇篤有行業學通左氏春秋家世富殖財産纍千金仕郡主簿後將軍謝安命為參軍甚相敬重警內足於財為東南豪士無仕進意謝病歸安固留不止乃謂警曰沈參軍卿有獨善之志不亦高乎警曰使君以道御物前所以懷德而至既無用佐時故遂飲啄之願耳還家積載以素業自娛前將軍青兗二州刺史王恭鎮京口與警有舊好復引為參軍手書殷勤苦相招致不得已而應之尋復謝職子穆夫字彥和少好學亦通左氏春秋王恭命為前軍主簿與警書曰足下既執不拔之志高臥東南故屈賢子共事非以吏職嬰之也初錢唐人杜子恭通靈有道術東土豪家及京邑貴望並事之為弟子執在三之敬警纍世事道亦敬事子恭子恭死門徒孫泰泰弟子恩傳其業警復事之隆安三年恩於會稽作亂自稱征東將軍三吳皆響應穆夫時在會稽恩以為前部參軍振武將軍餘姚令其年十二月二十八日恩為劉牢之所破輔國將軍高素於山陰回踵埭執穆夫及偽吳郡太守陸瓌之吳興太守丘並見害函首送京邑事見隆安故事先是宗人沈預素無士行為警所疾至是警聞穆夫預亂逃藏將免矣預以告官警及穆夫弟仲夫任夫預夫佩夫並遇害唯穆夫子淵子雲子田子林子虔子獲全淵子字敬深少有志節隨高祖克京城封繁畤縣五等侯參鎮軍車騎中軍事又為道規輔國征西參軍領寧蜀太守與劉基共斬蔡猛於大簿還為太尉參軍從征司馬休之與徐逵之同沒時年三十五子正字元直淹詳有器度美風姿善容止好老莊之學弱冠州辟從事宗人光祿大夫演之稱之曰此宗中千里駒也出為始寧烏傷婁令母憂去職服闋為隨王誕後軍安南行參軍誕鎮會稽復參安東軍事元嘉三十年元凶弒立分江東為會州以誕為刺史誕將受命正説司馬顧琛曰國家此禍開闢未聞今以江東義鋭之衆為天下倡始若馳一介四方詎不響應以此雪朝庭寃恥大明臣子之節豈可北面凶逆使殿下受其偽寵琛曰江東忘戰日久士不習兵雖云逆順不同然強弱又異當須四方有義舉者然後應之不為晚也正曰天下若有無父之國則可矣苟其不爾寧可自安讎恥而責義於餘方今正以弒逆寃醜義不同戴舉兵之日豈求必全耶馮衍有言大漢之貴臣將不如荊齊之賤士乎況殿下義兼臣子事實家國者哉琛乃與正俱入説誕誕猶預未決會尋陽義兵起世祖使至誕乃加正寧朔將軍領軍繼劉季之誕入為驃騎大將軍正為中兵參軍遷長水校尉孝建元年移青州鎮歷城臨淄地空除寧朔將軍齊北海二郡太守委以全齊之任未拜二年卒時年四十三正生好樂厚自奉養既終之後家無餘財淵子弟雲子元嘉中為晉安太守雲子子煥字士蔚少為駙馬都尉奉朝請元凶之入弒也煥時兼中庶子直坊逼從入臺劭既自立以為羽林監辭不拜拜員外散騎侍郎使防南譙王義宣諸子事在義宣傳仍除丞相行參軍員外散騎侍郎南昌令有能名晉平王休祐驃騎中兵記室參軍同僚皆以諂進煥獨不頃之記室參軍周敬祖等為太宗所責得罪轉煥咨議參軍後廢帝元徽中以為寧遠將軍交州刺史未至鎮病卒時年四十五田子字敬光雲子弟也從高祖克京城進平京邑參鎮軍軍事封營道縣五等侯義熙五年高祖北伐鮮卑田子領偏師與龍驤將軍孟龍符為前鋒慕容超屯臨朐以距大軍龍符戰沒田子力戰破之及盧循逼京邑高祖遣田子與建威將軍孫季高由海道襲廣州加振武將軍循黨徐道覆還保始興田子復與右將軍劉藩同共攻討循尋還廣州圍季高田子慮季高孤危謂藩曰廣州城雖險固本是賊之巢穴今循還圍之或有內變且季高衆力寡弱不能持久若使賊還據此凶勢復振下官與季高同履艱難泛滄海於萬死之中克平廣州豈可坐視危逼不相拯救於是率軍南還比至賊已收其散卒還圍廣州季高單守危迫聞田子忽至大喜田子乃背水結陳身率先士卒一戰破之於是推鋒追討又破循於蒼梧酼林寧浦還至廣州而季高病死既兵荒之後山賊競出攻沒城郭殺害長吏田子隨宜討伐旬日平殄刺史褚叔度至乃還京師除太尉參軍振武將軍淮陵內史賜爵都鄉侯復參世子征虜軍事將軍內史如故八年從討劉毅十一年復從討司馬休之領別軍與征虜將軍趙倫之參征虜軍事振武將軍扶風太守十二年高祖北伐田子與順陽太守傅弘之各領別軍從武關入屯據青泥姚泓欲自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率步軍數萬奄至青泥田子本為疑兵所領裁數百欲擊之傅弘之曰彼衆我寡難可與敵田子曰師貴用奇不必在衆弘之猶固執田子曰衆寡相傾勢不兩立若使賊圍既固人情喪沮事便去矣及其未整薄之必克所謂先人有奪人之志也便獨率所領鼓而進合圍數重田子撫慰士卒曰諸君捐親戚棄墳墓出矢石之間正希今日耳封侯之業其在此乎乃棄糧毀舍躬勒士卒前後奮擊所向摧陷所領江東勇士便習短兵鼓譟奔之賊衆一時潰散所殺萬餘人得泓偽乘輿服御高祖表言曰參征虜軍事振武將軍扶風太守沈田子率領徑鋭背城電激身先士卒勇冠戎陳奮寡對衆所向必摧自辰及未斬馘千數泓喪旗棄衆奔還霸西咸陽空盡義徒四合清蕩餘燼勢在跂踵天子慰勞高祖曰逋寇阻隘晏安假日舉斧函谷規延王誅羣師勤王將離寒暑公躬秉鈇鉞稜威首塗戎輅載脂則郊壘疊卷崤陝甫踐則潼塞開扃姚泓窘逼棄城送死藍田偏師覆之霸川甲首成林俘獲蔽野偽首奔迸華戎雲集積紀逋寇旦夕夷殄長安既平高祖燕于文昌殿舉酒賜田子曰咸陽之平卿之功也即以咸陽相賞田子謝曰咸陽之平此實聖略所振武臣效節田子何力之有即授咸陽始平二郡太守大軍既還桂陽公義真留鎮長安以田子為安西中兵參軍龍驤將軍始平太守時佛佛來寇田子與安西司馬王鎮惡俱出北地禦之初高祖將還田子及傅弘之等並以鎮惡家在關中不可保信屢言之高祖高祖曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳勿復多言及俱出北地論者謂鎮惡欲盡殺諸南人以數千人送義真南還因據關中反叛田子與弘之謀矯高祖令誅之併力破佛佛安關中然後南還謝罪田子宗人沈敬仁驍果有勇力田子於弘之營內請鎮惡計事使敬仁於坐殺之率左右數十人自歸義真長史王修收殺田子於長安倉門外是歲義熙十四年正月十五日也時年三十六田子初以功應封因此事寢高祖表天子以田子卒發狂易不深罪也無子弟林子以第二子亮為後亮字道明清操好學善屬文未弱冠州辟從事會稽太守孟顗在郡不法亮糾劾免官又言災異轉西曹主簿時三吳水淹穀貴民飢刺史彭城王義康使立議以救民急亮議以東土災荒民凋穀踊富民蓄米日成其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆勒使糶貨為制平價此所謂常道行於百世權宜用於一時也又緣淮歲豐邑富地穰麥既已登黍粟行就可析其估賦仍就交市三吳飢民即以貸給使強壯轉運以贍老弱且酒有喉脣之利而非餐餌所資尤宜禁斷以息遊費即並施行世祖出鎮歷陽行參征虜軍事民有盜發冢者罪所近村民與符伍遭劫不赴救同坐亮議曰尋發冢之情事止竊盜徒以侵亡犯死故同之嚴科夫穿掘之侶必銜枚以晦其迹劫掠之黨必歡呼以威其事故赴凶赫者易應潛密者難且山原為無人之鄉丘壟非塗所踐至於防救不得比之村郭督實劾名理與劫異則符伍之坐居宜降矣又結罰之科雖有同符伍之限而無遠近之斷夫冢無村界當以比近坐之若不域之以界則數步之內與十里之外便應同罹其責防民之禁不可頓去止非之憲宜當其律愚謂相去百步內赴告不時者一歲刑自此以外差不及罰又啓太祖陳府事曰伏見西府兵士或年幾八十而猶伏隸或年始七歲而已從役衰耗之體氣用湮微兒弱之軀肌膚未實而使伏勤昏稚騖苦傾晚於理既薄為益實輕書制休老以六十為限役少以十五為制若力不周務故當粗存優減詔曰前已令卿兄改革尋值遷回竟是不施行耶今更勑西府也時營創城府功課嚴促亮又陳之曰經始城宇莫非造創基築既廣夫課又嚴不計其勞苟務其速以歲月之事求不日之成比見役人未明上作閉鼓乃休呈課既多理有不逮至於息日拘備關限方涉暑雨多有死病頃日所承亦頗有逃逸竊惟此既內藩事殊外鎮撫蒞之宜無繫早晚若得少寬其工課稍均其優劇徒隸既苦易以悅加考其卒功廢闕無幾臣聞不居其職不謀其事庖割有主尸不越樽豈臣疏小所當預議但臣泳恩歲厚服義纍世苟是所懷忘其常體詔答曰啓之甚佳此亦由來常患比屢敕之猶復如此甚為無理近復令孟休宣旨想當不同卿比可密觀其優劇也始興王濬臨揚州復為主簿秣陵令善擲姦伏有非必禽太祖稱其能入為尚書都官郎襄陽地接邊關江左來未有皇子重鎮元嘉二十二年世祖出為撫軍將軍雍州刺史天子甚留心以舊宛比接二關咫尺崤陝蓋襄陽之北扞且表𩹉強蠻盤帶疆埸以亮為南陽太守加揚武將軍邊蠻畏服皆納賦調有數村狡猾亮悉誅之遣吏巡行諸縣孤寡老疾不能自存者皆就蠲養耆年老齒歲時有餼時儒學崇建亮開置庠序訓授生徒民多發冢并婚嫁違法皆嚴為條禁郡界有古時石堨蕪廢歲久亮籤世祖修治之曰施生興業首教農畝立民崇政訓本播穡故能殷邦康俗禮節用成頃北洛侵蕪南宛雕毀獫狁肆凶犬夷充疆遠肅烽驛近虞郊閈遂使沃衍弗井巨防莫修窘力輟耕闕於分地凶荒無待流冗及今禮化孚內威禁清外斯實去盜修畎昭農緒稼之時弘圖廣務拓土祈年之日殿下降心育物振民復古且方提封榛棘綏入殊荒竊見郡境有舊石堨區野腴潤實為神臯而蕪決稍積久廢其利凡管所見謂宜創立昔文翁守官起沃成産偉連撫民開奧增業惠昭二邦庸列兩漢雖效政圖功不見所絶聯事惟忝憂同職同又修治馬人陂民獲其利在任四年遷南譙王義宣司空中兵參軍詔曰陝西心膂須才故授卿此職隨王誕鎮襄陽復為後軍中兵領義成太守亮蒞官清約為太祖所嘉賜以車馬服玩前後纍積每遠方貢獻絶國勳器輒班賚焉又賜書二千卷二十七年卒官時年四十七所著詩賦頌讚三言誄哀辭祭告請雨文樂府挽歌連珠教記白事箋表籤議一百八十九首林子字敬士田子弟也少有大度年數歲隨王父在京口王恭見而奇之曰此兒王子師之流也與衆人共見遺寶咸爭趨之林子直去不顧年十三遇家禍時雖逃竄而哀號晝夜不絶聲王母謂之曰汝當忍死強視何為空自殄絶林子曰家門酷橫無復假日之心直以至讎未復故且苟存耳一門既陷妖黨兄弟並應從誅逃伏草澤常慮及禍而沈預家甚強富志相陷滅林子與諸兄晝藏夜出即貨所居宅營墓葬父祖諸叔凡六喪儉而有禮時生業已盡老弱甚多東土飢荒易子而食外迫國網內畏強讎沈伏山草無所投厝時孫恩屢出會稽諸將東討者相續劉牢之高素之放縱其下虜暴縱橫獨高祖軍政嚴明無所侵犯林子乃自歸曰妖賊擾亂僕一門悉被驅逼父祖諸叔同罹禍難猶復偷生天壤者正以仇讎未復親老漂寄耳今日見將軍伐惡旌善是有道之師謹率老弱歸罪請命因流涕哽咽三軍為之感動高祖甚奇之謂曰君既是國家罪人強讎又在鄉里唯當見隨還京可得無恙乃載以別船遂盡室移京口高祖分宅給焉博覽衆書留心文義從高祖剋京城進平都邑時年十八身長七尺五寸沈預慮林子為害常被甲持戈至是林子與兄田子還東報讎五月夏節日至預正大集會子弟盈堂林子兄弟挺身直入斬預首男女無長幼悉屠之以預首祭父祖墓仍為本郡所命劉毅又板為冠軍參軍並不就林子以家門荼蓼無復仕心高祖敦逼至彌年不起及高祖為揚州辟為從事謂曰卿何由遂得不仕頃年相申欲令萬物見卿此心耳固辭不得已然後就職領建熙令封資中縣五等侯時年二十一義熙五年從伐鮮卑行參鎮軍軍事大軍於臨朐交戰賊遣虎班突騎馳軍後林子率精勇東西奮擊皆大破之慕容超退守廣固復與劉敬宣攻其西隅廣固既平而盧循奄至初循之下也廣固未拔循潛遣使結林子及宗人叔長林子即密白高祖叔長不以聞反以循旨動林子叔長素驍果高祖以超未平隱之還至廣固乃誅叔長謂林子曰昔魏武在官渡汝兗之士多懷二心唯李通獨斷大義古今一也循至蔡洲貴遊之徒皆議遠徙唯林子請移家京邑高祖怪而問之對曰耿純盡室從戎李典舉宗居魏林子雖才非古人實受恩深重高祖稱善久之林子時領別軍於石頭屢戰摧寇循每戰無功乃偽揚聲當悉衆於白石步上而設伏於南岸故大軍初起白石留林子與赤特斷拒查浦林子乃進計曰此言妖詐未必有實宜深為之防高祖曰石頭城險且淮柵甚固留卿在後足以守之大軍既去賊果上赤特將擊之林子曰賊聲往白石而屢來挑戰其情狀可知矣賊養鋭待期而吾衆不盈二旅難以有功今距守此險足以自固若賊偽計不立大軍尋反君何患焉赤特曰今賊悉衆向白石留者必皆羸老以鋭卒擊之無不破也便鼓躁而出賊伏兵齊發赤特軍果敗棄軍奔北岸林子率軍收赤特散兵進戰摧破之徐道覆乃更上鋭卒沿塘數里林子策之曰賊沿塘結陳戰者不過一隊今我據其津而厄其要彼雖鋭師數里不敢過而東必也於是乃斷塘而鬬久之會朱齡石救至與林子并勢賊乃散走大軍至自白石殺赤特以殉以林子參中軍軍事從征劉毅轉參太尉軍事十一年復從討司馬休之高祖每征討林子輒摧鋒居前雖有營部至於宵夕輒勑還內侍賊黨郭亮之招集蠻衆屯據武陵武陵太守王鎮惡出奔林子率軍討之斬亮之於七里澗納鎮惡武陵既平復討魯軌於石城軌棄衆奔襄陽復追躡之襄陽既定權留守江陵十二年高祖領平北將軍林子以太尉參軍復參平北軍事其冬高祖伐羌復參征西軍事悉署三府中兵加建武將軍統軍為前鋒從汴入河時襄邑降人董神虎有義兵千餘人高祖欲綏懷初附即板為太尉參軍加揚武將軍領兵從戎林子率神虎攻倉垣剋之神虎伐其功徑還襄邑林子軍次襄邑即殺神虎而撫其衆時偽建威將軍河北太守薛帛先據解縣林子至馳往襲之帛棄軍奔關中林子收其兵糧偽并州刺史河東太守尹昭據蒲坂林子於陝城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽東平公姚紹爭據潼關林子謂道濟曰今蒲坂城堅池深不可旬日而剋攻之則士卒傷守之則引日久不如棄之還援潼關且潼關天阻所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力爭之若潼關事捷尹昭可不戰而服道濟從之既至紹舉關右之衆設重圍圍林子及道濟鎮惡等時懸師深入糧輸艱遠三軍疑阻莫有固志道濟議欲渡河避其鋒或欲棄捐輜重還赴高祖林子按劍曰相公勤王志清六合許洛已平關右將定事之濟否所係前鋒今捨已捷之形棄垂成之業大軍尚遠賊衆方盛雖欲求還豈可復得下官受命前驅誓在盡命今日之事自為將軍辦之然二三君子或同業艱難或荷恩罔極以此退撓亦何以見相公旗鼓耶塞井焚舍示無全志率麾下數百人犯其西北紹衆小靡乘其亂而薄之紹乃大潰俘虜以千數悉獲紹器械資實時諸將破賊皆多其首級而林子獻捷書至每以實聞高祖問其故林子曰夫王者之師本有征無戰豈可復增張虛獲以自夸誕國淵以事實見賞魏尚以盈級受罰此亦前事之師表後乘之良轍也高祖曰乃所望於卿也初紹退走還保定城留偽武衛將軍姚鸞精兵守嶮林子銜枚夜襲即屠其城劓鸞而坑其衆高祖賜書曰頻再破賊慶快無譬既屢摧破想不復久耳紹復遣撫軍將軍姚讚將兵屯河上絶水道讚壘塹未立林子邀擊連破之讚輕騎得脫衆皆奔散紹又遣長史領軍將軍姚伯子寧朔將軍安鸞護軍姚默騾平遠將軍河東太守唐小方率衆三萬屯據九泉憑河固險以絶糧援高祖以通津阻要兵糧所急復遣林子爭據河源林子率太尉行參軍嚴綱竺靈秀卷甲進討纍戰大破之即斬伯子默騾小方三級所俘馘及驢馬器械甚多所虜獲三千餘人悉以還紹使知王師之弘兵糧兼儲三軍鼓行而西矣或曰彼去國遠鬬其鋒不可當林子白高祖曰姚紹氣蓋關右而力以勢屈外兵屢敗衰亡協兆但恐凶命先盡不得以釁齊斧耳尋紹疽發背死高祖以林子言驗乃賜書曰姚紹忽死可謂天誅於是讚統後事鳩集餘衆復襲林子林子率師禦之旗鼓未交一時披潰讚輕騎遁走既連戰皆捷士馬旌旗甚盛高祖賜書勸勉并致縑帛肴漿高祖至閿鄉姚泓掃境內之民屯兵嶢柳時田子自武關北入屯軍藍田泓自率大衆攻之高祖慮衆寡不敵遣林子步自秦嶺以相接援比至泓已摧破兄弟復共追討泓乃舉衆奔霸西田子欲窮追進取長安林子止之曰往取長安如指掌耳復剋賊城便為獨平一國不賞之功也田子乃止復參相國事總任如前林子威聲遠聞三輔震動關中豪右望風請附西州人李焉等並求立功孫妲羌雜夷及姚泓親屬盡相率歸林子高祖以林子綏略有方頻賜書褒美并令深慰納之長安既平殘羌十餘萬口西奔隴上林子追討至寡婦水轉鬬達于槐里剋之俘獲萬計大軍東歸林子領水軍於石門以為聲援還至朝議欲授以一州八郡高祖器其才智不使出也故出仕以來便管軍要自非戎車所指未嘗外典焉後太祖出鎮荊州議以林子及謝晦為蕃佐高祖曰吾不可頓無二人林子行則晦不宜出乃以林子為西中郎中兵參軍領新興太守林子思議弘深有所陳畫高祖未嘗不稱善大軍還至彭城林子以行役既久士有歸心深陳事宜并言聖王所以戒慎祗肅非以崇威立武實乃經國長民宜廣建蕃屏崇嚴宿衛高祖深相酬納俄而謝翼謀反高祖歎曰林子之見何其明也太祖進號鎮西隨府轉加建威將軍河東太守時高祖以二虜侵擾復欲親戎林子固諫高祖答曰吾輒當不復自行高祖踐阼以佐命功封漢壽縣伯食邑六百戶固讓不許傅亮與林子書曰班爵疇勳歷代常典封賞之發簡自帝心主上委寄之懷實參休否誠心所期同國榮戚政復是卿諸人共弘建內外耳足下雖存挹退豈得獨為君子邪除府咨議參軍將軍太守如故尋召暫下以中兵局事副録事參軍王華上以林子清公勤儉賞賜重疊皆散於親故家無餘財未嘗問生産之事中表孤貧悉歸焉遭母憂還東葬乘輿躬幸信使相望葬畢詔曰軍國多務內外須才前鎮西咨議建威將軍河東太守沈林子不得遂其情事可輔國將軍起林子固辭不許賜墨詔朔望不復還朝每軍國大事輒詢問焉時領軍將軍謝晦任當國政晦每疾寧輒攝林子代之林子居喪至孝高祖深相憂愍頃之有疾上以林子孝性不欲使哭泣減損逼與入省日夕撫慰敕諸公曰其至性過人卿等數慰視之小差乃出上尋不豫被敕入侍醫藥會疾動還外永初三年薨時年四十六羣公知上深相矜重恐以實啓必有損慟每見呼問輒答疾病還家或有中旨亦假為其答高祖尋崩竟不知也賜東園祕器朝服一具衣一襲錢二十萬布二百匹詔曰故輔國將軍沈林子器懷真審忠績允著才志未遂傷悼在懷可追贈征虜將軍有司率常典也元嘉二十五年諡曰懷伯林子簡泰廉靖不交接世務義讓之美著於閨門雖在戎旅語不及軍事所著詩賦贊三言針祭文樂府表箋書記白事啓事論老子一百二十一首太祖後讀林子集歎息曰此人作公應繼王太保子邵嗣邵字道輝美風姿涉獵文史襲爵駙馬都尉奉朝請太祖以舊恩召見入拜便流涕太祖亦悲不自勝會強弩將軍缺上詔録尚書彭城王義康曰沈邵人身不惡吾與林子周旋異常可以補選事見宋文帝中詔於是拜強弩將軍出為鍾離太守在郡有惠政夾淮人民慕其化遠近莫不投集郡先無市時江夏王義恭為南兗州啓太祖置立焉事見宋文帝中詔義恭又啓太祖曰盱眙太守劉顯真求自解説邵往蒞任有績彰於民聽若重授盱眙足為良二千石上不許曰其願還經年方復作此流遷必當大罔罔也事見宋文帝中詔上敕州辟邵弟亮邵以從弟正蚤孤乞移恩於正上嘉而許之在任六年入為衡陽王義季右軍中兵參軍始興王濬初開後軍府又為中兵義季在江陵安西府中兵久缺啓太祖求人上答曰稱意才難得沈邵雖未經軍事既是腹心作鍾離郡及在後軍府房中甚修理或欲遣之其事不果事見宋文帝中詔入為通直郎時上多行幸還或侵夜邵啓事陳論即為簡出前後密陳政要上皆納用之深相寵待晨夕兼侍每出遊或敕同輦時車駕祀南郊特詔邵兼侍中負璽代真官陪乘大將軍彭城王義康出鎮豫章申謨為中兵參軍掌城防之任廬陵王紹為江州以邵為南中郎府録事參軍行府州事事未行會謨丁艱邵代謨為大將軍中兵加寧朔將軍事見宋文帝中詔邵南行上遂相任委不復選代仍兼録事領城局後義康被廢邵改為廬陵王紹南中郎參軍將軍如故義康徙安成邵復以本號為安成相在郡以寬和恩信為南土所懷郡民王孚有學業志行見稱州里邵蒞任未幾而孚卒邵贈以孝廉板教曰前文學主簿王孚行潔業淳棄華息競志學修道老而彌篤方授右職不幸暴亡可假孝廉檄薦以特牲緬想延陵以遂本懷邵慰恤孤老勸課農桑前後纍蒙賞賜邵疾病使命纍續遣御醫上藥異味遠珍金帛衣裘相望不絶元嘉二十六年卒時年四十三上甚相痛悼子侃嗣官至山陽王休祐驃騎中兵參軍南沛郡太守侃卒子整應襲爵齊受禪國除璞字道真林子少子也童孺時神意間審有異於衆太祖問林子聞君小兒器質不凡甚欲相識林子令璞進見太祖奇璞應對謂林子曰此非常兒年十許歲智度便有大成之姿好學不倦善屬文時有憶識之功尤練究萬事經耳過目人莫能欺之居家精理姻族資賴弱冠吳興太守王韶之再命不就張邵臨郡又命為主簿除南平王左常侍太祖引見謂曰吾昔以弱年出蕃卿家以親要見輔今日之授意在不薄王家之事一以相委勿以國官乖清塗為罔罔也元嘉十七年始興王濬為揚州刺史寵愛殊異以為主簿時順陽范曄為長史行州事曄性頗疏太祖召璞謂曰神畿之政既不易理濬以弱年臨州萬物皆屬耳目賞罰得失特宜詳慎范曄性疏必多不同卿腹心所寄當密以在意彼雖行事其實委卿也璞以任遇既深乃夙夜匪懈其有所懷輒以密啓每至施行必從中出曄正謂聖明留察故深更恭慎而莫見其際也在職八年神州大治民無謗黷璞有力焉二十二年范曄坐事誅于時濬雖曰親覽州事一以付璞太祖從容謂始興王曰沈璞奉時無纖介之失在家有孝友之稱學優才贍文義可觀而沈深守靜不求名譽甚佳汝但應委之以事乃宜引與晤對濬既素加賞遇又敬奉此旨璞嘗作舊宮賦久而未畢濬與璞疏曰卿常有速藻舊宮何其淹耶想行就耳璞因事陳答辭義可觀濬重教曰卿沈思淹日向聊相敦問還白斐然遂兼紙翰昔曹植有言下筆成章良謂逸才贍藻誇其辭説以今況之方知其信執省躊躇三復不已吾遠慚楚元門盈申白之賓近愧梁孝庭列枚馬之客欣恧交至諒唯深矣薄因末牘以代一面又與主簿顧邁孔道存書曰沈璞淹思踰歲卿研慮數旬瓌麗之美信同在昔向聊問之而還答纍翰辭藻豔逸致慰良多既欣股肱備此髦楚還慚豫躬無德而稱復裁少字宣志於璞聊因尺紙使卿等具知厥心此書真本猶存濬年既長璞固求辭事上雖聽許而意甚不悅以璞為濬始興國大農尋除秣陵令時天下殷實四方輻輳京邑二縣號為難治璞以清嚴制下端平待物姦吏斂手猾民知懼其閭里少年博徒酒客或財利爭鬬妄相誣引前後不能判者璞皆知其名姓及巧詐緣由探擲是非各標證據或辨甲有以知乙或驗東而西事自顯莫不厭伏有如神明以疾去職太祖厚加存問賞賜甚厚濬出為南徐州謂璞曰濬既出蕃卿故當臥而護之與濬詔曰沈璞纍年主簿又經國卿雖未嘗為行佐今故當正參軍耶若爾正當署餘曹兼房住不爾便宜行佐正署中兵恐於選體如不多耳事見宋文帝中詔乃為正佐俄遷宣威將軍盱眙太守時王師北伐彭汴無虞璞以強寇對陳事未可測郡首淮隅道當衝要乃修城壘浚重隍聚材石積鹽米為不可勝之算衆咸不同朝旨亦謂為過俄而賊大越逸索虜大帥託跋燾自率步騎數十萬陵踐六州京邑為之騷懼百守千城莫不奔駭腹心勸璞還京師璞曰若賊大衆不盻小城故無所懼若肉薄來攻則成禽也諸君何嘗見數十萬人聚在一處而不敗者昆陽合淝前事之明驗此是吾報國之秋諸君封侯之日衆既見璞神色不異老幼在焉人情乃定收集得二千精手謂諸將曰足矣但恐賊不過耳賊既濟淮諸軍將帥毛熙祚胡崇之臧澄之等為虜所覆無不殄盡唯輔國將軍臧質挺身走收散卒千餘人來向城衆謂璞曰若不攻則無所事衆若其來也城中止可容見力耳地狹人多鮮不為患且敵衆我寡人所共知雖云攻守不同故當粗量強弱知難而退亦用兵之要若以質衆法能退敵完城者則全功不在我若宜避賊歸都會資舟楫則更相蹂踐正足為患今閉門勿受不亦可乎璞嘆曰不然賊不能登城為諸君保之舟楫之計固已久息賊之殘害古今之未有屠剝之刑衆所共見其中有福者不過得驅還北國作奴婢耳彼雖烏合寧不憚此耶所謂同舟而濟胡越不患異心也今人多則退速人少則退遲吾寧欲專功緩賊乎乃命開門納質質見城隍阻固人情輯和鮭米豐盛器械山積大喜衆皆稱萬歲及賊至四面蟻集攻城璞與質隨宜應拒攻守三旬殄其太半燾乃遁走有議欲追之者璞曰今兵士不多又非素附雖固守有餘未可以言戰也但可整舟艫示若欲渡岸者以速其走計不須實行咸以為然臧質以璞城主使自上露板璞性謙虛推功於質既不自上質露板亦不及焉太祖嘉璞功效遣中使深相褒美太祖又別詔曰近者險急老弱殊當憂迫耶念卿爾時難為心想百姓流轉已還此遣部運尋至委卿量所贍濟也始興王濬亦與璞書曰狡虜狂凶自送近服偽將即斃酋長傷殘實天威所喪卿諸人忠勇之效也吾式遏無素致境蕪民瘠負乘之愧允當其責近乞退謝愆不蒙垂許故以報卿宣城太守王僧達書與璞曰足下何如想館舍平安士馬無恙離析有時音旨無日憂詠沈吟增其勞望間者獯獫扈橫掠剝邊鄙郵販絶塵坰介靡達瞻江盻淮眇然千里吾聞涇陽梗棘伊滑荐遁鳥集絃絶患深自古承知乃昔寇苦城境勝胄朝餐伍甲宵舍烽鼓交警羽鏑驟合而足下砥兵礪伍總厲豪彥師請一奮氓無二情遂能固孤城覆嚴對陷死地覿生光古之田孫何以尚茲商驛始通粗知梗概崇讚膽智嘉賀文猛甚善甚善吾近以戎暴橫斥規效情命收龜落簪星舍京里既獲遄至胡馬卷迹支離霑德復繼前緒行葦之歡實協初慮但乖塗重隔顧增慨涕比疾臥憂委兼疊裁書送想無斁久懷徵還淮南太守賞賜豐厚日夕宴見朝士有言璞功者上曰臧質姻戚又年位在前盱眙元功當以歸之沈璞每以謙自牧唯恐賞之居前此士燮之意也時中書郎缺尚書令何尚之領吏部舉璞及謝莊陸展事不行事見文帝中詔凡中詔今悉在臺猶法書典書也三十年元凶弒立璞乃號泣曰一門蒙殊常之恩而逢若斯之運悠悠上天此何人哉日夜憂歎以至動疾會二凶逼令送老弱還都璞性篤孝尋聞尊老應幽執輒哽咽不自勝疾遂增篤不堪遠迎世祖義軍至界首方得致身先是琅邪顏竣欲與璞交不酬其意竣以致恨及世祖將至都方有讒説以璞奉迎之晚橫罹世難時年三十八所著賦頌讚祭文誄七弔四五言詩箋表皆遇亂零失今所餘詩筆雜文凡二十首璞有子曰約伯玉字德潤虔子子也溫恭有行業能為文章少除世祖武陵國侍郎轉右常侍南中郎行參軍自國入府以文義見知文章多見世祖集世祖踐阼除員外散騎郎不拜左衛顏竣請為司馬出補句容令在縣有能名復為江夏王義恭太宰行參軍與奉朝請謝超宗何法盛校書東宮復為餘姚令還為衛尉丞世祖舊臣故佐普皆升顯伯玉自守私門朔望未嘗問訊顏師伯戴法興等並有蕃邸之舊一不造問由是官次不進上以伯玉容狀似畫圖仲尼像常呼為孔丘舊制車駕出行衛尉丞直門常戎服張永謂伯玉曰此職乖卿志王景文亦與伯玉有舊常陪輦出指伯玉白上孔丘奇形容上於是特聽伯玉直門服玄衣出為晉安王子勛前軍行參軍侍子勛讀書隨府轉鎮軍行佐前廢帝時王景文領選謂子勛典籤沈光祖曰鄧琬一旦為長史行事沈伯玉先帝在蕃佐今猶不改民生定不應佳戴法興聞景文此言乃轉伯玉為參軍事子勛初起兵轉府功曹及即偽位以為中書侍郎初伯玉為衛尉丞太宗為衛尉共事甚美及子勛敗伯玉下獄見原猶以在南無誠被責除南臺御史尋轉武陵國詹事又轉大農母老解職貧薄理盡間臥一室自非弔省親舊不嘗出門司徒袁粲司空褚淵深相知賞選為永世令轉在永興皆有能名後廢帝元徽三年卒時年五十七伯玉性至孝奉親有聞未嘗妄取於人有物輒散之知故溫雅有風味和而能辨與人共事皆為深交弟仲玉泰始末為寧朔長史蜀郡太守益州刺史劉亮卒仲玉行府州事巴西李承明為亂仲玉遣司馬王天生討平之廢帝詔以為安成王撫軍中兵參軍加建威將軍沈攸之請為征西咨議未拜卒史臣年十三而孤少頗好學雖棄日無功而伏膺不改常以晉氏一代竟無全書年二十許便有撰述之意泰始初征西將軍蔡興宗為啓明帝有勑賜許自此迄今年逾二十所撰之書凡一百二十卷條流雖舉而採掇未周永明初遇盜失第五帙建元四年未終被勑撰國史永明二年又忝兼著作郎撰次起居注自茲王役無睱搜撰五年春又被勑撰宋書六年二月畢功表上之曰臣約言臣聞大禹刊木事炳虞書西伯戡黎功煥商典伏惟皇基積峻帝烈弘深樹德往朝立勳前代若不觀風唐世無以見帝媯之美自非覩亂秦餘何用知漢祖之業是以掌言未記爰動天情曲詔史官追述大典臣實庸妄文史多闕以茲不才對揚盛旨是用夕惕載懷忘其寢食者也臣約頓首死罪竊惟宋氏南面承歷統天雖世窮八主年減百載而兵車亟動國道屢屯垂文簡牘事數繁廣若夫英主啓基名臣建績拯世夷難之功配天光宅之運亦足以勒銘鍾鼎昭被方策及虐后暴朝前王罕二國釁家禍曠古未書又可以式規萬葉作鑒于後宋故著作郎何承天始撰宋書草立紀傳止於武帝功臣篇牘未廣其所撰志唯天文律歷自此外悉委奉朝請山謙之謙之孝建初又被詔撰述尋值病亡仍使南臺待御史蘇寶生續造諸傳元嘉名臣皆其所撰寶生被誅大明中又命著作郎徐爰踵成前作爰因何蘇所述勒為一史起自義熙之初訖于大明之末至於臧質魯爽王僧達諸傳又皆孝武所造自永光以來至於禪讓十餘年內闕而不續一代典文始末未舉且事屬當時多非實録又立傳之方取捨乖衷進由時旨退傍世情垂之方來難以取信臣今謹更創立製成新史始自義熙肇號終於升明三年桓玄譙縱盧循馬魯之徒身為晉賊非關後代吳隱謝混郗僧施義止前朝不宜濫入宋典劉毅何無忌魏詠之檀憑之孟昶諸葛長民志在興復情非造宋今並刊除歸之晉籍臣遠愧南董近謝遷固以閭閻小才述一代盛典屬辭比事望古慚良鞠躬局蹐靦汗亡厝本紀列傳繕寫已畢合七帙七十卷臣今謹奏呈所撰諸志須成續上謹條目録詣省拜表奉書以聞臣約誠惶誠恐頓首頓首死罪死罪
