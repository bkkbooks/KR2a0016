  - {type: variant, offset: 10969, length: 0, content: '', WYG: 宋書卷五宋書卷五考證文帝紀以吐谷渾慕容延為平東將軍平東各本皆訛東平今據下文十五年作平東將軍及鮮卑傳改正慕容延鮮卑傳作慕延以大沮渠茂䖍為征西大將軍凉州刺史茂䖍魏書作牧犍婆皇國遣使獻方物婆夷蠻傳作媻皇監本誤黃許慎說文有媻字徐鉉云媻俗作婆若婆皇國屢獻方物自文帝十七年以後其字皆作皇不應此年獨用黃字今改正豫章胡誕世反誕諸本皆訛延今據彭城王義康傳及胡藩傳改正安不忘虞經世之所同虞一本作危當因挍獵隸武講事隸當作肄史臣論難結商竪商一本作凶宋書卷五考證}
