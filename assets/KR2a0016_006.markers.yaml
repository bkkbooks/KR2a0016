  - {type: variant, offset: 10594, length: 0, content: '', WYG: 宋書卷六宋書卷六考證孝武帝紀以寧朔將軍劉季之為司州刺史季監本誤秀臣承蒼按季之遷寧朔將軍益州刺史在孝建之初大眀二年以寧朔將軍為司州刺史次年反叛被誅特以字形相近遂致訛舛今改雍州刺史海陵王休茂殺司馬庾深之舉兵反義成太守薛繼考討斬之臣承蒼按休茂傳薛繼考乃為休茂盡力之人此於帝紀忽以討休茂之功歸之何一書之中互相悖謬至此南史載參軍尹元慶起義討之傳首建鄴殆是其實宋書卷六考證}
