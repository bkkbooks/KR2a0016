  - {type: variant, offset: 3082, length: 0, content: '', WYG: 宋書卷七宋書卷七考證前廢帝紀二月丁丑减州郡縣田租之半租監本訛祿今改正以尚書左僕射顔師伯為尚書僕射一本上尚書下無左字下尚書下有左字臣承蒼按二本俱誤據師伯傳當云以尚書右僕射顔師伯為尚書左僕射下文云王景文為尚書右僕射替師伯之任也丁未皇子生少府劉勝之子也劉勝南史作劉矇符瑞志大明七年有尋陽太守劉矇或即其人其後湘東王紹位果文帝子也故帝聚諸叔京邑慮在外為患臣承蒼按上二句當在故帝聚諸叔二句下宋書卷七考證}
