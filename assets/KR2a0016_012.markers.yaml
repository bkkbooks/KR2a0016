  - {type: variant, offset: 13768, length: 0, content: '', WYG: 宋書卷十二宋書卷十二考證歴志上甲寅紀第六交㑹差率十四萬八百五十九監本率下誤注闕字今從南本删滿氣法從小餘滿紀法從大餘滿紀下監本脱法字今從南本增入推卦用事日此條當提起另作一行其冬下旬夕在張心暑也臣永祚按句内必有誤字今莫可考推合朔交㑹月蝕入遲疾歴術以通周去之周諸本俱訛界今改正清明注胃一半監本脱半字今增入小滿危太弱危監本誤作亢今改正以日所在為正正監本訛作求今改正伏不盡度盡監本訛作書今改正秦氏乃稱水德理非謬然斯則劉氏所證為不値矣臣永祚按値當作直賈誼取秦云漢土德葢以是漢代秦葢諸本皆訛益今改正以字當在是字下七十五為室分臣永祚按室分即元嘉歴法所云度起室二也宋書卷十二考證}
