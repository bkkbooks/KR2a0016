  - {type: variant, offset: 17863, length: 0, content: '', WYG: 宋書卷十三宋書卷十三考證厯志下日法七百五十二臣永祚按周日日餘與周虛竝即日法法與景初同而數不同大抵元嘉設數減於景初求次月加大餘二十九加監本誤作如今改正不滿限數間數者皆以算上為日監本脱限字今增二十四氣日所度臣永祚按所下疑脱一在字昴九注少少字下監本有一四字衍文今刪晨見東方去日十五度半強監本日字誤在度字下今改正十八日行二十四度監本脱日行二字今增請臺勅漏郎將考騐施用從之勅諸本俱訛勒今改正元法五十九萬二千三百六十五二千監本誤作三千今改正宋書卷十三考證}
