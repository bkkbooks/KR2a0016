  - {type: variant, offset: 11320, length: 0, content: '', WYG: 宋書卷十九宋書卷十九考證樂志一以五聲和其性以八音節其流而故謂之樂能移風易俗平心正體焉尋繹文義故字當在樂字下昔有娥氏有二女娥一本作娀者是乃作破斧之哥始為東音臣承蒼按既破我斧又缺我斨周公東征之詩也以此為東音之始可矣乃謂夏后孔甲田於東陽萯山取民間之子為子其後析橑斧斷其足孔甲始作此歌何其荒謬也樂器凡八音諸本誤連前一行今改正宋書卷十九考證}
