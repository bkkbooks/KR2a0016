  - {type: variant, offset: 7639, length: 0, content: '', krp: 宋書卷二十一宋書卷二十一考證樂志三武帝駕六龍詞仙人玉女下来翺㳺翺監本誤朝魏武帝集作遨又正焜煌開王心焜煌魏武帝集作惶惶隨風削之雨削魏武帝集作列武帝厥初生祠過時時来微過時魏武帝集作時過文帝登山而逺望詞衆草之盛茂之魏文帝集作芝武帝蒿里行生民百遺一念之絕人腸絶魏武帝集作斷武帝陌上桑登彼九疑歴王門王門魏武帝集作玉門又絶人事㳺渾元若疾風㳺歘飄飄飄飄魏武帝集作飄翩臣承蒼按作翩字方與上文韻合文帝燕歌行念君客㳺多思腸魏文帝集注多思腸一作思斷腸文帝短歌行曰仁曰壽下曰字魏文帝集作者文帝燕歌行耿耿伏枕不能眠披衣出户歩東西四解展詩清歌聊自寛樂往哀来摧心肝悲風清厲秋氣寒羅幃徐動經秦軒魏文帝集耿耿二句在展詩二句之下又無悲風清厲二句臣承蒼按西讀若先與下寛叶古詩皆然唐以後始入齊韻又飛鳥晨鳴聲氣可憐魏文帝集無氣字武帝短歌行明明如月何時可掇掇諸本皆作輟今從魏武帝集改正本集呦呦鹿鳴四句在此二句之上此二句下又有越陌度阡枉用相存契濶談讌心念舊恩月明星稀烏鵲南飛遶樹三匝何枝可依八句武帝秋胡行韻意中述煩述魏武帝集作迷武帝苦寒行北上太二行二山二艱二哉二何二巍巍臣承蒼按据下五解之例巍巍兩字皆當有疉聲武帝塘上行傍能行儀儀儀儀一本作仁儀文帝善哉行有得者能卒得魏文帝集作徳明帝善哉行虎臣列將怫鬰免怒免一本作充古西門行何能坐愁怫鬰當復来兹一本復下有待字文帝煌煌京洛行淮隂五行烏得弓藏魏文帝集行作刑得作盡武帝歩出夏門行驥老伏歴志在千里魏武帝集驥老作老驥歴作櫪又飬怡之福可得永年怡魏武帝集作恬古豔歌何嘗行上慙滄浪之夫下顧黄口小兒臣承蒼按前東門行云上用倉浪天故下為黄口小兒此夫字亦當作天滄浪言天之色如水也宋書卷二十一考證}
