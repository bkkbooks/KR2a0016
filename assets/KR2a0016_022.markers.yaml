  - {type: variant, offset: 13880, length: 0, content: '', krp: 分宋書卷二十二宋書卷二十二考證樂志四靈芝篇伯瑜年七十采衣以娯親伯瑜一本作伯俞臣照按困學紀聞引陳思王此二語云人但知老萊子之事而不知伯瑜顧老萊子伯瑜是否兩人亦無}
  - {type: variant, offset: 13881, length: 1, content: 分, WYG: 考也孟冬篇鐘擊位無餘曹植集作擊鐘釂無餘碣石篇臣承蒼按此曲辭即前二十一卷所載歩出夏門行四解之一乃魏武帝作芳樹曲妬人之子悲殺人妬一本作如漢第五曲翁離今第五曲舊邦翁晉書作雍臣承蒼按晉鼓吹歌曲内有時運多一篇題曰古􅗙離行􅗙與雍通作翁誤也靈之祥篇呉冦勁勁晉書作叛宣受命篇亮乃震死天下寧死傅集作斃晉書寧上有安字征遼東篇淵既授首淵晉書作公孫傅集同臣承蒼按晉書成於唐太宗避髙祖諱故稱公孫後人校刻傳集復據晉書改竄作淵也宣輔政篇雲澤雨施澤晉書作行景龍飛篇聰鑑𤣥發發字晉書及傅集皆作察平玉衡篇纂成洪業成晉書傅集皆作戎文皇統百揆篇武將鎮四隅諸本俱作武皇鎮四㝢今據晉書傅集改正惟庸蜀篇腹心同獻良圖晉書無同字天序篇天序句應厯受禪句晉書天序歴為一句應受禪為一句仲秋獮田篇鷹揚猶周尚父從天以殺伐晉書無周字又從作順從天道晉書作順天道臣承蒼按沈約仕齊作宋書其後復顯於梁武帝父名順之故凡順字皆改為從其有仍用順字者殆傳寫之誤也從天道篇三時亦講武事亦晉書作示以三時示為句又將如虎惟虓虎晉書如字下有虓字又受兹百祿嘉萬年嘉晉書作夀唐堯篇披圖按先籍有其證靈晉書靈字下有液字臣承蒼按原文當有液字後人疑此二句韻不諧故去一液字以靈字合於上文繩徴矜陵等字為一韻不知古人詩歌凡今庚青部之字皆不與蒸部同用若存此液字則與上句藉字别為一韻更合也秋風曲志士思立功一本複思立功三字君馬篇願為范氏驅雝容歩中畿豈效詭遇子馳騁趣危機臣承蒼按范氏二字疑作範我與下文詭遇相對觀第十曲有所思篇直述孟子為齊卿事可見其用意所在上邪篇上邪下難正衆枉不可矯臣承蒼按漢鼔吹鐃歌其第十二曲曰上邪本無意義邪字大約與耶同是語助辭繆襲傅元盡更其名雖依漢曲次第而辭㫖各殊第十二曲皆不用上邪二字至何承天作直以為上下之上邪正之邪其雍離一篇或作􅗙離亦無意義何承天直以為雍州之雍離合之離首云雍士多離心然則古人作樂府苐各以其意為之非有定式古今樂錄雖言所以製曲之意後之作者亦不盡拘若其音節則益不可攷矣宋書卷二十二考證}
