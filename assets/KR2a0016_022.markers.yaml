  - {type: variant, offset: 13880, length: 0, content: '', WYG: 分宋書卷二十二宋書卷二十二考證樂志四靈芝篇伯瑜年七十采衣以娯親伯瑜一本作伯俞臣照按困學紀聞引陳思王此二語云人但知老萊子之事而不知伯瑜顧老萊子伯瑜是否兩人亦無}
