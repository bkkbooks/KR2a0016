  - {type: variant, offset: 12639, length: 0, content: '', WYG: 宋書卷二十七宋書卷二十七考證符瑞志上龍於是曵尾而逝逝監本作逃今改正孝經中黄䜟曰日載東紀火光不横一聖明聰臣照按日載東者曹也曹古文作􅀢不横一者丕也下文所謂帝之姓諱見圖䜟也然則紀火光自應作絶火光言炎漢亡也堅母生堅夢腸出繞吳昌門生一夲作姙元帝母夏侯妃與琅邪國小史姓牛私通而生元帝王應麟困學紀聞云晉元帝為牛氏子其説始於沈約而魏収島夷傳因之唐貞觀修晉書亦取焉王劭謂沈約喜造竒説以誣前代劉知幾亦以為非而致堂乃謂元帝冐姓司馬過矣魏自黄初至咸熙二年四十六年而禪晉四一夲作三者誤宋書卷二十七考證}
