  - {type: variant, offset: 11953, length: 287, content: 則有此變又曰臣有蔽主明者晉惠帝永興元年十一月黑氣分日晉惠帝光熙元年五月癸巳日散光流如血所照皆赤甲午又如之占曰君道失明晉孝懷帝永嘉元年十一月乙亥黃黑氣掩日所炤皆黃案河圖占曰日薄也其說曰凡日蝕皆於晦朔有不於晦朔者為日薄雖非日月同宿時陰氣盛掩薄日光也占類蝕永嘉二年二月癸卯白虹貫日青黃暈五重占曰白虹貫日近臣不亂則諸侯有兵破亡其地明年司馬越殺繆播等暴蔑人主五年胡破京都帝遂見虜一說王者有兵圍之象永嘉五年三月庚申日散光如血下流所照皆赤日中有若飛灯者晉愍帝建武元年正月庚子白虹彌天三日並照日有重暈左右兩珥占曰白虹兵氣也三四五六日俱出並爭天下兵作王立亦如其數又曰三日並出不過三旬諸侯爭為帝, WYG: ''}
