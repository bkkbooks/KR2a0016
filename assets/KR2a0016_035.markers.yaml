  - {type: variant, offset: 10949, length: 0, content: '', WYG: 宋書卷三十五宋書卷三十五考證州郡志一鄮令漢舊縣鄮諸本作􅀈今從二漢志晉志改正烏傷令此下當有漢舊縣三字寧海令何志漢舊縣按二漢志晉太康地臣承蒼按地字下當有闕文考二漢志俱無寧海未知其所闕者果係何字永初郡國有廣平臣承蒼按此下注凡五十八字舊本顛倒錯亂不成文理今據二漢志晉志改正舊南監本原文云漢二武帝征和子國宣帝五鳳二年改為廣平年立為平併鉅鹿魏分鉅鹿魏郡復為廣光武建武十三年省咸康四年平江左僑立晉成帝省後又立其誤顯然至北監本汲古閣本改漢字下二字為孝刪廣平下一年字復為廣下增一平字則愈䝉混不可考矣今據後漢郡國志云武帝征和二年置為平干國宣帝五鳳二年復故正此注所據之文二字合在征和之下子字乃干字之訛光武事合敘於宣帝之下併鉅鹿三字合在十三年省之下郡字合在僑立下咸康四年合在晉成帝之下孝武大明五年分廣陵為沛郡治肥如縣時無復肥如縣當是肥如故縣䖏也二漢晉太康地志並無肥如縣臣人龍按前廣陵太守下注云肥如本屬遼西晉末遼西僑郡省併廣陵符瑞志亦云元嘉十九年九月戊申廣陵肥如石梁澗中出石鐘九口是雖非二漢遼西之肥如而廣陵固有肥如也乃此䖏則云無復肥如縣又云並無肥如縣一卷之中何不相符乎宋書卷三十五考證}
