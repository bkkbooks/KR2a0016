  - {type: variant, offset: 9300, length: 0, content: '', WYG: 宋書卷三十六宋書卷三十六考證州郡志二南康公相晉武帝太康三年以廬陵南部都尉立臣承蒼按南康郡所領縣復有南康公相或以為疑盖劉茂之初封南康郡公以郡守為相入齊降封南康縣公又以縣令為相此志作於齊時故兩存之耳山茌令漢舊縣屬太山孝武建元年度濟北孝武下當有一孝字平原太守漢髙帝立諸郡皆記去州京都水陸道里此條獨無之當是闕文宋書卷三十六考證}
