  - {type: variant, offset: 7481, length: 0, content: '', WYG: 宋書卷四十宋書卷四十考證百官志下漢百官表秦曰給事黄門無員掌侍從左右漢因之秦監本訛奏今改正太官令一人丞一人臣承蒼按此似宜另爲一條而諸本俱與太醫令相連當因漢時竝屬少府故耶虎賁舊作虎奔言如虎之奔走也王莾輔政以古有勇士孟賁故以奔爲賁臣照按牧誓言武王戎車三百兩虎賁三千人孔安國曰虎賁勇士稱也若虎賁獸言其猛也豈古字亦作奔王莽時改奔爲賁後遂并經文亦改耶抑王莽改奔爲賁之説出於傳訛附㑹也宋書卷四十考證}
