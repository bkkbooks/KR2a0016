  - {type: variant, offset: 4820, length: 0, content: '', WYG: 宋書卷四十六宋書卷四十六考證王懿傳自言漢司徒允弟幽州刺史􅅷七世孫也允諸本誤元今從南史改正張邵傳惟邵情意彌謹意南史作禮自是不復徃來期年而卒來南本作未屬下句臣承蒼按張敷居喪决無與人徃來之事專用一徃字乃指敷伯父茂度徃敷所而言未期年所以傷其卒之速也作未字為是張暢附傳暢字少微臣照按張暢自有傳在五十九卷内不應重見於其兄傳後蓋八書殘缺後人以南北史補者多故每不成史法也暢少與從兄敷演鏡齊名鏡諸本皆作敬前張邵傳亦誤云子敷演敬有名於世今依南史改正不忍彼此不盡不忍南史作不患隊主張榮救之得免臣承蒼按南史作隊主張世營救得免張世即張興世本单名世太宗益為興世其後興世卒張暢子融為負土成墳事見齊書張融傳此當云張世救之得免蓋後人不察張興世之可書張世而誤以營救之營為人名遂改為張榮耳臣穆等按高氏小史臣承蒼按此下七十五字乃後人所増入穆是史官之名高氏小史唐元和中高峻作初六十卷其子逈釐益之為一百二十卷宋史言鄭穆字閎中在館閣三十年嘗編校集賢院書籍當即其人其言此卷非沈約書誠然不特帝稱帝號魏稱魏主與約書體例不合張邵傳首云會稽太守裕之弟也裕乃武帝諱不宜直犯張暢自有傳今重附於張邵傳後尤失㸃檢宋書卷四十六考證}
