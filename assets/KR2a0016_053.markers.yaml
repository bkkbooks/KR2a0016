  - {type: variant, offset: 7570, length: 0, content: '', WYG: 宋書卷五十三宋書卷五十三考證張永傳徙為江夏王義恭太尉中兵參軍太監本訛校今改正庾登之傳子冲遠冲遠南史作仲遠庾炳之傳推此而言則炳之為吏之道定於受命之日矣命南史作勅據此知當時諸府佐吏皆有勅書炳之了不聽納之非為不解直是茍相留耳下一之字南本作此屬下句臣見劉伯寵太慷慨炳之所行寵南史作龍臣照按劉伯寵見王僧䖍帖劉伯龍嘗有鬼笑營利事未知此處應是何人而伯寵伯龍莫定是一是二也謝方明傳頃之孫恩重没會稽没監本誤役一本作没臣承蒼按南史作䧟没字之義與䧟相近今改正宋書卷五十三考證}
