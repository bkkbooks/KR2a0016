  - {type: variant, offset: 3860, length: 0, content: '', WYG: 宋書卷五十六宋書卷五十六考證謝瞻傳吾家素以退為業南史素字在以字下臣承蒼按素業二字乃當時常語蔡興宗傳云以業尚素立見稱即此意也素退是樸素恬退之義當從之靈運父奐奐南史作瑍使瞻與靈運登車便商較人物南史與字下有靈運共車四字謝㬭附傳母為病畏驚微賤過甚一家尊卑感㬭至性咸納屨而行屏氣而語南史驚字下有而字監本母字在為字下又賤字訛作踐今改正孔琳之傳父殿光禄大夫殿南史作廞後辟本國常侍輕之尉輕之二字疑誤史臣論一夫躬稼則餘食委室食一本作飡宋書卷五十六考證}
