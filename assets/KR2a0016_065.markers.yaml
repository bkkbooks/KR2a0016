  - {type: variant, offset: 3754, length: 0, content: '', WYG: 宋書卷六十五宋書卷六十五考證劉道産傳廣州羣盗因刺史謝道欣死為宼劉康祖傳作刺史謝欣道憐加道産振武将軍南討會始興謙之已平廣州臣承蒼按謙之即道産叔父義熙初為始興相此傳叙次不明始興下當有脱孚申恬傳子謨早卒臣承蒼按前云恬兄謨與朱修之守滑臺為虜所執後得叛還此子字當是兄字之訛宋書卷六十五考證}
