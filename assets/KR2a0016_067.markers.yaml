  - {type: variant, offset: 16627, length: 0, content: '', WYG: 宋書卷六十七宋書卷六十七考證謝靈運傳緤賢不策失位誰持迨理屈而愈閉方怨天而懷悲監本失訛夫持訛時迨訛造今據本集改正亦何議於兼求注非缺二字憇止之缺本集作非幽人憇止之鄉得道應湏慧業文人生天當在靈運前成佛必在靈運後臣照按文人應作丈人慧業斷句丈人二字屬下句丈人稱顗也今慧業文人之語遍天下而未察其文理如以文人斷句則陡接生天在靈運前仍復成語耶况南史本作丈人宋書卷六十七考證}
