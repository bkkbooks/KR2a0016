  - {type: variant, offset: 2576, length: 0, content: '', WYG: 宋書卷七十宋書卷七十考證袁淑傳檜稽而起晨壓未陣袁淑本集檜作會臣承蒼按字書稽計也會稽之地亦以會諸侯之計得名應從本集然後天行樞運猋舉煙外外南史作升袁淑本集亦作升太宗初與四方國反兵敗歸降以補劉湛冠軍府主簿劉湛于太祖元嘉十七年被誅太宗時安得為冠軍將軍湛字誤宋書卷七十考證}
