  - {type: variant, offset: 3967, length: 0, content: '', WYG: 宋書卷七十一宋書卷七十一考證徐湛之傳父逹之尚高祖長女㑹稽公主逹之胡藩傳及南史諸傳並作逵之詔曰永興公主一門嫡長臣承蒼按上文稱㑹稽公主臧皇后傳及諸王傳皆稱㑹稽宣公主此詔獨稱永興公主豈先封永興而後乃改封㑹稽歟及長頗渉大義善自位待位待監本作特持今從南史改正門生十餘人皆三吳富人之子十南本作千王僧綽傳從兄徽清介士也臣承蒼按僧綽伯父孺之子名微與僧綽為從昆弟無名徽者微嘗舉吏部郎不就卒贈秘書監有生自華宗身安隱素之詔此云清介士當即其人徽字疑即微字之訛宋書卷七十一考證}
