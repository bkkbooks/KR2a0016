  - {type: variant, offset: 15185, length: 0, content: '', WYG: 宋書卷七十四宋書卷七十四考證臧質傳秃頂拳髪秃南史作頽六書故頽首秃也冗從僕射胡崇之領質府司馬崇之副太子積弩將軍毛熙祚亦受統于質崇之監本作澄之臣龍官按上言胡崇之領質府司馬此言崇之副毛熙祚於文極順不應别作澄之但下文即言使崇之澄之二軍營於山上而本傳之前並未叙出澄之事當有闕文且義宣腹心將佐蔡超民之徒蔡當作竺或超下另有竺超二字兩岸築偃月壘監本岸作圻偃作堰今從南史改正魯爽傳遣爽随永昌王庫仁真向夀陽與弟瑜共破劉祖於尉武臣承蒼按庫仁真當是彼時番語勇健之稱南史侯景傳言勇兼人名為庫真部督當是此義也劉祖諸本並同㨿劉康祖傳劉下應是脱一康字中書郎魯秀志榦列到忠誠久著列到二字不可解林邑國傳亦有檀和之忠果到列之語當繼謀之俱下謀南本作諶謂徐湛之也當從之㑹益州刺史劉秀之遣軍襲江陵秀撃破之監本闕江陵二字今從南本補入宋書卷七十四考證}
