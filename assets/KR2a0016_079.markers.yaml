  - {type: variant, offset: 11816, length: 0, content: '', WYG: 宋書卷七十九宋書卷七十九考證竟陵王誕傳誕又遣一百人出東門攻劉道隆營劉道隆監本誤作劉道産臣承蒼按劉道産卒於元嘉十九年今定作劉道隆是時道隆為徐州刺史率兵未㑹事見本傳之前左右侍直眠中夢人告之曰官須髪為鞘睡既覺已失髻矣南史鞘作矟睡作眊臣承蒼按眊羽毛飾也三國志劉先主性好結眊時有人送犛牛尾手自結之従矟眊為是廬江王褘傳前鄀令王隆伯鄀監本訛郡今改正宋書卷七十九考證}
