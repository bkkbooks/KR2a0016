  - {type: variant, offset: 7441, length: 0, content: '', WYG: 宋書卷八十二宋書卷八十二考證周朗傳訓以書記圖律律一本作緯其國學則宜詳考古數部定子史古一本作占且帝子未官人誰謂賤但宜詳置賔友選擇正人亦何必列長史參軍别駕從事然後為貴哉臣承蒼按周朗所言多切當時之弊而此條尤為顯著宋世帝子甫離襁褓即出為刺史例皆佐吏行事既失教子之方亦非理民之道其後晉安王子勛起兵特由强佐專擅為之而諸藩響應並以齠齓被誅孝武二十八男竟無噍類使能蚤聽朗言其祻豈若是之烈哉宋書卷八十二考證}
