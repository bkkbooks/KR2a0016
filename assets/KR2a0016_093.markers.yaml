  - {type: variant, offset: 8453, length: 0, content: '', WYG: 宋書卷九十三宋書卷九十三考證周續之傳留愛崑卉誠著桃李崑當作昆謂昆蟲也王𢎞之傳為外祖徴士何淮所撫育淮一本作准當作凖陶潛傳曽祖侃晉大司馬臣承蒼按沈約所作陶淵明傳以陶集考之多不合集中贈長沙公詩序有云昭穆既逺己為路人又為孟府君傳有云君諱嘉娶大司馬長沙公陶侃苐十女如果為從祖之子孫不得云昭穆既逺己之曽祖斷不容直書其姓名然則淵明非長沙桓公之曽孫明矣又云自以曽祖晉世宰輔耻復屈身後代自髙祖王業漸隆不復肯仕所著文章皆題其年月義熙以前則書晉氏年號自永初以來惟云甲子而已攷陶詩俱不題年號惟祭程氏妹文稱義熙三年宋髙祖受禪改元永初是為庚申嵗集中詩凡書甲子者八年庚子辛丑癸卯乙巳戊申己酉庚戍丙辰皆在永初之前庚子辛丑癸卯又在義熙之前永初以後除自祭文題丁卯而外無有書甲子者約之紀事失實大槩如此或言梁昭明太子誤讀淵明命子詩遂作淵明傳以淵明為侃之曽孫不知宋書成于齊永明六年昭明特襲之而不改南史晉書成於唐初亦皆襲約之誤者也農人告予以上春上春本集作春及晉書作暮春而窮苦荼毒家貧弊本集作少而窮苦毎以家弊南史作而窮居荼毒無家貧弊三字良獨罔罔罔罔本集作内愧少年來好書本集作少好琴書南史少下無年字潁川韓元長宋王應麟困學紀聞云韓元長謂韓融韶子後漢有傳又下文濟北汜稚春謂汜毓晉書有傳集云范稚春誤今所刻陶集亦作汜稚春王素傳嘗就沙門支僧納學南史學字下有算字宋書卷九十三考證}
