  - {type: variant, offset: 17106, length: 0, content: '', WYG: 宋書卷九十五宋書卷九十五考證索虜傳遣鄭兵將軍揚州刺史山陽公逹奚斤鄭兵魏書作晉兵移鎭長廣之不期城下以固守以功進號前將軍封建陵縣男下一本作􅇪謂竺䕫也臣承蒼按不期當作不其下以固守以功六字當去一以字作䕫以固守功五字劉粹據項城沈狸屯髙橋沈字下當有叔字河南中國多湮没非所南本多字下有故字宜由闗稜威震􅹥􅹥字不見字書疑作殄謂震懾而殄滅之也宋書卷九十五考證}
