  - {type: variant, offset: 11653, length: 0, content: '', WYG: 宋書卷一百宋書卷一百考證自序髙祖深相訓納訓疑當作詶諸軍將帥毛遐祚胡崇之臧證之等臧質傳遐祚作熙祚證之作澄之璞有子曰闕伯玉字徳潤䖍子子也臣承蒼按梁書沈約傳云父淮南太守璞南史約傳前半篇悉依約自序其序璞事後亦云有子曰約是所闕之字即為約字無疑苐約自序于璞有子曰約之後復序伯玉兄弟事忽接云史臣年十三而孤壹似有意錯互其辭令人不可曉者昔裴子野作宋略書云戮淮南太守璞以其不從義師故也約懼徒跣謝罪請两釋焉今約所自序固未必盡實然且下筆羞澀如此廢帝元徽三年廢字上一夲有後字永眀二年又奏兼著作郎撰次起居注自兹王役無暇搜撰五年春又被𠡠撰宋書六年二月畢功表上之臣承蒼按沈約自序宋書成于齊武帝永眀六年今刻本題曰梁沈約撰盖要其終而命之為梁臣非言此書為梁時書也宋書卷一百考證}
