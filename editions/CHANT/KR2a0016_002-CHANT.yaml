body:
  text: 卷二本紀第二武帝中七年正月己未振旅于京師改授大將軍揚州牧給班劍二十人本官悉如故固辭免南北征伐戰亡者並列上賻贈尸喪未反遣主帥迎接致還本土二月盧循至番禺為孫季高所破收餘眾南走劉藩孟懷玉斬徐道覆于始興晉自中興以來治綱大弛權門并兼強弱相凌百姓流離不得保其產業桓玄頗欲釐改竟不能行公既作輔大示軌則豪強肅然遠近知禁至是會稽餘姚虞亮復藏匿亡命千餘人公誅亮免會稽內史司馬休之天子又申前命公固辭於是改授太尉中書監乃受命奉送黃鉞解冀州交州刺史杜慧度斬盧循傳首京師先是諸州郡所遣秀才孝廉多非其人公表天子申明舊制依舊策試征西將軍荊州刺史道規疾患求歸八年四月改授豫州刺史以後將軍豫州刺史劉毅代之毅與公俱舉大義興復晉室自謂京城廣陵功業足以相抗雖權事推公而心不服也毅既有雄才大志厚自矜許朝士素望者多歸之與尚書僕射謝混丹陽尹郗僧施並深相結及西鎮江陵豫州舊府多割以自隨請僧施為南蠻校尉既知毅不能居下終為異端密圖之毅至西稱疾篤表求從弟兗州刺史藩以為副貳偽許焉九月藩入朝公命收藩及謝混並於獄賜死自表討毅又假黃鉞率諸軍西征以前鎮軍將軍司馬休之為平西將軍荊州刺史兗州刺史道憐鎮丹徒豫州刺史諸葛長民監太尉留府事加太尉司馬丹陽尹劉穆之建威將軍配以實力壬午發自京師遣參軍王鎮惡龍驤將軍蒯恩前襲江陵十月鎮惡剋江陵毅及黨與皆伏誅十一月己卯公至江陵下書曰夫去弊拯民必存簡恕捨網修綱雖煩易理江荊彫殘刑政多闕頃年事故綏撫未周遂令百姓疲匱歲月滋甚財傷役困慮不幸生凋殘之餘而不減舊刻剝徵求不循政道宰莅之司或非良榦未能菲躬儉苟求盈給積習生常漸不知改近因戎役來涉二州踐境親民愈見其瘼思欲振其所急卹其所苦凡租稅調役悉宜以見戶為正州郡縣屯田池塞諸非軍國所資利入守宰者今一切除之州郡縣吏皆依尚書定制實戶置臺調癸卯梓材庚子皮毛可悉停省別量所出巴陵均折度支依舊兵運原五歲刑已下凡所質錄賊家餘口亦悉原放以荊州十郡為湘州公乃進督以西陽太守朱齡石為益州刺史率眾伐蜀進公太傅揚州牧加羽葆鼓吹班劍二十人九年二月乙丑公至自江陵初諸葛長民貪淫驕橫為士民所患苦公以其同大義優容之劉毅既誅長民謂所親曰昔年醢彭越今年誅韓信禍其至矣將謀作亂公克期至京邑而每淹留不進公卿以下頻日奉候於新亭長民亦驟出既而公輕舟密至已還東府矣長民到門引前卻人閑語凡平生於長民所不盡者皆與及之長民甚說已密命左右壯士丁旿等自幔後出於坐拉焉長民墜床又於地毆之死於床側輿尸付廷尉并誅其弟黎民旿驍勇有氣力時人為之語曰勿跋扈付丁旿先是山湖川澤皆為豪強所專小民薪採漁釣皆責稅直至是禁斷之時民居未一公表曰夫去弊拯民必存簡恕捨網修綱雖煩易理江荊彫殘刑政多闕頃年事故綏撫未周遂令百姓疲匱歲月滋甚財傷役困慮不幸生凋殘之餘而不減舊刻剝徵求不循政道宰莅之司或非良榦未能菲躬儉苟求盈給積習生常漸不知改近因戎役來涉二州踐境親民愈見其瘼思欲振其所急卹其所苦凡租稅調役悉宜以見戶為正州郡縣屯田池塞諸非軍國所資利入守宰者今一切除之州郡縣吏皆依尚書定制實戶置臺調癸卯梓材庚子皮毛可悉停省別量所出巴陵均折度支依舊兵運原五歲刑已下凡所質錄賊家餘口亦悉原放臣聞先王制治九土攸序分境畫疆各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富強兼并於是為弊然九服弗擾所託成舊在漢西京大遷田景之族以實關中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰託淮海朝有匡復之算民復思本之心經略之圖日不暇給是以寧民綏治猶有未遑及至大司馬桓溫以民無定本傷治為深庚戌土斷以一其業于時財阜國豐實由於此自茲迄今彌歷年載畫一之制漸用頹弛雜居流寓閭伍弗修王化所以未純民瘼所以猶在臣荷重任恥責實深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居累世墳壟成行敬恭之誠豈不與事而至請準庚戌土斷之科庶子本所弘稍與事著然後率之以仁義鼓之以威武超大江而跨黃河撫九州而復舊土則戀本之志乃速申於當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懷鴻鴈之詩思隆中興之業既委臣以國重期臣以寧濟若所啟合允請付外施行於是依界土斷唯徐兗青三州居晉陵者不在斷例諸流寓郡縣多被併省以公領鎮西將軍豫州刺史公固讓太傅州牧及班劍奉還黃鉞七月朱齡石平蜀斬偽蜀王譙縱傳首京師九月封公次子義真為桂陽縣公以賞平齊及定盧循也天子重申前命授公太傅揚州牧加羽葆鼓吹班劍二十人將吏百餘敦勸乃受羽葆鼓吹班劍餘固辭十年息民簡役築東府起府舍平西將軍荊州刺史司馬休之宗室之重又得江漢人心公疑其有異志而休之兄子譙王文思在京師招集輕俠公執文思送還休之令自為其所休之表廢文思并與公書陳謝十一年正月公收休之子文寶兄子文祖並於獄賜死率眾軍西討復加黃鉞領荊州刺史辛巳發京師以中軍將軍道憐監留府事休之上表自陳曰臣聞運不常一治亂代有陽九既謝圮終則泰昔篡臣肆逆皇綱絕紐卜世未改鼎祚再隆太尉臣諱威武明斷首建義旗除蕩元凶皇居反正布衣匹夫匡復社稷南剿盧循北定廣固千載以來功無與等由是四海歸美朝野推崇既位窮台牧權傾人主不能以道處功恃寵驕溢自以酬賞既極便情在無上刑戮逆濫政用暴苛問鼎之迹日彰人臣之禮頓缺陛下四時膳御觸事縣空宮省供奉十不一在皇后寢疾之際湯藥不周手與家書多所求告皆是朝士共所聞見莫不傷懷憤歎口不敢言前揚州刺史元顯第五息法興桓玄之釁逃遠於外王路既開始得歸本太傅之胤絕而復興凡在有懷誰不感慶諱吞噬之心不避輕重以法興聰敏明慧必為民望所歸芳蘭既茂內懷憎惡乃妄扇異言無罪即戮大司馬臣德文及王妃公主情計切逼並狼狽請命逆肆禍毒誓不矜許冤酷之痛感動行路自以地卑位重荷恩崇大乃以庶孽與德文嫡婚致茲非偶實由威逼故衛將軍劉毅右將軍劉藩前將軍諸葛長民尚書僕射謝混南蠻校尉郗僧施或盛勳德胤令望在身皆社稷輔弼協讚所寄無罪無辜一旦夷滅猜忍之性終古所希臣自惟門戶衰破賴之獲存皇家所重終古難匹是以公私歸馮事盡祗順再授荊州輒苦陳告自以才弱位隆不宜久荷分陝屢求解任必不見聽前經攜侍老母半家俱西凡諸子姪悉留京輦臣兄子譙王文思雖年少常人粗免咎悔性好交遊未知防遠群醜交構為其風聲諱遂翦戮人士遠送文思臣順其此旨表送章節請廢文思改襲大宗遣息文寶送女東歸自謂推誠奉順理不過此豈意諱包藏禍心遂見討伐加惡文思構生罪釁群小之言遠近噂𠴲而臣純愚闇信必謂不然尋臣府司馬張茂度狼狽東歸南平太守檀範之復以此月三日委郡叛逆尋有審問東軍已上諱今此舉非有怨憎正以臣王室之幹位居藩岳時賢既盡唯臣獨存規以翦滅成其篡殺鎮北將軍臣宗之青州刺史臣敬宣並是諱所深忌憚欲以次除蕩然後傾移天日於事可易今荊雍義徒不召而集子來之眾其會如林豈臣無德所能綏致蓋七廟之靈理貫幽顯輒授文思振武將軍南郡太守宗之子竟陵太守魯軌進號輔國將軍臣今與宗之親御大眾出據江津案甲抗威隨宜應赴今絳旗所指唯諱兄弟父子而已須剋蕩寇逆尋續馳聞由臣輕弱致諱凌橫上慚俯愧無以厝顏休之府錄事參軍韓延之故吏也有幹用才能公未至江陵密使與之書曰文思事源遠近所知去秋遣康之送還司馬軍者推至公之極也而了不遜愧又無表疏文思經正不反此是天地之不容吾受命西討止其父子而已彼土僑舊為所驅逼一無所問往年郗僧施謝邵任集之等交構積歲專為劉毅謀主所以至此卿等諸人一時逼迫本無纖釁吾處懷期物自有由來今在近路正是諸人歸身之日若大軍登道交鋒接刃蘭艾吾誠不分故具示意并示同懷諸人延之報曰承親率戎馬遠履西畿闔境士庶莫不惶駭何者莫知師出之名故也今辱來疏始知以譙王前事良增歎息司馬平西體國忠貞款愛待物當於古人中求耳以君公有匡復之勳家國蒙賴推德委誠每事詢仰譙王往以微事見劾猶自表遜位況以大過而當嘿然邪但康之前言有所不盡故重使胡道諮白所懷道未及反已奏表廢之所不盡者命耳推寄相與之懷正當如此有何不可便興兵戈自義旗秉權以來四方方伯誰敢不先相諮疇而逕表天子邪譙王為宰相所責又表廢之經正何歸表使何因可謂欲加之罪其無辭乎劉諱足下海內之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣來示言處懷期物自有由來今伐人之君啗人以利真可謂處懷期物自有由來者矣劉藩死於閶闔之內諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡款懷之士閫外無自信諸侯以是為得算良可恥也貴府將佐及朝廷賢德寄性命以過日心企太平久矣吾誠鄙劣嘗聞道於君子以平西之至德寧可無授命之臣乎未能自投虎口比迹郗任之徒明矣假令天長喪亂九流渾濁當與臧洪遊於地下不復多言公視書歎息以示諸佐曰事人當如此三月軍次江陵初雍州刺史魯宗之常慮不為公所容與休之相結至是率其子竟陵太守軌會于江陵江夏太守劉虔之邀之軍敗見殺公命彭城內史徐逵之參軍王允之出江夏口復為軌所敗並沒時公軍泊馬頭即日率眾軍濟江躬督諸將登岸莫不奮踊爭先休之眾潰與軌等奔襄陽江陵平加領南蠻校尉將拜值四廢日佐史鄭鮮之褚叔度王弘傅亮白遷日不許下書曰此州積弊事故相仍民疲田蕪杼軸空匱加以舊章乖昧事役頻苦童耄奪養老稚服戎空戶從役或越紼應召每永懷民瘼宵分忘寢誠宜蠲除苛政弘茲簡惠庶令凋風弊政與事而新寧一之化成於期月荊雍二州西局蠻府吏及軍人年十二以還六十以上及扶養孤幼單丁大艱悉仰遣之窮獨不能存者給其長賑府州久勤將吏依勞銓序并除今年租稅四月公復率眾進討至襄陽休之奔羌天子復重申前命授太傅揚州牧劍履上殿入朝不趨贊拜不名加前部羽葆鼓吹置左右長史司馬從事中郎四人封公第三子義隆為北彭城縣公以中軍將軍道憐為荊州刺史八月甲子公至自江陵奉還黃鉞固辭太傅州牧前部羽葆鼓吹其餘受命朝議以公道尊勳重不宜復施敬護軍既加殊禮奏事不復稱名以世子為兗州刺史十二年正月詔公依舊辟士加領平北將軍兗州刺史增都督南秦凡二十二州公以平北文武寡少不宜別置於是罷平北府以併大府以世子為豫州刺史三月加公中外大都督初公平齊仍有定關洛之意值盧循侵逼故其事不諧荊雍既平方謀外略會羌主姚興死子泓立兄弟相殺關中擾亂公乃戒嚴北討加領征西將軍司豫二州刺史以世子為徐兗二州刺史下書曰吾倡大義首自本州克復皇祚遂建勳烈外夷勍敵內清姦宄皆邦人州黨竭誠盡力之效也情若風霜義貫金石今當奉辭西旆有事關河弱嗣叨蒙復忝今授情事纏綿可謂深矣頃軍國務殷刑辟未息眷言懷之能不多歎其犯罪繫五歲以還可一原遣文武勞滿未蒙榮轉者便隨班序報公受中外都督及司州並辭大司馬琅邪王禮敬朝議從之公欲以義聲懷遠奉琅邪王北伐五月羌偽黃門侍郎尹沖率兄弟歸順又加公北雍州刺史前部羽葆鼓吹增班劍為四十人解中書監八月丁巳率大眾發京師以世子為中軍將軍監太尉留府事尚書右僕射劉穆之為左僕射領監軍中軍二府軍司入居東府總攝內外九月公次于彭城加領徐州刺史先是遣冠軍將軍檀道濟龍驤將軍王鎮惡步向許洛羌緣道屯守皆望風降服偽兗州刺史韋華先據倉垣亦率眾歸順公又遣北兗州刺史王仲德先以水軍入河仲德破索虜於東郡涼城進平滑臺十月眾軍至洛陽圍金墉泓弟偽平南將軍洸請降送于京師修復晉五陵置守衛天子詔曰夫嵩岱配極則乾道增輝藩嶽作屏則帝王成務是以夏殷資昆彭之伯有周倚齊晉之輔鑒諸前典儀刑萬代翼治扶危靡不由此太尉公命世天縱齊聖廣淵明燭四方道光宇宙爰自初迪則投懃王國妖蝥孔熾則功存社稷固以四維是荷萬邦攸賴者矣暨桓玄僭逆傾蕩四海公深秉大節靈武霆震弘濟朕躬再造王室每惟勳德銘于厥心遂北清海岱南夷百越荊雍稽服庸岷順軌剋黜方難式遏寇虐及阿衡王猷班序內外仰興絕風傍嗣逸業秉禮以整俗遵王以垂訓聲教遠被無思不洽爰暨木居海處之酋被髮彫題之長莫不忘其陋險九譯來庭此蓋播諸徽策靡究其詳者也曩者永嘉不綱諸夏幅裂終古帝居淪胥戎虜永言園陵率土同慕公明發遐慨撫機電征親董侯伯稜威致討旗旝首塗則八表響震偏師先路則多壘雲徹舊都載清五陵復禮百城屈膝千落影從自篇籍所載生民以來勳德懋功未有若此之盛者也昔周呂佐叡聖之主因三分之形把旄仗鉞一時指麾皆大啟疆宇跨州兼國其在桓文方茲尤儉然亦顯被寵章光錫殊品況乃獨絕百代顧邈前烈者哉朕每弘鑒古訓思遵令圖以公深秉沖挹用闕大禮天人引領于茲歷載況今禹迹齊軌九隩同文司勳抗策普天增佇遂公高挹大愆國章三靈眷屬朕實祗懼便宜顯荅群望允崇盛典其進位相國總百揆揚州牧封十郡為宋公備九錫之禮加璽綬遠遊冠位在諸侯王上加相國綠綟綬策曰朕以寡昧仰纘洪基夷羿乘釁蕩覆王室越在南鄙遷于九江宗祀絕饗人神無位提挈群凶寄命江滸則我祖宗之業奄墜于地七百之祚翦焉既傾若涉淵海罔知攸濟天未絕晉誕育英輔振厥弛維再造區物興亡繼絕俾昏作明元勳至德朕實賴焉今將授公典策其敬聽朕命乃者桓玄肆僭滔天泯夏拔本塞源顛倒六位庶僚俛眉四方莫卹公精貫朝日氣凌霄漢奮其靈武大殲群慝剋復皇邑奉帝歆神此公之大節始於勤王者也授律群后泝流長騖薄伐崢嶸獻捷南郢大憝折首群逆畢夷三光旋采舊物反正此又公之功也出藩入輔弘茲保弼阜財利用繁殖生民編戶歲滋疆宇日啟導德明刑四境有截此又公之功也鮮卑負眾僭盜三齊狼噬冀青虔劉沂岱介恃遐阻仍為邊毒公蒐乘秣駟敻入遠疆衝櫓四臨萬雉俱潰竊號之虜顯戮司寇拓土三千申威龍漠此又公之功也盧循妖凶伺隙五嶺乘虛肆逆侵覆江豫旍拂寰內矢及王城朝野喪沮莫有固志家獻徙卜之計國議遷都之規公乘轅南濟義形于色嶷然內湛視嶮若夷攄略運奇英謨不世狡寇窮衄喪旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之捷魚潰鳥散元凶遠迸傳首萬里海南肅清荒服來款此又公之功也劉毅叛換負釁西夏凌上罔主志肆奸暴附麗協黨扇蕩王畿公御軌以刑消之不日倉兕電泝神兵風掃罪人斯得荊衡清晏此又公之功也譙縱怙亂寇竊一隅王化阻閡三巴淪溺公指命偏師授以良圖凌波浮湍致屆井絡僭豎伏鑕梁岷草偃此又公之功也馬休魯宗阻兵內侮驅率二方連旗稱亂公投袂星言研其上略江津之師勢踰風電迴旆沔川實繁震懾二叛奔迸荊雍來蘇玄澤浸育溫風潛被此又公之功也永嘉不競四夷擅華五都幅裂山陵幽辱祖宗懷沒世之憤遺氓有匪風之思公遠齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命群帥北徇司兗許鄭風靡鞏洛載清偽牧逆藩交臂請罪百年榛穢一朝掃濟此又公之功也公有康宇內之勳重之以明德爰初發迹則奇謨冠古電擊強妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於歲計扶危靜亂道固於苞桑辯方正位納之軌度蠲削煩苛較若畫一淳風美化盈塞宇宙是以絕域獻琛遐夷納貢王略所宣九服率從雖文命之東漸西被咎繇之邁于種德何以尚茲朕聞先王之宰世也庸勳尊賢建侯胙土襃以寵章崇其徽物所以協輔皇家永隆藩屏故曲阜光啟遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前烈勳高振古而殊典未加朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兗州之高平魯泰山十郡封公為宋公錫茲玄土苴以白茅爰定爾居用建冢社昔晉鄭啟藩入作卿士周邵保傅出總二南內外之重公實兼之今命使持節兼太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第十左竹使符第一至第十左相國位無不總禮絕朝班居常之名宜與事革其以相國總百揆去錄尚書之號上送所假節侍中貂蟬中外都督太傅太尉印綬豫章公印策進揚州牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式秉介蹈方罔有遷志是以錫公大輅戎輅各一玄牡二駟公抑末敦本務農重積采蘩實殷稼穡惟阜是用錫公衮冕之服赤舄副焉公閑邪納正移風改俗陶鈞品物如樂之和是用錫公軒縣之樂六佾之舞公宣美王化導揚休風華夷企踵遠人胥萃是用錫公朱戶以居公官方任能網羅幽滯九皋辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏寇讎清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳳矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千公溫恭孝思致虔禋祀忠肅之志儀刑萬方是用錫公秬鬯一卣圭瓚副焉宋國置丞相以下一遵舊儀欽哉其祗服往命茂對天休簡恤庶邦敬敷顯德以終我高祖之嘉命置宋國侍中黃門侍郎尚書左丞相隨大使奉迎枹罕虜乞佛熾槃遣使詣公求效力討羌拜平西將軍河南公十三年正月公以舟師進討留彭城公義隆鎮彭城軍次留城經張良廟令曰夫盛德不泯義在祀典微管之歎撫事彌深張子房道亞黃中照鄰殆庶風雲言感蔚為帝師大拯橫流夷項定漢固以參軌伊望冠德如仁若乃神交圯上道契商洛顯晦之間窈然難究源流淵浩莫測其端矣塗次舊沛佇駕留城靈廟荒殘遺象陳昧撫迹懷人慨然永歎過大梁者或佇想於夷門遊九原者亦流連於隨會可改構榱桷修飾丹青蘋蘩行潦以時致薦以紓懷古之情用存不刊之烈天子追贈公祖為太常父為左光祿大夫讓不受二月冠軍將軍檀道濟等次潼關三月庚辰大軍入河索虜步騎十萬營據河津公命諸軍濟河擊破之公至洛陽七月至陝城龍驤將軍王鎮惡伐木為舟自河浮渭八月扶風太守沈田子大破姚泓於藍田王鎮惡剋長安生擒泓九月公至長安長安豐稔帑藏盈積公先收其彝器渾儀土圭之屬獻于京師其餘珍寶珠玉以班賜將帥執送姚泓斬于建康市謁漢高帝陵大會文武於未央殿十月天子詔曰朕聞先王之莅天下也上則大寶以尊德下則建侯以襃功是以成勳告就文命有玄圭之錫四海來王姬旦饗龜蒙之封夫翼聖宣績輔德弘猷禮窮元賞寵章希世況明保沖昧獨運陶鈞者哉朕以不德遭家多難雲雷作屯夷羿竊命失位京邑遂播蠻荊艱難卑約制命凶醜相國宋公天縱睿聖命世應期誠貫三靈大節宏發拯朕躬於巢幕迴靈命於已崩固已道窮北面暉格八表者矣及外積全國之勳內累戡黎之伐芟夷強妖之始蘊崇姦猾之源顯仁藏用之道六府孔修之績莫不雲行雨施能事必舉諒已方軌於三五不容於典策者焉自永嘉喪師綿踰十紀五都分崩然正朔時暨唯三秦懸隔未之暫賓至令羌虜襲亂淫名三世資百二之易守恃函谷之可關廟算韜略不謀之日久矣公命世撫運闡曜威靈內研諸侯之慮外致上天之罰故能倉兕甫訓則許鄭風偃鉦鉞未指則瀍洛霧披俾舊闕元陽復集萬國之軫東京父老重睹司隸之章俾朕負扆高拱而保大洪烈是用遠鑒前典延即群謀敬授殊錫光啟疆宇乘馬之制有陋舊章徽稱之美未窮上爵豈足以顯報懋功允塞民望藩輔王畿長轡六合者乎實以公每秉謙德卑不可踰難進之道以寵為戚是故降損盛制且有後命也自茲迄今洪勳彌劭稜威九河魏趙底服迴轅崤潼連城冰泮遂長驅灞滻懸旍龍門逆虜姚泓係頸就擒百稔梗穢滌於崇朝祖宗遺憤雪於一旦涉禹之迹方行天下至于海外罔有不服功固萬世其寧惟永豈金石雅頌所能讚揚實可以告於神明勒銘嵩岱者已朕又聞之周道方遠則鸑鷟鳴岐二南播德則麟騶呈瑞自公大號初發爰暨告成靈祥炳煥不可勝紀豈伊素雉遠至嘉禾近歸而已哉朕每仰鑒玄應俯察人謀進惟道勳退惟國典豈得遂公沖挹而久蘊盛策便宜敬行大禮允副幽顯之望其進宋公爵為王以徐州之海陵東安北琅邪北東莞北東海北譙北梁豫州之汝南北潁川北南頓凡十郡益宋國其相國揚州牧領征西將軍司豫北徐雍四州刺史如故十一月前將軍劉穆之卒以左司馬徐羨之代掌留任大事昔所決於穆之者皆悉以諮公欲息駕長安經略趙魏會穆之卒乃歸十二月庚子發自長安以桂陽公義真為安西將軍雍州刺史留腹心將佐以輔之閏月公自洛入河開汴渠以歸十四年正月壬戌公至彭城解嚴息甲以輔國將軍劉遵考為并州刺史領河東太守鎮蒲阪公解司州領徐冀二州刺史固讓進爵六月受相國宋公九錫之命令曰孤以寡薄負荷殊重守位奉藩危溢是懼朝恩隆泰委美推功遂方軌齊晉擬議國典雖亮誠守分十稔于今而成命弗迴百辟胥暨內外庶僚敦勉周至籍運來之功參休明之迹乘菲薄之資同盛德之事監寐永言未知攸託隆祚之始思覃斯慶其赦國內殊死以下今月二十三日昧爽以前悉皆原宥鰥寡孤獨不能自存者人賜粟五斛府州刑罪亦同蕩然其餘詳依舊準詔崇豫章公太夫人為宋公太妃世子中軍將軍副貳相國府以太尉軍諮祭酒孔季恭為宋國尚書令青州刺史檀祗為領軍將軍相國左長史王弘為尚書僕射其餘百官悉依天朝之制又詔宋國所封十郡之外悉得除用先是安西中兵參軍沈田子殺安西司馬王鎮惡諸將軍復殺安西長史王脩關中亂十月公遣右將軍朱齡石代安西將軍桂陽公義真為雍州刺史義真既還為佛佛虜所追大敗僅以身免諸將帥及齡石並沒領軍檀祗卒以中軍司馬檀道濟為中領軍十二月天子崩大司馬琅邪王即帝位元熙元年正月詔遣大使徵公入輔又申前命進公爵為王以徐州之海陵北東海北譙北梁豫州之新蔡兗州之北陳留司州之陳郡汝南潁川滎陽十郡增宋國七月乃受命赦國內五歲刑以下遷都壽陽以尚書劉懷慎為北徐州刺史鎮彭城九月解揚州十二月天子命王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鍾簴宮縣進王太妃為太后王妃為王后世子為太子王子王孫爵命之號一如舊儀二年四月徵王入輔六月至京師晉帝禪位于王詔曰夫天造草昧樹之司牧所以陶鈞三極統天施化故大道之行選賢與能隆替無常期禪代非一族貫之百王由來尚矣晉道陵遲仍世多故爰暨元興禍難既積至三光貿位冠履易所安皇播越宗祀墮泯則我宣元之祚永墜于地顧瞻區域翦焉已傾相國宋王天縱聖德靈武秀世一匡頹運再造區夏固以興滅繼絕舟航淪溺矣若夫仰在璿璣旁穆七政薄伐不庭開復疆宇遂乃三俘偽主開滌五都雕顏卉服之鄉龍荒朔漠之長莫不迴首朝陽沐浴玄澤故四靈效瑞川岳啟圖嘉祥雜遝休應炳著玄象表革命之期華裔注樂推之願代德之符著乎幽顯瞻烏爰止允集明哲夫豈延康有歸咸熙告謝而已哉昔火德既微魏祖底績黃運不競三后肆勤故天之歷數實有攸在朕雖庸闇昧於大道永鑒廢興為日已久念四代之高義稽天人之至望予其遜位別宮歸禪于宋一依唐虞漢魏故事詔草既成送呈天子使書之天子即便操筆謂左右曰桓玄之時天命已改重為劉公所延將二十載今日之事本所甘心甲子策曰咨爾宋王夫玄古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海止戈定大業然則帝王者宰物之通器君道者天下之至公昔在上葉深鑒茲道是以天祿既終唐虞弗得傳其嗣符命來格舜禹不獲全其謙所以經緯三才澄序彝化作範振古垂風萬葉莫尚於茲自是厥後歷代彌劭漢既嗣德於放勛魏亦方軌於重華諒以協謀乎人鬼而以百姓為心者也昔我祖宗欽明辰居其極而明晦代序盈虧有期翦商兆禍非唯一世曾是弗剋矧伊在今天之所廢有自來矣惟王體上聖之姿苞二儀之德明齊日月道合四時乃者社稷傾覆王拯而存之中原蕪梗又濟而復之自負固不賓干紀放命肆逆滔天竊據萬里靡不潤之以風雨震之以雷霆九伐之道既敷八法之化自理豈伊博施於民濟斯黔庶固以義洽四海道威八荒者矣至於上天垂象四靈效徵圖讖之文既明人神之望已改百工歌於朝庶民頌于野億兆抃踊傾佇惟新自非百姓樂推天命攸集豈伊在予所得獨專是用仰祗皇靈俯順群議敬禪神器授帝位于爾躬大祚告窮天祿永終於戲王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祐以答三靈之眷望又璽書曰蓋聞天生蒸民樹之以君帝皇寄世實公四海崇替係於勳德升降存乎其人故有國必亡卜年著其數代謝無常聖哲握其符昔在上世三聖係軌疇咨四嶽以弘揖讓惟先王之有作永垂範於無窮及劉氏致禪實堯是法有魏告終亦憲茲典我世祖所以撫歸運而順人事乘利見而定天保者也而道不常泰戎夷亂華喪我洛食蹙國江表仍遘否運淪沒相因逮于元興遂傾宗祀幸賴神武光天大節宏發匡復我社稷重造我國家惟王聖德欽明則天光大應期誕載明保王室內紓國難外播宏略誅大憝於漢陽逋僭盜於沂渚澄氛西岷肅清南越再靜江湘拓定樊沔若乃永懷區宇思一聲教王師首路則伊洛澄流稜威崤潼則華嶽褰靄偽酋銜璧咸陽即序雖彝器所銘詩書所詠庸勳之盛莫之與二也遂偃武修文誕敷德政八統以馭萬民九職以刑邦國思兼三王以施四事故能信著幽顯義感殊方自歷世所賓舟車所暨靡不謳歌仁德抃舞來庭朕每敬惟道勳永察符運天之歷數實在爾躬是以五緯升度屢示除舊之迹三光協數必昭布新之祥圖讖禎瑞皎然斯在加以龍顏英特天授殊姿君人之表煥如日月傳稱惟天為大惟堯則之詩云有命自天命此文王夫或躍在淵者終饗九五之位勳格天地者必膺大寶之業昔土德告沴傳胙于我有晉今歷運改卜永終于茲亦以金德而傳于宋仰四代之休義鑒明昏之定期詢于群公爰逮庶尹咸曰休哉罔違朕志今遣使持節兼太保散騎常侍光祿大夫澹兼太尉尚書宣範奉皇帝璽綬受終之禮一如唐虞漢魏故事王其允答人神君臨萬國時膺靈祉酬于上天之眷命王奉表陳讓晉帝已遜琅邪王第表不獲通於是陳留王度嗣等二百七十人及宋臺群臣並上表勸進上猶不許太史令駱達陳天文符瑞數十條群臣又固請王乃從之
