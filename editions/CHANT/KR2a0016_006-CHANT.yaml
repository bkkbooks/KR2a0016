於軍亡沒或殞身矢石或癘疾死亡並盡勤王事而斂槥卑薄可普更賻給務令豐厚己酉以車騎長史庾深之為豫州刺史甲子詔曰昔姬道方凝刑法斯厝漢德初明犴圄用簡良由上一其道下淳其性今民澆俗薄誠淺偽深重以寡德弗能心化故知方者鮮趣辟實繁向因巡覽見二尚方徒隸嬰金屨校既有矜復加國慶民和獨隔凱澤益以慚焉可詳所原宥九月己巳詔曰夫五辟三刺自古所難巧法深文在季彌甚故沿情察訟魯師致捷市獄勿擾漢史飛聲廷尉遠邇疑讞平決攸歸而一蹈幽圄動逾時歲民嬰其困吏容其私自今囚至辭具並即以聞朕當悉詳斷庶無留獄若繁文滯劾證逮遐廣必須親察以盡情狀自後依舊聽訟壬辰於玄武湖北立上林苑冬十月丁酉詔曰古者薦鞠青壇聿祈多慶分繭玄郊以供純服來歲可使六宮妃嬪修親桑之禮庚子鎮軍將軍南徐州刺史劉延孫進號車騎將軍戊申河西國遣使獻方物庚戌以河西王大沮渠安周為征虜將軍涼州刺史十一月己巳高麗國遣使獻方物肅慎國重譯獻楛矢石砮西域獻舞馬十二月戊午上於華林園聽訟辛酉置謁者僕射官四年春正月辛未車駕祠南郊甲戌宕昌王奉表獻方物乙亥車駕躬耕藉田大赦天下尚方徒繫及逋租宿債大明元年以前一皆原除力田之民隨才敘用孝悌義順賜爵一級孤老貧疾人穀十斛藉田職司優沾普賚百姓乏糧種隨宜貸給吏宣勸有章者詳加襃進壬午以北中郎司馬柳叔仁為梁南秦二州刺史左將軍荊州刺史朱修之進號鎮軍將軍庚寅立第三皇子子勛為晉安王第六皇子子房為尋陽王第七皇子子頊為歷陽王第八皇子子鸞為襄陽王二月庚子侍中建安王休仁為湘州刺史己未以員外散騎侍郎費景緒為寧州刺史三月甲子以冠軍將軍巴陵王休若為徐州刺史丁卯以安陸王子綏為郢州刺史癸酉以徐州刺史劉道隆為青冀二州刺史索虜寇北陰平孔堤太守揚歸子擊破之甲申皇后親桑于西郊夏四月癸卯以南琅邪隸王畿丙午詔曰昔紩衣御宇貶甘示節土簋臨天飭儉昭度朕綈帛之念無忘于懷雖深詔有司省游務實而歲用兼積年量虛廣豈以捐豐從損允稱約心四時供限可詳減太半庶裘絺順典有偃民華纂組傷工無競廛市辛酉詔曰都邑節氣未調癘疫猶眾言念民瘼情有矜傷可遣使存問并給醫藥其死亡者隨宜卹贍五月庚辰於華林園聽訟乙酉以徐州之梁郡還屬豫州丙戌尚書左僕射褚湛之卒以撫軍長史劉思考為益州刺史庚寅以南下邳併南彭城郡秋七月甲戌左光祿大夫開府儀同三司何尚之薨八月壬寅宕昌王遣使獻方物己酉以晉安王子勛為南兗州刺史雍州大水甲寅遣軍部賑給九月辛未以冠軍將軍垣護之為豫州刺史甲申上於華林園聽訟丁亥改封襄陽王子鸞為新安王冬十月庚寅遣新除司空沈慶之討沿江蠻壬辰制郡縣減祿並先充公限十一月戊辰改細作署令為左右御府令丙戌復置大司農官十二月乙未上於華林園聽訟辛丑車駕幸廷尉寺凡囚繫咸悉原遣索虜遣使請和丁未車駕幸建康縣原放獄囚倭國遣使獻方物五年春正月丁卯以宕昌王梁唐子為河州刺史二月癸巳車駕閱武詔曰昔人稱人道何先於兵為首雖淹紀勿用忘之必危朕以聽覽餘閒因時講事坐作有儀進退無爽軍幢以下普量班錫頃化弗能孚而民未知禁逭役違調起觸刑網凡諸逃亡在今昧爽以前悉皆原赦已滯囹圄者釋還本役其逋負在大明三年以前一賜原停自此以還鰥貧疾老詳所申減伐蠻之家蠲租稅之半近籍改新制在所承用殊謬實多可普更符下聽以今為始若先已犯制亦同蕩然甲寅加右光祿大夫羊玄保特進夏四月癸巳改封西陽王子尚為豫章王丙申加尚書令柳元景左光祿大夫開府儀同三司戊戌詔曰南徐兗二州去歲水潦傷年民多困窶逋租未入者可申至秋登丙午雍州刺史海陵王休茂殺司馬庾深之舉兵反義成太守薛繼考討斬之甲寅以第九皇子子仁為雍州刺史五月癸亥制帝室期親朝官非祿官者月給錢十萬丙辰車駕幸閱武堂聽訟六月丙午以護軍將軍義陽王昶為中軍將軍壬子分廣陵置沛郡省東平郡并廣陵秋七月丙辰詔曰雨水猥降街衢泛溢可遣使巡行窮弊之家賜以薪粟丁卯高麗國遣使獻方物庚午曲赦雍州八月戊子立第九皇子子仁為永嘉王第十一皇子子真為始安王以北中郎參軍費伯弘為寧州刺史己丑詔曰自靈命初基聖圖重遠參正樂職感神明之應崇殖禮囿奮至德之光聲實同和文以均節化調其俗物性其情故臨經式奠煥乎炳發道喪世屯學落年永獄訟微衰息之術百姓忘退素之方今息警夷嶂恬波河渚棧山航海鄉風慕義化民成俗茲時篤矣來歲可修葺庠序旌延國冑庚寅制方鎮所假白板郡縣年限依臺除食祿三分之一不給送故衛將軍東海王褘以本號開府儀同三司九月甲寅朔日有食之丁卯行幸琅邪郡囚繫悉原遣甲戌移南豫州治淮南于湖縣丁丑以冠軍將軍尋陽王子房為南豫州刺史閏月戊子皇太子妃何氏薨丙申初立馳道自閶闔門至于朱雀門又自承明門至于玄武湖壬寅改封歷陽王子頊為臨海王冬十月甲寅以車騎將軍南徐州刺史劉延孫為尚書左僕射領護軍將軍尚書右僕射劉秀之為安北將軍雍州刺史以冠軍將軍臨海王子頊為廣州刺史乙卯以東中郎將新安王子鸞為南徐州刺史十一月壬辰詔曰王畿內奉京師外表眾夏民殷務廣宜思簡惠可遣尚書就加詳檢并與守宰平治庶獄其有疑滯具以狀聞丁酉增置少府丞一人十二月壬申以領軍將軍劉遵考為尚書右僕射甲戌制天下居戶歲輸布四疋庚辰以太常王玄謨為北平將軍徐州刺史六年春正月己丑湘州刺史建安王休仁加平南將軍辛卯車駕親祠南郊是日又宗祀明堂大赦天下孝子順孫義夫悌弟賜爵一級慈姑節婦及孤老六疾賜帛五匹穀十斛下四方旌賞茂異其有懷真抱素志行清白恬退自守不交當世或識通古今才經軍國奉公廉直高譽在民具以名奏乙未置五官中郎將左右中郎將官二月乙卯復百官祿三月庚寅立第十三皇子子元為邵陵王壬寅以倭國王世子興為安東將軍乙巳改豫州南梁郡為淮南郡舊淮南郡并宣城丁未輔國將軍征虜長史廣陵太守沈懷文有罪下獄死四月庚申原除南兗州大明三年以前逋租新作大航門五月丙戌置凌室修藏冰之禮壬寅太宰江夏王義恭解領司徒六月辛酉尚書右僕射護軍將軍劉延孫卒秋七月庚辰以荊州刺史朱修之為領軍將軍廣州刺史臨海王子頊為荊州刺史甲申地震戊子以輔國將軍王翼之為廣州刺史辛卯以西陽太守檀翼之為交州刺史乙未立第十九皇子子雲為晉陵王八月癸亥原除雍州大明四年以前逋租乙亥置清臺令九月戊寅制沙門致敬人主戊子以前金紫光祿大夫宗愨為中護軍乙未尚書右僕射劉遵考為尚書左僕射丹陽尹王僧朗為尚書右僕射冬十月丁巳以山陽王休祐子士弘繼鄱陽哀王休業丁卯詔上林苑內民庶丘墓欲還合葬者勿禁十一月己卯陳留王曹慶秀薨辛巳以尚書令柳元景為司空尚書令如故七年春正月癸未詔曰春蒐之禮著自周令講事之語書于魯史所以昭宣德度示民軌則今歲稔氣榮中外寧晏當因農隙葺是舊章可克日於玄武湖大閱水師并巡江右講武校獵丁亥以尚書右僕射王僧朗為太常衛將軍顏師伯為尚書右僕射己丑以尚書令柳元景為驃騎大將軍開府儀同三司庚寅以南兗州刺史晉安王子勛為江州刺史癸巳割吳郡屬南徐州二月甲寅車駕巡南豫南兗二州丙辰詔曰江漢楚望咸秩周禋禮九疑於盛唐祀蓬萊於渤海皆前載流訓列聖遺式霍山是曰南嶽實維國鎮韞靈呈瑞肇光宋道朕駐驆于野有事岐陽瞻睇風雲徘徊以想可遣使奠祭丁巳車駕校獵于歷陽之烏江己未車駕登烏江縣六合山庚申割歷陽秦郡置臨江郡壬寅詔曰朕受天慶命十一年於茲矣憑七廟之靈獲上帝之力禮橫四海威震八荒方巡三湘而奠衡嶽次九河而檢云岱今恢覽功成省風畿表觀民六合蒐校長洲騰沙飛礫平嶽盪海鼖晉合序鐃鉦協節獻鬯如禮饁獸傾郊敬舉王公之觴廣納士民之壽八風循通卿雲叢聚盡天罄瑞率宇竭歡思散大極之泉以福無方之外可大赦天下行幸所經無出今歲租布其逋租餘債勿復收賜民爵一級女子百戶牛酒刺守邑宰及民夫從蒐者普加洽賚又詔曰朕弱年操製出牧司雍承政宣風荐歷年紀國步中阻治戎江甸難夷情義實繫于懷今或練蒐訓旅涉茲境閭故邑耆舊在目罕存年世未遠殲亡太半撫迹惟事傾慨兼著太宗燕故晉陽洽恩世祖流仁濟畿畼澤永言往猷思廣前賚可蠲歷陽郡租輸三年遣使巡慰問民疾苦鰥寡孤老六疾不能自存者厚賜粟帛高年加以羊酒凡一介之善隨才銓貫前國名臣及府州佐吏量所沾錫人身已往施及子孫壬申車駕還宮夏四月甲寅以領軍將軍朱修之為特進丙辰以尚書湘東王諱為領軍將軍甲子詔曰自非臨軍戰陳一不得專殺其罪甚重辟者皆如舊先上須報有司嚴加聽察犯者以殺人罪論五月乙亥撫軍將軍揚州刺史豫章王子尚進號車騎將軍輔國將軍始安王子真為廣州刺史丙子詔曰自今刺史守宰動民興軍皆須手詔施行惟邊隅外警及姦釁內發變起倉卒者不從此例六月甲辰以北中郎司馬柳元怙為梁南秦二州刺史戊申芮芮國高麗國遣使獻方物戊辰以秦郡太守劉德願為豫州刺史七月乙亥征東大將軍高麗王高連進號車騎大將軍開府儀同三司秋七月丙申詔曰前詔江海田池與民共利歷歲未久浸以弛替名山大川往往占固有司嚴加檢糾申明舊制八月丁巳詔曰昔匹婦含怨山燋北鄙孀妻哀慟臺傾東國良以誠之所動在微必著感之所震雖厚必崩朕臨察九野志深待旦弗能使爛然成章各如其節遂令炎精損河陽偏不施歲云不稔咎實朕由大官供膳宜從貶撤近道刑獄當親料省其王畿內及神州所統可遣尚書與所在共訊畿外諸州委之刺史并訊省律令思存利民其考謫貿襲在大明七年以前一切勿治尤弊之家開倉賑給乙丑立第十六皇子子孟為淮南王第十八皇子子產為臨賀王車駕幸建康秣陵縣訊獄囚九月巳卯詔曰近炎精亢序苗稼多傷今二麥未晚甘澤頻降可下東境郡勤課墾殖尤弊之家量貸麥種戊子詔曰昔周王驥跡實窮四溟漢帝鸞軫夙徧五嶽皆所以上對幽靈下理民土自天昌替馭臨宮創圖禮代夭鬱世貿興毀皇家造宋日月重光璇璣得序五星順命而戎車歲動陳詩義闕朕聿含五光奄一天下思盡寶戒之規以塞謀危之路當沿時省方觀察風俗外詳考舊典以副側席之懷庚寅南徐州刺史新安王子鸞兼司徒乙未車駕幸廷尉訊獄囚丙申立第十七皇子子嗣為東平王冬十月壬寅太子冠賜王公以下帛各有差戊申車駕巡南豫州詔曰朕巡幸所經先見百年者及孤寡老疾並賜粟帛獄繫刑罪並親聽訟其士庶或怨鬱危滯受抑吏司或隱約潔立負擯州里皆聽進朕前面自陳訴若忠信孝義力田殖穀一介之能一藝之美悉加旌賞雖秋澤頻降而夏旱嬰弊可即開行倉並加賑賜癸丑行幸江寧縣訊獄囚車騎將軍揚州刺史豫章王子尚加開府儀同三司癸亥衛將軍開府儀同三司東海王褘為司空中軍將軍義陽王昶加開府儀同三司丙寅詔曰賞慶刑威奄國彝軌黜幽升明闢宇恒憲故採言聆風式觀侈質貶爵加地於是乎在今類帝宜社親巡江甸因覲嶽守躬求民瘼思弘明試之典以申考績之義行幸所經莅民之職功宣於德即加甄賞若廢務亂民隨愆議罰主者詳察以聞己巳車駕校獵於姑熟十一月丙子曲赦南豫州殊死以下巡幸所經詳減今歲田租乙酉詔遣祭晉大司馬桓溫征西將軍毛璩墓上於行所訊溧陽永世丹陽縣囚癸巳車駕習水軍於梁山有白爵二集華蓋有司奏改大明七年為神爵元年詔不許乙未原放行獄徒繫東諸郡大獄壬寅遣使開倉貸卹聽受雜物當租十二月丙午行幸歷陽甲寅大赦天下南豫州別署敕繫長徒一切原散其兵期考襲謫戍悉停歷陽郡女子百戶牛酒高年孤疾賜帛十匹蠲郡租十年己未太宰江夏王義恭加尚書令於博望梁山立雙闕癸亥車駕至自歷陽八年春正月甲戌詔曰東境去歲不稔宜廣商貨遠近販鬻米粟者可停道中雜稅其以仗自防悉勿禁癸未安北將軍雍州刺史劉秀之卒戊子以平南將軍湘州刺史建安王休仁為安南將軍江州刺史晉安王子勛為鎮軍將軍雍州刺史南徐州刺史新安王子鸞為撫軍將軍領司徒刺史如故輔國將軍江夏王世子伯禽為湘州刺史二月辛丑特進朱修之卒壬寅詔曰去歲東境偏旱田畝失收使命來者多至乏絕或下窮流穴頓伏街巷朕甚閔之可出倉米付建康秣陵二縣隨宜贍恤若溫拯不時以至捐棄者嚴加糾劾乙巳以鎮軍將軍湘東王諱為鎮北將軍徐州刺史平北將軍徐州刺史王玄謨為領軍將軍夏閏五月辛丑以前御史中丞蕭惠開為青冀二州刺史壬寅太宰江夏王義恭領太尉特進右光祿大夫羊玄保卒庚申帝崩於玉燭殿時年三十五秋七月丙午葬丹陽秣陵縣巖山景寧陵史臣曰役己以利天下堯舜之心也利己以及萬物中主之志也盡民命以自養桀紂之行也觀大明之世其將盡民命乎雖有周公之才之美猶終之以亂何益哉
