body:
  text: 卷六本紀第六孝武帝世祖孝武皇帝諱駿字休龍小字道民文帝第三子也元嘉七年秋八月庚午生十二年立為武陵王食邑二千戶十六年都督湘州諸軍事征虜將軍湘州刺史領石頭戍事十七年遷使持節都督南豫豫司雍并五州諸軍事南豫州刺史將軍如故猶戍石頭二十一年加督秦州進號撫軍將軍明年徙都督雍梁南北秦四州荊州之襄陽竟陵南陵順陽新野隨六郡諸軍事寧蠻校尉雍州刺史持節將軍如故自晉氏江左以來襄陽未有皇子重鎮時太祖欲經略關河故有此授尋給鼓吹一部二十五年改授都督南兗徐兗青冀幽六州豫州之梁郡諸軍事安北將軍徐州刺史持節如故北鎮彭城尋領兗州刺史始興王濬為南兗州上解督南兗二十七年坐汝陽戰敗降號鎮軍將軍又以索虜南侵降為北中郎將二十八年進督南兗州南兗州刺史當鎮山陽尋遷都督江州荊州之江夏豫州之西陽晉熙新蔡四郡諸軍事南中郎將江州刺史持節如故時緣江蠻為寇太祖遣太子步兵校尉沈慶之等伐之使上總統眾軍三十年正月上出次西陽之五洲會元凶弒逆以上為征南將軍加散騎常侍上率眾入討荊州刺史南譙王義宣雍州刺史臧質並舉義兵四月辛酉上次溧洲癸亥冠軍將軍柳元景前鋒至新亭修建營壘甲子賊劭親率眾攻元景大敗退走丙寅上次江寧丁卯大將軍江夏王義恭來奔奉表上尊號戊辰上至于新亭己巳即皇帝位大赦天下文武賜爵一等從軍者二等贓污清議悉皆盪除高年鰥寡孤幼六疾不能自存人賜穀五斛逋租宿債勿復收長徒之身優量降宥崇改太祖號諡以大將軍江夏王義恭為太尉錄尚書六條事南徐州刺史庚午以荊州刺史南譙王義宣為中書監丞相錄尚書六條事揚州刺史安東將軍隨王誕為衛將軍開府儀同三司荊州刺史雍州刺史臧質為車騎將軍開府儀同三司江州刺史征虜將軍沈慶之為領軍將軍撫軍將軍兗冀二州刺史蕭思話為尚書左僕射壬申以征虜將軍王僧達為尚書右僕射改新亭為中興亭五月甲戌輔國將軍申坦克京城乙亥輔國將軍朱修之克東府丙申克定京邑劭及始興王濬諸同逆並伏誅庚辰詔曰天步艱難國道用否雖基構永固而氣數時愆朕以眇身奄承皇業奉尋歷命鑒寐震懷萬邦風政人治之本感念陵替若疚在心可分遣大使巡省方俗是日解嚴辛巳車駕幸東府城甲申尊所生路淑媛為皇太后乙酉立妃王氏為皇后戊子以左衛將軍柳元景為雍州刺史壬辰以太尉江夏王義恭為太傅領大司馬甲午曲赦京邑二百里內并蠲今年租稅戊戌以撫軍將軍南平王鑠為司空建平王宏為尚書左僕射東海王褘為撫軍將軍新除尚書左僕射蕭思話遷職六月壬寅以驃騎參軍垣護之為冀州刺史甲辰以山陽太守申恬為青州刺史丙午車駕還宮初置殿門及上閤屯兵以江夏內史朱修之為平西將軍雍州刺史御史中丞王曇生為廣州刺史戊申以新除雍州刺史柳元景為護軍將軍己酉以司州刺史魯爽為豫州刺史庚戌以梁南秦二州刺史劉秀之為益州刺史太尉司馬龐秀之為梁南秦二州刺史衛軍司馬徐遺寶為兗州刺史寧朔將軍王玄謨為徐州刺史衛將軍隨王誕進號驃騎大將軍尚書右僕射王僧達遷職丹陽尹褚湛之為尚書右僕射丙辰以侍中南譙王世子恢為湘州刺史丁亥詔曰興王立訓務弘治節輔臣佐時勤獻政要仰惟聖規每存茲道猥以眇躬屬承景業闡揚遺澤無廢厥心夫量入為出邦有恒典而經給之宜多違常度兵役糜耗府藏散減外內眾供未加損約非所以聿遵先旨敬奉遺圖自今諸可薄己厚民去煩從簡者悉宜施行以稱朕意庚申詔有司論功班賞各有差辛酉安西將軍西秦河二州刺史吐谷渾拾寅進號鎮西大將軍開府儀同三司庚午還分南徐立南兗州辛未改封南譙王義宣為南郡王隨王誕為竟陵王義宣次子宜陽侯愷為宜陽縣王閏月壬申以領軍將軍沈慶之為鎮軍將軍南兗州刺史癸酉以護軍將軍柳元景為領軍將軍丙子遣兼散騎常侍樂詢等十五人巡行風俗甲申蠲尋陽西陽郡租布三年甲午丞相南郡王義宣改為荊湘二州刺史驃騎大將軍荊州刺史竟陵王誕改為揚州刺史南蠻校尉王僧達為護軍將軍是月置衛尉官秋七月辛丑朔日有蝕之甲寅詔曰世道未夷惟憂在國夫使群善畢舉固非一才所議況以寡德屬衰薄之期夙宵寅想永懷待旦王公卿士凡有嘉謀善政可以維風訓俗咸達乃誠無或依隱辛酉詔曰百姓勞弊徭賦尚繁言念未乂宜崇約損凡用非軍國宜悉停功可省細作并尚方雕文靡巧金銀塗飾事不關實嚴為之禁供御服膳減除遊侈水陸捕採各順時月官私交市務令優衷其江海田池公家規固者詳所開弛貴戚競利悉皆禁絕戊戌以右衛將軍宗愨為廣州刺史己巳司空南平王鑠薨八月辛未武皇帝舊役軍身嘗在齋內人身猶存者普賜解戶乙亥尚書左僕射建平王宏加中書監中軍將軍丁亥以沛郡太守垣閎為寧州刺史撫軍司馬費沈為梁南秦二州刺史甲午護軍將軍王僧達遷職九月丁巳以前尚書劉義綦為中護軍壬戌新亭戰亡者復同京城劭黨南海太守蕭簡據廣州反丁卯輔國將軍鄧琬討平之冬十月癸未車駕於閱武堂聽訟十一月丙午以左軍將軍魯秀為司州刺史丙辰停臺省眾官朔望問訊丙寅高麗國遣使獻方物十二月甲戌省都水臺罷都水使者官置水衡令官癸未以將置東宮省太子率更令步兵翊軍校尉旅賁中郎將冗從僕射左右積弩將軍官中庶子中舍人庶子舍人洗馬各減舊員之半孝建元年春正月己亥朔車駕親祠南郊改元大赦天下壬寅以丹陽尹蕭思話為安北將軍徐州刺史甲辰護軍將軍劉義綦遷職以尚書令何尚之為左光祿大夫護軍將軍戊申詔曰首食尚農經邦本務貢士察行寧朝當道內難甫康政訓未洽衣食有仍耗之弊選造無觀國之美昔衛文勤民高宗恭默卒能收賢巖穴大殷季年朕每側席疚懷無忘鑒寐凡諸守蒞親民之官可詳申舊條勸盡地利力田善蓄者在所具以名聞褒甄之科精為其格四方秀孝非才勿舉獻答允值即就銓擢若止無可採猶賜除署若有不堪酬奉虛竊榮薦遣還田里加以禁錮尚書百官之元本庶績之樞機丞郎列曹局司有在而頃事無巨細悉歸令僕非所以眾材成構群能濟業者也可更明體制咸責厥成糾覈勤惰嚴施賞罰壬戌更鑄四銖錢丙寅立皇子子業為皇太子賜天下為父後者爵一級孝子順孫義夫節婦粟帛各有差是月起正光殿二月庚午豫州刺史魯爽車騎將軍江州刺史臧質丞相荊州刺史南郡王義宣兗州刺史徐遺寶舉兵反乙亥撫軍將軍東海王褘遷職己卯領軍將軍柳元景加撫軍將軍壬午曲赦豫州辛卯左衛將軍王玄謨為豫州刺史癸巳玄謨進據梁山丙申以安北司馬夏侯祖歡為兗州刺史三月癸亥內外戒嚴辛丑以安北將軍徐州刺史蕭思話為安南將軍江州刺史撫軍將軍柳元景即本號為雍州刺史癸卯以太子左衛率龐秀之為徐州刺史徐遺寶為夏侯祖歡所破棄眾走丙寅以輔國長史明胤為冀州刺史夏四月戊辰以後將軍劉義綦為湘州刺史甲申以平西將軍雍州刺史朱修之為安西將軍荊州刺史丙戌鎮軍將軍南兗州刺史沈慶之大破魯爽於歷陽之小峴斬爽癸巳進慶之號鎮北大將軍封第十六皇弟休倩為東平王未拜薨五月甲寅義宣等攻梁山王玄謨大破之己未解嚴癸亥以吳興太守劉延孫為尚書右僕射六月戊辰臧質走至武昌為人所斬傳首京師甲戌撫軍將軍柳元景進號撫軍大將軍鎮北大將軍沈慶之並開府儀同三司丙子以征西將軍武昌王渾為雍州刺史癸未分揚州立東揚州分荊湘江豫州立郢州罷南蠻校尉戊子省錄尚書事庚寅義宣於江陵賜死秋七月丙申朔日有蝕之丙辰大赦天下文武賜爵一級逋租宿債勿復收辛酉於雍州立建昌郡以會稽太守義陽王昶為東揚州刺史八月庚午撫軍大將軍柳元景復為領軍將軍本號如故壬申以游擊將軍垣護之為徐州刺史壬辰以安西司馬梁坦為梁南秦二州刺史九月丙申以強弩將軍尹懷順為寧州刺史丁酉左光祿大夫何尚之解護軍將軍甲辰加尚之特進丙午以安南將軍江州刺史蕭思話為鎮西將軍郢州刺史冬十月戊寅詔曰仲尼體天降德維周興漢經緯三極冠冕百王爰自前代咸加襃述典司失人用闕宗祀先朝遠存遺範有詔繕立世故妨道事未克就國難頻深忠勇奮厲實憑聖義大教所敦永惟兼懷無忘待旦可開建廟制同諸侯之禮詳擇爽塏厚給祭秩丁亥以秘書監東海王褘為撫軍將軍江州刺史於郢州立安陸郡十一月癸卯復立都水臺置都水使者官是歲始課南徐州僑民租二年正月壬寅以冠軍將軍湘東王諱為中護軍二月己丑婆皇國遣使獻方物丙寅以鎮北大將軍南兗州刺史沈慶之為左光祿大夫開府儀同三司辛巳以尚書右僕射劉延孫為南兗州刺史三月辛亥以吳興太守劉遵考為湘州刺史壬子以行征西將軍楊文智為征西將軍北秦州刺史夏四月壬申河南國遣使獻方物壬午以豫章太守檀和之為豫州刺史五月戊戌以湘州刺史劉遵考為尚書右僕射前軍司馬垣閎為交州刺史庚子以輔國將軍申坦為徐兗二州刺史癸卯以右衛將軍顧覬之為湘州刺史丁未以金紫光祿大夫王偃為右光祿大夫六月甲子以國哀除釋大赦天下庚辰以曲江縣侯王玄謨為豫州刺史秋七月癸巳立第十三皇弟休祐為山陽王第十四皇弟休茂為海陵王第十五皇弟休業為鄱陽王戊戌鎮西將軍蕭思話卒己酉以益州刺史劉秀之為郢州刺史槃槃國遣使獻方物甲寅以義興太守到元度為益州刺史八月庚申雍州刺史武昌王渾有罪廢為庶人自殺辛酉以南兗州刺史劉延孫為鎮軍將軍雍州刺史斤陀利國遣使獻方物三吳民饑癸酉詔所在賑貸丙子詔曰諸苑禁制綿遠有妨肆業可詳所開弛假與貧民壬午以新除豫州刺史王玄謨為青冀二州刺史青州刺史申恬為豫州刺史甲申以右衛將軍檀和之為南兗州刺史九月丁亥車駕於軍武場閱武庚戌詔曰國道再屯艱虞畢集朕雖寡德終膺鴻慶惟新之祉實深百王而惠宥之令未殊常渥永言勤慮寤寐載懷在朕受命之前凡以罪徙放悉聽還本犯釁之門尚有存者子弟可隨才署吏冬十月壬午太傅江夏王義恭領揚州刺史驃騎大將軍揚州刺史竟陵王誕為司空南徐州刺史中書監尚書左僕射中軍將軍建平王宏為尚書令將軍如故十一月戊子中護軍湘東王諱遷職鎮軍將軍劉延孫為護軍將軍青冀二州刺史王玄謨為雍州刺史甲午以大司馬垣護之為青冀二州刺史辛亥高麗國遣使獻方物十二月癸亥以前交州刺史蕭景憲為交州刺史三年春正月庚寅立第十八皇弟休範為順陽王第十九皇弟休若為巴陵王戊戌立第二皇子子尚為西陽王辛丑車駕親祠南郊壬子立皇太子妃何氏甲寅大赦天下二月癸亥右光祿大夫王偃卒甲子以廣州刺史宗愨為平西將軍豫州刺史丁卯以新除御史中丞王翼為廣州刺史丁丑始制朔望臨西堂接群下受奏事壬午內外官有田在近道聽遣所給吏僮附業三月癸丑以西陽王子尚為南兗州刺史閏月戊午尚書右僕射劉遵考遷職癸酉鄱陽王休業薨庚辰停元嘉三十年以前兵工考剔夏五月辛酉制荊徐兗豫雍青冀七州統內家有馬一匹者蠲復一丁壬戌以右衛將軍劉瑀為益州刺史六月上於華林園聽訟秋七月太傅江夏王義恭解揚州丙子以南兗州刺史西陽王子尚為揚州刺史秘書監建安王休仁為南兗州刺史八月