body:
  text: 卷十一志第一律志序律志序左史記言右史記事事則春秋是也言則尚書是也至於楚書鄭志晉乘楚杌之篇皆所以昭述前史俾不泯於後司馬遷制一家之言始區別名題至乎禮儀刑政有所不盡乃於紀傳之外創立八書片文隻事鴻纖備舉班氏因之靡違前式網羅一代條流遂廣律曆禮樂其名不變以天官為天文改封禪為郊祀易貨殖平準之稱革河渠溝洫之名綴孫卿之辭以述刑法采孟軻之書用序食貨劉向鴻範始自春秋劉歆七略儒墨異部朱贛博采風謠尤為詳洽固並因仍以為三志而禮樂疏簡所漏者多典章事數百不記一天文雖為該舉而不言天形致使三天之說紛然莫辨是故蔡邕於朔方上書謂宜載述者也漢興接秦坑儒之後典墳殘缺耆生碩老常以亡逸為慮劉歆七略固之藝文蓋為此也河自龍門東注橫被中國每漂決所漸寄重災深堤築之功勞役天下且關洛高塏地少川源是故鎬酆潦潏咸入禮典漳滏鄭白之饒溝渠沾溉之利皆民命所祖國以為天溝洫立志亦其宜也世殊事改於今可得而略竊以班氏律歷前事已詳自楊偉改創景初而魏書闕志及元嘉重造新法大明博議回改自魏至宋宜入今書班固禮樂郊祀馬彪祭祀禮儀蔡邕朝會董巴輿服並各立志夫禮之所苞其用非一郊祭朝饗匪云別事旗章服物非禮而何今總而裁之同謂禮志刑法食貨前說已該隨流派別附之紀傳樂經殘缺其來已遠班氏所述止抄舉樂記馬彪後書又不備續至於八音眾器並不見書雖略見世本所闕猶眾爰及雅鄭謳謠之節一皆屏落曾無概見郊廟樂章每隨世改雅聲舊典咸有遺文又案今鼓吹鐃歌雖有章曲樂人傳習口相師祖所務者聲不先訓以義今樂府鐃歌校漢魏舊曲曲名時同文字永異尋文求義無一可了不知今之鐃章何代曲也今志自郊廟以下凡諸樂章非淫哇之辭並皆詳載天文五行自馬彪以後無復記錄何書自黃初之始徐志肇義熙之元今以魏接漢式遵何氏然則自漢高帝五年之首冬暨宋順帝昇明二年之孟夏二辰六沴甲子無差聖帝哲王咸有瑞命之紀蓋所以神明寶位幽贊禎符欲使逐鹿弭謀窺覬不作握河括地綠文赤字之書言之詳矣爰逮道至天而甘露下德洞地而醴泉出金芝玄秬之祥朱草白烏之瑞斯固不可誣也若夫衰世德爽而嘉應不息斯固天道茫昧難以數推亦由明主居上而震蝕之災不弭百靈咸順而懸象之應獨違今立符瑞志以補前史之闕地理參差事難該辨魏晉以來遷徙百計一郡分為四五一縣割成兩三或昨屬荊豫今隸司兗朝為零桂之士夕為廬九之民去來紛擾無暫止息版籍為之渾淆職方所不能記自戎狄內侮有晉東遷中土遺氓播徙江外幽并冀雍兗豫青徐之境幽淪寇逆自扶莫而裹足奉首免身於荊越者百郡千城流寓比室人佇鴻鴈之歌士蓄懷本之念莫不各樹邦邑思復舊井既而民單戶約不可獨建故魏邦而有韓邑齊縣而有趙民且省置交加日回月徙寄寓遷流迄無定託邦名邑號難或詳書大宋受命重啟邊隙淮北五州翦為寇境其或奔亡播遷復立郡縣斯則元嘉泰始同名異實今以班固馬彪二志晉宋起居凡諸記注悉加推討隨條辨析使悉該詳百官置省備有前說尋源討流於事為易元嘉中東海何承天受詔纂宋書其志十五篇以續馬彪漢志其證引該博者即而因之亦由班固馬遷共為一家者也其有漏闕及何氏後事備加搜采隨就補綴焉淵流浩漫非孤學所盡足蹇途遙豈短策能運雖斟酌前史備睹妍媸而愛嗜異情取捨殊意每含毫握簡杼軸忘餐終亦不足與班左並馳董南齊轡庶為後之君子削藁而已焉律曆上黃帝使伶倫自大夏之西阮隃之陰取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黃鍾之宮制十二管以聽鳳鳴以定律呂夫聲有清濁故協以宮商形有長短故檢以丈尺器有大小故定以斛斗質有輕重故平以鈞石故虞書曰乃同律度量衡然則律呂宮商之所由生也夫樂有器有文有情有官鍾鼓干戚樂之器也屈伸舒疾樂之文也論倫無患樂之情也欣喜歡愛樂之官也是以君子反情以和志廣樂以成教故能情深而文明氣盛而化神和順積中而英華發外故曰樂者心之動也聲者樂之象也周禮曰乃奏黃鍾歌大呂舞雲門以祀天神乃奏太蔟歌應鐘舞咸池以祭地祇四望山川先祖各有其樂又曰圜鐘為宮黃鐘為角太蔟為徵姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣地祗人鬼禮亦如之其可以感物興化若此之深也道始於一一生二二生三三三而九故黃鐘之數六分而為雌雄十二鍾鐘以三成故置一而三之凡積分十七萬七千一百四十七為黃鐘之實故黃鐘位子主十一月下生林鐘林鐘之數五十四主六月上生太蔟太蔟之數七十二主正月下生南呂南呂之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鐘應鐘之數四十三主十月上生蕤賓蕤賓之數五十七主五月上生大呂大呂之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鐘夾鐘之數六十七主二月下生無射無射之數四十五主九月上生中呂中呂之數六十主四月極不生宮生徵徵生商商生羽羽生角角生姑洗姑洗生應鐘不比於正音故為和應鐘生蕤賓蕤賓不比於正音故為繆日冬至音比林鐘浸以濁日夏至音比黃鐘浸以清以十二月律應二十四時甲子中呂之徵也丙子夾鐘之羽也戊子黃鐘之宮也庚子無射之商也壬子夷則之角也古人為度量輕重皆生乎天道黃鐘之律長九寸物以三生三三九三九二十七故幅廣二尺七寸古之制也音以八相生故人長八尺尋自倍故八尺而為尋有形即有聲音之數五以五乘八五八四十尺為匹匹者中人之度也一匹為制秋分而禾䅺定䅺定而禾孰律之數十二故十二䅺而當一粟十二粟而當一寸律以當辰音以當日日之數十故十寸而為尺十尺為丈其以為重十二粟而當一分十二分而當一銖十二銖而當半兩衡有左右因而倍之故二十四銖而當一兩天有四時以成一歲因而四之四四十六故十六兩而一斤三月而一時三十日一月故三十斤而為一鈞四時而一歲故四鈞而一石其為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律歷之數天地之道也下生者倍以三除之上生者四以三除之楊子雲曰聲生於日律生於辰聲以情質律以和聲聲律相協而八音生宮商角徵羽謂之五聲金石匏革絲竹土木謂之八音聲和音諧是謂五樂夫陰陽和則景至律氣應則灰除是故天子常以冬夏至御前殿合八能之士陳八音聽樂均度晷景候鐘律權土炭效陰陽冬至陽氣應則樂均清景長極黃鍾通土炭輕而衡邛仰夏至陰氣應則樂均濁景短極蕤賓通土炭重而衡低進退於先後五日之中八能各以候狀聞太史令封上效則和否則占候氣之法為室三重戶閉塗釁周密布緹幔室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰布其內端案歷而候之氣至者吹去散人及風所動者其灰聚殿中候用玉律十二唯二至乃候靈臺用竹律六十取弘農宜陽縣金門山竹為管河內葭莩為灰三代陵遲音律失度漢興北平侯張蒼始定律歷孝武之世置協律之官元帝時郎中京房知五音六十律之數受學於小黃令焦延壽其下生上生終於中呂而十二律畢矣中呂上生執始執始下生去滅終於南事而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓羲作易紀陽氣之初以為律法建日冬至之聲以黃鐘為宮太蔟為商姑洗為角林鐘為徵南呂為羽應鐘為變宮蕤賓為變徵此聲氣之元五音之正也故各統一日其餘以次運行當日者各自為宮而商角徵羽以類從焉禮運篇曰五聲六律十二管還相為宮此之謂也以六十律分一期之日黃鐘自冬至始及冬至而復陰陽寒暖風雨之占於是生焉房又曰竹聲不可以度調故作準以定數準之狀如瑟長丈而十三弦隱間九尺以應黃鐘之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於歆所奏其術施行於史官候部用之續漢志具載其律準度數漢章帝元和元年待詔候鐘律殷肜上言官無曉六十律以準調音者故待詔嚴嵩具以準法教子男宣願召宣補學官主調樂器詔曰嵩子學審曉律別其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一乃為能傳嵩學耳試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為準靈帝熹平六年東觀召典律者太子舍人張光等問準意光等不知歸閱舊藏乃得其器形制如房書猶不能定其絃緩急音不可以書曉人知之者欲教而無從心達者體知而無師故史官能辨清濁者遂絕其可以相傳者唯候氣而已舊律度新律度舊律分新律分黃鍾九寸九寸十七萬七千一百四十七十七萬七千一百四十七林鍾六寸六寸一釐十一萬八千九十八十一萬八千二百九十六太蔟八寸八寸二釐十五萬七千四百六十四十五萬七千八百六十一南呂五寸三分三五寸三分六釐十萬四千九百七十六十萬五千五百七十二姑洗七寸一分一釐七寸一分五釐十三萬九千九百六十八十四萬七百六十二應鍾四寸七分四釐四寸七分九釐九萬三千三百一十二九萬四千三百五蕤賓六寸三分二釐六寸二分八釐十二萬四千四百一十十二萬五千六百八大呂八寸四分二釐大呂八寸四分二釐十六萬五千八百八十八十六萬七千二百七十八夷則五寸六分一釐五寸七分十一萬五百九十二十一萬二千一百八十一夾鍾七寸四分九七寸五分八十四萬七千四百五十六無射四寸九分九五寸九釐九萬八千三百四中呂六寸六分六釐六寸七分七釐十三萬一千七十二黃鍾八寸八分八釐九寸十七萬四千七百六十二論曰律呂相生皆三分而損益之先儒推十二律從子至亥每三之凡十七萬七千一百四十七而三約之是為上生故漢志云三分損一下生林鐘三分益一上生太蔟無射既上生中呂則中呂又當上生黃鐘然後五聲六律十二管還相為宮今上生不及黃鐘實二千三百八十四九約實一千九百六十八為一分此則不周九寸之律一分有奇豈得還為宮乎凡三分益一為上生三分損一為下生此其大略猶周天斗分四分之一耳京房不思此意比十二律微有所增方引而伸之中呂上生執始執始下生去滅至於南事為六十律竟復不合彌益其疏班氏所志未能通律呂本源徒訓角為觸徵為祉陽氣施種於黃鐘如斯之屬空煩其文而為辭費又推九六欲符劉歆三統之數假託非類以飾其說皆孟堅之妄矣蔡邕從朔方上書云前漢志但載十二律不及六十六律尺寸相生司馬彪皆已志之漢末亡失雅樂黃初中鑄工柴玉巧有意思形器之中多所造作協律都尉杜夔令玉鑄鐘其聲清濁多不如法數毀改作玉甚厭之謂夔清濁任意更相訴白於魏王魏王取玉所鑄鐘雜錯更試然後知夔為精於是罪玉及諸子皆為養馬主晉泰始十年中書監荀勗中書令張華出御府銅竹律二十五具部太樂郎劉秀等校試其三具與杜夔及左延年律法同其二十二具視其銘題尺寸是笛律也問協律中郎將列和辭昔魏明帝時令和承受笛聲以作此律欲使學者別居一坊歌詠講習依此律調至於都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也勗等奏昔先王之作樂也以振風蕩俗饗神佐賢必協律呂之和以節八音之用是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宮此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度考以正律皆不相應吹其聲均多不諧合又辭先師傳笛別其清濁直以長短工人裁制舊不依律是為作笛無法而知寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂憲於後者也謹條牒諸律問和意狀如左及依典制用十二律造笛像十二枚聲均調和器用便利講肄彈擊必合律呂況乎宴饗萬國奏之廟堂者哉雖伶夔曠遠至音難精猶宜儀形古昔以求厥衷合於經禮於制為詳若可施用請更部笛工選竹造作下太樂樂府施行平議諸杜夔左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毀奏可勗又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東廂長笛正聲已長四尺二寸今當復取其下徵之聲於法聲濁者笛當長計其尺寸乃五尺有餘和昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輒應一律也案太樂四尺二寸笛正聲均應蕤賓以十二律還相為宮推法下徵之孔當應律大呂大呂笛長二尺六寸有奇不得長五尺餘令太樂郎劉秀鄧昊等依律作大呂笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓箏宋同吹笛以為雜引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而今調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宮商角徵不孔調與不調以和檢知和辭先師相傳吹笛但以作曲相語為某曲當與某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依案舊像訖但吹取鳴者初不復校其諸孔調與不調也案周禮調樂金石有一定之聲是故造鐘磬者先依律調之然後施於廂懸作樂之時諸音皆受鐘磬之均即為悉應律也至於饗宴殿堂之上無廂懸鐘磬以笛有一定調故諸絃歌皆從笛為正是為笛猶鍾磬宜必合於律呂如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正唯取竹之鳴者為無法制輒令部郎劉秀鄧昊王豔魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律呂之義作樂音均高下清濁之調當以何名之和辭每合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然案周禮奏六樂乃奏黃鐘歌大呂乃奏太蔟歌應鐘皆以律呂之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺一寸者應無射之律若宜用長笛執樂者曰請奏無射周語曰無射所以宣布哲人之令德示民軌儀也二尺八寸四分四釐應黃鐘之律若宜用短笛執樂者曰請奏黃鐘周語曰黃鐘所以宣養六氣九德也是則歌奏之義當合經禮考之古典於制為雅書曰予欲聞六律五聲八音在治忽始周禮載六律六同禮記又曰五聲十二律還相為宮劉歆班固纂律歷志亦紀十二律唯京房始創六十律至章帝時其法已亡蔡邕雖追古作其言亦曰今無能為者依案古典及今音家所用六十律者無施於樂謹依典記以五聲十二律還相為宮之法制十二笛象記注圖側如別省圖不如視笛之了故復重作蕤賓伏孔笛其制云黃鐘之笛正聲應黃鐘下徵應林鐘長二尺八寸四分四釐有奇正聲調法黃鐘為宮應鐘為變宮南呂為羽林鐘為徵蕤賓為變徵姑洗為角太蔟為商正聲調法黃鐘為宮宮生徵黃鐘生林鐘也徵生商林鐘生太蔟也商生羽太蔟生南呂也羽生角南呂生姑洗也角生變宮姑洗生應鐘也變宮生變徵應鐘生蕤賓也下徵調法林鐘為宮南呂為商應鐘為角黃鐘為變徵太蔟為徵姑洗為羽蕤賓為變宮清角之調以姑洗為宮蕤賓為商林鐘為角南呂為變徵應鐘為徵黃鐘為羽太蔟為變宮凡笛體用角律其長者八之短者四之空中實容長者十六三宮二十一變也伏孔四所以便事用也大呂之笛正聲應大呂下徵應夷則長二尺六寸六分三釐有奇太蔟之笛正聲應太蔟下徵應南呂長二尺五寸三分一釐有奇夾鐘之笛正聲應夾鐘下徵應無射長二尺四寸姑洗之笛正聲應姑洗下徵應應鐘長二尺二寸四分七釐有奇中呂之笛正聲應中呂下徵應黃鍾長二尺一寸三分三釐有奇蕤賓之笛正聲應蕤賓下徵應大呂長三尺九寸九分五釐有奇林鐘之笛正聲應林鐘下徵應太蔟長三尺七寸九分七釐有奇夷則之笛正聲應夷則下徵應夾鐘長三尺六寸南呂之笛正聲應南呂下徵應姑洗長三尺三寸七分一釐有奇無射之笛正聲應無射下徵應中呂長三尺二寸應鐘之笛正聲應應鐘下徵應蕤賓長五尺九寸九分六釐有奇勗又以魏杜夔所制律呂檢校太樂總章鼓吹八音與律乖錯始知後漢至魏尺度漸長於古四分有餘夔依為律呂故致失韻乃部佐著作郎劉恭依周禮更積黍起度以鑄新律既成募求古器得周時玉律比之不差毫釐又漢世故鐘以律命之不叩而自應初勗行道逢趙郡商人縣鐸於牛其聲甚韻至是搜得此鐸以調律呂焉晉武帝以勗律與周漢器合乃施用之散騎侍郎阮咸譏其聲高非興國之音咸亡後掘地得古銅尺果長勗尺四分時人咸服其妙元康中裴頠以為醫方民命之急而稱兩不與古同為害特重宜因此改治權衡不見省黃鐘箱笛晉時三尺八寸元嘉九年太樂令鐘宗之減為三尺七寸十四年治書令史奚縱又減五分為三尺六寸五分太蔟箱笛晉時三尺七寸宗之減為三尺三寸七分縱又減一寸一分為三尺二寸六分姑洗箱笛晉時三尺五寸宗之減為二尺九寸七分縱又減五分為二尺九寸二分蕤賓箱笛晉時二尺九寸宗之減為二尺六寸縱又減二分為二尺五寸八分
