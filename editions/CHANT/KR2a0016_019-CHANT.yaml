body:
  text: 卷二十一志第十一樂三但歌四曲出自漢世無弦節作伎最先一人倡三人和魏武帝尤好之時有宋容華者清澈好聲善唱此曲當時特妙自晉以來不復傳遂絕相和漢舊歌也絲竹更相和執節者歌本一部魏明帝分為二更遞夜宿本十七曲朱生宋識列和等復合之為十三曲相和駕六龍氣出倡武帝詞駕六龍乘風而行行四海外路下之八邦歷登高山臨谿谷乘雲而行行四海外東到泰山仙人玉女下來翱游驂駕六龍飲玉漿河水盡不東流解愁腹飲玉漿奉持行東到蓬萊山上至天之門玉關下引見得入赤松相對四面顧望視正焜煌開王心正興其氣百道至傳告無窮閉其口但當愛氣壽萬年東到海與天連神仙之道出窈入冥常當專之心恬憺無所愒欲閉門坐自守天與期氣願得神之人乘駕雲車驂駕白鹿上到天之門來賜神之藥跪受之敬神齊當如此道自來華陰山自以為大高百丈浮雲為之蓋仙人欲來出隨風削之雨吹我洞簫鼓瑟琴何誾誾酒與歌戲今日相樂誠為樂玉女起起舞移數時鼓吹一何嘈嘈從西北來時仙道多駕煙乘雲駕龍鬱何蓩蓩邀游八極乃到崑崙之山西王母側神仙金止玉亭來者為誰赤松王喬乃德旋之門樂共飲食到黃昏多駕合坐萬歲長宜子孫游君山甚為真磪磈砟硌爾自為神乃到王母臺金階玉為堂芝草生殿傍東西廂客滿堂主人當行觴坐者長壽遽何央長樂甫始宜孫子常願主人增年與天相守厥初生精列武帝詞厥初生造化之陶物莫不有終期莫不有終期聖賢不能免何為懷此憂願螭龍之駕思想崑崙居思想崑崙居見期於迂怪志意在蓬萊志意在蓬萊周孔聖徂落會稽以墳丘會稽以墳丘陶陶誰能度君子以弗憂年之暮奈何過時時來微江南可採蓮江南古辭江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北天地間度關山武帝辭天地間人為貴立君牧民為之軌則車轍馬迹經緯四極絀陟幽明黎庶繁息於鑠賢聖總統邦域封建五爵井田刑獄有燔丹書無普赦贖皋陶甫刑何有失職嗟哉後世改制易律勞民為君役賦其力舜漆食器畔者十國不及唐堯採椽不斲世歎伯夷欲以厲俗侈惡之大儉為恭德許由推讓豈有訟曲兼愛尚同疏者為戚東光乎東光乎古辭東光乎倉梧何不乎倉梧多腐粟無益諸軍糧諸軍游蕩子蚤行多悲傷登山有遠望十五文帝詞登山而遠望谿谷多所有楩柟千餘尺眾草之盛茂華葉燿人目五色難可紀雉雊山雞鳴虎嘯谷風起號羆當我道狂顧動牙齒惟漢二十二世䪥露武帝詞惟漢二十二世所任誠不良沐猴而冠帶智小而謀強猶豫不敢斷因狩執君王白虹為貫日己亦先受殃賊臣持國柄殺主滅宇京蕩覆帝基業宗廟以燔喪播越西遷移號泣而且行瞻彼洛城郭微子為哀傷關東有義士蒿里行武帝詞關東有義士興兵討群凶初期會孟津乃心在咸陽軍合力不齊躊躇而雁行勢利使人爭嗣還自相戕淮南弟稱號刻璽於北方鎧甲生蟣蝨萬姓以死亡白骨露於野千里無雞鳴生民百遺一念之絕人腸對酒歌太平時對酒武帝詞對酒歌太平時吏不呼門王者賢且明宰相股肱皆忠良咸禮讓民無所爭訟三年耕有九年儲倉穀滿盈斑白不負戴雨澤如此五穀用成卻走馬以糞其土田爵公侯伯子男咸愛其民以黜陟幽明子養有若父與兄犯禮法輕重隨其刑路無拾遺之私囹圄空虛冬節不斷人耄耋皆得以壽終恩德廣及草木昆蟲對酒歌太平時對酒武帝詞雞鳴高樹顛雞鳴古詞雞鳴高樹顛狗吠深宮中蕩子何所之天下方太平刑法非有貸柔協正亂名黃金為君門璧玉為軒闌堂上有雙尊酒作使邯鄲倡劉玉碧青甓後出郭門王舍後有方池池中雙鴛鴦鴛鴦七十二羅列自成行鳴聲何啾啾聞我殿東廂兄弟四五人皆為侍中郎五日一時來觀者滿道傍黃金絡馬頭熲熲何煌煌桃生露井上李樹生桃傍蟲來齧桃根李樹代桃僵樹木身相代兄弟還相忘烏生八九子烏生古辭烏生八九子端坐秦氏桂樹間唶我秦氏家有游遨蕩子工用雎陽強蘇合彈左手持強彈兩丸出入烏東西唶我一丸即發中烏身烏死魂魄飛揚上天阿母生烏子時乃在南山巖石間唶我人民安知烏子處蹊徑窈窕安從通白鹿乃在上林西苑中射工尚復得白鹿脯哺唶我黃鵠摩天極高飛後宮尚復得亨煮之鯉魚乃在洛水深淵中釣鉤尚得鯉魚口唶我人民生各各有壽命死生何須復道前後平陵東平陵古詞平陵東松柏桐不知何人劫義公劫義公在高堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黃犢棄故鄉陌上桑文帝詞棄故鄉離室宅遠從軍旅萬里客披荊棘求阡陌側足獨窘步路局笮虎豹嗥動雞驚禽失群鳴相索登南山奈何蹈槃石樹木叢生鬱差錯寢蒿草蔭松柏涕泣雨面霑枕席伴旅單稍稍日零落惆悵竊自憐相痛惜今有人陌上桑楚詞鈔今有人山之阿被服薜荔帶女蘿既含睇又宜笑子戀慕予善窈窕乘赤豹從文貍新夷車駕結桂旗被石蘭帶杜衡折芳拔荃遺所思處幽室終不見天路險艱獨後來表獨立山之上雲何容容而在下杳冥冥羌晝晦東風飄颻神靈雨風瑟瑟木搜搜思念公子徒以憂駕虹蜺陌上桑武帝詞駕虹蜺乘赤雲登彼九疑歷王門濟天漢至崑崙見西王母謁東君交赤松及羨門受要祕道愛精神食芝英飲醴泉拄杖桂枝佩秋蘭絕人事游渾元若疾風游欻飄飄景未移行數千壽如南山不忘愆清商三調歌詩荀勗撰舊詞施用者平調周西短歌行武帝詞周西伯昌懷此聖德參分天下而有其二修奉貢獻臣節不墜崇侯讒之是以拘繫後見赦原賜之斧鉞得使征伐為仲尼所稱達及德行猶奉事殷論敘其美齊桓之功為霸之首九合諸侯一匡天下一匡天下不以兵車正而不譎其德傳稱孔子所歎并稱夷吾民受其恩賜與廟胙命無下拜小白不敢爾天威在顏咫尺晉文亦霸躬奉天王受賜珪瓚秬鬯彤弓盧弓矢千虎賁三百人威服諸侯師之者尊八方聞之名亞齊桓河陽之會詐稱周王是以其名紛葩秋風燕歌行文帝詞秋風蕭瑟天氣涼草木搖落露為霜群燕辭歸鵠南翔念君客游多思腸慊慊思歸戀故鄉君何淹留寄它方賤妾煢煢守空房憂來思君不敢忘不覺淚下霑衣裳援瑟鳴弦發清商短歌微吟不能長明月皎皎照我床星漢西流夜未央牽牛織女遙相望爾獨何辜限河梁仰瞻短歌行文帝詞仰瞻帷幕俯察几筵其物如故其人不存神靈倏忽棄我遐遷靡瞻靡恃泣涕連連呦呦游鹿銜草鳴麑翩翩飛鳥挾子巢棲我獨孤煢懷此百離憂心孔疾莫我能知人亦有言憂令人老嗟我白髮生一何早長吟永歎懷我聖考曰仁曰壽胡不是保別日燕歌行文帝詞別日何易會日難山川悠遠路漫漫鬱陶思君未敢言寄書浮雲往不還涕零雨面毀形顏誰能懷憂獨不歎耿耿伏枕不能眠披衣出戶步東西展詩清歌聊自寬樂往哀來摧心肝悲風清厲秋氣寒羅帷徐動經秦軒仰戴星月觀雲間飛鳥晨鳴聲氣可憐留連顧懷不自存對酒短歌行武帝詞對酒當歌人生幾何譬如朝露去日苦多慨當以忼憂思難忘以何解愁唯有杜康青青子衿悠悠我心但為君故沈吟至今明明如月何時可掇憂從中來不可斷絕呦呦鹿鳴食野之苹我有嘉賓鼓瑟吹笙山不厭高水不厭深周公吐哺天下歸心清調晨上秋胡行武帝詞晨上散關山此道當何難晨上散關山此道當何難牛頓不起車墮谷間坐盤石之上彈五弦之琴作為清角韻意中述煩歌以言志晨上散關山有何三老公卒來在我傍有何三老公卒來在我傍員揜被裘似非恒人謂卿云何困苦以自怨徨徨所欲來到此間歌以言志有何三老公我居崑崙山所謂者真人我居崑崙山所謂者真人道深有可得名山歷觀遨游八極枕石漱流飲泉沈吟不決遂上升天歌以言志我居崑崙山去去不可追長恨相牽攀去去不可追長恨相牽攀夜夜安得寐惆悵以自憐正而不譎辭賦依因經傳所過西來所傳歌以言志去去不可追北上苦寒行武帝詞北上太行山艱哉何巍巍羊腸阪詰屈車輪為之摧樹木何蕭瑟北風聲正悲熊羆對我蹲虎豹夾道啼谿谷少人民雪落何霏霏延頸長歎息遠行多所懷我心何佛鬱思欲一東歸水深橋梁絕中道正裴回迷惑失徑路暝無所宿棲行行日以遠人馬同時飢儋囊行取薪斧冰持作糜悲彼東山詩悠悠使我哀願登秋胡行武帝詞願登泰華山神人共遠游經歷崑崙山到蓬萊飄颻八極與神人俱思得神藥萬歲為期歌以言志願登泰華山天地何長久人道居之短世言伯陽殊不知老赤松王喬亦云得道得之未聞庶以壽考歌以言志天地何長久明明日月光何所不光昭二儀合聖化貴者獨人不萬國率土莫非王臣仁義為名禮樂為榮歌以言志明明日月光四時更逝去晝夜以成歲大人先天而天弗違不戚年往世憂不治存亡有命慮之為蚩歌以言志四時更逝去戚戚欲何念歡笑意所之盛壯智慧殊不再來愛時進趣將以惠誰氾氾放逸亦同何為歌以言志戚戚欲何念上謁董桃行古詞吾欲上謁從高山山頭危嶮大難遙望五嶽端黃金為闕班璘但見芝草葉落紛紛百鳥集來如煙山獸紛綸麟辟邪其端鵾雞聲鳴但見山獸援戲相拘攀小復前行玉堂未心懷流還傳教出門來門外人何求所言欲從聖道求一得命延教敕凡吏受言采取神藥若水端白兔長跪擣藥蝦蟆丸奉上陛下一玉柈服此藥可得即仙服爾神藥無不歡喜陛下長生老壽四面肅肅稽首天神擁護左右陛下長與天相保守蒲生塘上行武帝詞蒲生我池中其葉何離離傍能行儀儀莫能縷自知眾口鑠黃金使君生別離念君去我時獨愁常苦悲想見君顏色感結傷心脾今悉夜夜愁不寐莫用豪賢故棄捐素所愛莫用魚肉貴棄捐蔥與薤莫用麻枲賤棄捐菅與蒯倍恩者苦栝蹶船常苦沒教君安息定慎莫致倉卒念與君一共離別亦當何時共坐復相對出亦復苦愁入亦復苦愁邊地多悲風樹木何蕭蕭今日樂相樂延年壽千秋悠悠苦寒行明帝詞悠悠發洛都茾我征東行征行彌二旬屯吹隴陂城顧觀故壘處皇祖之所營屋室若平昔棟宇無邪傾奈何我皇祖潛德隱聖形雖沒而不朽書貴垂休名光光我皇祖軒燿同其榮遺化布四海八表以肅清雖有吳蜀寇春秋足燿兵徒悲我皇祖不永享百齡賦詩以寫懷伏軾淚霑纓瑟調朝日善哉行文帝詞朝日樂相樂酣飲不知醉悲弦激新聲長笛吐清氣弦歌感人腸四坐皆歡說寥寥高堂上涼風入我室持滿如不盈有得者能卒君子多苦心所愁不但一慊慊下白屋吐握不可失眾賓飽滿歸主人苦不悉比翼翔雲漢羅者安所羈沖靜得自然榮華何足為上山善哉行文帝詞上山采薇薄莫苦饑溪谷多風霜露沾衣野雉群雊猿猴相追還望故鄉鬱何壘壘高山有崖林木有支憂來無方人莫之知人生若寄多憂何為今我不樂歲月其馳湯湯川流中有行舟隨波轉薄有似客游策我良馬被我輕裘載馳載驅聊以忘憂朝游善哉行文帝詞朝游高臺觀夕宴華池陰大酋奉甘醪狩人獻嘉禽齊倡發東舞秦箏奏西音有客從南來為我彈清琴五音紛繁會拊者激微吟淫魚乘波聽踴躍自浮沈飛鳴翻翔舞悲鳴集北林樂極哀情來憀亮摧肝心清角豈不妙德薄所不任大哉子野言弭弦且自禁古公善哉行武帝詞古公亶甫積德垂仁思弘一道哲王於豳太伯仲雍王德之仁行施百世斷髮文身伯夷叔齊古之遺賢讓國不用餓殂首山智哉山甫相彼宣王何用杜伯累我聖賢齊桓之霸賴得仲父後任豎刁蟲流出戶晏子平仲積德兼仁與世沈德未必思命仲尼之世王國為君隨制飲酒揚波使官自惜善哉行武帝詞自惜身薄祐夙賤罹孤苦既無三徙教不聞過庭語其窮如抽裂自以思所怙雖懷一介志是時其能與守窮者貧賤惋歎淚如雨泣涕於悲夫乞活安能睹我願於天窮琅邪傾側左雖欲竭忠誠欣公歸其楚快人曰為歎抱情不得敘顯行天教人誰知莫不緒我願何時隨此歎亦難處今我將何照於光耀釋銜不如雨我徂善哉行明帝詞我徂我征伐彼蠻虜練師簡卒爰正其旅輕舟竟川初鴻依浦桓桓猛毅如羆如虎發砲若雷吐氣成雨旄旍指麾進退應矩百馬齊轡御由造父休休六軍咸同斯武兼塗星邁亮茲行阻行行日遠西背京許游弗淹旬遂屆揚土奔寇震懼莫敢當御虎臣列將怫鬱免怒淮泗肅清奮揚微所運德燿威惟鎮惟撫反旆言歸告入皇祖赫赫善哉行明帝詞赫赫大魏王師徂征冒暑討亂振燿威靈汎舟黃河隨波潺湲通渠回越行路綿綿采旄蔽日旗旒翳天淫魚瀺灂游戲深淵唯塘泊從如流不為單握揚楚心惆悵歌采薇心綿綿在淮肥願君速捷蚤旋歸來日善哉行古詞來日大難口燥脣乾今日相樂皆當喜歡經歷名山芝草翻翻仙人王喬奉藥一丸自惜袖短內手知寒慚無靈輒以報趙宣月沒參橫北斗闌干親交在門饑不及餐歡日尚少戚日苦多以何忘憂彈箏酒歌淮南八公要道不煩參駕六龍游戲雲端大曲東門東門行古詞出東門不顧歸來入門悵欲悲盎中無斗儲還視桁上無縣衣拔劍出門去兒女牽衣啼它家但願富貴賤妾與君共餔糜共餔糜上用倉浪天故下為黃口小兒今時清廉難犯教言君復自愛莫為非今時清廉難犯教言君復自愛莫為非行吾去為遲平慎行望吾歸西山折楊柳行文帝詞西山一何高高高殊無極上有兩仙僮不飲亦不食與我一丸藥光耀有五色服藥四五日身體生羽翼輕舉乘浮雲倏忽行萬億流覽觀四海芒芒非所識彭祖稱七百悠悠安可原老聃適西戎于今竟不還王喬假虛詞赤松垂空言達人識真偽愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀羅敷艷歌羅敷行古詞日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷喜蠶桑采桑城南隅青絲為籠係桂枝為籠鉤頭上倭墮髻耳中明月珠緗綺為下裙紫綺為上襦行者見羅敷下儋捋髭須少年見羅敷脫帽著帩頭耕者忘其犁鋤者忘其鋤來歸相怒怨但坐觀羅敷使君從南來五馬立跱躇使君遣吏往問是誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寧可共載不羅敷前置詞使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭腰中鹿盧劍可直千萬餘十五府小史二十朝大夫三十侍中郎四十專城居為人潔白晢鬑鬑頗有須盈盈公府步冉冉府中趨坐中數千人皆言夫壻殊西門西門行古詞出西門步念之今日不作樂當待何時夫為樂為樂當及時何能坐愁怫鬱當復待來茲飲醇酒炙肥牛請呼心所歡可用解愁憂人生不滿百常懷千歲憂晝短而夜長何不秉燭游自非仙人王子喬計會壽命難與期人壽非金石年命安可期貪財愛惜費但為後世嗤默默折楊柳行古詞默默施行違厥罰隨事來末喜殺龍逢桀放於鳴條祖伊言不用紂頭縣白旄指鹿用為馬胡亥以喪軀夫差臨命絕乃云負子胥戎王納女樂以亡其由余璧馬禍及虢二國俱為墟三夫成市虎慈母投杼趨卞和之刖足接予歸草廬園桃煌煌京洛行文帝詞夭夭園桃無子空長虛美難假偏輪不行淮陰五行鳥得弓藏保身全名獨有子房大憤不收襃衣無帶多言寡誠祗令事敗蘇秦之說六國以亡傾側賣主車裂固當賢矣陳軫忠而有謀楚懷不從禍卒不救禍夫吳起智小謀大西河何健伏尸何劣嗟彼郭生古之雅人智矣燕昭可謂得臣峨峨仲連齊之高士北辭千金東蹈滄海白鵠艷歌阿嘗古詞飛來雙白鵠乃從西北來十十五五羅列成行妻卒被病行不能相隨五里一反顧六里一裴回吾欲銜汝去口噤不能開吾欲負汝去毛羽何摧頹樂哉新相知憂來生別離躇躊顧群侶淚下不自知念與君離別氣結不能言各各重自愛道遠歸還難妾當守空房閉門下重關若生當相見亡者會黃泉今日樂相樂延年萬歲期碣石步出夏門行武帝詞雲行雨步超越九江之皋臨觀異同心意懷游豫不知當復何從經過至我碣石心惆悵我東海東臨碣石以觀滄海水何淡淡山島竦峙樹木叢生百草豐茂秋風蕭瑟洪濤湧起日月之行若出其中星漢燦爛若出其裏幸甚至哉歌以詠志觀滄海孟冬十月北風裴回天氣肅清繁霜霏霏鵾雞晨鳴鴻雁南飛鷙鳥潛藏熊羆窟棲錢鎛停置農收積場逆旅正設以通賈商幸甚至哉歌以詠志冬十月鄉土不同河朔隆寒流澌浮漂舟船行難錐不入地豐藾深奧水竭不流冰堅可蹈士隱者貧勇俠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志河朔寒神龜雖壽猶有竟時騰蛇乘霧終為土灰驥老伏歷志在千里烈士暮年壯心不已盈縮之期不但在天養怡之福可得永年幸甚至哉歌以詠志神龜雖壽何嘗艷歌何嘗行古辭何嘗快獨無憂但當飲醇酒炙肥牛長兄為二千石中兄被貂裘小弟雖無官爵鞍馬往來王侯長者遊但當在王侯殿上快獨摴蒲六博對坐彈碁男兒居世各當努力蹙迫日暮殊不久留少小相觸抵寒苦常相隨忿恚安足諍吾中道與卿共別離約身奉事君禮節不可虧上慚滄浪之夫下顧黃口小兒奈何復老心皇皇獨悲誰能知置酒野田黃雀行東阿王詞置酒高殿上親交從我游中廚辦豐膳烹羊宰肥牛秦箏何忼慨齊瑟和且柔陽阿奏奇舞京洛出名謳樂飲過三爵緩帶傾庶羞主稱千金壽賓奉萬年酬久要不可忘薄終義所尤謙謙君子德磬折欲何求盛時不再來百年忽我遒驚風飄白日光景馳西流生存華屋處零落歸山丘先民誰不死知命復何憂為樂滿歌行古詞為樂未幾時遭世險巇逢此百離伶丁荼毒愁懣難支遙望辰極天曉月移憂來闐心誰當我知戚戚多思慮耿耿不寧禍福無形唯念古人遜位躬耕遂我所願以茲自寧自鄙山棲守此一榮莫秋冽風起西蹈滄海心不能安攬衣起瞻夜北斗闌干星漢照我去去自無它奉事二親勞心可言窮達天所為智者不愁多為少憂安貧樂正道師彼莊周遺名者貴子熙同巇往者二賢名垂千秋飲酒歌舞不樂何須善哉照觀日月日月馳驅轗軻世間何有何無貪財惜費此一何愚命如鑿石見火居世竟能幾時但當歡樂自娛盡心極所熙怡安善養君德性百年保此期頤夏門步出夏門行明帝詞步出夏門東登首陽山嗟哉夷叔仲尼稱賢君子退讓小人爭先惟斯二子于今稱傳林鐘受謝節改時遷日月不居誰得久存善哉殊復善弦歌樂情商風夕起悲彼秋蟬變形易色隨風東西乃眷西顧雲霧相連丹霞蔽日采虹帶天弱水潺潺落葉翩翩孤禽失群悲鳴其間善哉殊復善悲鳴在其間朝游清泠日莫嗟歸蹙迫日莫烏鵲南飛繞樹三匝何枝可依卒逢風雨樹折枝摧雄來驚雌雌獨愁棲夜失群侶悲鳴裴回芃芃荊棘葛生綿綿感彼風人惆悵自憐月盈則沖華不再繁古來之說嗟哉一言王者布大化棹歌行明帝詞王者布大化配乾稽后祗陽育則陰殺晷景應度移文德以時振武功伐不隨重華舞干戚有苗服從媯蠢爾吳蜀虜馮江棲山阻哀哀王士民瞻仰靡依怙皇上悼愍斯宿昔奮天怒發我許昌宮列舟于長浦翌日乘波揚棹歌悲且涼大常拂白日旗幟紛設張將抗旄與鉞燿威於彼方伐罪以弔民清我東南疆洛陽行雁門太守行古詞孝和帝在時洛陽令王君本自益州廣漢民小行宦學通五經論明知法令歷世衣冠從溫補洛陽令治行致賢擁護百姓子養萬民外行猛政內懷慈仁文武備具料民富貧移惡子姓名五篇著里端傷殺人比伍同罪對門禁鎦矛八尺捕輕薄少年加笞決罪詣馬市論無妄發賦念在理冤敕吏正獄不得苛煩財用錢三十買繩禮竿賢哉賢哉我縣王君臣吏衣冠奉事皇帝功曹主簿皆得其人臨部居職不敢行恩清身苦體夙夜勞勤治有能名遠近所聞天年不遂蚤就奄昏為君作祠安陽亭西欲令後世莫不稱傳白頭吟與棹歌同調古詞晴如山上雲皎若雲間月聞君有兩意故來相決絕平生共城中何嘗斗酒會今日斗酒會明旦溝水頭蹀踥御溝上溝水東西流郭東亦有樵郭西亦有樵兩樵相推與無親為誰驕淒淒重淒淒嫁娶亦不啼願得一心人白頭不相離竹竿何嫋嫋魚尾何離簁男兒欲相知何用錢刀為䶘如五馬噉萁川上高士嬉今日相對樂延年萬歲期楚調怨詩明月東阿王詞明月照高樓流光正裴回上有愁思婦悲歎有餘哀借問歎者誰自云客子妻夫行踰十載賤妾常獨棲念君過於渴思君劇於饑君為高山柏妾為濁水泥北風行蕭蕭烈烈入吾耳心中念故人淚墮不能止沈浮各異路會合當何諧願作東北風吹我入君懷君懷常不開賤妾當何依恩情中道絕流止任東西我欲竟此曲此曲悲且長今日樂相樂別後莫相忘
