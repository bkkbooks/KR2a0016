body:
  text: 卷二十二志第十二樂四漢鼙舞歌五篇關東有賢女章和二年中樂久長四方皇殿前生桂樹魏鼙舞歌五篇明明魏皇帝太和有聖帝魏歷長天生烝民為君既不易魏陳思王鼙舞歌五篇聖皇篇當章和二年中聖皇應歷數正康帝道休九州咸賓服威德洞八幽三公奏諸公不得久淹留蕃位任至重舊章咸率由侍臣省文奏陛下體仁慈沈吟有愛戀不忍聽可之迫有官典憲不得顧恩私諸王當就國璽綬何累縗便時舍外殿宮省寂無人主上增顧念皇母懷苦辛何以為贈賜傾府竭寶珍文錢百億萬采帛若煙雲乘輿服御物錦羅與金銀龍旗垂九旒羽蓋參班輪諸王自計念無功荷厚德思一效筋力糜軀以報國鴻臚擁節衛副使隨經營貴戚並出送夾道交輜軿車服齊整設韡曄燿天精武騎衛前後鼓吹簫笳聲祖道魏東門淚下霑冠纓扳蓋因內顧俛仰慕同生行行將日莫何時還闕庭車輪為裴回四馬躊躇鳴路人尚酸鼻何況骨肉情靈芝篇當殿前生桂樹靈芝生玉地朱草被洛濱榮華相晃燿光采曄若神古時有虞舜父母頑且嚚盡孝於田隴烝烝不違仁伯瑜年七十采衣以娛親慈母笞不痛歔欷涕沾巾丁蘭少失母自傷蚤孤煢刻木當嚴親朝夕致三牲暴子見陵侮犯罪以亡形丈人為泣血免戾全其名董永遭家貧父老財無遺舉假以供養傭作致甘肥責家填門至不知何用歸天靈感至德神女為秉機歲月不安居烏乎我皇考生我既已晚棄我何期蚤蓼莪誰所興念之令人老退詠南風詩灑淚滿褘抱亂曰聖皇君四海德教朝夕宣萬國咸禮讓百姓家肅虔庠序不失儀孝悌處中田戶有曾閔子比屋皆仁賢髫齔無夭齒黃髮盡其年陛下三萬歲慈母亦復然大魏篇當漢吉昌大魏應靈符天祿方甫始聖教致泰和神明為驅使左右宜供養中殿宜皇子陛下長壽考群臣拜賀咸說喜積善有餘慶榮祿固天常眾善填門至臣子蒙福祥無患及陽遂輔翼我聖皇眾吉咸集會凶邪姦惡並滅亡黃鵠游殿前神鼎周四阿玉馬充乘輿芝蓋樹九華白虎戲西除舍利從辟邪騏驎躡足舞鳳凰拊翼歌豐年大置酒玉尊列廣庭樂飲過三爵朱顏暴己形式宴不違禮君臣歌鹿鳴樂人舞鼙鼓百官雷抃贊若驚儲禮如江海積善若陵山皇嗣繁且熾孫子列曾玄群臣咸稱萬歲陛下長樂壽年御酒停未飲貴戚跪東廂侍人承顏色奉進金玉觴此酒亦真酒福祿當聖皇陛下臨軒笑左右咸歡康桮來一何遲群僚以次行賞賜累千億百官並富昌精微篇當關東有賢女精微爛金石至心動神明杞妻哭死夫梁山為之傾子丹西質秦烏白馬角生鄒羨囚燕市繁霜為夏零關東有賢女自字蘇來卿壯年報父仇身沒垂功名女休逢赦書白刃幾在頸俱上列仙籍去死獨就生太倉令有罪遠徵當就拘自悲居無男禍至無與俱緹縈痛父言何儋西上書槃桓北闕下泣淚何漣如乞得并姊弟沒身贖父軀漢文感其義肉刑法用除其父得以免辨義在列圖多男亦何為一女足成居簡子南渡河津吏廢舟船執法將加刑女娟擁櫂前妾父聞君來將涉不測淵畏懼風波起禱祝祭名川備禮饗神祗為君求福先不勝釂祀誠至令犯罰艱君必欲加誅乞使知罪愆妾願以身代至誠感蒼天國君高其義其父用赦原河激奏中流簡子知其賢歸娉為夫人榮寵超後先辨女解父命何況健少年黃初發和氣明堂德教施治道致太平禮樂風俗移刑錯民無枉怨女復何為聖皇長壽考景福常來儀孟冬篇當狡兔孟冬十月陰氣厲清武官誡田講旅統兵元龜襲吉元光著明蚩尤蹕路風弭雨停乘輿啟行鸞鳴幽軋虎賁采騎飛象珥鶡鐘鼓鏗鏘簫管嘈喝萬騎齊鑣千乘等蓋夷山填谷平林滌藪張羅萬里盡其飛走翟翟狡兔揚白跳翰獵以青骹掩以修竿韓盧宋鵲呈才騁足噬不盡緤牽麋掎鹿魏氏發機養基撫弦都盧尋高搜索猴猿慶忌孟賁蹈谷超巒張目決眥髮怒穿冠頓熊扼虎蹴豹搏貙氣有餘勢負象而趨獲車既盈日側樂終罷役解徒大饗離宮亂曰聖皇臨飛軒論功校獵徒死禽積如京流血成溝渠明詔大勞賜大官供有無走馬行酒醴驅車布肉魚鳴鼓舉觴爵鐘擊位無餘絕網縱驎麑弛罩出鳳雛收功在羽校威靈振鬼區陛下長懽樂永世合天符晉鼙舞歌五篇洪業篇鼙舞歌當魏曲明明魏皇帝古曲關東有賢女宣文創洪業盛德在泰始聖皇應靈符受命君四海萬國何所樂上有明天子唐堯禪帝位虞舜惟恭己恭己正南面道化與時移大赦盪萌漸文教被黃支象天則地體無為聰明配日月神聖參兩儀雖有三凶類靜言無所施象天則地體無為稷契並佐命伊呂升王臣蘭芷登朝肆下無失宿民聲發響自應表立景來附虓虎從羈制潛龍升天路備物立成器變通極其數百事以時敘萬幾有常度訓之以克讓納之以忠恕群下仰清風海外同懽慕象天則地化雲布昔日貴雕飾今尚儉與素昔日多纖介今去情與故象天則地化雲布濟濟大朝士夙夜綜萬機萬機無廢理明明降疇咨臣譬列星景君配朝日暉事業並通濟功烈何巍巍五帝繼三皇三王世所歸聖德應期運天地不能違仰之彌已高猶天不可階將復御龍氏鳳皇在庭棲天命篇鼙舞歌當魏曲太和有聖帝古曲章和二年中聖祖受天命應期輔魏皇入則綜萬機出則征四方朝廷無遺理方表寧且康道隆舜臣堯積德踰太王孟度阻窮險造亂天一隅神兵出不意奉命致天誅赦善戮有罪元惡宗為虛威風震勁蜀武烈慴強吳諸葛不知命肆逆亂天常擁徒十餘萬數來寇邊疆我皇邁神武秉鉞鎮雍涼亮乃畏天威未戰先仆僵盈虛自然運時變固多難東征陵海表萬里梟賊淵受遺齊七政曹爽又滔天群凶受誅殛百祿咸來臻黃華應福始王凌為禍先景皇帝鼙舞歌當魏曲魏歷長古曲樂久長景皇帝聰明命世生盛德參天地帝王道創基既已難繼世亦未易外則夏侯玄內則張與李三凶稱逆亂帝紀從天行誅窮其姦宄遏將御其漸潛謀不得起罪人咸伏辜威風震萬里平衡綜萬機萬機無不理召陵桓不君內外何紛紛眾小便成群蒙昧恣心治亂不分叡聖獨斷濟武常以文從天惟廢立掃霓披浮雲雲霓既已闢清和未幾間羽檄首尾至變起東南蕃儉欽為長蛇外則馮吳蠻萬國紛騷擾戚戚天下懼不安神武御六軍我皇秉鉞征儉欽起壽春前鋒據項城出其不意並縱奇兵奇兵誠難御廟勝實難支兩軍不期遇敵退計無施虎騎惟武進大戰沙陽陂欽乃亡魂走奔虜若雲披天恩赦有罪東土放鯨鯢大晉篇鼙舞歌當魏曲天生蒸民古曲四方皇赫赫大晉於穆文皇蕩蕩巍巍道邁陶唐世稱三皇五帝及今重其光九德克明文既顯武又章恩弘六合兼濟萬方內舉元凱朝政以綱外簡虎臣時惟鷹揚靡從不懷逆命斯亡仁配春日威踰秋霜濟濟多士同茲蘭芳唐虞至治四凶滔天致討儉欽罔不肅虔化感海外海外來賓獻其聲樂並稱妾臣西蜀猾夏僭號方域命將致計委國稽服吳人放命馮海阻江飛書告諭響應來同先王建萬國九服為蕃衛亡秦壞諸侯序胙不二世歷代不能復忽踰五百歲我皇邁聖德應期創典制分土五等蕃國正封界莘莘文武佐千秋遘嘉會洪業溢區內仁風翔海外明君篇鼙舞歌當魏曲為君既不易古曲殿前生桂樹明君御四海聽鑑盡物情顧望有譴罰竭忠身必榮蘭茞出荒野萬里升紫庭茨草穢堂階埽截不得生能否莫相蒙百官正其名恭己慎有為有為無不成闇君不自信群下執異端正直罹譖潤姦臣奪其權雖欲盡忠誠結舌不敢言結舌亦何憚盡忠為身患清流豈不潔飛塵濁其源歧路令人迷未遠勝不還忠臣立君朝正色不顧身邪正不並存譬若胡與秦秦胡有合時邪正各異津忠臣遇明君乾乾惟日新群目統在綱眾星拱北辰設令遭闇主斥退為凡民雖薄供時用白茅猶可珍冰霜晝夜結蘭桂摧為薪邪臣多端變用心何委曲便辟從情指動隨君所欲偷安樂目前不問清與濁積偽罔時主養交以持祿言行恒相違難饜甚谿谷昧死射乾沒覺露則滅族右五篇鼙舞歌行鐸舞歌詩二篇聖人制禮樂篇昔皇文武邪彌隬舍善誰吾時吾行許帝道銜來治路萬邪治路萬邪赫赫意黃運道吾治路萬邪善道明邪金邪善道明邪金邪帝邪近帝武武邪邪聖皇八音偶邪尊來聖皇八音及來義邪同邪烏及來義邪善草供國吾咄等邪烏近帝邪武邪近帝武邪武邪應節合用武邪尊邪應節合用酒期義邪同邪酒期義邪善草供國吾咄等邪烏近帝邪武邪近帝武武邪邪下音足木上為鼓義邪應眾義邪樂邪邪延否已邪烏已禮祥咄等邪烏素女有絕其聖烏烏武邪雲門篇鐸舞歌行當魏太和時黃雲門唐咸池虞韶舞夏夏殷濩刑代有五振鐸鳴金近大武清歌發倡刑為主聲和八音協律呂身不虛動手不徒舉應節合度周其敘時奏宮商雜之以徵羽下饜眾目上從鐘鼓樂以移風與德禮相輔安有失其所右二篇鐸舞歌行拂舞歌詩五篇白鳩篇翩翩白鳩再飛再鳴懷我君德來集君庭白雀呈瑞素羽明鮮翔庭舞翼以應仁乾交交鳴鳩或丹或黃樂我君惠振羽來翔東壁餘光魚在江湖惠而不費敬我微軀策我良駟習我驅馳與君周旋樂道亡餘我心虛靜我志霑濡彈琴鼓瑟聊以自娛陵雲登臺浮游太清扳龍附鳳日望身輕濟濟篇暢飛暢舞氣流芳追念三五大綺黃去失有時可行去來同時此未央時冉冉近桑榆但當飲酒為歡娛衰老逝有何期多憂耿耿內懷思淵池廣魚獨希願得黃浦眾所依恩感人世無比悲歌具舞無極已獨祿篇獨祿獨祿水深泥濁泥濁尚可水深殺我雍雍雙雁游戲田畔我欲射雁念子孤散翩翩浮萍得風遙輕我心何合與之同并空床低帷誰知無人夜衣錦繡誰別偽真刀鳴箾中倚床無施父冤不報欲活何為猛虎班班游戲山間虎欲嚙人不避豪賢碣石篇東臨碣石以觀滄海水何澹澹山島竦峙樹木叢生百草豐茂秋風蕭瑟洪波湧起日月之行若出其中星漢燦爛若出其裏幸甚至哉歌以詠志觀滄海孟冬十月北風裴回天氣肅清繁霜霏霏鵾雞晨鳴雁過南飛鷙鳥潛藏熊羆窟棲錢鎛停置農收積場逆旅整設以通賈商幸甚至哉歌以詠志冬十月鄉土不同河朔隆寒流澌浮漂舟船難行錐不入地豐籟深奧水竭不流冰堅可蹈士隱者貧勇俠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志土不同神龜雖壽猶有竟時騰蛇乘霧終為土灰老驥伏櫪志在千里烈士莫年壯心不已盈縮之期不但在天養怡之福可得永年幸甚至哉歌以詠志龜雖壽淮南王篇淮南王自言尊百尺高樓與天連後園鑿井銀作床金瓶素綆汲寒漿汲寒漿飲少年少年窈窕何能賢揚聲悲歌音絕天我欲度河河無梁願化雙黃鵠還故鄉還故鄉入故里徘徊故鄉苦身不已繁舞寄聲無不泰徘徊桑梓遊天外右五篇拂舞行柸槃舞歌詩一篇晉世寧四海平普天安樂永大寧四海安天下歡樂治興隆舞柸槃舞柸槃何翩翩舉坐翻覆壽萬年天與日終與一左回右轉不相失箏笛悲酒舞疲心中慷慨可健兒樽酒甘絲竹清願令諸君醉復醒醉復醒時合同四坐歡樂皆言工絲竹音可不聽亦舞此槃左右輕自相當合坐歡樂人命長人命長當結友千秋萬歲皆老壽右柸槃舞歌行巾舞歌詩一篇吾不見公莫時吾何嬰公來嬰姥時吾哺聲何為茂時為來嬰當思吾明月之上轉起吾何嬰土來嬰轉去吾哺聲何為土轉南來嬰當去吾城上羊下食草吾何嬰下來吾食草吾哺聲汝何三年針縮何來嬰吾亦老吾平平門淫涕下吾何嬰何來嬰涕下吾哺聲昔結吾馬客來嬰吾當行吾度四州洛四海吾何嬰海何來嬰海何來嬰四海吾哺聲熇西馬頭香來嬰吾洛道吾河五丈度汲水吾噫邪哺誰當求兒母何意零邪錢健步哺誰當吾求兒母何吾哺