body:
  text: 卷二十三志第十三天文一言天者有三家一曰宣夜二曰蓋天三曰渾天而天之正體經無前說馬書班志又闕其文漢靈帝議郎蔡邕於朔方上書曰論天體者三家宣夜之學絕無師法周髀術數具存考驗天狀多所違失惟渾天僅得其情今史官所用候臺銅儀則其法也立八尺圓體而具天地之形以正黃道占察發歛以行日月以步五緯精微深妙百世不易之道也官有其器而無本書前志亦闕而不論本欲寢伏儀下思惟微意按度成數以著篇章罪惡無狀投畀有北灰滅雨絕勢路無由宜問群臣下及巖穴知渾天之意者使述其義時閹官用事邕議不行漢末吳人陸績善天文始推渾天意王蕃者廬江人吳時為中常侍善數術傳劉洪乾象曆依乾象法而制渾儀立論考度曰前儒舊說天地之體狀如鳥卵天包地外猶殼之裹黃也周旋無端其形渾渾然故曰渾天也周天三百六十五度五百八十九分度之百四十五半露地上半在地下其二端謂之南極北極北極出地三十六度南極入地亦三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隱謂之上規繞南極七十二度常隱不見謂之下規赤道帶天之紘去兩極各九十一度少強黃道日之所行也半在赤道外半在赤道內與赤道東交於角五少弱西交於奎十四少強其出赤道外極遠者去赤道二十四度斗二十一度是也其入赤道內極遠者亦二十四度井二十五度是也日南至在斗二十一度去極百一十五度少強是也日最南去極最遠故景最長黃道斗二十一度出辰入申故日亦出辰入申日晝行地上百四十六度強故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度稍北故日稍北以至於夏至日在井二十五度去極六十七度少強是日最北去極最近景最短黃道井二十五度出寅入戌故日亦出寅入戌日晝行地上二百一十九度少弱故日長夜行地下百四十六度強故夜短自夏至之後日去極稍遠故景稍長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故日出入稍南以至於南至而復初焉斗二十一井二十五南北相覺四十八度春分日在奎十四少強秋分日在角五少弱此黃赤二道之交中也去極俱九十一度少強南北處斗二十一井二十五之中故景居二至長短之中奎十四角五出卯入酉故日亦出卯入酉日晝行地上夜行地下俱百八十二度半強故日見之漏五十刻不見之漏五十刻謂之晝夜同夫天之晝夜以日出入為分人之晝夜以昏明為限日未出二刻半而明日已入二刻半而昏故損夜五刻以益晝是以春秋分之漏晝五十五刻三光之行不必有常術家以算求之各有同異故諸家歷法參差不齊洛書甄燿度春秋考異郵皆云周天一百七萬一千里一度為二千九百三十二里七十一步二尺七寸四分四百八十七分分之三百六十二陸績云天東西南北徑三十五萬七千里此言周三徑一也考之徑一不啻周三率周百四十二而徑四十五則天徑三十二萬九千四百一里一百二十二步二尺二寸一分七十一分分之十周禮日至之景尺有五寸謂之地中鄭眾說土圭之長尺有五寸以夏至之日立八尺之表其景與土圭等謂之地中今潁川陽城地也鄭玄云凡日景於地千里而差一寸景尺有五寸者南戴日下萬五千里也以此推之日當去其下地八萬里矣日邪射陽城則天徑之半也天體圓如彈丸地處天之半而陽城為中則日春秋冬夏昏明晝夜去陽城皆等無盈縮矣故知從日邪射陽城為天徑之半也以勾股法言之傍萬五千里句也立八萬里股也從日邪射陽城弦也以句股求弦法入之得八萬一千三百九十四里三十步五尺三寸六分天徑之半而地上去天之數也倍之得十六萬二千七百八十八里六十一步四尺七寸二分天徑之數也以周率乘之徑率約之得五十一萬二千六百八十七里六十八步一尺八寸二分周天之數也減甄耀度考異郵五十五萬七千三百一十二里有奇一度凡千四百六里百二十四步六寸四分十萬七千五百六十五分分之萬九千三十九減舊度千五百二十五里二百五十六步三尺三寸二十一萬五千一百三十分分之十六萬七百三十分黃赤二道相與交錯其間相去二十四度以兩儀推之二道俱三百六十五度有奇是以知天體圓如彈丸而陸績造渾象其形如鳥卵然則黃道應長於赤道矣績云天東西南北徑三十五萬七千里然則績亦以天形正圓也而渾象為鳥卵則為自相違背古舊渾象以二分為一度凡周七尺三寸半分張衡更制以四分為一度凡周一丈四尺六寸蕃以古制局小星辰稠穊衡器傷大難可轉移更制渾象以三分為一度凡周天一丈九寸五分四分分之三也御史中丞何承天論渾象體曰詳尋前說因觀渾儀研求其意有以悟天形正圓而水周其下言四方者東曰暘谷日之所出西至濛汜日之所入莊子又云北溟之魚化而為鳥將徙於南溟斯亦古之遺記四方皆水證也四方皆水謂之四海凡五行相生水生於金是故百川發源皆自山出由高趣下歸於注海日為陽精光耀炎熾一夜入水所經燋竭百川歸注足於補復故旱不為減浸不為益徑天之數蕃說近之太中大夫徐爰曰渾儀之制未詳厥始王蕃言虞書稱在琁璣玉衡以齊七政則今渾天儀日月五星是也鄭玄說動運為機持正為衡皆以玉為之視其行度觀受禪是非也渾儀羲和氏之舊器歷代相傳謂之璣衡其所由來有原統矣而斯器設在候臺史官禁密學者寡得聞見穿鑿之徒不解機衡之意見有七政之言因以為北斗七星構造虛文託之讖緯史遷班固猶尚惑之鄭玄有贍雅高遠之才沈靜精妙之思超然獨見改正其說聖人復出不易斯言矣蕃之所云如此夫候審七曜當以運行為體設器擬象焉得定其盈縮推斯而言未為通論設使唐虞之世已有渾儀涉歷三代以為定准後世聿遵孰敢非革而三天之儀紛然莫辯至楊雄方難蓋通渾張衡為太史令乃鑄銅制範衡傳云其作渾天儀考步陰陽最為詳密故知自衡以前未有斯儀矣蕃又云渾天遭秦之亂師徒喪絕而失其文惟渾天儀尚在候臺案既非舜之璇玉又不載今儀所造以緯書為穿鑿鄭玄為博實偏信無據未可承用夫璇玉貴美之名璣衡詳細之目所以先儒以為北斗七星天綱運轉聖人仰觀俯察以審時變焉史臣案設器象定其恒度合之則吉失之則凶以之占察有何不可渾文廢絕故有宣蓋之論其術並疏故後人莫述楊雄法言云或人問渾天於雄雄曰落下閎營之鮮于妄人度之耿中丞象之幾幾乎莫之違也若問天形定體渾儀疏密則雄應以渾義答之而舉此三人以對者則知此三人制造渾儀以圖晷緯問者蓋渾儀之疏密非問渾儀之淺深也以此而推則西漢長安已有其器矣將由喪亂亡失故衡復鑄之乎王蕃又記古渾儀天度并張衡改制之文則知斯器非衡始造明矣衡所造渾儀傳至魏晉中華覆敗沈沒戎虜績蕃舊器亦不復存晉安帝義熙十四年高祖平長安得衡舊器儀狀雖舉不綴經星七曜文帝元嘉十三年詔太史令錢樂之更鑄渾儀徑六尺八分少周一丈八尺二寸六分少地在天內立黃赤二道南北二極規二十八宿北斗極星五分為一度置日月五星於黃道之上置立漏刻以水轉儀昏明中星與天相應十七年又作小渾天徑二尺二寸周六尺六寸以分為一度安二十八宿中外宮以白黑珠及黃三色為三家星日月五星悉居黃道蓋天之術云出周公旦訪之殷商蓋假託之說也其書號曰周髀髀者表也周天之數也其術云天如覆蓋地如覆盆地中高而四隤日月隨天轉運隱地之高以為晝夜也天地相去凡八萬里天地之中高於外衡六萬里地上之高高於天之外衡二萬里也或問蓋天於楊雄楊雄曰蓋哉蓋哉難其八事鄭玄又難其二事為蓋天之學者不能通也劉向五紀說夏歷以為列宿日月皆西移列宿疾而日次之月宿遲故日與列宿昏俱入西方後九十一日是宿在北方又九十一日是宿在東方九十一日在南方此明日行遲於列宿也月生三日日入而月見西方至十五日日入而月見東方將晦日未出乃見東方以此明月行之遲於日而皆西行也向難之以鴻範傳曰晦而月見西方謂之朓朓疾也朔而月見東方謂之側匿側匿遲不敢進也星辰西行史官謂之逆行此三說夏歷皆違之迹其意好異者之所作也晉成帝咸康中會稽虞喜造安天論以為天高窮於無窮地深測於不測地有居靜之體天有常安之形論其大體當相覆冒方則俱方圓則俱圓無方圓不同之義也喜族祖河間太守聳又立穹天論云天形穹隆當如雞子幕其際周接四海之表浮乎元氣之上而吳太常姚信造昕天論曰嘗覽漢書云冬至日在牽牛去極遠夏至日在東井去極近欲以推日之長短信以太極處二十八宿之中央雖有遠近不能相倍今昕天之說以為冬至極低而天運近南故日去人遠而斗去人近北天氣至故冰寒也夏至極起而天運近北而斗去人遠日去人近南天氣至故炎熱也極之立時日行地中淺故夜短天去地高故晝長也極之低時日行地中深故夜長天去地下淺故晝短也然則天行寒依於渾夏依於蓋也按此說應作軒昂之軒而作昕所未詳也凡三說皆好異之談失之遠矣凡天文經星常宿中外宮前史已詳今惟記魏文帝黃初以來星變為天文志以續司馬彪云魏文帝黃初三年九月甲辰客星見太微左掖門內占曰客星出太微國有兵喪十月孫權叛命帝自南征前驅臨江破其將呂範等是後累有征役七年五月文帝崩黃初四年二月癸卯月犯心大星十二月丙子月又犯心大星占曰心為天王王者惡之七年五月文帝崩黃初四年六月甲申太白晝見五年十一月辛卯太白又晝見案劉向五紀論曰太白少陰弱不得專行故以巳未為界不得經天而行經天則晝見其占為兵為喪為不臣為更王強國弱小國強是日孫權受魏爵號而稱兵距守七年五月文帝崩八月吳遂圍江夏寇襄陽魏江夏太守文聘固守得全大將軍司馬懿救襄陽斬吳將張霸黃初四年十一月月暈北斗占曰有大喪赦天下七年五月文帝崩明帝即位大赦天下黃初五年十月歲星入太微逆行積百三十九日乃出占曰五星入太微從右入三十日以上人主有大憂一曰有赦至七年五月文帝崩明帝即位大赦天下黃初六年五月十六日壬戌熒惑入太微至二十六日壬申與歲星相及俱犯右執法至二十七日癸酉乃出占曰從後入三十日以上人主有大憂又日月五星犯左右執法大臣有憂一曰執法者誅金火尤甚十一月皇子東陽武王鑒薨七年正月驃騎將軍曹洪免為庶人四月征南大將軍夏侯尚薨五月文帝崩蜀記稱明帝問黃權曰天下鼎立何地為正對曰當驗天文往熒惑守心而文皇帝崩吳蜀無事此其徵也案三國史並無熒惑守心之文宜是入太微黃初六年十月乙未有星孛于少微歷軒轅案占孛彗異狀其殃一也為兵喪除舊布新之象餘災不盡為旱凶飢暴疾長大見久災深短小見速災淺是時帝軍廣陵辛丑親御甲冑跨馬觀兵明年五月文帝崩魏明帝太和四年十一月壬戌太白犯歲星占曰太白犯五星有大兵犯列宿為小兵五年三月諸葛亮以大眾寇天水遣大將軍司馬懿距邊之太和五年五月熒惑犯房占曰房四星股肱臣將相位也月五星犯守之將相有憂七月車騎將軍張郃追諸葛亮為其所害十二月太尉華歆薨太和五年十一月乙酉月犯軒轅大星占曰女主憂十二月甲辰月犯鎮星占曰女主當之六年三月乙亥月又犯軒轅大星青龍二年十一月乙丑月又犯鎮星三年正月太后郭氏崩太和六年十一月丙寅太白晝見南斗遂歷八十餘日恒見占曰吳有兵明年孫權遣張彌等將兵萬人錫授公孫淵為燕王淵斬彌等虜其眾太和六年十一月丙寅有星孛于翼近太微上將星占曰為兵喪甘氏曰孛彗所當之國是受其殃翼又楚分孫權封略也明年權有遼東之敗權又自向合肥新城追全琮征六安皆不克而還又明年諸葛亮入秦川據渭南司馬懿距之孫權遣陸議諸葛瑾等屯江夏口孫韶張承等向廣陵淮陽權以大眾圍新城以應亮於是帝自東征權及諸將乃退太和六年十二月陳王植薨青龍元年夏北海王蕤薨三年正月太后郭氏崩明帝青龍二年二月已未太白犯熒惑占曰大兵起有大戰是年四月諸葛亮據渭南吳亦起兵應之魏東西奔命九月亮卒軍退將帥分爭為魏所破案占太白所犯在南南國敗在北北國敗此宜在熒惑南也青龍二年三月辛卯月犯輿鬼輿鬼主斬殺占曰民多病國有憂又有大臣憂是年夏大疫冬又大病至三年春乃止正月太后郭氏崩四年五月司徒董昭薨青龍二年五月丁亥太白晝見積三十餘日以晷度推之非秦魏則楚也是時諸葛亮據渭南司馬懿與相持孫權寇合肥又遣陸議孫韶等入淮沔帝親東征蜀本秦地則為秦晉及楚兵悉起應占青龍二年七月己巳月犯楗閉占曰天子崩又為火災三年七月崇華殿災景初三年正月明帝崩青龍二年十月戊寅月犯太白占曰人君死又為兵景初元年七月公孫淵叛二年正月遣司馬懿討之三年正月明帝崩蜀後主建興十二年諸葛亮帥大眾伐魏屯于渭南有長星赤而芒角自東北西南流投亮營三投再還往大還小占曰兩軍相當有大流星來走軍上及墜軍中者皆破敗之徵也九月亮卒于軍焚營而退群帥交惡多相誅殘魏明帝青龍三年六月丁未鎮星犯井鉞四年閏四月乙巳復犯戊戌太白又犯占曰凡月五星犯井鉞悉為兵起一曰斧鉞用大臣誅景初元年公孫淵叛司馬懿討滅之青龍三年七月己丑鎮星犯東井四年三月癸卯在參又還犯之占曰填星入井大人憂行近距為行陰其占大水五穀不成景初元年夏大水傷五穀九月皇后毛氏崩三年正月明帝崩青龍三年十月壬申太白晝見在尾歷二百餘日恒見占曰尾為燕燕臣強有兵青龍四年三月己巳太白與月俱加丙晝見月犯太白景初元年七月辛卯太白又晝見積二百八十餘日占悉同上是時公孫淵自立為燕王署置百官發兵距守遣司馬懿討滅之青龍三年十二月戊辰月犯鉤鈐占曰王者憂景初三年正月明帝崩青龍四年五月壬寅太白犯畢左股第一星占曰畢為邊兵又主刑罰九月涼州塞外胡阿畢師侵犯諸國西域校尉張就討之斬首捕虜萬許人青龍四年七月甲寅太白犯軒轅大星占曰女主憂景初元年皇后毛氏崩青龍四年十月甲申有星孛于大辰長三尺乙酉又孛于東方十一月己亥彗星見犯宦者天紀星占曰大辰為天王天下有喪劉向五紀論曰春秋星孛于東方不言宿者不加宿也宦者在天市為中外有兵天紀為地震孛彗主兵喪景初元年六月地震九月吳將朱然圍江夏荊州刺史胡質擊走之皇后毛氏崩二年正月討公孫淵三年正月明帝崩魏明帝景初元年二月乙酉月犯房第二星占曰將相有憂七月司徒陳矯薨二年四月司徒韓暨薨景初元年十月丁未月犯熒惑占曰貴人死二年四月司徒韓暨薨八月公孫淵滅景初二年二月己丑月犯心距星又犯中央大星五月己亥又犯心距星及中央大星閏月癸丑月又犯心中央大星按占大星為天王前為太子後為皇子犯大星王者惡之犯前星太子有憂犯後星庶子有憂三年正月帝崩太子立卒見廢為齊王正始四年秦王詢薨景初二年八月彗星見張長三尺逆西行四十一日滅占曰為兵喪張周分野洛邑惡之其十月斬公孫淵明年正月明帝崩景初二年十月甲午月犯箕占曰軍將死正始元年四月車騎將軍黃權薨景初二年司馬懿圍公孫淵於襄平八月丙寅夜有大流星長數十丈色白有芒鬣從首山北流墜襄平城東南占曰圍城而有流星來走城上及墜城中者破又曰星墜當其下有戰場又曰凡星所墜國易姓九月淵突圍走至星墜所被斬屠城坑其眾景初二年十月癸巳客星見危逆行在離宮北騰蛇南甲辰犯宗星己酉滅占曰客星所出有兵喪虛危為宗廟又為墳墓客星近離宮則宮中將有大喪就先君於宗廟皆王者崩殞之象也三年正月明帝崩正始二年五月吳將朱然圍樊城司馬懿率眾距卻之魏齊王正始元年四月戊午月犯昴東頭第一星其年十月庚寅月又犯昴北頭第四星占曰犯昴胡不安二年六月鮮卑阿妙兒等寇西方燉煌太守王延斬之并二千餘級三年又斬鮮卑大帥及千餘級正始元年十月乙酉彗星見西方在尾長三丈拂牽牛犯太白十一月甲子進犯羽林占曰尾為燕又為吳牛亦吳越之分太白為上將羽林中軍兵吳越有兵喪中軍兵動二年五月吳將全琮寇芍陂朱然圍樊城諸葛瑾入沮中吳太子登卒六月司馬懿討諸葛恪於皖恪焚積聚棄城走三年太尉滿寵薨正始二年九月癸酉月犯輿鬼西北星西北星主金三年二月丁未又犯西南星西南星主布帛占曰有錢令一曰大臣憂三年三月太尉滿寵薨四年正月帝加元服賜群臣錢各有差正始四年十月十一月月再犯井鉞是月司馬懿討諸葛恪恪棄城走五年三月曹爽征蜀正始五年十一月癸巳鎮星犯亢距星占曰諸侯有失國者嘉平元年曹爽兄弟誅正始六年八月戊午彗星見七星長二尺色白進至張積二十三日滅七年十一月癸亥又見軫長一尺積百五十六日滅九年三月又見昴長六尺色青白芒西南指七月又見翼長二尺進至軫積四十二日滅按占七星張周分野翼軫為楚昴為趙魏彗所以除舊布新主兵喪也嘉平元年司馬懿誅曹爽兄弟及其黨與皆夷族京師嚴兵實始翦魏三年誅楚王彪又襲王凌於淮南淮南東楚也幽魏諸王于鄴正始七年七月丁丑月犯左角占曰天下有兵將軍死九年正月辛亥月犯亢南星占曰兵起一曰軍將死七月乙亥熒惑犯畢距星占曰有邊兵一曰刑罰用嘉平元年曹爽等誅三年王凌等又誅正始元年七月癸丑鎮星犯楗閉占曰王者不宜出宮下殿明年車駕謁陵司馬懿奏誅曹爽等天子野宿於是失勢魏齊王嘉平元年六月壬戌太白犯東井距星二年三月己未又犯占曰國失政大臣為亂四月辛巳太白犯輿鬼占曰大臣誅一曰兵起三年五月王凌與楚王彪有謀皆伏誅人主遂卑吳主孫權赤烏十三年五月日北至熒惑逆行入南斗七月犯魁第二星而東漢晉春秋云逆行按占熒惑入南斗三月吳王死一曰熒惑逆行其地有死君太元二年權薨是其應也故國志書於吳而不書於魏也是時王凌謀立楚王彪謂斗中有星當有暴貴者以問知星人浩詳詳疑有故欲說其意不言吳有死喪而言淮南楚分吳楚同占當有王者興故凌計遂定魏齊王嘉平二年十月丙申月犯輿鬼占曰國有憂一曰大臣憂三年四月戊寅月犯東井占曰軍將死一曰國有憂五月王凌楚王彪等誅七月皇后甄氏崩嘉平三年五月甲寅月犯亢距星占曰將軍死一曰為兵是月王淩誅四年三月吳將朱然朱異為寇鎮東將軍諸葛誕破走之嘉平三年七月己巳月犯輿鬼九月乙巳又犯四年十一月丁未又犯鬼積尸五年七月丙午月又犯鬼西北星占曰國有憂正元元年李豐等誅皇后張氏廢九月帝廢為齊王齊王嘉平三年十月癸未熒惑犯亢南星占曰大臣有亂正元元年二月李豐等謀亂誅嘉平三年十一月癸未有星孛于營室西行積九十日滅占曰有兵喪室為後宮後宮且有亂四年三月丁酉彗星見西方在胃長五六丈色白芒南指貫參積二十日滅五年十一月彗星又見軫長五丈在太微左執法西東南指積百九十日滅按占胃兗州之分參白虎主兵太微天子廷執法為執政孛彗為兵除舊布新之象正元元年二月李豐豐弟兗州刺史翼后父光祿大夫張緝等謀亂皆誅皇后亦廢九月帝廢為齊王高貴鄉公代立嘉平五年六月庚辰月犯箕占曰軍將死正元元年正月鎮東將軍毋丘儉反兵敗死嘉平五年六月戊午太白犯角占曰群臣謀不成正元元年李豐等謀泄悉誅嘉平五年七月月犯井鉞正元元年二月李豐等誅蜀將姜維攻隴西車騎將軍郭淮討破之嘉平五年十一月癸酉月犯東井距星占曰軍將死至六年正月鎮東將軍豫州刺史毋丘儉前將軍揚州刺史文欽反被誅魏高貴鄉公正元元年十一月有白氣出斗側廣數丈長竟天王肅曰蚩尤之旗也東南其有亂乎二年正月毋丘儉等據淮南以叛大將軍司馬師討平之案占蚩尤旗見王者征伐四方自後又征淮南西平巴蜀是歲吳主孫亮五鳳元年斗牛吳越分案占有兵喪除舊布新之象也太平三年孫綝盛兵圍宮廢亮為會稽王孫休代立是其應也故國志又書於吳由是淮南江東同揚州地故于時變見吳楚之分則魏之淮南多與吳同災是以毋丘儉以孛為己應遂起兵而敗又其應也後三年即魏甘露二年諸葛誕又反淮南吳遣朱異救之及城陷誕眾吳兵死沒各數萬人猶前長星之應也高貴鄉公正元二年二月戊午熒惑犯東井北轅西頭第一星占曰群臣有家坐罪者甘露元年諸葛誕族滅吳孫亮太平元年九月壬辰太白犯南斗吳志所書也占曰太白犯斗國有兵大臣有反者其明年諸葛誕反又明年孫琳廢亮吳魏並有兵事也魏高貴鄉公甘露元年七月乙卯熒惑犯井鉞壬戌月又犯鉞星二年八月壬子歲星犯井鉞九月庚寅歲星又逆行乘鉞星三年諸葛誕夷滅甘露元年八月辛亥月犯箕占曰軍將死九月丁巳月犯東井占曰軍將死二年諸葛誕誅甘露二年六月己酉月犯心中央大星景元元年五月高貴鄉公敗甘露二年十月丙寅太白犯亢距星占曰廷臣為亂人君憂景元元年有成濟之變甘露二年十一月彗星見角色白占曰彗見兩角間色白者軍起不戰邦有大喪景元元年高貴鄉公帥左右兵襲晉文王未交戰為成濟所害甘露三年三月庚子太白犯東井占曰國失政大臣為亂是夜歲星又犯東井占曰兵起至景元元年高貴鄉公敗甘露三年八月壬辰歲星犯輿鬼質星占曰斧質用大臣誅甘露四年四月甲申歲星又犯輿鬼東南星占曰鬼東南星主兵木入鬼大臣誅景元元年高貴鄉公敗殺尚書王經甘露四年十月丁丑客星見太微中轉東南行歷軫宿積七日滅占曰客星出太微有兵喪景元元年高貴鄉公被害魏陳留王景元元年二月月犯建星案占月五星犯建星大臣相譖是後鍾會鄧艾破蜀會譖艾遂皆夷滅景元二年四月熒惑入太微犯右執法占曰人主有大憂又曰大臣憂後四年鄧艾鍾會皆夷滅五年帝遜位景元三年十一月壬寅彗星見亢色白長五丈轉北行積四十五日滅占為兵喪一曰彗見亢天子失德四年鍾會鄧艾伐蜀克之會艾反亂皆誅魏遜天下景元四年六月大流星二並如斗見西方分流南北光照隆隆有聲案占流星為貴使大者使大是年鍾鄧克蜀二星蓋二帥之象二帥相背又分流南北之應鍾會既叛三軍憤怒隆隆有聲兵將怒之徵也景元四年十月歲星守房占曰將相有憂一曰有大赦明年正月太尉鄧艾司徒鍾會並誅滅特赦益土咸熙二年秋又大赦陳留王咸熙二年五月彗星見王良長丈餘色白東南指積十二日滅占曰王良天子御駟彗星掃之禪代之表除舊布新之象白色為喪王良在東壁宿又并州之分也八月晉文王薨十二月帝遜位于晉晉武帝太始四年正月丙戌彗星見軫青白色西北行又轉東行占曰為兵喪軫又楚分也三月皇太后王氏崩十月吳將施績寇江夏萬彧寇襄陽後將軍田璋荊州刺史胡烈等破卻之太始四年七月星隕如雨皆西流占曰星隕為民叛西流吳民歸晉之象也二年吳夏口督孫秀率部曲二千餘人來降太始五年九月有星孛于紫宮占如上紫宮天子內宮十年武元楊皇后崩太始十年十二月有星孛于軫占曰天下兵起軫又楚分也咸寧二年六月星孛于氐占曰天子失德易政氐又兗州分七月星孛大角大角為帝坐八月星孛太微至翼北斗三台占曰太微天子廷大人惡之一曰有徙王翼又楚分也北斗主殺罰三台為三公三年星孛于胃胃徐州分四月星孛女御女御為後宮五月又孛于東方七月星孛紫宮占曰天下易主五年三月星孛于柳占曰外臣陵主柳又三河分也大角太微紫宮女御並為王者明年吳亡是其應也孛主兵喪征吳之役三河徐兗之兵悉出交戰於吳楚之地吳丞相都督以下梟戮十數偏裨行陣之徒馘斬萬計皆其徵也春秋星孛北方則齊魯晉鄭陳宋莒之君並受殺亂之禍星孛東方則楚滅陳三家田氏分篡齊晉漢文帝末星孛西方後吳楚七國誅滅案太始末至太康初災異數見而晉氏隆盛吳實滅天變在吳可知矣昔漢三年星孛大角項籍以亡漢氏無事此項先主命故也吳晉之時天下橫分大角孛而吳亡是與項先同事後學皆以咸寧災為晉室非也晉武帝咸寧四年四月蚩尤旗見案星傳蚩尤旗類彗而後曲象旗漢武帝時見長竟天獻帝時又見長十餘丈皆長星也魏高貴時則為白氣案校眾記是歲無長星宜又是異氣後二年傾三方伐吳是其應至武帝崩天下兵又起遂亡諸夏咸寧四年九月太白當見不見占曰是謂失舍不有破軍必有死王之墓又有亡國是時羊祜表求伐吳上許之五年十一月兵出太白始夕見西方太康元年三月大破吳軍孫皓面縛請死吳國遂亡晉武帝太康二年八月有星孛于張占曰為兵喪周分野災在洛邑十一月星孛軒轅占曰後宮當之四年三月戊申星孛于西南四年三月癸丑齊王攸薨四月戊寅任城王陵薨五月己亥琅邪王伸薨十一月戊午新都王該薨太康八年三月熒惑守心占曰王者惡之太熙元年四月己酉武帝崩太康八年九月星孛于南斗長數十丈十餘日滅占曰斗主爵祿國有大憂一曰孛于斗王者疾病臣誅其父天下易政大亂兵起太熙元年四月客星在紫宮占曰為兵喪太康末武帝耽宴遊多疾病是月乙酉帝崩永平元年賈后誅楊駿及其黨與皆夷三族楊太后亦見殺是年又誅汝南王亮太保衛瓘楚王瑋王室兵喪之應
