body:
  text: 卷二十六志第十六天文四宋武帝永初元年十月辛丑熒惑犯進賢占曰進賢官誅十一月乙卯熒惑犯填星於角占曰為喪大人惡之一曰兵起十二月庚子月犯熒惑於亢占曰為內亂一曰貴人憂角為天門亢為朝廷三年五月宮車晏駕七月太傅長沙景王道憐薨索頭攻略青司兗三州於是禁兵大出是後司徒徐羨之尚書令傅亮領軍謝晦等廢少帝內亂之應永初元年十二月甲辰月犯南斗占曰大臣憂三年七月長沙王薨索虜寇青司二州大軍出救永初二年六月甲申太白晝見占為兵喪為臣強三年五月宮車晏駕尋遣兵出救青司其後徐羨之等秉權臣強之應也永初二年六月乙酉熒惑犯氐乙巳犯房占曰氐為宿宮房為明堂人主有憂房又為將相將相有憂氐房又兗豫分三年五月宮車晏駕七月長沙王薨王領兗州也景平元年廬陵王義真廢王領豫州也永初二年十月太白犯填星於亢亢兗州分又為鄭占曰大星有大兵金土合為內兵三年索頭攻略青冀兗三州禁兵大出兗州失守虎牢沒永初三年正月丁卯月犯南斗占同元年一曰女主當之二月辛卯有星孛于虛危向河津埽河鼓占曰為兵喪五月宮車晏駕明年遣軍救青司二月太后蕭氏崩永初三年二月壬辰填星犯亢占曰諸侯有失國者民多流亡一曰廷臣為亂亢兗州分又為鄭其年索頭攻圍司兗兗州刺史徐琰委守奔敗司州刺史毛德祖距守陷沒緣河吏民多被侵略永初三年三月壬戌月犯南斗占同正月五月丙午犯軒轅占曰女主當之六月辛巳月犯房占曰將相有憂豫州有災癸巳犯歲星於昴占曰趙魏兵飢其年虜攻略青兗司三州廬陵王義真廢王領豫州也二月太后蕭氏崩元嘉三年司徒徐羨之等伏誅永初三年九月癸卯熒惑經太微犯左執法己未犯右執法占悉同上十月癸酉太白犯南斗占曰國有兵事大臣有反者辛巳熒惑犯進賢占曰進賢官誅明年師出救青司景平二年徐羨之等廢帝徙王元嘉三年羨之及傅亮謝晦悉誅永初三年十一月戊午有星孛於室壁占曰為兵喪明年兵救青司二月太后蕭氏崩營室內宮象也永初三年十一月癸亥月犯亢氐占曰國有憂十一月戊戌熒惑犯房房為明堂王者惡之一曰將相憂景平二年羨之等廢帝因害之元嘉三年羨之等伏誅少帝景平元年正月乙卯有星孛于東壁南白色長二丈餘拂天苑二十日滅二月太后蕭氏崩十月戊午有星孛於氐北尾長四丈西北指貫攝提向大角東行日長六七尺十餘日滅明年五月羨之等廢帝文帝元嘉元年十月熒惑犯心元嘉二年正月甲寅夜天東南有黑氣廣一丈長十餘丈元嘉六年五月太白晝見經天元嘉七年三月太白犯歲星於奎六月熒惑犯東井輿鬼入軒轅月犯歲星十一月癸未西南有氣上下赤中央黑廣三尺長三十餘丈狀如旌旗十二月丙戌有流星頭如瓮尾長二十餘丈大如數十斛船赤色有光照人面從西行經奎北大星南過至東壁止其年索虜寇青司殺刺史掠居民遣征南大將軍檀道濟討伐經歲乃歸元嘉八年四月辛未太白晝見在胃五月犯天關東井六月庚午熒惑入東井七月壬戌夜白虹見東方丁丑太白犯上將八月癸未太白入太微右掖門內犯左執法乙未熒惑犯積尸九月丙寅流星大如斗赤色發太微西蕃北行未至北斗沒餘光長三丈許十月丙辰金土相犯在須女月奄天關東井十二月月犯房鉤鈐十年仇池氐寇漢中梁州失戍元嘉九年正月庚午熒惑入輿鬼三月月犯軒轅四月犯左角歲星入羽林月犯房鉤鈐己丑太白入積尸五月犯軒轅月掩南斗第六星辛酉熒惑入太微右掖門犯右執法七月丙午月蝕左角八月癸未太白犯心前星乙酉犯心明堂星元嘉十年十月有流星大如瓮尾長二十餘丈元嘉十一年二月庚子月犯畢入畢口而出因暈昴畢西及五車東及參三月丙辰太白晝見在參閏月戊寅太白犯五諸侯己丑月入東井犯太白于時司徒彭城王義康專權元嘉十二年五月壬戌月犯右執法七月壬戌熒惑犯積尸奄上將十月丙午月犯右執法十二月甲申太白犯羽林十七年上將執法皆被誅元嘉十三年正月庚午月犯熒惑二月月犯太微東蕃第一星十一月辛亥歲星犯積尸十二月戊子熒惑入羽林後年廢大將軍彭城王義康及其黨與凡所收掩皆羽林兵出元嘉十四年正月有星晡前晝見東北維在井左右黃赤色大如橘月犯東井四月丁未太白犯輿鬼五月丙午太白晝見在太微七月辛卯歲星入軒轅八月庚申熒惑犯上將九月丙戌熒惑犯左執法其後皇后袁氏崩丹陽尹劉湛誅尚書僕射殷景仁薨元嘉十五年四月己卯月犯氐十月壬戌流星大如鴨子出文昌入紫宮聲如雷十一月癸未熒惑入羽林丁未月犯東井鉞星其後誅丹陽尹劉湛等元嘉十六年二月歲星逆行犯左執法五月丁卯太白晝見胃昴間月入羽林太白犯畢歲星犯左執法七月月會填星八月太白犯軒轅明年皇后袁氏崩熒惑犯太微西上將太白晝見在翼九月熒惑同入太微相犯太白犯左執法熒惑犯右執法十月歲星熒惑相犯在亢十一月熒惑犯房北第一星明年大將軍義康出徙豫章誅其黨與尚書僕射揚州刺史殷景仁薨元嘉十九年九月客星見北斗漸為彗星至天苑末滅元嘉二十年二月二十四日乙未有流星大如桃出天津入紫宮須臾有細流星或五或三相續又有一大流星從紫宮出入北斗魁須臾又一大流星出貫索中經天市垣諸流星并向北行至曉不可稱數流星占並云天子之使又曰庶民惟星星流民散之象至二十七年索虜殘破青冀徐兗南兗豫六州民死大半元嘉二十二年二月金火木合東井四月月犯心太白入軒轅七月太白晝見其冬太子詹事范曄謀反伏誅元嘉二十三年正月金火相爍其月索虜寇青州驅略民戶元嘉二十四年正月月犯心大星天星并西流多細大不過如雞子尾有長短當有數百至旦日光定乃止有入北斗紫宮者占流星群趨所之者兵聚其下有大急又占眾星並流將軍並舉兵隨星所之以應天氣又占流星入紫宮有喪水旱不調又占流星入北斗大臣有繫者又占流星為民大星大臣流小星小民流四月太白晝見八月征北大將軍衡陽王義季薨豫章民胡誕世率其宗族破郡縣殺太守及縣令元嘉二十五年正月火水入羽林月犯歲星太白晝見經天元嘉二十六年十月彗星入太微十一月白氣貫北斗二十七年夏太白晝見經天九月太白犯歲星十月熒惑入太微元嘉二十八年五月彗星見卷舌入太微逼帝座犯上相拂屏出端門滅翼軫翼軫荊州分太白晝見犯哭星三十年太子巫蠱呪詛事覺遂殺害朝臣孝建元年荊江二州反皆夷滅卷舌呪詛之象彗之所起是其應也元嘉二十九年正月太白晝見經天明年東宮弒逆孝武孝建元年二月有流星大如月西行其年豫州刺史魯爽反誅孝建元年九月壬寅熒惑犯左執法尚書左僕射建平王宏表解職不許孝建元年十月乙丑熒惑犯進賢星吏部尚書謝莊表解職不許孝建二年五月乙未熒惑入南斗十月甲辰又入南斗大明元年夏京師疾疫孝建三年四月戊戌太白犯輿鬼占曰民多疾明年夏京邑疫疾孝建三年八月甲午太白入心占曰後九年大飢至大明八年東土大飢民死十二三大明元年三月癸亥太白在奎南犯歲星占曰有滅諸侯三年司空竟陵王誕反誅大明元年六月丙申月在東壁掩熒惑占曰將軍有憂期不出三年至三年司空竟陵王誕反大明二年三月辛未熒惑入東井四月己亥熒惑在東井犯北軒轅第二星井雍州分其年四月海陵王休茂為雍州刺史五年休茂反誅大明二年七月己巳月掩軒轅第二星十月辛卯月掩軒轅十一月丙戌月又掩軒轅軒轅女主時民間喧言人主帷薄不修大明二年十一月庚戌熒惑犯房及鉤鈐壬子熒惑又犯鉤鈐占曰有兵其年索虜寇歷下遣羽林軍討破之大明三年春正月夜通天薄雲四方生赤氣長三四尺乍沒乍見尋皆消滅占名隧星一曰刀星天下有兵戰鬭流血月入太微犯次將占曰有反臣死將誅三月月在房犯鉤鈐因蝕占曰人主惡之將軍死三月土守牽牛占曰大人憂疾兵起大赦姦臣賊子謀欲殺主四月犯五諸侯占曰諸侯誅金水合西方占曰兵起五月歲星犯東井鉞占曰斧鉞用大臣誅六月月入南斗占曰大臣大將軍誅南兗州刺史竟陵王誕尋據廣陵反遣車騎大將軍沈慶之領羽林勁兵及豫州刺史宗愨徐州刺史劉道隆眾軍攻戰及屠城城內男女道俗梟斬靡遺將軍宗越偏用虐刑先刳腸決眼或笞面鞭腹苦酒灌創然後方加以刀鋸大兵之應也八月月犯太白太白犯房占曰人君有憂天子惡之熒惑守畢占曰萬民饑有大兵九月太白犯南斗占曰大臣有反者九月月在胃而蝕既又於昴犯熒惑占曰兵起女主當之人主惡之一曰女主憂國王死民饑十月太白犯哭星占曰人主有哭泣之聲自後六宮多喪公主薨亡天子舉哀相係歲大旱民饑大明四年正月月奄氐占曰大將死又犯房北第二星占曰有亂臣謀其主二月有赤氣長一尺餘在太白帝坐北占曰兵起臣欲謀其君五月月入太微占曰有反臣大臣死六月太白犯井鉞占曰兵起斧鉞用大臣誅月犯心前星占曰有亂臣太子惡之月入南斗魁中占曰大人憂女主惡之七月歲星犯積尸占曰大臣誅十二月月犯心中央大星占曰大人憂十二月通天有雲西及東北並生合八所並長四尺乍沒乍見尋消盡占曰天下有兵十二月月犯箕東北星女主惡之明年雍州刺史海陵王休茂反太白犯東井雍州兵亂之應也大明五年正月歲星犯輿鬼積尸占曰大臣誅主有憂財寶散月入南斗魁中占曰大人憂天下有兵火土同在須女占曰女主惡之三月月掩軒轅占曰女主惡之有流星數千萬或長或短或大或小並西行至曉而止占曰人君惡之民流亡四月太白犯東井北轅占曰大臣為亂斧鉞用太白犯輿鬼占曰大臣誅斧鉞用人主憂六月有流星白色大如甌出王良西南行沒天市中尾長數十丈沒後餘光良久占曰天下亂八月熒惑入東井占曰大臣當之十月歲星犯太微上將星太白入亢犯南第二星占曰上將有憂輔臣有誅者人君惡之十月太白入氐中熒惑入井中占曰王者亡地大赦兵起為飢月入太微掩西蕃上將犯歲星占曰有反臣死大星大如斗出柳北行尾十餘丈入紫宮沒尾後餘光良久乃滅占曰天下凶有兵喪天子惡之十一月月掩心前星又犯大星占曰大人憂兵起大旱十二月太白犯西建中央星占曰大臣相譖月犯左角占曰天子惡之後三年孝武帝文穆皇后相繼崩嗣主即位一年誅滅宰輔將相虐戮朝臣禍及宗室因自受害大明六年正月月在張犯歲星占曰民飢流亡月犯心後星占曰庶子惡之二月月掩左角占曰天子惡之三月熒惑入輿鬼占曰有兵大臣誅天下多疾疫五月月在張又入太微犯熒惑占曰國主不安女主憂火犯木在翼占曰為飢為旱近臣大臣謀主有星前赤後白大如甌尾長十餘丈出東壁北西行沒天市啾啾有聲占曰其下有兵天下亂月掩昴七星占曰貴臣誅天子破匈奴胡主死歲星犯上將占曰輔臣誅上將憂六月月入太微犯右執法占曰人主不安天下大驚主不吉執法誅月犯心後星占曰庶子惡之七月月犯箕占曰女主惡之八月月入南斗魁中占曰大臣誅斧鉞用吳越有憂明年揚南徐州大旱田穀不收民流死亡自後三年帝后仍崩宰輔及尚書令僕誅戮索虜主死新安王兄弟受害司徒豫章王子尚薨羽林兵入三吳討叛逆大明七年正月夜通天薄雲四方合有八氣蒼白色長二三丈乍見乍沒名刀星占曰天下有兵三月月犯心後星占曰庶子惡之四月火犯金在婁占曰有喪有兵大戰六月月犯箕占曰女主惡之太白入東井占曰大臣當之太白犯東井占曰大臣為亂斧鉞用七月熒惑入東井占曰兵起大將當之月入南斗魁犯第二星占曰大人憂吳郡當之太白犯輿鬼占曰兵起大將誅人主憂財帛出八月月入哭星中間太白犯軒轅少民星占曰人主憂哭泣之聲民飢流亡太白入太微占曰近臣起兵國不安熒惑犯鬼太白犯右執法占曰大臣誅十月金水相犯占曰天下飢熒惑守軒轅第二星占曰宮中憂有哀十一月歲星入氐占曰諸侯人君有入宮者十二月月犯五車占曰天庫兵動後二年帝后崩大臣將相誅滅皇子被害皇太后崩四方兵起分遣諸軍推鋒外討大明八年正月月掩輿鬼占曰大臣誅月入南斗魁中掩第二星占曰大人憂女主惡之二月月犯南斗第四星入魁中占曰大人有憂女主當之豫章受災四月月入南斗魁中犯第三星占曰大人有憂女主惡之丹陽當之太白入東井入太微犯執法占曰執法誅近臣起兵國不安六月歲星犯氐占曰歲大飢有流星大如五斗甌赤色有光照見人面尾長一丈餘從參北東行直下經東井過南河沒占曰民飢吳越有兵七月歲星入氐十月太白守房占曰有兵大喪月掩食房占曰有喪大飢此後國仍有大喪丹陽尹顏師伯豫章王子尚死明年昭太后崩四方賊起王師水陸征伐義興晉陵縣大戰殺傷千計前廢帝永光元年正月丁酉太白掩牽牛牽牛越分其月庚申月在虛宿犯太白虛齊地二月甲申月入南斗南斗揚州分野又為貴臣三月庚子月入輿鬼犯積尸輿鬼主斬戮六月庚午熒惑入東井東井雍州分其月壬午有大流星前赤後白入紫宮景和元年九月丁酉熒惑入軒轅在女主大星北十月熒惑入太微犯西上將十一月丁未太白犯哭星其月乙卯月犯心心為天王其年太宰江夏王義恭尚書令柳元景尚書僕射顏師伯等並誅太尉沈慶之薨廬陵王敬先南平王敬猷南安侯敬淵並賜死廢帝殞明年會稽太守尋陽王子房廣州刺史袁曇遠雍州刺史袁顗青州刺史沈文秀並反昭太后崩明帝泰始元年十二月己巳太白入羽林占曰羽林兵動乙亥白氣入紫宮占曰有喪事明年羽林兵出討昭太后崩泰始二年正月甲午熒惑逆行在屏西南占曰有兵在中其月丙申月暈五車通畢昴占曰女主惡之其月庚子月犯輿鬼占曰將軍死其月甲寅流星從五車出至紫宮西蕃沒占曰有兵其月丙辰黑氣貫宿占曰王侯有歸骨者三月乙未有流星大小西行不可稱數至曉乃息占曰民流之象四月壬午熒惑入太微犯右執法月在丙子歲星晝見南斗度中占曰其國有軍容大敗其月己卯竟夜有流星百餘西南行一大如甌尾長丈餘黑色從河鼓出又曰有兵其月壬午太白在月南並出東方為犯占曰有破軍死將王者亡地七月甲午月犯心心為宋地其月丙午月犯南斗占曰大臣誅其月乙卯熒惑犯氐氐兗州分野十月辛巳太白入氐占曰春穀貴十一月癸巳太白犯房占曰牛多死其年四方反叛內兵大出六師親戎昭太后崩大將殷孝祖為南賊所殺尚書右僕射蔡興宗以熒惑犯右執法自解不許九月諸方反者皆平多有歸降者後失淮北四州地彭城兗州並為虜所沒民流之驗也彭城宋分也是春穀貴民飢明年牛多疾死詔太官停宰牛泰始三年六月甲辰月犯東井占曰軍將死熒惑犯輿鬼占曰金錢散又曰不出六十日必大赦八月癸卯天子以皇后六宮衣服金釵雜物賜北征將士明年二月護軍王玄謨薨泰始四年六月壬寅太白犯輿鬼占曰民大疾死不收其年普天大疫泰始五年二月丙戌月犯左角占曰三年天子惡之三月庚申月犯建星占曰易相十月壬午月犯畢占曰天子用法誅罰急貴人有死者其月丙申太白犯亢占曰收斂國兵以備北方其年冬建安王休仁解揚州桂陽王休範為揚州揚州牧前後常宰相居之易相之驗也七年晉平王休祐建安王休仁並見殺時失淮北立戍以備防北虜後三年宮車晏駕泰始六年正月辛巳月犯左角同前占八月壬辰熒惑犯南斗南斗吳分十一月乙亥月犯東北轅占曰大人當之又曰大臣有誅者二年殺揚州刺史王景文宮車晏駕後廢帝元徽三年七月丙申太白入角犯歲星占曰角為天門國將有兵事占於角太白與木星會殺軍在外破軍殺將其月丁巳太白入氐氐為天子宿宮太白兵凶之星八月己巳太白犯房北頭第二星占曰王失德九月癸卯太白犯南斗第三星占曰大人當之國易政十月丙戌歲星入氐占曰諸侯人君有來入宮者十一月庚戌月於太微奄屏西南星占曰貴者失勢四年七月建平王景素據京口反時廢主凶慝無度五年七月殞安成王入纂皇阼三年齊受禪元徽四年三月乙巳月犯房北頭第一星進犯鍵閉星占曰有謀伏甲兵在宗廟中天子不可出宮下堂多暴事九月甲辰填星犯太微西蕃占曰立王一曰徙王又曰大人憂時廢帝出入無度卒以此殞安成王立元徽五年正月戊申月犯南斗第五星與前同占四月丁巳熒惑犯輿鬼西北星占曰大人憂近期六十日遠期六月日又曰人君惡之其月丙子太白犯輿鬼西北星占曰大赦五月戊申太白晝見午上光明異常占曰更姓六月壬戌月犯鉤鈐星占曰有大令其月乙丑月犯南斗第四星與前同占七月廢帝殞大赦天下後二年齊受禪順帝昇明元年八月庚申月入南斗犯第三星與前同占九月丁亥太白在翼晝見經天占曰更姓閏十二月癸卯夜月奄南斗第四星與前同占
