body:
  text: 卷三十一志第二十一五行二五行傳曰好戰攻輕百姓飾城郭侵邊境則金不從革謂金失其性而為災也又曰言之不從是謂不乂厥咎僭厥罰恒暘厥極憂時則有詩妖時則有介蟲之孽時則有大禍時則有口舌之痾時則有白眚白祥惟木沴金介蟲劉歆傳以為毛蟲金不從革魏世張掖石瑞雖是晉氏之符命而於魏為妖好攻戰輕百姓飾城郭侵邊境魏氏三祖皆有其事劉歆以為金石同類石圖發非常之文此不從革之異也晉定大業多敝曹氏石瑞文大討曹之應也魏明帝青龍中盛修宮室西取長安金狄承露槃折聲聞數十里金狄泣於是因留霸城此金失其性而為異也吳時歷陽縣有巖穿似印咸云石印封發天下太平孫皓天璽元年印發又陽羨山有石穴長十餘丈皓初修武昌宮有遷都之意是時武昌為離宮班固云離宮與城郭同占飾城郭之謂也寶鼎三年皓出東關遣丁奉至合肥建衡三年皓又大舉出華里侵邊境之謂也故令金失其性卒面縛而吳亡晉惠帝永興元年成都伐長沙每夜戈戟鋒有火光如縣燭此輕民命好攻戰金失其性而為變也天戒若曰兵猶火也不戢將自焚成都不悟終以敗亡晉懷帝永嘉元年項縣有魏豫州刺史賈逵石碑生金可采此金不從革而為變也五月汲桑作亂群寇飆起晉清河王覃為世子時所佩金鈴忽生起如粟者康王母疑不祥毀棄之及後為惠帝太子不終于位卒為司馬越所殺晉元帝永昌元年甘卓將襲王敦既而中止及還家多變怪照鏡不見其頭此金失其性而為妖也尋為敦所襲遂夷滅石虎時鄴城鳳陽門上金鳳皇二頭飛入漳河晉海西太和中會稽山陰縣起倉鑿地得兩大船滿中錢錢皆輪文大形時日向莫鑿者馳以告官官夜遣防守甚嚴至明旦失錢所在唯有船存視其狀悉有錢處晉安帝義熙初東陽太守殷仲文照鏡不見其頭尋亦誅翦占與甘同宋後廢帝元徽四年義熙晉陵二郡並有霹靂車墜地如青石草木燋死言之不從魏齊王嘉平初東郡有譌言云白馬河出妖馬夜過官牧邊鳴呼眾馬皆應明日見其迹大如斛行數里還入河楚王彪本封白馬兗州刺史令狐愚以彪有智勇及聞此言遂與王凌謀共立之遣人謂曰天下事未可知願王自愛彪答曰知厚意事泄凌愚被誅彪賜死此言不從之罰也詩云民之譌言寧莫之懲劉禪嗣位譙周引晉穆侯漢靈帝命子事譏之曰先主諱備其訓具也後主諱禪其訓授也若言劉已具矣當授與人甚於穆侯靈帝之祥也蜀果亡此言之不從也劉備卒劉禪即位未葬亦未踰月而改元為建興此言之不從也習鑿齒曰禮國君即位踰年而後改元者緣臣子之心不忍一年而有二君也今可謂亟而不知禮矣君子是以知蜀之不能東遷也後又降晉吳孫亮晉惠帝宋元凶亦然亮不終其位惠帝號令非己元凶尋誅言不從也魏太和中姜維歸蜀失其母魏人使其母手書呼維令反并送當歸以譬之維報書曰良田百頃不計一畝但見遠志無有當歸維卒不免魏明帝景初元年有司奏帝為烈祖與太祖高祖並為不毀之廟從之按宗廟之制祖宗之號皆身沒名成乃正其禮故雖功赫天壤德邁前王未有豫定之典此蓋言之不從失之甚者也後二年而宮車晏駕於是統微政逸吳孫休世烏程民有得困疾及差能以響言者言於此而聞於彼自其所聽之不覺其聲之大也自遠聽之如人對言不覺聲之自遠來也聲之所往隨其所向遠者不過十數里其鄰人有責息於外歷年不還乃假之使為責讓懼以禍福負物者以為鬼神即傾倒畀之其人亦不自知所以然也言不從之咎也魏世起安世殿晉武帝後居之安世武帝字也晉武帝每延群臣多說平生常事未常及經國遠圖此言之不從也何曾謂子遵曰國家無貽厥之謀及身而已後嗣其殆乎此子孫之憂也自永熙後王室漸亂永嘉中天下大壞及何綏以非辜被誅皆如曾言趙王倫廢惠帝於金墉城改號金墉為永安宮帝尋復位而倫誅晉惠帝永興元年詔廢太子覃還為清河王立成都王穎為皇太弟猶加侍中大都督領丞相備九錫封二十郡如魏王故事案周禮傳國以胤不以勳故雖公旦之聖不易成王之嗣所以遠絕覬覦永壹宗祧後代遵履改之則亂今擬非其實僭差已甚且既為國副則不應復開封土兼領庶職此言之不從進退乖爽故帝既播越穎亦不終是其咎也後猶不悟又立懷帝為皇太弟懷終流弒不永厥祚又其應也語曰變古易常不亂則亡此之謂乎晉惠帝太安中周玘於陽羨起宅始成而邊戶有聲如人嘆咤者玘亡後家誅滅此近言不從也晉元帝太興四年吳郡民訛言有大蟲在紵中及樗樹上嚙人即死晉陵民又言曰見一老女子居市被髮從肆人乞飲自言天帝令我從水門出而我誤由蟲門若還天帝必殺我如何於是百姓共相恐動云死者已十數也西及京都諸家有樗紵者伐去之無幾自止晉元帝永昌元年寧州刺史王遜遣子澄入質將渝濮雜夷數百人京邑民忽訛言寧州人大食人家小兒親有見其蒸煮滿釜甑中者又云失兒皆有主名婦人尋道拊心而哭於是百姓各禁錄小兒不得出門尋又言已得食人之主官當大航頭大杖考竟而日有四五百人晨聚航頭以待觀行刑朝廷之士相問者皆曰信然或言郡縣文書已上王澄大懼檢測之事了無形民家亦未嘗有失小兒者然後知其訛言也此二事干寶云未之能論永昌二年大將軍王敦下據姑熟百姓訛言行蟲病食人大孔數日入腹入腹則死治之有方當得白犬膽以為藥自淮泗遂及京都數日之間百姓驚擾人人皆自云已得蟲病又云始在外時當燒鐵以灼之於是翕然被燒灼者十七八矣而白犬暴貴至相請奪其價十倍或有自云能行燒鐵者賃灼百姓日得五六萬憊而後已四五日漸靜說曰夫裸蟲人類而人為之主今云蟲食人言本同臭類而相殘賊也自下而上明其逆也必入腹者言害由中不由外也犬有守禦之性白者金色而膽用武之主也帝王之運五霸會於戌戌主用兵金者晉行火燒鐵以治疾者言必去其類而來火與金合德共治蟲害也案中興之際大將軍本以腹心受伊呂之任而元帝末年遂攻京邑明帝諒闇又有異謀是以下逆上腹心內爛也及錢鳳沈充等逆兵四合而為王師所挫踰月而不能濟北中郎將劉遐及淮陵內史蘇峻率淮泗之眾以救朝廷故其謠言首作於淮泗也朝廷卒以弱制強罪人授首是用白犬膽可救之效也晉海西時庾晞四五年中喜為挽歌自搖大鈴為唱使左右齊和又燕會輒令倡妓作新安人歌舞離別之辭其聲悲切時人怪之後亦果敗晉海西公太和以來大家婦女緩鬢傾髻以為盛飾用髮既多不恒戴乃先作假髻施於木上呼曰假頭人欲借名曰借頭遂布天下自此以來人士多離事故或亡失頭首或以草木為之假頭之言此其先兆也晉孝武泰元中立內殿名曰清暑少時而崩時人曰清暑者反言楚聲也果有哀楚之聲有人曰非此之謂豈可極言乎讖云代晉者楚其在茲乎及桓玄篡逆自號曰楚泰元中小兒以兩鐵相打於土中名曰鬭族後王國寶王孝伯一姓之中自相攻擊也桓玄出鎮南州立齋名曰蟠龍後劉毅居此齋蟠龍毅小字也桓玄初改年為大亨遐邇讙言曰二月了故義謀以仲春發也玄篡立又改年為建始以與趙王倫同又易為永始永始復是王莽受封之年也始徙司馬道子于安成晉主遜位出永安宮封晉主為平固王琅邪王德文為石陽公並使住尋陽城識者皆以為言不從之妖也厥咎僭晉興何曾薄太官御膳自取私食子劭又過之而王愷又過劭王愷羊琇之疇盛致聲色窮珍極麗至元康中夸恣成俗轉相高尚石崇之侈遂兼王何而儷人主矣崇既誅死天下尋亦淪喪僭踰之咎也恒暘魏明帝太初二年五月大旱元年以來崇廣宮府之應也又是春晉宣帝南禽孟達置二郡張郃西破諸葛亮斃馬謖亢陽自大又其應也京房易傳曰欲德不用茲謂張厥災荒其旱陰雲不雨變而赤煙四際眾出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上緣求妃茲謂僭其旱三月大溫亡雲君高臺府茲謂犯陰侵陽其旱萬物根死數有火災庶位踰節茲謂僭其旱澤物枯為火所傷太和五年三月自去冬十月至此月不雨辛巳大雩是春諸葛亮寇天水晉宣王距卻之亢陽動眾又是時二隅分據眾出多過時也春秋說曰傷二穀謂之不雨魏齊王正始元年二月自去冬十二月至此月不雨去歲正月明帝崩二月曹爽白嗣主轉晉宣王為太傅外示尊崇內實欲令事先由己是時宣王功蓋魏朝欲德不用之應也魏高貴鄉公甘露三年正月自去秋至此月旱時晉文王圍諸葛誕眾出過時之應也初壽春秋夏常雨潦常淹城而此旱踰年城陷乃大雨咸以為天亡吳孫亮五鳳二年大旱民饑是歲閏月魏將文欽以淮南眾數萬口來奔孫峻又破魏將曹珍于高亭三月朱異襲安豐不克七月城廣陵東海二郡十二月以馮朝為監軍使者督徐州諸軍軍士怨叛此亢陽自大勞民失眾之罰也其役彌歲故旱亦竟年吳孫皓寶鼎元年春夏旱是時皓遷都武昌勞民動眾之應也晉武帝太始七年五月閏月旱大雩是春孫皓出華里大司馬望帥眾次于淮北四月北地胡寇金城西平涼州刺史牽弘出戰敗沒太始八年五月旱是時帝納荀勗邪說留賈充不復西鎮而任愷稍疏上下皆蔽之應也又李憙魯芝李胤等並在散職近欲德不用之謂也太始九年自正月旱至于六月祈宗廟社稷山川癸未雨去年九月吳西陵督步闡據城來降遣羊祜統楊肇等眾八萬救迎闡十二月陸抗大破肇軍攻闡滅之太始十年四月旱去年秋冬采擇卿校諸葛沖等女是春五十餘人入殿簡選又取小將吏女數十人母子號哭於宮中聲聞于外行人悲酸是殆積陰生陽之應也晉武帝咸寧二年五月旱大雩及社稷山川至六月乃澍雨晉武帝太康二年自去冬旱至此春平吳亢陽動眾自大之應也太康三年四月旱乙酉詔司空齊王攸與尚書廷尉河南尹錄訊繫囚事從蠲宥太康五年六月旱此年正月天陰解而復合劉毅上疏曰必有阿黨之臣奸以事君者當誅而不赦也帝不答是時荀勗馮紞僭作威福亂朝尤甚太康六年三月青涼幽冀郡國旱太康六年六月濟陰武陵旱傷麥太康七年夏郡國十三旱太康八年四月冀州旱太康九年夏郡國三十三旱太康九年六月扶風始平京兆安定旱傷麥太康十年二月旱晉武帝太熙元年二月旱自太康以後雖正人滿朝不被親仗而賈充荀勗楊駿馮紞等迭居要重所以無年不旱者欲德不用上下皆蔽庶位踰節之罰也晉惠帝元康元年七月雍州大旱殞霜疾疫關中飢米斛萬錢元康七年七月秦雍二州大旱故其年氐羌反叛雍州刺史解系敗績是年正月周處盧播等復敗關西震亂交兵彌歲至是飢疫薦臻戎晉並困朝廷不能振詔聽相賣鬻元康七年九月郡國五旱晉惠帝永寧元年自夏及秋青徐幽并四州旱是年春三王討趙王倫六旬之中大小數十戰死者十餘萬人十二月郡國十二又旱晉懷帝永嘉三年五月大旱襄平縣梁水淡淵竭河洛江漢皆可涉是年三月司馬越歸京都遣兵入宮收中書令繆播等九人殺之此僭踰之罰也又四方諸侯多懷無君之心劉淵石勒王彌李雄之徒賊害民命流血成泥又其應也永嘉五年自去冬旱至此春去歲十二月司馬越棄京都以大眾南出多將王公朝士及以行臺自隨斥黜禁衛代以國人宮省蕭然無復君臣之節矣晉陽秋云愍帝在西京旱傷薦臻無注記年月也晉愍帝建武元年六月揚州旱去年十二月淳于伯冤死其年即旱而太興元年六月又旱干寶曰殺伯之後旱三年是也案前漢殺孝婦則旱後漢有囚亦旱見謝見理並獲雨澍此其類也班固曰刑罰妄加群陰不附則陽氣勝故其罰恒暘建武元年四月趜允等悉眾禦寇五月祖逖攻譙其冬周訪討杜曾又眾出之應也晉元帝太興四年五月旱是時王敦強僭之釁漸著又去歲蔡豹祖逖等並有征役晉元帝永昌元年大旱是年三月王敦有石頭之變二宮陵辱大臣誅死僭踰無上故旱尤甚也永昌元年閏十一月京都大旱川谷並竭晉明帝太寧三年自春不雨至於六月去年秋滅王敦亢陽動眾自大之應也晉成帝咸和元年秋旱是時庾太后臨朝稱制群臣奏事稱皇太后陛下此婦人專王事言不從而僭踰之罰也與漢鄧太后同事咸和二年夏旱咸和五年五月旱去年殄蘇峻之黨此春又討郭默滅之亢陽動眾之應也咸和六年四月旱去年八月石勒遣郭敬寇襄陽南中郎將周撫奔武昌十月李雄使李壽寇建平建平太守楊謙奔宜都此正月劉徵略婁縣於是起眾警備咸和八年七月旱咸和九年自四月不雨至于八月晉成帝咸康元年六月旱是時成帝沖弱不親萬機內外之政委之將相此僭踰之罰故連歲旱也至四年王導固讓太傅復子明辟是後不旱殆其應也時天下普旱會稽餘姚特甚米斗直五百民有相鬻咸康二年三月旱咸康三年六月旱晉康帝建元元年五月旱是時宰相專政方伯擅重兵又與咸康初同事也晉穆帝永和元年五月旱有司奏依董仲舒術徙市開水門遣謁者祭太社是時帝在繈抱褚太后臨朝如明穆太后故事永和五年七月不雨至于十月是年二月征北將軍褚裒遣軍伐沛納其民以歸六月又遣西中郎將陳達進據壽陽自以舟師二萬至于下邳喪其前驅而還達亦退永和六年閏月旱是春桓溫以大眾出夏口上疏欲以舟軍北伐朝廷駭之蕭敬文盜涪西蠻校尉采壽敗績晉穆帝升平三年十二月大旱此冬十月北中郎將郗曇帥萬餘人出高平經略河兗又遣將軍諸葛悠以舟軍入河敗績西中郎將謝萬次下蔡眾潰而歸升平四年十二月大旱晉哀帝隆和元年夏旱是時桓溫強恣權制朝廷僭踰之罰也又去年慕容恪圍冀州刺史呂護桓溫出次宛陵范汪袁真並北伐眾出過時也晉海西泰和四年十二月涼州春旱至夏晉簡文帝咸安二年十月大旱民飢是時嗣主幼沖桓溫陵僭晉孝武帝寧康元年二月旱是時桓溫入覲高平陵闔朝致拜踰僭之應也寧康三年冬旱先是氐賊破梁益州刺史楊亮周仲孫奔退明年威遠將軍桓石虔擊姚長墊江破之退至五城益州刺史竺瑤帥眾戍巴東晉孝武帝太元四年六月大旱去歲氐賊圍南中郎將朱序於襄陽又圍揚威將軍戴遁於彭城桓嗣以江州之眾次鄀援序北府發三州民配何謙救遁是春襄陽順陽魏興城皆沒賊遂略淮南向廣陵征虜將軍謝石率水軍次涂中兗州刺史謝玄督諸將破之太元八年六月旱夏初桓沖征襄陽遣冠軍將軍桓石虔進據樊城朝廷又遣宣城內史胡彬次峽石為沖聲勢也太元十年七月旱饑初八年破苻堅九年諸將略地有事徐豫楊亮趙統攻討巴沔是年正月謝安又出鎮廣陵使子琰進次彭城太元十三年六月旱去歲北府遣戍胡陸荊州經略河南是年郭銓置戍野王又遣軍破黃淮太元十五年七月旱是春丁零略兗豫鮮卑寇河上朱序桓不才等北至太行東至滑臺踰時攻討又戍石門太元十七年秋旱至冬是時茹千秋為驃騎諮議竊弄主相威福又丘尼乳母親黨及婢僕之子階緣近習臨民領眾又在所多上春竟囚不以其辜建康獄吏枉暴尤甚此僭踰不從冤濫之罰也晉安帝隆安四年五月旱去冬桓玄迫殺殷仲堪而朝廷即授以荊州之任司馬元顯又諷百僚悉使敬己此皆陵僭之罰也隆安五年夏秋大旱十二月不雨去年夏孫恩入會稽殺內史謝琰此年夏略吳又殺內史袁山松軍旅東討眾出過時晉安帝元興元年七月大饑九月十月不雨是年正月司馬元顯以大眾將討桓玄既而玄至殺元顯五月又遣東征孫恩餘黨十月北討劉軌元興二年六月不雨冬又旱是時桓玄奢僭十二月遂篡位元興三年八月不雨是時王旅四伐西夏未平晉安帝義熙六年九月不雨是時王師北討廣固疆理三州義熙八年十月不雨是秋王師西討劉毅分遣伐蜀義熙十年九月旱十二月又旱井瀆多竭宋文帝元嘉二年夏旱元嘉四年秋京都旱元嘉八年五月揚州諸郡旱元嘉十九年二十年南兗豫州旱元嘉二十七年八月不雨至二十八年三月時索虜南寇孝武帝大明七年八年東諸郡大旱民飢死者十六七先是江左以來制度多闕孝武帝立明堂造五輅是時大發徒眾南巡校獵盛自矜大故致旱災後廢帝元徽元年八月京都旱詩妖魏明帝太和中京師歌兜鈴曹子其唱曰其柰汝曹何此詩妖也其後曹爽見誅曹氏遂廢魏明帝景初中童謠曰阿公阿公駕馬車不意阿公東渡河阿公東還當柰何及宣王平遼東歸至白屋當還鎮長安會帝疾篤急召之乃乘追鋒車東渡河終翦魏室如童謠之言也魏齊王嘉平中有謠曰白馬素羈西南馳其誰乘者朱虎騎朱虎者楚王彪小字也王凌令狐愚聞此謠謀立彪事發凌等伏誅彪賜死吳孫亮初童謠曰吁汝恪何若若蘆葦單衣篾鉤絡於何相求成子閣成子閣者反語石子堈也鉤落鉤帶也及諸葛恪死果以葦席裹身篾束其要投之石子堈後聽恪故吏收斂求之此堈云孫亮初公安有白鼉鳴童謠曰白鼉鳴龜背平南郡城中可長生守死不去義無成南郡城可長生者有急易以逃也明年諸葛恪敗弟融鎮公安亦見襲融刮金印龜服之而死鼉有鱗介甲兵之象又曰白祥也孫休永安二年將守質子群聚嬉戲有異小子忽來言曰三公鋤司馬如又曰我非人熒惑星也言畢上升仰視若曳一匹練有頃沒干寶曰後四年而蜀亡六年而魏廢二十一年而吳平於是九服歸晉魏與吳蜀並為戰國三公鋤司馬如之謂也孫皓初童謠曰寧飲建業水不食武昌魚寧還建業死不止武昌居皓尋遷都武昌民泝流供給咸怨毒焉孫皓遣使者祭石印山下妖祠使者因以丹書巖曰楚九州渚吳九州都揚州士作天子四世治太平矣皓聞之意益張曰從大皇帝至朕四世太平之主非朕復誰恣虐踰甚尋以降亡近詩妖也孫皓天紀中童謠曰阿童復阿童銜刀游渡江不畏岸上虎但畏水中龍晉武帝聞之加王濬龍驤將軍及征吳江西眾軍無過者而王濬先定秣陵晉武帝太康後江南童謠曰局縮肉數橫目中國當敗吳當復又曰宮門柱且莫朽吳當復在三十年後又曰雞鳴不拊翼吳復不用力于時吳人皆謂在孫氏子孫故竊發亂者相繼按橫目者四字自吳亡至晉元帝興幾四十年皆如童謠之言元帝懦而少斷局縮肉直斥之也干寶云不知所斥諱之也太康末京洛始為折楊柳之歌其曲始有兵革苦辛之詞終以禽獲斬截之事是時三楊貴盛而族滅太后廢黜而幽死晉惠帝永熙中河內溫縣有人如狂造書曰光光文長大戟為牆毒藥雖行戟還自傷又曰兩火沒地哀哉秋蘭歸形街郵路人為歎及楊駿居內府以戟為衛死時又為戟所害楊太后被廢賈后絕其膳八日而崩葬街郵亭北百姓哀之兩火武帝諱蘭楊后字也永熙中童謠曰二月末三月初荊筆楊版行詔書宮中大馬幾作驢楊駿初專權楚王尋用事故言荊筆楊版也二人不誅則君臣禮悖故云幾作驢晉惠帝元康中京洛童謠曰南風起吹白沙遙望魯國何嵯峨千歲髑髏生齒牙又曰城東馬子莫嚨哅比至三月纏汝鬃南風賈后字也白晉行也沙門太子小名也魯賈謐國也言賈后將與謐為亂以危太子而趙王因釁咀嚼豪賢以成篡奪也是時愍懷頗失眾望卒以廢黜不得其死元康中天下商農通著大鄣日童謠曰屠蘇鄣日覆兩耳當見瞎兒作天子及趙王篡位其目實眇焉趙王倫既篡洛中童謠曰虎從北來鼻頭汗龍從南來登城看水從西來何灌灌數月而齊王成都河間義兵同會誅倫按成都西蕃而在鄴故曰虎從北來齊東蕃而在許故曰龍從南來河間水區而在關中故曰水從西來齊留輔政居宮西有無君之心故言登城看也晉惠帝太安中童謠曰五馬游度江一馬化為龍後中原大亂宗蕃多絕唯琅邪汝南西陽南頓彭城同至江表而元帝嗣晉矣司馬越還洛有童謠曰洛中大鼠長尺二若不蚤去大狗至及苟希將破汲桑又謠曰元超兄弟大落度上桑打椹為苟作由是越惡希奪其兗州隙難遂構晉愍帝建興中江南歌謠曰訇如白坑破合集持作甒揚州破換敗吳興覆瓿甊按白者晉行坑器有口屬瓮瓦質剛亦金之類也訇如白坑破者言二都傾覆王室大壞也合集持作甒者言元皇帝鳩集遺餘以主社稷未能克復中原偏王江南故其喻小也及石頭之事六軍大潰兵人抄掠京邑爰及二宮其後三年錢鳳復攻京邑阻水而守相持月餘日焚燒城邑井堙木刊矣鳳等敗退沈充將其黨還吳興官軍踵之蹈藉郡縣充父子授首黨與誅者以百數所謂揚州破換敗吳興覆瓿甊瓿甊瓦器又小於甒也晉明帝太寧初童謠歌曰惻力惻力放馬山側大馬死小馬餓高山崩石自破及明帝崩成帝幼為蘇峻所逼遷于石頭御膳不足高山崩言峻尋死石峻弟蘇石也峻死後石據石頭尋為諸公所破也晉成帝之末民間謠曰磕磕何隆隆駕車入梓宮少日而宮車晏駕晉成帝咸康二年十二月河北謠語曰麥入土殺石虎後如謠言庾亮初出鎮武昌出石頭百姓於岸上歌曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旒旐又曰庾公初上時翩翩如飛烏庾公還揚州白馬牽流蘇後連徵不入及薨還都葬庾義在吳郡吳中童謠曰寧食下湖荇不食上湖蓴庾吳沒命喪復殺王領軍無幾而庾義王洽相繼亡晉穆帝升平中童子輩忽歌於道曰阿子聞曲終輒云阿子汝聞不無幾而穆帝崩太后哭曰阿子汝聞不升平末民間忽作廉歌有扈謙者聞之曰廉者臨也歌云白門廉宮廷廉內外悉臨國家其大諱乎少時而穆帝晏駕晉哀帝隆和初童兒歌曰升平不滿斗隆和那得久桓公入石頭陛下徒跣走帝聞而惡之復改年曰興寧民復歌曰雖復改興寧亦復無聊生哀帝尋崩升平五年穆帝崩不滿斗不至十年也晉海西公太和中民歌曰青青御路楊白馬紫游韁汝非皇太子那得甘露漿白者金行馬者國族紫為奪正之色明以紫間朱也海西公尋廢三子非海西子並死縊以馬韁死之明日南方獻甘露太和末童謠云犁牛耕御路白門種小麥及海西被廢處吳民犁耕其門前以種小麥如謠言晉海西公生皇子百姓歌云鳳皇生一雛天下莫不喜本言是馬駒今定成龍子其歌甚美其旨甚微海西公不男使左右向龍與內侍接生子以為己子桓石民為荊州鎮上明民忽歌曰黃曇子曲終又曰黃曇英揚州大佛來上明頃之而石民死王忱為荊州黃曇子乃是王忱之字也忱小字佛大是大佛來上明也大元末京口謠曰黃雌雞莫作雄父啼一旦去毛衣衣被拉颯遷尋王恭起兵誅王國寶旋為劉牢之所敗也司馬道子於東府造土山名曰靈秀山無幾而孫恩作亂再踐會稽會稽道子所封靈秀恩之字也庾楷鎮歷陽民歌曰重羅犁重羅犁使君南上無還時後楷南奔桓玄為玄所誅殷仲堪在荊州童謠曰芒籠目繩縛腹殷當敗桓當復無幾而仲堪敗桓玄有荊州王恭鎮京口舉兵誅王國寶百姓謠云昔年食白飯今年食麥麩天公誅謫汝教汝捻嚨喉嚨喉喝復喝京口敗復敗昔年食白飯言得志也今年食麥麩麩麤穢其精已去明將敗也天公將加譴謫而誅之也捻嚨喉氣不通死之祥也敗復敗丁寧之辭也恭尋死京都大行咳疾而喉並喝焉王恭在京口民間忽云黃頭小人欲作賊阿公在城下指縛得又云黃頭小人欲作亂賴得金刀作蕃扞黃字上恭字頭也小人恭字下也尋如謠者言焉晉安帝隆安中民忽作懊惱歌其曲中有草生可攬結女兒可攬抱之言桓玄既篡居天位義旗以三月二日埽定京都玄之宮女及逆黨之家子女伎妾悉為軍賞東及甌越北流淮泗皆人有所獲焉時則草可結事則女可抱信矣桓玄既篡童謠曰草生及馬腹烏啄桓玄目及玄敗走至江陵五月中誅如其期焉桓玄時民謠語云征鐘落地桓迸走征鐘至穢之服桓四體之下稱玄自下居上猶征鐘之廁歌謠下體之詠民口也而云落地墜地之祥迸走之言其驗明矣司馬元顯時民謠詩云當有十一口當為兵所傷木亘當北度走入浩浩鄉又云金刀既以刻娓娓金城中此詩云襄陽道人竺曇林所作多所道行於世孟顗釋之曰十一口者玄字象也木亘桓也桓氏當悉走入關洛故云浩浩鄉也金刀劉也倡義諸公皆多姓劉娓娓美盛貌也桓玄得志童謠曰長干巷巷長干今年殺郎君明年斬諸桓及玄走而諸桓悉誅焉郎君司馬元顯也晉安帝義熙初童謠曰官家養蘆化成荻蘆生不止自成積其時官養盧龍寵以金紫奉以名州養之已極而不能懷我好音舉兵內伐遂成讎敵也蘆生不止自成積及盧龍作亂時人追思童謠惡其有成積之言識者曰芟夷蘊崇之又行火焉是草之窮也伐斫以成積又以為薪亦蘆荻之終也其盛既極亦將芟夷而為積焉龍既窮其兵勢盛其舟艦卒以滅亡僵屍如積焉盧龍據有廣州民間謠云蘆生漫漫竟天半後擁有上流數州之地內逼京輦應天半之言義熙三年中小兒相逢於道輒舉其兩手曰盧健健次曰鬭嘆鬭嘆末復曰翁年老翁年老當時莫知所謂其後盧龍內逼舟艦蓋川健健之謂也既至查浦屢剋期欲與官鬭鬭嘆之應也翁年老群公有期頤之慶知妖逆之徒自然消殄也其時復有謠言曰盧橙橙逐水流東風忽如起那得入石頭盧龍果敗不得入石頭昔溫嶠令郭景純卜己與庾亮吉凶景純云元吉嶠語亮景純每筮當是不敢盡言吾等與國家同安危而曰元吉事有成也於是協同討滅王敦苻堅中童謠曰阿堅連牽三十年後若欲敗時當在江湖邊後堅敗於淝水在偽位凡三十年苻堅中謠語云河水清復清苻堅死新城堅為姚萇所殺死於新城苻堅中歌云魚羊田斗當滅秦魚羊鮮也田斗卑也堅自號秦言滅之者鮮卑也其群臣諫堅令盡誅鮮卑堅不從及淮南敗還為慕容沖所攻亡奔姚萇身死國滅毛蟲之孽晉武帝太康六年南陽送兩足虎此毛蟲之孽也識者為其文曰武形有虧金虎失儀聖主應天斯異何為言非亂也京房易傳曰足少者下不勝任也干寶曰虎者陰精而居于陽金獸也南陽火名也金精入火而失其形王室亂之妖也六水數言水數既極火慝得作而金受其敗也至元康九年始殺太子距此十四年二七十四火始終相乘之數也自帝受命至愍懷之廢凡三十五年太康九年荊州獻兩足玃太康七年十一月丙辰四角獸見于河間河間王顒獲以獻角兵象也董仲舒以四角為四方之象後河間王數連四方之兵作為亂階殆其應也晉懷帝永嘉五年偃鼠出延陵此毛蟲之孽也郭景純筮之曰此郡東之縣當有妖人欲稱制者亦尋自死矣其後吳興徐馥作亂殺太守袁琇馥亦尋滅是其應也晉成帝咸和六年正月丁巳會州郡秀孝於樂賢堂有麇見於前獲之孫盛曰夫秀孝天下之彥士樂賢堂所以樂養賢也晉自喪亂以後風教凌夷秀無策試之才孝乏四行之實麇興於前或斯故乎晉哀帝隆和元年十月甲申有麈入東海第百姓讙言曰主入東海第識者怪之及海西廢為東海王先送此第晉孝武太元十三年四月癸巳礿祠畢有兔行廟堂上兔野物也而集宗廟之堂不祥莫甚焉宋文帝元嘉二十四年二月雍州送六足獐刺史武陵王表為祥瑞此毛蟲之孽宋順帝昇明元年象三頭度蔡洲暴稻穀及園野犬禍公孫淵家有犬冠幘絳衣上屋此犬禍也屋上亢陽高危之地天戒若曰淵亢陽無上偷自尊高狗而冠者也及自立為燕王果為魏所滅京房易傳曰君不正臣欲篡厥妖狗出朝門魏侍中應璩在直廬欻見一白狗問眾人無見者踰年卒近犬禍也諸葛恪征淮南歸將朝會犬銜引其衣恪曰犬不欲我行乎還坐有頃復起犬又銜衣乃令逐犬遂升車入而被害晉武帝太康九年幽州有犬鼻行地三百餘步晉惠帝元康中吳郡婁縣民家聞地中有犬聲掘視得雌雄各一還置窟中覆以磨石宿昔失所在元帝太興中吳郡府舍又得二物頭如此其後太守張茂為吳興兵所殺案夏鼎志曰掘地得狗名曰賈尸子曰地中有犬名曰地狼同實而異名也晉惠帝永興元年丹陽內史朱逵家犬生三子皆無頭後逵為揚州刺史曹武所殺晉孝懷帝永嘉五年吳郡嘉興張林家狗人言云天下人餓死晉安帝隆安初吳郡治下狗恒夜吠聚高橋上人家狗有限而犬聲甚眾或有夜出覘之者云一狗假有兩三頭皆前向亂吠無幾孫恩亂於吳會桓玄將拜楚王已設拜席群官陪位玄未及出有狗來便其席萬眾暀候莫不驚怪玄性猜暴竟無言者逐狗改席而已宋武帝永初二年京邑有狗人言文帝元嘉二十九年吳興東遷孟慧度婢蠻與狗通好如夫妻彌年孝武孝建初顏竣為左衛於省內聞犬子聲在地中掘焉得烏犬子養久之後自死明帝初晉安王子勛稱偽號於尋陽柴桑有狗與女人交三日不分離明帝泰始中秣陵張僧護家犬生豕子白眚白祥晉武帝太康十年洛陽宮西宜秋里石生地中始高三尺如香鑪形後如傴人盤薄不可掘案劉向說此白眚也明年宮車晏駕王宮始騷卒以亂亡京房易傳曰石立如人庶人為天下雄此近之矣晉成帝咸康初地生毛近白眚也孫盛以為民勞之異是後胡滅而中原向化將相皆甘心焉於是方鎮屢革邊戍仍遷皆擁帶部曲動有萬數其間征伐徵賦役無寧歲天下擾動民以疲怨咸康三年六月地生毛晉孝武太元二年五月京都地生毛至四年而氐賊攻襄陽圍彭城向廣陵征戍仍出兵連不解太元十四年四月京都地生毛是時苻堅滅後經略多事太元十七年四月地生毛晉安帝隆安四年四月乙未地生毛或白或黑晉安帝元興三年五月江陵地生毛是後江陵見襲交戰者數矣晉安帝義熙三年三月地生白毛義熙十年三月地生白毛明年王旅西討司馬休之又明年北埽關洛魏明帝青龍三年正月乙亥隕石于壽光按左氏傳隕石星也劉歆說曰庶民惟星隕於宋者象宋襄公將得諸侯而不終也秦始皇時有隕石班固以為石陰類又曰祥臣將危君是後司馬氏得政晉武帝太康五年五月丁巳隕石于溫及河陽各二太康六年正月隕石于溫三晉成帝咸和八年五月星隕于肥鄉一咸和九年正月隕石於涼州吳孫亮五鳳二年五月陽羨縣離里山大石自立按京房易傳曰庶士為天子之祥也其說曰石立於山同姓平地異姓干寶以為孫皓承廢故之家得位其應也或曰孫休見立之祥也晉惠帝元康五年十二月有石生干宜年里晉惠帝永康元年襄陽郡上言得鳴石撞之聲聞七八里晉惠帝太安元年丹陽湖孰縣夏架湖有大石浮二百步而登岸民驚譟相告曰石來干寶曰尋有石冰入建業晉武帝太始八年五月蜀地雨白毛此白祥也是時益州刺史皇甫晏冒暑伐汶山胡從事何旅固諫不從牙門張弘等因眾之怨誣晏謀逆害之京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛其易妖曰天雨毛羽貴人出走三占皆應也晉惠帝永寧元年齊王冏舉義軍軍中有小兒出於襄城繁昌縣年八歲髮體悉白頗能卜於洪範則白祥也晉車騎大將軍東嬴王騰自并州遷鎮鄴行次真定時久積雪而當門前方數尺獨消釋騰怪而掘之得玉馬高尺許口齒缺騰以馬者國姓上送之以為瑞然論者皆云馬而無齒則不得食妖祥之兆衰亡之徵案占此白祥也是後騰為汲桑所殺而晉室遂亡宋文帝元嘉中徐湛之為丹陽尹夜西門內有氣如練西南指長數十丈又白光覆屋良久而轉駃乃消此白祥也前廢帝景和元年鄧琬在尋陽種紫花皆白白眚也木沴金魏齊王正始末河南尹李勝治聽事有小材激墮檛受符吏石虎項斷之此木沴金也勝後旬日而敗晉惠帝元康八年三月郊禖壇石中破為二此木沴金也郊禖壇者求子之神位無故而自毀太子將危之妖也明年愍懷廢死晉孝武帝太元十年四月謝安出鎮廣陵始發石頭金鼓無故自破此木沴金之異也天意若曰安徒揚經略之聲終無其實鉦鼓不用之象也八月以疾還是月薨
