body:
  text: 卷三十四志第二十四五行五五行傳曰治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成謂土失其性而為災也又曰思心不叡是謂不聖厥咎瞀厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有下體生上之痾時則有黃眚黃祥時則有金木水火沴土班固曰不言惟而獨曰時則有者非一衝氣所沴明其異大也華孽劉歆傳以為蠃蟲之孽謂暝屬也稼穡不成吳孫皓時嘗歲無水旱苗稼豐美而實不成百姓以饑闔境皆然連歲不已吳人以為傷露非也按劉向春秋說曰水旱當書不書水旱而曰大無麥禾者土氣不養稼穡不成此其義也皓初遷都武昌尋還建業又起新館綴飾珠玉壯麗過甚破壞諸宮增修苑囿犯暑妨農官民疲怠月令季夏不可以興土功皓皆冒之此治宮室飾臺榭之罰與春秋魯莊公三築臺同應也班固曰無水旱之災而草木百穀不熟皆為稼穡不成晉穆帝永和十年三麥不登至關西亦然自去秋至是夏無水旱無麥者如劉向說也又俗云多苗而不實為傷又其義也恒風魏齊王正始九年十一月大風數十日發屋折樹十二月戊子晦尤甚動太極東閤魏齊王嘉平元年正月壬辰朔西北大風發屋折木昏塵蔽天按管輅說此為時刑大風執政之憂也是時曹爽區瞀自專驕僭過度天戒數見終不改革此思心不叡恒風之罰也後踰旬而爽等滅京房易傳曰眾逆同志至德乃潛厥異風其風也行不解物不長雨小而傷政悖德隱茲謂亂厥風先風不雨大風暴起發屋折木守義不進茲謂眊厥風與雲俱起折五穀莖臣易上政茲謂不順厥風大飆發屋賦斂不理茲謂禍厥風絕經紀止即溫溫即蟲侯專封利茲謂不統厥風疾而樹不搖穀不成辟不思道利茲謂無澤厥風不搖水旱無雲傷禾公常於利茲謂亂厥風微而溫生蟲蝗害五穀棄正作淫茲謂惑厥風溫螟蟲起害有益人之物侯不朝茲謂叛厥風無恒地變赤雨殺人吳孫權太元元年八月朔大風江海涌溢平地水深八尺拔高陵樹二株石碑蹉動吳城兩門飛落按華覈對役繁賦重區瞀不叡之罰也明年權薨吳孫亮建興元年十二月丙申大風震電是歲魏遣大眾三道來攻諸葛恪破其東興軍二軍亦退明年恪又攻新城喪眾大半還伏誅吳孫休永安元年十一月甲午風四轉五復蒙霧連日是時孫綝一門五侯權傾吳主風霧之災與漢五侯丁傅同應也十二月丁卯夜又大風發木揚沙明日綝誅晉武帝太始五年五月辛卯朔廣平大風折木晉武帝咸寧元年五月下邳廣陵大風壞千餘家折樹木咸寧元年五月甲申廣陵司吾下邳大風折木咸寧三年八月河間大風折木晉武帝太康二年五月濟南大風折木傷麥太康二年六月高平大風折木發壞邸閤四十餘區太康八年六月郡國八大風太康九年正月京都風雹發屋拔木後二年宮車晏駕晉惠帝元康四年六月大風雨拔樹元康五年四月庚寅夜暴風城東渠波浪七月下邳大風壞廬舍九月雁門新興太原上黨災風傷稼明年氐羌反叛大兵西討元康九年六月飆風吹賈謐朝服飛數百丈明年謐誅元康九年十一月甲子朔京都連大風發屋折木十二月太子廢晉惠帝永康元年二月大風拔木三月愍懷被害己卯喪柩發許還洛是日大風雷電幃蓋飛裂永康元年四月張華第舍飆風折木飛繒軸六七是月華遇害永康元年十一月戊午朔大風從西北來折木飛石明年正月趙王倫篡位晉惠帝永興元年正月癸酉趙王倫祠太廟災風暴起塵沙四合其年四月倫伏辜晉元帝永昌元年七月丙寅大風拔木屋瓦皆飛永昌元年八月暴風壞屋拔御道柳樹百餘株其風縱橫無常若風自八方來者十一月宮車晏駕晉成帝咸康四年三月壬辰成都大風發屋折木四月李壽襲殺李期晉康帝建元元年七月庚申晉陵吳郡災風晉穆帝升平元年八月丁未策立皇后何氏是日疾風升平五年正月戊戌朔疾風晉海西公泰和六年二月大風迅急晉孝武帝寧康元年三月戊申朔暴風迅起從丑上來須臾轉從子上來飛沙揚礫晉孝武帝太元元年二月乙丑朔暴風折木太元元年閏三月甲子朔暴風疾雨俱至發屋折木太元二年六月長安大風拔苻堅宮中樹其後堅再南伐身戮國亡太元四年八月乙未暴風太元十二年正月壬午夜暴風太元十二年正月甲辰大風拔木太元十七年六月乙未大風折木晉安帝元興二年二月甲辰大風雨大航門屋瓦飛落明年桓玄篡位由此門入元興二年正月桓玄遊大航南飄風飛其䡟輗至三月玄敗元興二年三月江陵大風折木是月桓玄敗於崢嶸洲身亦屠裂元興三年十一月丁酉大風江川多死者晉安帝義熙四年十一月辛卯朔西北疾風起義熙五年閏十月丁亥大風發屋明年盧循至蔡洲義熙六年五月壬申大風拔北郊樹樹幾百年也琅邪揚州二射堂倒壞是日盧循大艦漂沒甲戌又風發屋折木是冬三帥南討義熙十年四月己丑朔大風拔木義熙十年六月辛亥大風拔木明年西討司馬休之宋少帝景平二年正月癸亥朔旦暴風發殿庭會席翻揚數十丈五月帝廢文帝元嘉二十六年二月庚申壽陽驟雨有回風雲霧廣三十許步從南來至城西回散滅當其衝者室屋樹木摧倒元嘉二十九年三月大風拔木飛瓦元嘉三十年正月大風拔木雨凍殺牛馬雷電晦冥二月宮車晏駕孝武帝大明七年風吹初寧陵隧口左標折鍾山通天臺新成飛倒散落山澗明年閏五月帝崩前廢帝永光元年正月乙未朔京邑大風明帝泰始二年三月丙申京邑大風泰始二年四月甲子京邑大風泰始二年五月丁未京邑大風泰始二年五月己酉京邑大風泰始二年九月乙巳京邑大風後廢帝元徽二年七月甲子京邑大風元徽三年三月丁卯京邑大風元徽三年六月甲戌京邑大風元徽四年十一月辛卯京邑大風元徽五年三月庚寅京邑大風發屋折木元徽五年六月甲寅京邑大風夜妖魏高貴鄉公正元二年閏正月戊戌大風晦暝行者皆頓伏近夜妖也劉向曰正晝而暝陰為陽臣制君也時晉景王討毋丘儉是日始發魏元帝景元三年十月京都大震晝晦此夜妖也班固曰夜妖者雲風並起而杳冥故與常風同象也劉向春秋說云天戒若曰勿使大夫世官將令專事冥晦明年魯季友卒果世官而公室卑矣魏見此妖晉有天下之應也晉孝武帝太元十三年十二月乙未大風晦暝其後帝崩而諸侯違命干戈內侮權奪於元顯禍成於桓玄是其應也蠃蟲之孽晉孝武咸寧元年七月郡國螟九月青州又螟咸寧元年七月郡國有青蟲食禾稼咸寧四年司冀兗豫荊揚郡國皆螟晉武帝太康四年會稽彭蜞及蟹皆化為鼠甚眾覆野大食稻為災太康九年八月郡國二十四螟螟說與蝗同是時帝聽讒訴太康九年九月蟲傷稼晉惠帝元康二年九月帶方含資提奚南新長岑海冥列口蟲食禾葉蕩盡晉惠帝永寧元年七月梁益涼三州螟是時齊王冏秉政貪苛之應也永寧元年十月南安巴西江陽太原新興北海青蟲食禾葉甚者十傷五六永寧元年十二月郡國八螟牛禍晉武帝太康九年幽州塞北有死牛頭語近牛禍也是時帝多疾病深以後事為念而託付不以至公思心瞀亂之應也師曠曰怨讟動於民則有非言之物而言又其義也晉惠帝太安中江夏張騁所乘牛言曰天下方亂乘我何之騁懼而還犬又言曰歸何蚤也尋後牛又人立而行騁使善卜者卦之謂曰天下將有兵亂為禍非止一家其年張昌反先略江夏騁為將帥於是五州殘亂騁亦族滅京房易妖曰牛能言如其言占吉凶易萌氣樞曰人君不好士走馬被文繡犬狼食人食則有六畜妖言時天子諸侯不以惠下為務又其應也晉愍帝建武元年曲阿門牛生犢一體兩頭元帝太興元年武昌太守王諒牛生子兩頭八足兩尾共一腹三年後死又有牛生一足三尾皆生而死按司馬彪說兩頭者政在私門上下無別之象也京房易傳曰足多者所任邪也足少者下不勝任也其後皆有此應晉元帝大興四年十二月郊牛死按劉向說春秋郊牛死曰宣公區瞀昏亂故天不饗其祀元帝中興之業實王導之謀也劉隗探會主意以得親幸導見疏外此區瞀不叡之禍也晉成帝咸和二年五月護軍牛生犢兩頭六足是冬蘇峻作亂咸和七年九德民袁榮家牛產犢兩頭八足二尾共身京房易傳殺無罪則牛生妖桓玄之國在荊州詣刺史殷仲堪行至鶴穴逢一老公驅青牛形色瓌異桓玄即以所乘牛易取乘至零陵涇溪駿駃非常因息駕飲牛牛徑入江水不出玄遣人覘守經日無所見宋文帝元嘉三年司徒徐羨之大兒喬之行欲入廣莫門牛徑將入廷尉寺左右禁捉不能禁入方得出明日被收元嘉二十九年晉陵送牛角生右脅長八尺明年二月東宮為禍孝武帝大明三年廣州刺史費淹獻三角水牛黃眚黃祥蜀劉備章武二年東伐二月自秭歸進屯夷道六月秭歸有黃氣見長十餘里廣數十丈後踰旬備為陸遜所破近黃祥也魏齊王正始中中山王周南為襄邑長有鼠從穴出語曰王周南爾以某日死南不應鼠還穴後至期更冠幘皁衣出語曰周南汝日中當死又不應鼠復入斯須更出語如向日適欲日中鼠入復出出復入轉更數語如前日適中鼠曰周南汝不應我復何道言絕顛蹶而死即失衣冠取視俱如常鼠案班固說此黃祥也是時曹爽秉政競為比周故鼠作變也宋孝武大明七年春太湖邊忽多鼠其年夏水至悉變成鯉魚民人一日取轉得三五十斛明年大飢晉元帝太興四年八月黃霧四塞埃氣蔽天案楊宣對近土氣亂之祥也晉元帝永昌二年正月癸巳黃霧四塞晉穆帝永和七年三月涼州大風拔木黃霧下塵是時張重華納譖出謝艾為酒泉太守而所任非其人至九年死嗣子見弒是其應也京房易傳曰聞善不予茲謂不知厥異黃厥咎聾厥災不嗣黃者有黃濁氣四塞天下蔽賢絕道故災至絕世也晉安帝元興元年十月丙申朔黃霧昏濁不雨宋文帝元嘉十八年秋七月天有黃光洞照于地太子率更令何承天謂之榮光太平之祥上表稱慶地震吳孫權黃武四年江東地連震是時權受魏爵命為大將軍吳王改元專制不修臣迹京房易傳曰臣事雖正專必震董仲舒劉向並云臣下強盛將動而為害之應也魏明帝青龍二年十一月京都地震從東來隱隱有聲屋瓦搖魏明帝景初元年六月戊申京都地震是秋吳將朱然圍江夏荊州刺史胡質擊退之又公孫淵自立為燕王改年置百官明年討平之吳孫權嘉禾六年五月江東地震赤烏二年正月地又再震是時呂壹專政步騭上疏曰伏聞校事吹毛求瑕輒欲陷人成其威福無罪無辜橫受重刑雖有大臣不見信任如此天地焉得無變故嘉禾六年赤烏二年地連震動臣下專政之應也冀所以警悟人主可不深思其意哉壹後卒敗魏齊王正始二年十一月南安郡地震正始三年七月甲申南安郡地震十二月魏郡地震正始六年二月丁卯南安郡地震是時曹爽專政遷太后于永寧宮太后與帝相泣而別連年地震是其應也吳孫權赤烏十一年二月江東地仍震是時權聽讒尋黜朱據廢太子蜀劉禪炎興元年蜀地震時宦人黃皓專權按司馬彪說奄宦無陽施猶婦人也此皓見任之應與漢和帝時同事也是冬蜀亡晉武帝太始五年四月辛酉地震是年冬新平氐羌叛明年孫皓大遣眾入渦口叛虜寇秦涼刺史胡烈蘇愉並為所害太始七年六月丙申地震武帝世始於賈充終於楊駿阿黨昧利苟專權寵終喪天下由是也末年所任轉敝故亦一年六震是其應也裴叔則曰晉德所以不比隆堯舜者以有賈充諸人在朝晉武帝咸寧二年八月庚辰河南河東平阿地震咸寧四年六月丁未陰平廣武地震甲子陰平廣武地又震晉武帝太康二年二月庚申淮南丹陽地震太康五年正月壬辰地震太康六年七月己丑地震太康七年七月南安犍為地震八月京兆地震太康八年五月壬子建安地震七月陰平地震八月丹陽地震太康九年正月會稽丹陽吳興地震四月辛酉長沙南海等郡國八地震七月至于八月地又四震其三有聲如雷太康十年十二月己亥丹陽地震晉武帝太始元年地震晉惠帝元康元年十二月辛酉京都地震元康四年二月蜀郡山崩殺人上谷上庸遼東地震五月壬子壽春山崩洪水出城壞地墜方三十丈六月壽春大雷震山崩地坼家人陷死上庸郡亦如之八月上谷地震水出殺百餘人居庸地裂廣三十六丈長八十四丈水出大饑上庸四處山崩地陷廣三十丈長百三十丈水出殺人十月京都地震十一月滎陽襄城汝陰梁國南陽地皆震十二月京都又震是時賈后亂朝據權專制終至禍敗之應也漢鄧太后攝政時郡國地震李固以為地陰也法當安靜今乃越陰之職專陽之政故應以震此同事也京房易傳曰無德專祿茲謂不順厥震動丘陵涌水出又曰小人剝廬厥妖山崩茲謂陰乘陽弱勝強又曰陰背陽則地裂父子分離夷羌叛去元康五年五月丁丑地震六月金城地震元康六年正月丁丑地震元康八年正月丙辰地震晉惠帝太安元年十月地震是時齊王冏專政太安二年十二月丙辰地震是時長沙王專政晉孝懷帝永嘉三年十月荊湘二州地震時司馬越專政永嘉四年四月兗州地震晉愍帝建興二年四月甲辰地震是時幼主在上權傾於下四方雲擾兵亂不息建興三年六月丁卯長安地震晉元帝太興元年四月西平地震涌水出十二月廬陵豫章武昌西陵地震山崩干寶曰王敦陵上之應太興二年五月癸丑祁山地震山崩殺人是時相國南陽王保在祁山稱晉王不終之象也太興三年四月庚寅丹陽吳郡晉陵地震其年南平郡山崩出雄黃數千斤晉成帝咸和二年三月益州地震四月己未豫章地震是年蘇峻作亂咸和九年三月丁酉會稽地震是時政在臣下晉穆帝永和元年六月癸亥地震是時嗣主幼沖母后稱制政在臣下所以連年地震永和二年十月地震永和三年正月丙辰地震永和四年十月己未地震永和五年正月庚寅地震永和九年八月丁酉京都地震有聲如雷永和十年正月丁酉地震有聲如雷雞雉鳴呴永和十一年四月乙酉地震五月丁未地震晉穆帝升平五年八月涼州地震晉哀帝隆和元年四月甲戌地震是時政在將相人主南面而已隆和元年四月丁丑涼州地震浩亹山崩張天錫降亡之象也隆和二年二月庚寅江陵地震是時桓溫專政晉海西太和元年二月涼州地震水涌晉簡文帝咸安二年十月辛未安成地震晉孝武帝寧康元年十月辛未地震是時嗣主幼沖政在將相寧康二年七月甲午涼州地震山崩晉孝武帝太元二年閏月壬午地震五月丁丑地震太元十一年六月己卯地震是後緣河諸將連歲兵役太元十五年三月己酉朔夜地震太元十七年六月癸卯地震十二月己未地又震是時群小弄權天下側目太元十八年正月癸亥朔地震二月乙未地震晉安帝隆安四年九月癸酉地震是時幼主沖昧政在臣下晉安帝義熙四年正月壬子夜地震有聲十月癸亥地震義熙五年正月戊戌夜尋陽地震有聲如雷明年盧循下義熙八年自正月至四月南康廬陵地四震明年王旅西討荊益宋文帝元嘉七年四月丙辰地震時遣軍經略司兗元嘉十二年四月丙辰京邑地震元嘉十五年七月辛未地震元嘉十六年地震孝武帝大明二年四月辛丑地震大明六年七月甲申地震有聲自河北來魯郡山搖地動彭城城女牆四百八十丈墜落屋室傾倒兗州地裂泉涌二年不已其後虜主死兗州刺史夏侯祖權卒明帝泰始二年四月地震泰始四年七月己酉東北有聲如雷地震明帝泰豫元年閏七月甲申東北有聲如雷地震後廢帝元徽二年四月戊申地震元徽五年五月戊申地震七月帝殞宋文帝元嘉二十五年青州城南地遠望見地中如水有影人馬百物皆見影中積年乃滅山崩地陷裂吳孫權赤烏十三年八月丹楊句容及故鄣寧國諸山崩鴻水溢按劉向說山陽君也水陰民也天戒若曰君道崩壞百姓將失其所也與春秋梁山崩漢齊楚眾山發水同事也夫三代命祀祭不越望吉凶禍福不是過也吳雖帝其實列國災發丹楊其天意矣國主山川山崩川竭亡之徵也後二年而權薨薨二十六年而吳亡魏元帝咸熙三年二月太行山崩此魏亡之徵也其冬晉有天下晉武帝太始三年三月戊子太行山崩太始四年七月泰山崩墜三里此晉之咎徵也至帝晏駕而祿去王室懷愍淪胥於北元帝中興於南是其應也京房易傳曰自上下者為崩厥應泰山之石顛而下聖王受命人君虜晉武帝太康五年丙午宣帝廟地陷太康六年三月南安新興縣山崩涌水出太康七年七月朱提之大瀘山崩震壞郡舍陰平之仇池崖隕太康八年七月大雨殿前地陷方五尺深數丈晉惠帝元康四年五月壬子地陷方三十丈殺人史闕其處元康四年八月居庸地裂廣三十丈長百三十丈水出殺人晉孝懷帝永嘉元年三月洛陽東北步廣里地陷永嘉三年八月乙亥鄄城城無故自壞七十餘丈司馬越惡之遷于濮陽此見沴之異也越卒陵上終亦受禍永嘉三年七月戊辰當陽地裂三所所廣三丈長二百餘步京房易傳曰地坼裂者臣下分離不肯相從也其後司馬越苟晞交惡四方牧伯莫不離散王室遂亡永嘉三年十月宜都夷道山崩永嘉四年四月湘東酃黑石山崩晉元帝太興四年八月常山崩水出滹沱盈溢大木傾拔晉成帝咸和四年十月柴桑廬山西北崖崩十二月劉胤為郭默所殺晉惠帝元康九年六月夜暴雷雨賈謐齋屋柱陷入地壓謐床帳此木沴土土失其性不能載也明年謐誅晉惠帝光熙元年五月范陽地然可以爨此火沴土也是時禮樂征伐自諸侯出晉安帝義熙八年三月壬寅山陰有聲如雷地陷深廣各四尺義熙十年五月戊寅西明門地穿涌水出毀門房及限此水沴土也五行傳曰皇之不極是謂不建厥咎眊厥罰恒陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行常陰吳孫亮太平三年自八月沈陰不雨四十餘日是時將誅孫綝謀泄九月戊午綝以兵圍宮廢亮為會稽王此常陰之罰也吳孫皓寶鼎元年十二月太史奏久陰不雨將有陰謀皓深驚懼時陸凱等謀因其謁廟廢之及出留平領兵前驅凱語平平不許是以不果皓既肆虐群下多懷異圖終至降亡宋後廢帝元徽三年四月連陰不雨元徽三年八月多陰後二年廢帝殞射妖蜀車騎將軍鄧芝征涪陵見玄猿緣山手射中之猿拔其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣俄而卒此射妖也一曰猿母抱子芝射中之子為拔箭取木葉塞創芝歎息投弓水中自知當死矣晉恭帝之為琅邪王時好奇戲嘗閉一馬於門內令人射之欲觀幾箭而死左右有諫者曰馬國姓也而今射之不祥甚矣於是乃止而馬已被十許箭矣此蓋射妖也俄而桓玄篡位龍蛇之孽魏明帝青龍元年正月甲申青龍見郟之摩陂井中凡瑞興非時則為妖孽況困於井非嘉祥也魏以改年非也晉武不賀是也干寶曰自明帝終魏世青龍黃龍見者皆其主廢興之應也魏土運青木色也而不勝於金黃得位青失位之象也青龍多見者君德國運內相剋伐也故高貴鄉公卒敗于兵案劉向說龍貴象而困井中諸侯將有幽執之禍也魏世龍莫不在井此居上者逼制之應高貴鄉公著潛龍詩即此旨也魏高貴鄉公正元元年冬十月戊戌黃龍見于鄴井中魏高貴鄉公甘露元年正月辛丑青龍見軹縣井中六月乙丑青龍見元城縣界井中甘露二年二月青龍見溫縣井中甘露三年黃龍青龍仍見頓丘冠軍陽夏縣界井中景元元年二月青龍見軹縣井中吳孫皓天冊中龍乳於長沙民家啖雞鶵京房易妖曰龍乳人家王者為庶人其後皓降晉武帝咸寧二年六月丙申白龍二見于九原井中晉武帝太康五年正月癸卯二龍見于武庫井中帝見龍有喜色百僚將賀劉毅獨表曰昔龍漦夏庭禍發周室龍見鄭門子產不賀帝答曰朕德政未修未有以膺受嘉祥遂不賀也孫盛曰龍水物也何與於人子產言之當矣但非其所處實為妖災夫龍以飛翔顯見為美則潛伏幽處非休祥也漢惠帝二年兩龍見蘭陵井中本志以為其後趙王幽死之象也武庫者帝王威御之器所寶藏也室宇邃密非龍所處後七年蕃王相害二十八年果有二胡僭竊神器勒虎二逆皆字曰龍此之表異為有證矣史臣案龍為休瑞而屈於井中前史言之已詳但兆幽微非可臆斷故五行符瑞兩存之晉愍帝建興二年十一月枹罕羌妓產一龍子色似錦文嘗就母乳遙見神光少得就視晉武帝咸寧中司徒府有二大蛇長十許丈居聽事平橑上數年而人不知但怪府中數失小兒及豬犬之屬後一蛇夜出傷於刃不能去乃覺之發徒攻擊移時乃死夫司徒五教之府此皇極不建故蛇孽見之漢靈帝時蛇見御座楊賜以為帝溺於色之應也魏氏宮人猥多晉又過之宴游是湎此其孽也詩云惟虺惟蛇女子之祥晉惠帝元康五年三月癸巳臨菑有大蛇長十餘丈負二小蛇入城北門徑從市入漢城陽景王祠中不見天戒若曰齊方有劉章定傾之功若不厲節忠慎又將蹈章失職奪功之辱也齊王冏不悟雖建興復之功而以驕陵取禍負二小蛇出朝市皆有象類也晉明帝太寧初武昌有大蛇常居故神祠空樹中每出頭從人受食京房易妖曰蛇見於邑不出三年有大兵國有大憂其後討滅王敦及其黨與馬禍晉武帝大熙元年遼東有馬生角在兩耳下長三寸按劉向說此兵象也及帝晏駕之後王室毒於兵禍是其應也京房易傳曰臣易上政不順厥妖馬生角又有天子親伐馬生角呂氏春秋曰人君失道馬有生角晉惠帝元康元年十二月皇太子將釋奠太傅趙王倫驂乘至南城門馬止力士推之不能動倫入軺車乃進此馬禍也天戒若曰倫不知義方終為亂逆非傅導行禮之人倫不悟故亡元康九年十一月戊寅冬有牝騮馬驚奔至廷尉訊堂悲鳴而死是殆愍懷冤死之象也見廷尉訊堂又天意乎晉孝懷帝永嘉六年二月神馬鳴南城門晉元帝大興二年丹陽郡吏濮陽楊演馬生駒兩頭自頸前別生而死按司馬彪說政在私門二頭之象也是後王敦陵上晉成帝咸康八年五月甲戌有馬色赤如血自宣陽門直走入于殿前盤旋走出尋逐莫知所在己卯帝不豫六月崩此馬禍又赤祥也張重華在涼州將誅其西河相張祚祚廄馬數十匹同時悉皆無後尾晉安帝隆安四年十月梁州有馬生角刺史郭銓送示都督桓玄案劉向說馬不當生角由玄不當舉兵向上也睹災不悟故至夷滅人痾魏文帝黃初初清河宋士宗母化為鱉入水魏明帝太和三年曹休部曲兵奚農女死復生時人有開周世冢得殉葬女子數日而有氣數月而能語郭太后愛養之又太原民發冢破棺棺中有一生婦人問其本事不知也視其墓木可三十歲案京房易傳至陰為陽下人為上晉宣王起之象也漢平帝獻帝並有此異占以為王莽曹操之徵公孫淵炊有小兒蒸死甑中其後夷滅吳孫亮建興二年諸葛恪將征淮南有孝子著衰衣入其閣詰問答曰不自覺入也時中外守備亦悉不見眾皆異之及還果見殺恪已被害妻在室使婢沃盥聞婢血臭又眼目視瞻非常妻問其故婢蹶然躍起頭至棟攘臂切齒曰諸葛公乃為峻所殺吳孫休永安四年安吳民陳焦死七日復穿冢出干寶曰此與漢宣帝同事烏程侯皓承廢故之家得位之祥也吳孫皓寶鼎元年丹陽宣騫母年八十因浴化為黿兄弟閉戶衛之掘堂上作大坎實水其中黿入坎戲一二日恒延頸外望伺戶小開便輪轉自躍入于遠潭遂不復還與漢靈帝時黃氏母事同吳亡之象也魏元帝咸熙二年八月襄武縣言有大人見長三丈餘跡長三尺二寸髮白著黃巾黃單衣柱杖呼民王始語曰今當太平尋晉代魏晉武帝大始五年元城人年七十生角案漢志說殆趙王倫篡亂之象也晉武帝咸寧二年二月琅邪人顏畿病死棺斂已久家人咸夢畿謂己曰我當復生可急開棺遂出之漸能飲食屈申視瞻不能行語也二年復死其後劉淵石勒遂亡晉室晉惠帝元康中安豐有女子周世寧年八歲漸化為男至十七八而氣性成此劉淵石勒蕩覆晉室之妖也漢哀帝獻帝時並有此異皆有易代之兆京房傳曰女子化為丈夫茲謂陰昌賤人為王丈夫化為女子茲謂陰勝陽厥咎亡晉惠帝永寧初齊王冏唱義兵誅除亂逆乘輿反正忽有婦人詣大司馬門求寄產門者詰之婦人曰我截齊便去耳是時齊王冏匡復王室天下歸功識者為其惡之後果斬戮永寧元年十二月甲子有白頭公入齊王冏大司馬府大呼有大兵起不出甲子旬冏殺之明年十二月戊辰冏敗即甲子旬也晉惠帝太安元年四月癸酉有人自雲龍門入殿前北面再拜曰我當作中書監即收斬之干寶曰夫禁庭尊秘之處今賤人徑入而門衛不覺者宮室將虛而下人踰之之妖也是後帝北遷鄴又西遷長安盜賊蹈籍宮闕遂亡天下晉惠帝世梁國女子許嫁已受禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其父母逼強不得已而去尋得病亡後其夫還問女所在其家具說之其夫徑至女墓不勝哀情便發冢開棺女遂活因與俱歸後婿聞之詣官爭之所在不能決秘書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議晉惠帝世杜錫家葬而婢誤不得出後十餘年開冢祔葬而婢尚生其始如瞑有頃漸覺問之自謂當一再宿耳初婢之埋年十五六及開冢更生猶十五六也嫁之有子晉惠帝光熙元年會稽謝真生子大頭有鬢兩蹠反向上有男女兩體生便作丈夫聲經日死晉惠懷之世京洛有兼男女體亦能兩用人道而性尤淫案此亂氣之所生也自咸寧太康之後男寵大興甚於女色士大夫莫不尚之天下皆相放效或有至夫婦離絕怨曠妒忌者故男女氣亂而妖形作也元帝太興初又有女子陰在腹上在揚州性亦淫京房易妖曰人生子陰在首天下大亂在腹天下有事在背天下無後晉孝懷帝永嘉元年吳郡吳縣萬祥婢生子鳥頭兩足馬蹄一手無毛黃色大如枕晉愍帝建興四年新蔡縣吏任僑妻胡年二十五產二女相向腹心合同自胸以上齊以下各分此蓋天下未一之妖也時內史呂會上言案瑞應圖異根同體謂之連理異苗同穎謂之嘉禾草木之異猶以為瑞今二人同心易稱二人同心其利斷金嘉徵顯見生於陝東之國斯蓋四海同心之瑞不勝喜踊謹畫圖以上時有識者哂之晉中興初有女子其陰在腹當齊下自中國來江東性甚淫而不產京房易妖曰人生子陰在首天下大亂在腹天下有事在背天下無後晉元帝太興三年十二月尚書騶謝平妻生女墜地濞濞有聲須臾便死鼻目皆在頂上面處如項口有齒都連為一胸如鱉手足爪如鳥爪皆下句京房易妖曰人生他物非人所見者皆為天下大兵後二年有石頭之敗晉明帝太寧二年七月丹陽江寧侯紀妻死三日復生晉成帝咸康四年十一月辛丑有何一人詣南止車門自列為聖人所使錄付光祿外部檢問是東海郯縣呂暢辭語落漠髡鞭三百遣咸康五年四月下邳民王和僑居暨陽息女可年二十自云上天來還得徵瑞印綬當母天下晉陵太守以為妖收付獄至十一月有人持柘杖絳衣詣止車門口列為聖人使求見天子門候受辭列姓呂名錫云王和女可右足下有七星星皆有毛長七寸天今命可為天下母奏聞即伏誅并下晉陵誅可晉康帝建元二年十月衛將軍營督過望所領兵陳瀆女壹有文在足曰天下之母灸之逾明京都諠譁有司收繫以聞俄自建康縣獄亡去石虎末大武殿前所圖賢聖人像人頭忽悉縮入肩中晉孝武帝寧康初南郡州陵女人唐氏漸化為丈夫晉安帝義熙七年無錫人趙朱年八歲一旦暴長八尺髭鬚蔚然三日而死義熙中東陽人黃氏生女不養埋之數日於土中啼取養遂活義熙末豫章吳平人有二陽道重累生晉恭帝元熙元年建安人陽道無頭正平本下作女人形體宋文帝元嘉十七年劉斌為吳郡婁縣有一女忽夜乘風雨怳忽至郡城內自覺去家正炊頃衣不沾濡曉在門上求通言我天使也斌令前因曰府君宜起迎我當大富貴不爾必有凶禍斌問所以來亦不自知也謂是狂人以付獄符其家迎之數日乃得去後二十日許斌誅孝武帝大明中張暢為會稽郡妾懷孕兒於腹中啼聲聞於外暢尋死大明末荊州武寧縣人楊始歡妻於腹中生女兒此兒至今猶存明帝泰豫元年正月巨人見太子西池水上跡長三尺餘後廢帝元徽中南東莞徐坦妻懷孕兒在腹中有聲元徽中暨陽縣女人於黃山穴中得二卵如斗大剖視有人形魏文帝黃初四年三月宛許大疫死者萬數魏明帝青龍二年四月大疫青龍三年正月京都大疫吳孫權赤烏五年大疫吳孫亮建興二年四月諸葛恪圍新城大疫死者太半吳孫皓鳳皇二年疫晉武帝太始十年大疫吳土亦同晉武帝咸寧元年十一月大疫京都死者十萬人晉武帝太康三年春疫晉惠帝元康二年十一月大疫元康十年五月秦雍二州疾疫晉孝懷帝永嘉四年五月秦雍州饑疫至秋永嘉六年大疫晉元帝永昌元年十一月大疫死者十二三河朔亦同晉成帝咸和五年五月大饑且疫晉穆帝永和九年五月大疫晉海西太和四年冬大疫晉孝武帝太元五年五月自冬大疫至于此夏多絕戶者晉安帝義熙元年十月大疫發赤班乃愈義熙七年春大疫宋文帝元嘉四年五月京都疾疫孝武帝大明元年四月京邑疾疫大明四年四月京邑疾疫日蝕魏文帝黃初二年六月戊辰晦日有蝕之有司奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪己之義乎其令百官各虔厥職後有天地眚勿復劾三公黃初三年正月丙寅朔日有蝕之十一月庚申晦又日有蝕之黃初五年十一月戊申晦日有蝕之後二年宮車晏駕魏明帝太和初太史令許芝奏日應蝕與太尉於靈臺祈禳帝詔曰蓋聞人主政有不得則天懼之以災異所以譴告使得自修也故日月薄蝕明治道有不當者朕即位以來既不能光明先帝聖德而施化有不合於皇神故上天有以寤之宜勵政自修以報于神明天之於人猶父之於子未有父欲責其子而可獻盛饌以求免也今外欲遣上公與太史令具禳祠於義未聞也群公卿士其各勉修厥職有可以補朕不逮者各封上之魏明帝太和五年十一月戊戌晦日有蝕之太和六年正月戊辰朔日有蝕之魏明帝青龍元年閏月庚寅朔日有蝕之魏齊王正始元年七月戊申朔日有蝕之正始三年四月戊戌朔日有蝕之正始六年四月壬子日有蝕之十月戊寅朔又日有蝕之正始八年二月庚午朔日有蝕之是時曹爽專政丁謐鄧颺等轉改法度會有日蝕變詔群臣問得失蔣濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏子對以布惠魯君問異臧孫答以緩役塞變應天乃實人事濟旨譬甚切而君臣不悟終至敗亡矣正始九年正月乙未朔日有蝕之魏齊王嘉平元年二月己未日有蝕之魏高貴鄉公甘露四年七月戊子朔日有蝕之甘露五年正月乙酉朔日有蝕之按谷永說正朝尊者惡之京房占曰日蝕乙酉君弱臣強司馬將兵反征其王五月有成濟之變魏元帝景元二年五月丁未朔日有蝕之景元三年三月己亥朔日有蝕之晉武帝太始二年七月丙午晦日有蝕之太始七年五月庚辰日有蝕之太始八年十月辛未朔日有蝕之太始九年四月戊辰朔日有蝕之太始十年三月癸亥日有蝕之晉武帝咸寧元年七月甲申晦日有蝕之咸寧三年正月丙子朔日有蝕之晉武帝太康四年三月辛丑朔日有蝕之太康六年八月丙戌朔日有蝕之太康七年正月甲寅朔日有蝕之乙亥詔曰比年災異屢發邦之不臧實在朕躬震蝕之異其咎安在將何施行以濟其愆太尉亮司徒舒司空瓘遜位弗許太康八年正月戊申朔日有蝕之太康九年六月庚子朔日有蝕之後二年宮車晏駕晉惠帝元康九年十一月甲子朔日有蝕之晉惠帝永康元年四月辛卯朔日有蝕之晉惠帝永寧元年閏三月丙戌朔日有蝕之晉惠帝光熙元年正月戊子朔日有蝕之尊者惡之七月乙酉朔又日有蝕之既占曰日蝕盡不出三月國有凶十一月宮車晏駕十二月壬午朔又日有蝕之晉孝懷帝永嘉元年十一月戊申日有蝕之永嘉二年正月丙午朔日有蝕之永嘉六年二月壬子朔日有蝕之明年帝崩于平陽晉愍帝建興四年六月丁巳朔日有蝕之十一月帝為劉曜所虜十二月乙卯朔又日有蝕之明年帝崩于平陽晉元帝太興元年四月丁丑朔日有蝕之晉明帝太寧三年十一月癸巳朔日有蝕之晉成帝咸和二年五月甲申朔日有蝕之晉成帝咸康元年十月乙未朔日有蝕之咸康七年二月甲子朔日有蝕之咸康八年正月乙未朔日有蝕之正朝尊者惡之六月宮車晏駕晉穆帝永和七年正月丁酉朔日有蝕之永和十二年十月癸巳朔日有蝕之晉穆帝升平四年八月辛丑朔日有蝕之不盡如鉤明年宮車晏駕晉哀帝隆和元年十二月戊午朔日有蝕之晉海西公太和三年三月丁巳朔日有蝕之太和五年七月癸酉朔日有蝕之明年廢為海西公晉孝武帝寧康三年十月癸酉朔日有蝕之晉孝武帝太元四年閏月己酉朔日有蝕之太元六年六月庚子朔日有蝕之太元九年十月辛亥朔日有蝕之太元十七年五月丁卯朔日有蝕之太元二十年三月庚辰朔日有蝕之明年宮車晏駕海西時有此變又曰臣有蔽主明者晉安帝隆安四年六月庚辰朔日有蝕之晉安帝元興二年四月癸巳朔日有蝕之晉安帝義熙三年七月戊戌朔日有蝕之義熙十年九月丁巳朔日有蝕之七月辛亥晦日有蝕之義熙十三年正月甲戌朔日有蝕之明年宮車晏駕晉恭帝元熙元年十一月丁亥朔日有蝕之宋少帝景平二年二月癸巳朔日有蝕之文帝元嘉四年六月癸卯朔日有蝕之元嘉六年五月壬辰朔日有蝕之十一月己丑朔又日有蝕之不盡如釣蝕時星見晡方沒河北地闇元嘉十二年正月乙未朔日有蝕之元嘉十七年四月戊午朔日有蝕之元嘉十九年七月甲戌晦日有蝕之元嘉二十三年六月癸未朔日有蝕之元嘉三十年七月辛丑朔日有蝕之既星辰畢見孝武帝孝建元年七月丙戌朔日有蝕之既列宿粲然孝武帝大明五年九月甲寅朔日有蝕之明帝泰始四年八月丙子朔日有蝕之十月癸酉又日有蝕之泰始五年十月丁卯朔日有蝕之後廢帝元徽元年十二月癸卯朔日有蝕之順帝昇明二年九月乙巳朔日有蝕之昇明三年三月癸卯朔日有蝕之吳孫權赤烏十一年二月白虹貫日時地又頻震權發詔深戒懼天眚晉武帝泰始五年七月甲寅日暈再重白虹貫之晉武帝太康元年正月己丑朔五色氣冠日自卯至酉占曰君道失明丑主斗牛斗牛為吳地是時孫皓淫暴四月降晉惠帝元康九年正月日中有若飛燕者數月乃消王隱以為愍懷廢死之徵也晉惠帝永康元年十月乙未日鬭黃霧四塞占曰不及三年下有拔城大戰晉惠帝永寧元年九月甲申日有黑子按京房占黑者陰也臣不揜君惡令下見百姓惡君則有此變又曰臣有蔽主明者晉惠帝永興元年十一月黑氣分日晉惠帝光熙元年五月癸巳