陵宋又僑立新平北淮陽北濟陰北下邳東莞五郡元嘉二十八年南兗州徙治盱眙三十年省南兗州併南徐其後復立還治廣陵徐志領郡九縣三十九戶三萬一千一百一十五口十五萬九千三百六十二宋末領郡十一縣四十四去京都水二百五十陸一百八十廣陵太守漢高六年立屬荊國十一年更屬吳景帝四年更名江都國武帝元狩三年更名廣陵舊屬徐州晉武帝太康三年治淮陰故城後又治射陽江左治廣陵永初郡國又有輿肥如路真定新市五縣今領縣四戶七千七百四十四口四萬五千六百一十三廣陵令漢舊縣海陵令前漢屬臨淮後漢晉屬廣陵三國時廢晉武帝太康元年復立高郵令漢舊縣三國時廢晉武帝太康元年復立江都令漢舊縣三國時廢晉武帝太康六年復立江左又省併輿縣元嘉十三年復立以併江都海陵太守晉安帝分廣陵立永初郡國屬徐州領縣六戶三千六百二十六口二萬一千六百六十去州水一百三十陸同去京都水三百九十陸同建陵令晉安帝立臨江令晉安帝立如皋令晉安帝立寧海令晉安帝立蒲濤令晉安帝立臨澤令明帝泰豫元年立山陽太守晉安帝義熙中土斷分廣陵立案漢景帝分梁為山陽非此郡也永初郡國屬徐州領縣四戶二千八百一十四口二萬二千四百七十去州水三百陸同去京都水五百陸同山陽令射陽縣境地名山陽與郡俱立鹽城令舊曰鹽瀆前漢屬臨淮後漢晉屬廣陵三國時廢晉武帝太康二年復立晉安帝更名東城令晉安帝立左鄉令晉安帝立盱眙太守盱眙本縣名前漢屬臨淮後漢屬下邳晉屬臨淮晉安帝分立領縣五戶一千五百一十八口六千八百二十五去州水四百九十陸二百九去京都水七百陸五百考城令陽城令晉安帝立直瀆令晉安帝立信都令信都雖漢舊名其地非也地在河北宋末立雎陵令前漢屬臨淮後漢屬下邳晉太康地志無宋末立秦郡太守晉武帝分扶風為秦國中原亂其民南流寄居堂邑堂邑本為縣前漢屬臨淮後漢屬廣陵晉又屬臨淮晉惠帝永興元年分臨淮淮陵立堂邑郡安帝改堂邑為秦郡永初郡國屬豫州元嘉八年度南兗永初郡國又領臨塗平丘外黃沛雍丘浚儀頓丘凡七縣何無雍丘外黃平丘沛徐又無浚儀元嘉八年以沛併頓丘後廢帝元徽元年割頓丘屬新昌領縣四戶三千三百三十三口一萬五千三百九十六去州水二百四十一陸一百八十去京都水一百五十陸一百四十秦令本屬秦國流寓立文帝元嘉八年以臨塗併秦以外黃併浚儀孝武孝建元年以浚儀併秦義成令江左立尉氏令漢舊名屬陳留文帝元嘉八年以平丘併尉氏懷德令孝武大明五年立又以歷陽之烏江并此為二縣立臨江郡前廢帝永光元年省臨江郡懷德即住郡治烏江還本也南沛太守何志云北沛新立徐云南沛永初郡國又有符離洨竹邑杼秋四縣杼秋治無錫餘並治廣陵文帝元嘉十二年以北沛郡竹邑并杼秋何徐並無此二縣不詳起居注孝武大明五年分廣陵為沛郡治肥如縣時無復肥如縣當是肥如故縣處也二漢晉太康地志並無肥如縣沛郡宜是大明五年以前省其時又立也今領縣三戶一千一百九口一萬二千九百七十蕭縣令相縣令沛縣令新平太守明帝泰始七年立江陽令郡同立海安令郡同立北淮陽太守宋末僑立晉寧令宿預令甬城令北濟陰太守宋失淮北僑立廣平令前漢臨淮有廣平縣後漢以後無定陶令陽平令上黨令冤句令館陶令北下邳太守宋失淮北僑立僮縣令下邳令寧城令東莞太守宋失淮北僑立莒縣令諸縣令東莞令柏人令漢舊名屬趙國宋失淮北僑立兗州兗州刺史後漢治山陽昌邑魏晉治廩丘武帝平河南治滑臺文帝元嘉十三年治鄒山又寄治彭城二十年省兗州分郡屬徐冀州三十年六月復立治瑕丘永初郡國有東郡陳留濮陽三郡而無陽平東郡領白馬涼城東燕三縣陳留郡領酸棗小黃雍丘白馬襄邑尉氏六縣濮陽郡領濮陽廩丘二縣宋末失淮北僑立兗州寄治淮陰兗州領郡六縣三十一戶二萬九千三百四十口一十四萬五千五百八十一泰山太守漢高立永初郡國又有山茌萊蕪大原三縣而無鉅平縣今領縣八戶八千一百七十七口四萬五千五百八十一去州陸八百去京都陸一千八百奉高令漢舊縣鉅平令漢舊縣嬴令漢舊縣牟令漢舊縣南城令前漢屬東海後漢晉屬泰山武陽令漢舊縣梁父令漢舊縣博令漢舊縣高平太守故梁國漢景帝中六年分為山陽國武帝建元五年為郡晉武帝泰始元年更名永初郡國及徐並又有任城縣後省今領縣六戶六千三百五十八口二萬一千一百一十二去州陸二百二十去京都陸一千三百三十宋明帝泰始五年僑立於淮南當塗縣界領高平金鄉二縣其年又立雎陵縣高平令前漢名槀章帝更名方與令漢舊縣金鄉令前漢無後漢晉有鉅野令漢舊縣平陽令漢舊縣曰南平陽亢父令漢舊縣舊屬任城魯郡太守秦薛郡漢高后更名本屬徐州光武改屬任城江左屬兗州領縣六戶四千六百三十一口二萬八千三百七去州陸三百五十去京都陸一千一百鄒令漢舊縣汶陽令漢舊縣魯令漢舊縣陽平令孝武大明元年立新陽令孝武大明中立卞令明帝泰始二年立東平太守漢景帝分梁為濟東國宣帝更名領縣五戶四千一百五十九口一萬七千二百九十五去州水五百陸同去京都水二千陸一千四百宋末又僑立於淮陰無鹽令漢舊縣平陸令漢舊縣須昌令前漢屬東郡後漢晉太康地志屬東平壽昌令春秋時曰良前漢曰壽良屬東郡光武改曰壽張屬東平范令漢舊縣四縣並治郡下陽平太守魏分魏郡立文帝元嘉中流寓來屬後省孝武大明元年復立領縣五戶二千八百五十七口一萬一千二百七十一館陶令漢舊名寄治無鹽樂平令魏立屬陽平後漢東