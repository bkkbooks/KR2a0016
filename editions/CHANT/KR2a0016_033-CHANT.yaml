body:
  text: 卷三十五志第二十五州郡一置十有二牧及禹平水土更制九州冀州堯都土界廣遠濟河為兗州海岱為青州海岱及淮為徐州淮海為揚州荊及衡陽為荊州荊河為豫州華陽黑水為梁州黑水西河為雍州自虞至殷無所改變周氏既有天下以徐并青以梁并雍分冀州之地以為幽并漢初又立徐梁二州武帝攘卻胡越開地斥境南置交趾北置朔方改雍曰涼改涼曰益凡為十三州而司隸部三輔三河諸郡東京無復朔方改交趾曰交州凡十二州司隸所部如故及三國鼎跱吳得揚荊交三州蜀得益州魏氏猶得九焉吳又分交為廣魏末平蜀又分益為梁晉武帝太康元年天下一統凡十有六州後又分涼雍為秦分荊揚為江分益為寧分幽為平而為二十矣自夷狄亂華司冀雍涼青并兗豫幽平諸州一時淪沒遺民南渡並僑置牧司非舊土也江左又分荊為湘或離或合凡有揚荊湘江梁益交廣其徐州則有過半豫州唯得譙城而已及至宋世分揚州為南徐徐州為南兗揚州之江西悉屬豫州分荊為雍分荊湘為郢分荊為司分廣為越分青為冀分梁為南北秦太宗初索虜南侵青冀徐兗及豫州淮西並皆不守自淮以北化成虜庭於是於鍾離置徐州淮陰為北兗而青冀二州治贛榆之縣今志大較以大明八年為正其後分派隨事記列內史侯相則以昇明末為定焉地理參差其詳難舉實由名號驟易境土屢分或一郡一縣割成四五四五之中亟有離合千回百改巧歷不算尋校推求未易精悉今以班固馬彪二志太康元康定戶王隱地道晉世起居永初郡國何徐州郡及地理雜書互相考覆且三國無志事出帝紀雖立郡時見而置縣不書今唯以續漢郡國校太康地志參伍異同用相徵驗自漢至宋郡縣無移改者則注云漢舊其有回徙隨源甄別若唯云某無者則此前皆有也若不注置立史闕也揚州揚州刺史前漢刺史未有所治後漢治歷陽魏晉治壽春晉平吳治建業成帝咸康四年僑立魏郡領肥鄉元城三縣後省元城又僑立廣川郡領廣川一縣宋初省為縣隸魏郡江左又立高陽堂邑二郡高陽領北新城博陸二縣堂邑領堂邑一縣後省堂邑并高陽又省高陽并魏郡並隸揚州寄治京邑文帝元嘉十一年省以其民併建康孝建元年分揚州之會稽東陽新安永嘉臨海五郡為東揚州大明三年罷州以其地為王畿以南臺侍御史部諸郡如從事之部傳焉而東揚州直云揚州八年罷王畿復立揚州揚州還為東揚州前廢帝永光元年省東揚州并揚州順帝昇明三年改揚州刺史曰牧領郡十領縣八十戶一十四萬三千二百九十六口一百四十五萬五千六百八十五丹陽尹秦鄣郡治今吳興之故鄣縣漢初屬吳國吳王濞反敗屬江都國武帝元封二年為丹陽郡治今宣城之宛陵縣晉武帝太康二年分丹陽為宣城郡治宛陵而丹陽移治建業元帝太興元年改為尹領縣八戶四萬一千一十口二十三萬七千三百四十一建康令本秣陵縣漢獻帝建安十六年置縣孫權改秣陵為建業晉武帝平吳還為秣陵太康三年分秣陵之水北為建業愍帝即位避帝諱改為建康秣陵令其地本名金陵秦始皇改本治去京邑六十里今故治邨是也晉安帝義熙九年移治京邑在鬭場恭帝元熙元年省揚州府禁防參軍縣移治其處丹楊令漢舊縣江寧令晉武帝太康元年分秣陵立臨江縣二年更名永世令吳分溧陽為永平縣晉武帝太康元年更名惠帝世度屬義興尋復舊義興又有平陵縣董覽吳地誌云晉分永世太康永寧地誌並無疑是江左立文帝元嘉九年以併永世溧陽二縣溧陽令漢舊縣吳省為屯田晉武帝太康元年復立湖熟令漢舊縣吳省為典農都尉晉武帝太康元年復立句容令漢舊縣會稽太守秦立治吳漢順帝永建四年分會稽為吳郡會稽移治山陰領縣十戶五萬二千二百二十八口三十四萬八千一十四去京都水一千三百五十五陸同山陰令漢舊縣永興令漢舊餘暨縣吳更名上虞令漢舊縣餘姚令漢舊縣剡令漢舊縣諸暨令漢舊縣始寧令何承天志漢末分上虞立賀續會稽記云順帝永建四年分上虞南鄉立續漢志無晉太康三年地志有句章令漢舊縣鄮令漢舊縣鄞令漢舊縣吳郡太守分會稽立孝武大明七年度屬南徐八年復舊領縣十二戶五萬四百八十八口四十二萬四千八百一十二去京都水六百七十陸五百二十吳令漢舊縣婁令漢舊縣嘉興令此地本名長水秦改曰由拳吳孫權黃龍四年由拳縣生嘉禾改曰禾興孫皓父名和又改名曰嘉興海虞令晉武帝太康四年分吳縣之虞鄉立海鹽令漢舊縣吳記云本名武原鄉秦以為海鹽縣鹽官令漢舊縣吳記云鹽官本屬嘉興吳立為海昌都尉治此後改為縣非也錢唐令漢舊縣富陽令漢舊縣本曰富春孫權黃武四年以為東安郡七年省晉簡文鄭太后諱春孝武改曰富陽新城令浙江西南名為桐溪吳立為新城縣後并桐廬晉太康地志無張勃云晉末立疑是太康末立尋復省也晉成帝咸和九年又立建德令吳分富春立桐廬令吳分富春立壽昌令吳分富春立新昌縣晉武帝太康元年更名吳興太守孫皓寶鼎元年分吳丹陽立領縣十戶四萬九千六百九口三十一萬六千一百七十三去京都水九百五十陸五百七十烏程令漢舊縣先屬吳東遷令晉武帝太康三年分烏程立後廢帝元徽四年更名東安順帝昇明元年復舊武康令吳分烏程餘杭立永安縣晉武帝太康元年更名長城令晉武帝太康三年分烏程立原鄉令漢靈帝中平二年分故鄣立故鄣令漢舊縣先屬丹陽安吉令漢靈帝中平二年分故鄣立餘杭令漢舊縣先屬吳臨安令吳分餘杭為臨水縣晉武帝太康元年更名於潛令漢舊縣先屬丹陽淮南太守秦立為九江郡兼得廬江豫章漢高帝四年更名淮南國分立豫章郡文帝又分為廬江郡武帝元狩元年復為九江郡治壽春縣後漢徙治陰陵縣魏復曰淮南徙治壽春晉武帝太康元年復立歷陽當塗逡道諸縣二年復立鍾離縣並二漢舊縣也三國時江淮為戰爭之地其間不居者各數百里此諸縣並在江北淮南虛其地無復民戶吳平民各還本故復立焉其後中原亂胡寇屢南侵淮南民多南度成帝初蘇峻祖約為亂於江淮胡寇又大至民南度江者轉多乃於江南僑立淮南郡及諸縣晉末遂割丹陽之于湖縣為淮南境宋孝武大明六年以淮南郡并宣城宣城郡徙治于湖八年復立淮南郡屬南豫州明帝泰始三年還屬揚州領縣六戶五千三百六十二口二萬五千八百四十去京都水一百七十陸一百四十于湖令晉武帝太康二年分丹楊縣立本吳督農校尉治當塗令晉成帝世與逡道俱立為僑縣晉末分于湖為境繁昌令漢舊名本屬潁川魏分潁川為襄城又屬焉晉亂省襄城郡以此縣屬淮南割于湖為境襄垣令其地本無湖無湖縣漢舊縣至于晉末立襄垣縣屬上黨上黨民南過江立僑郡縣寄治無湖後省上黨郡為縣屬淮南文帝元嘉九年省上黨縣併襄垣定陵令漢舊名本屬襄城後割無湖為境逡道令漢作逡遒晉作逡道後分無湖為境宣城太守晉武帝太康元年分丹陽立領縣十戶一萬一百二十口四萬七千九百九十二去京都水五百八十陸五百宛陵令漢舊縣廣德令何志云漢舊縣二漢志並無疑是吳所立懷安令吳立寧國令吳立宣城令漢舊縣安吳令吳立涇令漢舊縣臨城令吳立廣陽令漢舊縣曰陵陽子明得仙於此縣山故以為名晉成帝杜皇后諱陵咸康四年更名石城令漢舊縣東陽太守本會稽西部都尉吳孫皓寶鼎元年立領縣九戶一萬六千二十二口一十萬七千九百六十五去京都水一千七百陸同長山令漢獻帝初平二年分烏傷立太末令漢舊縣烏傷令永康令赤烏八年分烏傷上浦立信安令漢獻帝初平三年分太末立曰新安晉武帝太康元年更名吳寧令漢獻帝興平二年孫氏分諸暨立豐安令漢獻帝興平二年孫氏分諸暨立定陽令漢獻帝建安二十三年孫氏分信安立遂昌令孫權赤烏二年分太末立曰平昌晉武帝太康元年更名臨海太守本會稽東部都尉前漢都尉治鄞後漢分會稽為吳郡疑是都尉徙治章安也孫亮太平二年立領縣五戶三千九百六十一口二萬四千二百二十六去京都水二千一十九陸同章安令續漢志故治閩中地光武更名晉太康記本鄞縣南之回浦鄉漢章帝章和中立未詳孰是臨海令吳分章安立始豐令吳立曰始平晉武帝太康元年更名寧海令何志漢舊縣按二漢志晉太康地志無樂安令晉康帝分始豐立永嘉太守晉明帝太寧元年分臨海立領縣五戶六千二百五十口三萬六千六百八十去京都水二千八百陸二千六百四十永寧令漢順帝永建四年分章安東甌鄉立或云順帝永和三年立安固令吳立曰羅陽孫皓改曰安陽晉武帝太康元年更名松陽令吳立樂成令晉孝武康寧三年分永寧立橫陽令晉武帝太康四年以橫藇船屯為始陽仍復更名新安太守漢獻帝建安十三年孫權分丹陽立曰新都晉武帝太康元年更名領縣五戶一萬二千五十八口三萬六千六百五十一去京都水一千八百六十陸一千八百始新令孫權分歙立遂安令孫權分歙為新定縣晉武帝太康元年更名歙令漢舊縣海寧令孫權分歙為休陽縣晉武帝太康元年更名分歙置諸縣之始又分置黎陽縣大明八年省併海寧黟令漢舊縣南徐州南徐州刺史晉永嘉大亂幽冀青并兗州及徐州之淮北流民相率過淮亦有過江在晉陵郡界者晉成帝咸和四年司空郗鑒又徙流民之在淮南者於晉陵諸縣其徙過江南及留在江北者並立僑郡縣以司牧之徐兗二州或治江北江北又僑立幽冀青并四州安帝義熙七年始分淮北為北徐淮南猶為徐州後又以幽冀合徐青并合兗武帝永初二年加徐州曰南徐而淮北但曰徐文帝元嘉八年更以江北為南兗州江南為南徐州治京口割揚州之晉陵兗州之九郡僑在江南者屬焉故南徐州備有徐兗幽冀青并揚七州郡邑永初二年郡國志又有南沛南下邳廣平廣陵盱眙鍾離海陵山陽八郡南沛廣陵海陵山陵盱眙鍾離割屬南兗南下邳併南彭城廣平併南泰山今領郡十七縣六十三戶七萬二千四百七十二口四十二萬六百四十去京都水二百四十陸二百南東海太守晉元帝初割吳郡海虞縣之北境為東海郡立郯胊利城三縣而祝其襄賁等縣寄治曲阿穆帝永和中郡移出京口郯等三縣亦寄治於京文帝元嘉八年立南徐以東海為治下郡以丹徒屬焉郯利城並為實土永初郡國有襄賁祝其厚丘西隰四縣文帝元嘉十二年省厚丘併襄賁何徐無厚丘餘與永初郡國同其襄賁祝其西隰是徐志後所省也領縣六戶五千三百四十二口三萬三千六百五十八郯令漢舊名文帝元嘉八年分丹徒之峴西為境丹徒令本屬晉陵古名朱方後名谷陽秦改曰丹徒孫權嘉禾三年改曰武進晉武帝太康三年復曰丹徒武進令晉武帝太康二年分丹徒曲阿立毗陵令宋孝武大明末度屬此胊令漢舊名晉江左僑立宋孝武世分郯西界為土利城令漢舊名晉江左僑立宋文帝世與郡俱為實土南琅邪太守晉亂琅邪國人隨元帝過江千餘戶太興三年立懷德縣丹陽雖有琅邪相而無此地成帝咸康元年桓溫領郡鎮江乘之蒲洲金城上求割丹楊之江乘縣境立郡又分江乘地立臨沂縣永初郡國有陽都費即丘三縣並割臨沂及建康為土費縣治宮城之北元嘉八年省即丘併陽都十五年省費併建康臨沂孝武大明五年省陽都併臨沂今領縣二戶二千七百八十九口一萬八千六百九十七去州水二百陸一百去京都水一百六十臨沂令漢舊名前漢屬東海後漢晉屬琅邪江乘令漢舊縣本屬丹