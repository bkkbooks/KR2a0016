body:
  text: 卷三十九志第二十九百官上太宰一人周武王時周公旦始居之掌邦治為六卿之首秦漢魏不常置晉初依周禮備置三公三公之職太師居首景帝名師故置太宰以代之太宰蓋古之太師也殷紂之時箕子為太師周武王時太公為太師周成王時周公為太師周公薨畢公代之漢西京初不置平帝始復置太師官而孔光居焉漢東京又廢獻帝初董卓為太師卓誅又廢魏世不置晉既因太師而置太宰以安平王孚居焉太傅一人周成王時畢公為太傅漢高后元年初用王陵太保一人殷太甲時伊尹為太保周武王時召公為太保漢平帝元始元年始用王舜後漢至魏不置晉初復置焉自太師至太保是為三公論道經邦燮理陰陽無其人則闕所以訓護人主導以德義者相國一人漢高帝十一年始置以蕭何居之罷丞相何薨曹參代之參薨罷魏齊王以晉景帝為相國晉惠帝時趙王倫愍帝時南陽王保安帝時宋高祖順帝時齊王並為相國自魏晉以來非復人臣之位矣丞相一人殷湯以伊尹為右相仲虺為左相秦悼武王二年始置丞相官丞奉相助也悼武王子昭襄王始以樗里疾為丞相後又置左右丞相漢高帝初置一丞相十一年更名相國孝惠高后置左右丞相文帝二年復置一丞相哀帝元壽二年更名大司徒漢東京不復置至獻帝建安十三年復置丞相魏世及晉初又廢惠帝世趙王倫篡位以梁王肜為丞相永興元年以成都王穎為丞相愍帝建興元年以琅邪王睿為左丞相南陽王保為右丞相三年以保為相國睿為丞相元帝永昌元年以王敦為丞相轉司徒荀組為太尉以司徒官屬并丞相為留府敦不受成帝世以王導為丞相罷司徒府以為丞相府導薨罷丞相復為司徒府宋世祖初以南郡王義宣為丞相而司徒府如故太尉一人自上安下曰尉掌兵事郊祀掌亞獻大喪則告諡南郊堯時舜為太尉官漢因之武帝建元二年省光武建武二十七年罷大司馬置太尉以代之靈帝末以劉虞為大司馬而太尉如故司徒一人掌民事郊祀掌省牲視濯大喪安梓宮少昊氏以鳥名官而祝鳩氏為司徒堯時舜為司徒舜攝帝位命契為司徒契玄孫之孫曰微亦為夏司徒周時司徒為地官掌邦教漢西京初不置哀帝元壽二年罷丞相置大司徒光武建武二十七年去大司空一人掌水土事郊祀掌掃除陳樂器大喪掌將校復土舜攝帝位以禹為司空契玄孫之子曰冥亦為夏司空殷湯以咎單為司空周時司空為冬官掌邦事漢西京初不置成帝綏和元年更名御史大夫為大司空哀帝建平二年復為御史大夫元壽二年復為大司空光武建武二十七年去大字獻帝建安十三年又罷司空置御史大夫御史大夫郗慮免不復補魏初又置司空大司馬一人掌武事司主也馬武也堯時棄為后稷兼掌司馬周時司馬為夏官掌邦政項籍以曹無咎周殷並為大司馬漢初不置武帝元狩四年初置大司馬始直云司馬議者以漢有軍候千人司馬官故加大及置司空又以縣道官有獄司空又加大王莽居攝以漢無小司徒而定司馬司徒司空之號並加大光武建武二十七年省大司馬以太尉代之魏文帝黃初二年復置大司馬以曹仁居之而太尉如故大將軍一人凡將軍皆掌征伐周制王立六軍晉獻公作二軍公將上軍將軍之名起於此也楚懷王遣三將入關宋義為上將漢高帝以韓信為大將軍漢西京以大司馬冠之漢東京大將軍自為官位在三司上魏明帝青龍三年晉宣帝自大將軍為太尉然則大將軍在三司下矣其後又在三司上晉景帝為大將軍而景帝叔父孚為太尉奏改大將軍在太尉下後還復舊晉武帝踐阼安平王孚為太宰鄭沖為太傅王祥為太保義陽王望為太尉何曾為司徒荀顗為司空石苞為大司馬陳騫為大將軍凡八公同時並置唯無丞相焉有蒼頭字宜祿至漢丞相府每有所關白到閤輒傳呼宜祿以此為常丞相置三長史丞相有疾御史大夫率百僚三旦問起居及瘳詔遣尚書令若光祿大夫賜養牛上尊酒漢景帝三公病遣中黃門問病魏晉則黃門郎尤重者或侍中也魏武為丞相以來置左右二長史而已漢東京太傅府置掾屬十人御屬一人令史十二人不知皆何曹也自太尉至大將軍車騎驃騎衛將軍皆有長史一人將軍又各置司馬一人太傅不置長史也太尉府置掾屬二十四人西曹主府吏署用事東曹主二千石長吏遷除事戶曹主民戶祠祀農桑事奏曹主奏議事辭曹主辭訟事法曹主郵驛科程事尉曹主卒徒轉運事賊曹主盜賊事決曹主罪法事兵曹主兵事金曹主貨幣鹽鐵事倉曹主倉穀事黃閤主簿省錄眾事御屬一人令史二十二人御屬主為公御令史則有閤下記室門下令史其餘史闕案掾屬二十四人自東西曹凡十二曹然則曹各置掾屬一人合二十四人也司徒置掾屬三十一人御屬一人令史三十五人司空置掾二十九人御屬一人令史三十一人司空別有道橋掾其餘張減之號史闕不可得知也漢東京大將軍驃騎將軍從事中郎二人掾屬二十九人御屬一人令史三十人騎衛將軍從事中郎二人掾屬二十人御屬一人令史二十四人兵曹掾史主兵事稟假掾史主稟假又置外刺姦主罪法其領兵外討則營有五部部有校尉一人軍司馬一人部下有曲曲有軍候一人曲下有屯屯有屯長一人若不置校尉則部但有軍司馬一人又有軍假司馬軍假候其別營者則為別部司馬其餘將軍置以征伐者府無員職亦有部曲司馬軍候以領兵焉案大將軍以下掾屬與三府張減史闕不可得知置令史御屬者則是同三府也其云掾史者則是有掾而無屬又無令史御屬不同三府也魏初公府職寮史不備書及晉景帝為大將軍置掾十人西曹東曹戶曹倉曹賊曹金曹水曹兵曹騎兵各一人則無屬矣魏元帝咸熙中晉文帝為相國相國府置中衛將軍驍騎將軍左右長史司馬從事中郎四人主簿四人舍人十九人參軍二十二人參戰十一人掾屬三十三人東曹掾屬各一人西曹屬一人戶曹掾一人屬二人賊曹掾一人屬二人金曹掾屬各一人兵曹掾屬各一人騎兵掾二人屬一人車曹掾屬各一人鎧曹掾屬各一人水曹掾屬各一人集曹掾屬各一人法曹掾屬各一人奏曹掾屬各一人倉曹屬二人戎曹屬一人馬曹屬一人媒曹屬一人合為三十三人散屬九人凡四十二人晉初凡位從公以上置長史西閤東閤祭酒西曹東曹掾戶曹倉曹賊曹屬各一人加兵者又置司馬從事中郎主簿記室督各一人舍人四人為持節都督者置參軍六人安平獻王孚為太宰增掾屬為十人兵凱士營軍刺姦五曹皆置屬并前為十人也楊駿為太傅增祭酒為四人掾屬為二十人兵曹分為左右法金田集水戎車馬十曹皆置屬則為二十人趙王倫為相國置左右長史司馬從事中郎四人參軍二十人主簿記室督祭酒各四人掾屬四十人東西曹又置屬其餘十八曹皆置掾則四十人矣凡諸曹皆置御屬令史學幹御屬職錄事也江左以來諸公置長史倉曹掾戶曹屬東西閤祭酒各一人主簿舍人二人御屬二人令史無定員領兵者置司馬一人從事中郎二人參軍無定員加崇者置左右長史司馬從事中郎四人掾屬四人則倉曹增置屬戶曹置掾江左加崇極於此也長史司馬舍人秦官從事中郎掾屬主簿令史前漢官陳湯為大將軍王鳳從事中郎是也御屬參軍後漢官孫堅為車騎參軍事是也本於府主無敬晉世太原孫楚為大司馬石苞參軍輕慢苞始制施敬祭酒晉官也漢吳王濞為劉氏祭酒夫祭祀以酒為本長者主之故以祭酒為稱漢之侍中魏之散騎常侍高功者並為祭酒焉公府祭酒蓋因其名也長史從事中郎主吏司馬主將主簿祭酒舍人主閤內事參軍掾屬令史主諸曹事司徒若無公唯省舍人其府常置其職僚異於餘府有左右長史左西曹掾屬各一人餘則同矣餘府有公則置無則省晉元帝為鎮東大將軍及丞相置從事中郎無定員分掌諸曹有錄事中郎度支中郎三兵中郎其參軍則有諮議參軍二人主諷議事晉江左初置因軍諮祭酒也宋高祖為相止置諮議參軍無定員今諸曹則有錄事記室戶曹倉曹中直兵外兵騎兵長流賊曹刑獄賊曹城局賊曹法曹田曹水曹鎧曹車曹士曹集右戶墨曹凡十八曹參軍參軍不署曹者無定員江左初晉元帝鎮東丞相府有錄事記室東曹西曹度支戶曹法曹金曹倉曹理曹中兵外兵騎兵典兵兵曹賊曹運曹禁防典賓鎧曹田曹士曹騎士車曹參軍其東曹西曹度支金曹理曹典兵兵曹賊曹運曹禁防典賓騎士車曹凡十三曹今闕所餘十二曹也其後又有直兵長流刑獄城局水曹右戶墨曹七曹高祖為相合中兵直兵置一參軍曹則猶二也今小府不置長流參軍者置禁防參軍蜀丞相諸葛亮府有行參軍晉太傅司馬越府又有行參軍兼行參軍後漸加長兼字除拜則為參軍事府板則為行參軍晉末以來參軍事行參軍又各有除板板行參軍下則長兼行參軍參軍督護江左置本皆領營有部曲今則無矣公府長史司馬秩千石從事中郎六百石東西曹掾四百石他掾三百石屬二百石特進前漢世所置前後二漢及魏晉以為加官從本官車服無吏卒晉惠帝元康中定位令在諸公下驃騎將軍上驃騎將軍一人漢武帝元狩二年始用霍去病為驃騎將軍漢西京制大將軍驃騎將軍位次丞相車騎將軍一人漢文帝元年始用薄昭為車騎將軍魚豢曰魏世驃騎為都督儀與四征同若不為都督雖持節屬四征者與前後左右雜號將軍同其或散還從文官之例則位次三司晉宋車騎衛不復為四征所督也衛將軍一人漢文帝元年始用宋昌為衛將軍三號位亞三司漢章帝建初三年始使車騎將軍馬防班同三司班同三司自此始也漢末奮威將軍晉江右伏波輔國將軍並加大而儀同三司江左以來將軍則中鎮撫四鎮以上或加大餘官則左右光祿大夫以上並得儀同三司自此以下不得也持節都督無定員前漢遣使始有持節光武建武初征伐四方始權時置督軍御史事竟罷建安中魏武帝為相始遣大將軍督軍二十一年征孫權還夏侯惇督二十六軍是也魏文帝黃初二年始置都督諸州軍事或領刺史三年上軍大將軍曹真都督中外諸軍事假黃鉞則總統外內諸軍矣明帝太和四年晉宣帝征蜀加號大都督高貴公正元二年晉文帝都督中外諸軍尋加大都督晉世則都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者晉江左以來都督中外尤重唯王導居之宋氏人臣則無也江夏王義恭假黃鉞假黃鉞則專戮節將非人臣常器矣征東將軍一人漢獻帝初平三年馬騰居之征南將軍一人漢光武建武中岑彭居之征西將軍一人漢光武建武中馮異居之征北將軍一人魚豢曰四征魏武帝置秩二千石黃初中位次三公漢舊諸征與偏裨雜號同鎮東將軍一人後漢末魏武帝居之鎮南將軍一人後漢末劉表居之鎮西將軍一人後漢初平三年韓遂居之鎮北將軍一人中軍將軍一人漢武帝以公孫敖為之時為雜號鎮軍將軍一人魏以陳群為之撫軍將軍一人魏以司馬宣王為之中鎮撫三號比四鎮安東將軍一人後漢末陶謙為之安南將軍一人安西將軍一人後漢末叚煨為之安北將軍一人魚豢曰鎮北四安魏黃初太和中置平東將軍一人平南將軍一人平西將軍一人平北將軍一人四平魏世置左將軍右將軍前將軍後將軍左將軍以下周末官秦漢並因之光武建武七年省魏以來復置征虜將軍漢光武建武中始以祭遵居之冠軍將軍楚懷王以宋義為卿子冠軍冠軍之名自