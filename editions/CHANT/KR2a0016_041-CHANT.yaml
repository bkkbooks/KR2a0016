body:
  text: 卷四十四列傳第四謝晦謝晦字宣明陳郡陽夏人也祖朗東陽太守父重會稽王道子驃騎長史兄絢高祖鎮軍長史蚤卒晦初為孟昶建威府中兵參軍昶死高祖問劉穆之孟昶參佐誰堪入我府穆之舉晦即命為太尉參軍高祖嘗訊囚其旦刑獄參軍有疾札晦代之於車中一鑑訊牒催促便下相府多事獄繫殷積晦隨問酬辯曾無違謬高祖奇之即日署刑獄賊曹轉豫州治中從事義熙八年土斷僑流郡縣使晦分判揚豫民戶以平允見稱入為太尉主簿從征司馬休之時徐逵之戰敗見殺高祖怒將自被甲登岸諸將諫不從怒愈甚晦前抱持高祖高祖曰我斬卿晦曰天下可無晦不可無公晦死何有會胡藩已得登岸賊退走乃止晦美風姿善言笑眉目分明鬢髮如點漆涉獵文義朗贍多通高祖深加愛賞群僚莫及從征關洛內外要任悉委之劉穆之遣使陳事晦往往措異同穆之怒曰公復有還時否高祖欲以為從事中郎以訪穆之堅執不與終穆之世不遷穆之喪問至高祖哭之甚慟晦時正直喜甚自入閤內參審穆之死問其日教出轉晦從事中郎宋臺初建為右衛將軍尋加侍中高祖受命於石頭登臺備法駕入宮晦領游軍為警備遷中領軍侍中如故以佐命功封武昌縣公食邑二千戶二年坐行璽封鎮西司馬南郡太守王華大封而誤封北海太守球版免晦侍中尋轉領軍將軍散騎常侍依晉中軍羊祜故事入直殿省總統宿衛三月高祖不豫給班劍二十人與徐羨之傅亮檀道濟並侍醫藥少帝即位加領中書令與羨之亮共輔朝政少帝既廢司空徐羨之錄詔命以晦行都督荊湘雍益寧南北秦七州諸軍事撫軍將軍領諸南蠻校尉荊州刺史欲令居外為援慮太祖至或用別人故遽有此授精兵舊將悉以配之器仗軍資甚盛太祖即位加使持節依本位除授晦慮不得去甚憂惶及發新亭顧望石頭城喜曰今得脫矣尋進號衛將軍加散騎常侍進封建平郡公食邑四千戶固讓進封又給鼓吹一部初為荊州甚有自矜之色將之鎮詣從叔光祿大夫澹別澹問晦年晦答曰三十三澹笑曰昔荀中郎年二十七為北府都督卿比之己為老矣晦有愧色至江陵深結侍中王華冀以免禍二女當配彭城王義康新野侯義賓元嘉二年遣妻曹及長子世休送女還京邑先是景平中索虜為寇覆沒河南至是上欲誅羨之等并討晦聲言北伐又言拜景陵治裝舟艦傅亮與晦書曰薄伐河朔事猶未已朝野之慮憂懼者多又言朝士多諫北征上當遣外監萬幼宗往相諮訪時朝廷處分異常其謀頗泄三年正月晦弟黃門侍郎皭馳使告晦晦猶謂不然呼諮議參軍何承天示以亮書曰計幼宗一二日必至傅公慮我好事故先遣此書承天曰外間所聞咸謂西討已定幼宗豈有上理晦尚謂虛妄使承天豫立答詔啟草言伐虜宜須明年江夏內史程道惠得尋陽人書言朝廷將有大處分其事已審使其輔國府中兵參軍樂冏封以示晦晦又謂承天曰幼宗尚未至若復二三日無消息便是不復來邪承天答曰詔使本無來理如程所說其事已判豈容復疑晦欲焚南蠻兵籍率見力決戰士人多勸發兵乃立幡戒嚴謂司馬庾登之曰今當自下欲屈卿以三千人守城備禦劉粹登之曰下官親老在都又素無旅情計二三不敢受此旨晦仍問諸佐戰士三千足守城不南蠻司馬周超對曰非徒守城而已若有外寇可以立勳登之乃曰超必能辦下官請解司馬南郡以授即於坐命超為司馬建威將軍南義陽太守轉登之為長史南郡如故太祖誅羨之等及晦子新除祕書郎世休收皭皭子世平兄子著作佐郎紹等樂冏又遣使告晦徐傅二公及皭等並已誅晦先舉羨之亮哀次發子弟凶問既而自出射堂配衣軍旅數從高祖征討備睹經略至是指揮處分莫不曲盡其宜二三日中四遠投集得精兵三萬人乃奉表曰臣階緣幸會蒙武皇帝殊常之眷外聞政事內謀帷幄經綸夷險毗贊王業預佐命之勳膺河山之賞及先帝不豫導揚末命臣與故司徒臣羨之左光祿大夫臣亮征北將軍臣道濟等並升御床跪受遺詔載貽話言託以後事臣雖凡淺感恩自厲送往事居誠貫幽顯逮營陽失德自絕宗廟朝野岌岌憂及禍難忠謀協契徇國忘己援登聖朝惟新皇祚陛下馳傳乘流曾不惟疑臨朝殷懃增崇封爵此則臣等赤心已亮於天鑒遠近萬邦咸達於聖旨若臣等志欲專權不顧國典便當協翼幼主孤背天日豈復虛館七旬仰望鸞旗者哉故廬陵王於營陽之世屢被猜嫌積怨犯上自貽非命天祚明德屬當昌運不有所廢將何以興成人之美春秋之高義立帝清館臣節之所司耿弇不以賊遺君父臣亦何負於宋室邪況釁結鬩牆禍成畏逼天下耳目豈伊可誣臣忝居蕃任乃誠匪懈為政小大必先啟聞糾剔群蠻清夷境內分留弟姪並侍殿省陛下聿遵先志申以婚姻童稚之目猥荷齒召薦女遷子合門相送事君之道義盡於斯臣羨之總錄百揆翼亮三世年耆乞退屢抗表疏優旨綢繆未垂順許臣亮管司喉舌恪虔夙夜恭謹一心守死善道此皆皇宋之宗臣社稷之鎮衛而讒人傾覆妄生國釁天威震怒加以極刑并及臣門同被孥戮雖未知臣道濟問推理即事不容獨存先帝顧託元臣翼命之佐勦於佞邪之手忠貞匪躬之輔不免夷滅之誅陛下春秋方富始覽萬機民之情偽未能鑒悉王弘兄弟輕躁昧進王華猜忌忍害規弄威權先除執政以逞其欲天下之人知與不知孰不為之痛心憤怨者哉臣等見任先帝垂二十載小心謹慎無纖介之愆伏事甫爾而嬰若斯之罪若非先帝謬於知人則為陛下未察愚款臣去歲末使反得朝士及殿省諸將書並言嫌隙已成必有今日之事臣推誠仰期罔有二心不圖姦回潛遘理順難恃忠賢隕朝愚臣見襲到彥之蕭欣等在近路昔白公稱亂諸梁嬰冑惡人在朝趙鞅入伐臣義均休戚任居分陝豈可顛而不扶以負先帝遺旨輒率將士繕治舟甲須其自送投袂撲討若天祚大宋卜世靈長義師克振中流清蕩便當浮舟東下戮此三豎申理冤恥謝罪闕庭雖伏鑕赴鑊無恨於心伏願陛下遠尋永初託付之旨近存元嘉奉戴之誠則微臣丹款猶有可察臨表哽慨言不自盡太祖時已戒嚴諸軍相次進路尚書符荊州曰禍福無門逆順有數天道微於影響人事鑒於前圖未有蹈義而福不延從惡而禍不至也故智計之士審敗以立功守正之臣臨難以全節徐羨之傅亮謝晦安忍鴆殺獲罪於天名教所極政刑所取已遠暴四海宣於聖詔羨之父子亮及晦息電斷之初並即大憲復王室之讎攄義夫之憤國典澄明人神感悅三姓同罪既擒其二晦之室屬縲仆獄戶苟幽明所怨孤根易拔以順討逆雖厚必崩然歸死難圖獸困則噬是以爰整其旅用為過防京師之眾天下雲集士練兵精大號響震使持節中領軍佷山縣開國侯到彥之率羽林選士果勁二萬雲旍首路組甲曜川使持節散騎常侍都督南徐兗之江北淮南青州徐州之淮陽下邳琅邪東莞七郡諸軍事征北將軍南兗州刺史永脩縣開國公檀道濟統勁銳武卒三萬戈船蔽江星言繼發千帆俱舉萬棹遄征散騎常侍驍騎將軍叚宏鐵馬二千風驅電擊步自竟陵直至鄢郢又命征虜將軍雍州刺史劉粹控河陰之師衝其巢窟湘州刺史張邵提湘川之眾直據要害巴蜀杜荊門之險秦梁絕丹圻之逕雲網四合走伏路盡然後鑾輿效駕六軍鵬翔警蹕前驅五牛整旆雖以英布之氣彭寵之資登陴無名授兵誰御加以西土之人咸沐皇澤東吳將士懷本首丘必不自陷罪人之黨橫為亂亡之役置軍則魚潰嬰城則鳥散其勢然矣聖上慇懃哀愍其罪由晦士民何辜是用一分前麾宣示朝旨符到其即共收擒晦身輕舟護送若已猖蹶先事阻衛宜翻然背亂相率歸朝頃大刑所加洪恩曠洽傅亮三息特蒙全宥晦同產以下羨之諸姪咸無所染況彼府州文武並列王職荷國榮任身雖在外乃心辰極夫轉禍貴速後機則凶遂使王師臨郊雷電皆至噬臍之恨亦將何及時益州刺史蕭摹之巴西太守劉道產被徵還始至江陵晦並繫縶沒其財貨以充軍資竟陵內史殷道鸞未之郡以為諮議參軍以弟遯為冠軍竟陵內史總留任兄子世猷為建威將軍南平太守劉粹若至周超能破之者即以為龍驤將軍雍州刺史晦率眾二萬發自江陵舟艦列自江津至于破冢旍旂相照蔽奪日光晦乃歎曰恨不得以此為勤王之師自領湘州刺史以張邵為輔國將軍邵不受命晦檄京邑曰王室多故禍難薦臻營陽失德自絕宗廟廬陵王構鬩有本屢被猜嫌且居喪失禮遐邇所具積怨犯上自貽非道群后釋位爰登聖明亂之未乂職有所係按車騎大將軍王弘侍中王曇首謬蒙時私叨竊權要弘於永初之始實荷不世之恩元嘉之讓自謂任遇浮淺進誣先皇委誠之寄退長嫌隙異同之端曇首往因使下訪以今上起居不能光揚令德彰於朝聽其言多誣故不具說王華賊亡之餘賞擢之次先帝常見訪逮庶有一分可取而華稟性凶猜多所忍害曩者縱人入城託疾辭事此都士庶咸所聞知以其所啟及上手答示宗叔獻又令宣告徐傅二公及周糾使下又令見咨云欲自攬政事求離任還都并令曇首具述此意又惠觀道人說外人告華及到彥之謀反不謂無之城內東將數日之內操戈相待華說數為狄當所譖常不自安凡此諸事豈有忠誠冥契若此者邪自以父亡道側情事異人外絕酒醴而宵飲是恣靦貌凡厥士庶誰不側目又常歎宰相頓有數人是何憤憤規總威權不顧國典保祐皇家者罹屠戮之誅效勤社稷者致殲夷之禍縉紳之徒孰不忼慨遂矯違詔旨遣到彥之蕭欣之輕舟見襲即日監利左尉露檄眾軍已至揚子雖以不武沗荷蕃任國家艱難悲憤兼集若使小人得志君子道消凡百有殄瘁之哀蒼生深橫流之懼輒糾勒義徒繕治舟甲舳艫亘川駟介蔽野武夫鷙勇人百其誠今遣南蠻司馬寧遠將軍庾登之統參軍事建武將軍建平太守安泰宣威將軍昭弘宗參軍事宣威將軍王紹之等精銳一萬前鋒致討南蠻參軍振武將軍魏像統參軍事宣威將軍陳珍虎旅二千參軍事建威將軍新興太守賀愔甲卒三千相係取道南蠻參軍振威將軍郭卓鐵騎二千水步齊舉大軍三萬駱驛電邁行冠軍將軍竟陵內史河東太守謝遯建威將軍南平太守謝世猷驍勇一萬留守江陵分命參軍長寧太守竇應期步騎五千直出義陽司馬建威將軍行南義陽太守周超之統軍司馬振武將軍胡崇之精悍一萬北出高陽長兼行參軍寧遠將軍朱澹之步騎五千西出雁塞同討劉粹並趨襄陽奇兵尚速指景齊奮諸賢並同國恩情兼義烈今誠志士忘身之日義夫著績之秋見機而動望風而不待勗晦至江口到彥之已到彭城洲庾登之據巴陵畏懦不敢進會霖雨連日參軍劉和之曰彼此共有雨耳檀征北尋至東軍方強唯宜速戰登之恇怯使小將陳祐作大囊貯茅數千斛縣於颿檣云可以焚艦用火宜須晴以緩戰期晦然之遂停軍十五日乃攻蕭欣於彭城洲中兵參軍孔延秀率三千人進戰甚力欣於陳後擁楯自衛又委軍還船於是大敗延秀又攻洲口柵陷之彥之退保隱圻晦又上表曰臣聞凶邪敗國先代成患讒豎亂朝異世齊禍故趙高矯逼秦氏用傾董卓階亂漢祚伊覆雖哲王宰世大明照臨未能使其漸弗興茲害不作姦臣王弘等竊弄威權興造禍亂遂與弟華內外影響同惡相成忌害忠賢圖希非望故司徒臣羨之左光祿大夫臣亮橫被酷害并及臣門雖未知征北將軍臣道濟存亡不容獨免遂遣蕭欣到彥之等輕舟見襲姦偽之甚一至於斯羨之及亮或宿德元臣姻婭皇極或任總文武位班三事道濟職惟上將扞城是司皆受遇先朝棟梁一代臣昔因時幸過蒙先眷內聞政事外經戎旅與羨之亮等同被齒盼既經啟王基協濟大業爰自權輿暨于揖讓誠積雖微仍見紀錄並蒙丹書之誓各受山河之賞欲使與宋升降傳之無窮及聖體不預穆卜無吉召臣等四人同升御床顧命領遺委以家國仰奉成旨俯竭股肱忠貞不效期之以死但營陽悖德自絕於天社稷之危憂在託付不有所廢將焉以興乃遠稽殷漢用升聖德陛下順流乘傳不聽張武之疑入邸龍飛非俟宋昌之議斯乃主臣相信天人合契九五當陽化形四海羨之及亮內贊皇猷臣與道濟分翰于外普天之下孰曰不宜遂蒙寵授來鎮此方分留弟姪以侍臺省到任以來首尾三載雖形在遠外心係本朝事無大小動皆咨啟八州之政罔一專輒尊上之心足貫幽顯陛下遠述先旨申以婚姻大息世休復蒙引召是以去年送女遣兒闔家俱下血誠如此未知所愧而凶狡無端妄生釁禍羨之內誅臣受外伐顧省諸懷不識何罪天聽遐邈陳訴靡由弘等既蒙寵任得侍左右自謂勢擅狐鼠理隔熏掘又以陛下富於春秋始覽政事欲馮陵恩幸闚望國權親從磐跱規自封殖不除臣等罔得專權所以交結讒慝成是亂階又惟弘等所構當以營陽為言廬陵為罪又以臣等位高功同內外膠固陛下信其厚貌忘厥左道三至下機能不暫惑伏自尋省廢昏立明事非為己廬陵之事不由傍人內積蕭牆之釁外行叔叚之罰既制之有主臣何預焉然廬陵為性輕險悌順不足武皇臨崩亦有口詔比雖發自營陽實非國禍至於羨之亮等周旋同體心腹內外政欲戮力皇家盡忠報主若令臣等頗欲執權不專為國初廢營陽陛下在遠武皇之子尚有童幼擁以號令誰敢非之而泝流三千虛館三月奉迎鸞駕以遵下武血心若斯易為可鑒且臣等奉事先朝十有七年並居顯要世稱恭謹不圖一旦致茲釁罰夫周公大賢尚有流言之謗伯奇至孝不免譖愬之禍慈父非無情於仁子明君豈有志於貞臣姦遘所移勢回山岳況乃精誠微淺而望求信者哉詩不云乎讒人罔極交亂四國愷悌君子無信讒言陛下躬覽篇籍研覈是非釁兆之萌宜應深察臣竊懼王室小有皇甫之患大有閻樂之禍夙夜殷憂若無首領夫周道浸微桓文稱伐君側亂國趙鞅入誅況今凶禍滔天辰極危逼台輔孥戮岳牧傾陷臣才非絳侯安漢是職人愧博陸廁奉遺旨國難既深家痛亦切輒簡徒繕甲軍次巴陵蕭欣窘懾望風奔迸臣誠短劣在國忘身仰憑社稷之靈俯厲義勇之氣將長驅電掃直入石頭梟翦元凶誅夷首惡弔二公之冤魂寫私門之禍痛然後分歸司寇甘赴鼎鑊雖死之日猶生之年伏惟陛下德合乾元道侔玄極鑒凶禍之無端察貞亮之有本回日月之照發霜電之威梟四凶於廟庭懸三監於絳闕申二台之匪辜明兩蕃之無罪上謝祖宗下告百姓遣一乘之使賜咫尺之書臣便勒眾旋旗還保所任須次近路尋復表聞初晦與徐羨之傅亮謀為自全之計晦據上流而檀道濟鎮廣陵各有強兵以制持朝廷羨之亮於中秉權可得持久及太祖將行誅王華之徒咸云道濟不可信太祖曰道濟止於脅從本非事主殺害之事又所不關吾召而問之必異於是詔道濟入朝授之以眾委之西討晦聞羨之等死謂道濟必不獨全及聞率眾來上惶懼無計道濟既至與彥之軍合牽盤緣岸晦始見艦數不多輕之不即出戰至晚因風帆上前後連咽西人離阻無復鬭心臺軍至忌置洲尾列艦過江晦大軍一時潰散晦夜出投巴陵得小船還江陵初雍州刺史劉粹遣弟竟陵太守道濟與臺軍主沈敞之襲江陵至沙橋周超率萬餘人與戰大破之俄而晦敗問至晦至江陵無它處分唯愧謝周超而已超其夜舍軍單舸詣到彥之降眾散略盡乃攜其弟遯兄子世基等七騎北走遯肥壯不能騎馬晦每待之行不得速至安陸延頭為戍主光順之所執順之晦故吏也檻送京師於路作悲人道其詞曰悲人道兮悲人道之實難哀人道之多險傷人道之寡安懿華宗之冠冑固清流而遠源樹文德於庭戶立操學於衡門應積善之餘祐當履福之所延何小子之凶放實招禍而作愆值革變之大運遭一顧於聖皇參謀猷於創物贊帝制於宏綱出治戎於禁衛入關言於帷房分河山之珪組繼文武之龜章稟顧命於西殿受遺寄於御床伊懦劣其無節實懷此而不忘荷隆遇於先主欲報之於後王憂託付之無效懼愧言於存亡謂繼體其嗣業能增輝於前光居遏密之未幾越禮度而湎荒普天壤而殞氣必社稷之淪喪矧吾儕之體國實啟處而匪遑藉億兆之一志固昏極而明彰諒主尊而民晏信卜祚之無疆國既危而重構家已衰而載昌獲扶顛而休否冀世道之方康朝襃功以疏爵祗命服於西蕃奏簫管之嘈囋擁朱旄之赫煌臨八方以作鎮響文武之桓桓厲薄弱以為政實忘食於日旰豈申甫之敢慕庶惟宋之屏翰甫逾歷其三稔實周回其未再豈有慮於內其云裁痛夾輔之二宰並加辟而靡貸哀弱息之從禍悲發中而心痗伊荊漢之良彥逮文武之子民見忠貞而弗亮睹理屈而莫申皆義概而同憤咸荷戈而競臻浮舳艫之弈弈陳車騎之轔轔觀人和與師整謂茲兵其誰陳庶亡魂之雪怨反涇渭於彝倫齊輕舟於江曲殄銳敵其皆湮勒陸徒於白水寇無反於隻輪氣有捷而益壯威既肅而彌振嗟時哉之不與迕風雨以踰旬我謀戰而不克彼繼奔其躡塵乏智勇之奇正忽孟明而是遵苟成敗其有數豈怨天而尤人恨矢石之未竭遂摧師而覆陳誠得喪之所遭固當之其無吝痛同懷之弱子橫遭罹之殃釁智未窮而事傾力未極而莫振誓同盡於鋒鏑我怯力而愆信愍弟姪之何辜實吾咎之所嬰謂九夷其可處思致免以全生詹性命之難遂乃窘紲於邊亭亦何忤於天地備艱危而是丁我聞之於昔誥功彌高而身蹙霍芒刺而幸免卒傾宗而滅族周嘆貴於獄吏終下蕃而靡鞠雖明德之大賢亦不免於殘戮懷今憚而忍人忘向惠而莫復續無賞而震主將何方以自牧非砏石之圜照孰違禍以取福著殷鑑於自古豈獨歎於季叔能安親而揚名諒見稱於先哲保歸全而終孝傷在余而皆缺辱歷世之平素忽盛滿而傾滅惟烝嘗與灑掃痛一朝而永絕問其誰而為之實孤人之險戾罪有踰於丘山雖萬死其何雪羈角偃兮衡閭親朋交兮平義雖履尚兮不一隆分好兮情寄俱憚耕兮從祿睹世道兮艱詖規志局兮功名每謂之兮為易今定諡兮闔棺慚明智兮昔議雖待盡兮為恥嗟厚顏兮靡寘長揖兮數子謝爾兮明智百齡兮浮促終焉兮斟克臥盡兮斧斤理命兮同得世安彼兮非此豈曉分兮辨惑御莊生之達言請承風以為則周超既降到彥之以參府事劉粹遣參軍沈敞之告彥之沙橋之敗事由周超彥之乃執之先繫皭等猶未即戮於是與晦遯兄子世基世猷及同黨庾登之孔延秀周超費愔竇應期蔣虔嚴千斯等並伏誅世基絢之子也有才氣臨死為連句詩曰偉哉橫海鱗壯矣垂天翼一旦失風水翻為螻蟻食晦續之曰功遂侔昔人保退無智力既涉太行險斯路信難陟晦死時年三十七庾登之殷道鸞何承天並皆原免商玄石初河東人商玄石為晦參軍晦為逆玄石密欲推西人庾田夫及到彥之從弟為主田夫等不敢許知玄石獨謀不立遂為晦領幢事既平恨本心之不遂投水死太祖嘉之以其子懷福為衡陽王義季右軍參軍督護晦走左右皆棄之延陵蓋唯有延陵蓋追隨不舍太祖嘉之後以蓋為長沙王義欣鎮軍功曹督護史臣曰謝晦坐璽封違謬遂免侍中斯有以見高祖之識治宰臣之稱職也夫拏戮所施事行重釁左黜或用義止輕愆輕愆物之所輕重釁人之所重故斧鉞希行於世徽簡日用於朝雖貴臣細故不以任隆弛法至乎下肅上尊用此道也自太祖臨務茲典稍違網以疏行法為恩息妨德害美抑此之由降及大明傾詖愈甚自非許竊深私陵犯密諱則左降之科不行於權戚若有身觸盛旨釁非國刑免書裁至弔客固望其門矣由是律無恒條上多弛行綱維不舉而網目隨之所以吉人防著在微慎大由小蓋為此云
