body:
  text: 卷六十七列傳第二十七謝靈運陳郡陽夏人也祖玄晉車騎將軍父瑍生而不慧為祕書郎蚤亡靈運幼便穎悟玄甚異之謂親知曰我乃生瑍瑍郍得生靈運謝靈運靈運少好學博覽群書文章之美江左莫逮從叔混特知愛之襲封康樂公食邑三千戶以國公例除員外散騎侍郎不就為琅邪王大司馬行參軍性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也撫軍將軍劉毅鎮姑孰以為記室參軍毅鎮江陵又以為衛軍從事中郎毅伏誅高祖版為太尉參軍入為祕書丞坐事免高祖伐長安驃騎將軍道憐居守版為諮議參軍轉中書侍郎又為世子中軍咨議黃門侍郎奉使慰勞高祖於彭城作撰征賦其序曰蓋聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於恒運剝喪易以橫流皇晉河汾來遷吳楚數歷九世年踰十紀西秦無一援之望東周有三辱之憤可謂積禍纏釁固以久矣況迺陵塋幽翳情敬莫遂日月推薄帝心彌遠慶靈將升時來不爽相國宋公得一居貞回乾運軸內匡寰表外清遐陬每以區宇未統側席盈慮值天祚攸興昧弱授機龜筮元謀符瑞景徵於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熙十有二年五月丁酉敬戒九伐申命六軍治兵于京畿次師于汳上靈檣千艘雷輜萬乘羽騎盈塗飛旍蔽日別命群帥誨謨惠策法奇於三略義祕於六韜所以鉤棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻捷宏功懋德獨絕古今天子感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬顇於征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮逆薄泗汳詳觀城邑周覽丘墳眷言古迹其懷已多昔皇祖作藩受命淮徐道固苞桑勳由仁積年月多歷市朝已改永為洪業纏懷清歷於是采訪故老尋履往迹而遠感深慨痛心殞涕遂寫集聞見作賦撰征俾事運遷謝託此不朽其詞曰系烈山之洪緒承火正之明光立熙載於唐后申讚事於周王疇庸命而順位錫寶珪以徹疆歷尚代而平顯降中葉以繁昌業服道而德徽風行世而化揚投前蹤以永冀省輶質以遠傷睽謀始於蓍蔡違用舍於行藏庇常善之罔棄憑曲成之不遺昭在幽而偕煦賞彌久而愈私顧晚草之薄弱仰青春之葳蕤引蔓穎於松上擢纖枝於蘭逵施隆貸而有渥報涓塵而無期歡太階之休明穆皇道之緝熙惟王建國辨方定隅內外既正華夷有殊惟昔小雅逮于班書戎蠻孔熾是殛是誅所以宣王用棘於獫狁高帝方事於匈奴然侵鎬至涇自塞及平闚郊伺鄙慕攜王之矯虔階喪亂之未寧竊強秦之三輔陷隆周之兩京雄崤澠以制險據繞霤而作扃家永懷於故壤國願言於先塋俟太平之曠期屬應運之聖明坤寄通於四瀆乾假照於三辰水潤土以顯比火炎天而同人惟上相之叡哲當草昧而經綸總九流而貞觀協五才而平分時來之機悟先於介石納隍之誡一援於生民龜筮允臧人鬼同情順天行誅司典詳刑樹牙選徒秉鉞抗旍弧矢罄楚孝之心智戈棘單吳子之精靈迅三翼以魚麗襄兩服以鴈逝陣未列於都甸威已振於秦薊灑嚴霜於渭城被和風於洛汭就終言以比猷考墳冊而莫契昔西怨於東徂今北伐而南悲豈朝野之恒情動萬乘之幽思歌零雨於豳風興採薇於周詩慶金墉之凱定眷戎車之遷時佇千里而感遠涉弦望而懷期詔微臣以勞問奉主命於河湄夕飲餞以俶裝旦出宿而言辭歲既晏而繁慮日將邁而戀乖闕敬恭於桑梓謝履長於庭階冒沈雲之晻藹迎素雪之紛霏凌結湍而凝清風矜籟以揚哀情在本而易阜物雖末而難懷眷余勤以就路苦憂來其城頹爾乃經雉門啟浮梁眺鍾巖越查塘覽永嘉之紊維尋建武之緝網于時內慢神器外侮戎狄君子橫流庶萌分析主晉有祀福祿來格明兩降覽三七辭厄元誕德以膺緯肇回光於陽宅明思服於下武興繼代以消逆簡文因心以秉道故恩用而刑廢孝武捨己以杖賢亦寧外而治內觀日化而就損庶雍熙之可對閔隆安之致寇傷龜玉之毀碎漏妖凶於滄洲纏釁難而盈紀時焉依於晉鄭國有蹙於百里賴英謨之經營弘兼濟以忘己主寰內而緩虞澄海外以漬滓至如昏祲蔽景鼎祚傾基黍離有歎鴻鴈無期瞻天命之貞符秉順動而履機率駿民之思效普邦國而同歸盪積霾之穢氛啟披陰之光暉反平陵之杳藹復七廟之依稀務役簡而農勸每勞賞而忠甄燮時雍於祖宗掃逋醜於漢渚滌僭逆於岷山羈巢處於西木引鼻飲於源淵惠要襋而思韙援冠弁而來虔視冶城而北屬懷文獻之收揚匪元首之康哉孰股肱之惟良譬觀曲而識節似綴組以成章業彌纏而彌微事愈有而莫傷次石頭之雙岸究孫氏之初基幸漢庶之漏網憑江介以抗維初鵲起於富春果鯨躍於川湄匝三世而國盛歷五偽而宗夷察成敗之相仍猶脣亡而齒寒載十二而謂紀豈蜀滅而吳安眾咸昧於謀兆羊獨悟於理端請廣武以誨情樹襄陽以作藩拾建業其如遺沿萬里而誰難疾魯荒之詖辭惡京陵之譖言責當朝之憚貶對曩籍而興歎敦怙寵而判違敵既勍而國圮彼問鼎而何階必先賊於君子原性分之異託雖殊塗而歸美或卷舒以愚智或治亂其如矢謝昧迹而託規卒安身以全里周顯節而犯逆抱正情而喪己薄四望而尤眄歎王路之中鯁蠢于越之妖燼敢凌蹈於五嶺崩雙嶽於中流擬凶威於荊郢隱雷霆於帝坐飛芒鏃於宮省于時朝有遷都之議人無守死之志師旅痛於久勤城墉闕於素備安危勢在不侔眾寡形於見事於赫淵謀研其神策緩轡待機追奔躡迹遇雷池而振曜次彭蠡而殲滌穆京甸以清晏撤多壘而寧役造白石之祠壇懟二豎之無君踐掖庭以幽辱凌祧社而火焚愍文康之罪己嘉忠武之立勳道有屈於災蝕功無謝於如仁訊落星之饗旅索舊棲於吳餘迹階戺而不見橫榛卉以荒除彼生成之樂辰亦猶今之在余慨齊吟於爽鳩悲唐歌於山樞弔偽孫於徐首率君臣以奉疆時運師以伐罪偏投書於武王迄西北之落紐乏東南以振綱誠鉅平之先覺實中興之後祥據左史之攸徵胡影迹之可量過江乘而責始知遇雄之無謀厭紫微之宏凱甘陵波而遠遊越雲夢而南泝臨浙河而東浮彀連弩於川上候蛟龍於中流爰薄方與迺屆歐陽入夫江都之域次乎廣陵之鄉易千里之曼曼泝江流之湯湯洊赤圻以經復越二門而起漲眷北路以興思看東山而怡目林叢薄路逶迤石參差山盤曲水激瀨而駿奔日映石而知旭審兼照之無偏怨歸流之難濯羨輕魵之涵泳觀翔鷗之落啄在飛沈其順從顧微躬而緬邈於是抑懷蕩慮揚榷易難利涉以吉天險以艱于敵伊阻在國斯便勾踐行霸於琅邪夫差爭長於黃川葛相發歎而思正曹后愧心於千魂登高堞以詳覽知吳濞之衰盛戒東南之逆氣成劉后之駴聖藉鹽鐵之殷阜臨淮楚之剽輕盛几杖而弭心怒抵局而遂爭忿爰盎之扶禍惜徒傷於家令匪條侯之忠毅將七國之陵正襃漢藩之治民並訪賢以招明侯文辨其誰在曰鄒陽與枚生據忠辭於吳朝執義說於梁庭敷高才於兔園雖正言而免刑闕里既已千載深儒流於末學欽仲舒之睟容遵縫掖於前躅對園囿而不窺下帷幙而論屬相端非之兩驕遭弘偃之雙慝恨有道之無時步險塗以側足聞宣武之大閱反師旅於此廛自皇運之都東始昌業以濟難抗素旄於秦嶺揚朱旗於巴川懼帝系之墜緒故黜昏而崇賢嘉收功以垂世嗟在嗣而覆旃德非陟而繼宰釁踰禹其必顛造步兵而長想欽太傅之遺武思嘉遁之餘風紹素履之落緒民志應而願稅國屯難而思撫譬乘舟之待楫象提釣之假縷總出入於和就兼仁用於默語弘九流以𢴲四維復先陵而清舊宇卻西州之成功指東山之歸予惜圖南之啟運恨鵬翼之未舉發津潭而迥邁逗白馬以憩舲貫射陽而望邗溝濟通淮而薄甬城城坡陁兮淮驚波平原遠兮路交過面艽野兮悲橋梓遡急流兮苦磧沙敻千里而無山緬百谷而有居被宿莽以迷徑睹生煙而知墟謂信美其可娛身少長於樂土實長歎於荒餘具瘁值歲寒之窮節視層雲之崔巍聆悲飆之掩屑彌晝夜以滯淫怨凝陰之方結望新晴於落日起明光於躋月眷轉蓬之辭根悼朔鴈之赴越披微物而疚情此思心其可悅問徭役其幾時駭閱景於興沒感曰歸於采薇予來思於雨雪豈初征之懼對冀鸛鳴之在垤踰宿鶩吾楫於邳鄉奚車正以事夏虺左相以輔湯綿三代而享邑廁踐土之一匡嗟仲幾之寵侮遂捨存以徵亡喜薛宰之善對美士彌之能綱升曲垣之逶迤訪淮陰之所都原入跨之達恥俟遭時以遠圖捨西楚以擇木迨南漢以定謨亂孟津而魏滅攀井陘而趙徂播靈威於齊橫振餘猛於龍且觀讓通而告豨曷始智而終愚迄沂上而停枻登高圯而不進石幽期而知賢張揣景而示信本文成之素心要王子於雲仞豈無累於清霄直有概於真吝始熙績於武關卒敷功於皇胤處夷險以解挫弘憂虞以時順矜若華之翳晷哀飛驂之落駿傷粒食而興念眷逸翮而思振戾臣山而東顧美相公之前代嗟殘虜之將糜熾餘猋於海濟驅鮐稚於淮曲暴鰥孤於泗澨託未命雲冀靈武之北閱惟授首之在晨當盛暑而選徒肅嚴威以振響漸溫澤而沾腴既雲撤於胊城遂席卷於齊都曩四關其奚阻道一變而是孚傷炎季之崩弛長逆布以滔天假父子以詐愛借兄弟以偽恩相魏武以譎狂宄謨奮於東藩桴未譟於東郭身已馘於樓門審貢牧於前說證所作於舊徐聆泗川之浮磬翫夷水之蠙珠草漸苞於熾壤桐孤榦於嶧隅慨禹迹於尚世惠遺文於夏書紛征邁之淹留彌懷古於舊章商伯文於故服咸徵名於彭殤眺靈壁之曾峰投呂縣之迅梁想蹈水之行歌雖齊汨其何傷啟仲尼之嘉問告性命以依方豈苟然於迂論聆寓言於達莊於是濫石橋登戲臺策馬釣渚息轡城隅永感四山零淚雙渠怨物華之推驛慨舟壑之遞遷謂徂歲之悠闊結幽思之方根感皇祖之徽德爰識沖而量淵降俊明以鏡鑑迴風猷以昭宣道既底於國難惠有覃於黎元士頌歌於政教民謠詠於渥恩兼採芑之致美協漢廣之發言強虎氐之搏翼灟雲網於所禁驅黔萌以蘊崇取園陵而湮沈錫殘落於河西序淪胥於漢陰攻方城而折扃擾譙潁其誰任世闕才而貽亂時得賢而興治救祖考之邦壤在幽人而枉志體飛書之遠情悟犒師之通識迨明達之高覽契古今而同事拔淵謨於潛機騁神鋒於雲旆驅斥澤而風靡蹙坑谷而鳥竄中華免夫左衽江表此焉緩帶既剋黜於肥六又作鎮於彭沛晏皇塗於國內震天威於河外掃東齊而已寧指西崤而將泰值秉均而代謝實大業之興廢心無忝於樂生事有像於燕惠抱明哲之不伐奉宏勳而是稅捐七州以爰來歸五湖以投袂屈盛績於平生申遠期於暮歲訪曩載於宋鄙採陽秋於魯經晉申好於東吳鄭憑威於南荊故反師於曹門將以塞於夷庚納五叛以長寇伐三邑以侵彭美西鉏之忠辭快韓厥之奇兵追項王之故臺迹霸楚之遺端挺宏志於總角奮英勢於弱冠氣蓋天而倒日力拔山而傾湍始飆起於勾越中電激於衡關興偏慮於攸吝忘即易於所難忌陳錦而莫照思反鄉而有歎且夫殺義害嬰而豐疑緤賢不策失位誰持迨理屈而愈閉方怨天而懷悲對駿騅以發憤傷虞姝於末詞陟亞父之故營諒謀始之非託遭衰嬴之崩綱值威炎之結絡迄皓首於阜陵猶謬覺於然諾視一人於三傑豈在己之庸弱置豐沛而不舉故自同於俎鑊發汴口而游歷迄西山而弭轡觀終古之幽憤懷元王之沖粹丁戰國之權爭方恬心於道肆學浮丘以就德友三儒以成類潔流始於初源累仁基於前美撥楚族之休烈傳芳素於來祀強見譽於清虛德致稱於千里或避寵以辭姻或遺榮而不仕政直言以安身駿絕才以喪己驅信道之成終表昧世之虧始悟介焉之已差則不俟於終日既防萌於未著雖念德其何益爾乃孟陬發節雷隱蟄驚散葉荑柯芳蘤飾萌麥萋萋於旄丘柳依依於高城相睢鳩之集河觀鳴鹿之食苹沂泗遠兮清川急秋冬近兮緒風襲風流蕙兮水增瀾訴愁衿兮鑑戚顏愁盈根而薀際戚發條而成端嗟我行之彌日待征邁而言旋荷慶雲之優渥周雙七於此年陶逸豫於京甸違險難於行川轉歸弦而眷戀望修檣而流漣願關鄴之遄清遲華鑾之凱旋穆淳風於六合溥洪澤於八埏頒賢愚於大小順規矩於方圓固四民之獲所宜稅稷於萊田苦邯鄲之難步庶行迷之易痊長守朴以終稔亦拙者之政焉仍除宋國黃門侍郎遷相國從事中郎世子左衛率坐輒殺門生免官高祖受命降公爵為侯食邑五百戶起為散騎常侍轉太子左衛率靈運為性褊激多愆禮度朝廷唯以文義處之不以應實相許自謂才能宜參權要既不見知常懷憤憤廬陵王義真少好文籍與靈運情款異常少帝即位權在大臣靈運構扇異同非毀執政司徒徐羨之等患之出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意游遨徧歷諸縣動踰旬朔民間聽訟不復關懷所至輒為詩詠以致其意焉在郡一周稱疾去職從弟晦曜弘微等並與書止之不從靈運父祖並葬始寧縣并有故宅及墅遂移籍會稽修營別業傍山帶江盡幽居之美與隱士王弘之孔淳之等縱放為娛有終焉之志每有一詩至都邑貴賤莫不競寫宿昔之間士庶皆徧遠近欽慕名動京師作山居賦并自注以言其事曰古巢居瑠處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黃屋實不殊於汾陽即事也山居良有異乎市廛抱疾就閑順從性情敢率所樂而以作賦楊子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宮觀遊獵聲色之盛而敘山野草木水石穀稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以遠矣覽者廢張左之艷辭尋臺皓之深意去飾取素儻值其心耳意實言表而書不盡遣迹索意託之有賞其辭曰謝子臥疾山頂覽古人遺書與其意合悠然而笑曰夫道可重故物為輕理宜存故事斯忘古今不能革質文咸其常合宮非縉雲之館衢室豈放勛之堂邁深心於鼎湖送高情於汾陽嗟文成之卻粒願追松以遠遊嘉陶朱之鼓棹迺語種以免憂判身名之有辨權榮素其無留孰如牽犬之路既寡聽鶴之塗何由哉若夫巢穴以風露貽患則大壯以棟宇祛弊宮室以瑤璇致美則白賁以丘園殊世惟上於巖壑幸兼善而罔滯雖非市朝而寒暑均也雖是築構而飭朴兩逝昔仲長願言流水高山應璩作書邙阜洛川勢有偏側地闕周員銅陵之奧卓氏充釽槻之端金谷之麗石子致音徽之觀徒形域之薈蔚惜事異於栖盤至若鳳叢二臺雲夢青丘漳渠淇園橘林長洲雖千乘之珍苑孰嘉遯之所遊且山川之未備亦何議於兼求覽明達之撫運乘機緘而理默指歲暮而歸休詠宏徽於刊勒狹三閭之喪江矜望諸之去國選自然之神麗盡高棲之意得仰前哲之遺訓俯性情之所便奉微軀以宴息保自事以乘閑愧班生之夙悟慚尚子之晚研年與疾而偕來志乘拙而俱旋謝平生於知遊棲清曠於山川其居也左湖右江往渚還汀面山背阜東阻西傾抱含吸吐款跨紆縈緜聯邪亘側直齊平近東則上田下湖西谿南谷石堟石滂閔硎黃竹決飛泉於百仞森高薄於千麓寫長源於遠江泒深毖於近瀆近南則會以雙流縈以三洲表裏回游離合山川崿崩飛於東峭槃傍薄於西阡拂青林而激波揮白沙而生漣近西則楊賓接峰唐皇連縱室壁帶谿曾孤臨江竹緣浦以被綠石照澗而映紅月隱山而成陰木鳴柯以起風近北則二巫結湖兩𣇘通沼橫石判盡休周分表引修隄之逶迆吐泉流之浩山𡼠下而回澤瀨石上而開道遠東則天台桐柏方石太平二韭四明五奧三菁表神異於緯牒驗感應於慶靈淩石橋之莓苔越楢谿之紆縈遠南則松箴棲雞唐嵫漫石崒嵊對嶺孟分隔入極浦而邅回迷不知其所適上嶔崎而蒙籠下深沈而澆激遠西則遠北則長江永歸巨海延納崑漲緬曠島嶼綢沓山縱橫以布護水迴沈而縈浥信荒極之綿眇究風波之睽合徒觀其南術之生𡼠成衍岸測深相渚知淺洪濤滿則曾石沒清瀾減則沈沙顯及風興濤作水勢奔壯于歲春秋在月朔望湯湯驚波滔滔駭浪電激雷崩飛流灑漾淩絕壁而起岑橫中流而連薄始迅轉而騰天終倒底而見壑此楚貳心醉於吳客河靈懷慚於海若爾其舊居曩宅今園枌槿尚援基井具存曲術周乎前後直陌矗其東西豈伊臨谿而傍沼迺抱阜而帶山考封域之靈異實茲境之最然葺駢梁於巖麓棲孤棟於江源敞南戶以對遠嶺闢東窗以矚近田田連岡而盈疇嶺枕水而通阡阡陌縱橫塍埒交經導渠引流賒散溝并蔚蔚豐秋苾苾香粳送夏蚤秀迎秋晚成兼有陵陸麻麥粟菽候時覘節遞蓺遞孰供粒食與漿飲謝工商與衡牧生何待於多資理取足於滿腹自園之田自田之湖泛濫川上緬邈水區濬潭澗而窈窕除菰洲之紆餘毖溫泉於春流馳寒波而秋徂風生浪於蘭渚日倒景於椒塗飛漸榭於中沚取水月之歡娛旦延陰而物清夕棲芬而氣敷顧情交之永絕覬雲客之暫如水草則萍藻薀菼雚蒲芹蓀蒹菰蘋蘩蕝荇菱蓮雖備物之偕美獨扶渠之華鮮播緣葉之鬱茂含紅敷之繽翻怨清香之難留矜盛容之易闌必充給而後搴豈蕙草之空殘卷敂弦之逸曲感江南之哀歎秦箏倡而溯游往唐上奏而舊愛還本草所載山澤不一雷桐是別和緩是悉參核六根五華九實二冬並稱而殊性三建異形而同出水香送秋而擢蒨林蘭近雪而揚猗卷柏萬代而不殞伏芩千歲而方知映紅葩於綠蔕茂素蕤於紫枝既住年而增靈亦驅妖而斥疵其竹則二箭殊葉四苦齊味水石別谷巨細各彙既修竦而便娟亦蕭森而蓊蔚露夕沾而悽陰風朝振而清氣捎玄雲以拂杪臨碧潭而挺翠蔑上林與淇澳驗東南之所遺企山陽之游踐遲鸞鷖之棲託憶崑園之悲調慨伶倫之哀籥衛女行而思歸詠楚客放而防露作其木則松柏檀櫟桐榆檿柘榖棟楸梓檉樗剛柔性異貞脆質殊卑高沃塉各隨所如榦合抱以隱岑杪千仞而排虛凌岡上而喬竦蔭澗下而扶疏沿長谷以傾柯攢積石以插衢華映水而增光氣結風而回敷當嚴勁而葱倩承和煦而芬腴送墜葉於秋晏遲含萼於春初植物既載動類亦繁飛泳騁透胡可根源觀貌相音備列山川寒燠順節隨宜匪敦魚則𩽇鱧鮒鱮鱒鯇鰱鯿魴鮪魦鱖鱨鯉鯔鱣輯采雜色錦爛雲鮮唼藻戲浪汎苻流淵或鼓鰓而湍躍或掉尾而波旋鱸鮆乘時以入浦鰔𩷰沿瀨以出泉鳥則鵾鴻鶂鵠鶖鷺鴇𪂼雞鵲繡質鶷鸐綬章晨鳧朝集時鷮山梁海鳥違風朔禽避涼荑生歸北霜降客南接響雲漢侶宿江潭聆清哇以下聽載王子而上參薄回涉以弁翰映明壑而自耽山上則猿𤟤貍獾犴獌猰𤟣山下則熊羆豺虎羱鹿麇麖擲飛枝於窮崖踔空絕於深硎蹲谷底而長嘯攀木杪而哀鳴緡綸不投置羅不披磻弋靡用蹄筌誰施鑑虎狼之有仁傷遂欲之無崖顧弱齡而涉道悟好生之咸宜率所由以及物諒不遠之在斯撫鷗䱔而悅豫杜機心於林池敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之弘誓拯群物之淪傾豈寓地而空言必有貸以善成欽鹿野之華苑羨靈鷲之名山企堅固之貞林希菴羅之芳園雖綷容之緬邈謂哀音之恒存建招提於幽峰冀振錫之息肩庶鐙王之贈席想香積之惠餐事在微而思通理匪絕而可溫爰初經略杖策孤征入澗水涉登嶺山行陵頂不息窮泉不停櫛風沐雨犯露乘星研其淺思罄其短規非龜非筮擇良選奇翦榛開逕尋石覓崖四山周回雙流逶迤面南嶺建經臺倚北阜築講堂傍危峰立禪室臨浚流列僧房對百年之高木納萬代之芬芳抱終古之泉源美膏液之清長謝麗塔於郊郭殊世間於城傍欣見素以抱樸果甘露於道場苦節之僧明發懷抱事紹人徒心通世表是遊是憩倚石構草寒暑有移至業莫矯觀三世以其夢撫六度以取道乘恬知以寂泊含和理之窈窕指東山以冥期實西方之潛兆雖一日以千載猶恨相遇之不早賤物重己棄世希靈駭彼促年愛是長生冀浮丘之誘接望安期之招迎甘松桂之苦味夷皮褐以頹形羨蟬蛻之匪日撫雲蜺其若驚陵名山而屢憩過巖室而披情雖未階於至道且緬絕於世纓指松菌而興言良未齊於殤彭山作水役不以一牧資待各徒隨節競逐陟嶺刊木除榛伐竹抽筍自篁擿篛于谷楊勝所拮秋冬葍獲野有蔓草獵涉蘡薁亦醞山清介爾景福苦以朮成甘以𢸙熟慕椹高林剝芨巖椒掘蒨陽崖擿𢹛陰摽晝見搴茅宵見索綯芟菰翦蒲以薦以茭既坭既埏品收不一其灰其炭咸各有律六月採蜜八月樸栗備物為繁略載靡悉若迺南北兩居水通陸阻觀風瞻雲方知厥所南山則夾渠二田周嶺三苑九泉別澗五谷異巘群峰參差出其間連岫複陸成其阪眾流溉灌以環近諸堤擁抑以接遠遠堤兼陌近流開湍淩阜泛波水往步還還回往匝枉渚員巒呈美表趣胡可勝單抗北頂以葺館殷南峰以啟軒羅曾崖於戶裏列鏡瀾於窗前因丹霞以赬楣附碧雲以翠椽視奔星之俯馳顧之未牽鵾鴻翻翥而莫及何但鷰雀之翩翾氿泉傍出潺緩於東檐桀壁對跱硿礲於西霤修竹葳蕤以翳薈灌木森沈以蒙茂蘿曼延以攀援花芬薰而媚秀日月投光於柯間風露披清於㟪岫夏涼寒燠隨時取適階基回互橑櫺乘隔此焉卜寢翫水弄石邇即回眺終歲罔斁傷美物之遂化怨浮齡之如借眇遯逸於人群長寄心於雲霓因以小湖鄰於其隈眾流所湊萬泉所回沉濫異形首毖終肥別有山水路邈緬歸求歸其路迺界北山棧道傾虧蹬閣連卷復有水逕繚繞回圓瀰瀰平湖泓泓澄淵孤岸竦秀長洲芊綿既瞻既眺曠矣悠然及其二川合流異源同口赴隘入險俱會山首瀨排沙以積丘峰倚渚以起阜石傾瀾而稍巖木映波而結藪逕南漘以橫前轉北崖而掩後隱叢灌故悉晨暮託星宿以知左右山川澗石州岸草木既摽異於前章亦列同於後牘山匪砠而是岵川有清而無濁石傍林而插巖泉協澗而下谷淵轉渚而散芳岸靡沙而映竹草迎冬而結葩樹凌霜而振綠向陽則在寒而納煦面陰則當暑而含雪連岡則積嶺以隱嶙舉峰則群竦以𡽱𡾲浮泉飛流以寫空沈波潛溢於洞穴凡此皆異所而咸善殊節而俱悅春秋有待朝夕須資既耕以飯亦桑貿衣藝菜當肴採藥救頹自外何事順性靡違法音晨聽放生夕歸研書賞理敷文奏懷凡厥意謂揚較以揮且列于言誡特此推北山二園南山三苑百果備列乍近乍遠羅行布株迎早候晚猗蔚溪澗森疏崖巘杏壇㮏園橘林栗圃桃李多品梨棗殊所枇杷林檎帶谷映渚椹梅流芬於回巒椑柿被實於長浦畦町所藝含蕊藉芳蓼蕺葼薺葑菲蘇薑綠葵眷節以懷露白薤感時而負霜寒葱摽倩以陵陰春藿吐苕以近陽弱質難恒頹齡易喪撫鬢生悲視顏自傷承清府之有術冀在衰之可壯尋名山之奇藥越靈波而憩轅採石上之地黃摘竹下之天門摭曾嶺之細辛拔幽澗之溪蓀訪鍾乳於洞穴訊丹陽於紅泉安居二時冬夏三月遠僧有來近眾無闕法鼓朗響頌偈清發散華霏蕤流香飛越析曠劫之微言說像法之遺旨乘此心之一豪濟彼生之萬理啟善趣於南倡歸清暢於北機非獨愜於予情諒僉感於君子山中兮清寂群紛兮自絕周聽兮匪多得理兮俱悅寒風兮搔屑面陽兮常熱炎光兮隆熾對陰兮霜雪愒曾臺兮陟雲根坐澗下兮越風穴在茲城而諧賞傳古今之不滅好生之篤以我而觀懼命之盡吝景之懽分一往之仁心拔萬族之險難招驚魂於殆化收危形於將闌漾水性於江流吸雲物於天端睹騰翰之頏頡視鼓鰓之往還馳騁者儻能狂愈猜害者或可理攀哲人不存懷抱誰質糟粕猶在啟縢剖袠見柱下之經二睹濠上之篇七承未散之全樸救已穨於道術嗟夫六蓺以宣聖教九流以判賢徒國史以載前紀家傳以申世模篇章以陳美刺論難以覈有無兵技醫日龜筴筮夢之法風角冢宅算數律歷之書或平生之所流覽並於今而棄諸驗前識之喪道抱一德而不渝伊昔齠齔實愛斯文援紙握管會性通神詩以言志賦以敷陳箴銘誄頌咸各有倫爰暨山棲彌歷年紀幸多暇日自求諸已研精靜慮貞觀厥美懷秋成章含笑奏理若迺乘攝持之告評養達之篇畏絕迹之不遠懼行地之多艱均上皇之自昔忌下衰之在旃投吾心於高人落賓名於聖賢廣滅景於崆峒許遁音於箕山愚假駒以表谷涓隱巖以搴芳萊庇蒙以織畚皓棲商而頤志卿寢茂而敷詞鄭別谷而永逝梁去霸而之會高居唐而胥宇臺依崖而穴墀咸自得以窮年眇貞思於所遺暨其窈窕幽深寂漠虛遠事與情乖理與形反既耳目之靡端豈足跡之所踐蘊終古於三季俟通明於五眼權近慮以停筆抑淺知而絕簡太祖登祚誅徐羨之等徵為祕書監再召不起上使光祿大夫范泰與靈運書敦獎之乃出就職使整理祕閣書補足遺闕文以晉氏一代自始至終竟無一家之史令靈運撰晉書粗立條流書竟不就尋遷侍中日夕引見賞遇甚厚靈運詩書皆兼獨絕每文竟手自寫之文帝稱為二寶既自以名輩才能應參時政初被召便以此自許既至文帝唯以文義見接每侍上宴談賞而已王曇首王華殷景仁等名位素不踰之並見任遇靈運意不平多稱疾不朝直穿池植援種竹樹菫驅課公役無復期度出郭游行或一日百六七十里經旬不歸既無表聞又不請急上不欲傷大臣諷旨令自解靈運乃上表陳疾上賜假東歸將行上書勸伐河北曰自中原喪亂百有餘年流離寇戎湮沒殊類先帝聰明神武哀濟群生將欲盪定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絕仰德抱悲恨存生盡況陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事並非其才且遘紛京師豈慮託付遂使孤城窮陷莫肯極忠烈囚朔漠緜河三千翻為寇有晚遣鎮戍皆先朝之所開拓一旦淪亡此國恥宜雪被於近事者也又北境自染逆虜窮苦備羅徵調賦歛靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜舍末遠師隴外東虜乘虛呼可掩襲西軍既反得據關中長圍咸陽還路已絕雖遣救援停住河東遂乃遠討大城欲為首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於內時來之會莫復過此觀兵燿威實在茲日若相持未已或生事變忽值新起之眾則異於今苟乖其時難為經略雖兵食倍多則萬全無必矣又歷觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云既見天殃又見人災乃可以謀昔魏氏之強平定荊冀乃乘袁劉之弱晉世之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史策者也自羌平之後天下亦謂虜當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼關失守用緩天誅假延歲月日來至今十有二載是謂一紀曩有前言況五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形驗之今役仰望聖澤有若飢渴注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆即日府藏誠無兼儲然凡造大事待國富兵強不必乘會於我為易貴在得時器械既充眾力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野強富之實昭然可知為國長久之計孰若一往之費邪或懲關西之敗而謂河北難守二境形勢表裏不同關西雜居種類不一昔在前漢屯軍霸上通火甘泉況乃遠戍之軍值新故交代之際者乎河北悉是舊戶差無雜人連嶺判阻三關作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破錯興言匈奴慢侮賈誼憤歎方於今日皆為賒矣晉武中主耳值孫皓虐亂天祚其德亦由鉅平奉策荀賈折謀故能業崇當年區宇一統況今陛下聰明聖哲天下歸仁文德與武功並震霜威共素風俱舉協以宰輔賢明諸王美令岳牧宣烈虎臣盈朝而天或遠命亦何敵不滅矧伊頑虜假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾睹岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸罝蒙賜恩假暫違禁省消渴十年常慮朝露抱此愚志昧死以聞靈運以疾東歸而遊娛宴集以夜續晝復為御史中丞傅隆所奏坐以免官是歲元嘉五年靈運既東還與族弟惠連東海何長瑜穎川荀雍太山羊璿之以文章賞會共為山澤之游時人謂之四友惠連幼有才悟而輕薄不為父方明所知靈運去永嘉還始寧時方明為會稽郡靈運嘗自始寧至會稽造方明過視惠連大相知賞時長瑜教惠連讀書亦在郡內靈運又以為絕倫謂方明曰阿連才悟如此而尊作常兒遇之何長瑜當今仲宣而給以下客之食尊既不能禮賢宜以長瑜還靈運靈運載之而去荀雍字道雍官至員外散騎郎璿之字曜璠臨川內史為司空竟陵王誕所遇誕敗坐誅長瑜文才之美亞於惠連雍璿之不及也臨川王義慶招集文士長瑜自國侍郎至平西記室參軍嘗於江陵寄書與宗人何勗以韻語序義慶州府僚佐云陸展染鬢髮欲以媚側室青青不解久星星行復出如此者五六句而輕薄少年遂演而廣之凡厥人士並為題目皆加劇言苦句其文流行義慶大怒白太祖除為廣州所統曾城令及義慶薨朝士詣第敘哀何勗謂袁淑曰長瑜便可還也淑曰國新喪宗英未宜便以流人為念廬陵王紹鎮尋陽以長瑜為南中郎行參軍掌書記之任行至板橋遇暴風溺死靈運因父祖之資生業甚厚奴僮既眾義故門生數百鑿山浚湖功役無已尋山陟嶺必造幽峻巖障千重莫不備盡登躡常著木履上山則去前齒下山去其後齒嘗自始寧南山伐木開逕直至臨海從者數百人臨海太守王琇驚駭謂為山賊徐知是靈運乃安又要琇更進琇不肯靈運贈琇詩曰邦君難地嶮旅客易山行在會稽亦多徒眾驚動縣邑太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言會稽東郭有回踵湖靈運求決以為田太祖令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運既不得回踵又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毀傷之與顗遂構讎隙因靈運橫恣百姓驚擾乃表其異志發兵自防露板上言靈運馳出京都詣闕上表曰臣自抱疾歸山于今三載居非郊郭事乖人間幽棲窮巖外緣兩絕守分養命庶畢餘年忽以去月二十八日得會稽太守臣顗二十七日疏云比日異論噂𠴲此雖相了百姓不許寂默今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山陰防衛彰赫彭排馬槍斷截衢巷偵邏縱橫戈甲竟道不知微臣罪為何事及見顗雖曰見亮而裝防如此唯有罔懼臣昔忝近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虛聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚群或勇冠鄉邦劍客馳逐未聞俎豆之學欲為逆節之罪山棲之士而構陵上之釁今影迹無端假謗空設終古之酷未之或有匪吝其生實悲其痛誠復內省不疚而抱理莫申是以牽曳疾病束骸歸款仰憑陛下天鑒曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳太祖知其見誣不罪也不欲使東歸以為臨川內史賜秩中二千石在郡遊放不異永嘉為有司所糾司徒遣使隨州從事鄭望生收靈運靈運執錄望生興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子追討擒之送廷尉治罪廷尉奏靈運率部眾反叛論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕乃詔曰靈運罪釁累仍誠合盡法但謝玄勳參微管宜宥及後嗣可降死一等徙付廣州其後秦郡府將宗齊受至除口行達桃墟村見有七人下路亂語疑非常人還告郡縣遣兵隨齊受掩討遂共格戰悉禽付獄其一人姓趙名欽山陽縣人云同村薛道雙先與謝康樂共事以去九月初道雙因同村成國報欽云先作臨川郡犯事徙送廣州謝給錢令買弓箭刀楯等物使道雙要合鄉里健兒於三江口篡取謝若得志如意之後功勞是同遂合部黨要謝不及既還飢饉緣路為劫盜有司又奏依法收治太祖詔於廣州行棄市刑臨死作詩曰龔勝無餘生李業有終盡嵇公理既迫霍生命亦殞悽悽凌霜葉網網衝風菌邂逅竟幾何修短非所愍送心自覺前斯痛久已忍恨我君子志不獲巖上泯詩所稱龔勝李業猶前詩子房魯連之意也時元嘉十年年四十九所著文章傳於世子鳳蚤卒史臣曰民稟天地之靈含五常之德剛柔迭用喜慍分情夫志動於中則歌詠外發六義所因四始攸繫升降謳謠紛披風什雖虞夏以前遣文不睹稟氣懷靈理無或異然則歌詠所興宜自生民始也周室既衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石高義薄雲天自茲以降情志愈廣王襃劉向揚班崔蔡之徒異軌同奔遞相師祖雖清辭麗曲時發乎篇而蕪音累氣固亦多矣若夫平子艷發文以情變絕唱高蹤久無嗣響至于建安曹氏基命二祖陳王咸蓄盛藻甫乃以情緯文以文被質自漢至魏四百餘年辭人才子文體三變相如巧為形似之言班固長於情理之說子建仲宣以氣質為體並摽能擅美獨映當時是以一世之士各相慕習原其飆流所始莫不同祖風騷徒以賞好異情故意製相詭降及元康潘陸特秀律異班賈體變曹王縟旨星稠繁文綺合綴平臺之逸響採南皮之高韻遺風餘烈事極江左有晉中興玄風獨振為學窮於柱下博物止乎七篇馳騁文辭義單乎此自建武暨乎義熙歷載將百雖綴響聯辭波屬雲委莫不寄言上德託意玄珠遒麗之辭無聞焉爾仲文始革孫許之風叔源大變太元之氣爰逮宋氏顏謝騰聲靈運之興會摽舉延年之體裁明密並方軌前秀垂範後昆若夫敷衽論心商榷前藻工拙之數如有可言夫五色相宣八音協暢由乎玄黃律呂各適物宜欲使宮羽相變低昂互節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異妙達此旨始可言文至於先士茂製諷高歷賞子建函京之作仲宣霸岸之篇子荊零雨之章正長朔風之句並直舉胸情非傍詩史正以音律調韻取高前式自騷人以來多歷年代雖文體稍精而此祕未睹至於高言妙句音韻天成皆闇與理合匪由思至張蔡曹王曾無先覺潘陸謝顏去之彌遠世之知音者有以得之知此言之非謬如曰不然請待來哲
