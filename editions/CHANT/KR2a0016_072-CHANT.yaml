body:
  text: 卷七十五列傳第三十五王僧達王僧達琅邪臨沂人太保弘少子兄錫質訥乏風采太祖聞僧達蚤慧召見於德陽殿問其書學及家事應對閑敏上甚知之妻以臨川王義慶女少好學善屬文年未二十以為始興王濬後軍參軍遷太子舍人坐屬疾於楊列橋觀鬭鴨為有司所糾原不問性好鷹犬與閭里少年相馳逐又躬自屠牛義慶聞如此令周旋沙門慧觀造而觀之僧達陳書滿席與論文義慧觀酬答不暇深相稱美與錫不協訴家貧求郡太祖欲以為秦郡吏部郎庾炳之曰王弘子既不宜作秦郡僧達亦不堪莅民乃止尋遷太子洗馬母憂去職兄錫罷臨海郡還送故及奉祿百萬以上僧達一夕令奴輦取無復所餘服闋為宣城太守性好游獵而山郡無事僧達肆意馳騁或三五日不歸受辭訟多在獵所民或相逢不識問府君所在僧達曰近在後元嘉二十八年春索虜寇逼都邑危懼僧達求入衛京師見許賊退又除宣城太守頃之徙任義興三十年元凶弒立世祖入討普檄諸州郡又符郡發兵僧達未知所從客說之曰方今釁逆滔天古今木有為君計莫若承義師之檄移告傍郡使工言之士明示禍福苟在其心誰不響應此策上也如其不能可躬率向義之徒詳擇水陸之便致身南歸亦其次也僧達乃自候道南奔逢世祖於鵲頭即命為長史加征虜將軍初世祖發尋陽沈慶之謂人曰王僧達必來赴義人問其所以慶之曰虜馬飲江王出赴難見在先帝前議論開張執意明決以此言之其至必也上即位以為尚書右僕射尋出為使持節南蠻校尉加征虜將軍時南郡王義宣求留江陵南蠻不解不成行仍補護軍將軍僧達自負才地謂當時莫及上初踐阼即居端右一二年間便望宰相及為護軍不得志乃啟求徐州曰臣衰索餘生逢辰藉業先帝追念功臣睠及遺賤飾短捐陋布策稠采從官委褐十有一載早憑慶泰脫親盛明而有志於學無獨見之敏有務在身無偏鑒之識固不足建言世治備辯時宜竊以天恩不可終報尸素難可久處故猖狂蕪謬每陳所懷陛下孝誠發衷義順動物自龍飛以來實應九服同歡三光再朗而臣假視巷里借聽民謠黎氓未締其感遠近風議不獲稍進臣所用夙宵疾首寤寐疚心者也臣取之前載譬之於今當漢文之時可謂藉已成之業據既安之運重以布衣菲食憂勤治道而賈誼披露迺誠猶有歎哭之諫況今承顛沛萬機惟始恩未及普信未遑周臣又聞前達有言天下重器也一安不可卒危一危亦不可卒安陛下神思淵通亦當鑒之聖慮竊謂當今之務惟在萬有為己家國同憂允彼庶心從民之欲民有咨瘼之聲君表納隍之志下有愆弊之苦上無侈豫之情又應官酌其才爵疇其望與失不賞寧失不刑至若樞任重司藩扞要鎮治亂攸寄動靜所歸百度惟新或可因而弗革事在適宜無或定其出處天下多才在所用之臣非惟寄觀世路謬識其難即之於身詳見其弊何者臣雖得免牆面書不入於學伍行無愆戾自無近於才能直以廕託門世夙列榮齒且近雖奔迸江路歸命南闕竟何功效可以書賞而頻出內寵陛下綢繆數旬之中累發明詔自非才略有素聲實相任豈可聞而弗驚履而無懼固宜退省身分識恩之厚不知報答當在何期夫見危致命死而後已皆殷勤前誥重其忘生臣感先聖格言思在必效之地使生獲其志死得其所如使臣享厚祿居重榮衣狐坐熊而無事於世者固所不能安也今四夷猶警國未忘戰辮髮凶詭尤宜裁防間者天兵未獲已肆其輕漢之心恐戎狄貪惏猶懷匪遜脫以神州暫擾中夏兵饑容或遊魂塞內重窺邊壘且高秋在節胡馬興威宜圖其易蚤為之所臣每一日三省志在報效遠近小大顧其所安受效偏方得司者則慮之所辦情有不疑若首統軍政董勒天兵既才所不周實誠亦非願陛下矜諒已厚願復曲體此心護軍之任臣不敢處彭城軍府即時過立且臣本在驅馳非希崇顯輕智小號足以自安願垂鑑恕特賜申獎則內外榮荷存沒銘分上不許僧達三啟固陳上甚不說以為征虜將軍吳郡太守期歲五遷僧達彌不得意吳郭西臺寺多富沙門僧達求須不稱意乃遣主簿顧曠率門義劫寺內沙門竺法瑤得數百萬荊江反叛加僧達置佐領兵臺符聽置千人而輒立三十隊隊八十人又立宅於吳多役公力坐免官初僧達為太子洗馬在東宮愛念軍人朱靈寶及出為宣城靈寶已長僧達詐列死亡寄宣城左永之籍注以為己子改名元序啟太祖以為武陵國典衛令又以補竟陵國典書令建平國中軍將軍孝建元年春事發又加禁錮上表陳謝云不能因依左右傾意權貴上愈怒僧達族子確年少美姿容僧達與之私款確叔父休為永嘉太守當將確之郡僧達欲逼留之確知其意避不復往僧達大怒潛於所住屋後作大坑欲誘確來別因殺而埋之從弟僧虔知其謀禁呵乃止御史中丞劉瑀奏請收治上不許孝建三年除太常意尤不悅頃之上表解職曰臣自審庸短少闕宦情兼宿抱重疾年月稍甚生平素念願閑衡廬先朝追遠之恩早見榮齒曩者以親貧須養僶俛從祿解褐後府十有餘旬俄遷舍人殆不朝直實無緣坐閱宸寵尸爵家庭情計二三屢經聞啟終獲允亮賜反初服還私未用又擢為洗馬意旨優隆其令且拜許有郡缺當務處置會琅邪遷改即蒙勑往反神翰慈誘殷勤令裝成即自隨靈寶往年淪覆長溪因彼散失仰感沉恩俯銘浮寵臣釁積禍并仍丁艱罰聊及視息即蒙逮問具啟以奉營情事負舉猥多賜莅宣城極其窮躓仲春移任方冬便值虜南侵臣沗同肺腑情為義動苦求還都侍衛輦轂至止之日戎旗已搴在郡雖淺而貪得分了方拂農衣還事耕牧宣城民庶詣闕見請爾時勑亡從兄僧綽宣見留之旨闇疾寡任野心素積仍附啟苦乞且旋任還務未期亡兄臣錫奄見棄背啟解奔赴賜帶郡還都曾未淹積復除義興臣自天飛海泳豈假鱗翼徒思橫施與日而深自處官以來未嘗有涓毫之積羸疾闇疚又無人一諾而性狎林水偏愛禽魚議其所託動乖治要故收崖歛分無忘俄頃實由有待難供上裝未立東郡奉輕西郟祿重具陳蘄懇備執初願乞置江湘遠郡一二年中庶反耕之日糧藥有寄即蒙亮許當賜矜擢遭逢厄運天地崩離世蒙聖朝門情之顧及在臣身復荷殊識義雖君臣恩猶父子臣誠庸蔽心過草木奉衛之日不覺捐身單軀弱嗣千里共氣繼罹凶塗動臨危盡生微朝露不察如絲信順所扶得獲全濟再見天地重睹三光于時兄子僧亮等幽窘醜逆盡室獄戶山川嶮岨吉凶路塞悠遠之思誰能勿勞嘗膽濡足是其公願分心挂腹實亦私苦幸屬聖武剋復大業宇宙廓清四表靖晏臣父子叔姪同獲泰辰造情追尋歸骨之本欲以死明心誤有餘辰情願已展避逆向順終古常節智力無效有何勳庸而頻煩恩榮動踰分次但忽病之日不敢固辭故吞訴於鵲渚飲愧於新亭及元凶既殄人神獲乂端右之授即具陳請天慈優渥每越常倫南蠻護軍旬月私授臣三省非分必致孤負居常輕任尚懼網墨況參要內職承寵外畿其取覆折不假識見故披誠啟訴表疏相屬或乞輕高就卑或願以閑易要言誓致苦播於辭牘誠知固陋當觸明科去歲往年累犯刑禁理無申可罪有恒典虛穢朝序慚累家業臣甘其終物議其盡陛下棄其身瑕矜其貴戚迂略法憲曲相全養臣一至之感口此何忘利伊恩升加以今位當時震驚收足失所本忘閑情不敢聞命內慮於己外訪於親以為天地之仁施不期報再造之恩不可妄屬故洗拂灰壤登沐膏露上處聖澤下更生辰合芳離蛻遐邇改觀但偷榮託幸忽移此歲自見妨長轉不可寧宜其沈放志事俱盡伏願陛下承太始之德加成物之恩及臣狂蔽未至得於榮次自引聖朝厚終始之惠孤臣保不泯之澤夫讓功為高臣無功而讓專素為美臣榮采已積以是求退誠亦可愍又妻子為居更無餘累婢僕十餘粗有田入歲時是課足繼朝昏兼比日眩瞀更甚風虛漸劇湊理合閉榮衛惛底心氣沖弱神志衰散念此根疵不支歲月公私誠願宜蒙諒許乞徇餘辰以終瑣運白水皎日不足為譬願垂矜鑑哀申此請僧達文旨抑揚詔付門下侍中何偃以其詞不遜啟付南臺又坐免官頃之除江夏王義恭太傅長史臨淮太守又徙太宰長史太守如故大明元年遷左衛將軍領太子中庶子以歸順功封寧陵縣五等侯二年遷中書令先是南彭城蕃縣民高闍沙門釋曇摽道方等共相誑惑自言有鬼神龍鳳之瑞常聞簫鼓音與秣陵民藍宏期等謀為亂又要結殿中將軍苗允員外散騎侍郎嚴欣之司空參軍闞千纂太宰府將程農王恬等謀剋二年八月一日夜起兵攻宮門晨掩太宰江夏王義恭分兵襲殺諸大臣以闍為天子事發覺凡黨與死者數十人僧達屢經狂逆上以其終無悛心因高闍事陷之下詔曰王僧達餘慶所鍾早登榮觀輕險無行暴於世談值國道中艱盡室願效甄其薄誠貰其鴻慝爵遍外內身窮榮寵曾無在泮食椹懷音乃協規西楚志擾東區公行剽掠顯奪凶黨倚結群惡誣亂視聽朕每容隱思加蕩雪曾無犬馬感恩之志而炎火成燎原之勢涓流兆江河之形遂脣齒高闍契規蘇寶搜詳妖圖覘察象緯逮賊長臨梟餘黨就鞫咸布辭獄牒宣言虛市猶欲隱忍法為情屈小醜紛紜人扇方甚矯構風塵志希非覬固已達諸公卿彰于朝野朕焉得輕宗社之重行匹夫之仁殛山誅邪聖典所同戮諷翦律漢法攸尚便可收付廷尉肅正刑書故太保華容文昭公弘契闊歷朝綢繆眷遇豈容忘茲勳德忽其世祀門爵國姻一不貶絕於獄賜死時年三十六子道琰徙新安郡前廢帝即位得還京邑後廢帝元徽中為廬陵國內史未至郡卒蘇寶生蘇寶者名寶生本寒門有文義之美元嘉中立國子學為毛詩助教為太祖所知官至南臺侍御史江寧令坐知高闍反不即啟聞與闍共伏誅顏竣顏竣字士遜琅邪臨沂人光祿大夫延之子也太祖問延之卿諸子誰有卿風對曰竣得臣筆測得臣文㚟得臣義躍得臣酒竣初為太學博士太子舍人出為世祖撫軍主簿甚被愛遇竣亦盡心補益元嘉中上不欲諸王各立朋黨將召竣補尚書郎吏部尚書江湛以為竣在府有稱不宜回改上乃止遂隨府轉安北鎮軍北中郎府主簿二十八年虜自彭城北歸復求互市竣議曰愚以為與虜和親無益已然之明效何以言其然夷狄之欲侵暴正苦力之不足耳未嘗拘制信義用輟其謀昔年江上之役乃是和親之所招歷稔交聘遂求國婚朝廷羈縻之義依違不絕既積歲月漸不可誣獸心無厭重以忿怒故至於深入幸今因兵交之後華戎隔判若言互市則復開曩敝之萌議者不過言互市之利在得馬今棄此所重得彼下駟千匹以上尚不足言況所得之數裁不十百邪一相交關卒難閉絕寇負力玩勝驕黠已甚雖云互市實覘國情多贍其求則桀慠罔已通而為節則必生邊虞不如塞其端漸杜其觖望內修德化外經邊事保境以觀其釁於事為長初沙門釋僧舍粗有學義謂竣曰貧道粗見讖記當有真人應符名稱次第屬在殿下竣在彭城嘗向親人敘之言遂宣布聞於太祖時元凶巫蠱事已發故上不加推治世祖鎮尋陽遷南中郎記室參軍三十年春以父延之致仕固求解職不許賜假未發而太祖崩問至世祖舉兵入討轉咨議參軍領錄事任總外內并造檄書世祖發尋陽便有疾領錄事自沈慶之以下並不堪相見唯竣出入臥內斷決軍機時世祖屢經危篤不任咨稟凡厥眾事竣皆專斷施行世祖踐祚以為侍中俄遷左衛將軍加散騎常侍辭常侍見許封建城縣侯食邑二千戶孝建元年轉吏部尚書領驍騎將軍留心選舉自強不息任遇既隆奏無不可其後謝莊代竣領選意多不行竣容貌嚴毅莊風姿甚美賓客喧訴常歡笑答之時人為之語曰顏竣嗔而與人官謝莊笑而不與人官南郡王義宣臧質等反以竣兼領軍義宣質諸子藏匿建康秣陵湖熟江寧縣界世祖大怒免丹陽尹褚湛之官收四縣官長以竣為丹陽尹加散騎常侍先是竣未有子而大司馬江夏王義恭諸子為元凶所殺至是並各產男上自為制名名義恭子為伯禽以比魯公伯禽周公旦之子也名竣子為辟強以比漢侍中張良之子先是元嘉中鑄四銖錢輪郭形制與五銖同用費損無利故百姓不盜鑄及世祖即位又鑄孝建四銖三年尚書右丞徐爰議曰貴貨利民載自五政開鑄流圜法成九府民富國實教立化光及時移欲易則通變適用是以周漢俶遷隨世輕重降及後代財豐用足因條前寶無復改創年歷既遠喪亂屢經堙焚剪毀日月銷減貨薄民貧公私俱困不有革造將至大乏謂應式遵古典收銅繕鑄納贖刊刑著在往策今宜以銅贖刑隨罰為品詔可所鑄錢形或薄小輪郭不成就於是民間盜鑄者雲起雜以鉛錫並不牢固又剪鑿古錢以取其銅錢轉薄小稍違官式雖重制嚴刑民吏官長坐死免者相係而盜鑄彌甚百物踊貴民人患苦之乃立品格薄小無輪郭者悉加禁斷始興郡公沈慶之立議曰昔秦幣過重高祖是患普令民鑄改造榆莢而貨輕物重又復乖時太宗放鑄賈誼致譏誠以采山術存銅多利重耕戰之器曩時所用四民競造為害或多而孝文弗納民鑄遂行故能朽貫盈府天下殷富況今耕戰不用采鑄廢久鎔冶所資多因成器功艱利薄絕吳鄧之資農民不習無釋耒之患方今中興開運聖化惟新雖復偃甲銷戈而倉庫未實公私所乏唯錢而已愚謂宜聽民鑄錢郡縣開置錢署樂鑄之家皆居署內平其雜式去其雜偽官歛輪郭藏之以為永寶去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄并禁剪鑿數年之間公私豐贍銅盡事息姦偽自止且禁鑄則銅轉成器開鑄則器化為財翦華利用於事為益上下其事公卿太宰江夏王義恭議曰伏見沈慶之議聽民私鑄樂鑄之室皆入署居平其準式去其雜偽愚謂百姓不樂與官相關由來甚久又多是人士蓋不願入署凡盜鑄為利利在偽雜偽雜既禁樂入必寡云歛取輪郭藏為永寶愚謂上之所貴下必從之百姓聞官歛輪郭輪郭之價百倍大小對易誰肯為之強制使換則狀似逼奪又去春所禁新品一時施用愚謂此條在可開許又云今鑄宜依此格萬稅三千又云嚴檢盜鑄不得更造夫禁制之設非惟一旦昧利犯憲群庶常情不患制輕患在冒犯今入署必萬輸三千私鑄無十三之稅逐利犯禁居然不斷又云銅盡事息姦偽自禁愚謂赤縣內銅非可卒盡比及銅盡姦偽已積又云禁鑄則銅轉成器開鑄則器化為財然頃所患患於形式不均加以剪鑿鉛錫眾訴耳越若止於盜鑄者銅亦無須苦禁竣議曰泉貨利用近古所同輕重之議定於漢世魏晉以降未之能改誠以物貨既均改之偽生故也世代漸久弊運頓至因革之道宜有其術今云開署放鑄誠所欣同但慮採山事絕器用日耗銅既轉少器亦彌貴設器直一千則鑄之減半為之無利雖令不行又云去春所禁一時施用是欲使天下豐財若細物必行而不從公鑄利已既深情偽無極私鑄剪鑿書不可禁五銖半兩之屬不盈一年必至於盡財貨未贍大錢已竭數歲之間悉為塵土豈可令取弊之道基於皇代今百姓之貨雖為轉少而市井之民未有嗟怨此新禁初行品式未一須臾自止不足以垂聖慮唯府藏空匱實為重憂今縱行細錢官無益賦之理百姓雖贍無解官乏唯簡費去華設在節儉求贍之道莫此為貴然錢有定限而消失無方剪鑄雖息終致窮盡者亡應官開取銅之署絕器用之塗定其品式日月漸鑄歲久之後不為世益耳時議者又以銅轉難得欲鑄二銖錢竣又議曰議者將為官藏空虛宜更改鑄天下銅少宜減錢式以救交弊賑國紓民愚以為不然今鑄二銖恣行新細於官無解於乏而人姦巧大興天下之貨將靡碎至盡空立嚴禁而利深難絕不過一二年間其弊不可復救其甚不可一也今鎔鑄獲利不見有頓得一二億之理縱復得此必待彌年歲暮稅登財幣蹔革日用之費不贍數月雖權徵助何解乏邪徒使姦民意騁而貽厥愆謀此又甚不可二也民懲大錢之改兼畏近日新禁市井之間必生喧擾遠利未聞切患猥及富商得志貧民困窘此又甚不可三也若使交益深重尚不可行況又未見其利而眾弊如此失算當時取誚百代乎前廢帝即位鑄二銖錢形式轉細官錢每出民間即模效之而大小厚薄皆不及也無輪郭不磨鑢如今之剪鑿者謂之耒子景和元年沈慶之啟通私鑄由是錢貨亂改一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢入水不沉隨手破碎市井不復料數十萬錢不盈一掬斗米一萬商貨不行太宗初唯禁鵝眼綖環其餘皆通用復禁民鑄官署亦廢工尋復並斷唯用古錢竣自散騎常侍丹陽尹加中書令丹陽尹如故表讓中書令曰虛竊國靈坐招禁要聞命慚惶形魂震越臣東州凡鄙生微於時長自閭閻不窺官轍門無富貴志絕華伍直以委身壟畝饑寒交切先朝陶均庶品不遺愚賤得免耕稅之勤廁仕進之末陛下盛德居蕃總攬英異越以不才超塵清軌奉躬歷稔勞效莫書仰恃曲成之仁畢願守宰之秩豈期天地中闋殷憂啟聖倚附興運擢景神塗雲飛海泳冠絕倫等曾未三期殊命八萃詳料賞典則臣不應科瞻言勤良則臣與侔貴方欲訴款皇朝降階盛序微已國言少徹身謗而制書猥下爵樹彌隆臣小人也不及遠謀寵利之來何能居約徒以上瀆天明下汨彝議災謫之興懼必在邇今之過授以先微身苟曰非據危辱將及十手所指諭等膏肓所以寤寐兢遽維縈苦疾者也伏願陛下察其丹誠矜其疾願絕會收恩以全愚分則造化之施方茲為薄見許時歲旱民饑竣上言禁餳一月息米近萬斛復代謝莊為吏部尚書領太子左衛率未拜丁憂起為右將軍丹陽尹如故竣藉蕃朝之舊極陳得失上自即吉之後多所興造竣諫爭懇切無所回避上意甚不說多不見從竣自謂才足幹時恩舊莫比當贊務居中永執朝政而所陳多不被納疑上欲疏之乃求外出以占時旨大明元年以為東揚州刺史將軍如故所求既許便憂懼無計至州又丁母艱不許去職聽送喪還都恩待猶厚竣彌不自安每對親故頗懷怨憤又言朝事違謬人主得失及王僧達被誅謂為竣所讒構臨死陳竣前後忿懟每恨言不見從僧達所言頗有相符據上乃使御史中丞庾徽之奏之曰臣聞人臣之奉主毀家光國竭情無私若乃無禮陵人怙富卑上是以王叔作戒子皙為戮未有背本塞原好利忘義而得自容盛世溷亂清流者也右將軍東揚州刺史建城縣開國侯顏竣因附風雲謬蒙翼長天地更造拔以非次聖朝親攬萬務一歸而窺覘國柄潛圖秉執受任選曹驅扇滋甚出尹京輦形勢彌放傳詔犯憲舊須啟聞而竣以通訴忤己輒加鞭辱罔顧威靈莫此為甚嚴詔屢發當官責效竣權恣不行怨懟彌起懷挾姦數苞藏陰慝預聞中旨罔不宣露罰則委上恩必歸己荷遇之門即加謗辱受譴之室曲相哀撫翻戾朝紀狡惑視聽脅懼上宰激動閭閻末上慮聞內懷猜懼偽請東牧以卜天旨既獲出蕃怨詈方肆反脣腹誹方之已輕且時有啟奏必協姦私宣示親朋動作群小前冬母亡詔賜還葬事畢不去盤桓經時方構間勳貴造立同異又表示危懼深營身觀曲訪大臣慮不全立遂以己被斥外國道將顛釁積懷抱惡窮辭色兼行闕於家早負世議逮身居崇寵奉兼萬金榮以夸親祿不充養宿憾母弟恃貴輒戮天倫怨毒親交辰駭凡所莅任皆闕政刑輒開丹陽庫物貸借吏下多假資禮解為門生充朝滿野殆將千計驕放自下妨公害私取監解見錢以供帳下賓旅酣歌不異平日街談道說非復風聲竣代都文吏特荷天私棄瑕錄用豫參要重勞無汗馬賞班河山出內寵靈踰越倫伍山川之性日月彌滋溪壑之心在盈彌奓虎冠狼貪未足為譬今皇明開耀品物咸亨傷俗點化實唯害焉宜加顯戮以彰盛化請以見事免竣所居官下太常削爵土須事御收付廷尉法獄罪上未欲便加大戮且止免官竣頻啟謝罪并乞性命上愈怒詔答曰憲司所奏非宿昔所以相期卿受榮遇故當極此訕訐怨憤已孤本望乃復過煩思慮懼不自全豈為下事上誠節之至邪及竟陵王誕為逆因此陷之召御史中丞庾徽之於前為奏奏成詔曰竣孤負恩養乃可至此於獄賜死妻息宥之以遠子辟強徙送交州又於道殺之竣文集行於世史臣曰世祖弱歲臨蕃涵道未廣披胸解帶義止賓僚及運鍾傾陂身危慮切擢膽抽肝猶患言未盡也至於馮玉負扆威行萬物欲有必從事無暫失既而憂歡異日甘苦變心主挾今情臣追昔款宋昌之報上賞已行同舟之慮下望愈結嫌怨既萌誅責自起竣之取釁於世蓋由此乎為人臣者若能事主而捐其私立功而忘其報雖求顛陷不可得也
