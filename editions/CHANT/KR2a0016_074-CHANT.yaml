body:
  text: 卷七十七列傳第三十七柳元景柳元景字孝仁河東解人也曾祖卓自本郡遷於襄陽官至汝南太守祖恬西河太守父憑馮翊太守元景少便弓馬數隨父伐蠻以勇稱寡言有器質荊州刺史謝晦聞其名要之未及往而晦敗雍州刺史劉道產深愛其能元景時居父憂未得加命會荊州刺史江夏王義恭召之道產謂曰久規相屈今貴王有召難輒相留乖意以為惘惘服闋補江夏王國中軍將軍遷殿中將軍復為義恭司空行參軍隨府轉司徒太尉城局參軍太祖見又嘉之先是劉道產在雍州有惠化遠蠻悉歸懷皆出緣沔為村落戶口殷盛及道產死群蠻大為寇暴世祖西鎮襄陽義恭以元景為將帥即以為廣威將軍隨郡太守既至而蠻斷驛道欲來攻郡郡內少糧器仗又乏元景設方略得六七百人分五百人屯驛道或曰蠻將逼城不宜分眾元景曰蠻聞郡遣重戍豈悟城內兵少且表裏合攻於計為長會蠻垂至乃使驛道為備潛出其後戒曰火舉馳進前後俱發蠻眾驚擾投鄖水死者千餘人斬獲數百郡境肅然無復寇抄朱修之討蠻元景又與之俱後又副沈慶之征鄖山進克太陽除世祖安北府中兵參軍隨王誕鎮襄陽為後軍中兵參軍及朝廷大舉北討使諸鎮各出軍二十七年八月誕遣振威將軍尹顯祖出貲谷奮武將軍魯方平建武將軍薛安都略陽太守龐法起入盧氏廣威將軍田義仁入魯陽加元景建威將軍總統群帥後軍外兵參軍龐季明年已七十三秦之冠族羌人多附之求入長安招懷關陝乃自貲谷入盧氏盧氏人趙難納之弘農強門先有內附意故委季明投之十月魯方平薛安都龐法起進次白亭時元景猶未發法起率方平安都諸軍前入自修陽亭出熊耳山季明進達高門木城值永昌王入弘農乃回還盧氏據險自固頃之招盧氏少年進入宜陽苟公谷以扇動義心元景以其月率軍繼進閏月法起安都方平諸軍入盧氏斬縣令李封以趙難為盧氏令加奮武將軍難驅率義徒以為眾軍鄉導法起等度鐵嶺山次開方口季明出自本城與法起相會元景大軍次臼口以前鋒深入懸軍無繼馳遣尹顯祖入盧氏以為軍援元景以軍食不足難可曠日相持乃束馬懸車引軍上百丈崖出溫谷以入盧氏法起諸軍進次方伯堆去弘農城五里賊遣兵二千餘人覘候法起縱兵夾射之賊騎退走諸軍造攻具進兵城下偽弘農太守李初古拔嬰城自固法起安都方平諸軍鼓譟以陵城季明趙難並率義徒相繼而進衝車四臨數道俱攻士皆殊死戰莫不奮勇爭先時初古拔父子據南門督其處距戰弘農人之在城內者三千餘人於北樓豎白幡或射無金箭安都軍副譚金薛係孝率眾先登生禽李初古拔父子二人魯方平入南門生禽偽郡丞百姓皆安堵元景引軍度熊耳山安都頓軍弘農法起進據潼關季明率方平趙難軍向陝西七里谷殿中將軍鄧盛幢主劉驂亂使人入荒田招宜陽人劉寬糾率合義徒二千餘人共攻金門島屠之殺戍主李買得古拔子也為虜永昌王長史勇冠戎類永昌聞其死若失左右手誕又遣長流行參軍姚範領三千人向弘農受元景節度十一月元景率眾至弘農營於開方口仍以元景為弘農太守置吏佐初安都留屯弘農而諸軍已進陝元景既到謂安都曰無為坐守空城而令龐公深入此非計也宜急進軍可與顯祖并兵就之吾須督租畢尋後引也眾並造陝下即入郭城列營於城內以逼之並大造攻具賊城臨河為固恃險自守季明安都方平顯祖趙難諸軍頻三攻未拔虜洛州刺史地河公張是連提眾二萬度崤來救安都方平各列陣城南以待之顯祖勒精卒以為後柱季明率高明宜陽義兵當南門而陣趙難領盧氏樂從少年與季明為掎角賊兵大合輕騎挑戰安都瞋目橫矛單騎突陣四向奮擊左右皆辟易不能當殺傷不可勝數於是眾軍並鼓噪俱前士皆殊死戰虜初縱突騎眾軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩當衫馬亦去具裝馳奔以入賊陣猛氣咆𠷺所向無前當其鋒者無不應刃而倒賊忿之夾射不能中如是者數四每一入眾無不披靡初元景令將魯元保守函谷關賊眾既盛元保不能自固乃率所領作函箱陣多列旗幟緣險而還正會安都諸軍與賊交戰三虜郎將見元保軍從山下以為元景大眾至日且暮賊於是奔退騎多得入城賊之將至也方平遣驛騎告元景時諸軍糧盡各餘數日食元景方督義租并上驢馬以為運糧之計而方平信至元景遣軍副柳元怙簡步騎二千以赴陝急卷甲兼行一宿而至詰朝賊眾又出列陳於城外方平諸軍並成列安都并領馬軍方平悉勒步卒左右掎角之餘諸義軍並於城西南列敶方平謂安都曰今勍敵在前堅城在後是吾取死之日卿若不進我當斬卿我若不進卿當斬我也安都曰善卿言是也我豈惜身命乎遂合戰時元怙方至悉偃旗鼓士馬皆銜枚潛師伏甲而進賊未之覺也方平等方與虜交鋒而元怙勒眾從城南門函道直出北向結陳旌旗甚盛鼓譟而前出賊不意虜眾大駭元怙與幢主宗越率手下猛騎以衝賊陳一軍皆馳之安都方平等督諸軍一時齊奮士卒無不用命安都不堪其憤橫矛直前出入賊陳殺傷者甚多流血凝肘矛折易之復入軍副譚金率騎從而奔之自詰旦而戰至于日昃虜眾大潰斬張是連提又斬三千餘級投河赴塹死者甚眾面縛軍門者二千餘人元景輕騎晨至虜兵之面縛者多河內人元景詰之曰汝等怨王澤不浹請命無所今並為虜盡力便是本無善心順附者存拯從惡者誅滅欲知王師正如此爾皆曰虐虜見驅後出赤族以騎蹙步未戰先死此親將軍所見非敢背中國也諸將欲盡殺之元景以為不可曰今王旗北掃當令仁聲先路乃悉釋而遣之家在關裏者符守關諸軍聽出皆稱萬歲而去誕以崤陝既定其地宜撫以弘農劉寬虯行東弘農太守給元景鼓吹一部法起率眾次于潼關先是建義將軍華山太守劉槐糾合義兵攻關城拔之力少不固頃之又集眾以應王師法起次潼關槐亦至賊關城戍主婁須望旗奔潰虜眾溺於河者甚眾法起與槐即據潼關虜蒲城鎮主遣偽帥何難於封陵堆列三營以擬法起法起長驅入關行王檀故壘虜謂直向長安何難率眾欲濟河以截軍後法起回軍臨河縱兵射之賊退散關中諸義徒並處處鋒起四山羌胡咸皆請奮誕又遣揚武將軍康元撫領二千人出上洛受元景節度援方平於函谷元景去賊眾向關時軍中食盡元景回據白楊嶺賊定未至更下山進弘農入湖關口虜蒲阪戍主沃州刺史杜道生率眾二萬至闅鄉水去湖關一百二十里元景募精勇一千人夜斫賊營迷失道天曉而反道生率手下驍銳縱兵射之鋒刃既交虜又奔散時北討諸軍王玄謨等敗退虜遂深入太祖以元景不宜獨進且令班師元景乃率諸將自湖關度白楊嶺出于長洲安都斷後宗越副之法起自潼關向商城與元景會季明亦從胡谷南歸並有功而入士馬旌旗甚盛誕登城望之以鞍下馬迎元景除寧朔將軍京兆廣平二郡太守於樊城立府舍率所領居之統行北蠻事龐季明為定蠻長薛安都為後軍行參軍魯方平為寧蠻參軍臧質為雍州除元景為冠軍司馬襄陽太守將軍如故魯爽向虎牢復使元景率安都等北出至關城關城棄戍走即據之元景至洪關欲進與安都濟河攻杜道生於蒲阪會爽退復還再出北討威信著於境外又使率所領進西陽會伐五水蠻世祖入討元凶以為諮議參軍領中兵加冠軍將軍太守如故配萬人為前鋒宗愨薛安都等十三軍皆隸焉元景與朝士書曰國禍冤深凶人肆逆民神崩憤若無天地南中郎親率義師剪討元惡司徒臧冠軍並同大舉舳艫千里購賞之利備之元景不武忝任行間總勒精勇先鋒道路勢乘上流眾兼百倍諸賢弈世忠義身為國良皆受遇先朝荷榮日久而拘逼寇廷莫由申效想聞今問悲慶兼常大行屆道廓清惟始企遲面對展雪哀情時義軍船率小陋慮水戰不敵至蕪湖元景大喜倍道兼行聞石頭出戰艦乃於江寧步上於板橋立柵以自固進據陰山遣薛安都率馬軍至南岸元景潛至新亭依山建壘東西據險世祖復遣龍驤將軍行參軍程天祚率眾赴之天祚又於東南據高丘屯砦柵凡歸順來奔者皆勸元景速進元景曰不然理順難恃同惡相濟輕進無防實啟寇心當倚我之不可勝豈幸寇之不攻哉元景壘營未立為龍驤將軍詹叔兒覘知之勸劭出戰不許經日乃水陸出軍劭自登朱雀門督戰軍至瓦官寺與義軍游邏相逢游邏退走賊遂薄壘劭以元景壘塹未立可得平地決戰既至柴柵已堅倉卒無攻具便使肉薄攻之元景宿令軍中曰鼓繁氣易衰叫數力易竭但各銜枚疾戰一聽吾營鼓音賊步將魯秀王羅漢劉簡之騎將常伯與等及其士卒皆殊死戰劉簡之先攻西南頻得燒草舫略渡人程天祚柴未立亦為所摧王羅漢等攻壘北門賊艦亦至元景水陸受敵意氣彌強麾下勇士悉遣出戰左右唯留數人宣傳分軍助程天祚天祚還得固柴因此破賊元景察賊衰竭乃命開壘鼓譟以奔之賊眾大潰赴淮死者甚多劭更率餘眾自來攻壘復大破之其所殺傷過於前戰劭手斬退者不能禁奔還宮僅以身免蕭斌被創簡之收兵而止陳猶未散元景復出薄之乃走競投死馬澗澗為之滿斬簡之及軍主姚叔藝王江寶朱明智諸葛邈之等水軍主褚湛之副劉道存並來歸順上至新亭即位以元景為侍中領左衛將軍轉使持節監雍梁南北秦四州荊州之竟陵隨二郡諸軍事前將軍寧蠻校尉雍州刺史上在巴口問元景事平何所欲對曰若有過恩願還鄉里故有此授初臧質起義以南譙王義宣闇弱易制欲相推奉潛報元景使率所領西還元景即以質書呈世祖語其使曰臧冠軍當是未知殿下義舉爾方應伐逆不容西還質以此恨之及元景為雍州刺史質慮其為荊州後患建議爪牙不宜遠出上重違其言更以元景為護軍將軍領石頭戍事不拜徙領軍將軍加散騎常侍曲江縣公食邑三千戶孝建元年正月魯爽反遣左衛將軍王玄謨討之加元景撫軍假節置佐後玄謨復以為都督雍梁南北秦四州荊州之竟陵隨二郡諸軍事撫軍將軍領寧蠻校尉雍州刺史持節如故臧質義宣並反玄謨南據梁山夾江為壘垣護之薛安都渡據歷陽元景出屯采石玄謨聞賊盛遣司馬管法濟求益兵上使元景進屯姑熟元景使將武念前進質遣將龐法起襲姑熟值念至擊破之法起單船走質攻陷玄謨西壘玄謨使垣護之告元景曰今餘東岸萬人賊軍數倍強弱不敵謂宜還就節下協力當之元景謂護之曰師有常刑不可先退賊眾雖多猜而不整今當卷甲赴之護之曰逆徒皆云南州有三萬人而麾下裁十分之一若往造賊虛實立見則賊氣成矣元景納其言悉遣精兵助玄謨以羸弱居守所遣軍多張旗幟梁山望之如數萬人皆曰京師兵悉至於是眾心乃安由是克捷上遣丹陽尹顏竣宣旨慰勞與沈慶之俱以本號開府儀同三司封晉安郡公邑如故固讓開府儀同復為領軍太子詹事加侍中尋轉驃騎將軍本州大中正領軍侍中如故大明二年復加開府儀同三司又固讓明年遷尚書令太子詹事侍中中正如故以封在嶺南秋輸艱遠改封巴東郡公五年又命左光祿大夫開府儀同三司侍中令中正如故又讓開府乃與沈慶之俱依晉密陵侯鄭袤不受司空故事事在慶之傳六年進司空侍中令中正如故又固讓乃授侍中驃騎將軍南兗州刺史留衛京師世祖晏駕與太宰江夏王義恭尚書僕射顏師伯並受遣詔輔幼主遷尚書令領丹陽尹侍中將軍如故給班劍二十人固辭班劍元景起自將帥及當朝理務雖非所長而有弘雅之美時在朝勳要多事產業唯元景獨無所營南岸有數十畝菜園守園人賣得錢二萬送還宅元景曰我立此園種菜以供家中啖爾乃復賣菜以取錢奪百姓之利邪以錢乞守園人世祖嚴暴異常元景雖荷寵遇恒慮及禍太宰江夏王義恭及諸大臣莫不重足屏氣未嘗敢私往來世祖崩義恭元景等並相謂曰今日始免橫死義恭與義陽等諸王元景與顏師伯等常相馳逐聲樂酣酒以夜繼晝前廢帝少有凶德內不能平殺戴法興後悖情轉露義恭元景等憂懼無計乃與師伯等謀廢帝立義恭日夜聚謀而持疑不能速決永光年夏元景遷使持節督南豫之宣城諸軍事即本號開府儀同三司南豫州刺史侍中令如故未拜發覺帝親率宿衛兵自出討之先稱詔召元景左右奔告兵刃非常元景知禍至整朝服乘車應召出門逢弟車騎司馬叔仁戎服率左右壯士數十人欲拒命元景苦禁之既出巷軍士大至下車受戮容色恬然時年六十長子慶宗有幹力而情性不倫世祖使元景送還襄陽於道中賜死次子嗣宗豫章王子尚車騎從事中郎嗣宗弟紹宗茂宗孝宗文宗仲宗成宗秀宗叔仁叔仁弟衛軍諮議參軍僧珍等諸弟姪在京邑及襄陽從死者數十人元景少子承宗及嗣宗子纂並在孕獲全太宗即位令曰故侍中尚書令驃騎大將軍巴東郡開國公新除開府儀同三司南豫州刺史元景風度弘簡體局深沈正義亮時恭素範物幽明道盡則首贊孝圖盛運開歷則毗燮皇化方任孚漢輔業懋殷衡而蜂豺肆濫顯加禍毒冤動勳烈悲深朝貫朕承七廟之靈纂臨寶業情典既申痛悼彌軫宜崇賁徽冊以旌忠懿可追贈使持節都督南豫江二州諸軍事太尉侍中刺史國公如故給班劍三十人羽葆鼓吹一部諡曰忠烈公叔仁為梁州刺史黃門郎以破臧質功封宜陽侯食邑八百戶元怙元景從兄元怙大明末代叔仁為梁州與晉安王子勛同逆事敗歸降先宗元景從父弟先宗大明初為竟陵王誕司空參軍誕作亂殺之追贈黃門侍郎光世元景從祖弟光世先留鄉里索虜以為折衝將軍河北太守封西陵男光世姊夫偽司徒崔浩虜之相也元嘉二十七年虜主拓跋燾南寇汝潁浩密有異圖光世要河北義士為浩應浩謀泄被誅河東大姓坐連謀夷滅者甚眾光世南奔得免太祖以為振武將軍前廢帝景和中左將軍直閤太宗定亂光世參謀以為右衛將軍封開國縣侯食邑千戶既而四方反叛同閤宗越譚金又誅光世乃北奔薛安都安都使守下邳城及安都招引索虜光世率眾歸降太宗宥之以為順陽太守子欣慰謀反光世賜死顏師伯顏師伯字長淵琅邪臨沂人東揚州刺史竣族兄也父邵剛正有局力為謝晦所知晦為領軍以為司馬廢立之際與之參謀晦鎮江陵請為諮議參軍領錄事軍府之務悉委焉邵慮晦將有禍求為竟陵太守未及之郡值晦見討晦與邵謀起兵距朝廷邵飲藥死師伯少孤貧涉獵書傳頗解聲樂劉道產為雍州以為輔國行參軍弟師仲妻臧質女也質為徐州辟師伯為主簿衡陽王義季代質為徐州質薦師伯於義季義季即命為征西行參軍興安侯義賓代義季世祖代義賓仍為輔國安北行參軍王景文時為諮議參軍愛其諧敏進之世祖師伯因求杖節乃以為徐州主簿善於附會大被知遇及去鎮師伯以主簿送故世祖鎮尋陽啟太祖請為南中郎府主簿太祖不許謂典籤曰中郎府主簿那得用顏師伯世祖啟為長流正佐太祖又曰朝廷不能除之郎可自板亦不宜署長流世祖乃板為參軍事署刑獄及入討元凶轉主簿世祖踐阼以為黃門侍郎隨王誕驃騎長史南郡太守改為驃騎大將軍長史南濮陽太守御史中丞臧質反出為寧遠將軍東陽太守領兵置佐以備東道事寧復為黃門侍郎領步兵校尉改領前軍將軍徙御史中丞遷侍中上以伐逆寧亂事資群謀大明元年下詔曰昔歲國難方結疑懦者眾故散騎常侍太子右率龐秀之履嶮能貞首暢義節用使狡狀先聞軍備夙固醜逆時殄頗有力焉追念厥誠無忘于懷侍中祭酒顏師伯侍中領射聲校尉袁愍孫豫章太守王謙之太子前中庶子領右衛率張淹爰始入討預參義謀契闊大難宜蒙殊報秀之可封樂安縣伯食邑六百戶師伯平都縣子愍孫興平縣子謙之石陽縣子淹廣晉縣子食邑各五百戶師伯遷右衛將軍母憂去職二年起為持節督青冀二州徐州之東安東莞兗州之濟北三郡諸軍事輔國將軍青冀二州刺史其年索虜拓跋濬遣偽散騎常侍鎮西將軍天水公拾賁敕文率眾寇清口清口戍主振威將軍傳乾愛率前員外將軍周盤龍等擊大破之世祖遣虎賁主龐孟虯積射將軍殷孝祖等赴討受師伯節度師伯遣中兵參軍苟思達與孟虯合力行達沙溝虜窟瓌公五軍公等馬步數萬迎軍拒戰孟虯等奮擊盡日孟虯手斬五軍公虜於是大奔孝祖又斬窟瓌公赴水死者千計虜又遣河南公黑水公濟州公青州刺史張懷之等屯據濟岸師伯又遣中兵參軍江方興就傅乾愛擊破之斬河南公樹蘭等虜別帥它門又遣萬餘人攻清口戍城乾愛方興出城拒戰即斬它門餘眾奔走虜天天公又率二萬人復來逼城乾愛等出戰又破之追奔至赤龍門殺賊甚眾上嘉其功詔曰虜驅率大羊規暴邊塞輔國將軍青冀二州刺史師伯宣略命師合變應機濟戍奮怒一月四捷支軍異部騁勇齊效頻梟名王大殲群醜朕用嘉嘆良深于懷可遣使慰勞并符輔國府詳考功最以時言上苟思達龐孟虯等又追虜至杜梁虜眾多四面俱合平南參軍童太壹及苟思達等並單騎出湯應手披靡孟虯等繼至虜乃散走透河死者甚多既而虜更合眾大至孟虯等又破之世祖又遣司空參軍卜天生助師伯張懷之據縻溝城師伯遣天生等破之懷之出城逆戰天生率軍主劉懷珍白衣客朱士義殿中將軍孟繼祖等擊之懷之敗走入城僅以身免繼祖於陳遇害追贈郡守又虜隴西王等屯據申城背濟向河三面險固天生又率眾攻之朱士義等貫甲先登賊赴河死者無算即日陷城虜天水公又攻樂安城建威將軍平原樂安二郡太守分武都與卜天生等拒擊大破之虜乃奔退追戰克捷直至清口虜攻圍傅乾愛乾愛隨方拒對孝祖等既至虜徹圍遁走師伯進號征虜將軍三年竟陵王誕反師伯遣長史嵇玄敬率五千人赴難四年徵為侍中領右軍將軍親幸隆密群臣莫二遷吏部尚書右軍如故上不欲威柄在人親覽庶務前後領選者唯奉行文書師伯專情獨斷奏無不可遷侍中領右衛將軍七年補尚書右僕射時分置二選陳郡謝莊琅邪王曇生並為吏部尚書師伯子舉周旋寒人張奇為公車令上以奇資品不當使兼市買丞以蔡道惠代之令史潘道栖褚道惠顏禕之元從夫任澹之石道兒黃難周公選等抑道惠敕使奇先到公車不施行奇兼市買丞事師伯坐以子領職莊曇生免官道栖道惠棄市禕之等六人鞭杖一百師伯尋領太子中庶子雖被黜挫受任如初世祖臨崩師伯受遺詔輔幼主尚書中事專以委之廢帝即位復還即真領衛尉師伯居權日久天下輻輳游其門者爵位莫不踰分多納貨賄家產豐積伎妾聲樂盡天下之選園池第宅冠絕當時驕奢淫恣為衣冠所嫉又遷尚書右僕射領丹陽尹廢帝欲親朝政發詔轉師伯為左僕射加散騎常侍以吏部尚書王景文為右僕射奪其京尹又分臺任師伯至是始懼尋與太宰江夏王義恭柳元景同誅時年四十七六子並幼皆見殺弟師仲中書郎晉陵太守師叔司徒主簿南康相太宗即位詔曰故散騎常侍僕射領丹陽尹平都縣子師伯昔逢代運豫班榮賞遭罹厄會隕命淫刑宗嗣殄絕良用矜悼但其心瀆貨宜貶贈典可紹封社以慰冤魂諡曰荒子師仲子幹繼封齊受禪國除沈慶之沈慶之字弘先吳興武康人也兄敞之為趙倫之征虜參軍監南陽郡擊蠻有功遂即真慶之少有志力孫恩之亂也遣人寇武康慶之未冠隨鄉族擊之由是以勇聞荒擾之後鄉邑流散慶之躬耕壟畝勤苦自立年三十未知名往襄陽省兄倫之見而賞之倫之子伯符時為竟陵太守倫之命伯符版為寧遠中兵參軍竟陵蠻屢為寇慶之為設規略每擊破之伯符由此致將帥之稱伯符去郡又別討西陵蠻不與慶之相隨無功而反永初二年慶之除殿中員外將軍又隨伯符隸到彥之北伐伯符病歸仍隸檀道濟道濟還白太祖稱慶之忠謹曉兵上使領隊防東掖門稍得引接出入禁省出戍錢唐新城及還領淮陵太守領軍將軍劉湛知之欲相引接謂之曰卿在省年月久比當相論慶之正色曰下官在省十年自應得轉不復以此仰累尋轉正員將軍及湛被收之夕上開門召慶之慶之戎服履靺縛袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服遣收吳郡太守劉斌殺之遷始興王濬後軍行參軍員外散騎侍郎元嘉十九年雍州刺史劉道產卒群蠻大動征西司馬朱脩之討蠻失利以慶之為建威將軍率眾助脩之脩之失律下獄慶之專軍進討大破緣沔諸蠻禽生口七千人進征湖陽又獲萬餘口遷廣陵王誕北中郎中兵參軍領南東平太守又為世祖撫軍中兵參軍世祖以本號為雍州隨府西上時蠻寇大甚水陸梗礙世祖停大隄不得進分軍遣慶之掩討大破之降者二萬口世祖至鎮而驛道蠻反殺深式遣慶之又討之王玄謨領荊州王方回領臺軍並會平定諸山獲七萬餘口鄖山蠻最強盛魯宗之屢討不能克慶之剪定之禽三萬餘口還京師復為廣陵王誕北中郎中兵參軍加建威將軍南濟陰太守雍州蠻又為寇慶之以將軍太守復與隨王誕入沔既至襄陽率後軍中兵參軍柳元景隨郡太守宗愨振威將軍劉顒司空參軍魯尚期安北參軍顧彬馬文恭左軍中兵參軍蕭景嗣前青州別駕崔目連安蠻參軍劉雍之奮威將軍王景式等二萬餘人伐沔北諸山蠻宗愨自新安道入太洪山元景從均水據五水嶺文恭出蔡陽口取赤係島景式由延山下向赤圻阪目連尚期諸軍八道俱進慶之取五渠頓破塢以為眾軍節度前後伐蠻皆山下安營以迫之故蠻得據山為阻於矢石有用以是屢無功慶之乃會諸軍於茹丘山下謂眾曰今若緣山列旆以攻之則士馬必損去歲蠻田大稔積穀重巖未有饑弊卒難禽剪今令諸軍各率所領以營于山上出其不意諸蠻必恐恐而乘之可不戰而獲也於是諸軍並斬山開道不與蠻戰鼓譟上山衝其腹心先據險要諸蠻震擾因其懼而圍之莫不奔潰自冬至春因糧蠻穀頃之南新郡蠻帥田彥生率部曲卜封六千餘人反叛攻圍郡城慶之遣元景率五千人赴之軍未至郡已被破焚燒城內倉儲及廨舍蕩盡并驅略降戶屯據白楊山元景追之至山下眾軍悉集圍山數重宗愨率其所領先登眾軍齊力急攻大破之威震諸山群蠻皆稽顙慶之患頭風好著狐皮帽群蠻惡之號曰蒼頭公每見慶之軍輒畏懼曰蒼頭公已復來矣慶之引軍自茹丘山出檢城大破諸山斬首三千級虜生蠻二萬八千餘口降蠻三萬五千口牛馬七百餘頭米粟九萬餘斛隨王誕築納降受俘二城於白楚慶之復率眾軍討幸諸山犬羊蠻緣險築重城施門櫓甚峻山多木石積以為礧立部曲建旌旗樹長帥鐵馬成群慶之連營山下營中開門相通又命諸軍各穿池於營內朝夕不外汲兼以防蠻之火頃之風甚蠻夜下山人提一炬以燒營營內多幔屋及草庵火至輒以池水灌滅諸軍多出弓弩夾射之蠻散走慶之令諸軍斬山開道攻之而山高路險暑雨方盛乃置東岡蜀山宜民西柴黃徼上夌六戍而還蠻被圍守日久並饑乏自後稍出歸降慶之前後所獲蠻並移京邑以為營戶二十七年遷太子步兵校尉其年太祖將北討慶之諫曰馬步不敵為日已久矣請舍遠事且以檀到言之道濟再行無功彥之失利而返今料王玄謨等未踰兩將六軍之盛不過往時將恐重辱王師難以得志上曰小醜竊據河南修復王師再屈自別有以亦由道濟養寇自資彥之中塗疾動虜所恃唯馬夏水浩汗河水流通泛舟北指則碻磝必走滑臺小戍易可覆拔克此二戍館穀弔民虎牢洛陽自然不固比及冬間城守相接虜馬過河便成禽也慶之又固陳不可丹陽尹徐湛之吏部尚書江湛並在坐上使湛之等難慶之慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟上大笑及北討慶之副玄謨向碻磝戍主棄城走玄謨圍滑臺慶之與蕭斌留碻磝仍領斌輔國司馬玄謨攻滑臺積旬不拔虜主拓跋燾率大眾南向斌遣慶之率五千人救玄謨慶之曰玄謨兵疲眾老虜寇已逼各軍營萬人乃可進耳少軍輕往必無益也斌固遣令去會玄謨退斌將斬之慶之固諫乃止太祖後問何故諫斌殺玄謨對曰諸將奔退莫不懼罪自歸而死將至逃散且大兵至未宜自弱故以攻為便耳蕭斌以前驅敗績欲死固碻磝慶之曰夫深入寇境規求所欲退敗如此何可久住今青冀虛弱而坐守窮城若虜眾東過青東非國家有也碻磝孤絕復作朱修之滑臺耳會詔使至不許退諸將並謂宜留斌復問計於慶之慶之曰閫外之事將所得專詔從遠來事勢已異節下有一范增而不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰眾人雖見古今不如下官耳學也玄謨自以退敗求戍碻磝斌乃還歷城申坦垣護之共據清口慶之乘驛馳歸未至上驛詔止之使還救玄謨會虜已至彭城不得向北太尉江夏王義恭留領府中兵參軍拓跋燾至卯山義恭遣慶之率三千人拒之慶之以為虜眾強往必見禽不肯行太祖後謂之曰河上處分皆合事宜惟恨不棄碻磝耳卿在左右久偏解我意正復違詔濟事亦無嫌也二十七年使慶之自彭城徙流民數千家於瓜步征北參軍程天祚徙江西流民於南州亦如之二十九年復更北伐慶之固諫不從以立議不同不使北出是時亡命司馬黑石廬江叛吏夏侯方進在西陽五水誑動群蠻自淮汝至于江沔咸罹其患十月遣慶之督諸將討之詔江豫荊雍並遣軍受慶之節度三十年正月世祖出次五洲總統群帥慶之從巴水出至五洲諮受軍略會世祖典籤董元嗣自京師還陳元凶弒逆世祖遣慶之還山引諸軍慶之謂腹心曰蕭斌婦人不足數其餘將帥並是所悉皆易與耳東宮同惡不過三十人此外屈逼必不為用力今輔順討逆不憂不濟也眾軍既集假慶之征虜將軍武昌內史領府司馬世祖還至尋陽慶之及柳元景等並以天下無主勸世祖即大位不許賊劭遣慶之門生錢無忌齋書說慶之解甲慶之執無忌白世祖世祖踐阼以慶之為領軍將軍加散騎常侍尋出為使持節督南兗豫徐兗四州諸軍事鎮軍將軍南兗州刺史常侍如故鎮盱眙上伐逆定亂思將帥之功下詔曰朕以不天有生罔二泣血千里志復深逆鞠旅伐罪義氣雲踴群帥仗節指難如歸故曾未積旬宗社載穆遂以眇身猥纂大統永念茂庸思崇徽錫新除使持節散騎常侍都督南兗豫徐兗四州諸軍事鎮軍將軍南兗州刺史沈慶之新除散騎常侍領軍將軍柳元景新除散騎常侍右衛將軍宗愨督兗州諸軍事輔國將軍兗州刺史徐遺寶寧朔將軍始興太守沈法系驃騎諮議參軍顧彬之或盡誠謀初宣綜戎略或受命元帥一戰寧亂或稟奇軍統協規效捷偏師奉律勢振東南皆忠國忘身義高前烈功載民聽誠簡朕心定賞策勳茲焉攸在宜列土開邑永蕃皇家慶之可封南昌縣公元景曲江縣公並食邑三千戶愨洮陽縣侯食邑二千戶遣寶益陽縣侯食邑一千五百戶法系平固縣侯彬之陽新縣侯並食邑千戶又特臨軒召拜又使慶之自盱眙還鎮廣陵孝建元年正月魯爽反上遣左衛將軍王玄謨討之軍泝淮向壽陽總統諸將尋聞荊江二州並反徵慶之入朝率所領屯武帳崗甲仗五十人入六門魯爽先遣弟瑜進據蒙蘢歷陽太守張幼緒率軍討瑜值爽至眾散而反乃遣慶之濟江討爽爽聞慶之至連營稍退自留斷後慶之與薛安都等進與爽戰安都臨陣斬爽進慶之號鎮北大將軍進督青冀幽三州給鼓吹一部前軍破賊轉位等後至追躡一階尋與柳元景俱開府儀同三司辭改封始興郡公戶邑如故慶之以年滿七十固請辭事上嘉其意許之以為侍中左光祿大夫開府儀同三司又固讓上不許表疏數十上又面陳曰張良名賢漢高猶許其退臣有何用必為聖朝所須乃至稽顙自陳言輒泣涕上不能奪聽以郡公罷就第月給錢十萬米百斛衛史五十人大明元年又申前命復固辭三年司空竟陵王誕據廣陵反復以慶之為使持節都督南兗徐兗三州諸軍事車騎大將軍開府儀同三司南兗州刺史率眾討之至歐陽誕遣客慶之宗人沈道愍齎書說慶之餉以玉鐶刀慶之遣道愍反數以罪惡慶之至城下誕登樓謂之曰沈君白首之年何為來慶之曰朝廷以君狂愚不足勞少壯故使僕來耳上廬誕北奔使慶之斷其走路慶之移營白土去城十八里夕進新亭誕果出走不得去還城事在誕傳慶之進營洛橋西焚其東門值雨不克慶之兄子僧榮時為兗州刺史鎮瑕丘遣子懷明率數百騎詣受慶之節度慶之塞塹造攻道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏免慶之官以激之詔無所問誕餉慶之食提挈者百餘人出自北門慶之不問悉焚之誕於城上授函表倩慶之為送慶之曰我奉詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝送護之每攻城輒身先士卒上戒之曰卿為統任當令處分有方何蒙楯城下身受矢石邪脫有傷挫為損不少自四月至于七月乃屠城斬誕進慶之司空又固讓於是與柳元景並依晉密陵侯鄭袤故事朝會慶之位次司空元景在從公之上給衛吏五十人門施行馬四年西陽五水蠻復為寇慶之以郡公統諸軍討之攻戰經年皆悉平定獲生口數萬人居清明門外有宅四所室宇甚麗又有園舍在婁湖慶之一夜攜子孫徙居之以宅還官悉移親戚中表於婁湖列門同閈焉廣開田園之業每指地示人曰錢盡在此中興身享大國家素富厚產業累萬金奴僮千計再獻錢千萬穀萬斛以始興優近求改封南海郡不許妓妾數十人並美容工藝慶之優游無事盡意歡愉非朝賀不出門每從遊幸及校獵據鞍陵厲不異少壯太子妃上世祖金鏤匕箸及杅杓上以賜慶之曰卿辛勤匪殊歡宴宜等且觴酌之賜宜以大夫為先也上嘗歡飲普令群臣賦詩慶之手不知書眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顏師伯執筆慶之口授之曰微命值多幸得逢時運昌朽老筋力盡徒步還南崗辭榮此聖世何媿張子房上甚悅眾坐稱其辭意之美世祖晏駕慶之與柳元景等並受顧命遣詔若有大軍旅及征討悉使委慶之前廢帝即位加慶之几杖給三望車一乘慶之每朝賀常乘豬鼻無幰車左右從者不過三五人騎馬履行園田政一人視馬而已每農桑劇月或時無人遇之者不知三公也及加三望車謂人曰我每遊履田園有人時與馬成三無人則與馬成二今乘此車安所之乎及賜几杖並固讓廢帝狂悖無道眾並勸慶之廢立及柳元景等連謀以告慶之慶之與江夏王義恭素不厚發其事帝誅義恭元景等以慶之為侍中太尉封次子中書郎文季建安縣侯食邑千戶義陽王昶反慶之從帝度江總統眾軍少子文耀年十餘歲善騎射帝愛之又封永陽縣侯食邑千戶帝凶暴日甚慶之猶盡言諫爭帝意稍不說及誅何邁慮慶之不同量其必至乃閉清谿諸橋以絕之慶之果往不得度而還帝乃遣慶之從子攸之齋藥賜慶之死時年八十是年初慶之夢有人以兩匹絹與之謂曰此絹足度謂人曰老子今年不免兩匹八十尺也足度無盈餘矣及死賜與甚厚追贈侍中太尉如故給鸞輅轀輬車前後羽葆鼓吹諡曰忠武公未及葬帝敗太宗即位追贈侍中司空諡曰襄公文叔長子文叔歷中書黃門郎景和末為侍中慶之之死也不肯飲藥攸之以被揜殺之文叔密取藥藏錄或勸文叔逃避文叔見帝斷截江夏王義恭支體慮奔亡之日帝怒容致義恭之變乃飲藥自殺子祕書郎昭明亦自縊死太始七年改封蒼梧郡公元徽元年還復先封時改始興為廣興昭明子曇亮襲廣興郡公齊受禪國除劭之慶之弟劭之元嘉中為廬陵王紹南中郎行參軍討建安揭陽諸賊病卒僧榮兄子僧榮敞之之子也孝建初為安成相荊江反叛發兵拒臧質質遣其安成相臧眇之討僧榮擊破之大明中為兗州刺史景和中徵為黃門郎未還卒懷明子懷明太宗泰始初居父憂起為建威將軍東征南討有功封吳興縣子食邑四百戶歷位黃門侍郎再為南兗州刺史元徽初丁母艱去職桂陽王休範為逆起為冠軍將軍統水軍防固石頭朱雀失守懷明委軍奔走頃之憂卒法系慶之從弟法系字體先亦有將用初為趙伯符將佐後隨慶之征五水蠻世祖伐逆以為南中郎參軍加寧朔將軍領三千人前發與柳元景旦至新亭元景居中營宗愨居西營法系居東營東營據崗賊攻元景法系臨射之所殺甚眾法系塹外樹悉伐之令倒賊劭來攻緣樹以進彭棑多開隙選善射手的發無不中死者交橫事平以為寧朔將軍始興太守討蕭簡於廣州聞臺軍將至簡誑其眾曰臺軍是賊劭所遣並信之前征北參軍顧邁被賊徙在城內善天文云荊江有大兵城內由此固守初世祖先遣鄧琬圍簡唯治一攻道法系至曰宜四面並攻若守一道何時可拔琬慮功不在己不從法系曰更相申五十日日盡又不克乃從之八道俱攻一日即拔斬蕭簡廣州平封庫藏付鄧琬而還官至驍騎將軍尋陽太守新安王子鸞北中郎司馬劭之子文秀別有傳慶之群從姻戚由之在列位者數十人史臣曰張釋之云用法一偏天下獄皆隨輕重縣衡於上四海共稟其平法亂於朝民無所措手足師伯藉寵代臣勢震朝野傾意廝臺情以貨結自選部至于局曹莫不從風而靡曲徇私請因停詔敕天震霣怒仆者相望師伯任用無改而王謝免職君子謂是舉也豈徒失政刑而已哉
