body:
  text: 卷八十二列傳第四十二周朗周朗字義利汝南安成人也祖文黃門侍郎父淳宋初貴達官至侍中太常兄嶠尚高祖第四女宣城德公主二女適建平王宏盧江王褘以貴戚顯官元嘉末為吳興太守賊劭弒立隨王誕舉義於會稽劭加嶠冠軍將軍誕檄又至嶠素懼怯回惑不知所從為府司馬丘珍孫所殺朝庭明其本心國婚如故朗少而愛奇雅有風氣與嶠志趨不同嶠甚疾之初為南平王鑠冠軍行參軍太子舍人司徒主簿坐請急不待對除名又為江夏王義恭太尉參軍元嘉二十七年春朝議當遣義恭出鎮彭城為北討大統朗聞之解職及義恭出鎮府主簿羊希從行與朗書戲之勸令獻奇進策朗報書曰羊生足下豈當適使人進哉何卿才之更茂也宅生結意可復佳耳屬華比綵何更工邪視已反覆慰亦無已觀諸紙上方審卿復逢知已動以何術而能每降恩明豈不為足下欣邪然更憂不知卿死所處耳夫匈以奴之不誅有日皇居之亡辱舊矣天下孰不憤心悲腸以忿胡人之患靡衣媮食以望國家之師自智士鉗口雄人蓄氣不得議圖邊之事者良淹歲紀今天子以炎軒之德冢輔以姬呂之賢故赫然發怒將以匈奴釁旗惻然動仁欲使餘氓被惠及取士之令朝發宰士暮登英豪調兵之詔夕行主公旦升雄俊延賢人者固非一日況復加此焉夫天下之士砥行磨名欲不辱其志氣選奇蓄異將進善於所天非但有建國之謀不及安民之論不與至反以孝潔生議於鄉曲忠烈起謗於君寀身不絓王臣之籙名不廁通人之班顛倒國門湮銷丘里者自數十年以往豈一人哉若吾身無他伎而出值明君變官望主歲增恩價竟不能柔心飾帶取重左右校於向士則榮已多料於今識則笑亦廣而足下方復廣吾以馳志之時求予以安邊之術何足下不知言也若以賢未登則今之登賢如此以才應進則吾之非才若是豈可欲以殞海之鬐望鼓鰓於豎鱗之肆墜風之羽覬振翮於軒毳之間其不能俱陪淥水並負青天可無待於明見若乃闕奇謀深智之術無悅主狎俗之能亦不可復稍為卿說但觀以上國再毀之臣望府一逐之吏當復是天下才否此皆足下所親知吾雖疲冗亦嘗聽君子之餘論豈敢忘之凡士之置身有三耳一則雲戶岫寢欒危桂榮秣芝浮霜翦松沈雪憐肌蓄髓寶氣愛魂非但土石侯卿腐鴆梁錦實迺佇意天后睨目羽人次則刳心掃智剖命驅生橫議於雲臺之下切辭於宣室之上衍王德而批民患進貞白而酖姦猜委玉入而齊聲禮揭金出而烹勍寇使車軌一風甸道共德令功日濟而已無跡道日富而君難名致諸侯斂手天子改觀其末則饜飴而出望旃而入結冤兩宮之下鼓袖六王之間俛眉脅肩言天下之道德瞋目扼腕陳從橫於四海理有泰則止而進調覺迕則反而還閑居違官交造頓罷捐慕遺憂夷毀銷譽呼吸以補其氣繕嚼以輔其生凡此三者皆志士仁人之所行非吾之所能也若吾幸病不及死役不至身蓬藜既滿方杜長者之轍穀稼是諮自絕世豪之顧塵生床帷苔積階月又檐中山木時華月深池上海草歲榮日蔓且室間軒左幸有陳書十篋席隅奧右頗得宿酒數壺按絃拭徽讎方校石時復陳局露初奠爵星晚驩然不覺是羲軒後也近春田三頃秋園五畦若此無災山裝可具候振飲之罷俟封勒之畢當敬觀邠酆肅尋伊鄗傍眺燕隴邪履遼衛覛我周之軫迹弔他賢之憂天當其少涉未休此欲但理實詭固物好交加或徵勢而笑其言或觀謀而害其意夫楊朱以此猶見嗤於梁人況才減楊子之器物甚魏君之意者哉若如漢宗之言李廣此固許天下之有才又知天下之時非也豈若黨巷閭里之間忌見貞士之遭遇便謂是臧獲庸人之徒耳士固願呈心於其主露奇於所歸卿相末事也若廣者何用侯為至迺復有致謁於為亂之日被訕於害正之徒心奇而無田露事直而變為枉豈不痛哉豈不痛哉若足下可謂冠負日月籍踐淵海心支身首無不通照今復出入燕河交關姬衛整笏振豪已議於帷筵之上提鞭鳴劍復呵於軍場之間身超每深恩之所集心動必明主之所亮可不直議正身輔人君之過誤明目張膽謀軍家之得失操志勇之將薦俊正之士此迺足下之所以報也不爾便擐甲修戈徘徊左右衛君王之身當馬首之鏑關必固之壘交死進之戰使身分而主豫寇滅而兵全此亦報之次也如是則繫匈奴於北闕無日矣亡但默默窺寵而坐謂子有心敢書薄意朗之辭意倜儻類皆如此復起為通直郎世祖即位除建平王宏中軍錄事參軍時普責百官讜言朗上書曰昔仲尼有言治天下若寘諸掌豈徒言哉方策之政息舉在人蓋當世之君不為之耳況乃運鍾澆暮世膺亂餘重以宮廟遭不更之酷江服被未有之痛千里連死萬井共泣而秦漢餘敝尚行於今魏晉遺謬猶布於民是而望國安於今化崇於古卻行及前之言積薪待然之譬臣不知所以方然陛下既基之以孝又申之以仁民所疾苦敢不略薦凡治者何哉為教而已今教衰已久民不知則又隨以刑逐之豈為政之道歟欲為教者宜二十五家選一長百家置一師男子十三至十七皆令學經十八至二十盡使修武訓以書記圖律忠孝仁義之禮廉讓勤恭之則授以兵經戰略軍部舟騎之容挽強擊刺之法官長皆月至學所以課其能習經者五年有立則言之司徒用武者三年善蓺亦升之司馬若七年而經不明五年而勇不達則更求其言政置謀迹其心術行履復不足取者雖公卿子孫長歸農畝終身不得為吏其國學則宜詳考古數部定子史令書不煩行習無糜力凡學雖凶荒不宜廢也農桑者實民之命為國之本有一不足則禮節不興若重之宜罷金錢以穀帛為賞罰然愚民不達其權議者好增其異凡自淮以北萬匹為市從江以南千斛為貨亦不患其難也今且聽市至千錢以還者用錢餘皆用絹布及米其不中度者坐之如此則墾田自廣民資必繁盜鑄者罷人死必息又田非膠水皆播麥菽地堪滋養悉蓺紵麻蔭巷緣藩必樹桑柘列庭接宇唯植竹栗若此令既行而善其事者庶民則敘之以爵有司亦從而加賞若田在草間木物不植則撻之而伐其餘樹在所以次坐之又取稅之法宜計人為輸不應以貲云何使富者不盡貧者不蠲乃令桑長一尺圍以為價田進一畝度以為錢屋不得瓦皆責貲實民以此樹不敢種土畏妄墾棟焚榱露不敢加泥豈有剝善害民禁衣惡食若此苦者方今若重斯農則宜務削茲法凡為國不患威之不立患恩之不下不患土之不廣患民之不育自華夷爭殺戎夏競威破國則積屍竟邑屠將則覆軍滿野海內遺生蓋不餘半重以急政嚴刑天災歲疫貧者但供吏死者弗望薶鰥居有不願娶生子每不敢舉又戍淹徭久妻老嗣絕及婬奔所孕皆復不收是殺人之日有數途生人之歲無一理不知復百年間將盡以草木為世邪此最是驚心悲魂慟哭太息者法雖有禁殺子之科設蚤娶之令然觸刑罪忍悼痛而為之豈不有酷甚處邪今宜家寬其役戶減其稅女子十五不嫁家人坐之特雉可以娉妻妾大布可以事舅姑若待禮足而行則有司加糾凡宮中女隸必擇不復字者庶家內役皆令各有所配要使天下不得有終獨之生無子之老所謂十年存育十年教訓如此則二十年間長戶勝兵必數倍矣又亡者亂郊饉人盈甸皆是不為其存計而任之遷流故饑寒一至慈母不能保其子欲其不為寇盜豈可得邪既御之使然復止之以殺彼於有司何酷至是且草樹既死皮葉皆枯是其梁肉盡矣冰霜已厚苫蓋難資是其衣裘敗矣比至陽春生其餘幾今自江以南在所皆穰有食之處須官興役宜募遠近能食五十口一年者賞爵一級不過千家故近食十萬口矣使其受食者悉令就佃淮南多其長帥給其糧種凡公私遊手歲發佐農令堤湖盡修原陸並起仍量家立社計地設閭檢其出入督其游惰須待大熟可移之復舊淮以北悉使南過江東旅客盡令西歸故毒之在體必割其緩處函渭靈區闃為荒窟伊洛神基蔚成茂草豈可不懷歟歷下泗間何足獨戀議者必以為胡衰不足避而不知我之病甚於胡矣若謂民之既徙狄必就之若其來從我之願也胡若能來必非其種不過山東雜漢則是國家由來所欲覆育既華得坐實戎空自遠其為來利固善也今空守孤城徒費財役亦行見淮北必非境服有矣不亦重辱喪哉使虜但發輕騎三千更互出入春來犯麥秋至侵禾水陸漕輸居然復絕於賊不勞而邊已困不至二年卒散民盡可蹻足而待也設使胡滅則中州必有興者決不能有奉土地率民人以歸國家矣誠如此則徐齊終逼亦不可守且夫戰守之法當恃人之不敢攻頃年兵之所以敗皆反此也今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣漢之中年能事胡者以馬多也胡之後服漢者亦以馬少也既兵不可去車騎應蓄今宜募天下使養馬一匹者蠲一人役三疋者除一人為吏自此以進階賞有差邊亭徼驛一無發動又將者將求其死也自能執干戈幸而不亡筋力盡於戎役其於望上者固已深矣重有澄風掃霧之懃驅波滌塵之力此所自矜尤復為甚近所功賞人知其濃然似頗謬虛實怨怒實眾垂臂而反脣者往往為部耦語而呼望者處處成群凡武人意氣特易崩沮設一旦有變則向之怨者皆為敵也今宜國財與之共竭府粟與之同罄去者應遣濃加寵爵發所在祿之將秩未充餘費宜闕他事負輦長不應與唯可教以蒐狩之禮習以鉦鼓之節若假勇以進務黜其身老至而罷賞延於嗣又緣淮城壘皆宜興復使烽鼓相達兵食相連若邊民請師皆宜莫許遠夷貢至止於報荅語以國家之未暇示以何事而非君須內教既立徐料寇形辦騎卒四十萬而國中不擾取穀支二十歲而遠邑不驚然後越淮窮河跨隴出漠亦何適而不可又教之不敦一至於是今士大夫以下父母在而兄弟異計十家而七矣庶人父子殊產亦八家而五矣凡甚者乃危亡不相知飢寒不相卹又嫉謗讒害其間不可稱數宜明其禁以革其風先有善於家者即務其賞自今不改則沒其財又三年之喪天下之達喪以其哀並衷出故制同外興日久均痛故愈遲齊典漢氏節其臣則可矣薄其子則亂也云何使衰苴之容盡鳴號之音息夫佩玉啟旒深情弗忍冕珠視朝不亦甚乎凡法有變於古而刻於情則莫能順焉至乎敗於禮而安於身必遽而奉之何乃厚於惡薄於善歟今陛下以大孝始基宜反斯謬且朝享臨御當近自身始妃主典制宜漸加矯正凡舉天下以奉一君何患不給或帝有集皁之陋后有帛布之鄙亦無取焉且一體炫金不及伯兩一歲美衣不過數襲而必收寶連櫝集服累笥目豈常視身未時親是為櫝帶寶笥著衣空散國家之財徒奔天下之貨而主以此惰禮妃以此傲家是何糜蠹之劇惑鄙之甚逮至婢豎皆無定科一婢之身重婢以使一豎之家列豎以役塗金披繡漿酒藿肉者故不可稱紀至有列軿以遊遨飾兵以驅叱不亦重甚哉若禁行賜薄不容致此且細作始并以為儉節而市造華怪即傳於民如此則遷也非罷也凡天下得治者以實而治天下者常虛民之耳目既不可誑治之盈耗並亦隨之故凡厥庶民制度日侈商販之室飾等王侯傭賣之身製均妃后凡一袖之大足斷為兩一裾之長可分為二見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已睥睨宮中朝制一衣庶家晚已裁學侈麗之原實先宮閫又妃主所賜不限高卑自今以去宜為節目金魄翠玉錦繡縠羅奇色異章小民既不得服在上亦不得賜若工人復造奇伎淫器則皆焚之而重其罪又置官者將以燮天平氣贊地成功防姦御難治煩理劇使官稱事立人稱官置無空樹散位繁進瑠人今高卑貿實大小反稱名之不定是謂官邪而世廢姬公之制俗傳秦人之法惡明君之典好闇主之事其憎聖愛愚何其甚矣今則宜先省事從而并官置位以周典為式變名以適時為用秦漢末制何足取也當使德厚者位尊位尊者祿重能薄者官賤官賤者秩輕纓冕紱佩稱官以服車騎容衛當職以施又寄土州郡宜通廢罷舊地民戶應更置立豈吳邦而有徐邑揚境而宅兗民上淆辰紀下亂畿甸其地如朱方者不宜置州土如江都者應更建邑又民少者易理君近者易歸凡吏皆宜每詳其能每厚其秩為縣不得復用恩家之貧為郡不得復選勢族之老又王侯識未堪務不應強仕須合冠而啟封能政而議爵且帝子未官人誰謂賤但宜詳置賓友選擇正人亦何必列長史參軍別駕從事然後為貴哉又世有先後業有難易明帝能令其兒不匹光武之子馬貴人能使其家不比陰后之族盛矣哉此於後世不可忘也至當輿抑碎首之忿陛殿延辟戟之威此亦復不可忘也內外之政實不可雜若妃主為人請官者其人宜終身不得為官若請罪者亦終身不得赦罪凡天下所須者才而才誠難知也有深居而言寡則蘊學而無由知有卑處而事隔則懷奇而無由進或復見忌於親故或亦遭讒於貴黨其欲致車右而動御席語天下而辯治亂焉可得哉漫言舉賢則斯人固未得矣宜使世之所稱通經達史辨詞精數吏能將謀偏術小道者使獵纓危䣛博求其用制內外官與官之遠近及仕之類令各以所能而造其室降情以誘之卑身以安之然後察其擢脣吻樹頰胲動精神發意氣語之所至意之所執不過數四間不亦盡可知哉若忠孝廉清之比強正惇柔之倫難以檢格立不可須臾定宜使鄉部求其行守宰察其能竟皆見之於選貴呈之於相主然後處其職宜定其位用如此故應愚鄙盡捐賢明悉舉矣又俗好以毀沈人不知察其所以致毀以譽進人不知測其所以致譽毀徒皆鄙則宜擢其毀者譽黨悉庸則宜退其譽者如此則毀譽不妄善惡分矣又既謂之才則不宜以階級限不應以年齒齊凡貴者好疑人少不知其少於人矣老者亦輕人少不知其不及少矣自釋氏流教其來有源淵檢精測固非深矣舒引容潤既亦廣矣然習慧者日替其修束誡者月繁其過遂至糜散錦帛侈飾車從復假粗醫術託雜卜數延妹滿室置酒浹堂寄夫託妻者不無殺子乞兒者繼有而猶倚靈假像背親傲君欺費疾老震損宮邑是乃外刑之所不容戮內教之所不悔罪而橫天地之間莫之糾察人不得然豈其鬼歟今宜申嚴佛律裨重國令其疵惡顯著者悉皆能遣除則隨其蓺行各為之條使禪義經誦人能其一食不過蔬衣不出布若應更度者則令先習義行本其神心必能草腐人天竦精以往者雖侯王家子亦不宜拘凡鬼道惑眾妖巫破俗觸木而言怪者不可數寓采而稱神者非可算其原本是亂男女合飲食因之而以祈祝從之而以報請是亂不誅為害未息凡一苑始立一神初興淫風輒以之而甚今修隄以北置園百里峻山以右居靈十房糜財敗俗其可稱限又針藥之術世寡復修診脈之伎人鮮能達民因是益徵於鬼遂棄於醫重令耗惑不反死夭復半今大醫宜男女習教在所應遣吏受業如此故當愈於媚神之愚微正腠理之敝矣凡無世不有言事末時不有令下然而升平不至昏危是繼何哉蓋設令之本非實也又病言不出於謀臣事不便於貴黨輕者抵訾呵駭重者死壓窮擯故西京有方調之誅東郡有黨錮之戮陛下若欲申常令循末典則群臣在焉若欲改舊章興王道則微臣存矣敢昧死以陳唯陛下察之書奏忤旨自解去職又除太子中舍人出為廬陵內史郡後荒蕪頻有野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒郡廨朗悉以秩米起屋償所燒之限稱疾去官遂為州司所糾還都謝世祖曰州司舉臣愆失多有不允臣在郡虎三食人蟲鼠犯稼以此二事上負陛下上變色曰州司不允或可有之蟲虎之災寧關卿小物朗尋丁母艱有孝性每哭必慟其餘頗不依居喪常節大明四年上使有司奏其居喪無禮請加收治詔曰朗悖禮利口宜令翦戮微物不足亂典刑特鎖付邊郡於是傳送寧州於道殺之時年三十六子仁昭順帝昇明末為南海太守沈懷文沈懷文字思明吳興武康人也祖寂晉光祿勳父宣新安太守懷文少好玄理善為文章嘗為楚昭王二妃詩見稱於世初州辟從事轉西曹江夏王義恭司空行參軍隨府轉司徒參軍事東閤祭酒丁父憂新安郡送故豐厚奉終禮畢餘悉班之親戚一無所留太祖聞而嘉之賜奴婢六人服闋除尚書殿中郎隱士雷次宗被徵居鍾山後南還廬岳何尚之設祖道文義之士畢集為連句詩懷文所作尤美辭高一座以公事例免同輩皆失官懷文乃獨留隨王誕鎮襄陽出為後軍主簿與諮議參軍謝莊共掌辭令領義成太守元嘉二十八年誕當為廣州欲以懷文為安南府記室先除通直郎懷文固辭南行上不悅懷遠弟懷遠納東陽公主養女王鸚鵡為妾元凶行巫蠱鸚鵡預之事泄懷文因此失調為治書侍御史元凶弒立以為中書侍郎世祖入討劭呼之使作符檄懷文固辭劭大怒投筆於地曰當今艱難卿欲避事邪旨色甚切值殷沖在坐申救得免託疾落馬間行奔新亭以為竟陵王誕衛軍記室參軍新興太守又為誕驃騎錄事參軍淮南太守時國哀未釋誕欲起內齋懷文以為不可乃止尋轉揚州治中從事史時議省錄尚書懷文以為非宜上議曰昔天官正紀六典序職載師掌均七府成務所以翼平辰衡經贊邦極故總屬之原著夫官典和統之要昭于國言夏因虞禮有深冢司之則周承殷法無損掌邦之儀用乃調佐王均緝亮帝度而式憲之軌弘正漢庭述章之範崇明魏室雖條錄之名立稱於中代總釐之實不愆於自古比代相沿歷朝罔貳及乎爵以事變級以時改皆興替之道無害國章八統元任靡或省革按台輔之職三曰禮典以和邦國以統百官四曰政典以平邦國以正百官鄭康成云冢宰之於庶僚無所不總也考于茲義備於典文詳古準今不宜虛廢不從遷別駕從事史江夏王義恭遷西陽王子尚為揚州居職如故時熒惑守南斗上乃廢西州舊館使子尚移居東城以厭之懷文曰天道示變宜應之以德今雖空西州恐無益也不從而西州竟廢矣大明二年遷尚書吏部郎時朝議欲依古制置王畿揚州移治會稽猶以星變故也懷文曰周制封畿漢置司隸各因時宜非存相反安民寧國其揆一也苟民心所安天亦從之未必改今追古乃致平壹神州舊壤歷代相承異於邊州或罷或置既物情不說容虧化本又不從三年子尚移鎮會稽遷撫軍長史行府州事時囚繫甚多動經年月懷文到任訊五郡九百三十六獄眾咸稱平入為侍中寵待隆密將以為會稽其事不行竟陵王誕據廣陵反及城陷士庶皆裸身鞭面然後加刑聚所殺人首於石頭南岸謂之髑髏山懷文陳其不可上不納揚州移會稽上忿浙江東人情不和欲貶其勞祿唯西州舊人不改懷文曰揚州徙治既乖民情一州兩格尤失大體臣謂不宜有異上又不從懷文與顏竣周朗素善竣以失旨見誅朗亦以忤意得罪上謂懷文曰竣若知我殺之亦當不敢如此懷文默然嘗以歲夕與謝莊王景文顏師伯被敕入省未及進景文因言次稱竣朗人才之美懷文與相詶和師伯後因語次白上敘景文等此言懷文屢經犯忤至此上倍不說上又壞諸郡士族以充將吏並不服役至悉逃亡加以嚴制不能禁乃改用軍法得便斬之莫不奔竄山湖聚為盜賊懷文又以為言齋庫上絹年調鉅萬匹綿亦稱此期限嚴峻民間買絹一匹至二三千綿一兩亦三四百貧者賣妻兒甚者或自縊死懷文具陳民困由是綿絹薄有所減俄復舊子尚諸皇子皆置邸舍逐什一之利為患徧天下懷文又言之曰列肆販賣古人所非故卜式明不雨之由弘羊受致旱之責若以用度不充頓止為難者故宜量加減省不聽孝建以來抑黜諸弟廣陵平後復欲更峻其科懷文曰漢明不使其子比光武之子前史以為美談陛下既明管蔡之誅願崇唐衛之寄及海陵王休茂誅欲遂前議太宰江夏王義恭探得密旨先發議端懷文固謂不可由是得息時游幸無度太后及六宮常乘副車在後懷文與王景文每陳不宜亟出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無係宜相與陳之江智淵臥草側亦謂言之為善俄而被召俱入雉場懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啟宜從智淵未及有言上方注弩作色曰卿欲效顏竣邪何以恒知人事又曰顏竣小子恨不得鞭其面上每宴集在坐者咸令沈醉懷文素不飲酒又不好戲調上謂故欲異已謝莊嘗誡懷文曰卿每與人異亦何可久懷文曰吾少來如此豈可一朝而變非欲異物性所得耳五年乃出為晉安王子勛征虜長史廣陵太守明年坐朝正事畢被遣遷北以女病求申臨辭又乞停三日訖猶不去為有司所糾免官禁錮十年既被免買宅欲還東上大怒收付廷尉賜死時年五十四三子淡淵沖弟懷遠為始興王濬征北長流參軍深見親待坐納王鸚鵡為妾世祖徙之廣州使廣州刺史宗愨於南殺之會南郡王義宣反懷遠頗閑文筆愨起義使造檄書并銜命至始興與始興相沈法系論起義事事平愨具為陳請由此見原終世祖世不得還懷文雖親要屢請終不許前廢帝世流徙者並聽歸本官至武康令撰南越志及懷文文集並傳於世史臣曰昔婁敬戍卒委輅而遷帝都馮唐老賤片詞以悟明主素無王公卿士之貴非有積譽取信之資徒以一言合旨仰感萬乘自此山壑草萊之人布衣韋帶之士莫不踵闕縣書煙霏霧集自漢至魏此風未爽暨于晉氏浮偽成俗人懷獨善仕貴遺務降及宋祖思反前失雖革薄捐華抑揚名教而闢聰之路未啟采言之制不弘至於賤隸卑臣義合朝算徒以事非己出知允莫從昔之開之若彼今之塞之若此非為徐樂嚴安偏富漢世東方主父獨闕宋時蓋由用與不用也徒置乞言之旨空下不諱之令慕古飾情義非側席文士因斯各存炫藻周朗辯博之言多切治要而意在摛詞文實忤主文詞之為累一至此乎
