body:
  text: 卷八十四列傳第四十四鄧琬鄧琬字元琬豫章南昌人也高祖混曾祖玄並為晉尚書吏部郎祖潛之鎮南長史父胤之世祖征虜長史吏部郎彭城王義康大將軍長史豫章太守光祿勳琬初為州西曹主簿南譙王義宣征北行參軍轉參軍事又隨府轉車騎參軍仍轉府主簿江州治中從事史世祖起義版琬為輔國將軍南海太守率軍伐蕭簡於廣州攻圍踰年乃克以臧質反為江州刺史宗愨所執值赦原琬弟璩與臧質同逆質敗從誅琬弟環亦坐誅琬在遠又有功免死遠徙仍停廣州久之得還除給事中尚書庫部郎都水使者丹陽丞本州大中正大明七年車駕幸歷陽追思在藩之舊下詔曰故光祿勳前征虜長史鄧胤之體局沈隱累任著績朕昔當藩重首先佐務心力款盡弗忘于懷往歲息璩凶悖自取誅翦沿恩及琬特免釁戮今可擢為給事黃門侍郎以旌胤之宿誠明年出為晉安王子勛鎮軍長史尋陽內史行江州事前廢帝狂悖無道以太祖世祖並第數居三以登極位子勛次第既同深構嫌隙因何邁之謀乃遣使齎藥賜子勛死使至子勛典籤謝道遇齋帥潘欣之侍書褚靈嗣等馳以告琬泣涕請計琬曰身南土寒士蒙先帝殊恩以愛子見託豈得惜門戶百口其當以死報效幼主昏暴社稷危殆雖曰天子事猶獨夫今便指率文武直造京邑與群公卿士廢昏立明景和元年十一月十九日稱子勛教即日戒嚴子勛戎服出聽事集僚佐使潘欣之口宣旨曰少主昏狂悖戾並是諸君所見聞顧命重臣悉皆誅戮驅逼王公幽辱太后不逞之徒共成其釁京師諸王並見囚逼委厄虎口思奮莫因身義兼家國豈可坐視橫流今便欲舉九江之眾馳檄近遠以謀王室於諸君何如四座未答錄事參軍陶亮曰少主昏狂醜毒已積伊霍行之於古殿下當之於今鄙州士子世習忠節況屬千載之會請效死前驅眾並奉旨文武普進位一階轉亮為諮議參軍事領中兵加寧朔將軍總統軍事功曹張沈為諮議參軍統作舟艦參軍事顧昭之沈伯玉荀道林等參管書記南陽太守沈懷寶岷山太守薛常寶之郡始至尋陽與新蔡太守韋希直並為諮議參軍領中兵及彭澤令陳紹宗並為將帥初廢帝使荊州錄送前軍長史荊州行事張悅下至湓口琬稱子勛命釋其桎梏迎以所乘之車以為司馬加征虜將軍加琬冠軍將軍二人共掌內外眾事遣將軍俞伯奇率五百人出斷大雷禁絕商旅及公私使命遣使上諸郡民丁收斂器械十日之內得甲士五千人出頓大雷於兩岸築壘巴東建平二郡太守孫沖之之郡始至孤石琬以沖之為子勛諮議參軍領中兵加輔國將軍與陶亮並統前軍使記室參軍荀道林造檄文馳告遠近會太宗定亂進子勛號車騎將軍開府儀同三司令書至諸佐吏並喜造琬曰暴亂既除殿下又開黃閤實為公私大慶琬以子勛次第居三又以尋陽起事有符世祖理必萬克乃取令書投地曰殿下當開端門黃閤是吾徒事耳眾並駭愕琬與陶亮等繕治器甲徵兵四方郢州刺史安陸王子綏荊州刺史臨海王子頊會稽太守尋陽王子房雍州刺史袁顗梁州刺史柳元怙益州刺史蕭惠開廣州刺史袁曇遠徐州刺史薛安都青州刺史沈文秀冀州刺史崔道固湘州行事何慧文吳郡太守顧琛吳興太守王曇生晉陵太守袁標義興太守劉延熙並同叛逆先是廢帝以邵陵王子元為冠軍將軍湘州刺史中兵參軍沈仲玉為道路行事至鵲頭聞尋陽兵起停住白太宗進止之宜太宗以子勛起兵本在幼主雖疑其不即解甲不欲先彰同異敕令進道信未報琬聞子元停鵲頭不進遣數百人劫迎之乃建牙於桑尾傳檄京師曰陽六數艱雲雷相襲高皇受歷時乘雲轡頓於促路文祖定祥係昭睿化翦於中年二凶縱禍三綱理滅宗王俛首姑息逆朝枕戈無聞偷榮有秩孝武皇帝釋位泣血糾義入討投袂戎首親戮鯨鯢九服還輝兩儀更造而穹旻不惠棄離萬國皇運重替嗣主荒淫孤以不才任居藩長大懼宗稷殲覆待日故招徒楚郢飛檄京甸志遵前典黜幽陟明庶七廟復安海昏有紹豈圖宋未悔禍弒亂奄臻遂矯害明茂篡竊天寶反道效尤蔑我皇德干我昭穆寡我兄弟恣鴟鴞之心蹈倫穎之志覆移鼎祚誣罔夭人藐孤同氣猶有十三聖靈何辜而當乏饗昔隆周弛御晉鄭是依盛漢中陵居章抗節支苗輕屬猶或忘驅況孤忝惟臣子情地兼切號感一隅心與事痛是用飲血衽金誓復宗祀今遣輔國將軍諮議領中直兵孫沖之龍驤將軍陳紹宗率螭虎之士組甲二萬沿流電發逕取白下龍驤將軍領中直兵薛常寶建威將軍領中直兵沈懷寶長戟萬刃羽騎千群徑出南州直造朱雀寧朔將軍諮議領中直兵陶亮龍驤將軍焦度總中黃之旅梟雄三萬風掩江介雲臨石頭建威將軍張洌龍驤將軍何休明提育獲之徒勁悍之卒邪趨金陵北指閶闔龍驤將軍張係伯龍驤將軍陳慶勒輕銳五千強弩一萬飛鋒班瀆齊會西明冠軍將軍尋陽內史鄧琬撮湘雍之兵勇敢四萬授律總威飆集京邑征虜將軍領府司馬張悅蒼兕千艘水軍五萬大董群校絡繹繼道冠軍將軍豫章內史劉衍寧朔將軍武昌太守劉弼寧朔將軍西陽太守謝稚建威將軍領中直兵晉熙太守閻湛之皆掃境勝兵薦誠請效後將軍郢州刺史安陸王子綏懷恩纏慕鞠旅先辰冠軍將軍湘州刺史邵陵王子元席颿陵波整眾遄至前將軍荊州刺史臨海王子頊練甲陝西獻徒萬數輔國將軍冠軍長史長沙內史何惠文見拔先皇誠深投袂冠軍將軍雍州刺史袁顗不謀同契雷發漢南建武將軍順陽太守劉道憲懷忠抱慨不遠三千梁益青徐兗豫吳會皆密介歸誠誓為表裏孤親總烝徒十有餘萬白羽咽川霜鋒照野金聲振谷鳴鼙聒天凡諸將帥皆忠無匿情智無遺計果榦剛鷙譎略多奇水陸長驅數道並進發舟踰險背水爭先以此眾戰孰能斯禦推此義銳滄海可垔諸君或荷寵前朝感恩舊日或奕世貞淳見危授命而逼迫寇手效節莫由今大軍密邇形援已接見幾而作豈俟終日便宜轉禍趣福因變立功夫旦奭與三監並時金霍與上官共主邪正粈雜何世無之但績亮則名播姦騁則道消耳紀季入齊陳平歸漢身尊譽遠明誓是裒成範全規殷監匪遠若玩咎惟休告舍罔悟則誅及五族有殄無遺軍科爵賞信如皦日巫山既燎芝艾共煙幸遵良塗無守毀轍檄到宣告咸使聞知購太宗萬戶侯布絹二萬匹金銀五百斤其餘各有差太宗遣荊州典籤邵宰乘驛還江陵經過襄陽袁顗馳書報琬勸勿解甲并奉表勸子勛即位郢州承子勛初檄及聞太宗定大事即解甲下標繼聞尋陽不息而顗又響應郢府行事錄事參軍荀卞之大懼慮為琬所咎責即遣諮議領中兵參軍鄭景玄率軍馳下并送軍糧琬乃稱說符瑞造乘輿御服云松滋縣生豹自來柴桑縣送竹有來奉天子字又云青龍見東淮白鹿出西岡令顧昭之撰為瑞命記立宗廟設壇場矯作崇憲太后璽令群僚上偽號於子勛泰始二年正月七日即位於尋陽城改景和二年為義嘉元年以安陸王子綏為司徒驃騎將軍揚州刺史尋陽王子房車騎將軍臨海王子頊衛將軍並開府儀同三司邵陵王子元撫軍將軍其日雲雨晦合行禮忘稱萬歲取子勛所乘車除腳以為輦置偽殿之西其夕有鳩棲其中鴞集其幰又有禿鶖集城上子綏拜司徒日雷電晦冥震其黃閤柱鴟尾墮地又有鴟棲其帳上以鄧琬為左將軍尚書右僕射張悅領軍將軍吏部尚書征虜將軍如故進袁顗號安北將軍加尚書左僕射臨川內史張淹為侍中府主簿顧昭之武昌太守劉弼並為黃門侍郎廬江太守王子仲委郡奔尋陽亦為黃門侍郎鄱陽內史丘景先廬陵內史殷損西陽太守謝稚後軍府記室參軍孫詵長沙內史孔靈產參軍事沈伯玉荀道林並為中書侍郎荀卞之為尚書左丞府主簿江乂為右丞府主簿蕭寶欣為通直郎琬大息粹悅息洵並正員郎粹領衛尉洵弟洌司徒主簿建武將軍領軍主晉熙太守閻湛之加寧朔將軍廬陵內史王僧胤為祕書丞桂陽太守劉卷為尚書殿中郎褚靈嗣潘欣之沈光祖中書通事舍人餘諸州郡並加爵號琬性鄙闇貪吝過甚財貨酒食皆身自量校至是父子並賣官鬻爵使婢僕出市道販賣酣歌博奕日夜不休大自矜遇賓客到門者歷旬不得前內事悉委褚靈嗣等三人群小橫恣競為威福士庶忿怨內外離心矣太宗遣散騎常侍領軍將軍王玄謨領水軍南討吳興太守張永為其後繼又遣寧朔將軍尋陽內史沈攸之寧朔將軍江方興龍驤將軍劉靈遺率眾屯虎檻時東賊甚急張永江方興回軍東討尚書下符曰夫晦明遞運崇替相沿帝宋之基懋業維永聖祖重光氤氤上業狂昏承祀國維以紊毒流九縣釁穢三靈搢紳戮辱黔庶塗炭人神同憤朝野泣血聖上明睿在躬膺符握曜眷懷家國夙夜劬勞懼社稷湮蕪彝倫左衽天威雷發氛沴冰消殄凶譙門不俟鳴條之旅殲虐牧野無勞孟津之鉞華夷即晏晷緯還光鏗鏘聞於管絃趨翔被於冠冕同軌仰化異域懷風劉子勛昏世稱兵義同翦惡明朝不戢罔識邪正窺窬畿甸逼遏兩江陵上無君暴於遐邇王赫斯怒興言討違命彼上將治兵薄伐今遣寧朔將軍尋陽內史沈攸之輕銳七千飛舟先邁龍驤將軍劉靈遺羽林虎旅連鋒繼造假節督南討前鋒諸軍事冠軍將軍兗州刺史殷孝祖驅濟河勁卒電擊雷動使持節車騎將軍江州刺史曲江縣開國侯王玄謨烝徒五萬董統前師使持節侍中司徒揚州刺史建安王休仁擁神州之眾總督群帥龍驤將軍劉勔寧朔將軍劉懷珍步騎五千直指大雷寧朔將軍柳倫司州刺史龐孟穀淮潁突騎邪趣西陽使持節驃騎大將軍豫州刺史山陽王休祐總勒步師連旗百萬河舟代馬遄騖江濆越棘吳鉤交曜畿服笳鼓動坤維金甲震雲漢掎角相望水陸俱發冠軍將軍武念率雍司之銳已據樊沔徐州刺史申令孫提彭宋剽勇陵塗焱奮皇上當親馭六師降臨江服旌旆掩雲舳艫咽海昔吳楚連衡燕淮勁悍塵擾區內聲沸秦中霧散埃滅豈非先鑒而嬰彼孤城以待該天之網迫此烏合以抗絡宇之師雲羅四掩霜鋒交集猶勁飆之拂細草烈火之掃寒原燋卷之形昭然已著朝廷惻愍我僚吏哀矜我士民並亦何辜拘誤迷黨故加宣示令得自新如其淪惑不改抵冒王威同焚既至雖悔奚補奉詔以四王幼弱不幸陷難兵交之日不得妄加侵犯若有逼損誅翦無貸左右主帥嚴相衛奉詿誤之罪一無所問琬遣孫沖之率陳紹宗胡靈秀薛常寶張繼伯焦度等前鋒一萬來據赭圻沖之於道與子勛書曰舟楫已辦器械亦整三軍踊躍人爭效命便欲沿流挂颿直取白下願速遣陶亮眾軍兼行相接分據新亭南州則一麾定矣乃加沖之左衛將軍以陶亮為右衛將軍統諸州兵俱下郢州軍主鄭景玄荊州軍主劉亮湘州軍主何昌梁州軍主柳登雍州軍主宗庶等合二萬人一時俱下亮本無幹略聞建安王休仁自上殷孝祖又至不敢進屯軍鵲洲時琬遣閻湛之來寇廬江臺軍主龍驤將軍段佛榮受命討之更使佛榮領鐵騎一千回軍南討三月三日水陸攻赭圻亮等率眾來救殷孝祖為流矢所中死軍主朱輔之申謙之張靈符並失利輔之副正員將軍皇甫仲遠謙之副虎賁中郎將徐稚賓並沒孝祖支軍主范潛率五百人投亮時東軍已捷江方興復還虎檻建安王休仁遣方興劉靈遺各領三千人助赭圻以方興領孝祖軍沈攸之代孝祖為前鋒都督沖之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京都亮不從太宗遣員外散騎侍郎王道隆至赭圻督戰孝祖死之明日建安王休仁又遣軍主郭季之馬步三千就攸之攸之乃率季之及輔國將軍步兵校尉杜幼文寧朔將軍屯騎校尉垣恭祖龍驤將軍朱輔之員外散騎侍郎高遵世馬軍主龍驤將軍頓生段佛榮等三萬人詰旦進戰奮擊大破之斬獲數千追奔至姥山而反沖之等於湖白口築二城為軍主張興世所拔陶亮聞湖白二城陷沒大懼急呼沖之還鵲尾留薛常寶代沖之守赭圻先於姥山及諸岡分立營砦亦悉敗還共保濃湖濃湖即在鵲尾時軍旅大起國用不足募民上米二百斛錢五萬雜穀五百斛同賜荒縣除上米三百斛錢八萬雜穀千斛同賜五品正令史滿報若欲署四品在家亦聽上米四百斛錢十二萬雜穀一千三百斛同賜四品令史滿報若欲署三品在家亦聽上米五百斛錢十五萬雜穀一千五百斛同賜三品令史滿報若欲署內監在家亦聽上米七百斛錢二十萬雜穀二千斛同賜荒郡除若欲署諸王國三令在家亦聽琬又遣輔國將軍豫州刺史劉胡率眾三萬鐵騎二千來屯鵲尾胡宿將屢有戰功素多狡詐為眾推伏攸之等甚憚之時胡鄉人蔡那佼長生張敬兒各領軍隸攸之在赭圻胡以書招之那等並拒絕胡因要那等共語陳說平生那等詰誚說令歸順胡回軍入鵲尾無他權略輔國將軍吳喜平定三吳率所領五千人并運資實至于赭圻於戰鳥山築壘分遣千人乘輕舸二百與佼長生為游軍薛常寶糧盡告胡求援三月二十九日胡率步卒一萬夜斫山開道以布囊運米來餉赭圻平旦至城下猶隔小塹未能得入沈攸之率眾軍攻之軍主郭秀之荀僧韶幢主韓欣宗等率眾三千為攸之勢援胡發所由橋道僧韶等接楯行戰復橋得渡軍主劉沙彌輕騎深入至胡麾下遂見殺攸之策馬陷陳回還為追騎所刺馬軍主段佛榮武保救之得免並殊死戰多所傷殺胡眾大敗捨糧棄甲緣山遁走乘勝追之斬獲甚眾胡被瘡僅得還營常寶惶懼無計遣信告胡欲突圍奔出四月四日胡自率數千人迎之常寶等開城突圍走攸之率輔國將軍沈懷明軍主周普孫江方興申謙之等諸軍悉力擊之吳喜率眾來赴為胡別軍所圍甚急有人來捉喜馬將蔡保以刀斫之斷手然後得免正員將軍幢主卜伯宗江夏國侍郎幢主張渙力戰沒陳伯宗益州刺史天與子也攸之喜等苦戰移日常寶張繼伯胡靈秀焦度等皆被重瘡走還胡軍赭圻城陷斬偽寧朔將軍南陽太守沈懷寶偽奉朝請領中舍人督戰謝道遇納降數千陳紹宗單舸奔西岸與其部曲俱還鵲尾建安王休仁自虎檻進據赭圻劉胡遣陳紹宗陳慶率輕艓二百大艦五十出鵲外挑戰吳喜張興世佼長生等擊之喜支軍主吳獻之飛舸衝突所向摧陷斬獲及投水死甚多追至鵲裏而還太宗慮胡等或於步路向京邑使寧朔將軍廣德令王蘊千人防魯顯時胡等兵眾強盛遠近疑惑太宗欲綏慰人情遣吏部尚書褚淵至虎檻選用將帥以下申謙之杜幼文因此求黃門郎沈懷明劉亮求中書郎建安王休仁即使褚淵擬選上不許曰忠臣殉國不謀其報臨難以干朝典豈臣下之節邪始安內史王職之建安內史趙遁生安成太守劉襲並舉郡奉順琬遣龍驤將軍廖琰率數千人并發廬陵白丁攻襲襲與郡丞檀玢拒戰大敗玢臨陳見殺襲棄郡走據嶮自守琰虜掠而退襲復出據郡時齊王率眾東北征討而齊王世子為南康贛令琬遣使收世子世子腹心蕭欣祖桓康等數十人奉世子長子奔竄草澤召募得百餘人攻郡出世子世子自號寧朔將軍與南康相沈用之前南海太守何曇直晉康太守劉紹祖北地傅浩東莞童禽等據郡起義琬徵始興相殷孚為御史中丞并令率郡人俱下孚眾盛世子避之於揭陽山琬遣武昌戴凱之為南康相世子率眾攻之凱之戰敗遁走世子遣幢主檀文起千人戍西昌與襲相應琬又遣廖琰與其中兵參軍胡昭等築壘於西昌堅壁相守琬召豫章太守劉衍以為右將軍中護軍殷孚代為豫章太守督上流五郡以防襲等衡陽內史王應之率郡文武五百許人起義兵襲何慧文於長沙徑至城下慧文率左右出城與戰應之勇氣奮發擊殺數人遂與慧文交手戰斫慧文八創慧文斫應之斷足遂殺之時湘東國侍郎虞洽為太宗督國秩在湘東勸太守顏躍發兵應朝廷躍不從洽乃投桂陽收募得數百人還欲攻躍躍懼求和許之有眾二千時琬徵慧文率眾下尋陽發長沙已行數百里聞洽起兵乃回還攻洽洽尋戰敗奔走殷孚既去始興以郡五官掾譚伯初留知郡事士人劉嗣祖等斬伯初據郡起義琬遣始興太守韋希真鷹揚將軍楊弘之領眾一千討嗣祖嗣祖亦遣眾出南康與齊王世子合希真等以義徒強盛住廬陵不敢進廣州刺史袁曇遠聞始興起義遣將李萬周陳伯紹率眾討嗣祖嗣祖遣兵戍須陽萬周亦築壘相守嗣祖遣人誑萬周曰尋陽已平臺遣劉顗為廣州垂至萬周信之便回還襲番禺夜以長梯入城曇遠怯弱無防聞萬周反便徒跣出奔萬周追斬之於城內交州刺史檀翼被代還至廣州資貨鉅萬萬周誣以為逆襲而殺之遂劫掠公私銀帛藉略袁檀珍寶悉以自入袁顗袁顗悉雍州之眾來赴尋陽時孔道存為衛軍長史行荊州事琬以黃門侍郎劉道憲代之以道存為侍中行雍州事柳元景之誅也元景弟子世隆為上庸太守民吏共藏匿之顗起兵召世隆不至顗既下世隆乃合率蠻宋二千餘人起義於上庸來襲襄陽道存遣將五式民康元隆等迎擊於萬山世隆大敗還郡自守沈攸之等與劉胡相持久不決上又遣強弩將軍任農夫振武將軍武會倉冗從僕射全景文軍主劉伯符等領兵繼至攸之繕治船舸材板不周計無所出會琬送五千片榜供胡軍用俄而風潮奔迅榜捍突柵出江胡等力不能制自橦船艦殺沒數十人赴流而下來泊攸之等營於是材板大足琬進袁顗都督征討諸軍事給鼓吹一部六月十八日顗率樓船千艘來入鵲尾張興世建議越鵲尾上據錢溪斷其糧道胡累攻之不能剋事在興世傳劉亮率所領至胡砦下胡遣其副孫犀及張靈焦度鐵騎五匹越澗取亮不能得犀回馬去亮使左右善射者夾射之墮馬斬犀首張繼伯副馬可率所領來降劉亮營砦深入賊地袁顗畏憚之曰賊入我肝臟裏何由得活劉胡率輕舸四百由鵲頭內路欲攻錢溪既而謂其長史王念叔曰吾少習步戰未閑水鬭若步戰恒在數萬人中水戰在一舸之上舸舸各進不復相關正在三十人中取此非萬全之計吾不為也乃託瘧疾住鵲頭不進遣龍驤將軍陳慶領三百舸向錢溪戒慶不須戰張興世武會倉吾之所悉自當走耳陳慶至錢溪不敢攻越錢溪於梅根立砦胡別遣將王起領百舸攻興世興世擊大破之胡率其餘舸馳還謂顗曰興世營砦已立不可卒攻昨日小戰未足為損陳慶已與南陵大雷諸軍兵遏其上大軍在此鵲頭諸將又斷其下流已墮圍中不足復慮顗怒胡不戰謂曰糧運梗塞當如此何胡曰彼尚得泝流越我而上此運何以不得沿流越彼而下邪顗更使胡率步卒二萬鐵馬一千往攻興世休仁因此命沈攸之吳喜佼長生劉靈遺劉伯符等進攻濃湖造皮艦十乘拔其營柵苦戰移日大破之顗被攻既急馳信召胡令還張興世既據錢溪江路岨斷胡軍乏食琬大送資糧畏興世不敢下胡遣將迎之為錢溪所破資實覆沒都盡燒米三十萬斛胡眾駭懼胡副張喜來降說胡欲叛八月二十四日胡誑顗云更率步騎二萬上取興世兼下大雷餘餫令顗悉度馬配之其夜委顗奔走徑趣梅根先令薛常寶辦船舸悉撥南陵諸軍燒大雷諸城而走顗聞胡走亦棄眾西奔至青林見殺胡率數百舸二萬人向尋陽報子勛詐云袁顗已降軍皆散唯己率所領獨反宜速處分為一戰之資當停據盆城誓死不貳乃於江外夜取沔口琬聞胡去惶擾無復計呼褚靈嗣等謀之並不知所出唯云更集兵力加賞五階或云三階者張悅始發兄子浩喪乃稱疾呼琬計事令左右伏甲帳後戒之若聞索酒便出琬既至悅曰卿首唱此謀今事已急計將安出琬曰正當斬晉安王封府庫以謝罪耳悅曰今日寧可賣殿下求活邪因呼求酒再呼左右震慴不能應第二子洵提刀走出餘人續至即斬琬琬死時年六十時中護軍劉順在座驚起抱悅左右人欲殺之悅顧曰無關護軍乃止潘欣之聞琬死勒兵而至悅使人語之曰鄧琬謀反即已梟戮欣之乃回還取琬兒並殺之悅因單舸齎琬首馳下詣建安王休仁降蔡那子道淵以父為太宗效力被繫作部因亂脫鎖入城執子勛囚之沈攸之諸軍至江州斬子勛於桑尾牙下傳首京都劉順及餘同逆並伏誅吳喜張興世進向荊州沈懷明向郢州劉亮張敬兒向雍州孫超之向湘州沈思仁任農夫向豫章所至皆平定劉胡走入沔眾稍散比至石城裁餘數騎竟陵郡丞陳懷真憲子也聞胡經過率數十人斷道邀之胡人馬既疲自度不免因隨懷真入城告渴與之酒胡飲酒畢引佩刀自刺不死斬首送京邑張興世弟僧產追胡未至石城數十里逢送胡首信將還竟陵殺懷真竊有其功郢州行事張沈偽竟陵太守丘景先聞敗變形為沙門逃走追擒伏誅荊州聞濃湖平議欲更遣軍與郢州合勢又欲斷據巴陵經日不決乃遣將趙道始於江津築壘任演戍沙橋諸門津要皆有屯兵人情轉離將士漸逃散更議奉子頊奔益州就蕭惠開典籤阮道預邵宰不同曰近奉別詔諸藩若改迷歸順者悉復本爵且任叔兒已斷白帝楊僧嗣據梁州雖復欲西豈可得至道預邵宰即與劉道憲解遣白丁遣使歸罪荊州治中宗景土人姚儉等勒兵入城殺道憲道預記室參軍鮑照劫掠府庫無復孑遺執子頊以降初鄧琬徵兵巴東巴東太守羅寶稱辭以郡接凶蠻兵力不足分巴東人任叔兒聚徒起義遣信要寶稱寶稱持疑未決暴疾死叔兒乃自號輔國將軍引兵據白帝殺寶稱二子阻守三陝蕭惠開遣費欣壽等五千人攻叔兒叔兒與戰大破之斬欣壽子頊又遣中兵參軍何康之領宜都太守討叔兒軍至陝口為夷帥向子通所破挺身走還叔兒遂固白帝孔道存知尋陽已平遣使歸順尋聞柳世隆劉亮當至眾悉奔逃道存及三子同時自殺何慧文始謀同逆其母禁之不從母乃攜女歸江陵遽嫁之慧文才兼將吏榦略有施雖害王應之上特加原宥吳喜宣旨赦之慧文曰既陷逆節手害忠義天網雖復恢恢何面目以見天下之士和藥將飲門生覆之乃不食而死顏躍慮虞洽還都說其始時同逆密使人殺之初淮南定陵人賈襲宗本縣已為劉胡所得率二十人投沈攸之攸之言之建安王休仁休仁版為司徒參軍督護使還鄉里招集為胡所禽以火炙之問臺軍消息一無所言瞋目謂胡曰君稱兵內侮窺覦神器未聞奇謀遠略而為炮烙之刑僕本以身奉義死亦何有胡乃斬之前軍典籤范道興志不同逆為琬所誅其餘奉順見害者並為上所愍詔曰前鎮軍參軍督護范道興朕之舊隸經從北藩徒役南畿遭離命會抱恩固節受害群凶言念純誠良有憫愴可贈員外散騎侍郎南城令鮑法度後軍典籤馮次民永新令應生新建令庫延寶上饒令黃難等違逆識順同被誅滅言念既往宜在追榮可贈生奉朝請法度南臺御史次民延寶難並員外將軍有司奏寧朔將軍督豫州之梁郡諸軍事豫州刺史領南梁郡太守竟陵張興世都統水軍屢戰剋捷仍進斷賊上流錢溪貴口苦戰平定凶逆今封南平郡作唐縣開國侯食邑一千戶寧朔將軍參司徒中直兵軍事廣平佼長生同統水軍屢戰及興世上據錢溪長生獨距賊衝要功次興世今封武陵郡遷陵縣開國侯食邑八百戶寧朔將軍試守西陽太守吳興全景文尚書比部郎吳縣孫超之假輔國將軍右衛將軍南彭城劉亮等三人並經晉陵苦戰景文超之仍又北討破釜水軍斷賊糧運及經葛冢石梁二處破賊亮南伐經大戰又最處險劇景文今封西陽郡孝寧縣超之封長沙郡羅縣亮封順陽縣並開國侯食邑各六百戶假輔國將軍驃騎司馬劉靈遺寧朔將軍右軍蔡那寧朔將軍屯騎校尉段佛榮等三人統治攻道並經苦戰靈遣今封新野郡新野縣那封始平郡平陽縣佛榮封湘東郡臨蒸縣並開國伯食邑各五百戶假輔國將軍左軍吳興沈懷明龍驤將軍積射將軍東平周盤龍司徒參軍南彭城李安民等三人懷明經晉陵破賊又水軍南伐統治攻道盤龍雖不統軍並經大戰先登陷陳安民又隨張興世遏斷錢溪別統軍貴口破賊今封懷明建安郡吳興縣盤龍封晉安郡晉安縣安民封建安郡邵武縣並開國子食邑各四百戶假輔國將軍游擊將軍彭城杜幼文龍驤將軍羽林監太原王穆之龍驤將軍羽林監濟北頓生龍驤將軍羽林監沛郡周普孫員外散騎侍郎朱重恩等五人幼文經晉陵破賊在軍統攻道南伐濃湖普孫副沈攸之都統眾軍穆之生重恩並南伐有功今封幼文邵陵郡邵陽縣穆之封衡陽郡衡山縣生封始平郡武功縣普孫封順陽郡清水縣重恩封南海郡龍川縣並開國男食邑各三百戶江方興以戰功為太子左衛率賊未平病卒追封武當縣侯食邑五百戶方興濟陽考城人衣冠之舊也龍驤將軍虎賁中郎將董凱之隨張興世破胡白城先登封河隆縣子食邑四百戶軍主張靈符東南征討有功封上饒縣男食邑三百戶前征北長兼行參軍楊覆以貴口有功封綏城縣男食邑二百戶追贈虞洽檀玢給事中以李萬周為步兵校尉陳懷真以斬劉胡功追封永豐縣男食邑三百戶劉胡劉胡南陽涅陽人也本名坳胡以其顏面坳黑似胡故以為名及長以坳胡難道單呼為胡出身郡將捷口善處分稍至隊主討伐諸蠻往無不捷蠻甚畏憚之太祖元嘉二十八年為振威將軍率步騎三千討上如南山就溪蠻大破之孝建元年朱脩之為雍州以胡為平西外兵參軍寧朔將軍建昌太守擊魯秀有功除建武將軍東平陽平二郡太守入為江夏王義恭太宰參軍加龍驤將軍前廢帝景和中建安王休仁嘗為雍州以胡為休仁安西中兵參軍馮翊太守將軍如故仍轉諮議參軍太宗即位除越騎校尉蠻至今畏之小兒啼語之云劉胡來便止段佛榮段佛榮京兆人也泰始五年自游擊將軍為輔師將軍豫州刺史莅任清謹為西土所安後廢帝元徽二年徵為散騎常侍領長水校尉明年遷衛尉領右軍將軍未拜復出為冠軍將軍南豫州刺史歷陽太守四年卒追贈前將軍改封雲杜縣諡曰烈侯劉靈遣劉靈遣襄陽人也元徽元年自輔師將軍淮南太守為南豫州刺史歷陽太守將軍如故明年徵為散騎常侍領步兵校尉南蘭陵太守病卒諡曰壯侯袁顗字景章陳郡陽夏人太尉淑兄子也父洵吳郡太守顗初為豫州主簿舉秀才不行後補始興王濬後軍行參軍著作佐郎廬陵王紹南中郎主簿世祖征虜撫軍主簿廬江太守尚書都官郎江夏王義恭驃騎記室參軍汝陰王文學太子洗馬時顗父為吳郡顗隨父在官值元凶弒立安東將軍隨王誕舉兵入討板顗為諮議參軍事寧除正員郎晉陵太守遭父憂服闋為中書侍郎又除晉陵太守襲南昌縣五等子大明二年除東海王褘平南司馬尋陽太守行江州事復為義陽王昶前軍司馬太守如故昶尋罷府司馬職解加寧朔將軍改太守為內史復為尋陽王子房冠軍司馬將軍如故行淮南宣城二郡事五年召為太子中庶子御史中丞領本州大中正七年遷侍中明年除晉安王子勛鎮軍長史襄陽太守加輔國將軍未行復為永嘉王子仁左軍長史廣陵太守將軍如故未拜復為侍中領前軍將軍大明末新安王子鸞以母嬖有盛寵太子在東宮多過失上微有廢太子立子鸞之意從容頗言之顗盛稱太子好學有日新之美世祖又以沈慶之才用不多言論頗相蚩毀顗又陳慶之忠勤有幹略堪當重任由是前廢帝深感顗慶之亦懷其德景和元年誅群公欲引進顗任以朝政遷為吏部尚書又下詔曰宗社多故釁因冢司景命未淪神祚再乂自非忠謀密契豈伊剋殄侍中祭酒領前軍將軍新除吏部尚書顗游擊將軍領著作郎兼尚書左丞徐爰誠心內款參聞嘉策匡贊之效實監朕懷宜甄茅社以獎義概顗可封新隆縣子爰可封吳平縣子食邑各五百戶俄而意趣乖異寵待頗衰始令顗與沈慶之徐爰參知選事尋復反以為罪使有司糾奏坐白衣領職從幸湖熟往反數日不被喚召顗慮及禍詭辭求出沈慶之為顗固陳乃見許除建安王休仁安西長史襄陽太守加冠軍將軍休仁不行即以顗為使持節督雍梁南北秦四州郢州之竟陵隨二郡諸軍事領寧蠻校尉雍州刺史將軍如故顗舅蔡興宗謂之曰襄陽星惡豈可冒邪顗曰白刃交前不救流矢事有緩急故也今者之行本願生出虎口且天道遼遠何必皆驗如其有徵當修德以禳之耳於是狼狽上路恒慮見追行至尋陽喜曰今始免矣與鄧琬款狎相過常請間必盡日窮夜顗與琬人地本殊眾知其有異志矣既至襄陽便與劉胡繕修兵械纂集士卒會太宗定大事進顗號右將軍以荊州典籤邵宰乘驛還江陵道由襄陽顗反意已定而糧仗未足且欲奉表於太宗顗子祕書丞戩曰一奉表疏便為彼臣以臣伐君於義不可顗從之顗詐云被太皇太后令使其起兵便建牙馳檄奉表勸晉安王子勛即大位與琬書使勿解甲子勛即位進顗號安北將軍加尚書左僕射太宗使朝士與顗書曰夫夷陂相因興革遞數或多難而固其國或殷憂而啟聖明此既著於前史亦彰於聞見王室不造昏凶肆虐神鼎將淪宗稷幾泯幸天未亡宋乾歷有歸主上體自聖文繼明作睿而辱均牖里屯踰夏臺既天地俱憤義勇同奮剋殄鯨鯢三靈更造應天順民爰集寶命四海屬息肩之歡華戎見來蘇之泰吾等獲免刀鋸僅全首領復身奉惟新命承亨運緩帶談笑擊壤聖世汝雖劬勞于外跡阻京師然心期所寄江漢何遠自九江告變皆謂鄧氏狂惑比日國言藉藉頗塵吾子道路之議豈其或然聞此之日能無駭惋凶人反道敗德日夜滋深昵近狡慝取謀豺虎非惟毒流外物惡積中朝乃欲毀陵邑虐崇憲燒宗廟鹵御物然後蕩覆京都必使蘭蕕俱盡自大非聖上廟算靈圖俛眉遜避維持內外擁衛臣下則赤縣為戎百姓其魚矣此事此理寧可孰念既天道輔順謳歌有奉高祖之孫文皇之子德洞九幽功貫三曜匡拯家國提毓黔首若不子民南面將使神器何歸而群下構慝妄生窺覬成軫惑燕貫高亂趙讒人罔極自古有之汝中京冠冕儒雅世襲多見前載縣鑒忠邪何遠遺郎中之清軌近忘太尉之純概相與或群從舅甥或姻婭周款一旦胡越能無悵恨若疑誑所至邪無窮汝當誓眾奮戈翦此朝食若自延過聽迷塗未遠聖上臨物以仁接下以愛豈直雍齒先封乃當射鉤見相矣當由力窘跡屈丹誠未亮邪跂予南服寤寐延首若反棹沿流歸誠鳳闕錫珪開宇非爾而誰吾等並過荷曲慈俱叨非服紆金拖玉改觀蓬門入奉舜禹之渥出見羲唐之化雍容揄揚信白駒空谷之時也奈何毀擲先基自蹈凶戾山門蕭瑟松庭誰掃言念楚路豈不思父母之邦幸納惡石以蠲美疹裁書表意爾其圖之時尚書右僕射蔡興宗是顗舅領軍將軍袁粲是顗從父弟故書云群從舅甥也子勛徵顗下尋陽遣侍中孔道存行雍州事顗乃率眾馳下使子戩領家累俱還時劉胡屯鵲尾久不決泰始二年夏加顗都督征討諸軍事給鼓吹一部率樓船千艘戰士二萬來入鵲尾顗本無將略性又怯撓在軍中未嘗戎服語不及戰陳唯賦詩談義而已不能撫接諸將劉胡每論事酬對甚簡由此大失人情胡常切齒恚恨胡以南軍未至軍士匱乏就顗換襄陽之資顗荅曰都下兩宅未成亦應經理不可損徹又信往來之言京師米貴斗至數百以為不勞攻伐行自離散於是擁甲以待之太宗使顗舊門生徐碩奉手詔譬顗曰卿歷觀古今嶮之與強何嘗可恃自朕踐阼塗路梗塞卿無由奉表未經為臣今追蹤竇融猶未為晚也及劉胡叛走不告顗顗至夜方知大怒罵曰今年為小子所誤呼取飛鷰謂其眾曰我當自出追之因又遁走至鵲頭與戍主薛伯珍及其所領數千人步取青林欲向尋陽夜止山間宿殺馬勞將士顗顧謂伯珍曰我舉八州以謀王室未一戰而散豈非天邪非不能死豈欲草間求活望一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請以間言乃斬顗首詣錢溪馬軍主襄陽俞湛之湛之因斬伯珍併送首以為己功顗死時年四十七太宗忿顗違叛流尸於江弟子彖微服求訪四十一日乃得密致喪瘞於石頭後岡與一舊奴躬共負土後廢帝即位方得改葬顗子戩為偽黃門侍郎加輔國將軍戍盆城尋陽敗戩棄城走討禽伏誅孔覬孔凱字思遠會稽山陰人太常琳之孫也父邈揚州治中凱少骨梗有風力以是非為己任口吃好讀書早知名初舉揚州秀才補主簿長沙王義欣鎮軍功曹衡陽王義季安西主簿戶曹參軍領南義陽太守轉署記室奉牋固辭曰記室之局實惟華要自非文行秀敏莫或居之覬遜業之舉無聞於鄉部惰遊之貶有編於疲農直山淵藏引用不遐棄故得抃風舞潤憑附彌年今日之命非所敢冒昔之學優藝富猶尚斯難況覬能薄質魯亦何容易覬聞居方辨物君人所以官才陳力就列自下所以奉上覬雖不敏常服斯言今寵藉惟舊舉非尚德恐無以提衡一隅僉允視聽者也伏願天明照其心請乞改今局授以閑曹則鳧鶴從方所憂去矣又曰夫以記室之要宜須通才敏忠加性情勤密者覬學不綜貫性又疏惰何可以屬知祕記秉筆文閨假吹之尤方斯非濫覬少淪常檢本無遠植榮進之願何能忘懷若實有螢爝增暉光景固其騰聲之日飛藻之辰也豈敢自求從容保其淡逸伏願矜其魯拙業之有地則曲成之施終始優渥義季不能奪遂得免召為通直郎太子中舍人建平王友祕書丞中書侍郎隨王誕安東諮議參軍領記室黃門侍郎建平王宏中軍長史復為黃門臨海太守初晉世散騎常侍選望甚重與侍中不異其後職任閑散用人漸輕孝建三年世祖欲重其選詔曰散騎職為近侍事居規納置任之本實惟親要而頃選常侍陵遲未允宜簡授時良永寘清轍於是吏部尚書顏竣奏曰常侍華選職任俟才新除臨海太守孔覬意業閑素司徒左長史王彧懷尚清理並任為散騎常侍世祖不欲威權在下其後分吏部尚書置二人以輕其任侍中蔡興宗謂人曰選曹要重常侍閑淡改之以名而不以實雖主意欲為輕重人心豈可變邪既而常侍之選復卑選部之貴不異覬領本州大中正大明元年改太子中庶子領翊軍校尉轉祕書監欲以為吏部郎不果遷廷尉卿御史中丞坐鞭令史為有司所糾原不問六年除義興太守未之任為尋陽王子房冠軍長史加寧朔將軍行淮南宣城二郡事其年復除安陸王子綏冠軍長史江夏內史復隨府轉後軍長史如故為人使酒仗氣每醉輒彌日不醒僚類之閒多所凌忽尤不能曲意權幸莫不畏而疾之不治產業居常貧罄無有豐約未嘗關懷為二府長史典籤諮事不呼不敢前不令去不敢去雖醉日居多而明曉政事醒時判決未嘗有壅眾咸云孔公一月二十九日醉勝他人二十九日醒也世祖每欲引見先遣人覘其醉醒性真素不尚矯飾遇得寶玩服用不疑而他物麤敗終不改易時吳郡顧覬之亦尚儉素衣裘器服皆擇其陋者宋世言清約稱此二人覬弟道存從弟徽頗營產業二弟請假東還覬出渚迎之輜重十餘船皆是綿絹紙席之屬覬見之偽喜謂曰我比困乏得此甚要因命上置岸側既而正色謂道存等曰汝輩忝預士流何至還東作賈客邪命左右取火燒之燒盡乃去先是庾徽之為御史中丞性豪麗服玩甚華顗代之衣冠器用莫不麤率蘭臺令史並三吳富人咸有輕之之意覬蓬首緩帶風貌清嚴皆重迹屏氣莫敢欺犯庾徽之字景猷潁川鄢陵人也自中丞出為新安王子鸞北中郎長史南東海太守卒官八年覬自郢州行真徵為右衛將軍未拜徙司徒左長史道存代覬為後軍長史江夏內史時東土大旱都邑米貴一斗將百錢道存慮覬甚乏遣吏載五百斛米餉之覬呼吏謂之曰我在彼三載去官之日不辦有路糧二郎至彼未幾那能便得此米邪可載米還彼吏曰自古以來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去永光元年遷侍中未拜復為江夏王義恭太宰長史復出為尋陽王子房右軍長史加輔國將軍行會稽郡事太宗即位召覬為太子詹事遣故佐平西司馬庾業為右軍司馬代覬行會稽郡事時上流反叛上遣都水使者孔璪入東慰勞璪至說覬以廢帝侈費倉儲耗盡都下罄匱資用已竭今南北並起遠近離叛若擁五郡之銳招動三吳事無不克覬然其言遂發兵馳檄覬子長公璪二子淹玄並在都馳信密報泰始二年正月並叛逃東歸遣書要吳郡太守顧琛琛以母年篤老又密邇京邑與長子寶素謀議未叛少子寶先時為山陰令馳書報琛以南師已近朝廷孤弱不時順從必有覆滅之禍覬前鋒軍已渡浙江琛遂據郡同反吳興太守王曇生義興太守劉延熙晉陵太守袁標一時響應庾業既東太宗即以代延熙為義興加建威將軍以延熙為巴陵王休若鎮東長史業至長塘湖即與延熙合太宗遣建威將軍沈懷明東討尚書張永係進鎮東將軍巴陵王休若董統東討諸軍事移檄東土曰蓋聞釁集有兆禍至無門倚伏之來實惟人致故囂述貪亂終殄宗祀昌憲構氛旋潤斧鉞斯則昭章記牒炯戒今古者也自國步時艱三綱道盡神歇靈繹璿業綴旒皇上仁雄集瑞英叡應歷鳳儀熛昇龍煇電舉盪穢紫樞不俟鳴條之誓凝政中宇不肆漂杵之威是以墜維再造虧天重構幽明裁紀標配斯光而群凶恣虐協扇童孺蕞爾東垂復淪醜迹邪回從慝蜂動蟻附聖圖霆發神威四臨羽驛所屆義旅雲屬欃鉞所麾逆徒冰泮勝負之效皎然已顯司徒建安王英猷冠世董率元戎驃騎山陽王風略夙昭撫厲中陳或振霜江蠡或騰焱荊河金甲燭天庭囂聲震海浦前將軍吳興太守張永東南標秀協贊戎機建威將軍沈懷明鎮東中兵參軍劉亮武衛將軍壽寂之霜銳五千熊騰虎步龍驤將軍王穆之龍驤將軍頓生鐵騎連群風驅電邁右軍將軍齊王射聲校尉姚道和樓艦千艘覆川蓋汜左軍垣恭祖步兵校尉杜幼文瑠從僕射全景文員外散騎侍郎孫超之並率虎旅駱驛雲赴殿中將軍杜敬真殿中將軍陸攸之建武將軍吳喜甲楯一萬分趣義興予猥承人乏總司戎統聳劍東馳申憤海曲歕氣則白日盡晦刷馬則清江倒流以此伐叛何勍不勦以此柔服何順不懷愍彼群迷弗辨堯桀螳黽微命擬雷霆之衝已枯之葉當霜飆之隊尺豎所為寒心匹婦所為歎息夫因禍提慶資敗為成前監不忘後事明筮若能相率歸順投兵效款則福鍾當年祉覃來裔孰如身轘宗屠鬼餧魂泣者哉詳鏡安危自求多福購生禽覬千五百戶開國縣侯生擒琛千戶開國縣侯斬送者半賞時將士多是東人父兄子弟皆已附逆上因送軍普加宣示曰朕方務德簡刑使四罪不相及助順同逆者一以所從為斷卿等當深達此懷勿以親戚為慮也眾於是大悅覬所遣孫曇瓘等軍頓晉陵九里部陳甚盛懷明至奔牛所領寡弱乃築壘自固張永至曲阿未知懷明安否百姓驚擾將士咸欲離散永退還延陵就休若諸將帥咸勸退保破岡其日大寒風雪甚猛塘埭決壞眾無固心休若宣令敢有言退者斬眾小定乃築壘息甲尋得懷明書賊定未進軍主劉亮又繼至兵力轉加人情乃安時永世令孔景宣復反柵縣西江峴山斷遏津徑劉延熙加其寧朔將軍杜敬真陸攸之溧陽令劉休文攻景宣別砦斬其中兵參軍史覽之等十五人永世人徐崇之率鄉里起義攻縣斬景宣吳喜至板崇之領縣事太宗嘉休文等誠效除休文寧朔將軍縣如故崇之殿中將軍行永世縣事並賜侯爵喜敬真及員外散騎侍郎竺超之等至國山縣界遇東軍於虎檻村擊大破之自國山進吳城去義興十五里劉延熙遣楊玄孫矯之沈靈秀黃泰四軍拒喜喜等兵力甚弱眾寡勢懸交戰盡日臨陳斬楊玄孫矯之黃泰餘眾一時奔走因進義興南郭外延熙屯軍南射堂喜遣步騎擊之即退還水北乃柵斷長橋保郡自守嘉築壘與之相持庾業於長塘湖口夾岸築城有眾七千餘人器甲甚盛與延熙遙相掎角沈懷明張永與晉陵軍相持久不決太宗每遣軍輒多所求須不時上道外監朱幼舉司徒參軍督護任農夫驍果有膽力性又簡率資給甚易乃以千人配之使助東討時庾業兵盛農夫於延陵出長塘雖云千兵至者裁四百未至數十里遣人參候云賊築城猶未合農夫率廣武將軍高尚之永興令徐崇之馳往攻之因其城壘未立農夫親持刀楯赴城入陳大破之庾業棄城走義興先是龍驤將軍阮佃夫募得蜀人數百多壯勇便戰皆著犀皮鎧執短兵本應就佃夫向晉陵未發會農夫須人分以配之及戰每先登東人並畏憚又怪其形飾殊異舊傳狐獠食人每見之輒奔走農夫收其船杖與高志之進義興援吳喜二月一日喜乃度水攻郡分兵擊諸壘柵農夫雖至眾力尚少兵勢不敵喜乃與數騎登高東西指麾若招引四面俱進者東軍大駭諸營一時奔散唯龍驤將軍孔叡一柵未拔喜以殺傷者多乃開圍緩之其夜庾業孔叡相率奔走義興平劉延熙投水死有人告之乃斬尸傳首京邑義興諸縣唯綏安令巢邃秉節不移不受偽爵時齊王率軍東討與張永劉亮杜幼文沈懷明等於晉陵九里西結營與東軍相持義興軍既為吳喜等所破奔散者多投晉陵東軍震恐上又遣積射將軍江方興南臺御史王道隆至晉陵視賊形勢賊帥孫曇瓘程捍宗陳景遠凡有五城互相連帶捍宗城猶未固其月三日道隆與齊王張永共議捍宗城既未立可以籍手上副聖旨下成眾氣道隆便率所領急攻之俄頃城陷斬捍宗首劉亮果勁便刀楯朝士先不相悉上亦弗聞唯尚書左丞徐爰知之白太宗稱其驍敢至是每戰以刀楯直盪往輒陷決張永嫌其過銳不令居前賊連柵周亘塘道迫狹將士力不得展亮乃負楯而進直入重柵眾軍因之即皆摧破袁標遣千人繼至齊王與永等乘勝馳擊又大破之屠其兩城曇瓘率眾數百鼓譟而至標之遣千人繼之眾軍駭懼將欲散矣江方興率勇士迎射之應弦倒者相繼曇瓘因此敗走吳喜軍至義鄉偽輔國將軍車騎司馬孔璪屯吳興南亭太守王曇生詣璪計事會信還云臺軍已近璪大懼墮床曰懸賞所購唯我而已今不遽走將為人禽左右聞之並各散走璪與曇生焚燒倉庫東奔錢塘喜至吳興頓置郡城倉稟遇雨不然無所損失初曇生遣寧朔將軍沈靈寵率八千人向黃鵠嶠欲從候道出蕪湖迎接南軍廣德令王蘊發兵據嶮靈寵不得進屯住故鄣曇生既走靈寵乃與弟靈昭軍副姚天覆率偏裨以下十七軍歸順太宗嘉之擢為鎮東參軍事因率所領東討喜分遣軍主沈思仁吳係公追躡璪等陸攸之任農夫自東遷進向吳郡臺遣軍主張靈符即晉陵其月四日齊王急攻之其夜孫曇瓘陳景遠一時奔潰諸軍至晉陵袁標棄郡東走晉陵既平吳中震動吳興軍又將至顧琛與子寶素攜其老母泛海奔會稽海鹽令王孚邀討不及太宗以四郡平定留吳喜統全景文沈懷明劉亮孫超之壽寂之等東平會稽追齊王張永姚道和杜幼文垣恭祖張靈符北討王穆之頓生江方興南伐其月九日喜等至錢唐錢唐令顧昱及孔璪王曇生等奔渡江東喜仍進軍柳浦諸暨令傅琰將家歸順喜遣鎮北參軍沈思仁強弩將軍任農夫龍驤將軍高志之南臺御史阮佃夫揚武將軍盧僧澤等率軍向黃山浦東軍據岸結砦農夫等攻破之乘風舉帆直趣定山破其大帥孫會之於陳斬首自定山進向漁浦戍主孔叡率千餘人據壘拒戰佃夫使隊主闕法炬射殺樓上弩手叡眾驚駭思仁縱兵攻之斬其軍主孔奴於是敗散其月十九日吳喜使劉亮由鹽官海渡直指同浦壽寂之濟自漁浦邪趣永興喜自柳浦渡趣西陵西陵諸軍皆悉散潰斬庾業顧法直吳恭傳首京都東軍主卜道濟督戰許天賜請降庾業新野人也父彥達以幹局為太祖所知為益州刺史世祖世官至豫章太守太常卿劉亮全景文孫超之進次永興同市遇覬所遣陸孝伯孔豫兩軍與戰破之斬孝伯豫首會稽聞西軍稍近將士多奔亡覬不能復制二十日上虞令王晏起兵攻郡覬以東西交逼憂遽不知所為其夕率千餘人聲云東討實趣石瀃先已具船海浦值湖涸不得去眾叛都盡門生載以小船竄于嵴山村偽車騎從事中郎張綏先遣人於錢唐詣喜歸誠及覬走綏閉封倉庫以待王師二十一日晏至郡入自北門囚綏付作部其夜殺之執尋陽王子房於別署縱兵大掠府庫空盡若邪村民錄送偽龍驤將軍車騎中兵參軍事主孔叡將斬之叡曰吾年已過立未霑官伍蒙知己之顧以身許之今日就死亦何所恨含笑就戮孔璪叛投門生陸林夫林夫斬首送之二十二日嵴山民縛覬送詣晏晏謂之曰此事孔璪之為無豫卿事可作首辭當相為申上覬曰江東處分莫不由身委罪求活便是君輩行意耳晏乃斬之東閤外臨死求酒曰此是平生所好時年五十一顧琛王曇生袁標等並詣喜歸罪喜皆宥之琛子寶素與父相失自縊死東軍主凡七十六人於陳斬十七人其餘皆原宥初遣庾業向會稽追使奉朝請孫長度送仗與之并令召募行達晉陵袁標就其求仗長度不與為標所殺追贈給事中先是鄧琬遣臨川內史張淹自南路出東陽淹遣龍驤將軍桂遑征西行參軍劉越緒屯據定陽縣巴陵王休若遣沈思仁討之思仁遣軍主崔公烈攻其營斬幢主朱伯符首桂遑劉越緒諸軍並奔逸晉安太守劉瞻據郡同逆建安內史趙道生起義討之聚徒未合七月思仁遣軍主姚宏祖鮑伯奮應寄生等討破瞻斬之於羅江縣鄧琬先遣新安太守陽伯子及軍主任獻子襲黟縣縣令吳茹公固守力不敵棄城走伯子等屯據縣城茹公與臺軍主丘敬文李靈賜蕭柏壽等攻圍彌時八月乃剋斬伯子獻子首張淹屯軍上饒縣聞劉胡敗軍副鄱陽太守費曇欲圖之詐云得鄧琬信急宜諮論欲因此斬淹淹素事佛方禮佛不得時進曇復誑云捕虎借大鼓及仗士二百人淹信而與之曇因率眾入山饗士約誓揚言虎走城西鳴鼓大呼直來趣城城門守衛悉委仗觀之曇率眾突入淹正禮佛聞難走出因斬首史臣曰自江左以來舉干戈以圖宗國十有一焉其能克振者四而已矣元皇外守虛器政由王氏蘇峻事雖暫申旋受屠磔桓玄宣武之子運屬橫流世祖仗順入討民無異望其餘皆漆顙夷宗作戒於後何哉夫勝敗之數實由眾心社廟尊嚴民情所係安以義動猶或稱難況長戟指闕志在陵暴者乎泰始交爭逆順未辨太宗身劋悖亂事惟拯溺國道屯詖宜立長君太祖之昭義無不可子勛體自世祖家運已絕當璧之命屬有所歸曲直二塗未知攸適徒以據有神甸擅資天府宗稷之重威臨四方以中制外故能式清區宇夫帝王所居目以眾大之號名曰京師其義趣遠有以也
