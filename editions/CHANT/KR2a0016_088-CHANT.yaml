body:
  text: 卷九十一五十一孝義易曰立人之道曰仁與義夫仁義者合君親之至理實忠孝之所資雖義發因心情非外感然企及之旨聖哲詒言至於風漓化薄禮違道喪忠不樹國孝亦愆家而一世之民權利相引仕以勢招榮非行立乏翱翔之感棄舍生之分霜露未改大痛已忘於心名節不變戎車遽為其首斯並軌訓之理未弘汲引之塗多闕若夫情發於天行成乎己捐軀舍命濟主安親雖乘理闇至匪由勸賞而宰世之人曾微誘激乃至事隱閭閻無聞視聽故可以昭被圖篆百不一焉今采綴湮落以備闕文云爾龔穎龔穎遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡穎號哭奔赴殯送以禮縱後設宴延穎不獲已而至樂奏穎流涕起曰北面事人亡不能死何忍聞舉樂蹈跡逆亂乎縱大將譙道福引出將斬之道福母即穎姑跣出救之故得免縱既僭號備禮徵又不至乃收穎付獄脅以兵刃執志彌堅終無回改至于蜀平遂不屈節其後刺史至輒加辟引歷府參軍州別駕從事史太祖元嘉二十四年刺史陸徵上表曰臣聞運纏明夷則艱貞之節顯時屬棟撓則獨立之操彰昔之元興皇綱弛紊譙縱乘釁肆虐巴庸害殺前益州刺史毛璩竊據蜀土涪岷士庶怵迫受職璩故吏龔穎獨秉身貞白抗志不撓殯送舊君哀敬盡禮全操九載不梁偽朝縱雖殘凶猶重義概遂延以旌命劫以兵威穎忠誠奮發辭色方壯雖桎梏在身踐危愈信其節白刃臨頸見死不更其守若王蠋之抗辭燕軍同周苛之肆詈楚王方之於穎蔑以加焉誠當今之忠壯振古之遺烈而名未登於王府爵猶齒於卿曹斯實邊氓遠土所為於邑臣過叨恩私宣風萬里志存砥竭有懷必聞故率愚愨舉其所知追懼紕妄伏增悚栗穎遂不被朝命終於家劉瑜劉瑜歷陽人也七歲喪父事母至孝年五十二又喪母三年不進鹽酪號泣晝夜不絕聲勤身運力以營葬事服除後二十餘年布衣蔬食言輒流涕常居墓側未嘗暫違太祖元嘉初卒賈恩賈恩會稽諸暨人也少有志行為鄉曲所推重元嘉三年母亡居喪過禮未葬為鄰火所逼恩及妻柏氏號哭奔救鄰近赴助棺櫬得免恩及柏俱見燒死有司奏改其里為孝義里蠲租布三世追贈天水部顯親縣左尉郭世道郭世道會稽永興人也生而失母父更娶世道事父及後母孝道淳備年十四又喪父居喪過禮殆不勝喪家貧無產業傭力以養繼母婦生一男夫妻共議曰勤身供養力猶不足若養此兒則所費者大乃垂泣瘞之母亡負土成墳親戚或共賻助微有所受葬畢傭賃倍還先直服除後哀戚思慕終身如喪者以為追遠之思無時去心故未嘗釋衣幍仁厚之風行於鄉黨鄰村小大莫有呼其名者嘗與人共於山陰市貨物誤得一千錢當時不覺分背方悟請其伴求以此錢追還本主伴大笑不答世道以己錢充數送還之錢主驚嘆以半直與世道世道委之而去元嘉四年遣大使巡行天下散騎常侍袁愉表其淳行太祖嘉之敕郡牓表閭門蠲其稅調改所居獨楓里為孝行焉太守孟顗察孝廉不就原平子原平字長泰又稟至行養親必己力性閑木功傭賃以給供養性謙虛每為人作匠取散夫價主人設食原平自以家貧父母不辦有肴味唯餐鹽飯而已若家或無食則虛中竟中義不獨飽要須日暮作畢受直歸家於里中買糴然後舉爨父抱篤疾彌年原平衣不解帶口不嘗鹽菜者跨積寒暑又未嘗睡臥父亡哭踊慟絕數日方蘇以為奉終之義情禮所畢營壙凶功不欲假人本雖智巧而不解作墓乃訪邑中有營墓者助人運力經時展勤久乃閑練又自賣十夫以供眾費窀穸之事儉而當禮性無術學因心自然葬畢詣所買主執役無懈與諸奴分務每讓逸取勞主人不忍使每遣之原平服勤未曾暫替所餘私夫傭賃養母有餘聚以自贖本性智巧既學搆冢尤善其事每至吉歲求者盈門原平所赴必自貧始既取賤價又以夫日助之父喪既終自起兩間小屋以為祠堂每至節歲烝嘗於此數日中哀思絕飲粥父服除後不復食魚肉於母前示有所噉在私室未曾妄嘗自此迄終三十餘載高陽許瑤之居在永興罷建安郡丞還家以緜一斤遺原平原平不受送而復反者前後數十瑤之乃自往曰今歲過寒而建安綿好以此奉尊上下耳原平乃拜而受之及母終毀瘠彌甚僅乃免喪墓前有數十畝田不屬原平每至農月耕者恒裸袒原平不欲使人慢其墳墓乃販質家資貴買此田三農之月輒束帶垂泣躬自耕墾每出市賣物人問幾錢裁言其半如此積時邑人皆共識悉輒加本價與之彼此相讓欲買者稍稍減價要使微賤然後取直居宅下濕選宅為溝以通淤水宅上種少竹春月夜有盜其荀者原平偶起見之盜者奔走墜溝原平自以不能廣施至使此人顛沛乃於所植竹處溝上立小橋令足通行又采筍置籬外鄰曲慚愧無復取者太祖崩原平號哭致慟日食麥粄一枚如此五日人或問之曰誰非王民何獨如此原平泣而答曰吾家見異先朝蒙襃贊之賞不能報恩私心感慟耳又以種瓜為業世祖大明七年大旱瓜瀆不復通船縣官劉僧秀愍其窮老下瀆水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運瓜之船乃步從他道往錢唐貨賣每行來見人牽埭未過輒迅楫助之己自引船不假旁力若自船已渡後人未及常停住須待以此為常嘗於縣南郭鳳埭助人引船遇有相鬭者為吏所錄聞者逃散唯原平獨住吏執以送縣縣令新到未相諳悉將加嚴罰原平解衣就罪義無一言左右小大咸稽顙請救然後得免由來不謁官長自此以後乃修民敬太守王僧朗察孝廉不就太守蔡興宗臨郡深加貴異以私米饋原平及山陰朱百年妻教曰秩年之貺著自國書餼貧之典有聞甲令況高柴窮老萊婦屯暮者哉永興郭原平世稟孝德洞業儲靈深仁絕操追風曠古棲貞處約華耇方嚴山陰朱百年道終物表妻孔耋齒孀居窶迫殘日欽風撫事嗟慨滿懷可以帳下米各餉百斛原平固讓頻煩誓死不受人或問曰府君嘉君淳行慜君貧老故加此贍豈宜必辭原平曰府君若以吾義行邪則無一介之善不可濫荷此賜若以其貧老邪耋齒甚多屢空比室非吾一人而已終不肯納百年妻亦辭不受會稽貴重望計及望孝盛族出身不減祕著太宗泰始七年興宗欲舉山陰孔仲智長子為望計原平次息為望孝仲智會土高門原平一邦至行欲以相敵會太宗別敕用人故二選並寢泰豫元年興宗徵還京師表其殊行宜舉拔顯選以勸風俗舉為太學博士會興宗薨事不行明年元徽元年卒於家原平少長交物無忤辭於人與其居處者數十年未嘗見喜慍之色三子一弟並有門行長子伯林舉孝廉次子靈馥儒林祭酒皆不就嚴世期嚴世期會稽山陰人也好施慕善出自天然同里張邁三人妻各產子時歲飢儉慮不相存欲棄而不舉世期聞之馳往拯救分食解衣以贍其乏三子並得成長同縣俞陽妻莊年九十莊女蘭七十並各老病單孤無所依世期衣飴之二十餘年死並殯葬宗親嚴弘鄉人潘伯等十五人荒年並餓死露骸不收世期買棺器殯埋存育孩幼山陰令何曼之表言之元嘉四年有司奏牓門曰義行嚴氏之閭復其身徭役蠲租稅十年吳逵吳逵吳興烏程人也經荒飢饉係以疾疫父母兄弟嫂及群從小功之親男女死者十三人逵時病困鄰里以葦席裹之埋於村側既而逵疾得瘳親屬皆盡唯逵夫妻獲全家徒壁立冬無被絝晝則庸賃夜則伐木燒㙛此誠無有懈倦逵夜行遇虎虎輒下道避之期年中成七墓葬十三棺鄰里嘉其志義葬日悉出赴助送終之事亦儉而周禮逵時逆取鄰人夫直葬畢眾悉以施之逵一無所受皆傭力報答焉太守張崇之三加禮命太守王韶之擢補功曹史逵以門寒固辭不受舉為孝廉潘綜潘綜吳興烏程人也孫恩之亂妖黨攻破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語綜我不能去汝走可脫幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為老子不走去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絕有一賊從傍來相謂曰卿欲舉大事此兒以死救父云何可殺殺孝子不祥賊良久乃止父子並得免綜鄉人祕書監丘繼祖廷尉沈赤黔以綜異行廉補左民令史除遂昌長歲滿還家太守王韶之臨郡發日前被符孝廉之選必審其人雖四科難該文質寡備必能孝義邁俗拔萃著聞者便足以顯應明揚允將符旨烏程潘綜守死孝道全親濟難烏程吳逵義行純至列墳成行咸精誠內淳休聲外著可並察孝廉并列上州臺陳其行跡及將行設祖道贈以四言詩曰東寶惟金南木有喬發煇曾崖竦幹重霄美哉茲土世載英髦育翮幽林養音九皋唐后明揚漢宗蒲輪我皇降鑑思樂懷人群臣競薦舊章惟新余亦奚貢曰義與仁仁義伊在惟吳惟潘心積純孝事著艱難投死如歸淑問若蘭吳實履仁心力偕單固此苦節易彼歲寒霜雪雖厚松柏丸丸人亦有言無善不彰二子徽猷彌久彌芳拔叢出類景行朝陽誰謂道遐弘之則光咨爾庶士無然怠荒江革奉摯慶祿是荷姜詩入貢漢朝咨嗟勗哉行人敬爾休嘉俾是下國照煇京華伊余朽駘竊服懼盜無能禮樂豈暇聲教順彼康夷懿德是好聊綴所懷以贈二孝元嘉四年有司奏改其里為純孝里蠲租布三世張進之張進之永嘉安固人也為郡大族少有志行歷郡五官主簿永寧安固二縣領校尉家世富足經荒年散其財救贍鄉里遂以貧罄全濟者甚多進之為太守王味之吏味之有罪當見收逃避投進之家供奉經時盡其誠力以本村淺近移入池溪味之墮水沈沒進之投水拯救相與沈淪危而得免時劫掠充斥每入村抄暴至進之門輒相約勒不得侵犯其信義所感如此元嘉初詔在所蠲其繇役孫恩之亂永嘉太守司馬逸之被害妻子並死兵寇之際莫敢收藏郡吏俞僉以家財買棺歛逸之等六喪送致還都葬畢乃歸鄉里元嘉中老病卒王彭王彭盱眙直瀆人也少喪母元嘉初父又喪亡家貧力弱無以營葬兄弟二人晝則傭力夜則號感鄉里並哀之乃各出夫力助作㙛㙛須水而天旱穿井數十丈泉不出墓處去淮五里荷檐遠汲困而不周彭號天自訴如此積日一旦大霧霧歇㙛竈前忽生泉水鄉鄰助之者並嗟歎神異縣邑近遠悉往觀之葬事既竟水便自竭元嘉九年太守劉伯龍依事表言改其里為通靈里蠲租布三世蔣恭蔣恭義興臨津人也元嘉中晉陵蔣崇平為劫見禽云與恭妻弟吳晞張為侶晞張先行不在本村遇水妻息五口避水移寄恭家討錄晞張不獲收恭及兄協付獄治罪恭協並款舍住晞張家口而不知劫情恭列晞張妻息是婦之親親今有罪恭身甘分求遣兄協協列協是戶主延制所由有罪之日關協而已求遣弟恭兄弟二人爭求受罪郡縣不能判依事上詳州議之曰禮讓者以義為先自厚者以利為上末世俗薄靡不自私伏膺聖教猶或不逮況在野夫未達誥訓而能互發天倫之憂甘受莫測之罪若斯情義實為殊特蔑爾恭協而能行之茲乃終古之所希盛世之嘉事二子乘舟無以過此豈宜揔執憲文加以罪戮且晞張封筒遠行他界為劫造釁自外贓不還家所寓村伍容有不知不合加罪勒縣遣之還復民伍乃除恭義成令協義怡令徐耕徐耕晉陵延陵人也自令史除平原令元嘉二十一年大旱民飢耕詣縣陳辭曰今年亢旱禾稼不登氓黎飢餒採掇存命聖上哀矜已垂存拯但饉罄來久困殆者眾米穀轉貴糴索無所方涉春夏日月悠長不有微救永無濟理不惟凡瑣敢憂身外鹿鳴之求思同野草氣類之感能不傷心民糴得少米資供朝夕志欲自竭義存分餐今以千斛助官賑貸此境連年不熟今歲尤甚晉陵境特為偏祐此郡雖弊猶有富室承陂之家處處而是並皆保熟所失蓋微陳積之穀皆有巨萬旱之所弊實鍾貧民溫富之家各有財寶謂此等並宜助官得過儉月所損至輕所濟甚重今敢自勵為勸造之端實願掘水揚塵崇益山海縣為言上當時議者以耕比漢卜式詔書襃美酬以縣令大明八年東土飢旱東海嚴成東莞王道蓋各以穀五百斛助官賑卹孫法宗孫法宗吳興人也父遇亂被害尸骸不收母兄並餓死法宗年小流迸至年十六方得還單身勤苦霜行草宿營辦棺椁造立冢墓葬送母史儉而有禮以父喪不測於部境之內尋求枯骨刺血以灌之如此者十餘年不獲乃縗絰終身不娶餽遺無所受世祖初揚州辟為文學從事不就范叔孫范叔孫吳郡錢唐人也少而仁厚固窮濟急同里范法先父母兄弟七人同時疫死唯餘法先病又危篤喪尸經月不收叔孫悉備棺器親為殯埋又同里施淵夫疾病父母死不殯又同里范苗父子並亡又同里危敬宗家口六人俱得病二人喪沒親鄰畏遠莫敢營視叔孫並殯葬躬卹病者並皆得全鄉曲貴其義行莫有呼其名者世祖孝建初除章陵王國中軍將軍不就義興吳國夫亦有義讓之美人有竊其稻者乃引還為設酒食以米送之卜天與卜天與吳興餘杭人也父名祖有勇幹徐赤將為餘杭令祖依隨之赤將死高祖聞其有幹力召補隊主從征伐封關中侯歷二縣令天與善射弓力兼倍容貌嚴正笑不解顏太祖以其舊將子使教皇子射居累年以白衣領東掖防關隊元嘉二十七年臧質救懸瓠劉興祖守白石並率所領隨之虜退罷遷領輦後第一隊撫卹士卒甚得眾心二十九年以為廣威將軍領左細仗兼帶營祿元凶入弒事變倉卒舊將羅訓徐罕皆望風屈附天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常來云何即時方作此語只汝是賊手射賊劭於東堂幾中逆徒擊之臂斷倒地乃見殺其隊將張泓之朱道欽陳滿與天與同出拒戰並死世祖即位詔曰日者逆豎犯蹕釁變卒起廣威將軍關中侯卜天與提戈赴難挺身奮節斬殪凶黨而旋受虐刃勇冠當時義侔古烈興言追悼傷痛於心宜加甄贈以旌忠節可贈龍驤將軍益州刺史謚曰壯侯軍駕臨哭泓之等各贈郡守給天與家長稟伯宗子伯宗殿中將軍太宗泰始初領幢擊南賊於赭圻戰沒伯興伯宗弟伯興官至前將軍南平昌太守直閤領細仗主順帝昇明元年與袁粲同謀伏誅天生天與弟天生少為隊將十人同火屋後有一大坑廣二丈餘十人共跳之皆渡唯天生墜坑天生乃取實中苦竹剡其端使利交橫布坑內更呼等類共跳並畏懼不敢天生曰我向已不渡今者必墜此坑中丈夫跳此不渡亦何須活乃復跳之往反十餘曾無留礙眾並歎服以兄死節為世祖所留心稍至西陽王子尚撫軍參軍加龍驤將軍隸沈慶之攻廣陵城天生推車塞塹率數百人先登西北角徑至城上賊為重柵斷攻道苦戰移日不拔乃還詔曰天生始受戎任甫造寇壘而投輪越塹率果先騰驍壯之氣嘉歎無已可且賜布千匹以厲眾校大明末為弋陽太守太宗泰始初與殷琰同逆邊城令宿僧護起義討斬之許昭先許昭先義興人也叔父肇之坐事繫獄七年不判子姪二十許人昭先家最貧薄專獨料訴無日在家餉饋肇之莫非珍新家產既盡賣宅以充之肇之諸子倦怠昭先無有懈息如是七載尚書沈演之嘉其操行肇之事由此得釋昭先舅夫妻並疫病死亡家貧無以殯送昭先賣衣物以營殯葬舅子三人並幼贍護皆得成長昭先父母皆老病家無僮役竭力致養甘旨必從宗黨嘉其孝行雍州刺史劉真道板為征虜參軍昭先以親老不就本邑補主簿昭先以叔未仕又固辭元嘉初西陽董陽五世同財為鄉邑所美會稽姚吟事親至孝孝建初揚州辟文學從事不就余齊民余齊民晉陵晉陵人也少有孝行為邑書吏父殖大明二年在家病亡家人以父病報之信未至齊民謂人曰比者肉痛心煩有若割截居常遑駭必有異故信尋至便歸四百餘里一日而至至門方詳父死號踊慟絕良久乃蘇問母父所遺言母曰汝父臨終恨不見汝曰相見何難於是號叫殯所須臾便絕州郡上言有司奏曰收賢旌善萬代無殊心至自天古今豈異齊民至性由中情非外感淳情凝至深心天徹跪訊遺旨一慟殞亡雖迹異參柴而誠均丘趙方今聖務彪被移革華夏實乃風淳以禮治本惟孝靈祥歸應其道先彰齊民越自氓隸行貫生品旌閭表墓允出在茲改其里為孝義里蠲租布賜其母穀百斛孫棘孫棘彭城彭城人也世祖大明五年發三五丁弟薩應充行坐違期不至依制軍法人身付獄未及結竟棘詣郡辭不忍令當一門之苦乞以身代薩薩又辭列門戶不建罪應至此狂愚犯法實是薩身自應依法受戮兄弟少孤薩三歲失父一生恃賴唯在長兄兄雖可垂愍有何心處世太守張岱疑其不實以棘薩各置一處語棘云已為諮詳聽其相代棘顏色甚悅答云得爾旦則為不死又語薩亦欣然曰死自分甘但令兄免薩有何恨棘妻許又寄語屬棘君當門戶豈可委罪小郎且大家臨亡以小郎屬君竟未妻娶家道不立君已有二兒死復何恨岱依事表上世祖詔曰棘薩甿隸節行可甄特原罪州加辟命并賜許帛二十匹徐元妻許氏先是新蔡徐元妻許年二十一喪夫子甄年三歲父攬愍其年少以更適同縣張買許自誓不行父逼載送買許自經氣絕家人奔赴良久乃蘇買知不可奪夜送還攬許歸徐氏養元父季元嘉中年八十餘卒奚慶思太宗泰始二年長城奚慶思殺同縣錢仲期仲期子延慶屬役在都聞父死馳還於庚浦埭逢慶思手刃殺之自擊烏程縣獄吳興太守郗顒表不加罪許之何子平何子平廬江灊人也曾祖楷晉侍中祖友會稽王道子驃騎諮議參軍父子先建安太守子平世居會稽少有志行見稱於鄉曲事母至孝揚州辟從事史月俸得白米輒貨市粟麥人或問曰所利無幾何足為煩子平曰尊老在東不辦常得生米何心獨饗白粲每有贈鮮肴者若不可寄致其家則不肯受母本側庶籍注失實年未及養而籍年已滿便去職歸家時鎮軍將軍顧覬之為州上綱謂曰尊上年實未八十親故所知州中差有微祿當啟相留子平曰公家正取信黃籍籍年既至便應扶侍私庭何容以實年未滿苟冒榮利且歸養之願又切微情覬之又勸令以母老求縣子平曰實未及養何假以希祿覬之益重之既歸家竭身運力以給供養元嘉三十年元凶弒逆安東將軍隨王誕入討以為行參軍子平以凶逆滅理普天同奮故廢己受職事寧自解又除奉朝請不就末除吳郡海虞令縣祿唯以養母一身而妻子不犯一毫人或疑其儉薄子平曰希祿本在養親不在為己問者慚而退母喪去官哀毀踰禮每至哭踊頓絕方蘇值大明末東土飢荒繼以師旅八年不得營葬晝夜號絕擗踊不闋俄頃叫慕之音常如袒括之日冬不衣絮暑避清涼日以數合米為粥不進鹽菜所居屋敗不蔽雨日兄子伯興採伐茅竹欲為葺治子平不肯曰我情事未申天地一罪人耳屋何宜覆蔡興宗為會稽太守甚加旌賞泰始六年為營冢椁子平居喪毀甚困瘠踰久及至免喪支體殆不相屬幼持操檢敦厲名行雖處闇室如接大賓學義堅明處之以默安貧守善不求榮進好退之士彌以貴之順帝昇明元年卒時年六十史臣曰漢世士務治身故忠孝成俗至乎乘軒服冕非此莫由晉宋以來風衰義缺刻身厲行事薄膏腴若夫孝立閨庭忠被史策多發溝畎之中非出衣簪之下以此而言聲教不亦卿大夫之恥乎
