body:
  text: 卷九十二列傳第五十二良吏高祖起自匹庶知民事艱難及登庸作宰留心吏職而王略外舉未遑內務奉師之費日耗千金播茲寬簡雖所未暇而絀華屏欲以儉抑身左右無幸謁之私閨房無文綺之飾故能戎車歲駕邦甸不擾太祖幼而寬仁入纂大業及難興陝方六戎薄伐命將動師經略司兗費由府實役不及民自此區宇宴安方內無事三十年間氓庶蕃息奉上供徭止於歲賦晨出莫歸自事而已守宰之職以六期為斷雖沒世不徙未及曩時而民有所係吏無苟得家給人足即事雖難轉死溝渠於時可免凡百戶之鄉有市之邑歌謠舞蹈觸處成群蓋宋世之極盛也暨元嘉二十七年北狄南侵戎役大起傾資埽蓄猶有未供於是深賦厚斂天下騷動自茲至于孝建兵連不息以區區之江東地方不至數千里戶不盈百萬薦之以師旅因之以凶荒宋氏之盛自此衰矣晉世諸帝多處內房朝宴所臨東西二堂而已孝武末年清暑方構高祖受命無所改作所居唯稱西殿不制嘉名太祖因之亦有合殿之稱及世祖承統制度奢廣犬馬餘菽粟土木衣綈繡追陋前規更造正光玉燭紫極諸殿雕欒綺節珠窗網戶嬖女幸臣賜傾府藏竭四海不供其欲單民命未快其心太宗繼阼彌篤浮侈恩不卹下以至橫流莅民之官遷變歲屬𠐍不得黔席未暇煖蒲密之化事未易階豈徒吏不及古民偽於昔蓋由為上所擾致治莫從今採其風迹粗著者以為良吏篇云王鎮之王鎮之字伯重琅邪臨沂人徵士弘之兄也曾祖廙晉驃騎將軍祖耆之中書郎父隨之上虞令鎮之初為琅邪王衛軍行參軍出補剡上虞令並有能名內史謝輶請為山陰令復有殊績遷衛軍參軍本國郎中令加寧朔將軍桓玄輔晉以為大將軍錄事參軍時三吳饑荒遣鎮之銜命賑卹而會稽內史王愉不奉符旨鎮之依事糾奏愉子綏玄之外甥當時貴盛鎮之為所排抑以母老求補安成太守及玄敗玄將苻宏寇亂郡境鎮之拒戰彌年子弟五人並臨陣見殺母憂去職在官清潔妻子無以自給乃棄家致喪還上虞舊基葬畢為子摽之求安復令隨子之官服闋為征西道規司馬南平太守徐道覆逼江陵加鎮之建威將軍統檀道濟到彥之等討道覆以不經將帥固辭不見聽既而前軍失利白衣領職尋復本官以討道覆功封華容縣五等男徵廷尉晉穆帝何皇后山陵領將作大匠遷御史中丞秉正不撓百寮憚之出為使持節都督交廣二州諸軍事建威將軍平越中郎將廣州刺史高祖謂人曰王鎮之少著清績必將繼美吳隱之嶺南之弊非此不康也在鎮不受俸祿蕭然無所營去官之日不異始至高祖初建相國府以為諮議參軍領錄事善於吏職嚴而不殘遷宋臺祠部尚書高祖踐阼鎮之以腳患自陳出為輔國將軍琅邪太守遷宣訓衛尉領本州大中正永初三年卒官時年六十六弟弘之在隱逸傳杜慧度杜慧度交阯朱鳶人也本屬京兆曾祖元為寧浦太守遂居交阯父瑗字道言仕州府為日南九德交阯太守初九真太守李遜父子勇壯有權力威制交土聞刺史騰遯之當至分遣二子斷遏水陸津要瑗收眾斬遜州境獲寧除龍驤將軍遯之在州十餘年與林邑累相攻伐遯之將北還林邑王范胡達攻破日南九德九真三郡遂圍州城時遯之去已遠瑗與第三子玄之悉力固守多設權策累戰大破之追討於九真日南連捷故胡達走還林邑乃以瑗為龍驤將軍交州刺史義旗進號冠軍將軍盧循竊據廣州遣使通好瑗斬之義熙六年年八十四卒追贈右將軍本官如故慧度瑗第五子也初為州主簿流民督護遷九真太守瑗卒府州綱佐以交土接寇不宜曠職共推慧度行州府事辭不就七年除使持節督交州諸軍事廣武將軍交州刺史詔書未至其年春盧循襲破合浦徑向交州慧度乃率文武六千人距循於石碕交戰禽循長史孫建之循雖敗餘黨猶有三千人皆習練兵事李子遜李弈李脫等奔竄石碕盤結俚獠各有部曲循知弈等與杜氏有怨遣使招之弈等引諸俚帥眾五六千人受循節度六月庚子循晨造南津命三軍入城乃食慧度悉出宗族私財以充勸賞弟交阯太守慧期九真太守章民並督率水步軍慧度自登高艦合戰放火箭雉尾炬步軍夾兩岸射之循眾艦俱然一時散潰循中箭赴水死斬循及父嘏并循二子親屬錄事參軍阮靜中兵參軍羅農夫李脫等傳首京邑封慧度龍編縣侯食邑千戶高祖踐阼進號輔國將軍其年率文武萬人南討林邑所殺過半前後被抄略悉得還本林邑乞降輸生口大象金銀古貝等乃釋之遣長史江悠奉表獻捷慧度布衣蔬食儉約質素能彈琴頗好莊老禁斷淫祀崇修學校歲荒民饑則以私祿賑給為政纖密有如治家由是威惠沾洽姦盜不起乃至城門不夜閉道不拾遺少帝景平元年卒時年五十追贈左將軍弘文以慧度長子員外散騎侍郎弘文為振威將軍刺史初高祖北征關洛慧度板弘文為鷹揚將軍流民督護配兵三千北係大軍行至廣州關洛已平乃歸統府板弘文行九真太守及繼父為刺史亦以寬和得眾襲爵龍編侯太祖元嘉四年以廷尉王徽為交州刺史弘文就徵會得重疾牽以就路親舊見其患篤勸表待病瘉弘文曰吾世荷皇恩杖節三世常欲投軀帝庭以報所荷況親被徵命而可宴然者乎如其顛沛此乃命也弘文母既年老見弘文輿疾就路不忍分別相與俱行到廣州遂卒臨死遣弟弘猷詣京朝廷甚哀之徐豁徐豁字萬同東莞姑幕人也中散大夫廣兄子父邈晉太子左衛率豁晉安帝隆安末為太學博士桓玄輔政為中外都督諮議致敬唯內外武官太宰司徒並非軍職則琅邪王不應加敬玄諷中丞免豁官玄敗以為祕書郎尚書倉部郎右軍何無忌功曹仍為鎮南參軍又祠部永世令建武司馬中軍參軍尚書左丞永初初為徐羨之鎮軍司馬尚書左丞山陰令歷二丞三邑精練明理為一世所推元嘉初為始興太守三年遣大使巡行四方并使郡縣各言損益豁因此表陳三事其一曰郡大田武吏年滿十六便課米六十斛十五以下至十三皆課米三十斛一戶內隨丁多少悉皆輸米且十三歲兒未堪田作或是單迥無相兼通年及應輸便自逃逸既遏接蠻俚去就益易或乃斷截支體產子不養戶口歲減實此之由謂宜更量課限使得存立今若減其米課雖有交損考之將來理有深益其二曰郡領銀民三百餘戶鑿坑採砂皆二三丈功役既苦不顧崩壓一歲之中每有死者官司檢切猶致逋違老少相隨永絕農業千有餘口皆資他食豈唯一夫不耕或受其饑而已所以歲有不稔便致甚困尋臺邸用米不異於銀謂宜准銀課米即事為便其三曰中宿縣俚民課銀一子丁輸南稱半兩尋此縣自不出銀又俚民皆巢居鳥語不閑貨易之宜每至買銀為損已甚又稱兩受入易生姦巧山俚愚怯不辨自申官所課甚輕民以所輸為劇今若聽計丁課米公私兼利在郡著績太祖嘉之下詔曰始興太守豁潔己退食恪居在官政事修理惠澤沽被近嶺南荒弊郡境尤甚拯卹有方濟厥饑饉雖古之良守蔑以尚焉宜蒙褒賁以旌清績可賜絹二百匹穀千斛五年以為持節督廣交二州諸軍事寧遠將軍平越中郎將廣州刺史未拜卒時年五十一太祖又下詔曰豁廉清勤恪著稱所司故擢授南服申其才志不幸喪殞朕甚悼之可賜錢十萬布百匹以營葬事陸徽陸徽字休猷吳郡吳人也郡辟命主簿仍除衛軍車騎二府參軍揚州主簿王弘衛將軍主簿除尚書都官郎出補建康令清平無私為太祖所善遷司徒左西掾元嘉十四年為始興太守明年仍除使持節交廣二州諸軍事綏遠將軍平越中郎將廣州刺史清名亞王鎮之為士民所愛詠上表薦士曰臣聞陵雪褒潁貞柯必振尊風賞流清原斯挹是以衣囊揮譽於西京折轅延高於東帝伏見廣州別駕從事史朱萬嗣年五十三字少豫理業沖夷秉操純白行稱私庭能著官政雖氏非世祿宦無通資而隨牒南服位極僚首九綜州綱三端府職頻掌蕃機屢績符守年暨知命廉尚愈高冰心與貪流爭激霜情與晚節彌茂歷宰金山家無寶鏤之飾連組珠海室靡璫珥之珍確然守志不求聞達實足以澄革汙吏洗鏡貪氓臣謬忝司牧任專萬里雖情祗慎擢才闕豪露敢罄愚陋舉其所知如得提名禮闈抗迹朝省搏嶺表之清風負冰宇之潔望則恩融一臣而施光萬物敢緣天澤雲行時德雨施每甄外州榮加遠國是以獻其瞽言希垂聽覽二十一年徵以為南平王鑠冠軍司馬長沙內史行湘州府事母憂去職張尋趙廣為亂於益州兵寇之餘政荒民擾二十三年乃追徵為持節督益寧二州諸軍事寧朔將軍益州刺史隱卹有方威惠兼著寇盜靜息民物殷阜蜀土安說至今稱之二十九年卒時年六十二身亡之日家無餘財太祖甚痛惜之詔曰徽厲志廉潔歷任恪勤奉公盡誠克己無倦襃榮未申不幸夙殞言念在懷以為傷恨可贈輔國將軍本官如故賜錢十萬米二百斛諡曰簡子子叡正員外郎弟展臧質車騎長史尋陽太守質敗從誅阮長之阮長之字茂景陳留尉氏人也祖思曠金紫光祿大夫父普驃騎咨議參軍長之年十五喪父有孝性哀感傍人服除蔬食者猶積載閑居篤學未嘗有惰容初為諸府參軍除員外散騎侍郎母老求補襄垣令督郵無禮鞭之去職尋補廬陵王義真車騎行正參軍平越長史東莞太守入為尚書殿中郎出為武昌太守時王弘為江州雅相知重引為車騎從事中郎入為太子中舍人中書侍郎以母老固辭朝直補彭城王義康平北咨議參軍元嘉九年遷臨川內史以南土卑濕母年老非所宜辭不就十一年復除臨海太守至郡少時而母亡葬畢不勝憂十四年卒時年五十九時郡縣田祿以芒種為斷此前去官者則一年秩祿皆入前人此後去官者則一年秩祿皆入後人始以元嘉末改此科計月分祿長之去武昌郡代人未至以芒種後一日解印綬初發京師親故或以器物贈別得便緘錄後歸悉以還之在中書省直夜往鄰省誤著履出閤依事自列門下門下以闇夜人不知不受列長之固遣送之曰一生不侮闇室前後所莅官皆有風政為後人所思宋世言善治者咸稱之子師門原鄉令江秉之秉之字玄叔濟陽考城人也祖逌晉太常父纂給事中秉之少孤弟妹七人並皆幼稚撫育姻娶罄其心力初為劉穆之丹陽前軍府參軍高祖督徐州轉主簿仍為世子中軍參軍宋受禪隨例為員外散騎侍郎補太子詹事丞少帝即位入為尚書都官郎出為永世烏程令以善政著名東土徵建康令為治嚴察京邑肅然殷景仁為領軍請為司馬復出為山陰令民戶三萬政事煩擾訟訴殷積階庭常數百人秉之御繁以簡常得無事宋世唯顧凱之亦以省務著績其餘雖復刑政循理而未能簡事以在縣有能遷補新安太守元嘉十二年轉在臨海並以簡約見稱所得祿秩悉散之親故妻子常饑寒人有勸其營田者秉之正色曰食祿之家豈可與農人競利在郡作書案一枚及去官留以付庫十七年卒時年六十子徽尚書都官郎吳令元凶殺徐湛之徽以黨與見誅子謐昇明末為尚書吏部郎元嘉初太祖遣大使巡行四方兼散騎常侍孔默之王歆之等上言宣威將軍陳南頓二郡太守李元德清勤均平姦盜止息彭城內史魏恭子廉恪修慎在公忘私安約守儉久而彌固前宋縣令成浦治政寬濟遺詠在民前鮦陽令李熙國在事有方民思其政山桑令何道自少清廉白首彌厲應加襃賚以勸于後乃進元德號寧朔將軍恭子賜絹五十匹穀五百斛浦熙國道各賜絹三十匹穀二百斛王歆之王歆之字叔道河東人也曾祖愆期有名晉世官至南蠻校尉祖尋之光祿大夫父肇之豫章公相歆之被遇於太祖歷顯官左民尚書光祿大夫卒官申季歷元嘉九年豫州刺史長沙王義欣上言所統威遠將軍北譙梁二郡太守關中侯申季歷自奉職邦畿于茲五年信惠並宣威化兼著外清姦暴內輯民黎役賦均平閭井齊肅綏穆初附招攜荒遠郊境之外仰澤懷風爵賞之授績能是顯宜升階秩以崇獎勸進號寧朔將軍郭啟玄其後晉壽太守郭啟玄亦有清節卒官元嘉二十八年詔曰故綏遠將軍晉壽太守郭啟玄往銜命虜庭秉意不屈受任白水盡勤靡懈公奉私餼纖毫弗納布衣蔬食飭躬惟儉故超授顯邦以甄廉績而介誠苦節終始匪貳身死之日妻子凍餒志操殊俗良可哀悼可賜其家穀五百斛時有北地傅僧祐潁川陳珉張祐高平張祐並以吏才見知僧祐事在臧燾傳珉為吳令善發姦伏境內以為神明祐祖父湛晉孝武世以才學為中書侍郎光祿勳祐歷臨安武康錢塘令並著能名宋世言長吏者以三人為首潘詞元嘉中高平太守潘詞有清節亮亦著廉名大明中為徐州刺史劉道隆所表陸法真世祖世吳郡陸法真歷官有清節嘗為劉秀之安北錄事參軍太山羊希與安北咨議參軍孫詵書曰足下同僚似有陸錄事者此生東南名地又張玄外孫持身至清雅有志節年高官下秉操不衰計當日夕相與申意太宗初為南海太守卒官王悅太宗世琅邪王悅亦莅官清正見知悅字少明晉右將軍羲之曾孫也父靖之官至司徒左長史靖之為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得也遂不果悅泰始中為黃門郎御史中丞上以其廉介賜良田五頃遷尚書吏部郎侍中在門下盡其心力五年卒官追贈太常初悅為侍中檢校御府太官太醫諸署得姦巧甚多及悅死眾咸謂諸署咒詛之上乃收典掌者十餘人桎梏云送淮陰密令渡瓜步江投之中流史臣曰夫善政之於民猶良工之於埴也用功寡而成器多漢世戶口殷盛刑務簡闊郡縣治民無所橫擾勸賞威刑事多專斷尺一詔書希經邦邑龔黃之化易以有成降及晚代情偽繁起民減昔時務多前世立績垂風艱易百倍若以上古之化治此世之民今吏之良撫前代之俗則武城弦歌將有未暇淮陽臥治如或可勉未必今才陋古蓋化有淳薄也
