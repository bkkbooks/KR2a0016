body:
  text: 二凶元凶劭元凶劭字休遠文帝長子也帝即位後生劭時上猶在諒闇故秘之三年閏正月方云劭生自前代以來未有人君即位後皇后生太子唯殷帝乙既踐阼正妃生紂至是又有劭焉體元居正上甚喜說年六歲拜為皇太子中庶子二率入直永福省更築宮制度嚴麗年十二出居東宮納黃門侍郎殷淳女為妃十三加元服好讀史傳尤愛弓馬及長美須眉大眼方口長七尺四寸親覽宮事延接賓客意之所欲上必從之東宮置兵與羽林等十七年劭拜京陵大將軍彭城王義康竟陵王誕尚書桂陽侯義融並從司空江夏王義恭自江都來會京口二十七年上將北伐劭與蕭思話固諫不從索虜至瓜步京邑震駭劭出鎮石頭總統水軍善於撫御上登石頭城有憂色劭曰不斬江湛徐湛之無以謝天下上曰北伐自我意不關二人也上時務在本業勸課耕桑使宮內皆蠶欲以諷厲天下有女巫嚴道育本吳興人自言通靈能役使鬼物夫為劫坐沒入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育通靈有異術主乃白上託云善蠶求召入見許道育既入自言服食主及劭並信惑之始興王濬素佞事劭與劭並多過失慮上知使道育祈請欲令過不上聞道育輒云自上天陳請必不泄露劭等敬事號曰天師後遂為巫蠱以玉人為上形像埋於含章殿前初東陽主有奴陳天興鸚鵡養以為子而與之淫通鸚鵡天興及寧州所獻黃門慶國並預巫蠱事劭以天興補隊主東陽主薨鸚鵡應出嫁劭慮言語難密與濬謀之時吳興沈懷遠為濬府佐見待異常乃嫁鸚鵡與懷遠為妾不以啟上慮後事泄因臨賀公主微言之上後知天興領隊遣閹人奚承祖詰讓劭曰臨賀公主南第先有一下人欲嫁又聞此下人養他人奴為兒而汝用為隊主抽拔何乃速汝間用主副並是奴邪欲嫁置何處劭答曰南第昔屬天興求將驅使臣答曰伍那可得若能擊賊者可入隊當時蓋戲言耳都不復憶後天興道上通辭乞位追存往為者不忍食言呼視見其形容粗健堪充驅使脫爾使監禮兼隊副比用人雖取勞舊亦參用有氣幹者謹條牒人名上呈下人欲嫁者猶未有處時鸚鵡已嫁懷遠矣劭懼馳書告濬并使報臨賀主上若問嫁處當言未有定所濬答書曰奉令伏深惶怖啟此事多日今始來問當是有感發之者未測源由爾計臨賀故當不應翻覆言語自生寒熱也此姥由來挾兩端難可孤保正爾自問臨賀冀得審實也其若見問當作依違答之天興先署佞人府位不審監上當無此簿領爾急宜撻之殿下已見王未宜依此具令嚴自躬上啟聞彼人若為不已正可保其餘命或是大慶之漸凡劭濬相與書疏類如此所言皆為名號謂上為彼人或以為其人以太尉江夏王義恭為佞人東陽主第在西掖門外故云南第王即鸚鵡姓躬上啟聞者令道育上天白天神也鸚鵡既適懷遠慮與天興私通事泄請劭殺之劭密使人害天興慶國謂宣傳往來唯有二人天興既死慮將見及乃具以其事白上上驚惋即遣收鸚鵡封籍其家得劭濬書數百紙皆呪詛巫蠱之言得所埋上形像於宮內道育叛亡討捕不得上大怒窮治其事分遣中使入東諸郡搜討遂不獲上詰責劭濬劭濬惶懼無辭唯陳謝而已道育變服為尼逃匿東宮濬往京口又載以自隨或出止民張旿家江夏王義恭自盱眙還朝上以巫蠱告之曰常見典籍有此謂之書傳空言不意遂所親睹劭雖所行失道未必便亡社稷南面之日非復我及汝事汝兒子多將來遇此不幸爾先是二十八年彗星起畢昴入太微掃帝座端門滅翼軫二十九年熒惑逆行守氐自十一月霖雨連雪太陽罕曜三十年正月大風飛霰且雷上憂有竊發輒加劭兵眾東宮實甲萬人車駕出行劭入守使將白直隊自隨其年二月濬自京口入朝當鎮江陵復載道育還東宮欲將西上有告上云京口民張旿家有一尼服食出入征北內似是嚴道育上初不信試使掩錄得其二婢云道育隨征北還都上謂劭濬已當斥遣道育而猶與往來惆悵惋駭乃使京口以船送道育二婢須至檢覈廢劭賜濬死以語濬母潘淑妃淑妃具以告濬濬馳報劭劭因是異謀每夜輒饗將士或親自行酒密與服心隊主陳叔兒詹叔兒齋帥張超之任建之謀之道育婢將至其月二十一日夜詐上詔云魯秀謀反汝可平明守闕率眾入因使超之等集素所畜養兵士二千餘人皆使披甲召內外幢隊主副豫加部勒云有所討宿召前中庶子右軍長史蕭斌夜呼斌及左衛率袁淑中舍人殷仲素左積弩將軍王正見並入宮告以大事自起拜斌等因流涕眾並驚愕語在淑傳明旦未開鼓劭以朱服加戎服上乘畫輪車與蕭斌同載衛從如常入朝之儀守門開從萬春門入舊制東宮隊不得入城劭與門衛云受勑有所收討令後隊速來張超之等數十人馳入雲龍東中華門及齋閤拔刃徑上合殿上其夜與尚書僕射徐湛之屏人語至旦燭猶未滅直衛兵尚寑超之手行弒逆并殺湛之劭進至合殿中閤太祖已崩出坐東堂蕭斌執刀侍直呼中書舍人顧嘏嘏震懼不時出既至問曰欲共見廢何不蚤啟未及答即於前斬之遣人於崇禮闥殺吏部尚書江湛太祖左細杖主卜天與攻劭於東堂見殺又使人從東閤入殺潘淑妃又殺太祖親信左右數十人急召始興王濬率眾屯中堂又召太尉江夏王義恭尚書令何尚之劭即偽位為書曰徐湛之江湛弒逆無狀吾勒兵入殿已無所及號惋崩衄肝心破裂今罪人斯得元凶克殄可大赦天下改元嘉三十年為太初元年文武並賜位二等諸科一依丁卯初使蕭斌作詔斌辭以不文乃使侍中王僧綽為之使改元為太初劭素與道育所定斌曰舊踰年改元劭以問僧綽僧綽曰晉惠帝即位便改號劭喜而從之百僚至者裁數十人劭便遽即位即位畢稱疾還入永福省然後遷大行皇帝升太極前殿是日以蕭斌為散騎常侍尚書僕射領軍將軍何尚之為司空前右衛率檀和之戍石頭侍中營道侯義綦為征虜將軍晉陵南下邳二郡太守鎮京城尚書殷仲景為侍中中護軍大行皇帝大歛劭辭疾不敢出先給諸王及諸處兵仗悉收還武庫殺徐湛之江湛親黨新除始興內史荀赤松新除尚書左丞臧凝之山陰令傅僧祐吳令江徽前征北行參軍諸葛詡右衛司馬江文綱以殷仲素為黃門侍郎王正見為左軍將軍張超之及諸同逆聞人文子徐興祖詹叔兒陳叔兒任建之等並將校以下龍驤將軍帶郡各賜錢二十萬遣人謂魯秀曰徐湛之常欲相危我已為卿除之矣使秀與屯騎校尉龐秀之對掌軍隊以侍中王僧綽為吏部尚書司徒左長史何偃為侍中成服日劭登殿臨靈號慟不自持博訪公卿詢求治道薄賦輕繇損諸遊費田苑山澤有可弛者假與貧民三月遣大使分行四方分浙以東五郡為會州省揚州立司隸校尉以殷沖補之以大將軍江夏王義恭為太保司徒南譙王義宣為太尉衛將軍荊州刺史始興王濬進號驃騎將軍王僧綽以先預廢立見誅長沙王瑾瑾弟楷臨川王燁桂陽侯覬新諭侯球並以宿恨下獄死禮官希旨諡太祖不敢盡美稱上諡曰中宗景皇帝以雍州刺史臧質為丹陽尹進世祖號征南將軍加散騎常侍撫軍將軍南平王鑠中軍將軍會稽太守隨王誕會州刺史江夏王義恭以太保領大宗師諮稟之科依晉扶風王故事世祖及南譙王義宣隨王誕諸方鎮並舉義兵劭聞義師大起悉聚諸王及大臣於城內移江夏王義恭住尚書下舍義恭諸子住侍中下省自永初元年以前相國府入齋傳教給使免軍戶屬南彭城薛縣劭下書以中流起兵嘗親率六師觀變江介悉召下番將吏加三吳太守軍號置佐領兵四月立妻殷氏為皇后世祖檄京邑曰夫運不常隆代有莫大之釁爰自上葉或因多難以成福或階昏虐以兆亂咸由君臣義合理悖恩離故堅冰之遘每鍾澆末未有以道御世教化明厚而當梟鏡反噬難發天屬者也先帝聖德在位功格區宇明照萬國道洽無垠風之所被荒隅變識仁之所動木石開心而賊劭乘藉冢嫡夙蒙寵樹正位東朝禮絕君后凶慢之情發於齠齔猜忍之心成於幾立賊濬險躁無行自幼而長交相倚附共逞奸回先旨以王室不造家難亟結故含蔽容隱不彰其釁訓誘啟告冀能革音何悟狂慝不悛同惡相濟肇亂巫蠱終行弒逆聖躬離荼毒之痛社稷有翦墜之哀四海崩心人神泣血生民以來未聞斯禍奉諱驚號肝腦塗地煩冤腷臆容身無所大將軍諸王幽閒窮省存亡未測徐僕射江尚書袁左率皆當世標秀一時忠貞或正色立朝或聞逆弗順並橫分階闥懸首都市宗黨夷滅豈伊一姓禍毒所流未知其極昔周道告難齊晉勤王漢歷中圮虛牟立節異姓末屬猶或亡軀況幕府職同昔人義兼臣子所以枕戈嘗膽苟全視息志梟元凶少雪仇恥今命冠軍將軍領咨議中直兵柳元景寧朔將軍領中直兵馬文恭等統勁卒三萬風馳徑造石頭分趨白下輔國將軍領咨議中直兵宗愨等勒甲楯二萬征虜將軍領司馬武昌內史沈慶之等領壯勇五萬相尋就路支軍別統或焚舟破釜步自姑熟或迅楫蕪湖入據雲陽凡此諸帥皆英果權奇智略深贍名震中土勳暢遐疆幕府親董精悍一十餘萬授律枕戈駱驛繼邁司徒叡哲淵謨赫然震發徵甲八州電起荊郢冠軍將軍臧質忠烈協舉雷動漢陰冠軍將軍朱修之誠節亮款悉力請奮荊雍百萬稍次近塗蜀漢之卒續已出境又安東將軍誕平西將軍遵考前撫軍將軍蕭思話征虜將軍魯爽前寧朔將軍王玄謨並密信俱到不契同期傳檄三吳馳軍京邑遠近俱發揚於萬里樓艦騰川則滄江霧咽銳甲赴野則林薄摧根謀臣智士雄夫毅卒畜志須時懷憤待用先聖靈澤結在民心逆順大數冥發天理無父之國天下無之羽檄既馳華夷響會以此眾戰誰能抗禦以此義動何往不捷況逆醜無親人鬼所背計其同惡不盈一旅崇極群小是與比周哲人君子必加積忌傾海注螢頹山壓卵商周之勢曾何足云諸君或奕世貞賢身皇渥或勳烈肺腑休否攸同拘逼凶勢俛眉寇手含憤茹慼不可為心大軍近次威聲已接便宜因變立功洗雪滓累若事有不獲能背逆歸順亦其次也如有守迷遂往黨一凶類刑茲無赦戮及五宗賞罰之科信如日月原火一燎異物同灰幸求多福無貽後悔書到宣告咸使聞知劭自謂素習武事語朝士曰卿等但助我理文書勿措意戎陳若有寇難吾當自出唯恐賊虜不敢動爾司隸校尉殷沖掌綜文符左衛將軍尹弘配衣軍旅蕭斌總眾事中外戒嚴防守世祖子於侍中下省南譙王義宣諸子於太倉空屋劭使濬與世祖書曰聞弟忽起狂檄阻兵反噬縉紳憤歎義夫激怒古來陵上內侮誰不夷滅弟洞覽墳籍豈不斯具今主上天縱英聖靈武宏發自登宸極威澤兼宣人懷甘死之志物競舍生之節弟蒙眷遇著自少長東宮之懽其來如昨而信惑姦邪忘茲恩友此之不義人鬼同疾今水步諸軍悉已備辦上親御六師太保又乘鉞臨統吾與烏羊相尋即道所以淹霆緩電者猶冀弟迷而知返爾故略示懷言不盡意主上聖恩每厚法師今在殿內住想弟欲知消息故及烏羊者南平王鑠法師世祖世子小名也劭欲殺三鎮士庶家口江夏王義恭何尚之說之曰凡舉大事者不顧家口且多是驅逼今忽誅其餘累正足堅彼意爾劭謂為然乃下書一無所問使褚湛之戍石頭劉思孝鎮東府濬及蕭斌勸劭勒水軍自上決戰若不爾則保據梁山江夏王義恭慮義兵倉卒船舫陋小不宜水戰乃進策曰賊諱小年未習軍旅遠來疲弊宜以逸待之今遠出梁山則京都空弱東軍乘虛容能為患若分力兩赴則兵散勢離不如養銳待期坐而觀釁劭善其義蕭斌厲色曰南中郎二十年少業能建如此大事豈復可量三方同惡勢據上流沈慶之甚練軍事柳元景宗愨屢嘗立功形勢如此實非小敵唯宜及人情未離尚可決力一戰端坐臺城何由得久主相咸無戰意此自天也劭不納疑朝廷舊臣悉不為己用厚接王羅漢魯秀悉以兵事委之多賜珍玩美色以悅其意羅漢先為南平王鑠右軍參軍劭以其有將用故以心膂委焉或勸劭保石頭城者劭曰昔人所以固石頭俟諸侯勤王爾我若守此誰當見救唯應力戰決之不然不剋日日自出行軍慰勞將士親督都水治船艦焚南岸驅百姓家悉渡水北使有司奏立子偉之為皇太子以褚湛之為後將軍丹陽尹置佐史驃騎將軍始興王濬為侍中中書監司徒錄尚書六條事中軍將軍南平王鑠為使持節都督南兗兗青徐冀五州諸軍事征北將軍開府儀同三司南兗州刺史新除左將軍丹陽尹建平王宏為散騎常侍鎮軍將軍江州刺史龐秀之自石頭先眾南奔人情由是大震以征虜將軍營道侯義綦即本號為湘州刺史輔國將軍檀和之為西中郎將雍州刺史十九日義軍至新林劭登石頭烽火樓望之二十一日義軍至新亭時魯秀屯白石劭召秀與王羅漢共屯朱雀門蕭斌統步軍褚湛之統水軍二十二日使蕭斌率魯秀王羅漢等精兵萬人攻新亭壘劭登朱雀門躬自督率將士懷劭重賞皆為之力戰將克而秀歛軍遽止為柳元景等所乘故大敗劭又率腹心同惡自來攻壘元景復破之劭走還朱雀門蕭斌臂為流矢所中褚湛之攜二子與檀和之同共歸順劭駭懼走還臺城其夜魯秀又南奔時江夏王義恭謀據石頭會劭已令濬及蕭斌備守劭並焚京都軍籍置立郡縣悉屬司隸為民以前軍將軍輔國將軍王羅漢為左衛將軍輔國如故左軍王正見為太子左衛率二十五日義恭單馬南奔自東掖門出於冶渚過淮東掖門隊主吳道興是臧質門人冶渚軍主原稚孫是世祖故史義恭得免劭遣騎追討騎至冶渚義恭始得渡淮義恭佐史義故二千餘人隨從南奔多為追兵所殺遣濬殺義恭諸子以輦迎蔣侯神像於宮內啟顙乞恩拜為大司馬封鍾山郡王食邑萬戶加節鉞蘇侯為驃騎將軍使南平王鑠為祝文罪狀世祖加濬使持節都督南徐會二州諸軍事領太子太傅南徐州刺史給班劍二十人征北將軍南兗州刺史南平王鑠進號驃騎將軍與濬並錄尚書事二十七日臨軒拜息偉之為太子百官皆戎服劭獨袞衣下書大赦天下唯世祖劉義恭義宣誕不在原例餘黨一無所問先遣太保參軍庾道員外散騎侍郎朱和之又遣殿中將軍燕欽東拒誕五月世祖所遣參軍顧彬之及誕前軍並至曲阿與道相遇與戰大破之劭遣人焚燒都水西裝及左尚方決破柏崗方山埭以絕東軍又悉以上守家之丁巷居者緣淮豎舶船為樓多設大弩又使司隸治中監琅邪郡事羊希柵斷班瀆白石諸水口于時男丁既盡召婦女親役其月三日魯秀等募勇士五百人攻大航鉤得一舶王羅漢副楊恃德命使復航羅漢昏酣作伎聞官軍已渡驚懼放仗歸降緣渚幢隊以次奔散器仗鼓蓋充塞街衢是夜劭閉守六門於門內鑿塹立柵以露車為樓城內沸亂無復綱紀丹陽尹尹弘前軍將軍孟宗嗣等下及將吏並踰城出奔劭使詹叔兒燒輦及袞冕服蕭斌聞大航不守惶窘不知所為宣令所統皆使解甲自石頭遣息約詣闕請罪尋戴白幡來降即於軍門伏誅四日太尉江夏王義恭登朱雀門總群帥遣魯秀薛安都程天祚等直趨宣陽門劭軍主徐興祖羅訓虞邱要兒等率眾來降劭先遣龍驤將軍陳叔兒東討事急召還是日始入建陽門遙見官軍所領並棄仗走劭腹心白直同諸逆先屯閶闔門外並走還入殿天祚與安都副譚金因而乘之即得俱入安都及軍主武念宋越等相繼進臧質大軍從廣莫門入同會太極殿前即斬太子左衛率王正見建平東海等七王並號哭俱出劭穿西垣入武庫井中隊副高禽執之濬率左右數十人與南平王鑠於西明門出俱共南奔於越城遇江夏王義恭濬下馬曰南中郎今何所作義恭曰四海無統百司固請上已俯順群心君臨萬國又曰虎頭來得無晚乎義恭曰殊當恨晚又曰故當不死耶義恭曰可詣行闕請罪又曰未審猶能賜一職自效不義恭又曰此未可量勒與俱歸於道斬首濬字休明將產之夕有鵩鳥鳴於屋上元嘉十三年年八歲封始興王十六年都督湘州諸軍事後將軍湘州刺史仍遷使持節都督南豫豫司雍并五州諸軍事南豫州刺史將軍如故十七年為揚州刺史將軍如故置佐領兵十九年罷府二十一年加散騎常侍進號中軍將軍明年濬上言所統吳興郡衿帶重山地多汙澤泉流歸集疏決遲壅時雨未過已至漂沒或方春輟耕或開秋沈稼田家徒苦防遏無方彼邦奧區地沃民阜一歲稱稔則穰被京城時或水潦則數郡為災頃年以來儉多豐寡雖賑賚周給傾耗國儲公私之弊方在未已州民姚嶠比通便宜以為二吳晉陵義興四郡同注太湖而松江滬瀆壅噎不利故處處涌溢浸漬成災欲從武康紵溪開漕谷湖直出海口一百餘里穿渠浛必無閡滯自去踐行量度二十許載去十一年大水已詣前刺史臣義康欲陳此計即遣主簿盛曇泰隨嶠周行互生疑難議遂寢息既事關大利宜加研盡登遣議曹從事史虞長孫與吳興太守孔山士同共履行准望地勢格評高下其川源由歷莫不踐校圖畫形便詳加笇考如所較量決謂可立尋四郡同患非獨吳興若此浛獲通列邦蒙益不有蹔勞無由永晏然興創事大圖始當難今欲且開小漕觀試流勢輒差烏程武康東遷三縣近民即時營作若宜更增廣尋更列言昔鄭國敵將史起畢忠一開其說萬世為利嶠之所建雖則芻蕘如或非妄庶幾可立從之功竟不立二十三年給鼓吹一部二十六年出為使持節都督南徐兗二州諸軍事征北將軍開府儀同三司南徐兗二州刺史常侍如故二十八年遣濬率眾城瓜步山解南兗州三十年徙都督荊雍益梁寧南北秦二州諸軍事衛將軍開府儀同三司荊州刺史領護南蠻校尉持節常侍如故濬少好文籍姿質端妍母潘淑妃有盛寵時六宮無主潘專總內政濬人才既美母又至愛太祖甚留心建平王宏侍中王僧綽中書侍郎蔡興宗並以文義往復初元皇后性忌以潘氏見幸遂以恚恨致崩故劭深疾潘氏及濬濬慮將來受禍乃曲意事劭劭與之遂善多有過失屢為上所詰讓憂懼乃與劭共為巫蠱及出鎮京口聽將揚州文武二千人自隨優遊外藩甚為得意在外經年又失南兗於是復願還朝廬陵王紹以疾患解揚州時江夏王義恭外鎮濬謂州任自然歸己而上以授南譙王義宣意甚不悅乃因員外散騎侍郎徐爰求鎮江陵又求助於尚書僕射徐湛之而尚書令何尚之等咸謂濬太子次弟不宜遠出上以上流之重宜有至親故以授濬時濬入朝遣還京為行留處分至京數日而巫蠱事發時二十九年七月也上惋歎彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我耶濬小名虎頭使左右朱法瑜密責讓濬辭甚哀切并賜書曰鸚鵡事想汝已聞汝亦何至迷惑乃爾且沈懷遠何人其詎能為汝隱此耶故使法瑜口宣投筆惋慨濬慚懼不知所答濬還京本蹔去上怒不聽歸其年十二月中書侍郎蔡興宗問建平王宏曰歲無復幾征北何當至宏歎息良久曰年內何必還在京以沈懷遠為長流參軍每夕輒開便門為微行上聞殺其嬖人楊承先明年正月荊州事方行二月濬還朝十四日臨軒受拜其日藏嚴道育事發明旦濬入謝上容色非常其夕即加詰問濬唯謝罪而已潘淑妃抱持濬泣涕謂曰汝始呪詛事發猶冀刻己思愆何意忽藏嚴道育耶上責汝深至我叩頭乞恩意永不釋今日用活何為可送藥來當先自取盡不忍見汝禍敗濬奮衣而去曰天下事尋自當判願小寬憂煎必不上累劭入弒之旦濬在西州府舍人朱法瑜奔告濬曰臺內叫喚宮門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何法瑜勸入據石頭濬未得劭信不知事之濟不騷擾未知所為將軍王慶曰今宮內有變未知主上安危預在臣子當投袂赴難憑城自守非臣節也濬不聽乃從南門出徑向石頭文武從者千餘人時南平王鑠守石頭兵士亦千餘人俄而劭遣張超之馳馬召濬濬屏人問狀即戎服乘馬而去朱法瑜固止濬濬不從出至中門王慶又諫曰太子反逆天下怨憤明公但當堅閉城門坐食積粟不過三日凶黨自離公情事如此今豈宜去濬曰皇太子令敢有復言者斬既入見劭勸殺荀赤松等劭謂濬曰潘淑妃遂為亂兵所害濬曰此是下情由來所願其悖逆乃如此及劭將敗勸劭入海輦珍寶繒帛下船與劭書曰船故未至今晚期當於此下物令畢願速勑謝賜出船艦尼已入臺願與之明日決也臣猶謂車駕應出此不爾無以鎮物情人情離散故行計不果濬書所云尼即嚴道育也及劭入井高禽於井中牽出之劭問禽曰天子何在禽曰至尊近在新亭將劭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭質因辨其逆狀答曰先朝當見枉廢不能作獄中囚問計於蕭斌斌見勸如此又語質曰可得為啟乞遠徙不質答曰主上近在航南自當有處分縛劭於馬上防送軍門既至牙下據鞍顧望太尉江夏王義恭與諸王皆共臨視之義恭詰劭曰我背逆歸順有何大罪頓殺我家十二兒劭答曰殺諸弟此事負阿父江湛妻庾氏乘車罵之龐秀之亦加誚讓劭厲聲曰汝輩復何煩爾先殺其四子謂南平王鑠曰此何有哉乃斬劭于牙下臨刑歎曰不圖宗室一至於此劭濬及劭四子偉之迪之彬之其一未有名濬三子長文長仁長道並梟首大航暴尸於市劭妻殷氏賜死於廷尉臨死謂獄丞江恪曰汝家骨肉相殘害何以枉殺天下無罪人恪曰受拜皇后非罪而何殷氏曰此權時爾當以鸚鵡為后也濬妻褚氏丹陽尹湛之女湛之南奔之始即見離絕故免於誅其餘子女妾媵並於獄賜死投劭濬尸首於江其餘同逆及王羅漢等皆伏誅張超之聞兵入遂走至合殿故基正於御床之所為亂兵所殺割腸刳心臠剖其肉諸將生噉之焚其頭骨當時不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山下焚其尸揚灰于江毀劭東宮所住齋汙瀦其處封高禽新陽縣男食邑三百戶追贈潘淑妃長寧園夫人置守冢偽司隸校尉殷沖丹楊尹尹弘並賜死沖為劭草立符文又妃叔父也弘二月二十一日平旦入直至西掖門聞宮中有變率城內禦兵至閣道下及聞劭入惶怖通啟求受處分又為劭簡配兵士盡其心力弘天水冀人司州刺史沖弟也為太祖所委任元嘉中歷太子左右衛率左右衛將軍人官爵高下皆以委之史臣曰甚矣哉宋氏之家難也自赫胥以降立號皇王統天南面未聞斯禍唯荊莒二國棄夏即戎武靈胡服亦背華典戕賊之釁事起肌膚而因心之重獨止此代難興天屬穢流床第愛敬之道頓滅一時生民得無左衽亦為幸矣
