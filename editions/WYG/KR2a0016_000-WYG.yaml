  text: 欽定四庫全書史部一
  hash: sha256:4fc343c1c4715a8de75d4eb74f65eae0b7a2d5b689508f203b2457159ed64a3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0016_WYG_000-1a, image: WYG0257/WYG0257-0001a.png}
body:
  text: 宋書目録正史類梁沈約撰帝紀十志三十列傳六十凡一百卷帝紀宋書卷一帝紀第一武帝上宋書卷二帝紀第二武帝中宋書卷三帝紀第三武帝下宋書卷四帝紀第四少帝宋書卷五帝紀第五文帝宋書卷六帝紀第六孝武帝宋書卷七帝紀第七前廢帝宋書卷八帝紀第八明帝宋書卷九帝紀第九後廢帝宋書卷十帝紀第十順帝志宋書卷十一志第一志序宋書卷十二志第二厯上宋書卷十三志第三厯下宋書卷十四志第四禮一宋書卷十五志第五禮二宋書卷十六志第六禮三宋書卷十七志第七禮四宋書卷十八志第八禮五宋書卷十九志第九樂一宋書卷二十志第十樂二宋書卷二十一志第十一樂三宋書卷二十二志第十二樂四宋書卷二十三志第十三天文一宋書卷二十四志第十四天文二宋書卷二十五志第十五天文三宋書卷二十六志第十六天文四宋書卷二十七志第十七符瑞上宋書卷二十八志第十八符瑞中宋書卷二十九志第十九符瑞下宋書卷三十志第二十五行一宋書卷三十一志第二十一五行二宋書卷三十二志第二十二五行三宋書卷三十三志第二十三五行四宋書卷三十四志第二十四五行五宋書卷三十五志第二十五州郡一揚州南徐州南兗州兗州宋書卷三十六志第二十六州郡二南豫州豫州江州青州冀州司州宋書卷三十七志第二十七州郡三荆州郢州湘州雍州梁州秦州宋書卷三十八志第二十八州郡四益州寜州廣州交州越州宋書卷三十九志第二十九百官上宋書卷四十志第三十百官下列傳宋書卷四十一列傳第一后妃孝穆趙皇后孝懿蕭皇后武敬臧皇后武張夫人少帝司馬皇后文元袁皇后潘淑妃文路淑媛孝武文穆王皇后宣貴妃前廢帝何皇后文沈媫妤明恭王皇后後廢帝江皇后順陳太妃順謝皇后宋書卷四十二列傳第二劉穆之王宏宋書卷四十三列傳第三徐羡之傅亮檀道濟宋書卷四十四列傳第四謝晦宋書卷四十五列傳第五王鎮惡檀韶向靖劉懐慎劉粹宋書卷四十六列傳第六趙倫之到彦之闕王懿張劭宋書卷四十七列傳第七劉懐肅孟懐玉弟龍符劉敬宣檀祗宋書卷四十八列傳第八朱齡石弟超石毛修之傅宏之宋書卷四十九列傳第九孫處蒯恩劉鍾虞丘進宋書卷五十列傳第十胡藩劉康祖垣䕶之張興世宋書卷五十一列傳第十一宗室長沙景王道憐臨川烈武王道規鮑照營浦侯遵考從子季連宋書卷五十二列傳第十二庾悅王誕謝景仁弟述袁湛弟豹褚叔度宋書卷五十三列傳第十三張茂度子永庾登之弟炳之謝方明江夷宋書卷五十四列傳第十四孔季恭羊元保沈曇慶宋書卷五十五列傳第十五臧燾徐廣傅隆宋書卷五十六列傳第十六謝瞻孔琳之宋書卷五十七列傳第十七蔡廓子興宗宋書卷五十八列傳第十八王惠謝宏微王球宋書卷五十九列傳第十九殷淳子孚淡弟沖張畼何偃江智淵宋書卷六十列傳第二十范泰王准之王韶之荀伯子宋書卷六十一列傳第二十一武三王廬陵孝獻王義真江夏文獻王義恭衡陽文王義季宋書巻六十二列傳第二十二羊欣張敷王微宋書卷六十三列傳第二十三王華王曇首殷景仁沈演之宋書卷六十四列傳第二十四鄭鮮之裴松之何承天宋書卷六十五列傳第二十五吉翰劉道産杜驥申恬宋書卷六十六列傳第二十六王敬宏何尚之宋書卷六十七列傳第二十七謝靈運宋書卷六十八列傳第二十八武二王彭城王義康南郡王義宣宋書卷六十九列傳第二十九劉湛范曄宋書卷七十列傳第三十袁淑宋書卷七十一列傳第三十一徐湛之江湛王僧綽宋書卷七十二列傳第三十二文九王南平穆王鑠建平宣簡王宏晉熙王昶始安王休仁晉平刺王休祐鄱陽哀王休業臨慶冲王休倩新野懐王夷父巴陵哀王休若宋書卷七十三列傳第三十三顔延之宋書卷七十四列傳第三十四臧質魯爽沈攸之宋書卷七十五列傳第三十五王僧達顔竣宋書卷七十六列傳第三十六朱修之宗慤王元謨宋書卷七十七列傳第三十七栁元景顔師伯沈慶之宋書卷七十八列傳第三十八蕭思話劉延孫宋書卷七十九列傳第三十九文五王竟陵王誕廬江王禕武昌王渾海陵王休茂桂陽王休範宋書卷八十列傳第四十孝武十四王豫章王子尚晉安王子勛松滋侯子房臨海王子頊始平孝敬王子鸞永嘉王子仁始安王子真邵陵王子元淮南王子孟晉陵孝王子雲南海哀王子師淮陽思王子霄東平王子嗣武陵王贊宋書卷八十一列傳第四十一劉秀之顧琛顧覬之宋書卷八十二列傳第四十二周朗沈懐文宋書卷八十三列傳第四十三宗越吳喜黄回宋書卷八十四列傳第四十四鄧琬袁顗孔顗宋書卷八十五列傳第四十五謝莊王景文宋書卷八十六列傳第四十六殷孝祖劉勔宋書卷八十七列傳第四十七蕭恵開殷琰宋書卷八十八列傳第四十八薛安都沈文秀崔道固宋書卷八十九列傳第四十九袁粲宋書卷九十列傳第五十明四王邵陵殤王友隨陽王翽新興王嵩始建王禧宋書卷九十一列傳第五十一孝義龔穎劉瑜郭世道嚴世期吳逵潘綜孫法宗蔣恭張進之許昭先余齊民孫棘何子平宋書卷九十二列傳第五十二良吏王鎮之杜慧度徐豁陸徽阮長之江秉之王歆之宋書卷九十三列傳第五十三隠逸戴顒宗炳周續之王宏之阮萬齡孔淳之劉凝之龔祈翟法賜陶潛宗彧之沈道䖍郭希林雷次宗朱百年王素劉睦之闗康之宋書卷九十四列傳第五十四恩倖戴法興戴明寳徐爰阮佃夫于天寳夀寂之姜産之李道兒王道隆楊運長宋書卷九十五列傳第五十五索虜宋書卷九十六列傳第五十六鮮卑吐谷渾宋書卷九十七列傳第五十七夷蠻南夷扶南國西南夷呵羅單國媻皇國媻達國闍婆達國師子國天竺迦毗黎國東夷髙句驪國百濟國倭國荆雝州蠻豫州蠻宋書卷九十八列傳第五十八氐胡胡大且渠䝉遜張掖宋書卷九十九列傳第五十九二凶元凶劭始興王濬宋書卷一百列傳第六十自序臣等謹案宋書一百卷梁沈約撰約為是書本於何承天山謙之蘇寳生所撰旁采徐爰之說晁公武謂其志兼載魏晉失于限斷葉適則謂其可補兩漢三國之闕說各有取今借以参考諸史雖失之煩雜而厯代故實藉以尚存後裴子野更刪為宋畧三十卷雖曰有功亦傷蕪穢劉知幾之論正非過毁耳乾隆四十年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
