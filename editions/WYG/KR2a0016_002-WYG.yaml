body:
  text: 宋書卷二梁沈約撰本紀第二武帝中七年正月己未振旅于京師改授大將軍揚州牧給班劒二十人本官悉如故固辭免南北征伐戰亡者並列上賻贈尸喪未反遣主師迎接致還本土二月盧循至番禺為孫季髙所破收餘衆南走劉藩孟懐玉斬徐道覆于始興晉自中興以來治綱大㢮權門并兼彊弱相凌百姓流離不得保其産業桓𤣥頗欲釐改竟不能行公既作輔大示軌則豪彊肅然逺近知禁至是㑹稽餘姚虞亮復蔵匿亡命千餘人公誅亮免㑹稽内史司馬休之天子又申前命公固辭於是改授太尉中書監乃受命奉送黄鉞解冀州交州刺史杜慧度斬盧循傳首京師先是諸州郡所遣秀才孝亷多非其人公表天子申明舊制依舊策試征西將軍荆州刺史道規疾患求歸八年四月改授豫州刺史以後將軍豫州刺史劉毅代之毅與公俱舉大義興復晉室自謂京城廣陵功業足以相抗雖權事推公而心不服也毅既有雄才大志厚自期許朝士素望者多歸之與尚書僕射謝混丹陽尹郗僧施並深相結及西鎮江陵豫州舊府多割以自隨請僧施為南蠻校尉公既知毅不能居下終為異端宻圖之毅至西稱疾篤表求從弟兖州刺史藩以為副貳偽許焉九月藩入朝公命收藩及謝混並於獄賜死自表討毅又假黄鉞率諸軍西征以前鎮軍將軍司馬休之為平西將軍荆州刺史兖州刺史道憐鎮丹徒豫州刺史諸葛長民監太尉留府事加太尉司馬丹陽尹劉穆之建威將軍配以實力壬午發自京師遣參軍王鎮惡龍驤將軍蒯恩前襲江陵十月鎮惡剋江陵毅及黨與皆伏誅十一月己卯公至江陵下書曰夫去弊拯民必存簡恕捨網脩綱雖煩易理江荆彫殘刑政多闕頃年事故綏撫未週遂令百姓疲匱嵗月滋甚財傷役困慮不幸生凋殘之餘而不減舊刻剝徴求不循政道宰莅之司或非良榦未能菲躬儉茍求盈給積習生常漸不知改近因戎役來渉二州踐境親民愈見其瘼思欲振其所急䘏其所苦凡租税調役悉宜以見户為正州郡縣屯田池塞諸非軍國所資利入守宰者今一切除之州郡縣吏皆依尚書定制實戸置臺調癸卯梓材庚子皮毛可悉停省别量所出巴陵均折度支依舊兵運原五嵗刑已下凡所質録賊家餘口亦悉原放以荆州十郡為湘州公乃進督以西陽太守朱齡石為益州刺史率衆伐蜀進公太傅揚州牧加羽葆鼔吹班劒二十人九年二月乙丑公至自江陵初諸葛長民貪淫驕横為士民所患苦公以其同大義優容之劉毅既誅長民謂所親曰昔年醢彭越今年誅韓信禍其至矣將謀作亂公克期至京邑而每淹留不進公卿以下頻日奉候於新亭長民亦驟出既而公輕舟密至已還東府矣長民到門引前卻人閑語凡平生於長民所不盡者皆與及之長民甚説已密命左右壯士丁旿等自幔後出於坐拉焉長民墜牀又於地敺之死於牀側輿尸付廷尉并誅其弟黎民旿驍勇有氣力時人為之語曰勿䟦扈付丁旿先是山湖川澤皆為豪彊所專小民薪採漁釣皆責稅直至是禁斷之時民居未一公表曰臣聞先王制治九土攸序分境畫疆各安其居在昔盛世人無遷業故井田之制三代以隆秦革斯政漢遂不改富彊兼并於是為弊然九服勿擾所託成舊在漢西京大遷田景之族以實闗中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰託淮海朝有匡復之筭民復思本之心經畧之圖日不暇給是以寧民綏治猶有未遑及至大司馬桓温以民無定本傷治為深庚戌土斷以一其業于時財阜國豐實由於此自兹迄今彌歴年載畫一之制漸用穨弛雜居流寓閭伍弗脩王化所以未純民瘼所以猶在臣荷重任恥責實深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦以為桑梓者誠以生焉終焉敬愛所託耳今所居累世墳壟成行敬恭之誠豈不與事而至請凖庚戌土斷之科庶子本所𢎞稍與事著然後率之以仁義鼓之以威武超大江而跨黄河撫九州而復舊土則戀本之志乃速由於當年在始暫勤要終所以能易伏惟陛下垂矜萬民憐其所失永懐鴻鴈之詩思隆中興之業既委臣以國重期臣以寧濟若所啓合允請付外施行於是依界土斷唯徐兖青三州居晉陵者不在斷例諸流寓郡縣多被併省以公領鎮西將軍豫州刺史公固讓太傅州牧及班劒奉還黄鉞七月朱齡石平蜀斬偽蜀王譙縱傳首京師九月封公次子義真為桂陽縣公以賞平齊及定盧循也天子重申前命授公太傅揚州牧加羽葆鼓吹班劒二十人將吏百餘敦勸乃受羽葆鼔吹班劒餘固辭十年息民簡役築東府起府舍平西將軍荆州刺史司馬休之宗室之重又得江漢人心公疑其有異志而休之兄子譙王文思在京師招集輕俠公執文思送還休之令自為其所休之表廢文思并與公書陳謝十一年正月公收休之子文寳兄子文祖並於獄賜死率衆軍西討復加黄鉞領荆州刺史辛巳發京師以中軍將軍道憐監留府事休之上表自陳曰臣聞運不常一治亂代有陽九既謝圯終則泰昔簒臣肆逆皇綱絶紐十世未改鼎祚再隆太尉臣諱威武明斷首建義旗除蕩元凶皇居反正布衣匹夫匡復社稷南剿盧循北定廣固千載以來功無與等由是四海歸羙朝野推崇既位窮台牧權傾人主不能以道處功恃寵驕溢自以酬賞既極便情在無上刑戮逆濫政用暴苛問鼎之迹日彰人臣之禮頓缺陛下四時膳御觸事縣空宫省供奉十不一在皇后寢疾之際湯藥不周手與家書多所求告皆是朝士共所聞見莫不傷懐憤歎口不敢言前揚州刺史元顯第五息法興桓𤣥之舋逃逺於外王路既開始得歸本太傅之𦙍絶而復興凡在有懷誰不感慶諱吞噬之心不避輕重以法興聰敏明慧必為民望所歸芳蘭既茂内懐憎惡乃妄扇異言無罪即戮大司馬臣徳文及王妃公主情切計逼並狼狽請命逆肆禍毒誓不矜許寃酷之痛感動行路自以地卑位重荷恩崇大乃以庶孽與徳文嫡婚致兹非偶實由威逼故衛將軍劉毅右將軍劉藩前將軍諸葛長民尚書僕射謝混南蠻校尉郗僧施或盛勲徳𦙍令望在身皆社稷輔弼恊讃所寄無罪無辜一旦夷滅猜忍之性終古所希臣自惟門戸衰破賴之獲存皇家所重終古難匹是以公私歸馮事盡祗順再授荆州輒苦陳告自以才弱位隆不宜久荷分陜屢求解任必不見聴前經擕侍老母半家俱西凡諸子姪悉留京輦臣兄子譙王文思雖年少常人粗免咎悔性好交逰未知防逺羣醜交構為其風聲諱遂翦戮人士逺送文思臣順其此㫖表送章節請廢文思改襲大宗遣息文寳送女東歸自謂推誠奉順理不過此豈意諱包蔵禍心遂見討伐加惡文思構生罪舋羣小之言逺近噂􅊱而臣純愚闇信必謂不然尋臣府司馬張茂度狼狽東歸南平太守檀範之復以此月三日委郡叛逆尋有審問東軍已上諱今此舉非有怨憎正以臣王室之幹位居藩岳時賢既盡唯臣獨存規以翦滅成其簒殺鎮北將軍臣宗之青州刺史臣敬宣並是諱所深忌憚欲以次除蕩然後傾移天日於事可易今荆雍義徒不召而集子來之衆其㑹如林豈臣無徳所能綏致盖七廟之靈理貫幽顯輒授文思振武將軍南郡太守宗之子竟陵太守魯軌進號輔國將軍臣今與宗之親御大衆出據江津案甲抗威隨宜應赴今絳旗所指唯諱兄弟父子而已湏尅蕩宼逆尋續馳聞由臣輕弱致諱凌横上慚俯愧無以厝顔休之府録事參軍韓延之故吏也有幹用才能公未至江陵密使與之書曰文思事源逺近所知去秋遣康之送還司馬軍者推至公之極也而了不遜愧又無表疏文思經正不反此是天地之不容吾受命西討止其父子而已彼土僑舊為所驅逼一無所問往年郗僧施謝邵任集之等交構積嵗専為劉毅謀主所以至此卿等諸人一時逼迫本無讖釁吾處懷期物自有由來今在近路正是諸人歸身之日若大軍登道交鋒接刃蘭艾吾誠不分故具示意并示同懐諸人延之報曰承親率戎馬逺履西畿闔境士庶莫不惶駭何者莫知師出之名故也今辱來疏始知以譙王前事良増歎息司馬平西體國忠貞欵愛待物當於古人中求耳以君公有匡復之勲家國蒙賴推徳委誠每事詢仰譙王往以微事見劾猶自表遜位况以大過而當嘿然邪但康之前言有所不盡故重使胡道諮白所懷道未及反已奏表廢之所不盡者命耳推寄相與之懷正當如此有何不可便興兵戈自義旗秉權以來四方方伯誰敢不先相諮疇而逕表天子邪譙王為宰相所責又表廢之經正何歸表使何因可謂欲加之罪其無辭乎劉諱足下海内之人誰不見足下此心而復欲欺誑國士天地所不容在彼不在此矣來示言處懐期物自有由來今伐人之君啗人以利真可謂處懷期物自有由來者矣劉藩死於閭闔之内諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡款懐之士閫外無自信諸侯以是為得筭良可恥也貴府將佐及朝廷賢徳寄性命以過日心企太平久矣吾誠鄙劣嘗聞道於君子以平西之至徳寧可無授命之臣乎未能自投虎口比迹郗任之徒明矣假令天長喪亂九流渾濁當與臧洪逰於地下不復多言公視書歎息以示諸佐曰事人當如此三月軍次江陵初雍州刺史魯宗之常慮不為公所容與休之相結至是率其子竟陵太守軌會于江陵江夏太守劉䖍之邀之軍敗見殺公命彭城内史徐逵之參軍王允之出江夏口復為軌所敗並没時公軍泊馬頭即日率衆軍濟江躬督諸將登岸莫不奮踊爭先休之衆潰與軌等奔襄陽江陵平加領南蠻校尉將拜值四廢日佐史鄭鮮之禇叔度王𢎞傅亮白遷日不許下書曰此州積弊事故相仍民疲田蕪杼軸空匱加以舊章乖昧事役頻苦童耄奪養老稺服戎空戸從役或越紼應召毎永懐民瘼宵分忘寢誠宜蠲除苛政𢎞兹簡惠庶令凋風弊政與事而新寧一之化成於朞月荆雝二州西局蠻府吏及軍人年十二以還六十以上及扶養孤幼單丁大艱悉仰遣之窮獨不能存者給其長賑府州久懃將吏依勞銓序并除今年租稅四月公復率衆進討至襄陽休之奔羌天子復重申前命授太傅揚州牧劒履上殿入朝不趨賛拜不名加前部羽葆鼓吹置左右長史司馬從事中郎四人封公第三子義隆為北彭城縣公以中軍將軍道憐為荆州刺史八月甲子公至自江陵奉還黄鉞固辭太傅州牧前部羽葆鼓吹其餘受命朝議以公道尊勲重不宜復施敬䕶軍既加殊禮奏事不復稱名以世子為兖州刺史十二年正月詔公依舊辟士加領平北將軍兖州刺史増都督南秦凡二十二州公以平北文武寡少不宜别置於是罷平北府以併大府以世子為豫州刺史三月加公中外大都督初公平齊仍有定闗洛之意值盧循侵逼故其事不諧荆雝既平方謀外畧㑹羌主姚興死子泓立兄弟相殺闗中擾亂公乃戒嚴北討加領征西將軍司豫二州刺史以世子為徐兖二州刺史下書曰吾倡大義首自本州克復皇祚遂建勲烈外夷勍敵内清姦宄皆邦人州黨竭誠盡力之效也情若風霜義貫金石今當奉辭西斾有事闗河弱嗣叨蒙復忝今授情事纒綿可謂深矣頃軍國務殷刑辟未息眷言懷之能不多歎其犯辠繫五嵗以還可一原遣文武勞滿未蒙榮轉者便隨班序報公受中外都督及司州並辭大司馬琅邪王禮敬朝議從之公欲以義聲懷逺奉琅邪王北伐五月羌偽黄門侍郎尹冲率兄弟歸順又加公北雍州刺史前部羽葆鼔吹増班劒為四十人解中書監八月丁巳率大衆發京師以世子為中軍將軍監太尉留府事尚書右僕射劉穆之為左僕射領監軍中軍二府軍司入居東府摠攝内外九月公次于彭城加領徐州刺史先是遣冠軍將軍檀道濟龍驤將軍王鎮惡步向許洛羌緣道屯守皆望風降服偽兖州刺史韋華先據倉垣亦率衆歸順公又遣北兖州刺史王仲徳先以水軍入河仲徳破索虜於東郡涼城進平滑臺十月衆軍至洛陽圍金墉泓弟偽平南將軍洸請降送于京師脩復晉五陵置守衛天子詔曰夫嵩岱配極則乾道増輝藩嶽作屏則帝王成務是以夏殷資昆彭之伯有周倚齊晉之輔鍳諸前典儀刑萬代翼治扶危靡不由此太尉公命世天縱齊聖廣淵明燭四方道光宇宙爰自闕初廸則投懃王國妖蝥孔熾則功存社稷固以四維是荷萬邦攸賴者矣暨桓𤣥僣逆傾蕩四海公深秉大節靈武霆震𢎞濟朕躬再造王室每惟勲徳銘于厥心遂北清海岱南夷百越荆雍稽服庸氓順軌剋黜方難式遏宼虐及阿衡王猷班序内外仰興絶風傍嗣逸業秉禮以整俗遵王以垂訓聲教逺被無思不洽爰暨木居海處之酋被髪雕題之長莫不忘其陋儉九譯來庭此盖播諸徽策靡究其詳者也曩者永嘉不綱諸夏幅裂終古帝居淪胥戎虜永言園陵率土同慕公明發遐慨撫機電征親董侯伯稜威致討旗旝首塗則八表響震偏師先路則多壘雲徹舊都載清五陵復禮百城屈膝千落影從自篇籍所載生民以來勲徳懋功未有若此之盛者也昔周呂佐叡聖之主因三分之形把旄仗鉞一時指麾皆大啓疆宇跨州兼國其在桓文方兹尤儉然亦顯被寵章光錫殊品况乃獨絶百代顧邈前烈者哉朕每𢎞鑒古訓思遵令圖以公深秉沖挹用闕大禮天人引領于兹歴載况今禹迹齊軌九隩同文司勲抗策普天增佇遂公髙挹大愆國章三靈眷屬朕實祗懼便宜顯答羣望允崇盛典其進位相國摠百揆揚州牧封十郡為宋公備九錫之禮加璽綬逺逰冠位在諸侯王上加相國綠綟綬策曰朕以寡昧仰纉洪基夷羿乗舋蕩覆王室越在南鄙遷于九江宗祀絶饗人神無位提挈羣凶寄命江滸則我祖宗之業奄墜于地七百之祚翦焉既傾若渉淵海罔知攸濟天未絶晉誕育英輔振厥㢮維再造區物興亡繼絶俾昬作明元勲至徳朕實賴焉今將授公典策其敬聽朕命乃者桓𤣥肆僣滔天冺夏拔本塞源顛倒六位庶僚俛眉四方莫䘏公精貫朝日氣凌霄漢奮其靈武大殱羣慝剋復皇邑奉帝歆神此公之節始於勤王者也授律羣后泝流長騖薄伐崢嶸獻㨗南郢大憝折首羣逆畢夷三光旋采舊物反正此又公之功也出藩入輔𢎞兹保弼阜財利用繁殖生民編戸嵗滋疆宇日啓導徳明刑四境有截此又公之功也鮮卑負衆僣盗三齊狼噬冀青䖍劉沂岱介恃遐阻仍為邊毒公蒐乗秣駟夐入逺疆衝櫓四臨萬雉俱潰竊號之虜顯戮司宼拓土三千申威龍漠此又公之功也盧循妖凶伺隙五嶺乗虚肆逆侵覆江豫旍拂寰内矢及王城朝野喪沮莫有固志家獻徙卜之計國議遷都之規公乗轅南濟義形于色嶷然内湛視嶮若夷攄畧運竒英謨不世狡宼窮衂喪旗宵遁俾我畿甸拯於將墜此又公之功也追奔逐北揚旍江濆偏旅浮海指日遄至番禺之功俘級萬數左里之㨗魚潰鳥散元凶逺迸傳首萬里海南肅清荒服來款此又公之功也劉毅叛渙負舋西夏凌上罔主志肆奸暴附麗協黨扇蕩王畿公御軌以刑消之不日倉兕電泝神兵風掃罪人斯得荆衡清晏此又公之功也譙縱怙亂宼竊一隅王化阻閡三巴淪溺公指命偏師授以良圖凌波浮湍致届井絡僭竪伏鑕梁岷革偃此又公之功也馬休魯宗阻兵内侮驅率二方連旗稱亂公投袂星言斫其上畧江津之師勢踰風電廻斾沔川實繁震懾二叛奔迸荆雍來蘓𤣥澤浸育溫風潜被此又公之功也永嘉不競四夷擅華五都幅裂山陵幽辱祖宗懐没世之憤遺氓有匪風之思公逺齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命羣帥北徇司兖許鄭風靡鞏洛載清偽牧逆藩交臂請罪百年榛穢一朝掃濟此又公之功也公有康宇内之勲重之以明徳爰初發迹則竒謨冠古電擊彊妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化融於嵗計扶危静亂道固於苞桑辯方正位納之軌度蠲削煩苛較若畫一淳風美化盈塞宇宙是以絶域獻琛遐夷納貢王畧所宣九服率從雖文命之東漸西被咎繇之邁于種徳何以尚兹朕聞先王之宰世也庸勲尊賢建侯胙土襃以寵章崇其徽物所以協輔皇家永隆藩屏故曲阜光啓遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前烈勲髙振古而殊典未加朕甚懵焉今進授相國以徐州之彭城沛蘭陵下邳淮陽山陽廣陵兖州之髙平魯泰山十郡封公為宋公錫兹𤣥土苴以白茅爰定爾居用建冡社昔晉鄭啓藩入作卿士周召保傅出總二南内外之重公實兼之命使持節太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂郷侯泰授宋公茅土金虎符第一至第十左竹使符第一至第十左相國位無不總禮絶朝班居常之名宜與事革其相國總百揆去録尚書之號上送所假節侍中中外都督太傅太尉印綬豫章公印策進揚州牧領征西將軍司豫北徐雍四州刺史如故公紀綱禮度萬國是式秉介蹈方罔有遷志是以錫公大輅戎輅各一𤣥牡二駟公抑末敦本務農重積采蘩實殷稼穡惟阜是用錫公衮冕之服赤舄副焉公閑邪納正移風改俗陶鈞品物如樂之和是用錫公軒縣之樂六佾之舞公宣美王化導揚休風華夷企踵逺人胥萃是用錫公朱戸以居公官方任能網羅幽滯九臯辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏宼讎清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳯矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百盧弓十盧矢千公温恭孝思致䖍禋祀忠肅之志儀刑萬方是用錫公秬鬯一卣圭瓉副焉宋國置丞相以下一遵舊儀欽哉其祗服往命茂對天休簡恤庶邦敬敷顯徳以終我髙祖之嘉命置宋國侍中黄門侍郎尚書左丞相隨大使奉迎枹罕虜乞伏熾槃遣使詣公求効力討羌拜西平將軍河南公十三年正月公以舟師進討留彭城公義隆鎮彭城軍次留城經張良廟令曰夫盛徳不冺義在祀典微管之歎撫事彌深張子房道亞黄中照隣殆庶風雲言感蔚為帝師大拯横流夷項定漢固以參軌伊望冠徳如仁若乃神交圯上道契商洛顯晦之間窈然難究源流淵浩莫測其端矣塗次舊沛佇駕留城靈廟荒殘遺象陳昩撫迹懷人慨然永歎過大梁者或佇想於夷門逰九原者亦流連於隨㑹可改構榱桷脩飾丹青蘋蘩行潦以時致薦以紓懐古之情用存不刋之烈天子追贈公祖為太常父為左光禄大夫讓不受二月冠軍將軍檀道濟等次潼闗三月庚辰大軍入河索虜歩騎十萬營據河津公命諸軍濟河擊破之公至洛陽七月至陜城龍驤將軍王鎮惡伐木為舟自河浮渭八月扶風太守沈田子大破姚泓於藍田王鎮惡剋長安生擒泓九月公至長安長安豐稔帑蔵盈積公先收其彛器渾儀土圭之屬獻于京師其餘珍寳珠玉以班賜將帥執送姚泓斬于建康市謁漢髙帝陵大㑹文武於未央殿十月天子詔曰朕聞先王之莅天下也上則大寳以尊徳下則建侯以襃功是以成勲告就文命有𤣥圭之錫四海來王姬旦饗龜蒙之封夫翼聖宣績輔徳𢎞猷禮窮元賞寵章希世况明保沖昧獨運陶鈞者哉朕以不徳遭家多難雲雷作屯夷羿竊命失位京邑遂播蠻荆艱難卑約制命凶醜相國宋公天縱睿聖命世應期誠貫三靈大節宏發拯朕窮於巢幕廻靈命於己崩固已道窮北面暉格八表者矣及外積全國之勲内累戡黎之伐芟夷彊妖之始藴崇奸猾之源顯仁蔵用之道六府孔脩之績莫不雲行雨施能事必舉諒已方軌於三五不容於典策者焉自永嘉喪師綿踰十紀五都分崩然正朔時暨唯三秦懸隔未之暫賔至令羌虜襲亂淫虐三世資百二之易守恃函谷之可闗廟筭韜畧不謀之日久矣公命世撫運闡曜威靈内研諸侯之慮外致上天之罰故能倉兕甫訓則許鄭風偃鉦鉞未指則瀍洛霧披俾舊闕元陽復集萬國之軫東京父老重覩司𨽻之章俾朕負扆髙拱而保大洪烈是用逺鑒前典延即羣謀敬授殊錫光啓疆宇乗馬之制有陋舊章徽稱之美未窮上爵豈足以顯報懋功允塞民望藩輔王畿長轡六合者乎實以公每秉謙徳卑不可踰難進之道以寵為戚是故降損盛制且有後命也自兹迄今洪勲彌劭稜威九河魏趙底服廻轅崤潼連城冰泮遂長驅灞滻懸旍龍門逆虜姚泓係頸就擒百稔梗穢滌於崇朝祖宗遺憤雪於一旦涉禹之迹方行天下至於海外罔有不服功固萬世其寧惟永豈金石雅頌所能讃揚實可以告於神明勒銘嵩岱者己朕又聞之周道方逺則鸑鷟鳴岐二南播徳則麟騶呈瑞自公大號初發爰暨告成靈祥炳煥不可勝紀豈伊素雉逺至嘉禾近歸而已哉朕每仰鑒𤣥應俯察人謀進惟道勲退惟國典豈得遂公髙挹而久藴盛策便宜敬行大禮允副幽顯之望其進宋公爵為王以徐州之海陵東安北琅邪北東莞北東海北譙北梁豫州之汝南北潁川北南頓凡十郡益宋國其相國揚州牧領征西將軍司豫北徐雍四州刺史如故十一月前將軍劉穆之卒以司馬徐羡之代掌留任大事昔所決於穆之者皆悉以諮公欲息駕長安經畧趙魏㑹穆之卒乃歸十二月庚子發自長安以桂陽公義真為安西將軍雍州刺史留腹心將佐以輔之閏月公自洛入河開汴渠以歸十四年正月壬戌公至彭城解嚴息甲以輔國將軍劉遵考為并州刺史領河東太守鎮蒲坂公解司州領徐冀二州刺史固讓進爵六月受相國宋公九錫之命令曰孤以寡薄負荷殊重守位奉藩危溢是懼朝恩隆泰委美推功遂方軌齊晉擬議國典雖亮誠守分十稔于今而成命弗廻百辟胥暨内外庶僚敦勉周至藉運來之功參休明之迹乘菲薄之資同盛徳之事監寐永言未知攸託隆祚之始思覃斯慶其赦國内殊死以下今月二十三日昩爽以前悉皆原宥鰥寡孤獨不能自存者人賜粟五斛府州刑罪亦同蕩然其餘詳依舊凖詔崇豫章公太夫人為宋公太妃世子為中軍將軍副貳相國府以太尉軍諮祭酒孔季恭為宋國尚書令青州刺史檀祗為領軍將軍相國左長史王𢎞為尚書僕射其餘百官悉依天朝之制又詔宋國所封十郡之外悉得除用先是安西中兵參軍沈田子殺安西司馬王鎮惡諸將軍復殺安西長史王脩闗中亂十月公遣右將軍朱齡石代安西將軍桂陽公義真為雍州刺史義真既還為佛佛虜所追大敗僅以身免諸將帥及齡石並没領軍檀祗卒以中軍司馬檀道濟為中領軍十二月天子崩大司馬琅琊王即帝位元熙元年正月詔遣大使徴公入輔又申前命進公爵為王以徐州之海陵東海北譙北梁豫州之新蔡兖州之北陳留司州之陳郡汝南潁州滎陽十郡増宋國七月乃受命赦國内五嵗刑以下遷都夀陽以尚書劉懐慎為北徐州刺史鎮彭城九月解揚州十二月天子命王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴宮縣進王太妃為太后王妃為王后世子為太子王子王孫爵命之號一如舊儀二年四月徴王入輔六月至京師晉帝禪位于王詔曰夫天造草昧樹之司牧所以陶鈞三極統天施化故大道之行選賢與能隆替無常期禪代非一族貫之百王由來尚矣晉道陵遲仍世多故爰暨元興禍難既積至三光貿位冠履易所安皇播越宗祀墮泯則我宣元之祚永墜于地顧瞻區域翦焉已傾相國宋王天縱聖徳靈武秀世一匡頽運再造區夏固以興滅繼絶舟航淪溺矣若夫仰在璿璣旁穆七政薄伐不庭開復疆宇遂乃三俘偽主開滌五都雕顔卉服之鄉龍荒朔漠之長莫不廻首朝陽沐浴𤣥澤故四靈効瑞川岳啓圖嘉祥雜遝休應炳著𤣥象表革命之期華裔注樂推之願代徳之符著乎幽顯瞻烏爰止允集明哲夫豈延康有歸咸熈告謝而已哉昔火徳既微魏祖底績黄運不競三后肆勤故天之歴數寔有攸在朕雖庸闇昩於大道永鑒廢興為日已久念四代之髙義稽天人之至望予其遜位别宫歸禪于宋一依唐虞漢魏故事詔草既成送呈天子使書之天子即便操筆謂左右曰桓𤣥之時天命已改重為劉公所延將二十載今日之事本所甘心甲子策曰咨爾宋王夫𤣥古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海止戈定大業然則帝王者宰物之通器君道者天下之至公昔在上葉深鑒兹道是以天禄既終唐虞弗得傳其嗣符命來格舜禹不獲全其謙所以經緯三才澄序彛化作範振古垂風萬葉莫尚於兹自是厥後歴代彌劭漢既嗣徳於放勛魏亦方軌於重華諒以協謀乎人鬼而以百姓為心者也昔我祖宗欽明辰居其極而明晦代序盈虧有期翦商兆禍非唯一世曽是弗剋矧伊在今天之所廢有自來矣唯王體上聖之姿苞二儀之徳明齊日月道合四時乃者社稷傾覆王拯而存之中原蕪梗又濟而復之自負固不賔干紀放命肆逆滔天竊據萬里靡不潤之以風雨震之以雷霆九伐之道既敷八法之化自理豈伊博施於民濟斯黔庶固以義洽四海道威八荒者矣至於上天垂象四靈効徴圖讖之文既明人神之望已改百工歌於朝庶民頌於野億兆抃踊傾佇惟新自非百姓樂推天命攸集豈伊在予所得獨專是用仰祗皇靈俯順羣議敬禪神器授帝位于爾躬大祚告窮天祿永終於戲王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祜以答三靈之眷望又璽書曰葢聞天生蒸民樹之以君帝皇寄世實公四海崇替係於勲徳升降存乎其人故有國必亡卜年著其數代謝無常聖哲握其符昔在上世三聖係軌疇咨四岳以𢎞揖讓惟先王之有作永垂範於無窮及劉氏致禪實堯是法有魏告終亦憲兹典我世祖所以撫歸運而順人事乗利見而定天保者也而道不常泰戎夷亂華喪我洛京蹙國江表仍遘否運淪没相因逮于元興遂傾宗祀幸賴神武光天大節宏發匡復我社稷重造我國家惟王聖徳欽明則天光大應期誕載明保王室内紓國難外播宏畧誅大憝於漢陽逋僣盗於沂渚澄氛西岷肅清南越再静江湘拓定樊沔若乃永懷區宇思一聲教王師首路則伊洛澄流稜威崤潼則華嶽褰靄偽酋銜璧咸陽即序雖彛器所銘詩書所詠庸勲之盛莫之與二也遂偃武脩文誕敷徳政八統以馭萬民九職以刑邦國思兼三王以施四事故能信著幽顯義感殊方自歴世所賔舟車所暨靡不謳歌仁徳抃舞來庭朕毎敬惟道勲永察符運天之歴數實在爾躬是以五緯升度屢示除舊之迹三光協數必昭布新之祥圖讖禎瑞皎然斯在加以龍顔英特天授殊姿君人之表煥如日月傳稱惟天為大惟堯則之詩云有命自天命此文王夫或躍在淵者終饗九五之位勲格天地者必膺大寳之業昔土徳告沴傳胙于我有晉今歴運改卜永終于兹亦以金徳而傳于宋仰四代之休義鑒明昬之定期詢于羣公爰逮庶尹咸曰休哉罔違朕志今遣使持節兼太保散騎常侍光禄大夫澹兼太尉尚書宣範奉皇帝璽綬受終之禮一如唐虞漢魏故事王其允答人神君臨萬國時膺靈祉酬于上天之眷命王奉表陳讓晉帝已遜琅邪王第表不獲通於是陳留王䖍嗣等二百七十人及宋臺羣臣並上表勸進上猶不許太史令駱達陳天文符瑞數十條羣臣又固請王乃從之宋書卷二宋書卷二考證武帝紀中遣主師迎接致還本土主一本誤王師一本作帥或非良榦未能菲躬儉躬下當有節字或儉下脱一用字休之府録事參軍韓延之故吏也一本延之下有公之二字文意更明劉藩死於閭闔之内閭通鑑作閶爰暨木居海處之酋酋監本訛首今改正再造區物物南史作㝢宋書卷二考證
