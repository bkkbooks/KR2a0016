body:
  text: 宋書卷九梁沈約撰本紀第九後廢帝廢帝諱昱字德融小字慧震明帝長子也大明七年正月辛丑生於衛尉府太宗諸子在孕皆以周易筮之即以所得之卦為小字故帝字慧震其餘皇子亦如之泰始二年立為皇太子三年始制太子改名昱安車乗象輅六年出東宫又制太子元正朝賀服衮冕九章衣泰豫元年四月己亥太宗崩庚子太子即皇帝位大赦天下尚書令袁粲護軍將軍褚淵共輔朝政乙巳以護軍將軍張永為右光祿大夫撫軍將軍安成王為揚州刺史己酉特進右光祿大夫劉遵考改為左光祿大夫五月丁巳以吳興太守張岱為益州刺史戊辰緣江戍兵老疾者悉聽還班劔依舊入殿六月壬辰詔曰夫興王經制實先民隐方求廣教刑於四維朕以㷀𦕈夙膺寶歷永言民政未接聽覽眷言乃顧無忘鑒寐可遣大使分行四方觀採風謠問其疾苦有咈民法不便俗者悉各條奏若守宰威恩可紀廉勤允著依事騰聞如獄訟誣枉識事紕繆惰公存私害民利己者無或隐昧廣納芻輿之議博求獻藝之規巡省之道務令精洽深簡行識俾若朕親覽焉又詔曰夫寢夢期賢往誥垂羙物色求良前書稱盛朕以冲昧嗣膺寶業思仰述聖猷勉𢎞政道興言多士常想得人可普下牧守廣加搜採其有孝友聞族義讓光閭或匿名屠釣隐身耕牧足以整厲澆風扶益淳化者凡厥一善咸無遺逸虛輪佇帛俟聞嘉薦京師雨水詔賑䘏二縣貧民乙巳尊皇后曰皇太后立皇后江氏秋七月戊辰崇拜帝所生陳貴妃為皇太妃閏月丁亥罷宋安郡還屬廣興己丑割南豫州南汝陰郡屬西豫州西豫州廬江郡屬豫州甲辰以新除征西將軍開府儀同三司荆州刺史蔡興宗為中書監光祿大夫安西將軍郢州刺史沈攸之為鎮西將軍荆州刺史南徐州刺史劉秉為平西將軍郢州刺史新除太常建平王景素為鎮軍將軍南徐州刺史八月戊午新除中書監左光祿大夫開府儀同三司蔡興宗薨冬十月辛卯撫軍將軍劉韞有罪免官辛未護軍將軍褚淵母憂去職十一月己亥新除平西將軍郢州刺史劉秉為尚書左僕射辛丑護軍將軍褚淵還攝本任芮芮國髙麗國遣使獻方物十二月索虜㓂義陽丁巳司州刺史王瞻擊破之元徽元年春正月戊寅朔改元大赦天下壬寅詔曰夫緩法昭恩裁風茂典蠲憲貸眚訓俗彜義朕臨馭宸樞夤制氓㝢式存寛簡思孚矜惠今開元肆宥萬品惟新凡兹流斥宜均𢎞洗自元年以前貽罪徙放者悉聽還本土二月乙亥以晉熙王燮為郢州刺史三月丙申以撫軍長史何恢為廣州刺史婆利國遣使獻方物戊戌以前淮南太守劉靈遺為南豫州刺史夏五月辛卯以輔師將軍李安民為司州刺史丙申河南王遣使獻方物六月壬子以越州刺史陳伯紹為交州刺史乙卯特進左光祿大夫劉遵考卒夀陽大水己未遣殿中將軍賑䘏慰勞丙寅以左軍將軍孟次陽為兖州刺史秋七月丁丑散騎常侍顧長康長水校尉何翌之表上所撰諫林上自虞舜下及晉武凡十二卷八月辛亥詔曰分方正俗著自虞册川谷異制煥乎姬典故井遂有辨閭伍無雜用能七教克宣八政斯序雖綿代殊軌㳂革異儀或民懷遷俗或國尚興徙漢陽列燕代之豪闗西熾齊楚之族並通籍新邑即居成舊洎金行委御禮樂南移中州黎庻襁負揚越聖武造運道一閎區貽長世之規申土斷之制而夷險相因盈晦逓襲嵗饉凋流戎役惰散違鄉寓境漸至繁積宜式遵鴻軌以為永憲庻阜俗昌民反風定保夷胥山之險澄瀚海之波括河圗於九服振玉軔於五都矣秘書丞王儉表上所撰七志三十卷京師旱甲寅詔曰比亢序愆度留熏燿晷有傷秋稼方貽民瘼朕以眇疚未𢎞政道囹圄尚繁枉滯猶積夕厲晨矜每惻于懷尚書令可與執法以下就訊衆獄使寃訟洗遂困弊昭蘇頒下州郡咸令無壅癸亥鎮軍將軍南徐州刺史建平王景素進號鎮北將軍庚午陳留王曹銑薨九月壬午詔曰國賦氓税蓋有恒品往屬戎難務先軍實徴課之宜或乖昔准湘江二州糧運偏積調役既繁庻徒彌擾因循權政容有未革民單力弊歲月愈甚永言矜歎情兼宵寐可遣使到所明加詳察其輸違舊令役非公限者並即蠲改具條以聞丁亥立衡陽王嶷子伯玉為南平王冬十月壬子以撫軍司馬王𤣥載為梁南秦二州刺史癸酉割南兖州之鍾離豫州之馬頭又分秦郡梁郡歷陽置新昌郡立徐州十一月丙子以散騎常侍垣閎為徐州刺史丁丑尚書令袁粲母喪去職十二月癸卯朔日有蝕之乙巳司空江州刺史桂陽王休範進位太尉尚書令袁粲還攝本任加號衛將軍癸亥立前建安王世子伯融為始安縣王丙寅河南王遣使獻方物二年春正月庚子以右光祿大夫張永為征北將軍南兖州刺史二月己巳加護軍將軍褚淵中軍將軍三月癸酉以左衞將軍王寛為南豫州刺史夏四月癸亥詔曰頃列爵叙勲銓榮酬義條流積廣又各淹闕歲往事留理至逋壅在所參差多違甄飭賞未均洽每疚厥心可悉依舊准並下注職五月壬子太尉江州刺史桂陽王休範舉兵反庚寅内外戒嚴加中領軍劉勔鎮軍將軍加右衞將軍齊王平南將軍前鋒南討出屯新亭征北將軍張永屯白下前南兖州刺史沈懷明戍石頭衞將軍袁粲中軍將軍褚淵入衞殿省壬辰賊奄至攻新亭壘齊王拒擊大破之越騎校尉張敬兒斬休範賊黨杜黒蠡丁文豪分軍向朱雀航劉勔拒賊敗績力戰死之右軍將軍王道隆奔走遇害張永潰於白下沈懷明自石頭奔散戊午撫軍典籖茅恬開東府納賊賊入屯中堂羽林監陳顯達擊大破之丙申張敬兒等破賊於宜陽門莊嚴寺小市進平東府城梟擒羣賊賞賜封爵各有差丁酉詔京邑二縣埋藏所殺賊并戰亡者復同京城是日解嚴大赦天下文武賜位一等戊戌原除江州逋債其有課非常調役為民蠧者悉皆蠲停詔曰頃國賦多騫公儲罕給近治戎雖淺而軍費已多廩藏虛罄難用馭逺宜矯革淫長務在節儉其供奉服御悉就減撤雕文靡麗廢而勿脩凡諸游費一皆禁斷外可詳為科格荆州刺史沈攸之南徐州刺史建平王景素郢州刺史晉熙王燮湘州刺史王僧䖍雍州刺史張興世並舉義兵赴京師己亥以第七皇弟友為江州刺史芮芮國遣使獻方物六月庚子以平南將軍齊王為中領軍鎮軍將軍南兖州刺史癸卯晉熙王燮遣軍尅尋陽江州平戊申以淮南太守任農夫為豫州刺史右將軍南豫州刺史王寛進號平西將軍壬戍改輔師將軍還為輔國秋七月庚辰立第七皇弟友為邵陵王辛巳以撫軍司馬孟次陽為兖州刺史乙酉鎮西將軍荆州刺史沈攸之進號征西大將軍鎮北將軍徐州刺史建平王景素進號征北將軍並開府儀同三司征虜將軍郢州刺史晉熙王燮進號安西將軍前將軍湘州刺史王僧䖍進號平南將軍八月辛酉以征虜行參軍劉延祖為寧州刺史九月壬辰以遊擊將軍吕安國為兖州刺史丁酉以尚書令新除衞将軍袁粲為中書監即本號開府儀同三司領司徒加護軍将軍褚淵尚書令撫軍将軍揚州刺史安成王進號車騎将軍冬十月庚申以新除侍中王蕰為湘州刺史甲子以遊擊将軍陳顯達為廣州刺史十一月丙戌御加元服大赦天下賜民男子爵一級為父後及三老孝悌力田者爵二級鰥寡孤獨篤癃不能自存者榖五斛年八十以上加帛一匹大酺五日賜王公以下各有差十二月癸亥立第八皇弟躋為江夏王第九皇弟贊為武陵王三年春正月辛巳車駕親祠南郊明堂三月丙寅河南王遣使獻方物己巳以車騎將軍張敬兒為雍州刺史其日京師大水遣尚書郎官長檢行賑賜閏月戊戌詔曰頃民俗滋弊國度未殷嵗時屢騫編户不給且邉虞尚警傜費彌繁永言夕惕寝興增疚思𢎞豐耗之制以惇約素之風庻偫蓄拯民以康治道大官珍膳御府麗服諸所供擬一皆減撤可詳為其格務從簡衷夏四月遣尚書郎到諸州檢括民户窮老尤貧者蠲除課調丁壮猶有生業隨宜寛申貲財足以充限者督令洗畢丙戌車駕幸中堂聽訟六月癸未北國使至兼司徒袁粲尚書令褚淵並固譲秋七月庚戌以粲為尚書令壬戌以給事黄門侍郎劉懐珍為豫州刺史八月庚子加護軍將軍褚淵中書監九月丙辰征西大将軍河南王吐谷渾拾寅進號車騎大将軍冬十月丙戌髙麗國遣使獻方物十二月乙丑以冠軍將軍姚道和為司州刺史四年春正月己亥車駕躬耕籍田大赦天下賜力田爵一級貸貧民糧種壬子以梁南秦二州刺史王𤣥載為益州刺史二月壬戌以歩兵校尉范栢年為梁南秦二州刺史丁卯加金紫光祿大夫王琨特進夏五月以寧朔将軍武都王楊文度為北秦州刺史乙未尚書右丞虞玩之表陳時事曰天府虛散垂三十年江荆諸州税調本少自頃以來軍募多乏其榖帛所入折供文武豫兖司徐開口待哺西北戎將裸身求衣委輸京都益為寡薄天府所資唯有淮海民荒財單不及曩日而國度引費四倍元嘉二衞臺坊人力五不餘一都水材官朽散十不兩存備豫都庫材竹俱盡東西二􅀈塼瓦雙匱敇令給賜悉仰交市尚書省舎日就傾頽第宅府署類多穿毁視不遑救知不暇及尋所入定調用恒不周既無儲畜理至空盡積弊累耗鍾於今日昔嵗奉敕課以揚徐衆逋凡入米榖六十萬斛錢五千餘萬布絹五萬匹雜物在外賴此相贍故得推移即今所懸轉多興用漸廣深懼供奉頓闕軍器輟功将士飢怨百官騫祿署府謝雕麗之器土木停緹紫之容國戚無以贍勲求無以給如愚管所慮不月則嵗矣經國逺謀臣所不敢言朝夕祗勤心存於匪懈起伏震遽事屬冐聞伏願陛下留須臾之鑒垂永代之計發不世之詔施必行之典則氓祗齊懽髙卑同泰帝優詔答之庚戌以驍騎将軍曹欣之為徐州刺史六月乙亥加鎮軍將軍齊王尚書左僕射秋七月戊子征北将軍南徐州刺史建平王景素據京城反己丑内外纂嚴遣驍騎將軍任農夫領軍将軍黄回北討鎮軍将軍齊王總統衆軍曲赦南徐州始安王伯融都鄉侯伯猷賜死辛卯豫州刺史段佛榮綂前鋒馬歩衆軍甲午軍主左軍将軍張保戰敗見殺黄回等至京城與景素諸軍戰連破之乙未尅京城斬景素同逆皆伏誅其日解嚴丙申大赦天下封賞各有差原京邑二縣元年以前逋調辛丑以武陵王贊為南徐州刺史八月丁卯立第十皇弟翽為南陽王第十一皇弟嵩為新興王第十二皇弟禧為始建王庚午以給事黄門侍郎阮佃夫為南豫州刺史乙酉以行青冀二州刺史劉善眀為青冀二州刺史九月丁亥割郢州之隨郡屬司州戊子驍騎将軍髙道慶有罪賜死己丑車騎将軍揚州刺史安成王進號驃騎大将軍開府儀同三司安西将軍郢州刺史晉熙王燮進號征西将軍冬十月辛酉以吏部尚書王僧䖍為尚書右僕射宕昌王梁彌機為安西将軍河凉二州刺史丙寅中書監護軍将軍褚淵母憂去職十一月庚戌詔攝本任五年春二月壬申以建寧太守柳和為寧州刺史四月甲戌豫州刺史阮佃夫歩兵校尉申伯宗朱幼謀廢立佃夫幼下獄死伯宗伏誅五月己亥以左軍将軍沈景德為交州刺史驃騎将軍全景文為南豫州刺史丙午以屯騎校尉孫曇瓘為越州刺史六月甲戌誅司徒左長史沈勃散騎常侍杜幼文遊擊将軍孫超之長水校尉杜叔文大赦天下七月戊子夜帝殞於仁壽殿時年十五己丑皇太后令曰衞将軍領軍中書監八座昱以冢嫡嗣登皇統庻其體識日𢎞社稷有寄豈意窮凶極悖自幼而長善無細而不違惡有大而必蹈前後訓誘常加隐蔽險戾難移日月滋甚棄冠毁冕長襲戎衣犬馬是狎鷹隼是愛皂櫪軒殿之中韝緤宸扆之側至乃單騎逺郊獨宿深野手揮矛鋋躬行刳斮白刃為弄噐斬害為恒務捨交㦸之衞委天畢之儀趨歩闤闠酣謌壚肆宵逰忘返宴寝營舍奪人子女掠人財物方筴所不書振古所未聞沈勃儒士孫超功臣幼文兄弟並豫勲効四人無罪一朝同戮飛鏃鼓劒孩稚無遺屠裂肝腸以為戲謔投骸江流以為懽笑又淫費無度帑藏空竭横賦闗河専充别蓄黔首嗷嗷厝生無所吾與其所生每厲以義方遂謀酖毒將騁凶忿沈憂假日慮不終朝自昔辛癸爰及幽厲方之於此未譬萬分民怨既深神怒已積七廟阽危四海裭氣廢昬立眀前代令範况廼滅義反道天人所棄舋深牧野理絶桐宫故宻令蕭領軍潛運眀略幽顯協規普天同泰驃騎大将軍安成王體自太宗天挺淹叡風神凝逺德映在田地隆親茂皇歴攸歸億兆係心含生屬望宜光奉祖宗臨享萬國便依舊典以時奉行未亡人追往傷懐永言感絶太后又令曰昱窮凶極暴自取灰滅雖曰罪招能無傷悼棄同品庻顧所不忍可特追封蒼梧郡王葬丹陽秣陵縣郊壇西初昱在東宫年五六嵗時始就書學而惰業好嬉戲主師不能禁好緣漆帳竿去地丈餘如此者半食久乃下年漸長喜怒乖節左右有失㫖者輒手加撲打徒跣蹲踞以此為常主師以白太宗上輒敕昱所生嚴加捶訓及嗣位内畏太后外憚諸大臣猶未得肆志自加元服變態轉興内外稍無以制三年秋冬間便好出逰行太妃每乗青篾車隨相檢攝昱漸自放恣太妃不復能禁單将左右棄部伍或十里二十里或入市里或往營署日暮乃歸四年春夏此行彌數自京城尅定意志轉驕於是無日不出與左右人解僧智張五兒恒相馳逐夜出開承明門夕去晨反晨出暮歸從者並執鋋矛行人男女及犬馬牛驢値無免者民間擾懼晝日不敢開門道上行人殆絶常著小袴褶未嘗服衣冠或有忤意輒加以虐刑有白棓數十枚各有名號鍼椎鑿鋸之徒不離左右嘗以鐵椎椎人陰破左右人見之有斂眉者昱大怒令此人袒胛正立以矛刺胛洞過於耀靈殿上養驢數十頭所自乗馬養於御牀側先是民間訛言謂太宗不男陳太妃本李道兒妾道路之言或云道兒子也昱每出入去來常自稱劉統或自號李将軍與右衞翼輦營女子私通每從之逰持數千錢供酒肉之費阮佃夫腹心人張羊為佃夫所委信佃夫敗叛走後捕得昱自於承明門以車轢殺之杜延載沈勃杜幼文孫超皆躬運矛鋋手自臠割執幼文兄叔文於𤣥武湖北昱馳馬執矟自往刺之制露車一乗其上施篷乗以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追尋唯整部伍别在一處瞻望而已凡諸鄙事過目則能鍜鍊金銀裁衣作㡌莫不精絶未嘗吹篪執管便韻天性好殺以此為懽一日無事輒慘慘不樂内外百司人不自保殿省憂遑夕不及旦齊王順天人之心潛圗廢立與直閣将軍王敬則謀之七月七日昱乗露車從二百許人無復鹵簿羽儀往青園尼寺晩至新安寺就曇度道人飲酒醉夕扶還於仁壽殿東阿氈幄中卧時昱出入無恒省内諸閤夜皆不閉且羣下畏相逢値無敢出者宿衞並逃避内外無相禁攝王敬則先結昱左右楊玉夫楊萬年呂欣之湯成之陳奉伯張石留羅僧智鍾千載嚴道福雷道賜戴昭祖許啓戚元寶盛道泰鍾千秋王天寶公上延孫俞成錢道寶馬敬之陳寶直吳璩之劉印魯唐天寶俞孫等二十五人謀共取昱其夕敬則出外玉夫見昱醉熟無所知乃與萬年同入氈幄内以昱防身刀斬之奉伯提昱首依常行法稱敕開承明門出以首與敬則馳至領軍府以首呈齊王王乃戎服率左右數十人稱行還開承明門入昱他夕每開門門者震懾不敢視至是弗之疑齊王既入曉乃奉太后令奉迎安成王史臣曰喪國亡家之主雖適末同途發軫或異也前廢帝卑逰䙝幸皆龍駕帝飾傳警清路蒼梧王則藏璽懐紱魚服忘反危冠短服匹馬孤征至於殞身覆祚其理若一姬夏之隆質文異尚忘國之道其亦然乎宋書卷九宋書卷九考證後廢帝紀張敬兒等破賊於宜陽門莊嚴寺宜一本作宣鄱陽王傳亦作宣豫州刺史段佛榮統前鋒馬歩衆軍段諸本俱訛殿或誤為殷今據建平王傳改正晉熙王燮進號征西将軍征西一本作鎮西與晉熙王傳合當從之宋書卷九考證
