front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0016_WYG_010-1a, image: WYG0257/WYG0257-0119a.png}
body:
  text: 宋書卷十梁沈約撰本紀第十順帝順皇帝諱凖字仲謀小字智觀明帝第三子也泰始五年七月癸丑生七年封安成王食邑三千户仍拜撫軍将軍置佐史廢帝即位為揚州刺史元徽二年進號車騎将軍都督揚南豫二州諸軍事給鼓吹一部刺史如故四年又進號驃騎大将軍開府儀同三司班劒三十人都督刺史如故元徽五年七月戊子夜廢帝殞奉迎王入居朝堂壬辰即皇帝位昇明元年改元大赦天下賜文武位二等甲午鎮軍将軍齊王出鎮東城輔政作相丙申詔曰露臺息構義光漢徳雉裘焚制事隆晉道故以檢奢軌化敦儉馭俗頃甸服未静師旅連年委蓄屢空勞敝莫偃而丹雘之飾糜耗難訾寶輅之費徵賦靡計今車服儀制實宜約損使徽章有序勿得侈溢可罷省御府二署凡工麗彫鐫傷風毁治一皆禁斷庻永昭憲則𢎞兹始政征西大将軍荆州刺史沈攸之進號車騎大将軍開府儀同三司尚書左僕射中領軍鎮軍将軍南兖州刺史齊王為司空錄尚書事驃騎大将軍刺史如故中書令衞将軍開府儀同三司撫軍将軍劉秉為尚書令加中軍将軍安西将軍郢州刺史晉熙王燮為撫軍将軍揚州刺史南陽王翽為郢州刺史辛丑尚書右僕射王僧䖍為尚書僕射右衞将軍劉韞為中領軍金紫光祿大夫王琨為右光祿大夫給司空齊王錢五百萬布五千匹癸卯車駕謁太廟丙午以安西參軍明慶符為青冀二州刺史武陵王贊為郢州刺史新除郢州刺史南陽王翽為湘州刺史司空南兖州刺史齊王改領南徐州刺史征虜将軍李安民為南兖州刺史雝州大水八月壬子遣使賑䘏蠲除税調以驃騎長史劉澄之為南豫州刺史山陽太守于天寶新吳縣子秦立有辠下獄死戊午改平凖署辛酉以宣城太守李靈謙為兖州刺史癸亥司空袁粲鎮石頭丁卯原除元年以前逋調復郡縣祿田戊辰崇拜帝所生陳昭華為皇太妃庚午司空長史謝朏衛軍長史江斆中書侍郎褚炫武陵王文學劉侯入直殿省參侍文義齊王固譲司空庚辰以為驃騎大将軍開府儀同三司九月己丑詔曰昔聖王既沒淳風已衰龜書永湮龍圗長秘故三代之末德刑相擾世淪物競道陂人諛然猶正士比轂竒才接軫朕襲運金樞纂靈瑶極負扆巡政日晏忘疲永言興替望古盈慮姬夏典載猶傳緗帙漢魏餘文布在方冊故元封興茂才之制地節剏獨行之品振維務本存乎得人今可宣下州郡搜揚幽仄摽采鄉邑隨名薦上朕将親覽甄其茂異庻野無遺彦永激遐芬己酉廬陵王暠薨冬十一月己酉倭國遣使獻方物丙午員外散騎侍郎胡羡生行越州刺史以交州刺史沈景德為廣州刺史十二月丁巳以驍騎将軍王廣之為徐州刺史車騎大将軍荆州刺史沈攸之舉兵反丁卯錄公齊王入守朝堂侍中蕭嶷鎮東府戊辰内外纂嚴己巳以郢州刺史武陵王贊為安西将軍荆州刺史征虜将軍雝州刺史張敬兒進號鎮軍将軍右衞将軍黄回為平西将軍郢州刺史督諸軍前鋒南討征虜将軍吕安國為湘州刺史都官尚書王寛加平西将軍庚午新除左衞将軍齊王世子奉新除撫軍将軍揚州刺史晉熙王燮鎮尋陽之盆城壬申以驍騎将軍周槃龍為廣州刺史是日司徒袁粲據石頭反尚書令劉秉黄門侍郎劉述冠軍王蕰率衆赴之黄回及輔國将軍孫曇瓘屯騎校尉王宜興輔國将軍任侯伯左軍将軍彭文之宻相響應中領軍劉韞直閤将軍卜伯興在殿内同謀錄公齊王誅韞等於省内軍主蘇烈王天生薛道淵戴僧静等陷石頭斬粲於城内秉述蕰踰城走追擒之並伏誅其餘無所問豫州刺史劉懐珍雝州刺史張敬兒廣州刺史陳顯達並舉義兵司州刺史姚道和梁州刺史范栢年湘州行事庾佩玉擁衆懐貳甲戌大赦天下乙亥以尚書僕射王僧䖍為尚書左僕射新除中書令王延之為尚書右僕射吳郡太守劉遐據郡反輔國将軍張瓌討斬之閏月辛巳屯騎校尉王宜興有辠伏誅癸巳沈攸之攻圍郢城前軍長史柳世隆固守攸之弟登之作亂於吳興吳興太守沈文秀討斬之己亥内外戒嚴假錄公齊王黄鉞辛丑寧朔将軍北秦州刺史武都王楊文慶進號征西将軍乙巳錄公齊王出頓新亭二年春正月沈攸之遣将公孫方平據西陽辛酉建寧太守張謨撃破之丁卯沈攸之自郢城奔散己巳華容縣民斬送之左将軍豫州刺史劉懐珍進號平南将軍辛未鎮軍将軍雝州刺史張敬兒克江陵斬攸之子光琰荆州平同逆皆伏誅丙子解嚴以新除侍中柳世隆為尚書右僕射是日錄公齊王旋鎮東府丁丑以江州刺史邵陵王友為安南将軍豫州刺史左衞将軍齊王世子為江州刺史侍中蕭嶷為領軍鎮軍将軍雝州刺史張敬兒進號征西将軍平西将軍郢州刺史黄回進號鎮西将軍二月庚辰以尚書左僕射王僧䖍為尚書令尚書右僕射王延之為尚書左僕射癸未錄公齊王加授太尉衞将軍褚淵為中書監司空甲申曲赦荆州丙戌撫軍将軍揚州刺史晉熙王燮進號中軍将軍開府儀同三司戊子蠲雝州緣沔居民前被水災者租布三年辛卯郢州刺史新除鎮南将軍黄回為鎮北将軍南兖州刺史南兖州刺史李安民為郢州刺史癸巳以山陰令傅琰為益州刺史丙申左軍将軍彭文之有辠下獄死行湘州事任侯伯殺前湘州行事庾佩玉傳首京邑三月庚戌以廣州刺史周槃龍為司州刺史輔國将軍劉悛為廣州刺史丙子給太尉齊王羽葆鼓吹夏四月己卯以逰撃将軍垣崇祖為兖州刺史辛卯新除鎮北将軍南兖州刺史黄回有辠賜死甲午輔國将軍淮南宣城二郡太守蕭映行南兖州刺史五月戊午倭國王武遣使獻方物以武為安東大将軍輔國将軍行湘州事任侯伯有辠伏誅六月己丑以前新㑹太守趙超民為交州刺史丁酉以輔國将軍楊文𢎞為北秦州刺史封武都王八月辛卯太尉齊王表斷竒飾麗服凡十有四條乙未以江州刺史齊王世子為領軍将軍撫軍将軍丙申以領軍蕭嶷為江州刺史九月乙巳朔日有蝕之丙午加太尉齊王黄鉞都督中外諸軍事太傅領揚州牧劔履上殿入朝不趨贊拜不名置左右長史司馬從事中郎掾屬各四人中軍将軍揚州刺史晉熙王燮為司徒戊申行南兖州刺史蕭映為南兖州刺史甲寅給太傅齊王三望車己未芮芮國遣使獻方物癸酉武陵内史張澹有辠下獄死冬十月丁丑寧朔将軍淮南宣城二郡太守蕭晃為豫州刺史孫曇瓘先逃亡己卯擒獲伏誅壬寅立皇后謝氏减死罪一等五歲刑以下悉原十二月壬子立故武昌太守劉琨息頒為南豐縣王癸亥臨灃侯劉晃謀反晃及黨與皆伏誅甲子改封南陽王翽為隨郡王改隨陽郡十二月丙戌皇后見于太廟戊子髙麗國遣使獻方物三年春正月甲辰以江州刺史蕭嶷為鎮西将軍荆州刺史尚書左僕射王延之為安南将軍江州刺史安西長史蕭順之為郢州刺史乙卯太傅齊王表諸負官物質役者悉原除辛亥以驍騎将軍王𤣥邈為梁南秦二州刺史領軍将軍撫軍将軍齊王世子加尚書僕射進號中軍大将軍開府儀同三司丙辰加太傅齊王前部羽葆鼓吹丁巳詔太傅府依舊辟召以征西将軍雝州刺史張敬兒為護軍将軍新除給事黄門侍郎蕭諱為雝州刺史二月丙子安南将軍南豫州刺史邵陵王友薨三月癸卯朔日有蝕之甲辰崇太傅為相國總百揆封十郡為齊公備九錫之禮加璽紱逺游冠位在諸王上加相國綠綟綬其驃騎大将軍揚州牧南徐州刺史如故丙午以中軍大将軍諱為南豫州刺史齊公世子副貳相國綠綟綬庚戌臨川王綽謀反綽及黨與皆伏誅丁巳以齊國初建給錢五百萬布五千匹絹千匹夏四月壬申進齊公爵為齊王增封十郡甲戌安西将軍武陵王贊薨丙戌命齊王冕十有二旒建天子旌旗出警入蹕乗金根車駕六馬備五時副車置旄頭雲罕樂儛八佾設鐘簴宫縣進世子為太子王子王女王孫爵命之號壹如舊儀辛卯天祿永終禪位于齊壬辰帝遜位于東邸既而遷居丹陽宫齊王踐阼封帝為汝陰王待以不臣之禮行宋正朔上書不為表答表不為詔建元元年五月己未徂于丹陽宫時年十三諡曰順帝六月乙酉葬于遂寧陵史臣曰聖王膺錄自非接亂承微則天歴不至也自三五以來受命之主莫不乗淪亡之極然後符樂推之運水徳遷謝其來久矣豈止於區區汝陰揖禪而已哉宋書卷十宋書卷十考證順帝紀武陵王文學劉侯入直殿省侯一本作候宋書卷十考證
