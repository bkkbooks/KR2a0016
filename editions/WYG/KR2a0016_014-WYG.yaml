body:
  text: 宋書卷十四梁沈約撰志第四禮一夫有國有家者禮儀之用尚矣然而厯代損益每有不同非務相改随時之宜故也漢文以人情季薄國喪革三年之紀光武以中興崇儉七廟有共堂之制魏祖以侈惑宜矯終歛去襲稱之數晉武以丘郊不異二至并南北之祀互相即襲以訖于今豈三代之典不存哉取其應時之變而已且閔子譏古禮退而致事叔孫創漢制化流後昆由此言之任已而不師古秦氏以之致亡師古而不適用王莽所以身滅然則漢魏以來各揆古今之中以通一代之儀司馬彪集後漢衆注以為禮儀志校其行事已與前漢頗不同矣况三國鼎峙厯晉至宋時代移改各隨事立自漢末剝亂舊章乖弛魏初則王粲衛覬典定衆儀蜀朝則孟光許慈創理制度晉始則荀顗鄭沖詳定晉禮江左則荀崧刁協緝理乖紊其間名儒通學諸所論叙往往新出非可悉載今抄魏氏以後經國誕章以備此志云魏文帝雖受禪于漢而以夏數為得天故黄初元年詔曰孔子稱行夏之時乘殷之輅服周之冕樂則韶舞此聖人集羣代之美事為後王制法也傳曰夏數為得天朕承唐虞之美至於正朔當依虞夏故事若殊徽號異器械制禮樂易服色用牲幣自當隨土徳之數毎四時之季月服黄十八日臘以丑牲用白其飾節旄自當赤但節幡黄耳其餘郊祀天地朝會四時之服宜如漢制宗廟所服一如周禮尚書令桓階等奏據三正周復之義國家承漢氏人正之後當受之以地正犠牲宜用白今從漢十三月正則犠牲不得獨改今新建皇統宜稽古典先代以從天命而告朔犧牲壹皆不改非所以明革命之義也詔曰服色如所奏其餘宜如虞承唐但臘日用丑耳此亦聖人之制也明帝卽位便有改正朔之意朝議多異同故持疑不決乆乃下詔曰黄初以來諸儒共論正朔或以改之為宜或以不改為是意取駮異于今未決朕在東宫時聞之意常以為夫子作春秋通三統為後王法正朔各從色不同因襲自五帝三王以下或父子相繼同體異徳或納大麓受終文祖或尋干戈從天行誅雖遭遇異時歩驟不同然未有不改正朔用服色表明文物以章受命之符也由此言之何必以不改為是邪於是公卿以下博議侍中高堂隆議曰按自古有文章以來帝王之興受禪之與干戈皆改正朔所以明天道定民心也易曰革元亨利貞有孚改命吉湯武革命應乎天從乎人其義曰水火更用事猶王者必改正朔易服色也易通卦驗曰王者必改正朔易服色以應天地三氣三色書曰若稽古帝舜曰重華建皇授政改朔初高陽氏以十一月為正􅏪玉以赤繒高辛氏以十三月為正􅏪玉以白繒尚書傳曰舜定鐘石論人聲乃及鳥獸咸變於前故更四時改堯正詩曰一之日觱發二之日栗烈三之日于耜傳曰一之日周正月二之日殷正月三之日夏正月詩推度灾曰如有繼周而王者雖百世可知以前檢後文質相因法度相改三而復者正色也二而復者文質也以前檢後謂軒轅高辛夏后氏漢皆以十三月為正少昊有唐有殷皆以十二月為正高陽有虞有周皆以十一月為正後雖百世皆以前代三而復也禮大傳曰聖人南靣而治天下必正度量考文章改正朔易服色殊徽號樂稽曜嘉曰禹將受位天意大變迅風雷雨以明將去虞而適夏也是以舜禹雖繼平受禪猶制禮樂改正朔以應天從民夏以十三月為正法物之始其色尚黒殷以十二月為正法物之牙其色尚白周以十一月為正法物之萌其色尚赤能察其類能正其本則嶽瀆致雲雨四時和五稼成麟凰翔集春秋十七年夏六月甲子朔日有蝕之傳曰當夏四月是謂孟夏春秋元命苞曰王者受命昭然明於天地之理故必移居處更稱號改正朔易服色以明天命聖人之寶質文再而改窮明相承周則復始正朔改則天命顯凡典籍所記不盡於此略舉大較亦足以明也太尉司馬懿尚書僕射衛臻尚書薛悌中書監劉放中書侍郎刁幹慱士秦静趙怡中候中詔季岐以為宜改侍中繆襲㪚騎常侍王肅尚書郎魏衡太子舍人黄缺以為不宜改青龍五年山茌縣言黄龍見帝乃詔三公曰昔在庖犧繼天而王始據木徳為羣代首自兹以降服物氏號開元著統者旣膺受命厯數之期握皇靈遷興之運承天改物序其綱紀雖炎黄少昊顓頊高辛唐虞夏后世系相襲同氣共祖猶豫昭顯所受之運著明天人去就之符無不革易制度更定禮樂延羣后班瑞信使之煥炳可述于後也至于正朔之事當明示變改以彰異代曷疑其不然哉文皇帝踐阼之初庻事草創遂襲漢正不革其統朕在東宫及臻在位毎覽書籍之林摠公卿之議夫言三統相變者有明文云虞夏相因者無其言也厯志曰天統之正在子物萌而赤地統之正在丑物化而白人統之正在寅物成而黑但含生氣以㣲成著故太極運三辰五星於上元氣轉三統五行於下登降周旋終則又始言天地與人所以相通也仲尼以大聖之才祖述堯舜範章文武制作春秋論究人事以貫百王之則故於三微之月毎月稱王以明三正迭相為首夫祖述堯舜以論三正則其明義豈使近在殷周而已乎朕以眇身繼承洪緒旣不能紹上聖之遺風揚先帝之休徳又使王教之弛者不張帝典之闕者未補亹亹之徳不著亦惡可已乎今推三統之次魏得地統當以建丑之月為正考之羣藝厥義彰矣改青龍五年春三月為景初元年孟夏四月服色尚黄犠牲用白戎事乘黑首之白馬建太赤之旗朝會建大白之旗春秋冬孟仲季月雖與歲不同至於郊祀迎氣礿祀烝嘗廵狩蒐田分至啓閉班宣時令中氣晩早敬授民事諸若此者皆以正歲斗建為節此厯數之序乃上與先聖合符同契重規疊矩者也今遵其義庶可以顯祖考大造之基崇有魏惟新之命於戲王公羣后百辟卿士靖康厥職帥意無怠以永天休司徒露布咸使聞知稱朕意焉案服色尚黄據土行也犧牲旂旗一用殷禮行殷之時故也周禮巾車職建大赤以朝大白以即戎此則周以正色之旗朝以先代之旗即戎魏用殷禮變周之制故建大白朝大赤即戎也明帝又詔曰以建寅之月為正者其牲用𤣥以建丑之月為正者其牲用白以建子之月為正者其牲用騂此為牲色各從其正不隨所祀之陰陽也祭天不嫌於用𤣥則祭地不得獨疑於用白也天地用牲得無不宜異邪更議於是議者各有引據無適可從又詔曰諸議所依據各參錯若陽祀用騂陰祀用黝復云祭天用𤣥祭地用黄如此用牲之義未為通也天地至尊用牲當同以所尚之色不得專以陰陽為别也今祭皇皇帝天皇皇后地天地郊明堂宗廟皆宜同其别祭五郊各隨方色祭日月星辰之類用騂社稷山川之屬用𤣥此則尊卑方色陰陽衆義暢矣三年正月帝崩齊王即位是年十二月尚書盧毓奏烈祖明皇帝以今年正日棄離萬國禮忌日不樂甲乙之謂也烈祖明皇帝建丑之月棄天下臣妾之情於此正日有甚甲乙今若以建丑正朝四方會羣臣設盛樂不合於禮博士樂祥議正日旦受朝貢羣臣奉贄後五日乃大宴會作樂太尉屬朱誕議今因宜改之際還修舊則元首建寅於制為便大將軍屬劉肇議宜過正一日乃朝賀大會明令天下知崩亡之日不朝也詔曰省奏事五内斷絶奈何奈何烈祖明帝以正日棄天下毎與皇太后念此日至心有剝裂不可以此日朝羣辟受慶賀也月二日會又非故也聼當還夏正月雖違先帝通三統之義斯亦子孫哀慘永懷又夏正朔得天數者其以建寅之月為歲首晉武帝太始二年九月羣公奏唐堯舜禹不以易胙改制至於湯武各推行數宣尼荅為邦之問則曰行夏之時輅冕之制通為百代之言蓋期於從政濟治不繫於行運也今大晉繼三皇之蹤踵舜禹之迹應天從民受禪有魏宜一用前代正朔服色皆如有虞遵唐故事於義為𢎞奏可孫盛曰仍舊非也且晉為金行服色尚赤考之天道其違甚矣及宋受禪亦如魏晉故事魏明帝初司空王朗議古者有年數無年號漢初猶然或有世而改有中元後元元改彌數中後之號不足故更假取美名非古也述春秋之事曰隱公元年則簡而易知載漢世之事曰建元元年則後不見宜若古稱元而已明帝不從乃詔曰先帝即位之元則有延康之號受禪之初亦有黄初之稱今名年可也於是尚書奏易曰乾道變化各正性命保合太和乃利貞首出庶物萬國咸寜宜為大和元年詔缺七字周之五禮其五為嘉嘉缺二字春秋左氏傳曰晉侯問襄公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今君在行未可具也請及兄弟之國而假備焉晉侯許諾還及衞冠于成公之廟假鐘磬焉禮也賈服説皆以為人君禮十二而冠也古尚書說武王崩成王年十三推武王以庚辰歲崩周公以壬午歲出居東以癸未歲反禮周公冠成王命史祝辭辭告也是除喪冠也周公居東未反成王冠弁以開金縢之書時十六矣是成王年十五服除周公冠之而後出也按禮傳之文則天子諸侯近十二遠十五必冠矣周禮雖有服冕之數而無天子冠文儀禮云公侯之有冠禮夏末造之王鄭皆以為夏末上下相亂簒弑由生故作公侯冠禮則明無天子冠禮之審也大夫又無冠禮古者五十而後爵何大夫冠禮之有周人年五十而有賢才則試以大夫之事猶行士禮也故筮日筮賔冠於阼以著代醮於客位三加彌尊皆士禮耳然漢氏以來天子諸侯頗采其議志曰儀從冠禮是也漢順帝冠又兼用曹襃新禮襃新禮今不存禮儀志又云乘輿初加緇布進賢次爵弁武弁次通天皆於高廟王公以下初加進賢而已按此文始冠緇布從古制也冠於宗廟是也魏天子冠一加其説曰士禮三加加有成也至於天子諸侯無加數之文者將以踐阼臨民尊極徳備豈得復與士同此言非也夫以聖人之才猶三十而立況十二之年未及志學便謂徳成無所勸勉非理實也魏氏太子再加皇子王公世子乃三加孫毓以為一加再加皆非也禮詞曰令月吉日又以歲之正以月之令魯襄公冠以冬漢惠帝冠以三月明無定月也後漢以來帝加元服咸以正月晉咸寧二年秋閏九月遣使冠汝南王柬此則晉禮亦有非必歲首也禮冠於廟魏以來不復在廟然晉武惠冠太子皆即廟見斯亦擬在廟之儀也晉穆帝孝武將冠先以幣告廟訖又廟見也晉惠帝之為太子將冠也武帝臨軒使兼司徒高陽王珪加冠兼光禄勳屯騎校尉華廙贊冠江左諸帝將冠金石宿設百僚陪位又豫於殿上鋪大牀御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕將加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉夀惟祺介兹景福加冕訖侍中繫𤣥紞侍中脫絳紗服加衮服冠事畢太保率羣臣奉觴上夀王公以下三稱萬歲乃退按儀注一加幘冕而已宋冠皇太子及蕃王亦一加也官有其注晉武帝太始十年南宫王承年十五依舊應冠有司議奏禮十五成童國君十五而生子以明可冠之宜又漢魏遣使冠諸王非古典於是制諸王十五冠不復加命元嘉十一年營道侯將冠詔曰營道侯義綦可克日冠外詳舊施行何禎冠儀約制及王堪私撰冠儀亦皆家人之可遵用者也魏齊王正始四年立皇后甄氏其儀不存晉武帝咸寧二年臨軒遣太尉賈充策立后楊氏納悼后也因大赦賜王公以下各有差百僚上禮太康八年有司奏昏禮納徵大昏用𤣥纁束帛加珪馬二駟王侯𤣥纁束帛加璧乘馬大夫用𤣥纁束帛加羊古者以皮馬為庭實天子加榖珪諸侯加大璋可依周禮改璧用璋其羊鴈酒米𤣥纁如故諸侯昏禮加納采吉期迎各帛五匹及納徵馬四匹皆令夫家自備唯璋官為具之尚書朱整議按魏氏故事王娶妃公主嫁之禮天子諸侯以皮馬為庭實天子加以榖珪諸侯加以大璋漢高后制聘后黄金二百斤馬十二匹夫人金五十斤馬四匹魏聘后王娶妃公主嫁之禮用絹百九十匹晉興故事用絹三百匹詔曰公主嫁由夫氏不宜皆為備物賜錢使足而已唯給璋餘如故事成帝咸康二年臨軒遣使兼太保領軍將軍諸葛恢兼太尉䕶軍將軍孔愉六禮備物拜皇后杜氏即日入宫帝御太極殿羣臣畢賀非禮也王者昏禮禮無其制春秋祭公逆王后于紀榖梁左氏説與公羊又不同而漢魏遺事闕略者衆晉武惠納后江左又無復儀注故成帝將納杜后太常華恒始與博士參定其儀據杜預左氏傳説主婚是供其婚禮之幣而已又周靈王求婚於齊齊侯問於晏桓子桓子對曰夫婦所生若而人姑姊妹則稱先守某公之遺女若而人此則天子之命自得下逹臣下之荅徑自上通先儒以為丘明詳録其事蓋為王者婚娶之禮也故成帝臨軒遣使稱制拜后然其儀注又不具存康帝建元元年納后褚氏而儀注陛者不設旄頭殿中御史奏今迎皇后依昔成恭皇后入宫御物而儀注至尊衮冕升殿旄頭不設求量處又案昔迎恭皇后唯作青龍旂其餘皆即御物今當臨軒遣使而立五牛旂旗旄頭畢罕並出即用故至今闕詔曰所以正法服升太極者以敬其始故備其禮也今云何更闕所重而撤法物邪又恭后神主入廟先帝詔后禮宜有降不宜建五牛旗而今猶復設之邪既不設五旗則旄頭畢罕之器易具也又詔曰舊制旣難準且於今而備亦非宜府庫之儲唯當以供軍國之費耳法服儀飾粗令舉其餘兼副雜器停之及至穆帝升平元年將納皇后何氏太常王彪之始更大引經傳及諸故事以正其禮深非公羊婚禮不稱主人之義又曰王者之於四海無非臣妾雖復父兄之親師友之賢皆純臣也夫崇三綱之始以定乾坤之儀安有天父之尊而稱臣下之命以納伉儷安有臣下之卑而稱天父之名以行大禮逺尋古禮無王者此制近求史籍無王者此比於情不安於義不通案咸寧二年納悼皇后時𢎞訓太后母臨天下而無命戚屬之臣為武皇父兄主婚之文又考大晉已行之事咸寧故事不稱父兄師友則咸康華恒所上合於舊也臣愚謂今納后儀制宜一依咸康故事於是從之華恒所定六禮云宜依漢舊及大晉已行之制此恒猶識前事故王彪之多從咸康由此也惟以取婦之家三日不舉樂而咸康羣臣賀為失禮故但依咸寧上禮不復賀也其告廟六禮版文等儀皆彪之所定也詳推有典制其納采版文璽書曰皇帝咨前太尉參軍何琦渾元資始肈經人倫爰及夫婦以奉天地宗廟社稷謀于公卿咸以宜率由舊典今使使持節太常彪之宗正綜以禮納采主人曰皇帝嘉命訪婚陋族備數采擇臣從祖弟故㪚騎侍郎準之遺女未閑教訓衣履若而人欽承舊章肅奉典制前太尉參軍都鄉侯糞土臣何琦稽首再拜承制詔次問名版文曰皇帝曰咨某官某姓兩儀配合承天統物正位于内必俟令族重申舊典今使使持節太常某宗正某以禮問名主人曰皇帝嘉命使者某到重宣中詔問臣名族臣族女父母所生先臣故光祿大夫雩婁侯禎之遺𤣥孫先臣故豫州刺史關中侯惲之會孫先臣安豐太守關中侯叡之孫先臣故㪚騎侍郎準之遺女外出自先臣故尚書左丞胄之外曽孫先臣故侍中關内侯夷之外孫女年十七欽承舊章肅奉典制次納吉版文曰皇帝曰咨某官某姓人謀龜從僉曰貞吉敬從典禮今使持節太常某宗正某以禮納吉主人曰皇帝嘉命使者某重宣中詔太卜元吉臣陋族卑鄙憂懼不堪欽承舊章肅奉典制次納徵版文皇帝曰咨某官某姓之女有母儀之徳窈窕之姿如山如河宜奉宗廟永承天祚以𤣥纁皮帛馬羊錢璧以章典禮今使使持節司徒某太常某以禮納徵主人曰皇帝嘉命降婚卑陋崇以上公寵以典禮備物典策欽承舊章肅奉典制次請期版文皇帝曰咨某官某姓謀于公卿大筮元龜罔有不臧率遵典禮今使使持節太常某宗正某以禮請期主人曰皇帝嘉命使某重宣中詔吉日惟某可迎臣欽承舊章肅奉典制次迎版文皇帝曰咨某官某姓歲吉月令吉日惟某率禮以迎今使使持節太保某太尉某以迎主人曰皇帝嘉命使者某重宣中詔令月吉辰備禮以迎上公宗卿兼至副介近臣百兩臣蝝蟻之族猥承大禮憂懼戰悸欽承舊章肅奉典制其稽首承詔皆如初荅孝武納王皇后其禮亦如之其納采問名納吉請期迎皆用白鴈白羊各一頭酒米各十二斛唯納徵羊一頭𤣥纁用帛三匹絳二匹絹二百匹虎皮二枚錢二百萬玉璧一枚馬六頭酒米各十二斛鄭𤣥所謂五鴈六禮也其珪馬之制備物之數校太康所奏又有不同官有其注古者昏冠皆有醮鄭氏醮文三首具存宋文帝元嘉十五年四月皇太子納妃六禮文與納后不異百官上禮其月壬戌於太極殿西堂叙宴二宫隊主副司徒征北鎭南三府佐揚兖江三州綱彭城江夏南譙始興武陵廬陵南豐七國侍郎以上諸二千石在都邑者竝豫會又詔今小會可停妓樂時有臨川曹太妃服明帝㤗始五年十一月有司奏按晉江左以來太子昏納徴禮用玉一虎皮二未詳何所準況或者虎取其威猛有彬炳玉以象徳而有潤栗珪璋既玉之美者豹皮義兼炳蔚熊羆亦昏禮吉徴以類取象亦宜竝用未詳何以遺文晉氏江左禮物多闕後代因襲未遑研考今法章徽儀方將大備宜憲範經籍稽諸舊典今皇太子昏納徵禮合用珪璋豹皮熊羆皮與不下禮官詳依經記更正若應用者為各用一為應用兩博士裴昭明議案周禮納徵𤣥纁束帛儷皮鄭𤣥注云以雜皮儀注以虎皮二太元中公主納徵以虎豹皮各一具豈謂婚禮不辨王公之序故取虎豹皮以尊革其事乎虎豹雖文而徵禮所不用熊羆吉祥而婚典所不及珪璋雖美或為用各異今帝道𢎞明徽則光闡儲皇聘納宜準經誥凡諸僻謬並合詳裁雖禮代不同文質或異而鄭為儒宗既有明説守文淺見蓋有惟疑兼太常丞孫詵議以為聘幣之典損益惟義厯代行事取制士婚若珪璋之用實均璧品采豹之彰義齊虎文熊羆表祥繁衍攸寄今儲后崇聘禮先訓逺皮玉之美宜盡暉備禮稱束帛儷皮則珪璋數合同璧熊羆文豹各應用二長兼國子博士虞龢議案儀禮納徵直云𤣥纁束帛雜皮而已禮記郊特牲云虎豹皮與玉璧非虛作也則虎豹之皮居然用兩珪璧宜仍舊各一也參詵龢二議不異今加珪璋各一豹熊羆皮各二以龢議為允詔可晉武帝太始十年將聘拜三夫人九嬪有司奏禮皇后聘以榖珪無妾媵禮贄之制詔曰拜授可依魏氏故事於是臨軒使使持節兼太常拜夫人兼御史中丞拜九嬪漢魏之禮公主居第尚公主者來第成婚司空王朗以為不可其後乃革凡遣大使拜皇后三公及冠皇太子及拜蕃王帝皆臨軒其儀太樂令宿設金石四廂之樂於殿前漏上二刻侍中侍臣冗從僕射中謁者節騎郎虎賁旄頭遮列五牛旗皆入虎賁中郎將羽林監分陛端門内侍御史謁者各一人監端門廷尉監平分陛東西中華門漏上三刻殿中侍御史奏開殿之殿門南止車門宣陽城門軍校侍中㪚騎常侍給事黄門侍郎㪚騎侍郎升殿夾御座尚書令以下應階者以次入治禮引大鴻臚入陳九賔漏上四刻侍中奏外辦皇帝服衮冕之服升太極殿臨軒南面謁者前北靣一拜跪奏大鴻臚臣某稽首言羣臣就位謹具侍中稱制曰可謁者贊拜在位皆再拜大鴻臚稱臣一拜仰奏請行事侍中稱制曰可鴻臚舉手曰可行事謁者引護當使者當拜者入就拜位四廂樂作將拜樂止禮畢出官有其注舊時歲旦常設葦茭桃梗磔雞於宫及百寺門以禳惡氣漢儀則仲夏之月設之有桃卯無磔雞案明帝大修禳禮故何晏禳祭據雞牲供穰釁之事磔雞宜起於魏也桃卯本漢所以輔卯金又宜魏所除也但未詳改仲夏在歲旦之所起耳宋皆省而諸郡縣此禮往往猶存上代聘享之禮雖頗見經傳然首尾不全叔孫通傳載通所制漢元會儀綱紀粗舉施於今又未周備也魏國初建事多兼闕故黄初三年始奉璧朝賀何承天云魏元會儀無存者案何禎許都賦曰元正大饗壇彼西南旗幕峨峨檐宇𢎞深王沈正會賦又曰華幄映於飛雲朱幕張於前庭絙青帷於兩階象紫極之峥嶸延百辟于和門等尊卑而奉璋此則大饗悉在城外不在宫内也臣按魏司空王朗奏事曰故事正月朔賀殿下設兩百華鐙對於二階之間端門設庭燎火炬端門外設五尺三尺鐙月照星明雖夜猶晝矣如此則不在城外也何王二賦本不在洛京何云許都賦時在許昌也王賦又云朝四國於東廵亦賦許昌正㑹也晉武帝世更定元㑹注今有咸寧注是也傳𤣥元會賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉㑹此則兼採衆代可知矣咸寧注先正一日守宫宿設王公卿校便坐於端門外大樂鼓吹又宿設四廂樂及牛馬帷閣於殿前夜漏未盡十刻羣臣集到庭燎起火上賀謁報又賀皇后還從雲龍東中華門入謁詣東閤下便坐漏未盡七刻羣司乘車與百官及受贄郎下至計吏皆入詣陛部立其陛衛者如臨軒儀漏未盡五刻謁者僕射大鴻臚各奏羣臣就位定漏盡侍中奏外辦皇帝出鐘鼔作百官皆拜伏太常導皇帝升御座鐘鼓止百官起大鴻臚跪奏請朝賀治禮郎讚皇帝延王登大鴻臚跪讚蕃王臣某等奉白璧各一再拜賀太常報王悉登謁者引上殿當御座皇帝興王再拜皇帝坐復再拜跪置璧御座前復再拜成禮訖謁者引下殿還故位治禮郎引公特進匈奴南單于子金紫將軍當大鴻臚西中二千石二千石千石六百石當大行令西皆北靣伏大鴻臚跪讚太尉中二千石等奉璧皮帛羔鴈雉再拜賀太常讚皇帝延君登禮引公至金紫將軍上殿當御座皇帝興皆再拜皇帝坐又再拜跪置璧皮帛御座前復再拜成禮訖讚者引下殿還故位王公置璧成禮時大行令並讚殿下中二千石以下同成禮訖以贄授贄郎郎以璧帛付謁者羔鴈雉付太官太樂令跪奏雅樂以次作樂乘黄令乃出車皇帝罷入百官皆坐晝漏上水六刻諸蠻夷胡客以次入皆再拜訖坐御入三刻又出鐘鼓作謁者僕射跪奏請羣臣上御謁者引王公至二千石上殿千石六百石停本位謁者引王詣尊酌夀尊跪授侍中侍中跪置御座前王還自酌置位前謁者跪奏蕃王臣某等奉觴再拜上千萬歳夀侍中曰觴已上百官伏稱萬歳四廂樂作百官再拜已飲又再拜謁者引諸王等還本位陛者傳就席羣臣皆跪諾侍中中書令尚書令各於殿上上夀酒登歌樂升太官令又行御酒御酒升階太官令跪授侍郎侍郎跪進御座前乃行百官酒太樂令跪奏奏登歌三終乃降太官令跪請御飯到陛羣臣皆起太官令持羮跪授司徒持飯跪授大司農尚食持案並授侍郎侍郎跪侍御座前羣臣就席太樂令跪奏食舉樂太官行百官飯案遍食畢太樂令跪奏請進儛儛以次作鼔吹令又前跪奏請以次進衆伎乃召諸郡計吏前授敇戒於階下宴樂畢謁者一人跪奏請罷退鐘鼓作羣臣北靣再拜出江左更隨事立位大體亦無異也宋有天下多承舊儀所損益可知矣晉江左注皇太子出會者則在三恪下王公上宋文帝元嘉十一年升在三恪上魏制蕃王不得朝覲明帝時有朝者皆由特恩不得以為常晉太始中有司奏諸侯之國其王公以下入朝者四方各為二番三歳而周周則更始若臨時有解却在明年來朝之後更滿三歲乃復不得從本數朝禮執璧如舊朝之制不朝之歲各遣卿奉聘奏可江左王侯不之國其有授任居外則同方伯刺史二千石之禮亦無朝聘之制此禮遂廢正旦元會設白虎樽於殿庭樽蓋上施白虎若有能獻直言者則發此樽飲酒案禮記知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開予是以不與爾言爾飲曠何也曰子夘不樂知悼子在堂斯其為子夘也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫唯刀匕是供又敢與知防是以飲也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必無廢斯爵至于今既畢獻斯揚觶謂之杜舉白虎樽蓋杜舉之遺式也畫為虎宜是後代所加欲令言者猛如虎無所忌憚也漢以高帝十月定秦旦為歳首至武帝雖改用夏正然朔猶常饗會如元正之儀魏晉則冬至日受萬國及百寮稱賀因小會其儀亞於歳旦晉有其注宋永初元年八月詔曰慶冬使或遣不役宜省今可悉停唯元正大慶不得廢耳郡縣遣冬使詣州及都督府者亦宜同停孫權始都武昌及建業不立郊兆至末年太元元年十一月祭南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊於己地非禮所謂陽位之義也宋武大明三年九月尚書右丞徐爰議郊祀之位逺古蔑聞禮記燔柴於大壇祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南己地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路修遠謂宜移郊正午以定天位博士司馬興之傅郁太常丞陸澄並同爰議乃移郊兆於秣陵牛頭山西正在宫之午地世祖崩前廢帝即位以郊舊地為吉祥移還本處北郊晉成帝世始立本在覆舟山南宋太祖以其地為樂游苑移於山西北後以其地為北湖移於湖塘西北其地卑下泥濕又移於白石邨東其地又以為湖乃移於鍾山北京道西與南郊相對後罷白石東湖北郊還舊處南郊皇帝㪚齋七日致齋三日官掌清者亦如之致齋之朝御太極殿幄坐著絳紗襮黑介幘通天金博山冠先郊日未晡五刻夕牲公卿京兆尹衆官悉壇東就位太祝史牽牲入到榜稟犧令跪白請省牲舉手曰腯太祝令繞牲舉手曰充太祝令牽牲詣庖以二陶豆酌毛血其一奠皇天神座前其一奠太祖神座前郊之日未明八刻太祝令進饌郎施饌牲用繭栗二頭羣神用牛一頭醴用秬鬯藉用白茅𤣥酒一器器用匏陶以瓦樽盛酒瓦圩斟酒璧用蒼玉蒯席各二不設茵蓐古者席藁晉江左用蒯車駕出百官應齋及從駕填街先置者各隨申攝從事上水一刻御服龍衮平天冠升金根車到壇東門外博士太常引入到黑攢太祝令跪執匏陶酒以灌地皇帝再拜興羣臣皆再拜伏治禮曰興博士太常引皇帝至南階脫舃升壇詣罍盥黄門侍郎洗爵跪授黄帝執樽郎授爵酌秬鬯授皇帝跪奠皇天神座前再拜興次詣太祖配天神座前執爵跪奠如皇天之禮南靣北向一拜伏太祝令各酌福酒合置一爵中跪進皇帝再拜伏飲福酒訖博士太常引帝從東階下還南階謁者引太常升壇亞獻謁者又引光禄升壇終獻訖各降階還本位太祝送神跪執匏陶酒以灌地興直南行出壇門治禮舉手白羣臣皆再拜伏皇帝盤治禮曰興博士跪曰祠事畢就燎博士太常引皇帝就燎位當壇東階皇帝南向立太祝令以案奉玉璧牲體爵酒黍飯諸饌物登柴壇施設之治禮舉手曰可燎三人持火炬上火發太祝令等各下壇壇東西各二十人以炬投壇火半柴傾博士仰白事畢皇帝出便坐解嚴天子有故則三公行事而太尉初獻其亞獻猶終獻太常光禄勲也北郊齋夕牲進孰及乘輿百官到壇三獻悉如南郊之禮唯事訖太祝令牲玉饌物詣塪置牲上訖又以一牲覆其上治禮舉手曰可霾二十人俱時下土填塪欲半博士仰白事畢帝出自魏以來多使三公行事乘輿罕至矣魏及晉初儀注雖不具存所損益漢制可知也江左以後官有其注魏文帝詔曰漢氏不拜日於東郊而旦夕常於殿下東靣拜日煩䙝似家人之事非事天郊神之道也黄初二年正月乙亥朝日于東門之外按禮天子以春分朝日於東秋分夕月於西今正月非其時也漢郊祀志帝郊泰畤平旦出行宫東向揖日其夕西向揖月此為即用郊日不俟二分也明帝太和元年二月丁亥朔朝日于東郊八月己丑夕月于西郊此古禮也白虎通王者父天母地兄日姊月此其義也尚書大傳迎日之詞曰維某年某月上日明光于上下勤施于四方旁作穆穆維予一人某敬拜迎日于郊吳時郎陳融奏東郊頌吳時亦行此禮也晉武帝太康二年有司奏春分依舊車駕朝日寒温未適可不親出詔曰禮儀宜有常如所奏與故太尉所撰不同復為無定制間者方難未平故毎從所奏今戎事弭息唯此為大案此詔帝復為親朝日也此後廢殷祠皇帝㪚齋七日致齋三日百官清者亦如致齋之日御太極殿幄坐著絳紗襮黑介幘通天金博山冠祠之日車駕出百官應齋從駕留守填街先置者各依宣攝從事上水一刻皇帝著平冕龍兖之服升金根車到廟北門訖治禮謁者各引太樂太常光禄勲三公等皆入在位皇帝降車入廟脫舄盥及洗爵訖升殿初獻奠爵樂奏太祝令跪讀祝文訖進奠神座前皇帝還本位博士引太尉亞獻訖謁者又引光禄勲終獻凡禘祫大祭則神主悉出廟堂為昭穆以安坐不復停室也晉氏又有陰室四殤治禮引陰室以次奠爵於饌前其功臣配饗者設坐於庭謁者奠爵于饌前皇帝不親祠則三公行事而太尉初獻太常亞獻光禄勲終獻也四時祭祀亦皆於將祭必先夕牲其儀如郊晉武帝太始七年四月帝將親祠車駕夕牲而儀注還不拜詔問其故博士奏厯代相承如此帝曰非致敬宗廟之禮也於是實拜而還遂以為制太康中有司奏議十一月一日合朔奠冬烝夕牲同日可有司行事詔曰夕牲而令有司行事非也改擇上旬他日案此則武帝夕牲必躬臨拜而江左以來復止也晉元帝建武元年十月辛夘即晉王位行天子殷祭之禮非常之事也孝武太元十一年九月皇女亡及應烝祠中書侍郎范甯奏案喪服傳有死宫中者三月不舉祭不别長㓜之與貴賤也皇女雖在嬰孩臣竊以為疑於是尚書奏使三公行事昔漢靈帝世立春尚齋迎氣東郊尚書左丞歐殺陌使於南書寺於是詔書曰議郎蔡邕博士任敏問可齋祠不得無不宜邕等對曰按上帝之祠無所為廢宫室至大陌使至微日又寛可齋無疑甯非不知有此議然不從也魏及晉初祭儀雖不具存江左則備矣官有其注祠大社帝太稷常以歳二月八月二社日祠之太祝令夕牲進孰如郊廟儀司空太常大司農三獻也官有其注周禮王親祭漢以來有司行事漢安帝元初六年立宗祠於國西北城亥地祠儀比㤗社日月將交會太史上合朔尚書先事三日宣攝内外戒嚴摯虞决疑曰凡救蝕者皆著赤幘以助陽也日將蝕天子素服避正殿内外嚴警太史登靈臺伺候日變更伐鼔於門聞鼓音侍臣皆著赤幘帯劒入侍三臺令史以上皆各持劒立其户前衛尉卿馳繞宫伺察守備周而復始日復常乃皆罷魯昭公十七年六月朔日有蝕之祝史請所由叔孫昭子曰日有蝕天子不舉樂伐皷於社諸侯用幣於社伐皷於朝禮也又以赤絲為繩繫社祝史陳辭以責之社勾龍之神天子之上公故責之合朔官有其注昔漢建安中將王會而太史上言正旦當日蝕朝士疑會不共詣尚書令荀文若諮之時廣平計吏劉邵在坐曰梓慎禆竈古之良史猶占水火錯失天時禮諸侯旅見天子入門不得終禮者四日蝕在一然則聖人垂制不為變異豫廢朝禮者或災消異伏或推術謬誤也文若及衆人咸喜而從之遂朝會如舊日亦不蝕劭由此顯名魏史美而書之魏高貴鄉公正元二年三月朔太史奏日蝕而不蝕晉文王時為大將軍大推史官不驗之負史官荅曰合朔之時或有日掩月或有月掩日月掩日則蔽障日體使光景有虧故謂之日蝕日掩月則日於月上過謂之陰不侵陽雖交無變日月相掩必食之理無術以知是以嘗禘郊社日蝕則接祭是亦前代史官不能審蝕也自漢故事以為日蝕必當於交毎至其時申警百官以備日變故甲寅詔有備蝕之制無考負之法古來黄帝顓頊夏殷周魯六厯皆無推日蝕法但有考課疏密而已負坐之條由本無術可課非司事之罪乃止晉武帝咸寧三年四年並以正旦合朔却元會改魏故事也晉元帝太興元年四月合朔中書侍郎孔愉奏曰春秋日有蝕之天子伐皷于社攻諸陰也諸侯伐皷於朝臣自攻也案尚書符若日有變便伐皷於諸門有違舊典詔曰所陳有正義輒敕外改之至康帝建元元年太史上元日合朔朝士復疑應却會與否庾冰輔政寫劉劭議以示八坐于時有謂劭為不得禮意荀文若從之是勝人之一失故蔡謨遂著議非之曰劭論災消異伏又以慎竈猶有錯失太史上言亦不必審其理誠然也而云聖人垂制不為變異豫廢朝禮此則謬矣災祥之發所以譴告人君王者所重誡故素服廢樂退避正寢百官降物用幣伐鼔躬親而救之夫敬誡之事與其疑而廢之寧慎而行之故孔子老聃助葬於巷黨以喪不見星行故日蝕而止柩曰安知其不見星也今史官言當蝕亦安知其不蝕乎夫子老聃豫行見星之防而劭廢之是棄聖賢之成規也魯桓公壬申有災而以乙亥嘗祭春秋譏之災事既過猶退懼未巳故廢宗廟之祭况聞天眚將至行慶樂之會於禮乖矣禮記所云諸侯入門不得終禮者謂日官不豫言諸侯既入見蝕乃知耳非先聞當蝕而朝會不廢也引此可謂失其義指劉劭所執者禮記也夫子老聃巷黨之事亦禮記所言復違而反之進退無據荀令所善漢朝所從遂使此言至今見稱莫知其謬後來君子將擬以為式故正之云爾於是冰從衆議遂以却會至永和中殷浩輔政又欲從劉劭議不却會王彪之據咸寧建元故事又曰禮云諸侯旅見天子不得終禮而廢者四自謂卒暴有之非為存其事而徼幸史官推術繆錯故不豫廢朝禮也於是又從彪之相承至今耕籍之禮尚矣漢文帝修之及昭帝㓜即大位耕於鈎盾弄田明帝永平十五年二月東廵耕於下邳章帝元和三年正月北廵耕於懷縣魏三祖皆親耕籍晉武帝太始四年有司奏始耕祠先農可有司行事詔曰夫民之大事在祀與農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近代以來耕籍止於數歩中空有慕古之名曾無供祀訓農之實而有百官車徒之費今修千畆之制當與羣公卿士躬稼穡之艱難以帥天下主者詳具其制并下河南處田地於東郊之南洛水之北平良中水者若無官田隨宜便換不得侵民人也自此之後其事便廢史注載多有闕止元哀二帝將修耕籍賀循等所上注及襄憲為胡中所定儀又未詳允元嘉二十年太祖將親耕以其乆廢使何承天撰定儀注史學生山謙之已私鳩集因以奏聞乃下詔曰國以民為本民以食為天一夫輟耕饑者必及倉廩既實禮節以興自頃在所貧耗家無宿積陰陽暫偏則人懐愁墊年或不稔而病乏比室誠由政徳未孚以臻斯弊抑亦耕桑未廣地利多遺宰守微化道之方氓庶忘勤分之義永言𢎞濟眀發載懐雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課遊食之徒咸令附業考覈勤隋行其誅賞觀察能殿嚴加黜陟古者從時覛土以訓農功躬耕帝籍敬供粢盛仰瞻前王思遵令典便可量處千畝考上元辰朕當親率百辟致禮郊甸庶幾誠素奨被斯民於是斟酌衆條造定圖注先立春九日尚書宣攝内外各使隨局從事司空大農京尹令尉度宫之辰地八里之外整制千畆開阡陌立先農壇於中阡西陌南御耕壇於中阡東陌北將耕宿設青幕于耕壇之上皇后帥六宫之人生穜稑之種付藉田令耕日太祝以一太牢告祠先農悉如祠帝社之儀孟春之月擇上辛後吉亥日御乘耕根三蓋車駕蒼駟青旂著通天冠青幘朝服青衮帯佩蒼玉蕃王以下至六百石皆衣青唯三臺武衛不耕不改服章車駕出衆事如郊廟之儀車駕至籍田侍中跪奏尊降車臨壇大司農跪奏先農已享請皇帝親耕太史令讚曰皇帝親耕三推三反於是羣臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其屬耕竟畝灑種即耰禮畢魏氏雖天子耕籍其蕃鎭諸侯並闕百畝之禮晉武帝末有司奏古諸侯耕籍百畝躬秉耒耜以奉社稷宗廟以勸率農功今諸王治國宜修耕籍之義然未施行宋太祖東耕後乃班下州郡縣悉偹其禮焉周禮王后帥内外命婦蠶於北郊漢則東郊非古也魏則北郊依周禮也晉則西郊宜是與藉田對其方也魏文帝黄初七年正月命中宫蠶于北郊按韋誕后蠶頌則于時漢注已亡更考撰其儀也及至晉氏先蠶多采魏法晉武帝太康六年㪚騎常侍華嶠奏先王之制天子諸侯親耕千畝后夫人躬蠶桑今陛下以聖眀至仁修先王之緒皇后體資生之徳合配乾之義而教道未先蠶禮尚闕以為宜依古式備斯盛典詔曰古者天子親籍以供粢盛后夫人躬蠶以備祭服所以聿遵孝敬眀教示訓也今籍田有制而蠶禮不修中間務多未暇崇備今天下無事宜修禮以示四海其詳依古典及近代故事以參今宜眀年施行於是使侍中袁粲草定其儀皇后采桑壇在蠶室西帷宫中門之外桑林在其東先蠶壇在宫外門之外而東南取民妻六人為蠶母蠶將生擇吉日皇后著十二笄依漢魏故事衣青衣乘油蓋雲母安車駕六馬女尚書著貂蟬佩璽陪乘載筐鉤公主三夫人九嬪世婦諸太妃公太夫人公夫人及縣郷君郡公侯特進夫人外世婦命婦皆歩搖衣青各載筐鉤從蠶桑前一日蠶官生蠶著薄上桑日太祝令以一太牢祠先蠶皇后至西郊升壇公主以下陪列壇東皇后東靣躬桑采三條諸妃公主各采五條縣鄉君以下各采九條悉以桑授蠶母還蠶室事訖皇后還便坐公主以下以次就位設饗賜絹各有差宋孝武大眀四年又修此禮漢獻帝建安二十二年魏國作泮宫于鄴城南魏文帝黄初五年立太學於洛陽齊王正始中劉馥上疏曰黄初以來崇立太學二十餘年而成者蓋寡由博士選輕諸生避役高門子弟恥非其倫故學者雖有其名而無其實雖設其教而無其功宜高選博士取行為人表經任人師者掌教國子依遵古法使二千石以上子孫年從十五皆入太學眀制黜陟陳榮辱之路不從晉武帝太始八年有司奏太學生七千餘人才任四品聽留詔已試經者留之其餘遣還郡國大臣子弟堪受教者令入學咸寧二年起國子學蓋周禮國之貴遊子弟所謂國子受教於師氏者也太康五年修作眀堂辟雝靈臺孫休永安元年詔曰古者建國教學為先所以導世治性為時養器也自建興以來時事多故吏民頗以目前趨務棄本就末不循古道夫所尚不淳則傷化敗俗其按舊置學官立五經博士覈取應選加其寵祿科見史之中及將吏子弟有志好者各令就業一歳課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以淳王化以隆風俗於是立學元帝為晉王建武初驃騎將軍王導上疏夫治化之本在於正人倫人倫之正存乎設庠序庠序設而五教眀則德化洽通彞倫攸叙有恥且格也父子兄弟夫婦長㓜之序順而君臣之義固矣易所謂正家而天下定者也故聖王蒙以養正少而教之使化沾肌骨習以成性有若自然日遷善逺罪而不自知行成徳立然後裁之以位雖王之嫡子猶與國子齒使知道而後貴其取才用士咸先本之于學故周禮鄉大夫獻賢能之書于王王拜而受之所以尊道而貴士也人知士之所貴由乎道存則退而修其身修其身以及其家正家以及於鄉學於鄉以登於朝反本復始各求諸已敦素之業著浮偽之道息教使然也故以之事君則忠用之莅下則仁即孟軻所謂未有仁而遺其親義而後其君者也自頃皇綱失統禮教陵替頌聲不興于今二紀傳曰三年不為禮禮必壞三年不為樂樂必崩而况如此其乆者乎先進漸忘揖讓之容後生唯聞金革之響干戈日尋爼豆不設先王之道彌逺華偽之風遂滋非所以習民靖俗端本抑末之謂也殿下以命世之資屬當傾危之運禮樂征伐翼成中興將滌穢蕩瑕撥亂反正誠宜經綸稽古建眀學校闡揚六蓺以訓後生使文武之道墜而復興方今小雅盡廢戎虜扇熾節義陵遲國恥未雪忠臣義士所以扼捥拊心禮樂政刑當並陳以俱濟者也茍禮義膠固純風載洽則化之所陶者廣而德之所被者大義之所屬者深而威之所震者逺矣由斯而進則可朝服濟河使帝典闕而復補王綱弛而更張饕餮改情獸心革靣揖讓而蠻夷服緩帶而天下從得乎其道者豈難也哉故有虞舞干戚而三苖化魯僖作泮宫而淮夷平桓文之霸皆先教而後戰今若聿遵前典興復教道使朝之子弟並入于學立德出身者咸習之而後通德路開而偽塗塞則其化不肅而成不嚴而治矣選眀博修禮之士以為之師隆教貴道化成俗定莫尚於斯也㪚騎常侍戴邈又上表曰臣聞天道之所運莫大於陰陽帝王之至務莫重於禮學是以古之建國教學為先國有眀堂辟雝之制鄉有庠序黌校之儀皆所以抽導幽滯啓廣才思蓋以六四有困蒙之吝君子大養正之功也昔仲尼列國之大夫耳興禮修學於洙泗之間四方髦俊斐然向風受業身通者七十餘人自兹以來千載寂漠豈天下小於魯國賢哲乏於曩時厲與不厲故也自頃遭無妄之禍社稷有綴旒之危冦羯飲馬於長江凶狡虎歩於萬里遂使神州蕭條鞠爲茂草四海之内人跡不交覇主有旰食之憂黎民懐荼毒之痛戎首交并于中原何遽籩豆之事哉然三年不為禮禮必壞三年不為樂樂必崩況曠載累紀如此之乆邪今未進後生目不覩揖讓升降之禮耳不聞鐘鼓管弦之音文章㪚滅胡馬之足圖讖無復孑遺於世此蓋聖逹之所深悼有識之所咨嗟也夫治世尚文遭亂尚武文武迭用乆長之道譬之天地昏眀之術自古以來未有不由之者也今以天下未壹非興禮學之時此言似是而非夫儒道深奥不可倉卒而成古之俊乂必三年而通一經比須寇賊蕩夷天下平㤗然後修之則功成事定誰與制禮作樂者哉又貴遊之子未必有斬將搴旗之才亦未有從軍征戍之役不及盛年講肄道義使眀珠加瑩磨之功荆隨發采琢之美不亦良乎愚以世喪道乆民情玩於所習純風日去華競日彰猶火之消膏而莫之覺也今天地造始萬物權輿聖朝以神武之德值革命之運蕩近世之流弊繼千載之絶軌篤道崇儒創立大業眀主唱之於上宰輔篤之於下夫上之所好下必有過之者焉是故雙劒之節崇而飛白之俗成挾琴之容飾而赴曲之和作君子之徳風小人之徳草實在所以感之而已臣以闇淺不能逺識格言謂宜以三時之隟漸就經始太興初議欲修立學校唯周易王氏尚書鄭氏古文孔氏毛詩周官禮記論語孝經鄭氏春秋左傳杜氏服氏各置博士一人其儀禮公羊榖梁及鄭易皆省不置博士太常荀崧上疏曰臣聞孔子有云才難不其然乎自喪亂以來經學尤寡儒有席上之珎然後能𢎞眀道訓今處學則闕朝廷之秀仕朝則廢儒學之美昔咸寧太康元康永嘉之中侍中常侍黄門之深博道奥通洽古今行為世表者領國子博士一則應對殿堂奉酬顧問二則叅訓門子以𢎞儒學三則祠儀二曹及太常之職以得藉用質疑今皇朝中興美隆往初宜憲章令軌祖述前典世祖武皇帝聖徳欽眀應運登禪受終于魏崇儒興學治致升平經始眀堂營建辟雍告朔班政鄉飲大射西閤東序圖書禁籍臺省有宗廟太府金墉故事太學有石經古文先儒典訓賈馬鄭杜服孔王何顔尹之徒章句傳注衆家之學置博士十九人九州之中師徒相傳學士如林猶是選張華劉寔居太常之官以重儒教傳稱孔子没而微言絶七十子終而大義乖自頃中夏殄瘁講誦遏密斯文之道將墜于地陛下聖哲龍飛闡𢎞祖烈申命儒術恢崇道教樂正雅頌於是乎在江揚二州先漸聲教學士遺文於今爲盛然方之疇昔猶千之一也臣學不章句才不𢎞道階緣光寵遂忝非服方之華寔儒風邈逺思竭駑駘庶增萬分願斯道隆於百代之上搢紳詠於千載之下伏聞節省之制皆三分置二博士舊員十有九人今五經合九人準古計今猶未中半九人以外猶宜增四願陛下萬機餘暇時垂省覽周易一經有鄭𤣥注其書根源誠可深惜宜為鄭易博士一人儀禮一經所謂曲禮鄭𤣥於禮特眀皆有證據宜置鄭儀禮博士一人春秋公羊其書精隠眀於斷獄宜置博士一人榖梁簡約隠要宜存於世置博士一人昔周之衰下陵上替臣弑其君子弑其父上無天子下無方伯善者誰賞惡者誰罰綱紀亂矣孔子懼而作春秋諸侯諱妬懼犯時禁是以微辭妙旨義不顯明故曰知我者其唯春秋罪我者其唯春秋時左丘明子夏造䣛親受無不精究孔子旣没微言將絶於是丘明退撰所聞而為之傳其書善禮多膏腴美辭張本繼末以發眀經意信多竒偉學者好之儒者稱公羊高親受子夏立於漢朝辭義清俊斷決眀審多可採用董仲舒之所善也榖梁赤師徒相傳暫立於漢時劉向父子漢之名儒猶執一家莫肯相從其書文清約諸所發眀或是左氏公羊所不載亦足有所訂正是以三𫝊並行於先代通才未能廢今去聖乆逺斯文將墜與其過廢寧過而立也臣以為三傳雖同一春秋而發端異趣案如三家異同之説義則争戰之塲辭亦劒㦸之鋒於理不可得共博士宜各置一人以傳其學元帝詔曰崧表如此皆經國大務而為治所由息馬投戈猶可講藝今雖日不暇給豈忘本而道存邪可共博議之有司奏宜如崧表詔曰榖梁膚淺不足立博士餘如所奏會王敦之難事不施行成帝咸康三年國子祭酒袁瓌太常馮懷又上疏曰臣聞先王之教也崇典訓眀禮學以示後生道萬物之性暢爲善之道也宗周既興文史載煥端委治於南蠻頌聲逸於四海故延州入聘聞雅音而嗟咨韓起適魯觀易象而歎息何者立人之道於此爲首也孔子恂恂道化洙泗孟軻皇皇誨誘無倦是以仁義之聲于今猶存禮讓之風千載未冺疇昔陵替喪亂屢臻儒林之教蹔頽庠序之禮有闕國學索然墳卷莫啓有心之徒抱志無由昔魏武身親介胄務在武功猶尚息鞌披覽投戈吟詠以為世之所須政治之本宜崇況今陛下以聖眀臨朝百官以䖍恭莅事朝野無虞江外静謐如之何泱泱之風漠焉無聞洋洋之美墜於聖世乎古人有言詩書義之府禮樂徳之則實宜留心經籍闡眀學義使諷頌之音盈於京室味道之賢典謨是詠豈不盛哉疏奏帝有感焉由是議立國學徵集生徒而世尚莊老莫肯用心儒訓穆帝永和八年殷浩西征以軍興罷遣由此遂廢征西將軍庾亮在武昌開置學官教曰人情重交而輕財好逸而惡勞學業致苦而禄荅未厚由㨗徑者多故莫肯用心洙泗邈遠風雅彌替後生放任不復憲章典謨臨官宰政者務目前之治不能閑以典誥遂令詩書荒塵頌聲寂漠仰瞻俯省能弗歎慨自胡夷交侵殆三十年矣而未革靣嚮風者豈威武之用盡抑文敎未洽不足綏之邪昔魯秉周禮齊不敢侮范會崇典晉國以治楚魏之君皆阻帶山河慿城據漢國富民殷而不能保其强大吳起屈完所以爲歎也由此言之禮義之固孰與金城湯池季路稱攝乎大國之間加之以師旅因之以饑饉為之三年猶欲行其義方況今江表晏然王道隆盛而不能𢎞敷禮樂敦眀庠序其何以訓彛倫而來遠人乎魏武帝於馳騖之時以馬上為家逮于建安之末風塵未弭然猶留心逺覽大學興業所謂顚沛必於是真通才也今使三時既務五教並修軍旅已整爼豆無廢豈非兼善者哉便處分安學校處所籌量起立講舍參佐大將子弟悉令入學吾家子弟亦令受業四府博學識義通渉文學經綸者建儒林祭酒使班同三署厚其供給皆妙選邦彦必有其宜者以充此舉近臨川臨賀二郡並求修復學校可下聼之若非束修之流禮教所不及而欲階緣免役者不得為生眀為條制令法清而人貴又繕造禮器爼豆之屬將行大射之禮亮尋薨又廢孝武帝太元元年尚書謝石又陳之曰立人之道曰仁與義翼善輔性唯禮與學雖理出自然必須誘導故洙泗闡𢎞道之風詩書垂軌教之典敦詩悦禮王化以斯而隆甄陶九流羣生於是乎穆世不常治道亦時亡光武投戈而習誦魏武息馬以修學懼墜斯文若此之至也大晉受命值世多阻雖聖化日融而王道未備庠序之業或廢或興遂令陶鑄闕日用之功民性靡素絲之益亹亹𤣥緒翳焉莫抽臣所以遠尋伏念寤寐永歎者也今皇威遐震戎車方静將灑𤣥風於四區導斯民於至徳豈可不𢎞敷禮樂使煥乎可觀請興復國學以訓胄子班下州郡普修鄉校雕琢琳琅和寳必至大啓羣蒙茂兹成徳匪懈于事必由之以通則人競其業道隆學備矣烈宗納其言其年選公卿二千石子弟為生增造廟屋一百五十五間而品課無章士君子恥與其列國子祭酒殷茂言之曰臣聞𢎞化正俗存乎禮教輔性成徳必資於學先王所以陶鑄天下津梁萬物閑邪納善潛被於日用者也故能疏通𤣥理窮綜幽微一貫古今彌綸治化且夫子稱回以好學為本七十希仰以善誘歸宗雅頌之音流詠千載聖賢之淵範哲王所同風自大晉中興肇基江左崇明學校修建庠序公卿子弟並入國學尋值多故訓業不終陛下以聖徳𤣥一思隆前美順通居方導逹物性興復儒肆僉與後生自學建彌年而功無可名憚業避役就存者無幾或假託親疾真偽難知聲實渾亂莫此之甚臣聞舊制國子生皆冠族華胄比列皇儲而中者混雜蘭艾遂令人情恥之子貢去朔之餼羊仲尼猶愛其禮況名實兼喪靣牆一世者乎若以當今急病未遑斯典權宜停廢者别一理也若其不然宜依舊準竊謂羣臣内外清官子姪普應入學制以程課今者見生或年在扞格方圓殊趣宜聽其去就各從所安所上謬合乞付外參議烈宗下詔襃納又不施行朝廷及草萊之人有志於學者莫不發憤歎息清河人李遼又上表曰臣聞教者治化之本人倫之始所以誘逹羣方進徳興仁譬諸土石陶冶成器雖復百王殊禮質文參差至於斯道其用不爽自中華湮没闕里荒毁先王之澤寝聖賢之風絶自此迄今將及百年造化有靈否終以㤗河濟夷徙海岱清通黎庶蒙蘓鳬藻奮化而典訓弗敷雅頌寂蔑乆凋之俗大弊未改非演廸斯文緝熙宏猷將何以光贊時邕克隆盛化哉事有如賖而實急此之謂也亡父先臣回綏集邦邑歸誠本朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頓軌式頽弛萬世宗匠忽焉淪廢仰瞻俯慨不覺涕流既逹亰輦表求興復聖祀修建講學至十四年十一月十七日奉被眀詔采臣鄙議敕下兖州魯郡準舊營飾故尚書令謝石令臣所須列上又出家布薄助興立故鎮北將軍譙王恬版臣行北魯縣令賜許供遣二臣薨徂成規不遂陛下體唐堯文思之美訪宣尼善誘之勤矜荒餘之凋昧愍聲教之未浹愚謂可重符兖州刺史遂成舊廟蠲復數户以供掃灑并賜給六經講立庠序延請宿學廣集後進使油然入道發剖琢之功運仁義以征伐敷道徳以服遠何招而不懷何柔而不從所為者微所𢎞甚大臣自致身輦轂于今八稔違親轉積夙夜匪寧振武將軍何澹之今震扞三齊臣當隨反裴回天邑感戀㒺極乞臣表付外參議又不見省宋高祖受命詔有司立學未就而崩太祖元嘉二十年復立國子學二十七年廢魏高貴鄉公甘露二年車駕親率羣司行養老之禮於太學於是王祥為三老鄭小同為五更今無其注然漢禮具存也晉武帝太始六年十二月帝臨辟雝行鄉飲酒之禮詔曰禮儀之廢乆矣乃令復講肄舊典賜太常絹百匹丞博士及學生牛酒咸寧三年惠帝元康九年復行其禮魏齊王正始中齊王毎講經使太常釋奠先聖先師於辟雍弗躬親晉惠帝眀帝之為太子及愍懷太子講經竟並親釋奠於太學太子進爵於先師中庶子進爵於顔淵元帝詔曰吾識太子此事詞訖便請王公以下者昔在洛時嘗豫清坐也成穆孝武三年亦皆親釋奠孝武時以太學在水南縣遠有司議依升平元年於中堂權立行太學于時無復國子生有司奏應須二學生百二十人太學生取見人六十國子生權銓大臣子孫六十人事訖罷奏可釋奠禮畢會百官六品以上元嘉二十二年太子釋奠采晉故事官有其注祭畢太祖親臨學宴㑹太子以下悉豫兵者守國之備孔子曰以不教民戰是謂棄之兵凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆戰陳之事辨鼓鐸鐲鐃之用以教坐作進退疾徐䟽數之節遂以蒐田獻禽以祭社仲夏敎茇舍如振旅之陳遂以苖田如蒐之法獻禽以享礿仲秋教治兵如振旅之陳遂以獮田如蒐之法致禽以祀方仲冬教大閲遂以狩田獻禽以享蒸蒐者蒐索取其不孕者也苖者爲苖除害而已獮者殺也從秋氣所殺多也狩者冬物畢成獲則取之無所擇也漢儀立秋日郊禮畢始揚威武斬牲於郊以􅏪陵廟名曰貙劉其儀乘輿御戎路白馬朱鬛躬執弩射牲太牢令以獲車送陵廟於是乘輿還宫遣使以束帛賜武官肄孫吳兵法戰陳之儀率以為常至獻帝建安二十一年魏國有司奏古四時講武皆於農隙漢西京承秦制三時不講唯十月都試今兵革未偃士民習素可無四時講武但以立秋擇吉日大朝車騎號曰治兵上合禮名下承漢制奏可是冬治兵魏王親金鼓以令進􅅲延康元年魏文帝為魏王是年六月立秋治兵于東郊公卿相儀王御華蓋親令金鼓之節眀帝太和元年十月治兵于東郊晉武帝太始四年九年咸寧元年大康四年六年冬皆自臨宣武觀大習衆軍然不自令進退也自惠帝以後其禮遂廢元帝太興四年詔左右衛及諸營教習依大習儀作鴈羽仗成帝咸和中詔内外諸軍戲兵於南郊之塲故其地因名鬬塲自後蕃鎮桓庾諸方伯往往閲習然朝廷無事焉太祖在位依故事肄習衆軍兼用漢魏之禮其後以時講武於宣武堂元嘉二十五年閏二月大蒐於宣武塲主胄奉詔列奏申攝克日校獵百官備辦設行宫殿便坐武帳於幕府山南岡設王公百官便坐幔省如常儀設南北左右四行旌門建獲旗以表獲車殿中郎一人典獲車主者二人收禽吏二十四人配獲車備獲車十二兩校獵之官著袴褶有帶武冠者脱冠者上纓二品以上􅗙刀備槊麾幡三品以下帶刀皆騎乘將領部曲先獵一日遣屯布圍領軍將軍一人督右甄䕶軍一人督左甄大司馬一人居中董正諸軍悉受節度殿中郎率獲車部曲在司馬之後尚書僕射都官尚書五兵尚書左右丞都官諸曹郎都令史都官諸曹令史幹蘭臺治書侍御史令史諸曹令史幹督攝糺司校獵非違至日會於宣武塲列為重圍設留守填街位於雲龍門外内官道南以西為上設從官位於雲龍門内大官階北小官階南以西為上設先置官位於行止車門外内官道西外官道東以北為上設先置官還位於廣莫門外道之東西以南為上校獵日平旦正直侍中嚴上水一刻奏搥一鼓為一嚴上水二刻奏搥二鼔為再嚴殿中侍御史奏開東中華雲龍門引仗為小駕鹵簿百官非較獵之官著朱服集列廣莫門外應還省者還省留守填街後部從官就位前部從官依鹵簿先置官先行上水三刻奏搥三鼔為三嚴上水四刻奏外辦正次直侍中㪚騎常侍給事黄門侍郎軍校劒履進夾上閤正直侍郎負璽通事令史帶龜印中書之印上水五刻皇帝出著黑介幘單衣乘輦正直侍中負璽陪乘不帶劒殿中侍御史督攝黄麾以内次直侍中次直黄門侍郎䕶駕在前又次直侍中佩信璽行璽與正直黄門侍郎從䕶駕在後不鳴鼔角不得諠譁以次引出警蹕如常儀車駕出騶讚陛者再拜皇太子入守車駕將至威儀倡引先置前部從官就位再拜車駕至行殿前回輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俛伏起皇帝降輦登御坐侍臣升殿直衛鈒㦸虎賁毛頭文衣鶡尾以次列階正直侍中奏解嚴先置從駕百官還便坐幔省帝若躬親射禽變御戎服内外從官以及虎賁悉變服如校獵儀鈒㦸抽鞘以備武衞黄麾内外從入圍裏列置部曲廣張甄圍旗鼓相望銜枚而進甄周圍會督甄令史奔騎號法施令春禽懷孕蒐而不射鳥獸之肉不登於爼不射皮革齒牙骨角毛羽不登於器不射甄會大司馬鳴皷蹙圍衆軍皷譟警角至武埸止大司馬屯北旌門二甄帥屯左右旌門殿中中郎率獲車部曲入次北旌門内之右皇帝從南旌門入射禽謁者以獲車收載還陳於獲旗北王公以下以次射禽各送詣獲旗下付收禽主者事畢大司馬鳴鼓觧圍復屯殿中郎率其屬收禽以實獲車充庖㕑列言統曹正㕑置尊酒爼肉于中逵以犒饗校獵衆軍至晡正直侍中量宜奏嚴從官還著朱服鈒㦸復鞘再嚴先置官先還三嚴後二刻正直侍中奏外辨皇帝著黑介幘單衣正次直侍中㪚騎常侍給事黄門侍郎軍校進夾御坐正直侍中跪奏還宫次直侍郎稱制曰可正直侍中俛伏起乘輿登輦還衛從如常儀大司馬鳴皷㪚屯以次就舍車駕將至威儀倡引留守填街先置前部從官就位再拜車駕至殿前回輦正直侍中跪奏降輦次直侍中稱制曰可正直侍中俛伏起乘輿降入正直次直侍中㪚騎常侍給事黄門侍郎㪚騎侍郎軍校從至閤亦如常儀正直侍中奏觧嚴内外百官拜表問訊如常儀訖罷宋書卷十四宋書卷十四考證禮志一周之五禮其五爲嘉嘉缺二字臣承蒼按此下三條皆言冠禮周之五禮四字當提起另作一行所缺之字疑是冠禮二字舊時嵗旦臣承蒼按自此至往往猶存是禳禮當另爲一條諸本皆誤上代聘享之禮臣承蒼按自此句起亦當另爲一條其亞獻猶終獻太常光禄勲也猶字當移在終獻二字之下太祝令牲玉饌物詣塪尋繹文義令字下當有一奉字考上元辰文帝紀上作卜猶是選張華劉寔居太常之官以重儒教猶當作由殿中郎率獲車部曲在司馬之後獲諸本訛䕶臣承蒼按上文言殿中郎一人典獲車此當作獲殿中中郎率獲車部曲入次北旌門内之右獲諸本並訛䕶今從南本改正宋書卷十四考證
