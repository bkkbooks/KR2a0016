body:
  text: 宋書卷二十梁沈約撰志第十樂二蔡邕論敘漢樂曰一曰郊廟神靈二曰天子享宴三曰大射辟雍四曰短簫鐃歌晉郊祀歌五篇傅𤣥造天命有晉穆穆明明我其夙夜祗事上靈常于時假迄用有成於薦𤣥牡進夕其牲崇徳作樂神祗是聽右祠天地五郊夕牲歌一篇宣文烝哉日靖四方永言保之夙夜匪康光天之命上帝是皇嘉樂殷薦靈祚景祥神祗隆假享福無疆右祠天地五郊迎送神歌一篇天祚有晉其命惟新受終于魏奄有兆民燕及皇天懷柔百神不顯遺烈之徳之純享其𤣥牡式用肇禋神祗來格福祿是臻時邁其猶昊天子之祐享有晉兆民戴之畏天之威敬授民時不顯不承於猶繹思皇極斯建庶績咸熈庶幾夙夜惟晉之祺宣文惟后克配彼天撫寧四海保有康年於乎緝熈肆用靖民爰立典制爰修禮紀作民之極莫匪資始克昌厥後永言保之右饗天地五郊歌三篇前所作天地郊明堂歌五篇傅𤣥造皇矣有晉時邁其徳受終于天光濟萬國萬國既光神定厥祥䖍于郊祀祗事上皇祗事上皇百祿是臻巍巍祖考克配彼天嘉牲匪歆徳馨惟饗受天之祚神和四暢右天地郊明堂夕牲歌於赫大晉膺天景祥二帝邁徳宣兹重光我皇受命奄有萬方郊祀配享禮樂孔章神祗嘉饗祖考是皇克昌厥後保胙無疆右天地郊明堂降神歌整泰壇祀皇神精氣感百靈賔蕰朱火燎芳薪紫煙游冠青雲神之體靡象形曠無方幽以清神之來光景照聽無聞視無兆神之至舉歆歆靈爽恊動余心神之坐同歡娯澤雲翔化風舒嘉樂奏文中聲八音諧神是聽咸潔齊並芬芳烹牲牷享玉觴神說饗歆禋祀祐大晉降繁祉胙京邑行四海保天年窮地紀右天郊饗神歌整泰行竢皇祗衆神感羣靈儀隂祀設吉禮施夜將極時未移祗之體無形象潛泰幽洞忽荒祗之出薆若有靈無逺天下母祗之來遺光景照若存終冥冥祗之至舉欣欣舞象徳歌成文祗之坐同歡豫澤雨施化雲布樂八變聲教敷物咸享祗是娯齋既潔侍者肅玉觴進咸穆穆饗嘉慶歆徳馨胙有晉暨羣生溢九壤格天庭保萬夀延億齡右地郊饗神歌經始明堂享祀匪懈於皇烈考光配上帝赫赫上帝既髙既崇聖考是配明徳顯融率土敬職萬方來祭常于時假保胙永世右明堂饗神歌宋南郊雅樂登歌三篇顏延之造夤威寶命嚴㳟帝祖表海炳岱系唐胄楚靈鑑濬文民屬叡武奄受敷錫宅中拓宇亘地稱皇罄天作主月竁來賔日際奉土開元首正禮交樂舉六典聯事九官列序有牷在滌有潔在俎以􅏪王𠂻以荅神祜右天地郊夕牲歌維聖饗帝維孝饗親皇乎備矣有事上春禮行宗祀敬達郊禋金枝中樹廣樂四陳陟配在京降徳在民奔精照夜髙燎煬晨隂明浮爍沈禜深淪告成大報受釐元神月御按節星驅扶輪遥興逺駕燿燿振振右天地郊迎送神歌營泰畤定天衷思心叡謀筮從建表蕝設郊宫田燭置爟火通歴元旬律首吉飾紫壇坎列室中星兆六宗秩乾宇晏地區謐大孝昭祭禮供牲日展盛自躬具陳噐備禮容形舞綴被歌鐘望帝閽聳神蹕靈之來辰光溢潔粢酌娱太一明煇夜華晢日祼既始獻又終煙薌鬯報清穹饗宋徳胙王功休命永福履充右天地饗神歌宋明堂歌謝莊造地紐謐乾樞回華蓋動紫微開旗蔽日車若雲駕六氣乗絪緼曄帝京煇天邑聖祖降五靈集構瑶戺聳珠簾漢拂幌月棲檐舞綴畼鐘石融駐飛景鬱行風懋粢盛潔牲牷百禮肅羣司䖍皇徳逺大孝昌貫九幽洞三光神之安解玉鑾景福至萬㝢歡右迎神歌詩依漢郊祀迎神三言四句一轉韻雝臺辨朔澤宫練辰潔火夕照明水朝陳六瑚賁室八羽華庭昭事先聖懷濡上靈肆夏戒敬升歌發徳永固鴻基以綏萬國右登歌詞舊四言維天為大維聖祖是則辰居萬㝢綴旒下國内靈八輔外光四瀛蒿宮仰蓋日館希旌􅃨殿留景重檐結風刮楹接緯達嚮承虹設業設虡在王庭肇禋祀克配乎靈我將我享維孟之春以孝以敬以立我烝民右歌太祖文皇帝詞依周頌體參暎夕駟照晨靈乗震司青春鴈將向桐始蕤柔風舞暄光遲萌動達萬品新潤無際澤無垠右歌青帝詞三言依木數龍精初見大火中朱光北至圭景同帝在在離寔司衡水雨方降木槿榮庶物盛長咸殷阜恩覃四㝠被九有右歌赤帝辭七言依火數履建宅中㝢司繩御四方裁化遍寒燠布政周炎凉景麗條可結霜明氷可折凱風扇朱辰白雲流素節分至乗結晷啓閉集恒度帝運緝萬有皇靈澄國歩右歌黄帝辭五言依土數百川如鏡天地爽且明雲冲氣舉徳盛在素精木葉初下洞庭始揚波夜光徹地飜霜照懸河庶類収成嵗功行欲寧浹地奉渥罄宇承秋靈右歌白帝辭九言依金數嵗月旣晏方馳靈乗坎徳司規𤣥靈合晦鳥路白雲繁亘天涯雷在地時未光飭國典閉關梁四節遍萬物殿福九域祚八鄉晨晷促夕漏延大隂極微陽宣鵲將巢氷已解氣濡水風動泉右歌黒帝辭六言依水數藴禮容餘樂度靈方留景欲暮開九重肅五逹鳯參差龍已沫雲既動河既梁萬里照四空香神之車歸清都璇庭寂玉殿虛睿化凝孝風熾顧靈心結皇思右送神歌辭漢郊祀送神亦三言右天郊饗神歌魏兪兒舞歌四篇魏國初建所用後於太祖廟並作之王粲造漢初建國家匡九州蠻荆震服五刃三革休安不忘備武樂脩宴我賔師敬用御天永樂無憂子孫受百福常與松喬遊蒸庶徳莫不咸歡柔右矛兪新福歌材官選士劒弩錯陳應桴蹈節俯仰若神綏我武烈篤我淳仁自西自東莫不來賔右弩兪新福歌我功既定庶士咸綏樂陳我廣庭式燕賔與師昭文徳宣武威平九有撫民黎荷天寵延夀尸千載莫我違右安臺新福歌曲神武用師士素厲仁恩廣覆猛節横逝自古立功莫我𢎞大桓桓征四國爰及海裔漢國保長慶垂祚延萬世右行辭新福歌曲晋宣武舞歌四篇傅𤣥造惟聖皇篇矛兪第一惟聖皇徳巍巍光四海禮樂猶形影文武為表裏乃作巴兪肆舞士劒弩齊列戈矛為之始進退疾鷹鷂龍戰而豹起如亂不可亂動作順其理離合有統紀短兵篇劒俞第二劒為短兵其勢險危疾踰飛電回旋應規武節齊聲或合或離電發星騖若景若差兵法攸象軍容是儀軍鎭篇弩兪第三弩為逺兵軍之鎮其發有機體難動徃必速重而不遲銳精分鎛射逺中微弩俞之樂壹何竒變多姿退若激進若飛五聲恊八音諧宣武象讃天威窮武篇安臺行亂第四窮武者喪何但敗北柔弱亡戰國家亦廢秦始徐偃既已作戒前世先王鑒其機脩文整武藝文武足相濟然後得光大亂曰髙則亢滿則盈亢必危盈必傾去危傾守以平沖則乆濁能清混文武順天經晉宣文舞歌二篇傅𤣥造羽籥舞歌羲皇之初天地開元網罟禽獸羣黎以安神農敎耕創業誠難民得粒食澹然無所患黄帝始征伐萬品造其端軍駕無常居是曰軒轅軒轅既勤止堯舜匪荒寧夏禹治水湯武又用兵孰能保安逸坐致太平聖皇邁乾乾天下興頌聲穆穆且明明惟聖皇道化彰澂四海清三光萬機理庶事康潛龍升儀鳯翔風雨時物繁昌却走馬降瑞祥揚仄陋簡忠良百祿是荷眉夀無疆羽鐸舞歌昔在渾成時兩儀尚未分陽升垂清景隂降興浮雲中和含氛氲萬物各異羣人倫得其序衆生樂聖君三統繼五行然後有質文皇王殊運代治亂亦繽紛伊大晉徳兼徃古越犧農邈舜禹參天地陵三五禮唐周樂韶武豈惟簫韶六代具舉澤霑地境化充天㝢聖明臨朝元凱作輔普天同樂胥浩浩元氣遐哉大清五行流邁日月代征隨時變化庶物乃成聖皇繼天光濟羣生化之以道萬國咸寧受兹介福延于億齡晉宗廟歌十一篇傅𤣥造我夕我牲猗歟敬止嘉豢孔時供兹享祀神鑒厥誠博碩斯歆神考降饗以虞孝孫之心右祠廟夕牲歌嗚呼悠哉日鑒在兹以時享祀神明降之神明斯降既祐享之祚我無疆受天之祜赫赫太上巍巍聖祖明明烈考丕承繼序右祠廟迎送神歌經始宗廟神明戾止申錫無疆祗承享祀假哉皇祖綏于孫子燕及後昆錫兹繁祉右祠征西將軍登歌嘉樂肆庭薦祀在堂皇皇宗廟乃祖先皇濟濟辟公相予烝嘗享祀不忒降福穰穰右祠豫章府君登歌於邈先后實司于天顯矣皇祖帝祉肇臻本支克昌資始開元惠我無疆享祀永年右祠潁川府君登歌於惟曾皇顯顯令徳髙明清亮匪競柔克保乂命祜基命惟則篤生聖祖光濟四國右祠京兆府君登歌於鑠皇祖聖徳欽明勤施四方夙夜敬止載敷文教載揚武烈匡定社稷龔行天罰經始大業造創帝基畏天之命于時保之右祠宣皇帝登歌執競景皇克明克哲旁作穆穆惟祗惟畏纂宣之緒耆定厥功登此雋乂糾彼羣凶業業在位帝既勤止維天之命於穆不已右祠景皇帝登歌於皇時晉允文文皇聰明叡智聖敬神武萬機莫綜皇斯清之虎兕放命皇斯平之柔逺能邇簡授英賢創業埀統勲格皇天右祠文皇帝登歌曰晉是常享祀時序宗廟致敬禮樂具舉惟其來祭普天率土犧樽既奠清酤既載亦有和羮􅏪羞斯備蒸蒸永慕感時興思登歌奏舞神樂其和祖考來格祐我邦家敷天之下㒺不休嘉肅肅在位濟濟臣工四海來格禮儀有容鐘鼔振管絃理舞開元歌永始神胥樂兮肅肅在位臣工濟濟小大咸敬上下有禮理管絃振鼓鐘舞象徳歌詠功神胥樂兮肅肅在位有來雍雍穆穆天子相惟辟公禮有儀樂有則右祠廟饗神歌二篇晉江左宗廟歌十三篇曹毗造十一首王珣造二首歌髙祖宣皇帝曹毗造於赫髙祖徳恊靈符應運撥亂釐整天衢勲格宇宙化動八區肅以典刑陶以𤣥珠神石吐瑞靈芝自敷肇基天命道均唐虞歌世宗景皇帝景皇承運纂隆洪緒皇維重抗天暉再舉蠢矣二寇擾我揚楚乃整元戎以膏齊斧亹亹神算赫赫王旅鯨鯢既平功冠帝宇歌太祖文皇帝太祖齊聖王猷誕融仁教四塞天基累崇皇室多難嚴清紫宫威厲秋霜惠過春風平蜀夷楚以文以戎奄有參墟聲流無窮歌世祖武皇帝於穆武皇允龔欽明應期登神龍飛紫庭百揆時序聽斷以情殊域既賔偽呉亦平晨流甘露宵映明星野有擊壤路埀頌聲歌中宗元皇帝運屯百六天羅解貫元皇勃興網籠江漢仰齊七政俯平禍亂化若風行澤猶雨散淪光更燿金煇復煥徳冠千載蔚有餘粲歌肅祖明皇帝明明肅祖闡𢎞帝胙英風夙發清暉載路姦逆縱忒㒺式皇度躬振朱旗遂豁天歩宏猷淵塞髙羅雲布品物咸寧洪基永固歌顯宗成皇帝於休顯宗道澤𤣥播式宣徳音畼物以和邁徳蹈仁匪神弗過敷以純風濯以清波連理映阜鳴鳯棲柯同規放勛義蓋山河歌康皇帝康皇穆穆仰嗣洪徳為而不宰雅音四塞閑邪以誠鎮物以默威靜區宇道宣邦國歌孝宗穆皇帝孝宗夙哲休音允臧如彼晨離燿景扶桑垂訓華幄流潤八荒幽賛𤣥妙爰該典章西平僭蜀北靜舊疆髙猷逺畼朝有遺芳歌哀皇帝於穆哀皇聖心虚逺雅好𤣥古大庭是踐道尚無為治存易簡化若風行民猶草偃雖曰登遐徽音彌闡愔愔雲韶盡羙盡善歌太宗簡文皇帝王珣造皇矣簡文於昭于天靈明若神周淡如淵沖應其來實與其遷娓娓心化日用不言易而有親簡而可傳觀流彌逺求本愈𤣥歌烈宗孝武皇帝王珣造天鑑有晉欽哉烈宗同規文考𤣥默允龔威而不猛約而能通神鉦一震九域來同道積淮海雅頌自東氣陶淳露化恊時雍四時祠祀歌曹毗造肅肅清廟巍巍聖功萬國來賔禮儀有容鐘鼔振金石熙宣兆祚武開基神斯樂兮理管絃有來斯和說功徳吐清歌神斯樂兮洋洋𤣥化潤被九壤民無不悅道無不徃禮有儀樂有式詠九功永無極神斯樂兮宋宗廟登歌八篇王韶之造綿綿遐緒昭明載融漢徳未逺堯有遺風於穆皇祖永世克隆本枝惟慶貽厥靡窮右祠北平府君登歌乃立清廟清廟肅肅乃備禮容禮容穆穆顯允皇祖昭是嗣服錫兹繁祉聿懐多福右祠相國掾府君登歌四縣既序簫管既舉堂獻六瑚庭舞八羽先王有典克禋皇祖丕顯洪烈永介休祜右祠開封府君登歌鐘鼔喤喤威儀將將温㳟禮樂敬享曾皇邁徳埀仁係軌重光天命純嘏惠我無疆右祠武原府君登歌鑠矣皇祖帝度其心永言配命播兹徽音思我茂猷如玉如金駿奔在陛是鑑是歆右祠東安府君登歌蒸哉孝皇齊聖廣淵發祥誕慶景胙自天徳敷金石道被管絃有命既集徽風永宣右祠孝皇帝登歌惟天有命眷求上哲赫矣聖武撫運桓撥功並敷土道均汝墳止戈曰武經緯稱文鳥龍失紀雲火代名受終改物作我宋京至道惟王大業有邵降徳兆民升歌清廟右祠髙祖武皇帝登歌奕奕寢廟奉璋在庭笙籥既列犧象既盈黍稷匪芳明祀惟馨樂具禮充潔羞􅏪誠神之格思介以休禎濟濟羣辟永觀厥成右祠七廟享神登歌并以歌章太后篇世祖孝武皇帝歌謝莊造帝錫二祖長世多祜於穆叡考襲聖承矩𤣥極弛馭乾紐墜緒闢我皇維締我宋宇刷定四海肇構神京復禮輯樂散馬墮城澤牣九有化浮八瀛慶雲承掖甘露飛甍肅肅清廟徽徽閟宫舞蹈象徳笙磬陳風黍稷非盛明徳惟崇神其歆止降福無窮宣皇太后廟歌禀祥月輝毓徳軒光嗣徽媯汭思媚周姜母臨萬㝢訓藹紫房朱絃玉籥式載瓊芳晉四廂樂歌三首傅𤣥造天鑒有晉世祚聖皇時齊七政朝此萬方其一鐘鼔斯震九賔備禮正位在朝穆穆濟濟其二煌煌三辰寔䴡于天君后是象威儀孔䖍其三率禮無愆莫匪邁徳儀刑聖皇萬邦惟則其四右天鑒四章章四句正旦大㑹行禮歌於赫明明聖徳龍興三朝獻酒萬夀是膺敷佑四方如日之升自天降祚元吉有徵右於赫一章八句上夀酒歌天命大晉載育羣生於穆上徳隨時化成其一自祖配命皇皇后辟繼天創業宣文之績其二丕顯宣文先知稼穡克㳟克儉足教足食其三既教食之𢎞濟艱難上帝是祐下民所安其四天祐聖皇萬邦來賀雖安勿安乾乾匪暇其五乃正丘郊乃定冡社廙廙作宗光宅天下其六惟敬朝饗爰奏食舉盡禮供御嘉樂有序其七樹羽設業笙鏞以閒琴瑟齊列亦有箎塤其八喤喤鼓鐘鎗鎗磬管八音克諧載夷載簡其九既夷既簡其大不禦風化潛興如雲如雨其十如雲之覆如雨之潤聲教所暨無思不順其一十教以化之樂以和之和而養之時惟邕熙其二十禮慎其儀樂節其聲於鑠皇繇既和且平其三十右天命十三章章四句食舉東西廂歌晉正徳大豫二舞歌二篇傅𤣥造天命有晉光濟萬國穆穆聖皇文武惟則在天斯正在地成徳載韜政刑載崇禮教我敷𤣥化臻于中道右正徳舞歌於鑠皇晉配天受命熙帝之光世徳惟聖嘉樂大豫保祐萬姓淵兮不竭沖而用之先天弗違䖍奉天時右大豫舞歌晉四廂樂歌十七篇荀勗造正旦大㑹行禮歌四篇於皇元首羣生資始履端大享敬御繁祉肆覲羣后爰及卿士欽順則元允也天子於皇一章八句當於赫明明天子臨下有赫四表宅心惠浹荒貊柔逺能邇孔淑不逆來格祁祁邦家是若明明一章八句當巍巍光光邦國天篤其祜丕顯哲命顧柔三祖世徳作求奄有九土思我皇度􅉓倫攸序邦國一章八句當洋洋惟祖惟宗髙朗緝熙對越在天駿惠在兹聿求厥成我皇崇之式固其猶徃敬用治祖宗一章八句當鹿鳴正旦大㑹王公上夀酒歌一篇踐元辰延顯融獻羽觴祈令終我皇夀而隆我皇茂而嵩本枝奮百世休祚鍾聖躬踐元辰一章八句當觴行食舉樂東西廂歌十二篇煌煌七燿重明交暢我有嘉賔是應是貺邦政既圖接以大饗人之好我式遵徳讓煌煌一章八句當鹿鳴賔之初筵藹藹濟濟既朝乃宴以洽百禮頒以位敘或廷或陛登儐台叟亦有兄弟胥子陪寮憲兹度楷觀頤養正降福孔偕賔之初筵一章十二句當於穆昔我三后大業是維今我聖皇焜燿前暉奕奕重規明照九畿思輯用光時㒺有違陟禹之跡莫不來威天被顯祿福履是綏三后一章十二句當昭昭赫矣太祖克廣明徳廓開㝢宙正世立則變化不經民無瑕慝剙業埀統兆我晉國赫矣一章八句當華華烈文伯考時惟帝景夷險平亂威而不猛御衡不迷皇塗煥炳七徳咸宣其寧惟永烈文一章八句當朝宴猗歟盛歟先皇聖文則天作孚大哉為君慎徽五典帝載是懃文武發揮茂建嘉勲修已濟治民用寧殷懐逺燭幽𤣥教氛氲善世不伐服事參分徳博化隆道冐無垠猗歟一章十六句當盛徳隆化洋洋帝念溥將登我晉道越惟聖皇龍飛革運臨燾八荒叡哲欽明配蹤虞唐封建厥福駿發其祥三朝習吉終然允臧其臧惟何總彼萬方元侯列辟四嶽蕃王時見世享率兹有常旅揖在庭嘉客在堂宋衞既臻陳留山陽我有賔使觀國之光貢賢納計獻璧奉璋保祐命之申錫無疆隆化一章二十八句當綏萬邦振鷺于飛鴻漸其翼京邑穆穆四方是式無競惟人王綱允敕君子來朝言觀其極振鷺一章八句當朝朝翼翼大君民之攸暨信理天工惠康不匱將逺不仁訓以淳粹幽明有倫俊乂在位九族既睦庶邦順比開元布憲四海鱗萃恊時正統殊塗同致厚徳載物靈心隆貴敷奏讜言納以無諱樹之典象誨之義類上教如風下應如卉一人有慶羣萌以遂我后宴喜令聞不墜翼翼一章二十六句當順天既宴既喜翕是萬邦禮儀卒度物其有容晢晢庭燎喤喤鼓鐘笙磬詠徳萬舞象功八音克諧俗易化從其和如樂庶品時邕既宴一章十二句當陟天庭時邕份份六合同塵徃我祖宗威静殊鄰首定荆楚遂平燕秦娓娓文皇邁徳流仁爰造草昧應乾順民靈瑞告符休徵饗震天地弗違以和神人既戡庸蜀呉㑹是賔肅慎率職楛矢來陳韓濊進樂均恊清鈞西旅獻獒扶南效珍蠻裔重譯𤣥齒文身我皇撫之景命惟新時邕一章二十六句當參兩儀愔愔嘉㑹有聞無聲清酤既奠籩豆既馨禮充樂備簫韶九成愷樂飲酒酣而不盈率土歡豫邦國以寧王猷允塞萬載無傾嘉㑹一章十二句晉正徳大豫二舞歌二萹荀勗造人文埀則盛徳有容聲以依詠舞以象功干戚發揮節以笙鏞羽籥雲㑹翊宣令蹤敷羙盡善允恊時邕煥炳其章光乎萬邦萬邦洋洋承我晉道配天作享元命有造上化如風民應如草穆穆斌斌形于綴兆文武旁作慶流四表無競維烈永世是紹正徳舞歌豫順以動大哉惟時時邁其仁世載邕熙兆我區夏宣文是基大業惟新我皇隆之重光累曜欽明文思迄用有成惟晉之祺穆穆聖皇受命既固品物咸寧芳烈雲布文教旁通篤以淳素𤣥化洽暢被之暇豫作樂崇徳同羙韶濩濬邈幽遐式遵王度右大豫舞歌晉四廂樂歌十六篇張華造稱元慶奉夀觴后皇延遐祚安樂撫萬方右王公上夀詩一章明明在上丕顯厥繇翼翼三夀蕃后惟休羣生漸徳六合承流三正元辰朝慶鱗萃華夏奉職貢八荒覲殊類黻冕充廣庭鳴玉盈朝位濟濟朝位言觀其光儀序既以時禮文渙以彰思皇享多祜嘉樂永無央九賔在庭臚讚既通升瑞奠贄乃侯乃公穆穆天尊隆禮動容履端承元吉介福御萬邦朝享上下咸雍崇多儀繁禮容舞盛徳歌九功揚芳烈播休蹤皇化洽洞幽明懐柔百神輯祥禎潛龍躍雕虎仁儀鳯鳥届游麟枯蠧榮竭泉流菌芝茂枳棘柔和氣應休徵滋恊靈符彰帝期綏宇宙萬國和昊天成命賚皇家賚皇家世資聖哲三后在天啟鴻烈啟鴻烈隆王基率土謳吟欣戴于時恒文示象代氣著期泰始開元龍升在位四隩同風燮寧殊類五韙來備嘉生以遂凝庶績臻大康申繁祉𦙍無疆本枝百世繼緒不忘繼緒不忘休有烈光永言配命惟晉之祥聖明統世篤皇仁廣大配天地順動若陶鈞𤣥化參自然至徳通神明清風暢八極流澤被無垠於皇時晉奕奕齊聖惟天降嘏神祗保定𢎞濟區夏允集大命有命既集光帝猷大明重耀鑑六幽聲教洋溢惠滂流惠滂流移風俗多士盈朝賢俊比屋敦世心斵彫反素樸反素樸懐庶方干戚舞階庭疏狄說遐荒扶南假重譯肅慎襲衣裳雲覆雨施徳洽無疆旁生穆穆仁化翔朝元日賔王庭承宸極當盛明衍和樂竭祗誠仰嘉惠懐徳馨游淳風泳淑清恊億兆同歡榮建皇極統天位運隂陽御六氣殷羣生成性類王道浹治功成人倫序俗化清䖍明祀祗三靈崇禮樂式儀形慶元吉宴三朝播金石詠泠簫奏九夏舞雲韶邁徳音流英聲八紘一六合寧六合寧承聖明王澤洽道登隆綏函夏總華戎齊徳教混殊風混殊風康萬國崇夷簡尚敦徳𢎞王度表遐則右食舉東西廂樂詩十一章於赫皇祖迪哲齊聖經緯大業基天之命克開洪緒誕篤天慶旁濟彜倫仰齊七政烈烈景皇克明克聰靜封畧定勲功成民立政儀刑萬邦式固崇軌光紹前蹤允文烈考濬哲應期參徳天地比功四時大亨以正庶績咸熙肇啓晉宇遂登皇基明明我后𤣥徳通神受終正位恊應天人容民厚下育物流仁躋我王道暉光日新右雅樂正旦大㑹行禮詩四章晉正徳大豫二舞歌二篇張華造正徳舞歌詩曰皇上天𤣥鑒惟光神器周回五徳代章祚命于晉世有哲王𢎞濟區夏甄陶萬方大明埀曜旁燭無疆蚩蚩庶類風徳永康皇道惟清禮樂斯經金石在縣萬舞在庭象容表慶恊律被聲軼武超濩取節六英同進退讓化漸無形太和宣洽通于幽冥大豫舞歌詩惟天之命符運有歸赫赫大晉三后重暉繼明紹世光撫九圍我皇紹期遂在璿璣羣生屬命奄有庶邦慎徽五典𤣥教遐通萬方同軌率土咸雍爰制大豫宣徳舞功淳化既穆王道恊隆仁及草木惠加昆蟲億兆夷人說仰皇風丕顯大業永世彌崇晉四廂歌十六篇成公綏造上夀酒樂未央大晉應天慶皇帝永無疆右詩一章王公上夀酒所用穆穆天子光臨萬國多士盈朝莫匪俊徳流化㒺極王猷允塞嘉㑹置酒嘉賔充庭羽旄燿辰極鐘鼓振太清百辟朝三朝彧彧明儀形濟濟鏘鏘金振玉聲禮樂具宴嘉賔眉夀祚聖皇景福惟日新羣后戾止有來雝雝獻酬納贄崇此禮容豐肴萬俎㫖酒千鍾嘉樂盡樂宴福祿咸攸同樂哉天下安寧道化行風俗清簫韶作詠九成年豐穰世泰平至治哉樂無窮元首聰明股肱忠澍豐澤揚清風嘉瑞出靈應彰麒麟見鳯皇翔醴泉涌流中唐嘉禾生穗盈箱降繁祉祚聖皇承天位統萬國受命應期授聖徳四世重光宣開洪業景克昌文欽明徳彌彰肇啓晉邦流祚無疆泰始建元鳯皇龍興龍興伊何享祚萬乘奄有八荒化育黎蒸圖書煥炳金石有徵徳光大道熈隆被四表格皇穹奕奕萬嗣明明顯融髙朗令終保兹永祚與天比崇聖皇君四海順人應天期三葉合重光泰始開洪基明燿參日月功化侔四時宇宙清且泰黎庶咸雝熈善哉雝熈惟天降命翼仁祐聖於穆三皇載徳彌盛總齊璿璣光統七政百揆時序化若神聖四海同風興至仁濟民育物擬陶鈞擬陶鈞垂惠潤皇皇羣賢峩峩英儁徳化宣芬芳播來𦙍播來𦙍埀後昆清廟何穆穆皇極闢四門皇極闢四門萬機無不綜娓娓翼翼樂不及荒饑不遑食大禮既行樂無極登崑崙上増城乘飛龍升泰清冠日月佩五星揚虹蜺建彗旌披慶雲䕃繁榮鑒八極游天庭順天地和隂陽序四氣燿三光張帝網正皇綱播仁風流惠康邁洪化振靈威懐萬方納九夷朝閶闔宴紫微建五旗羅鐘虡列四縣奏韶武鏗金石揚旌羽縱八佾巴渝舞詠雅頌和律呂于胥樂樂聖主化蕩蕩清風泄總英雄御俊傑開宇宙埽四裔光緝熈羙聖哲超百代揚休烈流景祚顯萬世皇皇顯祖翼世佐時寧濟六合受命應期神武鷹揚大化咸熈廓開皇衢用成帝基光光景皇無競維烈匡時拯俗休功蓋世宇宙既康九域有截天命降監啓祚明哲穆穆烈考克明克儁實天生徳誕膺靈運肇建帝業開國有晉載徳奕世埀慶洪𦙍明明聖帝龍飛在天與靈合契通徳幽𤣥仰化青雲俯育重淵受靈之祐於萬斯年右雅樂正旦大㑹行禮詩十五章宋四廂樂歌五篇王韶之造於鑠我皇體仁包元齊明日月比量乾坤陶甄百王稽則黄軒訏謨定命辰告四蕃將將蕃后翼翼羣僚盛服待晨明發來朝饗以八珍樂以九韶仰祗天顔厥猷孔昭法章既設初筵長舒濟濟列辟端委皇除飲和無盈威儀有餘温㳟在位敬終如初九功既歌六代惟時被徳在樂宣道以詩穆矣太和品物咸熈慶積自逺告成在兹右肆夏樂歌四章客入於四廂振作於鑠曲皇帝當陽四廂振作將將曲皇帝入變服四廂振作於鑠將將二曲又黄鐘太蔟二廂作法章九功二曲大哉皇宋長發其祥纂系在漢統源伊唐徳之克明休有烈光配天作極辰居四方皇矣我后聖徳通靈有命自天誕授休禎龍飛紫極造我宋京光宅宇宙赫赫明明右大㑹行禮歌二章姑洗廂作獻夀爵慶聖皇靈􅍈窮二儀休明等三光右王公上夀歌一章黄鐘廂作明明大宋緝熈皇道則天埀化光定天保天保既定肆覲萬方禮繁樂富穆穆皇皇沔彼流水朝宗天池洋洋貢職抑抑威儀既習威儀亦閑禮容一人有則作孚萬邦烝哉我皇固天誕聖履端惟始對越休慶如天斯乆如日斯盛介兹景福永固駿命右殿前登歌三章别有金石晨羲載燿萬物咸覩嘉慶三朝禮樂備舉元正肇始典章暉明萬方畢來賀華裔充皇庭多士盈九位俯仰觀玉聲恂恂俯仰載爛其煇鼓鐘震天區禮容塞皇闈思樂窮休慶福履同所歸五玉既獻三帛是􅏪爾公爾侯鳴玉華殿皇皇聖后降禮南靣元首納嘉禮萬邦同歡願休哉君臣嘉燕建五旗列四縣樂有文禮無倦融皇風窮一變體至和感隂陽徳無不柔繁休祥瑞徽璧應嘉鐘舞靈鳯躍潛龍景星見甘露墜木連理禾同穗𤣥化洽仁澤敷極禎瑞窮靈符懐荒裔綏齊民荷天祐靡不賔靡不賔長世𢎞盛昭明有融繁嘉慶繁嘉慶熈帝載合氣成和蒼生欣戴三靈恊瑞惟新皇代王道四逹流仁布徳窮理詠乾元埀訓順帝則靈化侔四時幽誠通𤣥黙徳澤被八紘乾寧軌萬國皇猷緝咸熈泰禮儀煥帝庭要荒服遐外被髪襲纓冕左袵回衿帶天覆地載流澤汪濊聲教布濩徳光大開元辰畢來王奉貢職朝后皇鳴珩佩觀典章樂王度說徽芳陶盛化游太康丕昭明永克昌惟永初徳丕顯齊七政敷五典彜倫序洪化闡王澤流太平始樹聲教明皇紀和靈祗㳟明祀衍景􅍈膺嘉祉禮有容樂有儀金石陳牙羽施邁武濩均咸池歌南風舞徳稱文武煥頌聲興王道純徳彌淑寧八表康九服道禮讓移風俗移風俗永克融歌盛美造成功詠徽烈邈無窮右食舉歌十章黄鐘太蔟二廂更作黄鐘作晨羲體至和王道開元辰禮有容五曲太蔟作五玉懐荒裔皇猷緝惟永初王道純五曲宋前舞後舞歌二篇王韶之造於赫景明天監是臨樂來伊陽禮作惟隂歌自徳富舞由功深庭列宫縣陛羅瑟琴翿籥繁㑹笙磬諧音簫韶雖古九成在今道志和聲徳音孔宣光我帝基恊靈配乾義形六合化穆自然如彼雲漢為章于天熙熙萬類陶和當年擊轅中韶永世弗騫右前舞歌一章晉正徳之舞㽔賔廂作假樂聖后寔天誕徳積美自中王猷四塞龍飛在天儀刑萬國欽明惟神臨朝淵黙不言之化品物咸徳告成于天銘勲是勒翼翼厥猶娓娓其仁順天剙制因定和神海外有截九圍無塵冕瑬司契埀拱臨民乃舞大豫欽若天人純嘏孔休萬載彌新右後舞歌一章晉大豫之舞㽔賔廂作章廟舞樂歌詞雜歌悉同用太廟詞唯三后别撰殷淡造賔出入奏肅成樂歌詞二章彜承孝典㳟事嚴聖浹天奉賮罄壤齊慶司彜具序羽容夙彰分枝颺烈黼構周張助寳奠軒酎珍充庭璆縣凝㑹涓朱竚聲先期選禮肅若有成祗對靈祉皇慶昭膺尊事威儀暉容昭敘迅㳟神明梁盛牲俎肅肅嚴宫藹藹崇基皇靈降祉百祗具司戒誠望夜端列承朝依微昭旦物色輕宵鴻慶遐鬯嘉􅏪令芳翊帝明徳永祚流光牲出入引牲樂歌詞維誠潔饗維孝奠靈敬芬黍稷敬滌犧牲騂繭在豢載溢載豐以承宗祀以肅皇衷蕭芳四舉華火周傳神監孔昭嘉是柔牷􅏪豆呈毛血奏嘉􅏪樂歌詞肇禋戒祀禮容咸舉六典飾文九司昭序牲柔既昭犧剛既陳㳟滌惟清敬事惟神加籩再御兼俎重􅏪節動軒越聲流金縣奕奕閟幄娓娓嚴闈潔誠夕鑑端服晨暉聖靈戾止翊我皇則上綏四㝢下洋萬國永言孝饗孝饗有容儐僚賛列肅肅雝雝右夕牲歌詞迎神奏韶夏樂歌詞閟宫黝黝復殿㣲㣲璿除肅炤釭璧彤煇黼帟神凝玉堂嚴馨圜火夕燿方水朝清金枝委樹翠鐙竚縣渟波澄宿華漢浮天㳟事既夙䖍心有慕仰降皇靈俯寧依胙皇帝入廟北門奏永至樂歌詞皇明鬯矣孝容以昭鑾華羽迾拂漢涵滈申申嘉夜翊翊休朝行金景送歩玉風韶師承祀則肅對禋祧太祝祼地奏登歌詞二章帝容承祀練時涓日九重徹關四􅂕賔室肅倡函音庶旄委佾休靈告饗嘉􅏪尚芬玉瑚飾列桂簋昭陳具司選禮翼翼振振祼崇祀典酎㳟孝時禮無爽物信靡媿詞精華浮鬯誠監昭通升歌翊節下管調風皇心履變敬明尊親大哉孝徳至矣交神章皇太后神室奏章徳凱容之樂舞歌詞幽瑞浚靈表彰嬪聖翊載徽文敷光崇慶上緯纒祥中維飾詠永屬煇猷聨昌景命昭皇太后神室奏昭徳凱容之樂舞歌詞明帝造表靈躔象纉儀緯風膺華丹燿登瑞紫穹訓形霄宇武彰宸宫騰芬金㑹寫徳聲容宣皇太后神室奏宣徳凱容之樂舞歌詞明帝造天樞凝燿地紐儷煇聯光騰世炳慶翔機薰藹中㝢景纒上㣲玉頌鏤徳金籥傳徽皇帝還東壁受福酒奏嘉時之樂舞詞福􅏪洽福時昌皇聖膺嘉祐帝業凝休祥居極秉景運宅徳瑞中王澄明臨四表精華延八鄉洞海周聲惠徹㝢麗乾光靈慶纒世祉鴻烈永無疆送神奏昭夏之樂舞歌詞二章大孝備盛禮豐神安留嘉樂充旋駕聳汎青穹延八虛闢四空藹流景肅行風昭融教緝風度戀皇靈結深慕解羽縣輟華樹背璿除端玉輅流汪濊慶國歩皇帝詣便殿奏休成之樂歌詞釃醴具登嘉俎咸􅏪饗洽誠陳禮周樂徧祝詞罷祼序容輟縣蹕動端庭鑾回嚴殿神儀駐景華漢亭虛八靈案衛三祗解途翠蓋燿澄罼奕疑震玉鑣息節金輅懐音式誠逺孝底心肅感追憑皇鑒思承淵範神錫懋祉四緯昭明仰福帝徽俯齊庶生宋書卷二十宋書卷二十考證樂志二天郊饗神歌祀皇神祀晉書作禮又保天年年晉書作命地郊饗神歌整泰行行傅鶉觚集作坵一本作圻臣照按祭法瘞埋於泰折祭地也泰折即今地壇故曰整泰折竢皇秪諸本皆誤又照若存終冥冥照傅鶉觚集作昭天地郊夕牲歌表海炳岱文選作炳海表岱又開元首正首正顔延之集作正首迎神歌詩鐘石融諸本鐘下旁注闕字一本作石考謝莊集亦作石今據以補黄帝辭履建宅中㝢司繩御四方臣承蒼按謝荘集建下注宋書作艮御下注宋書作總今諸本竝無作艮作總者盖明代重雕宋書復據荘集改此二字然則諸史傳至今日其失真者固不知凡㡬矣白帝辭浃地奉渥罄宇承秋靈謝莊集秋下注云宋書作帝安臺新福歌曲我功既定我功王粲集作武功窮武篇然後得光大得傅鶉觚集作徳祠征西將軍登歌綏于孫子于傅鶉觚集作予祠潁川府君登歌享祀永年祀晉書作祚祠景皇帝登歌克明克哲臣承蒼按哲有制音與下畏叶祠文皇帝登歌允文文皇臣承蒼按皇疑作祖與下武為韻祠廟饗神歌禮有儀樂有則南本此句下有舞象功歌詠徳神胥樂兮十字歌世祖武皇帝應期登神神一本作禪食舉東西廂樂詩第九章徳洽無疆旁生穆穆生一本作作臣照按書云旁作穆穆迓衡則作字是食舉歌第十章牙羽施牙一本誤干詩崇牙樹羽則牙字是前舞歌義形六合義一本作儀臣承蒼按如義字作儀形字即應作刑宋書卷二十考證
