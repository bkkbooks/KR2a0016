body:
  text: 宋書卷二十四梁沈約撰志第十四天文二晉惠帝元康二年二月天西北大裂按劉向説天裂陽不足地動隂有餘是時人主拱黙婦后専制元康三年四月熒惑守太㣲六十日占曰諸侯三公謀其上必有斬臣一曰天子亡國是春太白守畢至是百餘日占曰有急令之憂一曰相亡又為邊境不安是年鎭嵗太白三星聚于畢􅄧占曰為兵䘮畢􅄧趙地也後賈后陷殺太子趙王廢后又殺之斬張華裴頠遂簒位廢帝為太上皇天下從此遘亂連禍元康五年四月有星孛于奎至軒轅太微經三台大陵占曰奎為魯又為庫兵軒轅為後宮太㣲天子廷三台為三司大陵有積屍死䘮之事眀年武庫火西羌反後五年司空張華遇禍賈后廢死魯公賈謐誅又眀年趙王倫簒位於是三王興兵討倫士民戰死十餘萬人元康六年六月丙午夜有枉矢自斗魁東南行按占曰以亂伐亂北斗主執殺出斗魁居中執殺者不直象也十月太白晝見後趙王殺張裴廢賈后以理太子之寃因自簒盜以至屠滅以亂伐亂兵䘮臣彊之應也元康九年二月熒惑守心占曰王者惡之八月熒惑入羽林占曰禁兵大起後二年惠帝見廢為太上皇俄而三王起兵討倫倫悉遣中軍兵相距累月晉惠帝永康元年三月妖星見南方中台星坼太白晝見占曰妖星出天下大兵將起台星失常三公憂太白晝見為不臣是月賈后殺太子趙王倫尋廢殺后及司空張華又廢帝自立於是三王並起迭總大權永康元年五月熒惑入南斗占曰宰相死兵大起斗又吳分也是時趙王倫為相眀年簒位三王興師誅之太安二年石氷破揚州永康元年八月熒惑入箕占曰人主失位兵起十二月彗出牽牛之西指天市占曰牛者七政始彗出之改元易號之象也天市一名府一名天子禖帝座在其中眀年趙王簒位改元尋為大兵所滅永康二年二月太白出西方逆行入東井占曰國失政臣為亂四月彗星見齊分占曰齊有兵䘮是時齊王冏起兵討趙王倫倫滅冏擁兵不朝專權滛侈眀年誅死晉惠帝永寧元年自正月至于閏月五星互經天星傳曰日陽君道也星隂臣道也日出則星亡臣不得專也晝而星見午上者為經天其占為不臣為更王今五星悉經天天變所未有也石氏説曰辰星晝見其國不亡則大亂是後台鼎方伯互秉大權二帝流亡遂至六夷彊迭據華夏亦載籍所未有也永寧元年五月太白晝見占同前條七月嵗星守虗危占曰木守虗危有兵憂一曰守虗飢守危徭役煩下屈竭辰星入太微占曰為内亂一曰羣臣相殺太白守右掖門占曰為兵為亂賊八月戊午鎭星犯左執法又犯上相占曰上相憂熒惑守昴占曰趙魏有災辰星守輿鬼占曰秦有災九月丁未月犯左角占曰人主憂一曰左將軍死天下有兵二年四月癸酉嵗星晝見占曰為臣彊十月熒惑太白鬭于虗危占曰大兵起破軍殺將虗危又齊分也十二月熒惑襲太白于營室占曰天下兵起亡君之戒一曰易相初齊王冏定京都因留輔政遂專慠無君是月成都河間檄長沙王乂討之冏乂交戰攻焚宮闕冏兵敗夷滅又殺其兄上軍將軍寔以下二十餘人太安二年成都攻長沙於是公私飢困百姓力屈晉惠帝太安二年二月太白入􅄧占曰天下擾兵大起三月彗星見東方指三台占曰兵䘮之象三台為三公七月熒惑入東井占曰兵起國亂是秋太白守太微上將占曰上將將以兵亡是年冬成都河間攻洛陽三年正月東海王越執長沙王乂張方又殺之太安二年八月長沙王奉帝出距二王庚午舎于𤣥武館是日天中裂為二有聲如雷三占同元康臣下專僭之象也是時長沙王擅權後成都河間東海又迭專威命是其應也太安二年十一月辛巳有星晝隕中天北下有聲如雷按占名曰熒首熒首所在下有大兵流血眀年劉淵石勒攻略并州多所殘滅王浚起燕代引鮮卑攻掠鄴中百姓塗地有聲如雷怒之象也太安二年十一月庚辰嵗星入月中占曰國有逐相十二月壬寅太白犯月占曰天下有兵太安三年正月己邜月犯太白占同青龍熒惑入南斗占同永康是月熒惑又犯嵗星占曰有大戰七月左衞將軍陳􅀈率衆奉帝伐成都六軍敗績兵逼乗輿九月王浚又攻成都于鄴鄴潰成都王由是䘮亡帝還洛張方脅如長安是時天下盜賊羣起張昌尤盛後二年惠帝崩晉惠帝永興元年五月客星守畢占曰天子絶嗣一曰大臣有誅七月庚申太白犯角亢經房心歴尾箕九月入南斗占曰犯角天下大戰犯亢有大兵人君憂入房心為兵䘮犯尾將軍與民人為變犯箕女主憂一曰天下亂入南斗有兵䘮一曰將軍為亂其所犯守又兖豫幽冀揚州之分也是年七月蕩隂之役九月王浚殺幽州刺史和演攻鄴鄴潰於是兖豫為天下兵衝陳敏又亂揚土劉淵石勒李雄等並起微賤跨有州郡皇后羊氏數被幽廢光熙元年惠帝崩終無繼嗣永興元年七月乙丑星隕有聲二年十月星又隕有聲按劉向説民去其土之象也是後遂亡中夏永興元年十二月壬寅夜赤氣亘天砰隱有聲二年十月丁丑赤氣見在北方東西竟天占曰並為大兵砰隱有聲怒之象也是後四海雲􅅰九服交兵永興二年四月丙子太白犯狼星占曰大兵起九月嵗星守東井占曰有兵井又秦分也是年茍晞破公師蕃張方破范陽王虓闗西諸將攻河間王顒顒奔走東海王迎殺之永興二年八月星孛于􅄧畢占曰為兵䘮昴畢又趙魏分也十月丁丑有星孛于北斗占曰璿璣更授天子出走又曰彊國發兵諸侯爭權是後皆有其應眀年惠帝崩晉惠帝光熙元年四月太白失行自翼入尾箕占曰太白失行而北是謂返生不有破軍必有屠城五月汲桑攻鄴魏郡太守馮嵩出戰大敗桑遂害東燕王騰殺萬餘人焚燒魏時宮室皆盡光熙元年五月枉矢西南流占曰以亂伐亂之象也是時司馬越西破河間奉迎大駕尋收繆𦙍何綏等肆其無君之心天下惡之死而石勒焚其屍柩是其應也光熙元年九月丁未熒惑守心占曰王者惡之己亥填星守房心又犯嵗星占曰土守房多禍䘮守心國内亂天下赦又曰填與嵗合為内亂是時司馬越秉權終以無禮破滅内亂之應也十一月惠帝崩懐帝即位大赦天下光熙元年十二月癸未太白犯填星占曰為内兵有大戰是後河間王為東海王越所殺眀年正月東海王越殺諸葛玫等五月汲桑破馮嵩殺東燕王八月茍晞大破汲桑光熙元年十二月甲申有白氣若虹中天北下至地夜見五日乃滅占曰大兵起眀年王彌起青徐汲桑亂河北毒流天下孝懐帝永嘉元年九月辛卯有大星自西南流于東北小者如升相隨天盡赤聲如雷占曰流星為貴使是年五月汲桑殺東燕王騰遂據河北十一月始遣和郁為征北將軍鎮鄴而田甄等大破汲桑斬于樂陵於是以甄為汲郡太守弟蘭鉅鹿大守小星相隨小將别帥之象也司馬越忿魏郡以東平原南皆黨於桑悉以賞甄等於是侵略赤地有聲如雷怒之象也永嘉元年十二月丁亥星流霞散案劉向説天官列宿在位之象小星無名者庶民之類此百官庶民將流散之象也是後天下大亂百官萬民流移轉死矣永嘉二年正月庚午太白伏不見二月庚子始晨見東方是謂當見不見占同上條其後破軍殺將不可勝數帝崩虜庭中夏淪覆永嘉三年正月庚子熒惑犯紫㣲占曰當有野死之王又為火燒宮是時太史令髙堂沖奏乗輿宜遷幸不然必無洛陽五年六月劉曜王彌入京都燒宮廟帝崩于平陽永嘉三年鎮星久守南斗占曰鎮星所居者其國有福是時安東琅邪王始有揚土其年十一月地動陳卓以為是地動應也永嘉三年十二月乙亥有白氣如帶出東南北方各二起地至天貫参伐占曰天下大兵起四年三月司馬越收繆𦙍繆播等又三方雲擾攻戰不休五年三月司馬越死於寗平城石勒攻破其衆死者十餘萬人六月京都焚滅帝刼虜庭永嘉五年十月熒惑守心後二年帝崩于虜庭永嘉六年七月熒惑嵗星填星太白聚牛女之間裴回進退按占曰牛揚州分是後兩都傾覆而元帝中興揚土是其應也愍帝建武元年五月癸未太白熒惑合於東井占曰金火合曰爍為䘮是時帝雖刼于平陽天下猶未敢居其虗位災在帝也六月丁卯太白犯太㣲占曰兵入天子廷王者惡之七月愍帝崩于㓂庭天下行服大臨晉元帝大興元年七月太白犯南斗占曰吳越有兵大人憂二年二月甲申熒惑犯東井占曰兵起貴臣相戮八月己夘太白犯軒轅大星占曰後宮憂乙未太白犯嵗星在翼占曰為兵亂三年四月壬辰枉矢出虗危沒翼軫占曰枉矢所觸天下之所伐翼軫荆州之分也五月戊子太白入太微又犯上將占曰天子自將上將誅六月丙辰太白與嵗星合于房占曰為兵饑九月太白犯南斗占同元年十月己亥熒惑在東井居五諸侯南踟蹰留止積三十日占曰熒惑守井二十日以上大人憂守五諸侯諸侯有誅者十二月己未太白入月在斗郭景純曰月屬坎隂府法家也太白金行而来犯之天意若曰刑理失中自毁其法也四年十二月丁亥月犯嵗星在房占曰其國兵饑民流亡永昌元年三月王敦率江荆之衆来攻京都六軍距戰敗績於是殺䕶軍將軍周顗尚書令刁協驃騎將軍劉隗出奔四月又殺湘州刺史譙王承鎭南將軍甘卓閏十二月元帝崩間一年敦亦梟夷枉矢觸翼之應也十月石他入豫州略城父鉅二縣民以北刺史祖約遣軍追之為其所沒遂退守夀春眀帝大寧三年正月熒惑逆行入太微占曰為兵䘮王者惡之閏八月帝崩咸和二年蘇峻反攻宮室太后以憂逼崩天子幽刼于石頭逺近兵亂至四年乃息成帝咸和四年七月有星孛于西北二十三日滅占曰為兵亂十二月郭黙殺江州刺史劉𦙍荆州刺史陶侃討黙眀年斬之是時石勒又始僭號咸和六年正月丙辰月入南斗占曰有兵一曰有大赦是月胡賊殺略婁武進二縣民於是遣戍中洲眀年胡賊又略南沙海虞民是年正月大赦伐淮南討襄陽平之咸和六年十一月熒惑守胃昴占曰趙魏有兵八年七月石勒死石虎自立多所殘滅是時雖勒虎僭號而其强弱常占於􅄧不闗太㣲紫宮也咸和八年三月己巳月入南斗與六年占同其年七月石勒死彭彪以譙石生以長安郭權以秦州並歸從於是遣督䕶髙球率衆救彪彪敗球退又石虎石斌攻滅生權咸康元年正月大赦咸和八年七月熒惑入􅄧占曰胡王死石虎多所攻滅八月月犯昴占曰胡不安九年六月月又犯􅄧是時石𢎞雖襲勒位而石虎擅威暴横十月廢𢎞自立遂幽殺之咸和九年三月己亥熒惑入輿鬼犯積屍占曰兵在西北有沒軍死將四月鎮西將軍雍州刺史郭權始以秦州歸從尋為石斌所滅徙其衆於青徐晉成帝咸康元年二月己亥太白犯􅄧占曰兵起嵗大旱四月石虎掠騎至歴陽朝廷慮其衆也加司徒王導大司馬治兵動衆又遣慈湖牛渚蕪湖三戍五月乃罷是時胡賊又圍襄陽征西將軍庾亮遣寧距退之六月旱咸康元年八月戊辰熒惑入東井占曰無兵兵起有兵兵止是年夏發衆列戍加王導大司馬以備胡賊咸康元年三月丙戌月入􅄧占曰胡王死十一月月犯􅄧二年八月月又犯􅄧占同咸和三年石虎發衆七萬四年二月自襲叚遼于薊遼奔敗又攻慕容皝於棘城不尅引退皝追之殺數百人虎留其將麻秋屯令支皝破秋并虜遼殺之咸康二年正月辛巳彗星夕見西方在奎占曰為兵䘮奎又為邊兵四年石虎伐慕容皝不尅皝追擊之又破麻秋時皝稱蕃邊兵之應也咸康二年正月辛夘月犯房南第二星占曰將相有憂五年七月丞相王導薨八月太尉郗鑒薨六年征西大將軍庾亮薨咸康二年九月庚寅太白犯南斗因晝見占曰斗為宰相又揚州分金犯之死䘮象晝見為不臣又為兵䘮三年石虎僭稱天王四年虎滅叚遼而敗於慕容皝皝國蕃臣五年王導薨咸康三年六月辛未有流星大如二斗魁色青赤光耀地出奎中沒婁北案占為飢五穀不藏是月大旱咸康三年八月熒惑入輿鬼犯積屍占曰貴人憂三年八月甲戍月犯東井距星占曰國有憂將死三年九月戊子月犯建星占曰易相一曰大將死五年丞相王導薨庾冰代輔政太尉郗鑒征西大將軍庾亮薨咸康三年十一月乙丑太白犯嵗星占曰為兵飢四年二月石虎破幽州遷其人萬餘家李夀殺李期五年胡衆五萬宼沔南略七千餘家而去又騎二萬圍陷邾城殺略五千餘人咸康四年四月己巳太白晝見在栁占曰為兵為不臣七月乙巳月掩太白占曰王者亡地大兵起眀年胡賊大宼沔南陷邾城豫州刺史毛寳西陽太守樊悛皆棄城投江死於是内外戒嚴左衞桓監匡術等諸軍至武昌乃退七年慕容皝自稱為燕王咸康四年五月戊午熒惑犯右執法占曰大臣死執政者憂九月太白犯右執法案占五星災同金火尤甚十一月戊子太白犯房上星占曰上相憂五年七月己酉月犯房上星亦同占是月庚申丞相王導薨咸康五年四月辛未月犯嵗星在胃占曰國飢民流乙未月犯畢距星占曰兵起是夜月又犯嵗星在􅄧及冬有沔南邾城之敗百姓流亡萬餘家咸康六年二月庚午朔流星大如斗光耀地出天市西行入太㣲占曰大人當之乙未太白入月占曰人主死四月甲子月犯太白占曰人主惡之八年六月成帝崩咸康六年三月甲寅熒惑從行犯太㣲上將星占曰上將憂四月丁丑熒惑犯右執法占曰執法者憂六月乙亥月犯牽牛中央星占曰大將憂是時尚書令何充為執法有譴欲避其咎明年求為中書令建元二年庾冰薨皆大將執政之應也是嵗正月征西將軍庾亮薨三月而熒惑犯上將九月石虎大將䕫安死庾冰後積年方薨豈冰能修徳移禍於䕫安乎咸康六年四月丙午太白犯畢距星占曰兵革起一曰女主憂六月乙夘太白犯軒轅大星占曰女主憂七年三月皇后杜氏崩咸康七年三月壬午月犯房占曰將相憂八年六月熒惑犯房上第二星占曰次相憂建元二年車騎將軍江州刺史庾冰薨是時驃騎將軍何充居内冰為次相也咸康七年四月己丑太白入輿鬼占曰兵革起五月太白晝見以晷度推之非秦魏則椘也占曰為臣彊為有兵八月辛丑月犯輿鬼占曰人主憂八年六月成帝崩咸康八年八月壬寅月犯畢赤星占曰下犯上兵革起十月月又掩畢赤星占同己酉太白犯熒惑占曰大兵起其後庾翼大發兵謀伐胡專制上流朝廷憚之康帝建元元年正月壬午太白入􅄧占曰趙地有兵又曰天下兵起四月乙酉太白晝見八月丁未太白犯嵗星占曰有大兵是年石虎殺其太子遂及其妻子徒屬二百餘人又遣將劉寧宼沒狄道又使將張舉將萬餘人屯薊東謀慕容皝建元元年十一月六日彗星見亢長七尺尾白色占曰亢為朝廷主兵䘮二年九月康帝崩建元元年嵗星犯天闗安西將軍庾翼與兄冰書曰嵗星犯天闗占云闗梁當澁比来江東無他故江道亦不艱難而石虎頻年再閉闗不通信使此復是天公憒憒無皂白之徴也建元二年閏月乙酉太白犯斗占曰為䘮天下受爵禄九月康帝崩太子立大赦賜爵也晉穆帝永和元年正月丁丑月入畢占曰兵大起戊寅月犯天闗占曰有亂臣更天子之法五月辛巳太白晝見在東井占曰為臣彊秦有兵六月辛丑入太㣲犯屏西南占曰輔臣有免罷者七八月月皆犯畢占同正月己未月犯輿鬼占曰大臣有誅九月庚戍月又犯畢是年初庾翼在襄陽七月翼疾將終輙以子爰之爲荆州刺史代己任爰之尋被廢眀年桓温又輙率衆伐蜀執李勢送至京都蜀本秦地也永和二年二月壬子月犯房上星四月丙戍月又犯房上星占同前八月壬申太白犯左執法是嵗司徒蔡謨被廢永和三年正月壬午月犯南斗第五星占曰將軍死近臣去五月壬申月犯南斗第四星因入魁占曰有兵一曰大赦六月月犯東井距星占曰將死國有憂戊戍月犯五諸侯占曰諸侯有誅九月庚寅太白犯南斗第五星占曰為䘮兵四年七月丙申太白犯左執法甲寅月犯房丁巳月入南斗犯第二星乙丑太白犯左執法占悉同上十月甲戍月犯亢占曰兵起軍將死十一月戊戌犯上將星三年六月大赦是月陳逹征夀春敗而還七月氐蜀餘宼反亂益土九月石虎伐涼州不克永和四年四月太白入􅄧五月熒惑入婁犯鎮星七月太白犯軒轅占在趙及為兵䘮女主憂其年八月石虎太子宣殺弟韜宣亦死五年正月石虎僭稱皇帝尋病死是年褚裒北伐䘮衆又尋薨太后素服六年正月朝㑹廢樂永和五年四月丁未太白犯東井占曰秦有兵九月戊戌太白犯左角占曰為兵十月月犯􅄧占曰朝廷有憂軍將死十一月乙夘彗星見于亢芒西向白長一丈占曰為兵䘮是年八月褚裒北征兵敗十月闗中二十餘壁舉兵歸從石遇攻沒南陽十一月冉閔殺石遵又盡殺胡十餘萬人於是中土大亂十二月褚裒薨八年劉顯苻健慕容儁並僭號殷浩北伐敗見廢永和六年二月辛酉月犯心大星占曰大人憂心豫州分也丁丑月犯房占曰將相憂三月戊戌熒惑犯嵗星占曰為戰六月己丑月犯􅄧占同上乙未月犯五諸侯占同三年七月壬寅月始出西方犯左角占曰大將軍死一曰天下有兵丁未月犯箕占曰軍將死丙寅熒惑犯鉞星占曰大臣有誅八月辛夘月犯左角太白晝見在南斗月犯右執法占並同上七年二月太白犯􅄧占同上乙夘熒惑輿鬼犯積屍占曰貴人憂五月乙未熒惑犯軒轅太白占曰女主憂太白入畢口犯左股占曰將相當之六月乙亥月犯箕丙子月犯斗丁丑熒惑入太㣲犯右執法八月庚午太白犯軒轅戊子太白犯右執法占悉同上七年劉顯殺石祗及諸胡帥中土大亂戎晉十萬數各還舊土互相侵略及病疫死亡䏻達者十二三是年桓温輙以大衆求浮江入淮北伐朝廷震懼八年豫州刺史謝尚討張遇為苻雄所敗殷浩北伐敗被廢十年桓温伐苻徤不克而還永和八年三月戊戌月犯軒轅大星癸丑月入南斗犯第二星五月月犯心星四月癸酉月犯房六月辛巳日未入有流星如三斗魁從辰巳上東南行晷度推之在箕斗之間葢燕分也案占為營首營首之下流血滂沲七月壬子歲星犯東井距星占曰内亂兵起八月戊戌熒惑入輿鬼占曰忠臣戮死丙辰太白入南斗犯第四星占曰將為亂一曰丞相免九年二月乙巳月入南斗犯第三星三月戊辰月犯房八月歲星犯輿鬼東南星占東南星主兵兵起十二月月在東井犯歲星占曰秦飢民流是時帝主㓜冲母后稱制將相有隙兵革連起慕容儁僭稱大燕攻伐無已故災異數見殷浩見廢也永和十年正月乙卯月食昴占曰趙魏有兵癸酉鎮星奄鉞星占曰斧鉞用二月甲申月犯心大星占曰王者惡之四月癸未流星大如斗色赤黄出織女沒造父有聲如雷占曰燕齊有兵民流戊午月犯心大星七月庚午太白晝見晷度推之災在秦鄭九月辛酉太白犯左執法十一月月奄填星在輿鬼占曰秦有兵十一年三月辛亥月奄軒轅占同上四月庚寅月犯牛宿南星占曰國有憂八月己未太白犯天江占曰河津不通十二年六月庚子太白晝見在東井占如上己未月犯鉞星七月丁夘太白犯填星在栁占曰周地有大兵八月癸酉月奄建星九月戊寅熒惑入太㣲犯西蕃上將星十一月丁丑熒惑犯太㣲東蕃上相十年四月桓温伐苻健破其堯栁衆軍健壁長安温退十二月慕容恪攻齊十二年八月桓温破姚萇於伊水定周地十一月齊城陷執叚龕殺三千餘人永和末鮮卑侵略河冀升平元年慕容儁遂據臨漳盡有幽并青冀之地緣河諸將漸奔散河津隔絶矣三年㑹稽王以郗曇謝萬敗績求自貶三等是時權在方伯九服交兵故譴象仍見晉穆帝升平元年四月壬子太白入輿鬼丁亥月奄東井南轅西頭第二星占曰秦地有兵一曰將死六月戊戍太白晝見在軫占同上軫椘分也壬子月犯畢占曰為邊兵七月辛巳熒惑犯天江占曰河津不通十一月嵗星犯房壬午月奄嵗星在房占曰民飢一曰豫州有災二年二月辛夘填星犯軒轅大星甲午月犯東井閏月乙亥月犯嵗星在房占悉同上五月丁亥彗出天船在胃度中彗為兵䘮除舊布新出天船外夷陵一曰為大水六月辛酉月犯房八月戊午熒惑犯填星在張占曰兵大起張三河分十月己未太白犯哭星十二月枉矢自東南流于西北其長半天三年正月壬辰熒惑犯楗閉案占人主憂三月乙酉熒惑逆行犯鉤鈴案占王者惡之月犯太白在􅄧占曰人君死一曰趙地有兵朝廷不安六月太白犯東井七月乙酉熒惑犯天江丙戍太白犯輿鬼占悉同上戊子月犯牽牛中央大星占曰牽牛天將也犯中央星大將軍死八月丁未太白犯軒轅大星甲子月犯畢大星占曰為邊兵一曰下犯上庚午太白犯填星在太㣲中占曰王者惡之二年五月闗中氐帥殺苻生立堅十二月慕容儁入屯鄴八月安西將軍豫州刺史謝奕薨三年十月諸葛攸舟軍入河敗績豫州刺史謝萬入潁衆潰而歸除名為民十一月司徒㑹稽王以二鎮敗求自貶三等四年正月慕容俊死子暐代立慕容殺其尚書令陽騖等五月天下大水五年五月穆帝崩升平四年正月乙亥月犯牽牛中央大星占曰大將死六月辛亥辰星犯軒轅占曰女主憂己未太白入太㣲右掖門從端門出占曰貴奪勢一曰有兵又曰出端門臣不臣八月戊申太白犯氐占曰國有憂丙辰熒惑犯太㣲西上將九月壬午太白入南斗口犯第四星占曰為䘮有赦天下受爵祿十月庚戍天狗見西占曰有大兵血流十二月甲寅熒惑犯房丙寅太白晝見庚寅月犯楗閉占曰人君惡之五年正月乙巳填星逆行犯太㣲乙丑辰時月在危宿奄太白占曰天下民靡散三月丁未月犯填星在軫占曰為大䘮五月壬寅月犯太㣲庚戍月犯建星占曰大臣相譖辛亥月犯牽牛宿占曰國有憂五年正月北中郎將郗曇薨五月穆帝崩哀帝立大赦賜爵褚后失勢七月慕容恪攻兾州刺史呂䕶於野王拔之䕶奔滎陽是時桓温以大衆次宛聞䕶敗乃退升平五年六月癸酉月奄氐東北星占曰大將當之九月乙酉奄畢占曰有邊兵十月丁夘熒惑犯嵗星在營室占曰大臣有匿謀一曰衞地有兵丁未月犯畢赤星占曰下犯上又曰有邊兵八月范汪廢隆和元年慕容暐遣傅末波宼河隂陳祐危逼晉哀帝興寧元年八月星孛大角亢入天市按占為兵䘮三年正月皇后王氏崩二月哀帝崩三月慕容恪攻洛陽沈勁等戰死興寧元年十月丙戍月奄太白在須女占曰天下民靡散一曰災在揚州三年洛陽沒其後桓温傾揚州資實討鮮卑敗績死亡太半及征袁眞淮南殘破後氐及東胡侵逼兵役無已興寧三年正月乙夘月奄嵗星在参参益州分也六月鎮西將軍益州刺史周撫薨十月梁州刺史司馬勲入益州以叛朱序率衆助刺史周楚討平之興寧三年七月庚戍月犯南斗占曰女主憂嵗星犯輿鬼占曰人君憂十月太白晝見在亢占曰亢為朝廷有兵䘮為臣彊哀帝是年二月崩其災皆在海西也眀年五月皇后庾氏崩晉海西太和元年二月丙子月奄熒惑在参占曰為内亂一曰参魏地二年正月太白入􅄧五年慕容暐為苻堅所滅司兾幽并四州並屬氐太和二年八月戊午太白犯嵗星在太㣲三年六月甲寅太白奄熒惑在太㣲端門中六年海西公廢太和四年二月客星見紫宮西垣至七月乃滅占曰客星守紫宮臣殺主閏月乙亥月暈軫復有白暈貫月北暈斗柄三星占曰王者惡之六年桓温廢帝太和四年十月壬申有大流星西下聲如雷案占流星為貴使星大者使大眀年遣使免袁眞為庶人桓温征夀春眞病死息瑾代立求救於苻堅温破氐軍六年夀春城陷聲如雷將士怒之象也太和六年閏月熒惑守太㣲端門占曰天子亡國又曰諸侯三公謀其上一曰有斬臣辛夘月犯心大星占曰王者惡之十一月桓温廢帝并奏誅武陵王簡文不許温乃徙之新安宋書卷二十四宋書卷二十四考證天文志二按占名曰熒首熒首所在下有大兵流血臣永祚按宋史天文志營頭星所墜下有覆軍流血營頭即熒首也永昌元年三月王敦率江荆之衆監本誤提起另為一行今改正桓温伐苻健破其堯栁衆軍堯晉書作嶢宋書卷二十四考證
