body:
  text: 宋書卷二十八梁沈約撰志第十八符瑞中麒麟者仁獸也牡曰麒牝曰麟不刳胎剖卵則至􅍪身而牛尾狼項而一角黄色而馬足含仁而戴義音中鍾呂歩中規矩不踐生虫不折生草不食不義不飲洿池不入坑穽不行羅網明王動静有儀則見牡鳴曰逝聖牝鳴曰歸和春鳴曰扶幼夏鳴曰養綏漢武帝元狩元年十月行幸雍祠五畤獲白麟漢武帝太始二年三月獲白麟漢章帝元和二年以来至章和元年凡三年麒麟五十一見郡國漢安帝延光三年七月麒麟見潁川陽翟延光三年八月戊子麒麟見潁川陽翟延光四年正月壬午麒麟見東郡濮陽漢獻帝延康元年麒麟十見郡國吳孫權赤烏元年八月武昌言麒麟見又白麟見建業晉武帝泰始元年十二月麒麟見南郡枝江晉武帝咸寧五年二月甲午白麟見平原鬲縣咸寧五年九月甲午麒麟見河南陽城晉武帝太康元年四月白麟見頓丘晉愍帝建興二年九月丙戌麒麟見襄平州刺史崔毖以聞晉元帝大興元年正月戊子麒麟見豫章晉成帝咸和八年五月己己麒麟見遼東鳳凰者仁鳥也不刳胎剖卵則至或翔或集雄曰鳯雌曰凰蛇頭燕頷龜背鼈腹鶴頸雞喙鴻前魚尾青首駢翼鷺立而鴛鴦思首戴徳而背負仁項荷義而膺抱信足履正而尾繫武小音中鍾大音中鼓延頸奮翼五光備舉興八風降時雨食有節飲有儀往有文来有嘉遊必擇地飲不妄下其鳴雄曰節節雌曰足足晨鳴曰發明晝鳴曰上朔夕鳴曰歸昌昬鳴曰固常夜鳴曰保長其樂也徘徘徊徊雍雍喈喈唯鳯凰為能究萬物通天祉象百状達王道率五音成九徳備文武正下國故得鳳之象一則過之二則翔之三則集之四則春秋居之五則終身居之漢昭帝始元三年十月鳳凰集東海遣使祠其處漢宣帝夲始元年五月鳯凰集膠東夲始四年五月鳳凰集北海漢宣帝地節二年四月鳳凰集魯羣鳥從之漢宣帝元康元年三月鳯凰集泰山陳留元康四年南郡獲威鳯漢宣帝神雀二年二月鳳凰集京師羣鳥從之以萬數神雀四年春鳳凰集京師神雀四年十月鳳凰十一集杜陵神雀四年十二月鳳凰集上林漢宣帝甘露三年二月鳳凰集新蔡羣鳥四面行列皆向鳳凰立以萬數漢光武建武十七年十月鳳凰五髙八九尺毛羽五采集潁川郡羣鳥並從行列蓋地數頃留十七日乃去漢章帝元和二年以来至章和元年凡三年鳳凰百三十九見郡國漢安帝延光三年二月車駕東巡其月戊子鳳凰集濟南臺縣丞霍収舍樹上賜臺長嶷帛十五匹収二十匹尉半之吏卒人三匹鳳凰所過亭部無出今年田租賜男子爵人二級延光三年十月壬午鳳凰集京兆新豐西界槐樹漢桓帝元嘉元年十一月鳳凰見濟隂巳氏漢靈帝光和四年秋五色大鳥見新城羣鳥隨之民皆謂之鳳凰漢獻帝延康元年八月石邑縣言鳳凰集又郡國十三言鳳凰見吳孫權黄武五年七月蒼梧言鳳凰見孫權黄龍元年四月樊口武昌並言鳳凰見吳孫亮建興二年十一月大鳥五見於春申吳孫皓寳鼎四年正月西苑言鳳凰集晉武帝泰始元年十二月鳳凰見上黨髙都泰始元年十二月鳳凰二見河南山陽泰始元年十二月鳳凰三見馮翊下邽晉穆帝升平四年二月辛亥鳳凰将九子見鄖鄉之豐城十二月甲子又見豐城衆鳥隨従升平五年四月己未鳳凰集沔北至於辛酉百姓聚觀之宋武帝永初元年七月戊戌鳳凰見會稽山隂文帝元嘉十四年三月丙申大鳥二集秣陵民王顗園中李樹上大如孔雀頭足小髙毛羽鮮明文采五色聲音諧從衆鳥如山雞者隨之如行三十歩頃東南飛去揚州刺史彭城王義康以聞改鳥所集永昌里曰鳳凰里孝武帝孝建元年正月庚申鳳凰見丹徒渇賢亭䨇鵠為引衆鳥陪從征虜将軍武昌王渾以聞神鳥者赤神之精也知音聲清濁和調者也雖赤色而備五采雞身鳴中五音肅肅雝雝喜則鳴舞樂處幽隐風俗從則至漢宣帝五鳳三年三月辛丑神鳥集長樂宫東闗樹上又飛下地五采炳發留十餘刻漢章帝元和中神鳥見郡國黄龍者四龍之長也不漉池而漁徳至淵泉則黄龍游於池能髙能下能細能大能幽能㝠能短能長乍存乍亡赤龍河圖者地之符也王者徳至淵泉則河出龍圖漢恵帝二年正月癸酉兩龍見蘭陵人家井中漢文帝十五年春黄龍見成紀漢宣帝甘露元年四月黄龍見新豐漢成帝鴻嘉元年冬黄龍見真定漢成帝永始二年癸未黄龍見東莱漢光武建武十二年六月黄龍見東阿漢章帝元年以来至章和元年凡三年黄龍四十四見郡國元和中青龍見郡國元和中白龍見郡國漢安帝延光元年八月辛卯黄龍見九真延光三年九月辛亥黄龍見濟南歴城延光三年十二月乙未黄龍見琅邪諸縣延光四年正月壬午黄龍二見東郡濮陽漢桓帝建和元年二月黄龍見沛國譙漢桓帝元嘉二年八月黄龍見濟隂句陽又見金城允街漢桓帝永光元年八月黄龍見巴郡漢獻帝延康元年三月黄龍見譙又郡國十三言黄龍見魏明帝景初元年二月壬辰山茌縣言黄龍見蜀魏明帝青龍元年正月甲申青龍見郟之摩陂井帝親與羣臣共觀之既而詔畫工圖寫龍潛而不見魏少帝正元元年十月戊戌黄龍見鄴井中魏少帝甘露元年正月辛丑青龍見軹縣井中凡二甘露元年六月青龍見元城縣界井中甘露二年二月青龍見温縣井中甘露三年八月甲戌黄龍青龍仍見頓丘冠軍陽夏縣井中甘露四年正月黄龍二見寧陵縣井中魏元帝景元元年十二月甲申黄龍見莘縣井中景元三年二月青龍見軹縣井中劉備未即位前黄龍見武陽赤水九日乃去吳孫權黄武元年三月鄱陽言黄龍見吳孫權黄龍元年四月樊口武昌並言黄龍見權因此改元作黄龍牙常在軍中進退視其所向命胡綜為賦吳孫權赤烏五年三月海鹽縣言黄龍見縣井中二赤烏十一年雲陽言黄龍見黄龍二又見武陵吳夀光色炫燿吳孫休永安四年九月市山言白龍見永安五年七月始新言黄龍見永安六年四月泉陵言黄龍見晉武帝泰始元年十二月青龍二見濟隂定陶泰始元年十二月青龍見魏郡湯隂泰始元年十二月黄龍見河南洛陽洛濱泰始元年十二月白龍二見太原祁泰始二年七月壬午黄龍見巴西閬中泰始三年四月戊午有司奏張掖太守焦勝言氐池縣大栁谷口青龍見晉武帝咸寧二年六月丙申白龍二見於新興九原居民井中咸寧二年十月庚午黄龍二見於漢嘉靈闗咸寧二年十一月癸巳白龍二見湏度支部咸寧五年十一月甲寅青龍見京兆霸城晉武帝太康元年八月白龍三見太康三年閠月己丑白龍二見濟南歴城太康五年正月癸卯青龍二見武庫井中帝親往觀之太康六年九月白龍見京兆隂槃太康九年十二月戊申青龍一見魯國公丘居民井中晉恵帝元康七年三月己酉朔成臯縣獄有龍昇天宋武帝永初元年七月青龍見義興陽羡永初元年八月青龍二見南郡江陵文帝元嘉十三年九月己酉㑹稽郡西南向曉忽大光明有青龍騰躍凌雲久而後滅吳興諸處並以其日同見光景揚州刺史彭城王義康以聞元嘉二十一年十月己丑永嘉永寧見黄龍自雲而下太守臧藝以聞元嘉二十五年五月丁丑黒龍見𤣥武湖北苑丞王世宗以聞元嘉二十五年五月戊戌黒龍見𤣥武湖東北隈揚州野吏張立之以聞元嘉二十五年八月辛亥黄龍見㑹稽太守孟顗以聞元嘉二十五年廣陵有龍自湖水中升天百姓皆見孝武帝孝建二年七月癸丑黄龍見石頭城外水濵中護軍湘東王諱以聞孝建三年五月己未龍見臨川郡江州刺史東海王禕以聞孝武大明元年五月癸亥黒龍見晉陵占石邨改邨為津里靈龜者神龜也王者徳澤湛清漁獵山川從時則出五色鮮明三百嵗游於蕖葉之上三千嵗常游於卷耳之上知存亡明於吉凶禹卑宫室靈龜見𤣥龜書者天符也王者徳至淵泉則雒出龜書魏文帝初神龜出於靈池吳孫權時靈龜出㑹稽章安魏元帝咸熙二年二月甲辰朐䏰縣獲靈龜以獻晉長沙王乂坐同產兄楚王瑋事徙封常山後還復國在常山穿井入地四丈得白玉方三四尺玉下有大石其中有龜長二尺餘時人以為復國之祥宋文帝元嘉十九年四月戊申白龜見吳興餘杭太守文道恩以獻元嘉二十年四月辛卯白龜見吳興餘杭揚州刺史始興王濬以聞元嘉二十四年十月甲午揚州刺史始興王濬獲白龜以獻孝武帝大明三年三月戊子毛龜見宣城廣徳太守張辨以獻大明四年六月壬寅車駕幸耤田白龜見於千畝尚書右僕射劉秀之以獻大明七年八月乙未毛龜見新安王子鸞第獲以獻明帝泰始二年八月丙辰朔四眼龜見㑹稽㑹稽太守巴陵王休若以獻泰始二年八月丙寅六眼龜見東陽長山文如爻卦太守劉勰以獻泰始六年九月己巳八眼龜見吳興故鄣太守褚淵以獻明帝泰豫元年十月壬戌義興陽羡縣獲毛龜太守王藴以獻龍馬者仁馬也河水之精髙八尺五寸長頸有翼傍有垂毛鳴聲九哀一作音騰黄者神馬也其色黄王者徳御四方則出白馬朱鬛王者任賢良則見澤馬者王者勞来百姓則至夏馬駵黒身白鬛尾殷馬駱白身黒鬛尾周馬騂赤身黒鬛尾漢章帝元和中神馬見郡國晉懐帝永嘉六年二月壬子神馬鳴南城門晉孝武帝太元十四年六月甲申朔寧州刺史費統上言所統晉寧之滇池縣舊有河水周回二百餘里六月二十八日辛亥神馬二匹一白一黒忽出於河中去岸百歩縣民董聰見之白象者人君自養有節則至宋文帝元嘉元年十二月丙辰白象見零陵洮陽元嘉六年三月丁亥白象見安成安復江州刺史南譙王義宣以聞漢武帝元狩二年三月南越獻馴象白狐王者仁智則至晉成帝咸康八年十月燕王慕容皝上言白狢見國内赤熊佞人逺姦猾息則入國宋文帝元嘉二十年十二月白熊見新安歙縣太守到元度以獻九尾狐文王得之東夷歸焉漢章帝元和中九尾狐見郡國魏文帝黄初元年十一月甲午九尾狐見甄城又見譙白鹿王者明恵及下則至漢章帝建初七年十月車駕西廵得白鹿於臨平觀漢章帝元和中白鹿見郡國漢安帝延光三年六月辛未白鹿見右扶風雝延光三年七月白鹿見左馮翊漢桓帝永興元年二月白鹿見張掖魏文帝黄初元年郡國十九言白鹿及白麋見晉武帝泰始八年十月白鹿見扶風雝州刺史嚴詢獲以獻晉武帝太康元年三月白鹿見零陵泉陵太康元年五月甲辰白鹿見天水西縣太守劉辛獲以獻太康三年七月壬子白鹿見零陵零陵令蒋微獲以獻晉恵帝元康元年九月乙酉白鹿見交趾武寧晉愍帝建武元年五月戊子白鹿見髙山縣晉元帝太興三年正月白鹿二見豫章太興三年四月白鹿見晉陵延陵晉元帝永昌元年九月白鹿見江乘縣晉成帝咸和四年五月甲子白鹿見零陵洮陽獲以獻咸和四年七月壬寅長沙郡邏吏黄光於南郡道遇白鹿驅之不去直来就光追尋光二百餘歩光遂抱取遣吏李堅奉獻咸和九年八月己未白鹿見長沙臨湘晉成帝咸康二年七月白鹿見豫章望蔡太守桓景獲以獻晉孝武太元十六年三月癸酉白鹿見豫章望蔡獲以獻太元十八年五月辛酉白鹿見江乘江乘令田熙之獲以獻太元二十年九月丁丑白鹿見巴陵清水山荆州刺史殷仲堪以獻晉安帝隆安五年十一月白鹿見長沙荆州刺史桓𤣥以聞宋文帝元嘉五年七月丙戌白鹿見東莞莒縣岣峨山太守劉𤣥以聞元嘉九年正月白鹿見南譙譙縣豫州刺史長沙王義欣以獻元嘉十四年白鹿見文鄉元嘉十七年五月甲午白鹿見南汝隂宋縣太守文道恩以獻元嘉二十年八月白鹿見譙郡蘄縣太守鄧琬以獻元嘉二十二年二月白鹿見建康縣揚州刺