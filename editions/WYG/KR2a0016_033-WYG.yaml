body:
  text: 宋書卷三十三梁沈約撰志第二十三五行四五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下謂水失其性而為災也又曰聽之不聰是謂不謀厥罰恒寒厥極貧時則有鼔妖時則有豕禍時則有魚孽時則有耳痾時則有黑𤯝黑祥惟火沴水魚孽劉歆傳以為介蟲之孽謂蝗屬也水不潤下魏文帝黄初四年六月大雨霖伊洛溢至津陽城門漂數千家流殺人初帝即位自鄴遷洛營造宮室而不起宗廟太祖神主猶在鄴嘗於建始殿饗祭如家人之禮終黄初不復還鄴而員丘方澤南北郊社稷等神位未有定所此簡宗廟廢祭祀之罰也京房易傳曰顓事者加誅罰絶理厥災水其水也雨殺人已隕霜大風天黃饑而不損茲謂泰厥大水水殺人避遏有徳茲謂狂厥水水流殺人也已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆隂厥水流入國邑隕霜殺穀呉孫權赤烏八年夏茶陵縣鴻水溢出流漂二百餘家十二年秋丹陽故鄣等縣又鴻水溢案權稱帝三十年竟不於建業創七廟但有父堅一廟遠在長沙而郊禋禮闕嘉禾初羣臣奏宜郊祀又弗許末年雖一南郊而北郊遂無聞焉且三江五湖衡霍㑹稽皆呉楚之望亦不見秩反禮羅陽妖神以求福助天意若曰權簡宗廟不禱祠廢祭祀示此罰欲其感悟也太元元年又有大風涌水之異是冬權南郊疑是鑒咎徴乎還而寢疾眀年四月薨一曰權時信納譖訴雖陸議勲重子和儲貳猶不得其終與漢安帝聽讒免楊震廢太子同事也且赤烏中無年不用兵百姓愁怨八年秋將軍馬茂等又圖逆云魏眀帝景初元年九月淫雨過常冀兖徐豫四州水出沒溺殺人漂失財産帝自初即位便淫奢極欲多占幼女或奪士妻崇飾宮室妨害農戰觸情恣欲至是彌甚號令逆時饑不損役此水不潤下之應也呉孫亮五鳯元年夏大水亮即位四年乃立權廟又終呉世不上祖宗之號不修嚴父之禮昭穆之數有闕亮及休皓又並廢二郊不秩羣神此簡宗廟不祭祀之罰也又是時孫峻専政隂勝陽之應乎呉孫休永安四年五月大雨水泉涌溢昔歳作浦里塘功費無數而田不可成士卒死叛或自賊殺百姓愁怨隂氣盛也休又専任張布􅅲盛冲等呉人賊之之應也呉孫休永安五年八月壬午大雨震雹水泉涌溢晋武帝太始四年九月青徐兖豫四州大水七年六月大雨霖河洛伊沁皆溢殺二百餘人帝即尊位不加三后祖宗之號太始二年又除眀堂南郊五帝坐同稱昊天上帝一位而已又省先后配地之禮此簡宗廟廢祭祀之罰與漢成帝同事一曰昔歳及此年藥蘭泥白虎文秦凉殺刺史胡烈牽𢎞遣田璋討泥又司馬望以大衆次淮北禦孫晧内外兵役西州饑亂百姓愁怨隂氣盛也咸寜初始上祖宗號太熙初還復五帝位晋武帝咸寧元年九月徐州水二年七月癸亥河南魏郡暴水殺百餘人八月荆州郡國五大水去年采擇良家子女露面入殿帝親簡閲務在姿色不訪徳行有蔽匿者以不敬論搢紳愁怨天下非之隂盛之應也咸寧三年六月益梁二州郡國八暴水殺三百餘人七月荆州大水九月始平郡大水十月青徐兖豫荆益梁七州又水是時賈充等用事日盛而正人疏外者多咸寧四年七月司冀兖豫荆揚郡國二十大水晋武帝太康二年六月泰山江夏大水泰山流三百家殺六千餘人江夏亦殺人是時平呉後王濬為元功而詆劾妄加荀賈為無謀而並䝉重賞收呉姬五千納之後宮此應也太康四年七月司豫徐兖荆揚郡國二十大水傷秋稼壞屋室有死者太康六年三月青凉幽冀郡國十五大水太康七年九月西方安定等郡國八大水太康八年六月郡國八大水晋惠帝元康二年有水災元康五年五月潁川淮南大水六月城陽東莞大水殺人荆揚徐兖豫五州又大水是時帝即位已五載猶未郊祀烝嘗亦多不身親近簡宗廟廢祭祀之罰也班固曰王者即位必郊祀天地望秩山川若乃不敬鬼神政令違逆則霧水暴至百川逆溢壞鄉邑溺人民水不潤下也元康六年五月荆揚二州大水按董仲舒説水者隂氣盛也是時賈后亂朝寵樹賈郭女主専政之應也元康八年五月金墉城井水溢漢成帝時有此妖班固以為王莾之象及趙倫簒位即此應也倫廢帝於此城井溢所在又天意乎元康八年九月荆揚徐兖冀五州大水是時賈后暴戾滋甚韓謐驕猜彌扇卒害太子旋亦禍滅元康九年四月宮中井水沸溢晋惠帝永寧元年七月南陽東海大水是時齊王冏秉政専恣隂盛之應晋惠帝大安元年七月兖豫徐冀四州水時將相力攻無尊主心晋孝懷帝永嘉四年四月江東大水是時王導等潛懷翼戴之計隂氣盛也晋元帝大興三年六月大水是時王敦内懷不臣傲狠作威後終夷滅大興四年七月大水眀年有石頭之敗晋元帝永昌二年五月荆州及丹陽宣城呉興壽春大水晋眀帝太寧元年五月丹陽宣城呉興壽陽大水是時王敦疾害忠良威權震主尋亦誅滅晋成帝咸和元年五月大水是時嗣主幼冲母后稱制庾亮以元舅民望决事禁中隂勝陽也咸和二年五月戊子京都大水是冬蘇峻稱兵都邑塗炭咸和四年七月丹陽宣城呉興㑹稽大水是冬郭黙作亂荆豫共討之半歳乃定咸和七年五月大水是時帝未親務政在大臣隂勝陽也晋成帝咸康元年八月長沙武陵大水是年三月石虎掠騎至歴陽四月圍㐮陽於是加王導大司馬集徒旅又使趙鳯路永劉允之陳光五將軍各帥衆戍衛百姓愁怨隂氣盛也晋穆帝永和四年五月大水是時幼主冲弱母后臨朝又將相大臣各爭權政與咸和初同事也永和五年五月大水永和六年五月大水永和七年七月甲辰夜濤水入石頭死者數百人去年殷浩以私忿廢蔡謨遐邇非之又幼主在上而殷桓交惡選徒聚甲各崇私權隂勝陽之應也一説濤入石頭江右以為兵占是後殷浩桓温謝尚荀羡連年征伐晋穆帝升平二年五月大水是時桓温權制朝廷征伐是專升平五年四月大水晋海西太和六年六月京都大水平地數尺侵及太廟朱雀大航纜斷三艘流入大江丹陽晋陵呉國呉興臨海五郡又大水稻稼蕩沒黎庶饑饉初四年桓温北伐敗績十喪其九五年又征淮南踰歳乃克百姓愁怨之應也晋簡文帝咸安元年十二月壬午濤水入石頭眀年妖賊盧竦率其屬數百人入殿略取武庫三庫甲仗游擊将軍毛安之討滅之晋孝武帝太元三年六月大水是時孝武幼弱政在將相太元五年大水去年氐賊攻沒襄陽又向廣陵於是逼徙江淮民悉令南渡三州失業道殣相望謝𤣥雖破句難等自後征戍不已百姓愁怨之應也太元六年六月荆江揚三州大水太元十年夏大水初八年破苻堅自後有事中州役無已歳兵民愁怨之應也太元十三年十二月濤水入石頭眀年丁零鮮卑寇擾司兖鎮戍西北疲於奔命太元十五年七月兖州大水是時緣河紛爭征戍勤悴太元十七年六月甲寅濤水入石頭毁大航漂船舫有死者京口西浦亦濤入殺人永嘉郡潮水涌起近海四縣人民多死後四年帝崩而王恭再攻京師京師亦發大衆以禦之太元十九年七月荆州彭城大水傷稼太元二十年荆州彭城大水太元二十一年五月癸卯大水是時政事多弊兆庶非之晋安帝隆安三年五月荆州大水去年殷仲堪舉兵向京都是年春又殺郗恢隂盛作威之應也仲堪尋亦敗亡隆安五年五月大水是時司馬元顯作威陵上又桓𤣥擅西夏孫恩亂東國隂勝陽之應也晋安帝元興二年十二月桓𤣥簒位其眀年二月庚寅夜濤水入石頭是時貢使商旅方舟萬計漂敗流斷骸胔相望江右雖有濤變未有若斯之甚三月義軍克京都𤣥敗走遂夷滅元興三年二月己丑朔夜濤水入石頭漂沒殺人大航流敗晋安帝義熙元年十二月己未濤水入石頭義熙二年十二月己未夜濤水入石頭眀年駱球父環潛結桓𦙍殷仲文等謀作亂劉雅亦謀反凡所誅滅數十家義熙三年五月丙午大水義熙四年十二月戊寅濤水入石頭眀年王旅北討鮮卑義熙六年五月丁巳大水乙丑盧循至蔡洲義熙八年六月大水義熙九年五月辛巳大水義熙十年五月丁丑大水戊寅西眀門地穿涌水出毁門扉及限七月乙丑淮北災風大水殺人義熙十一年七月丙戍大水淹漬太廟百官赴救眀年王旅北討關河宋文帝元嘉五年六月京邑大水七年右將軍到彦之率師入河元嘉十一年五月京邑大水十三年司空檀道濟誅元嘉十二年六月丹陽淮南呉呉興義興五郡大水京邑乘船元嘉十八年五月江水汎溢沒居民害苖稼眀年右軍將軍裴方眀率雍梁之衆伐仇池元嘉十九年二十年東都諸郡大水元嘉二十九年五月京邑大水孝武帝孝建元年八月㑹稽大水平地八尺後二年虜寇青冀州遣羽林軍卒討伐孝武帝大眀元年五月呉興義興大水大眀四年八月雝州大水大眀四年南徐南兖州大水後廢帝元徽元年六月夀陽大水順帝昇眀元年七月雝州大水甚於關羽樊城時昇眀二年二月於潛翼異山一夕五十二處水出流漂居民七月丙午朔濤水入石頭居民皆漂沒恒寒庶徴之恒寒劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽草皆常寒之罰也京房易傳曰有徳遭險茲謂逆命厥異寒誅罰過深當燠而寒盡六日亦為雹害正不誅茲謂養賊寒七十二日殺飛禽道人始去茲謂傷其寒物無霜而死涌水出戰不量敵茲謂辱命其寒雖雨物不茂呉孫權嘉禾三年九月朔隕霜傷穀按劉向説誅罰不由君出在臣下之象也是時校事呂壹專作威福與漢元帝時石顯用事隕霜同應班固書九月二日陳夀言朔皆明未可以傷穀也壹後亦伏誅京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土隙閒不教而誅茲謂虐其霜反在草下嘉禾四年七月雨雹又隕霜案劉向説雹者隂脅陽是時呂壹作威用事詆毁重臣排䧟無辜自太子登以下咸患毒之而壹反獲封侯寵異與春秋公子遂専任雨雹同應也漢安帝信讒多殺無辜亦雨雹董仲舒曰凡雹皆為有所脅行専一之政故也呉孫權赤烏四年正月大雪平地深三尺鳥獸死者大半是年夏全琮等四將軍攻略淮南襄陽戰死者千餘人其後權以䜛邪數責讓陸議議憤恚致卒與漢景武大雪同事也赤烏十一年四月雨雹是時權聽讒將危太子其後朱據屈晃以迕意黜辱陳象以忠諫族誅而太子終廢此有徳遭險誅罰過深之應也晋武帝太始六年冬大雪太始七年十二月大雪眀年有歩闡楊肇之敗死傷甚衆太始九年四月辛未隕霜是時賈充親黨比周用事與魯定公漢元帝時隕霜同應也晋武帝咸寧二年八月平原安平上黨秦郡霜害三豆咸寧三年八月河間暴風寒氷郡國五隕霜傷穀是後大舉征呉馬隆又帥精勇討涼州咸寧五年五月丁亥鉅鹿魏郡雨雹傷禾麥辛卯鴈門雨雹傷秋稼咸寧五年六月庚戍汲郡廣平陳留滎陽雨雹丙辰又雨雹損傷秋麥千三百餘頃壞屋百三十餘間癸亥安定雨雹七月丙申魏郡又雨雹閏月壬子新興又雨雹八月庚子河東𢎞農又雨雹兼傷秋稼三豆晋武帝太康元年三月河東高平霜雹傷桑麥四月河南河内河東魏郡𢎞農雨雹傷麥豆五月東平平陽上黨鴈門濟南雨雹傷禾麥三豆太康元年四月庚午畿内縣二及東平范陽縣雨雹癸酉畿内縣五又雨雹是時王濬有大功而權戚互加陷抑帝從容不斷隂脅陽之應也太康二年二月辛酉殞霜于濟南琅邪傷麥壬申琅邪雨雪傷麥三月甲午河東隕霜害桑太康二年五月丙戍城陽章武琅邪庚寅河東樂安東平濟隂𢎞農濮陽齊國