義熙九年十一月甲戌雷乙亥又雷宋文帝元嘉四年十一月癸丑雷元嘉五年六月丙寅震太廟破東鴟尾徹壁柱元嘉六年正月丙寅雷且雪元嘉七年十月丙子雷元嘉八年十二月庚辰雷元嘉九年十一月甲戍雷且雪元嘉十四年震初寧陵口標四破至地十七年廢大將軍彭城王義康骨肉相害自此始也前廢帝景和元年九月甲午雷震眀帝泰始二年九月辛巳雷震泰始四年十月辛卯雷震泰始四年十一月癸卯朔雷震泰始五年十一月乙巳雷震泰始六年十一月庚午雷後廢帝元徽三年九月戊戌雷元徽三年九月丁未雷元徽三年九月戊午雷震元徽三年十月辛未雷甲戍又雷順帝昇眀三年二月二十四日丙申震建陽門皷妖晋惠帝元康九年三月有聲若牛出許昌城十二月廢太子幽于許宮按春秋晋文公柩有聲如牛劉向以為皷妖其説曰聲如此怒象也將有急怒之謀以生兵甲之禍此其類也眀年賈后遣黄門孫慮殺太子擊以藥杵聲聞于外蘇峻在歴陽外營將軍皷自鳴如人㺯皷者峻手自斫之曰我鄉土時有此則城空矣俄而作亂夷滅此聽不聰之罰皷妖先作也石虎末洛陽城西北九里石牛在青石趺上忽鳴喚聲聞四十里虎遣人打落兩耳及尾鐡釘釘四脚晋孝武太元十五年三月己酉朔東北有聲如雷案劉向説以為雷當託於雲猶君託於臣無雲而雷此君不恤下下民將叛之象也及帝崩而天下漸亂孫恩桓𤣥交陵京邑呉興長城縣夏架山有石皷長丈餘面徑三尺所下有盤石為足鳴則聲如金皷三呉有兵晋安帝隆安中大鳴後有孫靈秀之亂魚孽魏齊王嘉平四年五月有二魚集于武庫屋上此魚孽也王肅曰魚生于淵而亢於屋介鱗之物失其所也邊將其殆有棄甲之變乎後果有東關之敗干寳又以為高貴鄉公兵禍之應二説皆與班固㫖同晋武帝太康中有鯉魚二見武庫屋上干寳曰武庫兵府魚有鱗甲亦兵類也魚既極隂屋上太陽魚見屋上象至隂以兵革之禍干大陽也至惠帝初誅楊駿廢太后矢交館閣元康末賈后謗殺太子尋亦誅廢十年閒母后之難再興是其應也自是禍亂構矣京房易妖曰魚去水飛入道路兵且作蝗蟲魏文帝黄初三年七月冀州大蝗民饑案蔡邕説蝗者在上貪苛之所致也是時孫權歸從帝因其有西陵之役舉大衆襲之權遂背叛晋武帝太始十年六月蝗是時荀賈任政疾害公直晋孝懷帝永嘉四年五月大蝗自幽并司冀至于秦雝草木牛馬毛鬛皆盡是時天下兵亂漁獵生民存亡所繫唯司馬越茍晞而已而競為暴刻經略無章晋愍帝建興四年六月大蝗去歳胡寇頻攻北地馮翊麴允等悉衆禦之是時又禦劉曜為曜所破西京遂潰晋元帝太興元年六月蘭陵合鄉蝗害禾稼乙未東莞蝗蟲縱廣三百里害苖稼太興元年七月東海彭城下邳臨淮四郡蝗蟲害禾豆太興元年八月冀青徐三州蝗食生草盡至于二年是時中州淪喪暴亂滋甚太興二年五月淮陵臨淮淮南安豐廬江諸郡蝗食秋麥太興三年五月癸丑徐州及揚州江西諸郡蝗呉民多餓死去年王敦并領荆州苛暴之釁自此興矣又是年初徐州刺史蔡豹帥衆伐周撫晋孝武帝太元十五年八月兖州蝗是時丁零寇兖豫鮮卑逼河南征戍不已太元十六年五月飛蝗從南來集堂邑縣界害苗稼是年春發取江州兵營甲士二千人家口六七千人配護軍及東宮後尋散亡殆盡又邊將連有征殺豕禍呉孫皓寳鼎元年野豕入右司馬丁奉營此豕禍也後奉見遣攻穀陽無功及皓怒斬其導軍及舉大衆北出奉及萬彧等相謂曰若至華里不得不各自還也此謀泄奉時雖已死皓追討穀陽事殺其子温家屬皆遠徙豕禍之應也龔遂曰山野之獸來入宫室宫室將空又其象也晋孝懷帝永嘉中夀春城内有豕生兩頭而不活周馥取而觀之時通數者竊謂曰夫豕北方之畜胡狄象也兩頭者無上也生而死不遂也天意若曰勿生専利之謀將自致傾覆也周馥不悟遂欲迎天子令諸侯俄為元帝所敗是其應也石勒亦尋渡淮百姓死者十八九晋武帝建武元年有豕生八足聽不聰之罰也京房易傳曰凡妖作各象其類足多者所任邪也是後有劉隗之變晋成帝咸和六年六月錢塘民家豭豕生兩子皆人面如胡人狀其身猶豕京房易妖曰豕生人頭豕身者邑且亂亡此豭豕而産異之甚者晋孝武帝太元十年四月京都有豕一頭二身八足十三年京都民家豕産子一頭二身八足並與建武同妖也是後宰相沈酗不恤朝政近習用事漸亂國綱至於大壞也黑𤯝黑祥晋孝懷帝永嘉五年十二月黑氣四塞近黑祥也宋文帝元嘉二十六年三月幸京口有黑氣暴起占有兵眀年虜南寇至𤓰歩飲馬于江火沴水晋武帝太康五年六月任城魯國池水皆赤如血案劉向説近火沴水也聽之不聰之罰也京房易傳曰淫於色賢人潛國家危厥異水流赤晋穆帝升平三年二月凉州城東池中有火四年四月姑臧澤水中又有火此火沴水之妖也眀年張天錫殺中護軍張邕邕執政臣也晋安帝元興二年十月錢塘臨平湖水赤桓𤣥諷呉郡使言開除以為已瑞俄而𤣥敗宋書卷三十三宋書卷三十三考證五行志四時將相力攻攻各本訛政今改正奉及萬彧等彧諸本皆訛或今據三國志改正宋書卷三十三考證
