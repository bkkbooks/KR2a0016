body:
  text: 宋書卷三十六梁沈約撰志第二十六州郡二南豫州豫州江州青州冀州司州南豫州刺史晉江左胡寇强盛豫部殱覆元帝永昌元年刺史祖約始自譙城退還夀春成帝咸和四年僑立豫州庾亮為刺史治蕪湖咸康四年毛寳為刺史治邾城六年荆州刺史庾翼鎮武昌領豫州八年庾懌為刺史又鎮蕪湖穆帝永和元年刺史趙𦙍鎮牛渚二年刺史謝尚鎮蕪湖四年進夀春九年尚又鎮歴陽十一年進馬頭升平元年刺史謝奕戍譙哀帝隆和元年刺史袁真自譙退守夀春簡文咸安元年刺史桓沖戍姑孰太元十年刺史李序戍馬頭十二年刺史桓石䖍戍歴陽安帝義熙二年刺史劉毅戍姑孰宋武帝欲開拓河南綏定南豫土九年割揚州大江以西大靁以北悉屬豫州豫基址因此而立十三年刺史劉義慶鎮夀陽永初二年分淮東為南豫州治歴陽淮西為豫州文帝元嘉七年又分五年割揚州之淮南宣城又屬焉徙治姑孰明帝泰始二年又合而以淮南宣城還揚州九月又分還治歴陽三年五月又合四年以揚州之淮南宣城為南豫州治宣城五年罷時自淮以西悉没寇矣七年復分歴陽淮陰南譙南兖州之臨江立南豫州泰豫元年以南汝陰度屬豫州豫州之廬江度屬南豫州按淮東自永初至于大明便為南豫雖乍有離合而分立居多爰自泰始甫失淮西復於淮東分立兩豫今南豫以淮東為境不復于此更列二州覽者按此以淮東為境推尋便自得泰始兩豫分域地也徐志領郡十三縣六十一戸三萬七千六百二口二十一萬九千五百今領郡九縣九十一去京都水一百六十歴陽太守晉恵帝永興元年分淮南立屬揚州安帝割屬豫州永初郡國唯有歴陽烏江龍亢三縣何徐又有鄼雍邱二縣今領縣五戸三千一百五十六口一萬九千四百七十歴陽令漢舊縣屬九江烏江令二漢無晉書有烏江太康地志屬淮南龍亢令漢舊名屬沛郡晉太康地志屬譙江左流寓立雍邱令漢舊名屬陳留流寓立先屬泰山郡文帝元嘉八年度酇令漢屬沛晉太康地志屬譙流寓立文帝元嘉八年度南譙太守譙郡别見晉孝武太元中於淮南僑立郡縣後割地志咸實土郡國又有酇縣何徐無今領縣六户四千四百三十二口二萬二千三百五十八去州水五百四十陸一百七十去京都水七百陸五百山桑令前漢屬沛後漢屬汝南晉太康地志屬譙譙令漢屬沛晉太康地志屬譙銍令漢屬沛晉太康地志屬譙扶陽令前漢屬沛後漢晉太康地志竝無蘄令别見城父令前漢屬沛後漢屬汝南晉太康地志屬譙廬江太守漢文帝六年分淮南國立光武建武十三年又省六安國以併焉領縣三戸一千九百九口一萬一千九百九十七去州水二千七百二十陸四百七十去京都水一千一百陸六百三十一灊令漢舊縣舒令漢舊縣始新令永初郡國何竝無徐有始新左縣明帝泰始三年立南汝隂太守汝陰郡别見江左立領縣五戸二千七百一口一萬九千五百八十五去州陸三百去京都水一千陸五百三十汝陰令别見所治即二漢晉合肥縣後省慎令漢屬汝南太康地志屬汝陰宋令别見陽夏令前漢屬淮陽後漢屬陳晉太康地志陳令屬梁無復此縣又晉地志惠帝永康中復立永初郡國何竝屬南梁徐志屬此安陽令别見永初郡國何竝屬南梁徐屬此南梁太守梁郡别見晉孝武太元中僑立於淮南安帝始有淮南故地屬徐州武帝永初二年還南豫孝武大明六年廢屬南豫改名淮南八年復舊永初郡國又有虞陽夏安豐三縣竝别見何徐無安豐又有義昌而竝無寧陵縣今領縣九户六千二百一十二口四萬二千七百五十四去州水一千八百陸五百去京都水一千七百陸七百睢陽令漢舊名孝武大明六年改名夀春八年復舊前廢帝永光有義寧寧昌二縣併雎陽所治即二漢晉夀春縣後省䝉令别見虞令漢舊名榖孰令漢舊名陳令前漢屬淮陽後漢屬陳晉太康地志屬梁義寧長何無徐有宋末又立新汲令漢舊名屬潁川崇義令永初郡國羌人始立寧令别見徐志後所立晉熙太守晉安帝分廬江立領縣五戸一千五百二十一口七千四百九十七去州陸八百無水去京都水一千二百無陸懐寧令晉安帝立新冶令晉安帝立陰安令漢舊名屬魏郡晉太康地志屬頓邱南樓令永初郡國何徐志無太湖左縣長文帝元嘉二十五年以豫部蠻民立太湖吕亭二縣晉熙後省明帝太始二年復立弋陽太守本縣名屬汝南魏文帝分立領縣六户三千二百七十五口二萬四千二百六十二去州陸一千一百去京都水闕期思令漢舊縣弋陽令漢舊縣安豐令舊郡晉安帝併為縣樂安令新立茹由令新立安豐太守魏文帝分廬江立江左僑立晉安帝省為縣屬弋陽宋末復立安豐令前漢地理志無後漢屬廬江松滋令别見汝南太守别見上蔡侯相别見平輿令别見北新息令别見真陽令别見安城令别見南新息令别見臨汝令漢舊名陽安令别見西平令别見瞿陽令别見安陽令别見新蔡太守别見鮦陽令别見固始令别見新蔡令别見東苞信令别見西苞信令徐志南豫唯一苞信疑是後僑立所分東郡太守别見永初郡國無萇平父陽而有扶溝别見何無陽夏扶溝徐無陽夏項令别見西華令别見陽夏令别見萇平令别見父陽令别見南潁太守别見帖治陳郡南頓令别見和城令别見潁川太守别見邵陵令别見臨潁令别見曲陽令别見西汝陰太守永初郡國何徐竝無此郡汝陰令别見安城令别見樓煩令别見宋令别見汝陽太守别見汝陽令别見武津令陳留太守别見永初郡國無浚儀封邱而有酸棗何徐無封邱尉氏浚儀令别見小黄令别見雝邱令别見白馬令别見襄邑令别見封邱令漢舊名尉氏令别見南陳左郡太守少帝景平中省此郡以宋民度屬南梁汝陰郡而永初郡國無未詳孝建二年以蠻戸復立分赤官左縣為蓼城左縣領縣二樂疑大明八年省郡即名為縣屬陳左縣邊城左郡太守文帝元嘉二十五年以豫部蠻民立茹由樂安光城雩婁邊城史水開化邊城七縣屬弋陽郡徐志有邉城兩領雩婁史水開化邊城兩縣大明八年復省為縣屬弋陽後復立領縣四戸四百一十七口二千四百七十九雩樓令二漢屬廬江晉太康地志云屬安豐開化令史水令邊城令光城左郡太守永初郡國何徐竝無按起居注大明八年省光城左郡為縣弋陽疑是大明中分弋陽所立八年復省後復立樂安令茹由令光城令此三縣徐志屬弋陽豫州刺史後漢治譙魏治汝南安成晉平吳後治陳國晉江左所治已列於前永初郡國何徐寄治睢陽而郡縣在淮西徐又有邊城别見南豫州何又有初安綏城二郡初安領新疑脱一字懐徳二縣綏城領安昌招逺二縣竝云新立徐無則是徐志前省也領郡十縣四十三戸二萬二千九百一十九口一十五萬八百三十九汝南太守漢髙帝立領縣十一户一萬一千二百九十一口八萬九千三百四十九去州水一千陸七百去京都水三千陸一千五百上蔡令漢舊縣平樂令漢舊縣北新息令漢舊縣慎陽令漢舊縣永初郡國及徐竝作真陽安成令漢舊縣南新息令漢舊縣朗陵令漢舊縣陽安令漢舊縣西平令漢舊縣瞿陽令漢舊縣作灈陽安陽令漢舊縣晉武太康元年改為南安陽新蔡太守晉恵帝分汝陰立今帖治汝南領縣四戸二千七百七十四口一萬九千八百八十去州陸六百去京都水二千五百陸一千四百鮦陽令漢舊縣晉成帝咸康二年省併新蔡後又立固始令故名寑邱之地也漢光武更名晉成帝咸康二年併新蔡後又立新蔡令漢舊縣苞信令前漢無後漢屬汝南晉太康地志屬汝陰後漢郡國晉太康地志並作褒譙郡太守何志故屬沛魏明帝分立按王粲詩既入譙郡界曠然消人憂粲是建安中亡非明帝時立明矣永初郡國無長垣縣今領縣六户一千四百二十四口七千四百四去州陸道三百五十去京都水二千陸一千二百䝉令漢舊縣屬沛蘄令漢舊縣屬沛寧陵令前漢屬陳留後漢晉太康地志屬梁魏令故魏郡流寓配屬襄邑令長垣令漢舊縣屬陳留永初郡國無何故屬陳留徐新配梁郡太守秦碭郡漢髙更名孝武大明元年度徐州二年還豫領縣二户九百六十八口五千五百去州陸一百六十去京都水九百下邑令漢舊縣何云魏立非也碭令漢舊縣陳郡太守漢髙立為淮陽國章帝元和三年更名晉初併梁王肜薨還為陳永初郡國有扶溝前漢屬淮陽後漢晉太康地志屬陳留陽夏别見而無父陽長平領縣四尸六百九十三口四千一百一十三去州陸七百六十去京都水一千四百五十項城令漢舊縣屬汝南晉太康地志屬陳郡西華令漢舊縣屬汝南晉初省恵帝永康元年復立屬潁川江左度此父陽令本苦縣二漢屬陳晉太康地志屬梁成帝咸康三年更名長平令前漢屬汝南後漢屬陳晉太康地志屬潁川南潁太守故屬汝南晉恵帝分立領縣二戸五百二十六口二千三百六十五去州七百六十去京都陸一千四百五十南頓令漢舊縣何故屬汝陽晉武帝改屬汝南按晉太康地志王隱地道無汝陽郡和城令何江左立潁川太守秦立魏分潁川為襄城郡晉成帝咸康二年省襄城還併潁川永初郡國又有許昌本昌許漢舊縣魏曰許昌新汲别見􅋣陵長社潁陰陽翟四縣並漢舊縣陽翟魏晉屬河南六縣而無曲陽領縣三戸六百四十九口二千五百七十九去州一千去京都陸一千八百邵陵令漢舊縣屬汝南晉太康地志屬潁川臨潁令漢舊縣曲陽令前漢屬東海後漢屬下邳晉太康地志無汝陽太守晉太康地志王隱地道無此郡應是江左分汝南立晉成帝咸康三年省併汝南後又立領縣二户九百四十一口四千四百九十五去州二百去京都陸一千四百水三千五百汝陽令漢舊縣屬汝南何故屬汝陰晉武改屬汝南按晉武分汝南為汝陰何所言非也武津令何不注置立汝陰太守晉武帝分汝南立成帝咸康二年省併新蔡後復立領縣四戸二千七百四十九口一萬四千三百三十五汝陰令漢舊縣宋令前漢名新郪章帝建初四年徙宋公國於此改曰宋宋城令漢舊縣樓煩令漢舊縣屬雁門流寓配屬陳留太守漢武帝元狩元年立屬兖州中原亂廢晉成帝咸康四年復立永初郡國屬兖州何徐屬豫州永初郡國無浚儀有酸棗别見今領縣四戸百九十六口二千四百一十三寄治譙郡長垣縣界浚儀令漢舊名小黄令漢舊名白馬令漢屬東郡晉太康地志屬濮陽雝丘令漢舊名江州刺史晉恵帝太康元年分揚州之豫章鄱陽廬陵臨川南康建安晉安荆州之武昌桂陽安城十郡為江州初治豫章成帝咸康六年移治尋陽庾悦又治豫章尋還尋陽領郡九縣六十五戸五萬二千三十三口二十七萬七千一百四十七去京都水一千四百尋陽太守尋陽本縣名因水名縣水南注江二漢屬廬江吳立蘄春郡尋陽縣屬焉晉武帝太康元年省蘄春郡以尋陽屬武昌改蘄春之安豐為髙陵及邾縣皆屬武昌二年以武昌之尋陽復屬廬江郡恵帝永興元年分廬江武昌立尋陽郡尋陽縣後省領縣三户二千七百二十口一萬六千八郡既立治此柴桑男相二漢屬豫章晉屬武昌漢晉太康地志屬豫章立尋陽郡後割度松滋伯相前漢屬廬江後漢無晉太康地志屬安豐安豐縣名前漢無後漢屬廬江晉武帝立為安豐郡江左流民寓尋陽僑立安豐松滋二郡遥隸揚州安帝省為松滋縣尋陽又有𢎞農縣流寓文帝元嘉十八年省併松滋豫章太守漢髙帝立本屬揚州永初郡國有海昬漢舊縣何志無今領縣十二戸一萬六千一百三十九口一十二萬二千五百七十三去州水六百陸三百五十去京都水一千九百陸二千一百南昌侯相漢舊縣新淦侯相漢舊縣豐城侯相吳立