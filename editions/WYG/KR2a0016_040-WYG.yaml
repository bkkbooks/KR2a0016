body:
  text: 宋書卷四十梁沈約撰志第三十百官下給事黄門侍郎四人與侍中俱掌衆事郊廟臨軒則一人執麾漢百官表秦曰給事黄門無員掌侍從左右漢因之漢東京曰給事黄門侍郎亦無員掌侍從左右闗通中外諸王朝見則引王朝坐應劭曰每日莫向青𤨏門拜謂之夕郎史臣按劉向與子歆書曰黄門郎顯處也然則前漢世已爲黄門侍郎矣董巴漢書曰禁門曰黄闥中人主之故號曰黄門令然則黄門郎給事黄闥之内故曰黄門郎也魏晉以來員四人秩六百石公車令一人掌受章奏秦有公車司馬令屬衛尉漢因之掌宫南闕門凡吏民上章四方貢獻及徴詣公車者皆掌之晉江左以來直云公車令太醫令一人丞一人周官爲醫師秦爲太醫令至二漢屬少府太官令一人丞一人周官爲膳夫秦爲太官令至漢屬少府驊騮廐丞一人漢西京爲龍馬長漢東京爲未央廐令魏爲驊騮令自公車令至此隸侍中散騎常侍四人掌侍左右秦置散騎又置中常侍散騎並乗輿車後中常侍得入禁中皆無員並爲加官漢東京初省散騎而中常侍因用宦者魏文帝黄初初置散騎合於中常侍謂之散騎常侍始以孟逹補之乆次者爲祭酒散騎常侍秩比二千石通直散騎常侍四人魏末散騎常侍又有在員外者晉武帝使二人與散騎常侍通直故謂之通直散騎常侍晉江左置五人員外散騎常侍魏末置無員散騎侍郎四人魏初與散騎常侍同置魏晉散騎常侍侍郎與侍中黄門侍郎共平尚書奏事江左乃罷通直散騎侍郎四人初晉武帝置員外散騎侍郎四人元帝使二人與散騎侍郎通直故謂之通直散騎侍郎後增爲四人員外散騎侍郎晉武帝置無員給事中無員漢西京置掌顧問應對位次中常侍漢東京省魏世復置奉朝請無員亦不爲官漢東京罷省三公外戚宗室諸侯多奉朝請奉朝請者奉朝會請召而已晉武帝亦以宗室外戚爲奉車駙馬騎都尉而奉朝請焉元帝爲晉王以參軍爲奉車都尉掾屬爲駙馬都尉行參軍舎人爲騎都尉皆奉朝請後省奉車騎都尉唯留駙馬都尉奉朝請永初已來以奉朝請選雜其尚主者唯拜駙馬都尉三都尉竝漢武帝置孝建初奉朝請省駙馬都尉三都尉秩比二千石中書令一人中書舎人一人中書侍郎四人中書通事舎人四人漢武帝游後廷始使宦者典尚書事謂之中書謁者置令僕射元帝時令𢎞恭僕射石顯秉勢用事權傾内外成帝改中書謁者令曰中謁者令罷謁者漢東京省中謁者令而有中宫謁者令非其職也魏武帝爲王置祕書令典尚書奏事又其任也文帝黄初初改爲中書令又置監及通事郎次黄門郎黄門郎已署事過通事乃奉以入爲帝省讀書可晉改曰中書侍郎員四人晉江左初改中書侍郎曰通事郎尋復爲中書侍郎晉初置舎人一人通事一人江左初合舎人通事謂之通事舎人掌呈奏案章後省通事中書差侍郎一人直西省又掌詔命宋初又置通事舎人而侍郎之任輕矣舎人直閣内隸中書其下有主事本用武官宋改用文吏祕書監一人祕書丞一人祕書郎四人漢桓帝延熹二年置祕書監皇甫規與張奐書云從兄祕書它何動靜是也應劭漢官曰祕書監一人六百石後省魏武帝爲魏王置祕書令祕書丞祕書典尚書奏事文帝黄初初置中書令典尚書奏事而祕書改令爲監後欲以何禎爲祕書丞而祕書先自有丞乃以禎爲祕書右丞後省掌蓺文圖籍周官外史掌四方之志三皇五帝之書即其任也漢西京圖籍所藏有天府石渠蘭臺石室延閤廣内之府是也東京圖書在東觀晉武帝以祕書并中書省監謂丞爲中書祕書丞惠帝復置著作郎一人佐郎八人掌國史周世左史記事右史記言即其任也漢東京圖籍在東觀故使名儒碩學著作東觀撰述國史著作之名自此始也魏世隸中書晉武世繆徴爲中書著作郎元康中改隸祕書後别自爲省而猶隸祕書著作郎謂之大著作專掌史任晉制著作佐郎始到職必撰名臣傳一人宋氏初國朝始建未有合撰者此制遂替矣領軍將軍一人掌内軍漢有南北軍衛京師武帝置中壘校尉掌北軍營光武省中壘校尉置北軍中候監五校營魏武爲丞相相府自置領軍非漢官也文帝即魏王位魏始置領軍主五校中壘武衛三營晉武帝初省使中軍將軍羊祜統二衛前後左右驍騎七軍營兵即領軍之任也祜遷罷復置北軍中候北軍中候置丞一人懐帝永嘉中改曰中領軍元帝永昌元年復改曰北軍中候尋復爲領軍成帝世復以爲中候而陶回居之尋復爲領軍領軍令猶有南軍都督護軍將軍一人掌外軍秦時䕶軍都尉漢因之陳平爲䕶軍中尉盡䕶諸將然則復以都尉爲中尉矣武帝元狩四年以䕶軍都尉屬大司馬于時爲都尉矣漢書李廣傳廣爲驍騎將軍屬䕶軍將軍蓋䕶軍䕶諸將軍哀帝元夀元年更名䕶軍都尉曰司寇平帝元始元年更名䕶軍都尉東京省班固爲大將軍中䕶軍隸將軍莫府非漢朝列職魏武爲相以韓浩爲䕶軍史奐爲領軍非漢官也建安十二年改䕶軍爲中䕶軍領軍爲中領軍置長史司馬魏初因置䕶軍主武官選隸領軍晉世則不隸也晉元帝永昌元年省䕶軍并領軍明帝大寧二年復置魏晉江左領䕶各領營兵江左以來領軍不復别營􅄣統二衛驍騎材官諸軍猶别有營也領䕶資重者爲領軍䕶軍將軍資輕者爲中領軍中䕶軍官屬有長史司馬功曹主簿五官受命出征則置參軍左衛將軍一人右衛將軍一人二衛將軍掌宿衛營兵二漢魏不置晉文帝爲相國相國府置中衛將軍武帝初分中衛置左右衛將軍以羊琇爲左衛趙序爲右衛二衛江右有長史司馬功曹主簿江左無長史驍騎將軍漢武帝元光六年李廣爲驍騎將軍魏世置爲内軍有營兵髙功者主之先有司馬功曹主簿後省遊擊將軍漢武帝時韓説爲遊擊是爲六軍左軍將軍右軍將軍前軍將軍後軍將軍魏明帝時有左軍將軍然則左軍魏官也晉武帝初置前軍右軍太始八年又置後軍是爲四軍左中郎將右中郎將秦官漢因之與五官中郎將領三署郎魏無三署郎猶置其職晉武帝省宋世祖大明中又置屯騎校尉歩兵校尉越騎校尉長水校尉射聲校尉五校竝漢武帝置屯騎歩兵掌上林苑門屯兵越騎掌越人來降因以爲騎也一説取其材力超越也長水掌長水宣曲胡騎長水胡部落名也胡騎屯宣曲觀下韋曜曰長水校尉典胡騎廏近長水故以爲名長水蓋關中小水名也射聲掌射聲士聞聲則射之故以爲名漢光武初改屯騎爲驍騎越騎爲青巾建武十五年復舊漢東京五校典宿衛士自遊擊至五校魏晉逮于江左初猶領營兵竝置司馬功曹主簿後省二中郎將本不領營也五營校尉秩二千石虎賁中郎將周官有虎賁氏漢武帝建元三年始㣲行出遊選材力之士執兵從送期之諸門故名期門無員多至千人平帝元始元年更名曰虎賁郎置中郎將領之虎賁舊作虎奔言如虎之奔走也王莾輔政以古有勇士孟賁故以奔爲賁比二千石宂從僕射漢東京有中黄門宂從僕射非其職也魏世因其名而置宂從僕射羽林監漢武帝太初元年初置建章營騎亦掌從送次期門後更名羽林騎置令丞宣帝令中郎將騎都尉監羽林謂之羽林中郎將漢東京又置羽林左監羽林右監至魏世不改晉罷羽林中郎將又省一監置一監而已自虎賁至羽林是爲三將哀帝省宋髙祖永初初復置江右領營兵江左無復營兵羽林監六百石積射將軍彊弩將軍漢武帝以路博徳爲彊弩校尉李沮爲彊弩將軍宣帝以許延夀爲彊弩將軍彊弩將軍至東漢爲雜號前漢至魏無積射晉太康十年立射營弩營置積射彊弩將軍主之自驍騎至彊弩將軍先並各置一人宋太宗泰始以來多以軍功得此官今並無復員殿中將軍殿中司馬督晉武帝時殿内宿衛號曰三部司馬置此二官分隸左右二衛江右初員十人朝㑹宴饗則將軍戎服直侍左右夜開城諸門則執白虎幡監之晉孝武太元中改選以門閥居之宋髙祖永初初增爲二十人其後過員者謂之殿中員外將軍員外司馬督其後並無復員武衛將軍無員初魏王始置武衛中郎將文帝踐阼改爲衛將軍主禁旅如今二衛非其任也晉氏不常置宋世祖大明中復置代殿中將軍之任比員外散騎侍郎武騎常侍無員漢西京官車駕游獵常從射猛獸後漢魏晉不置宋世祖大明中復置比奉朝請御史丞一人掌奏劾不法時御史大夫有二丞其一曰御史丞其二曰御史中丞殿中蘭臺祕書圖籍在焉而中丞居之外督部刺史内領侍御史受公卿奏事舉劾按章時中丞亦受奏事然則分有所掌也成帝綏和元年更名御史大夫爲大司空置長史而中丞官職如故哀帝建平二年復爲御史大夫元夀二年復爲大司空而中丞出外爲御史臺主名御史長史光武還曰中丞又屬少府獻帝時更置御史大夫自置長史一人不復領中丞也漢東京御史中丞遇尚書丞郎則中丞止車執版揖而丞郎坐車舉手禮之而已不知此制何時省中丞每月二十五日繞行宫垣白壁史臣按漢志執金吾每月三繞行宫城疑是省金吾以此事併中丞中丞秩千石治書侍御史掌舉劾官品第六已上漢宣帝齋居決事令御史二人治書因謂之治書御史漢東京使明法律者爲之天下讞疑事則以法律當其是非魏晉以來則分掌侍御史所掌諸曹若尚書二丞也侍御史於周爲柱下史周官有御史掌治令亦其任也秦置侍御史漢因之二漢員並十五人掌察舉非法受公卿奏事有違失者舉劾之凡有五曹一曰令曹掌律令二曰印曹掌刻印三曰供曹掌齋祠四曰尉馬曹堂官廐馬五曰乗曹掌䕶駕魏置御史八人有治書曹掌度支運課第曹掌考課不知其餘曹也晉西朝凡有吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中堅曹營軍曹筭曹法曹凡十三曹而置御史九人晉江左初省課第曹置庫曹掌廐牧牛馬市租後復分庫曹置外左庫内左庫二曹宋太祖元嘉中省外左庫而内左庫直云左庫世祖大明中復置廢帝景和元年又置順帝初省營軍併水曹省筭曹併法曹吏曹不置御史凡十御史焉魏又有殿中侍御史二人蓋是蘭臺遣二御史居殿内察非法也晉西朝四人江左二人秦漢有符節令隸少府領符璽郎符節令史蓋周禮典瑞掌節之任也漢至魏别爲一臺位次御史中丞掌授節銅虎符竹使符晉武帝太始九年省併蘭臺署符節御史掌其事焉謁者僕射一人掌大拜授及百官班次領謁者十人謁者掌小拜授及報章蓋秦官也謁請也應氏漢官曰堯以試舜賔于四門是其職也秦世謁者七十人漢因之後漢百官志謁者僕射掌奉引和帝世陳郡向熙爲謁者僕射賛拜殿中音動左右然則又有常侍謁者五人謁者則置三十五人半減西京也二漢竝隸光祿勲魏世置謁者十人晉武帝省僕射以謁者隸蘭臺江左復置僕射後又省宋世祖大明中復置秩比千石都水使者一人掌舟航及運部秦漢有都水長丞主陂池灌溉保守河渠屬太常漢東京省都水置河隄謁者魏因之漢世水衡都尉主上林苑魏世主天下水軍舟船器械晉武帝省水衡置都水使者而河隄爲都水官屬有參軍二人謁者一人令史減置無常員晉西朝有參軍而無謁者謁者則江左置也懐帝永嘉六年胡入洛陽都水使者爰濬先出督運得免然則武帝置職便掌運矣江左省河隄太子太傅一人丞一人太子少傅一人丞一人傅古官也文王世子曰凡三王教世子太傅在前少傅在後並以輔導爲職漢髙帝九年以叔孫通爲太子太傅位次太常二漢並無丞魏世無東宫然則晉氏置丞也晉武帝太始五年詔太子拜太傅少傅如弟子事師之禮二傅不得上疏曲敬二傅並有功曹主簿五官太傅中二千石少傅二千石太子詹事一人丞一人職比臺尚書令領軍將軍詹省也漢西京則太子門大夫庶子洗馬舎人屬二𫝊率更令家令僕衛率屬詹事皆秦官也後漢省詹事太子官屬悉屬少𫝊而太𫝊不復領官屬晉初太子官屬通屬二傅咸寧元年復置詹事二傅不復領官屬詹事一千石家令一人丞一人晉世置漢世太子食湯沐邑十縣家令主之又主刑獄飲食職比廷尉司農少府漢東京主食官令食官令晉世自爲官不復屬家令率更令一人主宫殿門户及賞罰事職如光祿勲衛尉漢東京掌庶子舎人晉世則不也自漢至晉家令在率更下宋則居上僕一人漢世太子五日一朝非入朝日遣僕及中允旦入請問起居主車馬親族職如太僕宗正自家令至僕爲太子三卿三卿秩千石門大夫二人漢東京置職如中郎將分掌逺近表牋秩六百石中庶子四人職如侍中漢東京員五人晉減爲四人秩六百石中舎人四人漢東京太子官屬有中允之職在中庶子下洗馬上疑若令中書舎人矣中舎人晉初置職如黄門侍郎食官令一人職如太官令漢東京官也今屬中庶子庶子四人職比散騎常侍中書監令晉制也漢西京員五人漢東京無員職如三署中郎古者諸侯世子有庶子之官秦因其名也秩四百石舎人十六人職如散騎中書侍郎晉制也二漢無員掌宿衛如三署中郎洗馬八人職如謁者祕書郎也二漢員十六人太子出則當直者前驅導威儀秩比六百石太子左衛率七人太子右衛率二人五率職如二衛秦時直云衛率漢因之主門衛晉初曰中衛率太始分爲左右各領一軍惠帝時愍懐太子在東宫加置前後二率成都王頴爲太弟又置中衛是爲五率江左初省前後二率孝武太元中又置皆有丞晉初置宋世止置左右二率秩舊四百石太子屯騎校尉太子歩兵校尉太子翊軍校尉三校尉各七人並宋初置屯騎歩兵因臺校尉翊軍晉武帝太康初置始爲臺校尉而以唐彬居之江左省太子宂從僕射七人宋初置太子旅賁中郎將十人職如虎賁中郎將宋初置周官有旅賁氏漢制天子有虎賁王矦有旅賁旅衆也太子左積弩將軍十人太子右積弩將軍二人漢東京積弩將軍雜號也無左右之積弩魏世至晉江左左右積弩爲臺職領營兵宋世度東宫無復營矣殿中將軍十人殿中員外將軍二十人宋初置平越中郎將晉武帝置治廣州主南越南蠻校尉晉武帝置治襄陽江左初省尋又置治江陵宋世祖孝建中省西戎校尉晉初置長史安帝義熙中又置治中寧蠻校尉晉武帝置治襄陽以授魯宗之南夷校尉晉武帝置治寧州江左改曰鎮蠻校尉四夷中郎校尉皆有長史司馬參軍魏晉有雜號䕶軍如將軍今猶有鎮蠻安逺等䕶軍鎮蠻以加廬江晉熙西陽太守安逺以加武陵内史刺史每州各一人黄帝立四監以治萬國唐虞世十二牧是其職也周改曰典秦曰監御史而更遣丞相史分刺諸州謂之刺史刺之爲言猶參覘也寫書亦謂之刺漢制不得刺尚書事是也刺史班行六條詔書其一條曰彊宗豪右田宅踰制以彊陵弱以衆暴寡其二條曰二千石不奉詔書遵承典制背公向私旁詔守利侵漁百姓聚斂爲姦其三條曰二千石不恤疑獄風厲殺人怒則加罰喜則任賞煩擾苛暴剝戮黎元爲百姓所疾山崩石裂妖祥譌言其四條曰二千石選署不平茍阿所愛蔽賢寵頑其五條曰二千石子弟恃怙榮勢請託所監其六條曰二千石違公下比阿附豪彊通行貨賂割損正令歲終則乘傳詣京師奏事成帝綏和元年改爲牧哀帝建平二年復爲刺史前漢世刺史乗傳周行郡國無適所治後漢世所治始有定處止八月行部不復奏事京師晉江左猶行郡縣詔棗據追逺詩曰先君爲鉅鹿太守迄今三紀忝私爲冀州刺史班詔次于郡傳是也靈帝世天下漸亂豪桀各據有州郡而劉焉劉虞竝自九卿出爲益州幽州牧其任漸重矣官屬有别駕從事史一人從刺史行部治中從事史一人主財穀簿書兵曹從事史一人主兵事部從事史每郡各一人主察非法主簿一人錄閤下衆事省署文書門亭長一人主州正門功曹書佐一人主選用孝經師一人主試經月令師一人主時節祠祀律令師一人平律簿曹書佐一人主簿書典郡書佐每郡各一人主一郡文書漢制也今有别駕從事史治中從事史主簿西曹書佐祭酒從事史議曹從事史部郡從事史自主簿以下置人多少各隨州舊無定制也晉成帝咸康中江州又有别駕祭酒居僚職之上而别駕從事史如故今則無也别駕西曹主吏及選舉事治中主衆曹文書事西曹即漢之功曹書佐也祭酒分掌諸曹兵賊倉户水鎧之屬揚州無祭酒而主簿治事荆州有從事史在議曹從事史下大較應是魏晉以來置也今廣州徐州有月令從事若諸州之曹史漢舊名也漢武元封四年令諸州歲各舉秀才一人後漢避光武諱改茂才魏復曰秀才晉江左揚州歲舉二人諸州舉一人或三歲一人隨州大小並對䇿問晉東海王越爲豫州牧牧置長史參軍庾凱爲長史謝鯤爲參軍此爲牧者則無也牧二千石刺史六百石郡守秦官秦滅諸侯隨以其地爲郡置守丞尉各一人守治民丞佐之郡當邊戌者丞爲長史晉江左皆謂之丞尉典兵備盜賊漢景帝中二年更名守曰太守尉爲都尉光武省都尉後又往往置東部西部都尉有蠻夷者又有屬國都尉漢末及三國多以諸部都尉爲郡晉成帝咸康七年又省諸郡丞宋太祖元嘉四年復置郡官屬畧如公府無東西曹有功曹史主選舉五官掾主諸曹事部縣有都郵門亭長又有主記史催督期㑹漢制也今畧如之諸郡各有舊俗諸曹名號往往不同漢武帝納董仲舒之言元光元年始令郡國舉孝亷制郡口二十萬以上歲察一人四十萬以上二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歲一人不滿十萬三歲一人限以四科一曰徳行髙妙志節清白二曰學通行修經中博士三曰明習法令足以決疑能案章覆問文中御史四曰剛毅多畧遭事不惑明足決斷材任三輔縣令魏初更制口十萬以上歲一人有秀異不拘户口江左以丹陽吳㑹稽吳興並大郡歲各舉二人漢制歲遣上計掾史各一人條上郡内衆事謂之階簿至今行之太守二千石丞六百石縣令長秦官也大者爲令小者爲長侯國爲相漢制置丞一人尉大縣二人小縣一人五家爲伍伍長主之二五爲什什長主之十什爲里里魁主之十里爲亭亭長主之十亭爲鄉鄉有鄉佐三老有秩嗇夫游徼各一人鄉佐有秩主賦税三老主教化嗇夫主爭訟游徼主姦非其餘諸曹畧同郡職以五官爲廷掾後則無復丞唯建康有獄丞其餘衆職或此縣有而彼縣無各有舊俗無定制也晉江右洛陽縣置六部都尉餘大縣置二人次縣小縣各一人宋太祖元嘉十五年縣小者又省之諸官府至郡各置五百者舊説古君行師從卿行旅從旅五百人也今縣令以上古之諸侯故立四五百以象師從旅從依古義也韋曜曰五百字本爲伍伯伍當也伯道也使之導引當道伯中以驅除也周制五百爲旅帥皆大夫不得卑之如此説也又周禮秋官有條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人近之矣名之異爾又漢官中有伯使主爲諸官驅使辟路於道伯中故言伯使此其比也縣令千石至六百石長五百石漢初王國置太傅掌輔導内史主治民丞相統衆官中尉掌武職分官置職畧同京師至景帝懲七國之亂更制諸王不得治國漢爲置吏改丞相曰相省御史大夫廷尉少府宗正博士官其大夫謁者諸官長丞皆損其員數後改漢内史爲京兆尹中尉爲執金吾郎中令爲光禄􅈴而王國如故又太僕爲僕司農爲大農成帝更令相治民如郡太守省内史其中尉如郡尉太傅但曰傅漢東京亦置傅一人王師事之相一人主治民中尉一人主盜賊郎中令一人掌郎中宿衛僕一人治書一人治書本曰尚書後更名治書中大夫無員掌奉使京師及諸國者及禮樂衛士醫工永巷祀禮長各一人郎中無員魏氏謁者官屬史闕不知次第晉武帝初置師友文學各一人師即傅也景帝諱師改爲傅宋世復改曰師其文學前漢已置也友者因文王仲尼四友之名也改太守爲内史省相及僕有郎中令中尉大農爲三卿大國置左右常侍各三人省郎中置侍郎二人大國又置上軍中軍下軍三將軍次國上軍將軍下軍將軍各一人小國上軍而已典書典祠典衛學官令典書令丞各一人治書四人中尉司馬世子庶子陵廟牧長各一人謁者四人中大夫六人舎人十人典醫丞典府丞各一人宋氏以來一用晉制雖大小國皆有三軍晉制典書令在常侍下侍郎上江左則侍郎次常侍而典書令居三軍下矣江左以來公國則無中尉常侍三軍侯國又無大農侍郎伯子男唯典書以下又無學官令矣吏職皆以次損省焉晉江右公侯以下置官屬隨國小大無定制也晉江左諸國並三分食一元帝太興元年始制九分食一太傅太保太宰太尉司徒司空大司馬大將軍諸位從公右第一品特進驃騎車騎衛將軍諸大將軍諸持節都督右第二品侍中散騎常侍尚書令僕射尚書中書監令祕書監諸征鎮至龍驤將軍光祿大夫諸卿尹太子二傅大長秋太子詹事領䕶軍縣侯右第三品二衛至五校尉寧朔至五威五武將軍四中郎將刺史領兵者戎蠻校尉御史中丞都水使者鄉矦右第四品給事中黄門散騎中書侍郎謁者僕射三將積射彊弩將軍太子中庶子庶子三卿率鷹揚至陵江將軍刺史不領兵者郡國太守内史相亭侯右第五品尚書丞郎治書侍御史侍御史三都尉博士撫軍以上及持節都督領䕶長史司馬公府從事中郎將廷尉正監評祕書著作丞郎王國公三卿師友文學諸縣署令千石者太子門大夫殿中將軍司馬督雜號䕶軍關内侯右第六品謁者殿中監諸卿尹丞太子傅詹事率丞諸軍長史司馬六百石者諸府參軍戎蠻府長史司馬公府掾屬太子洗馬舎人食官令諸縣令六百石者右第七品内臺正令史郡丞諸縣署長雜號宣威將軍以下右第八品内臺書令史外臺正令史諸縣署丞尉右第九品凡新置不見此諸條者隨秩位所視蓋闕右所定也宋書卷四十宋書卷四十考證百官志下漢百官表秦曰給事黄門無員掌侍從左右漢因之秦監本訛奏今改正太官令一人丞一人臣承蒼按此似宜另爲一條而諸本俱與太醫令相連當因漢時竝屬少府故耶虎賁舊作虎奔言如虎之奔走也王莾輔政以古有勇士孟賁故以奔爲賁臣照按牧誓言武王戎車三百兩虎賁三千人孔安國曰虎賁勇士稱也若虎賁獸言其猛也豈古字亦作奔王莽時改奔爲賁後遂并經文亦改耶抑王莽改奔爲賁之説出於傳訛附㑹也宋書卷四十考證
