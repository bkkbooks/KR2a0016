body:
  text: 宋書卷四十一梁沈約撰列傳第一后妃帝祖母號太皇太后母號皇太后妃號皇后漢舊制也晉武帝採漢魏之制置貴嬪夫人貴人是為三夫人位視王公淑妃淑媛淑儀修華修容修儀媫妤容華充華是為九嬪位視九卿其餘有美人才人才人爵視千石以下高祖受命省二才人其餘仍用晉制貴嬪魏文帝所制夫人魏武帝初建魏國所制貴人漢光武所制淑妃魏明帝所制淑媛魏文帝所制淑儀修華晉武帝所制修容魏文帝所制修儀魏明帝所制婕妤容華前漢舊號充華晉武帝所制美人漢光武所制世祖孝建三年省夫人修華修容置貴妃位比相國進貴嬪位比丞相貴人位比三司以為三夫人又置昭儀昭容昭華以代修華修儀修容又中才人􅂶衣以為散位昭儀漢元帝所制昭容世祖所制昭華魏眀帝所制中才人晉武帝所制充衣前漢舊制太宗泰始元年省淑妃昭華中才人􅂶衣復置修儀修容才人良人三年又省貴人置貴姬以備三夫人之數又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容修華修儀修容為九嬪婕妤容華􅂶華承徽􅍌榮凡五職班亞九嬪美人中才人才人三職為散役其後太宗留心後房擬外百官備位置内職列其名品于後後宫通尹準錄尚書紫極戸主光興戸主官品第一各置一人並銓六宫後宫􅍌叙準尚書令銓六宫紫極中監尹銓六宫光興中監尹銓六宫宣融戸主銓六宫紫極房帥置一人光興房帥置一人官品第二各置一人後宫司儀準左僕射銓人士後宫司政準右僕射銓人士叅議女林準銀青光錄銓人士中臺侍御尹銓六宫宣融便殿中監尹銓六宫采蓺房主銓六宫南房主銓六宫中藏女典銓六宫典坊銓六宫樂正銓六宫内保銓人士學林祭酒銓人士昭陽房帥置一人徽音房帥置一人宣融房帥置一人官品第三各置一人後宫都掌治職置二人準左右丞位比尚書銓人士後宫殿中治職置一人準左民尚書銓人士後宫源典治職置一人準祠部尚書銓人士後宫穀帛治職置一人準度支尚書中傅置一人銓人士後宮校事女史置一人銓人士紫極中監女史置一人銓人士光興中監女史置一人銓人士紫極房參事置人無定數銓人士有限外宣融房參事置人無定數銓人士冇限外中臺侍御奏案女史置一人銓人士贊樂女史置一人銓人士中訓女史置一人銓人士女祝史置一人紫極中監典置一人光興中監典置一人典樂帥置人無定數有限外紫極房廉帥祭酒置一人光興房廉帥祭酒置一人宣融房廉帥祭酒置一人官品第四後宫通闗參事置一人景徳房參事置人無定數銓人士采蓺房參事置人無定數銓人士南房參事置人無定數銓人士内房參事置一人銓人士校學女史置一人銓人士後宫中房帥置二人後宫源典帥置二人後宫穀帛帥置二人中臺帥置一人中臺侍御起居帥置二人中臺侍御詔誥帥置二人斯男房帥置一人宣豫房帥置一人景德房帥置一人采蓺房帥置一人中藏帥置一人内坊帥置一人南房帥置一人外華房帥置一人招慶房帥置一人紫極諸房廉帥置人無定數有限外紫極中監省帥置一人紫極殿帥置六人光興殿帥置四人徽音監帥置一人徽章監帥置一人宣融便殿中監典置一人清商帥置人無定數總章帥置人無定數左西章帥置人無定數右西章帥置人無定數中厨帥置一人官品第五中臺侍御執衞置人無定數中臺侍御監閨帥置二人中臺侍御監司帥置二人宣融便殿帥置一人永巷帥置一人後宫都掌内史置二人後宫殿中内史置一人後宫源典内史置一人後宫穀帛内史置二人後宫監臨内史置二人中臺侍御執法内史置一人中臺侍御典内史置二人中臺侍御節度内史置二人中臺侍御應内史置六人紫極房内史置一人光興房内史置一人助教置一人綵製帥置人無定數裝飾帥置人無定數繡帥置人無定數織帥置人無定數學林館帥置一人宫閨帥置一人教堂帥置人無定數有限外監解帥置人無定數累室帥置人無定數行病帥置人無定數官品第六合堂帥置二人御清帥置一人監夜帥置一人諸房禁防置人無定數三廂禁防置三人諸房厨帥各置一人中厨廉置三人應閨置六人諸應閤置人無定數宫閨史置一人官品第七諸房中掾各置一人中藏掾各置二人比五品勑吏紫極供殿直倀光興供殿直倀總章伎倀侍御扶侍主衣準二衞五品勑吏比六品供殿左右紫極置二十人光興置十人左右守藏置四人典樂人比諸房禁防作倀比王官供殿給使紫極置二十人光興置十人典殿置人無定數比官人紫極三廂給事置十人全堂給使置五人宫閨給使置六人比房孝穆趙皇后諱安下邳僮人也祖彪字世範治書侍御史父裔字彦胄平原太守后以晉穆帝升平四年嬪孝皇晉哀帝興寧元年四月二日生高祖其日后以産疾殂於丹徒官舍時年二十一葬晉陵丹徒縣東鄉練璧里雩山宋初追崇號謚陵曰興寧永初二年有司奏曰大孝之德盛於榮親一人有慶光被萬國是以靈文寵於西京夀張顯於隆漢故平原太守趙裔故洮陽令蕭卓並外屬尊戚不逮休寵臣等仰述聖思逺稽舊章並可追贈光祿大夫加金章紫綬裔命婦孫可豫章郡建昌縣君卓命婦趙可吳郡夀昌縣君孫氏東莞人也其年又詔曰推恩之禮在情所同故内樹宗子外崇后屬爰自漢魏咸遵斯典外祖趙光祿蕭光祿名噐雖隆茅土未建並宜追封開國縣侯食邑五百戸於是追封裔臨賀縣侯裔長子宣之仕至江乘令蚤卒無子以弟孫襲之繼宣之紹封襲之卒子祖憐嗣齊受禪國除宣之弟倫之自有傳孝懿蕭皇后諱文夀蘭陵蘭陵人也祖亮字保􅍈侍御史父卓字子畧洮陽令孝穆后殂孝皇帝聘后為繼室生長沙景王道憐臨川烈武王道規義熙七年拜豫章公太夫人高祖為宋王又加太妃之號高祖以十二年北伐仍停彭城夀陽至元熙二年入朝因受晉禪在外凡五年后常留東府高祖踐阼有司奏曰臣聞道積者慶流德洽者禮備故祗敬表於崇高嘉號彰於盛典伏惟太妃母儀之德化穆不言保翼之訓光被洪業雖幽眀同慶而稱謂未窮稽之前代禮有恒準宜式遵舊章允副羣望臣等參受宋王太后號故有司奏猶稱太妃也上以恭孝為行奉太后素謹及即大位春秋已高每旦入朝太后未嘗失時刻少帝即位加崇曰太皇太后景平元年崩於顯陽殿時年八十一遺令曰孝皇背世五十餘年古不祔葬且漢世帝后陵皆異處今可於塋域之内别為一壙孝皇陵墳本用素門之禮與王者制度奢儉不同婦人禮有所從可一遵往式乃開别壙與興寧陵合墳初高祖微時貧約過甚孝皇之殂葬禮多闕高祖遺㫖太后百嵗後不須祔葬至是故稱后遺㫖施行卓初與趙裔俱贈金紫光祿大夫又追封封陽縣侯妻下邳趙氏封吳郡夀昌縣君卓子源之襲爵源之見子思話傳武敬臧皇后諱愛親東莞人也祖汪字山甫尚書郎父儁字宣又郡功曹后適高視生㑹稽宣長公主興弟高祖以儉正率下后恭謹不違及髙祖興復晉室居上相之重而后噐服麤素不為親屬請謁義熙四年正月甲午殂於東城時年四十八追贈豫章公夫人還葬丹徒高祖臨崩遺詔留葬京師於是備法駕迎梓宫祔葬初寧陵宋初追贈儁金紫光祿大夫妻高密叔孫氏封永陵平鄉君儁子燾燾弟熹子質自有傳武帝張夫人諱闕不知何郡縣人也義熙初得幸高祖生少帝又生義興恭長公主惠媛永初元年拜為夫人少帝即位有司奏曰臣聞嚴親敬始所因者本充孝之道由中被外伏惟夫人徳並坤元徽音光劭發祥兆慶誕啓聖明宜崇極徽號允備盛則從春秋母以子貴之義遵漢晉推慶之典謹上尊號為皇太后宫曰永樂少帝既廢太后還璽紱隨居吳縣太祖元嘉元年拜營陽王太妃三年薨少帝司馬皇后諱茂英河内温人晉恭帝女也初封海鹽公主少帝以公子尚焉宋初拜皇太子妃少帝即位立為皇后元嘉元年降為營陽王妃又為南豐王太妃十六年薨時年四十七武帝胡媫妤諱道女淮南人義熙初為高祖所納生文帝五年被譴賜死時年四十二葬丹徒高祖踐阼追贈媫妤太祖即位有司奏曰臣聞德厚者禮尊慶深者位極故閟宫既構咏歌先妣園陵崇衛聿追來孝伏惟先媫妤柔明塞淵光備六列徳昭坤範訓洽母儀用能啓祚聖明奄宅四海嚴親莫逮天祿永違臣等遠準春秋近稽漢晉謹上尊號曰章皇太后陵曰熙寧立廟於京師太后兄子元慶位至奉朝請文帝袁皇后諱齊媯陳郡陽夏人左光祿大夫敬公湛之庶女也母本卑賤后年至六嵗方見舉後適太祖初拜宜都王妃生子劭東陽獻公主英娥上待后恩禮甚篤袁氏貧薄后每就上求錢帛以贍與之上性節儉所得不過三五萬三五十匹後潘淑妃有寵愛傾後宫咸言所求無不得后聞之欲知信否乃因潘求三十萬錢與家以觀上意信宿便得因此恚恨甚深稱疾不復見上上每入必他處囘避上數掩伺之不能得始興王濬諸庶子問訊后未嘗視也后遂憤恚成疾元嘉十七年疾篤上執手流涕問所欲不言后視上良久乃引被覆面崩於顯陽殿時年三十六上甚相悼痛詔前永嘉太守顔延之為哀䇿文甚麗其辭曰龍輁纚綍容翟結驂皇塗昭列神路幽嚴皇帝親臨祖饋躬瞻宵載飾遺儀於組旒想徂音乎珩珮悲黼筵之移御痛翬褕之重晦降輿客位撒奠殯階乃命史臣誄徳述懐其辭曰倫昭麗昇有物有憑圓精初鑠方祗始凝昭哉世族祥發慶膺祕儀景胄圖光玉繩昌輝在隂柔明将進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章增絢象服是加言觀惟則俾我王風始基嬪徳蕙問川流芳猷淵塞方江泳漢再謡南國伊昔不造洪化中微用集賢命仰陟天機釋位公宫登耀紫闈欽若皇姑允廸前徽孝逹寧親敬行宗祀進思才淑傍綜圖史發音在咏動容成紀壼政穆宣房樂昭理坤則順成星軒潤飾徳之所届惟深必測下節震騰上清朓側有來斯雍無思不極謂道輔仁司化莫晣象物方臻眡䘲告沴大和既融收華委世蘭殿長隂椒塗弛衞嗚呼哀哉戒涼在律杪秋即穸霜夜流唱曉月升魄八神誓引五輅遷迹噭噭儲嗣哀哀列辟灑零玉墀雨泗丹掖撫存悼亡感今懐昔嗚呼哀哉南背國門北首山園僕人案節服馬顧轅遥酸紫蓋眇泣素軒滅綵清都夷體夀原邑野淪藹戎夏悲嚾來芳可述徃駕弗援嗚呼哀哉策既奏上自益撫存悼亡感今懐昔八字以致其意焉有司奏諡宣皇后上特詔曰元初后生劭自詳視之馳白太祖此兒形貎異常必破國亡家不可舉便欲殺之太祖狼狽至后殿户外手撥幔禁之乃止后亡後常有小小靈應沈羙人者太宗所生也嘗以非罪見責應賜死從后昔所住徽音殿前度此殿有五間自后崩後常閉羙人至殿前流涕大言曰今日無罪就死先后若有靈當知之殿諸窻户應聲豁然開職掌遽白太祖太祖驚往視之羙人乃得釋大明五年世祖詔曰昔漢道既靈博平煇絶魏國方安嘉憲啓策皆因心所𢎞酌典沿誥亡外祖親王夫人柔徳淑範光啓坤載屬内位闕正攝饋閨庭儀被芳闈聞宣戚里永言感逺思追榮秩宜式傍鴻則敬登徽序乃追贈豫章郡新淦縣平樂鄉君后之所生母也又詔趙蕭臧光祿袁敬公平樂郡君墓先未給塋户加世數已逺􅉙嗣衰陵外戚尊屬不宜使墳塋蕪穢可各給蠻户三以供灑掃后父湛之自有傳文帝路淑媛諱惠男丹陽建康人也以色貎選入後宫生孝武帝拜為淑媛年既長無寵常隨世祖出蕃世祖入討元凶淑媛留尋陽上即位遣建平王宏奉迎有司奏曰臣聞厯集周邦徽音充嗣氣淳漢國沙麓發祥昔在上代業隆胙逺未有不敷隂教以闡洪基膺淑慶以載聖哲者也伏惟淑媛柔明内昭徽儀外範合靈初廸則庶姬仰燿引訓蕃閫則家邦被徳民應惟和神屬惟祉故能誕鍾叡躬用集大命固靈根於既殞融盛烈乎中興載厚化深聲詠允緝宜式諧舊典恭享極號奉尊號曰皇太后宫曰崇憲太后居顯陽殿上於閨房之内禮敬甚寡有所御幸或留止太后房内故民間諠然咸有醜聲宫掖事祕莫能辨也孝建二年追贈太后父興之散騎常侍興之妻徐氏餘杭縣廣昌鄉君大明四年太后弟子撫軍叅軍瓊之上表曰先臣故懐安令道慶賦命乖辰自違明世敢緣衞戍請名之典特乞雲雨微􅑰灑潤詔付門下有司承㫖奏贈給事中瓊之及弟休之茂之竝超顯職太后頗豫政事賜與瓊之等財物家累千金居處服噐與帝子相侔瓊之宅與太常王僧逹竝門嘗盛車服衞從造僧逹僧逹不為之禮瓊之以訴太后太后大怒告上曰我尚在而人皆陵我家死後乞食矣欲辠僧逹上曰瓊之年少自不宜輕造詣王僧逹貴公子豈可以此事加辠大明五年太后隨上廵南豫州妃主以下竝從廢帝即位號太皇太后太宗踐阼號崇憲太后初太宗少失所生為太后所攝飬太宗盡心祗事而太后撫愛亦篤及上即位供奉禮儀不異舊日有司奏曰夫徳敷於内典章必逺化覃於外徽號宜宣伏惟皇太后懿聖自天母儀允著義明八逺道變九圍聖明登御景胙攸改皇太后宜即前號别居外宫詔曰朕備丁艱罰蚤嬰孤苦特䝉崇憲太后聖訓撫育昔在蕃閫常奉藥膳中廹凶威抱懐莫遂今泰運初啓情典獲申方欲親奉晨昏盡歡閨禁不得如所奏尋崩時年五十五遷殯東宫門題曰崇憲宫上又詔曰朕幼集荼蓼夙憑徳訓龕虣定業實資仁範恩著屯夷有兼常慕夫禮沿情施義循事立可特齊衰三月以申追仰之心諡曰昭皇太后葬世祖陵東南號曰修寧陵先是晉安王子勛未卒巫者謂宜開昭太后陵以為厭勝修復倉卒不得如禮上性忌慮將來致灾泰始四年夏詔有司曰崇憲昭太后修寧陵地大明之世久所考卜前嵗遭諸蕃之難禮從權宜奉營倉卒未暇營改而塋隧之所山原卑陋頃年穨壊日有滋甚恒費修整終無永固且詳考地形殊乖相勢朕蚤䝉慈遇情禮兼常思使終始之義載彰幽顯史官可就巖山左右更宅吉地明審龜筮須選令辰式遵舊典以禮剏制今中㝢雖寧邊虜未息營就之功務在從簡舉言尋悲情如切割有司奏北疆未緝戎役是務禮之詳畧各沿時宜臣等參議修寧陵𤣥宫補治毁壊權施油殿暫出梓宫事畢即窆於事為允詔可瓊之為衡陽内史先后卒廢帝景和中以休之為黄門侍郎茂之左軍將軍竝封開國縣侯邑千户又追贈興之侍中金紫光祿大夫諡曰孝侯道慶散騎常侍光祿大夫開府儀同三司諡曰敬侯立道慶女為皇后以休之為侍中茂之黄門郎太宗廢幼主欲説太后之心乃下令書曰太皇太后蚤􅑰愛遇沿情即事同於天屬前車騎咨議叅軍路休之前丹陽丞路茂之崇憲密戚蚤延榮貴並懐所勲宜殊恒飾休之可黄門侍郎領歩兵校尉茂之可中書侍郎太宗未即位故稱令書茂之又遷司徒從事中郎休之桂陽王休範鎭北咨議參軍太宗殺世祖諸子因此陷休之等宥其諸子孝武文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝豫章王子尚山隂公主楚玉臨淮康哀公主楚佩皇女楚琇康樂公主修明世祖在蕃后甚有寵上入伐凶逆后留尋陽與太后同還京都立為皇后大明四年后率六宫躬桑於西郊皇太后觀禮上下詔曰朕卜祥大昕測辰拂羽爰詔六宫親蠶川室皇太后降鑾從御佇蹕觀禮綠蘧既具𤣥紞方修庶儀發椒闈化動中縣妃主以下可量加班錫廢帝即位尊曰皇太后宫曰永訓其年崩於含章殿時年三十八祔葬景寧陵后父偃字子游晉丞相導𤣥孫尚嘏之子也母晉孝武帝女鄱陽公主宋受禪封永成君偃尚高祖第二女吳興長公主諱榮男少歴顯官黄門侍郎祕書監侍中元嘉末為散騎常侍右衞将軍世祖即位以后父授金紫光祿大夫領義陽王師常侍如故遷右光祿大夫常侍王師如故偃謙虛恭謹不以世事闗懐孝建二年卒時年五十四追贈開府儀同三司本官如故諡曰恭公長子藻位至東陽太守尚太祖第六女臨川長公主諱英媛公主性妒而藻别愛左右人吳崇祖前廢帝景和中主䜛之於廢帝藻坐下獄死主與王氏離婚泰始初以主適豫章太守庾沖逺未及成禮而沖逺卒宋世諸主莫不嚴妒太宗每疾之湖孰令袁慆妻以妒忌賜死使近臣虞通之撰妒婦記左光祿大夫江湛孫斆當尚世祖女上乃使人為斆作表讓婚曰伏承詔㫖當以臨海公主降嬪榮出望表恩加典外顧審輶蔽伏用憂惶臣寒門顇族人凡質陋閭閻有對本隔天姻如臣素流室貧業寡年近將冠皆已有室荆釵布帬足得成禮每不自解無偶迄兹謀訪莫尋素族弗問自惟門慶屬降公主天恩所覃容及醜末懐憂抱惕慮不獲免徴命所當果膺兹舉雖門泰宗榮於臣非幸仰緣聖貸冐陳愚實自晉氏以來配上王姬者雖累經羙胄亟有名才至如王敦懾氣桓温歛威眞長佯愚以求免子敬炙足以違詔王偃無仲都之質而倮露於北階何瑀闕龍工之姿而投軀於深井謝莊殆自同於矇室殷沖幾不免於彊鉏數人者非無才意而勢屈於崇貴事隔於聞覽吞悲茹氣無所逃訴制勒甚於僕𨽻防閑過於婢妾往來出入人理之常當賔待客朋友之義而令掃轍息駕無闚門之期廢筵抽席絶接對之理非唯交友離異乃亦兄弟疎濶第令受酒肉之賜制以動静監子荷錢帛之私節其言笑姆妳爭媚相勸以嚴妮媪競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未閑是非聽言語則謬於虛實姆妳敢恃耆舊唯贊妒忌尼媪自倡多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辯與誰衣被故敝必責頭領又出入之宜繁省難𠂻或進不獲前或入不聽出不入則嫌於欲疏求出則疑有别意召必以三晡為期遣必以日出為限夕不見晩魄朝不識曙星至於夜歩月而弄琴晝拱袂而披卷一生之内與此長乖又聲影纔聞則少婢奔迸裾袂向席則老醜叢來左右整刷以疑寵見嫌賔客未冠以少容致斥禮則有􅍌媵象則有貫魚本無嫚嫡之嫌豈有輕婦之誚况今義絶旁私䖍恭正匹而每事必言無儀適設辭輙言輕易我又竊聞諸主集聚唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恒意不可貸借固實常辭或言野敗去或言人笑我雖家曰私理有甚王憲發口所言恒同科律王藻雖復彊佷頗經學渉戲笑之事遂為寃魂禇曖憂憤用致夭絶傷理害義難以具聞夫螽斯之徳實致克昌專妒之行有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪必將毁族淪門豈伊身𤯝前後嬰此其人雖衆然皆患彰遐邇事融天朝故吞言咽理無敢論訴臣幸屬聖明矜照由道𢎞物以典處親以公臣之鄙懐可得自盡如臣門分世荷殊榮足守前基便預提拂清官顯宦或由才升一叨婚戚咸有恩假是以仰冐非宜披露丹實非唯止陳一已規全身願實乃廣申諸門憂患之切伏願天慈照察特賜蠲停使燕雀微羣得保叢蔚蠢物含生自己彌篤若恩詔雖降披請不申便當刋膚剪髪投山竄海太宗以此表徧示諸主於是臨川長公主上表曰妾遭隨竒薄絶於王氏私庭囂戾致此分異今孤疾㷀然假息朝夕情寄所鍾唯在一子契濶荼炭特兼憐愍否泰枯榮繋以為命實願申其門釁還為母子推遷僶俛未及自聞先朝慈愛鑑妾丹𠂻若賜使息徹歸第定省仰揆天㫖或有可尋今事廹誠切不顧典憲敢緣恩燾觸冐披聞特乞還身王族守飬弱嗣雖死之日實甘於生許之藻弟懋昇明末貴逹懋弟攸太宰從事中郎蚤卒追贈黄門侍郎弟臻昇明末顯宦前廢帝何皇后諱令婉廬江􅈞人也孝建三年納為皇太子妃大明五年薨於東宫徽光殿時年十七葬闕諡曰獻妃上更為太子置内職二等曰保林曰良娣納南中郎長史太山羊瞻女為良娣宜都太守袁僧惠女為保林廢帝即位追崇獻妃曰獻皇后太宗踐阼遷后與廢帝合葬龍山北后父瑀字穉玉晉尚書左僕射澄曾孫也祖融大司農瑀尚高祖少女豫章康長公主諱欣男公主先適徐喬羙容色聰敏有智數太祖世禮待特隆瑀豪競於時與平昌孟靈休東海何勗等竝以輿馬驕奢相尚公主與瑀情愛隆密何氏外姻疏戚莫不沾被恩紀瑀歴位清顯至衞將軍大明八年公主薨瑀墓開世祖追贈金紫光祿大夫加散騎常侍子邁尚太祖第十女新蔡公主諱英媚邁少以貴戚居顯宦好犬馬馳逐多聚才力之士有墅在江乘縣界去京師三十里邁每游履輙結駟連騎武士成羣大明末為豫章王子尚撫軍咨議參軍加寧朔將軍南濟隂太守廢帝納公主於後宫偽言薨殞殺一婢送出邁第殯葬行喪禮常疑邁有異圖邁亦招聚同志欲因行幸廢立事覺廢帝自出討邁誅之太宗即位追封建寧縣侯食邑五百户子曼倩嗣齊受禪國除瑀兄子亮孝建初為桂陽太守丞相南郡王義宣為逆遣參軍王師夀斷桂陽道以防廣州刺史宗慤收亮斬之官至新安内史亮弟恢廢帝元徽初為廣州刺史未之鎮坐國哀朞晦不到免官復起為都官尚書未拜卒恢弟誕司徒右長史誕弟衍最知名性躁動太宗初為建安王休仁司徒從事中郎仍除黄門郎未拜竟求轉司徒司馬得司馬復求太子右率拜右率一二日復求侍中旬日之間求進無已不得侍中以怨詈賜死文帝沈婕妤諱容不知何許人也納於後宫為羙人生明帝拜為婕妤元嘉三十年卒時四十葬建康之莫府山世祖即位追贈湘東國太妃太宗即位有司奏曰昔豳都追遠正邑纒哀緬慕徳義敬奉園陵先太妃徳履端華徽景明峻風光宸掖訓流國闈鞠聖誕靈蚤捐鴻祚臣等遠模漢冊近儀晉典謹上尊號為皇太后下禮官議諡諡曰宣太后陵號曰崇寧以太后弟道慶為給事中泰始三年卒追贈通直散騎常侍賜爵縣侯又追贈太后父散騎常侍母王氏成樂鄉君明恭王皇后諱貞風琅邪臨沂人也元嘉二十五年拜淮陽王妃太宗改封湘東王妃生晉陵長公主伯姒建安長公主伯媛太宗即位立為皇后上常宫内大集而臝婦人觀之以為懽笑后以扇障面獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而羸婦人形體以此為樂外舍之為懽適實與此不同帝大怒遣后令起后兄揚州刺史景文以此事語從舅陳郡謝緯曰后在家為儜弱婦人不知今叚遂為剛正如此廢帝即位尊為皇太后宫曰𢎞訓廢帝失徳太后每加勗譬始者猶見順從後狂慝轉甚漸不悦元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害已令太醫煑藥左右人止之曰若行此事官便應作孝子豈復得出入狡獪帝曰汝語大有理乃止順帝即位齊王秉權宗室劉晃劉綽卜伯興等有異志太后頗與相闗順帝禪位太后與帝遜於東邸因遷居丹陽宫拜汝隂王太妃順帝殂於丹陽更立第京邑建元元年薨於第時年四十四追加號諡葬以宋后禮父僧朗事别見景文傳明帝陳貴妃諱妙登丹陽建康人屠家女也世祖常使尉司採訪民間子女有姿色者太妃家在建康縣界家貧有草屋兩三間上出行問尉曰御道邊那得此草屋當由家貧賜錢三萬令起瓦屋尉自送錢與之家人竝不在唯太妃在家時年十二三尉見其容質甚羙即以白世祖於是迎入宫在路太后房内經二三年再呼不見幸太后因言於上以賜太宗始有寵一年許衰歇以乞李道兒尋又迎還生廢帝故民中皆呼廢帝為李氏子廢帝後每自稱李將軍或自謂李統太宗即位拜貴妃禮秩同皇太子妃廢帝踐阼有司奏曰臣聞河龍啓聖理洽民神郊電基皇慶爍天地故資敬之道粹古銘風㳂貴之誼眇代凝則伏惟貴妃含和日晷表淑星樞徽音峻古柔光照世聲華帝掖軌秀天嬪景發皇明祚昌睿命而備物之章未煥彝䇿逺酌前王允陟鴻典臣等參議謹上尊號曰皇太妃輿服一如晉孝武帝太后故事置家令一人改諸國太妃曰太妃妃音怡宫曰𢎞化追贈太妃父金寳散騎常侍金寳妻王氏永世縣成樂鄉君昇明初降為蒼梧王太妃伯父照宗中書通事舍人叔仏念歩兵校尉兄敬元通直郎南魯郡太守仏念大通貨賄侵亂朝政昇明初賜死後廢帝江皇后諱簡珪濟陽考城人北中郎長史智淵孫女泰始五年太宗訪求太子妃而雅信小數名家女多不合后弱小門無彊廕以卜筮最吉故為太子納之諷朝士州郡令獻物多者將直百金始興太守孫奉伯止獻琴書其外無餘物上大怒封藥賜死既而原之太子即帝位立為皇后帝既廢降為蒼梧王妃智淵自有傳明帝陳昭華諱法容丹陽建康人也太宗晩年痿疾不能内御諸弟姬人有懐孕者輙取以入宫及生男皆殺其母而以與六宫所愛者飬之順帝桂陽王休範子也以昭華為母焉明帝崩昭華拜安成王太妃順帝即位進為皇太妃順帝禪位去皇太妃之號順帝謝皇后諱梵境陳郡陽夏人右光祿大夫莊孫女也昇明二年立為皇后順帝禪位降為汝隂王妃莊自有傳史臣曰飲食男女民之大欲存焉故聖人順民情而為之度王宫六列士室二等皆司事設防典文曲立若夫義篤閫闈化形邦國古先哲王有以之致治者矣夫后妃專夕配以徳升姬嬙並御進非色幸欲使情有覃被愛罔偏流專貞内表妖蠱外息至於降班在四簮珥成行同列者三環珮係響乃可以燮理隂教輔佐君徳宋氏藉晉世令典娉納有章俔天作儷必四岳之後雖正位天閨禮亢尊極而衰懕易兆恩宴難留一謝屬車之塵永隔青蒲之地是故元后憤終良有以也自元嘉以降内職稍繁椒庭綺觀千門萬户而滛糚怪飾變炫無窮自漢氏昭陽之輪奐魏室九華之照曜曾不能概其萬一徒以所選止於軍署之内徵引極乎厮皁之間非晉氏採擇濫及冠冕也且愛止帷房權無外授戚屬餼賚歲時不過肴漿斯為羙矣及太祖之傾惑潘嫗謀及婦人大明之淪溺殷姬竝后匹嫡至使多難起於肌膚并命行於同産又况進於此者乎以斯言之三代二漢之亡於淫嬖非不幸也宋書卷四十一宋書卷四十一考證文帝袁皇后傳八神誓引誓引顔延之集作警引孝武文穆王皇后傳自惟門慶屬降公主天恩所覃容及醜末南史王偃傳屬作屢容作庸謝莊殆自同於曚室南史同作害室作叟數人者非有才意南史數字上有彼字一叨婚戚咸有恩假有南史作成明恭王皇后傳太宗改封湘東王妃臣承蒼按改封下當有又為二字宋書卷四十一考證
