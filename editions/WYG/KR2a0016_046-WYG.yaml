body:
  text: 宋書卷四十六梁沈約撰列傳第六趙倫之到彦之闕王懿張邵趙倫之字幼成下邳僮人也武穆皇后之弟幼孤貧事母以孝稱武帝起兵以軍功封閬中縣五等侯累遷雍州刺史武帝北伐倫之遣順陽太守傅𢎞之扶風太守沈田子出嶢柳大破姚泓於藍田及武帝受命以佐命功封霄城縣侯安北將軍鎮襄陽少帝即位徴拜䕶軍元嘉三年拜鎮軍將軍尋遷左光禄大夫領軍將軍倫之雖外戚貴盛而以儉素自處性野拙人情世務多所不解久居方伯頗覺富盛入為䕶軍資力不稱以為見貶光禄大夫范泰好戲謂曰司徒公􅆙必用汝老奴我不言汝資地所任要是外戚髙秩次第所至耳倫之大喜每載酒肴詣泰五年卒伯符嗣伯符字潤逺少好弓馬倫之在襄陽伯符為竟陵太守時竟陵蠻屢為寇伯符征討悉破之由是有將帥之稱後為寧逺將軍總領義徒以居宫城北每有火起及賊盗輒身貫甲胄助郡縣赴討武帝甚嘉之文帝即位累遷徐兖二州刺史為政苛暴吏人畏之若豺虎然而寇盗逺竄無敢犯境元嘉十八年徵為領軍將軍先是外監不𨽻領軍宜相統攝者自有别詔至此始統領焉二十一年轉豫州刺史明年為䕶軍將軍復為丹陽尹在郡嚴酷吏人苦之或至委叛被録赴水而死典筆吏取筆不如意鞭五十子倩尚文帝第四女海鹽公主初始興王濬以潘妃之寵故得出入後宮遂與公主私通及適倩倩入宮而怒肆詈搏擊引絶帳帶事上聞有詔離婚殺主所生蔣美人伯符慙懼𤼵病卒諡曰肅傳國至孫朂齊受禪國除王懿字仲德太原祁人自言漢司徒允弟幽州刺史懋七世孫也祖宏事石季龍父苖事苻堅皆為二千石仲德少沈審有意畧通隂陽解聲律苻氏之敗仲德年十七與兄叡同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤不能前困卧林中忽有青衣童兒騎牛行見仲德問曰食未仲德告飢兒去頃之復來携食與之仲德食畢欲行會水潦暴至莫知所如有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨之獲濟與叡相及渡河至滑臺復為翟遼所留使為將帥積年仲德欲南歸乃奔太山遼遣騎追之急夜行忽有炬火前導仲德隨之行百許里乃免晉太元末徙居彭城兄弟名犯晉宣元二帝諱並以字稱叡字元德北土重同姓謂之骨肉有逺來相投者莫不竭力營贍若不至者以為不義不為鄉里所容仲德聞王愉在江南是太原人乃徃依之愉禮之甚薄因至姑熟投桓𤣥值𤣥簒見輔國將軍張暢言及世事仲德曰自古革命誠非一族然今之起者恐不足以成大事元德果敢有智畧武帝甚知之告以義舉使於都下襲𤣥仲德聞其謀謂元德曰天下之事不可不密應機務速不在巧遲𤣥每冐夜出入今若圖之正湏一夫力耳事泄元德為𤣥所誅仲德奔竄會義軍尅建業仲德抱元德子方回出候武帝帝於馬上抱方回與仲德相對號泣追贈元德給事中封安復縣侯以仲德為中兵參軍武帝伐廣固仲德為前鋒大小二十餘戰每戰輒尅及盧循寇逼敗劉毅於桑落帝北伐始還士卒創痍堪戰者可數千人賊衆十萬舳艫百里奔敗而歸者咸稱其雄衆議並欲遷都仲德正色曰今天子當陽而治明公命世作輔新建大功威震六合妖賊豕突乗我逺徃既聞凱入將自奔散今自投草閒則同之匹夫匹夫號令何以威物義士英豪當自求其主爾此謀若行請自此辭矣帝悅之以仲德屯越城及賊自蔡洲南走遣仲德追之賊留其黨范崇民五十人高艦百餘城南陵仲德攻之大破崇民焚其舟艦收其散卒功􅃣諸將封新淦縣侯義熙十二年北伐進仲德征虜將軍加冀州刺史為前鋒諸軍事􅃣軍將軍檀道濟龍驤將軍王鎮惡向洛陽寧朔将軍劉遵考建武將軍沈林子出石門寧朔將軍朱超石胡藩向半城咸受統於仲德仲德率龍驤將軍朱牧寧逺將軍竺靈秀嚴綱等開鉅野入河乃總衆軍進據潼闗長安平以仲德為太尉諮議參軍武帝欲遷都洛陽衆議咸以為宜仲德曰非常之事常人所駭今暴師日久士有歸心固當以建業為王基俟文軌大同然後議之可也帝深納之使衛送姚泓先還彭城武帝受命累遷徐州刺史加都督元嘉三年進號安北將軍與到彦之北伐大破虜軍諸軍進屯靈昌津司兖既定三軍咸喜仲德獨有憂色曰胡虜雖仁義不足而凶狡有餘今歛戈北歸并力完聚若河冰冬合豈不能為三軍之憂十月虜於委粟津渡河進逼金墉虎牢洛陽諸軍相繼奔走彦之聞二城不守欲焚舟歩走仲德曰洛陽既陷則虎牢不能獨全勢使然也今賊去我千里滑臺猶有彊兵若便舍舟奔走士卒必散且當入濟至馬耳谷口更詳所宜乃回軍㳂濟南歴城歩上焚舟棄甲還至彭城仲德與彦之並免官尋與檀道濟救滑臺糧盡而歸九年又為鎮北將軍徐州刺史明年加領兖州刺史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以河北所遇也十三年進號鎮北大將軍十五年卒諡曰桓侯亦於廟立白狼童子壇每祭必祠之子正脩嗣為家僮所殺張邵字茂宗會稽太守裕之弟也初為晉琅邪内史王誕龍驤府功曹桓𤣥徙誕於廣州親故咸離棄之惟邵情意彌謹流涕追送時變亂饑饉又饋送其妻子桓𤣥簒位父敞先為尚書以答事微謬降為廷尉卿及武帝討𤣥邵白敞表獻誠欵帝大說命署其門曰有犯張廷尉者以軍法論後以敞為呉郡太守王謐為揚州召邵為主簿劉毅為亞相愛才好士當世莫不輻湊獨邵不徃或問之邵曰主公命世人傑何煩多問劉穆之聞以白帝益親之轉太尉參軍署長流賊曹盧循寇迫京師使邵守南城時百姓臨水望賊帝怪而問邵邵曰若節鉞未反奔散之不暇亦何能觀望今當無復恐耳尋補州主簿邵悉心政事精力絶人及誅劉藩邵時在西州直廬即夜誡衆曹曰大軍當大討可各脩舟船倉庫及曉取辦旦日帝求諸簿署應時即至怪問其速諸曹答曰昨夜受張主簿處分帝曰張邵可謂同我憂慮矣九年世子始開征虜府補邵録事參軍轉號中軍遷咨議參軍領記室十二年武帝北伐邵請見曰人生危脆必當逺慮穆之若邂逅不幸誰可代之尊業如此茍有不諱事將如何帝曰此自委穆之及卿耳青州刺史檀祗鎮廣陵時滁州結聚亡命祗率衆掩之劉穆之恐以為變將𤼵軍邵曰檀韶據中流道濟為軍首若疑狀𤼵露恐生大變宜且遣慰勞以觀其意既而祗果不動及穆之卒朝廷恇懼便欲𤼵詔以司馬徐羡之代之邵對曰今誠急病任終在徐且世子無專命宜湏北咨信反方使世子出命曰朝廷及大府事悉咨徐司馬其餘啟還武帝重其臨事不撓有大臣體十四年以世子鎮荆州邵諫曰儲貳之重四海所繫不宜處外敢以死請從之文帝為中郎將荆州刺史以邵為司馬領南郡相衆事悉決於邵武帝受命以佐命功封臨沮伯分荆州立湘州以邵為刺史將署府邵以為長沙内地非用武之國置署妨人乖為政要帝從之謝晦反遺書要邵邵不發函馳使呈帝元嘉五年轉征虜將軍領寧蠻校尉雝州刺史加都督初王華與邵有隙及華參要親舊為之危心邵曰子陵方𢎞至公必不以私讐害正義是任也華實舉之及至襄陽築長圍修立隄堰開田數千頃郡人頼之富贍丹淅二州蠻屢為寇邵誘其帥因大會誅之悉掩其徒黨既失信羣蠻所在並起水陸斷絶子敷至襄陽定省當還都羣蠻伺欲取之會蠕蠕國遣使朝貢賊以為敷遂執之邵坐降號揚烈將軍江夏王義恭鎮江陵以邵為撫軍長史持節南蠻校尉坐在雝州營私蓄取贓貨二百四十五萬下廷尉免官削爵土後為呉興太守卒追復爵邑諡曰簡伯邵臨終遺命祭以菜果葦蓆為轜車諸子從焉子敷演鏡有名於世敷字景𦙍生而母亡年數嵗問知之雖童䝉便有感慕之色至十嵗許求母遺物而散施已盡唯得一扇乃緘録之每至感思輒開笥流涕見從母悲感嗚咽性整貴風韻端雅好𤣥言善屬文初父邵使與南陽宗少文談繫象徃復數番少文每欲屈握麈尾歎曰吾道東矣於是名價日重武帝聞其羙召見竒之曰真千里駒也以為世子中軍參軍數見接引累遷江夏王義恭撫軍記室參軍義恭就文帝求一學義沙門會敷赴假江陵入辭文帝令以後車載沙門徃謂曰道中可得言晤敷不奉詔上甚不説遷正員中書郎敷小名查父邵小名梨文帝戲之曰查何如梨敷曰梨為百果之宗查何可比中書舍人狄當周赳並管要務以敷同省名家欲詣之赳曰彼恐不相容接不如勿徃當曰吾等並已員外郎矣何憂不得共坐敷先設二牀去壁三四尺二客就席敷呼左右曰移我逺客赳等失色而去其自標遇如此善持音儀盡詳緩之致與人别執手曰念相聞餘響久之不絶張氏後進皆慕之其源起自敷也遷黄門侍郎始興王濬後將軍司徒左長史未拜父在呉興亡成服凡十餘日方進水漿𦵏畢不進鹽菜遂毁瘠成疾伯父茂度每譬止之敷益更感慟絶而復續茂度曰我比止汝而乃益甚自是不復徃來期年而卒孝武即位旌其孝道追贈侍中改其所居為孝張里敷弟柬襲父封位通直郎柬有勇力手格猛獸元凶以為輔國將軍孝武至新亭柬出奔墜淮死子式嗣暢字少微邵兄偉之子也偉少有操行為晉琅邪王國郎中令從王至洛還京都武帝封藥酒一甖付偉令密加鴆毒受命於道自飲而卒暢少與從兄敷演鏡齊名為後進之秀起家為太守徐佩之主簿佩之被誅暢馳出奔赴制服盡哀時論美之弟牧嘗為猘犬所傷醫者云食蝦蟇可療牧難之暢含笑先甞牧因此乃食由是遂愈累遷太子中庻子孝武鎮彭城暢為安北長史沛郡太守元嘉二十七年魏主托䟦燾南征太尉江夏王義恭統諸軍出鎮彭城虜衆近城數十里彭城衆力雖多而軍食不足義恭欲棄彭城南歸計議彌日不定時歴城衆少食多安北中兵參軍沈慶之議欲以車營為函箱陳精兵為外翼奉二王及妃媛直趨歴城分城兵配䕶軍將軍蕭思話留守太尉長史何朂不同欲席卷奔鬱州自海道還都二議未決更集羣僚議之暢曰若歴城鬱州可至下官敢不髙讚今城内乏食人無固心但以闗扄嚴密不獲走耳若一揺動則潰然奔散雖欲至所在其可得乎今食雖寡然朝夕未至窘乏豈可捨萬全之術而即危亡之道此計必行下官請以頸血汚君馬跡孝武聞暢議謂義恭曰張長史言不可違也義恭乃止魏主既至登城南亞父塜於戲馬臺立氈屋先是隊主蒯應見執其日晡時遣送應至小市門致意求甘蔗及酒孝武遣送酒二器甘蔗百挺求駱駞明日魏主又自上戲馬臺復遣使至小市門求與孝武相見遣送駱駞并致雜物使於南門受之暢於城上與魏尚書李孝伯語孝伯問君何姓答曰姓張孝伯曰張長史乎暢曰君何得見識孝伯曰君名聲逺聞足使我知城内有具思者嘗在魏義恭使視知是孝伯乃開門餉物魏主又求酒及甘橘孝武又致螺盃雜物南土所珍魏主復令孝伯傳語曰魏主有詔借博具暢曰博具當為申致有詔之言正可施於彼國何得施之於此孝伯曰以隣國之臣耳孝伯又言太尉鎮軍久闕南信殊當憂邑若遣信當為䕶送暢曰此中閒道甚多亦不須煩魏孝伯曰亦知有水路似為白賊所斷暢曰君著白衣故號白賊也孝伯笑曰今之白賊亦不異黄巾赤眉但不在江南耳又求博具俄送與魏主又遣送氈及九種鹽并胡豉云此諸鹽各有宜白鹽是魏主所食黑者療腹脹氣滿刮取六銖以酒服之胡鹽療目痛柔鹽不用食療馬脊創赤鹽駮鹽臭鹽馬齒鹽四種並不中食胡豉亦中噉又求黄甘并云魏主致意太尉安北何不遣人來問觀我儀貌察我為人暢又宣㫖答曰魏主形狀才力久為來徃所見李尚書親自銜命不忍彼此不盡故不復遣又云魏主恨向所送馬殊不稱意安北若須大馬當送之脫須蜀馬亦有佳者暢曰安北不乏良駟送在彼意此非所求義恭又送炬燭十挺孝武亦致錦一匹又曰知更須黄甘若給彼軍即不能足若供魏主未當乏絶故不復致孝伯又曰君南土膏粱何為著屩君且如此將士云何暢曰膏粱之言誠以為愧但以不武受命綂軍戎陣之間不容緩服魏主又遣就二王借箜篌琵琶等器及棊子孝伯足詞辯亦北土之美暢隨宜應答甚為敏㨗音韻詳雅魏人美之時魏聲云當出襄陽故以暢為南譙王義宣司空長史南郡太守元凶弑逆義宣發哀之日即便舉兵暢為元佐舉哀畢改服著黄袴褶出射堂簡人音儀容止衆皆矚目見者皆為盡命事平徵為吏部尚書封夷道縣侯及義宣有異圖蔡超等以暢人望勸義宣留之乃解南蠻校尉以授暢加冠軍將軍領丞相長史暢遣門生荀僧寳下郡因顔竣陳義宣釁狀僧寳有私貨止巴陵不時下會義宣起兵津路斷絶遂不得前義宣將為逆使嬖人翟靈寳告暢暢陳必無此理請以死保之靈寳還白義宣云暢必不可回請殺以狥衆賴丞相司馬竺超民得免進號撫軍别立軍部以收人望暢雖署文檄飲酒常醉不省其事及義宣敗於梁山暢為軍人所掠衣服都盡遇右將軍王𤣥謨乗輿出營暢已得敗衣遂排𤣥謨上輿𤣥謨甚不悅諸將請殺之隊主張榮救之得免執送都下付廷尉見原起為都官尚書轉侍中孝武宴朝賢暢亦在坐何􅅯因醉曰張暢信竒才也與義宣作賊而卒無咎茍非竒才安能致此暢曰太初之時誰黄其閤帝曰何事相苦初尚之為元凶司空及義師至新林門人皆逃尚之父子共洗黄閤故暢以此譏之孝建二年出為會稽太守卒諡曰宣暢愛弟輯臨終遺命與輯合墳時議非之弟悦亦有美稱歴侍中臨海王子頊前將軍長史南郡太守晉安王子勛建偽號召拜為吏部尚書與鄧琬共輔偽政及事敗悦殺琬歸降復為太子中庻子後拜雍州刺史泰始六年明帝於巴郡置三巴校尉以悦補之加持節輔師將軍領巴郡太守未拜卒暢子浩官至義陽王昶征北諮議參軍浩弟淹黄門郎封廣晉縣子太子右衞率東陽太守逼郡吏燒臂照佛百姓有罪使禮佛贖刑動至數千拜免官禁錮起為光禄勲與晉安王子勛同逆軍敗見殺焉臣穆等案高氏小史趙倫之傳下有到彦之傳而此書獨闕約之史法諸帝稱廟號而謂魏為虜今帝稱帝號魏稱魏主與南史體同而傳末又無史臣論疑非約書然其辭差與南史異故特存焉宋書卷四十六宋書卷四十六考證王懿傳自言漢司徒允弟幽州刺史􅅷七世孫也允諸本誤元今從南史改正張邵傳惟邵情意彌謹意南史作禮自是不復徃來期年而卒來南本作未屬下句臣承蒼按張敷居喪决無與人徃來之事專用一徃字乃指敷伯父茂度徃敷所而言未期年所以傷其卒之速也作未字為是張暢附傳暢字少微臣照按張暢自有傳在五十九卷内不應重見於其兄傳後蓋八書殘缺後人以南北史補者多故每不成史法也暢少與從兄敷演鏡齊名鏡諸本皆作敬前張邵傳亦誤云子敷演敬有名於世今依南史改正不忍彼此不盡不忍南史作不患隊主張榮救之得免臣承蒼按南史作隊主張世營救得免張世即張興世本单名世太宗益為興世其後興世卒張暢子融為負土成墳事見齊書張融傳此當云張世救之得免蓋後人不察張興世之可書張世而誤以營救之營為人名遂改為張榮耳臣穆等按高氏小史臣承蒼按此下七十五字乃後人所増入穆是史官之名高氏小史唐元和中高峻作初六十卷其子逈釐益之為一百二十卷宋史言鄭穆字閎中在館閣三十年嘗編校集賢院書籍當即其人其言此卷非沈約書誠然不特帝稱帝號魏稱魏主與約書體例不合張邵傳首云會稽太守裕之弟也裕乃武帝諱不宜直犯張暢自有傳今重附於張邵傳後尤失㸃檢宋書卷四十六考證
