body:
  text: 宋書卷五十梁沈約撰列傳第十胡藩劉康祖垣䕶之張興世胡藩字道序豫章南昌人也祖隨散騎常侍父仲任治書侍御史藩少孤居喪以毁稱太守韓伯見謂藩叔尚書少廣曰卿此姪當以義烈成名州府辟召不就須二弟冠婚畢乃參郗恢征虜軍事時殷仲堪為荆州刺史藩外兄羅仚生為仲堪參軍藩請假還過江陵省仚生仲堪要藩相見接待甚厚藩因説仲堪曰桓𤣥意趣不常每怏怏於失職節下崇待太過非將來之計也仲堪色不悦藩退而謂仚生曰倒戈授人必至之禍若不早規去就後悔無及𤣥自夏口襲仲堪藩參𤣥後軍軍事仲堪敗仚生果以附從及禍藩轉參太尉將軍相國軍事義旗起𤣥戰敗將出奔藩於南掖門捉𤣥馬控曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎𤣥直以馬鞭指天而已於是奔散相失追及𤣥於蕪湖𤣥見藩喜謂張須無曰卿州故為多士今乃復見王叔治桑落之戰藩艦被燒全鎧入水濳行三十許歩方得登岸義軍既迫不復得西乃還家高祖素聞藩直言於殷氏又為𤣥盡節召為員外散騎侍郎參軍軍事從征鮮卑賊屯聚臨朐藩言於高祖曰賊屯軍城外留守必寡今徃取其城而斬其旗幟此韓信所以克趙也高祖乃遣檀韶與藩等濳徃既至即克其城賊見城陷一時奔走還保廣固累月將拔之夜佐史並集忽有鳥大如鵝蒼黑色飛入高祖帳裏皆駭愕以為不祥藩起賀曰蒼黒者胡虜之色胡虜歸我大吉之祥也明旦攻城陷之從討盧循於左里頻戰有功封吳平縣五等子除正員郎尋轉寧逺將軍鄱陽太守從伐劉毅毅初當之荆州表求東道還京辭墓去都數十里不過拜闕高祖出倪塘會之藩勸於坐殺毅高祖不從至是謂藩曰昔從卿倪塘之謀無今舉也又從征司馬休之復為參軍加建武將軍領游軍於江津徐逵之敗没高祖怒甚即日於馬頭岸渡江而江津岸峭壁立數丈休之臨岸置陣無由可登高祖呼藩令上藩有疑色高祖奮怒命左右録來欲斬之藩不受命顧曰藩寧前死耳以刀頭穿岸少容脚指於是徑上隨之者稍多既得登岸殊死戰賊不能當引退因而乗之一時奔散高祖伐羗假藩寧朔將軍參太尉軍事統别軍至河東暴風漂藩重艦渡北岸索虜牽得此艦取其器物藩氣厲心憤率左右十二人乗小船逕徃河北賊騎五六百見藩來並笑之藩素善射登岸射賊應弦而倒者十許人賊皆奔退悉收所失而反又遣藩及朱超石等追索虜於平城虜騎數重藩及超石所領皆割配新軍不盈五千率厲力戰大破之又與超石等擊姚業於蒲坂超石失利退還藩收超石所捨資實徐行而反業不敢追高祖還彭城參相國軍事時盧循餘黨與蘇淫賊大相聚結以為始興相論平司馬休之及廣固功封陽山縣男食邑五百戸少帝景平元年坐守東府開掖門免官尋復其職四年遷建武將軍江夏内史七年徵為遊擊將軍到彦之北伐南兖州刺史長沙王義欣進據彭城藩出戍廣陵行府州事轉太子左衞率十年卒時年六十二諡曰壯侯子隆世嗣官至西陽太守隆世卒子乾秀嗣藩庶子六十人多不遵法度藩第十四子遵世為臧質寧逺參軍去職還家與孔熙先同逆謀高祖以藩功臣不欲顯其事使江州以他事收殺之二十四年藩第十六子誕世第十七子茂世率羣從二百餘人攻破郡縣殺太守桓隆之令諸葛和之欲奉庶人義康值交州刺史檀和之至豫章討平之誕世兄車騎參軍新興太守景世景世弟寳世詣廷尉歸罪竝徙逺州乾秀奪國世祖初徙者竝得還劉康祖彭城呂人世居京口伯父簡之有志榦為高祖所知高祖將謀興復收集才力之士嘗再造簡之值有賓客簡之悟其意謂弟䖍之曰劉下邳頻再來必當有意既不得共語汝可試徃見之既至高祖已克京城䖍之即便投義簡之聞之殺耕牛會聚徒衆率以赴高祖簡之歴官至通直常侍少府太尉咨議參軍簡之弟謙之好學撰晉紀二十卷義熙末為始興相東海人徐道期流寓廣州無士行為僑舊所陵侮因刺史謝欣死合率羣不逞之徒作亂攻没州城殺士庻素憾者百餘傾府庫招集亡命出攻始興謙之破走之進平廣州誅其黨與仍行州事即以為振威將軍廣州刺史後為太中大夫䖍之誕節不營産業輕財好施高祖西征司馬休之魯宗之等遣參軍檀道濟朱超石歩騎出襄陽䖍之時為江夏相率府郡兵力出溳城屯三連立橋聚糧以待道濟等積日不至為宗之子軌所襲衆寡不敵參軍孫長庸流涕勸還軍䖍之厲色曰我仗順伐辠理無不克如其不幸命也戰敗見殺追贈梁秦二州刺史封新康縣男食邑五百戸康祖䖍之子也襲封為長沙王義欣鎮軍參軍轉員外散騎侍郎便弓馬膂力絶人在閭里不治士業以浮蕩蒱酒為事每犯法為郡縣所録輒越屋踰墻莫之能禽夜入人家為有司所圍守康祖突圍而出竝莫敢追因夜還京口半夕便至明旦守門詣府州要職俄而建康移書録之府州執事者竝證康祖其夕在京口遂見無恙前後屢被紏劾太祖以勲臣子每原貸之為員外郎十年再坐樗蒱戲免轉太子左積弩將軍隨射聲校尉裴方明西征仇池與方明同下廷尉康祖免官頃之世祖為豫州刺史鎮歴陽以康祖為征虜中兵參軍既被委任折節自修轉太子翊軍校尉久之遷南平王鑠安蠻府司馬元嘉二十七年春索虜托拔燾親率大衆攻圍汝南太祖遣諸軍救援康祖總統為前驅軍次新蔡與虜戰俱前百餘里濟融水虜衆大至奮擊破之斬偽殿中尚書任城公乞地真去縣瓠四十里燾燒營退走轉左軍將軍太祖欲大舉北伐康祖以歲月已晩請待明年上以河北義徒竝起若頓兵一周沮向義之志不許其年秋蕭斌王𤣥謩沈慶之等入河康祖率豫州軍出許洛𤣥謩等敗歸虜引大衆南度南平王鑠在壽陽上慮為所圍召康祖速反康祖回軍未至壽陽數十里會虜永昌王庫仁真以長安之衆八萬騎與康祖相及於尉武康祖凡有八千人軍副胡盛之欲附山依險間行取至康祖怒曰吾受命本朝清蕩河洛宼今自送不復逺勞王師犬羊雖多實易摧滅吾兵精器練去壽陽裁數十里援軍尋至亦何患乎乃結車營而進虜四面來攻大戰一日一夜殺虜填積虜分衆為三且休且戰以騎負草燒車營康祖率厲將士無不一當百虜死者大半會矢中頸死於是大敗舉營淪覆為虜所殺盡自免者裁數十人虜傳康祖首示彭城面如生胡盛之為虜生禽托跋燾寵之常在左右盛之有勇力初為長沙王義欣鎮軍參軍督䕶討劫譙郡縣西劫有馬歩七十逃隠深榛盛之挺身獨進手斬五十八級二十八年詔曰康祖班師尉武戎律靡忒對衆以寡殲殄大半猛氣雲騰志申力屈没世徇節良可嘉悼宜加甄寵以旌忠烈可贈益州刺史諡曰壯男傳國至齊受禪國除垣䕶之字彦宗略陽桓道人也祖敞仕苻氏為長樂國郎中令慕容德入青州以敞為車騎長史德兄子超襲偽位伯父遵父苖復見委任遵為尚書苖京兆太守高祖圍廣固遵苖踰城歸降竝以為太尉行參軍太祖元嘉中遵為員外散騎常侍苖屯騎校尉䕶之少倜儻不拘小節形狀短陋而氣榦彊果從高祖征司馬休之為世子中軍府長史兼行參軍永初中補奉朝請元嘉初為殿中將軍隨到彦之北伐彦之將回師䕶之為書諫曰外聞節下欲回師反斾竊所不同何者殘虜畏威望風奔迸八載侵地不戰克復方當長驅朔漠窮掃遺醜况乃自送無假逺勞宜使竺靈秀速進滑臺助朱修之固守節下大軍進擬河北則牢落遊魂自然奔退且昔人有連年攻戰失衆乏糧者猶張膽爭前莫肯輕退況今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈是朝廷受任之㫖彦之不納散敗而歸太祖聞而善之以補江夏王義恭征北行參軍北高平太守以載禁物繫尚方久之蒙宥又補衡陽王義季征北長流參軍遷宣威將軍鍾離太守隨王𤣥謨入河𤣥謨攻滑臺䕶之百舸為前鋒進據石濟石濟在滑臺西南百二十里及虜救至又馳書勸𤣥謨急攻曰昔武皇攻廣固死没者亦衆況事殊曩日豈得計士衆傷疲願以屠城為急不從𤣥謨敗退不暇報䕶之䕶之聞知而虜悉已牽𤣥謨水軍大艚連以鐵鏁三重斷河欲以絶䕶之路河水迅急䕶之中流而下每至鐵鏁以長柯斧斷之虜不能禁唯失一舸餘舸竝全留戍靡溝城還為江夏王義恭驃騎戸曹參軍戍淮隂加建武將軍領濟北太守率二千人復隨張永攻碻磝先據委粟津虜壯道雋與偽尚書伏連來援碻磝䕶之拒之賊因引軍東去蕭思話遣䕶之迎軍至梁山偽尚書韓元興率精騎卒至䕶之依險拒戰斬其都軍長史甲首數十賊乃退思話將引還誑䕶之云沈慶之救軍垂至可急於濟口立橋䕶之揣知其意即分遣白丁思話復令度河戍乞活堡以防衆軍三十年春太祖崩還屯歴下聞世祖入討率所領馳赴上嘉之以為督冀州之濟南樂安太原三郡諸軍事寧逺將軍冀州刺史孝建元年南郡王義宣反兗州刺史徐遺寳䕶之妻弟也逺相連結與䕶之書勸使同逆䕶之馳使以聞遺寳時戍湖陸䕶之留子恭祖守歴城自率歩騎襲遺寳道經鄒山破其别戍未至湖陸六十里遺寳焚城西走兗土既定徵為游擊將軍隨沈慶之等擊魯爽加輔國將軍義宣率大衆至梁山與王𤣥謨相持柳元景率䕶之及䕶之弟詢之柳叔仁鄭琨等諸軍出鎮新亭𤣥謨見賊强盛遣司馬管法濟求救甚急上遣元景等進據南州䕶之水軍先發賊遣將龐法起率衆襲姑熟適值䕶之鄭琨等至奮擊大破之斬獲及投水死略盡𤣥謨馳信告元景曰西城不守唯餘東城衆寡相懸請退還姑熟更議進取元景不許將悉衆赴救䕶之勸分軍援之元景然其計乃以精兵配䕶之赴梁山及戰䕶之見賊舟艦累水謂𤣥謨曰今當以火平之即使隊主張談等燒賊艦風猛水急賊軍以此奔散梁山平䕶之率軍追討會朱修之以平江陵至尋陽而還遷督徐兗二州豫州之梁郡諸軍事寧朔將軍徐州刺史封益陽縣侯食邑千戸弟詢之驍敢有氣力元凶夙聞其名以副輔國將軍張柬時張超首行大逆亦領軍𨽻柬詢之規殺之慮柬宿有此志又測詢之同否互相觀察會超來論事柬色動詢之覺之即共定謀遣信召超超疑之不至改宿他所詢之不知其移逕斫之殺其僕於牀因與柬南奔柬溺淮死詢之得至時世祖已即位以為積弩將軍梁山之役力戰為流矢所中死追贈冀州刺史二年䕶之坐論功挾私免官復為游擊將軍俄遷大司馬輔國將軍領南東海太守未拜復督青冀二州諸軍事寧逺將軍青冀二州刺史鎮歴城明年進號寧朔將軍進督徐州之東莞闕二郡軍事世祖以歴下要害欲移青州并鎮歴城議者多異䕶之曰青州北有河濟又多陂澤非虜所向每來寇掠必由歴城二州并鎮此經逺之略也北又近河歸順者易近息民患逺申王威安邊之上計也由是遂定大明二年徵為右衛將軍還於道聞司空竟陵王誕於廣陵反叛䕶之即率部曲受車騎大將軍沈慶之節度事平轉西陽王子尚撫軍司馬臨淮太守明年出為使持節督豫司二州諸軍事輔國將軍豫州刺史淮南太守復𨽻沈慶之伐西陽蠻䕶之所莅多聚歛賄貨充積七年坐下獄免官明年復起為太中大夫未拜其年卒時年七十諡曰壯侯前廢帝永光元年追贈冠軍將軍豫州刺史子承祖嗣承祖卒子顯宗嗣齊受禪國除䕶之次子恭祖勇果有父風太宗㤗始初以軍功為梁南秦二州刺史遵子閬元嘉中為員外散騎侍郎母墓為東阿寺道人曇洛等所發閬與弟殿中將軍閎共殺曇洛等五人詣官歸辠見原閬大明三年自義興太守為寧朔將軍兗州刺史為竟陵王誕所殺追贈征虜將軍刺史如故閎順帝昇明末右衞將軍張興世字文德竟陵竟陵人也本單名世太宗益為興世少時家貧南郡宗珍之為竟陵郡興世依之為客竟陵舊置軍府以補參軍督䕶不就白衣隨王𤣥謩伐蠻每戰輒有禽獲𤣥謩舊部曲諸將不及也甚竒之興世還都白太祖稱其膽力後隨世祖鎮尋陽以補南中參軍督䕶入討元凶𨽻柳元景為前鋒事定轉員外將軍領從隊南郡王義宣反又隨𤣥謩出梁山有戰功除建平王宏中軍行參軍領長刀又𨽻西平王子尚為直衞坐從子尚入臺棄仗游走下獄免官復以白衣充直衞大明末除員外散騎侍郎仍除宣威將軍隨郡太守未行太宗即位四方反叛進興世號龍驤將軍領水軍歫南賊於赭圻築二城於湖口偽龍驤將軍陳慶領舸於前為游軍興世率龍驤將軍佼長生董凱之攻克二城因擊慶慶戰大敗投水死者數千人時臺軍據赭圻南賊屯䧿尾相持久不決興世建議曰賊據上流兵彊地勝我今雖相持有餘而制敵不足今若以兵數千濳出其上因險自固隨宜斷截使其首尾周遑進退疑沮中流一梗糧運自艱制賊之竒莫過於此沈攸之吳喜竝賛其計時豫州刺史殷琰之據壽陽同逆為劉勔所攻南賊遣龎孟虬率軍助琰劉勔遣信求援甚急建安王休仁欲遣興世救之問沈攸之攸之曰孟虬蟻寇必無能為遣别將馬歩數千足以相制若有意外且以江西餌之上流若據不憂不殄興世之行是安危大機必不可輟乃遣段佛榮等援勔興世欲率所領直取大雷而軍旅未集不足分張會薛索兒平定太宗使張永以歩騎五千留戍盱眙餘衆二萬人悉遣南討山陽又尋平徵阮佃夫所領諸軍悉還南伐衆軍大集乃分戰士七千配興世興世乃令輕舸泝流而上旋復回還一二日中輒復如此使賊不為之備劉胡聞興世欲上笑之曰我尚不敢越彼下取揚州張興世何物人欲輕據我上興世謂攸之等曰上流唯有錢谿可據地既險要江又甚狹去大衆不逺應赴無難江有洄洑船下必來泊岸有横浦可以藏船舸二三為宜乃夜渡湖口至散頭因復回下疑之其夜四更值風乃舉颿直前賊亦遣胡靈秀諸軍於東岸相翼而上興世夕住景江浦宿賊亦不進夜濳遣黃道摽領七十舸徑據錢谿營立城柴明旦興世與軍齊集停一宿劉胡自領水歩二十六軍平旦來攻將士欲迎擊之興世禁曰賊來尚逺而氣盛矢驟驟既力盡盛亦易衰此曹劌之所以破齊也令將士不得妄動治城如故俄而賊來轉近舫入洄洑興世乃命壽寂之任農夫率壯士數百擊之衆軍相繼進胡於是敗走斬級數百投水者甚衆胡收軍而下時興世城壘未固司徒建安王休仁慮賊并力更攻錢谿欲分其形勢命沈攸之吳喜佼長生劉靈遺等以皮艦二十攻賊濃湖苦戰連日斬獲千數是日劉胡果率衆軍欲更攻興世未至錢谿數十里袁顗以濃湖之急遽追之錢谿城柴由此得立賊連戰轉敗興世又遏其糧道尋陽遣運至南陵不敢下賊衆漸饑劉胡乃遣顗安北府司馬偽右軍沈仲玉領千人歩取南陵迎接糧運仲玉至南陵領米三十萬斛錢布數十舫豎榜為城規欲突過行至貴口不敢進遣間信報胡令遣重軍援接興世壽寂之任農夫李安民等三千人至貴口擊之與仲玉相值交戰盡日仲玉走還顗營悉虜其資實賊衆大敗震胡棄軍遁走顗仍亦奔散興世率軍追討與吳喜共平江陵遷左軍將軍尋為督豫司二州南豫州六郡諸軍事封作唐縣侯食邑千戸徵為游擊將軍海道北伐假輔國將軍加節置佐無功而還四年遷太子右衛率又以本官領驍騎將軍與左衞將軍沈攸之參員置五年轉左衞將軍六年中領軍劉勔當鎮廣陵興世權兼領軍泰豫元年為持節督雍梁南北秦郢州之竟陵隨二郡諸軍事冠軍將軍雍州刺史尋加寧蠻校尉桂陽王休範反興世遣軍赴朝廷未𤼵而事平進號征虜將軍廢帝元徽三年徵為通直散騎常侍左衞將軍五年以疾病徙光禄大夫常侍如故順帝昇明二年卒時年五十九追贈本官興世居臨沔水沔水自襄陽以下至于九江二千里中先無洲嶼興世初生當其門前水中一旦忽生洲年年漸大及至興世為方伯而洲上遂十餘頃父仲子由興世致位給事興世欲將徃襄陽愛戀鄉里不肯去嘗謂興世我雖田舍老公樂聞鼔角可送一部行田時吹之興世素恭謹畏法憲譬之曰此是太子鼓角非田舍老公所吹興世欲拜墓仲子謂曰汝衞從太多先人必當驚怖興世減撤而後行興世子欣業當嗣封會齊受禪國除史臣曰兵固詭道勝在用竒當二帝爭雄天人之分未決南北連兵相阨而不得進者半歲矣蓋乃趙壁拔幟之機官渡濳師之日至於鵲浦投戈實興世用竒之力也建斾垂組豈徒然哉宋書卷五十宋書卷五十考證胡藩傳藩外兄羅仚生仚南史作企以刀頭穿岸少容脚指於是徑上少南史作劣與孔熙先同逆謀髙祖以藩功臣不欲顯其事臣承蒼按胡遵世同孔熙先逆謀事在元嘉二十二年則此應作太祖諸本誤為高祖也張興世傳此是太子鼓角非田舎老公所吹太子南史作天子其義更長宋書卷五十考證
