body:
  text: 宋書卷五十四梁沈約撰列傳第十四孔季恭羊𤣥保沈曇慶孔靖字季恭會稽山隂人也名與髙祖祖諱同故稱字祖愉晉車騎將軍父誾散騎常侍季恭始察郡孝廉功曹史著作佐郎太子舎人鎮軍司馬司徒左西掾未拜遭母憂隆安五年於䘮中被起建威將軍山隂令不就髙祖東征孫恩屢至㑹稽季恭曲意禮接贍給甚厚髙祖後討孫恩時桓𤣥簒形已著欲於山隂建義討之季恭以為山隂去京邑路逺且𤣥未居極位不如待其簒逆事彰舋成惡稔徐於京口圖之不憂不尅髙祖亦謂為然虞嘯父為征東將軍㑹稽内史季恭初求為府司馬不得及帝定桓𤣥以季恭為内史使齎封板拜授季恭相值季恭便舟夜還至即叩扉告嘯父并令掃拂别齋即便入郡嘯父本為桓𤣥所授聞𤣥敗震懼開門請罪季恭慰勉使且安所住明旦乃移季恭到任務存治實敕止浮華翦罰遊惰由是寇盗衰止境内肅清徵為右衛將軍加給事中不拜尋除侍中領本國中正徙琅邪王大司馬司馬尋出為吴興太守加冠軍先是吴興頻䘮太守云項羽神為卞山王居郡聽事二千石至常避之季恭居聽事竟無害也遷尚書右僕射固讓義熈八年復督五郡諸軍征虜㑹稽内史脩飾學校計課調習十年復為尚書右僕射加散騎常侍又讓不拜頃之除領軍將軍加散騎常侍本州大中正十二年致仕拜金紫光禄大夫常侍如故是嵗髙祖北伐季恭求従以為太尉軍諮祭酒後將軍從平闗洛髙祖為相國又隨府遷宋臺初建令書以為尚書令加散騎常侍又讓不受乃拜侍中特進左光禄大夫辭事東歸髙祖餞之戲馬臺百僚咸賦詩以述其美及受命加開府儀同三司辭讓累年終以不受永初三年薨時年七十六追贈侍中左光禄大夫開府儀同三司子􅀢歴顯位侍中會稽太守坐小弟駕部郎道穰逼略良家子女白衣領郡元嘉二十七年卒官弟靈符元嘉末為南譙王義宣司空長史南郡太守尚書吏部郎世祖大明初自侍中為輔國將軍郢州刺史入為丹陽尹山隂縣土境褊狹民多田少靈符表徙無貲之家於餘姚鄞鄮三縣界墾起湖田上使公卿博議太宰江夏王義恭議曰夫訓農脩本有國所同土著之民習翫日久如京師無田不聞徙居他縣尋山隂豪族富室頃畝不少貧者肆力非為無處耕起空荒無救災歉又緣湖居民魚鴨為業及有居肆理無樂徙尚書令栁元景右僕射劉秀之尚書王瓚之顧凱之顔師伯嗣湘東王諱議曰富户溫房無假遷業窮身寒室必應徙居葺宇䟽臯産粒無待資公則公未易充課私則私卒難具生計既完畬功自息宜募亡叛通䘏及與樂田者其往經創須粗脩立然後徙居侍中沈懐文王景文黄門侍郎劉敳郄顒議曰百姓雖不親農不無資生之路若驅以就田則坐相違奪且鄞等三縣去治竝遠既安之民忽徙他邑新垣未立舊居已毁去留兩困無以自資謂宜適任民情従其所樂開宥逋亡且令就業若審成腴壤然後議遷太常王𤣥謨議曰小民貧匱逺就荒疇去舊即新糧種俱闕習之既難勸之未易謂宜微加資給使得肆勤明力田之賞申怠惰之罰光禄勲王昇之議曰逺廢之疇方翦荆棘率課窮乏其事彌難資徒粗立徐行無晩上違議從其徙民竝成良業靈符自丹陽出為會稽太守尋加豫章王子尚撫軍長史靈符家本豐産業甚廣又於永興立墅周回三十三里水陸地二百六十五頃含帶二山又有果園九處為有司所紏詔原之而靈符答對不實坐以免官後復舊官又為尋陽王子房右軍長史太守如故慤實有材幹不存華飾每所蒞官政績脩理前廢帝景和中犯忤近臣為所讒搆遣鞭殺之二子湛之淵之於都賜死太宗即位追贈靈符金紫光禄大夫淵之大明中為尚書比部郎時安陸應城縣民張江陵與妻吴共駡母黄令死黄忿恨自經死值赦律父子賊殺傷􅇌父母梟首罵詈棄市謀殺夫之父母亦棄市值赦免刑補治江陵罵母母以之自裁重於傷敺若同殺科則疑重用敺傷及罵科則疑輕制唯有打母遇赦猶梟首無罵母致死值赦之科淵之議曰夫題里逆心而仁者不入名且惡之况乃人事故􅇌傷呪詛法所不原詈之致盡則理無可宥罰有従輕葢疑失善求之文旨非此之謂江陵雖值赦恩故合梟首婦本以義愛非天屬黄之所恨情不在吴原死補治有允正法詔如淵之議吴免棄市羊𤣥保太山南城人也祖楷尚書都官郎父綏中書侍郎𤣥保起家楚臺太常博士遭母憂服闋右將軍何無忌前將軍諸葛長民俱板為參軍竝不就除臨安令劉穆之舉為髙祖鎮軍參軍庫部郎永世令復為髙祖太尉參軍轉主簿丹陽丞少帝景平二年入為尚書右丞轉左丞司徒長史府公王𢎞甚知重之謂左長史庾登之吏部尚書王淮之曰卿二賢明美朗識㑹悟多通然𢎞懿之望故當共推羊也頃之入為黄門侍郎善奕棊棊品第三太祖與賭郡戲勝以補宣城太守先是劉式之為宣城立吏民亡叛制一人不禽符伍里吏送州作部若獲者賞位二階𤣥保以為非宜陳之曰臣伏尋亡叛之由皆出於窮逼未有足以推存而樂為此者也今立殊制於事為苦臣聞苦節不可貞懼致流弊昔龔遂譬民於亂繩緩之然後可理黄覇以寛和為用不以嚴刻為先臣愚以謂單身逃役便為盡户今一人不測坐者甚多既憚重負各為身計牽挽逃竄必致繁滋又能禽獲叛身類非謹惜既無堪能坐陵勞吏名器虚假所妨實多將階級不足供賞服勤無以自勸又尋此制施一邦而已若其是邪則應與天下為一若其非邪亦不宜獨行一郡民離憂患其弊將甚臣忝守所職懼難遵用致率管穴冐以陳聞由此此制得停𤣥保在郡一年為廷尉數月遷尚書吏部郎御史中丞衡陽王義季右軍長史南東海太守加輔國將軍入為都官尚書左衛將軍加給事中丹陽尹㑹稽太守又徙吴郡太守加秩中二千石太祖以𤣥保㢘素寡欲故頻授名郡為政雖無幹績而去後常見思不營財利處家儉薄太祖嘗曰人仕宦非唯湏才然亦須運命每有好官缺我未嘗不先憶羊𤣥保元㓙弑立為吏部尚書領國子祭酒尋加光禄大夫及世祖入討朝野多南奔劭集羣僚横刀怒曰卿等便可去矣衆戰懼莫敢言𤣥保容色不異徐曰臣以死奉朝劭乃觧世祖即位以為散騎常侍領崇憲衞尉尋遷金紫光禄大夫又以謹敬見知賜賚甚厚大明初進位光禄大夫五年遷散騎常侍特進𤣥保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗八年卒時年九十四諡曰定子子戎有才氣而輕薄少行檢𤣥保嘗云此兒必亡我家官至通直郎與王僧逹謗議時政賜死死後世祖引見𤣥保𤣥保謝曰臣無日磾之明以此上負上美其言戎二弟太祖竝賜名曰咸曰粲謂𤣥保曰欲令卿二子有林下正始餘風𤣥保既善棋而何尚之亦雅好棊吴郡禇𦙍年七嵗入髙品及長冠絶當時𦙍父榮期與臧質同逆𦙍應従誅何尚之請曰𦙍奕棊之妙超古冠今魏犨犯令以才獲免父戮子宥其例甚多特乞與其微命使異術不絶不許時人痛惜之𤣥保兄子希字泰聞少有才氣大明初為尚書左丞時揚州刺史西陽王子尚上言山湖之禁雖有舊科民俗相因替而不奉熂山封水保為家利自頃以來頺弛日甚富强者兼嶺而占貧弱者薪蘇無託至漁採之地亦又如兹斯寔害治之深弊為政所宜去絶損益舊條更申恒制有司檢壬辰詔書占山䕶澤彊盗律論贓一丈以上皆棄市希以壬辰之制其禁嚴刻事既難遵理與時㢮而占山封水漸染復滋更相因仍便成先業一朝頓去易致嗟怨今更刋革立制五條凡是山澤先常熂爈種養竹木雜果為林及陂湖江海魚梁鰌鮆塲常加功脩作者聽不追奪官品第一第二聽占山三頃第三第四品二頃五十畝第五第六品二頃第七第八品一頃五十畝第九品及百姓一頃皆依定格條上貲簿若先已占山不得更占先占闕少依限占足若非前條舊業一不得禁有犯者水上一尺以上竝計贓依常盗律論停除咸康二年壬辰之科從之益州刺史劉瑀先為右衛將軍與府司馬何季穆共事不平季穆為尚書令建平王宏所親待屢毁瑀於宏㑹瑀出為益州奪士人妻為妾宏使羊希彈之瑀坐免官瑀恨希切齒有門生謝元伯往來希閒瑀令訪訊被免之由希曰此奏非我意瑀即日到宏門奏牋陳謝云聞之羊希希坐漏泄免官大明末為始安王子真征虜司馬黄門郎御史中丞泰始三年出為寧朔將軍廣州刺史希初請女夫鎮北中兵參軍蕭惠徽為長史帶南海太守太宗不許又請為東莞太守希既到鎮長史南海太守陸法真䘮官希又請恵徽補任詔曰希卑門寒士累世無聞輕薄多舋備彰歴職徒以清刻一介擢授嶺南干上逞欲求訴不已可降號横野將軍初李萬周劉嗣祖籍略廣州事在鄧琬傳太宗以萬周為歩兵校尉加寧􅃋將軍權行廣州事希既至而萬周等並有異圖希誅之希以沛郡劉思道行晉康太守領軍伐俚思道違節度失利希遣收之思道不受命率所領攻州希遣平越長史鄒琰於朝亭拒戰軍敗見殺思道進攻州城司馬鄒嗣之拒之西門戰敗又死希踰城走思道獲而殺之府參軍鄒曼率數十人襲思道己得入城力不敵又敗東莞太守蕭惠徽率郡文武千餘人攻思道戰敗又見殺時龍驤將軍陳伯紹率軍伐俚還擊思道定之贈希輔國將軍恵徽中書郎嗣之越騎校尉希子崇字伯逺尚書主客郎丁母憂哀毁過禮及聞廣州亂即日便徒跣出新亭不能歩渉頓伏江渚門義以小船致之於是進路父𦵏畢不勝哀卒沈曇慶吴興武康人侍中懐文従父兄也父發員外㪚騎侍郎早卒吴興太守王韶之為之誄焉曇慶初辟主簿州従事西曹主簿長沙王義欣後軍鎮軍主簿遭母憂哀毀致稱本縣令諸葛闡之公解言上服釋復為主簿義欣又請為鎮軍記室叅軍出為餘杭令遷司徒主簿江夏王義恭太尉録事叅軍尚書右丞時嵗有水旱曇慶議立常平倉以救民急太祖納其言而事不行領本邑中正少府揚州治中從事史始興王濬衞軍長史元凶弑立世祖入討劭遣曇慶還東募人安東將軍隨王誕收付永興縣獄久之被原世祖踐祚除東海王禕撫軍長史入為尚書吏部郎江夏王義恭大司馬長史南東海太守左衛將軍大明元年督徐兖二州及梁郡諸軍事輔國將軍徐州刺史時殿中員外將軍裴景仁助戍彭城本傖人多悉戎荒事曇慶使撰秦紀十卷叙苻氏僭偽本末其書傳於世明年復徵為左衛將軍加給事中領本州大中正三年遷祠部尚書其年卒時年五十七追贈本官曇慶謹實清正所涖有稱績常謂子弟曰吾處世無才能政圖作大老子耳世以長者稱之史臣曰江南之為國盛矣雖南包象浦西括卭山至扵外奉貢賦内充府實止於荆揚二州自漢氏以來民戸彫耗荆楚四戰之地五達之郊井邑殘亡萬不餘一也自義熙十一年司馬休之外奔至于元嘉末三十有九載兵車勿用民不外勞役寛務簡氓庶繁息至餘糧栖畝户不夜扄葢東西之極盛也既揚部分析境極江南考之漢域惟丹陽㑹稽而已自晉氏遷流迄於太元之世百許年中無風塵之警區域之内晏如也及孫恩寇亂殱亡事極自此以至大明之季年踰六紀民户繁育將曩時一矣地廣野豐民勤本業一嵗或稔則數郡忘飢㑹土帶海傍湖良疇亦數十萬頃膏腴上地畝直一金鄠杜之間不能比也荆城跨南楚之富揚部有全吴之沃魚鹽杞梓之利充仞八方絲綿布帛之饒覆衣天下而田家作苦役難利薄亘嵗従務無或一日非農而經税横賦之資養生送死之具莫不咸出於此穰嵗糶賤糶賤則稼苦饑年糴䝿糴䝿則商倍常平之議行於漢世元嘉十三年東土潦浸民命棘矣太祖省費減用開倉廩以振之病而不凶葢此力也大明之末積旱成灾雖敝同往困而救非昔主所以病未半古死已倍之并命比室口減過半若常平之計興於中秊遂切扶患或不至是若籠以平價則官苦民優議屈當時葢由於此宋書卷五十四宋書卷五十四考證史臣論若籠以平價則官苦民優諸本官下無苦字今從南本增宋書卷五十四考證
