body:
  text: 宋書卷五十七梁沈約撰列傳第十七蔡廓子興宗蔡廓字子度濟陽考城人也曾祖謨晉司徒祖系撫軍長史父綝司徒左西屬廓博渉羣書言行以禮起家著作佐郎時桓𤣥輔晉議復肉刑廓上議曰夫建封立法𢎞治稽化必隨時置制徳刑兼施貞一以閑其邪敎禁以檢其慢灑湛露以膏潤厲嚴霜以肅威晞風者陶和而安恬畏戾者聞憲而警慮雖復質文迭用而斯道莫革肉刑之設肇自哲王葢由曩世風淳民多惇謹圖像既陳則機心㝠戢刑人在塗則不逞改操故能勝殘去殺化隆無為季末澆偽法網彌宻利巧之懐日滋恥畏之情轉寡終身劇役不足止其姦况乎黥劓豈能反其善徒有酸慘之聲而無濟治之益至于棄市之條寔非不赦之罪事非三殺考律同歸輕重均科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼讚道邈伊周雖閉否之運甫開而遐遺之難未已誠宜明慎用刑愛民𢎞育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來使將㫁之骨荷更榮於三陽干時之華監商飆而知懼威惠俱宣感畏偕設全生拯暴於是乎在遷司徒主簿尚書度支殿中郎通直郎髙祖太尉參軍司徒屬中書黄門郎以方鯁閑素為髙祖所知及髙祖領兖州廓為别駕從事史委以州任尋除中軍諮議參軍太尉從事中郎未拜遭母憂性至孝三年不櫛沐殆不勝䘮服闋相國府復板為從事中郎領記室宋臺建為侍中建議以為鞫獄不宜令子孫下辭明言父祖之罪虧敎傷情莫此為大自今家人與囚相見無乞鞫之訴使民以明伏罪不須責家人下辭朝議咸以為允從之世子左衞率謝靈運輙殺人御史中丞王淮之坐不糾免官髙祖以廓剛直不容邪枉補御史中丞多所糾奏百僚震肅時中書令傅亮任寄隆重學冠當時朝廷儀典皆取定於亮每諮廓然後施行亮意若有不同廓終不為屈時疑揚州刺史廬陵王義真朝堂班次亮與廓書曰揚州自應著刺史服耳然謂坐起班次應在朝堂諸官上不應依官次坐下足下試更尋之詩序云王姬下嫁於諸侯衣服禮秩不係其夫下王后一等推王姬下王后一等則皇子居然在王公之上陸士衡起居注式乾殿集諸皇子悉在三司上今抄疏如别又海西即位赦文太子武陵王第一撫軍將軍㑹稽王第二大司馬第三大司馬位既最髙又都督中外而次在二王之下豈非下皇子邪此文今具在也永和中蔡公為司徒司馬簡文為撫軍開府對録朝政蔡為正司不應反在儀同之下而于時位次相王在前蔡公次之耳諸例甚多不能復具䟽揚州反乃居卿君之下恐此失禮宜改之邪廓答曰揚州位居卿君之下常亦惟疑然朝廷以位相次不以本封復無明文云皇子加殊禮齊獻王為驃騎孫秀來降武帝欲優異之以秀為驃騎轉齊王為鎮軍在驃騎上若如足下言皇子使在公右則齊王本次自尊何改鎮軍令在驃騎上明知故依見位為次也又齊王為司空賈充為太尉俱録尚書署事常在充後潘正叔奏公羊事于時三録梁王肜為衛將軍署在太尉隴西王泰司徒王𤣥沖下近太元初賀新宮成司馬太傅為中軍而以齊王柔之為賀首立安帝為太子止禮徐邈為郎位次亦以太傅在諸王下又謁李太后宗正尚書符令以髙宻王為首時王東亭為僕射王徐皆是近世識古今者足下引式乾公王吾謂未可為據其云上出式乾古傳中彭城王植荀組潘岳嵇紹杜斌然後道足下所疏四王在三司之上反在黄門郎下有何義且四王之下則云大將軍梁王肜車騎趙王倫然後云司徒王戎耳梁趙二王亦是皇子屬尊位齊在豫章王常侍之下又復不通葢書家指疏時事不必存其班次式乾亦是私宴異扵朝堂如今含章西堂足下在僕射下侍中在尚書下耳來示又云曾祖與簡文對録位在簡文下吾家故事則不然今寫如别王姬身無爵位故可得不從夫而以王女為尊皇子出任則有位有位則依朝復示之班序唯引泰和赦文差可為言然赦文前後亦參差不同太宰上公自應在大司馬前耳簡文雖撫軍時已授丞相殊禮又中外都督故以本任為班不以督中外便在公右也今䕶軍總方伯而位次故在持節都督下足下復思之遷司徒左長史出為豫章太守徵為吏部尚書廓因北地傅隆問亮選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之羡之曰黄門郎以下悉以委蔡吾徒不復厝懐自此以上故宜共參同異廓曰我不能為徐干木署紙尾也遂不拜干木羡之小字也選案黄紙録尚書與吏部尚書聫名故廓云署紙尾也羡之亦以廓正直不欲使居權要徙為祠部尚書太祖入奉大統尚書令傅亮率百僚奉迎廓亦俱行至尋陽遇疾不堪前亮將進路詣廓别廓謂曰營陽在吳宜厚加供奉營陽不幸卿諸人有弑主之名欲立於世將可得邪亮已與羡之議害少帝乃馳信止之信至已不及羡之大怒曰與人共計議云何裁轉背便賣惡於人及太祖即位謝晦將之荆州與廓别屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆而以北面挾震主之威據上流之重以古推今自免為難也廓年位並輕而為時流所推重每至嵗時皆束帶到門奉兄軌如父家事小大皆諮而後行公禄賞賜一皆入軌有所資湏悉就典者請焉従髙祖在彭城妻郗氏書求夏服廓答書曰知須夏服計給事自應相供無容别寄時軌為給事中元嘉二年廓卒時年四十七髙祖嘗云羊徽蔡廓可平世三公少子興宗興宗年十嵗失父哀毀有異凡童廓罷豫章郡還起二宅先成東宅與軌廓亡而館宇未立軌罷長沙郡還送錢五十萬以補宅直興宗年十嵗白母曰一家由來豐儉必共今日宅價不宜受也母悦而從焉軌有愧色謂其子淡曰我年六十行事不及十嵗小兒尋䘮母少好學以業尚素立見稱初為彭城王義康司徒行參軍太子舍人南平穆王冠軍參軍武昌太守又為太子洗馬義陽王友中書侍郎中書令建平王宏侍中王僧綽竝與興宗厚善元凶弑立僧綽被誅凶威方盛親故莫敢往興宗獨臨哭盡哀出為司空何尚之長史又遷太子中庶子世祖踐祚還先職遷臨海太守徵為黄門郎太子中庻子轉㳺擊將軍俄遷尚書吏部郎時尚書何偃疾患上謂興宗曰卿詳練清濁今以選事相付便可開門當之無所讓也轉司徒左長史復為中庶子領前軍將軍遷侍中每正言得失無所顧憚由是失㫖竟陵王誕據廣陵城為逆事平興宗奉㫖慰勞州别駕范義與興宗素善在城内同誅興宗至廣陵躬自收殯致䘮還豫章舊墓上聞之甚不悦廬陵内史周朗以正言得罪鏁付寜州親戚故人無敢贍送興宗在直請急詣朗别上知尤怒坐屬疾多日白衣領職尋左遷司空沈慶之長史行兖州事還為廷尉卿有解士先者告申坦昔與丞相義宣同謀時坦已死子令孫時作山陽郡自繫廷尉興宗議曰若坦昔為戎首身今尚存累經肆眚猶應䝉宥令孫天屬理相為隐况人亾事逺追相誣訐斷以禮律義不合闗若士先審知逆謀當時即應啓聞包藏積年發因私怨况稱風聲路傳寔無定主而干黷欺罔罪合極法又有訟民嚴道恩等二十二人事未洗正敕以當訊權繫尚方興宗以訟民本在求理故不加械即若繫尚方於事為苦又司徒前劾送武康令謝沈及郡縣尉還職司十一人坐仲良鑄錢不禽久已判結又送郡主簿丘元敬等九人或下疾假或去職已久又加執啓事悉見從出為東陽太守遷安陸王子綏後軍長史江夏内史行郢州事徵還未拜留為左民尚書頃之轉掌吏部時上方盛淫宴虐侮羣臣自江夏王義恭以下咸加穢辱惟興宗以方直見憚不被侵媟尚書僕射顔師伯謂議曹郎王躭之曰蔡尚書常免昵戲去人寔逺躭之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召每至官賭常在勝朋蔡尚書今日可謂能負荷矣大明末前廢帝即位興宗告太宰江夏王義恭應須䇿文義恭曰建立儲副本為今日復安用此興宗曰累朝故事莫不皆然近永初之末營陽王即位亦有文策今在尚書可檢視也不従興宗時親奉璽綬嗣主容色自若了無哀貎興宗出謂親故曰魯昭在戚而有嘉容終之以釁結大臣昭子請死國家之禍其在此乎時義恭録尚書事受遺輔政阿衡幼主而引身避事政歸近習越騎校尉戴法興中書舎人巢尚之專制朝權威行近逺興宗職管九流銓衡所寄每至上朝輒與令録以下陳欲登賢進士之意又箴規得失博論朝政義恭素性恇橈阿順法興常慮失㫖聞興宗言輒戰懼無計先是大明世奢侈無度多所造立賦調煩嚴徵役過苦至是發詔悉皆削除由此紫極殿南北馳道之屬皆被毀壊自孝建以來至大明末凡諸制度無或存者興宗於都坐慨然謂顔師伯曰先帝雖非盛徳主要以道始終三年無改古典所貴今殯宫始徹山陵未逺而凡諸制度興造不論是非一皆刋削雖復禪代亦不至爾天下有識當以此窺人師伯不能用興宗每陳選事法興尚之等輒㸃定回換僅有存者興宗於朝堂謂義恭及師伯曰主上諒闇不親萬機而選舉宻事多被刪改復非公筆亦不知是何天子意王景文謝荘等遷授失序興宗又欲為美選時薛安都為散騎常侍征虜將軍太子左率殷常為中庻子興宗先選安都為左衞將軍常侍如故殷常為黄門領校太宰嫌安都為多欲單為左衛興宗曰率衛相去唯阿之間且已失征虜非乃超越復奪常侍頓為降貶若謂安都晩逹微人本宜裁抑令名器不輕宜有貫序謹依選體非私安都義恭曰官宜加超授者殷常便應侍中那得為黄門而已興宗又曰中庻侍中相去實逺且安都作率十年殷常中庻百日今又領校不為少也使選令史顔禕之薛慶元等徃復論執義恭然後署案既中㫖以安都為右衞加給事中由是大忤義恭及法興等出興宗吴郡太守固辭郡執政愈怒又轉為新安王子鸞撫軍司馬輔國將軍南東海太守行南徐州事又不拜苦求益州義恭於是大怒上表曰臣聞慎節言語大易有規銓序九流無取裁闕若乃結黨連羣譏訴互起街談巷議罔顧聽聞乃撤實憲制所宜禁經之巨蠹侍中祕書監臣彧自表父疾必求侍養聖㫖矜體特順所陳改授臣府元僚兼帶軍郡雖臣駑劣府任非輕准之前人不為屈後京郡本以為禄不計户之少多遇缺便用無關髙下撫軍長史莊滯府累朝每陳危苦内職外守稱未堪依唯王球昔比賜以優養恩慈之厚不近於薄前新除吳郡太守興宗前居選曹多不平允鴻渥含宥恕其不閑改任大都寵均阿輔仍苦請益州雅違成命伏尋揚州刺史子尚吳興太守休若並國之茂戚魯衛攸在猶牧守東山竭誠撫莅而辭擇適情起自庶族逮佐北蕃尤無欣荷御史中丞永昔嵗餘愆從恩今授光禄勲臣淹雖曰代臣累經降黜後效未申以何取進司徒左長史孔覬前降右衞尋徙今職回換之宜不為乃少竊外談謂彧等咸爲失分又聞興宗躬自怨懟與尚書右僕射師伯疏辭旨甚苦臣雖不見所聞不虛臣以凡才不應機務謬自幸㑹受任三朝進無古人舉賢之美退無在下獻替之績致滋紛紜伏增慙悚然此源不塞此風弗變將虧正道塵穢盛猷伏願聖聽賜垂覽察詔曰太宰表如此省以憮然朕恭承洪緒思𢎞盛烈而在朝凌競驅扇成風將何以式揚先德克隆至化公體國情深保釐攸託便可付外詳議義恭因使尚書令柳元景奏曰臣義恭表詔書如右攝曹辨覈尚書袁愍孫牒此月十七日詣僕射顔師伯語次因及尚書蔡興宗有書固辭今授仍出疏見公乃者數紙不意悉何所道縁此因及朝士當今聖世不可使人以為少今牒數之朝廷處之實得所臣等亦自謂得分常多在門袁愍孫無或措多而愚意欲啓更量出内之宜芻蕘管見願在聞徹選令史宣傳宻事故因附上聞亦外人言此今辭慶先列今月十八日往尚書袁愍孫論選事愍孫云昨詣顔僕射出蔡尚書疏見示言辭甚苦又云所得亦少主上踐祚始爾朝士有此人不多物議謂應美用乃更恨少使咨事便啓録公又謝莊闕時未老其疾以轉差今居此任復爲非宜謂宜中書令才望為允又孔覬南士之美所歴已多近頻授即復回改於理為屈門下無人此是名選又張求人地可論其去嵗愆戾非爲深罪依其望復門下一人張淹替忝南下預因休戚雖屢經愆黜事亦已久謂應祕書監帶授興宗手跡數紙文翰炳然事證明白不假覈辨愍孫任居官人職掌銓裁若有未久則宜顯言而私加許與自相選署託云物論終成虚詭隱末出端還爲矛楯臣聞九官成讓虞風垂則誹主怨時漢罪夙斷况義為身發言謗朝序亂辟害政混穢大猷紛紜彰謬上延詔㫖不有霜准軌憲斯淪請解興宗新附官須事御收付廷尉法獄治罪免愍孫所居官詔曰興宗首亂朝典允當明憲以其昔經近侍未忍盡法可令思愆逺封愍孫竊評自己委咎物議可以子領職除興宗新昌太守郡屬交州朝廷莫不嗟駭先是興宗納何后寺尼智妃為妾姿貎甚美有名京師迎車已去而師伯宻遣人誘之潛往載取興宗迎人不覺及興宗被徙論者竝云由師伯師伯甚病之法興等既不欲以徙大臣為名師伯又欲止息物議由此停行頃之法興見殺尚之被繫義恭師伯誅復起興宗為臨海王子頊前軍長史輔國將軍南郡太守行荆州事不行時前廢帝凶暴興宗外甥袁顗為雍州刺史勸興宗行曰朝廷形勢人所共見在内大臣朝夕難保舅今出居陜西爲八州事顗在襄沔地勝兵强去江陵咫尺水陸通便若朝廷有事可共立桓文之功豈與受制凶狂禍難不測同年而語乎今不去虎口而守此危逼後求復出豈得哉興宗曰吾素門平進與主上甚踈未容有患宫省内外人不自保㑹應有變若内難得弭外釁未必可量汝欲在外求全我欲居内免禍各行所見不亦善乎時京城危懼衣冠咸欲逺徙後皆流離外難百不一存重除吏部尚書太尉沈慶之深慮危禍閉門不通賔客嘗遣左右范羡詣興宗屬事興宗謂羡曰公閉門絶客以避悠悠請託耳身非有求何為見拒還造慶之慶之遣羡報命要興宗令往興宗因説之曰先帝雖無功於天下要能定平凶逆在位十一年以道晏駕主上紹臨四海清謐即位正是舉止違衷小小得失耳亦謂春秋尚富進德可期而比者所行人倫道盡今所忌憚惟在於公百姓喁喁無復假息之望所冀正在公一人而已若復坐視成敗者非唯身禍不測四海重責將有所歸公威名素著天下所服今舉朝遑遑人人危怖指麾之日誰不景從如其不斷旦暮禍及僕昔佐貴府䝉眷異常故敢盡言願公思為其計慶之曰僕皆前慮不復自保但盡忠奉國始終以之正當委天任命耳加老罷私門兵力頓闕雖有其意事亦無從興宗曰當今懐謀思奮者非要富貴求功賞各欲免死朝夕耳殿内將帥正聽外間消息若一人唱首則俯仰可定况公威風先著統戎累朝諸舊部曲布在宫省宋越譚金之徒出公宇下並受生成攸之恩仁公家口子弟耳誰敢不從且公門徒義附竝三吳勇士宅内奴僮人有數百陸攸之今入東討賊又大送鎧仗在青溪未發攸之公之鄉人驍勇有膽力取其器仗以配衣宇下使攸之率以前驅天下之事定矣僕在尚書中自當率百僚案前世故事更簡賢明以奉社稷昔太甲罪不加民昌邑虐不及下伊尹霍光猶成大事况今蒼生窘急禍百往代乎又朝廷諸所行造民間皆云公悉豫之今若沈疑不決當有先公起事者公亦不免附從之禍車駕屢幸貴第醉酣彌留又聞屛左右獨入閤内此萬世一時機不可失僕荷養深重故吐去梯之言宜詳其禍福慶之曰深感君無己意此事大非僕所能行事至故當抱忠以没耳頃之慶之果以見忌致禍時領軍王𤣥謨大將有威名邑里訛言云已見誅市道喧擾𤣥謨典籖包法榮者家在東陽興宗故郡民也爲𤣥謨所信見使至興宗因謂曰領軍殊當憂懼法榮曰領軍此日殆不復食夜亦不眠常言收已在門不保俄頃興宗曰領軍憂懼當為方略那得坐待禍至初𤣥謨舊部曲猶有三千人廢帝頗疑之徹配監者𤣥謨太息深怨啓留五百人巖山營墓事猶未畢少帝欲獵又悉喚還城巖兵在中堂興宗勸以此衆舉事曰當今以領軍威名率此爲朝廷唱始事便立剋領軍雖復失脚自可乘轝處分禍殆不測勿失事機君還可白領軍如此𤣥謨遣法榮報曰此亦未易可行期當不泄君言太宗踐祚𤣥謨責所親故吏郭季産女壻韋希真等曰當艱難時周旋輩無一言相扣發者季産曰蔡尚書令包法榮所道非不㑹機但大事難行爾季産言亦何益𤣥謨有慙色右衞將軍劉道隆為帝所寵信專統禁兵乘輿嘗夜幸著作佐郎江斆宅興宗馬車從道隆從車後過興宗謂曰劉公比日思一閑寫道隆深逹此㫖掐興宗手曰蔡公勿多言帝每因朝宴捶歐羣臣自驃騎大將軍建安王休仁以下侍中袁愍孫等咸見陵曵唯興宗得免頃之太宗定大事是夜廢帝横尸在大醫閤口興宗謂尚書右僕射王景文曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乘人時諸方並舉兵反國家所保唯丹陽淮南數郡其間諸縣或已應賊東兵已至永世宫省危懼上集羣臣以謀成敗興宗曰今普天圖逆人有異志宜鎮以靜以至信待人比者逆徒親戚布在宫省若繩之以法則土崩立至宜明罪不相及之義物情既定人有戰心六軍精勇器甲犀利以待不習之兵其勢相萬耳願陛下勿憂上從之加游擊將軍未拜遷尚書右僕射尋領衞尉又領兖州大中正太宗謂興宗曰諸處未定殷琰已復同逆頃日人情云何事當濟不興宗曰逆之與順臣無以辨今商旅斷絶而米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇淵以手板築興宗興宗言之不已上曰如卿言赭圻平函送袁顗首勑從登南掖門樓觀之興宗澘然流涕上不悅事平封興宗始昌縣伯食邑五百户固讓不許封樂安縣伯邑三百戸國秩吏力終以不受時殷琰據壽陽爲逆遣輔國將軍劉勔攻圍四方既平琰嬰城固守上使中書爲詔譬琰興宗曰天下旣定是琰思過之日陛下宜賜手詔數行以相私慰今直中書爲詔彼必疑謂非真未是所以速清方難也不從琰得詔謂劉勔詐造果不敢降攻戰經時人乃歸順先徐州刺史薛安都據彭城反後遣使歸順泰始元年冬遣張永率軍迎之興宗曰安都遣使歸順此誠不虚今宜撫之以和卽安所莅乃遣須單使及咫尺書耳若以重兵迎之勢必疑懼或能招引北虜為患不測叛臣釁重必宜翦戮則比者所宥亦已𢎞矣况安都外據疆地密邇邊關考之國計尤宜馴養如其遂叛將生旰食之憂彭城嶮固兵强將勇圍之既難攻不可拔疆塞之虞二三宜慮臣爲朝廷憂之時張永已行不見從安都聞大軍過淮嬰城自守要取索虜永戰大敗又值寒雪死者十八九遂失淮北四州其先見如此初永敗問至上在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慙蔡僕射以敗書示興宗曰我愧卿三年春出爲使持節都督郢州諸軍事安西將軍郢州刺史坐詣尚書切論以何始真為咨議參軍初不被許後又重陳上怒貶號平西將軍尋又復號初吳興丘珍孫言論常侵興宗珍孫子景先人才甚美興宗與之周旋及景先爲鄱陽郡值晉安王子勛爲逆轉在竟陵為吳喜所殺母老女穉流離夏口興宗至郢州親自臨哭致其喪柩家累令得東還在任三年遷鎮東將軍㑹稽太守加散騎常侍尋領兵置佐加都督㑹稽東陽新安永嘉臨海五郡諸軍事給鼓吹一部㑹稽多諸豪右不遵王憲又幸臣近習參半宫省封略山湖妨民害治興宗皆以法繩之㑹土全實民物殷阜王公妃主邸舎相望橈亂在所大爲民患子息滋長督責無窮興宗悉啓罷省又陳原諸逋負解遣雜役並見從三吳舊有鄉射禮久不復修興宗行之禮儀甚整先是元嘉中羊𤣥保為郡亦行鄉射太宗崩興宗與尚書令袁粲右僕射禇淵中領軍劉勔鎮軍將軍沈攸之同被顧命以興宗爲使持節都督荆湘雝益梁寧南北秦八州諸軍事征西將軍開府儀同三司荆州刺史加班劒二十人常侍如故被徵還都時右軍將軍王道隆任參内政權重一時躡履到前不敢就席良久方去竟不呼坐元嘉初中書舍人狄當詣太子詹事王曇首不敢坐其後中書舎人王𢎞爲太祖所愛遇上謂曰卿欲作士人得就王球坐乃當判耳殷劉並雜無所知也若徃詣球可稱㫖就席球舉扇曰若不得爾𢎞還依事啓聞帝曰我便無如此何五十年中有此三事道隆等以興宗彊正不欲使擁兵上流改為中書監左光禄大夫開府儀同三司常侍如故固辭不拜興宗幼立風槩家行尤謹奉宗姑事寡嫂養孤兄子有聞於世太子左率王錫妻范聰明婦人也有才藻學見與錫弟僧逹書詰讓之曰昔謝太傅奉嫂王夫人如慈母今蔡興宗亦有恭和之稱其爲世所重如此妻劉氏早卒一女甚幼外甥袁顗始生彖而妻劉氏亦亡興宗姊卽顗母也一孫一姪躬自撫養年齒相比欲爲婚姻每見興宗輙言此意大明初詔興宗女與南平王敬猷婚興宗以姊生平之懷屢經陳啓答曰卿諸人欲各行己意則國家何由得婚且姊言豈是不可違之處邪舊意旣乖彖亦他娶其後彖家好不終顗又禍敗彖等淪廢當時孤微理盡敬猷遇害興宗女無子􅊔居名門髙胄多欲結姻明帝亦勑適謝氏興宗並不許以女適彖北地傅隆與廓相善興宗修父友敬泰豫元年薨時年五十八遺令薄葬奏還封爵追贈後授子景𤣥固辭不受又奏還封表疏十餘上見許詔曰景𤣥表如此故散騎常侍中書監左光禄大夫開府儀同三司樂安縣開國伯興宗忠恪立朝謀猷宣著往屬時難勲亮帷幄錫珪分壤實允通誥而懇誠慊訴備彰存没廉槩素情有絜聲軌景𤣥固陳先志良以惻然雖彛典宜全而哀款難奪可特申不􅉂之請永矜克讓之風初興宗爲郢州府參軍彭城顔敬以式卜曰亥年當作公官有大字者不可受也及有開府之授而太歳在亥果薨於光禄大夫之號焉文集傳於世景𤣥雅有父風為中書郎晉陵太守太尉從事中郎昇明末卒史臣曰世重清談士推素論蔡廓雖業力𢎞正而年位未髙一世名臣風格皆出其下及其固辭銓衡恥爲志屈豈不知選録同體義無偏斷乎良以主闇時難不欲居通塞之任也遠矣哉宋書卷五十七宋書卷五十七考證蔡廓傳自今家人與囚相見無乞鞫之訴使民以明伏罪不須責家人下辭使民一本作便足蔡興宗傳又張求人地可論其去歳愆戾非爲深罪張求南本作張永宜使喪禮粗足監本脫禮字今從南本增入宋書卷五十七考證
