front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0016_WYG_058-1a, image: WYG0258/WYG0258-0187c.png}
body:
  text: 宋書卷五十八梁沈約撰列傳第十八王惠謝𢎞微王球王惠字令明琅邪臨沂人太保𢎞從祖也祖劭車騎将軍父黙左光祿大夫惠幼而夷簡為叔父司徒謐所知恬靜不交遊未嘗有雜事陳郡謝瞻才辨有風氣嘗與兄弟羣從造惠談論鋒起文史間𤼵惠時相酬應言清理逺瞻等慙而退高祖聞其名以問從兄誕誕曰惠後來秀令鄙宗之美也即以為行太尉參軍事府主簿從事中郎世子建府以為征虜長史仍轉中軍長史時會稽内史劉懐敬之郡送者傾京師惠亦造别還過從弟球球問向何所見惠曰惟覺即時逢人耳常臨曲水風雨暴至座者皆馳㪚惠徐起姿貎不異常日世子為荆州惠長史如故領南郡太守不拜宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可令減袁曜卿也既而曰吾得其人矣乃以惠居之遷世子詹事轉尚書吳興太守少帝即位以蔡廓為吏部尚書不肯拜乃以惠代焉惠被召即拜未嘗接客人有與書求官者得輙聚置閣上及去職印封如初時談者以廓之不拜惠之即拜雖事異而意同也兄鑒頗好聚歛廣營田業惠意甚不同謂鑒曰何用田為鑒怒曰無田何由得食惠又曰亦復何用食為其標寄如此元嘉三年卒時年四十二追贈太常無子謝𢎞微陳郡陽夏人也祖韶車騎司馬父思武昌太守從叔峻司空琰第二子也無後以𢎞微為嗣𢎞微本名宻犯所繼内諱故以字行童幼時精神端審時然後言所繼叔父混名知人見而異之謂思曰此兒深中夙敏方成佳器有子如此足矣年十嵗出繼所繼父於𢎞微本緦麻親戚中表素不相識率意承接皆合禮衷義熙初襲峻爵建昌縣侯𢎞微家素貧儉而所繼豐泰唯受書數千卷國吏數人而已遺財禄秩一不關豫混聞而驚歎謂國郎中令漆凱之曰建昌國禄本應與北舍共之國侯既不措意今可依常分送𢎞微重違混言乃少有所受混風格高俊少所交納唯與族子靈運瞻曜𢎞微並以文義賞會嘗共宴處居在烏衣巷故謂之烏衣之遊混五言詩所云昔為烏衣逰戚戚皆親姪者也其外雖復高流時譽莫敢造門瞻等才辭辯富𢎞微每以約言服之混特所敬貴號曰微子謂瞻等曰汝諸人雖才義豐辯未必皆愜衆心至於領㑹機賞言約理要故當與我共推微子常云阿逺剛躁負氣阿客博而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此為恨至如微子吾無間然又云微子異不傷物同不害正若年迨六十必至公輔嘗因酣宴之餘為韻語以奨勸靈運瞻等曰康樂誕通度實有名家韻若加繩染功剖瑩乃瓊瑾宣明體逺識頴達且沈雋若能去方執穆穆三才順阿多標獨解弱冠纂華𦙍質勝誡無文其尚又能峻通逺懐清悟采采標蘭訊直轡鮮不躓抑用解偏吝微子基微尚無勌由慕藺勿輕一簣少進往将千仞數子勉之哉風流由爾振如不犯所知此外無所慎靈運等並有誡厲之言唯𢎞微獨盡褒美曜𢎞微兄多其小字也逺即瞻字靈運小名客兒晉世名家身有國封者起家多拜員外㪚騎侍郎𢎞微亦拜員外㪚騎琅琊王大司馬參軍義熙八年混以劉毅黨見誅妻晉陵公主改適琅邪王練公主雖執意不行而詔與謝氏離絶公主以混家事委之𢎞微混仍世宰輔一門兩封田業十餘處僮僕千人唯有二女年數嵗𢎞微經紀生業事若在公一錢尺帛出入皆有文簿遷通直郎高祖受命晉陵公主降為東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是九載而室宇修整倉庫充盈門徒業使不異平日田疇墾闢有加於舊東鄉君嘆曰僕射平生重此子可謂知人僕射為不亡矣中外姻親道俗義舊見東鄉之歸者入門莫不歎息或為之涕流感𢎞微之義也性嚴正舉止必循禮度事繼親之黨恭謹過常伯叔二母歸宗兩姑晨夕瞻奉盡其誠敬内而傳語通訊輙正其衣冠婢僕之前不妄言笑由是尊卑小大敬之若神太祖鎮江陵宋初封宜都王以瑯邪王球為友𢎞微為文學母憂去職居䘮以孝稱服闋踰年菜蔬不改除鎮西諮議參軍太祖即位為黄門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書吏部郎參預機宻尋轉右衛将軍諸故吏臣佐並委𢎞微選擬居身清約器服不華而飲食滋味盡其豐美兄曜歴御史中丞彭城王義康驃騎長史元嘉四年卒𢎞微蔬食積時哀戚過禮服雖除猶不噉魚肉沙門釋慧琳詣𢎞微𢎞微與之共食猶獨素食慧琳曰檀越素既多疾頃者肌色微損即吉之後猶未服膳若以無益傷生豈所望於得理𢎞微荅曰衣冠之變禮不可踰在心之哀實未能已遂廢食感咽歔欷不自勝𢎞微少孤事兄如父兄弟友穆之至舉世莫及也𢎞微口不言人短長而曜好臧否人物曜每言論𢎞微常以它語亂之六年東宫始建領中庶子又尋加侍中𢎞㣲志在素官畏忌權寵固譲不拜乃聽解中庶子每有獻替及論時事必手書焚草人莫之知上以𢎞微能營膳羞嘗就求食𢎞微與親故經營既進之後親人問上所御𢎞微不荅别以餘語酬之時人比漢世孔光八年秋有疾解右衛領太子右衛率還家議欲解𢎞微侍中以率加吏部尚書固陳疾篤得免九年東鄉君薨資財鉅萬園宅十餘所又會稽吳興琅邪諸處太傅司空琰時事業奴僮猶有數百人公私咸謂室内資財宜歸二女田宅僮僕應屬𢎞微𢎞微一無所取自以私禄營𦵏混女夫殷叡素好樗蒱聞𢎞微不取財物乃濫奪其妻妹及伯母兩姑之分以還戲責内人皆化𢎞微之譲一無所爭𢎞微舅子領軍将軍劉湛性不堪其非謂𢎞微曰天下事宜有裁𠂻卿此不治何以治官𢎞微笑而不荅或有譏之曰謝氏累世財産充殷君一朝戲責理之不允莫此為大卿親而不言譬棄物江海以為亷耳設使立淸名而令家内不足亦吾所不取也𢎞微曰親戚爭財為鄙之甚今内人尚能無言豈可導之使爭今分多共少不至有乏身死之後豈復見闗東鄉君葬混墓開𢎞微牽疾臨赴病遂甚十年卒時年四十二時有一長鬼寄司馬文宣家云受遣殺𢎞微𢎞微疾增劇輙豫告文宣𢎞微既死與文宣分别而去𢎞微臨終語左右曰有二封書須劉領軍至可於前燒之愼勿開也書皆是太祖手勑上甚痛惜之使二衛千人營畢葬事追贈太常子荘别有傳王球字倩玉琅邪臨沂人太常惠從父弟也父謐司徒球少與惠齊名美容止除著作佐郎不拜尋除琅邪王大司馬行參軍轉主簿豫章公世子中軍功曹宋國建初拜世子中舍人高祖受命仍為太子中舍人宜都王友轉諮議參軍以疾去職元嘉四年起為義興太守從兄𢎞為揚州服親不得相臨加宣威将軍在郡有寛惠之美徙太子右衛率入為侍中領冠軍将軍又領本州大中正徙中書令侍中如故遷吏部尚書球公子簡貴素不交逰筵席虚静門無異客尚書僕射殷景仁領軍劉湛並執重權傾動内外球雖通家姻戚未嘗往來頗好文義唯與琅邪顔延之相善居選職接客甚希不視求官書疏而銓衡有序朝野稱之本多羸疾屢自陳解遷光禄大夫加金章紫綬領廬陵王師兄子履進利為行深結劉湛委誠大将軍彭城王義康與劉斌孔𦙍季等並有異志球每訓厲不納自大将軍從事中郎轉太子中庶子流涕訴義康不願違離以此復為從事中郎太祖甚銜之及湛誅之夕履徒跣告球球命為取履先溫酒與之謂曰常日語汝何如履怖懼不得荅球徐曰阿父在汝亦何憂命左右扶即還齋上以球故履得免死廢於家十七年球復為太子詹事大夫王師如故未拜會殷景仁卒因除尚書僕射王師如故素有脚疾録尚書江夏王義恭謂尚書何尚之曰當今乏才羣下宜加勠力而王球放恣如此恐宜以法紏之尚之曰球有素尚加又多疾應以淡退求之未可以文案索也猶坐白衣領職時羣臣詔見多不即前卑疎者或至數十日大臣亦有十餘日不被見者唯球輙去未嘗肯停十八年卒時年四十九追贈特進金紫光禄大夫加散騎常侍無子從孫奐為後大明末吳興太守或人問史臣曰王惠何如荅之曰令明簡又問王球何如荅曰倩玉淡又問謝𢎞微何如曰簡而不失淡而不流古之所謂名臣𢎞㣲當之矣宋書卷五十八宋書卷五十八考證王惠傳王惠字令明瑯邪臨沂人太保𢎞從祖也臣承蒼按晉書王恬王劭皆導之子恬生珣珣生𢎞劭生黙黙生惠當云𢎞從祖弟諸本皆脫弟字今未敢輙增謝𢎞微傳沙門釋慧琳詣𢎞微𢎞微與之共食猶獨素食素南本作蔬宋書卷五十八考證
