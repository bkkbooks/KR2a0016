body:
  text: 宋書卷五十九梁沈約撰列傳第十九殷淳子孚弟沖淡張暢何偃江智淵殷淳字粹逺陳郡長平人也曾祖融祖允並晋太常父穆以和謹致稱歴顯官自五兵尚書為髙祖相國左長史及受禪轉散騎常侍國子祭酒復為五兵尚書呉郡太守太祖即位為金紫光禄大夫領竟陵王師遷䕶軍又遷特進右光禄大夫領始興王師元嘉十五年卒官時年六十諡曰元子淳少好學有羙名少帝景平初為祕書郎衡陽王文學祕書丞中書黃門侍郎淳居黃門為清切下直應留下省以父老特聼還家髙簡寡慾早有清尚愛好文義未嘗違捨在祕書閣撰四部書目凡四十卷行於世元嘉十一年卒時年三十二朝廷痛惜之子孚有父風世祖大明末為始興相官至尚書吏部郎順帝撫軍長史淳弟沖字希逺歴中書黄門郎坐議事不當免復為太子中庶子尚書吏部郎御史中丞有司直之稱出為呉興太守入為度支尚書元凶妃即淳女而冲在東宮為劭所知遇劭弑立以為侍中䕶軍遷司隸校尉沖有學義文辭劭使為尚書符罪状世祖亦為劭盡力世祖剋京邑賜死沖弟淡字夷逺亦歴黄門吏部郎太子中庶子領歩兵校尉大明世以文章見知為當時才士張暢字少微呉郡呉人呉興太守邵兄子也父褘少有孝行歴宦州府為琅邪王國郎中令從琅邪王至洛還京都髙祖封藥酒一甖付禕使宻加酖毒禕受命既還於道自飲而卒暢少與從兄敷演鏡齊名為後進之秀起家為太守徐佩之主簿佩之被誅暢馳出奔赴制服盡哀為論者所羙弟牧嘗為猘犬所傷醫云宜食蝦蟇膾牧甚難之暢含笑先嘗牧因此乃食創亦即愈州辟從事衡陽王義季征虜行參軍彭城王義康平北主簿司徒祭酒尚書主客郎未拜又除度支左民郎江夏王義恭征北記室參軍晋安太守又為義季安西記室參軍南義陽太守臨川王義慶衛軍從事中郎揚州治中别駕從事史太子中庶子世祖鎮彭城暢為安北長史沛郡太守元嘉二十七年索虜托䟦燾南侵太尉江夏王義恭總統諸軍出鎮彭泗時燾親率大衆已至蕭城去彭城十數里彭城衆力雖多而軍食不足義恭欲棄彭城南歸計議彌日不定時歴城衆少食多安北中兵參軍沈慶之建議欲以車營為函箱陳精兵為外翼奉二王及妃媛直趨歴城分兵配䕶軍蕭思話留守太尉長史何朂不同欲席卷奔鬱洲自海道還京都義恭去意已判唯二議未决更集羣僚謀之衆咸惶擾莫有異議暢曰若歴城鬱洲有可致之理下官敢不髙讚今城内乏食百姓咸有走情但以關扄嚴固欲去莫從耳若一旦動脚則各自散走欲至所在何由可得今軍食雖寡朝夕猶未窘罄量其欲盡臨時更為便宜豈有捨萬安之術而就危亡之道若此計必用下官請以頸血汙公馬蹄世祖既聞暢議謂義恭曰阿父既為總統去留非所敢干道民忝為城主而損威延宼其為愧恧亦已深矣委鎮奔逃實無顔復奏朝廷期與此城共有存没張長史言不可異也暢言既堅世祖又贊成其議義恭乃止時太祖遣員外散騎侍郎徐爰乗驛至彭城取米榖定最爰既去城内遣騎送之燾聞知即遣數百騎急追爰巳過淮僅得免初爰去城内聞虜遣追慮爰見禽失米最慮知城内食少義恭憂懼無計猶欲奔走爰既免其日虜大衆亦至彭城燾始至仍登城南亞父冢於戲馬臺立氊屋先是燾未至世袓遣將馬文恭向蕭城為虜所破文恭走得免隊主蒯應見執至小市門曰魏主致意安北逺来疲乏若有甘蔗及酒可見分時防城隊主梁法念荅曰當為啟聞應乃自陳蕭城之敗又問應虜主自来不曰来問今何在應舉手指西南又曰士馬多少荅云四十餘萬法念以燾語白世祖世祖遣人荅曰知行路多乏今付酒二噐甘蔗百挺聞彼有駱駝可遣送明旦燾又自上戲馬臺復遣使至小市門曰魏主致意安北安北可暫出門欲與安北相見我亦不攻此城安北何勞苦將士在城上又騾驢駱駞是北國所出今遣送并致雜物又語小市門隊主曰既有餉物君可移度南門受之燾送駱駞騾馬及貂裘雜飲食既至南門門先閉請籥未出暢於城上視之虜使問是張長史邪暢曰君何得見識虜使荅云君聲名逺聞足使我知暢因問虜使姓荅云我是鮮卑無姓且道亦不可暢又問君居何任荅云鮮卑官位不同不可輙道然亦足與君相敵耳虜使復問何為怱怱杜門絶橋暢荅曰二王以魏主營壘未立將士疲勞此精甲十萬人思致命恐輕相凌踐故且閉城耳待彼休息士馬然後共治戰塲剋日交戰虜使曰君當以法令裁物何用發橋復何足以十萬誇人我亦有良馬逸足若雲騎四集亦可以相拒暢曰侯王設嶮何但法令而已邪我若誇君當言百萬所以言十萬者政二王左右素所畜養者耳此城内有數州士庶二徒營伍猶所未論我本鬬智不鬬馬足且冀之北土馬之所生君復何以逸足見誇邪虜使曰不爾城守君之所長野戰我之所長我之恃馬猶如君之恃城耳城内有具思者嘗在北國義恭遣視之思識是虜尚書李孝伯思因問李尚書若行塗有勞孝伯曰此事應相與共知思荅縁共知所以有勞孝伯曰感君至意既開門暢屏却人仗出對孝伯并進餉物虜使云貂裘與太尉駱駞騾與安北蒲陶酒雜飲叔姪共嘗燾又乞酒并甘橘暢宣世祖問致意魏主知欲相見常遲面寫但受命本朝過䝉藩任人臣無境外之交恨不暫悉且城守備防邊鎮之常但悅以使之故勞而無怨耳太尉鎮軍得所送物魏主意知復須甘橘今並付如别太尉以北土寒鄉皮絝褶脫是所須今致魏主螺杯雜粽南土所珍鎮軍今以相致此信未去燾復遣使令孝伯傳語曰魏主有詔語太尉安北近以騎至車兩在後今端坐無為有博具可見借暢曰博具當為申啟但向語二王已非遜辭且有詔之言政可施於彼國何得稱之於此孝伯曰詔之與語朕之與我並有何異暢曰若辭以通可如来談既言有所施則貴賤有等向所稱詔非所敢聞孝伯又曰太尉安北是人臣與非暢曰是也孝伯曰隣國之君何為不稱詔於隣國之臣暢曰君之此稱尚不可聞於中華况在諸王之貴而猶曰隣國之君邪孝伯曰魏主言太尉鎮軍並皆年少乆濶南信殊當憂邑若欲遣信者當為䕶送脫須騎者亦當以馬送之暢曰此方間路甚多使命日夕往来不復以此勞魏主孝伯曰亦知有水路似為白賊所斷暢曰君著白衣故稱白賊邪孝伯大笑曰今之白賊亦不異黄巾赤眉暢曰黄巾赤眉似不在江南孝伯曰雖不在江南亦不在青徐也暢曰今者青徐實為有賊但非白賊耳虜使云向借博具何故不出暢曰二王貴逺啟聞難徹孝伯曰周公握髮吐哺二王何獨貴逺暢曰握髪吐飡本施中國耳孝伯曰賔有禮主則擇之暢曰昨見衆賔至門未為有禮俄頃送博具出因以與之燾又遣人云魏王致意安北程天祚一介常人誠知非宋朝之羙近於汝陽身􅀍九創落在殿外我手牽而出之凡人骨肉分張並思集聚輙已語之但其弟苦辭今令與来使相見程天福謂使人曰兄受命汝陽不能死節各在一國何煩相見燾又送氊各一領鹽各九種并胡豉曰此諸鹽各有所宜白鹽是魏主自所食黒鹽治腹脹氣懣細刮取六銖以酒服之胡鹽治目痛柔鹽不食治馬脊創赤鹽駮鹽臭鹽馬齒鹽四種並不中食胡豉亦中噉黃甘幸彼所豐可更見分又云魏主致意太尉安北何不遣人来至我間彼此之情雖不可盡要須見我小大知我老少觀我為人若諸佐不可遣亦可使僮幹来暢又宣㫖荅曰魏主形状才力乆為来往所見李尚書親自銜命不患彼此不盡故不復遣使信又云魏主恨向所送馬殊不稱意安北若須大馬當更送之脫須蜀馬亦有佳者暢曰安北不之良駟送自彼意非此所求義恭餉燾炬燭千挺世祖亦致錦一匹曰知更須黃甘誠非所吝但送不足周彼一軍向給魏主未應便乏故不復重付燾復求甘蔗安石榴暢曰石榴出自鄴下亦當非彼所乏孝伯又曰君南土膏􅆝何為著屩君而著此使将士云何暢曰膏粱之言誠為多愧但以不武受命統軍戎陣之間不容緩服孝伯又曰長史我是中州人乆處北國自隔華風相去歩武不得致盡邉皆是北人聼我語者長史當深徳我孝伯又曰永昌王魏主從弟自復常鎮長安今領精騎八萬直造淮南壽春乆閉門自固不敢相禦向送劉康祖頭彼之所見王𤣥謨甚是所悉亦是常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所慿前鋒始得接手崔邪利便藏入穴我間諸将倒曳脚而出之魏主賜其生命今從在此復何以輕脫遣馬文恭至蕭縣使望風退撓邪君家民人甚相忿怨云清平之時賦我租帛至有急難不能相拯暢曰知永昌已過淮南康祖為其所破比有信使無此消息王𤣥謨南土偏将不謂為才但以人為前驅引導耳大軍未至而河冰向合𤣥謨量宜反斾未為失機但因夜回師致戎馬小亂耳我家懸瓠斗城陳憲小将魏主傾國累旬不剋胡盛之偏禆小師衆無一旅始濟融水魏國君臣奔迸僅得免脫滑臺之師無所多愧鄒山小戍雖有微險河畔之民多是新附始慕聖化姦盗未息亦使崔邪利撫之而已今沒虜手何損於國魏主自以十萬師而制一崔邪利方復足言邪聞蕭縣百姓並依山險聊遣馬文恭以十隊示之耳文恭謂前以三隊出還走後大營嵇𤣥敬以百騎至留城魏軍奔敗輕敵致此亦非所衂王境人民列居河畔二國交兵當平加撫養而魏師入境肆行殘虐事生意外由彼無道官不負民民何怨人知入境土百無相拒此自上由太尉神算次在鎮軍聖畧經國之要雖不豫聞然用兵有機間亦不容相語孝伯曰魏主當不圍此城自率衆軍直造瓜歩南事若辦彭城不待圍若不捷彭城亦非所須也我今當南飲江湖以療渇耳暢曰去留之事自適彼懐若虜馬遂得飲江便為無復天道各應反命遲復更悉暢便回還孝伯追曰長史深自愛敬相去歩武恨不執手暢因復謂曰善将愛冀蕩定有期相見無逺君若得還宋朝今為相識之始孝伯曰待此未期燾又遣就二王借箜篌琵琶筝笛等噐及棊子義恭荅曰受任戎行不齎樂具在此燕㑹政使鎮府命妓有弦百條是江南之羙今以相致世祖曰任居方岳初不此經慮且樂人常器又觀前来諸王贈别有此琵琶今以相與棊子亦付孝伯言辭辯贍亦北土之羙也暢随宜應荅吐屬如流音韻詳雅風儀華潤孝伯及左右人並相視歎息虜尋攻彭城南門并放火暢躬自前戰身先士卒及燾自𤓰歩北走經彭城下過遣人語城内食盡且去須麥熟更来義恭大懼閉門不敢追虜期又至議欲芟剪麥苖移民堡聚衆論並不同復更㑹議鎮軍録事參軍王孝孫獨曰虜不能復来既自可保如其更至此議亦不可立百姓閉在内城饑饉日乆方春之月野採自資一入堡聚餓死立至民知必死何可制邪虜若必来芟麥無晩四坐黙然莫之敢對暢曰孝孫之議實有可尋鎮軍府典籖董元嗣侍世祖側進曰王録事議不可奪實如来論别駕王子夏因曰此論誠然暢歛板白世祖曰下官欲命孝孫彈子夏世祖曰王别駕有何事邪暢曰芟麥移民可謂大議一方安危事係於此子夏親為州端曾無同異及聞元嗣之言則懽笑酬荅阿意左右何以事君子夏大慙元嗣亦有慙色義恭之議遂寝太祖聞暢屢有正議甚嘉之世祖猶停彭城召暢先反并使履行旴眙城欲立大鎮時虜聲云當出襄陽故以暢為南譙王義宣司空長史南郡太守又欲暢代劉興祖為青州及彭城都督並不果三十年元凶弑逆義宣發哀之日即便舉兵暢為元佐居僚首哀容俯仰廕映當時舉哀畢改服著黃韋絝褶出射堂簡人音姿容止莫不矚目見之者皆願為盡命事平徵為吏部尚書夷道縣侯食邑千戸義宣既有異圖蔡超等以暢民望勸義宣留之乃解南蠻校尉以授暢加冠軍将軍領丞相長史暢遣門生茍僧寳下都因顔竣陳義宣釁状僧寳有私貨停巴陵不時下㑹義宣起兵津徑斷絶僧寳遂不得去義宣将為逆遣嬖人翟靈寳謂暢朝廷簡練舟甲意在西討今欲發兵自衛暢曰必無此理請以死保之靈寳知暢不回勸義宣殺以殉衆即遣召暢止于東齋彌日不與相見賴司馬竺超民保持故獲全免既而進號撫軍别立軍部以收民望暢雖署文檄而飲酒常醉不省文書隨義宣東下梁山戰敗義宣奔走暢於兵亂自歸為軍人所掠衣服都盡値右将軍王𤣥謨乗輿出營暢已得敗衣排𤣥謨上轝𤣥謨意甚不說諸将欲殺之隊主張世營救得免送京師下廷尉削爵土配左右尚方尋見原復起為都官尚書轉侍中代子淹領太子右衛率孝建二年出為㑹稽太守大明元年卒官時年五十顔竣表世祖張暢遂不救疾東南之秀蚤樹風範聞問悽愴深切常懐諡曰宣子暢愛弟子輯臨終遺命與輯合墳子浩官至義陽王昶征北咨議參軍浩弟淹世祖南中郎主簿世祖即位為黃門郎封廣晋縣子食邑五百戸太子右衛率東陽太守逼郡吏燒臂照佛民有辠使禮佛動至數千拜免官禁錮起為光禄勲臨川内史太宗㤗始初與晋安王子勛同逆率衆至鄱陽軍敗見殺暢弟說亦有羙稱歴中書吏部郎侍中臨海王子頊前軍長史南郡太守晋安王子勛建偽號於尋陽召為吏部尚書與鄧琬共輔偽政事敗殺琬歸降事在琬傳復為太子庶子仍除巴陵王休若衛軍長史襄陽太守四年即代休若為雍州刺史寧逺将軍復為休若征西長史南郡太守六年太宗於巴郡置三巴校尉以補之加持節輔師将軍領巴郡太守未拜卒何偃字仲𢎞廬江􅈞人司空尚之中子也州辟議曹從事舉秀才除中軍參軍臨川王義慶平西府主簿召為太子洗馬不拜元嘉十九年為丹陽丞除廬陵王友太子中舍人中書郎太子中庶子時義陽王昶任東官使偃行義陽國事二十九年太祖欲更北伐訪之羣臣偃議曰内幹胡法宗宣詔逮問北伐伏計賊審有殘禍犬羊易亂殱殄非難誠如天㫖今雖廟算無遺而士未精習緣邉鎮戍充實者寡邉民流散多未附業控引所資取給根本虧根本以殉邉患宜動必萬剋無虞往歳挫傷續以内釁侮亡取亂誠為沛然然淮泗數州實亦彫耗流傭未歸創痍未起且攻守不等客主形異薄之則勢難圍之則曠日進退之間姦虞互起竊謂當今之弊易衂方来之宼不深宜含垢藏疾以齊天道遷始興王濬征北長史南東海太守元凶弑立以偃為侍中掌詔誥時尚之為司空尚書令偃居門下父子並處權要時為寒心而尚之及偃善攝機宜曲得時譽㑹世祖即位任遇無改除大司馬長史遷侍中領太子右庶子時責百官讜言偃以為宜重農䘏本并官省事考課以知能否増俸以除吏姦責成良守乆於其職都督刺史宜别其任改領驍騎将軍親遇隆宻有加舊臣轉吏部尚書尚之去選未五載偃復襲其迹世以為榮侍中顔竣至是始貴與偃俱在門下以文義賞㑹相得甚歡竣自謂任遇隆密宜居重大而位次與偃等未殊意稍不悅及偃代竣領選竣愈憤懣與偃遂有隙竣時勢傾朝野偃不自安遂發心悸病意慮乖僻上表解職告醫不仕世祖遇偃既深備加治療名醫上藥隨所宜須乃得瘥時上長女山陰公主愛傾一時配偃子戢素好談𤣥注荘子消揺篇傳於世大明二年卒官時年四十六世祖與顔竣詔曰何偃遂成異世美志長往與之周旋重以姻媾臨哭傷怨良不能已往矣如何宜贈散騎常侍金紫光禄大夫本官如故諡曰靖子子戢昇明末為相國左長史江智淵濟陽考城人湘州刺史夷弟子父僧安太子中庶子智淵初為著作郎江夏王義恭太尉行參軍太子太傅主簿隨王誕後軍參軍世父夷有盛名夷子湛又有清譽父子並貴達智淵父少無名問湛禮敬甚簡智淵常以為恨自非節歳不入湛門及為隨王誕佐在襄陽誕待之甚厚時咨議參軍謝荘府主簿沈懐文並與智淵友善懐文每稱之曰人所應有盡有人所應無盡無者其江智淵乎元嘉末除尚書庫部郎時髙流官序不為臺郎智淵門孤援寡獨有此選意甚不說固辭不肯拜竟陵王誕復版為騎軍轉主簿隨府轉司空主簿記室參軍領南濮陽太守遷從事中郎誕将為逆智淵悟其機請假先反誕事發即除中書侍郎智淵愛好文雅詞采清贍世祖深相知待恩禮冠朝上燕私甚數多命羣臣五三人游集智淵常為其首同侶未及前輙獨䝉引進智淵每以越衆為慙未嘗有喜色每從游幸與羣僚相隨見傳詔馳来知當呼已聳動愧恧形於容貌論者以此多之遷驍騎将軍尚書吏部郎上每酣宴輙詬辱羣臣并使自相嘲許以為歡笑智淵素方退漸不㑹㫖嘗使以王僧朗嘲戲其子景文智淵正色曰恐不宜有此戲上怒曰江僧安癡人癡人自相惜智淵伏席流涕由此恩寵大衰出為新安王子鸞北中郎長史南東海太守加拜寧朔将軍行南徐州事初上寵姬宣貴妃殷氏卒使羣臣議諡智淵上議曰懐上以不盡嘉號甚銜之後車駕幸南山乗馬至殷氏墓羣臣皆騎從上以馬鞭指墓石柱謂智淵曰此上不容有懐字智淵益惶懼大明七年以憂卒時年四十六子季筠太子洗馬早卒後廢帝即位以后父追贈金紫光禄大夫季筠妻王平望鄉君智淵兄子槩早孤養之如子槩歴黃門吏部侍中武陵王北中郎長史南東海太守行南徐州事後廢帝元徽中卒史臣曰夫将帥者御衆之名士卒者一夫之用坐談兵機制勝千里安在乎䝉楯前驅履腸渉血而已哉山濤之稱羊祜曰大将雖不須筋力軍中猶宜彊徤以此為言則叔子之幹力弱矣杜預文士儒生射不能穿札身未嘗跨馬一朝統大衆二十餘萬為平原都督王戎把臂入林亦受專征之寄何必山西猛士六郡良家然後可受脤於朝堂荷推轂之重及虜兵深入徐服恇震非張暢正言則彭汴危矣豈其身扞飛鏑手折雲衝方足使窮堞假命危城載安乎仁者之有勇非為臆說宋書卷五十九宋書卷五十九考證何偃傳縁邉鎮戍充實者寡監本脫邉字今增宋書卷五十九考證
