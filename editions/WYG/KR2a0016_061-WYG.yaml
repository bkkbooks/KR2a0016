body:
  text: 宋書卷六十一梁沈約撰列傳第二十一武三王武帝七男張夫人生少帝孫脩華生廬陵孝獻王義眞胡婕好生文皇帝王脩容生彭城王義康袁美人生江夏文獻王義恭孫美人生南郡王義宣吕美人生衡陽文玉義季義宣别有傳廬陵孝獻王義眞美儀貌神情秀徹初封桂陽縣公食邑千戸年十二從北征大軍進長安留守柏谷塢除員外散騎常侍不拜及關中平定高祖議欲東還而諸將行役既久咸有歸願止留偏將不足鎮固人心乃以義眞行都督雍涼秦三州之河東平陽河北三郡諸軍事安西將軍領䕶西戎校尉雍州刺史太尉諮議參軍京兆王脩為長史委以關中之任高祖將還三秦父老詣門流涕訴曰殘民不沾王化於今百年矣始覩衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿數千間是公家屋宅捨此欲何之高祖為之愍然慰譬曰受命朝廷不得擅留感諸君戀本之意今留第二兒令文武賢才共鎮此境臨還自執義眞手以授王脩令脩執其子孝孫手以授髙祖義眞尋除正加節又進督并東秦二州司州之東安定新平二郡諸軍事領東秦州刺史時隴上流人多在關中望因大威復得歸本及置東秦州父老知無復經畧隴右固關中之意咸共歎息而佛佛虜寇逼交至沈田子既殺王鎮惡王脩又殺田子義眞年少賜與左右不節脩常裁減之左右並怨因是白義眞曰鎮惡欲反故田子殺之脩今殺田子是又欲反也義眞乃使左右劉乞等殺脩脩字叔治京兆㶚城人也初南渡見桓𤣥𤣥知之謂曰君平世吏部郎才脩既死人情離駭無相統一高祖遣將軍朱齡石替義眞鎮關中使義眞輕兵疾歸諸將競歛財貨多載子女方軌徐行虜追騎且至建威將軍傅𢎞之曰公處分亟進恐虜追擊人也今多將輜重一日行不過十里虜騎追至何以待之宜棄車輕行乃可以免不從賊追兵果至騎數萬匹輔國將軍蒯恩斷後不能禁至青泥後軍大敗諸將及府功曹王賜悉被俘虜義眞在前故得與數百人奔散日暮虜不復窮追義眞與左右相失獨逃草中中兵參軍叚宏單騎追尋緣道呌喚義眞識其聲出就之曰君非段中兵邪身在此宏大喜負之而歸義眞謂宏曰今日之事誠無算畧然丈夫不經此何以知艱難初高祖聞青泥敗未得義眞審問有前至者訪之竝云闇夜奔敗無以知存亡高祖怒甚尅日北伐謝晦諌不從及得宏啓事知義眞已免乃止義眞尋都督司雍秦并涼五州諸軍建威將軍司州刺史持節如故以段宏為義眞諮議參軍尋遷宋臺黄門郎領太子右衛率宏鮮卑人也為慕容超尚書左僕射徐州刺史高祖伐廣固歸降太祖元嘉中為征虜將軍青冀二州刺史追贈左將軍時義眞將鎮洛陽而河南蕭條未及脩理改除揚州刺史鎮石頭永初元年封廬陵王食邑三千戸移鎮東城高祖始踐阼義眞意色不悦侍讀學士蔡茂之問其故義眞曰安不忘危休泰何可恃明年遷司徒高祖不豫以為使持節侍中都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州刺史出鎮歴陽未之任而高祖崩義眞聰明愛文義而輕動無德業與陳郡謝靈運琅邪顏延之慧琳道人竝周旋異常云得志之日以靈運延之為宰相慧琳為西豫州都督徐羡之等嫌義眞與靈運延之暱狎過甚故使范晏從容戒之義眞曰靈運空疎延之隘薄魏文帝云鮮能以名節自立者但性情所得未能忘言於悟賞故與之遊耳將之鎮列部伍於東府前既有國哀義眞所乘舫單素不及母孫脩儀所乘者義眞與靈運延之慧琳等共視部伍因宴舫内使左右剔母舫函道以施己舫而取其勝者及至歴陽多所求索羡之等每裁量不盡與深惡執政表求還都而少帝失德羡之等密謀廢立則次第應在義眞以義眞輕訬不任主社稷因其與少帝不協乃奏廢之曰臣聞二叔不咸難結隆周淮南悖縱禍興盛漢莫不義以斷恩情為法屈二代之事殷鑒無逺仁厚之主行之不疑故共叔不斷幾傾鄭國劉英容養釁廣難深前事之不忘後王之成鑒也案車騎將軍義眞凶忍之性爰自稚弱咸陽之酷醜聲逺播先朝猶以年在紈綺冀能改厲天屬之愛想聞革心自聖體不豫以及大漸臣庶憂惶内外屏氣而縱博酣酒日夜無輟肆口縱言多行無禮先帝貽厥之謀圖慮經固親敕陛下面詔臣等若遂不悛必加放黜至言苦厲猶在紙翰而自兹迄今日月增甚至乃委棄藩屏志還京邑潛懷異圖希幸非冀轉聚甲卒徵召車馬陵墳未乾情事猶昨遂蔑棄遺㫖顯違成䂓整棹浮舟以示歸志肆心專已無復諮承聖恩低徊深垂隱忍屢遣中使苦相敦釋而親對散騎侍郎邢安泰廣武將軍茅仲思縱其悖罵訕主謗朝此久播於逺近暴於人聽臣聞原火不撲蔓草難除青青不伐終致尋斧况憂深患著社稷慮切請一遵晉朝武陵舊典使顧懷之㫖不墜於武廟全宥之德獲申於昵親仰尋感慟臨啓悲咽乃廢義眞為庶人徙新安郡前吉陽令堂邑張約之上疏諫曰臣聞仁義之在天下若中原之有菽理感之被萬物故不擊於貴賤是以考叔反悔誓於及泉壺關復寃䰟於湖邑當斯之時豈無尊卿賢輔或以事迫心違或以道壅謀屈何嘗不願聞善於輿隸藥石阿氏哉臣雖草芥備充黔首少不量力頗高殉義之風謂蹈善於朝聞愈徒生於白首用敢干禁忘戮披叙丹愚伏惟髙祖武皇帝誕兹神武撫運龍興仰清天歩則齊德有虞俯廓九州則侔功大夏故䖍順天人享有萬國雖靈祚脩長聖躬弗永陛下繼明紹統遐邇一心藩王哲茂四維寧謐傾耳康哉之詠企踵升平之風竊念廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩故在心必言所懷必亮容犯臣子之道致招驕恣之愆至於天姿夙成實有卓然之美宜在容養錄善掩瑕訓盡義方進退以漸今猥加剝辱幽徙逺郡上傷陛下棠棣之篤下令逺近恇然失圖士庶杜口人為身計臣伏思大宋之興雖協應符緯而開基造次根條未繁宜廣樹藩戚敦睦以道使兄弟之美比煇魯衛龜䇿告同祚均七百豈不善哉陛下富於春秋慮未重複忽安危之逺算肆不忍於一朝特願留神允思重加詢采上考前代興亡之由中存武帝締構之業下顧蒼生顒顒之望時開曲宥反王都邑選保傅於舊老求四友於髦俊引誘情性導達聰明凡人在苦皆能自厲況王質朗心聰易加訓範且中賢之人未能無過過貴自改罪願自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪棄哉謹昧死詣闕伏地以聞惟願丹誠一經天聽退就斧鑊無愧地下矣書奏以約之為梁州府參軍尋又見殺景平二年六月癸未羨之等遣使殺義眞於徙所時年十八元嘉元年八月詔曰前廬陵王靈柩在逺國封墮替感惟拱慟情若貫割王體自至極地戚屬尊豈可令情禮永淪終始無寄可追復先封特遣奉迎并孫脩華謝妃一時俱還言增摧哽三年正月誅徐羨之傅亮等是日詔曰故廬陵王含章履正英哲自然道心内昭徽風遐被遭時多難志匡權逼天未悔禍運鍾屯險羣凶肆醜專竊國柄禍心潛搆釁生不圖朕每永念讐耻含痛内結遵養姦慝情禮未申今王道既亨政刑始判宣昭國體於是乎在可追崇侍中大將軍王如故為慰寃魂少申悲憤又詔曰乃者權臣陵縱兆亂基禍故吉陽令張約之抗疏矢言至誠慷慨遂事屈羣醜殞命遐疆志節不申感焉兼至昔關老奏書見紀漢䇿閻纂獻䂓荷榮晉代考其忠槩參迹前蹤宜加旌顯式揚義烈可贈以一郡賜錢十萬布百匹義眞無子太祖以第五子紹字休𦙍為嗣元嘉九年襲封廬陵王少而寛雅太祖甚愛之二十年出為南中郎將江州刺史時年十二二十二年入朝加棨㦸進都督江州豫州之西陽晉熙新蔡三郡諸軍事在任七年改授左將軍南徐州刺史給鼓吹一部未之鎮仍遷揚州刺史將軍如故索虜至𤓰歩紹從太子鎮石頭二十九年疾患解職其年薨時年二十一遺令歛以時服素棺周身太祖從之追贈散騎常侍鎮軍將軍開府儀同三司刺史如故無子南平王鑠第三子敬先為嗣本名敬秀旣出繼而紹妃禇秀之孫女故改焉景和二年為前廢帝所害追贈中書侍郎諡曰恭王無子太宗泰始元年以世祖第二十一子晉熙王子輿字孝文為紹嗣封廬陵王為輔國將軍南高平臨淮二郡太守竝未拜為太宗所殺三年更以桂陽王休範第二子徳嗣紹為建威將軍淮陵南彭城二郡太守後廢帝元徽二年與休範俱伏誅國復絶三年復以臨澧忠侯襲第三子暠字淵華繼紹為給事中順帝昇明元年薨諡曰元王又無子國除江夏文獻王義恭㓜而明頴姿顏美麗高祖特所鍾愛諸子莫及也飲食寢卧常不離於側高祖為性儉約諸子食不過五醆盤而義恭愛寵異常求須菓食日中無算得未嘗噉悉以乞與傍人廬陵諸王未嘗敢求求亦不得景平二年監南豫豫司雍秦并州諸軍事冠軍將軍南豫州刺史代廬陵王義眞鎮歴陽時年十二元嘉元年封江夏王食邑五千戸加使持節進號撫軍將軍給鼔吹一部三年監南徐兖二州揚州之晉陵諸軍事徐州刺史持節將軍如故進監為都督未之任太祖征謝晦義恭還鎮京口六年改授散騎常侍都督荆湘雍益梁寧南北秦八州諸軍事荆州刺史持節將軍如故義恭渉獵文義而驕奢不節既出鎮太祖與書誡之曰汝以弱冠便親方任天下艱難家國事重雖曰守成實亦未易隆替安危在吾曹耳豈可不感尋王業大懼負荷今既分張言集未日無由復得動相規誨宜深自砥礪思而後行開布誠心厝懷平當親禮國士友接佳流識别賢愚鑒察邪正然後能盡君子之心收小人之力汝神意爽悟有日新之美而進徳脩業未有可稱吾所以恨之而不能已己者也汝性褊急袁太妃亦説如此性之所滯其欲必行意所不在從物回改此最弊事宜應慨然立志念自裁抑何至丈夫方欲贊世成名而無斷者哉今粗疏十數事汝别時可省也逺大者豈可具言細碎復非筆可盡禮賢下士聖人垂訓驕侈矜尚先哲所去豁達大度漢祖之徳猜忌褊急魏武之累漢書稱衛青云大將軍遇士大夫以禮與小人有恩西門安于矯性齊美蜀之闗張任偏同弊行已舉事深宜鑒此若事異今日嗣子㓜䝉司徒便當周公之事汝不可不盡祗順之理茍有所懷密自書陳若形迹之間深宜慎䕶至於爾時安危天下决汝二人耳勿忘吾言今既進袁太妃供給計足充諸用此外一不須復有求取近亦具白此意唯脱應大餉致而當時遇有所乏汝自可少多供奉耳汝一月日自用不可過三十萬若能省此益美西楚殷曠常宜早起接對賔侣勿使留滯判急務訖然後可入問訊既覩顔色審起居便應即出不須久停以廢庶事也下日及夜自有餘閑府舍住止園池堂觀略所諳究計當無須改作司徒亦云爾若脱於左右之宜須小小回易當以始至一治為限不煩紛紜日求新異凡訊獄多决當時難可逆慮此實為難汝復不習殊當未有次第訊前一二日取訊簿密與劉湛軰共詳大不同也至訊日虛懷博盡慎無以喜怒加人能擇善者而從之美自歸己不可專意自决矜獨斷之明也萬一如此必有大吝非唯訊獄君子用心自不應爾刑獄不可壅滯一月可再訊凡事皆應慎密亦宜豫敕左右人有至誠所陳不可漏泄以負忠信之欵也古人言君不密則失臣臣不密則失身或相䜛搆勿輕信受每有此事當善察之名器深宜慎惜不可妄以假人昵近爵賜尤應裁量吾於左右雖為少恩如聞外論不以為非也以貴陵物物不服以威加人人不厭此易達事耳聲樂嬉㳺不宜令過摴蒱漁獵一切勿為供用奉身皆有節度竒服異器不宜興長汝嬪侍左右已有數人既始至西未可怱怱復有所納又誡之曰宜數引見佐史非唯臣主自應相見不數則彼我不親不親則無因得盡人人不盡復何由知其衆事廣引視聽既益開博於言事者又差有地也九年徵為都督南兖徐兖青冀幽六州豫州之梁郡諸軍事征北將軍開府儀同三司南兖州刺史鎮廣陵時詔内外百官舉才義恭上表曰臣聞雲和備樂則繁會克諧驊騮驂服則致逺斯效陛下順簡夤化文明在躬玉衡既正㤗階載一而猶發慮英髦埀情仄陋幽谷空同顯著揚歴是以潛虬聳鱗佇利見之期翔鳳弭翼應來儀之感竊見南陽宗炳操履閑逺思業眞純砥節丘園息賓盛世貧約而苦内無改情軒冕屢招確爾不拔若以蒲帛之聘感以大倫之美庶投竿釋褐飜然來儀必能毗爕九官宣贊百揆尚書金部郎臣徐森之臣府中直兵參軍事臣王天寶竝局力允濟忠諒欵誠往年逆臣叛逸華陽失守森之全境寧民績章危棘前者經畧伊􅈆元戎喪旅天寶北勤河朔東據營丘勲勇既昭心事兼竭雖䝉褒叙未盡才宜竝可授以邊藩展其志力交阯遼邈累喪藩將政刑每闕撫莅惟艱南中夐逺風謡逈隔蠻獠狡竊邊氓荼炭實須練實以綏其難謂森之可交州刺史天寶可寧州刺史庶足威懷荒表肅清遐服昔魏戊之賢功存薦士趙武之明事彰管庫臣識愧前良理謝先哲率舉所知仰酬採訪退懼瞽言無足甄奬十六年進位司空明年大將軍彭城王義康有罪出藩徵義恭為侍中都督揚南徐兖三州諸軍事司徒錄尚書領太子太傅持節如故給班劒二十人置仗加兵明年解督南兖二十一年進太尉領司徒餘如故義恭既小心恭慎且戒義康之失雖為總錄奉行文書而已故太祖安之相府年給錢二千萬它物倍此而義恭性奢用常不足太祖又别給錢年千萬二十年領國子祭酒時有獻五百里馬者以賜義恭二十七年春索虜寇豫州太祖因此欲開定河洛其秋以義恭總統羣帥出鎮彭城解國子祭酒虜遂深入徑至𤓰歩義恭與世祖閉彭城自守二十八年春虜退走自彭城北退義恭震懼不敢追其日民有告虜驅廣陵民萬餘口夕應宿安王陂去城數十里今追之可悉得諸將竝請義恭又禁不許經宿太祖遣驛至使悉力急追義恭乃遣鎮軍司馬檀和之向蕭城虜先己聞知乃盡殺所驅廣陵民輕騎引去初虜深入上慮義恭不能固彭城備加誡勅義恭答曰臣未能臨瀚海濟居延庶免劉仲奔逃之耻及虜至義恭果走頼衆議得停事在張暢傳降義恭號驃騎將軍開府儀同三司餘悉如故魯郡孔子舊庭有栢樹二十四株經歴漢晉其大連抱有二株先折倒士人崇敬莫之敢犯義恭悉遣人伐取父老莫不歎息又以本官領南兖州刺史增督南兖豫徐兖青冀司雝秦幽并十一州諸軍事并前十三州移鎮盱眙脩治舘宇擬制東城二十九年冬還朝上以御所乘蒼鷹船上迎之遭太妃憂改授大將軍都督揚南徐二州諸軍事南徐州刺史持節侍中錄尚書太子太傅如故還鎮東府辭侍中未拜値元凶肆逆其日劭召義恭先是詔召太子及諸王各有常人慮有詐妄致害者至是義恭求常所遣傳詔劭遣之而後入義恭請罷兵凡府内兵仗竝送還臺進位太保進督會州諸軍事服侍中服又領大宗師世祖入討劭疑義恭有異志使入住尚書下省分諸子竝住神虎門外侍中下省劭聞世祖已次近路欲悉力逆之決戰中道義恭慮世祉船乘陋小劭豕突中流容能為患乃進説曰割棄南岸栅斷石頭此先朝舊法以逸待勞不憂不破也劭從之世祖前鋒至新亭劭挾義恭出戰恒錄在左右故不能自拔戰敗使義恭於東堂簡將義恭先使人具舩於東冶渚因單馬南奔始濟淮追騎已至北岸僅然得免劭大怒遣始興王濬就西省殺義恭十二子世祖時在新林浦義恭既至上表勸世祖即位曰臣聞治亂無兆倚伏相因乾靈降禍二凶極逆深酷巨痛終古未有陛下忠孝自天赫然電發投袂泣血四海順軌是以諸侯雲赴數均八百義奮之旅其會如林神祚明德有所底止而沖居或躍未登天祚非所以嚴重宗社紹延七百昔張武抗辭代王順請耿純陳欵光武正位况今罪逆無親惡盈釁滿阻兵安忍戮善崇姦履地戴天畢命俄頃宜早定尊號以固社稷景平之季實惟樂推王室之亂天命有在故抱拜兆於壓璧赤龍表於霄徵伏惟大明無私逺存家國七廟之靈近哀黔首荼炭之切時陟帝祚永慰羣心臣負釁嬰罰偷生人壤幸及寛政待罪有司敢以漏刻視息披露肝膽世祖即祚授使持節侍中都督揚南徐二州諸軍事太尉錄尚書六條事南徐徐二州刺史給鼔吹一部班劒二十人又假黄鉞事寧進位太傅領大司馬增班劒為三十人以在藩所服玉環大綬賜之增封二千戸上不欲致禮太傅諷有司奏曰聖㫖謙光尊師重道欲致拜太傅斯誠𢎞兹逺風敦闡盛則然周之師保實稱三吏晉因於魏特加其禮帝道嚴極既有常尊考之史載未見兹典故卞壼孫楚竝謂人君無降尊之義逺稽聖典近即羣心臣等參議謂不應有加拜之禮詔曰闇薄纂統寔慿師範思盡䖍恭以承道訓所奏稽諸往代謂無拜禮據文既明便從所執世祖立太子東宫文案使先經義恭孝建元年南郡王義宣臧質魯爽等反加黄鉞白直百人入六門事平以臧質七百里馬賜義恭又增封二千戸世祖以義宣亂逆由於彊盛至是欲削弱王侯義恭希㫖乃上表省錄尚書曰臣聞天地設位三極同序皇王化則九官咸事時亮之績昭於虞典論道之風宣於周載台輔之設坐調陰陽元凱之置起釐百揆所以欒鍼矢言侵官是誡陳平抗辭匪職罔答漢承秦後庶僚稱改爵因時變任與世移總錄之制本非舊體列代相㳂兹仍未革今皇家中造事遵前文宜憲章先代證文古則停省條錄以依昔典使物競思存人懷勤壹則名實靡愆庸節必紀臣謬典國重虛荷崇位興替宜知敢不輸盡上從其議又與驃騎大將軍竟陵王誕奏曰臣聞佾懸有數等級異儀佩笏有制卑高殊序斯蓋上哲之洪謨範世之明訓而時至彌流物無不弊僭侈由俗軌度非古晉代東徙舊法淪落侯牧典章稍與事廣名實一差難以卒變章服崇濫多歴年所今樞機更造皇風載新耗弊未充百用思約宜備品式之律以定損厭之條臣等地居枝昵位參台輔遵正之首請以爵先致貶之端宜從戚始輒因暇日共參愚懷應加省易謹陳九事雖懼匪𠂻庶竭㣲欵伏願陛下聽覽之餘薄垂昭納則上下相安表裏和穆矣詔付外詳有司奏曰車服以庸虞書茂典名器慎假春秋明誡是以尚方所制漢有嚴律諸侯竊服雖親必罪降于頃世下僭滋極器服裝餙樂舞音容通於王公達于衆庶上下無辨民志靡壹義恭所陳寔允禮度九條之格猶有未盡謹共附益凡二十四條聽事不得南向坐施帳并藩國官正冬不得跣登國殿及夾侍國師傳令及油㦸公主王妃傳令不得朱服轝不得重棡鄣扇不得雉尾劒不得鹿盧形槊毦不得孔雀白鷩夾轂隊不得絳襖平乘誕馬不得過二匹胡伎不得綵衣舞伎正冬著袿衣不得裝面冬會不得鐸舞柸柈舞長蹻透狹舒劒博山緣大橦升五案自非正冬會奏舞曲不得舞諸妃主不得著緄帶信幡非臺省官悉用絳郡縣内史相及封内官長於其封君既非在三罷官則不復追敬不合稱臣宜止下官而已諸鎮常行車前後不得過六隊白直夾轂不在其限刀不得過銀銅為飾諸王女封縣主諸王子孫襲封之王妃及封侯者夫人行竝不得鹵簿諸王子繼體為王者㛰𦵏吉凶悉依諸國公侯之禮不得同皇弟皇子車非軺車不得油幢平乘舩皆下兩頭作露平形不得擬象龍舟悉不得朱油帳􅟈不得作五花及竪筍形詔可是嵗十一月還鎮京口二年春進督東南兖二州其冬徵為揚州刺史餘如故加入朝不趨贊拜不名劒履上殿固辭殊禮又解持節都督并侍中義恭撰要記五卷起前漢訖晉太元表上之詔付祕閣時西陽王子尚有盛寵義恭解揚州以避之乃進位太宰領司徒義恭常慮為世祖所疑及海陵王休茂於襄陽為亂乃上表曰古先哲王莫不廣植周親以屏帝宇諸侯受爵亦願永固邦家至有管蔡梁燕致禍周漢上乖顯授之恩下亡血食之業夫善積慶深宜享長久而歴代侯王甚乎匹庶豈異姓皆賢宗室悉不賢由生於深宫不覩稼穡左右近習未値田蘇富貴驕奢自往而至聚毛折軸遂乃危禍漢之諸王竝置傅相猶不得禁逆七國連謀寔由彊盛晉氏列封正足成永嘉之禍尾大不掉終古同疾不有更張則其源莫救日者庶人恃親殆傾王業去嵗西寇藉寵幾敗皇基不圖襄楚復生今釁良以地勝兵勇奬成凶惡前事之不忘後事之明兆陛下大明紹祚􅂷法萬葉臣年衰意塞無所知解忝皇族􅂄長慙慨内深思表管見禆崇萬一竊謂諸王貴重不應居邊至於華州優地時可蹔出既以有州不須置府若位登三事止乎長史掾屬若宜鎭御别差扞城大將若情樂沖虛不宜逼以戎事若捨文好武尤宜禁塞僚佐文學足充話言遊梁之徒一皆勿許文武從鎭以時休止妻子室累不煩自随百僚脩詣宜遵晉令悉須宣令齊到備列賔主之則衡泌之士亦無煩干候貴王器甲於私為用蓋寡自金銀裝刀劒戰具之服皆應輸送還本曲突徙薪防之有素庶善者無懼惡者止姦時世祉嚴暴義恭慮不見容乃卑辭曲意盡禮祗奉且便辯善附會俯仰承接皆有容儀每有符瑞輒獻上賦頌陳詠美德大明元年有三脊茅生石頭西岸累表勸封禪上大悦三年省兵佐加領中書監以崇藝昭武永化三營合四百三十七戸給府更增吏僮千七百人合為二千九百人六年解司徙府太宰府依舊辟召又年給三千匹布七年從廵兼尚書令解中書監八年閏月又領太尉其月世祖崩遺詔義恭解尚書令加中書監栁元景領尚書令入住城内事無巨細悉闗二公大事與沈慶之參决若有軍旅可為總統尚書中事委顔師伯外監所統委王𤣥謨前廢帝即位詔曰總錄之典著自前代孝建始年雖蹔并省而因革有宜理存濟務朕㷀獨在躬未渉政道百揆庶務允歸尊德太宰江夏王義恭新除中書監太尉地居宗重受遺阿衡實深慿倚用康庶績可錄尚書事本官監太宰王如故侍中驃騎大將軍南兖州刺史巴東郡開國公新除尚書令元景同稟顧誓翼輔皇家贊業宣風繄公是頼可即本號開府儀同三司領兵置佐一依舊准領丹陽尹侍中領公如故又增義恭班劒為四十人更申殊禮之命固辭殊禮義恭性嗜不􅁪日時移變自始至終屢遷第宅與人遊款意好亦多不終而奢侈無度不愛財寶左右親幸者一日乞與或至一二百萬小有忤意輒追奪之大明時資供豐厚而用常不足賖市百姓物無錢可還民有通辭求錢者輒題後作原字善騎馬解音律游行或三五百里世祖恣其所之東至吳郡登虎丘山又登無錫縣烏山以望太湖大明中撰國史世祖自為義恭作傳及永光中雖任宰輔而承事近臣戴法興等常若不及前廢帝狂悖無道義恭元景等謀欲廢立永光元年八月廢帝率羽林兵於第害之并四子時年五十三斷析義恭支體分裂腸胃挑取眼睛以蜜漬之以為鬼目精太宗定亂令書曰故中書監太宰領太尉錄尚書事江夏王道性淵深睿鑒通逺樹聲列藩宣風鉉德位隆姬輔任屬負圖勤勞國家方熙託付之重盡心毗道永融雍穆之化而凶醜忌威奄加􅁈害夷戮有暴殯穸無聞憤達幽明痛貫朝野朕䝉險在難含哀莫申幸頼宗祏之靈克纂祈天之祚仰惟勲戚震動于厥心昔梁王徵庸警蹕備禮東平好善黄屋在廷况公徳猷𢎞懋彛典未殊者哉可追崇使持節侍中都督中外諸軍事丞相領太尉中書監錄尚書事王如故給九旒鸞輅虎賁班劒百人前後部羽葆鼔吹輼輬車泰始三年又下詔曰皇基崇建屯剝維難𢎞啓熙載底績忠果故從饗世祀勒勲宗彛世祖寧亂定業寔資翼亮故使持節侍中都督中外諸軍事丞相領太尉中書監錄尚書事江夏文獻王義恭故使持節侍中都督南豫江豫三州軍事太尉南豫州刺史巴東郡開國忠烈公元景故侍中司空始興郡開國襄公慶之故持節征西將軍雍州刺史洮陽縣開國肅侯慤或體道沖𤣥爕化康世或盡誠致効庚難龕逆宜式遵國典陪祭廟庭義恭長子朗字元明出繼少帝封南豐縣王食邑千户為湘州刺史持節侍中領射聲校尉為元凶所殺世祖即位追贈前將軍江州刺史孝建元年以宗室祗長子歆繼封祗伏誅歆還本泰始三年更以宗室韞第二子銑繼封為祕書郎與韞俱死順帝昇明二年復以宗室琨子績繼封三年薨會齊受禪國除朗弟叡字元秀太子舎人為元凶所害追贈侍中諡宣世子大明二年追封安隆王以第四皇子子綏字寶孫繼封食邑三千戸追諡叡曰宣王以子綏為都督郢州諸軍事冠軍將軍郢州刺史進號後軍將軍加持節太宗泰始元年進號征南將軍改封江夏王食邑五千戸改叡為江夏宣王子綏未受命與晉安王子勛同逆賜死七年太宗以第八子躋字仲升繼義恭為孫封江夏王食邑五千戸後廢帝即位督會稽東陽新安臨海永嘉五郡諸軍事東中郎將會稽太守進號左將軍齊受禪降為沙陽縣公食邑一千五百戸謀反賜死叡弟韶字元和封新吳縣侯官至歩兵校尉追贈中書侍郎諡曰烈侯韶弟坦字元度平都懷侯坦弟元諒江安愍侯元諒弟元粹興平悼侯坦元諒元粹竝追贈散騎侍郎元粹弟元仁元方元旒元淑元𦙍與朗等凡十二人竝為元凶所殺元𦙍弟伯禽孝建三年生義恭諸子既遇害為朝廷所哀至是世祖名之曰伯禽以擬魯公伯禽周公旦之子也官至輔國將軍湘州刺史又爲前廢帝所殺諡曰哀世子又追贈江夏王改諡曰愍伯禽弟仲容封永脩縣侯為寧朔將軍臨淮濟陽二郡太守仲容弟叔子封永陽縣侯叔子弟叔寶及仲容叔子竝為前廢帝所殺諡仲容叔子竝曰殤侯衡陽文王義季㓜而夷簡無鄙近之累太祖為荆州高祖使隨往江陵由是特為太祖所愛元嘉元年封衡陽王食邑五千戸五年為征虜將軍八年領石頭戍事九年遷使持節都督南徐州諸軍事右將軍南徐州刺史十六年代臨川王義慶都督荆湘雝益梁寧南北秦八州諸軍事安西將軍荆州刺史持節如故給鼓吹一部先是義慶在任値巴蜀亂擾師旅應接府庫空虛義季躬行節儉畜財省用數年間還復充實隊主續豐母老家貧無以充飬遂斷不食肉義季哀其志給豐每月白米二斛錢一千并制豐噉肉義季素拙書上聽使餘人書啓事唯自署名而已二十年加散騎常侍進號征西大將軍領南蠻校尉義季素􅄝酒自彭城王義康廢後遂為長夜之飲略少醒日太祖累加詰責義季引愆陳謝上詔報之曰誰能無過改之為貴耳此非唯傷事業亦自損性命世中比比皆汝所諳近長沙兄弟皆緣此致故將軍蘇徽躭酒成疾旦夕待盡吾試禁斷并給藥膳至今能立此自是可節之物但嗜者不能立志裁割耳晉元帝人主尚能感王導之諫終身不復飲酒汝既有美尚加以吾意殷勤何至不能慨然深自勉厲乃復須嚴相割裁坐諸紜紜然後少止者幸可不至此一門無此酣法汝於何得之臨書歎塞義季雖奉此㫖酣縱如初遂以成疾上又詔之曰汝飲積食少而素羸多風常慮至此今果委頓縱不能以家國為懷近不復顧性命之重可歎可恨豈復一條本望能以理自厲未欲相苦耳今遣孫道𦙍就楊佛等令晨夕視汝并進止湯食可開懷虛受愼勿隱避吾飽嘗見人斷酒無它慊吸蓋是當時甘􅄝罔己之意耳今者憂怛政在性命未暇及美業復何為吾煎毒至此邪義季終不改以至於終二十一年為都督南兖徐青冀幽六州諸軍事征北大將軍開府儀同三司南兖州刺史持節常侍如故登舟之日帷帳器服諸應隨刺史者悉留之荆楚以為美談二十二年進督豫州之梁郡遷徐州刺史持節常侍都督如故明年索虜侵逼北境擾動義季懲義康禍難不欲以功勤自業無它經畧唯飲酒而已太祖又詔之曰杜驥申怙倉卒之際尚以弱甲瑣卒徼寇作援彼為元統士馬桓桓既不懷奮發連被意㫖猶復逡廵豈唯大乖應赴之宜實孤百姓之望且匈奴輕漢將自此而始賊初起逸未知指趨故且裝束兼存觀察耳少日勢漸可見便應大有經畧何合安然遂不敢動遣軍政欲乘際會拯危急以申威援本無驅馳平原方幅争鋒理又山路易馮何以畏首尾􅂞弱若謂事理政應如此者進大鎮聚甲兵徒為煩耳二十四年義季病篤上遣中書令徐湛之省疾召還京師未及發薨於彭城時年二十三太尉江夏王義恭表解職迎喪不許上遣東海王禕北迎義季喪追贈侍中司空持節都督刺史如故子恭王嶷字子岐嗣中書侍郎太子中庶子世祖大明元年薨追贈冠軍將軍豫州刺史子伯道嗣順帝昇平三年薨其年齊受禪國除史臣曰戒懼乎其所不覩恐畏乎其所不聞在於愼所忽也江夏王髙祖寵子位居上相大明之世親典冠朝屈體降情槃辟於軒檻之上明其為卑約亦已至矣得使虐朝暴主顧無猜色歴載踰十以尊戚自保及在永光㓜主南面公旦之重屬有所歸自謂踐冰之慮己除太山之安可恃曾未云幾而磔體分肌古人以隱微致戒斯為篤矣宋書卷六十一宋書卷六十一考證廬陵孝獻王義眞傳侍讀學士蔡茂之臣承蒼按是時無侍讀學士官名當從南史作侍讀博士江夏文獻王義恭傳挑取眼睛以蜜漬之以為鬼目精精南史作粽衡陽文王義季傳故將軍蘇徽徽南史作徵宋書卷六十一考證
