body:
  text: 宋書卷六十五梁沈約撰列傳第二十五吉翰劉道產杜驥申恬吉翰字休文馮翊池陽人也初為龍驤將軍道憐參軍隨府轉征虜左軍參軍員外散騎侍郎隨道憐北征廣固賜爵建城縣五等男轉道憐驃騎中兵參軍從事中郎為將佐十餘年清謹剛正甚為髙祖所知賞永初三年轉道憐太尉司馬太祖元嘉元年出督梁南秦二州諸軍事龍驤将軍西戎校尉梁南秦二州刺史三年仇池氐楊興平遣使歸順并兒弟為質翰遣始平太守龎諮據武興仇池大帥楊𤣥遣弟難當率衆拒諮又遣将强鹿皮向白水諮擊破難當等並退走其年徙督益寜二州梁之巴西梓潼宕渠南漢中秦州之安固懷寜六郡諸軍事益州刺史将軍如故在益州著美績甚得方伯之體論者稱之六年以老疾徴還除彭城王義康司徒司馬加輔國将軍時太祖經略河南以翰為持節監司雝并三州諸軍事司州刺史持節將軍如故會前鋒諸軍到彥之等敗退明年復為司徒司馬将軍如故其年又假節監徐兖二州豫州之梁郡諸軍事徐州刺史将軍如故時有死罪囚典籖意欲活之因翰入闗齋呈其事翰省訖語今且去明可便呈明旦典籖不敢復入呼之乃來取昨所呈事視訖謂之曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籖付獄殺之原此囚生命其刑政如此其下畏服莫敢犯禁明年卒官時年六十追贈征虜将軍持節監刺史如故劉道產彭城吕人太尉咨議參軍簡之子也簡之事在弟子康祖傳道產初為輔國參軍無錫令在縣有能名髙祖版為中軍行參軍又為道憐驃騎參軍襲父爵晉安縣五等侯廣州羣盗因刺史謝道欣死為寇攻没州城道憐加道産振武将軍南討會始興謙之已平廣州道産未至而反元年除寧遠将軍巴西梓潼二郡太守郡人黄公生任肅之張石之等並譙縱餘燼與姻親侯攬羅奥等招引白水氐規欲為亂道産誅公生等二十一家宥其餘黨還為彭城王義康驃騎中兵參軍元嘉三年督梁南秦二州諸軍事寧遠将軍西戎校尉梁南秦二州刺史在州有惠化闗中流民前後出漢川歸之者甚多六年道産表置隴西宋康二郡以領之七年徵為後軍将軍明年遷竟陵王義宣左将軍咨議參軍仍為持節督雝梁南秦三州荆州之南陽竟陵順陽襄陽新野隨六郡諸軍事寧逺将軍寧蠻校尉雝州刺史襄陽太守善於臨民在雝部政績尤著蠻夷前後叛戾不受化者並皆順服悉出緣沔為居百姓樂業民户豐贍由此有襄陽樂歌自道産始也十三年進號輔國将軍十九年卒追贈征虜将軍諡曰襄侯道産惠澤被於西土及䘮還諸蠻皆備衰絰號哭追送至于沔口荆州刺史衡陽王義季啟太祖曰故輔國将軍劉道産患背癰疾遂不救道產自鎮漢南境接凶宼政績既著威懐兼舉年時猶可方宣其用奄至殞沒傷怨特深伏惟聖懐愍惜兼至長子延孫别有傳延孫弟延熙因延孫之廕大明中為司徒右長史黄門郎臨海義興太守泰始初與四方同反伏誅道産弟道錫巴西梓潼二郡太守元嘉十八年為氐宼所攻道錫保城退敵太祖嘉之下詔曰前者兵宼攻逼邊情波駭廣威将軍巴西梓潼二郡太守劉道錫將率文武盡心固守保全之績厥效可書可冠軍咨議參軍前建威将軍晉夀太守申坦孤城弱衆厲志致果死傷參半壮氣不衰雖力屈䧟沒在誠宜甄可建威将軍巴西梓潼二郡太守初氐宼至城内衆寡道錫募吏民守城復租布二十年及賊退朝議賊雖攻城一戰便走聽依本要於事為優右衞将軍沈演之丹陽尹羊𤣥保後軍長史范曅並謂宜隨功勞裁量不可全用本誓多者不得過十年從之二十一年遷揚烈将軍廣州刺史二十七年坐貪縱過度自杖治中荀齊文垂死乘轝出城行與阿尼同載為有司所糾値赦明年散徵又以赦後餘贓收下廷尉被宥病卒杜驥字度世京兆杜陵人也髙祖預晉征南将軍曾祖躭避難河西因仕張氏苻堅平凉州父祖始還關中兄坦頗渉史傳髙祖征長安席卷隨從南還太祖元嘉中任遇甚厚歴後軍将軍龍驤将軍青冀二州刺史南平王鑠右将軍司馬晩度北人朝廷常以傖燕遇之雖復人才可施每為清塗所隔坦以此慨然嘗與太祖言及史籍上曰金日磾忠孝淳深漢朝莫及恨今世無復如此輩人坦曰日磾之美誠如聖詔假使生乎今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也坦曰請以臣言之臣本中華髙族亡曾祖晉氏喪亂播遷凉土世葉相承不殞其舊直以南度不早便以荒傖賜隔日磾胡人身為牧圉便超入内侍齒列名賢聖朝雖復拔才臣恐未必能也上嘿然北土舊法問疾必遣子弟驥年十三父使候同郡韋華華子𤣥有高名見而異之以女妻焉桂陽公義眞鎮長安辟為州主簿後為義真車騎行參軍員外散騎侍郎江夏王義恭撫軍刑獄參軍尚書都官郎長沙王義欣後軍錄事參軍元嘉七年隨到彥之入河南加建武将軍索虜撤河南戍悉歸河北彥之使驥守洛陽洛陽城不治既久又無糧食及彦之敗退驥欲棄城走慮為太祖所誅初高祖平西洛致鐘虡舊器南還一大鐘墜洛水至是太祖遣将姚聳夫領千五百人迎致之時聳夫政率所領牽鐘於洛水驥乃誑之曰虜既南渡洛城勢弱今修理城池並已堅固軍糧又足所乏者人耳君率衆見就共守此城大功既立取鐘無晩聳夫信之率所領就驥既至見城不可守又無糧食於是引衆去驥亦委城南奔白太祖曰本欲以死固守姚聳夫及城便走人情沮敗不可復禁上大怒使建威将軍鄭順之殺聳夫於夀陽聳夫呉興武康人勇果有氣力宋世褊禆小将莫及始隨到彦之北伐與虜遇聳夫手斬拓跋燾叔父英文特勒首燾以馬百匹贖之以驥為通直郎射聲校尉世祖征虜諮議參軍十七年出督青冀二州徐州之東莞東安二郡諸軍事寜逺将軍青冀二州刺史在任八年惠化著於齊土自義熙至于宋末刺史唯羊穆之及驥為吏民所稱詠二十四年徵左軍将軍兄坦代為刺史北土以為榮焉坦長子琬為員外散騎侍郎太祖嘗有函詔勑坦琬輒開視信未發又追取之勑函已發大相推檢丞都答云諸郎開視上遣主書詰責驥答曰開函是臣第四子季文伏待刑坐上特原不問二十七年卒時年六十四長子長文早卒第五子幼文薄於行太宗初以軍功為驍騎將軍封邵陽縣男食邑三百户尋坐巧佞奪爵後以發太尉廬江王褘謀反事拜黄門侍郎出為輔國将軍梁南秦二州刺史廢帝元徽中為散騎常侍幼文所莅貪横家累千金女伎數十人絲竹晝夜不絶與沈勃孫超之居止接近常相從又並與阮佃夫厚善佃夫死廢帝深疾之帝微行夜出輒在幼文門牆之間聽其弦管積久轉不能平於是自率宿衛兵誅幼文勃超之等幼文兄叔文為長水校尉及諸子姪在京邑方鎭者並誅唯幼文兄季文弟希文等數人逃亡得免申恬字公休魏郡魏人也曾祖鍾為石虎司徒髙祖平廣固恬父宣宣從父兄永皆得歸國並以幹用見知永歴青兖二州刺史髙祖踐祚拜大中大夫宣太祖元嘉初亦歴兖青二州刺史恬兄謨與朱修之守滑臺為虜所没後得叛還元嘉中為竟陵太守恬初為驃騎道憐長兼參軍高祖踐祚拜東宫殿中將軍度還臺直省十載不請休息轉員外散騎侍郎出為綏逺将軍下邳太守轉在北海加寧逺将軍所至皆有政績又為北譙梁二郡太守將軍如故郡境邊接任榛屢被宼抄恬到密知賊來仍伏兵要害出其不意悉皆禽殄元嘉十二年遷督魯東平濟北三郡軍事太山太守将軍如故惠威兼著吏民便之臨川王義慶鎮江陵為平西中兵參軍河東太守衡陽王義季代義慶又度安西府加寜朔将軍召拜太子屯騎校尉母憂去職二十一年冀州移鎮歴下以恬督冀州青州之濟南樂安太原三郡詣軍事揚烈将軍冀州刺史明年加濟南太守時又遷換諸郡守恬上表曰伏聞朝恩當加臣濟南太守仰惟優㫖荒心散越臣殃咎之餘遭蒙踰忝寵私罔已復兼今授豈其愚迷所能上答臣近至止即履行所統究其形宜河濟之間應置戍扞其中四處急須修立瓮口故城又是要所宜移太原委以邊事緣山諸邏並得除省防衞綏懷利便非一吕綽誠效益著深同臣意百姓聞者咸皆附説急有同異二三未宜但房紹之莅郡經年軍民粗狎改以帶臣有乖永事逺牽太原於民為苦而瓮口之計復成交互人情非樂容有不安疆場威刑患不開廣若得依先處分公私允緝上從之詔有司曰恬所陳當是事宜近諸除授可悉停北虜入宼恬摧擊之為虜所破被徴還都二十七年起為通直常侍是歲索虜南寇其武昌王向青州遣恬援東陽因與輔國司馬齊郡太守龎秀之保城固守蕭斌遣青州别駕解榮之率垣護之還援恬等仍傍南山得入賊朝來脅城日晩輙退城内乃出車北門外環塹為營欲挑戰賊不敢逼停五日東過抄略清河郡及驛道南數千家從東安東莞出下邳下邳太守垣閬閉城距守保全二千餘家虜退以恬為寧朔将軍山陽太守善於治民所莅有績世祖踐祚遷青州刺史将軍如故尋加督徐州之東莞東安二郡諸軍事明年又督冀州齊地連歲興兵百姓凋弊恬初防衞邊境勸課農桑二三年間遂皆優實性清約頻處州郡妻子不免飢寒世以此稱之進號輔國将軍孝建二年遷督豫州軍事寧朔将軍豫州刺史明年疾病徵還於道卒時年六十九死之日家無遺財子寔南譙郡太守子謨早卒謨子元嗣海陵廣陵太守元嗣弟謙太始初以軍功歴軍校官至輔國將軍臨川内史永子坦自巴西梓潼遷梁南秦二州刺史元嘉二十六年為世祖鎮軍諮議參軍與王𤣥謨圍滑臺不克免官青州刺史蕭斌板行建威将軍濟南平原二郡太守復攻碻磝敗退下歴城蕭思話起義討元􅇯假坦輔國将軍為前􅄡世祖至新亭坦亦進克京城孝建初為太子右衞率寧朔将軍徐州刺史大明元年虜宼兖州世祖遣太子衞率薛安都新除東陽太守沈法系北討至兖州虜已去坦建議任榛亡命屢犯邊民軍出無功宜因此翦撲上從之亡命先已聞知舉村逃走安都與法系坐白衣領職坦棄市群臣為之請莫能得将行刑始興公沈慶之入市抱坦慟哭曰卿無罪為朝廷所枉誅我入市亦當不久市官以白上乃原生命繫尚方尋被宥復為驍騎将軍病卒子令孫前廢帝景和中為永嘉王子仁左軍司馬廣陵太守太宗以為寜朔将軍徐州刺史討薛安都行至淮陽即與安都合弟闡時為濟陽太守戍睢陵城奉順不同安都安都攻圍不能克會令孫至遣往睢陵令説闡降闡既降殺之令孫亦見殺先是清河崔諲亦以将吏見知髙祖永初末為振威将軍東莱太守少帝初亡命司馬靈期司馬順之千餘人圍東莱諲擊之斬靈期等三十級太祖元嘉中至青州刺史史臣曰漢之良吏居官者或長子孫孫曹之世善職者亦二三十載皆敷政以盡民和興讓以存簡久及晩代風烈漸衰非才有起伏蓋所遭之時異也劉道産之在漢南歴年踰十惠化流於樊沔頗有前世遺風故能樹績垂名斯為美矣宋書卷六十五宋書卷六十五考證劉道産傳廣州羣盗因刺史謝道欣死為宼劉康祖傳作刺史謝欣道憐加道産振武将軍南討會始興謙之已平廣州臣承蒼按謙之即道産叔父義熙初為始興相此傳叙次不明始興下當有脱孚申恬傳子謨早卒臣承蒼按前云恬兄謨與朱修之守滑臺為虜所執後得叛還此子字當是兄字之訛宋書卷六十五考證
