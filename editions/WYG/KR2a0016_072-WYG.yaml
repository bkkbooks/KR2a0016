body:
  text: 宋書卷七十二梁沈約撰列傳第三十二文九王文帝十九男元皇后生劭潘淑妃生濬路淑媛生孝武帝吳淑儀生南平王鑠髙脩儀生廬陵昭王紹殷脩華生竟陵王誕曹婕妤生建平宣簡王宏陳脩容生東海王禕謝容華生晉熙王昶江脩儀生武昌王渾沈婕妤生明帝楊脩儀生建安王休仁邢美人生晉平王休祐蔡美人生海陵王休茂董美人生鄱陽哀王休業顔美人生臨慶冲王休倩陳美人生新野懷王夷甫荀美人生桂楊王休範羅美人生巴陵哀王休若劭濬誕褘渾休茂休範别有傳紹出繼廬陵孝獻王義真南平穆王鑠字休𤣥文帝第四子也元嘉十七年都督湘州諸軍事冠軍將軍湘州刺史不之鎮領石頭戍事二十二年遷使持節都督南豫豫司雍秦并六州諸軍事南豫州刺史時太祖方事外略乃罷南豫併夀陽即以鑠為豫州刺史尋領安蠻校尉給鼓吹一部二十六年進號平西將軍讓不拜索虜大帥拓䟦燾南侵陳頴遂圍汝南懸瓠城行汝南太守陳憲保城自固賊晝夜攻圍之憲且守且戰矢石無時不交虜多作髙樓施弩以射城内飛矢雨下城中負户以汲又毁佛浮圗取金像以為大鉤施之衝車端以牽樓堞城内有一沙門頗有機思輙設竒以應之賊多作蝦蟆車以填塹肉薄攻城憲督厲將士固女墻而戰賊之死者屍與城等遂登屍以陵城短兵相接憲鋭氣愈奮戰士無不一當百殺傷萬計汝水為之不流相拒四十餘日鑠遣安蠻司馬劉康祖與寧朔將軍臧質救之虜燒攻具走二十七年大舉北伐諸蕃並出師鑠遣中兵參軍胡盛之出汝南上蔡向長社長社戍主魯爽委城奔走既克長社遣幢主王陽兒張略等進㨿小索偽豫州刺史僕蘭於大索率歩騎二千攻陽兒陽兒擊大破之到坦之等進向太索勞楊氏鄭德𤣥張和各起義以應坦之僕蘭奔虎牢㑹王陽兒等至即㨿大索因向虎牢鑠又遣安蠻司馬劉康祖繼坦之虜永昌王宜勤仁庫真救虎牢坦之敗走虜乘勝逕進於尉氏津逢康祖康祖戰敗見殺賊進脅夀陽因東過與燾㑹於江上二十八年夏虜荆州刺史魯爽及弟秀等率部曲詣鑠歸順其年七月鑠所生吳淑儀薨鑠歸京師葬畢還攝本任時江夏王義恭領兖州刺史鎮盱眙丁母憂還京師上以兖土彫荒罷南兖併南徐州當别置淮南都督住盱眙開創屯田應接逺近欲以授鑠既而改授散騎常侍撫軍将軍領兵戍石頭元凶弑立以為中軍将軍䕶軍常侍如故世祖入討劭屯兵京邑使鑠廵行撫勞劭還立南兖以鑠為使持節都督南兖徐兖青冀幽六州諸軍事征虜將軍開府儀同三司南兖州刺史常侍如故柳元景至新亭劭親自攻之挾鑠自随江夏王義恭南奔使鑠守東府以腹心防之進授侍中驃騎将軍錄尚書事餘如故劭迎蒋侯神於宫内疏世祖年諱厭祝祈請假授位號使鑠造策文及義軍入宫鑠與濬俱歸世祖濬即伏法上迎鑠入營當時倉卒失國璽事寧更鑄給之進侍中司空領兵置佐以國哀未闋讓侍中鑠素不推事世祖又為元凶所任上乃以藥内食中毒殺之時年二十三追贈侍中司徒三子敬猷敬淵敬先敬猷嗣官至黄門郎敬淵初封南安縣侯官至後軍將軍敬先繼廬陵王紹前廢帝景和末召鑠妃江氏入宫使左右於前逼廹之江氏不受命謂曰若不從當殺汝三子江氏猶不肯於是遣使於第殺敬猷敬淵敬先鞭江氏一百其夕廢帝亦殞太宗即位追贈敬猷侍中諡曰懷王追贈敬淵黄門侍郎諡曰悼侯改封孝武帝第十八子臨賀王子産字孝仁為南平王繼鑠後未拜被殺泰始五年立晉平王休祐第七子宣曜為南平王繼鑠休祐死宣曜被廢還本後廢帝元徽元年立衡陽恭王嶷第二子伯玉為南平王繼鑠後官至給事中昇明二年謀反誅國除建平宣簡王宏字休度文帝第七子也早䘮母元嘉二十一年年十一封建平王食邑二千户少而閑素篤好文籍太祖寵愛殊常為立第於鷄籠山盡山水之美建平國職髙他國一階二十四年為中䕶軍領石頭戍事出為征虜將軍江州刺史二十八年徴為中書令領驍騎將軍元凶弑立以宏為左將軍丹陽尹又以為散騎常侍鎮軍將軍江州刺史世祖入討劭錄宏殿内世祖先嘗以一手板與宏宏遣左右親信周法道齎手板詣世祖事平以為尚書左僕射使奉迎太后還加冠軍將軍中書監僕射如故臧質為逆宏以仗士五十人入六門為人謙儉周慎禮賢接士明曉政事上甚信仗之時普責百官讜言宏議曰臣聞建國之道咸殊興王之政不一至於開諫致寧防口取禍固前王同軌後主共則秦殷之敗語戮刺亡周漢之盛謗升箴顯陛下以至德神臨垂精思治進儒禮而崇寛教哀獄法而黜嚴刑表忠行而舉貞節辟處士而求賢異修廢官而出滯賞撤天膳而重農食禁貴逰而弛𣙜酤通山澤而易關梁固已海内仰道天下知徳今復開不諱之塗奬直辭之路四海希風普天幸甚舉䝉採問敢不悉心謹條鄙見置陳如左辭理違謬伏用震讋夫用兵之道自古所慎頃干戈未戢戰備宜修而卒不素練兵非夙昔且戎衞之職多非其才或以資厚素加或以祿薄帯帖或寵由權門恩自私假既無將領虚尸榮祿至於邊城舉燧羽驛交馳而望其擐甲推鋒立功閫外譬縁木求魚不可得矣常謂臨難命師皆出倉卒驅烏合之衆𨽻造次之主貎疎情乖有若胡越豈能使其同力拔危濟難故奔北相望覆敗繼有今欲改選將校皆得其人分臺見將各以配給領䕶二軍為其總統令撫養士卒使恩信先加農隙校獵以習其事三令五申以齊其心使動止應規進退中律然後蓄鋭觀釁因時而動摧敵䧟堅折衝于外孫子曰視卒如赤子故可與之共死所以張弮効爭先之心吮癰致必盡之命豈不由恩著者士輕其生令明者卒畢其力考心迹事如或有在妄陳膚知追懼乖謬轉尚書令加散騎常侍將軍如故給鼓吹一部尋進號衛將軍中書監尚書令如故宏少而多病大明二年疾動求解尚書令以本號開府儀同三司加散騎常侍中書監如故未拜其年薨時年二十五追贈侍中司徒中書監如故給班劒二十人上痛悼甚至每朔望輒出臨靈自為墓誌銘并序與東揚州刺史顔竣詔曰宏夙情業尚素心令績雖年未及壯願言兼申謂天道可倚輔仁無妄雖寢患淹時慮不至禍豈圗祐善虚設一旦永謝驚惋摧慟五内交殞平生未逺舉目如昨而賞對逰娯􅃡同千載哀酷纒綿實増痛切卿情均休戚重以周旋乖坼少時奄成今古聞問傷惋當何可言五年益諸弟國各千户先薨者不在其例唯宏追益子景素少愛文義有父風大明四年為寧朔將軍南濟隂太守徙歴陽南譙二郡太守將軍如故中書侍郎不拜監南豫豫二州諸軍事輔國將軍南豫州刺史又不拜太宗初太子中庶子領歩兵校尉太子左衛率加給事中冠軍將軍南兖州刺史丹陽尹吳興太守使持節監湘州諸軍事湘州刺史將軍並如故進號左將軍泰始六年都督荆湘雍益梁寧南北秦八州諸軍事左將軍荆州刺史持節如故徴為散騎常侍後將軍太常未拜授使持節都督南徐南兖兖徐青冀六州諸軍事鎮軍將軍南徐州刺史桂陽王休範為逆景素雖纂集兵衆以赴朝廷為名而隂懷兩端及事平進號鎮北將軍齊王為南兖州景素解都督時太祖諸子盡殂衆孫唯景素為長建安王休祐諸子並廢徙無在朝者景素好文章書籍招集才義之士傾身禮接以収名譽由是朝野翕然莫不屬意焉而後廢帝狂凶失道内外皆謂景素宜當神器唯廢帝所生陳氏親戚疾忌之而楊運長阮佃夫並太宗舊𨽻貪㓜少以乆其權慮景素立不見容於長主深相忌憚元徽三年景素防閤將軍王季符失景素㫖怨恨因單騎奔京邑告運長佃夫云景素欲反運長等便欲遣軍討之齊王及衞將軍袁粲以下並保持之謂為不然也景素亦馳遣世子延齡還都具自申理運長等乃徙季符於梁州又奪景素征北將軍開府儀同三司自是廢帝狂悖日甚朝野並屬心景素陳氏及運長等彌相猜疑景素因此稍為自防之計與司馬廬江何季穆錄事參軍陳郡殷濔記室參軍濟陽蔡履中兵參軍略陽垣慶延左右賀文超等謀之以參軍沈顒母丘文子左暄州西曹王潭等為爪牙季穆薦從弟豫之為參軍景素遣豫之潭文超等去來京邑多與金帛要結才力之士由是冠軍將軍黄回㳺擊將軍髙道慶輔國將軍曹欣之前軍韓道清長水校尉郭蘭之羽林監垣祗祖並皆響附其餘武人失職不得志者莫不歸之時廢帝單馬獨出逰走郊野曹欣之謀㨿石頭韓道清郭蘭之欲說齊王使同若不回者圗之候廢帝出行因衆作難事克奉景素景素每禁駐之未欲怱怱舉動運長密遣傖人周天賜偽投景素勸為異計景素知為運長所遣即斬之遣司馬孫謙送首還臺元徽四年七月垣祗祖率數百人奔景素云京邑已潰亂勸令速入景素信之即便舉兵負戈至者數千人運長等常疑景素有異志及聞祗祖叛走便纂嚴備辦齊王出屯𤣥武湖冠軍將軍任農夫黄回左軍將軍李安民各領歩軍右軍將軍張保率水軍并北討冠軍將軍南豫州刺史段佛榮為都統其餘衆軍相繼進冠軍將軍齊王世子鎮東府城齊王知黄回有異圗故使安民佛榮俱行以防之景素欲斷㨿竹里以拒臺軍垣慶延袛祖沈顒等曰今天時旱熱臺軍逺來疲困引之使至以逸待勞可一戰而克也殷濔等固爭不能農夫等既至放火燒市邑而垣慶延等各相顧望並無鬬志景素本乏威略恇擾不知所為時張保水軍泊西渚景素左右勇士數十人並荆楚快手自相要結擊水軍應時摧陷斬張保而諸將不相應赴復為臺軍所破臺軍既薄城池顒先衆叛走垣祗祖次之其餘諸軍相係奔敗左暄驍果有膽力欲為景素盡節而所配兵力甚弱猶力戰不退於萬嵗樓下横射臺軍不能禁然後退散右衛殿中將軍張倪奴前軍將軍周盤龍攻䧟京城倪奴禽景素斬之時年二十五即葬京口垣慶延袛祖左暄賀文超並伏誅殷濔蔡履徙梁州何季穆先遷官故不及禍其餘皆逃亡值赦得免景素既敗曹欣之反告韓道清郭蘭之之謀道清等並誅黄囘髙道慶等齊王撫之如舊景素子延齡及二少子並從誅其年冬封長沙成王義欣子􅎰第三子恬為秭歸縣侯食邑千户繼宏後順帝昇明二年卒國除張倪奴以禽景素功封筑陽縣侯食邑千户景素敗後故記室參軍王螭故主簿何昌㝢並上書訟景素之寃齊受禪建元初故景素秀才劉璡又上書曰臣聞曽子孝於其親而沈乎水介生忠於其主而焚於火何則仁也不必可依信也不必可恃昔者墨翟議雲梯於荆臺之下宋人逐之夷叔為衛軍隠難於晉公子殪之李牧北逝強胡之旗南拒全秦之卒趙王不圗其功賜以利劒陳蕃白首固義􅁯生事主漢靈不明其忠卒被刑戮彼數子者皆身栖青雲之上而困於泥塵之裏誠以危行不容於衰世孤立聚尤於衆人加讒謟蛆蠱其中謗隙蜂飛而至故也臣聞浸潤之行骨肉離絶疑似一至君臣易心此中山所以歔欷奏樂孟博所以慷慨囊頭者也臣每惟故舉將宋建平王之禍悲徹骨髓氣疑霜霰今琁鼎啓運人神改物生罪尚宥死寃必申臣誠不忍王之負謗而不雪故敢明言其理臣聞孝悌為志者不以犯上曽子不逆薪而㸑知其不為暴也秦仁獲麑知其可為𫝊也臣聞王之事獻太妃也朝夕不違養甘苦不見色帳下進珍饌太妃未食王投箸輟飯太妃起居有不安王傍行蓬髮臣聞求忠臣者於孝子之門安有孝如王而不忠者乎其可明一也當泰始元徽中王公貴人無謁景寧陵者王獨抗情而行不以趨時捨義出鎮入朝必俛拜陵所王尚不棄先君豈背今君乎其可明二也王博聞而容衆與諫而愛士與人言呴呴若有傷聞人之善譽而進之見人之惡掩而誨之李蔚之蓬廬之寒素也王枉駕而訊之何季穆等宣簡王之舊也王提挈以升之王虚已以厚天下之士尚不欲傷一人之心何乃親戚圗相菹膾乎其可明三也臣昔以法曹參軍奉訊於聼朝之末王每斷獄降聲辭和顔色以待士女之訟時見夏伯以童子縲縶王愴然改貎用不加刑徐州嘗嵗饑王散秩粟俸帛以繼民之乏蠲理寃疑咸息繇務所在皆有愛於民臣聞善人國之紀也安有仁於民庶而虐其宗國者乎其可明四也王修身潔行言無近雜内去聲酌之娱外無田弋之好每所臨踐不加穿築直衞不䌓第宅無改荆州髙齋刻楹柏構王廢而不處昔朝廷欲賜王東陵甲第又辭而不當兩宫所遺珍玩塵於笥篋無它嬖私不耽内寵姬嬙數人皆詔令所賜王身食不踰一肉噐用瓦素時有獻鏤玉噐王顧謂何昌㝢曰我持此安所用哉乃謝而反之王恭已蹈義若此其可明五也王之在荆州也時獻太妃初薨宋明帝新棄天下京畿諸王又相繼非命王乃徴入為太常楚下人士並勸勿下王謂為臣而距先皇之命不忠為子不奉親之窀穸不孝於是棄西州之重而匍伏北闕王若志欲倔彊便應髙枕江漢何為屈折而受制於人乎其可明六也王名髙海内義重太山耆㓜懐仁士庶慕德故從昏者忌明同枉者毁正搦弦為鉤張一作百行坐欬嚔皆生風塵㑹王季符負辠流謗事㑹讒人之心權醜相扇䲭梟奮翼王雖遘愍離凶而誠分彌款散情中孚揮㡿滿素虞玩之銜使歸旋世子入質京邑續解徐州請身東第後求㑹稽降階外撫虞玩殷煥實為詮譯誠心殷勤備留聖聼王若侜張跋扈何事若斯其可明七也自是以後日同殊論蒼梧之衰德既彰羣小之姦慝彌廣下盈其毒上不可依時長王並見誅鋤公卿如蹈虎尾衆人翕翕莫不注仰於王廂閤諸人同謀異志王心不從利忠不背本執周天賜而斬之以距王宜與等遣司馬孫謙歸款朝廷王若欲擬非覬寧當如此乎其可明八也又是年五月以後道路皆謂阮佃夫等欲潜圗宫禁因兵北襲而黄回髙道慶等傳構其事武人奬亂更相恐脅至六月而京師徴賦車徒將講衆北壘都鄙疑駭僉言釁作垣袛祖因民情囂蕩揚聲北奔紿辭惑衆窮亂極禍㑹州人自都還説掖門已閉殊不知臺中安不王既素籍異論謂為信然収率疲弱志在投散冰炭在懐但恐遲後何圗兵以順出翻為逆動乎夫往來之人諠譁幻惑皆出輦轂非從徐州起也且臺以六月晦夜無何呼北兵已至皆登陴抽刃而朱方七月朔猶緩帯從容其晚聞京都變亂始乃鳩兵簡甲耳王豈先造禍哉其可明九也王聞京室有難坐不安食不甘言及太后未嘗不交巾掩泣又臨危之際撫楹而歎曰吾恐三才於斯絶矣茲豈不誠在本朝以天下為憂乎自非深忠逺槩孰能身滅之不恤獨眷眷國家安危哉其可明十也夫王起兵之日止在匡救昏難放殛姦盜非他故也請較言之當時君臣之道治亂云何楊運長阮佃夫為有辠邪為無辠邪若其無辠何故為戮若其有辠討之何辜王豈不知君親之無將乎顧以救火之家豈遑先白丈人非不恭也徒以運屬陵䘮智力無所用之蹉跌傾覆此乃時也豈謂反乎果然今日王亡明日宋亡王何負於社稷何愧于天下哉臣聞武王克商未及下車而封王子之墓漢髙定天下過大梁躡燕代脩信陵之祀存望諸之裔晉世受命亦追王凌之寃而詔其孫為郎夫比干殷辛之罪人也無忌魏之疑臣也樂毅燕之逃將也彦雲齊之賊而晉害也適逢聖明之君革運創制昭功誠蕩嫌怨清議以天下之善也或殊世而相明故四賢咸濟其令問三后馳光於萬葉君子榮其輝小人服其義今陛下尊英雄之髙軌振逸世之竒聲何至仍衰世之異議以掩賢人之名哉若王之中外不明終始慆德臣懼方今之人不復為善矣且世之興衰何代無有今齊苖裔萬世之後其能無汚隆乎茍前良可廢何以勸後之能者伏願上同周漢西晉之如彼下為來𦙍垂範之如此儻能降明詔箋枉道使往王得洗謗議拯㝠魂賜以王禮反葬則民之從義猶若囘風之卷草也臣聞鸛鳴臯垤則降隂吐雨騰蛇聳躍而沈雲欝㝠但傷臣言輕落毛身如横芥神髙聼邈終焉莫省直欲内不負心庶將來知王之意耳又不省至今上即位乃下詔曰宋建平王劉景素名父之子少敦清尚雖末路失圗而原心有本年流運改宜𢎞優澤可聼以王禮還葬舊墓晉熙王昶字休道文帝第九子也元嘉二十二年年十嵗封義陽王食邑二千户二十七年為輔國將軍南彭城下邳二郡太守元凶弑立加散騎常侍世祖踐祚遷太常出為東中郎將㑹稽太守尋監㑹稽東陽臨海永嘉新安五郡諸軍事孝建元年立東揚州郡昶為刺史東中郎將如故進號後將軍大明元年徴為秘書監領驍騎將軍加散騎常侍遷中軍將軍南彭城下邳二郡太守又出為都督江州郢州之西陽豫州之新蔡晉熙二郡諸軍事前將軍江州刺史三年徴為䕶軍將軍給鼓吹一部增邑千户轉中書令中軍將軍尋以本號開府儀同三司加散騎常侍太常從世祖南廵坐斥皇太后龍舟免開府尋又以加授前廢帝即位出為使持節都督徐兖南兗青冀幽六州豫州之梁郡諸軍事征北將軍徐州刺史加散騎常侍開府如故昶輕訬褊急不能祗事世祖大明中常被嫌責民間喧然常云昶當有異志永光景和中此聲轉甚廢帝既誅羣公彌縱狂悖常語左右曰我即大位來遂未常戒嚴使人邑邑江夏王義恭誅後昶表入朝遣典籖蘧法生銜使帝謂法生曰義陽太宰謀反我正欲討之今知求還甚喜又屢詰問法生義陽謀反何故不啓法生懼禍叛走還彭城帝因此北討親率衆過江法生既至昶即聚衆起兵統内諸郡並不受命斬昶使將佐文武悉懐異心昶知其不捷乃夜與數十騎開門北奔索虜棄母妻唯擕愛妾一人作丈夫服亦騎馬自隨昶家還都二妾各生一子時太宗已即位名長者曰思逺小者曰懐逺尋並卒追封懐逺為池陽縣侯食邑千户泰始六年以第六皇子燮字仲綏繼昶改昶封為晉熙王燮襲爵食邑三千户太宗既以燮繼昶乃下詔曰夫虎狼䕶子猴援負孫毒性薄情亦有仁愛故識念氣類尚均羣品況在人倫可􅁯天屬晉熙太妃謝氏沈刻無親物理罕比征北公雖孝道無替而遭此不慈自少及長闕恩鞠之闕乃至休否莫闗寒温不訪晨昏屏塞定省靡因事無違忤動致誚責毒句發口人所難聞加惡備苦過於讎隙遂事憤於宗姻義傷於行路公故妃郗氏婦禮無違逢此嚴酷遂以憂卒用夭盛年又謝氏食則豐珍衣則文麗奉已之餘播覃羣下而諸孫纊不温體食不充饑付於姆妳之手縱以任軍之路遇其所生棄若糞土繿縷比於重囚窮困過於下使誠皇規方逺沙塞將一公修短不諱亦難豫圗兼妾女累弱一第領主防閑之道人理斯急朕所以詔第六子燮奉公為𦙍欲以毗整一門為公繼紹但謝氏待骨肉至親尚相棄蔑況以義合免苦為難患萌防漸危機湏斷便可還其本家削絶蕃秩先是改謝氏為射氏時主㓜時艱宗室寡弱元徽元年燮年四嵗以為使持節監郢州豫州之西陽司州之義陽二郡諸軍事征虜將軍郢州刺史以黄門郎王奐為長史摠府州之任明年太尉江州刺史桂陽王休範舉兵逼朝廷燮遣中兵參軍馮景祖襲尋陽休範留中兵參軍毛思連州别駕程罕之居守開門詣景祖降進燮號安西將軍加督江州諸軍事復昶所生謝氏為晉熙國太妃四年又進燮鎮西將軍加鼔吹一部順帝即位徴為使持節都督揚南徐二州諸軍事撫軍將軍揚州刺史先是齊世子為燮安西長史行府州事時亦被徴為左衛將軍與燮俱下㑹荆州刺史沈攸之舉兵反世子因奉燮鎮尋陽之盆城㨿中流為内外形援攸之平燮還京邑齊王為南徐州燮解督南徐進督南豫江州諸軍事進號中軍將軍開府儀同三司遷司徒齊受禪解司徒降封隆安縣侯食邑千五百户謀反賜死始安王休仁文帝第十二子也元嘉二十九年年十嵗立為建安王食邑三千户孝建三年為秘書監領歩兵校尉尋都督南兗徐二州諸軍事冠軍將軍南兗州刺史大明元年入為侍中領右軍將軍四年出為湘州刺史加散騎常侍加號平南將軍八年遷使持節督江州南豫州之晉熙新蔡郢州之西陽三郡諸軍事安南將軍江州刺史未拜徙為散騎常侍太常又不拜仍為䕶軍將軍常侍如故前廢帝永光元年遷領軍將軍常侍如故景和元年又遷使持節都督雍梁南北秦四州諸軍事安西將軍寧蠻校尉雍州刺史未之任留為散騎常侍䕶軍將軍又加特進左光祿大夫給鼓吹一部時廢帝狂悖無道誅害羣公忌憚諸父並囚之殿内毆捶凌曵無復人理休仁及太宗山陽王休祐形體並肥壯帝乃以竹籠盛而稱之以太宗尤肥號為猪王號休仁為殺王休祐為賊王以三王年長尤所畏憚故常錄以自近不離左右東海王褘凡劣號為驢王桂陽王休範巴陵王休若年少故並得從容嘗以木槽盛飯内諸雜食攪令和合掘地為坑穽實之以泥水倮太宗内坑中和槽食置前令太宗以口就槽中食用之為歡笑欲害太宗及休仁休祐前後以十數休仁多計數每以笑調佞諛悦之故得推遷常於休仁前使左右淫逼休仁所生楊太妃左右並不得已順命以至右衛將軍劉道隆道隆歡以奉㫖盡諸醜狀時廷尉劉矇妾孕臨月迎入後宫冀其生男欲立為太子太宗嘗忤㫖帝怒乃倮之縳其手脚以杖貫手脚内使人檐付太官曰即日屠猪休仁笑謂帝曰猪今日未應死帝問其故休仁曰待皇太子生殺猪取其肝肺帝意乃解曰且付廷尉一宿出之帝將南逰荆湘二州明旦欲殺諸父便發其夕太宗克定禍難殞帝於華林園休仁即日推崇太宗便執臣禮明旦休仁出住東府時南平廬陵敬猷兄弟為廢帝所害猶未殯殮休仁休祐同載臨之開帷歡笑奏鼔吹往反時人咸非焉先是廢帝進休仁為驃騎大將軍開府儀同三司常侍如故未拜太宗令書以為使持節侍中都督揚南徐二州諸軍事司徒尚書令揚州刺史加班劒二十人給三望十五乘時劉道隆為䕶軍休仁請求解職曰臣不得與此人同朝上乃賜道隆死尋諸方逆命休仁都督征討諸軍事増班劒三十人出據虎檻進據赭圻尋領太子太𫝊摠統諸軍隨宜應接中流平定休仁之力也初行與蘇侯神結為兄弟以求神助及事平太宗與休仁書曰此段殊得蘇侯兄弟力増休仁邑四千户固辭乃受千户上流雖平薛安都㨿彭城招引索虜復都督北討諸軍事又増邑三千户不受時豫州刺史殷琰據夀陽未平晉平王休祐先督征討諸軍事休祐出領江陵休仁代督西討諸軍事泰始五年進都督豫司二州休仁年與太宗隣亞俱好文籍素相愛友及廢帝世同經危難太宗又資其權譎之力泰初初四方逆命兵至近畿休仁親當矢石大勲克建任總百揆親寄甚隆朝野四方莫不輻凑上漸不悦休仁悟其㫖其冬表解揚州見許六年進位太尉領司徒固讓又加漆輪車劎履太宗末年多忌諱猜害稍甚休仁轉不自安及殺晉平王休祐憂懼彌切其年上疾篤與楊運長等為身後之計慮諸弟彊盛太子㓜弱將來不安運長又慮帝晏駕後休仁一旦居周公之地其軰不得秉權彌賛成之上疾嘗暴甚内外莫不屬意於休仁主書以下皆往東府休仁所親信豫自結納其或直不得出者皆恐懼上既宿懐此意至是又聞物情向之乃召休仁入見既而又謂曰夕可停尚書下省宿明可早來其夜遣人齎藥賜休仁死時年三十九上寢疾乆内外隔絶慮人情有同異自力乘轝出端門休仁死後乃詔曰夫無將之誅諒惟通典知咎自引實有偏介劉休仁地屬密親位居台重朕友寄特深寵秩兼茂不能𢎞贊國猷裨宣政道而自處相任妄生猜嫌側納羣小之説内懐不逞之志晦景蔽迹無事陽愚因近疾患沉篤内外憂悚休仁規逼禁兵謀為亂逆朕曲惟天倫未忍明法申詔誥礪辨覈事原休仁慙恩懼罪遽自引決追尋悲痛情不自勝思屈法科以申矜悼可宥其二子并全封爵但家國多虞釁起台輔永尋既徃感慨追深有司奏曰臣聞明罰無親情屈於司綱國典有經威申於義滅是以梁趙之誅跣出稱過來言之罰克入致動謹案劉休仁苞蓄禍迹事蔽於天明竄匿沉姦情宣於民聼自以屬居戚近早延恩睦異禮殊義望越常均往嵗授鉞南討夲非才命啓行濃湖特以親攝仰遵廟略俯藉衆効屬承泰運竊附成勲而亟叨夭功多自臧伐既聖明御㝢躬覽萬機百司有紀官方無越而休仁矜勲怙貴自謂應總朝權遂妄生疑難深自猜外故司空晉平刺王休祐少無令業長滋貪暴莅任陜荆毒流西夏編户嗟散列邑凋虚聖澤含𢎞未明正憲亟與休仁論其愆迹辭意既宻不宜傳廣遂飾容㫖反相勸激休祐以休仁位居朝右任遇優崇必能為己力援故深相黨結休祐於是輸金薦寳承顔投意造䣛之間必論朝政遂無日不俱行無時不同宿聲酣聚集宻語清閑休仁含姦扇惑善於計數説休祐使外託專慎之法密行貪詐之心謂朝廷不覺人莫之悟休祐遂乃外積恐懼内協禍心既得贊激凶慝轉熾與休仁共為姦謀潜伺機隙圗造釁變規肆凶狡休仁致殞倉卒實維天誅而晉平國太妃妾邢不能追慙子惡上感曲恩更懐不逞巫蠱呪詛休仁因聖躬不和猥謀姦逆滅道反常莫斯為甚殛肆朝市庶申國刑而法網未加自引厥命天慈矜厚減法崇恩賜全二息及其爵封斯誠𢎞風曠德貫絶通古然非所以棄惡流釁懲懼亂臣者也臣等參議謂宜追降休仁為庶人絶其屬籍見息悉徙逺郡休祐愆謀始露亦宜裁黜徙削之科一同舊凖収邢付獄依法窮治詔曰邢匹婦狂愚不足與計休仁知釁自引情有追傷可特為降始安縣王食邑千户并停伯融等流徙聼襲封爵伯猷先紹江夏國令還本賜爵鄉侯上既殺休仁慮人情驚動與諸方鎮及諸大臣詔曰休仁致殞卿未具悉事之始末今疏以相示休祐貪恣非政法網之所不容昔漢梁孝王淮南厲王無它釁悖正以越漢制度耳況休祐吞嚼聚斂為西數州之蝗取與鄙虐無復人情屢得王景文褚淵沈攸之等啓陳其辠惡轉不可容吾篤兄弟之恩不欲致之以法且每恨大明兄弟情薄親見休祐屯苦之時始得寛寧彌不忍問所以改授徐州冀其去朝廷近必應能自悛革及拜徐州未及之任便徴動萬端暴濁愈甚既每為民蠹不可復全休仁身粗有知解兼為宰相又吾與其兄弟情昵特復異常頗與休仁論休祐釁狀休祐以休仁為吾所親必應知吾意又云休仁言對能為損益遂多與財賂深相結事乃寑必同宿行必共車休仁性軟易感説遂成繾綣共為一家是吾所吐密言一時倒寫吾與休仁少小異常唯虚心信之初不措疑雖爾猶慮清閑之時非意脱有聞者吾近向休祐推情戒訓嚴切休祐更不復致疑休祐死後吾將其内外左右問以情狀方知言語漏泄并具之由彌日懊惋心神萎孰休仁又説休祐云汝但作佞此法自足安我常秉許為家從來頗得此力但試用看有驗不休祐從之於是大有獻奉言多乖實積惡既不可恕自休祐殞亡之始休仁欵曲共知休仁既無辠釁主相本若一體吾之推意初無有間休祐貪愚為天下所疾致殞之本為民除患兄弟無復多人彌應思弔不咸益相親信休祐平生狼抗無頼吾慮休仁往哭或生祟禍且吾爾日本辦仗往哭晚定不行吾所以為設方便呼入在省而休仁得吾召入大自驚疑遂入辭楊太妃顔色狀意甚與常異既至省楊太妃驟遣監子去來參察從此日生嫌懼而吾之推情初不疑覺從休祐死後吾再幸休仁第飲噉極日排閤入内初無猜防休仁坐生嫌畏一日吾春中多期射雉每休仁清閑多往雉場中或敇使陪輦及不行日多不見之每值宵休仁輙語左右云我已復得今一日及在房内見諸妓妾恒語我云不知朝夕見底若一旦死去作鬼亦不取汝取汝正足亂人耳休祐死時日已三晡吾射雉始從雉場出休仁從騎在右伏野中吾遣人召之稱云腹痛不堪騎馬爾時諸王車皆停在朱雀門裏日既暝不暇逺呼車吾衣書車近在離門裏敕呼來下油幢絡擬以載之吾由來諳悉其體有冷患聞腹痛知必是冷乃敕太醫上省送供御髙梁薑飲以賜之休仁得飲忽大驚告左右稱敗今日了左右答曰此飲是御師名封題休仁乃令左右先飲竟猶不甚信乃僶俛噬之裁進一合許妄生嫌貳事事如是由來十日五日一就問太妃自休祐死後每吾詔必先至楊太妃問如分别狀休仁由來自營府國興生文書二月中史承祖齎文書呈之忽語承祖云我得成許那何煩將來吾虚心如舊不復見信既懐不安大自嫌恐惟以情理不容復有善心休仁既經南討與宿衛將帥經習狎共事相識者布滿外内常日出入於廂下經過與諸相識將帥都不交言及吾前者積日失適休仁出入殿省諸衛主帥裁相悉者無不和顔厚相撫勞爾時吾既甚惡意不欲見外人悠悠所傳互言差劇休仁規欲聞知方便使曇度道人及勞彦逺屢求啓闞覘吾起居及其所啓皆非急事吾意亦不厝疑吾與休仁親情實異年少以來恒相追隨情向大趣亦往往多同難否之日毎共契闊休仁南討為都統既有勲績狀之於心亦何極已但休仁於吾望既不輕小人無知亦多挾背向既生猜貳不復自寧夫禍難之由皆意所不悟如其意趣人莫能測事不獲已反覆思惟不得不有近日處分夫於兄弟之情不能無厚薄休祐之亡雖復悼念猶可以理割遣及休仁之殞悲愍特深千念不能已己舉言傷心事之細碎既不可曲載詔文恐物不必即解兼欲存其兒子不欲窮法為詔之辭不得不云有兵謀非事實也故相報卿知上與休仁素厚至於相害慮在後嗣不安休仁既死痛悼甚至謂人曰我與建安年時相鄰少便狎從景和泰始之間勲誠實重事計交切不得不相除痛念之至不能自已今有一事不如與諸侯共説懽適之方於今盡矣因流涕不自勝子伯融妃殷氏所生殷氏呉興太守冲女也范陽祖翻有醫術姿貎又美殷氏有疾翻入視脉説之遂通好事泄遣還家賜死伯融歴南豫州刺史琅邪臨淮二郡太守寧朔將軍廣州刺史不之職廢徙丹楊縣後廢帝元徽元年還京邑襲封始興王弟伯猷初出繼江夏愍王伯禽封江夏王邑二千户休仁死後還本與伯融俱徙丹楊縣後廢帝元徽元年賜爵都鄉侯建平王景素為逆楊運長等畏忌宗室稱詔賜伯融等死伯融時年十九伯猷年十一晉平刺王休祐文帝第十三子也孝建三年年十一封山陽王食邑二千户大明元年為散騎常侍領長水校尉尋遷東揚州刺史未拜徙湘州刺史加號征虜將軍四年還為秘書監領右軍將軍増邑千户遷侍中又遷左中郎將都官尚書又為秘書監領驍騎將軍出為使持節都督豫司二州南豫州之梁郡諸軍事右將軍豫州刺史景和元年入朝進號鎮西大將軍仍遷散騎常侍鎮軍大將軍開府儀同三司太宗定亂以為使持節都督荆湘雝益梁寧南北秦八州諸軍事驃騎大將軍荆州刺史開府常侍如故又改都督江郢雝湘五州江州刺史又改都督江南豫司州南豫州刺史改都督豫江司三州豫州刺史時豫州刺史殷琰據夀陽反叛休祐出鎮歴陽督劉勔等討琰琰未平勔築長圍守之休祐復徙都督荆湘雝益梁寧南北秦八州諸軍事荆州刺史持節常侍將軍開府並如故増封二千户受五百户以山陽荒敝改封晉平王休祐素無才能彊梁自用大明之世年尚少未得自專至是貪淫好財色在荆州裒刻所在多營財貨以短錢一百賦民田登就求白米一斛米粒皆令徹白若有破折者悉刪簡不受民間糴此米一升一百至時又不受米評米責錢凡諸求利皆悉如此百姓嗷然不復堪命泰始六年徴為都督南徐南兖徐兖青冀六州諸軍事南徐州刺史加侍中持節將軍如故上以休祐貪虐不可莅民留之京邑遣上佐行府州事休祐狠戾彊梁前後忤上非一在荆州時左右苑景達善彈棊上召之休祐留不遣上怒詰責之曰汝剛戾如此豈為下之義積不能平且慮休祐將來難制欲方便除之七年二月車駕於巖山射雉有一雉不肯入場日暮將反令休祐射之語云不得雉勿歸休祐時從在黄麾内左右從者並在部伍後休祐便馳去上遣左右數人隨之上既還前驅清道休祐人從悉分散不復相得上因遣夀寂之等諸將追之日己欲闇與休祐相及逼令墜馬休祐素勇壯有氣力奮拳左右排擊莫得近有一人後引隂因頓地即共毆拉殺之乃遣人馳白上行唱驃騎落馬上曰驃騎體大落馬殊不易即遣御醫絡驛相係頃之休祐左右人至乆已絶去車脚輿以還第時年二十七追贈司空持節侍中都督刺史如故給班劒二十人三望車一乘時巴陵王休若在江陵其日即馳信報休若曰吾與驃騎南山射雉驃騎馬驚與直閣夏文秀馬相蹹文秀堕地驃騎失鞚馬驚觸松樹堕地落硎中時頓悶不識人故馳報弟其年五月追免休祐為庶人長子仕薈早卒次子宣翊為世子為寧朔將軍湘州刺史未拜免廢次士𢎞繼鄱陽哀王休業襲封被廢還本次宣彦封原豐縣侯為寧朔將軍彭城太守未拜免廢次宣諒次宣曜出繼南平穆王鑠封被廢還本次宣景次宣梵次宣覺次宣受次宣則次宣直次宣季凡十三子並徙晉平郡太宗尋病見休祐為祟乃遣前中書舍人劉休至晉平撫慰宣翊等上遂崩後廢帝元徽元年聼宣翊等還都順帝昇明三年謀反並賜死鄱陽哀王休業文帝第十五子也孝建二年年十一封鄱陽王食邑三千户三年薨追贈太常大明六年以山陽王休祐次子士𢎞嗣封被廢還本國除臨慶冲王休倩文帝第十六子也孝建元年年九嵗疾篤封東平王食邑二千户未拜薨大明七年立第二十七皇子子嗣為東平王紹休倩後太宗泰始二年還本國絶六年以第五皇子智丹為東平王繼休倩未拜薨其年追改休倩為臨慶王以臨賀郡為臨慶國立第八皇子躋為臨慶王食邑二千户繼休倩後明年還本國休倩太祖所愛故前後屢加紹嗣新野懐王夷父文帝第十七子也元嘉二十九年薨時年六嵗太宗泰始五年追加封諡巴陵哀王休若文帝第十九子也孝建三年年九嵗封巴陵王食邑二千户大明二年為冠軍將軍南琅邪臨淮二郡太守徙南彭城下邳二郡太守將軍如故四年出為都督徐州諸軍事刺史將軍如故増督豫州之梁郡増邑千户明年徴為散騎常侍左右郎將呉興太守復徴為散騎常侍太常未拜前廢帝永光元年遷左衞將軍太宗泰始元年遷散騎常侍中書令領衞尉未拜復為左衛將軍常侍衛尉如故又未拜出為使持節都督㑹稽東陽永嘉臨海新安五郡諸軍事領安東將軍㑹稽太守率衆東討進督吳吳興晉陵三郡尋加散騎常侍進號衛將軍給鼓吹一部又進督晉安闕二郡諸軍事二年遷梁雍南北秦四州荆州之竟陵隨二郡諸軍事寧蠻校尉雍州刺史持節常侍將軍如故増邑二千户受三百户前在㑹稽錄事參軍陳郡謝沈以謟佞事休若多受賄賂時内外戒嚴普著袴褶沈居母䘮被起聲樂酣飲不異吉人衣冠既無殊異並不知沈居䘮嘗自稱孤子衆乃駭愕休若坐與沈䙝黷致有姦私降號鎮西將軍又進衛將軍典籖夏寳期事休若無禮繫獄啓太宗殺之慮不被許啓未報輒於獄行刑信反果錮送而寳期已死上大怒與休若書曰孝建大明中汝敢行此耶使其母加杖三百降號左將軍貶使持節都督為監行雝州刺史使寧蠻校尉削封五百户四年遷使持節都督湘州諸軍事行湘州刺史如故六年荆州刺史晉平王休祐入以休若監荆州事進號征南將軍湘州刺史仍為都督荆湘雝益梁寧南北秦八州諸軍事征西將軍荆州刺史持節如故尋加散騎常侍又進號征西大將軍開府儀同三司七年晉平王休祐被殺建安王休仁見疑京邑譌言休若有至貴之表太宗以言報之休若内甚憂懼㑹被徴代休祐為都督南徐南兖徐兖青冀六州諸軍事征北大將軍南徐州刺史持節常侍開府如故休若腹心將佐咸謂還朝必有大禍中兵參軍京兆王敬先固陳不宜入勸割據荆楚以距朝廷休若偽許之敬先既出執錄馳使白太宗敬先坐誅死休若至京口建安王休仁又見害益懐危慮上以休若和善能諧緝物情慮將來傾㓜主欲遣使殺之慮不奉詔徴入朝又恐猜駭乃為遷休若為都督江郢司廣交豫州之西陽新蔡晉熙湘州之始興四郡諸軍事車騎大將軍江州刺史持節常侍開府如故徴還召拜手書殷勤使赴七月七日即於第賜死時年二十四贈侍中司空持節都督刺史如故給班劎二十人三望車一乘休若既死上與驃騎大將軍桂陽王休範書曰外間有一師姓徐名紹之狀如狂病自云為塗歩郎所使去三月中忽云神語道巴陵王應作天子汝使巴陵王密知之於是師便訪覔休若左右人不能得東宫典書姓何者相識數去來師解神語東宫典書具道神語東宫典書答云我識巴陵間一左右當為汝向道數日東宫典書復來語師云我已為汝語巴陵左右道因達巴陵巴陵具知云莫聲但聼又頃者史官奏天文占候頗云休若應挾異端神道芒昧乃不可全信然前後相凖略亦不無髣髴且帖肆間自大明以來有若好之謡于今未止詔若百重章句皆配以美辭美事諸不逞之徒咸云必是休若休若且知道路有異音里巷有若好之謡在西已竒懼致王敬先吐猖狂之言近休祐休仁被誅休若彌不自安又左右多是不相當負罪之徒恒説以道路之言叩動之相與唱云萬民之心屬在休若感激其意尋休若從來心迹殊有可嫌劉亮問髙次祖汝一應識此人當給休若休若在東縱恣羣下無本末還朝被貶爵位小退次祖被亮使歸過問訊大泣語次祖云我東行是一段功在郡横為羣小軰過失大被貶降我實憤怨不解劉輔國何意不作次祖答云劉輔國䝉朝廷生成之恩豈容有此理推此已是有竒意吾使諸王在蕃正令優游而已本不以武事而休若在西廣召弓馬健兒都不啓聞又戾道明等昔親為賊罪應萬死休若至西大信遇之乃潜將往不啓京吾知汝意謂休若處奉因事事何如心迹既不復可測因其還朝在第與書事事詰誚於内許密自引分狀如暴疾致故差得於其名位及見子悉得全也休若既是汝弟使其狼心得申者汝得守冶城邊作太尉公邪非但事關計亦於汝甚切汝可密白荀太妃令知廬江王褘昔在西州故上云冶城邊也休若子冲始襲封順帝昇明三年薨㑹齊受襌國除史臣曰詩云不自我先不自我後古人畏亂世也太宗晚途疑隙内成尋斧所加先自至戚晉刺以獷暴摧軀巴哀由和良酖體保身之路未知攸適昔之戒子慎勿為善將逺有以乎宋書卷七十二宋書卷七十二考證南平穆王鑠傳賊多作蝦蟆車以填塹肉薄攻城肉薄義見前監本訛因薄南史訛内薄今改正建平宣簡王宏傳又臨危之際撫楹而歎楹一本作檻宋書卷七十二考證
