front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0016_WYG_076-1a, image: WYG0258/WYG0258-0404a.png}
body:
  text: 宋書卷七十六梁沈約撰列傳第三十六朱脩之宗慤王𤣥謨朱脩之字恭祖義興平氏人也曾祖燾晉平西将軍祖序豫州刺史父諶益州刺史脩之自州主簿遷司徒従事中郎文帝謂曰卿曾祖昔為王導丞相中郎卿今又為王𢎞中郎可謂不忝爾祖矣後随到彦之北伐彦之自河南回留脩之戍滑臺為虜所圍數月糧盡将士熏鼠食之遂陷於虜初脩之母聞其被圍既久常憂之忽一旦乳汁驚出母號泣告家人曰吾今已老忽復有乳汁斯不祥矣吾兒其不利乎後問至脩之果以此日陷沒拓跋燾嘉其守莭以為侍中妻以宗室女脩之潛謀南歸妻疑之每流涕問其意脩之深嘉其義竟不告也後鮮卑馮𢎞稱燕王治黄龍城拓跋燾伐之脩之與同沒人邢懐明竝從又有徐卓者復欲率南人竊發事泄被誅脩之懐明懼奔馮𢎞𢎞不禮留一年㑹宋使傳詔至脩之名位素顯傳詔見即拜之彼國敬傳詔謂為天子邊人見其致敬於脩之乃始加禮時魏屢伐𢎞或説𢎞遣脩之歸求救遂遣之泛海至東萊遇猛風柁折垂以長索船乃復正海師望見飛鳥知其近岸須臾至東萊元嘉九年至京邑以為黄門侍郎累遷江夏内史雍州刺史劉道産卒羣蠻大動脩之為征西司馬討蠻失利孝武初為寧蠻校尉雍州刺史加都督脩之在政寛簡士衆悦附及荆州刺史南郡王義宣反檄脩之舉兵脩之偽與之同而遣使陳誠於帝帝嘉之以為荆州刺史加都督義宣聞脩之不與己同乃以魯秀為雍州刺史擊襄陽脩之命斷馬鞍山道秀不得前乃退及義宣敗於梁山單舟南走脩之率衆南定遺㓂時竺超民執義宣脩之至乃殺之以功封南昌縣侯脩之治身清約凡所贈貺一無所受有餉或受之而旋與佐吏賭之終不入已唯以撫納羣蠻為務徴為左民尚書轉領軍将軍去鎮秋毫不犯計在州然油及牛馬糓草以私錢十六萬償之然性儉尅少恩情姊在鄉里饑寒不立脩之未嘗供贍嘗往視姊姊欲激之為設菜羮粗飯脩之曰此乃貧家好食致飽而去先是新野庾彦達為益州刺史携姊之鎮分祿秩之半以供贍之西土稱焉脩之後墜車折脚辭尚書領崇憲太僕仍加特進金紫光祿大夫以脚疾不堪獨行特給扶侍卒贈侍中特進如故諡貞侯宗慤字元幹南陽人也叔父炳髙尚不仕慤年少時炳問其志慤曰願乘長風破萬里浪炳曰汝不富貴即破我家矣兄泌娶妻始入門夜被劫慤年十四挺身拒賊賊十餘人皆披散不得入室時天下無事士人並以文義為業炳素高莭諸子羣従皆好學而慤獨任氣好武故不為鄉曲所稱江夏王義恭為征北将軍南兗州刺史慤随鎮廣陵時從兄綺為征北府主簿綺嘗入直而給吏牛泰與綺妾私通慤殺泰綺壮其意不責也元嘉二十二年伐林邑慤自奮請行義恭舉慤有膽勇乃除震武将軍為安西參軍蕭景憲軍副随交州刺史檀和之圍區粟城林邑遣将范毗沙達來救區粟和之遣偏軍拒之為賊所敗又遣慤慤乃分軍為數道偃旗潛進討破之抜區粟入象浦林邑王范陽邁傾國來拒以具装被象前後無際士卒不能當慤曰吾聞師子威服百獸乃製其形與象相禦象果驚奔衆因潰㪚遂克林邑收其異寳雜物不可勝計慤一無所取衣櫛蕭然文帝甚嘉之後為随郡太守雍州蠻屢為㓂建威将軍沈慶之率慤及栁元景等諸将分道攻之羣蠻大潰又南新郡蠻帥田彦生率部曲反叛焚燒郡城屯據白楊山元景攻之未能下慤率其所領先登衆軍随之羣蠻由是畏服二十年孝武伐元凶以慤為南中郎諮議參軍領中兵孝武即位以為左衛将軍封洮陽侯功次栁元景孝建中累遷豫州刺史監五州諸軍事先是鄉人庾業家甚富豪方丈之膳以待賔客而慤至設以菜葅粟飰謂客曰宗軍人慣噉麤食慤致飽而去至是業為慤長史帶梁郡慤待之甚厚不以前事為嫌大明三年竟陵王誕據廣陵反慤表求赴討乘驛詣都面受莭度上停輿慰勉慤􅋍躍數十左右顧盻上壮之及行隸車騎大将軍沈慶之初誕誑其衆云宗慤助我及慤至躍馬繞城呼曰我宗慤也事平入為左衛将軍五年從獵墮馬脚折不堪朝直以為光祿大夫加金紫慤有佳牛堪進御官買不肯賣坐免官眀年復職廢帝即位為寧蠻校尉雍州刺史加都督卒贈征西将軍諡曰肅侯太始二年詔以慤配食孝武廟子羅雲卒子元寳嗣王𤣥謨字彦徳太原祁人也六世祖宏河東太守綿竹侯以從叔司徒允之難棄官北居新興仍為新興鴈門太守其自叙云爾祖牢仕慕容氏為上谷太守随慕容徳居青州父秀早卒𤣥謨幼而不羣世父蕤有知人鑒常笑曰此兒氣概高亮有太尉彦雲之風武帝臨徐州辟為従事史與語異之少帝末謝晦為荆州請為南蠻行參軍武昌太守晦敗以非大帥見原元嘉中補長沙王義欣鎮軍中兵将軍領汝陰太守時虜攻陷滑臺執朱脩之以歸𤣥謨上疏曰王途始開随復淪塞非惟天時抑亦人事虎牢滑臺豈惟将之不良抑亦本之不固本之不固皆由民憚逺役臣請以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趣淆澠征士無逺傜之思吏士有屢休之歌若欲以東國之衆經營牢洛道途既逺獨克實難𤣥謨每陳北侵之策上謂殷景仁曰聞王𤣥謨陳説使人有封狼居意後為興安侯義賔輔國司馬彭城太守義賔薨𤣥謨上表以彭城要兼水陸請以皇子撫臨州事乃以孝武出鎮及大舉北征以𤣥謨為寜􅃋将軍前鋒入河受輔國将軍蕭斌莭度𤣥謨向碻磝戍主奔走遂圍滑臺積旬不克虜王拓跋燾率大衆號百萬鞞鼓之聲震動天地𤣥謨軍衆亦盛器械甚精而𤣥謨專依所見多行殺戮初圍城城内多茅屋衆求以火箭燒之𤣥謨恐損亡軍實不從城中即撤壊之空地以為窟室及魏救将至衆請發車為營又不從将士多離怨又營貨利一匹布責人八百梨以此倍失人心及拓跋燾軍至乃奔退麾下散亡略盡蕭斌将斬之沈慶之固諌曰佛狸威震天下控弦百萬豈𤣥謨所能當且殺戰将以自弱非良計也斌乃止初𤣥謨始将見殺夢人告曰誦觀音經千遍則免既覺誦之得千遍明日将刑誦之不輟忽傳呼停刑遣代守碻磝江夏王義恭為征討都督以為碻磝不可守召令還為魏軍所追大破之流矢中臂二十八年正月還至歴城義恭與𤣥謨書曰聞因敗為成臂上金瘡得非金印之徴也元凶弑立𤣥謨為益州刺史孝武伐逆𤣥謨遣濟南太守垣䕶之将兵赴義事平除徐州刺史加都督及南郡王義宣與江州刺史臧質反朝廷假𤣥謨輔國将軍拜豫州刺史與栁元景南討軍屯梁山夾岸築偃月壘水陸待之義宣遣劉諶之就臧質陳軍城南𤣥謨留老弱守城悉精兵接戰賊遂大潰加都督前将軍封曲江縣侯中軍司馬劉沖之白孝武言𤣥謨在梁山與義宣通謀上意不能明使有司奏𤣥謨多取寳貨虚張戰簿與徐州刺史垣䕶之並免官尋復為豫州刺史淮上亡命司馬黒石推立夏侯方進為主改姓李名𢎞以惑衆𤣥謨討斬之遷寧蠻校尉雍州刺史加都督雍土多僑寓𤣥謨請土斷流民當時百姓不願屬籍罷之其年𤣥謨又令九品以上租使貧富相通境内莫不嗟怨民間訛言𤣥謨欲反時栁元景當權元景弟僧景為新城太守以元景之勢制令南陽順陽上庸新城諸郡並發兵討𤣥謨𤣥謨令内外晏然以觧衆惑馳啟孝武具陳本末帝知其虚馳遣主書吳喜公撫慰之又答曰梁山風塵初不介意君臣之際過足相保聊復為笑伸卿眉頭𤣥謨性嚴未嘗妄笑時人言𤣥謨眉頭未曾伸故帝以此戲之後為金紫光祿大夫領太常及建明堂以本官領起部尚書又領北選孝武狎侮羣臣随其状貌各有比類多鬚者謂之羊顔師伯缺齒號之曰齴劉秀之儉吝呼為老慳黄門侍郎宗靈秀體肥拜起不便每至集㑹多所賜與欲其瞻謝傾踣以為歡笑又刻木作靈秀父光祿勲叔獻像送其家㕔事栁元景垣䕶之並北人而𤣥謨獨受老傖之目凡所稱謂四方書疏亦如之嘗為𤣥謨作四時詩曰堇荼供春膳粟漿充夏飡􅀈醤調秋菜白醝觧冬寒又寵一崑崙奴子名曰主常在左右令以杖擊羣臣自栁元景以下皆罹其毒𤣥謨尋遷平北将軍徐州刺史加都督時北土饑饉乃散私糓十萬斛牛千頭以振之轉領軍将軍孝武崩與栁元景䓁俱受顧命以外監事委𤣥謨時朝政多門𤣥謨以嚴直不容徙青冀二州刺史加都督少帝既誅顔師伯栁元景等狂悖益甚以領軍徴𤣥謨子姪咸勸稱疾𤣥謨曰吾受先帝厚恩豈可畏禍苟免遂行及至屢表諫諍又流涕請緩刑去殺以安元元少帝大怒眀帝即位禮遇甚優時四方反叛以𤣥謨為大統領水軍南討以脚疾聴乘輿出入尋除大将軍江州刺史副司徒建安王於赭圻賜以諸葛亮筩袖鎧頃之為左光祿大夫開府儀同三司領䕶軍遷南豫州刺史加都督𤣥謨性嚴尅少恩而将軍宗越御下更苛酷軍士為之語曰寧作五年徒不逄王𤣥謨𤣥謨猶自可宗越更殺我年八十一薨諡曰荘公子深早卒子繢嗣史臣曰脩之宗慤皆以将帥之材懐㢘絜之操有足稱焉𤣥謨雖苛尅少㤙然觀其大莭亦足為羙當少帝失道多所殺戮而能冐履不測傾心輔弼斯可謂忘身徇國者歟宋書卷七十六宋書卷七十六考證宗慤傳乃除震武将軍百官志有振武将軍無震武将軍震當作振王元謨傳聞王元謨陳説使人有封狼居意南史居下有胥字宋書卷七十六考證
