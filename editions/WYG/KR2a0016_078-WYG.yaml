body:
  text: 宋書卷七十八梁沈約撰列傳第三十八蕭思話劉延孫蕭思話南蘭陵人孝懿皇后弟子也父源之字君流歴中書黄門郎徐兗二州刺史冠軍将軍南琅邪太守永初元年卒追贈前将軍思話年十許嵗未知書以博誕逰遨為事好騎屋棟打細腰鼔侵暴隣曲莫不患毒之自此折莭數年中遂有令譽好書史善彈琴能騎射髙祖一見便以國器許之年十八除琅邪王大司馬行參軍轉相國參軍父憂去職服闋拜羽林監領石頭戍事襲爵封陽縣侯轉宣威将軍彭城沛二郡太守渉獵書傳頗能隸書觧音律便弓馬元嘉三年謝晦為荆州欲請為司馬思話拒之五年遷中書侍郎仍督青州徐州之東莞諸軍事振武将軍青州刺史時年二十七亡命司馬朗之元之可之兄弟聚黨於東莞發干縣謀為㓂亂思話遣北海太守蕭汪之討斬之餘黨悉平八年除竟陵王義宣左軍司馬南沛郡太守未及就徴索虜南㓂檀道濟北伐既而迴師思話懼虜大至乃棄鎮奔平昌思話先使參軍劉振之戍下邳聞思話奔亦委城走虜定不至而東陽積聚已為百姓所焚由是徴下廷尉仍繫尚方初在青州常所用銅斗覆在藥㕑下得二死雀思話曰斗覆而雙雀殞其不祥乎既而被繫九年仇池大饑益梁州豐稔梁州刺史甄法䕶在任失和氐帥楊難當因此宼漢中乃自徒中起思話督梁南秦二州諸軍事横野将軍梁南秦二州刺史既行聞法䕶已委鎮北奔西城遣司馬建威将軍南漢中太守蕭諱五百人前進又遣西戎長史蕭汪之係之諱縁路収合士衆得精兵千人十年正月進據磝頭難當焚掠漢中引衆西還留其輔國将軍梁秦二州刺史趙温守梁州魏興太守薛健據黄金諱進屯磝頭遣隂平太守蕭坦赴黄金薛徤副姜寳據鐵城鐵城與黄金相對去一里斫樹塞道坦進攻二戍抜之二月趙温又率薛健及其寧朔将軍馮翼太守蒲早子來攻坦營坦奮擊大破之坦被創賊退保西水諱司馬錫文祖進據黄金蕭汪之歩騎五百相繼而至平西将軍臨川王義慶遣龍驤将軍裴方明三千人赴諱䓁進黄金早子健䓁退保下桃思話先遣行參軍王靈濟率偏軍出洋川因向南城偽陵江将軍趙英堅守險靈濟擊破之生禽英南城空虚因資無所復引軍還與諱合三月諱率衆軍進據峨公固難當遣其子和率趙温蒲早子及左衛将軍吕平寧朔将軍司馬飛龍歩騎萬餘跨漢津結砦其間立浮橋悉力攻諱合圍數十重短兵接戰弓矢無復用賊悉衣犀革戈矛所不能加諱乃截矟長數尺以大斧椎之一矟輒貫十餘賊賊不能當因大敗燒砦奔走退據大桃閏月諱及方明臺軍至龍驤将軍楊平興幢主殿中将軍梁坦直入角弩追之賊又敗走殺傷虜獲甚多漢中平悉收沒地置戍葭萌水先是桓𤣥簒晉以桓布為梁州布敗走氐楊盛據有漢中刺史范元之傅歆悉治魏興唯得魏興上庸新城三郡其後索邈為刺史氐乃治南城為賊所焚燒不可固即思話遷鎮南城加節進號寧朔将軍徴諱為太子屯騎校尉法䕶中山無極人過江寓居南郡弟法崇元嘉十年自少府為益州刺史法䕶委鎮之罪統府所収於獄賜死太祖以法崇受任一方令獄官言法䕶病卒太祖使思話上平定漢中本末下之史官十四年遷使持莭臨川王義慶平西長史南蠻校尉太祖賜以弓琴手勅曰丈人頃何所作事務之暇故以琴書為娛耳所得不曰義邪眷想常不忘情想亦同之前得此琴云是舊物亦有名京邑今以相借因是戴顒意於彈撫響韻殊勝直爾嘉也并往桑弓一張材理乃快先所常用既久廢射又多病畧不能制之便成老公令人歎息良材羙器宜在盡用之地丈人真無所與讓也十六年衡陽王義季代義慶又除安西長史餘如故十九年徴為侍中領前軍将軍未就徴復先職明年遷持莭監雍州梁南北秦四州荆州之南陽竟陵順陽襄陽新野随六郡諸軍事寧蠻校尉雍州刺史襄陽太守二十二年除侍中領太子右率二十四年改領左衛将軍嘗従太祖登鍾山北嶺中道有磐石清泉上使於石上彈琴因賜以銀酒鍾謂曰相賞有松石間意又領南徐州大中正明年復監雍梁南北秦州荆州之竟陵随二郡諸軍事右将軍寧蠻校尉雍州刺史如故二十六年徴為吏部尚書詔思話曰沈尚書暴病不救其體業貞審立朝盡公年時尚可方相委任奄忽不永痛惋特深銓管要機通塞所寄丈人才用體國二三惟允思話以去州無復事力倩府軍身九人太祖戲之曰丈人終不為田父於里閭何應無人使邪未拜二十七年遷䕶軍将軍是年春虜攻懸瓠太祖将大舉北討朝士僉同莫或異議思話固諫不従乃領精甲三千助鎮彭城虜退即代世祖為持莭監徐兖青冀四州豫州之梁郡諸軍事撫軍将軍兗徐二州刺史二十九年統揚武将軍冀州刺史張永衆軍圍碻磝初鎮軍諮議參軍申坦與王𤣥謨圍滑臺不克免官青州刺史蕭斌板坦行建威将軍濟南平原二郡太守守歴城令任仲仁又為坦副並前鋒入河五月發沿口永司馬崔訓建武将軍齊郡太守胡景世率青州軍來㑹七月思話及衆軍並至碻磝治三攻道太祖遣貟外散騎侍郎徐爰宣㫖督戰張永胡景世當東攻道申坦任仲仁西攻道崔訓南攻道賊夜地道出燒崔訓樓及蟇車又燒胡景世樓及攻具尋又毁崔訓攻道城不可抜思話馳來退師攻城凡十八日觧圍還歴下崔訓以樓見燒又不能固攻道被誅碻磝永坦並繫獄詔曰得撫軍将軍思話啟事碻磝不抜士卒疲勞且班師清濟更圗進討此鎮山川嚴阻控臨河朔形勝之要擅名自古宜除其授以允望實思話可觧徐州為冀州餘如故彭城文武復量分配即鎮歴城尋為江夏王義恭所奏免官元凶弑立以為使持節監徐青兗冀四州豫州之梁郡諸軍事徐兗二州刺史将軍如故思話即率部曲還彭城起義以應世祖遣使奉牋曰下官近在歴下始奉國諱所承使人不知濶狹既還在路漸有所聞猶謂人倫無容有此私懐感慨未敢在言奉被今教果出慮表重增哀惋不能自勝此實天地所不覆載人神所不容忍率土民氓莫不憤咽况下官蒙荷榮渥義兼常志此月五日被驛使追命騎還朝切齒拊心輒已鍾疾雖百口在都一非所顧正欲遣啟受䂓略㑹奉今㫖悲懼兼情伏承司徒英圗電發殿下神武霜斷臧質忠義並到不謀同時仗順沿流席卷江甸前驅風邁已應在近下官復練始集遣輔國将軍申坦龍驤将軍梁坦二軍分配精甲五千申坦為統便以即日水陸齊下下官悉率文武駱驛繼發慿威策懦勢同振朽開㤗有期悲欣交集世祖至新亭坦亦進克京口上即位徴為散騎常侍尚書左僕射固辭不受拜改為中書令丹陽尹常侍如故時京邑多有劫掠二旬中十七發引咎陳遜不許眀年出為使持莭都督徐兖青冀幽五州豫州之梁郡諸軍事安北将軍徐州刺史加鼓吹一部未行而江州刺史臧質反復以為使持節都督江州豫州之西陽晉熙新蔡三郡諸軍事江州刺史事平分荆江豫三州置郢州復都督郢湘二州諸軍事鎮西将軍郢州刺史持莭常侍如故鎮夏口孝建二年卒時年五十追贈征西将軍開府儀同三司持莭常侍都督刺史如故諡曰穆侯思話宗戚令望蚤見任待凡歴州十二杖莭監都督九焉所至雖無皦皦清莭亦無穢黷之累愛才好士人多歸之長子恵開嗣别有傳次子恵明亦有世譽歴黄門郎御史中丞司徒左長史吳興太守後廢帝元徽末卒官第四子恵基順帝昇明末為侍中源之從父弟摹之丹陽尹追贈征虜将軍子斌亦為太祖所遇彭城王義康鎮豫章以為大将軍諮議參軍豫章太守歴南蠻校尉侍中輔國将軍青冀二州刺史元嘉二十七年統王𤣥謨䓁衆軍北伐斌遣将軍崔猛攻虜青州刺史張淮之於樂安淮之棄城走先是猛與斌參軍傅融分取樂安及碻磝樂安水道不通先并定碻磝至是又克樂安既而攻圍滑臺不抜斌追還歴下事在王𤣥謨傳二十八年亡命司馬順則詐稱晉室近屬自號齊王聚衆據梁鄒城又有沙門自稱司馬百年號安定王亡命秦凱之祖元明䓁各據村屯以應順則初梁鄒戍主宣威将軍樂安渤海二郡太守崔勲之出州故順則因虚竊據勲之司馬曹敬㑹拒戰不敵出走斌即遣勲之率行建威将軍濟南平原二郡太守申坦長流參軍羅文昌等諸軍討順則攻之不克勲之等始謂城内出於逼附軍至即應奔逃而並為賊堅守殺傷官軍甚多斌又遣府司馬建威将軍齊郡太守龎秀之總諸軍祖元明又據安邱城斌更遣振武将軍劉武之及軍主劉回精兵千人討司馬百年斬之順則既失據衆稍離阻文昌遣道連偽投賊賊信納之潛以官賞格示衆城内賊黨李繼叔等並有歸順心道連謀泄為賊所殺繼叔踰城出降賊黨於是大離乃四面進攻衝車所衝輒三五丈崩落時南門樓上擲下一級并垂繩釣取外人外人上賊並放仗云向已斬順則所投首是也秦凱之走河北斌坐滑臺退敗免官久之復起為南平王鑠右軍長史其後事迹在二凶傳斌弟簡歴位長沙内史廣陵王誕為廣州未之鎮以簡為安南諮議參軍南海太守行府州事東海王褘代誕簡仍為前軍諮議太守如故世祖入討元凶遣輔國将軍南海太守劉玩討簡固守經時城陷伏誅斌簡諸子並誅滅龎秀之河南人也以斌故吏賊劭甚加信委以為逰擊将軍奔世祖於新亭時劭諸将未有降者唯秀之先至事平以為梁州刺史秀之子弟為劭所殺者将十人而酣讌不廢坐免官後又為徐州刺史太子右衛率孝建元年卒追贈本官加㪚騎常侍子彌之順帝昇明末廣興公相秀之弟况之太宗世亦為始興相劉延孫彭城吕人雝州刺史道産子也初為徐州主簿舉秀才彭城王義康司徒行參軍尚書都官郎為錢唐令世祖撫軍廣陵王誕北中郎中兵參軍南清河太守世祖為徐州補治中従事史時索虜圍縣瓠分軍送所掠民口在汝陽太祖詔世祖遣軍襲之議者舉延孫為元帥固辭無将用舉劉泰之自代泰之既行太祖大怒免延孫官為世祖鎮軍北中郎中兵參軍南中郎諮議參軍領錄事世祖伐逆府缺上佐轉補長史尋陽太守行留府事世祖即位以為侍中領前軍将軍下詔曰朕藉羣能之力雪莫大之恥以眇眇之身託於王公之上思所以策勲樹良永寧世烈新除侍中領前軍将軍延孫率懐忠敏器局沈正協賛義初誠力俱盡左衛将軍竣立志開亮理思清要茂策忠謨經綸惟始俾積基更造咸有勤焉宜顯授龜社大啟邦家延孫可封東昌縣侯竣建城縣侯食邑各二千户其年侍中改領衛尉孝建元年遷丹陽尹臧質反叛上深以東土為憂出為冠軍将軍吳興太守置佐史事平徴為尚書右僕射領徐州大中正遣至江陵分判枉直行其誅賞三年又出為南兗州刺史加散騎常侍仍徙為使持莭監雝梁南北秦四州郢州之竟陵随二郡諸軍事鎮軍将軍寧蠻校尉雝州刺史以疾不行留為侍中䕶軍又領徐州大中正素有勞患其年增篤詔遣黄門侍郎宣㫖問疾大明元年除金紫光祿大夫領太子詹事中正如故其年又出為鎮軍将軍南徐州刺史先是髙祖遺詔京口要地去都邑宻邇自非宗室近戚不得居之延孫與帝室雖同是彭城人别屬吕縣劉氏居彭城縣者又分為三里帝室居綏輿里左将軍劉懐肅居安上里豫州刺史劉懐武居叢亭里及吕縣凡四劉雖同出椘元王由來不序昭穆延孫於帝室本非同宗不應有此授時司空竟陵王誕為徐州上深相畏忌不欲使居京口遷之於廣陵廣陵與京口對岸欲使腹心為徐州據京口以防誕故以南徐授延孫而與之合族使諸王序親三年南兗州刺史竟陵王誕有罪不受徴延孫馳遣中兵參軍杜幼文率兵起討既至誕已閉城自守乃還誕遣使劉公泰齎書要之延孫斬公泰送首京邑復遣幼文率軍渡江受沈慶之莭度其年進號車騎将軍加散騎常侍給鼓吹一部五年詔延孫曰舊京樹親由來常凖卿前出所有别議今此防久弭當以還授小兒徴延孫為侍中尚書左僕射領䕶軍将軍延孫疾病不任拜起上使於五城受封版乘船自青谿至平昌門仍入尚書下舎又欲以代朱修之為荆州事未行明年卒時年五十二上甚惜之下詔曰故侍中尚書左僕射領䕶軍将軍東昌縣開國侯延孫風局簡正體識沈明綢繆心膂自蕃升朝契濶唯舊㡬将二紀靈業中圮則首賛出圗義令既舉則任均肅㓂器允棟幹勲實佐時及累司馬兩官出内尹牧惠政茂課著自民聴忠謨令莭簡乎朕心方爕和台階永毗國道奄至薨殞震慟兼深考終定典宜盡哀敬可贈司徒給班劍二十人侍中僕射侯如故有司奏諡忠穆詔為文穆又詔曰故司徒文穆公延孫居身寡約家素貧虚每念清羙良深悽歎葬送資調固當闕乏可賜錢三十萬米千斛子質嗣太宗泰始中有罪國除延孫弟延熙義興太守在孔覬傳史臣曰延孫接款蕃日固出顔袁矣風飈局力又無䓁級可言而隆名盛寵必擇而後授何哉良以休運甫開沈疾方被雖宿恩内積而安私外簡夫侮因事狎敬由近踈踈必相思狎必相厭厭思一殊榮禮自隔遂得為一世宗臣盖由此也子曰事君數斯疏矣然乎然乎宋書卷七十八宋書卷七十八考證蕭思話傳孝建二年卒時年五十臣承蒼按思話年十八除琅邪王大司馬行參軍踰年父源之卒是為永初九年至元嘉五年任青州刺史稱年二十七是也自元嘉六年己巳至孝建二年乙未又歴二十七年思話卒時年五十四今云五十盖脱四字劉延孫傳方爕和台階永毗國道和一本作采宋書卷七十八考證
