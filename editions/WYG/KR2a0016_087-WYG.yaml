body:
  text: 宋書卷八十七梁沈約撰列傳第四十七蕭惠開殷琰蕭惠開南蘭陵人征西將軍思話子也初名慧開後改慧為惠少有風氣渉獵文史家雖貴戚而居服簡素初為秘書郎著作並名家年少惠開意趣與人多不同比肩或三年不共語外祖光禄大夫沛郡劉成戒之曰汝恩戚家子當應將迎時俗緝外内之歡如汝自業將無小傷多異以取天下之疾患邪惠開曰人間宜相緝和甚如慈旨但不幸耿介恥見作凡人畫龍未成故遂至於多忤耳轉太子舎人與汝南周朗同官友善以偏竒相尚轉尚書水部郎始興王濬征北府主簿南徐州治中從事史徙汝隂王友又為南徐州别駕中書侍郎江夏王義恭大將軍大司馬從事中郎孝建元年自太子中庶子轉黄門侍郎與侍中何偃爭積射將軍徐冲之事偃任遇甚隆惠開不為之屈偃怒使門下推彈之惠開乃上表解職曰陛下未照臣愚故引參近侍臣以職事非長故委能何偃凡諸當不不敢參議竊見積射將軍徐冲之為偃命所黜臣愚懐謂有可申故聊設微異偃恃恩使貴欲使人靡二情便訶脅主者手定文案割落臣議專載已辭雖天照廣臨竟未見察臣理違顏咫尺致兹壅濫則臣之受劾蓋何足悲但不順侍中臣有其咎當而行之不知何過且議之不允未有彈科省心揆天了知在宥臣不能謝愆右職改意重臣刺骨鑠金將在朝夕乞解所忝保拙私庭時偃寵方隆由此忤旨别勅有司以屬疾多免惠開官思話素恭謹操行與惠開不同常以其峻異每加嫌責及見惠開自解表自歎曰兒子不幸與周朗周旋理應如此杖之二百尋重除中庶子丁父艱居喪有孝性家素事佛凡為父起四寺南岸南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口墓亭名曰禪亭寺所封封陽縣名曰禪封寺謂國僚曰封秩蓋鮮而兄弟甚多若使全關一人則在我所讓若使人人等分又事可悲恥寺衆既立自宜悉供僧衆由此國秩不復下均服除除司徒左長史大明二年出為海陵王休茂北中郎長史寧朔將軍襄陽太守行雍州州府事善於為政威行禁止襲封封陽縣侯還為新安王子鸞冠軍長史行吴郡事惠開妹當適桂陽王休範女又當適世祖子發遣之資湏應二千萬乃以為豫章内史聽其肆意聚納由是在郡著貪暴之聲入為尚書吏部郎不拜徙御史中丞世祖與劉秀之詔曰今以蕭惠開為憲司冀當稱職但一往服領已自殊有所震及在任百僚畏憚之八年入為侍中詔曰惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞母憂去職起為持節督青冀二州諸軍事輔國將軍青冀二州刺史不行改督益寧二州刺史持節將軍如故惠開素有大意至蜀欲廣樹經畧善於述事對賓僚及士人説收牂牁越巂以為内地綏討蠻濮闢地徴租聞其言者以為大功可立太宗即位進號冠軍將軍又進平西將軍改督為都督晉安王子勛反惠開乃集將佐謂之曰湘東太祖之昭晉安世祖之穆其於當璧並無不可但景和雖昏本是世祖之嗣不任社稷其次猶多吾奉武文之靈兼荷世祖之眷今便當投袂萬里推奉九江乃遣巴郡太守費欣夀領二千人東下為巴東人任叔兒起義所邀欣夀敗沒陜口道不復通更遣州治中程法度領三千人歩出梁州又為氐賊楊僧嗣所斷先是惠開為治多任刑誅蜀土咸懐猜怨及聞欣夀没法度又不得前晉原一部遂反於是諸郡悉應之並來圍城城内東兵不過二千凡蜀人惠開疑之皆悉遣出子勛尋平蜀人並欲屠城以望厚賞惠開每遣軍出戰未嘗不㨗前後所摧破殺傷不可勝計外衆逾合勝兵者十餘萬人時天下已平太宗以蜀土險逺赦其誅責遣惠開弟惠基步道使蜀具宣朝旨惠基既至涪而蜀人志在屠城不欲使王命逺逹遏留惠基不聴進惠基率部曲破其渠帥馬興懐等然後得前惠開奉旨歸順城圍得解時太宗遣惠開宗人寳首水路慰勞益州寳首欲以平蜀為功更奬説蜀人於是處處蜂起凡諸離散者一時還合渠帥趙燕句文章等與寳首屯軍於上去成都六十里衆號二十萬人惠開欲遣擊之將佐咸曰攻破蜀賊誠不為難但慰勞使至未獲奉受而遣兵相距何以自明本心惠開曰今水陸四斷表啟路絶寳首或相誣陷謂我不奉朝旨我之欲戰本在通使使若得通則誠心達矣乃作啟事具陳事情使腹心二人帯啟戒之曰湏賊破路開便躍馬馳去遣永寧太守蕭惠訓别駕費欣業萬兵並進與戰大破之生禽寳首囚於成都縣獄所遣使至上使執送寳首除惠開晉平王休祐驃騎長史南郡太守不拜泰始四年還至京師初惠開府錄事參軍到希微負蜀人債將百萬為責主所制未得俱還惠開與希微共事不厚以為隨其同上不能擕接得還意恥之廐中凡有馬六十匹悉以乞希微償責其意趣不常皆如是先劉瑀為益州張説代之瑀去任凡所擕將佐有不樂反者必逼制將還語人曰隨我上豈可為張説作西門客邪惠開自蜀還資財二千餘萬悉散施道路一無所留五年又除桂陽王休範征北長史南東海太守其年㑹稽太守蔡興宗之郡而惠開自京口請假還都相逢於曲阿惠開先與興宗名位畧同又經情欵自以負釁摧屈慮興宗不能詣已戒勒部下蔡㑹稽部伍若借問慎不得答惠開素嚴自下莫敢違犯興宗見惠開舟力甚盛不知為誰遣人歴舫訊惠開有舫十餘事力二三百人皆低頭直去無一人答者復為晉平王休祐驃騎長史太守如故六年除少府加給事中惠開素剛至是益不得志寺内所住齋前有嚮種花草甚美惠開悉剗除列種白楊樹每謂人曰人生不得行胸懐雖夀百嵗猶為夭也發病歐血吐如肝胏者甚多除巴陵王休若征西長史寧朔將軍南郡太守未拜七年卒時年四十九子叡嗣齊受禪國除惠開與諸弟並不睦惠基使益州遂不相見與同產弟惠明亦著嫌隙云殷琰陳郡長平人也父道鸞衡陽王義季右軍長史琰少為太祖所知見遇與琅邪王景文相埒初為江夏王義恭征北行參軍始興王濬後軍主簿出為鄱陽晉熙太守豫州治中從事史廬陵内史臧質反棄郡奔北皖琰性有計數欲進退保全故不還都邑事平坐繫尚方頃之被宥除海陵王國郎中令不拜臨海王子頊為冠軍將軍吴興太守以琰為錄事參軍行郡事復為豫州别駕太宰戸曹屬丹楊丞尚書左丞少府尋陽王子房冠軍司馬行南豫州隨府轉右軍司馬又徙巴陵王休若左軍司馬前廢帝永光元年除黄門侍郎出為山陽王休祐右軍長史南梁郡太守休祐入朝琰仍行府州事太宗泰始元年以休祐為荆州欲以吏部郎張岱為豫州刺史㑹晉安王子勛反即以琰督豫司二州南豫州之梁郡諸軍事建武將軍豫州刺史以西汝隂太守龐道隆為琰長史殿中將軍劉順為司馬順勸琰同子勛琰家累在京邑意欲奉順而士人前右軍參軍杜叔寳前陳南頓二郡太守皇甫道烈道烈從弟前馬頭太守景度前汝南潁川二郡太守龐天生前睢陽令夏侯季子等竝勸琰同逆琰素無部曲門義不過數人無以自立受制於叔寳等太宗遣冗從僕射栁倫領軍助驃騎大將軍山陽王休祐又遣中兵參軍鄭瑗説琰令還二人至即與叔寳合叔寳者杜坦之子既土豪鄉望内外諸軍事並專之弋陽太守卜天生據郡同逆斷梁州獻馬得百餘匹邊城令宿僧䕶起義斬天生傳首京邑太宗嘉之以為龍驤將軍封建興縣侯食邑三百户時綏戎將軍汝南新蔡二郡太守周矜起義於懸瓠收兵得千餘人袁顗遺信誘矜司馬汝南人常珍奇以金鈴為信珍奇即日斬矜送首詣顗顗以珍奇為汝南新蔡二郡太守太宗追贈矜本官以義陽内史龐孟虯為司州刺史領隨郡太守孟虯不受命起兵同子勛子勛召孟虯出尋陽而以孟虯子定光行義陽郡事太宗知琰逼迫士人事不獲已猶欲羇縻之以琰兄前中書郎瑗為司徒右長史子邈為山陽王休祐驃騎參軍子勛遣使以琰為輔國將軍梁郡太守後又加豫州假節督南豫數郡杜叔寳求琰上佐龐道隆慮其為禍乃請奉表使尋陽琰即以叔寳為長史梁郡太守休祐歩入朝家内猶分停夀陽琰資給供贍事盡豐厚二年正月太宗遣輔國將軍劉勔率寧朔將軍吕安國西討休祐出鎮歴陽為諸軍總統時徐州刺史薛安都亦據彭城反募能生禽琰安都封千戸縣侯賜布絹各二千匹二月勔進軍小峴初合肥戍主南汝隂太守薛元寳委郡奔子勛前太守朱輔之據城歸順琰遣攻輔之輔之敗走琰以前右軍參軍裴季為南汝隂太守季又歸順太宗即而授之琰所用象縣令許道蓮亦率二百人歸降太宗以為馬頭太守三月上又遣寧朔將軍劉懐珍叚僧愛龍驤將軍姜產之馬步三軍助勔討琰義軍主黄回募江西楚人千餘斬子勛所置馬頭太守王廣元以回為龍驤將軍淮西人前奉朝請鄭墨率子弟部曲及淮右郡起義於陳郡城有衆一萬太宗以為司州刺史後虜宼淮西戰敗見殺追贈冠軍將軍是月劉順桞倫皇甫道烈龐天生等馬歩八千人東據宛唐去夀陽三百里勔率衆軍並進去順數里立營在道遇雨旦始至壘壍未立順欲擊之時琰所遣諸軍並受節度而以皇甫道烈土豪桞倫臺之所遣順本卑微不宜統督唯二軍不受命至是道烈倫不同順不能獨進乃止既而勔營壘漸立不可復攻因相持守四月勔錄事參軍王起前部賊曹參軍甄澹等五人委勔奔順順因此出軍攻勔順幢主樊僧整與臺馬軍主驃騎中兵參軍叚僧愛交矟鬭僧整刺僧愛殺之追贈屯騎校尉僧愛勇冠三軍軍中並懼太宗又遣太尉司馬垣閲率衆來㑹歩兵校尉龐沈之助裴季戍合肥初淮南人周伯符説休祐求起義兵休祐不許固請乃遣之杖䇿單行至安豐收得八百餘人於淮西為遊兵珍竒所置弋陽太守郭確遣將軍郭慈孫擊伯符於金丘琰又遣中兵參軍杜叔寳助之慈孫等為伯符所敗並投水死太宗以伯符為驃騎參軍叔寳本謂臺軍停住歴陽不辦進順等至無不瓦解唯齎一月日糧既與勔相持軍食盡報叔寳送食叔寳乃發車千五百乘載米餉順自以五千精兵防送之勔聞之軍副吕安國曰劉順精甲八千而我衆不能居半相持既久彊弱勢殊茍復推遷則無以自立所頼在彼糧將竭我食有餘耳若使叔寳米至非唯難可復圖我亦不能持久今唯有間道襲其米車出彼不意若能制之將不戰走矣勔以為然乃以疲弱守營簡選千百精手配安國及軍主黄回等間路出順後於横塘抄之安國始行計叔寳尋至止齎二日熟食食盡叔寳不至將士並欲還安國曰卿等旦已一食今晚米車不容不至若其不至夜去不晚叔寳果至以米車為函箱陣叔寳於外為遊軍幢主楊仲懐領五百人居前與安國回等相會仲懐部曲並欲退就叔寳并力擊安國仲懐曰賊至不擊復欲何待且統軍在後政三二里間比吾交手何憂不至即便前戰回所領並淮南楚子天下精兵衆力既倍合戰便破之於陣殺仲懐仲懐所領五百人死盡叔寳至而仲懐及士卒伏尸蔽野回等欲乘勝擊之安國曰彼將自走不假復擊退軍三十里止宿夜遣騎參候叔寳果棄米車奔走安國即復夜往燒米車驅牛二千餘頭而還劉順聞米車見燒叔寳又走三月一日夜衆潰奔還夀陽仍走淮西就常珍竒勔於是方軌而進叔寳歛居民及散卒嬰城自守勔與諸軍分營城外黄回立航渡肥水叔寳遣馬歩三千欲破航并柵斷小峴埭回擊大破之焚其船柵休祐與琰書曰君本文弱素無武幹是逺近所悉且名器清顯不應復有分外希覬近者之事當是劫於凶豎不能守節今大軍長驅已造城下勢孤援絶禍敗交至顧昔情欵猶有惻然聖上垂天地之仁開不世之澤好生惡殺遐邇所聞顧琛王曇生等皆軍敗迸走披草乞活尚蒙恩恕晏處私門今神鋒所臨前無横陳况窮城弱衆殘傷之餘而欲自固乎若開門歸順自可不失富貴將佐小大並保榮爵何故茍困士民自求韲膾身膏斧鑊妻息并盡老兄垂白東市受刑邪幸自思之信言不爽有如皎日上又遣王道隆齎詔宥琰罪勔又與琰書曰昔景和凶悖行絶人倫昏虐險穢諫諍杜塞遂殘毁陵廟芟刈百僚縱毒窮凶靡有紀極于時人神回遑莫能自保中内士庶咸願一匡予職在直衛目所備覩主上神機天發指麾克定横流塗炭一朝太平扶危拯急實冠終古而四方持疑成此乖逆資斧所臨毎從偃簡足下以衣冠華胄信槩夙昭附戾從違猶見容養賢兄長史階升清列賢子參軍亦塞國網間者進軍宛唐計由劉順退衆閉城當時未了過蒙朝恩謬充將帥蚤承風素情有依然今皇威逺申三方蹙弱勝敗之勢皎然可覽王御史昨至主上勅驃騎敎賢兄賢子書今悉遣送百代以來未有𢎞恩曲宥乃至於此且朝廷方宣示大義惟新王道何容摽虗辭於士女失國信於一州以足下明識淵見想必不俟終日如其孤背亭毒弗忌屠陷者便當窮兵肆武究法極刑將恐貴門無復祭祀之主墳壟乏埽灑之望進謝忠臣退慙孝子名實兩喪沒有餘責扶力畧白幸加研覽琰本無反心事由力屈叔寳等有降意前後屢遣送誠牋而衆心持疑莫能相一故歸順之計每多愆塞嬰城愈固弋陽西山蠻田益之起義攻郭確於弋陽以益之為輔國將軍督弋陽西山事六月勔築長圍始合田益之率蠻衆萬餘人攻龐定光於義陽定光遣從兄文生拒之為益之所破見殺遂圍其城定光求救於子勛子勛以定光父孟虯為司州刺史率精兵五千救義陽并解夀陽之圍常珍竒又自懸瓠遣三千人援定光屯軍桞水益之不戰望風奔散孟虯乘勝進軍向夀陽初常珍竒遣周當垣式寳率數百人送仗與琰式寳驍勇絶衆因留守北門乃率所領開門掩襲勔入其營勔逃避得免式寳得勔衣㡌而去勔於是乃豎長圍治攻道於東南角并填壍東南角有髙樓隊主趙法進計曰外若進攻必先攻樓樓頺落既傷將士又使人情沮壊不如先自毁之從其言勔用草茅苞土擲以塞壍擲者如雲城内乃以火箭射之草未及燃後土續至一二日壍便欲滿趙法進復獻計以鐡珠子灌之珠子流滑悉緣隙得入草於是火燃二日間草盡壍中土不過二三寸勔乃作大蝦蟇車載土牛皮蒙之三百人推以塞壍琰戸曹參軍虞挹之造碻車擊之以石車悉破壊初廬江太守王子仲棄郡奔尋陽廬江人起義休祐遣員外散騎侍郎陸悠之助之劉胡遣其輔國將軍薛道摽渡江煽動羣蠻規自廬江掩襲歴陽悠之衆弱退保譙城司徒建安王休仁遣參軍沈靈寵馳據廬江道摽後一日方至悠之自譙城來㑹因與道摽相持七月龐孟虯至弋陽勔遣吕安國垣閎龍驤將軍陳顯逹驃騎參軍孟次陽拒之孟虯軍副吕興夀與安國有舊率所領降安國進軍破孟虯於蓼潭義軍主陳肫又破之於汝水孟虯走向義陽義陽已為王元謨子曇善起義所據乃逃於蠻中淮西人鄭叔舉起義擊常珍竒以為北豫州刺史八月皇甫道烈桞倫等二十一人聞孟虯敗並開門出降勔因此又與琰書曰桞倫來奔具相申述方承足下迹纒穢亂心秉忠誠惘黙窮愁不親戎政去冬開天之始愚迷者多如足下流比進非社稷宗臣退無顧命寄託朝廷既不偏相嫌責足下亦復無所獨愧程天祚已舉城歸順龐孟虯又繼迹奔亡劉胡困於錢溪袁顗欲戰不得推理揆勢亦安能久且南方初起連州十六擁徒百萬仲春以來無戰不北摧陷殄滅十無一二南憑袁顗弱卒北恃足下孤城以兹定業恐萬無一理方今國網疎畧示舉宏維比日相白想亦已具矣且倫等皆是足下腹心牙爪所以擕手相捨非有怨恨也了知事不可濟禍害己及故耳夫擁數千烏合抗天下之兵傾覆之狀豈不易曉假令六蔽之人猶當不為其事況復足下少祖名敎疾没世無稱者邪所以復有此白者實惜華州重鎮鞠為茂草兼傷貴門一日屠滅足下若能封府庫開四門宣語文武示以禍福先遣咫尺之書表達誠欵然後素車白馬來詣轅門若令足下髪膚不全兒姪彫耗者皇天后土實聞此言至辭不華寧復多白薛道摽猶在廬江劉胡又分兵揚聲向夀陽及合肥勔遣許道蓮馳赴合肥助裴季文又遣黄回孟次陽及屯騎校尉叚佛榮武衛將軍王廣之繼之道摽率其黨薛元寳等攻合肥勔所遣諸軍未至為道摽所陷季文及武衛將軍葉慶祖力戰死之勔馳遣垣閎總統諸軍攻合肥是月劉胡敗走尋陽平定太宗遣叔寳從父弟季文至琰城下與叔寳語説四方已定勸令時降叔寳曰我乃信汝恐為人所誑耳叔寳閉絶子勛敗問有傳者即殺之時琰子邈東在京邑繫建康太宗送邈與琰令説南賊已平之問自建康出便防送就道議者以為宜聽邈與伯父瑗私相見不爾無以解城内之惑不從邈至叔寳等果疑守備方固十月薛道摽突圍與十餘騎走奔淮西投常珍竒薛元寳歸降先是晉熙太守閻湛之據郡同逆至是沈靈寵自廬江攻之湛之未知尋陽已敗固守不降靈寵乃取諸將破劉胡文書置車中攻城僞敗棄車而走湛之得書大駭其夜奔逃十一月常珍竒乞降慮不見納又求救於索虜太宗即以珍竒為司州刺史領汝南新蔡二郡太守虜亦遣偽帥張窮竒騎萬匹救之十二月虜至汝南珍竒開門納虜淮西七縣民並連營南奔劉順之亦棄虜歸順南賊降者太宗並送琰城下令與城内交言由是人情沮喪琰將降先送休祐内人出城然後開門時琰有疾以板自輿與諸將帥面縳請罪勔並撫宥無所誅戮自將帥以下財物資貨皆以還之纎毫無所失虜騎救琰至師水聞城陷乃破義陽殺掠數千人而去垣式寳尋復反叛投常珍竒以平琰功劉懐珍封艾縣侯食邑四百戸垣閎樂鄉縣侯孟次陽攸縣子王廣之蒲圻縣子陳顯達彭澤縣子呂安國鍾武縣子食邑各三百户黄回葛陽縣男食邑二百户送琰及偽節還京都久之為王景文鎮南諮議參軍兼少府泰豫元年除少府加給事中後廢帝元徽元年卒時年五十九琰性和雅静素寡嗜欲諳前世舊事事兄甚謹少以名行見稱在夀陽被攻圍積時為城内所懐附揚州刺史王景文征西將軍蔡興宗司空褚淵並與之友善云史臣曰夫求忠臣必於孝子之門蓋以類得之也昔啟方説主迹表遺親鄧攸淳行愛兼猶子雖禀分參差情紀難一而均薄等厚未之或偏惠開親禮雖篤弟隙尤著方寸之内孝友異情險於山川有驗於此也宋書卷八十七宋書卷八十七考證蕭惠開傳今以蕭惠開為憲司冀當稱職但一往服領已自殊有所震服領南史作眼頞殷琰傳三月一日夜衆潰奔還夀陽三月一本作五月宋書卷八十七考證
