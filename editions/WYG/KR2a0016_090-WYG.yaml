  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0016_WYG_090-1a, image: WYG0258/WYG0258-0565a.png}
body:
  text: 宋書卷九十梁沈約撰列傳第五十明四王明帝十二子陳貴妃生後廢帝謝脩儀生皇子法良陳昭華生順帝徐媫妤生第四皇子鄭脩容生皇子智井次晉熙王爕與皇子法良同生泉美人生邵陵殤王友次江夏王躋與第四皇子同生徐良人生武陵王贊杜脩華生隨陽王翽次新興王嵩與武陵王贊同生又泉美人生始建王禧智井爕贊並出繼法良未封第四皇子未有名早夭邵陵殤王友字仲賢明帝第七子也後廢帝元徽二年太尉江州刺史桂陽王休範反誅皇室寡弱友年五嵗出為使持節督江州豫州之西陽新蔡晉熙三郡諸軍事南中郎將江州刺史封邵陵王食邑二千戸府州文案及臣吏不諱有無之有順帝即位進號左將軍改督為都督昇明元年徙都督南豫豫司三州諸軍事安南將軍南豫州刺史歴陽太守三年薨無子國除隨陽王翽字仲儀明帝第十子也元徽四年年六嵗封南陽王食邑二千戸昇明元年為使持節督郢州司州之義陽諸軍事西中郎將郢州刺史未拜徙督湘州諸軍事南中郎將湘州刺史持節如故未之鎮進號前將軍二年以南陽荒逺改封隨陽王以本號停京師齊受禪降封舞隂縣公食邑千五百戸謀反賜死新興王嵩字仲岳明帝第十一子元徽四年年六嵗封新興王食邑二千戸齊受禪降封定襄縣公食邑千五百户謀反賜死始建王禧字仲安明帝第十二子也元徽四年年六嵗封始建王食邑二千戸齊受禪降封荔封縣公食邑千五百戸謀反賜死史臣曰太宗負螟之慶事非已出枝葉不茂豈能庇其本根侯服于周斯為幸矣宋書卷九十宋書卷九十考證明四王傳智井爕賛並出繼南史爕字下有躋字謂江夏王躋也邵陵殤王友傳府州文案及臣吏不諱有無之有臣承蒼按邵陵王名友有與友同聲此言不諱嫌名也南史改下四字云有無君之心其誤甚矣宋書卷九十考證
