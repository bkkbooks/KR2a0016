body:
  text: 宋書卷九十二梁沈約撰列傳第五十二良吏髙祖起自匹庶知民事艱難及登庸作宰留心吏職而王略外舉未遑内務奉師之費日耗千金播兹寛簡雖所未暇而絀華屏欲以儉抑身左右無幸謁之私閨房無文綺之飾故能戎車嵗駕邦甸不擾太祖㓜而寛仁入纂大業及難興陕方六戎薄伐命將動師經略司兗費由府實役不及民自此區㝢宴安方内無事三十年間氓庶蕃息奉上供傜止於嵗賦晨出莫歸自事而已守􅈗之職以六朞為斷雖沒世不徙未及曩時而民有所係吏無茍得家給人足即事雖難轉死溝渠於時可免凡百户之鄉有市之邑謌謡舞蹈觸處成羣蓋宋世之極盛也暨元嘉二十七年北狄南侵戎役大起傾資埽蓄猶有未供於是深賦厚斂天下騷動自兹至於孝建兵連不息以區區之江東地方不至數千里户不盈百萬薦之以師旅因之以㐫荒宋氏之盛自此衰矣晉世諸帝多處内房朝宴所臨東西二堂而已孝武末年清暑方構髙祖受命無所改作所居唯稱西殿不制嘉名太祖因之亦有合殿之稱及世祖承統制度奢廣犬馬餘菽粟土木衣綈繡追陋前規更造正光玉燭紫極諸殿雕欒綺莭珠忩網户嬖女幸臣賜傾府藏竭四海不供其欲單民命未快其心太宗繼阼彌篤浮侈恩不䘏下以至横流莅民之官遷變嵗屬竈不得黔席未暇煖蒲宻之化事未易階豈徒吏不及古民偽於昔蓋由為上所擾致治莫従今採其風迹粗著者以為良吏篇云王鎮之字伯仲琅邪臨沂人徴士宏之兄也曽祖廙晉驃騎將軍祖耆之中書郎父随之上虞令鎮之初為琅邪王衛軍行㕘軍出補剡上虞令並有能名内史謝輶請為山隂令復有殊績遷衛軍㕘軍本國郎中令加寧朔將軍桓元輔晉以為大將軍録事􅄁軍時三吳饑荒遣鎮之䘖命賑䘏而㑹稽内史王愉不奉苻㫖鎮之依事糺奏愉子綏元之外甥當時貴盛鎮之為所排抑以母老求補安成太守及元敗元將苻宏㓂亂郡境鎮之拒戰彌年子弟五人並臨陣見殺母憂去職在官清潔妻子無以自給乃棄家致喪還上虞舊基畢為子摽之求安復令随子之官服闋為征西道規司馬南平太守徐道覆逼江陵加鎮之建威將軍統檀道濟到彦之等討道覆以不經將帥固辭不見聼既而前軍失利白衣領職尋復本官以討道覆功封華容縣五等男徴廷尉晉穆帝何皇后山陵領將作大匠遷御史中丞秉正不撓百寮憚之出為使持莭都督交廣二州諸軍事建威將軍平越中郎將廣州刺史髙祖謂人曰王鎮之少著清績必將繼羙吳隠之嶺南之弊非此不康也在鎮不受俸禄蕭然無所營去官之日不異始至髙祖初建相國府以為諮議㕘軍領録事善於吏職嚴而不殘遷宋臺祠部尚書髙祖踐阼鎮之以脚患自陳出為輔國將軍琅邪太守遷宣訓衛尉領本州大中正永初三年卒官時年六十六弟宏之在隠逸傳杜慧度交阯朱䳒人也本屬京兆曾祖元為寜浦太守遂居交阯父瑗字道言仕州府為日南九徳交阯太守初九眞太守李遜父子勇壯有權力威制交土聞刺史騰遯之當至分遣二子斷遏水陸津要瑗収衆斬遜州境獲寜除龍驤將軍遯之在州十餘年與林邑累相攻伐遯之將北還林邑王范胡達攻破日南九徳九眞三郡遂圍州城時遯之去已逺瑗與苐三子元之悉力固守多設權䇿累戰大破之追討於九真日南連㨗故胡達走還林邑乃以瑗為龍驤將軍交州刺史義旗進號冠軍將軍盧循竊據廣州遣使通好瑗斬之義熈六年年八十四卒追贈右將軍本官如故慧度瑗苐五子也初為州主簿流民督䕶遷九真太守瑗卒府州綱佐以交土接㓂不宜曠職共推慧度行州府事辭不就七年除使持莭督交州諸軍事廣武將軍交州刺史詔書未至其年春盧循襲破合浦徑向交州慧度乃率文武六千人距循於石碕交戰禽循長史孫建之循雖敗餘黨猶有三千人皆習練兵事李遜子李奕李脱等奔竄石碕盤結俚獠各有部曲循知奕等與杜氏有怨遣使招之奕䓁引諸俚帥衆五六千人受循莭度六月庚子循晨造南津命三軍入城乃食慧度悉出宗族私財以充勸賞弟交趾太守慧期九真太守章民並督率水歩軍慧度自登髙艦合戰放火箭雉尾炬歩軍夹兩岸射之循衆艦俱然一時散潰循中箭赴水死斬循及父嘏并循二子親屬録事㕘軍阮静中兵㕘軍羅農夫李脱䒭傳首京邑封慧度龍編縣侯食邑千户髙祖踐阼進號輔國將軍其年率文武萬人南討林邑所殺過半前後被抄略悉得還本林邑乞降輸生口大象金銀古貝䒭乃釋之遣長史江悠奉表獻㨗慧度布衣蔬食儉約質素能彈琴頗好莊老禁斷滛祀崇修學校嵗荒民饑則以私禄賑給為政纎宻有如治家由是威恵沾洽姦盗不起乃至城門不夜閉道不拾遺少帝景平元年卒時年五十追贈左將軍以慧度長子貟外散騎侍郎宏文為振威將軍刺史初髙祖北征闗洛慧度板𢎞文為鷹揚將軍流民督䕶配兵三千北係大軍行至廣州關洛已平乃歸統府板𢎞文行九真太守及繼父為刺史亦以寛和得衆襲爵龍編侯太祖元嘉四年以廷尉王徽為交州刺史宏文就徴㑹得重疾牽以就路親舊見其患篤勸表待病瘉宏文曰吾世荷皇恩仗莭三世常欲投軀帝庭以報所荷况親被徴命而可晏然者乎如其顚沛此乃命也宏文母既年老見宏文輿疾就路不忍分别相與俱行到廣州遂卒臨死遣弟宏猷詣京朝廷甚哀之徐豁字萬同東莞姑幕人也中散大夫廣兄子父邈晉太子左衛率豁晉安帝隆安末為太學博士桓元輔政為中外都督諮議致敬唯内外武官太宰司徒並非軍職則琅邪王不應加敬元諷中丞免豁官元敗以為祕書郎尚書倉部郎右軍何無忌功曹仍為鎮南㕘軍又祠部永世令建武司馬中軍㕘軍尚書左丞永初初為徐羡之鎮軍司馬尚書左丞山隂令歴二丞三邑精練眀理為一世所推元嘉初為始興太守三年遣大使廵行四方并使郡縣各言損益豁因此表陳三事其一曰郡大田武吏年滿十六便課米六十斛十五以下至十三皆課米三十斛一户内随丁多少悉皆輸米且十三嵗兒未堪田作或是單逈無相兼通年及應輸便自逃逸既遏接蠻俚去就益易或乃斷截支體産子不養户口嵗減實此之由謂宜更量課限使得存立今若減其米課雖有交損考之將來理有深益其二曰郡領銀民三百餘户鑿坑採砂皆二三丈功役既苦不顧崩壓一嵗之中每有死者官司檢切猶致逋違老少相随永絶農業千有餘口皆資他食豈唯一夫不耕或受其饑而已所以嵗有不稔便致甚困尋臺邸用米不異於銀謂宜准銀課米即事為便其三曰中宿縣俚民課銀一子丁輸南稱半兩尋此縣自不出銀又俚民皆巢居鳥語不閑貨易之宜每至買銀為損已甚又稱兩受入易生姦巧山俚愚怯不辨自申官所課甚輕民以所輸為劇今若聼計丁課米公私兼利在郡著績太祖嘉之下詔曰始興太守豁潔已退食恪居在官政事脩理恵澤沾被近嶺南荒弊郡境尤甚拯䘏有方濟厥饑饉雖古之良守蔑以尚焉宜䝉褒賁以旌清績可賜絹二百匹榖千斛五年以為持莭督廣交二州諸軍事寜逺將軍平越中郎將廣州刺史未拜卒時年五十一太祖又下詔曰豁㢘清勤恪著稱所司故擢授南服申其才志不幸喪殞朕甚悼之可賜錢十萬布百匹以營葬事陸徽字休猷吳郡吳人也郡辟命主簿仍除衛軍車騎二府􅄁軍揚州主簿王宏衛將軍主簿除尚書都官郎出補建康令清平無私為太祖所善遷司徒左西掾元嘉十四年為始興太守眀年仍除使持莭交廣二州諸軍事綏逺將軍平越中郎將廣州刺史清名亞王鎮之為士民所愛詠上表薦士曰臣聞陵雪褒潁貞柯必振尊風賞流清原斯挹是以衣囊揮譽於西京折轅延髙於東帝伏見廣州别駕従事史朱萬嗣年五十三字少豫理業沖夷秉操純白行稱私庭能著官政雖氏非世禄宦無通資而随牒南服位極僚首九綜州綱三端府職頻掌蕃機屢績符守年暨知命㢘尚愈髙冰心與貪流争激霜情與晩莭彌茂􅊗宰金山家無寳鏤之飾連組珠海室靡璫珥之珎确然守志不求聞達實足以澄革汙吏洗鏡貪氓臣謬忝司牧任専萬里雖情祗慎擢才闕豪露敢罄愚陋舉其所知如得提名禮闈抗迹朝省摶嶺表之清風負冰宇之潔望則恩融一臣而施光萬物敢縁天澤雲行時徳雨施每甄外州榮加逺國是以獻其瞽言希垂聼覽二十一年徴以為南平王鑠冠軍司馬長沙内史行湘州府事母憂去職張尋趙廣為亂於益州兵㓂之餘政荒民擾二十三年乃追徴為持莭督益寜二州諸軍事寜􅃋將軍益州刺史隠䘏有方威恵兼著㓂盗静息民物殷阜蜀土安説至今稱之二十九年卒時年六十二身亡之日家無餘財太祖甚痛惜之詔曰徽厲志㢘潔歴任恪勤奉公盡誠克己無倦褒榮未申不幸夙殞言念在懐以為傷恨可贈輔國將軍本官如故賜錢十萬米二百斛諡曰簡子子叡正員外郎弟展臧質車騎長史尋陽太守質敗従誅阮長之字茂景陳㽞尉氏人也祖思曠金紫光禄大夫父普驃騎咨議㕘軍長之年十五喪父有孝性哀感傍人服除蔬食者猶積載閑居篤學未嘗有惰容初為諸府㕘軍除員外散騎侍郎母老求補襄垣令督郵無禮鞭之去職尋補廬陵王義真車騎行正㕘軍平越長史東莞太守入為尚書殿中郎出為武昌太守時王宏為江州雅相知重引為車騎従事中郎入為太子中舎人中書侍郎以母老固辭朝直補彭城王義康平北咨議㕘軍元嘉九年遷臨川内史以南土卑濕母年老非所宜辭不就十一年復除臨海太守至郡少時而母亡葬畢不勝憂十四年卒時年五十九時郡縣田禄芒種為斷此前去官者則一年秩禄皆入前人此後去官者則一年秩禄皆入後人始以元嘉末改此科計月分禄長之去武昌郡代人未至以芒種後一日解印綬初發京師親故或以器物贈别得便緘録後歸悉以還之在中書省直夜往鄰省誤著履出閤依事自列門下門下以闇夜人不知不受列長之固遣送之曰一生不侮闇室前後所莅官皆有風政為後人所思宋世言善治者咸稱之子師門原鄉令江秉之字元􅅩濟陽考城人也祖逌晉太常父纂給事中秉之少孤弟妹七人並皆㓜穉撫育姻娶罄其心力初為劉穆之丹陽前軍府㕘軍髙祖督徐州轉主簿仍為世子中軍㕘軍宋受禪随例為貟外散騎侍郎補太子詹事丞少帝即位入為尚書都官郎出為永世烏程令以善政著名東土徴建康令為治嚴察京邑肅然殷景仁為領軍請為司馬復出為山隂令民户三萬政事煩擾訟殷積階庭常數百人秉之御繁以簡常得無事宋世唯顧凱之亦以省務著績其餘雖復刑政循理而未能簡事以在縣有能遷補新安太守元嘉十二年轉在臨海並以簡約見稱所得禄秩悉散之親故妻子常饑寒人有勸其營田者秉之正色曰食禄之家豈可與農人競利在部作書案一枚及去官㽞以付庫十七年卒時年六十子徽尚書都官郎吳令元㐫殺徐湛之徽以黨與見誅子謐昇眀末為尚書吏部郎元嘉初太祖遣大使廵行四方兼散騎常侍孔黙之王歆之等上言宣威將軍陳南頓二郡太守李元徳清勤均平姦盗止息彭城内史魏恭子㢘恪脩慎在公忘私安約守儉久而彌固前宋縣令成浦治政寛濟遺詠在民前鮦陽令李熈國在事有方民思其政山桑令何道自少清㢘白首彌厲應加襃賚以勸於後乃進元徳號寜􅃋將軍恭子賜絹五十匹榖五百斛浦熈國道各賜絹三十匹榖二百斛王歆之字叔道河東人也曽祖愆期有名晉世官至南蠻校尉祖尋之光禄大夫父肇之豫章公相歆之被遇於太祖歴顯官左民尚書光禄大夫卒官元嘉九年豫州刺史長沙王義欣上言所統威逺將軍北譙梁二郡太守關中侯申季歴自奉職邦畿於兹五年信恵並宣威化兼著外清姦暴内輯民黎役賦均平閭井齊肅綏穆初附招攜荒逺郊境之外仰澤懐風爵賞之授績能是顯宜升階秩以崇奬勸進號寜􅃋將軍其後晉夀太守郭啟元亦有清莭卒官元嘉二十八年詔曰故綏逺將軍晉夀太守郭啟元往銜命虜庭秉意不屈受任白水盡勤靡懈公奉私餼纎毫弗納布衣蔬食飭躬惟儉故超授顯邦以甄㢘績而介誠苦莭終始匪貳身死之日妻子凍餒志操殊俗良可哀悼可賜其家榖五百斛時有北地傅僧祐潁川陳珉髙平張祐並以吏才見知僧祐事在臧燾𫝊珉為吳令善發姦伏境内以為神眀祐祖父湛晉孝武世以才學為中書侍郎光禄勲祐􅊗臨安武康錢塘令並著能名宋世言長吏者以三人為首元嘉中髙平太守潘詞有清莭子亮為昌慮令亦著㢘名大眀中為徐州刺史劉道隆所表世祖世吳郡陸法眞厯官有清莭嘗為劉秀之安北録事㕘軍太山羊希與安北咨議㕘軍孫詵書曰足下同僚似有陸録事者此生東南名地又張元外孫持身至清雅有志莭年髙官下秉操不衰計當日夕相與申意太宗初為南海太守卒官太宗世琅邪王悦亦莅官清正見知悦字少眀晉右將軍羲之曽孫也父靖之官至司徒左長史靖之為劉穆之所厚就穆之求侍中如此非一穆之曰卿若不求久自得也遂不果悦泰始中為黄門郎御史中丞上以其㢘介賜良田五頃遷尚書吏部郎侍中在門下盡其心力五年卒官追贈太常初悦為侍中檢校御府太官太醫諸署得姦巧甚多及悦死衆咸謂諸署詋詛之上乃収典掌者十餘人桎梏云送淮隂宻令渡𤓰歩江投之中流史臣曰夫善政之於民猶良工之於埴也用功寡而成器多漢世户口殷盛刑務簡闊郡縣治民無所横擾勸賞威刑事多専斷尺一詔書希經邦邑龔黄之化易以有成降及晩代情偽繁起民減昔時務多前世立績垂風艱易百倍若以上古之化治此世之民今吏之良撫前代之俗則武城弦歌將有未暇淮陽卧治如或可勉未必今才陋古盖化有淳薄也宋書卷九十二宋書卷九十二考證杜慧度傳聞刺史騰遯之當至騰南史作滕徐豁傳諮議致敬惟内外武官臣承蒼按諮當作豁以字形相近而訛也王歆之傳王歆之字叔道河東人也諸本王歆之皆另行作専傳目録良吏傳亦載王歆之名臣承蒼按此傳内正叙歆之世出及所厯之官並未及居官政蹟安得謂之循吏大抵因江秉之傳末載孔黙之與王歆之薦太守李元徳等五人遂以歆之世系官位附記於此其後又載申季歴郭啟元諸人亦如李元徳五人之例自王歆之字叔道以下凡三十二行皆當接寫江秉之傳後斷不可以歆之為循吏中一人目録内王歆之三字並宜削去縁諸本相承已久姑仍其舊而考摘其謬著於此宋書卷九十二考證
