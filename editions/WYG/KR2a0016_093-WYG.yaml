body:
  text: 宋書卷九十三梁沈約撰列傳第五十三隐逸易曰天地閉賢人隐又曰遯世無悶又曰髙尚其事又曰幽人貞吉論語作者七人表以逸民之稱又曰子路遇荷蓧丈人孔子曰隐者也又曰賢者避地其次避言又曰虞仲夷逸隐居放言品目參差稱謂非一請試言之夫隐之為言迹不外見道不可知之謂也若夫千載寂寥聖人不出則大賢自晦降夷凡品止於全身逺害非必穴處巖栖雖藏徃得二鄰亞宗極而舉世莫窺萬物不覩若此人者豈肯洗耳潁濵皦皦然顯出俗之志乎遯世避言即賢人也夫何適非世而有避世之因固知義惟晦道非曰藏身至於巢父之名即是見稱之號號曰裘公由有可傳之迹此蓋荷蓧之隐而非賢人之隐也賢人之隐義深於自晦荷蓧之隐事止於違人論迹既殊原心亦異也身與運閉無可知之情雞黍宿賔示髙世之羙運閉故隐為隐之跡不見違人故隐用致隐者之目身隐故稱隐者道隐故曰賢人或曰隐者之異乎隐既聞其説賢者之同於賢未知所異應之曰隐身之於晦道名同而義殊賢人之於賢者事窮於亞聖以此為言如或可辨若乃髙尚之與作者三避之與幽人及逸民隐居皆獨徃之稱雖復漢隂之氏不傳河上之名不顯莫不激貪厲俗秉自異之姿猶負揭日月鳴建鼔而趨也陳郡袁淑集古來無名髙士以為眞隐傳格以斯談去眞逺矣賢人在世事不可誣今為隐逸篇虚置賢隐之位其餘夷心俗表者蓋逸而非隐云戴顒字仲若譙郡銍人也父逵兄勃並隐遯有髙名顒年十六遭父憂㡬於毁滅因此長抱羸患以父不仕復脩其業父善琴書顒並傳之凡諸音律皆能揮手㑹稽剡縣多名山故世居剡下顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄勃五部顒十五部顒又制長弄一部並傳於世中書令王綏常攜賓客造之勃等方進豆粥綏曰聞卿善琴試欲一聼不答綏恨而去桐廬縣又多名山兄弟復共游之因留居止勃疾患醫藥不給顒謂勃曰顒随兄得閑非有心於黙語兄今疾篤無可營療顒當干禄以自濟耳乃告時求海虞令事垂行而勃卒乃止桐廬僻逺難以飬疾乃出居呉下呉下士人共為築室聚石引水植林開澗少時繁密有若自然乃述荘周大㫖著逍遥論注禮記中庸篇三吴將守及郡内衣冠要其同逰野澤堪行便徃不為矯介衆論以此多之髙祖命為太尉行參軍琅邪王司馬屬並不就宋國初建令曰前太尉參軍戴顒辟士韋元秉操幽遁守志不渝宜加旌引以𢎞止退並可散騎侍郎在通直不起太祖元嘉二年詔曰新除通直散騎侍郎戴顒太子舍人宗炳並志託丘園自求衡蓽恬静之操久而不渝顒可國子博士炳可通直散騎侍郎東宫初建又徴太子中庶子十五年徴散騎常侍並不就衡陽王義季鎮京口長史張邵與顒姻通迎來止黄鵠山山北有竹林精舍林澗甚羙顒憩于此澗義季亟從之遊顒服其野服不改常度為義季鼓琴並新聲變曲其三調遊絃廣陵止息之流皆與世異太祖每欲見之嘗謂黄門侍郎張敷曰吾東廵之日當讌戴公山也以其好音長給正聲伎一部顒合何嘗白鵠二聲以為一調號為清曠自漢世始有佛像形制未工逵特善其事顒亦參焉宋世子鑄丈六銅像於瓦官寺既成面恨瘦工人不能治乃迎顒看之顒曰非面瘦乃臂胛肥耳既錯減臂胛瘦患即除無不歎服焉十八年卒時年六十四無子景陽山成顒已亡矣上歎曰恨不得使戴顒觀之宗炳字少文南陽湼陽人也祖承宜都太守父繇之湘鄉令母同郡師氏聰辨有學義教授諸子炳居喪過禮為鄉閭所稱刺史殷仲堪桓元並辟主簿舉秀才不就髙祖誅劉毅領荆州問毅府咨議參軍申永曰今日何施而可永曰除其宿釁倍其恵澤貫叙門次顯擢才能如此而已髙祖納之辟炳為主簿不起問其故答曰棲丘飲谷三十餘年髙祖善其對妙善琴書精於言理毎逰山水徃輒忘歸征西長史王敬宏毎從之未嘗不彌日也乃下入廬山就釋慧逺考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閑居無事髙祖召為太尉參軍不就二兄蚤卒孤累甚多家貧無以相贍頗營稼穯髙祖數致餼賚其後子弟從禄乃悉不復受髙祖開府辟召下書曰吾忝大寵思延賢彦而兎罝潛處考槃未臻側席丘園良増虚佇南陽宗炳鴈門周續之並植操幽棲無悶巾褐可下辟召以禮屈之於是並辟太尉掾皆不起宋受禪徴為太子舍人元嘉初又徴通直郎東宫建徴為太子中舍人庶子並不應妻羅氏亦有高情與炳恊趣羅氏没炳哀之過甚既而輟哭尋理悲情頓釋謂沙門釋慧堅曰死生之分未易可達三復至教方能遣哀衡陽王義季在荆州親至炳室與之歡讌命為咨議參軍不起好山水愛逺遊西陟荆巫南登衡岳因而結宇衡山欲懐尚平之志有疾還江陵嘆曰老疾俱至名山恐難遍覩唯當澄懐觀道卧以逰之凡所逰履皆圖之於室謂人曰撫琴動操欲令衆山皆響古有金石弄為諸桓所重桓氏亡其聲遂絶惟炳𫝊焉太祖遣樂師楊觀就炳受之炳外弟師覺授亦有素業以琴書自娯臨川王義慶辟為祭酒主簿並不就乃表薦之㑹病卒元嘉二十年炳卒時年六十九衡陽王義季與司徒江夏王義恭書曰宗居士不救所病其清履肥素終始可嘉為之惻愴不能已已子朔南譙王義宣車騎參軍次綺江夏王義恭司空主簿次昭郢州治中次説正員郎周續之字道祖鴈門廣武人也其先過江居豫章建昌縣續之年八嵗喪母哀戚過於成人奉兄如事父豫章太守范寗於郡立學招集生徒逺方至者甚衆續之年十二詣寗受業居學數年通五經并緯候名冠同門號曰顔子既而閑居讀老易入廬山事沙門釋慧逺時彭城劉遺民遁迹廬山陶淵明亦不應徴命謂之尋陽三隐以為身不可遣餘累宜絶遂終身不娶妻布衣蔬食劉毅鎮姑熟命為撫軍徴太學博士並不就江州刺史毎相招請續之不尚節峻頗從之逰常以嵇康髙士傳得出處之羙因為之注髙祖之北討世子居守迎續之館於安樂寺延入講禮月餘復還山江州刺史劉栁薦之髙祖曰臣聞恢燿和肆必在兼城之寳翼亮崇本宜紆髙世之逸是以渭濵佐周聖徳廣運商洛匡漢英業乃昌伏惟明公道邁振古應天繼期逰外暢於㝠内體逺形於應近雖汾陽之舉輟駕於時艱明揚之㫖潛感於穹谷矣竊見處士鴈門周續之清眞貞素思學鈎深弱冠獨往心無近事性之所遣榮華與饑寒俱落情之所慕巖澤與琴書共逺加以仁心内發義懐外亮留愛崑卉誠著桃李若升之宰府必鼎味斯和濯纓儒官亦王猷遐緝臧文不知失在降賢言偃得人功由升士願照其丹欵不以人廢言俄而辟為太尉掾不就髙祖北伐還鎮彭城遣使迎之禮賜甚厚毎稱之曰心無偏吝真髙士也尋復南還髙祖踐祚復召之乃盡室俱下上為開館東郭外招集生徒乘輿降幸并見諸生問續之禮記傲不可長與我九齡射於矍圃三義辨析精奥稱為該通續之素患風痺不復堪講乃移病鍾山景平元年卒時年四十七通毛詩六義及禮論公羊傳皆傳於世無子兄子景逺有續之風太宗㤗始中為晋安内史未之郡卒王宏之字方平琅邪臨沂人宣訓衛尉鎭之弟也少孤貧為外祖徴士何淮所撫育從叔獻之及太原王恭並貴重之晉安帝隆安中為琅邪王中軍參軍遷司徒主簿家貧而性好山水求為烏程令尋以病歸桓元輔晋桓謙以為衛軍參軍時琅邪殷仲文還姑熟祖送傾朝謙要宏之同行答曰凡祖離送别必在有情下官與殷風馬不接無緣扈從謙貴其言毎隨兄鎮之之安成郡宏之觧職同行荆州刺史桓偉請為南蠻長史義熙初何無忌又請為右軍司馬髙祖命為徐州治中從事史除員外散騎常侍並不就家在㑹稽上虞從兄敬宏為吏部尚書奏曰聖明司契載徳惟新垂鑑仄㣲表揚隐介黙語仰風荒遐傾首前員外散騎常侍琅邪王宏之恬漠丘園放心居逸前衛将軍參軍武昌郭希林素履純潔嗣徽前武並擊壤聖朝未䝉表飾宜加旌聘賁于丘園以彰止遜之羙以袪動求之累臣愚謂宏之可太子庶子希林可著作郎即徴宏之為庶子不就太祖即位敬宏為左僕射又陳宏之髙行表於初筮苦節彰於莫年今内外晏然當修太平之化宜招空谷以敦沖退之羙元嘉四年徴為通直散騎常侍又不就敬宏嘗觧貂裘與之即着以采藥性好釣上虞江有一處名三石頭宏之常垂綸於此經過者不識之或問漁師得魚賣不宏之曰亦自不得得亦不賣日夕載魚入上虞郭經親故門各以一兩頭置門内而去始寧汰川有佳山水宏之又依巖築室謝靈運顔延之並相欽重靈運與廬陵王義眞牋曰㑹境既豐山水是以江左嘉遁並多居之但季世慕榮幽棲者寡或復才為時求弗獲從志至若王宏之拂衣歸耕踰歴三紀孔淳之隐約窮岫自始迄今阮萬齡辭事就閑纂成先業浙河之外棲遲山澤如斯而已既逺同羲唐亦激貪厲競殿下愛素好古常若布衣毎憶昔聞虚想巖穴若遣一介有以相存眞可謂千載盛羙也元嘉四年卒時年六十三顔延之欲為作誄書與宏之子曇生曰君家髙世之節有識歸重豫染豪翰所應載述況僕託慕末風竊以叙徳為事但恨短筆不足書羙誄竟不就曇生好文義以謙和見稱歴顯位吏部尚書太常卿大明末為呉興太守太宗初四方同逆戰敗奔㑹稽歸降被宥終於中散大夫阮萬齡陳留尉氏人也祖思曠左光禄大夫父寧黄門侍郎萬齡少知名自通直郎為孟昶建威長史時袁豹江夷相係為昶司馬時人謂昶府有三素望萬齡家在㑹稽剡縣頗有素情永初末自侍中觧職東歸徴為秘書監加給事中不就尋除左民尚書復起應命遷太常出為湘州刺史在州無政績還為東陽太守又被免復為散騎常侍金紫光禄大夫元嘉二十五年卒時年七十二孔淳之字彦深魯郡魯人也祖惔尚書祠部郎父粲祕書監徴不就淳之少有髙尚愛好墳籍為太原王恭所稱居㑹稽剡縣性好山水毎有所遊必窮其幽峻或旬日忘歸嘗逰山遇沙門釋法崇因留共止遂停三載法崇嘆曰緬想人外三十年矣今乃傾蓋于兹不覺老之将至也及淳之還反不告以姓除著作佐郎太尉參軍並不就居喪至孝廬于墓側服闋與徴士戴顒王宏之及王敬宏等共為人外之逰敬宏以女適淳之子尚㑹稽太守謝方明苦要入郡終不肯往茅屋􅅫户庭草蕪徑唯牀上有數卷書元嘉初復徴為散騎侍郎乃逃于上虞縣界家人莫知所之弟默之為廣州刺史出都與别司徒王宏要淳之集冶城即日命駕東歸遂不顧也元嘉七年卒時年五十九黙之儒學注穀梁春秋黙之子熙先事在范曄傳劉凝之字志安小名長年南郡枝江人也父期公衡陽太守兄盛公髙尚不仕凝之慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其徳行州三禮辟西曹主簿舉秀才不就妻梁州刺史郭銓女也遣送豐麗凝之悉散之親屬妻亦能不慕榮華與凝之共安儉苦夫妻共乘薄笨車出市買易周用之外輒以施人為村里所誣一年二輸公調求輒與之有人嘗認其所著屐笑曰僕著之已敗今家中覓新者備君也此人後田中得所失屐送還之不肯復取元嘉初徴為祕書郎不就臨川王義慶衡陽王義季鎭江陵並遣使存問凝之答書頓首稱僕不脩民禮人或譏焉凝之曰昔老萊向楚王稱僕嚴陵亦抗禮光武未聞巢許稱臣堯舜時戴顒與衡陽王義季書亦稱僕荆州年饑義李慮凝之餧斃餉錢十萬凝之大喜将錢至市門觀有饑色者悉分與之俄頃立盡性好山水一旦擕妻子泛江湖隐居衡山之陽登髙嶺絶人迹為小屋居之采藥服食妻子皆從其志元嘉二十五年卒時年五十九龔祈字孟道武陵漢夀人也從祖元之父黎民並不應徴辟祈年十四鄉黨舉為州迎西曹不行謝晦臨州命為主簿彭城王義康舉秀才除奉朝請臨川王義慶平西參軍皆不就風姿端雅容止可觀中書郎范述見而嘆曰此荆楚仙人也衡陽王義季臨荆州發教以祈及劉凝之師覺授不應徴召辟其三子祈又徴太子舍人不起時或賦詩言不及世事元嘉十七年卒時年四十二翟法賜尋陽柴桑人也曽祖湯湯子荘荘子矯並髙尚不仕逃避徵辟矯生法賜少守家業立屋於廬山頂喪親後便不復還家不食五穀以獸皮結草為衣雖鄉親中表莫得見也州辟主簿舉秀才右參軍著作佐郎員外散騎侍郎並不就後家人至石室尋求因復逺徙違避徴聘遁跡幽深尋陽太守鄧文子表曰奉詔書徴郡民新除著作佐郎南陽翟法賜補員外散騎侍郎法賜隐跡廬山于今四世栖身幽巖人罕見者如當逼以王憲束以嚴科馳山獵草以期禽獲慮致顚殞有傷盛化乃止後卒於巖石之間不知年月陶潛字淵明或云淵明字元亮尋陽柴桑人也曽祖侃晋大司馬潛少有髙趣嘗著五栁先生傳以自況曰先生不知何許人不詳姓字宅邊有五栁樹因以為號焉閑静少言不慕榮利好讀書不求甚觧毎有㑹意欣然忘食性嗜酒而家貧不能恒得親舊知其如此或置酒招之造飲輙盡期在必醉既醉而退曽不吝情去留環堵蕭然不蔽風日裋褐穿結簞瓢屢空晏如也嘗著文章自娱頗示己志忘懐得失以此自終其自序如此時人謂之實録親老家貧起為州祭酒不堪吏職少日自觧歸州召主簿不就躬耕自資遂抱羸疾復為鎭軍建威參軍謂親朋曰聊欲弦歌以為三逕之資可乎執事者聞之以為彭澤令公田悉令吏種秫稻妻子固請種秔乃使二頃五十畆種秫五十畆種秔郡遣督郵至縣吏白應束帯見之潛嘆曰我不能為五斗米折腰向鄉里小人即日觧印綬去職賦歸去來其詞曰歸去來兮園田荒蕪胡不歸既自以心為形役奚惆悵而獨悲悟己徃之不諌知來者之可追寔迷塗其未逺覺今是而昨非舟超遥以輕颺風飄飄而吹衣問征夫以前路恨晨光之希微乃瞻衡宇載欣載奔僮僕歡迎穉子候門三徑就荒松菊猶存擕幼入室有酒停尊引壺觴而自酌盻庭柯以怡顔倚南忩而寄傲審容膝之易安園日渉而成趣門雖設而常闗䇿扶老以流愒時矯首而遐觀雲無心以出岫鳥勌飛而知還景翳翳其将入撫孤松以盤桓歸去來兮請息交而絶遊世與我以相遺復駕言兮焉求説親戚之情話樂琴書以消憂農人告余以上春将有事於西疇或命巾車或棹扁舟既窈窕以窮壑亦崎嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇内復㡬時奚不委心任去留胡為遑遑欲何之富貴非吾願帝鄉不可期懐良辰以孤徃或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑義熙末徵著作佐郎不就江州刺史王宏欲識之不能致也潛嘗徃廬山宏令潛故人龎通之齎酒具於半道栗里要之潛有脚疾使一門生二兒轝籃輿既至欣然便共飲酌俄頃宏至亦無忤也先是顔延之為劉栁後軍功曹在尋陽與潛情欵後為始安郡經過日日造潛毎徃必酣飲致醉臨去留二萬錢與潛潛悉送酒家稍就取酒嘗九月九日無酒出宅邉菊叢中坐久值宏送酒至即便就酌醉而後歸潛不觧音聲而畜素琴一張無絃毎有酒適輙撫弄以寄其意貴賤造之者有酒輙設潛若先醉便語客我醉欲眠卿可去其眞率如此郡将候潛値其酒熟取頭上葛巾漉酒畢還復著之潛弱年薄宦不潔去就之迹自以曽祖晉世宰輔耻復屈身後代自髙祖王業漸隆不復肯仕所著文章皆題其年月義熙以前則書晉氏年號自永初以來唯云甲子而已與子書以言其志并為訓戒曰天地賦命有徃必終自古賢聖誰能獨免子夏言曰死生有命富貴在天四友之人親受音㫖發斯談者豈非窮達不可妄求壽夭永無外請故邪吾年過五十而窮苦荼毒家貧弊東西逰走性剛才拙與物多忤自量為己必貽俗患僶俛辭世使汝幼而饑寒耳常感孺仲賢妻之言敗絮自擁何慙兒子此既一事矣但恨隣靡二仲室無萊婦抱兹苦心良獨罔罔少年來好書偶愛閑静開卷有得便欣然忘食見樹木交䕃時鳥變聲亦復歡爾有喜嘗言五六月北牕下卧遇涼風暫至自謂是義皇上人意淺識陋日月遂徃緬求在昔𦕈然如何疾患以來漸就衰損親舊不遺毎以藥石見救自恐大分将有限也恨汝輩稚小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆弟兄之義鮑叔敬仲分財無猜歸生伍舉班荆道舊遂能以敗為成因喪立功他人尚爾況共父之人哉潁川韓元長漢末名士身處卿佐八十而終兄弟同居至於没齒濟北汜稚春晉時操行人也七世同財家人無怨色詩云髙山仰止景行行止汝其愼哉吾復何言又為命子詩以貽之曰悠悠我祖爰自陶唐邈為虞賔歴世垂光御龍勤夏豕韋翼商穆穆司徒厥族以昌紛紜戰國漠漠衰周鳯隐于林幽人在丘逸虬撓雲奔鯨駭流天集有漢眷予愍侯於赫愍侯運當攀龍撫劒夙邁顯兹武功參誓山河啟土開封亹亹丞相允廸前蹤渾渾長源蔚蔚洪柯羣川載導衆條載羅時有默語運固隆汙在我中晉業融長沙桓桓長沙伊勲伊徳天子疇我専征南國功遂辭歸臨寵不惑孰謂斯心而可近得肅矣我祖慎終如始直方二臺恵和千里於皇仁考淡焉虚止寄迹夙運㝠兹愠喜嗟余寡陋瞻望靡及顧慙華鬢負景隻立三千之罪無後其急我誠念哉呱聞爾泣卜云嘉日占爾良時名爾曰儼字爾求思温㳟朝夕念兹在兹尚想孔伋庶其企而厲夜生子遽而求火凡百有心奚待于我既見其生實欲其可人亦有言斯情無假日居月諸漸免于孩福不虚至禍亦易來夙興夜寐願爾斯才爾之不才亦已焉哉潛元嘉四年卒時年六十三宗彧之字叔粲南陽湼陽人炳從父弟也蚤孤事兄恭謹家貧好學雖文義不逮炳而眞澹過之州辟主簿舉秀才不就公私餼遺一無所受髙祖受禪徵著作佐郎不至元嘉初大使陸子眞觀采風俗三詣彧之毎辭疾不見也告人曰我布衣草萊之人少長壟畝何枉軒冕之客子眞還表薦之徵員外散騎侍郎又不就元嘉八年卒時年五十沈道䖍呉興武康人也少仁愛好老易居縣北石山下孫恩亂後饑荒縣令庾肅之迎出縣南廢頭里為立小宅臨溪有山水之玩時復還石山精廬與諸孤兄子共釜庾之資困不改節受琴於戴逵王敬宏深敬之郡州府凡十二命皆不就有人竊其園菜者還見之乃自逃隐待竊者取足去後乃出人㧞其屋後筍令人止之曰惜此筍欲令成林更有佳者相與乃令人買大筍送與之盗者慙不取道䖍使置其門内而還常以捃拾自資同捃者争穟道䖍諌之不止悉以其所得與之争者愧恧後毎争輙云勿令居士知冬月無複衣戴顒聞而迎之為作衣服并與錢一萬既還分身上衣及錢悉供諸兄弟子無衣者鄉里年少相率受學道䖍常無食無以立學徒武康令孔欣之厚相資給受業者咸得有成太祖聞之遣使存問賜錢三萬米二百斛悉以嫁娶孤兄子徴員外散騎侍郎不就累世事佛推父祖舊宅為寺至四月八日毎請像請像之日輙舉家感慟焉道䖍年老菜食恒無經日之資而琴書為樂孜孜不倦太祖敕郡縣令随時資給元嘉二十六年卒時年八十二子慧鋒脩父業辟從事皆不就郭希林武昌武昌人也曽祖翻晉世髙尚不仕希林少守家業徴州主簿秀才衛參軍並不就元嘉初吏部尚書王敬宏舉王宏之為太子庶子希林為著作佐郎後又徵員外散騎侍郎並不就十年卒時年四十七子䝉亦隐居不仕泰始中郢州刺史蔡興宗辟為主簿不就雷次宗字仲倫豫章南昌人也少入廬山事沙門釋慧逺篤志好學尤明三禮毛詩隐退不交世務本州辟從事員外散騎侍郎徵並不就與子姪書以言所守曰夫生之脩短咸有定分定分之外不可以智力求但當於所禀之中順而勿率耳吾少嬰羸患事鍾養疾為性好閑志棲物表故雖在童穉之年已懐逺迹之意暨于弱冠遂託業廬山逮事釋和尚于時師友淵源務訓𢎞道外慕等夷内懐悱發於是洗氣神明玩心墳典勉志勤躬夜以繼日爰有山水之好晤言之歡實足以通理輔性成夫亹亹之業樂以忘憂不知朝日之晏矣自游道餐風二十餘載淵匠既傾良朋凋索續以釁逆違天備嘗荼蓼疇昔誠願頓盡一朝心慮荒散情意衰損故遂與汝曹歸耕壟畔山居谷飲人理久絶日月不處忽復十年犬馬之齒已踰知命崦嵫将廹前塗㡬何實逺想尚子五岳之舉近謝居室瑣瑣之勤及今耄未至惛衰不及頓尚可厲志於所期縱心於所託棲誠來生之津梁専氣莫年之攝飬玩嵗日於良辰偷餘樂於将除在心所期盡於此矣汝等年各長成冠娶已畢脩惜衡泌吾復何憂但願守全所志以保令終耳自今以徃家事大小一勿見闗子平之言可以為法元嘉十五年徴次宗至京師開館於雞籠山聚徒教授置生百餘人㑹稽朱膺之潁川庾蔚之並以儒學監總諸生時國子學未立上留心蓺術使丹陽尹何尚之立𤣥學太子率更令何承天立史學司徒參軍謝元立文學凡四學並建車駕數幸次宗學館資給甚厚又除給事中不就久之還廬山公卿以下並設祖道二十五年詔曰前新除給事中雷次宗篤尚希古經行明脩自絶招命守志隐約宜加升引以旌退素可散騎侍郎後又徴詣京邑為築室於鍾山西巖下謂之招隐館使為皇太子諸王講喪服經次宗不入公門乃使自華林東門入延賢堂就業二十五年卒於鍾山時年六十三太祖與江夏王義恭書道次宗亡義恭答曰雷次宗不救所疾甚可痛念其幽棲窮藪自賔聖朝克己復禮始終若一伏惟天慈𢎞被亦垂矜愍子肅之頗傳其業官至豫章郡丞朱百年㑹稽山隂人也祖愷之晉右衛将軍父濤揚州主簿百年少有髙情親亡服闋攜妻孔氏入㑹稽南山以伐樵採箬為業以樵箬置道頭輙為行人所取明旦亦復如此人稍怪之積久方知是朱隐士所賣須者隨其所堪多少留錢取樵箬而去或遇寒雪樵箬不售無以自資輙自榜船送妻還孔氏天晴復迎之有時出山隂為妻買繒綵三五尺好飲酒遇醉或失之頗能言理時為詩詠徃徃有髙勝之言郡命功曹州辟從事舉秀才並不就隐迹避人唯與同縣孔凱友善凱亦嗜酒相得輙酣對飲盡懽百年家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就凱宿衣悉裌布飲酒醉眠凱以卧具覆之百年不覺也既覺引卧具去體謂凱曰綿定竒温因流涕悲慟凱亦為之傷感除太子舍人不就顔竣為東揚州發教餉百年穀五百斛不受時山隂又有寒人姚吟亦有髙趣為衣冠所重義陽王昶臨州辟為文學從事不起竣餉吟米二百斛吟亦辭之百年孝建元年卒山中時年八十七蔡興宗為㑹稽太守餉百年妻米百斛百年妻遣婢詣郡門奉辭固譲時人羙之以比梁鴻妻王素字休業琅邪臨沂人也髙祖翹之晋光禄大夫素少有志行家貧母老初為廬陵國侍郎母憂去職服闋廬陵王紹為江州親舊勸素脩宅舊居素不答乃輕身徃東陽隐居不仕頗營田園之資得以自立愛好文義不以人俗累懐世祖即位欲搜揚隐退下詔曰濟世成務咸達隐㣲軌俗興譲必表清節朕昧旦求善思惇薄風琅邪王素㑹稽朱百年並亷約貞逺與物無競自足臯畝志在不移宜加褒引以光難進並可太子舍人大明中太宰江夏王義恭開府辟召辟素為倉曹屬太宗泰始六年又召為太子中舍人並不就素既屢被徵辟聲譽甚髙山中有蚿蟲聲清長聽之使人不厭而其形甚醜素乃為蚿賦以自況七年卒時年五十四時又有宋平劉睦之汝南州韶呉郡褚伯玉亦隐身求志睦之居交州除武平太守不拜韶字伯和黄門侍郎文孫也築室湖孰之方山徵員外散騎侍郎征北行參軍不起伯玉居剡縣瀑布山三十餘載揚州辟議曹從事不就闗康之字伯愉河東楊人世居京口寓居南平昌少而篤學姿狀豐偉下邳趙繹以文義見稱康之與之友善特進顔延之見而知之晉陵顧悦之難王弼易義四十餘條康之申王難顧逺有情理又為毛詩義經籍疑滯多所論釋嘗就沙門支僧納學妙盡其能竟陵王義宣自京口遷鎮江陵要康之同行距不應命元嘉中太祖聞康之有學義除武昌國中軍将軍蠲除租税江夏王義恭廣陵王誕臨南徐州辟為從事西曹並不就棄絶人事守志閑居弟雙之為臧質車騎參軍與質俱下至赭圻病卒瘞於水濵康之其春得疾困篤小差牽以迎喪因得虗勞病寝頓二十餘年時有間日輙卧論文義世祖即位遣大使陸子眞廵行天下使反薦康之業履恒貞操朂清固行信閭黨譽延邦邑棲志希古操不可渝宜加徴聘以潔風軌不見省太宗泰始初與平原明僧紹俱徴為通直郎又辭以疾順帝昇明元年卒時年六十三史臣曰夫獨徃之人皆禀偏介之性不能摧志屈道借譽期通若使値見信之主逢時來之運豈其放情江海取逸丘樊蓋不得已而然故也且巖壑閑逺水石清華雖復崇門八襲髙城萬雉莫不蓄壤開泉髣髴林澤故知松山桂渚非止素玩碧澗清潭翻成麗矚挂冠東都夫何難之有哉宋書卷九十三宋書卷九十三考證周續之傳留愛崑卉誠著桃李崑當作昆謂昆蟲也王𢎞之傳為外祖徴士何淮所撫育淮一本作准當作凖陶潛傳曽祖侃晉大司馬臣承蒼按沈約所作陶淵明傳以陶集考之多不合集中贈長沙公詩序有云昭穆既逺己為路人又為孟府君傳有云君諱嘉娶大司馬長沙公陶侃苐十女如果為從祖之子孫不得云昭穆既逺己之曽祖斷不容直書其姓名然則淵明非長沙桓公之曽孫明矣又云自以曽祖晉世宰輔耻復屈身後代自髙祖王業漸隆不復肯仕所著文章皆題其年月義熙以前則書晉氏年號自永初以來惟云甲子而已攷陶詩俱不題年號惟祭程氏妹文稱義熙三年宋髙祖受禪改元永初是為庚申嵗集中詩凡書甲子者八年庚子辛丑癸卯乙巳戊申己酉庚戍丙辰皆在永初之前庚子辛丑癸卯又在義熙之前永初以後除自祭文題丁卯而外無有書甲子者約之紀事失實大槩如此或言梁昭明太子誤讀淵明命子詩遂作淵明傳以淵明為侃之曽孫不知宋書成于齊永明六年昭明特襲之而不改南史晉書成於唐初亦皆襲約之誤者也農人告予以上春上春本集作春及晉書作暮春而窮苦荼毒家貧弊本集作少而窮苦毎以家弊南史作而窮居荼毒無家貧弊三字良獨罔罔罔罔本集作内愧少年來好書本集作少好琴書南史少下無年字潁川韓元長宋王應麟困學紀聞云韓元長謂韓融韶子後漢有傳又下文濟北汜稚春謂汜毓晉書有傳集云范稚春誤今所刻陶集亦作汜稚春王素傳嘗就沙門支僧納學南史學字下有算字宋書卷九十三考證
