body:
  text: 宋書卷九十四梁沈約撰列傳第五十四恩倖夫君子小人類物之稱蹈道則為君子違之則為小人屠釣卑事也版築賤役也太公起為周師傅説去為殷相非論公侯之世鼎食之資明揚幽仄唯才是與逮于二漢兹道未革胡廣累世農夫伯始致位公相黄憲牛醫之子叔度名重京師且任子居朝咸有職業雖七葉珥貂見崇西漢而侍中身奉奏事又分掌御服東方朔為黄門侍郎執㦸殿下郡縣掾史並出豪家負戈宿衛皆由世族非若晚代分為二塗者也漢末䘮亂魏武始基軍中倉卒權立九品蓋以論人才優劣非為世族髙卑因此相沿遂為成法自魏至晉莫之能改州都郡正以才品人而舉世人才升降蓋寡徒以馮藉世資用相陵駕都正俗士斟酌時宜品目少多隨事俯仰劉毅所云下品無髙門上品無賤族者也嵗月遷譌斯風漸篤凡厥衣冠莫非二品自此以還遂成卑庶周漢之道以智役愚臺𨽻參差用成等級魏晋以來以貴役賤士庶之科較然有辨夫人君南面九重奥絶陪奉朝夕義隔卿士階闥之任宜有司存既而恩以倖生信由恩固無可憚之姿有易親之色孝建泰始主威獨運官置百司權不外假而刑政糾雜理難徧通耳目所寄事歸近習賞罰之要是謂國權出内王命由其掌握於是方塗結軌輻湊同奔人主謂其身卑位薄以為權不得重曽不知鼠慿社貴狐藉虎威外無逼主之嫌内有専用之功勢傾天下未之或悟挾朋樹黨政以賄成鈇鉞創痏構於筵笫之曲服冕乗軒出乎言笑之下南金北毳來悉方艚素縑丹魄至皆兼两西京許史蓋不足云晉朝王庾未或能比及太宗晩運慮經盛衰權幸之徒慴憚宗戚欲使幼主孤立永竊國權構造同異興樹禍隙帝弟宗王相繼屠劋民忘宋徳雖非一塗寳祚夙傾實由於此嗚呼漢書有恩澤侯表又有佞倖傳今採其名列以為恩倖篇云戴法興㑹稽山隂人也家貧父碩子販紵為業法興二兄延夀延興並脩立延夀善書法興好學山隂有陳載者家富有錢三千萬鄉人咸云戴碩子三兒敵陳載三千萬錢法興少賣葛於山隂市後為吏傳署入為尚書倉部令史大将軍彭城王義康於尚書中覓了了令史得法興等五人以法興為記室令史義康敗仍為世祖征虜撫軍記室掾上為江州仍補南中郎典籖上於巴口建義法興與典籖戴明寳蔡閑俱轉參軍督護上即位並為南臺侍御史同兼中書通事舍人法興等専管内務權重當時孝建元年加建武將軍南魯郡太守觧舍人侍太子於東宫大明二年三典籖並以南下預密謀封法興呉昌縣男明寳湘鄉縣男閑髙昌縣男食邑各三百户閑時已卒追加爵封法興轉員外散騎侍郎給事中太子旅賁中郎将太守如故世祖親覧朝政不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待雖出侍東宫而意任隆密魯郡巢尚之人士之末元嘉中侍始興王濬讀書亦渉獵文史為上所知孝建初補東海國侍郎仍並中書通事舍人凡選授遷轉誅賞大處分上皆與法興尚之參懐内外諸雜事多委明寳上性嚴暴睚眦之間動至罪戮尚之毎臨事觧釋多得全免殿省甚頼之而法興明寳大通人事多納貨賄凡所薦達言無不行天下輻湊門外成市家産並累千金明寳驕縱尤甚長子敬為揚州從事與上争買御物六宫嘗出行敬盛服騎馬於車左右馳驟去來上大怒賜敬死繫明寳尚方尋被原釋委任如初世祖崩前廢帝即位法興遷越騎校尉時太宰江夏王義恭録尚書事任同總已而法興尚之執權日久威行内外義恭積相畏服至是懾憚尤甚廢帝未親萬機凡詔勑施為悉決法興之手尚書中事無大小専斷之顔師伯義恭守空名而已廢帝年已漸長凶志轉成欲有所為法興毎相禁制毎謂帝曰官所為如此欲作營陽耶帝意稍不能平所愛幸閹人華願兒有盛寵賜與金帛無笇法興常加裁減願兒甚恨之帝常使願兒出入市里察聴風謡而道路之言謂法興為眞天子帝為贋天子願兒因此告帝曰外間云宫中有兩天子官是一人戴法興是一人官在深宫中人物不相接法興與太宰顔栁一體吸習徃來門客恒有數百内外士庶莫不畏服之法興是孝武左右復久在宫闈今将他人作一家深恐此坐席非復官許帝遂發怒免法興官遣還田里仍復徙付逺郡尋又於家賜死時年五十二法興臨死封閉庫藏使家人謹録鑰牡死一宿又殺其二子截法興棺焚之籍没財物法興能為文章頗行於世死後帝敕巢尚之曰吾纂承洪基君臨萬國推心勲舊著於遐邇不謂戴法興恃遇負恩専作威福冒憲黷貨號令自由積釁累愆遂至於此卿等忠勤在事吾乃具悉但道路之言異同紛糾非唯人情駭愕亦𤣥象違度委付之㫖良失本懐吾今自親覧萬機留心庶事卿等宜竭誠盡力以副所期尚之時為新安王子鸞撫軍中兵參軍淮陵太守乃觧舍人轉為撫軍咨議參軍太守如故太宗泰始二年詔曰故越騎校尉呉昌縣開國男戴法興昔從孝武誠懃左右入定社稷預誓河山及出侍東儲竭盡心力嬰害凶悖朕甚愍之可追復削注還其封爵有司奏以法興孫靈珍襲封又詔曰法興小人専權豪恣雖虐主所害義由國討不宜復貪人之封封爵可停太宗初復以尚之兼中書通事舍人南清河太守二年遷中書侍郎太守如故未拜改除前軍将軍太守如故侍太子於東宫晉安王子勛平後以軍守管内封邵陵縣男食邑四百户固辭不受轉黄門侍郎出為新安太守病卒戴明寳南東海丹徒人也亦歴員外散騎侍郎給事中世祖世帶南清河太守前廢帝即阼權任悉歸法興而明寳輕矣以為宣威將軍南東莞太守景和末増邑百户太宗初天下反叛軍務煩擾以明寳舊人屢經戎事復委任之以前軍将軍事平遷宣威将軍晉陵太守進爵為侯増邑四百户泰始三年坐參掌戎事多納賄貨削増封官爵繫尚方尋被宥復為安陸太守加寧朔將軍游擊驍騎将軍武陵内史宣城太守順帝驃騎司馬昇明初年老拜太中大夫病卒武陵國典書令董元嗣與法興明寳等俱為世祖南中郎典籖元嘉三十年奉使還都值元凶弑立遣元嗣南還報上以徐湛之等反上時在巴口元嗣具言弑狀上遣元嗣下都奉表於劭既而上舉義兵劭責元嗣元嗣答曰始下未有反謀劭不信備加考掠不服遂死世祖事克追贈員外散騎侍郎使文士蘇寳生為之誄焉大明中又有奚顯度者南東海郯人也官至員外散騎侍郎世祖常使主領人功而苛虐無道動加捶撲暑雨寒雪不聴暫休人不堪命或有自經死者人役聞配顯度如就刑戮時建康縣考囚或用方材壓頟及踝脛民間謡曰寧得建康壓頟不能受奚度拍又相戲曰勿反顧付奚度其酷暴如此前廢帝嘗戲云顯度刻虐為百姓所疾比當除之左右因倡諾即日宣㫖殺焉時人比之孫皓殺岑昬徐爰字長玉南琅邪開陽人也本名瑗後以與傅亮父同名改為爰初為晋琅邪王大司馬府中典軍從北征微密有意理為髙祖所知少帝在東宫入侍左右太祖初又見親任歴治吏勞遂至殿中侍御史元嘉十二年轉南臺侍御史始興王濬後軍復侍太子於東宫遷員外散騎侍郎太祖毎出軍行師常懸授兵略二十九年重遣王元謩等北伐配爰五百人隨軍向碻磝銜中㫖臨時宣示世祖至新亭大將軍江夏王義恭南奔爰時在殿内誑劭追義恭因得南走時世祖將即大位軍府造次不曉朝章爰素諳其事既至莫不喜説以兼太常丞撰立儀注孝建初補尚書水部郎轉為殿中郎兼右丞孝建三年索虜宼邉詔問羣臣防禦之䇿爰議曰詔㫖虜犯邉塞水陸遼逺孤城危棘復不可置臣以戎虜猖狂狡焉滋廣列卒擬候伺覘間隙不勞大舉終莫永寧然連於千里費固巨萬而中興造創資儲未積是以齊斧徘徊朔氣稽掃今皇運洪休靈威遐懾蠢爾遺燼懼在誅剪思肆蜂蠆以表有餘雖不敢深入濟沛或能草竊邉塞羽林鞭長太倉遥阻救援之日勢不相及且當使縁邉諸戍練卒嚴城凡諸督統聚糧蓄田籌計資力足相抗擬小鎮告警大督電赴塢壁邀斷州郡犄角儻有自送可使匹馬不反詔㫖胡騎倐忽抄㬥無漸出耕見虜野粒資㓂比及少年軍實無擬江東根本不可俱竭宜立何方可以相贍臣以為方鎭所資寔宜且田且守若使堅壁而春墾輟耕清野而秋登莫擬私無生業公成虚罄逺引根本二三非宜救之之術唯在盡力防衛來必拒戰去則邀躡據險保隘易為首尾胡馬既退則民豐廪實比及三載可以長驅詔㫖賊之所向本無前謀兵之所進亦無定所比嵗戎戍倉庫多虛先事聚衆則消費糧粟敵至倉卒又無以相應臣以為推鋒前討大須資力據本應末不俟多衆今宼無傾國豕突列城勢足脣齒飬卒得勇所任得才臨事而懼應機無失豈煩空聚兵衆以待未然詔㫖戎狄貪婪唯利是䂓不挫凶圖姦志嵗結臣以為不擊則必侵掠侵掠不已則民失農桑農桑不収則王戍不立為立之方擊之為要詔㫖若今邉地嵗驚公私失業經費困於遥輸逺圖決無遂事寝弊贊略逆應有方臣以為威虜之方在於積粟塞下若使邉民失業列鎭寡儲非唯無以逺圖亦不能制其侵抄今當使小戍制其始宼大鎮赴其入境一被毒手便自吹韲鳥逝矣尋即眞遷左丞先是元嘉中使著作郎何承天草創國史世祖初又使奉朝請山謙之南臺御史蘇寳生踵成之六年又以爰領著作郎使終其業爰雖因前作而専為一家之書上表曰臣聞虞史炳圗原光被之羙夏載昭策先隨山之勤天飛雖王徳所至終陟固有資田躍神宗始於俾乂上日兆於納揆其在殷頌長發𤣥王受命作周寔唯雝伯考行之盛則振古之𢎞軌降逮二漢亦同兹義基帝剏乎豐郊紹祚本於昆邑魏以武命國志晉以宣啓陽秋明黄初非更姓之本太始為造物之末又近代之令凖式逺之鴻規典謀緬邈紀傳成凖善惡具書成敗畢記然餘分紫色滔天泯夏親所芟夷而不序於始傳渉聖卓紹煙起雲騰非所誅滅而顕冠乎首述豈不以事先歸之前錄功偕著之後撰伏惟皇宋承金行之澆季鍾經綸之屯極擁𤣥光以鳯翔秉神符而龍舉劋定鯨鯢天人佇屬晉禄數終上帝臨宋便應奄膺紘㝢對越神工而恭服勤於三分讓徳邁於不嗣其為巍巍蕩蕩赫赫明明歴觀逖聞莫或斯等宜衣銜書改文登舟變號起元義熙為王業之始載序宣力為功臣之斷其偽元簒竊同於新莽雖靈武克殄自詳之晉録及犯命干紀受戮霸朝雖揖禪之前皆著之宋䇿國典體大方垂不朽請外詳議伏須遵承於是内外博議太宰江夏王義恭等三十五人同爰議宜以義熙元年為斷散騎常侍巴陵王休若尚書金部郎檀道鸞二人謂宜以元興三年為始太學博士虞龢謂宜以開國為宋公元年詔曰項籍聖公編録二漢前史已有成列桓元傳宜在宋典餘如爰議七年爰遷㳺擊将軍其年世祖南廵權以本官兼尚書左丞車駕還宫罷明年又兼左丞著作兼如故世祖崩營景寧陵爰以本官兼将作大匠爰便僻善事人能得人主㣲㫖頗渉書傳尤悉朝儀元嘉初便入侍左右預參顧問既長於附㑹又飾以典文故為太祖所任遇大明世委寄尤重朝廷大禮儀注非爰議不行雖復當時碩學所觧過人者既不敢立異議所言亦不見從世祖崩公除後晉安王子勛侍讀博士咨爰宜習業與不爰荅居喪讀喪禮習業何嫌少日始安王子眞博士又咨爰爰曰小功廢業三年䘮何容讀書其専斷乖謬皆如此前廢帝凶暴無道殿省舊人多見罪黜唯爰巧於将迎始終無迕誅羣公後以爰為黄門侍郎領射聲校尉著作如故封呉平縣子食邑五百户寵待隆密羣臣莫二帝毎出行常與沈慶之山隂公主同輦爰亦預焉太宗即位例削封以黄門侍郎改領長水校尉兼尚書左丞明年除太中大夫著作並如故爰秉權日久上昔在藩素所不説及景和世屈辱卑約爰禮敬甚簡益銜之泰始三年詔曰夫事君無禮教道弗容訕上􅃷已人倫所棄大中大夫徐爰㧞迹厮猥推㡿饕逄遂官參時望門伍豪族遷位轉榮莫非超荷而謟側輕險與性自俱利口䜛妄自少及長奉公在事釐毫蔑聞初無愧滿常有闚進先朝賞以芻輩之中粗有學觧故得漸䝉驅䇿出入兩宫太初偽立盡心佞事義師已震方得南奔及孝武居統唯極諂諛附㑹承㫖専恣厥性致使治政苛縱興造乖法損徳害民皆由此䜿景和悖險深相贊協茍取偷存罔顧節義任算設數取合人主㩻嶇姦矯所志必從故歴事七朝白首全貴自以體含徳厚識鑑機先迷塗遂深罔知革悟朕撥亂反正勲濟天下靈祗助順羣逆必夷況爰恩飬而無輸效遂内挾異心著於形迹陽愚杜口罔所陳聞惰事緩文庶申詭略當今朝列賢彦國無佞邪而秉心弗純累蠧時政以其自告之辰用賜歸老之職榮禮優崇寧非饕過不謂潛怨㡿外進競不已勤言託意觸遇斯發小人之情雖所先照猶許其當改未忍加法遂恃朕仁𢎞必永容貸昨因觴宴肆意譏毁謂制詔所為皆資傍説又宰輔無斷朝要非才恃老與舊慢戾斯甚比邉難未静安衆以惠戎略是務政網從簡故得使此小物乗寛自縱乃合投畀豺虎以清王猷但朽顇將盡不足窮法可特原罪徙付交州爰既行又詔曰八議緩罪舊在一條五刑所抵耆必加貸徐爰前後釁迹理無可申廢棄海埵寔允國憲但蚤䝉朕識曲矜愚朽既經大宥思沾殊渥可特除廣州統内郡有司奏以為宋隆太守除命既下爰已至交州値刺史張牧病卒土人孝長仁為亂悉誅北來流寓無或免者長仁素聞爰名以智計誑誘故得無患久之聴還仍除南康郡丞太宗崩還京都以爰為南濟隂太守復除中散大夫元徽三年卒時年八十二阮佃夫㑹稽諸曁人也元嘉中出身為臺小史太宗初出閤選為主衣世祖召還左右補内監永光中太宗又請為世子師甚見信待景和末太宗被拘於殿内住在祕書省為帝所疑大禍将至惶懼計無所出佃夫與王道隆李道兒及帝左右琅邪淳于文祖謀共廢立時直閤将軍栁光世亦與帝左右蘭陵繆方盛丹陽周登之有密謀未知所奉登之與太宗有舊方盛等乃使登之結佃夫佃夫大説先是帝立皇后普暫徹諸王奄人太宗左右錢藍生亦在其例事畢未被遣密使藍生候帝慮事泄藍生不欲自出帝動止輙以告淳于文祖令文祖報佃夫景和元年十一月二十九日晡時帝出幸華林園建安王休仁山陽王休祐山隂公主並侍側太宗猶在祕書省不被召益憂懼佃夫以告外監典事東陽朱幼又告主衣呉興夀寂之細鎧主南彭城姜産之産之又語所領細鎧將臨淮王敬則幼又告中書舍人戴明寳並響應明寳幼欲取其曰向曉佃夫等勸取開鼓後幼豫約勒内外使錢藍生密報建安王休仁等時帝欲南廵腹心直閤將軍宋越等其夕並聽出外裝束唯有隊主樊僧整防華林閤是栁光世鄉人光世要之僧整即受命姜産之又要隊副陽平聶慶及所領壯士㑹稽富靈符呉郡俞道龍丹陽宋逵之陽平田嗣並聚於慶省佃夫慮力少不濟更欲招合夀寂之曰謀廣或泄不煩多人時巫覡云後堂有鬼其夕帝於竹林堂前與巫共射之建安王休仁等山隂主並從帝素不説寂之見輒切齒寂之既與佃夫成謀又慮禍至抽刀前入姜産之隨其後淳于文祖繆方盛周登之富靈符聶慶田嗣王敬則俞道龍宋逵之又繼進休仁聞行聲甚疾謂休祐曰事作矣相隨奔景陽山帝見寂之至引弓射之不中乃走寂之追而殞之事定宣令宿衛曰湘東王受太后令除狂主今已平定太宗即位論功行賞夀寂之封應城縣侯食邑千户姜産之汝南縣侯佃夫建城縣侯食邑八百户王道隆呉平縣侯淳于文祖陽城縣侯食邑各五百户李道兒新塗縣侯繆方盛劉陽縣侯周登之曲陵縣侯食邑各四百户富靈符惠懐縣子聶慶建陽縣子田嗣將樂縣子王敬則重安縣子俞道隆荼陵縣子宋逵之零陵縣子食邑各三百户佃夫遷南臺侍御史薛索皃渡淮為宼山陽太守程天祚又反佃夫與諸軍討之破索皃降天祚遷龍驤將軍司徒參軍率所領南助赭圻轉太子歩兵校尉南魯郡太守侍太子於東宫泰始四年以破薛索皃功増封二百户并前千户以本官兼游擊將軍假寧朔將軍與輔國將軍兼驍騎將軍孟次陽與二衛參員直次陽字崇基平昌安丘人也太始初為山陽王休祐驃騎參軍薛安都子道摽攻合肥次陽擊破之以功封攸縣子食邑三百户歴右軍驃騎將軍六年出為輔師將軍兗州刺史戍淮隂立北兗州自此始也進號冠軍將軍元徽四年卒時佃夫王道隆楊運長並執權柄亞於人主巢戴大明之世方之蔑如也嘗値正旦應合朔尚書奏遷元㑹佃夫曰元正慶㑹國之大禮何不遷合朔日邪其不稽古如此大通貨賄凡事非重賂不行人有餉絹二百匹嫌少不荅書宅舍園池諸王邸第莫及妓女數十藝貌冠絶當時金玉錦繡之飾宫掖不逮也毎製一衣造一物京邑莫不法效焉於宅内開瀆東出十許里塘岸整絜汎輕舟奏女樂中書舍人劉休嘗詣之値佃夫出行中路相逢要休同反就席便命施設一時珍羞莫不畢備凡諸火劑並皆始熟如此者數十種佃夫嘗作數十人饌以待賔客故造次便辦類皆如此雖晉世王石不能過也泰始初軍功既多爵秩無序佃夫僕從附𨽻皆受不次之位捉車人虎賁中郎傍馬者員外郎朝士貴賤莫不自結而矜傲無所降意入其室者唯呉興沈勃呉郡張澹數人而已泰豫元年除寧朔将軍淮南太守遷驍騎将軍尋加淮陵太守太宗晏駕後廢帝即位佃夫權任轉重兼中書通事舍人加給事中輔國將軍餘如故欲用張澹為武陵郡衛将軍袁粲以下皆不同而佃夫稱敕施行粲等不敢執元徽三年遷黄門侍郎領右軍將軍太守如故明年改領驍騎将軍其年遷使持節督南豫州諸軍事冠軍将軍南豫州刺史歴陽太守猶管内任以平建平王景素功増邑五百户時廢帝猖狂好出遊走始出宫猶整羽儀引隊仗俄而棄部伍單騎與數人相隨或出郊野或入市㕓内外莫不懼憂佃夫密與直閤將軍申伯宗歩兵校尉朱幼于天寳謀共廢帝立安成王五年春帝欲徃江乗射雉帝毎北出常留隊仗在樂逰苑前棄之而去佃夫欲稱太后令喚隊仗還閉城門分人守石頭東府遣人執帝廢之自為揚州刺史輔政與幼等已成謀㑹帝不成向江乗故其事不行于天寳因以其謀告帝帝乃收佃夫幼伯宗於光禄外部賜死佃夫幼罪止身其餘無所問佃夫時年五十一幼泰始初為外監配張永諸軍征討有濟辦之能遂官渉二品為奉朝請南髙平太守封安浦縣侯食邑二百户于天寳其先胡人預竹林堂功元徽中自陳功勞求加封爵乃封為鄂縣子食邑二百户發佃夫之謀以為清河太守右軍將軍昇明元年出為山陽太守齊王以其反覆賜死壽寂之泰始初以軍功増邑二百户為羽林監遷太子屯騎校尉尋加寜朔将軍南太山太守多納貨賄請謁無窮有一不從切齒罵詈常云利刃在手何憂不辦鞭尉吏斫邏將七年為有司所奏徙送越州行至豫章謀欲逃叛乃殺之姜産之泰始初以軍功増邑二百户為晉平王休祐驃騎中兵參軍龍驤将軍南濟隂太守三年北伐與虜戰軍敗見殺追贈左軍将軍太守如故李道皃臨淮人本為湘東王師稍至湘東國學官令太宗即位稍進至員外散騎侍郎淮陵太守泰始二年兼中書通事舍人轉給事中四年病卒王道隆呉興烏程人兄道迄渉學善書形貌又羙呉興太守王韶之謂人曰有子弟如王道迄無所少始興王濬以為世子師以書補中書令史道隆亦知書為主書書吏漸至主書世祖使傳命失㫖遣出不聴復入六門太宗鎭彭城以補典籖署内監及即位為南臺侍御史稍至員外散騎侍郎南蘭陵太守泰始二年兼中書通事舍人以破晉陵功増邑百户并前六百户五年出侍東宫復兼中書通事舍人後廢帝即位自太子翊軍校尉遷右軍将軍太守兼舍人如故道隆為太宗所委過於佃夫和謹自保不妄毁傷人執權既久家産豊積豪麗雖不及佃夫而精整過之元徽二年太尉桂陽王休範奄至新亭佃夫留守殿内而道隆領羽林精兵向朱雀門時賊已至斻南道隆忽召鎭軍將軍劉勔於石頭勔至命開斻道隆怒曰賊至但當急擊寧可開斻自弱邪勔不敢復言催勔進戰勔度斻便敗賊乗勝逕進道隆棄衆走向臺所乗馬連聳跼不肯前遂為賊兵及見殺事平車駕臨哭贈輔國将軍益州刺史子法貞嗣齊受禪國除楊運長宣城懐安人初為宣城郡吏太守范曅觧吏名素善射太宗初為皇子出運長為射師性謹慤為太宗所委信及即位親遇甚厚與佃夫道隆李道兒等並執權要稍至員外散騎侍郎南平昌太守泰始七年出侍東宫後廢帝即位與佃夫俱兼通事舍人加龍驤将軍轉給事中以平桂陽王休範功封南城縣子食邑八百户元徽三年自安成王車騎中兵參軍遷後軍將軍兼舍人如故運長質木廉正治身甚清不事園宅不受餉遺而凡鄙無識知唯與寒人潘智徐文盛厚善動止施為必與二人量議文盛為奉朝請預平桂陽王休範封廣晉縣男食邑四百户順帝即位出運長為寧朔将軍宣城太守尋去郡還家沈攸之反運長有異志齊王遣驃騎司馬崔文仲討誅之史臣曰竭忠盡節士子恒圖隨方致用明君盛典舊非本舊因新以成舊者也狎非先狎因疎以成狎者也而任隔疎情殊塗一致權歸近狎異世同規雖復漢髙之簡易光武之謹厚猶豐沛多顕白水先華況世祖之泥滯鄙近太宗之拘攣愛習欲不紛惑床笫豈可得哉宋書卷九十四宋書卷九十四考證徐爰傳項籍聖公編録二漢前史已有成列列當作例宋書卷九十四考證
