body:
  text: 宋書卷九十七梁沈約撰列傳第五十七夷蠻南夷西南夷大扺在交州之南及西南居大海中洲上相去或三五千里逺者二三萬里乘舶舉㠶道里不可詳知外國諸夷雖言里數非定實也南夷林邑國髙祖永初二年林邑王范陽邁遣使貢獻即加除授太祖元嘉初侵暴日南九德諸郡交州刺史杜宏文建牙聚衆欲討之聞有代乃止七年陽邁遣使自陳與交州不睦求䝉恕宥八年又遣樓船百餘㓂九徳入四㑹浦口交州刺史阮彌之遣隊主相道生三千人赴討攻區粟城不剋引還林邑欲伐交州借兵於扶南王扶南不從十年陽邁遣使上表獻方物求領交州詔答以道逺不許十二十五十六十八年頻遣貢獻而寇盜不已所貢亦陋薄太祖忿其違慠二十三年使龍驤將軍交州刺史檀和之伐之遣太尉府振武將軍宗慤受和之節度和之遣府司馬蕭景憲為前鋒慤仍領景憲軍副陽邁聞將見討遣使上表求還所畧日南民户奉獻國珍太祖詔和之陽邁果有欵誠許其歸順其年二月軍至朱梧戍遣府户曹參軍日南太守姜仲基前部賊曹參軍蟜宏民隨傳詔畢願髙精奴等宣揚恩㫖陽邁執仲基精奴等二十八人遣宏民反命外言歸欵猜防愈嚴景憲等乃進軍向區粟城陽邁遣大帥范扶龍大戍區粟又遣水歩軍徑至景憲破其外救盡銳攻城五月剋之斬扶龍大首獲金銀雜物不可勝計乗勝追討即尅林邑陽邁父子並挺身奔逃所獲珍異皆是未名之寳上嘉將帥之功詔曰林邑介恃遐險乆稽王誅龍驤將軍交州刺史檀和之忠果到列思畧經濟禀命致討萬里摧鋒法命肅齊文武畢力潔己奉公以身率下故能立勲海外震服殊俗宜加褒飾參管近侍可黄門侍郎領越騎校尉行建武將軍龍驤司馬蕭景憲恊贊軍首勤㨗顯著總勒前驅尅殄巢穴必能威服荒夷撫懐民庶可持節督交州廣州之鬱林寧浦二郡諸軍事建威將軍交州刺史龍驤司馬童林之九眞太守傅蔚祖戰死並贈給事中世祖孝建二年林邑又遣長史范龍䟦奉使貢獻除龍䟦揚武將軍大眀二年林邑王范神成又遣長史范流奉表獻金銀器及香布諸物太宗泰豫元年又遣使獻方物初檀和之被徴至豫章値豫章民胡誕世等反因討平之并論林邑功封雲杜縣子食邑四百户和之髙平金鄉人檀憑子也太祖元嘉二十七年自太子左衛率為世祖鎮軍司馬輔國將軍彭城太守元凶弑立以為西中郎將雍州刺史世祖入討加輔國將軍統豫州戍事因出南奔世祖即位以為右衛將軍孝建二年除輔國將軍豫州刺史不行復為右衛加散騎常侍三年出為南兖州刺史坐酣飲黷貨迎獄中女子入内免官禁錮其年卒追贈左將軍諡曰襄子廣州諸山並俚獠種類繁熾前後屢為侵暴歴世患苦之世祖大眀中合浦大帥陳檀歸順拜龍驤將軍四年檀表乞官軍征討未附乃以檀為髙興太守將軍如故遣前朱提太守費沈龍驤將軍武期率衆南伐并通朱崖道並無功輙殺檀而反沈下獄死扶南國太祖元嘉十一十二十五年國王持黎䟦摩遣使奉獻西南夷訶羅陁國元嘉七年遣使奉表曰伏承聖主信重三寳興立塔寺周滿國界城郭荘嚴清淨無穢四衢交通廣博平坦臺殿羅列狀若衆山莊嚴微妙猶如天宫聖王出時四兵具足導從無數以為守衛都人士女麗服光飾市㕓豐富珍賄無量王法清整無相侵奪學徒遊集三乘競進敷演正法雲布雨潤四海流通萬國交會長江𦕈漫清淨深廣有生咸資莫能銷穢隂陽調和災厲不行誰有斯羙大宋揚都聖王無倫臨覆上國有大慈悲子育萬物平等忍辱怨親無二濟乏周窮無所藏積靡不照達如日之眀無不受樂猶如淨月宰輔賢良羣臣貞潔盡忠奉主心無異想伏惟皇帝是我眞主臣是訶羅陁國王名曰堅鎧今敬稽首聖王足下惟願大王知我此心乆矣非適今也山海阻逺無縁自達今故遣使表此丹誠所遣二人一名毗紉一名婆田令到天子足下堅鎧微蔑誰能知者是故今遣二人表此㣲心此情既果雖死猶生仰惟大國藩守曠逺我即邊方藩守之一上國臣民普䝉慈澤願􅂷恩逮等彼僕臣臣國先時人衆殷盛不為諸國所見陵廹今轉衰弱鄰國競侵伏惟聖王逺􅂷覆護并市易徃反不為禁閉若見哀念願時遣還令此諸國不見輕侮亦令大王名聲普聞扶危救弱正是今日今遣二人是臣同心有所宣啓誠寔可信願勅廣州時遣舶還不令所在有所陵奪願自今以後賜年年奉使今奉㣲物願垂哀納呵羅單國治闍婆洲元嘉七年遣使獻金剛指鐶赤鸚鵡鳥天竺國白疊古貝葉波國古貝等物十年呵羅單國王毗沙䟦摩奉表曰常勝天子陛下諸佛世尊常樂安隠三達六通為世間道是名如來應供正覺遺形舎利造諸塔像莊嚴國土如須彌山村邑聚落次第羅匝城郭館宇如忉利天宫宫殿髙廣樓閣莊嚴四兵具足能伏怨敵國土豐樂無諸患難奉承先王正法治化人民良善慶無不利處雪山隂雪水流注百川洋溢八味清淨周匝屈曲順趣大海一切衆生咸得受用於諸國土殊勝第一是名震旦大宋揚都承嗣常勝大王之業德合天心仁廕四海聖智周備化無不順雖人是天護世降生功徳寳藏大悲救世為我尊主常勝天子是故至誠五體敬禮呵羅單國王毗沙䟦摩稽首問訊其後為子所簒奪十三年又上表曰大吉天子足下離滛怒癡哀愍羣生想好具足天龍神等恭敬供飬世尊威徳身光眀照如水中月如日初闕間自䝉普照十方其白如雪亦如月光清淨如華顔色照耀威儀殊勝諸天龍神之所恭敬以正法寳梵行衆僧莊嚴國土人民熾盛安隠快樂城閤髙峻如乾他山衆多勇士守護此城樓閣莊嚴道巷平正著種種衣猶如天服於一切國為最殊勝吉揚州城無憂天主愍念羣生安樂民人律儀清淨慈心深廣正法治化供飬三寳名稱逺至一切並聞民人樂見如月初生譬如梵王世界之主一功人天恭敬作禮呵羅單䟦摩以頂禮足猶如現前以體布地如殿陛道供飬恭敬如奉世尊以頂著地曲躬問訊忝承先業嘉慶無量忽為惡子所見争奪遂失本國今唯一心歸誠天子以自存命今遣毗紉問訊大家意欲自徃歸誠宣訴復畏大海風波不達今命得存亦由毗紉此人忠志其恩難報此是大家國今為惡子所奪而見驅擯意頗忿惋規欲雪復伏願大家聽毗紉買諸鎧仗袍襖及馬願為料理毗紉使得時還前遣闍邪仙婆羅訶䝉大家厚賜悉惡子奪去啓大家使知今奉薄獻願􅂷納受此後又遣使二十六年太祖詔曰訶羅單媻皇媻達三國頻越遐海款化納貢逺誠宜甄可並加除授乃遣使策命之曰惟汝慕義款化效誠荒遐恩之所洽殊逺必甄用敷典章顯兹䇿授爾其欽奉凝命永固厥職可不愼歟二十九年又遣長史媻和沙彌獻方物媻皇國元嘉二十六年國王舎利媻羅䟦摩遣使獻方物四十一種太祖䇿命之為媻皇國王曰惟爾仰政邊城率貢來庭皇澤凱被無幽不治宜班典䇿授兹嘉命爾其祗順禮度式保厥終可不愼歟二十八年復貢獻世祖孝建三年又遣長史竺那媻智奉表獻方物以那媻智為振威將軍大眀三年獻赤白鸚鵡大眀八年太宗泰始二年又遣使貢獻太宗以其長史竺須羅達前長史振威將軍竺那媻智並為龍驤將軍媻達國元嘉二十六年國王舎利不陵伽䟦摩遣使獻方物太祖䇿命之為媻達國王曰惟爾仰化懐誠馳慕聲教皇風遐曁荒服來款是用加兹顯䇿式甄義順爾其祗順憲典永終休福可不愼歟二十六年二十八年復遣使獻方物闍婆婆達國元嘉十二年國王師黎婆逹陁阿羅䟦摩遣使奉表曰宋國大主大吉天子足下敬禮一切種智安隠天人師降伏四魔成等正覺轉尊法輪度脫衆生教化已周入于涅槃舎利流布起无量塔衆寳莊嚴如須彌山經法流布如日照眀無量淨僧猶如列宿國界廣大民人衆多宫殿城郭如㣼利天宫名大宋揚州大國大吉天子安處其中紹繼先聖王有四海閻浮提内莫不來服悉以兹水普飲一切我雖在逺亦霑靈潤是以雖隔巨海常遥臣屬願照至誠􅂷哀納受若蒙聽許當年遣信若有所湏惟命是獻伏願信受不生異想今遣使主佛大陁婆副使葛抵奉宣㣲誠稽首敬禮大吉天子足下陁婆所啓願見信受諸有所請唯願賜聽今奉微物以表㣲心師子國元嘉五年國王刹利摩訶南奉表曰謹白大宋明主雖山海殊隔而音信時通伏承皇帝道徳髙逺覆載同於天地明照齊乎日月四海之外無徃不伏方國諸王莫不遣信奉獻以表歸德之誠或泛海三年陸行千日畏威懐徳無逺不至我先王以來唯以脩徳為正不嚴而治奉事三寳道濟天下欣人為善慶若在己欲與天子共𢎞正法以度難化故託四道人遣二白衣送牙臺像以為信誓信還願垂音告至十二年又復遣使奉獻天竺迦毗黎國元嘉五年國王月愛遣使奉表曰伏聞彼國據江傍海山川周固衆妙悉備莊嚴清淨猶如化城宫殿莊嚴街巷平坦人民充滿歡娱安樂聖王出逰四海隨從聖明仁愛不害衆生萬邦歸仰國富如海國中衆生奉順正法大王仁聖化之以道慈施羣生無所遺惜帝修淨戒軌道不及無上法船濟諸沈溺羣寮百官受樂無怨諸天擁護萬神侍衛天魔降伏莫不歸化王身莊嚴如日初出仁澤普潤猶如大雲聖賢承業如日月天於彼眞丹最為殊勝臣之所住名迦毗河東際于海其城四邊悉紫紺石首羅天護令國安隠國王相承未嘗斷絶國中人民率皆修善諸國來集共遵道法諸寺舎中皆七寳形像衆妙供具如先王法臣自修檢不犯道禁臣名愛月棄世王種惟願大王聖體和善羣臣百官悉自安隠今以此國羣臣吏民山川珍寳一切歸屬五體歸誠大王足下山海遐隔無由朝覲宗仰之至遣使下承使主父名天魔悉達使主名尼陁達此人由來良善忠信是故今遣奉使表誠大王若有所湏珍竒異物悉當奉送此之境土便是王國王之法令治國善道悉當承用願二國信使往來不絶此反使還願賜一使具宣聖命備勅所宜欵至之誠望不空反所白如是願加哀愍奉獻金剛指鐶摩勒金環諸寳物赤白鸚鵡各一頭太宗泰始二年又遣使貢獻以其使主竺扶大竺阿彌並為建威將軍元嘉十八年蘇摩黎國王那隣那羅䟦摩遣使獻方物世祖孝建二年斤陁利國王釋婆羅那隣陁遣長史竺留陁及多獻金銀寳器後廢帝元徽元年婆黎國遣使貢獻凢此諸國皆事佛道佛道自後漢眀帝法始東流自此以來其教稍廣自帝王至於民庶莫不歸心經誥充積訓義深逺別為一家之學焉元嘉十二年丹陽尹蕭摩之奏曰佛化被于中國已歴四代形像塔寺所在千數進可以繋心退足以招勸而自頃以來情敬浮末不以精誠為至更以奢競為重舊宇頽弛曽莫之修而各務造新以相姱尚甲第顯宅於兹始盡材竹銅綵糜損無極無闗神祗有累人事建中越制宜加裁檢不為之防流道未息請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舎皆先詣在所二千石通辭郡依事列言本州須許報然後就功其有輙造寺舎者皆依不承用詔書律銅宅林苑悉沒入官詔可又沙汰沙門罷道者數百人世祖大眀二年有曇標道人與羌人髙闍謀反上因是下詔曰佛法訛替沙門混雜未足扶濟鴻教而專成逋藪加姧心頻發凶狀屢聞敗亂風俗人神交怨可付所在精加沙汰後有違犯嚴加誅坐於是設諸條禁自非戒行精苦並使還俗而諸寺尼出入宫掖交闗妃后此制竟不能行先是晉世庾氷始創議欲使沙門敬王者後桓元復述其義並不果行大眀六年世祖使有司奏曰臣聞䆳宇崇居非期宏峻拳跪槃伏非止敬恭將以施張四維締制八㝢故雖儒法枝派名墨條分至於崇親嚴上厥繇靡爽唯浮圖為教逿自龍堆反經提傳訓遐事逺練生瑩識恒俗稱難宗旨緬謝㣲言淪隔拘文蔽道在末彌扇遂乃陵越典度偃倨尊戚失隨方之𦕈迹迷製化之淵義夫佛法以謙儉自牧忠䖍為道不輕比丘遭道人斯拜目連桑門過長則禮寧有屈膝四軰而簡體二親稽顙耆臘而直體萬乘者哉故咸康創議元興載述而事屈偏黨道挫餘分今鴻源遥洗羣流仰鏡九仙盡寳百神聳職而畿輦之内舎弗臣之氓陛席之間延抗禮之客懼非所以澄一風範詳示景則者也臣等參議以為沙門接見比當盡䖍禮敬之容依其本俗則朝徽有序乘方兼遂矣詔可前廢帝初復舊世祖寵姫殷貴妃薨為之立寺貴妃子子鸞封新安王故以新安為寺號前廢帝殺子鸞乃毁廢新安寺驅斥僧徒尋又毁中興天寳諸寺太宗定亂下令曰先帝建中興及新安諸寺所以長世垂範𢎞宣盛化頃遇昬虐法像殘毁師徒奔迸甚以矜懐妙訓淵謨有扶名教可招集舊僧普各還本並使材官隨宜修復宋世名僧有道生道生彭城人也父為廣武令生出家為沙門法大弟子㓜而聰悟年十五便能講經及長有異解立頓悟義時人推服之元嘉十一年卒於廬山沙門慧琳為之誄慧琳者秦郡秦縣人姓劉氏少出家住冶城寺有才章兼外内之學為廬陵王義眞所知嘗著均善論其詞曰有白學先生以為中國聖人經綸百世其徳𢎞矣智周萬變天人之理盡矣道無隠旨教㒺遺筌聰叡廸􅈒何負於殊論哉有黑學道士陋之謂不照幽㝠之途弗及來生之化雖尚虚心未能虚事不逮西域之深也於是白學訪其所以不逮云尒白曰釋氏所論之空與老氏所言之空無同異乎黑曰異釋氏即物為空空物為一老氏有無兩行空有為異安得同乎白曰釋氏空物物信空邪黒曰然空又空不翅於空矣白曰三儀靈長於宇宙萬品盈生於天地孰是空哉黒曰空其自性之有不害因假之體也今構羣材以成大厦㒺專寢之寔積一毫以致合抱無檀木之體有生莫俄頃之留太山蔑累息之固興滅無常因縁無主所空在於性理所難據於事用吾以為悮矣白曰所言寔相空者其如是乎黒曰然白曰浮變之理交於目前視聽者之所同了邪解之以登道塲重之以輕異學誠未見其淵深黒曰斯理若近求之實逺夫情之所重者虚事之可重者實今虚其眞寔離其浮偽愛欲之惑不得不去愛去而道塲不登者吾不知所以相曉也白曰今析豪空樹無闕乘廕之茂離材虚室不損輪奐之美眀無常増其愒䕃之情陳若徧篤其競辰之慮貝錦以繁采發輝和羮以鹽梅致旨齊侯追爽鳩之樂燕王無延年之術恐和合之辯危脆之教正足戀其嗜好之欲無以傾其愛競之感也黒曰斯固理絶於諸華墳素莫之及也白曰山髙累卑之辭川樹積小之詠舟壑火傳之談堅白唐肆之論盖盈於中國矣非理之奥故不舉以為教本耳子固以遺情遺累虚心為道而據事剖析者更由指掌之間乎黒曰周孔為教正及一世不見來生無窮之縁積善不過子孫之慶累惡不過餘殃之罸報効止於榮禄誅責極於窮賤視聽之外㝠然不知良可悲矣釋迦闡無窮之業㧞重闗之險陶方寸之慮宇宙不足盈其眀設一慈之救羣生不足勝其化叙地獄則民懼其罪敷天堂則物歡其福指􅅺洹以長歸乘法身以遐覽神變無不周靈澤靡不覃先覺翻翔於上世後悟騰翥而不紹坎井之局何以識大方之家乎白曰固能大其言矣今効神光無徑寸之眀驗靈變㒺纖介之異勤誠者不覩善救之貎篤學者弗剋陵虚之實徒稱無量之壽孰見期頤之叟咨嗟金剛之固安覿不朽之質茍於事不符宜尋立言之指遺其所寄之說也且要天堂以就善曷若服義而蹈道懼地獄以敕身孰與從理以端心禮拜以求免罪不由祇肅之意施一以徼百倍弗乘無恡之情美泥洹之樂生躭逸之慮贊法身之妙肇好竒之心近欲未弭逺利又興雖言菩薩無欲羣生固以有欲矣甫救交敝之氓永開利競之俗澄神反道其可得乎黒曰不然若不示以來生之欲何以權其當生之滯物情不能頓至故積漸以誘之奪此俄頃要彼無窮若弗勤春稼秋穡何期端坐井底而息意庶慮者長淪於九泉之下矣白曰異哉何所務之乖也道在無欲而以有欲要之北行求郢西征索越方長迷於幽都永謬滯於昧谷遼遼閩楚其可見乎所謂積漸者日損之謂也當先遺其所輕然後􅁯其所重使利欲自去淳白自生耳豈得以少要多以麄易妙俯仰之間非利不動利之所蕩其有極哉乃丹青眩媚綵之目土木夸好壯之心興糜廢之道單九服之財樹無用之事割羣生之急致營造之計成私樹之權務權化之業結師黨之勢苦節以要厲精之譽護法以展陵競之情悲矣夫道其安寄乎是以周孔敦俗弗關視聽之外老莊陶風謹守性分而已黒曰三遊本於仁義盗跖資於五善聖跡之敝豈有内外且黄老之家符章之偽水祝之誣不可勝論子安於彼駭於此玩於濁水違於清淵耳白曰有跡不能不敝有術不能無偽此乃聖人所以桎梏也今所惜在作法於貪遂以成俗不正其敝反以為髙耳至若滛妄之徒世自近鄙源流蔑然固不足論黒曰釋氏之教專救夷俗便無取於諸華邪白曰曷為其然為則開端宜懐屬緒愛物去殺尚施周人息心遺榮華之願大士布兼濟之念仁義𤣥一者何以尚之惜乎幽旨不亮末流為累耳黒曰子之論善殆同矣便事盡於生乎白曰幽㝠之理固不極於人事矣周孔疑而不辨釋迦辨而不實將宜廢其顯晦之跡存其所要之旨請嘗言之夫道之以仁義者服理以從化帥之以勸戒者循利而遷善故甘辭興於有欲而滅於悟理淡說行於天解而息於貪偽是以示來生者蔽虧於道釋不得已杜幽闇者㝠符於姫孔閉其兊由斯論之言之者未必逺知之者未必得不知者未必失但知六度與五教並行信順與慈悲齊立耳殊塗而同歸者不得守其發輪之轍也論行於世舊僧謂其貶黜釋氏欲加擯斥太祖見論賞之元嘉中遂參權要朝廷大事皆與議焉賔客輻凑門車常有數十兩四方贈賂相係勢傾一時注孝經及莊子逍遥篇文論傳於世又有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬬塲寺多禪僧京師為之語曰鬬塲禪師窟東安談義林世祖大眀四年於中興寺設齋有一異僧衆莫之識問其名答言名眀慧從天安寺來忽然不見天下無此寺名乃改中興曰天安寺大眀中外國沙門摩訶衍苦節有精理於京都多出新經勝鬘經尤見重内學東夷髙句驪國今治漢之遼東郡髙句驪王髙璉晉安帝義熙九年遣長史髙翼奉表獻赭白馬以璉為使持節都督營州諸軍事征東將軍髙句驪王樂浪公髙祖踐阼詔曰使持節都督營州諸軍事征東將軍髙句驪王樂浪公璉使持節督百濟諸軍事鎮東將軍百濟王映並執義海外逺修貢職惟新告始宜荷國休璉可征東大將軍映可鎮東大將軍持節都督王公如故三年加璉散騎常侍增督平州諸軍事少帝景平二年璉遣長史馬婁等詣闕獻方物遣使慰勞之曰皇帝問使持節散騎常侍都督營平二州諸軍事征東大將軍髙句驪王樂浪公纂戎東服庸績繼軌厥惠既彰款誠亦著踰遼越海納貢本朝朕以不徳忝承鴻緒永懐先蹤思覃遺澤今遣謁者朱邵伯副謁者王邵子等宣旨慰勞其茂康惠政永隆厥功式昭徃命稱朕意焉先是鮮卑慕容寳治中山為索虜所破東走黄龍義熙初寳弟熙為其下馮䟦所殺䟦自立為主自號燕王以其治黄龍城故謂之黄龍國䟦死子宏立屢為索虜所攻不能下太祖世每歲遣使獻方物元嘉十二年賜加除授十五年復為索虜所攻宏敗走奔髙驪北豐城表求迎接太祖遣使王白駒趙次興迎之并令髙驪料理資遣璉不欲使宏南乃遣將孫潄髙仇等襲殺之白駒等率所領七千餘人掩討潄等生禽潄殺髙仇等二人璉以白駒等專殺遣使執送之上以逺國不欲違其意白駒等下獄見原璉每歲遣使十六年太祖欲北討詔璉送馬璉獻馬八百匹世祖孝建二年璉遣長史董騰奉表慰國哀再周并獻方物大眀三年又獻肅慎氏楛矢石砮七年詔曰使持節散騎常侍督營平二州諸軍事征東大將軍髙句驪王樂浪公璉世事忠義作藩海外誠係本朝志剪殘險通譯沙表克宣王猷宜加褒進以旌純節可車騎大將軍開府儀同三司持節常侍都督王公如故太宗泰始後廢帝元徽中貢獻不絶百濟國本與髙驪俱在遼東之東千餘里其後髙驪畧有遼東百濟畧有遼西百濟所治謂之晉平郡晉平縣義熙十二年以百濟王餘映為使持節都督百濟諸軍事鎮東將軍百濟王髙祖踐祚進號鎮東大將軍少帝景平二年映遣長史張威詣闕貢獻元嘉二年太祖詔之曰皇帝問使持節都督百濟諸軍事鎮東大將軍百濟王累葉忠順越海効誠逺王纂戎聿修先業慕義既彰厥懐亦款浮桴驪水獻賝執贄故嗣位方任以藩東服勉朂所莅無墜前蹤今遣兼謁者閭丘恩子兼副謁者丁敬子等宣旨慰勞稱朕意其後每歳遣使奉表獻方物七年百濟王餘毗復修貢職以映爵號授之二十七年毗上書獻方物私假臺使馮野夫西河太守表求易林式占腰弩太祖竝與之毗死子慶代立世祖大眀元年遣使求除授詔許二年慶遣使上表曰臣國累葉偏受殊恩文武良輔世䝉朝爵行冠軍將軍右賢王餘紀等十一人忠勤宜在顯進伏願垂愍並聽賜除仍以行冠軍將軍右賢王餘紀為冠軍將軍以行征虜將軍左賢王餘昆行征虜將軍餘暈竝為征虜將軍以行輔國將軍餘都餘乂並為輔國將軍以行龍驤將軍沐衿餘爵並為龍驤將軍以行寧朔將軍餘流糜貴並為寧朔將軍以行建武將軍于西餘婁竝為建武將軍太宗泰始七年又遣使貢獻倭國在髙驪東南大海中世修貢職髙祖永初二年詔曰倭讚萬里修貢逺誠宜甄可賜除授太祖元嘉二年讚又遣司馬曹達奉表獻方物讚死弟珍立遣使貢獻自稱使持節都督倭百濟新羅任那秦韓慕韓六國諸軍事安東大將軍倭國王表求除正詔除安東將軍倭國王珍又求除正倭隋等十三人平西征虜冠軍輔國將軍號詔並聽二十年倭國王濟遣使奉獻復以為安東將軍倭國王二十八年加使持節都督倭新羅任那加羅秦韓慕韓六國諸軍事安東將軍如故并除所上二十三人軍郡濟死世子興遣使貢獻世祖大眀六年詔曰倭王世子興奕世載忠作藩外海禀化寧境恭脩貢職新嗣邊業宜授爵號可安東將軍倭國王興死弟武立自稱使持節都督倭百濟新羅任那加羅秦韓慕韓七國諸軍事安東大將軍倭國王順帝昇眀二年遣使上表曰封國偏逺作藩於外自昔祖禰躬環甲胄䟦渉山川不遑寧處東征毛人五十五國西服衆夷六十六國渡平海北九十五國王道融泰廓土遐畿累葉朝宗不愆于歲臣雖下愚忝𦙍先緒驅率所統歸崇天極道逕百濟裝治船舫而句驪無道圖欲見吞掠抄邊𨽻䖍劉不已每致稽滯以失良風雖曰進路或通或不臣亡考濟實忿㓂讎壅塞天路控弦百萬義聲感激方欲大舉奄䘮父兄使垂成之功不獲一簣居在諒闇不動兵甲是以偃息未㨗至今欲練甲治兵申父兄之志義士虎賁文武効功白刃交前亦所不顧若以帝徳覆載摧此彊敵克靖方難無替前功竊自假開府儀同三司其餘咸假授以勸忠節詔除武使持節都督倭新羅任那加羅秦韓慕韓六國諸軍事安東大將軍倭王荆雍州蠻槃瓠之後也分建種落布在諸郡縣荆州置南蠻雍州置寧蠻校尉以領之世祖初罷南蠻併大府而寧蠻如故蠻民順附者一户輸穀數斛其餘無雜調而宋民賦役嚴苦貧者不復堪命多逃亡入蠻蠻無傜役彊者又不供官稅結黨連羣動有數百千人州郡力弱則起為盜賊種類稍多户口不可知也所在多深險居武陵者有雄谿樠谿辰谿酉谿舞谿謂之五谿蠻而宜都天門巴東建平江北諸郡蠻所居皆深山重阻人跡罕至焉前世以來屢為民患少帝景平二年宜都蠻帥石寧等一百二十三人詣闕上獻太祖元嘉六年建平蠻張雝之等五十人七年宜都蠻田生等一百一十三人並詣闕獻見其後沔中蠻大動行旅殆絶天門漊中令宗僑之傜賦過重蠻不堪命十八年蠻田向求等為㓂破漊中虜畧百姓荆州刺史衡陽王義季遣行參軍曹孫念討破之獲生口五百餘人免僑之官二十四年南郡臨沮當陽蠻反縛臨沮令傳僧驥荆州刺史南譙王義宣遣中兵參軍王諶討破之先是雝州刺史劉道産善撫諸蠻前後不附官者莫不順服皆引出平土多縁沔為居及道産亡蠻又反叛及世祖出為雝州羣蠻斷道撃大破之臺遣軍主沈慶之連年討蠻所向皆平殄事在慶之傳二十八年正月龍山雉水蠻㓂抄湼陽縣南陽太守朱曇韶遣軍討之失利殺傷三百餘人曇韶又遣二千人係之蠻乃散走是歲滍水諸蠻因險為宼雝州刺史隨王誕遣使說之曰頃威懐所被覃自遐逺順化者寵禄逆命者無遺此亦尒所知也聖朝今普天肆𤯝許以自新便宜各還舊居安堵復業改過革心於是乎始先是蠻帥魯奴子擄龍山屢為邊患魯軌在長社奴子歸之軌言於虜主以為四山王軌子爽歸國奴子亦求内附隨王誕又遣軍討沔北諸蠻襲濁山如口蜀松三柴剋之又圍升錢柏義諸柴蠻悉力距戰軍以具裝馬夾射大破之斬首二百級獲生蠻千口牛馬八十頭世祖大明中建平蠻向光侯宼暴峽川巴東太守王濟荆州刺史朱修之遣軍討之光侯走清江清江去巴東千餘里時巴東建平宜都天門四郡蠻為㓂諸郡民户流散百不存一太宗順帝世尤甚雖遣攻伐終不能禁荆州為之虚敝大眀中桂陽蠻反殺荔令晏珍之臨賀蠻反殺闗建令邢伯兒振武將軍蕭冲之討之獲少費多抵罪豫州蠻廩君後也槃瓠及廪君事並具前史西陽有巴水蘄水希水赤亭水西歸水謂之五水蠻所在並深岨種落熾盛歴世為盜賊北接淮汝南極江漢地方數千里元嘉二十八年西陽蠻殺南川令劉臺并其家口二十九年新蔡蠻二千餘人破大雷戍畧公私船舫悉引入湖有亡命司馬黒石在蠻中共為㓂盜太祖遣太子歩兵校尉沈慶之率江荆雍豫諸州軍討之世祖大眀四年又遣慶之討西陽蠻大剋獲而反司馬黒石徒黨三人其一人名智黒石號曰太公以為謀主一人名安陽號譙王一人名續之號梁王蠻文小羅等討禽續之為蠻世財所簒小羅等相率斬世財父子六人豫州刺史王元謨遣殿中將軍郭元封慰勞諸蠻使縛送亡命蠻乃執智黒石安陽二人送詣元謨世祖使於壽陽斬之世宗初即位四方反叛及南賊敗於鵲尾西陽蠻田益之田義之成邪財田光興等起義攻郢州剋之以益之為輔國將軍都統四山軍人又以蠻户立宋安光城二郡以義之為宋安太守光興為龍驤將軍光城太守封益之邊城縣王食邑四百一十一户成邪財陽城縣王食邑三千户益之徴為虎賁中郎將將軍如故順帝昇眀初又轉射聲校尉冠軍將軍成邪財死子婆思襲爵為輔國將軍武騎常侍晋熙蠻梅式生亦起義斬晋熙太守閻湛之晉安王子勛典籖沈光眀祖封髙山侯食所統牛崗下柴二村三十户史臣曰漢世西譯遐通兼途累萬跨頭痛之山越繩度之險生行死徑身徃魂歸晋氏南移河隴夐隔戎夷梗路外域天斷若夫大秦天竺逈出西溟二漢銜役特艱斯路而商貨所資或出交部汎海陵波因風逺至又重峻參差氏衆非一殊名詭號種別類殊山琛水寳由兹自出通犀翠羽之珍蛇珠火布之異千名萬品並世主之所虚心故舟舶繼路商使交屬太祖以南琛不至逺命師旅泉浦之㨗威震滄溟未名之寳入充府實夫四夷孔熾患深自古蠻僰殊雜種衆特繁依深傍岨充積畿甸咫尺華氓易興狡毒畧財據土歲月滋深自元嘉將半㓂慝彌廣遂盤結數州揺亂邦邑於是命將出師恣行誅討自江漢以北廬江以南􅊧山盪谷窮兵罄武繋頸囚俘盖以數百萬計至於孩年耋齒執訊所遺將卒申好殺之憤干戈窮酸慘之用雖云積怨為報亦甚張奐所云流血于野傷和致災斯固仁者之言矣宋書卷九十七宋書卷九十七考證南夷林邑國傳交州刺史檀和之忠果到列到列二字前魯爽傳亦有之百濟國傳慕義既彰厥懐亦款亦一本作赤荆雍州蠻傳天門漊中令宗僑之傜賦過重僑一本作矯宋書卷九十七考證
