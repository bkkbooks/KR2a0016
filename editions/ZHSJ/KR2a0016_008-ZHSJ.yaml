body:
  text: 宋書卷八本紀第八明帝太宗明皇帝諱彧字休炳小字榮期文帝第十一子也元嘉十六年十月戊寅生二十五年封淮陽王食邑二千戶二十九年改封湘東王元凶弒立以為驍騎將軍加給事中世祖踐阼為祕書監遷冠軍將軍南蘭陵下邳二郡太守領石頭戍事孝建元年徙為南彭城東海二郡太守將軍如故鎮京口其年徵為中護軍二年遷侍中領游擊將軍三年徙衞尉侍中如故又為左衞將軍衞尉如故大明元年轉中護軍衞尉如故三年為都官尚書領游擊將軍衞尉如故七年遷領軍將軍八年出為使持節都督徐兗二州豫州之梁郡諸軍事鎮北將軍徐州刺史給鼓吹一部其年徵為侍中護軍將軍未拜復為領軍將軍侍中如故永光元年又出為使持節散騎常侍都督南豫豫司江四州揚州之宣城諸軍事衞將軍南豫州刺史鎮姑孰又徙為都督雍梁南北秦四州郢州之竟陵諸軍事寧蠻校尉雍州刺史持節常侍將軍如故未拜復本位尋以本號開府儀同三司廢帝景和末上入朝被留停都廢帝誅害宰輔殺戮大臣慮有圖之者疑畏諸父並拘之殿內遇上無禮事在文諸王傳遂收上付廷尉一宿被原將加禍害者前後非一既而害上意定明旦便應就禍上先已與腹心阮佃夫李道兒等密共合謀于時廢帝左右常慮禍及人人有異志唯有直閤將軍宗越譚金童太一等數人為其腹心並虓虎有幹力在殿省久衆並畏服之故莫敢動是夕越等並外宿佃夫道兒因結壽寂之等殞廢帝於後堂十一月二十九日夜也事定上未知所為建安王休仁便稱臣奉引升西堂登御坐召見諸大臣于時事起倉卒上失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之令備羽儀雖未即位凡衆事悉稱令書施行己未司徒揚州刺史豫章王子尚山陰公主並賜死宗越譚金童太一謀反伏誅十二月庚申朔令書以司空東海王褘為中書監太尉鎮軍將軍江州刺史晉安王子勛進號車騎將軍開府儀同三司癸亥以新除驃騎大將軍建安王休仁為司徒尚書令揚州刺史鎮軍將軍開府儀同三司山陽王休祐進號驃騎大將軍荊州刺史崇憲衞尉桂陽王休範為鎮北將軍南徐州刺史乙丑改封安陸王子綏為江夏王泰始元年冬十二月丙寅上即皇帝位詔曰高祖武皇帝德洞四瀛化綿九服太祖文皇帝以大明定基世祖孝武皇帝以下武寧亂日月所照梯山航海風雨所均削衽襲帶所以業固盛漢聲溢隆周子業凶嚚自天忍悖成性人面獸心見於齠日反道敗德著自比年其狎侮五常怠棄三正矯誣上天毒流下國實開闢所未有書契所未聞再罹遏密而無一日之哀齊斬在躬方深北里之樂虎兕難匣憑河必彰遂誅滅上宰窮釁逆之酷虐害國輔究孥戮之刑子鸞同生以昔憾殄殪敬猷兄弟以睚眦殲夷徵逼義陽將加屠膾陵辱戚藩檟楚妃主奪立左右竊子置儲肆酗于朝宣淫于國事穢東陵行汙飛走積釁罔極日月滋深比遂圖犯玄宮志窺題湊將肆梟鏡之禍騁商頓之心又欲鴆毒崇憲虐加諸父事均宮閫聲遍國都鴟梟小豎莫不寵暱朝廷忠誠必也戮挫收掩之旨虓虎結轍掠奪之使白刃相望百僚危氣首領無有全地萬姓崩心妻子不復相保所以鬼哭山鳴星鉤血降神器殆於馭索景祚危於綴旒朕假寐凝憂泣血待旦慮大宋之基於焉而泯武文之業將墜于淵賴七廟之靈藉八百之慶巨猾斯殄鴻沴時褰皇綱絕而復紐天緯缺而更張猥以寡薄屬承乾統上緝三光之重俯顧庶民之艱業業矜矜若履冰谷思與億兆同此維新可大赦天下改景和元年為泰始元年賜民爵二級魚眾寡孤獨不能自存者人穀五斛逋租宿債勿復收犯鄉論清議贓汙淫盜並悉洗除長徒之身特賜原遣亡官失爵禁錮舊勞一依舊典其昏制謬封並皆刊削己巳以安西將軍南豫州刺史劉遵考為特進右光祿大夫輔國將軍歷陽南譙二郡太守建平王景素為南豫州刺史庚午以荊州刺史臨海王子頊為鎮軍將軍南徐州刺史永嘉王子仁為中軍將軍左衞將軍劉道隆為中護軍辛未改封臨賀王子產為南平王晉熙王子輿為廬陵王壬申以尚書左僕射王景文為尚書僕射新除中護軍劉道隆卒癸酉詔曰朕戡亂寧民屬膺景祚鴻制初造革道惟新而國故頻罹仁澤偏壅每鑒寐疚心罔識攸濟巡方問俗弘政所先可分遣大使廣求民瘼考守宰之良採衡閭之善若獄犴淹枉傷民害教者具以事聞魚眾寡孤獨癃殘六疾不能自存者郡縣優量賑給貞婦孝子高行力田詳悉條奏務詢輿誦廣納嘉謀每盡皇華之旨俾若朕親覽焉乙亥追尊所生沈婕妤曰宣皇太后後軍將軍垣閎為司州刺史前右將軍長史殷琰為豫州刺史丙子詔曰皇室多故糜費滋廣且久歲不登公私歉弊方刻意從儉弘濟時艱政道未孚慨愧兼積太官供膳可詳所減撤尚方御府雕文篆刻無益之物一皆蠲省務存簡約以稱朕心戊寅崇太后為崇憲皇太后立皇后王氏鎮軍將軍江州刺史晉安王子勛舉兵反鎮軍長史鄧琬為其謀主雍州刺史袁顗率衆赴之辛巳驃騎大將軍前荊州刺史山陽王休祐改為江州刺史荊州刺史臨海王子頊即留本任加領軍將軍王玄謨鎮軍將軍壬午車駕謁太廟甲申後將軍郢州刺史安陸王子綏進號征南將軍右將軍會稽太守尋陽王子房進號安東將軍前將軍荊州刺史臨海王子頊進號平西將軍子綏子房子頊並不受命舉兵同逆戊子新除中軍將軍永嘉王子仁為護軍將軍二年春正月己丑朔以軍事不朝會庚寅以金紫光祿大夫王僧朗為左光祿大夫開府儀同三司壬辰驃騎大將軍江州刺史山陽王休祐改為南豫州刺史鎮歷陽鎮軍將軍領軍將軍王玄謨為車騎將軍江州刺史平北將軍徐州刺史薛安都進號安北將軍安都亦不受命癸巳以左衞將軍巴陵王休若為鎮東將軍新除安東將軍尋陽王子房為撫軍將軍司徒左長史袁愍孫為領軍將軍甲午中外戒嚴司徒建安王休仁都督征討諸軍事統衆軍南討以青州刺史劉祗為南兗州刺史丙申以征虜司馬申令孫為徐州刺史義陽內史龐孟虯為司州刺史令孫孟虯及豫州刺史殷琰青州刺史沈文秀冀州刺史崔道固湘州行事何慧文廣州刺史袁曇遠益州刺史蕭惠開梁州刺史柳元怙並同叛逆兗州刺史殷孝祖入衞京都仍遣孝祖前鋒南伐甲辰加孝祖撫軍將軍丙午車駕親御六師出頓中興堂辛亥驃騎大將軍南豫州刺史山陽王休祐改為豫州刺史統衆軍西討吳郡太守顧琛吳興太守王曇生義興太守劉延熙晉陵太守袁摽山陽太守程天祚並舉兵反鎮東將軍巴陵王休若統衆軍東討壬子崇憲皇太后崩是日軍主任農夫劉懷珍平定義興永世縣民史逸宗據縣為逆殿中將軍陸攸之討平之丙辰以新除左光祿大夫開府儀同三司王僧朗為特進左光祿大夫如故二月乙丑僧朗卒尚書僕射王景文父憂去職曲赦吳吳興義興晉陵四郡吏部尚書蔡興宗為尚書左僕射吳興太守張永右軍將軍齊王東討平晉陵癸未曲赦浙江東五郡丁亥鎮東將軍巴陵王休若進號衞將軍建武將軍吳喜公率諸軍破賊於吳吳興會稽平定三郡同逆皆伏誅輔國將軍齊王前鋒北討輔國將軍劉勔前鋒西討賊劉胡領衆四萬據赭圻三月庚寅撫軍將軍殷孝祖攻赭圻死之以輔國將軍沈攸之代為南討前鋒賊衆稍盛袁顗頓鵲尾聯營迄至濃湖衆十餘萬壬辰以新除太子詹事張永為青冀二州刺史丙申鎮北將軍南徐州刺史桂陽王休範總統北討諸軍事丁酉以尚書劉思考為徐州刺史戊戌貶尋陽王子房爵為松滋縣侯乙巳以奉朝請鄭黑為司州刺史辛亥鎮北將軍南徐州刺史桂陽王休範領南兗州刺史壬子斷新錢專用古錢癸丑原赦揚南徐二州囚繫凡逋亡一無所問夏四月壬午以散騎侍郎明僧暠為青州刺史五月壬辰以輔國將軍沈攸之為雍州刺史丁酉曲赦豫州丁未新除尚書僕射王景文為中軍將軍以青冀二州刺史張永為鎮軍將軍庚戌以寧朔將軍劉乘民為冀州刺史甲寅葬崇憲皇太后於修寧陵冠軍將軍益州刺史蕭惠開進號平西將軍六月辛酉鎮軍將軍張永領徐州刺史京師雨水丁卯遣殿中將軍檢行賜卹以左軍將軍垣恭祖為梁南秦二州刺史秋七月己丑鎮北將軍南徐兗二州刺史桂陽王休範進號征北大將軍辛卯鎮軍將軍徐州刺史張永改為南兗州刺史丁酉以仇池太守楊僧嗣為北秦州刺史武都王壬寅以男子時朗之為北豫州刺史乙巳龍驤將軍劉道符平山陽辛亥又以義軍主鄭叔舉為北豫州刺史鎮軍將軍南兗州刺史張永復領徐州刺史甲寅復以冀州刺史崔道固為徐州刺史八月己卯司徒建安王休仁率衆軍大破賊斬偽尚書僕射袁顗進討江郢荊雍湘五州平定之晉安王子勛安陸王子綏臨海王子頊邵陵王子元並賜死同黨皆伏誅諸將軍帥封賞各有差甲申以護軍將軍永嘉王子仁為平南將軍湘州刺史九月乙酉曲赦江郢荊雍湘五州守宰不得離職壬辰驃騎大將軍豫州刺史山陽王休祐改為荊州刺史分豫州立南豫州癸巳六軍解嚴大赦天下賜民爵一級甲午以中軍將軍王景文為安南將軍江州刺史戊戌以車騎將軍江州刺史王玄謨為左光祿大夫開府儀同三司護軍將軍庚子以建安王休仁世子伯融為豫州刺史辛丑衞將軍巴陵王休若即本號為雍州刺史雍州刺史沈攸之為郢州刺史庚戌以太子左衞率建平王景素為南兗州刺史十月乙卯永嘉王子仁始安王子真淮南王子孟南平王子產廬陵王子輿松滋侯子房並賜死丁卯以郢州刺史沈攸之為中領軍與張永俱北討庚午以吳郡太守顧覬之為湘州刺史戊寅立皇子昱為皇太子曲赦揚南徐二州以輔國將軍劉勔為廣州刺史左軍將軍張世為豫州刺史十一月甲申以安成太守劉襲為郢州刺史壬辰詔曰治崇簡易化疾繁侈遠關隆替明著軌跡者也朕拯斯墜運屬此屯極仍之以凋耗因之以師旅而識昧前王務艱昔代俾夫舊賦既繁為費彌廣鑒寐萬務每思弘革方欲緩繇優調愛民為先有司詳加寬惠更立科品其方物職貢各順土宜出獻納貢敬依時令凡諸蠹俗妨民之事趣末違本之業雕華靡麗奇器異技並嚴加裁斷務歸要實左右尚方御府諸署供御制造咸存儉約庶淳風至教微遵太古阜財興讓少敦季俗又詔曰夫秉機詢政立教之攸本舉賢聘逸弘化之所基故負鼎進策殷代以康釋釣作輔周祚斯朕甫承大業訓道未敷雖側席忠規竚夢巖築而良圖莫薦奇士弗聞永鑒通古無忘宵寐今藩隅克晏敷化維始屢懷存治實望箴闕王公卿尹羣僚庶官其有嘉謀直獻匡俗濟時咸切事陳奏無或依隱若乃林澤貞栖丘園耿潔博洽古今敦崇孝讓四方在任可明書搜揚具即以聞隨就褒立以建平王景素子延年為新安王以新除左光祿大夫開府儀同三司王玄謨為車騎將軍南豫州刺史丙申制使東土經荒流散並各還本蠲衆調二年十二月己未以尚書金部郎劉善明為冀州刺史乙丑詔曰近衆藩稱亂多染釁科或誠係本朝事緣逼迫混同證錮良以悵然夫天道尚仁德刑並用雷霆時至雲雨必解朕眷言靜念思弘風澤凡應禁削皆從原蕩其文武堪能隨才銓用辛未以新除廣州刺史劉勔為益州刺史前巴西梓潼二郡太守費混為廣州刺史劉勔克壽陽豫州平辛巳以輔國將軍劉靈遺為梁南秦二州刺史薛安都要引索虜張永沈攸之大敗於是遂失淮北四州及豫州淮西地三年春正月庚子以農役將興太官停宰牛癸卯曲赦豫南豫二州衞將軍巴陵王休若降號鎮西將軍閏月庚午京師大雨雪遣使巡行賑賜各有差戊寅以游擊將軍垣閎為益州刺史二月甲申以御史中丞羊希為廣州刺史是日車駕為戰亡將士舉哀己丑以鎮西司馬劉亮為梁南秦二州刺史索虜寇汝陰太守張景遠擊破之丙申曲赦青冀二州三月丙子以尚書左僕射蔡興宗為安西將軍郢州刺史戊寅以冠軍將軍王玄載為徐州刺史寧朔將軍崔平為兗州刺史夏四月癸巳以前司州刺史鄭黑為司州刺史乙未冠軍將軍北秦州刺史楊僧嗣進號征西將軍庚子立桂陽王休範第二子德嗣為廬陵王立侍中劉韞第二子銑為南豐王丙午安西將軍蔡興宗降號平西將軍五月丙辰宣太后崇寧陵禁內墳屋瘞遷徙者給葬直蠲復家丁戊午以車騎將軍南豫州刺史王玄謨為左光祿大夫開府儀同三司辛酉罷南豫州并豫州壬戌以太子詹事袁粲為尚書僕射六月乙酉以侍中劉韞為湘州刺史秋七月壬子以左光祿大夫開府儀同三司王玄謨為特進左光祿大夫護軍將軍薛安都子伯令略據雍州四郡刺史巴陵王休若討斬之八月丁酉詔曰古者衡虞置制蝝蚳不收川澤產育登器進御所以繁阜民財養遂生德頃商販逐末競早爭新折未實之菓收豪家之利籠非膳之翼為戲童之資豈所以還風尚本捐華務實宜修道布仁以革斯蠹自今鱗介羽毛肴核衆品非時月可採器味所須可一皆禁斷嚴為科制壬寅以中領軍沈攸之行南兗州刺史率衆北討癸卯詔曰法網之用期世而行寬惠之道因時而布況朕尚德戡亂依仁馭俗宜每就弘簡以隆至治而頻罹兵革繇賦未休軍民巧偽興事甚多蹈刑入憲諒非一科至乃假名戎伍竊爵私庭因戰散亡託懼逃役且往諸淪逼雖經累宥逋竄之黨猶為實繁宵言永懷良兼矜疚思所以重播至澤覃被區宇可大赦天下加新除左光祿大夫王玄謨車騎將軍丙午遣吏部尚書褚淵慰勞緣淮將帥隨宜量賜戊申以新除右衞將軍劉勔為豫州刺史九月癸丑鎮西將軍雍州刺史巴陵王休若進號衞將軍平西將軍郢州刺史蔡興宗進號安西將軍乙卯以越騎校尉周寧民為兗州刺史戊午以皇后六宮以下雜衣千領金釵千枚班賜北征將士庚申前將軍兼冀州刺史崔道固進號平北將軍甲子曲赦徐兗青冀四州冬十月壬午改封新安王延年為始平王戊子芮芮國遣使獻方物辛丑復郡縣公田鎮西大將軍西秦河二州刺史吐谷渾拾寅進號征西大將軍十一月立建安王休仁第二子伯猷為江夏王改封義陽王昶為晉熙王乙卯分徐州置東徐州以輔國將軍張讜為刺史高麗國百濟國遣使獻方物十二月庚辰以寧朔將軍劉休賓為兗州刺史四年春正月己未車駕親祠南郊大赦天下庚午衞將軍巴陵王休若降號左將軍乙亥零陵王司馬勗薨二月辛丑以前龍驤將軍常珍奇為平北將軍司州刺史珍奇子超越為北冀州刺史乙巳右光祿大夫車騎將軍護軍將軍王玄謨薨三月己未以游擊將軍劉懷珍為東徐州刺史戊辰以軍司馬劉靈遺為梁南秦二州刺史南譙太守孫奉伯為交州刺史交州人李長仁據州叛妖賊攻廣州殺刺史羊希龍驤將軍陳伯紹討平之夏四月己卯復減郡縣田祿之半丙申東海王褘改封廬江王山陽王休祐改封晉平王改晉安郡為晉平郡辛丑芮芮國及河南王並遣使獻方物甲辰以豫章太守張辯為廣州刺史五月乙巳曲赦廣州癸亥以行雍州刺史巴陵王休若行湘州刺史會稽太守張永為雍州刺史湘州刺史劉韞為南兗州刺史秋七月乙巳朔以吳郡太守王琨為中領軍丙辰始平王延年薨己未以侍中劉襲為中護軍庚申以驍騎將軍齊王為南兗州刺史八月戊子以南康相劉勃為交州刺史辛卯分青州置東青州以輔國將軍沈文靖為東青州刺史丁酉安南將軍江州刺史王景文進號鎮南將軍九月丙辰以驃騎長史張悅為雍州刺史戊辰詔曰夫愆有小大憲隨寬猛故五刑殊用三典異施而降辟次網便暨鉗撻求之法科差品滋遠朕務存欽卹每有矜貸尋劫制科罪輕重同之大辟即事原情未為詳衷自今凡竊執官仗拒戰邏司或攻剽亭寺及害吏民者凡此諸條悉依舊制五人以下相逼奪者可特賜黥刖投畀四遠仍用代殺方古為優全命長戶施同造物庶簡惠之化有孚羣萌好生之德無漏幽品庚午曲赦揚南徐兗豫四州冬十月癸酉朔日有蝕之發諸州兵北討南康建安安成宣城四郡昔不同南逆並不在徵發之例甲戌割揚州之義興郡屬南徐州五年春正月癸亥車駕躬耕藉田大赦天下賜力田爵一級二月丙申分豫州揚州立南豫州以太尉廬江王褘為車騎將軍開府儀同三司南豫州刺史三月乙卯於南豫州立南義陽郡丙寅車駕幸中堂聽訟己巳河南王遣使獻方物夏四月辛未割雍州隨郡屬郢州乙酉割豫州義陽郡屬郢州郢州西陽郡屬豫州戊子以寧朔將軍崔公烈為兗州刺史戊戌新除給事黃門侍郎杜幼文為梁南秦二州刺史六月辛未立晉平王休祐子宣曜為南平王壬申以安西將軍郢州刺史蔡興宗為鎮東將軍癸酉以左衞將軍沈攸之為郢州刺史以軍興已來百官斷俸並給生食丁丑車騎將軍南豫州刺史廬江王褘免官爵戊寅以左將軍行湘州刺史巴陵王休若為征南將軍湘州刺史壬午罷南豫州丙戌以新除給事黃門侍郎劉亮為益州刺史秋七月己酉以輔國將軍王亮為徐州刺史東莞太守陳伯紹為交州刺史甲寅以山陽太守李靈謙為兗州刺史壬戌改輔國將軍為輔師將軍八月己丑以右將軍行豫州刺史劉勔為平西將軍豫州刺史壬辰以海陵太守劉崇智為冀州刺史九月甲寅立長沙王纂子延之為始平王戊午中領軍王琨遷職己未詔曰夫箕潁之操振古所貴沖素之風哲王攸重朕屬橫流之會接難晦之辰龕暴剪亂日不暇給今雖關隴猶靄區縣澄氛偃武修文於是乎在思崇廉用靜馳薄固已物色載懷寢興竚歎其有貞栖隱約息事衡樊鑿坏遺榮負釣辭聘志恬江海行高塵俗者在所精加搜括時以名聞將賁園矜德茂昭厥禮羣司各舉所知以時授爵乙丑以新除平西將軍豫州刺史劉勔為中領軍冬十月丁卯朔日有蝕之十一月丁未索虜遣使獻方物閏月戊子驃騎大將軍荊州刺史晉平王休祐以本號為南徐州刺史征南將軍湘州刺史巴陵王休若為征西將軍荊州刺史輔師將軍孟次陽為兗州刺史義陽太守呂安國為司州刺史十二月戊戌司徒建安王休仁解揚州刺史己未以征北大將軍南徐州刺史桂陽王休範為中書監中軍將軍揚州刺史吳興太守建平王景素為湘州刺史輔師將軍建安王世子伯融為廣州刺史庚申分荊益州五郡置三巴校尉六年春正月乙亥初制間二年一祭南郊間一年一祭明堂二月壬寅司徒建安王休仁為太尉領司徒癸丑皇太子納妃甲寅大赦天下巧注從軍不在赦例班賜各有差三月乙亥中護軍劉襲卒丁丑以太子詹事張永為護軍將軍夏四月癸亥立第六皇子燮為晉熙王五月丁丑以前軍將軍陳胤宗為徐州刺史丁亥以冠軍將軍吐谷渾拾虔為平西將軍戊子奉朝請孔玉為寧州刺史六月己亥以第五皇子智井繼東平沖王休倩庚子以侍中劉韞為撫軍將軍雍州刺史前將軍郢州刺史沈攸之進號鎮軍將軍揚州刺史桂陽王休範為征南大將軍江州刺史癸卯以鎮南將軍江州刺史王景文為尚書左僕射揚州刺史尚書僕射袁粲為尚書右僕射己未改臨賀郡為臨慶郡追改東平王休倩為臨慶沖王七月丙戌第五皇子智井薨九月乙丑中領軍劉勔加平北將軍戊寅立總明觀徵學士以充之置東觀祭酒癸未以第八皇子智渙繼臨慶沖王休倩冬十月辛卯立第九皇子贊為武陵王乙巳以前右軍馬詵為北雍州刺史己酉車駕幸東堂聽訟十一月己巳高麗國遣使獻方物十二月癸巳以邊難未息制父母陷異域悉使婚宦戊戌以始興郡為宋安郡丙辰護軍將軍張永遷職七年春正月甲戌置散騎奏舉郎二月癸巳征西將軍荊州刺史巴陵王休若進號征西大將軍開府儀同三司戊戌置百梁鹿谷蘇永寧安昌富昌南流郡又分廣交州三郡合九郡立越州己亥以前將軍劉康為平東將軍妖寇宋逸攻合肥殺汝陰太守王穆之郡縣討平之甲寅驃騎大將軍開府儀同三司南徐州刺史晉平王休祐薨戊午以征西大將軍荊州刺史巴陵王休若為征北大將軍南徐州刺史湘州刺史建平王景素為荊州刺史三月辛酉索虜遣使獻方物壬戌芮芮國遣使奉獻夏四月辛丑減天下死罪一等凡敕繫悉遣之甲辰於南兗州置新平郡癸丑金紫光祿大夫張永領護軍五月戊午司徒建安王休仁有罪自殺辛酉以寧朔長史孫超之為廣州刺史尚書左僕射揚州刺史王景文以刺史領中書監庚午以尚書右僕射袁粲為尚書令新除吏部尚書褚淵為尚書右僕射辛未監吳郡王僧虔行湘州刺史丙戌追免晉平王休祐為庶人六月丁酉以征南大將軍江州刺史桂陽王休範為驃騎大將軍南徐州刺史征北大將軍巴陵王休若為車騎大將軍江州刺史甲辰芮芮國遣使獻方物秋七月丁巳罷散騎奏舉郎乙丑新除車騎大將軍江州刺史巴陵王休若薨桂陽王休範以新除驃騎大將軍還為江州庚午以第三皇子準為撫軍將軍辛未以太子詹事劉秉為南徐州刺史戊寅以寧朔將軍沈懷明為南兗州刺史乙酉於冀州置西海郡八月戊子第八皇子躋繼江夏文獻王義恭庚寅以疾愈大赦天下冀州刺史劉崇智加青州刺史戊戌立第三皇子準為安成王九月辛未以越騎校尉周寧民為徐州刺史冬十一月戊午百濟國遣使獻方物十二月丁酉分豫州南兗州立南豫州以歷陽太守王玄載為南豫州刺史泰豫元年春正月甲寅朔上有疾不朝會以疾患未痊故改元賜孤老貧疾粟帛各有差戊午皇太子會萬國於東宮并受貢計二月辛丑以給事黃門侍郎王瞻為司州刺史三月癸丑朔林邑國遣使獻方物己未中書監揚州刺史王景文卒夏四月辛卯以撫軍司馬蔡那為益州刺史癸巳以右衞將軍張興世為雍州刺史己亥上大漸驃騎大將軍江州刺史桂陽王休範進位司空尚書右僕射褚淵為護軍將軍中領軍劉勔加尚書右僕射鎮東將軍蔡興宗為征西將軍開府儀同三司荊州刺史鎮軍將軍郢州刺史沈攸之進號安西將軍詔曰朕自臨御億兆仍屬戎寇雖每存弘化而惠弗覃遠軍國凋弊刑訟未息今大漸維危載深矜歎可緩徭優調去繁就約因改之宜詳有簡衷務以愛民為先以宣朕遺意袁粲褚淵劉勔蔡興宗沈攸之同被顧命是日上崩于景福殿時年三十四五月戊寅葬臨沂縣莫府山高寧陵帝少而和令風姿端雅早失所生養於太后宮內大明世諸弟多被猜忌唯上見親常侍路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衞瓘所注論語二卷行於世及即大位四方反叛以寬仁待物諸軍帥有父兄子弟同逆者並授以禁兵委任不易故衆為之用莫不盡力平定天下逆黨多被全其有才能者並見授用有如舊臣才學之士多蒙引進參侍文籍應對左右於華林園含芳堂講周易常自臨聽末年好鬼神多忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有犯必加罪戮改騧為馬邊瓜亦以騧字似禍字故也以南苑借張永云且給三百年期訖更啟其事類皆如此宣陽門民間謂之白門上以白門之名不祥甚諱之尚書右丞江謐嘗誤犯上變色曰白汝家門謐稽顙謝久之方釋太后停屍漆牀先出東宮上嘗幸宮見之怒甚免中庶子官職局以之坐者數十人內外常慮犯觸人不自保宮內禁忌尤甚移牀治壁必先祭土神使文士為文詞祝策如大祭饗泰始泰豫之際更忍虐好殺左右失旨忤意往往有斮刳斷截者時經略淮泗軍旅不息荒弊積久府藏空竭內外百官並日料祿俸而上奢費過度務為彫侈每所造制必為正御三十副御次副又各三十須一物輒造九十枚天下騷然民不堪命其餘事迹列見衆篇親近讒慝剪落皇枝宋氏之業自此衰矣史臣曰聖人立法垂制所以必稱先王蓋由遺訓餘風足以貽之來世也太祖負扆南面實有君人之懿焉經國之義雖弘而隆家之道不足彭城王照不窺古本無卓爾之資徒見昆弟之義未識君臣之禮冀以此家情行之國道主猜而猶犯恩薄而未悟致以呵訓之微行遂成滅親之大禍開端樹隙垂之後人雖天倫之重義殊凡戚而中人以下情由恩變至於易衣而出分苦而食與夫別宮異門形疎事隔者宜有降矣太宗因易隙之情據已行之典剪落洪枝願不待慮既而本根無庇幼主孤立神器以勢弱傾移靈命隨樂推回改斯蓋履霜有漸堅冰自至所從來遠也
