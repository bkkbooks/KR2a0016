覘知在南斗二十一度元和所用即與古曆相符也逮至景初而終無毫忒書云日短星昴以正仲冬直以月維四仲則中宿常在衞陽羲和所以正時取其萬世不易也沖之以為唐代冬至日在今宿之左五十許度遂虛加度分空撤天路其置法所在近違半次則四十五年九月率移一度在詩七月流火此夏正建申之時也定之方中又小雪之節也若冬至審差則豳公火流晷長一尺五寸楚宮之作晝漏五十三刻此詭之甚也仲尼曰丘聞之火伏而後蟄者畢今火猶西流司曆過也就如沖之所誤則星無定次卦有差方名號之正古今必殊典誥之音代不通軌堯之開閉今成建除今之壽星乃周之鶉尾即時東壁已非玄武軫星頓屬蒼龍誣天背經乃至於此沖之又改章法三百九十一年有一百四十四閏臣法興議夫日有緩急故斗有闊狹古人制章立為中格年積十九常有七閏晷或虛盈此不可革沖之削閏壞章倍減餘數則一百三十九年二月於四分之科頓少一日七千四百二十九年輒失一閏夫日少則先時閏失則事悖竊聞時以作事事以厚生以此乃生人之大本曆數之所先愚恐非沖之淺慮妄可穿鑿沖之又命上元日度發自虛一云虛為北方列宿之中臣法興議沖之既云冬至歲差又謂虛為北中舍形責影未足為迷何者凡在天非日不明居地以斗而辨借令冬至在虛則黃道彌遠東北當為黃鍾之宮室壁應屬玄枵之位虛宿豈得復為北中乎曲使分至屢遷而星次不改招搖易繩而律呂仍往則七政不以璣衡致齊建時亦非攝提所紀不知五行何居六屬安託沖之又令上元年在甲子臣法興議夫置元設紀各有所尚或據文於圖讖或取效於當時沖之云羣氏糾紛莫審其會昔黃帝辛卯日月不過顓頊乙卯四時不忒景初壬辰晦無差光元嘉庚辰朔無錯景豈非承天者乎沖之苟存甲子可謂為合以求天也沖之又令日月五緯交會遲疾悉以上元為始臣法興議夫交會之元則食既可求遲疾之際非凡夫所測昔賈逵略見其差劉洪觕著其術至於疏密之數莫究其極且五緯所居有時盈縮即如歲星在軫見超七辰術家既追算以會今則往之與來斷可知矣景初所以紀首置差元嘉兼又各設後元者其並省功於實用不虛推以為煩也沖之既違天於改易又設法以遂情愚謂此治曆之大過也臣法興議日有八行各成一道月有一道離為九行左交右疾倍半相違其一終之理日數宜同沖之通周與會周相覺九千四十其陰陽七十九周有奇遲疾不及一帀此則當縮反盈應損更益沖之隨法興所難辯折之曰臣少銳愚尚專功數術搜練古今博采沈奧唐篇夏典莫不揆量周正漢朔咸加該驗罄策籌之思究疏密之辨至若立圓舊誤張衡述而弗改漢時斛銘劉歆詭謬其數此則算氏之劇疵也乾象之弦望定數景初之交度周日匪謂測候不精遂乃乘除翻謬斯又曆家之甚失也及鄭玄闞澤王蕃劉徽並綜數藝而每多疏舛臣昔以暇日撰正衆謬理據炳然易可詳密此臣以俯信偏識不虛推古人者也按何承天曆二至先天閏移一月五星見伏或違四旬列差妄設當益反損皆前術之乖遠臣曆所改定也既沿波以討其源刪滯以暢其要能使躔次上通晷管下合反以譏詆不其惜乎尋法興所議六條並不造理難之關楗謹陳其目其一日度歲差前法所略臣據經史辨正此數而法興設難徵引詩書三事皆謬其二臣校晷景改舊章法法興立難不能有詰直云恐非淺慮所可穿鑿其三次改方移臣無此法求術意誤橫生嫌貶其四曆上元年甲子術體明整則苟合可疑其五臣其曆七曜咸始上元無隙可乘復云非凡夫所測其六遲疾陰陽法興所未解誤謂兩率日數宜同凡此衆條或援謬目譏或空加抑絕未聞折正之談厭心之論也謹隨詰洗釋依源徵對仰照天暉敢罄管穴法興議曰夫二至發斂南北之極日有度而宿無改位故古曆冬至皆在建星沖之曰周漢之際疇人喪業曲技競設圖緯實繁或借號帝王以崇其大或假名聖賢以神其說是以讖記多虛桓譚知其矯妄古曆舛雜杜預疑其非直按五紀論黃帝曆有四法顓頊夏周並有二術詭異紛然則孰識其正此古曆可疑之據一也夏曆七曜西行特違衆法劉向以為後人所造此可疑之據二也殷曆日法九百四十而乾鑿度云殷曆以八十一為日法若易緯非差殷曆必妄此可疑之據三也顓頊曆元歲在乙卯而命曆序云此術設元歲在甲寅此可疑之據四也春秋書食有日朔者凡二十六其所據曆非周則魯以周曆考之檢其朔日失二十五魯曆校之又失十三二曆並乖則必有一偽此可疑之據五也古之六術並同四分四分之法久則後天以食檢之經三百年輒差一日古曆課今其甚疏者朔後天過二日有餘以此推之古術之作皆在漢初周末理不得遠且却校春秋朔並先天此則非三代以前之明徵矣此可疑之據六也尋律曆志前漢冬至日在斗牛之際度在建星其勢相隣自非帝者有造則儀漏或闕豈能窮密盡微纖毫不失建星之說未足證矣法興議曰戰國橫騖史官喪紀爰及漢初格候莫審後雜覘知在南斗二十一度元和所用即與古曆相符也逮至景初終無毫忒沖之曰古術訛雜其詳闕聞乙卯之曆秦代所用必有効於當時故其言可徵也漢武改創檢課詳備正儀審漏事在前史測星辨度理無乖遠今議者所是不實見所非徒為虛妄辨彼駭此既非通談運今背古所誣誠多偏據一說未若兼今之為長也景初之法實錯五緯今則在衝口至曩已移日蓋略治朔望無事檢候是以晷漏昏明並即元和二分異景尚不知革日度微差宜其謬矣法興議曰書云日短星昴以正仲冬直以月推四仲則中宿常在衞陽羲和所以正時取其萬代不易也沖之以為唐代冬至日在今宿之左五十許度遂虛加度分空撤天路沖之曰書以四星昏中審分至者據人君南面而言也且南北之正其詳易准流見之勢中天為極先儒注述其義僉同而法興以為書說四星皆在衞陽之位自在巳地進失向方退非始見迂廻經文以就所執違訓詭情此則甚矣捨午稱巳午上非無星也必據中宿餘宿豈復不足以正時若謂舉中語兼七列者觜參尚隱則不得言昴星雖見當云伏矣奎婁已見復不得言伏見不得以為辭則名將何附若中宿之通非允當實謹檢經旨直云星昴不自衞陽衞陽無自顯之義此談何因而立苟理無所依則可愚辭成說曾泉桑野皆為明證分至之辨竟在何日循復再三竊深歎息法興議曰其置法所在近違半次則四十五年九月率移一度沖之曰元和日度法興所是唯徵古曆在建星以今考之臣法冬至亦在此宿斗二十一了無顯證而虛貶臣曆乖差半次此愚情之所駭也又年數之餘有十一月而議云九月涉數每乖皆此類也月盈則食必在日衝以檢日則宿度可辨請據效以課疏密按太史註記元嘉十三年十二月十六日甲夜月蝕盡在鬼四度以衝計之日當在牛六依法興議曰在女七又十四年五月十五日丁夜月蝕盡在斗二十六度以衝計之日當在井三十依法興議曰日在柳二又二十八年八月十五日丁夜月蝕在奎十一度以衝計之日當在角二依法興議曰日在角十二又大明三年九月十五日乙夜月蝕盡在胃宿之末以衝計之日當在氐十二依法興議曰日在心二凡此四蝕皆與臣法符同纖豪不爽而法興所據頓差十度違衝移宿顯然易覩故知天數漸差則當式遵以為典事驗昭豈得信古而疑今法興議曰在詩七月流火此夏正建申之時也定之方中又小雪之節也若冬至審差則豳公火流晷長一尺五寸楚宮之作晝漏五十三刻此詭之甚也沖之曰臣按此議三條皆謬詩稱流火蓋略舉西移之中以為驚寒之候流之為言非始動之辭也就如始說冬至日度在斗二十一則火星之中當在大暑之前豈隣建申之限此專自攻糾非謂矯失夏小正五月昏大火中此復在衞陽之地乎又謂臣所立法楚宮之在九月初按詩傳箋皆謂定之方中者室辟昏中形四方也然則中天之正當在室之八度臣曆推之元年立冬後四日此度昏中乃自十月之初又非寒露之日也議者之意蓋誤以周世為堯時度差五十故致此謬小雪之節自信之談非有明文可據也法興議曰仲尼曰丘聞之火伏而後蟄者畢今火猶西流司曆過也就如沖之所誤則星無定次卦有差方名號之正古今必殊典誥之音時不通軌堯之開閉今成建除今之壽星乃周之鶉尾也即時東壁已非玄武軫星頓屬蒼龍誣天背經乃至於此沖之曰臣以為辰極居中而列曜貞觀羣像殊體而陰陽區別故羽介咸陳則水火有位蒼素齊設則東西可準非以日之所在定其名號也何以明之夫陽爻初九氣始正北玄武七列虛當子位若圓儀辨方以日為主冬至所舍當在玄枵而今之南極乃處東維違體失中其義何附若南北以冬夏稟稱則卯酉以生殺定號豈得春躔義方秋麗仁域名舛理乖若此之反哉因茲以言固知天以列宿分方而不在於四時景緯環序日不獨守故轍矣至於中星見伏記籍每以審時者蓋以曆數難詳而天驗易顯各據一代所合以為簡易之政也亦猶夏禮未通商典濩容豈襲韶節誠天人之道同差則蓺之興因代而推移矣月位稱建諒以氣之所本名隨實著非謂斗杓所指近校漢時已差半次審斗節時其效安在或義非經訓依以成說將緯候多詭偽辭間設乎次隨方名義合宿體分至雖遷而厥位不改豈謂龍火貿處金水亂列名號乖殊之譏抑未詳究至如壁非玄武軫屬蒼龍瞻度察晷實效咸然元嘉曆法壽星之初亦在翼限參校晉注顯驗甚衆天數差移百有餘載議者誠能馳辭騁辯令南極非冬至望不在衝則此談乃可守耳若使日遷次留則無事屢嫌乃臣曆之良證非難者所宜列也尋臣所執必據經史遠考唐典近徵漢籍讖記碎言不敢依述竊謂循經之論也月蝕檢日度事驗昭著史注詳論文存禁閣斯又稽天之說也堯典四星並在衞陽今之日度遠準元和誣背之誚實此之謂法興議曰夫日有緩急故斗有闊狹古人制章立為中格年積十九常有七閏晷或盈虛此不可革沖之削閏壞章倍減餘數則一百三十九年二月於四分之科頓少一日七千四百二十九年輒失一閏夫日少則先時閏失則事悖竊聞時以作事事以厚生此乃生民之所本曆數之所先愚恐非沖之淺慮妄可穿鑿沖之曰按後漢書及乾象說四分曆法雖分章設篰創自元和而晷儀衆數定於熹平三年四分志立冬中影長一丈立春中影九尺六寸尋冬至南極日晷最長二氣去至日數既同則中影應等而前長後短頓差四寸此曆景冬至後天之驗也二氣中影日差九分半弱進退均調略無盈縮以率計之二氣各退二日十二刻則晷影之數立冬更短立春更長並差二寸二氣中影俱長九尺八寸矣即立冬立春之正日也以此推之曆置冬至後天亦二日十二刻也熹平三年時曆丁丑冬至加時正在日中以二日十二刻減之天定以乙亥冬至加時在夜半後三十八刻又臣測景歷紀躬辨分寸銅表堅剛暴潤不動光晷明潔纖毫盡然據大明五年十月十日影一丈七寸七分半十一月二十五日一丈八寸一分太二十六日一丈七寸五分強折取其中則中天冬至應在十一月三日求其蚤晚令後二日影相減則一日差率也倍之為法前二日減以百刻乘之為實以法除實得冬至加時在夜半後三十一刻在元嘉曆後一日天數之正也量檢竟年則數減均同異歲相課則遠近應率臣因此驗考正章法今以臣曆推之刻如前竊謂至密永為定式尋古曆法並同四分四分之數久則後天經三百年朔差一日是以漢載四百食率在晦魏代已來遂革斯法世莫之非者誠有效於天也章歲十九其疏尤甚同出前術非見經典而議云此法自古數不可移若古法雖疏永當循用謬論誠立則法興復欲施四分於當今矣理容然乎臣所未譬也若謂今所革創違舛失衷者未聞顯據有以矯奪臣法也元嘉曆術減閏餘二直以襲舊分粗故進退未合至於棄盈求正非為乖理就如議意率不可易則分無增損承天置法復為違謬節氣蚤晚當循景初二至差三日曾不覺其非橫謂臣曆為失知日少之先時未悟增月之甚惑也誠未覩天驗豈測曆數之要生民之本諒非率意所斷矣又法興始云窮識晷變可以刊舊革今復謂晷數盈虛不可為准互自違伐罔識所依若推步不得准天功絕於心目未詳歷紀何因而立案春秋以來千有餘載以食檢朔曾無差失此則日行有之明徵也且臣考影彌年窮察毫微課驗以前合若符契孟子以為千歲之日至可坐而知斯言實矣日有緩急未見其證浮辭虛貶竊非所懼法興議曰沖之既云冬至歲差又謂虛為北中捨形責影未足為迷何者凡在天非日不明居地以斗而辨借令冬至在虛則黃道彌遠東北當為黃鍾之宮室壁應屬玄枵之位虛宿豈得復為北中乎曲使分至屢遷而星次不改招搖易繩而律呂仍往則七政不以璣衡致齊建時亦非攝提所紀不知五行何居六屬安託沖之曰此條所嫌前牒已詳次改方移虛非中位繁辭廣證自搆紛惑皆議者所謬誤非臣法之違設也七政致齊實謂天儀鄭王唱述厥訓明允雖有異說蓋非實義法興議曰夫置元設紀各有所尚或據文於圖讖或取効於當時沖之云羣氏糾紛莫審其會昔黃帝辛卯日月不過顓頊乙卯四時不忒景初壬辰晦無差光元嘉庚辰朔無錯景豈非承天者乎沖之苟存甲子可謂為合以求天也沖之曰夫曆存効密不容殊尚合讖乖說訓義非所取雖驗當時不能通遠又臣所未安也元值始名體明理正未詳辛卯之說何依古術詭謬事在前牒溺名喪實殆非索隱之謂也若以曆合一時理無久用元在所會非有定歲者今以効明之夏殷以前載籍淪逸春秋漢史咸書日蝕正朔詳審顯然可徵以臣歷檢之數皆協同誠無虛設循密而至千載無殊則雖遠可知矣備閱曩法疏越實多或朔差三日氣移七晨未聞可以下通於今者也元在乙丑前說以為非正今值甲子議者復疑其苟合無名之歲自昔無之則推先者將何從乎歷紀之作幾於息矣夫為合必有不合願聞顯據以覈理實法興曰夫交會之元則蝕既可求遲疾之際非凡夫所測昔賈逵略見其差劉洪粗著其術至於疏密之數莫究其極且五緯所居有時盈縮即如歲星在軫見超七辰術家既追算以會今則往之與來斷可知矣景初所以紀首置差元嘉兼又各設後元者其並省功於實用不虛推以為煩也沖之既違天於改易又設法以遂情愚謂此治曆之大過也沖之曰遲疾之率非出神怪有形可檢有數可推劉賈能述則可累功以求密矣議又云五緯所居有時盈縮歲星在軫見超七辰謂應年移一辰也案歲星之運年過次行天七帀輒超一位代以求之曆凡十法並合一時此數咸同史注所記天驗又符此則盈次之行自其定准非為衍度濫徙頓過其衝也若審由盈縮豈得常疾無遲夫甄耀測象者必料分析度考往驗來准以實見據以經史曲辯碎說類多浮詭甘石之書互為矛楯今以一句之經誣一字之謬堅執偏論以罔正理此愚情之所未厭也算自近始衆法可同但景初之二差承天之後元實以奇偶不協故數無盡同為遺前設後以從省易夫建言倡論豈尚矯異蓋令實以文顯言勢可極也稽元曩歲羣數咸始斯誠術體理不可容譏而譏者以為過謬之大者然則元嘉置元雖七率舛陳而猶紀協甲子氣朔俱終此又過謬之小者也必當虛立上元假稱曆始歲違名初日避辰首閏餘朔分月緯七率並不得有盡乃為允衷之製乎設法情實謂意之所安改易違天未覩理之譏者也法興曰日有八行合成一道月有一道離為九行左交右疾倍半相違其一終之理日數宜同沖之通周與會周相覺九千四十其陰陽七十九周有奇遲疾不及一帀此則當縮反盈應損更益沖之曰此議雖游漫無據然言迹可檢按以日八行譬月九道此為月行之軌當循一轍環帀於天理無差動也然則交會之際當有定所豈容或斗或牛同麗一度去極應等安得南北無常若日月非例則八行之說是衍文邪左交右疾語甚未分為交與疾對為舍交即疾若舍交即疾即交在平率入曆七日及二十一日是也值交蝕既當在盈縮之極豈得損益或多或少若交與疾對則在交之衝當為遲疾之始豈得入曆或深或淺倍半相違新故所同復摽此句欲以何明臣覽曆書古今略備至如此說所未前聞遠乖舊準近背天數求之愚情竊所深惑尋遲疾陰陽不相生故交會加時進退無常昔術著之久矣前儒言之詳矣而法興云日數同竊謂議者未曉此意乖謬自著無假驟辯既云盈縮失衷復不備記其數或自嫌所執故汎略其說乎又以全為率當互因其分法興所列二數皆誤或以八十為七十九當縮反盈應損更益此條之謂矣總檢其議豈但臣曆不密又謂何承天法乖謬彌甚若臣曆宜棄則承天術益不可用法興所見既審則應革創至非景極望非日衝凡諸新說必有妙辯乎時法興為世祖所寵天下畏其權既立異議論者皆附之唯中書舍人巢尚之是沖之之術執據宜用上愛慕古欲用沖之新法時大明八年也故須明年改元因此改曆未及施用而宮車晏駕也
