body:
  text: 宋書卷十三志第三律曆下元嘉曆法上元庚辰甲子紀首至太甲元年癸亥三千五百二十三年至元嘉二十年癸未五千七百三年算外元法三千六百四十八章歲十九紀法六百八章月二百三十五紀月七千五百二十章閏七紀日二十二萬二千七十度分七十五度法三百四氣法二十四餘數一千五百九十五歲中十二日法七百五十二沒餘一百九十六通數二萬二千二百七通法四十七沒法三百一十九月周四千六十四周天十一萬一千三十五通周二萬七百二十一周日日餘四百一十七周虛三百三十五會數一百六十交限數八百五十九會月九百三十九朔望合數八十甲子紀第一遲疾差一萬七千六百六十三交會差八百七十七甲戌紀第二遲疾差三千四十三交差二百七十九甲申紀第三遲疾差九千一百四十四交會差六百二十甲午紀第四遲疾差一萬五千二百四十五交會差二十二甲辰紀第五遲疾差六百二十五交會差三百六十三甲寅紀第六遲疾差六千七百二十六交會差七百四推入紀法置上元庚辰盡所求年以元法除之不滿元法以紀法除之餘不滿紀法入紀年也滿法去之得後紀入甲午紀壬辰歲來至今元嘉二十年歲在癸未二百三十一年算外推積月術置入紀年數算外以章月乘之如章歲為積月不盡為閏餘閏餘十二以上其年閏推朔術以通數乘積月為朔積分滿日法為積日不盡為小餘以六旬去積日不盡為大餘命以紀算外所求年正月朔日也求次月加大餘二十九小餘三百九十九小餘滿日法從大餘即次月朔也小餘三百五十三以上其月大也推弦望法加朔大餘七小餘二百八十七小分三小分滿四從小餘小餘滿日法從大餘命如前上弦日也又加之得望又加之得下弦推二十四氣術置入紀年算外以餘數乘之滿度法三百四為積沒不盡為小餘六旬去積沒不盡為大餘命以紀算外所求年雨水日也求次氣加大餘十五小餘六十六小分十一小分滿氣法從小餘小餘滿度法從大餘次氣日也雨水在十六日以後者如法減之得立春推閏月法以閏餘減章歲餘以歲中乘之滿章閏得一數從正月起閏所在也閏有進退以無中氣御之立春正月節限數一百九十四間數一百九十雨水正月中限數一百八十六間數一百八十二驚蟄二月節限數一百七十七間數一百七十二春分二月中限數一百六十七間數一百六十二清明三月節限數一百五十八間數一百五十四穀雨三月中限數一百四十九間數一百四十五立夏四月節限數一百四十二間數一百三十九小滿四月中限數一百三十六間數一百三十四芒種五月節限數一百三十三間數一百三十二夏至五月中限數一百三十一間數一百三十二小暑六月節限數一百三十三間數一百三十四大暑六月中限數一百三十六間數一百三十九立秋七月節限數一百四十二間數一百四十五處暑七月中限數一百四十九間數一百五十三白露八月節限數一百五十七間數一百六十二秋分八月中限數一百六十七間數一百七十二寒露九月節限數一百七十七間數一百八十二霜降九月中限數一百八十六間數一百九十立冬十月節限數一百九十四間數一百九十七小雪十月中限數二百間數二百三大雪十一月節限數二百五間數二百六冬至十一月中限數二百七間數二百六小寒十二月節限數二百五間數二百三大寒十二月中限數二百間數一百九十七推沒滅術因雨水積以沒餘乘之滿沒法為大餘不盡為小餘如前所求年為雨水前沒日也求次沒加大餘六十九小餘一百九十六滿沒法從大餘命如前雨水後沒日也雨水前沒多在故歲常有五沒官以沒正之一年常有五沒或六沒小餘盡為滅日也雨水小餘三十九以還雨水六旬後乃有推土用事法置立春大小餘小分之數減大餘十八小餘七十九小分十八命以紀算外立春前土用事日也大餘不足加六十小餘不足減減大餘一加度法而後減之立夏立冬求土用事皆如上法推日所在度法以度法乘朔積日周天去之餘滿度法為積度不盡為分命度起室二次宿除之算外正月朔夜半日在度及分也求次日日加一度經室去度分推月所在度法以月周乘朔積日周天去之餘滿度法為積度不盡為分命度如前正月朔夜半月所在度及分求次月小月加度二十二分一百三十三大月加度三十五分二百四十五分滿度法成一度命如前次月朔月所在度及分也曆先月法以十六除月行分為大分如所入遲疾加之經室去度分推合朔月食術置所求年積月以會數一百六十乘之以所入交會紀差二十二加之滿會月去之餘則其年正月朔去交分也求次月以會數加之滿會月去之求望加合數朔望去交分如合數以下交限數以上朔則交會望則月食推入遲疾曆法置所求年朔積分所入遲疾差一萬五千二百四十五加之滿通周去之餘滿日法得一日不盡為日餘命日算外所求年正月朔入曆求次月加一日日餘七百三十四求望加十四日日餘五百七十五半餘滿日法成一日日滿二十七去之除日餘如周日日餘不足減減一日加周虛日滿二十七而日餘不滿周日日餘為損周日滿去之為入曆一日推合朔月食定大小餘法以入曆日餘乘入曆下損益率入一日益二十五是也以損益盈縮積分值損則損之值益則益之為定積分以入曆日餘乘列差滿日法盈減縮加差法為定差法以除定積分所得減加本朔望小餘值盈則減縮則加之為定小餘加之滿日法合朔月食進一日減之不足減者加日法而後減之則退一日值周日者用周日定數推加時以十二乘定小餘滿日法得一辰數從子起算外則朔望加時所在辰也有餘者四之滿日法得一為少二為半三為太又有餘者三之滿日法得一為強半法以上排成一不滿半法棄之以強并少為少強并半為半強并太為太強得二者為少弱以并少為半弱以并半為太弱以并太為一辰弱以所在辰名之推合朔月食加時滿刻法各以百刻乘定小餘如日法而一不盡什之求分先除夜漏之半即晝漏加時刻及分也晝漏盡又入夜漏在中節前後四日以還者視限數在中節前後五日以上者視間限數月食加時定小餘不滿限數間數者皆以算上為日月行遲疾度損益率盈縮積分列差差法一日十四度十三分益二十五盈二二百六十二日十四度十一分益二十三盈萬八千八百三二百五十八三日十四度八分益二十盈三萬六千九十六四二百五十五四日十四度四分益十六盈五萬一千一百三十六五二百五十一五日十三度十八分益十一盈六萬三千一百六十八五二百四十六六日十三度十三分益六盈七萬一千四百四十六二百四十一七日十三度七分益盈七萬五千九百五十二五二百三十五八日十三度二分損五盈七萬五千九百五十二四二百三十九日十二度十七分損九盈七萬二千一百九十二三二百二十六十日十二度十四分損十二盈六萬五千四百二十四三二百二十三十一日十二度十一分損十五盈五萬六千四百三二百二十十二日十二度八分損十八盈四萬五千一百二十二二百一十七十三日十二度六分損二十盈三萬一千五百八十四二二百一十五十四日十二度四分損二十二盈一萬六千五百四十四二二百一十三十五日十二度二分益二十四縮二二百一十一十六日十二度四分益二十二縮一萬八千四十八二二百一十三十七日十二度六分益二十縮三萬四千五百九十二三二百一十五十八日十二度九分益十七縮四萬九千六百三十二五二百一十八十九日十二度十四分益十二縮六萬二千四百一十六六二百二十三二十日十三度一分益六縮七萬一千四百四十六二百二十九二十一日十三度七分益縮七萬五千九百五十二五二百三十五二十二日十三度十二分損五縮七萬五千九百五十二四二百四十二十三日十三度十六分損九縮七萬二千一百九十二四二百四十四二十四日十四度一分損十三縮六萬五千四百二十四四二百四十八二十五日十四度五分損十七縮五萬五千六百四十八三二百五十二二十六日十四度八分損二十縮四萬二千八百六十四三二百五十五二十七日十四度十一分損二十三縮二萬七千八百二十四二二百五十八周日十四度十三分損二十五定縮一萬五百二十八定備九萬三二百六十定意差小分一百三損二百二十四千四百八法二千三百九推合朔度以章歲乘朔小餘滿通法為大分不盡為小分以大分從朔夜半日日分滿度命如前正月朔日月合朔所在共合度也求次月加度二十九大分一百六十一小分十四小分滿通法從大分大分滿度法從度經室除度分求望加十四度大分二百三十二小分三十半求望月所在度加日度一百八十二分一百八十九小分二十三半二十日所在四氣度日中晷影晝漏刻夜漏刻昏中星明中星雨水室一太強八尺二寸二分五十五分四十九五分觜一少強尾十一強驚蟄壁一強六尺七寸二分五十二九分四十七一分井九半強箕四少弱春分奎七少強五尺三寸九分五十五五分四十四五分井二十九半強斗四弱清明婁六半四尺二寸五分五十八四十二柳十二太斗十四半穀雨胃九太弱三尺二寸五分六十三分三十九七分張十斗二十五半立夏昴十一弱二尺五寸六十二三分三十七七分翼十太弱女三少小滿畢十五少弱一尺九寸七分六十三九分三十六一分軫十弱虛二弱芒種井三半弱一尺六寸九分六十四八分三十五二分角十太弱危七弱夏至井十八一尺五寸六十五三十五氐五少弱室五少強小暑鬼一弱一尺六寸九分六十四八分三十五二分房四太弱壁六太弱大暑柳十二弱一尺九寸七分六十三九分三十六一分尾八太弱奎十二太弱立秋張五半強二尺五寸六十二三分三十七七分箕三胃二太弱處暑翼二半三尺二寸五分六十三分三十九七分斗三半昴七太弱白露翼十七太弱四尺二寸五分五十八四十二斗十四半弱畢十六半弱秋分軫十五五尺三寸九分五十五五分四十四五分斗二十五少強井九少強寒露亢一少六尺七寸二分五十二九分四十七一分牛八半強井二十九弱霜降氐七半八尺二寸八分五十五分四十九五分女十一半弱柳十一半強立冬心二半弱九尺九寸一分四十八四分五十一六分危二弱張八太弱小雪尾十二太強一丈一尺三寸四分四十六七分五十三三分危十三半強翼八太強大雪箕十一丈二尺四寸八分四十五六分五十四四分室九半強軫八少強冬至冬十四強一丈三尺四十五五十五壁八太強角七少強小寒牛三半強一丈二尺四寸八分四十五六分五十四四分奎十五少亢九大寒女十半強一丈一尺三寸四分四十六七分五十三三分胃四半強氐十三太強立春危四九尺九寸一分四十八四分五十一六分昴九少心四強推五星法合歲合數日度法室分木三百四十四三百一十五九萬五千七百六十二萬三千六百二十五火四百五十九二百一十五六萬五千三百六十一萬六千一百二十五土三百八十三三百七十一十一萬二千四百八十二萬七千七百五十金二百六十七一百六十七五萬七百六十八一萬二千五百二十五水七十九二百四十九七萬五千六百九十六一萬八千六百七十五木後元丙戌晉咸和元年至元嘉二十年癸未百十八年算上火後元乙亥元嘉十二年至元嘉二十年癸未九年算上土後元甲戌元嘉十一年至元嘉二十年癸未十年算上金後元甲申晉太元九年至元嘉二十年癸未六十年算上水後元乙丑元嘉二年至元嘉二十年癸未十九年算上推五星法各設其元至所求年算上以合數乘之滿合歲為積合不盡曰合餘多者以合數除之得一星合往年得二合前往年不滿合數其年木土金則有往年合火有前往年合水一年三合或四合也以合餘減合數為度分水度分滿合歲則去之也以周天十一萬一千三十五乘度分滿日度法為積度不盡曰度餘命度以室二算外星合所在度也以合數乘其年內雨水小餘并度餘為日餘滿日度法從積度為日命以雨水算外星合日也求星見日法以法伏日及餘木則十六日及餘是也加星合日及餘滿日度法成一日命如前星見日也求星見度法以法伏度及餘木則二度及餘是也加星合度及餘滿日度法成一度命如前所見度也以星行分母木則二十三見也乘見度餘滿日度法得一分乃日加所行分木順日行四分分滿其母成一度逆順母不同木逆分母七也當各乘度餘留者承前逆則減之伏不書度經室去分不足減者破全度五星室分各異若在行分各依室分去之木初與日合伏十六日日餘四萬一千七百八十行二度餘七萬七千八百四十七半晨見東方去日十三度半強順日行二十三分之四一百一十五日行二十度留不行二十六日而逆日行七分之一八十四日退十二度又留二十六日順一百一十五日行二十度夕伏西方日度餘如初與日合一終三百九十八日日餘八萬三千五百六十行星三十三度餘五萬九千九百三十五火初與日合伏七十一日日餘二萬四千八百一十二半行五十四度度餘四萬九千四百三十晨見東方去日十六度半強順疾日行七分之五一百八日半行七十七度半小遲日行七分之四一百二十六日行七十二度而大遲日行七分之二四十二日行十二度留不行十二日而逆日行十分之三六十日退十八度又留十二日順遲四十二日行十二度小疾一百二十六日行七十二度一百八日半行七十七度半夕伏西方日度餘如初與日合一終七百七十九日日餘四萬九千六百二十五行星四百一十四度餘三萬三千五百除一周行星定四十九度度餘一萬七千三百七十五土初與日合伏十八日日餘四千四百八十二半行二度度餘四萬六千八百四十七半晨見東方去日十五度半強順日行十二分之一八十四日行七度留不行三十六日而逆日行十七分之一一百二日退六度又留三十六日順八十四日行七度夕伏西方日度餘如初與日合一終三百七十八日日餘八千九百六十五行星十二度度餘九萬三千六百九十五金初與日合伏四十一日日餘四萬九千六百八十四半行五十一度度餘四萬九千六百八十四半見西方去日十度順疾日行一度十三分之三九十一日行一百十二度而小遲日行一度十三分之二九十一日行一百五度又大遲日行十五分之十一四十五日行三十三度留不行八日而逆日行三分之二九日退六度伏西方伏六日退四度而與日合又六日退四度晨見東方逆九日退六度又留八日順四十五日行三十三度小疾九十一日行一百五度大疾九十一日行百一十二度晨伏東方日度餘如初與日合一終五百八十三日日餘四萬八千六百一除一周行星定二百一十八度度餘三萬六千七十六一合二百九十一日餘四萬九千六百八十四半行星如之水初與日合伏十七日日餘七萬一千二百一十半行三十四度度餘七萬一千二百一十半見西方去日十七度順疾日行一度三分之一十八日行二十四度而遲日行七分之五七日行五度留不行四日夕伏西方伏十一日退六度而與日合又十一日退六度而晨見東方留四日順遲七日行五度疾十八日行二十四度晨伏東方日度餘如初與日合一終一百一十五日日餘六萬六千七百二十五行星如之一合五十七日日餘七萬一千二百一十半行星亦如之盈加縮減十六除月行分日法除盈縮分以減度分盈加縮減推卦因雨水大小餘加大餘六小餘三百一十九小餘滿三千六百四十八成日日滿二十七日餘不足加減不加周虛元嘉二十年承天奏上尚書今既改用元嘉曆漏刻與先不同宜應改革按景初曆春分日長秋分日短相承所用漏刻冬至後晝漏率長於冬至前且長短增減進退無漸非唯先法不精亦各傳寫謬誤今二至二分各據其正則至之前後無復差異更增損舊刻參以晷影刪定為經改用二十五箭請臺勒漏郎將考驗施用從之前世諸儒依圖緯云月行有九道故畫作九規更相交錯檢其行次遲疾換易不得順度劉向論九道云青道二出黃道東白道二出黃道西黑道二出北赤道二出南又云立春春分東從青道立夏夏至南從赤道秋白冬黑各隨其方按日行黃道陽路也月者陰精不由陽路故或出其外或入其內出入去黃道不得過六度入十三日有奇而出出亦十三日有奇而入凡二十七日而一入一出矣交於黃道之上與日相掩則蝕焉漢世劉洪推檢月行作陰陽曆法元嘉二十年太祖使著作令史吳癸依洪法制新術令太史施用之元嘉曆月行陰陽法陰陽曆損益率兼數一日益十七初二日前限餘六百六十五益十六十七微分一千七百三十八三日益十五三十三四日益十二四十八五日益八六十六日益四六十八七日益一七十二八日損二七十三九日損六七十一十日損十六十五十一日損十三五十五十二日損十五四十二十三日後限餘二千一十九損十六二十七微分一千七十九分日二千六百損十六大大者五千三百七十一十一八十五半分之三千四百七十二曆周五萬五千五百一十七半差率一萬一百九十微分法一千八百七十八推入陰陽曆術曰以會月去入紀積月餘以會數乘之以所入紀交會差加之周天乘之滿微分法為大分不盡為微分大分滿周天去之餘不滿曆周者為入陽曆餘皆如月周得一日算外所求年正月合朔入曆也不盡為日餘求次月加二日日餘一千三百三十一微分一千五百九十八如法成日日滿十三去之除日餘如分日陰陽曆竟互入端入曆在前限餘前後限餘後者月行中道求朔弦望定數各置入遲疾曆盈縮定積分以章歲乘之差法除之所得滿通法為大分不盡以微分法乘之如法為微分盈減縮加陰陽日餘盈不足以月周進退日而定以定日餘乘損益兼數為加時定數推夜半入曆以差率乘朔小餘如微分法得一以減入曆餘不足加月周而減之卻一日卻得分日加其分半微分為小分即朔日夜半入曆曆餘小分也求次日加一日日餘十六小分三百二十小分如會月從餘餘滿月周去之又加一日曆竟下日餘滿分日去之互入曆初也不滿分日者值之加餘一千三百九十四小分七百八十九半為入次曆求夜半定日以朔小餘減入遲疾曆日餘不足一日却得周日加餘四百一十七即月夜半入曆日及餘也以日餘乘損益率以損益盈縮積分為定積分滿通法為大分不盡以會月乘之如法為小分以盈加縮減入陰陽日餘盈不足進退日而定也以定日餘乘損益率如月周以損益兼數為夜半定數求昏明數以損益率乘所近節氣夜漏二百而一為明以減損益率為昏而以損益夜半數為昏明定數也求月去黃道度置加時若昏明定數以十二除之為度其餘三而一為少不盡為強二少弱也所得為月去黃道度大明六年南徐州從事史祖沖之上表曰古曆疏舛頗不精密羣氏糾紛莫審其要何承天所奏意存改革而置法簡略今已乖遠以臣校之三覩厥謬日月所在差覺三度二至晷影幾失一日五星見伏至差四旬留逆進退或移兩宿分至乖失則節閏非正宿度違天則伺察無準臣生屬聖辰逮在昌運敢率愚瞽更創新曆謹立改易之意有二設法之情有三改易者其一以舊法一章十九歲有七閏閏數為多經二百年輒差一日節閏既移則應改法曆紀屢遷實由此條今改章法三百九十一年有一百四十四閏令卻合周漢則將來永用無復差動其二以堯典云日短星昴以正仲冬以此推之唐代冬至日在今宿之左五十許度漢代之初即用秦曆冬至日在牽牛六度漢武改立太初曆冬至日在牛初後漢四分法冬至日在斗二十一晉時姜岌以月蝕檢日知冬至在斗十七今參以中星課以蝕望冬至之日在斗十一通而計之未盈百載所差二度舊法並令冬至日有定處天數既差則七曜宿度漸與曆舛乖謬既著輒應改制僅合一時莫能通遠遷革不已又由此條今令冬至所在歲歲微差卻檢漢注並皆審密將來久用無煩屢改又設法者其一以子為辰首位在正北爻應初九斗氣之端虛為北方列宿之中元氣肇初宜在此次前儒虞喜備論其義今曆上元日度發自虛一其二以日辰之號甲子為先曆法設元應在此歲而黃帝以來世代所用凡十一曆上元之歲莫值此名今曆上元歲在甲子其三以上元之歲曆中衆條並應以此為始而景初曆交會遲疾元首有差又承天法日月五星各自有元交會遲疾亦並置差裁合朔氣而已條序紛互不及古意今設法日月五緯交會遲疾悉以上元歲首為始則合璧之曜信而有徵連珠之暉於是乎在羣流共源實精古法若夫測以定形據以實效縣象著明尺表之驗可推動氣幽微寸管之候不忒今臣所立易以取信但深練始終大存整密革新變舊有約有繁用約之條理不自懼用繁之意顧非謬然何者夫紀閏參差數各有分分之為體非細不密臣是用深惜毫釐以全求妙之準不辭積累以成永定之制非為思而莫悟知而不改也竊恐讚有然否每崇遠而隨近論有是非或貴耳而遺目所以竭其管穴俯洗同異之嫌披心日月仰希葵藿之照若臣所上萬一可采伏願頒宣羣司賜垂詳究庶陳錙銖少增盛典曆法上元甲子至宋大明七年癸卯五萬一千九百三十九年算外元法五十九萬二千三百六十五紀法三萬九千四百九十一章歲三百九十一章月四千八百三十六章閏一百四十四閏法十二月法十一萬六千三百二十一日法三千九百三十九餘數二十萬七千四十四歲餘九千五百八十九沒分三百六十萬五千九百五十一沒法五萬一千七百六十一周天一千四百四十二萬四千六百六十四虛分萬四百四十九行分法二十三小分法一千七百一十七通周七十二萬六千八百一十會周七十一萬七千七百七十七通法二萬六千三百七十七差率三十九推朔術置入上元年數算外以章月乘之滿章歲為積月不盡為閏餘閏餘二百四十七以上其年有閏以月法乘積月滿日法為積日不盡為小餘六旬去積日不盡為大餘大餘命以甲子算外所求年天正十一月朔也小餘千八百四十九以上其月大求次月加大餘二十九小餘二千九十小餘滿日法從大餘大餘滿六旬去之命如前次月朔也求弦望加朔大餘七小餘千五百七小分一小分滿四從小餘小餘滿日法從大餘命如前上弦日也又加得望又加得下弦又加得後月朔也推閏術以閏餘減章歲餘滿閏法得一月命以天正算外閏所在也閏有進退以無中氣為正推二十四氣術置入上元年數算外以餘數乘之滿紀法為積日不盡為小餘六旬去積日不盡為大餘大餘命以甲子算外天正十一月冬至日也求次氣加大餘十五小餘八千六百二十六小分五小分滿六從小餘小餘滿紀法從大餘命如前次氣日也求土用事加冬至大餘二十七小餘萬五千五百二十八季冬土用事日也又加大餘九十一小餘萬二千二百七十次土用事日也推沒術以九十乘冬至小餘以減沒分滿沒法為日不盡為日餘命日以冬至算外沒日也求次沒加日六十九日餘三萬四