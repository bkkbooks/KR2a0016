body:
  text: 宋書卷三十八志第二十八州郡四益州寧州廣州交州越州益州刺史漢武帝分梁州立所治別見梁州領郡二十九縣一百二十八戶五萬三千一百四十一口二十四萬八千二百九十三去京都水九千九百七十蜀郡太守秦立晉武帝太康中改曰成都國後復舊領縣五戶一萬一千九百二口六萬八百七十六成都令漢舊縣郫令漢舊縣繁縣令漢舊縣鞞縣令二漢晉太康地志並曰牛鞞屬犍為何志晉穆帝度此永昌令孝建二年以僑戶立廣漢太守漢高帝六年立晉太康地志屬梁州領縣六戶四千五百八十六口二萬七千一百四十九去州陸六百去京都水九千九百雒縣令漢舊縣什邡令漢舊縣郪縣令漢舊縣新都令漢舊縣晉武帝為王國太康六年省為縣屬廣漢陽泉令蜀分綿竹立伍城令晉武帝咸寧四年立太康六年省七年又立何志劉氏立巴西太守譙周巴記建安六年劉璋分巴郡墊江以上為巴西郡徐志本南陽冠軍流民寓入蜀漢晉武帝立非也本屬梁州文帝元嘉十六年度何志梁益二州無此郡領縣九戶四千九百五十四口三萬三千三百四十六閬中令漢舊縣屬巴郡西充國令漢書地理志巴郡有充國縣續漢郡國志和帝永元二年分閬中立充國縣二志不同晉太康地志有西南二充國屬巴西南充國令譙周巴記初平四年分充國為南充國安漢令舊縣屬巴郡漢昌令和帝永元中立晉興令徐志不注置立平州令晉武帝太康元年以野民歸化立懷歸令徐志不注置立益昌令徐志不注置立梓潼太守晉太康地志劉氏分廣漢立本屬梁州文帝元嘉十六年度益州永初郡國又有漢德新興徐同徐云新興義熙九年立漢德舊縣案二漢並無漢德縣晉太康地志王隱並有疑是劉氏所立何益梁二州無此郡領縣四戶三千三十四口二萬一千九百七十六涪令漢舊縣屬廣漢梓潼令漢舊縣屬廣漢西浦令徐志義熙九年立萬安令徐志舊縣二漢晉並無巴郡太守秦立領縣四戶三千七百三十四口一萬三千一百八十三去州內水一千八百陸五百外水二千二百去京都水六千江州令漢舊縣臨江令漢舊縣墊江令漢舊縣獻帝建安六年度巴西劉禪建興十五年復舊枳令漢舊縣遂寧太守永初郡國有何無徐云舊立領縣四戶三千三百二十巴興令徐志不注置立疑是李氏所立德陽令前漢無後漢晉太康地志屬廣漢廣漢令漢舊縣屬廣漢寧蜀郡復有此縣未知孰是晉興令徐志不注置立江陽太守劉璋分犍為立中失本土寄治武陽領縣四戶一千五百二十五口八千二十七江陽令漢舊縣屬犍為緜水令別見漢安令別見常安令晉孝武立懷寧太守秦雍流民晉安帝立本屬南秦文帝元嘉十六年度益州領縣三戶一千三百一十五口五千九百五十寄治成都始平令別見西平令永初郡國直云西何志故屬天水名西縣萬年令漢舊名屬馮翊寧蜀太守永初郡國有而何無徐云舊立永初郡國及徐並有西墊江縣今無領縣四戶一千六百四十三廣漢令別見遂寧郡復有此縣廣都令漢舊縣屬蜀郡升遷令晉太康地志屬汶山西鄉令本名南鄉屬漢中晉武太康三年更名越嶲太守漢武帝元鼎六年立故邛都國何志無領縣八戶一千三百四十九邛都令漢舊縣新興令永初郡國有臺登長漢舊縣晉興長永初郡國有會無長漢舊縣卑水長漢舊縣定莋長漢舊縣蘇利長漢縣曰蘇示曰蘇利汶山太守晉太康地志漢武帝立孝宣地節三年合蜀郡劉氏又立領縣二戶一千一百七口六千一百五去州陸一百去京都水一萬都安侯相蜀立晏官令何志魏平蜀立晉太康地志無南陰平太守陰平郡別見永嘉流寓來屬寄治萇陽領縣二戶一千二百四十口七千五百九十七陰平令別見緜竹令漢舊縣屬廣漢犍為太守漢武帝建元六年開夜郎國立領縣五戶一千三百九十口四千五十七去州陸九十去京都水一萬武陽令漢舊縣南安令漢舊縣資中令漢舊縣僰道令漢舊縣冶官令晉安帝義熙十年立始康太守關隴流民晉安帝立領縣四戶一千六十三口四千二百二十六寄治成都始康令晉安帝立新城子相晉安帝立談令晉安帝立晉豐令晉安帝立晉熙太守秦州流民晉安帝立領縣二戶七百八十五口三千九百二十五晉熙令晉安帝立萇陽令晉安帝立晉原太守李雄分蜀郡為漢原晉穆帝更名領縣五戶一千二百七十二口四千九百六十去州陸一百二十去京都水一萬江原男相漢舊縣屬蜀郡臨邛令漢舊縣屬蜀郡晉樂令何志故屬沈黎晉太康地志無沈黎郡及晉樂縣徙陽令前漢徙縣屬蜀郡後漢屬蜀郡屬國都尉晉太康地志有徙陽縣屬漢嘉漢嘉令前漢青衣縣屬蜀郡順帝陽嘉二年更名劉氏立為漢嘉郡晉江右猶為郡江左省為縣宋寧太守文帝元嘉十年免吳營僑立領縣三戶一千三十六口八千三百四十二寄治成都欣平令與郡俱立宜昌令與郡俱立永安令與郡俱立安固太守張氏於涼州立晉哀帝時民流入蜀僑立此郡本屬南秦文帝元嘉十六年度益州領縣六戶一千一百二十口六千五百五十七去州一百三十去京都水一萬略陽令別見桓陵令張氏立臨渭令晉太康地志屬略陽清水令別見下邽令何志漢舊縣案二漢晉並無此縣興固令何志新立南漢中太守晉地記孝武太元十五年梁州刺史周瓊表立徐志北漢中民流寓孝武大明三年立起居注本屬梁州元嘉十六年度永初郡國屬梁州領縣與此同以永初郡國及起居檢則是太元所立而何志無此郡當是永初以後省大明三年復立也領縣五戶一千八十四口五千二百四十六南長樂令徐志與郡俱立南鄭令徐志與郡俱立南苞中令徐志與郡俱立南沔陽令徐志與郡俱立南城固令徐志與郡俱立北陰平太守徐志本屬秦州文帝元嘉二十六年度永初郡國何志秦梁益並無領縣四戶一千五十三口六千七百六十四陰平令巳見南陽令徐志本南陽白民流寓立桓陵令徐志本安固郡民流寓立順陽令徐志本南陽民流寓立武都太守別見永初郡國何志益州並無此郡徐志本屬秦州流寓立領縣五戶九百八十二口四千四百一武都令漢舊名下辯令別見漢陽令漢舊名略陽令漢屬略陽郡流寓配安定令舊安定郡流寓配新城太守何志新分廣漢立領縣二戶七百五十三口五千九百七十一去州闕去京都九千五百三十北五城令何志新分五城立懷歸令何志新立南新巴太守新巴郡別見起居注新巴民流寓文帝元嘉十二年於劍南立何志新立新巴民先屬梁州既立割配領縣六戶一千七十口二千六百八十三新巴令何志晉安帝立晉城令何志晉安帝立晉安令何志晉安帝立漢昌令何志晉安帝立桓陵令何志晉哀帝立按起居注南新巴元嘉十二年立何云新立則非先有此郡而云此諸縣晉哀帝安帝立不詳綏歸令何無此徐有不注置立南晉壽太守梁州元有晉壽文帝元嘉十二年於劍南以僑流立領縣五戶一千五十七口一千九百四十三去州一百二十去京都水一萬晉壽令別見興安令別見興樂令二漢魏無晉太康地記云元年更名本曰白馬屬汶山何志漢舊縣檢二漢益部無白馬縣邵歡令別見白馬令別見宋興太守文帝元嘉十年免建平營立領南陵建昌二縣何志無復南陵有南漢建忠徐無建忠有永川何云建忠新立領縣三戶四百九十六口一千九百四十三寄治成都南漢令何志晉穆帝立故屬漢中流寓來配建昌令何志新立永川令徐志新立南宕渠太守徐志本南中民蜀立起居注本屬梁州元嘉十六年度永初郡國梁州有宕渠郡領縣三與此同而無南字何同若此郡元嘉十六年度益則何志應在益部不詳領縣三戶五百四口三千一百二十七宕渠令二漢晉太康地志屬巴郡漢興令二漢魏無晉地志有屬興古郡宣漢令前漢無後漢屬巴郡晉太康地志無天水太守別見永初郡國何志益州無此郡徐志與今同領縣三戶四百六十一宋興令徐志不注置立上邽令別見西縣長別見東江陽太守何志晉安帝初流寓入蜀今新復舊土為郡領縣二戶一百四十二口七百四十去州一千五百八十去京都水八千九十漢安令前漢無後漢屬犍為晉太康地志屬江陽緜水令何志晉孝武立沈黎太守蜀記云漢武元鼎十一年分蜀西部邛莋為沈黎郡十四年罷案元鼎至六年云十一年非也又二漢晉並無此郡永初郡國有何無徐云舊郡領縣四戶六十五城陽令徐不注置立蘭令漢舊縣屬越嶲作闌晉太康地志無旄牛令前漢屬蜀郡後漢屬蜀郡屬國都尉晉太康地志屬漢嘉寧州刺史晉武帝泰始七年分益州南中之建寧興古雲南永昌四郡立太康三年省立南夷校尉惠帝太安二年復立增嚑越嶲朱提三郡成帝咸康四年分嚑夜郎朱提越嶲四郡為安州尋罷并寧州越嶲後還益州今領郡十五縣八十一戶一萬二百五十三去京都一萬三千三百建寧太守漢益州郡滇王國劉氏更名領縣十三戶二千五百六十二味縣令漢舊縣同樂令晉武帝立談令漢舊縣屬嚑晉武帝立牧麻令漢舊縣作牧靡漏江令漢舊縣屬嚑晉武帝立同瀨長漢舊縣同作銅昆澤長漢舊縣新定長晉太康地志有存艹厂倠心晉太康地志有同並長漢舊縣前漢作同並屬嚑晉武帝咸寧五年省哀帝復立萬安長江左立毋單長漢舊縣屬嚑晉太康地志屬建寧新興長江左立晉寧太守晉惠帝太安二年分建寧西七縣為益州郡晉懷帝更名領縣七戶六百三十七去州七百三十去京都水一萬三千七百建伶令漢舊縣屬益州郡晉太康地志屬建寧連然令漢舊縣屬益州郡晉太康地志屬建寧滇池令漢舊縣屬益州郡晉太康地志屬建寧穀昌長漢舊縣屬益州郡晉太康地志屬建寧秦臧長漢舊縣屬益州郡晉太康地志屬建寧俞元長漢舊縣屬益州郡晉太康地志屬建寧雙栢長漢舊縣屬益州郡晉太康地志屬建寧嚑太守漢武帝元鼎六年立領縣六戶一千九百七十去州一千五百去京都水一萬二千萬壽令晉武帝立故且蘭令漢舊縣云故且蘭晉太康地志無毋斂令漢舊縣晉樂令江左立丹南長江左立新寧長何徐不注置立平蠻太守晉懷帝永嘉五年寧州刺史王遜分嚑朱提建寧立平夷郡後避桓溫諱改領縣二戶二百四十五去京都水一萬三千平蠻令漢舊縣屬嚑故名平夷鄨令漢舊縣屬嚑夜郎太守晉懷帝永嘉五年寧州刺史王遜分嚑朱提建寧立領縣四戶二百八十八去州一千去京都水一萬四千夜郎令漢舊縣屬嚑廣談長晉太康地志屬嚑談樂長江左立談栢令漢舊縣屬嚑朱提太守劉氏分犍為立領縣五戶一千一十去州七百二十去京都水一萬四千六百朱提令前漢屬犍為後漢屬犍為屬國都尉堂狼令前漢屬犍為狼作琅後漢晉太康地志屬朱提臨利長江左立漢陽長前漢屬犍為後漢無晉太康地志屬朱提南秦長本名南昌晉武帝太康元年更名南廣太守晉懷帝分朱提立領縣四戶四百四十去州水二千三百去京都水一萬四百南廣令漢舊縣屬犍為晉太康地志屬朱提新興令何志不注置立晉昌令江左立常遷長江左立建都太守晉成帝分建寧立領縣六戶一百七去州二千去京都水一萬五十新安令晉成帝立經雲令晉成帝立永豐令晉成帝立臨江令晉成帝立麻應長晉成帝立遂安長晉成帝立西平太守晉懷帝永嘉五年寧州刺史王遜分興古之東立何志晉成帝立非也永初郡國何志並有西寧縣何云晉成帝立今無領縣五戶一百七十六去州二千三百去京都水一萬五千三百西平令何志晉成帝立溫江令何志晉成帝立都陽令何志晉成帝立案晉起居注太康二年置興古之都唐縣疑是晉綏長何志晉成