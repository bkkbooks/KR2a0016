body:
  text: 宋書卷五十七列傳第十七蔡廓子興宗蔡廓字子度濟陽考城人也曾祖謨晉司徒祖系撫軍長史父綝司徒左西屬廓博涉羣書言行以禮起家著作佐郎時桓玄輔晉議復肉刑廓上議曰夫建封立法弘治稽化必隨時置制德刑兼施貞一以閑其邪教禁以檢其慢灑湛露以膏潤厲嚴霜以肅威晞風者陶和而安恬畏戾者聞憲而警慮雖復質文迭用而斯道莫革肉刑之設肇自哲王蓋由曩世風淳民多惇謹圖像既陳則機心冥戢刑人在塗則不逞改操故能勝殘去殺化隆無為季末澆偽法網彌密利巧之懷日滋恥畏之情轉寡終身劇役不足止其姦況乎黥劓豈能反其善徒有酸慘之聲而無濟治之益至於棄市之條實非不赦之罪事非手殺考律同歸輕重均科減降路塞鍾陳以之抗言元皇所為留愍今英輔翼讚道邈伊周雖閉否之運甫開而遐遺之難未已誠宜明慎用刑愛民弘育申哀矜以革濫移大辟於支體全性命之至重恢繁息於將來使將斷之骨荷更榮於三陽干時之華監商飆而知懼威惠俱宣感畏偕設全生拯暴於是乎在遷司徒主簿尚書度支殿中郎通直郎高祖太尉參軍司徒屬中書黃門郎以方鯁閑素為高祖所知及高祖領兗州廓為別駕從事史委以州任尋除中軍諮議參軍太尉從事中郎未拜遭母憂性至孝三年不櫛沐殆不勝喪服闋相國府復板為從事中郎領記室宋臺建為侍中建議以為鞫獄不宜令子孫下辭明言父祖之罪虧教傷情莫此為大自今但令家人與囚相見無乞鞫之訴便足以明伏罪不須責家人下辭朝議咸以為允從之世子左衞率謝靈運輒殺人御史中丞王准之坐不糾免官高祖以廓剛直不容邪枉補御史中丞多所糾奏百僚震肅時中書令傅亮任寄隆重學冠當時朝廷儀典皆取定於亮每諮廓然後施行亮意若有不同廓終不為屈時疑揚州刺史廬陵王義真朝堂班次亮與廓書曰揚州自應著刺史服耳然謂坐起班次應在朝堂諸官上不應依官次坐下足下試更尋之詩序云王姬下嫁於諸侯衣服禮秩不係其夫下王后一等推王姬下王后一等則皇子居然在王公之上陸士衡起居注式乾殿集諸皇子悉在三司上今抄疏如別又海西即位赦文太宰武陵王第一撫軍將軍會稽王第二大司馬第三大司馬位既最高又都督中外而次在二王之下豈非下皇子邪此文今具在也永和中蔡公為司徒簡文為撫軍開府對錄朝政蔡為正司不應反在儀同之下而于時位次相王在前蔡公次之耳諸例甚多不能復具疏揚州反乃居卿君之下恐此失禮宜改之邪廓答曰揚州位居卿君之下常亦惟疑然朝廷以位相次不以本封復無明文云皇子加殊禮齊獻王為驃騎孫秀來降武帝欲優異之以秀為驃騎轉齊王為鎮軍在驃騎上若如足下言皇子便在公右則齊王本次自尊何改鎮軍令在驃騎上明知故依見位為次也又齊王為司空賈充為太尉俱錄尚書署事常在充後潘正叔奏公羊事于時三錄梁王肜為衞將軍署在太尉隴西王泰司徒王玄沖下近太元初賀新宮成司馬太傅為中軍而以齊王柔之為賀首立安帝為太子上禮徐邈為郎位次亦以太傅在諸王下又謁李太后宗正尚書符令以高密王為首時王東亭為僕射王徐皆是近世識古今者足下引式乾公王吾謂未可為據其云上出式乾召侍中彭城王植荀組潘岳嵇紹杜斌然後道足下所疏四王在三司之上反在黃門郎下有何義且四王之下則云大將軍梁王肜車騎趙王倫然後云司徒王戎耳梁趙二王亦是皇子屬尊位齊在豫章王常侍之下又復不通蓋書家指疏時事不必存其班次式乾亦是私宴異於朝堂如今含章西堂足下在僕射下侍中在尚書下耳來示又云曾祖與簡文對錄位在簡文下吾家故事則不然今寫如別王姬身無爵位故可得不從夫而以王女為尊皇子出任則有位有位則依朝復示之班序唯引泰和赦文差可為言然赦文前後亦參差不同太宰上公自應在大司馬前耳簡文雖撫軍時已授丞相殊禮又中外都督故以本任為班不以督中外便在公右也今護軍總方伯而位次故在持節都督下足下復思之遷司徒左長史出為豫章太守徵為吏部尚書廓因北地傅隆問亮選事若悉以見付不論不然不能拜也亮以語錄尚書徐羨之羨之曰黃門郎以下悉以委蔡吾徒不復厝懷自此以上故宜共參同異廓曰我不能為徐干木署紙尾也遂不拜干木羨之小字也選案黃紙錄尚書與吏部尚書連名故廓云署紙尾也羨之亦以廓正直不欲使居權要徙為祠部尚書太祖入奉大統尚書令傅亮率百僚奉迎廓亦俱行至尋陽遇疾不堪前亮將進路詣廓別廓謂曰營陽在吳宜厚加供奉營陽不幸卿諸人有弒主之名欲立於世將可得邪亮已與羨之議害少帝乃馳信止之信至已不及羨之大怒曰與人共計議云何裁轉背便賣惡於人及太祖即位謝晦將之荊州與廓別屏人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆而以之北面挾震主之威據上流之重以古推今自免為難也廓年位並輕而為時流所推重每至歲時皆束帶到門奉兄軌如父家事小大皆諮而後行公祿賞賜一皆入軌有所資須悉就典者請焉從高祖在彭城妻郗氏書求夏服廓答書曰知須夏服計給事自應相供無容別寄時軌為給事中元嘉二年廓卒時年四十七高祖嘗云羊徽蔡廓可平世三公少子興宗興宗年十歲失父哀毀有異凡童廓罷豫章郡還起二宅先成東宅與軌廓亡而館宇未立軌罷長沙郡還送錢五十萬以補宅直興宗年十歲白母曰一家由來豐儉必共今日宅價不宜受也母悅而從焉軌有愧色謂其子淡曰我年六十行事不及十歲小兒尋喪母少好學以業尚素立見稱初為彭城王義康司徒行參軍太子舍人南平穆王冠軍參軍武昌太守又為太子洗馬義陽王友中書侍郎中書令建平王宏侍中王僧綽並與興宗厚善元凶弒立僧綽被誅凶威方盛親故莫敢往興宗獨臨哭盡哀出為司空何尚之長史又遷太子中庶子世祖踐阼還先職遷臨海太守徵為黃門郎太子中庶子轉游擊將軍俄遷尚書吏部郎時尚書何偃疾患上謂興宗曰卿詳練清濁今以選事相付便可開門當之無所讓也轉司徒左長史復為中庶子領前軍將軍遷侍中每正言得失無所顧憚由是失旨竟陵王誕據廣陵城為逆事平興宗奉旨慰勞州別駕范義與興宗素善在城內同誅興宗至廣陵躬自收殯致喪還豫章舊墓上聞之甚不悅廬陵內史周朗以正言得罪鎖付寧州親戚故人無敢瞻送興宗在直請急詣朗別上知尤怒坐屬疾多日白衣領職尋左遷司空沈慶之長史行兗州事還為廷尉卿有解士先者告申坦昔與丞相義宣同謀時坦已死子令孫時作山陽郡自繫廷尉興宗議曰若坦昔為戎首身今尚存累經肆眚猶應蒙宥令孫天屬理相為隱況人亡事遠追相誣訐斷以禮律義不合關若士先審知逆謀當時即應聞啟苞藏積年發因私怨況稱風聲路傳實無定主而干黷欺罔罪合極法又有訟民嚴道恩等二十二人事未洗正敕以當訊權繫尚方興宗以訟民本在求理故不加械即若繫尚方於事為苦又司徒前劾送武康令謝沈及郡縣尉還職司十一人坐仲良鑄錢不禽久已判結又送郡主簿丘元敬等九人或下疾假或去職已久又加執啟事悉見從出為東陽太守遷安陸王子綏後軍長史江夏內史行郢州事徵還未拜留為左民尚書頃之轉掌吏部時上方盛淫宴虐侮羣臣自江夏王義恭以下咸加穢辱唯興宗以方直見憚不被侵媟尚書僕射顏師伯謂議曹郎王耽之曰蔡尚書常免昵戲去人實遠耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召每至官賭常在勝朋蔡尚書今日可謂能負荷矣大明末前廢帝即位興宗告太宰江夏王義恭應須策文義恭曰建立儲副本為今日復安用此興宗曰累朝故事莫不皆然近永初之末營陽王即位亦有文策今在尚書可檢視也不從興宗時親奉璽綬嗣主容色自若了無哀貌興宗出謂親故曰魯昭在戚而有嘉容終之以釁結大臣昭子請死國家之禍其在此乎時義恭錄尚書事受遺輔政阿衡幼主而引身避事政歸近習越騎校尉戴法興中書舍人巢尚之專制朝權威行近遠興宗職管九流銓衡所寄每至上朝輒與令錄以下陳欲登賢進士之意又箴規得失博論朝政義恭素性恇橈阿順法興常慮失旨聞興宗言輒戰懼無計先是大明世奢侈無度多所造立賦調煩嚴徵役過苦至是發詔悉皆削除由此紫極殿南北馳道之屬皆被毀壞自孝建以來至大明末凡諸制度無或存者興宗於都坐慨然謂顏師伯曰先帝雖非盛德主要以道始終三年無改古典所貴今殯宮始徹山陵未遠而凡諸制度興造不論是非一皆刊削雖復禪代亦不至爾天下有識當以此窺人師伯不能用興宗每陳選事法興尚之等輒點定回換僅有在者興宗於朝堂謂義恭及師伯曰主上諒闇不親萬機而選舉密事多被刪改復非公筆亦不知是何天子意王景文謝莊等遷授失序興宗又欲為美選時薛安都為散騎常侍征虜將軍太子左率殷為中庶子興宗先選安都為左衞將軍常侍如故殷為黃門領校太宰嫌安都為多欲單為左衞興宗曰率衞相去唯阿之間且已失征虜非乃超越復奪常侍頓為降貶若謂安都晚達微人本宜裁抑令名器不輕宜有貫序謹依選體非私安都義恭曰若宮官宜加超授者殷便應侍中那得為黃門而已興宗又曰中庶侍中相去實遠且安都作率十年殷中庶百日今又領校不為少也使選令史顏褘之薛慶先等往復論執義恭然後署案既中旨以安都為右衞加給事中由是大忤義恭及法興等出興宗吳郡太守固辭郡執政愈怒又轉為新安王子鸞撫軍司馬輔國將軍南東海太守行南徐州事又不拜苦求益州義恭於是大怒上表曰臣聞慎節言語大易有規銓序九流無取裁若乃結黨連羣譏訴互起街談巷議罔顧聽聞乃撤實憲制所宜禁經之巨蠹侍中祕書監臣彧自表父疾必求侍養聖旨矜體特順所陳改授臣府元僚兼帶軍郡雖臣駑劣府任非輕准之前人不為屈後京郡本以為祿不計戶之少多遇便用無關高下撫軍長史莊滯府累朝每陳危苦內職外守稱未堪依唯王球昔比賜以優養恩慈之厚不近於薄前新除吳郡太守興宗前居選曹多不平允鴻渥含宥恕其不閑改任大都寵均阿輔仍苦請益州雅違成命伏尋揚州刺史子尚吳興太守休若並國之茂戚魯衞攸在猶牧守東山竭誠撫莅而辭擇適情起自庶族逮佐北藩尤無欣荷御史中丞永昔歲餘愆從恩今授光祿勳臣淹雖曰代臣累經降黜後效未申以何取進司徒左長史孔覬前除右衞尋徙今職回換之宜不為乃少竊外談謂彧等咸為失分又聞興宗躬自怨懟與尚書右僕射師伯疏辭旨甚苦臣雖不見所聞不虛臣以凡才不應機務謬自幸會受任三朝進無古人舉賢之美退無在下獻替之績致茲紛紜伏增慚悚然此源不塞此風弗變將虧正道塵穢盛猷伏願聖聽賜垂覽察詔曰太宰表如此省以憮然朕恭承洪緒思弘盛烈而在朝倰競驅扇成風將何以式揚先德克隆至化公體國情深保釐攸託便可付外詳議義恭因使尚書令柳元景奏曰臣義恭表詔書如右攝曹辨覈尚書袁愍孫牒此月十七日詣僕射顏師伯語次因及尚書蔡興宗有書固辭今授仍出疏見示乃者數紙不意悉何所道緣此因及朝士當今聖世不可使人以為少今牒數之朝廷處之實得所臣等亦自謂得分常多在門袁愍孫無或措多而愚意欲啟更量出內之宜芻蕘管見願在聞徹選令史宣傳密事故因附上聞亦外人言此今薛慶先列今月十八日往尚書袁愍孫論選事愍孫云昨詣顏僕射出蔡尚書疏見示言辭甚苦又云所得亦少主上踐阼始爾朝士有此人不多物議謂應美用乃更恨少使咨事便啟錄公又謝莊時未老其疾以轉差今居此任復為非宜謂宜中書令才望為允又孔覬南士之美所歷已多近頻授即復回改於理為屈門下無人此是名選又張永人地可論其去歲愆戾非為深罪依其望復門下一人張淹昔忝南下預同休戚雖屢經愆黜事亦已久謂應祕書監帶授興宗手跡數紙文翰炳然事證明白不假覈辨愍孫任居官人職掌銓裁若有未允則宜顯言而私加許與自相選署託云物論終成虛詭隱末出端還為矛楯臣聞九官成讓虞風垂則誹主怨時漢罪夙斷況義為身發言謗朝序亂辟害政混穢大猷紛紜彰謬上延詔旨不有霜准軌憲斯淪請解興宗新附官須事御收付廷尉法獄治罪免愍孫所居官詔曰興宗首亂朝典允當明憲以其昔經近侍未忍盡法可令思愆遠封愍孫竊評自己委咎物議可以子領職除興宗新昌太守郡屬交州朝廷莫不嗟駭先是興宗納何后寺尼智妃為妾姿貌甚美有名京師迎車已去而師伯密遣人誘之潛往載取興宗迎人不覺及興宗被徙論者並云由師伯師伯甚病之法興等既不欲以徙大臣為名師伯又欲止息物議由此停行頃之法興見殺尚之被繫義恭師伯誅復起興宗為臨海王子頊前軍長史輔國將軍南郡太守行荊州事不行時前廢帝凶暴興宗外甥袁顗為雍州刺史勸興宗行曰朝廷形勢人所共見在內大臣朝夕難保舅今出居陝西為八州行事顗在襄沔地勝兵強去江陵咫尺水陸通便若朝廷有事可共立桓文之功豈與受制凶狂禍難不測同年而語乎今不去虎口而守此危逼後求復出豈得哉興宗曰吾素門平進與主上甚疎未容有患宮省內外人不自保會應有變若內難得弭外釁未必可量汝欲在外求全我欲居內免禍各行所見不亦善乎時京城危懼衣冠咸欲遠徙後皆流離外難百不一存重除吏部尚書太尉沈慶之深慮危禍閉門不通賓客嘗遣左右范羡詣興宗屬事興宗謂羡曰公閉門絕客以避悠悠請託耳身非有求何為見拒還造慶之慶之遣羡報命要興宗令往興宗因說之曰先帝雖無功於天下要能定平凶逆在位十一年以道晏駕主上紹臨四海清謐即位正是舉止違衷小小得失耳亦謂春秋尚富進德可期而比者所行人倫道盡今所忌憚唯在於公百姓喁喁無復假息之望所冀正在公一人而已若復坐視成敗者非唯身禍不測四海重責將有所歸公威名素著天下所服今舉朝遑遑人人危怖指麾之日誰不景從如其不斷旦暮禍及僕昔佐貴府蒙眷異常故敢盡言願公思為其計慶之曰僕比日前慮不復自保但盡忠奉國始終以之正當委天任命耳加老罷私門兵力頓闕雖有其意事亦無從興宗曰當今懷謀思奮者非要富貴求功賞各欲免死朝夕耳殿內將帥正聽外間消息若一人唱首則俯仰可定況公威風先著統戎累朝諸舊部曲布在宮省宗越譚金之徒出公宇下並受生成攸之恩仁公家口子弟耳誰敢不從且公門徒義附並三吳勇士宅內奴僮人有數百陸攸之今入東討賊又大送鎧仗在青溪未發攸之公之鄉人驍勇有膽力取其器仗以配衣宇下使攸之率以前驅天下之事定矣僕在尚書中自當率百僚案前世故事更簡賢明以奉社稷昔太甲罪不加民昌邑虐不及下伊尹霍光猶成大事況今蒼生窘急禍百往代乎又朝廷諸所行造民間皆云公悉豫之今若沉疑不決當有先公起事者公亦不免附從之禍車駕屢幸貴第醉酣彌留又聞屏左右獨入閤內此萬世一時機不可失僕荷眷深重故吐去梯之言宜詳其禍福慶之曰深感君無已意此事大非僕所能行事至故當抱忠以沒耳頃之慶之果以見忌致禍時領軍王玄謨大將有威名邑里訛言云已見誅市道喧擾玄謨典籤包法榮者家在東陽興宗故郡民也為玄謨所信見使至興宗因謂曰領軍殊當憂懼法榮曰領軍比日殆不復食夜亦不眠常言收已在門不保俄頃興宗曰領軍憂懼當為方略那得坐待禍至初玄謨舊部曲猶有三千人廢帝頗疑之徹配監者玄謨太息深怨啟留五百人巖山營墓事猶未畢少帝欲獵又悉喚還城巖兵在中堂興宗勸以此衆舉事曰當今以領軍威名率此為朝廷唱始事便立剋領軍雖復失脚自可乘轝處分禍殆不測勿失事機君還可白領軍如此玄謨遣法榮報曰此亦未易可行期當不泄君言太宗踐祚玄謨責所親故吏郭季產女壻韋希真等曰當艱難時周旋輩無一言相扣發者季產曰蔡尚書令包法榮所道非不會機但大事難行爾季產言亦何益玄謨有慚色右衞將軍劉道隆為帝所寵信專統禁兵乘輿嘗夜幸著作佐郎江斅宅興宗馬車從道隆從車後過興宗謂曰劉公比日思一閑寫道隆深達此旨掐興宗手曰蔡公勿多言帝每因朝宴捶毆羣臣自驃騎大將軍建安王休仁以下侍中袁愍孫等咸見陵曳唯興宗得免頃之太宗定大事是夜廢帝橫尸在太醫閤口興宗謂尚書右僕射王景文曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乘人時諸方並舉兵反國家所保唯丹陽淮南數郡其間諸縣或已應賊東兵已至永世宮省危懼上集羣臣以謀成敗興宗曰今普天圖逆人有異志宜鎮之以靜以至信待人比者逆徒親戚布在宮省若繩之以法則土崩立至宜明罪不相及之義物情既定人有戰心六軍精勇器甲犀利以待不習之兵其勢相萬耳願陛下勿憂上從之加游擊將軍未拜遷尚書右僕射尋領衞尉又領兗州大中正太宗謂興宗曰諸處未定殷琰已復同逆頃日人情云何事當濟不興宗曰逆之與順臣無以辨今商旅斷絕而米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書褚淵以手板築興宗興宗言之不已上曰如卿言赭圻平函送袁顗首勑從登南掖門樓觀之興宗漼然流涕上不悅事平封興宗始昌縣伯食邑五百戶固讓不許封樂安縣伯邑三百戶國秩吏力終以不受時殷琰據壽陽為逆遣輔國將軍劉勔攻圍四方既平琰嬰城固守上使中書為詔譬琰興宗曰天下既定是琰思過之日陛下宜賜手詔數行以相弘慰今直中書為詔彼必疑謂非真未是所以速清方難也不從琰得詔謂劉勔詐造果不敢降攻戰經時久乃歸順先徐州刺史薛安都據彭城反後遣使歸順泰始二年冬遣張永率軍迎之興宗曰安都遣使歸順此誠不虛今宜撫之以和即安所莅不過須單使及咫尺書耳若以重兵迎之勢必疑懼或能招引北虜為患不測叛臣釁重必宜翦戮則比者所宥亦已弘矣況安都外據強地密邇邊關考之國計尤宜馴養如其遂叛將生旰食之憂彭城嶮固兵強將勇圍之既難攻不可拔疆塞之虞二三宜慮臣為朝廷憂之時張永已行不見從安都聞大軍過淮嬰城自守要取索虜永戰大敗又值寒雪死者十八九遂失淮北四州其先見如此初永敗問至上在乾明殿先召司徒建安王休仁又召興宗謂休仁曰吾慚蔡僕射以敗書示興宗曰我愧卿三年春出為使持節都督郢州諸軍事安西將軍郢州刺史坐詣尚書切論以何始真為諮議參軍初不被許後又重陳上怒貶號平西將軍尋又復號初吳興丘珍孫言論常侵興宗珍孫子景先人才甚美興宗與之周旋及景先為鄱陽郡值晉安王子勛為逆轉在竟陵為吳喜所殺母老女稚流離夏口興宗至郢州親自臨哭致其喪柩家累令得東還在任三年遷鎮東將軍會稽太守加散騎常侍尋領兵置佐加都督會稽東陽新安永嘉臨海五郡諸軍事給鼓吹一部會稽多諸豪右不遵王憲又幸臣近習參半宮省封略山湖妨民害治興宗皆以法繩之會土全實民物殷阜王公妃主邸舍相望橈亂在所大為民患子息滋長督責無窮興宗悉啟罷省又陳原諸逋負解遣雜役並見從三吳舊有鄉射禮久不復修興宗行之禮儀甚整先是元嘉中羊玄保為郡亦行鄉射太宗崩興宗與尚書令袁粲右僕射褚淵中領軍劉勔鎮軍將軍沈攸之同被顧命以興宗為使持節都督荊湘雍益梁寧南北秦八州諸軍事征西將軍開府儀同三司荊州刺史加班劍二十人常侍如故被徵還都時右軍將軍王道隆任參內政權重一時躡履到前不敢就席良久方去竟不呼坐元嘉初中書舍人秋當詣太子詹事王曇首不敢坐其後中書舍人王弘為太祖所愛遇上謂曰卿欲作士人得就王球坐乃當判耳殷劉並雜無所知也若往詣球可稱旨就席球舉扇曰若不得爾弘還依事啟聞帝曰我便無如此何五十年中有此三事道隆等以興宗強正不欲使擁兵上流改為中書監左光祿大夫開府儀同三司常侍如故固辭不拜興宗幼立風概家行尤謹奉宗姑事寡嫂養孤兄子有聞於世太子左率王錫妻范聰明婦人也有才藻學見與錫弟僧達書詰讓之曰昔謝太傅奉嫂王夫人如慈母今蔡興宗亦有恭和之稱其為世所重如此妻劉氏早卒一女甚幼外甥袁覬始生彖而妻劉氏亦亡興宗姊即覬母也一孫一姪躬自撫養年齒相比欲為婚姻每見興宗輒言此意大明初詔興宗女與南平王敬猷婚興宗以姊生平之懷屢經陳啟答曰卿諸人欲各行己意則國家何由得婚且姊言豈是不可違之處邪舊意既乖彖亦他娶其後彖家好不終顗又禍敗彖等淪廢當時孤微理盡敬猷遇害興宗女無子嫠居名門高冑多欲結姻明帝亦勑適謝氏興宗並不許以女適彖北地傅隆與廓相善興宗修父友敬泰豫元年薨時年五十八遺令薄葬奏還封爵追贈後授子景玄固辭不受又奏還封表疏十餘上見許詔曰景玄表如此故散騎常侍中書監左光祿大夫開府儀同三司樂安縣開國伯興宗忠恪立朝謀猷宣著往屬時難勳亮帷幄錫珪分壤實允通誥而懇誠慊訴備彰存沒廉概素情有絜聲軌景玄固陳先志良以惻然雖彝典宜全而哀款難奪可特申不瞑之請永矜克讓之風初興宗為郢州府參軍彭城顏敬以式卜曰亥年當作公官有大字者不可受也及有開府之授而太歲在亥果薨於光祿大夫之號焉文集傳於世景玄雅有父風為中書郎晉陵太守太尉從事中郎昇明末卒史臣曰世重清談士推素論蔡廓雖業力弘正而年位未高一世名臣風格皆出其下及其固辭銓衡恥為志屈豈不知選錄同體義無偏斷乎良以主闇時難不欲居通塞之任也遠矣哉
