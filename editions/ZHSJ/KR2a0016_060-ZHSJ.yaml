body:
  text: 宋書卷六十列傳第二十范泰王准之王韶之荀伯子范泰字伯倫順陽山陰人也祖汪晉安北將軍徐兗二州刺史父甯豫章太守泰初為太學博士衞將軍謝安驃騎將軍會稽王道子二府參軍荊州刺史王忱泰外弟也請為天門太守忱嗜酒醉輒累旬及醒則儼然端肅泰謂忱曰酒雖會性亦所以傷生游處以來常欲有以相戒當卿沈湎措言莫由及今之遇又無假陳說忱嗟嘆久之曰見規者衆矣未有若此者也或問忱曰范泰何如謝邈忱曰茂度慢又問何如殷覬忱曰伯通易忱常有意立功謂泰曰今城池既立軍甲亦充將欲掃除中原以申宿昔之志伯通意銳當令擁戈前驅以君持重欲相委留事何如泰曰百年逋寇前賢挫屈者多矣功名雖貴鄙生所不敢謀會忱病卒召泰為驃騎諮議參軍遷中書侍郎時會稽王世子元顯專權內外百官請假不復表聞唯籤元顯而已泰建言以為非宜元顯不納父憂去職襲爵陽遂鄉侯桓玄輔晉使御史中丞祖台之奏泰及前司徒左長史王準之輔國將軍司馬珣之並居喪無禮泰坐廢徙丹徒義旗建國子博士司馬休之為冠軍將軍荊州刺史以泰為長史南郡太守又除長沙相散騎常侍並不拜入為黃門郎御史中丞坐議殷祠事謬白衣領職出為東陽太守盧循之難泰預發兵千人開倉給稟高祖加泰振武將軍明年遷侍中尋轉度支尚書時僕射陳郡謝混後進知名高祖嘗從容問混泰名輩可以比誰對曰王元太一流人也徙為太常初司徒道規無子養太祖及薨以兄道憐第二子義慶為嗣高祖以道規素愛太祖又令居重道規追封南郡公應以先華容縣公賜太祖泰議曰公之友愛即心過厚禮無二嗣義隆宜還本屬從之轉大司馬左長史右衞將軍加散騎常侍復為尚書常侍如故兼司空與右僕射袁湛授宋公九錫隨軍到洛陽高祖還彭城與共登城泰有足疾特命乘轝泰好酒不拘小節通率任心雖在公坐不異私室高祖甚賞愛之然拙於為治故不得在政事之官遷護軍將軍以公事免高祖受命拜金紫光祿大夫加散騎常侍明年議建國學以泰領國子祭酒泰上表曰臣聞風化興於哲王教訓表於至世至說莫先講習甚樂必寄朋來古人成童入學易子而教尋師無遠負糧忘艱安親光國莫不由此若能出不由戶則斯道莫從是以明詔爰發已成渙汗學制既下遠近遵承臣之愚懷少有未達今惟新告始盛業初基天下改觀有志景慕而置生之制取少停多開不來之端非一塗而已臣以家推國則知所聚不多恐不足以宣大宋之風弘濟濟之美臣謂合選之家雖制所未達父兄欲其入學理合開通雖小違晨昏所以大弘孝道不知春秋則所陷或大故趙盾忠而書弒許子孝而得罪以斯為戒可不懼哉十五志學誠有其文若年降無幾而深有志尚者何必限以一格而不許其進邪揚烏豫玄實在弱齒五十學易乃無大過昔中朝助教亦用二品潁川陳載已辟太保掾而國子取為助教即太尉准之弟所貴在於得才無繫於定品教學不明奬厲不著今有職閑而學優者可以本官領之門地二品宜以朝請領助教既可以甄其名品斯亦敦學之一隅其二品才堪自依舊從事會今生到有期而學校未立覆簣實望其速回轍已淹其遲事有似賒而宜急者殆此之謂古人重寸陰而賤尺璧其道然也時學竟不立時言事者多以錢貨減少國用不足欲悉市民銅更造五銖錢泰又諫曰流聞將禁私銅以充官銅民雖失器終於獲直國用不足其利實多臣愚意異不寧寢默臣聞治國若烹小鮮拯敝莫若務本百姓不足君孰與足未有民貧而國富本不足而末有餘者也故囊漏貯中識者不吝反裘負薪存毛實難王者不言有無諸侯不言多少食祿之家不與百姓爭利故拔葵所以明治織蒲謂之不仁是以貴賤有章職分無爽今之所憂在農民尚寡倉廩未充轉運無已資食者衆家無私積難以禦荒耳夫貨存貿易不在少多昔日之貴今者之賤彼此共之其揆一也但令官民均通則無患不足若使必資貨廣以收國用者則龜貝之屬自古所行尋銅之為器在用也博矣鍾律所通者遠機衡所揆者大夏鼎負圖實冠衆瑞晉鐸呈象亦啟休徵器有要用則貴賤同資物有適宜則家國共急今毀必資之器而為無施之錢於貨則功不補勞在用則君民俱困校之以實損多益少陛下勞謙終日無倦庶務以身率物勤素成風而頌聲不作版渭不至者良由基根未固意在遠略伏願思可久之道賒欲速之情弘山海之納擇芻收之說則嘉謀日陳聖慮可廣其亡存心然後苞桑可繫愚誠一至用忘寢食景平初加位特進明年致仕解國子祭酒少帝在位多諸愆失上封事極諫曰伏聞陛下時在後園頗習武備鼓鞞在宮聲聞于外黷武掖庭之內諠譁省闥之間不聞將帥之臣統御之主非徒不足以威四夷祇生遠近之怪近者東寇紛擾皆欲伺國瑕隙今之吳會寧過二漢關河根本既搖于何不有如水旱成災役夫不息無寇而戒為費漸多河南非復國有羯虜難以理期此臣所以用忘寢食而干非其位者也陛下踐阼委政宰臣實同高宗諒闇之美而更親狎小人不免近習懼非社稷至計經世之道王言如絲其出如綸下觀而化疾於影響伏願陛下思弘古道式遵遺訓從理無滯任賢勿疑如此則天下歸德宗社惟永書云一人有慶兆民賴之天高聽卑無幽不察興衰在人成敗易曉未有政治在於上而人亂於下者也臣蒙先朝過遇陛下殊私實欲盡心竭誠少報萬分而惛耄已及百疾互生便為永違聖顏無復自盡之路貪及視息陳其狂瞽陛下若能哀其所請留心覽察則臣夕殞于地無恨九泉少帝雖不能納亦不加譴徐羨之傅亮等與泰素不平及廬陵王義真少帝見害泰謂所親曰吾觀古今多矣未有受遺顧託而嗣君見殺賢王嬰戮者也元嘉二年表賀元正并陳旱災曰元正改律品物惟新陛下藉日新以畜德仰乾元以履祚吉祥集室百福來庭頃旱魃為虐亢陽愆度通川燥流異井同竭老弱不堪遠汲貧寡單於負水租輸既重賦稅無降百姓怨咨臣年過七十未見此旱陰陽并隔則和氣不交豈惟凶荒必生疾疫其為憂虞不可備序雩禜之典以誠會事巫祝常祈罕能有感上天之譴不可不察漢東海枉殺孝婦亢旱三年及祭其墓澍雨立降歲以有年是以衞人伐邢師興而雨伏願陛下式遵遠猷思隆高構推忠恕之愛矜寃枉之獄遊心下民之瘼厝思幽冥之紀令謗木豎闕諫鼓鳴朝察芻牧之言總統御之要如此則苞桑可繫危幾無兆斯而災害不消未之有也故夏禹引百姓之罪殷湯甘萬方之過太戊資桑穀以進德宋景藉熒惑以修善斯皆因敗以轉成往事之昭晰也循末俗者難為風就正路者易為雅臣疾患日篤夕不謀朝會及歲慶得一聞達微誠少亮無恨泉壤永違聖顏拜表悲咽遂輕舟遊東陽任心行止不關朝廷有司劾奏之太祖不問也時太祖雖當陽親覽而羨之等猶秉重權復上表曰伏承廬陵王已復封爵猶未加贈陛下孝慈天至友于過隆伏揆聖心已自有在但司契以不唱為高冕旒以因寄成用臣雖言不足採誠不亮時但猥蒙先朝忘醜之眷復沾廬陵矜顧之末息晏委質有兼常發契闊戎陣顛狽艱危厚德無報授令路絕此老臣兼不能自已者也朽謝越局無所逃刑泰諸子禁之表竟不奏三年羨之等伏誅進位侍中左光祿大夫國子祭酒領江夏王師特進如故上以泰先朝舊臣恩禮甚重以有脚疾起居艱難宴見之日特聽乘轝到坐累陳時事上每優容之其年秋旱蝗又上表曰陛下昧旦丕顯求民之瘼明斷庶獄無倦政事理出羣心澤謠民口百姓翕然皆自以為遇其時也災變雖小要有以致之守宰之失臣所不能究上天之譴臣所不敢誣有蝗之處縣官多課民捕之無益於枯苗有傷於殺害臣聞桑穀時亡無假斤斧楚昭仁愛不禜自瘳卓茂去無知之蟲宋均囚有異之虎蝗生有由非所宜殺石不能言星不自隕春秋之旨所宜詳察禮婦人有三從之義而無自專之道周書父子兄弟罪不相及女人被宥由來尚矣謝晦婦女猶在尚方始貴後賤物情之所甚苦匹婦一至亦能有所感激臣於謝氏不容有情蒙國重恩寢處思報伏度聖心已當有在禮春夏教詩無一而闕也臣近侍坐聞立學當在入年陛下經略粗建意存民食入年則農功興農功興則田里闢入秋治庠序入冬集遠生二塗並行事不相害夫事多以淹稽為戒不遠為患任臣學官竟無微績徒墜天施無情自處臣之區區不望目覩盛化竊慕子囊城郢之心庶免荀偃不瞑之恨臣比陳愚見便是都無可採徒煩天聽愧怍反側書奏上乃原謝晦婦女時司徒王弘輔政泰謂弘曰天下務廣而權要難居卿兄弟盛滿當深存降挹彭城王帝之次弟宜徵還入朝共參朝政弘納其言時旱災未已加以疾疫泰又上表曰頃亢旱歷時疾疫未已方之常災實為過差古以為王澤不流之徵陛下昧旦臨朝無懈治道躬自菲薄勞心民庶以理而言不應致此意以為上天之於賢君正自殷懃無已陛下同規禹湯引百姓之過言動于心道敷自遠桑穀生朝而殞熒惑犯心而退非唯消災弭患乃所以大啟聖明靈雨立降百姓改瞻應感之來有同影響陛下近當仰推天意俯察人謀升平之化尚存舊典顧思與不思行與不行耳大宋雖揖讓受終未積有虞之道先帝登遐之日便是道消之初至乃嗣主被殺哲藩嬰禍九服徘徊有心喪氣佐命託孤之臣俄為戎首天下蕩蕩王道已淪自非神英撥亂反正則宗社非復宋有革命之與隨時其義尤大是以古今異用循方必壅大道隱於小成欲速或未必達深根固蔕之術未洽於愚心是用猖狂妄作而不能緘默者也臣既頑且鄙不達治宜加之以篤疾重之以惛耄言或非言而復不能無言陛下錄其一毫之誠則臣不知厝身之所泰博覽篇籍好為文章愛奬後生孜孜無倦撰古今善言二十四篇及文集傳於世暮年事佛甚精於宅西立祇洹精舍五年卒時年七十四追贈車騎將軍侍中特進王師如故諡曰宣侯長子昂早卒次子暠宜都太守次晏侍中光祿大夫次曄太子詹事謀反伏誅自有傳少子廣淵善屬文世祖撫軍諮議參軍領記室坐曄事從誅王准之字元曾琅邪臨沂人高祖彬尚書僕射曾祖彪之尚書令祖臨之父訥之並御史中丞彪之博聞多識練悉朝儀自是家世相傳並諳江左舊事緘之青箱世人謂之王氏青箱學准之兼明禮傳贍於文辭起家為本國右常侍桓玄大將軍行參軍玄篡位以為尚書祠部郎義熙初又為尚書中兵郎遷參高祖車騎中軍軍事丹陽丞中軍太尉主簿出為山陰令有能名預討盧循功封都亭侯又為高祖鎮西平北太尉參軍尚書左丞本郡大中正宋臺建除御史中丞為僚友所憚准之父訥之祖臨之曾祖彪之至准之四世居此職准之嘗作五言范泰謿之曰卿唯解彈事耳准之正色答猶差卿世載雄狐坐世子右衞率謝靈運殺人不舉免官高祖受命拜黃門侍郎永初二年奏曰鄭玄注禮三年之喪二十七月而吉古今學者多謂得禮之宜晉初用王肅議祥禫共月故二十五月而除遂以為制江左以來唯晉朝施用縉紳之士多遵玄義夫先王制禮以大順羣心喪也寧戚著自前訓今大宋開泰品物遂理愚謂宜同即物情以玄義為制朝野一禮則家無殊俗從之遷司徒左長史出為始興太守元嘉二年為江夏王義恭撫軍長史歷陽太守行州府之任綏懷得理軍民便之尋入為侍中明年徙為都官尚書改領吏部性峭急頗失縉紳之望出為丹陽尹准之究識舊儀問無不對時大將軍彭城王義康錄尚書事每歎曰何須高論玄虛正得如王准之兩三人天下便治矣然寡乏風素不為時流所重撰儀注朝廷至今遵用之十年卒時年五十六追贈太常子興之征虜主簿王韶之字休泰琅邪臨沂人也曾祖廙晉驃騎將軍祖羨之鎮軍掾父偉之本國郎中令韶之家貧父為烏程令因居縣境好史籍博涉多聞初為衞將軍謝琰行參軍偉之少有志尚當世詔命表奏輒自書寫太元隆安時事小大悉撰錄之韶之因此私撰晉安帝陽秋既成時人謂宜居史職即除著作佐郎使續後事訖義熙九年善事辭論可觀為後代佳史遷尚書祠部郎晉帝自孝武以來常居內殿武官主書於中通呈以省官一人管司詔誥任在西省因謂之西省郎傅亮羊徽相代在職義熙十一年高祖以韶之博學有文詞補通直郎領西省事轉中書侍郎安帝之崩也高祖使韶之與帝左右密加酖毒恭帝即位遷黃門侍郎領著作郎西省如故凡諸詔黃皆其辭也高祖受禪加驍騎將軍本郡中正黃門如故西省職解復掌宋書有司奏東冶士朱道民禽三叛士依例放遣韶之啟曰尚書金部奏事如右斯誠檢忘一時權制懼非經國弘本之令典臣尋舊制以罪補士凡有十餘條雖同異不紊而輕重實殊至於詐列父母死誣罔父母淫亂破義反逆此四條實窮亂抵逆人理必盡雖復殊刑過制猶不足以塞莫大之罪既獲全首領大造已隆寧可復遂拔徒隸緩帶當年自同編戶列齒齊民乎臣懼此制永行所虧實大方今聖化惟新崇本棄末一切之令宜加詳改愚謂此四條不合加贖罪之恩侍中褚淡之同韶之三條却宜仍舊詔可又駁員外散騎侍郎王寔之請假事曰伏尋舊制羣臣家有情事聽併急六十日太元中改制年賜假百日又居在千里外聽併請來年限合為二百日此蓋一時之令非經通之旨會稽雖塗盈千里未足為難百日歸休於事自足若私理不同便應自表陳解豈宜名班朝列而久淹私門臣等參議謂不合開許或家在河洛及嶺沔漢者道阻且長猶宜別有條品請付尚書詳為其制從之坐璽封謬誤免黃門事在謝晦傳韶之為晉史序王珣貨殖王廞作亂珣子弘廞子華並貴顯韶之懼為所陷深結徐羨之傅亮等少帝即位遷侍中驍騎如故景平元年出為吳興太守羨之被誅王弘入為相領揚州刺史弘雖與韶之不絕諸弟未相識者皆不復往來韶之在郡常慮為弘所繩夙夜勤厲政績甚美弘亦抑其私憾太祖兩嘉之在任積年稱為良守加秩中二千石十年徵為祠部尚書加給事中坐去郡長取送故免官十二年又出為吳興太守其年卒時年五十六七廟歌辭韶之制也文集行於世子曄尚書駕部外兵郎臨賀太守荀伯子潁川潁陰人也祖羨驃騎將軍父猗祕書郎伯子少好學博覽經傳而通率好為雜戲遨遊閭里故以此失清塗解褐為駙馬都尉奉朝請員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之並為佐郎助撰晉史及著桓玄等傳遷尚書祠部郎義熙九年上表曰臣聞咎繇亡後臧文以為深歎伯氏奪邑管仲所以稱仁功高可百世不泯濫賞無崇朝宜許故太傅鉅平侯祜明德通賢宗臣莫二勳參佐命功成平吳而後嗣闕然烝嘗莫寄漢以蕭何元功故絕世輒紹愚謂鉅平之封宜同酇國故太尉廣陵公陳准黨翼孫秀禍加淮南竊饗大國因罪為利值西朝政刑失裁中興復因而不奪今王道惟新豈可不大判臧否謂廣陵之國宜在削除故太保衞瓘本爵蕭陽縣公既被橫禍及進第秩始贈蘭陵又轉江夏中朝公輔多非理終瓘功德不殊亦無緣獨受偏賞宜復本封以正國章詔付門下前散騎常侍江夏公衞璵上表自陳曰臣乃祖故太保瓘於魏咸熙之中太祖文皇帝為元輔之日封蕭陽侯大晉受禪進爵為公歷位太保總錄朝政于時賈庶人及諸王用事忌瓘忠節故楚王瑋矯詔致禍前朝以瓘秉心忠正加以伐蜀之勳故追封蘭陵郡公永嘉之中東海王越食蘭陵換封江夏戶邑如舊臣高祖散騎侍郎璪瓘之嫡孫纂承封爵中宗元皇帝以曾祖故右衞將軍崇承襲逮于臣身伏聞祠部郎荀伯子表欲貶降復封蕭陽夫趙氏之忠寵延累葉漢祖開封誓以山河伏願陛下錄既往之勳垂罔極之施乞出臣表付外參詳潁川陳茂先亦上表曰祠部郎荀伯子表臣七世祖太尉准禍加淮南不應濫賞尋先臣以剪除賈謐封海陵公事在淮南遇禍之前後廣陵雖在擾攘之際臣祖乃始蒙殊遇歷位元凱後被遠外乃作平州而猶不至除國良以先勳深重百世不泯故也聖明御世英輔係興曾無疑議以為濫賞臣以微弱未齒人倫加始勉視息封爵兼嗣伏願陛下遠錄舊勳特垂矜察詔皆付門下並不施行伯子為世子征虜功曹國子博士妻弟謝晦薦達之入為尚書左丞出補臨川內史車騎將軍王弘稱之曰沈重不華有平陽侯之風伯子常自矜廕籍之美謂弘曰天下膏粱唯使君與下官耳宣明之徒不足數也遷散騎常侍本邑大中正又上表曰伏見百官位次陳留王在零陵王上臣愚竊以為疑昔武王剋殷封神農之後於焦黃帝之後於祝帝堯之後於薊帝舜之後於陳夏後於嵵殷後於宋嵵陳並為列國而薊祝焦無聞焉斯則褒崇所承優於遠代之顯驗也是以春秋次序諸侯宋居嵵陳之上考之近世事亦有徵晉泰始元年詔賜山陽公劉康子弟一人爵關內侯衞公姬署宋侯孔紹子一人駙馬都尉又泰始三年太常上博士劉憙等議稱衞公署於大晉在三恪之數應降稱侯臣以零陵王位宜在陳留之上從之遷太子僕御史中丞莅職懃恪有匪躬之稱立朝正色外內憚之凡所奏劾莫不深相謗毀或延及祖禰示其切直又頗雜謿戲故世人以此非之出補司徒左長史東陽太守元嘉十五年卒官時年六十一文集傳於世子赤松為尚書左丞以徐湛之黨為元凶所殺伯子族弟昶字茂祖與伯子絕服五世元嘉初以文義至中書郎昶子萬秋字元寶亦用才學自顯世祖初為晉陵太守坐於郡立華林閣置主書主衣下獄免前廢帝末為御史中丞卒官史臣曰夫令問令望詩人所以作詠有禮有法前謨以之垂美荀范二王雖以學義自顯而在朝之譽不弘蓋由才有餘而智未足也惜矣哉
