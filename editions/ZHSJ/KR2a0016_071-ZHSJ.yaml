body:
  text: 宋書卷七十一列傳第三十一徐湛之江湛王僧綽徐湛之字孝源東海郯人司徒羨之兄孫吳郡太守佩之弟子也祖欽之祕書監父逵之尚高祖長女會稽公主為振威將軍彭城沛二郡太守高祖諸子並幼以逵之姻戚將大任之欲先令立功及討司馬休之使統軍為前鋒配以精兵利器事剋當即授荊州休之遣魯宗之子軌擊破之於陣見害追贈中書侍郎湛之幼孤為高祖所愛常與江夏王義恭寢食不離於側永初三年詔曰永興公主一門嫡長早罹辛苦外孫湛之特所鍾愛且致節之胤情實兼常可封枝江縣侯食邑五百戶年數歲與弟淳之共車行牛奔車壞左右馳來赴之湛之先令取弟衆咸歎其幼而有識及長頗涉文義善自位待事祖母及母並以孝謹聞元嘉二年除著作佐郎員外散騎侍郎並不就六年東宮始建起家補太子洗馬轉國子博士遷奮威將軍南彭城沛二郡太守徙黃門侍郎祖母年老辭以朝直不拜復授二郡加輔國將軍遷祕書監領右軍將軍轉侍中加驍騎將軍復為祕書監加散騎常侍驍騎如故會稽公主身居長嫡為太祖所禮家事大小必咨而後行西征謝晦使公主留止臺內總攝六宮忽有不得意輒號哭上甚憚之初高祖微時貧陋過甚嘗自往新洲伐荻有納布衫襖等衣皆敬皇后手自作高祖既貴以此衣付公主曰後世若有驕奢不節者可以此衣示之湛之為大將軍彭城王義康所愛與劉湛等頗相附協及劉湛得罪事連湛之太祖大怒將致大辟湛之憂懼無計以告公主公主即日入宮既見太祖因號哭下牀不復施臣妾之禮以錦囊盛高祖納衣擲地以示上曰汝家本貧賤此是我母為汝父作此納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由此得全也遷中護軍未拜又遷太子詹事尋加侍中湛之善於尺牘音辭流暢貴戚豪家產業甚厚室宇園池貴遊莫及伎樂之妙冠絕一時門生千餘人皆三吳富人之子姿質端妍衣服鮮麗每出入行遊塗巷盈滿泥雨日悉以後車載之太祖嫌其侈縱每以為言時安成公何勗𣰋忌之子也臨汝公孟靈休昶之子也並各奢豪與湛之共以肴膳器服車馬相尚京邑為之語曰安成食臨汝飾湛之二事之美兼於何孟勗官至侍中追諡荒公靈休善彈官至祕書監湛之遷冠軍將軍丹陽尹進號征虜將軍加散騎常侍以公主憂不拜過葬復授前職湛之表啟固辭又詣廷尉受罪上詔獄官勿得受然後就命固辭常侍許之二十二年范曄等謀逆湛之始與之同後發其事所陳多不盡為曄等款辭所連乃詣廷尉歸罪上慰遣令還郡湛之上表曰賊臣范曄孔熙先等連結謀逆法靜尼宣分往還與大將軍臣義康共相脣齒備於鞠對伏尋仲承祖始達熙先等意便極言姦狀而臣兒女近情不識大體上聞之初不務指斥紙翰所載尤復漫略者實以凶計既表逆事歸露又仰緣聖慈不欲窮盡故言勢依違未敢縷陳情旨無隱已昭天鑒及羣凶收禽各有所列曄等口辭多見誣謗承祖醜言紛紜特甚乃云臣與義康宿有密契在省之言期以為定潛通姦意報示天文末云熙先縣指必同以誑於曄或以智勇見稱或以愚懦為目既美其信懷可覆復駭其動止必啟凡諸詭妄還自違伐多舉事端不究源統齎傳之信無有主名所徵之人又已死沒首尾乖互自為矛楯即臣誘引之辭以為始謀之證銜臣糾告並見怨咎縱肆狂言必規禍陷伏自探省亦復有由昔義康南出之始敕臣入相伴慰晨夕覲對經踰旬日逆圖成謀雖無顯然懟容異意頗形言旨遺臣利刃期以際會臣苦相諫譬深加距塞以為怨憤所至不足為慮便以關啟懼成虛妄思量反覆實經愚心非為納受曲相蔽匿又令申情范曄釋中間之憾致懷蕭思話恨婚意未申謂此僥幸亦不宣達陛下敦惜天倫彰於四海藩禁優簡親理咸通又昔蒙眷顧不容自絕音翰信命時相往來或言少意多旨深文淺辭色之間往往難測臣每懼異聞皆略而不答惟心無邪悖故不稍以自嫌慺慺丹實具如此啟至於法靜所傳及熙先等謀知實不早見關之日便即以聞雖晨光幽燭曲昭窮款裁以正義無所逃刑束骸北闕請罪司寇乾施含宥未加治考中旨頻降制使還往仰荷恩私哀惶失守臣殃積罪深丁罹酷罰久應屏棄永謝人理況姦謀所染忠孝頓闕智防愚淺闇於禍萌士類未明其心羣庶謂之同惡朝野側目衆議沸騰專信讎隙之辭不復稍相申體臣雖駑下情非木石豈不知醜點難嬰伏劍為易而靦然視息忍此餘生實非苟吝微命假延漏刻誠以負戾灰滅貽惡方來貪及視息少自披訴冀幽誠丹款儻或昭然雖復身膏草土九泉無恨顯居官次垢穢朝班厚顏何地可以自處乞蒙隳放伏待鈇鑕上優詔不許二十四年服闋轉中書令領太子詹事出為前軍將軍南兗州刺史善於為政威惠並行廣陵城舊有高樓湛之更加修整南望鍾山城北有陂澤水物豐盛湛之更起風亭月觀吹臺琴室果竹繁茂花藥成行招集文士盡遊玩之適一時之盛也時有沙門釋惠休善屬文辭采綺豔湛之與之甚厚世祖命使還俗本姓湯位至揚州從事史二十六年復入為丹陽尹領太子詹事將軍如故二十七年索虜至瓜步湛之領兵置佐與皇太子分守石頭二十八年春魯爽兄弟率部曲歸順爽等魯軌子也湛之以為廟算遠圖特所奬納不敢苟申私怨乞屏居田里不許轉尚書僕射領護軍將軍時尚書令何尚之以湛之國戚任遇隆重欲以朝政推之凡諸辭訴一不料省湛之亦以職官記及令文尚書令敷奏出內事無不總令缺則僕射總任又以事歸尚之互相推委御史中丞袁淑並奏免官詔曰令僕治務所寄不共求體當而互相推委糾之是也然故事殘舛所以致茲疑執特無所問時詳正之乃使湛之與尚之並受辭訴尚之雖為令而朝事悉歸湛之初劉湛伏誅殷景仁卒太祖委任沈演之廋炳之范曄等後又有江湛何瑀之曄誅炳之免演之瑀之並卒至是江湛為吏部尚書與湛之並居權要世謂之江徐焉上每有疾湛之輒入侍醫藥二凶巫蠱事發上欲廢劭賜濬死而世祖不見寵故累出外蕃不得停京輦南平王鑠建平王宏並為上所愛而鑠妃即湛妹勸上立之元嘉末徵鑠自壽陽入朝既至又失旨欲立宏嫌其非次是以議久不決與湛之屏人共言論或連日累夕每夜常使湛之自秉燭繞壁檢行慮有竊聽者劭入弒之旦其夕上與湛之屏人語至曉猶未滅燭湛之驚起趣北戶未及開見害時年四十四世祖即位追贈司空加散騎常侍本官如故諡曰忠烈公又詔曰徐湛之江湛王僧綽門戶荼酷遺孤流寓言念既往感痛兼深可令歸居本宅厚加恤賜於是三家長給廩三子聿之謙之為元凶所殺之嗣侯尚太祖第十五女南陽公主蚤卒無子聿之子孝嗣紹封齊受禪國除江湛字徽淵濟陽考城人湘州刺史夷子也居喪以孝聞愛好文義喜彈鼓琴兼明算術初為著作佐郎遷彭城王義康司徒行參軍南譙王義宣左軍功曹復為義康司徒主簿太子中舍人司空道濟為子求湛妹婚不許義康有命又不從時人重其立志義康欲引與日夕湛固求外出乃以為武陵內史還為司徒從事中郎遷太子中庶子尚書吏部郎隨王誕為北中郎將南徐州刺史以湛為長史南東海太守政事悉委之元嘉二十五年徵為侍中任以機密領本州大中正遷左衞將軍時改選學職以太尉江夏王義恭領國子祭酒湛及侍中何攸之領博士二十七年轉吏部尚書家甚貧約不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召值澣衣稱疾經日衣成然後赴牛餓馭人求草湛良久曰可與飲在選職頗有刻覈之譏而公平無私不受請謁論者以此稱焉上大舉北伐舉朝為不可唯湛贊成之索虜至瓜步領軍將軍劉遵考率軍出江上以湛兼領軍軍事處分一以委焉虜遣使求婚上召太子劭以下集議衆並謂宜許湛曰戎狄無信許之無益劭怒謂湛曰今三王在阨詎宜苟執異議聲色甚厲坐散俱出劭使班劍及左右推之殆將側倒劭又謂上曰北伐敗辱數州淪破獨有斬江湛可以謝天下上曰北伐自我意江湛但不異耳劭後燕集未嘗命湛常謂上曰江湛佞人不宜親也上乃為劭長子偉之娉湛第三女欲以和之上將廢劭使湛具詔草劭之入弒也湛直上省聞叫譟之聲乃匿傍小屋中劭遣收之舍吏紿云不在此兵士即殺舍吏乃得湛湛據窗受害意色不撓時年四十六湛五子恁恕憼愻法壽皆見殺初湛家數見怪異未敗少日所眠牀忽有數升血世祖即位追贈左光祿大夫開府儀同三司加散騎常侍本官如故諡曰忠簡公長子恁尚太祖第九女淮陽長公主為著作佐郎王僧綽琅邪臨沂人左光祿大夫曇首子也幼有大成之度弱年衆以國器許之好學有理思練悉朝典年十三太祖引見下拜便流涕哽咽上亦悲不自勝襲封豫寧縣侯尚太祖長女東陽獻公主初為江夏王義恭司徒參軍轉始興王文學祕書丞司徒左長史太子中庶子元嘉二十六年徙尚書吏部郎參掌大選究識流品諳悉人物拔才舉能咸得其分二十八年遷侍中任以機密僧綽沈深有局度不以才能高人先是父曇首與王華並為太祖所任華子嗣人才既劣位遇亦輕僧綽嘗謂中書侍郎蔡興宗曰弟名位應與新建齊超至今日蓋由姻戚所致也新建者嗣之封也及為侍中時年二十九始興王濬嘗問其年僧綽自嫌蚤達逡巡良久乃答其謙虛自退若此元嘉末太祖頗以後事為念以其年少方欲大相付託朝政小大皆與參焉從兄微清介士也懼其太盛勸令損抑僧綽乃求吳郡及廣州上並不許會二凶巫蠱事泄上獨先召僧綽具言之及將廢立使尋求前朝舊典劭於東宮夜饗將士僧綽密以啟聞上又令撰漢魏以來廢諸王故事撰畢送與江湛徐湛之湛之欲立隨王誕江湛欲立南平王鑠太祖欲立建平王宏議久不決誕妃即湛之女鑠妃即湛妹太祖謂僧綽曰諸人各為身計便無與國家同憂者僧綽曰建立之事仰由聖懷臣謂唯宜速斷不可稽緩當斷不斷反受其亂願以義割恩略小不忍不爾便應坦懷如初無煩疑論淮南云以石投水吳越之善沒取之事機雖密易致宣廣不可使難生慮表取笑千載上曰卿可謂能斷大事此事重不可不殷勤三思且庶人始亡人將謂我無復慈愛之道僧綽曰臣恐千載之後言陛下唯能裁弟不能裁兒上默然江湛同侍坐出閤謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直及劭弒逆江湛在尚書上省聞變歎曰不用僧綽言以至於此劭既立轉為吏部尚書委以事任事在二凶傳頃之劭料檢太祖巾箱及江湛家書疏得僧綽所啟饗士并廢諸王書乃收害焉時年三十一因此陷北第諸王侯以為與僧綽有異志并殺僧綽門客太學博士賈匪之奉朝請司馬文穎建平國常侍司馬仲秀等世祖即位追贈散騎常侍金紫光祿大夫諡曰愍侯初太社西空地一區吳時丁奉宅孫晧流徙其家江左初為周顗蘇峻宅其後為袁悅宅又為章武王司馬秀宅皆以凶終後給臧燾亦頗遇喪禍故世稱為凶地僧綽常以正達自居謂宅無吉凶請以為第始就造築未及居而敗子儉嗣昇明末為齊國尚書右僕射史臣曰甚矣宋氏之家難也讎釁所鍾親地兼極雖復傾天滅道迹非嫌路而災隙內兆邪蠱外興天性既離愛敬同盡探雀請熊非無前釁猜防之道有未足乎世祖弱年輕躁夙無朝寵累任邊外未嘗居中當璧之重將由愛立臣主回疑事無蚤斷若使守器以長命不待賢則密禍自銷危機可免聖哲之訓豈欺我哉昔山濤舉羊祜為太子太傅蓋欲以後事委之而羊公短世僧綽綢繆主心將任以國重而宮車晏駕二臣並以道德謙沖名高兩代胙未中年功謝成日惜矣哉
