body:
  text: 宋書卷一梁沈約撰本紀第一武帝上髙祖武皇帝諱裕字徳輿小名寄奴彭城縣綏里人漢髙帝弟楚元王交之後也交生紅懿侯富富生宗正辟彊辟彊生陽城繆侯徳徳生陽城節侯安民安民生陽城釐侯慶忌慶忌生陽城肅侯岑岑生宗正平平生東武城令某某生東萊太守景景生明經洽洽生博士𢎞𢎞生瑯邪都尉悝悝生魏定襄太守某某生邪城令亮亮生晉北平太守膺膺生相國掾熙熙生開封令旭孫旭孫生混始過江居晉陵郡丹徒縣之京口里官至武原令混生東安太守靖靖生郡功曹翹是為皇考髙祖以晉哀帝興寜元年嵗次癸亥三月壬寅夜生及長身長七尺六寸風骨竒特家貧有大志不治亷隅事繼母以孝謹稱初為冠軍孫無終司馬安帝隆安三年十一月妖賊孫恩作亂於㑹稽晉朝衛將軍闕謝琰前將軍劉牢之東討牢之請髙祖參府軍事十二月牢之至吳而賊縁道屯結牢之命髙祖與數十人覘賊逺近㑹遇賊至衆數千人髙祖便進與戰所將人多死而戰意方厲手奮長刀所殺傷甚衆牢之子敬宣疑高祖淹乆恐為賊所困乃輕騎尋之既而衆騎竝至賊乃奔退斬獲千餘人摧鋒而進平山隂恩遁還入海四年五月恩復入㑹稽殺衛將軍謝琰十一月劉牢之復率衆東征恩退走牢之屯上虞使髙祖戌句章城句章城既卑小戰士不盈數百人髙祖常被堅執銳為士卒先每戰輒摧鋒陷陣賊乃退還浹口于時東伐諸帥御軍無律士卒暴掠甚為百姓所苦唯髙祖法令明整所至莫不親賴馬五年春孫恩頻攻句章高祖屢摧破之恩復走入海三月恩北出海鹽髙祖追而翼之築城于海鹽故治賊日來攻城城内兵力甚弱髙祖乃選敢死之士數百人咸脫甲胄執短兵竝鼓噪而出賊震懼奪氣因其懼而奔之竝棄甲散走斬其大帥姚盛雖連戰尅勝然衆寡不敵髙祖獨深慮之一夜偃旗匿衆若已遁者明晨開門使羸疾數人登城賊遙問劉諱所在曰夜已走矣賊信之乃率衆大上髙祖乗其懈怠奮擊大破之恩知城不可下乃進向滬瀆髙祖復棄城追之海鹽令鮑陋遣子嗣之以吳兵一千請為前驅髙祖曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜髙祖多設伏兵兼置旗鼓然一處不過數人明日賊率衆萬餘迎戰前驅既交諸伏皆出舉旗鳴鼓賊謂四面有軍乃退嗣之追奔為賊所没髙祖且戰且退賊盛所領死傷且盡髙祖慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏髙祖因呼更戰氣色甚猛賊衆以為然乃引軍去髙祖徐歸然後散兵稍集五月孫恩破滬瀆殺吳國内史袁山松死者四千人是月高祖復破賊於婁縣六月恩乗勝浮海奄至丹徒戰士十餘萬劉牢之猶屯山隂京邑震動髙祖倍道兼行與賊俱至于時衆力既寡加以歩逺疲勞而丹徒守軍莫有鬬志恩率衆數萬鼓噪登蒜山居民皆荷擔而立高祖率所領奔擊大破之投巘赴水死者甚衆恩以皷排音敗自載僅得還船雖被摧破猶恃其衆力徑向京師樓船髙大值風不得進旬日乃至白石尋知劉牢之已還朝廷有備遂走向鬱洲八月以髙祖為建武將軍下邳太守領水軍追恩至鬱洲復大破恩恩南走十一月髙祖追恩於滬瀆及海鹽又破之三戰竝大獲俘馘以萬數恩自是饑饉疾疫死者大半自浹口奔臨海元興元年正月驃騎將軍司馬元顯西伐荆州刺史桓𤣥𤣥亦率荆楚大衆下討元顯元顯遣鎮北將軍劉牢之拒之髙祖參其軍事次溧洲𤣥至髙祖請擊之不許將遣子敬宣詣𤣥請和髙祖與牢之甥東海何無忌竝固請不從遂遣敬宣詣𤣥𤣥尅京邑殺元顯以牢之為㑹稽内史懼而告髙祖曰便奪我兵禍其至矣今當北就髙雅之於廣陵舉事卿能從我去乎答曰將軍以勁卒數萬望風降服彼新得志威震天下三軍人情都已去矣廣陵豈可得至邪諱當反復還京口耳牢之叛走自縊死何無忌謂髙祖曰我將何之髙祖曰鎮北去必不免卿可隨我還京口桓𤣥必能守節北面我當與卿事之不然與卿圖之今方是𤣥矯情任筭之日必將用我軰也桓𤣥從兄修以撫軍鎮丹徒以髙祖為中兵參軍軍郡如故孫恩自奔敗之後徒旅漸散懼生見獲乃於臨海投水死餘衆推恩妹夫盧循為主桓𤣥欲且輯寜東土以循為永嘉太守循雖受命而寇暴不已五月𤣥復遣髙祖東征時循自臨海入東陽二年正月𤣥復遣髙祖破循於東陽循奔永嘉復追破之斬其大帥張士道追討至于晉安循浮海南走六月加髙祖彭城内史桓𤣥為楚王將謀簒盗𤣥從兄衛將軍謙屛人問髙祖曰楚王勲徳隆重四海歸懐朝廷之情咸謂宜有揖譲卿意以為何如髙祖既志欲圗𤣥乃遜辭答曰楚王宣武之子勲徳蓋世晉室微弱民望乆移乗運禪代有何不可謙喜曰卿謂可爾便當是真可爾十二月桓𤣥簒帝位遷天子於尋陽桓修入朝髙祖從至京邑𤣥見髙祖謂司徒王謐曰昨見劉裕風骨不恒蓋人傑也每遊集輒引接慇懃贈賜甚厚髙祖愈惡之或說𤣥曰劉諱龍行虎歩視瞻不凡恐不為人下宜蚤為其所𤣥曰我方欲平蕩中原非劉裕莫可付以大事闗隴平定然後當别議之耳𤣥乃下詔曰劉諱以寡制衆屢摧妖鋒汛海窮追十殄其八諸將力戰多被重創自元帥以下至于將士竝宜論賞以叙勲烈先是高祖東征盧循何無忌隨至山隂勸於㑹稽舉義高祖以為𤣥未據極位且㑹稽遥逺事濟為難俟其簒逆事著徐於京口圖之不憂不尅至是桓脩還京髙祖託以金創疾動不堪歩從乃與無忌同船共還建興復之計於是與弟道規沛郡劉毅平昌孟昶任城魏詠之高平檀慿之琅邪諸葛長民太原王元徳隴西辛扈興東莞童厚之竝同義謀時桓修弟𢎞為征虜將軍青州刺史鎮廣陵道規為𢎞中兵參軍昶為州主簿乃命毅潛往就昶聚徒於江北謀起兵殺𢎞長民為豫州刺史刁逵左軍府參軍謀據歴陽相應元徳厚之謀於京邑聚衆攻𤣥竝尅期齊發三年二月己丑朔乙卯髙祖託以遊獵與無忌等收集義徒凡同謀何無忌魏詠之詠之弟欣之順之檀憑之憑之從子韶弟祗隆與叔道濟道濟從兄範之高祖弟道憐劉毅毅從弟藩孟昶昶族弟懐玉河内向彌管義之陳留周安穆臨淮劉蔚從弟珪之東莞臧喜從弟寳符從子穆生童茂宗陳郡周道民漁陽田演譙國范清等二十七人願從者百餘人丙辰詰旦城開無忌服傳詔服稱詔居前義衆馳入齊聲大呼吏士驚散莫敢動即斬脩以徇髙祖哭甚慟厚加殯歛孟昶勸𢎞其日出獵未明開門出獵人昶道規毅等率壯士五六十人因開門直入𢎞方噉粥即斬之因收衆濟江義軍初尅京城脩司馬刁𢎞率文武佐吏來赴高祖登城謂之曰郭江州已奉乗輿反正於尋陽我等竝被宻詔誅除逆黨同㑹今日賊𤣥之首已當梟於大航矣諸君非大晉之臣乎今來欲何為𢎞等信之收衆而退毅既至髙祖命誅𢎞毅兄邁先在京師事未發數日髙祖遣同謀周安穆報之使為内應邁外雖酬許内甚震懼安穆見其惶駭慮事必泄乃馳歸時𤣥以邁為竟陵太守邁不知所為便下船欲之郡是夜𤣥與邁書曰北府人情云何卿近見劉諱何所道邁謂𤣥已知其謀晨起白之𤣥驚懼封邁為重安侯既而亷邁不執安穆使得逃去乃殺之誅元徳扈興厚之等召桓謙卞範之等謀拒髙祖謙等曰亟遣兵擊之𤣥曰不然彼兵速銳計出萬死若行遣水軍不足相抗如有蹉跌則彼氣成而吾事敗矣不如屯大衆於覆舟山以待之彼空行二百里無所措手銳氣已挫既至忽見大軍必驚懼駭愕我案兵堅陣勿與交鋒彼求戰不得自然走散此計之上也謙等固請乃遣頓邱太守吳甫之右衛將軍皇甫敷北拒義軍𤣥自聞軍起憂懼無復為計或曰劉諱等衆力甚弱豈辦之有成陛下何慮之甚𤣥曰劉諱足為一世之䧺劉毅家無擔石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成衆推髙祖為盟主移檄京邑曰夫治亂相因理不常泰狡焉肆虐或值聖明自我大晉陽九屢搆隆安以來難結皇室忠臣碎於虎口貞良斃於豺狼逆臣桓𤣥陵虐人鬼阻兵荆郢肆暴都邑天未亡難凶力繁興踰年之間遂傾皇祚主上播越流幸非所神噐沉淪七廟毁墜夏后之罹浞豷有漢之遭莾卓方之於𤣥未足為喻自𤣥簒逆于今厯年亢旱彌時民無生氣加以士庻疲於轉輸文武困於造築父子乖離室家分散豈唯大東有杼軸之悲摽梅有傾筐之怨而已哉仰觀天文俯察人事此而能乆孰有可亡凡在有心誰不扼腕諱等所以叩心泣血不遑啟處者也是故夕寐宵興援奬忠烈潛搆崎嶇險過履虎輔國將軍劉毅廣武將軍何無忌鎮北主簿孟昶兖州主簿魏詠之寜逺將軍劉道規龍驤將軍劉藩振威將軍檀憑之等忠烈斷金精貫白日荷戈奮袂志在畢命益州刺史毛璩萬里齊契掃定荆楚江州刺史郭昶之奉迎主上宫于尋陽鎮北參軍王元徳等竝率部曲保據石頭揚武將軍諸葛長民收集義士已據歴陽征虜參軍庾頤之等潛相連結以為内應同力協規所在蜂起即日斬偽徐州刺史安城王脩青州刺史𢎞首義衆既集文武爭先咸謂不有一統則事無以輯諱辭不獲已遂總軍要庻上憑祖宗之靈下罄義夫之力剪馘逋逆蕩清京輦公侯諸君或世樹忠貞或身荷爵寵而竝俛眉猾竪自効莫由顧瞻周道寜不弔乎今日之舉良其㑹也諱以虚薄才非古人接勢於己替之機受任於既頺之運丹誠未宣感慨憤躍望霄漢以永懐眄山川以增厲授檄之日神馳賊廷以孟昶為長史摠攝後事檀憑之為司馬百姓願從者千餘人三月戊午朔遇吳甫之於江乗甫之𤣥驍將也其兵甚銳高祖躬執長刀大呼以衝之衆皆披靡即斬甫之進至羅落橋皇甫敷率數千人逆戰寜逺將軍檀憑之與髙祖各御一隊憑之戰敗見殺其衆退散髙祖進戰彌厲前後奮擊應時摧破即斬敷首初髙祖與何無忌等共建大謀有善相者相髙祖及無忌等竝當大貴其應甚近惟云憑之無相髙祖與無忌密相謂曰吾等既為同舟理無偏異吾徒皆咸富貴則檀不應獨殊深不解相者之言至是而憑之戰死髙祖知其事必㨗𤣥聞敷等竝没愈懼使桓謙屯東陵口卞範之屯覆舟山西衆合二萬己未旦義軍食畢棄其餘糧進至覆舟山東使丐士張旗幟於山上以為疑兵𤣥又遣武騎將軍庾褘之配以精卒利噐助謙等髙祖躬先士卒以奔之將士皆殊死戰無不一當百呼聲動天地時東北風急因命縱火烟爓張天皷噪之音震京邑謙等諸軍一時土崩𤣥始雖遣軍置陣而走意已決别使領軍將軍殷仲文具舟於石頭仍將子姪浮江南走庚申髙祖鎮石頭城立留臺總百官焚桓温神主於宣陽門外造晉新主立于太廟遣諸將帥追𤣥尚書王假率百官奉迎乗輿司徒王謐與衆議推髙祖領揚州固辭乃以謐為録尚書事領揚州刺史於是推髙祖為使持節都督揚徐兖豫青冀幽并八州諸軍事領軍將軍徐州刺史先是朝廷承晉氏亂政百司縱弛桓𤣥雖欲釐整而衆莫從之髙祖以身範物先以威禁内外百官皆肅然奉職二三日間風俗頓改且桓𤣥雖以雄豪見推而一朝便有極位晉氏四方牧守及在朝大臣盡心伏事臣主之分定矣髙祖位微於朝衆無一旅奮臂草萊之中倡大義以復皇祚由是王謐等諸人時衆民望莫不愧而憚焉諸葛長民失期不得發刁逵執送之未至而𤣥敗𤣥經尋陽江州刺史郭昶之備乗輿法物資之𤣥收畧得二千餘人挾天子走江陵冠軍將軍劉毅輔國將軍何無忌振武將軍劉道規率諸軍追討尚書左僕射王愉愉子荆州刺史綏等江左冠族綏少有重名以髙祖起自布衣甚相凌忽綏桓氏甥亦有自疑之志髙祖悉誅之四月奉武陵王遵為大將軍承制大赦天下唯桓𤣥一祖後不在赦例初髙祖家貧嘗負刁逵社錢三萬經時無以還逵執録甚嚴王謐造逵見之密以錢代還由是得釋髙祖名微位薄盛流皆不與相知唯謐交焉桓𤣥將簒謐手解安帝璽紱為𤣥佐命功臣及義旗建衆竝謂謐宜誅唯髙祖保持之劉毅嘗因朝㑹問謐璽紱所在謐益懼及王愉父子誅謐從弟諶謂謐曰王駒無罪而義旗誅之此是剪除勝已以絶民望兄既桓氏黨附名位如此欲求免得乎駒愉小字也謐懼奔于曲阿髙祖牋白大將軍深相保謐迎還復位光禄勲丁承之左衛將軍褚粲游擊將軍司馬秀役使官人為御史中丞王禎之所糾察謝牋言辭怨憤承之造司宜藏髙祖與大將軍牋白粲等備位大臣所懐必盡執憲不允自應據理陳訴而横興怨忿歸咎有司宜加裁當以清風軌竝免官桓𤣥兒子韶聚衆向厯陽髙祖命輔國將軍諸葛長民擊走之無忌道規破𤣥大將鄭鈐等于桑落洲衆軍進據尋陽加髙祖都督江州諸軍事𤣥既還荆郢大聚兵衆召水軍造樓船噐械率衆二萬挾天子發江陵浮江東下與冠軍將軍劉毅等相遇於崢嶸洲衆驚下擊大破之𤣥棄衆復挾天子還復江陵𤣥黨殷仲文奉晉二皇后還京師𤣥至江陵因西走南郡太守王騰之荆州别駕王康産奉天子入南郡府初征虜將軍益州刺史毛璩遣從孫祐之與參軍費恬送弟喪州下有衆二百璩弟子脩之時為𤣥屯騎校尉誘𤣥以入蜀至枚回洲恬與祐之迎射之益州督䕶馮遷斬𤣥首傳京師又斬𤣥子昇於江陵市初𤣥敗於崢嶸洲義軍以為大事已定追躡不速𤣥死幾一旬衆軍猶不至𤣥從子振逃於華容之浦中招聚逆黨數千人晨襲江陵城居民競出赴之騰之康産皆被殺桓謙先匿於沮川亦聚衆以應振為𤣥舉哀立喪廷謙率衆官奉璽綬于安帝無忌道規既至江陵與桓振戰于靈溪𤣥黨馮該又設伏于楊林義軍奔敗退還尋陽兖州刺史辛禺懷貳㑹北青州刺史劉該反禺求征該次淮隂又反禺長史羊穆之斬禺傳首京師十月髙祖領青州刺史甲仗百人入殿劉毅諸軍復進至夏口毅攻魯城道規攻偃月壘皆拔之十二月諸軍進平巴陵義熙元年正月毅等至江津破桓謙桓振江陵平天子反正三月天子至自江陵詔曰古稱大者天地其次君臣所以列貫三辰神人代序諒理本於造昧而運周於萬葉故盈否時襲四靈通其變王道或昧貞賢拯其危天命所以永固人心所以攸穆雖夏周中傾賴靡申之績恭倫載竊實二代是維或乗資藉號或業隆異世猶詩書以之休詠記策用為羙談未有因心撫民而誠發理應援神噐於己淪若在今之盛者也朕以寡昧遭家不造越自遘閔屬當屯極逆臣桓𤣥乗舋縱慝窮凶恣虐滔天猾夏遂誣㒺人神肆其簒亂祖宗之基既湮七廟之饗胥殄若墜淵谷未足斯譬皇度有晉天縱英哲使持節都督揚徐兖豫青冀幽并江九州諸軍事鎮軍將軍徐青二州刺史忠誠天亮神武命世用能貞明協契義夫嚮臻故順聲一唱二溟卷波英風振路宸居清翳暨冠軍將軍毅輔國將軍無忌振武將軍道規舟旗遄邁而元凶傳首回戈疊揮則荆漢霧廓俾宣元之祚永固於嵩岱傾基重造再集於朕躬宗廟歆七百之祐皇基融載新之命念功惟徳永言銘懐固已道冠開闢獨絶終古書契以來未之前聞矣雖則功髙靡尚理至難文而崇庸命徳哲王攸先者將以𢎞道制治深闗盛衰故伊望膺殊命之錫桓文饗備物之禮况宏徵不世顧邈百代者宜極名噐之隆以光大國之盛而鎮軍謙虚自𠂻誠旨屢顯朕重逆仲父乃所以愈彰徳羙也鎮軍可進位侍中車騎將軍都督中外諸軍事使持節徐青二州刺史如故顯祚大邦啟兹疆宇髙祖固譲加録尚書事又不受屢請歸藩天子不許遣百僚敦勸又親幸公第髙祖惶懼詣闕陳請天子不能奪是月旋鎮丹徒天子重遣大使敦勸又不受乃改授都督荆司梁益寜雍凉七州并前十六州諸軍事本官如故於是受命解青州加領兖州刺史盧循浮海破廣州獲刺史吳隠之即以循為廣州刺史以其同黨徐道覆為始興相二年三月督交廣二州十月髙祖上言曰昔天禍皇室巨狡縱簒臣等義惟舊隸豫蒙國恩仰契信順之符俯厲人臣之憤雖社稷之靈抑亦事由衆濟其翼奨忠懃之佐文武畢力之士敷執在已之謙用虧國體之大輒攝衆軍先上同謀起義始平京口廣陵二城臣及撫軍將軍毅等二百七十二人并後赴義出都縁道大戰所餘一千五百六十六人又輔國將軍長民故給事中王元徳等十人各一千八百四十八人乞正封賞其西征衆軍須論集續上於是尚書奏封唱義謀主鎮軍將軍諱豫章郡公食邑萬户賜絹三萬匹其餘封賞各有差鎮軍府佐吏降故太傳謝安府一等十一月天子重申前令加髙祖侍中進號車騎將軍開府儀同三司固譲詔遣百僚敦勸三年二月髙祖還京師將詣廷尉天子先詔獄官不得受詣闕陳譲乃見聽旋于丹徒閏月府將駱氷謀作亂將被執單騎走追斬之誅氷父永嘉太守球球夲東陽郡史孫恩之亂起義於長山故見擢用初桓𤣥之敗以桓冲忠貞署其孫𦙍至是氷謀以𦙍為主與東陽太守殷仲文潛相連結乃誅仲文及仲文二弟凡桓𤣥餘黨至是皆誅夷天子遣兼大常葛籍授公策曰有扈滔天夷羿乗釁亂節干紀實撓皇極賊臣桓𤣥怙寵肆逆乃摧傾華霍倒㧞嵩岱五嶽既夷六地易所公命世英縱藏噐待時因心資敬誓雪國恥慨憤陵夷誠發宵寐既而嵗月屢遷神噐已逺忠孝幽寄實貫三靈爾乃介石勝機宣契畢舉訴蒼天以為正揮義旅而一驅奔鋒數百勢烈激電百萬不能抗限制路日直植城遂使衝鯨潰流暴鱗奔漢廟勝逺加重氛載滌二儀廓清三光反照事遂永代功髙開闢理微稱謂義感朕心若夫道為身濟猶縻厥爵况乃誠徳俱深勲冠天人者乎是用建兹邦國永祚山河言念載懐匪云足報往欽哉俾屏余一人長弼皇晉流風垂祚暉烈無窮其降承嘉策對敭朕命十二月司徒録尚書揚州刺史王謐薨四年正月徴公入輔授侍中車騎將軍開府儀同三司揚州刺史録尚書徐兖二州刺史如故表解兖州先是遣冠軍劉敬宣伐蜀賊譙縱無功而返九月以敬宣挫退遜位不許乃降為中軍將軍開府如故初偽燕主鮮卑慕容徳僭號於青州徳死兄子超襲位前後屢為邉患五年二月大掠淮北執陽平太守劉千載濟南太守趙元驅畧千餘家三月公抗表北討以丹陽尹孟昶監中軍留府事四月舟師發京都泝淮入泗五月至下邳留船艦輜重歩軍進琅邪所過皆築城留守鮮卑梁父莒城二戍竝奔走慕容超聞王師將至其大將公孫五樓說超宜斷據大峴刈除粟苖堅壁清野以待之彼僑軍無資求戰不得旬月之間折棰以笞之耳超不從曰彼逺來疲勞勢不能乆但當引令過峴我以䥫騎踐之不憂不破也豈有預芟苖稼先自䠞弱邪初公將行議者以為賊聞大軍逺出必不敢戰若不斷大峴當堅守廣固刈粟清野以絶三軍之資非唯難以有功將不能自反公曰我揣之熟矣鮮卑貪不及逺計進利尅獲退惜粟苖謂我孤軍逺入不能持乆不過進據臨朐退守廣固我一得入峴則人無退心驅必死之衆向懐貳之虜何憂不尅彼不能清野固守為諸君保之公既入峴舉手指天曰吾事濟矣六月慕容超遣五樓及廣寜王賀賴盧先據臨朐城既聞大軍至留羸老守廣固乃悉出臨朐有巨蔑水去城四十里超告五樓曰急往據之晉軍得水則難擊也五樓馳進龍驤將軍孟龍符領騎居前奔往爭之五樓乃退衆軍歩進有車四千兩分車為兩翼方軌徐行車悉張幔御者執矟又以輕騎為遊軍軍令嚴肅行伍齊整未及臨胊數里賊䥫騎萬餘前後交至公命兖州刺史劉藩弟并州刺史道憐諮議參軍劉敬宣陶延夀參軍劉懐玉慎仲道索邈等齊力擊之日向昃公遣諮議參軍檀韶直趨臨朐韶率建威將軍向彌參軍胡藩馳往即日䧟城斬其牙旗悉虜超輜重超聞臨朐已拔引衆走公親鼓之賊乃大破超遁還廣固獲超馬偽輦玉璽豹尾等送于京師斬其大將叚暉等十餘人其餘斬獲千計明日大軍進廣固即屠大城超退保小城於是設長圍守之圍髙三丈外穿三重壍停江淮轉輸館榖於齊土撫納降附華戎歡悅援才授爵因而任之七月詔加公北青冀二州刺史超大將垣遵遵弟苖竝率衆歸順公方治攻具城上人曰汝不得張綱何能為也綱者超偽尚書郎其人有巧思㑹超遣綱稱藩於姚興乞師請救興偽許之而實憚公不敢遣綱從長安還泰山太守申宣執送之乃升綱於樓上以示城内城内莫不失色於是使綱大治攻具超求救不獲綱反見虜轉憂懼乃請稱藩求割大峴為界獻馬千疋不聽圍之轉急河北居民荷戈負糧至者日以千數録事參軍劉穆之有經畧才具公以為謀主動止必諮焉時姚興遣使告公云慕容見與隣好又以窮告急今當遣䥫騎十萬逕據洛陽晉軍若不退者便當遣䥫騎長驅而進公呼興使答曰語汝姚興我定燕之後息甲三年當平闗洛今能自送便可速來穆之聞有羌使馳入而公發遣已去以興所言并答具語穆之穆之尤公曰常日事無大小必賜與謀之此宜善詳之云何卒爾便答公所答興言未能威敵正足怒彼耳若燕未可拔羌救奄至不審何以待之公笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寜容先遣信命此是其見我伐燕内已懐懼自張之辭耳九月進公太尉中書監固譲偽徐州刺史叚宏先奔索虜十月河北歸順張綱治攻具成設諸竒巧飛樓木幔之屬莫不畢備城上火石弓矢無所用之六年二月丁亥屠廣固超踰城走征虜賊曹喬胥獲之殺其亡命以下納口萬餘馬二千疋送超京師斬于建康市公之北伐也徐道覆仍有闚𨵦之志勸盧循乗虚而出循不從道覆乃至番禺說循曰夲住嶺外豈以理極於此正以劉公難與為敵故也今方領兵堅城之下未有旋日以此思歸死士掩襲何劉之徒如反掌耳不乗此機而保一日之安若平齊之後小息甲養衆不過一二年間必璽書徵君若劉公自率衆至豫章遣銳師過嶺雖復將軍神武恐必不能當也今日之機萬不可失既尅都邑傾其根夲劉公雖還無能為也循從之乃率衆過嶺是月㓂南康廬陵豫章諸郡守皆委任奔走于時平齊問未至即馳使徴公公之初尅齊也欲停鎮下邳清盪河洛既而被徴使至即日班師鎮南將軍何無忌與徐道覆戰于豫章敗績無忌被害内外震駭朝廷欲奉乗輿北走就公尋知賊定未至人情小安公至下邳以船運輜重自率精銳歩歸至山陽聞無忌被害則慮京邑失守乃卷甲兼行與數十人至淮上問行旅以朝廷消息人曰賊尚未至劉公若還便無所憂也公大喜單船過江逕至京口衆乃大安四月癸未公至京師解嚴息甲撫軍將軍劉毅抗表南征公與毅書曰吾往習擊妖賊曉其變態新獲姧利其鋒不可輕宜須装嚴畢與弟同舉又遣毅從弟藩往止之毅不從舟師二萬發自姑孰循之初下也使道覆向尋陽自寇湘中諸郡荆州刺史道規遣軍至長沙為循所敗逕至巴陵將向江陵道覆聞毅上馳使報循曰毅兵衆甚盛成敗事係之於此宜并力摧之若此克㨗天下無復事矣根夲既定不憂上面不平也循即日發巴陵與道覆連旗而下别有八艚艦九枚起四層髙十二文公以南藩覆沒表送章綬詔不聽五月劉毅敗績于桑落洲棄船歩走餘衆不得去者皆為賊所擒初循至尋陽聞公已還不信也既破毅乃審凱入之問竝相視失色循欲退還尋陽進平江陵據二州以抗朝廷道覆謂宜乗勝徑進固爭之疑議多日乃見從毅敗問至内外洶擾于時北師始還多創痍疾病京師戰士不盈數千賊既破江豫二鎮戰士十餘萬舟車百里不絶奔敗還者竝聲其雄盛孟昶諸葛長民懼寇漸逼欲擁天子過江公不聽昶固請不止公曰今重鎮外傾彊寇内逼人情危駭莫有固志若一旦遷動便自瓦解土崩江北亦豈可得至設令得至不過延日月耳今兵士雖少自足以一戰若其克濟則臣主同休茍厄運必至我當以死衛社稷横尸廟門遂其由來以身許國之志不能逺竄於草間求活也我既決矣卿勿復言昶恐其不濟乃為表曰臣諱北討衆竝不同唯臣賛諱行計致使彊賊乗間社稷危逼臣之辠也今謹引分以謝天下封表畢乃仰藥而死於是大開賞募投身赴義者一同登京城之科發居民治石頭城建牙誡嚴時議者謂宜分兵守諸津要公以為賊衆我寡若分兵屯則測人虚實且一處失利則沮三軍之心今聚衆石頭隨宜應赴既令賊無以測多少又於衆力不分若徒旅轉集徐更論之耳移屯石頭乃柵淮斷查浦既而羣賊大至公策之曰賊若於新亭直進其鋒不可當宜且回避勝負之事未可量也若回泊西岸此成擒耳道覆欲自新亭白石焚舟而上循多疑少決每欲以萬全為慮謂道覆曰大軍未至孟昶便望風自裁大勢言之自當計日潰亂今決勝負於一朝既非必定之道且殺傷士卒不如按兵待之公于時登石頭城以望循軍初見引向新亭公顧左右失色既而回泊蔡洲道覆猶欲上循禁之自是衆軍轉集脩治越城築查浦藥園廷尉三壘皆聚以實衆冠軍將軍劉敬宜屯北郊輔國將軍孟懐玉屯丹陽郡西建武將軍王仲徳屯越城廣武將軍劉黙屯建陽門外使寜朔將軍索邈領鮮卑具裝虎班突騎千餘匹皆被練五色自淮北至于新亭賊竝聚觀咸畏憚之然猶冀京邑及三吳有應之者遣十餘艦來拔石頭柵公命神弩射之發輒摧䧟循乃止不復攻柵設伏兵於南岸使羸老悉乗舟艦向白石公憂其從白石歩上乃率劉毅諸葛長民北出拒之留參軍徐赤特戍南岸命堅守勿動公既去賊焚查浦歩上赤特軍戰敗死没有百餘人赤特棄餘衆單舸濟淮賊遂率數萬屯丹陽郡公率諸軍馳歸衆憂賊過咸謂公當徑還拒戰公先分軍還石頭衆莫之曉解甲息士洗浴飲食之乃出列陳於南塘以赤特違處分斬之命參軍諸葛叔度朱齡石率勁勇千餘人過淮羣賊數千皆長刀矛鋋精甲曜日奮躍爭進齡石所領多鮮卑善歩矟竝結陳以待之賊短兵弗能抗死傷者數百人乃退走㑹日暮衆亦歸劉毅之敗豫州主簿袁興國反叛據歴陽以應賊瑯邪内史魏順之遣將謝寳討斬之興國司馬襲寳順之不救而退公怒斬之順之詠之之弟也於是功臣震懾莫敢不用命六月更授公太尉中書監加黄鉞受黄鉞餘固辭以司馬庾悅為建威將軍江州刺史自東陽出豫章七月庚申羣賊自蔡洲南走還屯尋陽遣輔國將軍王仲徳廣川太守劉鍾河間太守蒯恩追之公還東府大治水軍皆大艦重樓髙者十餘丈盧循遣其大將荀林寇江陵桓謙先於江陵奔羌又自羌入蜀偽主譙縱以為荆州刺史謙及譙道福率軍二萬出寇江陵適與林㑹相去百餘里荆州刺史道規斬謙于枝江破林於江津追至竹町斬之初循之走也公知其必寇江陵登遣淮陵内史索邈領馬軍歩道援荆州又遣建威將軍孫季髙率衆三千自海道襲番禺江州刺史庾悅至五畆嶠賊遣千餘人據斷嶠道悅前驅鄱陽太守虞邱進攻破之公治兵大辦十月率兗州刺史劉藩寜朔將軍檀韶等舟師南伐以後將軍劉毅監太尉留守府後事皆委焉是月徐道覆率衆三萬寇江陵荆州刺史道規又大破之斬首萬餘級道覆走還盆口初公之遣索邈也邈在道為賊所斷道覆敗後方達自循東下江陵斷絶京邑之問傳者皆云已沒及邈至方知循走循初自蔡洲南走留其親黨范崇民五千人髙艦百餘戍南陵王仲徳等聞大軍且至乃進攻之十一月大破崇民軍焚其舟艦收其散卒循廣州守兵不以海道為防是月建威將軍孫季髙乗海奄至而城池峻整兵猶數千季髙焚賊舟艦悉力而上四面攻之即日屠其城循父以輕舟奔始興季髙撫其舊民戮其親黨勒兵謹守初公之遣季髙也衆咸以海道艱逺必至為難且分徹見力二三非要公不從勑季髙曰大軍十二月之交必破妖虜卿今時當至廣州傾其巢窟令賊奔走之日無所歸投季髙受命而行如期剋㨗循方治兵旅舟艦設諸攻備公欲御以長筭乃屯軍雷池賊揚聲不攻雷池當乗流逕下公知其欲戰且慮賊戰敗或於京江入海遣王仲徳以水艦二百於吉陽下斷之十二月循道覆率衆數萬方艦而下前後相抗莫見舳艫之際公悉出輕利鬭艦躬提幡鼔命衆軍齊力擊之又上歩騎於西岸右軍參軍庾樂生乗艦不進斬而徇之於是衆軍竝踊騰爭先軍中多萬鈞神弩所至莫不摧陷公中流蹙之因風水之勢賊艦悉泊西岸上軍先備火具乃投火焚之煙爓張天賊衆大敗追奔至夜乃歸循等還尋陽初分遣歩軍莫不疑恠及燒賊艦衆乃悅服召王仲徳請還為前驅留輔國將軍孟懐玉守雷池循聞大軍上欲走向豫章乃悉力柵斷左里大軍至左里將戰公所執麾竿折折幡沉水衆竝恠懼公歡笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乗勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼畧遣劉藩孟懐玉輕軍追之循收散卒尚有數千人逕還廣州道覆還保始興公旋自左里天子遣侍中黄門勞師于行所宋書卷一宋書卷一考證武帝紀上彭城縣綏里人諸夲同南史綏下有輿字臣承蒼按劉延孫傳劉氏在彭城者分為三里帝室居綏興里南史劉康祖傳作綏輿里興輿二字相近未知孰是宋胡三省通鑑註又作綏徳里誤也晉朝衛將軍闕謝琰晉書謝琰為衛將軍與下句前將軍劉牢之書法正是一例並無闕文因諸夲多同姑仍其舊諱當反復還京口耳反復通鑑作反服注謂反初服也應從通鑑或說元曰劉諱龍行虎歩視瞻不凡南史此乃桓元妻劉氏之語視瞻一本作瞻視非劉裕莫可付以大事夲紀内凡遇帝名皆以諱字代之此獨出裕字似未畫一但諸夲皆同或者因此處乃追述桓元之語特用變例未可知也尚書王假率百官奉迎乗輿假南史作嘏由是王謐等諸人時衆民望汲古閣衆作失民作人衆驚下擊大破之驚當作軍下當作進與參軍費恬送弟喪州下州下南史作下州宋書卷一考證
