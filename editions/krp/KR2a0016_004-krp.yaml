body:
  text: 宋書卷四梁沈約撰本紀第四少帝少帝諱義符小字車兵武帝長子也母曰張夫人晉義熙二年生於京口武帝晚無男及帝生甚悅年十嵗拜豫章公世子帝有膂力善騎射解音律宋臺建拜宋世子元熙元年進為宋太子武帝受禪立為皇太子永初三年五月癸亥武帝崩是日太子即皇帝位大赦尊皇太后曰太皇太后六月壬申以尚書僕射傅亮為中書監司空徐羡之領軍將軍謝晦及亮輔政戊子太尉長沙王道憐薨秋九月丁未有司奏武皇帝配南郊武敬皇后配北郊冬十一月戊午有星孛於營室十二月庚戌魏軍克滑臺明年春正月己亥朔大赦改元為景平元年文武進位二等辛巳祀南郊虜將達奚卬破金墉進圍虎牢毛徳祖擊虜敗之虜退而復合拓䟦木末又遣平安公渉歸寇青州癸卯河南郡失守乙卯有星孛于東壁二月丁丑太皇太后崩沮渠䝉遜吐谷渾阿犲並遣使朝貢庚辰爵䝉遜為大將軍封河西王以阿犲為安西將軍沙州刺史封澆河公辛未富陽人孫法光反寇山隂㑹稽太守褚談遣山隂令陸劭討敗之三月壬寅孝懿皇后袝葬於興寜陵是月髙麗國遣使朝貢甲子豫州刺史劉粹遣軍襲許昌殺虜潁川太守庾龍乙丑虜騎寇髙平初虜自河北之敗請修和親及聞髙祖崩因復侵擾河洛之地騷然矣夏四月檀道濟北征次臨朐焚虜攻具乙未魏軍克虎牢執司州刺史毛徳祖以歸秋七月癸酉尊所生張夫人為皇太后丁丑以旱詔赦五嵗以下罪人冬十月己未有星孛於氐指尾貫攝提向大角仲月在危季月掃天倉而後滅是嵗魏主拓䟦嗣薨子燾立十二月丙寅省寜州之江陽犍為安上三郡合為宋昌郡二年春正月癸巳朔日有蝕之廢南豫州刺史廬陵王義真為庶人徙新安郡乙未以皇弟義恭為冠軍將軍南豫州刺史乙巳大風天有五色雲占者以為有兵髙麗國遣使貢獻執政使使者誅義真於新安夏五月江州刺史檀道濟揚州刺史王𢎞入朝帝居處所為多過失乙酉皇太后令曰王室不造天禍未悔先帝創業弗永棄世登遐義符長嗣屬當天位不謂窮凶極悖一至於此大行在殯宇内哀惶幸災肆於悖詞喜容表於在慼至乃徴召樂府鳩集伶官優倡管弦靡不備奏珍羞甘膳有加平日採擇媵御産子就宫靦然無怍醜聲四達及懿后崩背重加天罰親與左右執紼歌呼推排梓宫抃掌笑謔殿省備聞加復日夜媟狎羣小慢戲興造千計費用萬端帑藏空虚人力殫盡刑罰苛虐幽囚日增居帝王之位好皂𨽻之役處萬乗之尊悅厮養之事親執鞭撲敺擊無辜以為笑樂穿池築觀朝成暮毁徴發工匠疲極兆民逺近歎嗟人神怨怒社稷將墜豈可復嗣守洪業君臨萬邦今廢為營陽王一依漢昌邑晉海西故事奉迎鎮西將軍宜都王義隆入纂皇統始徐羡之傳亮將廢帝諷王𢎞檀道濟求赴國訃𢎞等來朝使中書舍人邢安泰潘盛為内應是旦道濟謝晦領兵居前羡之等隨後因東掖門開入自雲龍門盛等先戒宿衛莫有禦者時帝於華林園為列肆親自酤賣又開瀆聚土以象破岡埭與左右引船唱呼以為歡樂夕游天泉池即龍舟而寢其朝未興兵士進殺二侍者於帝側傷帝指扶出東閤就收璽紱羣臣拜辭送於東宫遂幽于吳郡是日赦死罪以下太后令奉還璽紱檀道濟入守朝堂六月癸丑徐羡之等使中書舍人邢安泰弑帝於金昌亭帝有勇力不即受制突走出昌門追以門闗踣之致殞時年十九宋書卷四宋書卷四考證少帝紀突走出昌門追以門闗踣之闗一本作開者誤宋書卷四考證
