郡十一月戊子尚書僕射王琳卒己亥以丹陽尹孟顗為尚書僕射氐楊難當又宼漢川十二月癸亥遣龍驤將軍裴方眀與梁秦二州刺史劉真道討之十二月晉寧太守松子反叛寧州刺史徐循討平之是嵗肅特國高麗國蘇靡黎國林邑國竝遣使獻方物十九年正月乙巳詔曰夫所因者本聖哲之逺教本立化成斆學之為貴故詔以三徳崇以四術用能納諸義方致之軌度盛王祖世咸必由之永初受命憲章𢎞逺將陶鈞庶品混一殊風有詔典司大啓庠序而頻遘屯夷未及脩建永瞻前猷思敷鴻烈今方隅乂寧戎夏慕嚮廣訓胄子實維時務便可式遵成規闡揚景業夏四月甲戌以久疾愈始奉初祠大赦天下五月庚寅梁秦二州刺史劉真道龍驤將軍裴方眀破氐楊難當仇池平閏月京邑雨水丁巳遣使廵行賑䘏六月壬午以大沮渠無諱為征西大將軍涼州刺史秋七月以梁秦二州刺史劉真道為雍州刺史龍驤將軍裴方眀為梁南秦二州刺史甲戌晦日有蝕之冬十月甲申芮芮國遣使獻方物己亥以晉寧太守周萬嵗為寧州刺史十二月丙申詔曰胄子始集學業方興自微言冺絶逝將干祀感事思人意有慨然奉聖之𦙍可速議繼襲於先廟地特為營造依舊給祠直令四時饗祀闕里往經宼亂黌校殘毁并下魯郡脩復學舎採召生徒昔之賢哲及一介之善猶或衛其邱壟禁其芻牧况尼父徳表生民功被百代而墳塋荒蕪荆棘弗翦可蠲墓側數戸以掌洒掃魯郡上民孔景等五戸居近孔子墓側蠲其課役供給洒掃并種松柏六百株是嵗婆皇國遣使獻方物二十年春正月於臺城東西開萬春千秋二門二月甲戌江州刺史庾登之為中䕶軍庚申以廬陵王紹為江州刺史仇池為索虜所沒甲申車駕於白下閱武三月辛亥安西將軍荆州刺史衡陽王義季進號征西大將軍以巴西梓潼二郡太守申坦為梁南秦二州刺史夏四月甲午立第六皇子誕為廣陵王五月癸丑中䕶軍庾登之卒秋七月癸丑以楊文徳為征西將軍北秦州刺史封武都王辛酉以南蠻校尉蕭思話為雍州刺史甲子前雍州刺史劉真道梁南秦二州刺史裴方眀有罪下獄死八月癸未以廷尉陶愍祖為廣州刺史冬十二月庚午以始興内史檀和之為交州刺史壬午詔曰國以民為本民以食為天故一夫輟稼饑者必及倉廪既實禮節以興自頃在所貧罄家無宿積賦役暫偏則人懐愁墊嵗或不稔而病乏比室誠由政徳弗孚以臻斯弊抑亦耕桑未廣地利多遺宰守微化道之方氓庶忘勤分之義永言𢎞濟眀發載懐雖制令亟下終莫懲勸而坐望滋殖庸可致乎有司其班宣舊條務盡敦課遊食之徒咸令附業考覈勤惰行其誅賞觀察能殿嚴加黜陟古者躬耕帝籍敬供粢盛仰瞻前王思遵令典便可量䖏千畝考卜元辰朕當親率百辟致禮郊甸庶幾誠素將被斯民是嵗河西國高麗國百濟國倭國竝遣使獻方物是嵗諸州郡水旱傷稼民大饑遣使開倉賑䘏給賜糧種二十一年春正月己亥南徐南豫州揚州之浙江西竝禁酒大赦天下諸逋債在十九年以前一切原除去嵗失收者疇量申減尤弊之䖏遣使就郡縣隨宜賑䘏凡欲附農而種糧匱乏者竝加給貸營千畝諸統司役人賜布各有差戊午衛將軍臨川王義慶薨辛酉以太子詹事劉義宗為南兖州刺史二月庚午以領軍將軍趙伯符為豫州刺史己丑司徒錄尚書事江夏王義恭進位太尉領司徒庚寅以右衛將軍沈演之為中領軍辛卯立第七皇子宏為建平王甲午以廣陵王誕為南兖州刺史夏四月晉陵延陵民徐耕以米千斛助䘏饑民五月壬戌以尚書何尚之為中䕶軍諮議參軍劉道錫為廣州刺史六月連雨水丁亥詔曰霖雨彌日水淹為患百姓積儉易致乏匱二縣官長及營署部司各隨統檢實給其柴米必使周悉秋七月丁酉揚州刺史始興王濬加中軍將軍南豫州刺史武陵王諱加撫軍將軍乙巳詔曰比年穀稼傷損滛亢成災亦由播殖之宜尚有未盡南徐兖豫及揚州浙江西屬郡自今悉督種麥以助闕乏速運彭城下邳郡見種委刺史貸給徐豫土多稻田而民間専務陸作可符二鎮履行舊陂相率脩立并課墾闢使及來年凡諸州郡皆令盡勤地利勸導播殖蠶桑麻紵各盡其方不得但奉行公文而已八月戊辰征西大將軍荆州刺史衡陽王義季為征北大將軍開府儀同三司南兖州刺史征北將軍徐州刺史南譙王義宣為車騎將軍荆州刺史南兖州刺史廣陵王誕為南徐州刺史九月甲辰以大沮渠安周為征西將軍涼州刺史封河西王冬十月己卯以左軍將軍徐瓊為兖州刺史大將軍參軍申恬為冀州刺史二十二年春正月辛卯朔改用御史中丞何承天元嘉新歴壬辰撫軍將軍南豫州刺史武陵王諱改為雍州刺史湘州刺史南平王鑠為南豫州刺史二月辛巳以侍中王僧朗為湘州刺史甲戌立第八皇子褘為東海王第九皇子昶為義陽王夏六月辛巳以南豫州刺史南平王鑠為豫州刺史秋七月己未以尚書僕射孟顗為尚書左僕射中䕶軍何尚之為尚書右僕射雍州刺史武陵王諱討縁沔蠻移一萬四千餘口於京師乙酉征北大將軍南兖州刺史衡陽王義季改為徐州刺史九月乙未開酒禁冬十月起湖塾廢田千頃十二月乙未太子詹事范曄謀反及黨與皆伏誅丁酉免大將軍彭城王義康為庶人庚戌以前豫州刺史趙伯符為䕶軍將軍二十三年春正月丁巳以長沙内史陸徽為益州刺史庚申尚書左僕射孟顗去職遷漢州流民於沔次二月癸卯以左衛將軍劉義賓為南兖州刺史三月索虜宼兖豫青冀刺史申恬破之夏四月丁未大赦天下六月癸未朔日有蝕之交州刺史檀和之伐林邑國剋之秋七月辛未以散騎常侍杜坦為青州刺史八月癸卯揭陽赭賊攻建安郡燔燒城府九月己卯車駕幸國子學策試諸生答問凡五十九人冬十月戊子詔曰庠序興立累載胄子肄業有成近親策試覩濟濟之美緬想洙泗永懐在昔諸生答問多可採覽教授之官竝宜沾賚賜帛各有差十二月丁酉以龍驤司馬蕭景憲為交州刺史是嵗大有年築北堤立𤣥武湖築景陽山於華林園二十四年春正月甲戌大赦天下文武賜位一等繫囚降宥諸逋負寛减各有差孤老六疾不能自存人賜穀五斛蠲建康秣陵二縣今年田租之半三月壬申䕶軍將軍趙伯符遷職夏四月甲戌青州刺史杜坦加冀州刺史六月京邑疫癘丙戌使郡縣及營署部司普加履行給以醫藥是月以貨貴制大錢一當兩秋七月乙卯以林邑所獲金銀寳物班賚各有差八月乙未征北大將軍徐州刺史衡陽王義季薨癸卯以南兖州刺史劉義賔為徐州刺史九月己未以中領軍沈演之為領軍將軍辛未以太子詹事徐湛之為南兖州刺史冬十月壬午豫章胡誕世反殺太守桓隆之前交州刺史檀和之南還至豫章因討平之壬辰以建平王宏為中䕶軍十一月甲寅立第十皇子渾為汝隂王二十五年春正月戊辰詔曰比者氷雪經旬薪粒貴踊貧弊之室多有窘罄可撿行京邑二縣及營署賜以柴米二月庚寅詔曰安不忘虞經世之所同治兵教戰有國之恒典故服訓眀恥然後少長知禁頃戎政雖脩而號令未審今宣武場始成便可剋日大習衆軍當因校獵隸武講事閏月己酉大蒐于宣武場三月庚辰車駕校獵夏四月乙巳新作閶闔廣莫二門改先廣莫門曰承眀開陽曰津陽乙卯以撫軍將軍雍州刺史武陵王諱為安北將軍徐州刺史癸亥以右衞將軍蕭思話為雍州刺史五月己卯罷大錢當兩六月庚戌零陵王司馬元瑜薨庚申安北將軍徐州刺史武陵王諱加兖州刺史丙寅車騎將軍荆州刺史南譙王義宣進位司空秋七月壬午左光祿大夫王敬𢎞薨八月己酉以撫軍參軍劉秀之為梁南秦二州刺史甲子立第十一皇子諱為淮南王九月辛未以尚書右僕射何尚之為尚書左僕射領軍將軍沈演之遷職吳興太守劉遵考為領軍將軍二十六年春正月辛巳車駕親祠南郊二月己亥車駕陸道幸丹徒謁京陵三月丁巳詔曰朕違北京二十餘載雖云密邇瞻塗莫從今因四表無塵時和嵗稔復獲拜奉舊塋展㒺極之思饗讌故老申追逺之懐固以義兼於桑梓情加於過沛永言慷慨感慰實深宜聿宣仁惠覃被率土其大赦天下復丹徒縣僑舊今嵗租布之半行所經縣蠲田租之半二千石官長竝勤勞王務宜有沾錫登城三戰及大將戰亡墜沒之家老病單弱者普加贍䘏遣使廵行百姓問所疾苦孤老鰥寡六疾不能自存者人賜穀五斛遣使祭晉故司空忠肅公何無忌之墓乙丑申南北沛下邳三郡復又詔曰京口肈祥自古著符近代衿帶江山表裏華甸經塗四達利盡淮海城邑髙眀土風淳壹苞總形勝實唯名都故能光宅靈心克昌帝業頃年岳牧遷回軍民徙散㕓里廬宇不逮往日皇基舊鄉地兼蕃重宜令殷阜式崇形望可募諸州樂移者數千家給以田宅并蠲復五月丙寅詔曰吾生於此城及盧循肆亂害流兹境先帝以桑梓根本實同休戚復以蒙稚猥同艱難情義繾綣夷險兼偹舊物遺蹤猶存心目嵗月不居逝踰三紀時人故老與運零落眷惟既往倍深感歎可搜訪于時士庶文武今尚存者具以名聞人身已亡而子孫見在優量賜賚之車駕水路發丹徒壬午至京師丙戌婆皇國壬辰婆達國竝遣使獻方物秋七月辛未以江州刺史廬陵王紹為南徐州刺史廣陵王誕為雍州刺史八月己酉以中䕶軍建平王宏為江州刺史癸丑以南豐王朗為湘州刺史冬十月廣陵王誕改封隨郡王甲辰以中軍將軍揚州刺史始興王濬為征北將軍開府儀同三司南徐兖二州刺史南徐州刺史廬陵王紹為揚州刺史二十七年春正月辛未制交寧二州假板郡縣俸祿聽依臺除辛卯百濟國遣使獻方物二月辛丑右將軍豫州刺史南平王鑠進號平西將軍辛巳索虜宼汝南諸郡陳頓二郡太守鄭琨汝陽潁川二郡太守郭道隠委守走索虜攻懸瓠城行汝南郡事陳憲拒之以軍興減百官俸三分之一三月乙丑淮南太守諸葛闡求減俸祿同内百官於是州及郡縣丞尉竝悉同減戊寅罷國子學乙酉以新除吏部尚書蕭思話為䕶軍將軍夏四月壬子安北將軍徐兖二州刺史武陵王諱降號鎮軍將軍六月丁酉侍中蕭斌為青冀二州刺史秋七月庚午遣寧朔將軍王𤣥謨北伐太尉江夏王義恭出次彭城總統諸軍乙亥索虜碻磝戍委城走冬閏月癸亥𤣥謨攻滑臺不克為虜所敗退還碻磝辛未雍州刺史隨王誕遣軍攻𢎞農城克之丙戌又克關城十一月戊子索虜䧟鄒山魯陽平二郡太守崔邪利沒甲午隨王誕所遣軍又攻陜城克之癸卯左軍將軍劉康祖於夀陽尉武戍與虜戰敗見殺丁未大赦天下十二月戊午内外戒嚴乙丑冗從僕射胡崇之太子積弩將軍臧澄之建威將軍毛熙祚於盱眙與虜戰敗竝見殺庚午虜偽主率大衆至瓜歩壬午内外戒嚴二十八年春正月丙戌朔以宼逼不朝㑹丁亥索虜自瓜歩退走丁酉攻圍盱眙城是月寧朔將軍王𤣥謨自碻磝退還歴下二月丙辰索虜自盱眙奔走癸酉詔曰玁狁孔熾難及數州睠言念之寤寐興悼㓙羯痍挫迸跡逺奔彫傷之民宜時振理凡遭宼賊郡縣令還復居業封屍掩骼賑贍饑流東作方始務盡勸課貸給之宜事從優厚其流寓江淮者竝聴即屬并蠲復稅調甲戌太尉領司徒江夏王義恭降為驃騎將軍開府儀同三司辛巳鎮軍將軍徐兖二州刺史武陵王諱降號北中郎將壬午車駕幸瓜歩是日觧嚴三月乙酉車駕還宫壬辰征北將軍始興王濬觧南兖州庚子以輔國將軍臧質為雍州刺史戊申徐州刺史武陵王諱為南兖州刺史甲寅䕶軍將軍蕭思話為撫軍將軍徐兖二州刺史夏四月癸酉婆達國遣使獻方物索虜偽寧南將軍魯爽中書郎魯秀歸順戊寅以爽為司州刺史五月乙酉亡命司馬順則自號齊王據梁鄒城丁巳婆皇國戊戌河南王竝遣使獻方物己巳驃騎將軍江夏王義恭領南兖州刺史戊申以尚書左僕射何尚之為尚書令太子詹事徐湛之為尚書僕射䕶軍將軍壬子以後將軍隨王誕為安南將軍廣州刺史六月壬戌以北中郎將武陵王諱為江州刺史以振武將軍秦郡太守劉興祖為青冀二州刺史秋七月甲辰安東將軍倭王倭濟進號安東大將軍八月癸亥梁鄒平斬司馬順則冬十月癸亥高麗國遣使獻方物十一月壬寅曲赦二兖徐豫青冀六州是冬徙彭城流民於瓜歩淮西流民於姑孰合萬許家二十九年春正月甲午詔曰經宼六州居業未能仍値災澇饑困荐臻可速符諸鎮優量救䘏今農事行興務盡地利若湏田種隨宜給之二月庚申虜帥拓跋燾死庚午立第十二皇子休仁為建安王夏四月戊午訶羅單國遣使獻方物以驃騎參軍張永為冀州刺史五月甲午罷湘州并荆州以始興臨賀始安三郡屬廣州丙申詔曰惡稔身滅戎醜常數虐虜窮凶著於自昔未勞資斧已伏天誅子孫相殘親黨離貳闗洛偽帥竝懐内款河朔遺民注誠請効拯溺蕩穢今其㑹也可符驃騎司空二府各部分所統東西應接歸義建績者隨勞酬奬是月京邑雨水六月己酉遣部司廵行賜樵米給船撫軍將軍蕭思話率衆北伐以征北從事中郎劉瑀為益州刺史秋七月壬辰汝隂王渾改封武昌王淮陽王諱改封湘東王丁酉省大司農太子僕廷尉監官八月丁卯蕭思話攻碻磝不㧞退還九月丁亥以平西將軍吐谷渾拾寅為安西將軍秦河二州刺史己丑撫軍將軍徐兖二州刺史蕭思話加冀州刺史兖州如故冬十月癸亥司州刺史魯爽攻虎牢不㧞退還十一月壬寅揚州刺史廬陵王紹薨十二月辛未以驃騎將軍南兖州刺史江夏王義恭為大將軍南徐州刺史錄尚書事如故三十年春正月戊寅以司空荆州刺史南譙王義宣為司徒中軍將軍揚州刺史以南兖州并南徐州庚辰以領軍將軍劉遵考為平西將軍豫州刺史壬午以征北將軍南徐州刺史始興王濬為衛將軍荆州刺史戊子江州刺史武陵王諱統衆軍伐西陽蠻癸巳以豫州刺史南平王鑠為撫軍將軍領軍將軍青徐州饑二月壬子遣運部賑䘏甲子上崩于含章殿時年四十七諡曰景皇帝廟曰中宗三月癸巳葬長寧陵世祖踐祚追改諡及廟號史臣曰太祖幼年特秀顧無保傅之嚴而天授和敏之姿自禀君人之徳及正位南面歴年長久綱維備舉條禁眀密罰有恒科爵無濫品故能内清外晏四海謐如也昔漢氏東京常稱建武永平故事自兹厥後亦毎以元嘉為言斯固盛矣授將遣帥乖分閫之命才謝光武而遥制兵略至于攻日戰時莫不仰聴成㫖雖覆師喪旅將非韓白而延宼蹙境抑此之由及至言漏衾衽難結商豎雖禍生非慮蓋亦有以而然也嗚呼哀哉宋書卷五宋書卷五考證文帝紀以吐谷渾慕容延為平東將軍平東各本皆訛東平今據下文十五年作平東將軍及鮮卑傳改正慕容延鮮卑傳作慕延以大沮渠茂䖍為征西大將軍凉州刺史茂䖍魏書作牧犍婆皇國遣使獻方物婆夷蠻傳作媻皇監本誤黃許慎說文有媻字徐鉉云媻俗作婆若婆皇國屢獻方物自文帝十七年以後其字皆作皇不應此年獨用黃字今改正豫章胡誕世反誕諸本皆訛延今據彭城王義康傳及胡藩傳改正安不忘虞經世之所同虞一本作危當因挍獵隸武講事隸當作肄史臣論難結商竪商一本作凶宋書卷五考證
