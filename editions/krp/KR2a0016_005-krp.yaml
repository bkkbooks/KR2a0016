body:
  text: 宋書卷五梁沈約撰本紀第五文帝太祖文皇帝諱義隆小字車兒武帝第三子也晉安帝義熙三年生於京口盧循之難上年四嵗髙祖使諮議參軍劉粹輔上鎭京城十一年封彭城縣公髙祖伐𦍑至彭城將進路板上行冠軍將軍留守晉朝加授使持節監徐兖青冀四州諸軍事徐州刺史將軍如故闗中平定髙祖還彭城又授監司州豫州之淮西兖州之陳留諸軍事前將軍司州刺史持節如故將鎮洛陽仍改授都督荆益寧雍梁秦六州豫州之河南廣平揚州之義成松滋四郡諸軍事西中郎將荆州刺史持節如故永初元年封宜都王食邑三千戸進督北秦并前七州進號鎮西將軍給鼔吹一部又進督湘州是嵗入朝時年十四長七尺五寸博渉經史善隸書景平二年七月中少帝廢百官備法駕奉迎入奉皇統行臺至江陵進璽紱侍中臣琇散騎常侍臣嶷之中書監尚書令䕶軍將軍建成縣公臣亮左衞將軍臣景仁給事中游擊將軍龍鄉縣侯臣隆越騎校尉都亭侯臣綱給事黄門侍郎臣孔璩之散騎侍郎臣劉思考員外散騎侍郎臣潘盛中書侍郎臣何尚之羽林監封陽縣開國侯臣蕭思話長兼尚書左丞徳陽縣侯臣孫康吏部郎中騎都尉臣張茂度儀曹郎中臣徐長琳倉部郎中臣庾俊之都官郎中臣袁洵等上表曰臣聞否泰相革數窮則變天道所以不謟卜世所以靈長乃者運距陵夷王室艱晦九服之命靡所適歸髙祖之業將墜于地賴基厚徳深人神同奬社稷以寧有生獲乂伏惟陛下君徳自然聖明在御孝悌著於家邦風猷宣於蕃牧是以徴祥雜沓符瑞㸌煇宗廟神靈乃睠西顧萬邦黎獻望景託生臣等沗荷朝列豫充將命復集休眀之運再覩太平之業行臺至止瞻望城闕不勝喜說鳧藻之情謹詣門拜表以聞上答曰皇運艱弊數鍾屯夷仰惟崇基感尋國故永慕厥躬悲慨交集賴七百祚永股肱忠賢故能休否以泰天人式序猥以不徳謬降大命顧已兢悸何以克堪輒當暫歸朝廷展哀陵寢并與賢彦申寫所懐望體其心勿為辭費府州佐史竝稱臣請題牓諸門一依宫省上不許甲戌發江陵八月丙申車駕至京城丁酉謁初寧陵還於中堂即皇帝位元嘉元年秋八月丁酉大赦天下改景平二年為元嘉元年文武賜位二等逋租宿債勿復收庚子以行撫軍將軍荆州刺史謝晦為撫軍將軍荆州刺史癸卯司空錄尚書事揚州刺史徐羡之進位司徒衞將軍江州刺史王𢎞進位司空中書監䕶軍將軍傅亮加左光祿大夫開府儀同三司撫軍將軍荆州刺史謝晦進號衞將軍鎭北將軍南兖州刺史檀道濟進號征北將軍甲辰追尊所生胡媫妤為皇太后諡曰章后衞將軍南徐州刺史彭城王義康進號驃騎將軍冠軍將軍南豫州刺史義恭進號撫軍將軍封江夏王立第六皇弟義宣為竟陵王第七皇弟義季為衡陽王戊申以豫州刺史劉粹為雍州刺史驍騎將軍管義之為豫州刺史南蠻校尉到彦之為中領軍己酉減荆湘二州今年稅布之半九月丙子立妃袁氏為皇后二年春正月丙寅司徒徐羡之尚書令傅亮奉表歸政上始親覽車駕祠南郊大赦天下三月乙丑左將軍徐州刺史王仲徳進號安北將軍夏五月戊寅特進謝澹卒秋八月甲申以關中流民出漢川置京兆扶風馮翊等郡乙酉驃騎將軍南徐州刺史彭城王義康為開府儀同三司新除司空王𢎞為車騎大將軍開府儀同三司以右軍長史江恒為廣州刺史冬十一月癸酉以前將軍楊𤣥為征西將軍北秦州刺史三年春正月丙寅司徒錄尚書事揚州刺史徐羡之尚書令䕶軍將軍左光祿大夫傅亮有罪伏誅遣中領軍到彦之征北將軍檀道濟討荆州刺史謝晦上親率六師西征大赦天下丁卯以車騎大將軍江州刺史王𢎞為司徒錄尚書事揚州刺史驃騎將軍南徐州刺史彭城王義康改為荆州刺史撫軍將軍南豫州刺史江夏王義恭改為南徐州刺史己巳以前䕶軍將軍趙倫之為鎭軍將軍閏月丙戌皇子劭生二月乙卯繫囚見徒一皆原赦戊午以金紫光祿大夫王敬𢎞為尚書左僕射豫章太守鄭鮮之為尚書右僕射建安太守潘城有罪伏誅庚申特進范泰加光祿大夫是日車駕發京師戊辰到彦之檀道濟大破謝晦於隐磯丙子車駕自蕪湖反斾己卯擒晦於延頭送京師伏誅三月辛巳車駕還宫夏五月乙未以征北將軍南兖州刺史檀道濟為征南大將軍江州刺史中領軍到彦之為南豫州刺史戊戌以後將軍長沙王義欣為南兖州刺史乙巳驃騎大將軍涼州牧大沮渠蒙遜改為車騎大將軍詔曰夫哲王宰世廣達四聰猶廵嶽省方採風觀政所以情偽必審幽遐㒺滯王澤無擁九皋有聞者也朕以寡薄猥纂洪緒雖永念治道志存昧旦願言傅巖發想宵寐而邱園之秀藏器未臻物情民隠尚隔視聴乃眷區域輟寢忘飡今氛祲袪蕩宇内寧晏旌賢𢎞化於是乎始可遣大使廵行四方其宰守稱職之良閨蓽一介之善詳悉列奏勿或有遺若刑獄不䘏政治乖謬傷民害教者具以事聞其髙年鰥寡㓜孤六疾不能自存者可與郡縣優量賑給博採輿誦廣納嘉謀務盡銜命之㫖俾若朕親覽焉丙午車駕臨延賢堂聴訟六月己未以鎮軍將軍趙倫之為左光祿大夫領軍將軍丙寅車駕又於延賢堂聴訟丙子又聴訟以右衞王華為中䕶軍冬十一月戊寅以梁南秦二州刺史吉翰為益州刺史驃騎參軍劉道産為梁南秦二州刺史己亥以南蠻校尉劉遵考為雍州刺史十二月癸丑以中書侍郎蕭思話為青州刺史壬戌前吳郡太守徐佩之謀反及黨與皆伏誅四年春正月乙亥朔曲赦都邑百里内辛巳車駕親祠南郊二月乙卯行幸丹徒謁京陵三月丙子詔曰丹徒桑梓綢繆大業攸始踐境永懐觸感㒺極昔漢章南廵加恩元氏况情義二三有兼曩日思播遺澤酬慰士民其蠲此縣今年租布五嵗刑以下皆悉原遣登城三戰及大將家隨宜隠䘏丁亥車駕還宫戊子尚書右僕射鄭鮮之卒壬寅禁斷夏至日五絲命縷之屬富陽令諸葛闡之之議也夏四月庚戌以廷尉王徽之為交州刺史五月壬午中䕶軍王華卒京師疾疫甲午遣使存問給醫藥死者若無家屬賜以棺器六月癸卯朔日有蝕之庚申以金紫光祿大夫殷穆為䕶軍將軍五年春正月乙亥詔曰朕恭承洪業臨饗四海風化未𢎞治道多昧求之人事鑒寐惟憂加頃隂陽違序旱疫成患仰惟災戒責深在予思所以側身剋念議獄詳刑上答天譴下恤民瘼羣后百司其各獻讜言指陳得失勿有所諱甲申車駕臨𤣥武館閱武戊子京邑大火遣使廵慰賑賜夏四月己亥以南蠻校尉蕭摹之為湘州刺史戊午以始興太守徐豁為廣州刺史五月己卯以湘州刺史張邵為雍州刺史六月庚戌司徒王𢎞降為衞將軍開府儀同三司京邑大水己卯遣使檢行賑贍以江夏内史程道恵為廣州刺史秋八月壬戌特進左光祿大夫范泰卒冬十月甲辰車駕於延賢堂聴訟閏月癸未以右軍司馬劉徳武為豫州刺史辛卯安陸公相周籍之為寧州刺史十二月庚寅左光祿大夫領軍將軍趙倫之卒是嵗天竺國遣使獻方物六年春正月辛丑車駕親祠南郊癸丑以驃騎將軍荆州刺史彭城王義康為司徒錄尚書事領平北將軍徐州刺史三月丁巳立皇子劭為皇太子戊午大赦天下賜文武位一等辛酉以左衞將軍殷景仁為中領軍夏四月癸亥以尚書左僕射王敬𢎞為尚書令丹陽尹臨川王義慶為尚書左僕射吏部尚書江夷為尚書右僕射五月壬辰朔日有蝕之癸巳以新除尚書令王敬𢎞為特進左光祿大夫甲午以撫軍司馬劉道濟為益州刺史乙卯於雍州置馮翊郡七月己酉以尚書左丞孔黙之為廣州刺史是月百濟王遣使獻方物九月戊午於秦州置隴西宋康二郡冬十月壬申中領軍殷景仁丁艱去職十一月己丑朔日有蝕之十二月丁亥河南國西河王遣使獻方物七年春正月癸巳以吐谷渾慕容璝為征西將軍沙州刺史是月倭國王遣使獻方物三月戊子遣右將軍到彦之北伐水軍入河甲午以前征虜司馬沖為司州刺史甲寅以前中領軍殷景仁為領軍將軍夏四月癸未訶羅單國遣使獻方物六月己卯以冠軍將軍氐楊難當為秦州刺史秋七月戊子索虜碻磝戍棄城走丙申以平北諮議參軍甄法䕶為梁南秦二州刺史戊戌索虜滑臺戍棄城走甲寅林邑國訶羅佗國師子國遣使獻方物冬十月甲寅罷南豫州并豫州以左將軍竟陵王義宣為徐州刺史戊午立錢署鑄四銖錢戊寅金墉城為索虜所陷十一月癸未虎牢城復為索虜所陷壬辰遣征南大將軍檀道濟北討右將軍到彦之自滑臺奔退十二月辛酉以南兖州刺史長沙王義欣為豫州刺史司徒司馬吉翰為司州刺史乙亥京邑火延燒太社北墻兖州刺史竺靈秀有罪伏誅八年春正月庚寅於交州復立珠崖郡癸巳以左軍將軍申宣為兖州刺史丁酉征南大將軍檀道濟破索虜於東夀張二月乙卯以平北司馬韋朗為青州刺史戊午以尚書右僕射江夷為湘州刺史辛酉滑臺為索虜所陷癸酉征南大將軍檀道濟引軍還丁丑青州刺史蕭思話棄城走以太子右衞率劉遵考為南兖州刺史三月甲申車駕於延賢堂聴訟戊申詔曰自頃軍役殷興國用増廣資儲不給百度尚繁宜存簡約以應事實内外可通共詳思務令節儉夏四月甲寅以衡陽王師阮萬齡為湘州刺史乙卯以後軍參軍徐遵之為兖州刺史六月乙丑大赦天下己卯割江南及揚州晉陵郡屬南徐州江北屬兖州以徐州刺史竟陵王義宣為南兖州刺史司徒司馬吉翰為徐州刺史閏月庚子詔曰自頃農桑惰業遊食者衆荒萊不闢督課無聞一時水旱便有罄匱不深存務本豐給靡因郡守賦政方畿縣宰親民之主宜思奬訓導以良規咸使肆力地無遺利耕蠶樹藝各盡其力若有力田殊衆嵗竟條名列上揚州旱乙巳遣侍御史省獄訟申調役丙午以左軍諮議參軍劉道産為雍州刺史秋八月甲辰臨川王義慶解尚書僕射丁未割豫州秦郡屬南兖州冬十二月罷湘州還并荆州九年春三月庚戌衞將軍王𢎞進位太保加中書監丁巳征南大將軍江州刺史檀道濟進位司空夏四月乙亥以䕶軍將軍殷穆為特進右光祿大夫建昌縣公到彦之為䕶軍將軍五月壬申中書監錄尚書事衞將軍揚州刺史王𢎞薨六月甲戌以左軍諮議參軍申宣為青州刺史分青州置冀州戊寅司徒南徐州刺史彭城王義康改領揚州刺史己卯以司徒參軍崔諲為冀州刺史壬午以吐谷渾慕容延為平東將軍吐谷渾拾䖍為平北將軍吐谷渾輝伐為鎮軍將軍癸未詔曰益梁交廣境域幽遐治宜物情或多偏􅗙可更遣大使廵求民瘼置積射彊弩將軍官乙未以征西將軍沙州刺史吐谷渾慕容璝為征西大將軍西秦河二州刺史隴西王北秦州刺史氐楊難當加號征西將軍壬寅以撫軍將軍荆州刺史江夏王義恭為征北將軍開府儀同三司南兖州刺史前將軍臨川王義慶為平西將軍荆州刺史南兖州刺史竟陵王義宣為中書監中軍將軍征虜將軍衡陽王義季為南徐州刺史秋七月戊辰以尚書王仲徳為鎭北將軍徐州刺史庚午以領軍將軍殷景仁為尚書僕射太子詹事劉湛為領軍將軍壬申河南國西河王遣使獻方物九月妖賊趙廣宼益州陷沒郡縣州府討平之冬十一月壬子以少府甄法崇為益州刺史癸丑於廣州立宋康郡十二月甲戌以右軍參軍李秀之為交州刺史庚寅立第五皇子紹為廬陵王江夏王義恭子朗為南豐縣王十年春正月甲寅竟陵王義宣改封南譙王鎮北將軍徐州刺史王仲徳加領兖州刺史淮南太守叚宏為青州刺史己未大赦天下孤老六疾不能自存者人賜穀五斛後將軍豫州刺史長沙王義欣進號鎮軍將軍夏四月戊戌青州刺史叚宏加冀州刺史封陽縣侯蕭思話為梁南