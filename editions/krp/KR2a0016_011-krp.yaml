body:
  text: 宋書卷十一梁沈約撰志第一律志序左史記言右史記事事則春秋是也言則尚書是也至於楚書鄭志晉乗楚杌之篇皆所以昭述前史俾不冺於後司馬遷制一家之言始區别名題至乎禮儀刑政有所不盡乃於紀傳之外剏立八書片文隻事鴻纖備舉班氏因之靡違前式網羅一代條流遂廣律歴禮樂其名不變以天官為天文改封禪為郊祀易貨殖平凖之稱革河渠溝洫之名綴孫卿之辭以述刑法采孟軻之書用序食貨劉向洪範始自春秋劉歆七略儒墨異部朱贛博采風謠尤為詳洽固並因仍以為三志而禮樂疏簡所漏者多典章事數百不記一天文雖為該舉而不言天形致使三天之説紛然莫辨是故蔡邕於朔方上書謂宜載述者也漢興接秦坑儒之後典墳殘缺耆生碩老常以亡逸為慮劉歆七略固之藝文蓋為此也河自龍門東注横被中國毎漂決所漸寄重災深堤築之功勞役天下且闗洛髙塏地少川源是故鎬酆潦潏咸入禮典漳滏鄭白之饒溝渠沾溉之利皆民命所祖國以為天溝洫立志亦其宜也世殊事改於今可得而略竊以班氏律歴前事已詳自楊偉改創景初而魏書闕志及元嘉重造新法大明博議回改自魏至宋宜入今書班固禮樂郊祀馬彪癸祀禮儀蔡邕朝㑹董巴輿服並各立志夫禮之所苞其用非一郊祭朝饗匪云别事旗章服物非禮而何今總而裁之同謂禮志刑法食貨前説已該隨流𣲖别附之紀傳樂經殘缺其來已逺班氏所述止抄舉樂記馬彪後書又不備續至於八音衆噐並不見書雖略見世本所闕猶衆爰及雅鄭謳謡之節一皆屏落曽無概見郊廟樂章毎隨世改雅聲舊典咸有遺文又案今鼓吹鐃歌雖有章曲樂人傳習口相師祖所務者聲不先訓以義今樂府鐃歌校漢魏舊曲曲名時同文字永異尋文求義無一可了不知今之鐃章何代曲也今志自郊廟以下凡諸樂章非淫哇之辭並皆詳載天文五行自馬彪以後無復記錄何書自黄初之始徐志肇義熙之元今以魏接漢式遵何氏然則自漢髙帝五年之首冬暨宋順帝昇明二年之孟夏二辰六沴甲子無差聖帝哲王咸有瑞命之紀盖所以神明寶位幽贊禎符欲使逐鹿弭謀窺覬不作握河括地緑文赤字之書言之詳矣爰逮道至天而甘露下徳洞地而醴泉出金芝𤣥秬之祥朱草白烏之瑞斯固不可誣也若夫衰世徳爽而嘉應不息斯固天道茫昧難以數推亦由明主居上而震蝕之災不弭百靈咸順而懸象之應獨違今立符瑞志以補前史之闕地理參差事難􅔜辨魏晉以來遷徙百計一郡分為四五一縣割成兩三或昨屬荆豫今隸司兖朝為零桂之士夕為廬九之民去來紛擾無暫止息版籍為之渾淆職方所以不能記自戎狄内侮有晉東遷中土遺氓播徙江外幽并冀雝兖豫青徐之境幽淪宼逆自扶莫而裹足奉首免身於荆越者百郡千城流寓比室人佇鴻鴈之歌士蓄懐本之念莫不各樹邦邑思復舊井既而民單户約不可獨建故魏邦而有韓邑齊縣而有趙民且省置交加日回月徙寄寓遷流迄無定託邦名邑號難或詳書大宋受命重啓邉隙淮北五州翦為宼境其或奔亡播遷復立郡縣斯則元嘉泰始同名異實今以班固馬彪二志晉宋起居凡諸記註悉加推討隨條辨析使悉該詳百官置省備有前説尋源討流於事為易元嘉中東海何承天受詔纂宋書其志十五篇以續馬彪漢志其證引該博者即而因之亦由班固馬遷共為一家者也其有漏闕及何氏後事備加搜采隨就補綴焉淵流浩漫非孤學所盡足蹇途遥豈短策能運雖斟酌前史備覩妍媸而愛嗜異情取捨殊意毎含毫握簡杼軸忘飡終亦不足與班左並馳董南齊轡庻為後之君子削藁而已焉黄帝使伶倫自大夏之西阮隃之陰取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黄鍾之宫制十二管以聼鳳鳴以定律呂夫聲有清濁故協以宫商形有長短故檢以丈尺器有大小故定以斛斗質有輕重故平以鈞石故虞書曰乃同律度量衡然則律呂宮商之所由生也夫樂有器有文有情有官鐘鼓干戚樂之器也屈伸舒疾樂之文也論倫無患樂之情也欣喜歡愛樂之官也是以君子反情以和志廣樂以成教故能情深而文明氣盛而化神和順積中而英華發外故曰樂者心之動也聲者樂之象也周禮曰乃奏黄鐘歌大呂舞雲門以祀天神乃奏太蔟歌應鐘舞咸池以祭地祇四望闕山川先祖各有其樂又曰圜鐘為宫黄鐘為徵姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣地祇人鬼禮亦如之其可以感物興化若此之深也道始於一一生二二生三三而九故黄鐘之數六分而為雌雄十二鍾鐘以三成故置一而三之凡積分十七萬七千一百四十七為黄鐘之實故黄鐘位子主十一月下生林鐘林鐘之數五十四主六月上生太蔟太蔟之數七十二主正月下生南呂南呂之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鐘應鐘之數四十三主十月上生蕤賔蕤賔之數五十七主五月上生大呂大呂之數七十六主十二月下生夷則夷則之數五十主七月上生夾鐘夾鐘之數六十七主二月下生無射無射之數四十五主九月上生中呂中呂之數六十主四月極不生極不生鐘律不能復相生宮生徵徵生商商生羽羽生角角生姑洗姑洗生應鐘不比於正音故為和姑洗三月應鐘十月不與正音比效為和和徙聲也應鐘生蕤賔蕤賔不比於正音故為繆繆音相干也周律故有繆和為武王伐紂七音日冬至音比林鐘􅒓以濁日夏至音比黄鐘􅒓以清以十二月律應二十四時甲子中呂之徵也丙子夾鐘之羽也戊子黄鐘之宮也庚子無射之商也壬子夷則之角也古人為度量輕重皆生乎天道黄鐘之律長九寸物以三生三三九三九二十七故幅廣二尺七寸古之制也音以八相生故人長八尺尋自倍故八尺而為尋有形即有聲音之數五以五乗八五八四十尺為匹匹者中人之度也一匹為制秋分而禾䅺定䅺禾穗芒也䅺定而禾孰律之數十二故十二䅺而當一粟十粟而當一寸律以當辰音以當日日之數十故十寸而為尺十尺為丈其以為重十二粟而當一分十二分而當一銖十二銖而當半兩衡有左右因而倍之故二十四銖而當一兩天有四時以成一嵗因而四之四四十六故十六兩而一斤三月而一時三十日一月故三十斤而為一鈞四時而一嵗故四鈞而一石其為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一嵗之日故律歴之數天地之道也下生者倍以三除之上生者四以三除之揚子雲曰聲生於日謂甲巳為角乙庚為商丙辛為徴丁壬為羽戊癸為宮律生於辰謂子為黄鐘丑為大呂之屬聲以情質質正也各以其行本情為正也律以和聲當以律管鐘均和其清濁之聲聲律相協而八音生協和宮商角徵羽謂之五聲金石匏革絲竹土木謂之八音聲和音諧是謂五樂夫陰陽和則景至律氣應則灰除是故天子常以冬夏至御前殿合八能之士陳八音聼樂均度晷景候鐘律權土炭效陰陽冬至陽氣應則樂均清景長極黄鐘通土炭輕而衡卭夏至陰氣應則樂均濁景短極蕤賔通土炭重而衡低進退於先後五日之中八能各以候状聞太史令封上効則和否則占候氣之法為室三重户閉塗釁周宻布緹幔室中以木為案毎律各一内庫外髙從其方位加律其上以葭莩灰布其内端案歴而候之氣至者吹去散人及風所動者其灰聚殿中候用玉律十二唯二至乃候取𢎞農宜陽縣金門山竹為灰三代陵遲音律失度漢興北平侯張蒼始定律歴孝武之世置協律之官元帝時郎中京房知五音六十律之數受學於小黄令焦延夀其下生上生終於中呂而十二律畢矣中呂上生執始執始下生去滅終於南事而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓羲作易紀陽氣之初以為律法建日冬至之聲以黄鐘為宮太蔟為商姑洗為角林鐘為徵南呂為羽應鐘為變宮蕤賔為變徵此聲氣之元五音之正也故各統一日其餘以次運行當日者各自為宮而商角徵羽以類從焉禮運篇曰五聲六律十二管還相為宮此之謂也以六十律分一朞之日黄鐘自冬至始及冬至而復陰陽寒煖風雨之占於是生焉房又曰竹聲不可以度調故作凖以定數凖之状如瑟長丈而十三弦隐間九尺以應黄鐘之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳其術施行於史官候部用之續漢志具載其律凖度數漢章帝元和元年待詔候鐘律殷肜上言官無曉六十律以凖調音者故待詔嚴嵩具以凖法教子男宣願召宣補學官主調樂器詔曰嵩子學審曉律别其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一乃為能傳嵩學耳試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為凖靈帝熹平六年東觀召典律者太子舎人張光等問凖意光等不知歸閲舊藏乃得其器形制如房書猶不能定其絃緩急音不可以書曉人知之者欲教而無從心達者體知而無師故史官能辨清濁者遂絶其可以相傳者唯候氣而已舊律度新律度舊律分新律分新律小分十三十六黄鐘九寸九寸十七萬七千一十七萬七千一百四十七百四十七林鐘六寸六寸一氂十一萬八千十一萬八千二九十八百九十六二十五太蔟八寸八寸二氂十五萬七千十五萬七千八百四百六十四六十一十四南呂五寸二五寸三分六十萬四千九十萬五千五分三氂少彊氂少彊百七十六百七十二三姑洗七寸一分七寸一分五氂少彊十三萬九千十四萬七百六一氂彊九百六十八十二二十八應鐘四寸七四寸七分九九萬三千三九萬四千三分氂彊百一十二百五十七蕤賔六寸三六寸三分八十二萬四千十二萬五千六分二氂彊氂少彊四三十六八六太呂八寸四分八寸四分九十六萬五千十六萬七千二二氂大彊氂大彊八百八十八百七十八三十一夷則五寸六分五寸七分弱十一萬五百十一萬二千一一氂大彊九十二百八十一二十夾鐘七寸四七寸五分八氂十四萬七千四十四萬九千分九氂少彊百五十六二百四十四九無射四寸九五寸九氂半九萬八千三十萬二百九分九氂半彊百四十三十四中呂六寸六六寸七分七氂十三萬一千七十三萬三千二分六氂弱十二百五十七二十五黄鐘八寸八九寸十七萬四千十七萬七千分八氂弱七百六十二一百四十七三分之二分二千四百八十四三分之一論曰律呂相生皆三分而損益之先儒推十二律從子至亥每三之凡十七萬七千一百四十七而三約之是為上生故漢志云三分損一下生林鐘三分益一上生太蔟無射既上生中呂則中呂又當上生黄鐘然後五聲六律十二管還相為宮今上生不及黄鐘實二千三百八十四九約實一千九百六十八為一分此則不周九寸之律一分有奇豈得還為宮乎凡三分益一為上生三分損一為下生此其大略猶周天斗分四分之一耳京房不思此意比十二律微有所增方引而伸之中呂上生執始執始下生去滅至於南事為六十律竟復不合彌益其踈班氏所志未能通律呂本源徒訓角為觸徵為祉陽氣施種於黄鐘如斯之屬空煩其文而為辭費又推九六欲符劉歆三統之數假託非類以飾其説皆孟堅之妄矣蔡邕從朔方上書云前漢志但載十律不及六十六律尺寸相生司馬彪皆己志之漢末亡失雅樂黄初中鑄工柴玉巧有意思形噐之中多所造作協律都尉杜夔令玉鑄鐘其聲清濁多不如法數毁改作玉甚厭之謂夔清濁任意更相訴白於魏王魏王取玉所鑄鐘雜錯更試然後知夔為精於是罪玉及諸子皆為養馬主晉泰始十年中書監荀朂中書令張華出御府銅竹律二十五具部太樂郎劉秀等校試其三具與杜夔及左延年律法同其二十二具視其銘題尺寸是笛律也問協律中郎将列和辭昔魏明帝時令和承受笛聲以作此律欲使學者别居一坊歌詠講習依此律調至於都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也朂等奏昔先王之作樂也以振風蕩俗饗神佐賢必協律呂之和以節八音之用是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宮此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度考以正律皆不相應吹其聲均多不諧合又辭先師傳笛别其清濁直以長短工人裁制舊不依律是為作笛無法而和寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂憲於後者也謹條牒諸律問和意状如左及依典制用十二律造笛像十二枚聲均調和器用便利講肄彈擊必合律呂况乎宴饗萬國奏之廟堂者哉雖伶夔曠逺至音難精猶宜形古昔以求厥衷合於經禮於制為詳若可施用請更部笛工選竹造作太樂樂府施行平議諸杜夔左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毁奏可朂又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東廂長笛正聲已長四尺二寸令當復取其下徵之聲於法聲濁者笛當長計其尺寸乃五尺有餘和昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輙應一律也案太樂四尺二寸笛正聲均應蕤賔以十二律還相為宮推法下徵之孔當應律大呂大呂笛長二尺六寸有奇不得長五尺餘令太樂郎劉秀鄧昊等依律作大呂笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓筝宋同吹笛以為雜引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而令調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宮商角徵不孔調與不調以何檢知和辭先師相傳吹笛但以作曲相語為某曲當舉某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依案舊像訖但吹取鳴者初不復校其諸孔調與不調也案周禮調樂金石有一定之聲是故造鐘磬者先以律調之然後施於廂懸作樂之時諸音皆受鐘磬之均即為悉應律也至於饗宴殿堂之上無廂懸鐘磬以笛有一定調故諸絃歌皆從笛為正是為笛猶鐘磬宜必合於律呂如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正唯取竹之鳴者為無法制輙部郎劉秀鄧昊缺魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律呂之義作樂音均髙下清濁之調當以何名之和辭毎合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然案周禮奏六樂乃奏黄鐘歌大呂乃奏太蔟歌應鐘皆以律呂之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺一寸者應無射之律若宜用長笛執樂者曰請奏無射周語曰無射所以宣布哲人之令徳示民軌儀也二尺八寸四分四氂應黄鐘之律若宜用短笛執樂者曰請奏黄鐘周語曰黄鐘所以宣養六氣九徳也是則歌奏之義當合經禮考之古典於制為雅書曰予欲聞六律五聲八音在治忽始周禮載六律六同禮記又曰五聲十二律還相為宮劉歆班固篹律歴志亦紀十二律唯京房始創六十律至章帝時其法已亡蔡邕雖追古作其言亦曰今無能為者依案古典及今音家所用六十律者無施於樂謹依典記以五聲十二律還相為宮之法制十二笛象記注圗側如别省圗不如視笛之孔故復重作蕤賔伏孔笛其制云黄鐘之笛正聲應黄鐘下徵應林鐘長二尺八寸四分四氂有竒周語曰黄鐘所以宣養六氣九徳也正聲調法以黄鐘為宮則姑洗為角翕笛之聲應姑洗故以四角之長為黄鐘之笛也其宮聲正而不倍故曰正聲正聲調法黄鐘為宮第一孔應鐘為變宮第二孔南呂為羽第三孔林鐘為徵第四孔蕤賔為變徵第五附孔姑洗為角笛體中聲太蔟為商笛後出孔也商聲濁於角當在角下而角聲以在體中故上其商孔令在宮上清於宮也然則宮商正也餘聲皆倍也是故從宮以下孔轉下轉濁也此章説笛孔上下次第之名也下章説律呂相生笛之制也正聲調法黄鐘為宮作黄鐘之笛将求宮孔以姑洗及黄鐘律從笛首下度之盡二律之長而為孔則得宮聲也宮生徵黄鐘生林鐘也以林鐘之律從宮孔下度之盡律作孔則得徵聲也徵生商林鐘生太蔟也以太蔟律從徵孔上度之盡律以為孔則得商聲也商生羽太蔟生南呂也以南呂律度從角孔下度之盡律為孔則得羽聲也羽生角南呂生姑洗也以姑洗律從羽孔上行度之盡律而為孔則得角聲也然則出於商孔之上吹笛者左手所不及也從羽孔下行度之盡律而為孔亦得角聲出於附商孔之下則吹者右手所不逮也故不作角孔推而下之復倍其均是以角聲在笛體中古之制也音家舊法雖一倍再倍但令均同適足為唱和之聲無害於曲均故也周語曰匏竹利制議宜謂便於事用從宜者也角生變宮姑洗生應鐘也上句所謂當為角孔而出商下者墨㸃識之以應律也從此㸃下行度之為孔則得變宮之聲也變宮生變徵應鐘生蕤賔也以蕤賔律從變宮下度之盡律為孔則得變徵之聲十二笛之制各以其宮為主相生之法或倍或半其使事用例皆一者也下徵調法林鐘為宮第四孔也本正聲黄鐘之徵徵清當在宮上用笛之宜倍令濁下故曰下徴下徵更為宮者記所謂五聲十二律還相為宮者然則正聲調清下徵調濁也南呂為商第三孔本正聲黄鐘之羽今為下徴之商應鐘為角第二孔也本正聲黄鐘之變宮今為下徵之角也黄鐘為變徵下徵之調林鐘為宮大呂當變徵而黄鐘笛本無大呂之聲故假用黄鐘以為變徵也假用之法當變徵之聲則俱發黄鐘及太蔟應鐘三孔黄鐘應濁而太蔟清大呂律在二律之間俱發三孔而徵磑􅩯之則得大呂變徵之聲矣諸笛下徵調求變徵之法皆如此太蔟為徵笛後出孔本正聲之商今為下徵之徵姑洗為羽笛體中翕聲也本正聲之角今為下徵之羽也蕤賔為變宮附孔是也本正聲之變徵也今為下徵之變宮也然則正聲之調孔轉下轉濁下徵之調孔轉上轉清也清角之調以姑洗為宮即是笛體中翕聲也於正聲為角於下徴為羽清角之調乃以為宮而哨吹令清故曰清角唯得為宛詩謡俗之曲不合雅樂也蕤賔為商正也林鐘為角非正也南呂為變徵非正也應鐘為徵正也黄鐘為羽非正也太蔟為變宮非正也清角之調唯宮商及徵與律相應餘四聲非正者皆濁一律哨吹令清假而用之其例一也凡笛體用角律其長者八之蕤賔林鐘也短者四之其餘十笛皆四角也空中實容長者十六短笛竹宜受八律之黍也若長短大小不合於此或器用不便聲均法度之齊等也然笛竹率上大下小不能均齊必不得已取其聲均合三宮一曰正聲二曰下徵三曰清角二十一變也宮有七聲錯綜用之故二十一變也諸笛例皆一也伏孔四所以便事用也一曰正角出於商上者也二曰倍角近笛下者也三曰變宮近於宮孔倍令下者也四曰變徴逺於徴孔倍令髙者也或倍或半或四分一取則於琴徵也四者皆不作其孔而取其度以應進退上下之法所以協聲均便事用也其本孔隐而不見故曰伏孔大呂之笛正聲應大呂下徴應夷則長二尺六寸六分三氂有奇周語曰元問大呂助宣物也太蔟之笛正聲應太蔟下徵應南呂長二尺五寸三分一氂有奇周語曰太蔟所以金奏贊陽出滯也夾鐘之笛正聲應夾鐘下徵應無射長二尺四寸周語曰二間夾鐘出四隙之細也姑洗之笛正聲應姑洗下徴應應鐘長二尺二寸三分三氂有奇周語曰三間中呂宣中氣也蕤賔之笛正聲應蕤賔下徵應大呂長三尺九寸九分五氂有奇周語曰蕤賔所以安静神人獻酬交酢變宮近孔故陪半令下便於用也林鐘亦如之林鐘之笛正聲應林鐘下徵應太蔟長三尺七寸九分七氂有奇周語曰四間林鐘和展百事俾莫不任肅純恪夷則之笛正聲應夷則下徵應夾鐘長三尺六寸周語曰夷則所以詠歌九州平民無貳也變宮之法亦如蕤賔體用四角故四分益一也南呂之笛正聲應南呂下徵應姑洗長三尺三寸七分周語曰五間南呂贊陽秀也無射之笛正聲應無射下徴應中呂長三尺二寸周語曰無射所以宣布哲人之令徳示民軌儀也應鐘之笛正聲應應鐘下徴應蕤賔長五尺九寸九分六氂有奇周語曰六間應鐘均利器用俾應復也朂又以魏杜夔所制律呂檢校太樂總章鼓吹八音與律乖錯始知後漢至魏尺度漸長於古四分有餘夔依為律呂故致失韻及部佐著作郎劉㳟依周禮更積黍起度以鑄新律既成慕求古器得周時玉律比之不差毫氂又漢世故鐘以律命之不叩而自應初朂行道逢趙郡商人縣鐸於牛其聲甚韻至是搜得此鐸以調律呂焉晉武帝以朂律與周漢器合乃施用之散騎侍郎阮咸譏其聲髙非興國之音咸亡後掘地得古銅尺果長朂尺四分時人咸服其妙元康中裴頠以為醫方民命之急而稱兩不與古同為害特重宜因此改治權衡不見省黄鐘箱笛晉時三尺八寸元嘉九年太樂令鐘宗之減為三尺七寸十四年治書令史奚縱又減五分為三尺六寸五分列和云東箱長笛四尺二寸也太蔟箱笛晉時三尺七寸宗之減為三尺三寸七分縱又減一寸一分為三尺二寸六分姑洗箱笛晉時三尺五寸宗之減為二尺九寸七分縱又減五分為二尺九寸二分蕤賔箱笛晉時二尺九寸宗之減為二尺六寸縱又減二分為二尺五寸八分宋書卷十一宋書卷十一考證律志序版籍為之渾淆職方所以不能記以字疑衍黄帝使伶倫自大夏之西阮隃之隂漢書作昆侖之隂猶宜形古昔以求厥衷形當作型宋書卷十一考證
