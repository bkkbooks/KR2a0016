body:
  text: 宋書卷十二梁沈約撰志第二歴上夫天地之所貴者生也萬物之所尊者人也役智窮神無幽不察是以動作云為皆應天地之象古先聖哲擬辰極制渾儀夫陰陽二氣陶育羣品精象所寄是為日月羣生之性章為五才五才之靈五星是也歴所以擬天行而序七耀紀萬國而授人時黄帝使大撓造六甲容成制歴象羲和占日常儀占月少昊氏有鳳鳥之瑞以鳥名官而鳳鳥氏司歴顓頊之代南正重司天北正黎司地堯復育重黎之後使治舊職分命羲和欽若昊天故虞書曰朞三百有六旬六日以閏月定四時成嵗其後授舜曰天之歴數在爾躬舜亦以命禹爰及殷周二代皆剏業革制而服色從之順其時氣以應天道萬物羣生䝉其利澤三王既謝史職廢官故孔子正春秋以明司歴之過秦兼天下自以為水德以十月為正服色上黒漢興襲秦正朔北平侯張蒼首言律歴之事以顓頊歴比於六歴所失差近施用至武帝元封七年太中大夫公孫卿壼遂太史令司馬遷等言歴紀廢壊宜改正朔易服色所以明受之於天也乃詔遂等造漢歴選鄧平長樂司馬可及人間治歴者二十餘人方士唐都分天部洛下閎運算轉歴其法積八十一寸則一日之分也閎與鄧平所治同於是皆觀星度日月行更以算推如閎平法一月之日二十九日八十一分日之四十三詔遷用鄧平所造八十一分律歴以平為太史丞至元鳳三年太史令張夀王上書以為元年用黄帝調歴令陰陽不調更歴之過詔下主歴使者鮮于妄人與治歴大司農中丞麻光等二十餘人雜候晦朔弦望二十四氣又詔丞相御史大将軍右将軍史各一人雜候上林清臺課諸疏宻凡十一家起三年盡五年夀王課疏逺又漢元年不用黄帝調歴效劾夀王逆天地大不敬詔勿劾復候盡六年太初歴第一夀王歴乃太史官殷歴也夀王再劾不服竟下吏至孝成時劉向總六歴列是非作五紀論向子歆作三統歴以説春秋屬辭比事雖盡精巧非其實也班固謂之宻要故漢歴志述之校之何承天等六家之歴雖六元不同分章或異至今所差或三日或二日數時考其逺近率皆六國及秦時人所造其術斗分多上不可檢於春秋下不驗於漢魏雖復假稱帝王祗足以惑時人耳光武建武八年太僕朱浮上言歴紀不正宜當改治時所差尚微未遑考正明帝永平中侍詔楊岑張盛景防等典治歴但改易加時弦望未能綜校歴元也至元和二年太初失天益逺宿度相覺浸多候者皆知日宿差五度冬至之日在斗二十一度晦朔弦望先天一日章帝召治歴編訢李梵等綜核意状遂下詔書稱春秋保乾圗曰三百年斗歴改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以繆錯璇璣不正文象不稽冬至之日日在斗二十二度先立春一日則四分之立春日也而以折獄㫁大刑於氣已逆用望平和盖亦逺矣今改行四分以遵堯順孔奉天之文同心敬授儻獲咸熙於是四分法施行黄帝以來諸歴以為冬至在牽牛初者皆黜焉和帝永元十四年待詔太史霍融上言官漏刻率九日增减一刻不與天相應或時差至二刻半不如夏歴宻其年十一月甲寅詔曰漏所以節時分定昬明昬明長短起於日去極逺近日道周圜不可以計率分官漏九日增减一刻違失其實以晷景為刻宻近有驗今下晷景漏刻四十八箭其二十四氣日所在并黄道去極晷景漏刻昬明中星並列載於續漢律歴志安帝延光二年中謁者亶誦上書言當用甲寅元河南梁豐云當復用太初尚書郎張衡周興皆審歴數難誦豐或不能對或云失誤衡等參案儀注考往校今以為九道法最宻詔下公卿詳議太尉愷等參議太初過天一度月以晦見西方元和改從四分四分雖宻於太初復不正皆不可用甲寅元與天相應合圗讖可施行議者不同尚書令忠上奏天之歴數不可任疑從虚以非易是亶等遂寢靈帝熹平四年五官郎中馮光沛相上計掾陳晃等言歴元不正故盜賊為害歴當以甲寅為元不用庚申乞本庚申元經緯明文詔下三府與儒林明道術者詳議羣臣㑹司徒府集議議郎蔡邕曰歴數精微術無常是漢興承秦歴用顓頊元用乙卯百有二嵗孝武皇帝始改太初元用丁丑行之百八十九嵗孝章帝改從四分元用庚申今光等以庚申為非甲寅為是按歴法黄帝顓頊夏殷周魯各自有元光晃所援則殷歴元也昔始用太初丁丑之後六家紛錯争訟是非張夀王挾甲寅元以非漢歴雜候清臺課在下第太初效驗無所漏失是則雖非圗讖之元而有效於前者也及用四分以來考之行度宻於太初是又新元有效於今者也故延光中亶誦亦非四分言當用甲寅元公卿參議竟不施行且三光之行遲速進退不必若一故有古今之術今術之不能上通於古亦猶古術不能下通於今也又光晃以考靈耀為本二十八宿度數至日所在錯異不可參校元和二年用至今九十二嵗而光晃言陰陽不和姦臣盜賊皆元之咎元和詔書文備義著非羣臣議者所能變易三公從邕議以光晃不敬正鬼薪法詔書勿治辠何承天曰夫歴數之術若心所不達雖復通人前識無救其為敝也是以多歴年嵗未能有定四分於天出三百年而盈一日積代不悟徒云建歴之本必先立元假言讖緯遂闗治亂此之為蔽亦已甚矣劉歆三統法尤復疏闊方於四分六千餘年又益一日揚雄心惑其説采為太𤣥班固謂之最宻著於漢志司馬彪因曰自太初元年始用三統歴施行百有餘年曾不憶劉歆之生不逮太初二三君子言歴幾乎不知而妄言歟光和中榖城門候劉洪始悟四分於天疏闊更以五百八十九為紀法百四十五為斗分造乾象法又制遲疾歴以歩月行方於太初四分轉精微矣魏文帝黄初中太史丞韓翊以為乾象减斗分太過後當先天造黄初歴以四千八百八十三為紀法一千二百五為斗分其後尚書令陳羣奏以為歴數難明前代通儒多共紛争黄初之元以四分歴久逺疏闊大魏受命宜正歴明時韓翊首建黄初猶恐不審故以乾象互相參校歴三年更相是非舍本即末争長短而疑尺丈竟無時而决按三公議皆綜盡曲理殊塗同歸欲使效之璿璣各盡其法一年之間得失足定合於事宜奏可明帝時尚書郎楊偉制景初歴施用至於晉宋古之為歴者鄧平能修舊制新劉洪始減四分又定月行遲疾楊偉斟酌兩端以立多少之衷因朔積分設差以推合朔月蝕此三人漢魏之善歴者然而洪之遲疾不可以檢春秋偉之五星大乖於後代斯則洪用心尚疏偉拘於同出上元壬辰故也魏明帝景初元年改定歴數以建丑之月為正改其年三月為孟夏四月其孟仲季月雖與正嵗不同至於郊祀迎氣祭祠烝嘗巡狩蒐田分至啓閉班宣時令皆以建寅為正三年正月帝崩復用夏正楊偉表曰臣攬載籍㫁考歴數時以紀農月以紀事其所由來遐而尚矣乃自少昊則𤣥鳥司分顓頊帝嚳則重黎司天唐帝虞舜則羲和掌日三代因之則世有日官日官司歴則頒之諸侯諸侯受之則頒於境内夏后之代羲和湎淫廢時亂日則書載𦙍征由此觀之審農時而重人事者歴代然也逮至周室既衰戰國横騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流而怪蟄蟲之不藏也是時也天子不協時司歴不書日諸侯不受職日御不分朔人事不恤廢棄農時仲尼之撥亂於春秋託襃貶糺正司歴失閏則譏而書之登臺頒朔則謂之有禮自此以降暨於秦漢乃復以孟冬為嵗首閏為後九月中節乖錯時月紕繆加時後天蝕不在朔累載相襲久而不革也至武帝元封七年始乃寤其繆焉於是改正朔更歴數使大才通人造太初歴校中朔所差以正閏分課中星得度以考疏宻以建寅之月為正朔以黄鐘之月為歴初其歴斗分太多後遂疏闊至元和二年復用四分歴施而行之至於今日考察日蝕率常在晦是則斗分太多故先宻後疏而不可用也是以臣前以制典餘日推考天路稽之前典驗之食朔詳而精之更建宻歴則不先不後古今中天以昔在唐帝協日正時允釐百工咸熙庶績也欲使當今國之典禮凡百制度皆韜合往古郁然備足乃改正朔更歴數以大呂之月為嵗首以建子之月為歴初臣以為昔在帝代則法曰顓頊曩自軒轅則歴曰黄帝暨至漢之孝武革正朔更歴數改元曰太初因名太初歴今改元為景初宜曰景初歴臣之所建景初歴法數則約要施用則近宻治之則省功學之則易知雖復使研桑心筭𨽻首運籌重黎司晷羲和察景以考天路歩驗日月究極精微盡術數之極者皆未如臣如此之妙也是以累代歴數皆疏而不宻自黄帝以來改革不己壬辰元以來至景初元年丁巳嵗積四千四十六筭上此元以天正建子黄鍾之月為歴初元首之嵗夜半甲子朔旦冬至元法萬一千五十八紀法千八百四十三紀月二萬二千七百九十五章嵗十九章月二百三十五章閏七通數十三萬四千六百三十日法四千五百五十九餘數九千六百七十周天六十七萬三千一百五十紀日嵗中十二氣法十二沒分六萬七千二百一十五沒法九百六十七月周二萬四千六百三十八通法四十七㑹通七十九萬一百二十朔望合數六萬七千三百一十五入交限數七十二萬二千七百九十五通周十二萬五千六百二十一周日日餘二千五百二十八周虛二千三十一斗分四百五十五甲子紀第一紀首合朔月在日道裏交㑹差率四十一萬二千九百一十九遲疾差率十萬三千九百四十七甲戌紀第二紀首合朔月在日道裏交㑹差率五十一萬六千五百二十九遲疾差率七萬三千七百六十七甲申紀第三紀首合朔月在日道裏交㑹差率六十二萬一百三十九遲疾差率四萬三千五百八十七甲午紀第四紀首合朔月在日道裏交㑹差率七十二萬三千七百四十九遲疾差率一萬三千四百七甲辰紀第五紀首合朔月在日道裏交㑹差率三萬七千二百四十九遲疾差率一十萬八千八百四十八甲寅紀第六紀首合朔月在日道裏交㑹差率十四萬八百五十九遲疾差率七萬八千六百六十八交㑹紀差十萬三千六百一十求其數之所生者置一紀積月以通數乗之㑹通去之所去之餘紀差之數也以之轉加前紀則得後紀加之未滿㑹通者則紀首之嵗天正合朔月在日道裏滿去之則月在日道表加表滿在裏加裏滿在表遲疾紀差三萬一百八十求其數之所生者置一紀積月以通數乗之通周去之餘以减通周所减之餘紀差之數也以之轉减前紀則得後紀不足减者加通周求次元紀差率轉减前元甲寅紀差率餘則次元甲子紀差率也求次紀如上法也推朔積月術曰置壬辰元以來盡所求年外所求以紀法除之所得算外所入紀第也餘則入紀年數年以章月乗之如章嵗而一為積月不盡為閏餘閏餘十二以上其年有閏閏月以無中氣為正推朔術曰以通數乗積月為朔積分如日法而一為積日不盡為小餘以六十去積日餘為大餘大餘命以紀算外所求年天正十一月朔日也求次月加大餘二十九小餘二千四百一十九小餘滿日法從大餘命如前次月朔日也小餘二千一百四十以上其月大也推弦望加朔大餘七小餘千七百四十四小分一小分滿二從小餘小餘滿日法從大餘大餘滿六十去之餘命以紀筭外上弦日也又加得望下弦後月朔其月蝕望者定小餘如所近中節間限限數以下者筭上為日望在中節前後各四日以還者視限數望在中節前後各五日以上者視間限推二十四氣術曰置所入紀年外所求以餘數乗之滿紀法為大餘不盡為小餘大餘滿六十去之餘命以紀筭外天正十一月冬至日也求次氣加大餘十五小餘四百二小分十一小分滿氣法從小餘滿紀法從大餘命如前次氣日也推閏月術曰以閏餘减章嵗餘以嵗中乗之滿章閏得一月餘滿半法以上亦得一月數從天正十一月起筭外閏月也閏有進退以無中氣御之大雪十一月節限數千二百四十二間限千二百四十八冬至十一月中限數千二百五十四間限千二百四十五小寒十二月節限數千二百三十五間限千二百二十四大寒十二月中限數千二百一十三間限千一百九十二立春正月節限數千一百七十二間限千一百三十七雨水正月中限數千一百一十二間限千九十三驚蟄二月節限數千六十五間限千二十五春分二月中限數千八七十九間限九百清眀三月節限數九百五十一間限九百二十五榖雨三月中限數九百七十九間限八百立夏四月節限數八百五十七間限八百四十小滿四月中限數八百二十二間限八百一十三芒種五月節限數八百九十九間限七百夏至五月中限數七百九十八間限八百小暑六月節限數八百五十五間限八百一大暑六月中限數八百二十五間限八百四十二立秋七月節限數八百五十九間限八百八十三處暑七月中限數九百七十五間限九百三白露八月節限數九百六十二間限九百九十二秋分八月中限數千二十一間限千五十一寒露九月節限數千八十七間限千一百霜䧏九月中限數千一百三十三間限一百五十七立冬十月節限數千一百八十八間限千一百九十小雪十月中限數千二百一十五間限千二百二十九推沒㓕術曰因冬至積日有小餘者加積一以沒分乗之以沒法除之所得為大餘不盡為小餘大餘滿六十去之餘命以紀筭外即去年冬至後沒日也求次沒加大餘六十九小餘五百九十二小餘滿沒法得一從大餘命如前小餘盡為㓕也推五行用事日立春立夏立秋立冬者即木火金水始用事日也各减其大餘十八小餘四百八十三小分六餘命以紀筭外各四立之前土用事日也大餘不足减者加六十小餘不足减者减大餘一加紀法小分不足减者减小餘一加氣法推卦用事日因冬至大餘六其小餘坎卦用事日也加小餘萬九十一滿元法從大餘即中孚用事日也求次卦各加大餘六小餘九百六十七其四正各因其中日六其小餘推日度術曰以紀法乗朔積日滿周天去之餘以紀法除之所得為度不盡為分命度從牛前五起宿次除之不滿宿則天正十一月朔夜半日所在度及分也求次日日加一度分不加經斗除斗分分少退一度推月度術曰以月周乗朔積日滿周天去之餘以紀法除之所得為度不盡為分命如上法則天正十一月朔夜半月所在度及分也求次月小月加度二十二分八百六大月又加一日度十三分六百七十九分滿紀法得一度則次月朔夜半月所在度及分也其冬下旬夕在張心暑也推合朔度術曰以章嵗乗朔小餘滿通法為大分不盡為小分以大分從朔夜半日度分滿紀法從度命如前則天正十一月合朔日月所共合度也求次月加度二十九大分九百七十七小分四十二小分滿通法從大分大分滿紀法從度經斗除其分則次月合朔日月所共合度也推弦望日所在度加合朔度七大分七百五小分十微分一微分滿二從小分小分滿通法從大分大分滿紀法從度命如前則上弦日所在度也又加得望下弦後月合也推弦望月所在度加合朔度九十八大分千二百七十九小分三十四數滿命如前即上弦月所在度也又加得望下弦後月合也推日月昏眀度術曰日以紀法月以月周乗所近節氣夜漏二百而一為眀分日以减紀法月以减月周餘為昏分各以加夜半如法為度推合朔交㑹月蝕術曰置所入紀朔積分以所入紀交㑹差率之數加之以㑹通去之餘則所求年天正十一月合朔去交度分也以通數加之滿㑹通去之餘則次月合朔去交度分也以朔望合數各加其月合朔去交度分滿㑹通去之餘則各其月望去交度分也朔望去交分加朔望合數以下入交限數以上者朔則交㑹望則月蝕推合朔交㑹月蝕月在日道表裏術曰置所入紀朔積分以所入紀下交㑹差率之數加之倍㑹通去之餘不滿㑹通者紀首表天正合朔月在表紀首裏天正合朔月在裏滿㑹通去之表在裏裏在表求次月以通數加之滿㑹通去之加裏滿在表加表滿在裏先交㑹後月蝕者朔在表則望在表朔在裏則望在裏先月蝕後交㑹者看食月朔在裏則望在表朔在表則望在裏交㑹月蝕如朔望㑹數以下則前交後㑹如入交限數以上則前㑹後交其前交後㑹近扵限數者則豫伺之前月前㑹後交近扵限數者則後伺之後月闕求去交度術曰其前交後㑹者今去交度分如日法而一所得則却去交度也其前㑹後交者以去交度分减㑹通餘如日法而一所得則前去交度餘皆度分也去交度十五以上雖交不蝕也十以下是蝕十以上虧蝕微少光晷相及而已虧之多少以十五為法求日蝕虧起角術曰其月在外道先交後㑹者虧蝕西南角起先㑹後交者虧蝕東南角起其月在内道先交後㑹者虧食西北角起先㑹後交者虧食東北角起虧食分多少如上以十五為法㑹交中者蝕盡月蝕在日之衝虧角與上反也月行遲疾度損益率盈縮積分月行分一日十四度十四分益二十六盈一初二百八十二日十四度十一分益二十三盈積分一十一萬八千五百三十四二百七十七三日十四度八分益二十盈積分二十二萬三千三百九十一二百七十四四日十四度五分益十七盈積分三十一萬四千五百七十一二百七十五日十四度一分益十三盈積分三十九萬二千七十四二百六十七六日十三度十四分益七盈積分四十五萬一千三百四十一二百六十一七日十三度七分損盈積分四十八萬三千二百五十四二百五十四八日十三度一分損六盈積分四十八萬三千二百五十四二百四十八九日十二度