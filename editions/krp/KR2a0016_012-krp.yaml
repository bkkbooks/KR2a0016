十四日行百一十二度更順遲日行十二分九十二日行四十八度而留不行十一日而旋逆日行六十二分之十七六十二日退十七度而復留十一日復順遲日行十二分九十二日行四十八度而復疾日行十四分百八十四日行百一十二度在日前夕伏西方順七十二日百七十九萬二千六百一十五分行星五十六度百二十四萬九千三百四十五分而與日合凡一終七百八十日三百三十八萬五千二百三十分行星四百一十五度二百四十九萬八千六百九十分土晨與日合伏十九日三百八十四萬七千六百七十五分半行星二度六百四十九萬一千一百二十一分半而晨見東方在日後順行百七十二分之十三八十六日行六度半而留不行三十二日半而旋逆日行十七分之一百二日退六度而復留不行三十二日半復順日行十三分八十六日行六度半在日前夕伏西方順十九日三百八十四萬七千六百七十五分半行星二度六百四十九萬一千一百二十一分半而與日合凡一終三百七十八日六十七萬五千三百六十四分行星十二度五百九十六萬二千二百五十六分金晨與日合伏六日退四度而晨見東方在日後而逆遲日行五分之三十日退六度留不行七日而旋順遲日行四十五分之三十三四十五日行三十三度而順疾日行一度九十一分之十四九十一日行百五度而順益疾日行一度九十一分之二十一九十一日行百一十二度在日後而晨伏東方順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而與日合一合二百九十二日十九萬四千九百九十分行星如之金夕與日合伏順四十二日十九萬四千九百九十分行星五十二度十九萬四千九百九十分而夕見西方在日前順疾日行一度九十一分之二十一九十一日行百一十二度而更順遲日行一度十四分九十一日行百五度而順益遲日行四十五分之三十三四十五日行三十三度而留不行七日而旋逆日行五分之三十日退六度在日前夕伏西方逆六日退四度而與日合凡再合一終五百八十四日三十八萬九千九百八十分行星如之水晨與日合伏十一日退七度而晨見東方在日後逆疾一日退一度而留不行一日而旋順遲日行八分之七八日行七度而順疾日行一度十八分之四十八日行二十二度在日後晨伏東方順十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而與日合凡一合五十七日二千三十四萬四千二百六十一分行星如之水夕與日合伏十八日二千三十四萬四千二百六十一分行星三十六度二千三十四萬四千二百六十一分而夕見西方在日前順疾日行一度十八分之四十八日行二十二度而更順遲日行八分之七八日行七度而留不行一日而旋逆一日退一度在日前夕伏西方逆十一日退七度而與日合凡再合一終百一十五日千八百九十六萬一千三百九十五分行星如之五星歴歩術以法伏日度餘加星合日度餘滿日度法得一從全命如之前得星見日及度餘也以星行分母乗見度分如日度法得一分不盡半法以上亦得一而日加所行分分滿其母得一度逆順母不同以當行之母乗故分如故母而一當行分也留者承前逆則减之伏不盡度除斗分以行母為率分有損益前後相御凡五星行天遲疾留逆雖大率有常至犯守逆順難以術推月之行天猶有遲疾况五星乎唯日之行天有常進退有率不遲不疾不外不内人君德也求木合終嵗數法以木日度法乗一木終之日内分周天除之即得也求木合終合數法以木日度法乗周天滿紀法所得復以周天除之即得五星皆放此也魏黄初元年十一月小己卯蔀首己亥嵗十一月己卯朔旦冬至臣偉上劉氏在蜀不見改歴當是仍用漢四分法吴中書令闞澤受劉洪乾象法於東萊徐岳字公河故孫氏用乾象歴至於吴亡晉武帝泰始元年有司奏王者祖氣而奉其闕終晉於五行之次應尚金金生於己事於酉終於丑宜祖以酉日臘以丑日改景初歴為泰始歴奏可史臣按鄒衍五德周為火行衍生在周時不容不知周氏行運且周之為歴年八百秦氏即有周之建國也周之火木其事易詳且五德更王唯有二家之説鄒衍以相勝立體劉向以相生為義據以為言不得出此二家者假使即劉向之説周為木行秦氏代周改其行運若不相勝則克木者金相生則本實生火秦氏乃稱水德理非謬然斯則劉氏所證為不値矣臣以為張蒼雖是漢臣生與周接司秦柱下備覩圗書且秦雖㓕學不廢術數則有周遺文雖不畢在據漢水行事非虛作賈誼取秦云漢土德葢以是漢代秦詳論二説各有其義張蒼則以漢水勝周火廢秦不班五德賈誼則以漢土勝秦水以秦為一代論秦漢雖殊而周為火一也然則相勝之義於事為長若同蒼黜秦則漢水魏土晉木宋金若同賈誼取秦則漢土魏木晉金宋火也難者云漢髙斷虵而神母夜哭云赤帝子殺白帝子然則漢非火而何斯又不然矣漢若為火則當云赤帝不宜云赤帝子也白帝子又何義况乎葢由漢是土德土生乎火秦是水德水生乎金斯則漢以土為赤帝子秦以水德為白帝子也難者又曰向云五德相勝今復云土為赤帝子何也答曰五行自有相勝之義自有相生之義不得以相勝廢相生相生廢相勝也相勝者以土勝水耳相生者土自火子義豈相闗崔寔四人月令曰祖者道神黄帝之子曰累祖好逺逰死道路故祀以為道神合祖賦序曰漢用丙午魏用丁未晉用孟月之酉曰莫識祖之所由説者云祈請道神謂之祖有事於道者君子行役則列之於中路喪者将遷則稱名於階庭或云百代逺祖名諡彫㓕墳塋不復存於銘表㳺魂不得託於廟祧故以初嵗良辰建華葢揚綵旌将以招靈爽庶衆祖之來慿云爾晉江左時侍中平原劉智推三百年斗歴改憲以為四分法三百年而减一日以百五十為度法三十七為斗分飾以浮説以扶其理江左中領軍琅邪王朔之以其上元嵗在甲子善其術欲以九萬七千嵗之甲子為開闢之始何承天云悼於立意者也景初日中晷景即用漢四分法是以漸就乖差其推五星則甚踈闊晉江左以來更用乾象五星法以代之猶有前却宋太祖頗好歴數太子率更令何承天私撰新法元嘉二十年上表曰臣授性頑惰少所闗觧自昔幼年頗好歴數躭情注意迄於白首臣亡舅故祕書監徐廣素善其事有既往七曜歴每記其得失自太和至泰元之末四十許年臣因比嵗考校至今又四十載故其疎宻差㑹皆可知也夫圓極常動七曜運行離合去來雖有定勢以新故相渉自然有毫末之差連日累嵗積微成著是以虞書著欽若之典周易明治歴之訓言當順天以求合非為合以驗天也漢代雜候清臺以昏明中星課日所在雖不可見月盈則蝕必當其衝以月推日則躔次可知焉捨易而不為役心於難事此臣所不觧也堯典云日永星火以正仲夏今季夏則火中又宵中星虛以殷仲秋今季秋則虛中爾來二千七百餘年以中星檢之所差二十七八度則堯冬令至日在須女十度左右也漢之太初歴冬至在牽牛初後漢四分及魏景初法同在斗二十一臣以月蝕檢之則景初今之冬至應在斗十七又史官受詔以土圭測景考校二至差三日有餘從來積嵗及交州所上檢其増减亦相符驗然則今之二至非天之二至也天之南日在斗十三四矣此則十九年七閏數微多差復改法易章則用算滋繁宜當隨時遷革以取其合案後漢志春分日長秋分日短差過半刻尋二分在二至之間而有長短因識春分近夏至故長秋分近冬至故短也楊偉不悟即用之上歴表云自古及今凡諸歴數皆未能並己之妙何此不曉亦何以云是故臣更建元嘉歴以六百八為一紀半之為度法七十五為室分以建寅之月為嵗首雨水為氣初以諸法閏餘一之嵗為章首冬至從上三日五時日之所在移舊四度又月有遲疾合朔月蝕不在朔望亦非歴意也故元嘉皆以盈縮定其小餘以正朔望之日伏惟陛下允廸聖哲先天不違劬勞庻政寅亮鴻業究淵思於往籍探妙㫖於未聞窮神知化罔不該覽是以愚臣欣遇盛明効其管穴伏願以臣所上元嘉法下史官考其疎宻若謬有可採庶或補正闕謬以備萬分詔曰何承天所陳殊有理據可付外詳之太史令錢樂之兼丞嚴粲奏曰太子率更令領國子博士何承天表更改元嘉歴法以月蝕檢今冬至日在斗十七以土圭測影知冬至己差三日詔使付外檢署以元嘉十一年被勅使考月蝕土圭測影檢署由來用偉景初法冬至之日日在斗二十一度少檢十一年七月十六日望日蝕加時在卯到十五日四更二唱丑初始蝕到四唱蝕既在營室十五度末景初其日日在軫三度以月蝕所衝考之其日日應在翼十五度半又到十三年十二月十六日望月蝕加時在酉到亥初始食到一更三唱蝕既在鬼四度景初其日日在女三以衝考之其日日應在牛六度半又到十四年十二月十六日望月蝕加時在戌之半到二更四唱亥末始蝕到三更一唱食既在井三十八度景初其日日在斗二十五以衝考之其日日應在斗二十二度半到十五年五月十五日望月蝕加時在戌其日月始生而已蝕光己生四分之一格在斗十六度許景初其日日在井二十四考取其衝其日日應在井二十又到十七年九月十六日望月蝕加時在子之少到十五日未二更一唱始蝕到三唱蝕十五分之十二格在昴一度半景初其日在房二以衝考之則其日日在氐十三度半凡此五蝕以月衝一百八十二度半考之冬至之日日並不在斗二十一度少並在斗十七度半間悉如承天所上又去十一年起以土圭測景其年景初法十一月七日冬至前後陰不見影到十二年十一月十八日冬至其十五日影極長到十三年十一月二十九日冬至其二十六日影極長到十四年十一月十一日冬至其前後並陰不見到十五年十一月二十一日冬至十八日影極長到十六年十一月二日冬至其十月二十九日影極長到十七年十一月十三日冬至其十日影極長到十八年十一月二十五日冬至二十一日影極長到十九年十一月六日冬至其三日影極長到二十年十一月十六日冬至其前後陰不見影尋校前後以影極長為冬至並差三日以月蝕檢日所在已差四度土圭測影冬至又差三日今之冬至乃在斗十四間又如承天所上又承天法每月朔望及弦皆定大小餘於推交㑹時刻雖審皆用盈縮則月有頻三大頻二小比舊法殊為異舊日蝕不唯在朔亦有在晦及二日公羊傳所謂或失之前或失之後愚謂此一條自宜仍舊員外散騎郎皮延宗又難承天若晦朔定大小餘紀首値盈則退一日便應以故嵗之晦為新紀之首承天乃改新法依舊術不復毎月定大小餘如延宗所難太史所上有司奏治歴改憲經國盛典爰及漢魏屢有變革良由術無常是取協當時方今皇猷載暉舊域光被誠應綜覈晷度以播維新承天歴術合可施用宋二十二年普用元嘉歴詔可宋書卷十二宋書卷十二考證歴志上甲寅紀第六交㑹差率十四萬八百五十九監本率下誤注闕字今從南本删滿氣法從小餘滿紀法從大餘滿紀下監本脱法字今從南本增入推卦用事日此條當提起另作一行其冬下旬夕在張心暑也臣永祚按句内必有誤字今莫可考推合朔交㑹月蝕入遲疾歴術以通周去之周諸本俱訛界今改正清明注胃一半監本脱半字今增入小滿危太弱危監本誤作亢今改正以日所在為正正監本訛作求今改正伏不盡度盡監本訛作書今改正秦氏乃稱水德理非謬然斯則劉氏所證為不値矣臣永祚按値當作直賈誼取秦云漢土德葢以是漢代秦葢諸本皆訛益今改正以字當在是字下七十五為室分臣永祚按室分即元嘉歴法所云度起室二也宋書卷十二考證
