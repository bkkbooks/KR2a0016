body:
  text: 宋書卷二十一梁沈約撰志第十一樂三但歌四曲出自漢世無弦節作伎最先一人倡三人和魏武帝尤好之時有宋容華者清澈好聲善唱此曲當時特妙自晉以来不復傳遂絶相和漢舊歌也絲竹更相和執節者歌本一部魏眀帝分為二更遞夜宿本十七曲朱生宋識列和等復合之為十三曲相和駕六龍氣出倡武帝詞駕六龍乗風而行行四海外路下之八邦歴登髙山臨谿谷乗雲而行行四海外東到泰山仙人玉女下来翺㳺驂駕六龍飲玉漿河水盡不東流解愁腹飲玉漿奉持行東到蓬莱山上至天之門玉關下引見得入赤松相對四面顧望視正焜煌開王心正興其氣百道至傳告無窮閉其口但當愛氣壽萬年東到海與天連神仙之道出窈入㝠常當專之心恬憺無所愒欲閉門坐自守天與期氣願得神之人乗駕雲車驂駕白鹿上到天之門来賜神之藥跪受之敬神齊當如此道自来華隂山自以為大髙百丈浮雲為之蓋仙人欲来出隨風削之雨吹我洞簫鼓瑟琴何誾誾酒與歌戲今日相樂誠為樂玉女起起儛移數時鼓吹一何嘈嘈從西北来時仙道多駕煙乘雲駕龍鬱何蓩蓩遨㳺八極乃到崐崘之山西王母側神仙金止玉亭来者為誰赤松王喬乃徳旋之門樂共飲食到黄昏多駕合坐萬歳長宜子孫㳺君山甚為真確䃬砟硌爾自為神乃到王母臺金階玉為堂芝草生殿傍東西廂客滿堂主人當行觴坐者長壽遽何央長樂甫始宜孫子常願主人增年與天相守厥初生精􅍌武帝詞厥初生造化之陶物莫不有終期莫不有終期聖賢不能免何為懐此憂願螭龍之駕思想崐崘居思想崐崘居見期於迂怪志意在蓬莱志意在蓬莱周孔聖徂落㑹稽以墳丘㑹稽以墳丘陶陶誰能度君子以弗憂年之暮奈何過時時来微江南可採蓮江南古辭江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西魚戲蓮葉南魚戲蓮葉北天地間度關山武帝辭天地間人為貴立君牧民為之軌則車轍馬迹經緯四極絀陟幽明黎庻繁息於鑠賢聖總統邦域封建五爵井田刑獄有燔丹書無普赦贖臯陶甫刑何有失職嗟哉後世改制易律勞民為君役賦其力舜漆食器畔者十國不及唐堯採椽不斵世歎伯夷欲以厲俗侈惡之大儉為恭徳許由推譲豈有訟曲兼愛尚同疏者為戚東光乎東光乎古辭東光乎倉梧何不乎倉梧多腐粟無益諸軍糧諸軍㳺蕩子蚤行多悲傷登山而逺望十五文帝詞登山而逺望谿谷多所有楩柟千餘尺衆草之盛茂華葉燿人目五色難可紀雉雊山雞鳴虎嘯谷風起號羆當我道狂顧動牙齒惟漢二十二世䪥露武帝詞惟漢二十二世所任誠不良沭猴而冠帶智小而謀强猶豫不敢斷因狩執君王白虹為貫日已亦先受殃賊臣持國柄殺主滅宇京蕩覆帝基業宗廟以燔喪播越西遷移號泣而且行瞻彼洛城郭微子為哀傷關東有義士蒿里行武帝詞關東有義士興兵討羣凶初期㑹孟津乃心在咸陽軍合力不齊躊躇而雁行勢利使人爭嗣還自相戕淮南弟稱號刻璽於北方鎧甲生蝨萬姓以死亡白骨露於野千里無雞鳴生民百遺一念之絶人膓對酒歌太平時對酒武帝詞對酒歌太平時吏不呼門王者賢且明宰相股肱皆忠良咸禮譲民無所爭訟三年耕有九年儲倉榖滿盈斑白不負戴雨澤如此五榖用成郤走馬以糞其土田爵公侯伯子男咸愛其民以黜陟幽明子飬有若父與兄犯禮法輕重隨其刑路無拾遺之私囹圄空虚冬節不斷人耄耋皆得以壽終恩徳廣及草木昆蟲雞鳴髙樹顛雞鳴古詞雞鳴髙樹顛狗吠深宫中蕩子何所之天下方太平刑法非有貸柔協正亂名黄金為君門璧玉為軒䦨堂上有䨇尊酒作使邯鄲倡劉玉碧青甓後出郭門王舎後有方池池中䨇鴛鴦鴛鴦七十二羅列自成行鳴聲何啾啾聞我殿東廂兄弟四五人皆為侍中郎五日一時来觀者滿道傍黄金絡馬頭熲熲何煌煌桃生露井上李樹生桃傍蟲来齧桃根李樹代桃僵樹木身相代兄弟還相忘烏生八九子烏生古辭烏生八九子端坐秦氏桂樹間唶我秦氏家有㳺遨蕩子工用睢陽强蘇合彈左手持强弹兩丸出入烏東西唶我一丸即發中烏身烏死魂魄飛揚上天阿母生烏子時乃在南山巖石間唶我人民安知烏子處蹊徑窈窕安從通白鹿乃在上林西苑中射工尚復得白鹿脯哺唶我黄鵠摩天極高飛後宫尚復得亨煑之鯉魚乃在洛水深淵中釣鉤尚得鯉魚口唶我人民生各各有壽命死生何須復道前後平陵東平陵古詞平陵東松栢桐不知何人劫義公劫義公在髙堂下交錢百萬兩走馬兩走馬亦誠難顧見追吏心中惻心中惻血出漉歸告我家賣黄犢棄故鄉亦作瑟調東西門行陌上桑文帝詞棄故郷離室宅逺從軍旅萬里客披荆棘求阡陌側足獨窘歩路局笮虎豹嗥動雞驚禽失羣鳴相索登南山奈何蹈槃石樹木叢生鬱差錯蒿草䕃松栢涕泣雨面霑枕席伴旅單稍稍日零落惆悵竊自憐相痛惜今有人陌上桑楚詞鈔今有人山之阿被服薜荔帶女蘿既含睇又宜笑子戀慕予善窈窕乗赤豹從文貍辛夷車駕結桂旗被石蘭帶杜衡折芳㧞荃遺所思處幽室終不見天路險艱獨後来表獨立山之上雲何容容而在下杳冥冥羌晝晦東風飄颻神靈雨風瑟瑟木􅊧􅊧思念公子徒以憂駕紅蜺陌上桑武帝詞駕虹蜺乗赤雲登彼九疑歴王門濟天漢至崐崘見西王母謁東君交赤松及羡門受要秘道愛精神食芝英飲醴泉拄杖桂枝佩秋蘭絶人事㳺渾元若疾風㳺歘飄飄景未移行數千壽如南山不忘愆清商三調歌詩荀朂撰舊詞施用者平調周西短歌行武帝詞六解周西伯昌懐此聖徳參分天下而有其二脩奉貢獻臣節不墜崇侯䜛之是以拘繫一解後見赦原賜之斧鉞得使征伐為仲尼所稱逹及徳行猶奉事殷論敘其美二觧齊桓之功為霸之首九合諸侯一匡天下一匡天下不以兵車正而不譎其徳傳稱三解孔子所歎并稱夷吾民受其恩賜與廟胙命無下拜小白不敢爾天威在顔咫尺四觧晉文亦霸躬奉天王受賜珪瓚秬鬯彤弓盧弓矢千虎賁三百人五解威服諸侯師之者尊八方聞之名亞齊桓河陽之㑹詐稱周王是以其名紛葩六解秋風燕歌行文帝詞七觧秋風蕭瑟天氣凉草木揺落露為霜一解羣燕辭歸鵠南翔念君客逰多思腸二解慊慊思歸戀故鄉君何淹留寄它方三解賤妾㷀㷀守空房憂来思君不敢忘四觧不覺淚下霑衣裳援瑟鳴弦發清商五解短歌微吟不能長眀月皎皎照我牀六觧星漢西流夜未央牽牛織女遥相望爾獨何辜限河梁七解仰瞻短歌行文帝詞六解仰瞻帷幕俯察几筵其物如故其人不存一解神靈焂忽棄我遐遷靡瞻靡恃泣涕連連二解呦呦㳺鹿銜草鳴麑翩翩飛鳥挟子巢棲三解我獨孤㷀懐此百離憂心孔疚莫我能知四解人亦有言憂令人老我白髪生一何早五解長吟永歎懐我聖考曰仁曰壽胡不是保六解别日燕歌行文帝詞六解别日何易㑹日難山川悠逺路漫漫一解鬱陶思君未敢言寄書浮雲往不還二解涕零雨面毁形顔誰能懐憂獨不歎三解耿耿伏枕不能眠披衣出户歩東西四解展詩清歌聊自寛樂往哀来摧心肝悲風清厲秋氣寒羅幃徐動經秦軒互觧仰戴星月觀雲間飛鳥晨鳴聲氣可憐留連顧懐不自存六解對酒短歌行武帝詞六解對酒當歌人生幾何譬如朝露去日苦多一觧慨當以忼憂思難忘以何解愁唯有杜康二解青青子衿悠悠我心但為君故沈吟至今三觧明明如月何時可掇憂從中来不可斷絶四解呦呦鹿鳴食野之革我有嘉賔鼓瑟吹笙五解山不厭髙水不厭深周公吐哺天下歸心六解清調晨上秋胡行武帝詞晨上散關山此道當何難晨上散關山此道當何難牛頓不起車墮谷間坐盤石之上彈五弦之琴作為清角韻意中述煩歌以言志晨上散關山一解有何三老公卒来在我傍有何三老公卒来在我傍員揜被裘似非恒人謂卿云何困苦以自怨徨徨所欲来到此間歌以言志有何三老公二解我居崐崘山所謂者真人我居崐崘山所謂者真人道深有可得名山歴觀遨㳺八極枕石潄流飲泉沈吟不決遂上升天歌以言志我居崐崘山三解去去不可追長恨相牽攀去去不可追長恨相牽攀夜夜安得寐惆悵以自憐正而不譎辭賦因依經傳所過西来所傳歌以言志去去不可追四觧又本晨二上二𣪚二關二山二此二道二當二何二難二有二何二三二老二公二卒二来二在二我二傍二我二居二崐二崘二山二所二謂二真二人二去二不二可二追二長二相二牽二攀二北上苦寒行武帝詞六解北上太二行二山二艱二哉二何二巍巍羊腸坂詰屈車輪為之摧一解樹木何蕭二瑟二北二風二聲二正二悲二熊羆對我蹲虎豹夹道啼二觧谿谷少二人二民二雪二落二何二霏二霏二延頸長歎息逺行多所懐三觧我心何二怫二鬱二思二欲二一二東二歸二水深橋梁絶中道正裵回四觧迷惑失二徑二路二暝二無二所二宿二棲二行行日以逺人馬同時飢五解儋二嚢二行二取二薪二斧二冰二持二作二糜二悲彼東山詩悠悠使我哀六解願登秋胡行武帝詞五解願二登二泰二華二山二神二人二共二逺二㳺二經歴崐崘山到蓬莱飄颻八極與神人俱思得神藥萬歲為期歌以言志願登泰華山一解天二地二何二長二久二人二道二居二之二短二世言伯陽殊不知老赤松王喬亦云得道得之未聞庻以壽考歌以言志天地何長久二解明二明二日二月二光二何二所二不二光二昭二二儀合日化貴者獨人不萬國率土莫非王臣仁義為名禮樂為榮歌以言志明眀日月光三觧四二時二㪅二逝二去二晝二夜二以二成二歲二大人先天而天弗違不戚年往世憂不治存亡有命慮之為蚩歌以言志四時㪅逝去四解戚二戚二欲二何二念二歡二笑二意二所二之二盛壯智慧殊不再来愛時進趣将以惠誰汜汜放逸亦同何為歌以言志戚戚欲何念五觧上謁蕫桃行古詞五解吾欲上謁從髙山山頭危嶮大難遥望五嶽端黄金為闕班璘但見芝草葉落紛紛一解百鳥集来如煙山獸紛綸麟辟邪其端鵾雞聲鳴但見山獸援戲相拘攀二觧小復前行玉堂未心懐流還傳教出門来門外人何求所言欲從聖道求一得命延三解教敕凡吏受言采取神藥若木端白兎長跪擣藥蝦蟇丸奉上陛下一玉柈服此藥可得即仙四解服爾神藥無不歡喜陛下長生老壽四面肅肅稽首天神􅗙護左右陛下長與天相保守五解蒲生塘上行武帝詞五解蒲二生二我二池二中二其葉何離離傍能行儀儀莫能縷自知衆口鑠黄金使君生别離一解念二君二去二我二時二獨愁常苦悲想見君顔色感結傷心脾今悉夜夜愁不寐二解莫二用二豪二賢二故二棄捐素所愛莫用魚肉貴棄捐蔥與䪥莫用麻枲賤棄捐菅與蒯三解倍二恩二者二苦二枯二蹶船常苦沒教君安息定慎莫致倉卒念與君一共離别亦當何時共坐復相對四解出二亦二復二苦二愁二入亦復苦愁邊地多悲風樹木何蕭蕭今日樂相樂延年壽千秋五解悠悠苦寒行明帝詞五解悠二悠二發二洛二都二茾二我二征二東二行二征行彌二旬屯吹隴陂城一觧顧觀故二壘二處二皇二祖二之二所二營二屋室若平昔棟宇無邪傾二觧奈何我二皇二祖二潛二徳二隠二聖二形二雖沒而不朽書貴垂休名三解光光我二皇二祖二軒二燿二同二其二榮二遺化布四海八表以肅清四觧雖有吳二蜀二寇二春二秋二足二燿二兵二徒悲我皇祖不永享百齡賦詩以寫懐伏軾淚霑纓五解瑟調朝日善哉行文帝詞五解朝日樂相樂酣飲不知醉悲弦激新聲長笛吐清氣一解弦歌感人腸四坐皆歡說寥寥髙堂上凉風入我室二觧持滿如不盈有得者能卒君子多苦心所愁不但一三解慊慊下白屋吐握不可失衆賔飽滿歸主人苦不悉四觧比翼翔雲漢羅者安所羈沖静得自然榮華何足為五解上山善哉行文帝詞六解上山采薇薄莫苦饑溪谷多風霜露沾衣一解野雉羣雊猿猴相追還望故鄉鬱何壘壘二解髙山有崖林木有支憂来無方人莫之知三解人生若寄多憂何為今我不樂歲月其馳四解湯湯川流中有行舟隨波轉薄有似客㳺五解策我良馬被我輕裘載馳載驅聊以忘憂六解朝游善哉行文帝詞五解朝㳺髙臺觀夕宴華池隂大酋奉甘醪狩人獻嘉禽一觧齊倡發東舞秦筝奏西音有客從南来為我彈清琴二解五音紛繁㑹拊者激微吟淫魚乗波聽踴躍自浮沈三解飛鳥翻翔舞悲鳴集北林樂極哀情来憀亮摧肝心四解清角豈不妙徳薄所不任大哉子野言弭弦當自禁五解古公善哉行武帝詞七解古公亶甫積徳垂仁思𢎞一道哲王於豳一解太伯仲雝王徳之仁行施百世斷髪文身一解伯夷叔齊古之遺賢讓國不用餓殂首山三解智哉山甫相彼宣王何用杜伯累我聖賢四解齊桓之霸頼得仲父後任豎刁蟲流出户五解晏子平仲積徳兼仁與世沈徳未必思命六解仲尼之世王國為君隨制飲酒揚波使官七解自惜善哉行武帝詞六解自惜身薄祐夙賤罹孤苦既無三徙教不聞過庭語一解其窮如抽裂自以思所怙雖懐一介志是時其能與二解守窮者貧賤惋歎淚如雨泣涕於悲夫乞活安能覩三解我願於天窮琅邪傾側左雖欲竭忠誠欣公歸其楚四解快人曰為歎抱情不得敘顯行天教人誰知莫不緒五解我願何時隨此歎亦難處今我將何照於光燿釋銜不如雨六解我徂善哉行明帝詞八解我徂我征伐彼蠻虜練師簡卒爰正其旅一解輕舟竟川初鴻依浦桓桓猛毅如羆如虎二觧發枹若雷吐氣成雨旄􅀈指麾進退應矩三觧百馬齊轡御由造父休休六軍咸同斯武四解兼塗星邁亮兹行阻行行日逺西背京許五解㳺弗淹旬遂届揚土奔寇震懼莫敢當御六解虎臣列将怫鬱免怒淮泗肅清奮揚微所七解運徳燿威惟鎮惟撫反斾言歸告入皇祖八解赫赫善哉行明帝詞四解赫赫大魏王師徂征冐暑討亂振燿威靈一解汎舟黄河隨波潺湲通渠回越行路綿綿二解采旄蔽日旗旒翳天淫魚瀺灂㳺戲深淵三解惟塘泊從如流不為單握揚楚心惆悵歌采薇心綿綿在淮肥願君速㨗蚤旋歸四解来日善哉行古詞六解来日大難口燥脣乾今日相樂皆當喜歡一解經歴名山芝草翻翻仙人王喬奉藥一丸二解自惜袖短内手知寒慙無靈輙以報趙宣三解月沒參横北斗䦨干親交在門饑不及餐四觧歡日尚少戚日苦多以何忘憂彈筝酒歌五解淮南八公要道不煩參駕六龍㳺戯雲端六解大曲東門東門行古詞四解出東門不顧歸来入門悵欲悲盎中無斗儲還視桁上無縣衣一解㧞劒出門去兒女牽衣啼它家但願富貴賤妾與君共餔糜二解共餔糜上用倉浪天故下為黄口小兒今時清廉難犯教言君復自愛莫為非三解今時清廉難犯教言君復自愛莫為非行吾去為遲平慎行望吾歸四解西山折楊栁行文帝詞四解西山一何髙髙髙殊無極上有兩仙僮不飲亦不食與我一丸藥光耀有五色一解服藥四五日身體生羽翼輕舉乗浮雲倐忽行萬億流覧觀四海芒芒非所識二觧彭祖稱七百悠悠安可原老聃適西戎于今竟不還王喬假虚詞赤松垂空言三解逹人識真偽愚夫好妄傳追念往古事憒憒千萬端百家多迂怪聖道我所觀四解羅敷豔歌羅敷行古詞三解日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷喜蠶桑采桑城南隅青絲為籠係桂枝為籠鉤頭上倭墮髻耳中眀月珠緗綺為下帬紫綺為上襦行者見羅敷下儋捋頿須少年見羅敷脫㡌著帩頭耕者忘其犁鋤者忘其鋤来歸相怒怨但坐觀羅敷一解使君從南来五馬立跱躇使君遣吏往問是誰家姝秦氏有好女自名為羅敷羅敷年幾何二十尚不足十五頗有餘使君謝羅敷寜可共載不羅敷前置詞使君一何愚使君自有婦羅敷自有夫二解東方千餘騎夫壻居上頭何用識夫壻白馬從驪駒青絲繋馬尾黄金絡馬頭腰中鹿盧劒可直千萬餘十五府小史二十朝大夫三十侍中郎四十專城居為人潔白晳鬛鬑頗有須盈盈公府歩冉冉府中趨坐中數千人皆言夫壻殊三解前有豔詞曲後有趨西門西門行古詞六解出西門歩念之今日不作樂當待何時一解夫為樂為樂當及時何能坐愁怫鬱當復来兹二解飲醇酒炙肥牛請呼心所歡可用解愁憂三解人生不滿百常懐千歲憂晝短而夜長何不秉燭㳺四觧自二非二仙二人二王二子二喬二計二㑹二壽二命二難二與二期二五解人壽非金石年命安可期貪財愛惜費但為後世嗤六解一本燭㳺後行去之如雲除弊車羸馬為自推無自非以下四十八字默默折楊栁行古詞四解默默施行違厥罸隨事来末喜殺龍逢桀放於鳴條一解祖伊言不用紂頭縣白旄指鹿用為馬胡亥以喪軀二解夫差臨命絶乃云負子胥戎王納女樂以亡其由余璧馬禍及虢二國俱為墟三解三夫成市虎慈母投杼趨卞和之則足接輿歸草廬四解園桃煌煌京洛行文帝詞五解夭夭園桃無子空長虚美難假偏輪不行一觧淮隂五刑鳥得弓藏保身全名獨有子房大憤不收襃衣無帶多言寡誠祗令事敗二解蘇秦之說六國以亡傾側賣主車裂固當賢矣陳軫忠而有謀楚懐不從禍卒不救三解禍夫吳起智小謀大西河何健伏尸何劣四解嗟彼郭生古之雅人智矣燕昭可謂得臣峩峩仲連齊之髙士北辭千金東蹈滄海五解白鵠豔歌何嘗一曰飛鵠行古詞四解飛来雙白鵠乃從西北来十十五五羅列成行一解妻卒被病行不能相隨五里一反顧六里一裴回二解吾欲銜汝去口噤不能開吾欲負汝去毛羽何摧穨三解樂哉新相知憂来生别離躇躊顧羣侣淚下不自知四觧念與君離别氣結不能言各各重自愛道逺歸還難妾當守空房閉門下重關若生當相見亡者㑹黄泉今日樂相樂延年萬歲期念與下為趨曲前有豔碣石歩出夏門行武帝詞四解雲行雨歩超越九江之臯臨觀異同心意懐㳺豫不知當復何從經過至我碣石心惆悵我東海雲行至此為豔東臨碣石以觀滄海水何淡淡山島竦峙樹木叢生百草豐茂秋風蕭瑟洪濤湧起日月之行若出其中星漢燦爛若出其裏幸甚至哉歌以言志觀滄海一解孟冬十月北風裵回天氣肅清繁霜霏霏鵾雞晨鳴鴻鴈南飛鷙鳥潛藏熊羆窟棲錢鎛停置農收積場逆旅正設以通賈商幸甚至哉歌以詠志冬十月二解鄉土不同河朔隆寒流澌浮漂舟船行難錐不入地豐藾深奥水竭不流冰堅可蹈士隱者貧勇侠輕非心常歎怨戚戚多悲幸甚至哉歌以詠志河朔寒三解神龜雖壽猶有竟時騰蛇乗霧終為土灰驥老伏歴志在千里烈士暮年壮心不已盈縮之期不但在天飬怡之福可得永年幸甚至哉歌以詠志神龜雖壽四觧何嘗豔歌何嘗行古辭五解何嘗快獨無憂但當飲醇酒炙肥牛一解長兄為二千石中兄被貂裘二解小弟雖無官爵鞍馬􅀈􅀈往来王侯長者遊三解但當在王侯殿上快獨摴蒲六博對坐彈碁四解男兒居世各當努力䠞廹日暮殊不久留五解少小相觸抵寒苦常相隨忿恚安足諍吾中道與卿共别離約身奉事君禮節不可虧上慙滄浪之夫下顧黄口小兒奈何復老心皇皇獨悲誰能知少小下為趨曲前為豔置酒野田黄雀行箜篌引亦用此曲東阿王詞四解置酒髙殿上親交從我游中厨辦豐膳烹羊宰肥牛秦筝何忼慨齊瑟和且柔一解陽阿奏竒舞京洛出名謳樂飲過三爵緩帯傾庻羞主稱千金壽賔奉萬年酬二解久要不可忘薄終義所尤謙謙君子徳磬折欲何求盛時不再来百年忽我遒三解驚風飄白日光景馳西流生存華屋處零落歸山丘先民誰不死知命復何憂四解為樂滿歌行四解為樂未幾時遭世險巇逢此百離伶丁荼毒愁懣難支遥望辰極天曉月移憂来闐心誰當我知一解戚戚多思慮耿耿不寜禍福無形唯念古人遜位躬耕遂我所願以兹自寜自鄙山棲守此一榮二解莫秋冽風起西蹈滄海心不能安攬衣起瞻夜北斗䦨干星漢照我去去自無它奉事二親勞心可言三解窮逹天所為智者不愁多為少憂安貧樂正道師彼荘周遺名者貴子熙同巇往者二賢名垂千秋四解飲酒歌舞不樂何須善哉照觀日月日月馳驅轗軻世間何有何無貪財惜費此一何愚命如鑿石見火居世竟能幾時但當歡樂自娛盡心極所熙怡安善飬君徳性百年保此期頥飲酒下為趨夏門歩出夏門行一曰隴西行眀帝詞二解歩出夏門東登首陽山哉夷叔仲尼稱賢君子退譲小人争先惟斯二子于今稱傳林鐘受謝節改時遷日月不居誰得久存善哉殊復善弦歌樂情一解商風夕起悲彼秋蟬變形易色隨風東西乃眷西顧雲霧相連丹霞蔽日采虹帯天弱水潺潺落葉翩翩孤禽失羣悲鳴其間善哉殊復善悲鳴在其間二解朝㳺清泠日莫歸朝㳺上為豔䠞廹日莫烏鵲南飛繞樹三匝何枝可依卒逢風雨樹折枝摧雄来驚雌雌獨愁棲夜失羣侶悲鳴裵回芃芃荆棘葛生綿綿感彼風人惆悵自憐月盈則沖華不再繁古来之說哉一言䠞廹下為趨王者布大化櫂歌行明帝詞五解王者布大化配乾稽后祗陽育則隂殺晷景應度移一解文徳以時振武功伐不隨重華儛干戚有苗服從媯二解蠢爾吳蜀虜馮江棲山阻哀哀王士民瞻仰靡依怙三解皇上悼愍斯宿昔奮天怒發我許昌宮列舟于長浦四解翌日乗波揚棹歌悲且凉太常拂白日旗幟紛設張五解将抗旄與鉞燿威於彼方伐辠以弔民清我東南疆将抗下為趨洛陽行鴈門太守行古詞八解孝和帝在時洛陽令王君本自益州廣漢民小行宦學通五經論一解眀知法令歴世衣冠從温補洛陽令治行致賢􅗙護百姓子飬萬民二解外行猛政内懐慈仁文武備具料民富貧移惡子姓名五篇著里端三解傷殺人比伍同辠對門禁鎦矛八尺捕輕薄少年加笞決辠詣馬市論四解無妄發賦念在理寃敕吏正獄不得苛煩財用錢三十買繩禮竿五解賢哉賢哉我縣王君臣吏衣冠奉事皇帝功曹主簿皆得其人六觧臨部居職不敢行恩清身苦體夙夜勞勤治有能名逺近所聞七解天年不遂蚤就奄昏為君作祠安陽亭西欲令後世莫不稱傳八解白頭吟與櫂歌同調古詞五解皚如山上雪皎若雲間月聞君有兩意故来相決絶一解平生共城中何嘗斗酒㑹今日斗酒㑹眀旦溝水頭蹀踥御溝上溝水東西流二解郭東亦有樵郭西亦有樵兩樵相推與無親為誰驕三解淒淒重淒淒嫁娶亦不啼願得一心人白頭不相離竹竿何嫋嫋魚尾何離簁男兒欲相知何用錢刀為䶘如五馬噉萁川上髙士嬉今日相對樂延年萬歲期一本云詞曰上有紫羅咄咄奈何楚調怨詩眀月東阿王詞七解明月照髙樓流光正裵回上有愁思婦悲歎有餘哀一解借問歎者誰自云客子妻夫行踰十載賤妾常獨棲二解念君過於渇思君劇於饑君為髙山栢妾為濁水泥三解北風行蕭蕭烈烈入吾耳心中念故人淚墮不能止四解沈浮各異路㑹合當何諧願作東北風吹我入君懐五解君懐常不開賤妾當何依恩情中道絶流止任東西六解我欲竟此曲此曲悲且長今日樂相樂别後莫相忘七解宋書卷二十一宋書卷二十一考證樂志三武帝駕六龍詞仙人玉女下来翺㳺翺監本誤朝魏武帝集作遨又正焜煌開王心焜煌魏武帝集作惶惶隨風削之雨削魏武帝集作列武帝厥初生祠過時時来微過時魏武帝集作時過文帝登山而逺望詞衆草之盛茂之魏文帝集作芝武帝蒿里行生民百遺一念之絕人腸絶魏武帝集作斷武帝陌上桑登彼九疑歴王門王門魏武帝集作玉門又絶人事㳺渾元若疾風㳺歘飄飄飄飄魏武帝集作飄翩臣承蒼按作翩字方與上文韻合文帝燕歌行念君客㳺多思腸魏文帝集注多思腸一作思斷腸文帝短歌行曰仁曰壽下曰字魏文帝集作者文帝燕歌行耿耿伏枕不能眠披衣出户歩東西四解展詩清歌聊自寛樂往哀来摧心肝悲風清厲秋氣寒羅幃徐動經秦軒魏文帝集耿耿二句在展詩二句之下又無悲風清厲二句臣承蒼按西讀若先與下寛叶古詩皆然唐以後始入齊韻又飛鳥晨鳴聲氣可憐魏文帝集無氣字武帝短歌行明明如月何時可掇掇諸本皆作輟今從魏武帝集改正本集呦呦鹿鳴四句在此二句之上此二句下又有越陌度阡枉用相存契濶談讌心念舊恩月明星稀烏鵲南飛遶樹三匝何枝可依八句武帝秋胡行韻意中述煩述魏武帝集作迷武帝苦寒行北上太二行二山二艱二哉二何二巍巍臣承蒼按据下五解之例巍巍兩字皆當有疉聲武帝塘上行傍能行儀儀儀儀一本作仁儀文帝善哉行有得者能卒得魏文帝集作徳明帝善哉行虎臣列將怫鬰免怒免一本作充古西門行何能坐愁怫鬰當復来兹一本復下有待字文帝煌煌京洛行淮隂五行烏得弓藏魏文帝集行作刑得作盡武帝歩出夏門行驥老伏歴志在千里魏武帝集驥老作老驥歴作櫪又飬怡之福可得永年怡魏武帝集作恬古豔歌何嘗行上慙滄浪之夫下顧黄口小兒臣承蒼按前東門行云上用倉浪天故下為黄口小兒此夫字亦當作天滄浪言天之色如水也宋書卷二十一考證
