髙臺曲臨髙臺以軒下有清水清且寒江有香草目以蘭黄鵠髙飛離哉飜關弓射鵠令我主夀萬年收中吾逺如期曲逺如期益如夀處天左側大樂萬嵗與天無極雅樂陳佳哉紛單于自歸動如驚心虞心大佳萬人還來謁者引鄉殿陳累世未嘗聞之增夀萬年亦誠哉石留曲石留涼陽涼石水流為沙錫以微河為香向始􅀈冷將風陽北逝肯無敢與于楊心邪懐蘭志金安薄北方開留離蘭魏鼓吹曲十二篇繆襲造漢第一曲朱鷺今第一曲初之平言魏也初之平義兵征神武奮金鼓鳴邁武徳揚洪名漢室微社稷傾皇道失桓與靈閹宦熾羣雄爭邊韓起亂金城中國擾無紀經赫武皇起旗旌麾天下天下平濟九州九州寧剏武功武功成越五帝􅥞三王興禮樂定紀綱普日月齊暉光右初之平曲凡三十句句三字漢第二曲思悲翁今第二曲戰滎陽言曹公也戰滎陽汴水陂戎士憤怒貫甲馳陳未成退徐滎二萬騎塹壘平戎馬傷六軍驚勢不集衆幾傾白日没時晦冥顧中牟心屏營同盟疑計無成頼我武皇萬國寧右戰滎陽曲凡二十句其十八句句三字二句句四字漢第三曲艾如張今第三曲獲呂布言曹公東圍臨淮生擒呂布也獲呂布戮陳宫芟夷鯨鯢驅騁羣雄囊括天下運掌中右獲呂布曲凡六句其三句句三字三句句四字漢第四曲上之囘今第四曲克官渡言曹公與袁紹戰破之於官渡也克紹官渡由白馬僵屍流血被原野賊衆如犬羊王師尚寡沙塠傍風飛揚轉戰不利士卒傷今日不勝後何望土山地道不可當卒勝大㨗震冀方屠城破邑神武遂章右克官度曲凡十八句其八句句四字一句句五字九句句三字漢第五曲翁離今第五曲舊邦言曹公勝袁紹於官渡還譙收藏士卒死亡也舊邦蕭條心傷悲孤䰟翩翩當何依游士戀故涕如摧兵起事大今願違博求親戚在者誰立廟置後䰟來歸右舊邦曲凡十二句其六句句三字六句句四字漢第六曲戰城南今第六曲定武功言曹公初破鄴武功之定始乎此也定武功濟黄河河水湯湯旦莫有横流渡袁氏欲衰兄弟尋干戈決漳水水流滂沱嗟城中如流魚誰能復顧室家計窮慮盡求來連和和不時心中憂戚賊衆内潰君臣奔北㧞鄴城奄有魏國王業艱難覽觀古今可為長歎右定武功曲凡二十一句其五句句三字三句句六字十二句句四字一句五字漢第七曲巫山髙今第七曲屠柳城言曹公越北塞歴白檀破三郡烏桓於柳城也屠柳城功誠難越度隴塞路漫漫北踰岡平但聞悲風正酸蹋頓授首遂登白狼山神武慹海外永無北顧患右屠柳城曲凡十句其三句句三字三句句四字三句句五字一句六字漢第八曲上陵今第八曲平南荆言曹公南平荆州也南荆何遼遼江漢濁不清菁茅乆不貢王師赫南征劉琮據襄陽賊備屯樊城六軍廬新野金鼓震天庭劉子面縳至武皇許其成許與其成撫其民陶陶江漢間普為大魏臣大魏臣向風思自新思自新齊功古人在昔虞與唐大魏得與均多選忠義士為㗋脣天下一定萬世無風塵右平南荆曲凡二十四句其十七句句五字四句句三字三句句四字漢第九曲將進酒今第九曲平關中言曹公征馬超定關中也平關中路向潼濟濁水立髙墉鬭韓馬離羣凶選驍騎縱兩翼虜崩潰級萬億右平關中曲凡十句句三字漢第十曲有所思今第十曲應帝期言曹文帝以聖徳受命應運期也應帝期於昭我文皇歴數承天序龍飛自許昌聰明昭四表恩徳動遐方星辰為埀燿日月為重光河洛吐符瑞草木挺嘉祥麒麟歩郊野黄龍游津梁白虎依山林鳯凰鳴髙岡考圖定篇籍功配上古羲皇羲皇無遺文仁聖相因循運期三千嵗一生聖明君堯授舜萬國萬國皆附親四門為穆穆教化常如神大魏興盛與之為鄰右應帝期曲凡二十六句其一句三字二句四字二十二句句五字一句六字漢第十一曲芳樹今第十一曲邕熙言魏氏臨其國君臣邕穆庶績咸熙也邕熙君臣合徳天下治隆帝道獲瑞寳頌聲並作洋洋浩浩吉日臨髙堂置酒列名倡歌聲一何紆餘雜笙簧八音諧有紀綱子孫永建萬國夀考樂無央右邕熙曲凡十五句其六句句三字三句句四字一句二字三句句五字二句句六字漢第十二曲上邪今第十二曲太和言魏明帝繼體承統太和改元徳澤流布惟太和元年皇帝踐阼聖且仁徳澤為流布灾蝗一時為絶息上天時雨露五穀溢田疇四民相率遵軌度事務澂清天下獄訟察以情元首明魏家如此那得不太平右太和曲凡十三句其二句句三字五句句五字三句句四字三句句七字晉鼓吹歌曲二十二篇傅𤣥作靈之祥靈之祥言宣皇帝之佐魏猶虞舜之事堯也既有石瑞之徵又能用武以誅孟度之逆命也靈之祥石瑞章旌金徳出西方天命降授宣皇應期運時龍驤繼大舜佐陶唐贊武文建帝綱孟氏叛據南疆追有扈亂五常呉寇勁蜀虜彊交誓盟連遐荒宣赫怒奮鷹揚震乾威燿電光陵九天䧟石城梟逆命拯有生萬國安四海寧宣受命古思悲翁行宣受命言宣皇帝禦諸葛亮養威重運神兵亮震怖而死宣受命應天機風雲時動神龍飛禦葛亮鎮雝涼邊境安民夷康務節事勤定傾覽英雄保持盈淵穆穆赫明明沖而泰天之經養威重運神兵亮乃震死天下寧征遼東古艾而張行征遼東言宣皇帝陵大海之表討滅公孫淵而梟其首也征遼東敵失據威靈邁日域淵既授首羣逆破膽咸震怖朔北響應海表景附武功赫赫徳雲布宣輔政古上之囘行宣輔政言宣皇帝聖道深逺撥亂反正網羅文武之才以定二儀之序也宣皇輔政聖烈深撥亂反正從天心網羅文武才慎厥所生所生賢遺教施安上治民化風移肇剏帝基洪業埀於鑠明明時赫戲功濟萬世定二儀定二儀雲澤雨施海外風馳時運多古􅗙離行時運多言宣皇帝致討呉方有征無戰也時運多難道教痡天地變化有盈虚蠢爾呉蠻虎視江湖我皇赫斯致天誅有征無戰弭其圖天威横被震東隅景龍飛景龍飛言景帝克明威教賞從夷逆胙隆無疆崇此洪基也景龍飛御天威聰鑑𤣥發動與神明恊機從之者顯逆之者滅夷文教敷武功巍普被四海萬邦望風莫不來綏聖徳潛斷先天弗違弗違祥享世永長猛以致寛道化光赫明明胙隆無疆帝績惟期有命既集崇此洪基平玉衡古巫山髙行平玉衡言景皇帝一萬國之殊風齊四海之乖心禮賢養士而纂洪業也平玉衡糾姦囘萬國殊風四海乖禮賢養土羈御英雄思心齊纂成洪業崇皇階品物咸亨聖敬日躋聰鑑盡下情明明綜天機文皇綂百揆古上陵行百揆言文皇帝始綂百揆用人有序以敷太平之化也文皇統百揆繼天理萬方武將鎮四隅英佐盈朝堂謀言恊秋蘭清風發其芳洪澤所漸潤礫石為珪璋大道侔五帝盛徳踰三王咸光大上參天與地至化無内外無内外六合並康乂並康乂遘兹嘉㑹在昔羲與農大晉徳斯邁鎮征及諸州為蕃衛功濟四海洪烈流萬世因時運古將進酒行因時運言文皇帝因時運變聖謀潛施解長蛇之交離羣桀之黨以武濟文審其大計以邁其徳也因時運聖䇿施長蛇交解羣桀離勢窮奔呉虎騎厲惟武進審大計時邁其徳清一世惟庸蜀古有所思行惟庸蜀言文皇帝既平萬乘之蜀封建萬國復五等之爵也惟庸蜀僭號天一隅劉氏逆帝命禪亮承其餘擁衆數十萬闚隙乘我虛驛騎進羽檄天下不遑居姜維屢寇邊隴上為荒墟文皇愍斯民歴世受辠辜外謨蕃屛臣内謀衆士夫爪牙應指授腹心同獻良圖良圖恊成文大興百萬軍雷鼓震地起猛勢陵浮雲逋虜畏天誅面縳造壘門萬里同風教逆命稱妾臣光建五等紀綱天人天序古芳樹行天序言聖皇應歴受禪𢎞濟大化用人各盡其才也天序應歴受禪承靈祜御羣龍勒螭虎𢎞濟大化英儁作輔明明統萬機赫赫鎮四方咎繇稷契之疇恊蘭芳禮王臣覆兆民化之如天與地誰敢愛其身大晉承運期古上邪行大晉承運期言聖皇應籙受圖化象神明也大晉承運期徳隆聖皇時清宴白日􅑰光應籙圖陟帝位繼天正玉衡化行象神明至哉道隆虞與唐元首敷洪化百寮股肱並忠良民大康隆隆赫赫福胙盈無疆金靈運古君馬黄靈運言聖皇踐阼致敬宗廟而孝道施於天下也金靈運天符發聖徵見參日月惟我皇體神聖受魏禪應天命皇之興靈有徴登大麓御萬乘皇之輔若虓虎爪牙奮莫之禦皇之佐贊清化百事理萬邦賀神祗應嘉瑞章㳟享祀薦先皇樂時奏磬管鏘鼓淵淵鐘喤喤奠尊俎實玉觴神歆響咸說康宴孫子祐無疆大孝烝烝徳教被萬方於穆我皇於穆言聖皇受命徳合神明也於穆我皇盛徳聖且明受禪君世光濟羣生普天率土莫不來庭顒顒六合内望風仰泰清萬國雝雝興頌聲大化洽地平而天成七政齊玉衡惟平峨峨佐命濟濟羣英夙夜乾乾萬機是理雖治興匪荒寧謙道光沖不盈天地合徳日月同榮赫赫煌煌燿幽㝠三光克從於顯天埀景星龍鳯臻甘露宵零肅神祗祗上靈萬物欣戴自天效其成仲春振旅古聖人出行仲春言大晉申文武之教田獵以時也仲春振旅大致民武教於時日新師執提工執鼓坐作從節有序盛矣允文允武蒐田表禡申法誓遂圍禁獻社祭允矣時明國制文武並用禮之經列車如戰大教明古今誰能去兵大晉繼天濟羣生夏苗田古臨髙臺行苗田言大晉田狩從時為苗除害也夏苗田運將徂軍國異容文武殊乃命羣吏選車徒辯其名號贊契書王軍啓八門行同上帝居時路建大麾雲旗翳紫虛百官象其事疾則疾徐則徐囘衡旋軫罷陳敝車獻禽享祠烝烝配有虞惟大晉徳參兩儀化雲敷仲秋獮田古逺期行仲秋言大晉雖有文徳不廢武事從時以殺伐也仲秋獮田金徳常剛涼風清且厲凝露結為霜白虎司辰蒼隼時鷹揚鷹揚猶周尚父從天以殺伐春秋時敘雷霆震威燿進退由鉦鼓致禽祀祊羽毛之用充軍府赫赫大晉徳芬烈陵三五敷化以文雖治不廢武光宅四海永享天之祜從天道古石留行從天道言仲冬大閱用武脩文大晉之徳配天也從天道握神契三時亦講武事冬大閱鳴鐲振鼓鐸旌旗象虹霓文制其中武不窮武動軍誓衆禮成而義舉三驅以崇仁進止不失其序兵卒練將如虎惟虓虎氣陵青雲解圍三面殺不殄羣偃旌麾班六軍獻享烝脩典文嘉大晉徳配天祿報功爵俟賢饗燕樂受兹百祿嘉萬年唐堯古務成行古曲亡唐堯言聖皇陟帝位徳化光四表也唐堯咨務成謙謙徳所興積漸終光大履霜致堅氷神明道自然河海猶可凝舜禹綂百揆元凱以次升禪讓應天歴睿聖世相承我皇陟帝位平衡正凖䋲徳化飛四表祥氣見其徴興王坐俟旦亡主恬自矜致逺由近始覆簣成山陵披圖按先籍有其證靈𤣥雲古𤣥雲行古曲亡𤣥雲言聖皇用人各盡其材也𤣥雲起山嶽祥氣萬里㑹龍飛何蜿蜿鳯翔何翽翽昔在唐虞朝時見青雲際今親遊方國流光溢天外鶴鳴在後園清音隨風邁成湯隆顯命伊摯來如飛周文獵渭濵遂載呂望歸符合如影響先天天弗違輟耕總地綱解褐衿天維元功配二主芬馨世所稀我皇叙羣才洪烈何巍巍桓桓征四表濟濟理萬機神化感無方髦才盈帝畿丕顯惟昧旦日新孔所咨茂哉聖明徳日月同光輝伯益古黄爵行古曲亡伯益言赤烏銜書有周公興今聖皇受命神雀來也伯益佐舜禹職掌山與川德侔十六相思心入無閒智理周萬物下知衆鳥言黄雀應清化翔集何翩翩和鳴棲庭樹徘徊雲日間夏桀為無道密網施山阿酷祝振纎網當奈黄雀何殷湯崇天徳去其三靣羅逍遥羣飛來鳴聲乃復和朱雀作南宿鳯凰統羽羣赤鳥銜書至天命瑞周文神雀今來遊為我受命君嘉祥致天和膏澤降青雲蘭風發芳氣闔世同其芬釣竿古釣竿行漢鐃歌二十三無釣竿釣竿言聖皇徳配堯舜又有呂望之佐以濟大功致太平也釣竿何冉冉甘餌芳且鮮臨川運思心㣲綸沈九淵太公寳此術乃在靈祕篇機變隨物移精妙貫未然遊魚驚著釣潛龍飛戾天戾天安所至撫翼翔太清太清一何異兩儀出渾成玉衡正三辰造化賦羣形退願輔聖君與神合其靈我君𢎞逺略天人不足并天人初并時昧昧何茫茫日月有徴兆文象興二皇蚩尤亂生民黄帝用兵征萬方逮夏禹而徳衰三代不及虞與唐我皇聖徳配堯舜舜禪即祚享天祥率土䝉祐靡不肅庶事康庶事康穆穆明明荷百祿保無極永泰平呉鼓吹曲十二篇韋昭造炎精缺者言漢室衰武烈皇帝奮迅猛志念在匡救然而王迹始乎此也漢曲有朱鷺此篇當之第一炎精缺漢道㣲皇綱弛政徳違衆姦熾民㒺依赫武烈越龍飛陟天衢燿靈威鳴靁鼓抗電麾撫乾衡鎮地機厲虎旅騁熊羆發神聽吐英竒張角破邊韓羈宛潁平南土綏神武章渥澤施金聲震仁風馳顯髙門啓皇基統㒺極埀將來右炎精缺曲凡三十句句三字漢之季者武烈皇帝悼漢之㣲痛卓之亂興兵奮擊功蓋海内也漢曲有思悲翁此篇當之第二漢之季董卓亂桓桓武烈應時運義兵興雲旗建厲六師羅八陳飛鳴鏑接白刃輕騎發介士奮醜虜震使衆散劫漢主遷西館雄豪怒元惡僨赫赫皇祖功名聞右漢之季曲凡二十句其十八句句三字二句句四字攄武師者言大皇帝卒武烈之業而奮征也漢曲有艾如張此篇當之第三攄武師斬黄祖肅夷凶族革平西夏炎炎大烈震天下右攄武師曲凡六句其三句句三字三句句四字烏林者言曹操既破荆州從流東下欲來争鋒大皇帝命將周瑜逆擊之於烏林而破走也漢曲有上之囘此篇當之第四曹操北伐㧞柳城乘勝席卷遂南征劉氏不睦八都震驚衆既降操屠荆舟車十萬揚風聲議者狐疑慮無成頼我大皇發聖明虎臣雄烈周與程破曹烏林顯章功名右伐烏林曲凡十八句其十句句四字八句句三字秋風者言大皇帝說以使民民忘其死漢曲有􅗙離此篇當之第五秋風揚沙塵寒露霑衣裳角弓持弦急鳩鳥化為鷹邊埀飛羽檄寇賊侵界疆跨馬披介胄忼慨懐悲傷辭親向長路安知存與亡窮逺固有分志士思立功邀之戰塲身逸獲髙賞身没有遺封右秋風曲凡十五句其十四句句五字一句四字克皖城者言曹操志圖并兼而令朱光為廬江太守上親征光破之於皖城也漢曲有戰城南此篇當之第六克滅皖城遏寇賊惡此凶孽阻姦慝王師赫征衆傾覆除穢去暴戢兵革民得就農邊境息誅君弔臣昭至徳右克皖城曲凡十二句其六句句三字六句句四字關背徳者言蜀將關侯背棄呉徳心懐不軌大皇帝引師浮江而禽之也漢曲有巫山髙此篇當之第七關背徳作䲭張割我邑城圖不祥稱兵北伐圍樊襄陽嗟臂大於股將受其殃巍巍呉聖主叡徳與𤣥通與𤣥通親任呂䝉泛舟洪汜池㴑渉長江神武一何桓桓聲烈正與風翔歴撫江安城大據郢邦虜之授首百蠻咸來同盛哉無比隆右關背徳曲凡二十一句其八句句四字二句句六字七句句五字四句句三字通荆門者言大皇帝與蜀交好齊盟中有關侯自失之愆戎蠻樂亂生變作患蜀疑其眩呉惡其詐乃大治兵終復初好也漢曲有上陵此篇當之第八荆門限巫山髙峻與雲連蠻夷阻其險歴世懐不賔漢王據蜀郡崇好結和親乖㣲中情疑讒夫亂其間大皇赫斯怒虎臣勇氣震蕩滌幽藪討不㳟觀兵揚炎燿厲鋒整封疆整封疆闡揚威武容功赫戲洪烈炳章邈矣帝皇世聖呉同厥風荒裔望清化化恢𢎞煌煌大呉延祚永未央右通荆門曲凡二十四句其十七句句五字四句句三字三句句四字章洪徳者言大皇帝章其大徳而逺方來附也漢曲有將進酒此篇當之第九章洪徳邁威神感殊風懐逺鄰平南裔齊海濵越裳貢扶南臣珍貨充庭所見日新右章洪徳曲凡十句其八句句三字二句句四字從厯數者言大皇帝從籙圗之符而建大號也漢曲有有所思此篇當之第十從厯數於穆我皇帝聖哲受之天神明表竒異建號剏皇基聰叡恊神思徳澤浸及昆蟲浩蕩越前代三光顯精燿隂陽稱至治肉角歩郊畛鳯凰棲靈囿神龜游沼池圖䜟摹文字黄龍覿鱗符祥日月記覽徃以察今我皇多噲事上欽昊天象下副萬姓意光被彌蒼生家戸䝉惠賚風教肅以平頌聲章嘉喜大呉興隆綽有餘裕右從歴數曲凡二十六句其一句句三字三句句四字二十二句句五字一句六字承天命者言上以聖徳踐位道化至徳盛也漢曲有芳樹此篇當之第十一承天命於穆聖徳三精􅑰象符靈表徳巨石立九穗植龍金其鱗烏赤其色輿人歌億夫歎息超龍升襲帝服躬淳懿體𤣥嘿夙興臨朝勞謙日􅉴易簡以崇仁放逺讒與慝舉賢才親近有徳均田疇茂稼穡審法令定品式考功能明黜陟人思自盡惟心與力家國治王道直思我帝皇夀萬億長保天祿胙無極右承天命曲凡三十四句其十九句句三字二句句五字十三句句四字𤣥化者言上修文訓武則天而行仁澤流洽天下喜樂也漢曲有上邪此篇當之第十二𤣥化象以天陛下聖真張皇綱率道以安民惠澤宣流而雲布上下睦親君臣酣宴樂激發弦歌揚妙新脩文籌廟勝須時備駕廵洛津康哉樂四海歡忻越與三五鄰右𤣥化曲凡十三句其五句句五字二句句三字三句句四字三句句七字今鼔吹鐃歌詞樂人以音聲相傳話不可復解大竭夜烏自云何來堂吾來聲烏奚姑悟姑尊盧聖子黄尊來餭清嬰烏白日為隨來郭吾微令吾應龍夜烏由道何來直子為烏奚如悟姑尊盧雞子聽烏虎行為來明吾微令吾詩則夜烏道祿何來黒洛道烏奚悟如尊爾尊盧起黄華烏伯遼為國日忠兩令吾伯遼夜烏若國何來日忠雨烏奚如悟姑尊盧靣道康尊錄龍永烏赫赫福胙夜音㣲令吾右四解上邪曲幾令吾幾令諸韓亂法正令吾幾令吾諸韓從聽心令吾若里洛何來韓微令吾尊盧忌盧文盧子路子路為路雞如文盧炯烏諸胙㣲令吾幾令諸韓或公隨令吾幾令吾幾諸或言隨令吾黑洛何來諸韓㣲令吾尊盧安成隨來免路路子為吾路奚如文盧炯烏諸胙㣲令吾右九解晚芝曲漢曲有逺期疑是幾令吾呼歴舎居執來隨咄武子邪令烏銜針相風其右其右幾令吾呼羣議破葫執來隨吾咄武子邪令烏令烏令􅠱入海相風及後幾令吾呼無公赫吾執來隨吾咄武子邪令烏無公赫吾婮立諸布始布右三解艾張曲鼓吹鐃歌十五篇何承天義熙中私造朱路篇朱路揚和鸞翠蓋燿金華𤣥牡飾樊纓流旌拂飛霞雄㦸闢曠塗班劒翼髙車三軍且莫喧聽我奏鐃歌清鞞驚短簫朗鼓節鳴笳人心惟愷豫兹音亮且和輕風起紅塵渟瀾發㣲波逸韻騰天路穨響結城阿仁聲被八表威震振九遐嗟嗟介胄士勗哉念皇家思悲公篇思悲公懐衮衣東國何悲公西歸公西歸流二叔幼主既悟偃禾復偃禾復聖志申營都新邑從斯民從斯民徳惟明制禮作樂興頌聲興頌聲致嘉祥鳴鳯爰集萬國康萬國康猶弗已握髪吐餐下羣士惟我君繼伊周親覩盛世復何求雝離篇雝士多離心荆民懐怨情二凶不量徳構難稱其兵王人銜朝命正辭糾不庭上宰宣九伐萬里舉長旌樓船掩江濆駟介飛重英歸徳戒後夫賈勇尚先鳴逆徒既不濟愚智亦相傾霜鋒未及染鄢郢忽已清西川無濳鱗北渚有奔鯨淩威致天府一戰夷三城江漢被羙化宇宙歌大平惟我東郡民曾是深推誠戰城南篇戰城南衡黄塵丹旌電烻鼓靁震勍敵猛戎馬殷横陳亘野若屯雲仗大從應三靈義之所感士忘生長劒擊繁弱鳴飛鏑炫晃亂奔星虎騎躍華眊旋朱火延起騰飛煙驍雄斬髙旗搴長角浮呌響清天夷羣寇殪逆徒餘黎霑惠詠來蘇奏愷樂歸皇都班爵獻俘邦國娯巫山髙篇巫山髙三峡峻青壁千尋深谷萬仞崇巖冠靈林冥冥山禽夜響晨猿相和鳴洪波迅澓載逝載停悽悽商旅之客懐苦情在昔陽九皇綱㣲李氏竊命宣武燿靈威蠢爾逆縱復踐亂機王旅薄伐傳首來至京師古之為國惟徳是貴力戰而虐民鮮不顛墜矧乃叛戾伊胡能遂咨爾巴子無放肆上陵者篇上陵者相追攀被服纎麗振綺紈攜童幼升崇巒南望城闕鬱槃桓王公第通衢端髙甍華屋列朱軒臨濬谷掇秋蘭士女悠奕映隰原指營丘感牛山爽鳩既沒景君歎嗟嵗聿游不還志氣衰沮𤣥鬢班野莽宿墳土乾顧此纍纍中心酸生必死亦何怨取樂今日展情懽將進酒篇將進酒慶三朝備繁禮薦嘉肴榮枯換霜霧交緩春帯命朋僚車等旗馬齊鑣懐溫充樂林濠士失志慍情勞思㫖酒寄逰遨敗徳人甘醇醪耽長夜或淫妖興屢舞厲哇謡形傞傞聲號呶首既濡志亦荒性命夭國家亡嗟後生節酣觴匪酒辜孰為殃君馬篇君馬麗且閑揚鑣騰逸姿駿足躡流景髙歩追輕飛冉冉六轡柔奕奕金華暉輕霄翼羽蓋長風靡淑旂願為范氏驅雝容歩中畿豈效詭遇子馳騁趣危機鉛陵策良駟造父為之悲不怨呉坂峻但恨伯樂稀赦彼岐山盗實躋韓原師奈何漢魏主縱情營所私疲民甘藜藿廐馬患盈肥人畜貿厥養蒼生將焉歸芳樹篇芳樹生北庭豐隆正裴徊翠穎陵冬秀紅葩迎春開佳人閑幽室惠心婉以諧蘭房掩綺幌綠草被長階日夕逰雲際歸禽命同棲皓月盈素景涼風拂中閏哀弦理虛堂要妙清且悽嘯歌流激楚傷此碩人懐梁塵集丹帷㣲飈揚羅袿豈怨嘉時莫徒惜良願乖有所思篇有所思思昔人曾閔二子善養親和顔色奉晨昏至誠烝烝通明神鄒孟軻為齊卿稱身受祿不貪榮道不用獨􅗙楹三徙既誶禮義明飛鳥集猛獸附功成事畢乃更娶哀我生遘凶旻幼罹荼毒偹艱辛慈顔絶見無因長懐永思託丘墳雉子遊原澤篇雉子遊原澤初懐耿介心飲啄雖勤苦不願棲園林古有避世士抗志清霄岑浩然寄卜肆揮櫂通川隂消揺風塵外散髪撫鳴琴卿相非所眄何况於千金功名豈不羙寵辱亦相尋氷炭結六府憂虞纒胸襟當世須大度量己不克任三復泉流誡自驚良已深上邪篇上邪下難正衆枉不可矯音和響必清端影緣直表大化揚仁風齊人猶偃草聖王既已沒誰能𢎞至道開春湛柔露代終肅嚴霜承平貴孔孟政敝侯申商孝公明賞罰六世猶克昌李斯肆濫刑秦世所以亡漢宣隆中興魏祖寧三方譬彼針與石效疾故稱良行葦非不厚悠悠何詎央琴瑟時未調改弦當更張矧乃治天下此要安可忘臨髙臺篇臨髙臺望天衢飄然輕舉陵太虛攜列子超帝鄉雲衣雨帶乘風翔肅龍駕㑹瑶臺清暉浮景溢蓬萊濟西海濯洧盤佇立雲岳結幽蘭馳迅風遊炎州願言桑梓思舊遊傾霄蓋靡電旌降彼天塗頽窈冥辭仙族歸人羣懐忠抱義奉明君任窮達隨所遭何為逺想令心勞逺期篇逺期千里客肅駕候良辰近命城郭友具爾惟懿親髙門啓䨇闈長筵列嘉賔中唐舞六佾三廂羅樂人簫管激悲音羽毛揚華文金石響髙宇絃歌動梁塵脩標多巧捷九劒亦入神遷善自雅調成化由清均主人垂隆慶羣士樂亡身願言聖明君邇期保萬春石流篇石上流水湔湔其波發源幽岫永歸長河瞻彼逝者嵗月其偕子在川上惟以增懐嗟我殷憂載勞寤寐遘此百罹有志不遂行年倐忽長勤是嬰永言沒世悼兹無成幸遇開泰沐浴嘉運緩帶安寢亦又何愠古之為仁自求諸己虛情遥慕終於徒己聖人制禮樂一篇巾舞歌一篇按景袧廣樂記言字訛謬聲辭雜書宋鼓吹鐃歌辭四篇舊史言詁不可解漢鼓吹鐃歌十八篇按古今樂錄皆聲辭艶相雜不可復分宋書卷二十二宋書卷二十二考證樂志四靈芝篇伯瑜年七十采衣以娯親伯瑜一本作伯俞臣照按困學紀聞引陳思王此二語云人但知老萊子之事而不知伯瑜顧老萊子伯瑜是否兩人亦無可考也孟冬篇鐘擊位無餘曹植集作擊鐘釂無餘碣石篇臣承蒼按此曲辭即前二十一卷所載歩出夏門行四解之一乃魏武帝作芳樹曲妬人之子悲殺人妬一本作如漢第五曲翁離今第五曲舊邦翁晉書作雍臣承蒼按晉鼓吹歌曲内有時運多一篇題曰古􅗙離行􅗙與雍通作翁誤也靈之祥篇呉冦勁勁晉書作叛宣受命篇亮乃震死天下寧死傅集作斃晉書寧上有安字征遼東篇淵既授首淵晉書作公孫傅集同臣承蒼按晉書成於唐太宗避髙祖諱故稱公孫後人校刻傳集復據晉書改竄作淵也宣輔政篇雲澤雨施澤晉書作行景龍飛篇聰鑑𤣥發發字晉書及傅集皆作察平玉衡篇纂成洪業成晉書傅集皆作戎文皇統百揆篇武將鎮四隅諸本俱作武皇鎮四㝢今據晉書傅集改正惟庸蜀篇腹心同獻良圖晉書無同字天序篇天序句應厯受禪句晉書天序歴為一句應受禪為一句仲秋獮田篇鷹揚猶周尚父從天以殺伐晉書無周字又從作順從天道晉書作順天道臣承蒼按沈約仕齊作宋書其後復顯於梁武帝父名順之故凡順字皆改為從其有仍用順字者殆傳寫之誤也從天道篇三時亦講武事亦晉書作示以三時示為句又將如虎惟虓虎晉書如字下有虓字又受兹百祿嘉萬年嘉晉書作夀唐堯篇披圖按先籍有其證靈晉書靈字下有液字臣承蒼按原文當有液字後人疑此二句韻不諧故去一液字以靈字合於上文繩徴矜陵等字為一韻不知古人詩歌凡今庚青部之字皆不與蒸部同用若存此液字則與上句藉字别為一韻更合也秋風曲志士思立功一本複思立功三字君馬篇願為范氏驅雝容歩中畿豈效詭遇子馳騁趣危機臣承蒼按范氏二字疑作範我與下文詭遇相對觀第十曲有所思篇直述孟子為齊卿事可見其用意所在上邪篇上邪下難正衆枉不可矯臣承蒼按漢鼔吹鐃歌其第十二曲曰上邪本無意義邪字大約與耶同是語助辭繆襲傅元盡更其名雖依漢曲次第而辭㫖各殊第十二曲皆不用上邪二字至何承天作直以為上下之上邪正之邪其雍離一篇或作􅗙離亦無意義何承天直以為雍州之雍離合之離首云雍士多離心然則古人作樂府苐各以其意為之非有定式古今樂錄雖言所以製曲之意後之作者亦不盡拘若其音節則益不可攷矣宋書卷二十二考證
