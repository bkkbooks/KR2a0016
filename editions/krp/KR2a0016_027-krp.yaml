body:
  text: 宋書卷二十七梁沈約撰志第十七符瑞上夫體睿窮幾含靈獨秀謂之聖人所以能君四海而役萬物使動植之類莫不各得其所百姓仰之懽若親戚芬若椒蘭故為旗章輿服以崇之玉璽黄屋以尊之以神器之重推之於兆民之上自中智以降則萬物之為役者也性識殊品蓋有愚暴之理存焉見聖人利天下謂天下可以為利見萬物之歸聖人謂之利萬物力争之徒至以逐鹿方之亂臣賊子所以多於世也夫龍飛九五配天光宅有受命之符天人之應易曰河出圖洛出書而聖人則之符瑞之義大矣赫胥燧人之前無聞焉太昊帝宓犧氏母曰華胥燧人之世有大迹出雷澤華胥履之而生伏犧於成紀蛇身人首有聖徳燧人氏没宓犧代之受龍圖畫八卦所謂河出圖者也有景龍之瑞炎帝神農氏母曰女登遊於華陽有神龍首感女登於常羊山生炎帝人身牛首有聖徳致大火之瑞嘉禾生醴泉出黄帝軒轅氏母曰附寳見大電光繞北斗樞星照郊野感而孕二十五月而生黄帝於夀丘弱而能言龍顏有聖徳劾百神朝而使之應龍攻蚩尤戰虎豹熊羆四獸之力以女魃止淫雨天下既定聖徳光被羣瑞畢臻有屈軼之草生於庭佞人入朝則草指之是以佞人不敢進有景雲之瑞有赤方氣與青方氣相連赤方中有兩星青方中有一星凡三星皆黄色以天清明時見於攝提名曰景星黄帝黄服齋於中宮坐於𤣥扈洛水之上有鳯凰集不食生蟲不履生草或止帝之東園或巢於阿閣或鳴於庭其雄自歌其雌自舞麒麟在囿神鳥來儀有大螻如羊大螾如虹黄帝以土氣勝遂以土徳王五十年秋七月庚申天霧三日三夜晝昏黄帝以問天老力牧容成曰於公何如天老曰臣聞之國安其主好文則鳯凰居之國亂其主好武則鳯凰去之今鳯凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之天有嚴敎以賜帝帝勿犯也乃召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋霧除遊於洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流於海得圖書焉龍圖出河龜書出洛赤文篆字以授軒轅軒轅接萬神於明庭今寒門谷口是也帝摰少昊氏母曰女節見星如虹下流華渚既而夢接意感生少昊登帝位有鳯凰之瑞帝顓頊高陽氏母曰女樞見瑤光之星貫月如虹感已於幽房之宮生顓頊於若水首戴干戈有聖徳生十年而佐少昊氏二十而登帝位帝嚳高辛氏生而駢齒有聖徳代高陽氏王天下使鼓人拊鞞鼓擊鍾磬鳯凰鼓翼而舞帝堯之母曰慶都生於斗維之野常有黄雲覆䕶其上及長觀於三河常有龍隨之一旦龍負圖而至其文要曰亦受天祐眉八彩鬢髪長七尺二寸面鋭上豐下足履翼宿既而陰風四合赤龍感之孕十四月而生堯於丹陵其狀如圖及長身長十尺有聖徳封於唐夢攀天而上高辛氏衰天下歸之在帝位七十年景星出翼鳯凰在庭朱草生嘉禾秀甘露潤醴泉出日月如合璧五星如連珠厨中自生肉其薄如箑搖動則風生食物寒而不臭名曰箑脯又有草夾階而生月朔始生一莢月半而生十五莢十六日以後日落一莢及晦而盡月小則一莢焦而不落名曰蓂莢一曰歴莢歸功於舜将以天下禪之乃潔齋修堙場於河雒擇良日率舜等升首山遵河渚有五老游焉蓋五星之精也相謂曰河圖將來告帝以期知我者重瞳黄姚五老因飛為流星上入昴二月辛丑昧明禮備至於日􅉴榮光出河休氣四塞白雲起回風揺乃有龍馬銜甲赤文緑色臨壇而止吐甲圖而去甲似龜背廣九尺其圖以白玉為檢赤玉為字泥以黄金約以青繩檢文曰闓色授帝舜言虞夏殷周秦漢當授天命帝乃寫其言蔵於東序後二年二月仲辛率羣臣沈璧於洛禮畢退俟至於下􅉴赤光起𤣥龜負書而出背甲赤文成字止於壇其書言當禪舜遂讓舜帝舜有虞氏母曰握登見大虹意感而生舜於姚墟目重瞳子故名重華龍顏大口黑色身長六尺一寸舜父母憎舜使其塗廪自下焚之舜服鳥工衣服飛去又使浚井自上塡之以石舜服龍工衣自傍而出耕於歴山夢眉長與髪等及即帝位蓂莢生於階鳯凰巢於庭擊石拊石百獸率舞景星出房地出乘黄之馬西王母獻白環玉玦舜在位十有四年奏鐘石笙筦未罷而天大靁雨疾風發屋拔木桴皷播地鐘磬亂行舞人頓伏樂正狂走舜乃􅗙璿持衡而笑曰明哉夫天下非一人之天下也亦乃見於鐘石笙筦乎乃薦禹於天使行天子事於時和氣普應慶雲興焉若煙非煙若雲非雲郁郁紛紛蕭索輪囷百工相和而歌慶雲帝乃倡之曰慶雲爛兮糺縵縵兮日月光華旦復旦兮羣臣咸進稽首曰明明上天爛然星陳日月光華𢎞予一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠於予論樂配天之靈遷於聖賢莫不咸聼鼚乎皷之軒乎舞之精華以竭褰裳去之於是八風修通慶雲叢聚蟠龍奮迅於其藏蛟魚踊躍於其淵龜鼈咸出其宂遷虞而事夏舜乃設壇於河依堯故事至於下􅉴榮光休氣至黄龍負圖長三十二尺廣九尺出於壇畔赤文綠錯其文言當禪禹帝禹有夏氏母曰修已出行見流星貫昴夢接意感既而吞神珠修已背剖而生禹於石紐虎鼻口兩耳參鏤首戴鉤鈐匈有玉斗足文履已故名文命長有聖徳長九尺九寸夢自洗於河以手取水飲之又有白狐九尾之瑞當堯之世舜舉之禹觀於河有長人白面魚身出曰吾河精也呼禹曰文命治滛言訖授禹河圖言治水之事乃退入於淵禹治水既畢天錫𤣥珪以告成功夏道將興草木暢茂青龍止於郊祝融之神降於崇山乃受舜禪即天子之位洛出龜書六十五字是為洪範此謂洛出書者也南巡狩濟江中流有二黄龍負舟舟人皆懼禹笑曰吾受命於天屈力以養人生性也死命也奚憂龍哉龍於是曵尾而逝高辛氏之世妃曰簡狄以春分𤣥鳥至之日從帝祀郊禖與其妹浴於𤣥丘之水有𤣥鳥衘卵而墜之五色甚好二人競取覆以玉筐簡狄先得而吞之遂孕匈剖而生契長為堯司徒成功於民受封於商後十三世生主癸主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙豐下鋭上晳而有􅐖句身而揚聲身長九尺臂有四肘是曰殷湯湯在亳能修其徳伊摰將應湯命夢乘船過日月之傍湯乃東至於洛觀帝堯之壇沈璧退立黄魚雙踴黑鳥隨魚止於壇化為黑玉又有黑龜並赤文成字言夏桀無道湯當代之檮杌之神見於邳山有神牽白狼銜鉤而入商朝金徳將盛銀自山溢湯將奉天命放桀夢及天而舓之遂有天下商人後改天下之號曰殷高辛氏之世妃曰姜嫄助祭郊禖見大人迹履之當時歆如有人道感已遂有身而生男以為不祥棄之阨巷羊牛避而不踐又送之山林之中會伐林者薦覆之又取而置寒氷上大鳥來以一翼藉覆之姜嫄以為異乃收養焉名之曰棄枝頤有異相長為堯稷官有功於民后稷之孫曰公劉有徳諸侯皆以天子之禮待之初黄帝之世䜟言曰西北為王期在甲子昌制命發行誅旦行道及公劉之後十三世而生季歴季歴之十年飛龍盈於殷之牧野此蓋聖人在下位將起之符也季歴之妃曰大任夢長人感已􅘞於豕牢而生昌是為周文王龍顔虎肩身長十尺匈有四乳太王曰吾世當有興者其在昌乎季歴之兄曰太伯知天命在昌適越終身不反弟仲雍從之故季歴為嗣以及昌昌為西伯作邑於豐文王之妃曰大姒夢商庭生棘太子發植梓樹於闕間化為松栢棫柞以告文王文王幣告羣臣與發並拜告夢季秋之甲子赤爵銜書及豐止於昌户昌拜稽首受之其文要曰姬昌蒼帝子亡殷者紂王將畋史徧卜之曰將大獲非熊非羆天遺汝師以佐昌臣太祖史疇為禹卜畋得臯陶其兆如此王至於磻谿之水呂尚釣於涯王下趨拜曰望公七年乃今見光景於斯尚立變名答曰望釣得玉璜其文要曰姬受命昌來提撰爾雒鈐報在齊尚出游見赤人自雒出授尚書曰命曰呂佐昌者子文王夢日月著其身又鸑鷟鳴岐山於孟春六旬五緯聚房後有鳯凰銜書游文王之都書又曰殷帝無道虐亂天下皇命已移不得復久靈祗逺離百神吹去五星聚房昭理四海文王既没太子發代立是為武王武王駢齒望羊將伐紂至於孟津八百諸侯不期而會咸曰紂可伐矣武王不從及紂殺比干囚箕子微子去之乃伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王冩以世字魚文消燔魚以告天有火自天止於王屋流為赤烏烏銜穀焉穀者紀后稷之徳火者燔魚以告天天火流下應以吉也遂東伐紂勝於牧野兵不血刃而天下歸之乃封呂望於齊周徳既隆草木茂盛蒿堪為宮室因名蒿宮武王没成王少周公旦攝政七年制禮作樂神鳥鳯凰見蓂莢生乃與成王觀於河洛沈璧禮畢王退俟至於日昧榮光並出幕河青雲浮至青龍臨壇銜𤣥甲之圖坐之而去禮於洛亦如之𤣥龜青龍蒼光止於壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周公訖於秦漢盛衰之符麒麟遊苑鳯凰翔庭成王援琴而歌曰鳯凰翔兮於紫庭余何徳兮以感靈賴先王兮恩澤臻于胥樂兮民以寕魯哀公十四年孔子夜夢三槐之間豐沛之邦有赤煙氣起乃呼顔淵子夏往視之驅車到楚西北范氏街見芻兒摘麟傷其左前足薪而覆之孔子曰兒來汝姓為赤誦名子喬字受紀孔子曰汝豈有所見邪兒曰見一禽巨如羔羊頭上有角其末有肉孔子曰天下已有主也為赤劉陳項為輔五星入井從嵗星兒發薪下麟示孔子孔子趨而往麟䝉其耳吐三卷圖廣三寸長八尺每卷二十四字其言赤劉當起曰周亡赤氣起大燿興𤣥丘制命帝卯金孔子作春秋制孝經既成使七十二弟子向北辰星罄折而立使曽子抱河洛事北向孔子齋戒向北辰而拜告備於天曰孝經四卷春秋河洛凡八十一卷謹已備天乃洪欝起白霧摩地赤虹自上下化為黄玉長三尺上有刻文孔子跪受而讀之曰寳文出劉季握卯金刀在軫北字禾子天下服漢高帝父曰劉執嘉執嘉之母夢赤鳥若龍戱已而生執嘉是為太上皇帝母名含始是為昭靈后昭靈后游於洛池有玉雞銜赤珠刻曰玉英吞此者王昭靈后取而吞之又寢於大澤夢與神遇是時靁電晦㝠太上皇視之見蛟龍在其上遂有身而生季是為高帝高帝隆準而龍顔羙須􅐖左股有七十二黑子微時數從王媪武負貰酒醉卧上常有光怪每留飲售輒數倍武負異之輒折其契單父人呂公好相人見高帝謂曰臣少好相人相人多矣無如季相願季自愛臣有息女願為箕箒妾呂公妻媪怒呂公曰公常竒此女欲與貴人沛令善公求不與何妄許劉季呂公曰非女子所知卒與高帝生惠帝魯元公主呂后嘗與兩子居田中有一老父過請飲呂后因饋之食老父相呂后曰夫人天下貴人也令相二子見惠帝曰夫人所以貴者乃此男相魯元公主亦貴老父已去高帝適從傍舍來呂后具言之高帝追問老父老父曰向者夫人兒子之貴皆以君相君貴不可言高帝被飲夜行徑澤中前人反曰有大蛇當道願還高帝醉曰壮士行何畏乃前援劒斬蛇蛇分為兩道開而過後人來者見老嫗守蛇曰向者赤帝子過殺之見者疑嫗為詐欲笞之忽然不見具以狀告高帝帝心喜秦始皇帝曰東南有天子氣於是東遊以厭之高帝隠於芒碭山澤之間呂后常知其處高帝怪問之對曰季所居上常有雲氣故知之高帝為沛公入秦五星聚於東井嵗星先至而四星從之占曰以義取天下初張良遊於下邳沂水之上有老父來直至良前而墮其履顧謂良曰孺子下取履良愕然欲毆之以其老乃下取跪進父以足受笑而去良殊大驚父去里所復來曰孺子可敎也後五日平明與我會此良怪之跪應曰諾五日良往父已先來怒曰何與長者期而後也五日更與我㑹此凡三期而良先至老父喜曰不當如是耶即出懐中一卷書與之曰讀之此為王者師後十三年孺子見我濟北穀城山下黄石即我也旦視其書乃太公兵法良以黄石篇為佗人説皆不省唯高帝説焉良曰此殆天所授矣五年而成帝業後十三年張良果得穀城山下黄石寳而祠之死與合葬文帝之母薄姬魏豹為魏王納之後宮許負相之當生天子魏王豹於是背漢漢高帝擊虜而薄姬輸織室高帝見而美之内於後宫嵗餘乃得幸將見幸薄姬言妾昨夢青龍據妾心高帝曰我是也吾為爾成之一御而生文帝景帝王皇后初嫁為金王孫妻母臧兒卜筮曰當貴乃奪金氏而納太子宫生男男方在身夢日入其懐以告太子太子曰是貴徴也生男是為武帝武帝趙婕妤家在河間生而兩手皆拳不可開武帝廵守過河間望氣者言此有竒女天子氣召而見之武帝自披其手即時申得一玉鉤由是見幸號曰拳夫人進為婕妤居鉤弋宫大有寵十四月生男是為昭帝號曰鈎弋子武帝曰聞昔堯十四月而生今鉤弋子亦然乃名其門曰堯母門昭帝元鳯二年正月太山萊蕪山南民夜聞訩訩有數千人聲晨往視之見大石自立高丈五尺大三十八圍入地八尺三石為足立後白鳥數千集其傍又上林苑中栁樹斷卧地一朝自起生枝葉蟲齧其葉成文曰公孫病已立陳留㐮邑王社忽移至長安博士眭孟占之曰石隂類太山岱宗王者禪代之處将有廢故之家姓公孫名病已從白衣為天子者時昭帝幼少霍光輔政以孟妖言誅之及昭帝崩昌邑王又廢光立宣帝武帝曽孫本名病已在民間白衣三世如孟言焉元帝王皇后齊田氏之苖裔祖父翁孺自東平陵徙元城元城建公曰昔春秋沙鹿崩晉史卜之隂為陽雄土火相乘故沙鹿崩後六百四十五年宜有聖女興其齊田乎今翁孺之徙正值其地日月當之元城郭東有五鹿之墟即沙鹿地後八十年當有貴女興天下翁孺生禁禁妻李氏方妊身夢月入其懐生女是為元后每許嫁未行所許者輒死卜相者云當大貴遂為元帝皇后生成帝初秦始皇世有長人十二身長五丈足跡六尺見於隴西臨洮前史以為秦亡之徵史臣以為漢興之符也自高帝至於平帝十二主焉光武皇帝父為濟陽令濟陽有武帝行宫常封閉哀帝建平元年十二月甲子夜光武将産乃開而居之時有赤光室中盡明皇考異焉使卜者王長卜之長辟左右曰此善事不可言是嵗有嘉禾生産屋景天中一莖九穂異於凡禾縣界大豐故名光武曰秀時又有鳯凰集濟陽於是畫宫為鳯凰之象明年方士有夏賀良者上言哀帝云漢家歴運中衰當再受命於是改號為太初元将元年稱陳聖劉太平皇帝以厭勝之王莽時善望氣者蘇伯阿望光武所居縣舂陵城郭唶曰氣佳哉鬱鬱葱葱然莽忌惡漢而錢文有金乃攻鑄貨泉以易之既而光武起於舂陵之白水鄉貨泉之文為白水真人也初起兵望見家南有火光以為人持火呼之而光遂盛赫然上屬天有頃不見及在河北為王郎所逼将南濟滹沱河導吏還云河水流澌無船可渡左右皆恐懼帝更遣王霸視之霸往視如吏言霸慮還以實對驚動衆心乃謬云氷堅可渡帝馳進比至而河氷皆合其堅可乘既渡餘數乘車未畢而氷陥前至下博城西疑所之有一白衣老公在道旁曰努力信都為長安城守去此八十里耳言畢失所在遂至信都投太守任光初光武微時穰人蔡少公曰䜟言劉秀發兵捕不道卯金修徳為天子國師公劉子駿名秀少公曰國師公是也光武笑曰何用知非僕道士西門君恵等並云劉秀當為天子光武平定河北還至中山将軍萬修得赤伏符言光武當受命羣臣上尊號光武辭前至鄗縣諸生彊華又自長安詣鄗上赤伏符文與修合羣下又請曰受命之符人應為大光武又夢乘赤龍登天乃即位都洛陽營宫闕一夕有門材自至是時琅邪開陽縣城門一夕無故自亡檢所得村即是也遂名其門曰開陽門先是秦穆公時陳倉人掘地得物若羊非羊若猪非猪怪將獻之道逄二僮子謂之曰子知彼乎名為􅀈常在地下食死人腦若欲殺之以栢東南枝指之則死矣􅀈因言曰此二僮子名為寳得其雄者王得其雌者霸於是陳倉人遂棄􅀈而逐二僮子二僮子化為雉飛入林陳倉人以告穆公穆公發徒大獵得其雌者化而為石置之汧渭之間至文公為之立祠名曰陳寳祠雄南飛集南陽穰縣其後光武興於南陽光武之初興也隗嚻擁衆隴右招集英俊而公孫述稱帝於蜀天下雲擾大者連州郡小者據縣邑嚻問扶風人班彪曰往者周亡戰國並争天下分裂數世然後定縱横之事復起於今乎将承運迭興在於一人也願先生論之對曰周之廢興與漢異昔周立爵五等諸侯從政本根既微枝葉彊大故其末流有縱横之事其勢然也漢家承秦之制郡縣治民主有專已之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絶禍自上起傷不及下故王氏之貴傾擅朝廷能竊號位而不根於民是以即真之後天下莫不引領而歎十餘年間中外騷擾逺近俱發假號雲合咸稱劉氏不謀而同辭方今雄桀𢃄州域者皆無七國世業之資詩云皇矣上帝臨下有赫鑒觀四方求民之瘼今民皆謳吟思漢向仰劉氏己可知矣隗嚻曰先生言周漢之勢可也至於但見愚民習識劉氏姓號之故而謂漢復興疏矣昔秦失其鹿劉季逐而掎之時民復知漢乎彪既感嚻言又愍狂狡之不息乃著王命論以救時難辭曰昔在帝堯之禅曰咨爾舜天之厯數在爾躬舜亦以命禹洎於稷契咸佐唐虞光濟四海奕世載徳至於湯武而有天下雖其遭遇異時禪代不同至於應天從民其揆一焉是故劉氏承堯之祚氏族之世著於春秋言據火徳而漢紹之始起沛澤則神母夜號以章赤帝之符由是言之帝王之祚必有明聖顯懿之徳豐功厚利積累之業然後精誠通於神明流澤加於生民故能為鬼神所福嚮天下所歸往未見運世無本功徳不紀而得堀起在此位者也世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劒游説之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求也悲夫此世之所以多亂臣賊子者也若然者豈徒闇於天道哉又不覩之於人事矣夫饑饉流𨽻饑寒道路思有裋褐之襲檐石之畜所願不過一金然終於轉死溝壑何則貧窮亦有命也况乎天子之貴四海之富神明之祚可得而妄據哉故雖遭罹厄㑹竊其權柄勇如信布彊如梁籍成如王莽然卒潤鑊伏鑕亨菹分裂又況么麽不及數子而欲闇干天位者乎是故駑蹇之乘不騁千里之塗䴏雀之儔不奮六翮之用楶棁之材不荷棟梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗不勝其任也當秦之末豪桀共推陳嬰而王之嬰母止嬰曰自吾為子家婦而世貧賤卒冨貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之将興也是時陵為漢將而母獲於楚有漢使来陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劒而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明猶能推事理之致探禍福之機全宗祀於無窮垂冊書於春秋而况大丈夫之事乎是故窮逹有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣蓋在高祖其興也有五一曰帝堯之苖裔二曰體貎多竒異三曰神武有徵應四曰寛明而仁恕五曰知人善任使加之以信誠好謀逹於聼受見善如不及用人如由己從諫如從流趨時如響赴當食吐哺納子房之策拔足揮洗揖酈生之説寤戍卒之言斷懐土之情高四皓之名割肌膚之愛舉韓信於行陣収陳平於亡命英雄陳力羣才畢舉此高祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媪妊高祖而夢與神遇震雷晦㝠有龍蛇之怪及長多靈異有殊於衆是以王武感物而折契呂公覩貎而進女秦皇東遊以厭其氣呂后望雲而知所處始受命則白蛇分西入闗則五星聚故淮隂留侯謂之天授非人力也歴古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符應不同斯度而欲昧於權利越次妄據外不量力内不知命則必喪保家之主失大年之夀遇折足之凶伏鈇鉞之誅英雄誠知覺寤畏若禍戒超然逺覽淵然深識收陵嬰之明分絶信布之覬覦距逐鹿之瞽説審神器之有授無貪不可幾為二母之所笑則福祚流於子孫天祿其永終矣隗嚻不納果敗漢元成世道士言䜟者云赤厄三七三七二百一十年有外戚之簒祚極三六當有龍飛之秀興復祖宗及莽簒漢漢二百一十年矣莽十八年而敗光武興焉明帝初生豐下鋭上赤色似堯終登帝位和帝鄧皇后祖父禹佐命光武常曰我將百萬人未嘗妄殺一人子孫當大興后少時相者蘇大見后驚曰此成湯之骨法也貴不可言后嘗夢登梯以手捫天天體蕩蕩正青而滑有若鍾乳者后仰吮之以訊之占夢占夢者曰堯攀天而止湯夢及天而呧之此皆非常夢也既而入宮遂登尊位安帝未即大位在邸數有神光赤蛇嘉應照曜室内磐紆殿屋牀第之間後遂入承大統初桓帝之世有黄星見於楚宋之分遼東殷馗曰後五十年當有真人起於譙沛之閒其鋒不可當靈帝熹平五年黄龍見譙光禄大夫喬𤣥問太史今單颺曰此何祥也颺曰其國後當有王者興不及五十年亦當復見天事恒象此其徵也内黄殷登嘿記之其後曹操起於譙是為魏武帝建安五年於黄星見之嵗五十年矣而武帝破袁紹天下莫敵春秋䜟曰代漢者當塗高也漢有周舒者善内學人或問之舒曰當塗高者魏也舒既没譙周又問術士杜瓊曰周徵君以為當塗高魏也其義何在瓊曰魏闕名也當塗而高聖人以類言耳又問周曰寧復有所怪邪周曰未逹也瓊曰古者名官職不言曹自漢以來名官盡言曹吏言屬曹卒言侍曹此殆天意也周曰魏者大也曹者衆也衆而且大天下之所歸乎建安十八年武帝為公又進爵為王二十五年武帝薨太子丕嗣為魏王是為文帝文帝始生有雲青色員如車蓋當其上終日望氣者以為至貴之祥非人臣之氣善相者高元呂曰其貴不可言延康元年三月黄龍又見譙殷登猶存歎曰黄龍見於熹平也單颺云不及五十年亦當復見今四十五年矣颺之言其驗兹乎十月饒安言白虎見八月石邑言鳯凰集又有麒麟見十月漢帝禅位於魏魏王辭譲不受博士蘓林董巴上言臣聞天之去就固有常分聖人當之昭然不疑故堯捐骨肉而禪有虞終無吝色舜發壟畝而居天下若固有之其相授閒不稽漏刻天下已傳矣所以急天命明天下不可一日無君今漢期運已終妖異絶之已審陛下受天之命符瑞告徵丁寧詳悉反覆備至雖言語相諭無以代此今既發詔書璽綬未御固執謙讓上稽天命下違民情臣謹按古之典籍參以圖緯魏之行運及天道所在即尊之驗在於今年此月昭晳分明謹條奏如左唯陛下遷思易慮以時即位顯告上帝布詔天下然後改正朔易服色正大號天下幸甚其所陳事曰天有十二次以為分野王公之國各有所屬周在鶉火魏在大梁嵗星行歴凡十二次所在國天子受命諸侯以封周文王始受命嵗星在鶉火至武王伐紂十三年嵗星復在鶉火故春秋傳曰武王伐紂嵗在鶉火又曰歲之所在則我有周之分野也昔光和十七年嵗在大梁武王始受命為将討黄巾是嵗改年為中平元年建安元年嵗復在大梁始拜大將軍十三年復在大梁始拜丞相今二十五年嵗復在大梁陛下受命此魏得嵗與周文武受命相應今年青龍在庚子詩推度災曰庚者更也子者兹也聖人制法天下治又曰王者布徳於子治成於丑此言今年天更命聖人制法天下布徳於民也魏以政制天下與詩協矣顓頊受命嵗在豕韋衛居其地亦在豕韋故春秋傳曰衛顓頊之墟也今十月斗之所建則顓頊受命之分也魏以十月受禪此同符始祖受命之驗也魏之氏族出自顓頊與舜同祖見於春秋世家舜以土徳承堯之火今魏亦以土徳承漢之火其於行運合於堯舜授受之次魏王猶未許大史丞許芝又上天文祥瑞自建安三年十二月戊辰有新天子氣見於東南到今積二十三年建安十年茀星出庫樓歴犯氐房宿北入天市犯北斗紫㣲氐為天子宿宫路寝所止房為天子明堂政教之首北斗七星主尊輔象近臣紫微者北極最尊此除掃漢家之大異也建安十八年秋嵗星鎮星熒惑俱入太微逆行留守帝坐百有餘日歲星入太微人主改姓鎮星入太微内有兵亂人主以弱三者漢改姓易代之異也建安十九年正月白虹貫日易傳曰后妃擅國白虹貫日建安二十一年五月朔己亥日蝕建安二十三年三月茀星晨見東方二十餘日夕出西方犯歴五車東井五諸侯文昌軒轅太微鋒炎刺帝坐茀者除舊布新亡惡興聖之異也建安二十四年二月晦壬子日蝕日者陽精月為侯王而以亥子日蝕皆水滅火之異也延康元年九月十日黄昏時月蝕熒惑過人定時熒惑出營室宿羽林月為大臣侯王之象熒惑火精漢氏之行占曰漢家以兵亡延康元年九月二十日剝卦天子氣不見皆崩亡之異也熒惑火精行縮日一度有餘故太史令王昱以為漢家衰亡之極熒惑大而赤色光不明赤而小與小星無别皆漢家衰亡之異也易傳曰上下流通聖賢昌厥應帝徳鳯凰翔萬民喜樂無咎殃易傳又曰聖人受命厥應鳯凰下天子虜易傳又曰黄龍見天災将至天子絀聖人出黄龍以戊已日見五色文章皆具聖人得天受命黄龍以戊寅見此帝王受命之符瑞最著明者也易傳又曰聖人清静行中正賢人至民從命厥應麒麟來春秋玉版䜟曰代赤者魏公子春秋佐助期曰漢以許昌失天下故白馬令甘陵李雲上事言許昌氣見當塗高已萌欲使漢家防絶萌牙今漢都許日以微弱當居許昌以失天下當塗高者魏也魏者象魏兩闕之名當道而高大者也魏當代漢如李雲之言也春秋佐助期又曰漢以蒙孫亡説者以䝉孫直漢二十四帝童䝉愚惑以弱亡漢帝少時名為董侯名不正蒙亂荒惑其子孫以弱亡也孝經中黄䜟曰日載東紀火光不横一聖明聰四百之外易姓而王天下歸功致太平此魏王之姓諱著見圗䜟也易運期曰言居東西有午兩日並光日居下其為主及為輔五八四十黄氣受真人出言午許字兩日昌字漢當以許亡魏當以許昌今際㑹之期在許是其大效也易運期又曰鬼在山禾女運王天下於是魏王受漢禪柴於繁陽有黄鳥銜丹書集於尚書臺於是改元為黄初漢中平二年洛陽民譌言虎賁寺有黄人觀者日數萬道路斷絶中平元年黄巾賊起云蒼天已死黄天當立此魏氏依劉向自云土徳之符也先是周敬王之四十七年宋景公問大夫邢史子臣天道何祥對曰後五年五月丁亥臣将死死後五年五月丁卯吳将亡亡後五年君将終終後四百年邾王天下皆如其言邾王天下蓋謂魏國之後言四百年則錯疑年代久逺傳記者謬誤高貴鄉公初生有光氣照燿室屋其後即大位劉備身長七尺七寸垂手過膝顧自見耳洛書甄燿度曰赤三徳昌九世會備合帝際洛書寳予命曰天度帝道備稱皇以統握契百成不敗洛書録運期曰九侯七傑争民命炊骸道路誰使主者𤣥且來備字𤣥徳故云𤣥且来也孝經鉤命決曰帝三建九會備先是術士周羣言西南數有黄氣直立數丈如此積年每有景雲祥風從璿璣下應之建安二十二年中屢有氣如旗從西竟東中天而行圖書曰必有天子出其方太白熒惑鎮星從嵗星又黄龍見犍為武陽之赤水九日乃去闗羽在襄陽男子張嘉王休獻玉璽備後稱帝於蜀孫堅之祖名鍾家在吳郡富春獨與母居性至孝遭嵗荒以種𤓰為業忽有三少年詣鍾乞𤓰鍾厚待之三人謂鍾曰此山下善可作冡𦵏之當出天子君可下山百歩許顧見我去即可𦵏也鍾去三十歩便反顧見三人並乘白鶴飛去鍾死即𦵏其地地在縣城東冡上數有光怪雲氣五色上屬天衍數里父老相謂此非凡氣孫氏其興矣堅母生堅夢膓出繞吳昌門以告鄰母鄰母曰安知非吉祥也昌門吳郭門也堅生而容貌竒異堅妻吳氏初姙子䇿夢月入其懐後孕子權又夢日入懐告堅曰昔姙䇿夢月入懐今又夢日入懐何也堅曰日月隂陽之精極貴之象吾子孫其興乎權方頤大口紫􅐖長上短下漢世有劉琬者能相人見權兄弟曰孫氏兄弟雖各才智明達然禄胙不終惟中弟孝廉形貎竒偉骨體不恒有大貴之表年又最夀爾其識之權時為孝廉初秦始皇東巡濟江望氣者云五百年後江東有天子氣出於吳而金陵之地有王者之勢於是秦始皇乃改金陵曰秣陵鑿北山以絶其勢至吳又令囚徒十餘萬人掘汙其地表以惡名故曰囚卷縣今嘉興縣也漢世術士言黄旗紫蓋見於斗牛之間江東有天子氣獻帝興平中吳中謠言黄金車斑䦨耳開昌門出天子魏文帝黄初三年舉兵武昌並言黄龍鳯凰見其年權稱尊號年至七十一而薨權子休初封琅邪王夢乘龍上天顧不見尾後得大位其子被廢漢元成之世先識之士有言曰魏年有和當有開石於西三千餘里繫五馬文曰討曹及魏之初興也張掖刪丹縣金山栁谷有石生焉周圍尋中髙一仞蒼質素章有五馬麟鹿鳯凰仙人之象始見於建安形成於黄初文備於太和至青龍三年栁谷之𤣥川溢漏石形改易状似靈龜廣一丈七尺一寸圍五丈八寸立於川西有石馬十二其一仙人騎之其一騎靽其五有形而不善成其五成形又有一牛八卦列宿彗星之象有玉匣開蓋於前有玉玦二玉璜一又有麒麟鳯凰白虎馬牛於中布􅍌有文字曰上上三天王述大會討大曹金但取之金立中大金馬一匹中正大吉闗夀此馬甲寅述水凡三十五字石色蒼而物形及字並白石書之皆隆起魏明帝惡其文有討曹鑿去為計以蒼石塞之宿昔而白石滿焉當時稱為祥瑞班下天下處士張臶曰夫神兆未然不追往事此蓋将来之休徵當今之怪異也既而晉以司馬氏受禪太尉屬程猗説曰夫大者盛之極也金者晉之行也中者物之會也吉者福之始也此言司馬氏之王天下感徳而生應正吉而王之符也猗又為贊曰皇徳遐通實降嘉靈乾生其象坤育其形𤣥石既表素文以成瑞虎合仁白麟燿精神馬自圖金言其形體正而王中允克明關夀無疆於萬斯齡宣帝有狼顧之相能使面正向後而身形不異魏武帝嘗夢有三匹馬在一槽中共食其後宣帝及景文相繼為宰相遂傾曹氏文帝未立世子有意於齊獻王攸武帝時為中撫軍懼不立以相兒示裵秀秀言於文帝曰中撫軍振髪籍地垂手過䣛天表如此非人臣之相也由是得立及嗣晉位其月襄武縣言有大人相長三丈餘足跡三尺一寸白髪黄單衣黄巾柱杖呼民王始語云今當太平頃之受魏禪武帝咸寧元年大風吹帝社樹折有青氣出社中占者以為東莞有天子氣時琅邪武王伷封東莞伷元帝祖也元帝以咸寧二年夜生有光照室室内盡明有白毛生於日角之左眼有精光燿隨恵帝幸鄴成都王潁殺東安王繇繇元帝叔父也帝懼欲出奔而月明徼候急四衢斷絶不得去有頃天隂風雨大至候者皆休乃得去初武帝伐吳琅邪武王伷率衆出塗中而王渾逼歴陽王濬已次近路孫皓欲降送天子璽綬近越二将而逺送詣伷識者咸怪之吳之未亡也吳郡臨平湖一旦自開湖邉得石函中有小青石刻作皇帝字舊言臨平湖塞天下亂開則天下太平吳人以為美祥俄而吳滅後元帝興於江左吳亡後蒋山上常有紫雲數術者亦云江東猶有帝王氣又謠言曰五馬游度江一馬化為龍元帝與西陽汝南南頓彭城五王過江而元帝升天位䜟書曰銅馬入海建業期元帝小字銅環永嘉初元帝以安東将軍鎮建業時嵗填星辰太白四星聚於牛女之間常裵回進退愍帝建興四年晉陵武進人陳龍在田中得銅鐸五枚柄口皆有龍虎形又有将雛雞雀集其前皆驅去復還至於再三又有鵝三四頭髙飛且鳴周回東西晝夜不下如此者六七日會稽剡縣陳清又於井中得棧鐘長七寸二分口徑四寸其器雖小形制甚精上有古文書十八字其四字可識云會稽徽命豫章有大樟樹大三十五圍枯死積久永嘉中忽更榮茂景純並言是元帝中興之應初武帝太康三年建鄴有寇餘姚人伍振筮之曰寇已滅矣三十八年揚州有天子至元帝即天位果三十八年先是宣帝有寵将牛金屢有功宣帝作兩口榼一口盛毒酒一口盛善酒自飲善酒毒酒與金金飲之即斃景帝曰金名将可大用云何害之宣帝曰汝忘石瑞馬後有牛乎元帝母夏侯妃與琅邪國小史姓牛私通而生元帝愍帝之立也改毗陵為晉陵時元帝始霸江揚而戎翟稱制西都微弱干寳以為晉将滅於西而興於東之符也宋武帝居在丹徒始生之夜有神光照室其夕甘露降於墓樹皇考以髙祖生有竒異名為竒奴皇妣既殂養於舅氏改為寄奴焉少時誕節嗜酒自京都還息於逆旅逆旅嫗曰室内有酒自入取之帝入室飲於盎側醉卧地時司徒王謐有門生居在丹徒還家亦至此逆旅逆旅嫗曰劉郎在室内可入共飲酒此門生入室驚出謂嫗曰室内那得此異物嫗遽入之見帝已覺矣嫗密問向何所見門生曰見有一物五采如蛟龍非劉郎門生還以白謐謐戒使勿言而與結厚帝嘗行至下邳遇一沙門沙門曰江表尋當喪亂拯之必君也帝患手創積年沙門出懐中黄散一裹與帝曰此創難治非此藥不能瘳也倐忽不見沙門所在以散傅創即愈餘散帝寳録之後征伐屢被傷通中者數矣以散傅之無不立愈自少至長目中常見二龍在前始尚小及貴轉大晉陵人車藪善相人相帝曰君貴不可言願無相忘晉安帝義熙初帝始康晉亂而興霸業焉廬江霍山常有鐘聲十二帝将征闗洛霍山崩有六鐘出制度精竒上有古文書一百六十字冀州有沙門法稱将死語其弟子普嚴曰嵩皇神告我云江東有劉将軍是漢家苖裔當受天命吾以三十二璧鎮金一餅與將軍為信三十二璧者劉氏卜世之數也普嚴以告同學法義法義以十三年七月於嵩髙廟石壇下得玉璧三十二枚黄金一餅漢中城固縣水際忽有靁聲俄而岸崩得銅鐘十二枚又鞏縣民宋燿得嘉禾九穂後二年而受晉禪孔子有雒䜟曰二口建戈不能方兩金相刻發神鋒空穴無主竒入中女子獨立又為䨇二口建戈劉字也晉氏金行劉姓又有金故曰兩金相刻空宂無主竒入中為寄字女子獨立又為䨇奴字晉既禪宋太史令駱達奏陳天文符䜟曰去義熙元年至元熙元年十月太白星晝見經天凡七占曰天下革民更王異姓興義熙元年至元熙元年十一月朔日有蝕之凡四皆蝕從上始臣民失君之象也義熙十一年五月三日彗星出天市其芒埽帝坐天市在房心之北宋之分野得彗柄者興此除舊布新之徵義熙七年七月二十五日五虹見於東方占曰五虹見天子黜聖人出義熙七年八月十一日新天子氣見東南十二年北定中原崇進宋公嵗星裵回房心之間大火宋之分野與武王克殷同得嵗星之分者應王也十一年以来至元熙元年月行失道恒北入太微中占月入太微庭王入為主十三年十月填星入太㣲積留七十餘日到十四年八月十日又入太㣲不去到元熙元年積二百餘日占填星守太㣲亡君之戒有立王有徙王十四年五月十七日茀星出北斗魁中占曰星茀北斗中聖人受命十四年七月二十九日彗星出太㣲中彗柄起上相星下芒尾漸長至十餘丈進埽北斗及紫㣲中占曰彗星出太㣲社稷亡天下易政入北斗帝宫空一占天下得召人召人聖主也一曰彗孛紫微天下易主十四年十月一日熒惑從入太㣲鉤已至元年四月二十七日從端門出積屍留二百六日繞填星熒惑與填星鉤已天廷天下更紀十四年十二月嵗太白辰裵回居斗牛之間經旬斗牛厯數之起占曰三星合是謂改立元熙元年十二月二十四日四黒龍登天易傳曰冬龍見天子亡社稷大人應天命之符金雌詩云大火有心水抱之悠悠百年是其時火宋之分野水宋之徳也金雌詩又曰云出而兩漸欲舉短如之何乃相岨交哉亂也當何所唯有隐巖殖禾黍西南之朋困桓父兩云𤣥字也短者云祚短也巖隐不見唯應見谷殖禾谷邊則聖諱炳明也易曰西南得朋故能困桓父也劉向䜟曰上五盡寄致太平草付合成集羣英前句則陛下小諱後句則太子諱也十一年五月西明門地陥水涌出毁門扉國西者金鄉之門為水所毁此金徳将衰水徳方興之象也太興中民於井中得棧鐘上有古文十八字晉自宣帝至今數滿十八傳義熙八年太社生桑尤明著者也夫六亢位也漢建安二十五年一百九十六年而禪魏魏自黄初至咸熙二年四十六年而禪晉晉自太始至今元熙二年一百五十六年三代數窮咸以六年少帝即位景平三年四月有五色雲見西方時文帝為荆州刺史鎮江陵尋即大位文帝元嘉中謡言錢唐當出天子乃於錢唐置戍軍以防之其後孝武帝即大位於新亭寺之禪堂禪之與錢音相近也太宗為徐州刺史出鎮彭城昭太后賜以大珠鹿盧劒此劒是御服占者以為嘉祥前廢帝永光初又謡言湘州出天子幼主欲南幸湘川以厭之既而湘東王即尊位是為明帝史臣謹按冀州道人法稱所云玊璧三十二枚宋氏卜世之數者蓋卜年之數也謂卜世者謬其言耳三十二者二三十則六十矣宋氏受命至於禪齊凡六十年云宋書卷二十七宋書卷二十七考證符瑞志上龍於是曵尾而逝逝監本作逃今改正孝經中黄䜟曰日載東紀火光不横一聖明聰臣照按日載東者曹也曹古文作􅀢不横一者丕也下文所謂帝之姓諱見圖䜟也然則紀火光自應作絶火光言炎漢亡也堅母生堅夢腸出繞吳昌門生一夲作姙元帝母夏侯妃與琅邪國小史姓牛私通而生元帝王應麟困學紀聞云晉元帝為牛氏子其説始於沈約而魏収島夷傳因之唐貞觀修晉書亦取焉王劭謂沈約喜造竒説以誣前代劉知幾亦以為非而致堂乃謂元帝冐姓司馬過矣魏自黄初至咸熙二年四十六年而禪晉四一夲作三者誤宋書卷二十七考證
