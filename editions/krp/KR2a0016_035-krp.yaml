涼城二漢東郡有聊城縣晉太康地志無疑此是東燕别見三縣陳留郡領酸棗漢舊縣小黄雝邱白馬襄邑尉氏六縣郡縣並别見濮陽郡領濮陽廩邱並别見二縣宋末失淮北僑立兖州寄治淮陰淮陰别見兖州領郡六縣三十一户二萬九千三百四十口一十四萬五千五百八十一泰山太守漢髙立永初郡國又有山茌别見萊蕪漢舊名大原本郡僑立此縣三縣而無鉅平縣今領縣八户八千一百七十七口四萬五千五百八十一去州陸八百去京都陸一千八百奉髙令漢舊縣鉅平令漢舊縣嬴令漢舊縣牟令漢舊縣南城令前漢屬東海後漢晉屬泰山武陽令漢舊縣梁父令漢舊縣博令漢舊縣髙平太守故梁國漢景帝中六年分為山陽國武帝建元五年為郡晉武帝泰始元年更名永初郡國及徐並又有任城縣前漢屬髙平章帝元和元年分東平為任城又屬焉晉亦屬任城江左省郡為縣也後省今領縣六戸六千三百五十八口二萬一千一百一十二去州陸二百二十去京都陸一千三百三十宋明帝泰始五年僑立於淮南當塗縣界領髙平金郷二縣其年又立雎陵縣髙平令前漢名藁章帝更方與令漢舊縣金郷令前漢無後漢晉有鉅野令漢舊縣平陽令漢舊縣曰南平陽亢父令漢舊縣舊屬任城魯郡太守秦薛郡漢髙后更名本屬徐州光武改屬任城江左屬兖州領縣六戸四千六百三十一口二萬八千三百七去州陸三百五十去京都一千一百鄒令漢舊縣汶陽令漢舊縣魯令漢舊縣陽平令孝武大明元年立新陽令孝武大明中立卞令明帝泰始二年立東平太守漢景帝分梁為濟東國宣帝更名領縣五户四千一百五十九口一萬七千二百九十五去州水五百陸同去京都水二千陸一千四百宋末又僑立於淮陰無鹽令漢舊縣平陸令漢舊縣須昌令前漢屬東郡後漢晉太康地志屬東平夀昌令春秋時曰良前漢曰夀良屬東郡光武改曰夀張屬東平范令漢舊縣四縣並治郡下陽平太守魏分魏郡立文帝元嘉中流寓來屬後省孝武大明元年復立領縣五户二千八百五十七口一萬一千二百七十一館陶令漢舊名寄治無鹽樂平令魏立屬陽平後漢東郡有樂平非也寄治下平陸元城令漢舊寄治無鹽平原令别見孝武大明中立頓邱令别見孝武大明中立濟北太守漢和帝永光二年分泰山立永初郡國有臨邑二漢屬東郡晉太康地志屬濟北東阿二漢屬東郡晉無二縣孝武大明元年省應在何志而無未詳領縣三戸三千一百五十八口一萬七千三去州陸七百去京都水二千陸一千五百宋末又僑立於淮陽蛇邱令前漢屬泰山後漢晉太康地志屬濟北盧令前漢屬泰山後漢晉太康地志屬濟北榖城令前漢無後漢屬東郡晉太康地志屬濟北宋書卷三十五宋書卷三十五考證州郡志一鄮令漢舊縣鄮諸本作􅀈今從二漢志晉志改正烏傷令此下當有漢舊縣三字寧海令何志漢舊縣按二漢志晉太康地臣承蒼按地字下當有闕文考二漢志俱無寧海未知其所闕者果係何字永初郡國有廣平臣承蒼按此下注凡五十八字舊本顛倒錯亂不成文理今據二漢志晉志改正舊南監本原文云漢二武帝征和子國宣帝五鳳二年改為廣平年立為平併鉅鹿魏分鉅鹿魏郡復為廣光武建武十三年省咸康四年平江左僑立晉成帝省後又立其誤顯然至北監本汲古閣本改漢字下二字為孝刪廣平下一年字復為廣下增一平字則愈䝉混不可考矣今據後漢郡國志云武帝征和二年置為平干國宣帝五鳳二年復故正此注所據之文二字合在征和之下子字乃干字之訛光武事合敘於宣帝之下併鉅鹿三字合在十三年省之下郡字合在僑立下咸康四年合在晉成帝之下孝武大明五年分廣陵為沛郡治肥如縣時無復肥如縣當是肥如故縣䖏也二漢晉太康地志並無肥如縣臣人龍按前廣陵太守下注云肥如本屬遼西晉末遼西僑郡省併廣陵符瑞志亦云元嘉十九年九月戊申廣陵肥如石梁澗中出石鐘九口是雖非二漢遼西之肥如而廣陵固有肥如也乃此䖏則云無復肥如縣又云並無肥如縣一卷之中何不相符乎宋書卷三十五考證
