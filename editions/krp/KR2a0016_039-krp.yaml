敬廷尉卿正監秩千石評六百石廷尉律博士一人魏武初建魏國置大司農一人丞一人掌九穀六畜之供膳羞者舜攝帝位命棄爲后稷即其任也周則爲太府秦治粟内史漢景帝後元年更名大農令武帝太初元年更名曰大司農晉哀帝末省并都水孝武世復置漢世丞二人魏以來一人太倉令一人丞一人秦官也晉江左以來又有東倉石頭倉丞各一人導官令一人丞一人掌舂御米漢東京置導擇也擇米令精也司馬相如封禪書云導一莖六穗於庖籍田令一人丞一人掌耕宗廟社稷之田於周爲甸師漢文帝初立籍田置令丞各一人漢東京及魏並不置晉武太始十年復置江左省宋太祖元嘉中又置自太倉至籍田令竝屬司農少府一人丞一人掌市服御之物秦官也漢因之掌禁錢以給私養故曰少府晉哀帝末省并丹陽尹孝武世復置左尚方令丞各一人右尚方令丞各一人竝掌造軍器秦官也漢因之於周則爲玉府晉江右有中尚方左尚方右尚方江左以來唯一尚方宋髙祖踐阼以相府部配臺謂之左尚方而本署謂之右尚方焉又以相府細作配臺即其名置令一人丞二人隸門下世祖大明中改曰御府置令一人丞一人御府二漢世典官婢作褻衣服補浣之事魏晉猶置其職江左乃省焉後廢帝初省御府置中署隸右尚方漢東京太僕屬官有考工令主兵器弓弩刀鎧之屬成則傳執金吾入武庫及織綬諸雜工尚方令唯主作御刀綬劒諸玩好器物而已然則考工令如今尚方尚方令如今中署矣東冶令一人丞一人南冶令一人丞一人漢有鐵官晉置令掌工徒鼓鑄隸衛尉江左以來省衛尉度隸少府宋世雖置衛尉冶隸少府如故江南諸郡縣有者或置冶令或置丞多是吳所置平准令一人丞一人掌染秦官也漢因之漢隸司農不知何世隸少府宋順帝即位避帝諱改曰染署將作大匠一人丞一人掌土木之役秦世置將作少府漢因之景帝中六年更名將作大匠光武二年省以謁者領之章帝建初元年復置晉氏以來有事則置無則省大鴻臚掌贊導拜授諸王秦世爲典客漢景帝中六年更名大行令武帝太初元年更名大鴻臚鴻大也臚陳也晉江左初省有事則權置事畢即省太僕掌輿馬周穆王所置秦因之周官則校人掌馬巾車尚車及置太僕兼其任也晉江左或置或省宋以來不置郊祀則權置太僕執轡事畢即省太后三卿各一人應氏漢官曰衛尉少府秦官太僕漢成帝置皆隨太后宫爲號在正卿上無太后乃闕魏改漢制在九卿下晉復舊在同號卿上大長秋皇后卿也有后則置無則省秦時爲將行漢景帝中六年更名大長秋韋曜曰長秋者以皇后隂官秋者隂之始取其終而長欲其乆也自太常至長秋皆置功曹主簿五官漢東京諸郡有五官掾因其名也漢制卿尹秩皆中二千石丞一千石尚書古官也舜攝帝位命龍作納言即其任也周官司㑹鄭𤣥云若今尚書矣秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚冠尚衣之屬矣秦時有尚書令尚書僕射尚書丞至漢初竝隸少府漢東京猶文屬焉古者重武官以善射者掌事故曰僕射僕射者僕役於射事也秦世有左右曹諸吏官無職事將軍大夫以下皆得加此官漢武帝世使左右曹諸吏分平尚書事昭帝即位霍光領尚書事成帝初王鳯録尚書事漢東京每帝即位輙置太傅録尚書事薨輙省晉康帝世何充讓録表曰咸康中分置三録王導録其一荀崧陸曄各録六條事然則似有二十四條若止有十二條則荀陸各録六條導又何所司乎若導總録荀陸分掌則不得復云導録其一也其後每置二録輙云各掌六條事又是止有十二條也十二條者不知悉何條晉江右有四録則四人参錄也江右張華江左庾亮並經闗尚書七條則亦不知皆何事也後何充解錄又參關尚書錄尚書職無不總王肅注尚書納于大麓曰堯納舜於尊顯之官大録萬機之政也凡重號將軍刺史皆得命曹授用唯不得施除及加節宋世祖孝建中不欲威權外假省録大明末復置此後或置或省漢獻帝建安四年以執金吾榮郃爲尚書左僕射衛臻爲右僕射二僕射分置自此始也漢成帝建始四年初置尚書員四人增丞亦爲四人曹尚書其一曰常侍曹主公卿事其二曰二千石曹主郡國二千石事其三曰民曹主吏民上書事其四曰客曹主外國夷狄事光武分二千石曹爲二又分客曹爲南主客曹北主客曹改常侍曹爲吏曹凡六尚書減二丞唯置左右二丞而已應劭漢官云尚書令左丞總領綱紀無所不統僕射右丞掌禀假錢穀三公尚書二人掌天下嵗盡集課吏曹掌選舉齋詞二千石曹掌水火盜賊詞訟罪法客曹掌羗胡朝㑹法駕出䕶駕民曹掌繕治功作鹽池苑囿吏曹任舉多得超遷則漢末曹名及職司又與光武時異也魏世有吏部左民民曹五兵度支五曹尚書晉初有吏部三公客曹駕部屯田度支六曹尚書武帝咸寧二年省駕部尚書四年又置太康中有吏部殿中五兵田曹度支左民六尚書惠帝世又有右民尚書尚書止於六曹不知此時省何曹也江左則有祠部吏部左民度支五兵合爲五曹尚書宋髙祖初又增都官尚書若有右僕射則不置祠部尚書世祖大明二年置二吏部尚書省五兵尚書後還置一吏部尚書順帝昇明元年又置五兵尚書尚書令任總機衡僕射尚書分領諸曹左僕射領殿中主客二曹吏部尚書領吏部刪定三公比部四曹祠部尚書領祠部儀曹二曹度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹都官尚書領都官水部庫部功部四曹五兵尚書領中兵外兵二曹昔有騎兵别兵都兵故謂之五兵也五尚書二僕射一令謂之八坐若營宗廟宫室則置起部尚書事畢省漢成帝之置四尚書也無置郎之文漢儀尚書郎四人一人主匈奴單于營部一人主羗夷吏民一人主户口墾田一人主財帛委輸匈奴單于宣帝之世保塞内附成帝世單于還北庭矣一郎主匈奴單于也營部則置郎疑是光武時所主匈奴是南單于也漢官云置郎三十六人不知是何帝增員然則一尚書則領六郎也主作文書起立事草初爲郎中滿歲則爲侍郎尚書寺居建禮門内尚書郎入直官供青縑白綾被或以綿緤爲之給帷帳氈褥通中枕大官供食物湯官供餅餌及五孰果實之屬給尚書伯使一人女侍二人皆選端正妖麗執香爐䕶衣服奏事明光殿殿以胡粉塗壁畵古賢烈士以丹朱色地謂之丹墀尚書郎口含鷄舌香以其奏事荅對欲使氣息芬芳也奏事則與黄門侍郎對揖黄門侍郎稱已聞乃出天子所服五時衣以賜尚書令僕而丞郎月賜赤管大筆一雙隃麋墨一丸魏世有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵别兵都兵考功定科凡二十三郎青龍二年有軍事尚書令陳矯奏置都官騎兵二曹郎合爲二十五曹晉西朝則直事殿中祠部儀曹吏部三公比部金部倉部度支都官二千石左民右民虞曹屯田起部水部左主客右主客駕部車部庫部左中兵右中兵左外兵右外兵别兵都兵騎兵左士右士北主客南主客爲三十四曹郎後又置運曹凡三十五曹晉江左初無直事民屯田車部别兵都兵騎兵左士右士運曹十曹郎而主客中兵各置一郎而己所餘十七曹也康穆以來又無虞曹二千石二郎猶有殿中祠部吏部儀曹三公比部倉部度支都官左民都部水部主客駕部庫部中兵十八曹郎後又省主客起部水部餘十五曹宋髙祖初加置騎兵主客起部水部四曹郎合爲十九曹太祖元嘉十年又省儀曹主客比部騎兵四曹郎十一年又並置十八年增刪定曹郎次在左民曹上蓋魏世之定科郎也三十年又置功論郎次都官之下在刪定之上太宗世省騎兵今凡二十曹郎以三公比部主法制度支主筭支𣲖也度景也都官主軍事刑獄其餘曹所掌各如其名漢制公卿御史中丞以下遇尚書令僕丞郎皆車豫相回避臺官過乃得去今尚書官上朝及下禁斷行人猶其制也漢又制丞郎見尚書呼曰明時郎見二丞呼曰左君右君郎以下則有都令史令史書令史書吏榦漢東京尚書令史十八人晉初正令史百二十人書令史百三十人自晉至今或減或益難以定言漢儀有丞相令史令史蓋前漢官也晉西朝有尚書都令史朱誕則都令史其來乆矣分曹所掌如尚書也晉西朝八坐丞郎朝晡詣都坐朝江左唯旦朝而已八坐丞郎初拜竝集都坐交禮遷又解交漢舊制也今唯八坐解交丞郎不復解交也尚書令千石僕射尚書六百石丞郎四百石武庫令一人掌軍器秦官至二漢屬金吾晉初罷執金吾至今隸尚書庫部車府令一人丞一人秦官也二漢魏晉竝隸太僕太僕既省隸尚書駕部上林令一人丞一人漢西京上林中有八丞十二尉十池監丞尉屬水衡都池監隸少府漢東京曰上林苑令及丞各一人隸少府晉江左闕宋世祖大明三年復置隸尚書殿中曹及少府材官將軍一人司馬一人主工匠土木之事漢左右校令其任也魏右校又置材官校尉主天下材木事晉江左改材官校尉曰材官將軍又罷左校令今材官隸尚書起部及領軍侍中四人掌奏事直侍左右應對獻替法駕出則正直一人負璽陪乗殿内門下衆事皆掌之周公戒成王立政之篇所云常伯即其任也侍中本秦丞相史也使五人往來殿内東廂奏事故謂之侍中漢西京無員多至數十人入侍禁中分掌乗輿服物下至䙝器虎子之屬武帝世孔安國爲侍中以其儒者特聽掌御唾壺朝廷榮之乆次者爲僕射漢東京又屬少府猶無員掌侍左右贊導衆事顧問應答法駕出則多識者一人負𫝊國璽操斬白蛇劒參乗餘皆騎在乗輿車後光武世改僕射爲祭酒焉漢世與中官俱止禁中武帝時侍中莾何羅挾刃謀逆由是侍中出禁外有事乃入事畢即出王莽秉政侍中復入與中官共止章帝元和中侍中郭舉與後宫通㧞佩刀驚御舉伏誅侍中由是復出外魏晉以來置四人别加官不主數秩比二千石宋書卷三十九宋書卷三十九考證百官志上漢西京置太祝令丞武帝太初元年更名曰廣記漢東京改曰太祝臣承蒼按漢書太祝令景帝時更名曰祠祀武帝太初元年更名曰廟祀廣記二字當即廟祀之誤宋書卷三十九考證
