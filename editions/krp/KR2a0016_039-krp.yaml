body:
  text: 宋書卷三十九梁沈約撰志第二十九百官上太宰一人周武王時周公旦始居之掌邦治爲六卿之首秦漢魏不常置晉初依周禮備置三公三公之職太師居首景帝名師故置太宰以代之太宰蓋古之太師也殷紂之時箕子爲太師周武王時太公爲太師周成王時周公爲太師周公薨畢公代之漢西京初不置平帝始復置太師官而孔光居焉漢東京又廢獻帝初董卓爲太師卓誅又廢魏世不置晉既因太師而置太宰以安平王孚居焉太傅一人周成王時畢公爲太傅漢髙后元年初用王陵太保一人殷太甲時伊尹爲太保周武王時召公爲太保漢平帝元始元年始用王舜後漢至魏不置晉初復置焉自太師至太保是爲三公論道經邦燮理隂陽無其人則闕所以訓䕶人主導以徳義者相國一人漢髙帝十一年始置以蕭何居之罷丞相何薨曹参代之参薨罷魏齊王以晉景帝爲相國晉惠帝時趙王倫愍帝時南陽王保安帝時宋髙祖順帝時齊王竝爲相國自魏晉以來非復人臣之位矣丞相一人殷湯以伊尹爲右相仲虺爲左相秦悼武王二年始置丞相官丞奉相助也悼武王子昭襄王始以樗里疾爲丞相後又置左右丞相漢髙帝初置一丞相十一年更名相國孝惠髙后置左右丞相文帝二年復置一丞相哀帝元夀二年更名大司徒漢東京不復置至獻帝建安十三年復置丞相魏世及晉初又廢惠帝世趙王倫簒位以梁王肜爲丞相永興元年以成都王潁爲丞相愍帝建興元年以琅邪王睿爲左丞相南陽王保爲右丞相三年以保爲相國睿爲丞相元帝永昌元年以王敦爲丞相轉司徒荀組爲太尉以司徒官屬并丞相爲留府敦不受成帝世以王導爲丞相罷司徒府以爲丞相府導薨罷丞相復爲司徒府宋世祖初以南郡王義宣爲丞相而司徒府如故太尉一人自上安下曰尉掌兵事郊祀掌亞獻大喪則告謚南郊堯時舜爲太尉官漢因之武帝建元二年省光武建武二十七年罷大司馬置太尉以代之靈帝末以劉虞爲大司馬而太尉如故司徒一人掌民事郊祀掌省牲視濯大喪安梓宮少昊氏以鳥名官而祝鳩氏爲司徒堯時舜爲司徒舜攝帝位命契爲司徒契𤣥孫之孫曰㣲亦爲夏司徒周時司徒爲地官掌邦教漢西京初不置哀帝元夀二年罷丞相置大司徒光武建武二十七年去大司空一人掌水土事郊祀掌掃除陳樂器大喪掌將校復土舜攝帝位以禹爲司空契之子曰冥亦爲夏司空殷湯以咎單爲司空周時司空爲冬官掌邦事漢西京初不置成帝綏和元年更名御史大夫爲大司空哀帝建平二年復爲御史大夫元夀二年復爲大司空光武建武二十七年去大字獻帝建安十三年又罷司空置御史大夫御史大夫郗慮免不復補魏初又置司空大司馬一人掌武事司主也馬武也堯時棄爲后稷兼掌司馬周時司馬爲夏官掌邦政項籍以曹咎周殷竝爲大司馬漢初不置武帝元狩四年初置大司馬始直云司馬議者以漢有軍候千人司馬官故加大及置司空又以縣道官有獄司空又加大王莽居攝以漢無小司徒而定司馬司徒司空之號竝加大光武建武二十七年省大司馬以太尉代之魏文帝黄初二年復置大司馬以曹仁居之而太尉如故大將軍一人凡將軍皆掌征伐周制王立六軍晉獻公作二軍公將上軍將軍之名起於此也楚懐王遣三將入闗宋義爲上將漢髙帝以韓信爲大將軍漢西京以大司馬冠之漢東京大將軍自爲官位在三司上魏明帝青龍三年晉宣帝自大將軍爲太尉然則大將軍在三司下矣其後又在三司上晉景帝爲大將軍而景帝叔父孚爲太尉奏改大將軍在太尉下後還復舊晉武帝踐阼安平王孚爲太宰鄭沖爲太傅王祥爲太保義陽王望爲太尉何曾爲司徒荀顗爲司空石苞爲司馬陳騫爲大將軍凡八公同時竝置唯無丞相焉有蒼頭字宜禄至漢丞相府每有所闗白到閤輙傳呼宜禄以此爲常丞相置三長史丞相有疾御史大夫率百僚三旦問起居及瘳詔遣尚書令若光禄大夫賜養牛上尊酒漢景帝三公病遣中黄門問病魏晉則黄門郎尤重者或侍中也魏武爲丞相以來置左右二長史而已漢東京太傅府置掾屬十人御屬一人令史十二人不知皆何曹也自太尉至大將軍車騎驃騎衛將軍皆有長史一人將軍又各置司馬一人太傅不置長史也太尉府置掾屬二十四人西曹主府吏署用事東曹主二千石長吏遷除事户曹主民户祠祀農桑事奏曹主奏議事辭曹主辭訟事法曹主郵驛科程事尉曹主卒徒轉運事賊曹主盗賊事決曹主罪法事兵曹主兵事金曹主貨幣鹽鐡事倉曹主倉穀事黄閤主簿省録衆事御屬一人令史二十二人御屬主爲公御令史則有閤下記室門下令史其餘史闕案掾屬二十四人自東西曹凡十二曹然則曹各置掾屬一人合二十四人也司徒置掾屬三十一人御屬一人令史三十五人司空置掾二十九人御屬一人令史三十一人司空别有道橋掾其餘張減之號史闕不可得知也漢東京大將軍驃騎將軍從事中郎二人掾屬二十九人御屬一人令史三十人騎衛將軍從事中郎二人掾屬二十人御屬一人令史二十四人兵曹掾史主兵事禀假掾史主禀假又置外刺姦主罪法其領兵外討則營有五部部有校尉一人軍司馬一人部下有曲曲有軍候一人曲下有屯屯有屯長一人若不置校尉則部但有軍司馬一人又有軍假司馬軍假候其别營者則爲别部司馬其餘將軍置以征伐者府無員職亦有部曲司馬軍候以領兵焉案大將軍以下掾屬與三府張減史闕不可得知置令史御屬者則是同三府也其云掾史者則是有掾而無屬又無令史御屬不同三府也魏初公府職寮史不備書及晉景帝爲大將軍置掾十人西曹東曹户曹倉曹賊曹金曹水曹兵曹騎兵各一人則無屬矣魏元帝咸熙中晉文帝爲相國相國府置中衛將軍驍騎將軍左右長史司馬從事中郎四人主簿四人舎人十九人参軍二十二人参戰十一人掾屬三十三人東曹掾屬各一人西曹屬一人户曹掾一人屬二人賊曹掾一人屬二人金曹掾屬各一人兵曹掾屬各一人騎兵掾二人屬一人車曹掾屬各一人鎧曹掾屬各一人水曹掾屬各一人集曹掾屬各一人法曹掾屬各一人奏曹掾屬各一人倉曹屬二人戎曹屬一人馬曹屬一人媒曹屬一人合爲三十三人散屬九人凡四十二人晉初凡位從公以上置長史西閤東閤祭酒西曹東曹掾户曹倉曹賊曹屬各一人加兵者又置司馬從事中郎主簿記室督各一人舎人四人爲持節都督者置参軍六人安平獻王孚爲太宰增掾屬爲十人兵凱士營軍刺姦五曹皆置屬并前爲十人也楊駿爲太傅增祭酒爲四人掾屬爲二十人兵曹分爲左右法金田集水戎車馬十曹皆置屬則爲二十人趙王倫爲相國置左右長史司馬從事中郎四人参軍二十人主簿記室督祭酒各四人掾屬四十人東西曹屬其餘十八曹皆置掾則四十人矣凡諸曹皆置御屬令史學幹御屬職錄事也江左以來諸公置長史倉曹掾户曹屬東西閤祭酒各一人主簿舎人二人御屬二人令史無定員領兵者置司馬一人從事中郎二人参軍無定員加崇者置左右長史司馬從事中郎四人掾屬四人則倉曹增置屬户曹置掾江左加崇極於此也長史司馬舎人秦官從事中郎掾屬主簿令史前漢官陳湯爲大將軍王鳯從事中郎是也御屬参軍後漢官孫堅爲車騎参軍事是也本於府主無敬晉世太原孫楚爲大司馬石苞参軍輕慢苞始制施敬祭酒晉官也漢吳王濞爲劉氏祭酒夫祭祀以酒爲本長者主之故以祭酒爲稱漢之侍中魏之散騎常侍髙功者竝爲祭酒焉公府祭酒蓋因其名也長史從事中郎主吏司馬主將主簿祭酒舎人主閤内事参軍掾屬令史主諸曹事司徒若無公唯省舎人其府常置其職寮異於餘府有左右長史左西曹掾屬各一人餘則同矣餘府有公則置無則省晉元帝爲鎮東大將軍及丞相置從事中郎無定員分掌諸曹有錄事中郎度支中郎三兵中郎其参軍則有諮議参軍二人主諷議事晉江左初置因軍諮祭酒也宋髙祖爲諮議参軍無定員今諸曹則有錄事記室户曹倉曹中直兵外兵騎兵長流賊曹刑獄賊曹城局賊曹法曹田曹水曹鎧曹車曹士曹集右戸墨曹凡十八曹参軍参軍不置曹者無定員江左初晉元帝鎮東丞相府有錄事記室東曹西曹度支户曹法曹金曹倉曹理曹中兵外兵騎兵典兵兵曹賊曹運曹禁防典賔鎧曹田曹士曹騎士車曹参軍其東曹西曹度支金曹理典兵兵曹賊曹運曹禁防典賔騎士軍曹凡十三曹今闕所餘十二曹也其後又有直兵長流刑獄城局水曹右户墨曹七曹髙祖爲相合中兵直兵置一参軍曹則猶二也今小府不置長流参軍者置禁防参軍蜀丞相諸葛亮府有行参軍晉太傅司馬越府又有行参軍兼行参軍後漸加長兼字除拜則爲参軍事府板則爲行参軍晉末以來参軍事行参軍又各有除板板行参軍不則長兼行参軍参軍督䕶江左置本皆領營有部曲今則無矣公府長史司馬秩千石從事中郎六百石東西曹掾四百石他掾三百石屬二百石特進前漢世所置前後二漢及魏晉以爲加官從本官車服無吏卒晉惠帝元康中定位今在諸公下驃騎將軍上驃騎將軍一人漢武帝元狩二年始用霍去病爲驃騎將軍漢西京制大將軍驃騎將軍位次丞相車騎將軍一人漢文帝元年始用薄昭爲車騎將軍魚豢曰魏世驃騎爲都督儀與四征同若不爲都督雖持節屬四征者與前後左右雜號將軍同其或散還從文官之例則位次三司晉宋車騎衛不復爲四征所督也衛將軍一人漢文帝元年始用宋昌爲衛將軍三號位亞三司漢章帝建初三年始使車騎將軍馬防班同三司班同三司自此始也漢末奮威將軍晉江右伏波輔國將軍竝加大而儀同三司江左以來將軍則中鎮撫四鎮以上或加大餘官則左右光禄大夫以上竝得儀同三司自此以下不得也持節都督無定員前漢遣使始有持節光武建武初征伐四方始權時置督軍御史事竟罷建安中魏武帝爲相始遣大將軍督軍二十一年征孫權還夏侯惇督二十六軍是也魏文帝黄初二年始置都督諸州軍事或領刺史三年上軍大將軍曹真都督中外諸軍事假黄鉞則總綂外内諸軍矣明帝太和四年晉宣帝征蜀加號大都督髙貴公正元二年晉文帝都督中外諸軍尋加大都督晉世則都督諸軍爲上監諸軍次之督諸軍爲下使持節爲上持節次之假節爲下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節唯軍事得殺犯軍令者晉江左以來都督中外尤重唯王導居之宋氏人臣則無也江夏王義恭假黄鉞假黄鉞則専戮節將非人臣常器矣征東將軍一人漢獻帝初平三年馬騰居之征南將軍一人漢光武建武中岑彭居之征西將軍一人漢光武建武中馮異居之征北將軍一人魚豢曰四征魏武帝置秩二千黄初中位次三公漢舊諸征與偏禆雜號同鎮東將軍一人後漢末魏武帝居之鎮南將軍一人後漢末劉表居之鎮西將軍一人後漢初平三年韓遂居之鎮北將軍一人中軍將軍一人漢武帝以公孫敖爲之時爲雜號鎮軍將軍一人魏以陳羣爲之撫軍將軍一人魏以司馬宣王爲之中鎮撫三號比四鎮安東將軍一人後漢末陶謙爲之安南將軍一人安西將軍一人後漢末叚煨爲之安北將軍一人魚豢曰鎮北四安魏黄初太和中置平東將軍一人平南將軍一人平西將軍一人平北將軍一人四平魏世置左將軍右將軍前將軍後將軍左將軍以下周末官秦漢竝因之光武建武七年省魏以來復置征虜將軍漢光武建武中始以祭遵居之冠軍將軍楚懐王以宋義爲卿子冠軍冠軍之名自此始也魏正