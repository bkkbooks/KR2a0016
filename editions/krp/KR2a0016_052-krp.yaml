body:
  text: 宋書卷五十二梁沈約撰列傳第十二庾悅王誕謝景仁弟述袁湛弟豹禇叔度庾悅字仲豫潁川􅋣陵人也曾祖亮晉太尉祖義呉國内史父淮西中郎將豫州刺史悦少為衞將軍琅邪王行參軍司馬徙主簿轉右長史桓𤣥輔政領豫州以悅為别駕從事史遷驍騎將軍𤣥簒位徙中書侍郎高祖定京邑武陵王遵承制以悦為寧遠將軍安遠䕶軍武陵内史以病去職鎮軍府版咨議參軍轉車騎從事中郎劉毅請為撫軍司馬不就遷車騎中軍司馬從征廣固竭其誠力盧循逼京都以為督江州豫州之西陽新蔡汝南潁川司州之松滋五郡諸軍事建威將軍江州刺史從東道出鄱陽循遣將英糾千餘人斷五畆嶠悅破之進據豫章絶循糧援初毅家在京口貧約過常嘗與鄉曲士大夫往東堂共射時悅為司徒右長史蹔至京要府州僚佐共出東堂毅已先至遣與悅相聞曰身久躓頓營一遊集甚難君如意人無處不可為適豈能以此堂見讓悅素豪徑前不答毅語衆人並避之唯毅留射如故悅厨饌甚盛不以及毅毅既不去悅甚不歡俄頃不退毅又相聞曰身今年未得子鵞豈能以殘炙見惠悅又不答盧循平後毅求都督江州以江州内地治民為職不宜置軍府上表陳之曰臣聞天以盈虗為道治以損益為義時否而政不革民凋而事不損則無以救急病於己危拯塗炭於將絶自頃戎車屢駕干戈溢境江州以一隅之地當逆順之衝力弱民慢而器運所繼自桓𤣥以來驅蹙殘毁至乃男不被養女無對匹逃亡去就不避幽深自非財單力竭無以至此若不曲心矜理有所改移則靡遺之歎奄焉必及臣謬荷増統傷慨兼懷夫設官分職軍國殊用牧民以息務為大武略以濟事為先今兼而領之葢出於權事因藉既久遂為常則江州在腹心之中憑接揚豫藩屏所倚實為重複昔胡寇縱逸朔馬臨江抗禦之宜蓋出權計以温嶠明達事由一已猶覺其弊論之備悉今江右區區户不盈數十萬地不踰數千里而綂司鱗次未獲減息大而言之足為國耻况乃地在無軍而軍府猶置文武將佐資費非一豈所謂經國大情揚湯去火者哉其州郡邊江民户遼落加以郵亭嶮闊畏阻風波轉輸往還常有淹廢又非所謂因其所利以濟其弊者也愚謂宜解軍府移治豫章處十郡之中厲簡惠之政比及數年可有生氣且屬縣凋散亦有所存而役調送迎不得休止亦謂應隨宜并減以簡衆費刺史庾悅自臨州部甚有恤民之誠但綱維不革自非綱目所理尋陽接蠻宜有防遏可即州府千兵以助郡戌於是解悅都督將軍官以刺史移鎮豫章毅以親將趙惔領千兵守尋陽建威府文武三千悉入毅府符攝嚴峻數相挫辱悦不得志疽發背到豫章少日卒時年三十八追贈征虜將軍以廣固之功追封新陽縣五等男王誕字茂世琅邪臨沂人太保𢎞從兄也祖恬中軍將軍父混太常誕少有才藻晉孝武帝崩從叔尚書令珣為哀䇿文久而未就謂誕曰猶少序節物一句因出本示誕誕攬筆便益之接其秋冬代變後云霜繁廣除風回高殿珣嗟歎清拔因而用之襲爵雉鄉侯拜秘書郎琅邪王文學中軍功曹隆安四年會稽王世子元顯開後軍府乂以誕補功曹尋除尚書吏部郎仍為後軍長史領廬江太守加鎮蠻䕶軍轉龍驤將軍琅邪内史長史如故誕結事元顯嬖人張法順故為元顯所寵元顯納妾誕為之親迎隨府轉驃騎長史將軍内史如故元顯討桓𤣥欲悉誅桓氏誕固陳修等與𤣥志趣不同由此得免修誕甥也及𤣥得志誕將見誅修為之陳請又言修等得免之由乃徙誕廣州盧循據廣州以誕為其平南府長史甚賓禮之誕久客思歸乃說循曰下官流遠在此被蒙殊眷士感知已實思報答本非戎旅在此無用素為劉鎮軍所識情味不淺若得北歸必蒙任寄公私際會思報厚恩愈於停此空移歲月循甚然之時廣州刺史呉隠之亦為循所拘留誕又曰將軍今留呉公公私非計孫伯符豈不欲留華子魚但以一境不容二君耳於是誕及隠之並得還除員外散騎常侍未拜高祖請為太尉諮議參軍轉長史盡心歸奉日夜不懈高祖甚委仗之北伐廣固領齊郡太守盧循自蔡州南走劉毅固求追討高祖持疑未決誕密白曰公既平廣固復滅盧循則功蓋終古勲無與二如此大威豈可餘人分之毅與公同起布衣一時相推耳今既已喪敗不宜復使立功高祖從其說七年以誕為呉國内史母憂去職高祖征劉毅起為輔國將軍誕固辭軍號墨絰從行時諸葛長民行太尉留府事心不自安高祖甚慮之毅既平誕求先下高祖曰長民似有自疑心卿詎宜便去誕曰長民知我蒙公垂眄今輕身單下必當以為無虞乃可以少安其意高祖笑曰卿勇過賁育矣於是先還九年卒時年三十九以南北從征追封作唐縣五等侯子詡宋世子舍人早卒謝景仁陳郡陽夏人衞將軍晦從叔父也名與高祖同諱故稱字祖據太傅安第二弟父允宣城内史景仁幼時與安相及為安所知始為前軍行參軍輔國參軍事會稽王世子元顯嬖人張法順權傾一時内外無不造門者唯景仁不至年三十方為著作郎桓𤣥誅元顯見景仁甚知之謂四坐曰司馬庻人父子云何不敗遂令謝景仁三十方作著作郎𤣥為太尉以𥙷行參軍府轉大將軍仍參軍事𤣥建楚臺以補黃門侍郎及簒位領驍騎將軍景仁博聞強識善叙前言往行𤣥每與之言不倦也𤣥出行殷仲文卞範之之徒皆騎馬散從而使景仁陪輦高祖為桓修撫軍中兵參軍嘗詣景仁諮事景仁與語悅之因留高祖共食食未辦而景仁為𤣥所召𤣥性促急俄頃之間騎詔續至高祖屢求去景仁不許曰主上見待要應有方我欲與客共食豈當不得待竟安坐飽食然後應召高祖甚感之嘗謂景仁是太傅安孫及平京邑入鎮石頭景仁與百僚同見高祖高祖目之曰此名公孫也謂景仁曰承制府須記室參軍今當相屈以為大將軍武陵王遵記室參軍仍為從事中郎遷司徒左長史出為高祖鎮軍司馬領晉陵太守復為車騎司馬義熙五年高祖以内難既寧思𢎞外略將伐鮮卑朝議皆謂不可劉毅時鎮姑熟固止高祖以為苻堅侵境謝太傅猶不自行宰相逺出傾動根本景仁獨曰公建桓文之烈應天人之心匡復皇祚芟夷姦逆雖業高振古而徳刑未孚宜推亡固存廣樹威略鮮卑密邇疆甸屢犯邊垂伐罪弔民於是乎在平定之後養銳息徒然後觀兵洛汭修復園寑豈有坐長寇虜縱敵貽患者哉高祖納之及北伐大司馬琅邪王天子母弟屬當儲副高祖深以根本為憂轉景仁為大司馬司馬專總府任右衛將軍加給事中又遷吏部尚書時從兄混為左僕射依制不得相臨高祖啓依僕射王彪之尚書王劭前例不解職坐選吏部令史邢安泰為都令史平原太守二官共除安泰以令史職拜謁陵廟為御史中丞鄭鮮之所糾白衣領職八年遷領軍將軍十一年轉右僕射仍轉左僕射景仁性矜嚴整潔居宇靜麗毎唾轉唾左石人衣事畢即聽一日澣濯每欲唾左右爭來受高祖雅相重申以婚姻廬陵王義眞妃景仁女也十二年卒時年四十七追贈金紫光禄大夫加散騎常侍𦵏日高祖親臨哭之甚慟與驃騎將軍道憐書曰謝景仁殞逝悲痛摧割不能自勝汝聞問惋愕亦不可堪其器體淹中情寄實重方欲與之共康時務一旦至此痛惜兼深往矣奈何當復奈何子恂鄱陽太守恂子穉善吹笙官至西陽太守景仁弟純字景懋初為劉毅豫州别駕毅鎮江陵以為衞軍長史南平相王鎮惡率軍襲毅已至城下時毅疾病佐吏皆入參承純參承畢已出聞兵至馳還入府左右引車欲還外解純叱之曰我人吏也逃欲何之乃入及毅兵敗衆散時已暗夜司馬毛修之謂純曰君但隨僕純不從扶兩人出火光中為人所殺純孫沈太宗泰始初為巴陵王休若衞軍録事參軍山隂令坐事誅述字景先少有志行隨兄純在江陵純遇害述奉純喪還都行至西塞值暴風純喪舫流漂不知所在述乗小船尋求之經純妻庾舫過庾遣人謂述曰喪舫存没已應有在風波如此豈可小船所冒小郎去必無及寧可存亡俱盡邪述號泣答曰若安全至岸當須營理如其已致意外述亦無心獨存因冒浪而進見純喪幾没述號呌呼天幸而獲免咸以為精靈所致也高祖聞而嘉之臨豫州諷中正以述為主簿甚被知噐景仁愛其第三弟甝而憎述嘗設饌請知高祖希命甝豫坐而高祖召述述知景仁夙意又慮高祖命之請急不從高祖馳遣呼述須至乃懽及景仁有疾述盡心營視湯藥飲食必嘗而後進不解帶不盥櫛者累旬景仁深懷感愧轉太尉參軍從征司馬休之封吉陽縣五等侯世子征虜參軍轉主簿宋臺尚書祠部郎世子中軍主簿轉太子中舍人出補長沙内史有惠政元嘉二年徵拜中書侍郎明年出為武陵太守彭城王義康驃騎長史領南郡太守先是述從兄曜為義康長史喪官述代之太祖與義康書曰今以謝述代曜其才應詳練著於歴職故以佐汝汝始親庶務而任重事殷宜寄懐羣賢以盡弼諧之羙想自得之不俟吾言也義康入相述又為司徒左長史轉左衞将軍蒞官清約私無宅舍義康遇之甚厚尚書僕射殷景仁領軍將軍劉湛並與述為異常之交羙風姿善舉止湛每謂人曰我見謝道兒未嘗足道兒述小字也雍州刺史張邵以黷貨下廷尉將致大辟述上表陳邵先朝舊勲宜䝉優貸太祖手詔酬納焉述語子綜曰主上矜邵夙誠將加曲恕吾所啓謬㑹故特見酬納耳若此疏迹宣布則為侵奪主恩不可之大者也使綜對前焚之太祖後謂邵曰卿之獲免謝述有力焉述有心虗疾性理時或乖謬除呉郡太守以疾不之官病差補呉興太守在郡清省為吏民所懷十二年卒時年四十六喪還京師未至數十里殷景仁劉湛同乗迎赴望船流涕十七年劉湛誅義康外鎮將行歎曰謝述唯勸吾退劉湛唯勸吾進今述亡而湛存吾所以得罪也太祖亦曰謝述若存義康必不至此三子綜約緯綜有才藝善𨽻書為太子中舍人與舅范曄謀反伏誅約亦坐死緯尚太祖第五女長城公主素為約所憎免死徙廣州孝建中還京師方雅有父風太宗泰始中至正員郎中袁湛字士深陳郡陽夏人也祖躭晉歴陽太守父質琅邪内史並知名湛少為從外祖謝安所知以其兄子𤣥之女妻之初為衛軍行參軍員外散騎通直正員郎中軍功曹桓𤣥太尉奉軍事入為中書黃門侍郎出補桓修撫軍長史義旗建高祖以為鎮軍諮議參軍明年轉尚書吏部郎司徒左長史侍中以從征功封晉寧縣五等男出為高祖太尉長史遷左民尚書徙掌吏部出為呉興太守秩中二千石莅政和理為吏民所稱入補中書令又出為呉國内史秩中二千石義熙十二年轉尚書右僕射本州大中正時高祖北伐湛兼太尉與兼司空散騎常侍尚書范泰奉九命禮物拜授高祖高祖沖讓湛等隨軍至洛陽住柏谷塢泰議受使未畢不拜晉帝陵湛獨至五陵致敬時人羙之初陳郡謝重王胡之外孫於諸舅禮敬多闕重子絢湛之甥也嘗於公座凌湛湛正色謂曰汝便是兩世無渭陽之情絢有愧色十四年卒官時年四十追贈左光禄大夫加散騎常侍太祖即位以后父追贈侍中以左光禄大夫開府儀同三司諡曰敬公世祖大明三年幸藉田行經湛墓下詔曰故侍中左光禄大夫開府儀同三司晉寧敬公外氏尊戚素風簡正歲紀稍積墳塋浸遠朕近廵覽千畆遙瞻松隧緬惟徽塵感慕增結可遣使祭少中永懷又增守墓五户子淳淳子桓卒湛弟豹字士蔚亦為謝安所知好學博聞多覽典籍初為著作佐郎衞軍桓謙記室參軍大將軍武陵王遵承制復為記室參軍其年丹陽尹孟昶以為建威司馬歲餘轉司徒左西屬遷劉毅撫軍諮議參軍領記室毅時建議大田豹上議曰國因民以為本民資食以為天修其業則敎興崇其本則末理實為治之要道致化之所階也不敦其本則末業滋章饑寒交凑則廉耻不立當今接簒偽之末値凶荒之餘爭源既開彫薄彌啓榮利蕩其正性賦歛罄其所資良疇無側趾之耦比屋有困餧之患中間多故日不暇給自卷甲郤馬甫一二年積弊之黎難用克振實仁懷之所矜恤明教之所爰發也然斯業不修有自來矣司牧之官莫或為務俗吏庸近猶秉常科依勸督之故典迷民情之屢變譬猶修隄以防川忘淵丘之改易膠柱於昔弦忽宫啇之乖調徒有考課之條而無毫分之益不悟清流在於澄源止輪由乎高閾患生於本治之於末故也夫設位以崇賢疏爵以命士上量能以審官不取人於浮譽則比周道息游者言歸游子既歸則南畆闢矣分職以任務置吏以周役職不以無任立吏必以非用省宂散者廢則萊荒墾矣噐以應用商以通財𠞰靡麗之巧棄難得之貨則彫偽者賤穀稼重矣耕耨勤悴力殷收寡工商逸豫用淺利深增賈販之稅薄疇畆之賦則末技抑而田畯喜矣居位無義從之徒在野靡兼并之黨給賜非可恩致力役不入私門則游食者反本肆勤者自勸游食省而肆勤衆則東作繁矣密勿者甄異怠慢者顯罰明勸課之令峻糾違之官則嬾惰無所容力田有所望力者欣而惰者懼則穡人勸矣凡此數事亦務田之端趣也莅之以清心鎮之以無欲朂之以無倦翼之以廉謹舍日計之小成期遠致於莫歲則澆薄自淳心化有漸矣豹善言雅俗每商較古今兼以誦詠聽者忘疲尋轉撫軍司馬遷御史中丞鄱陽縣侯孟懷玉上母檀氏拜國太夫人有司奏許豹以為婦人從夫之爵懷玉父大司農綽見居列卿妻不宜從子奏免尚書右僕射劉柳左丞徐羡之郎何邵之官詔並贖論孟昶卒豹代為丹陽尹義熙七年坐使徙上錢降為太尉咨議參軍仍轉長史從討劉毅高祖遣益州刺史朱齡石伐蜀使豹為檄文曰夫順德者昌逆德者亡失仁與義難以求安馮阻負釁鮮克有成詳觀自古隆替有數故成都不世祀華陽無興國日者王室多故夷羿遘紛波振塵駭覃及遐裔蕞爾譙縱編户黔首同惡相求是崇是長肆反噬於州相播毒害於民黎俾我西服隔閡皇澤自義風電靡天光反煇昭晢舊物烟煴區宇以庻務草剏未遑九伐自爾以來奄延十載而野心不革伺隙乗間招聚逋叛共相封殖侵擾我蠻獠揺蕩我疆垂我是以有治洲之役醜類盡殪匹馬無遺桓謙折首譙福鳥逝奔伏窠穴引頸待戮當今北狄露晞南冦埃埽朝風載韙庻績其凝康哉之歌曰熙比屋之隆可詠孤職是經略思一九有眷彼禹跡願言載懷奉命西行途戾荆郢瞻望巴漢憤慨交深清江源於濫觴澄氛祲於井絡誅叛柔逺今也其時即命河間太守蒯恩下邳太守劉鍾精勇二萬直指成都龍驤將軍臧嘉戎卒二萬進自墊江益州刺史朱齡石舟師三萬電曜外水分遣輔國將軍索懇率漢中之衆濟自劒道振威將軍朱客子提寧州之銳渡瀘而入神兵四臨天綱宏掩衡翼千里金鼔萬張組甲貝胄景煥波屬華夷百濮雲㑹霧臻以此攻戰誰與為敵況又奉義而行以順而動者哉今三陜之隘在我境内非有岑彭荆門之險彌入其阻平衢四達實無鄧艾綿竹之艱山川之形抑非曩日攻守難易居然百倍當全蜀之疆士民之富子陽不能自安於庸僰劉禪不敢竄命於南中荆邯折謀伯約挫銳故知成敗有數非可智延此皆益土前事當今元龜也盛如盧循彊如容超陵威南海跨制北岱樓船萬䑹掩江葢汜鐵馬千羣充原塞隰然廣固之攻陸無完雉左里之戰水靡全舟或顯戮京畿或傳首萬里故知逆順有勢難以力抗斯又目前殷鑑深切著明者也梁益人士咸明王化雖驅迫一時本非奥主從之淫虐日月增播刑殺非罪死以澤量而待命寇讐之戮㩻䧢豺狼之吻豈不遡誠南凱延首東雲普天有來蘓之幸而一方懷後予之怨王者之師以仁為本舍逆取順爰自三驅齊斧所加縱身而已其有衿甲反接自投軍門者一無所問士子百姓列肆安堵審擇吉凶自求多祜大信之明皦若朝日如其迷復姦邪守愚不改火燎孟諸芝艾同爛河決金隄淵丘同體雖欲悔之亦將何及九年卒官時年四十一次年以參伐蜀之謀追封南昌縣五等子子洵元嘉中歴顯官廬陵王紹為南中郎將江州刺史年少未親政洵為長史潯陽太守行府州事元嘉末為呉郡太守元凶弑立加洵建威將軍置佐史會安東將軍隨王誕起義檄洵為前鋒加輔國將軍事平頃之卒追贈征虜將軍諡曰貞子長子顗别有傳少子覬好學善屬文有清譽於世官至司徒從事中郎武陵内史蚤􅌰洵弟濯揚州秀才蚤卒濯弟淑濯子粲並有别傳禇叔度河南陽翟人也曾祖裒晉太傅祖歆秘書監父爽金紫光禄大夫長兄秀之字長倩歴大司馬琅邪王從事中郎黃門侍郎高祖鎮西長史秀之妹恭帝后也雖晉氏姻戚而盡心於高祖遷侍中出補大司馬右司馬㳟帝即位為祠部尚書本州大中正高祖受命徙為太常元嘉元年卒官時年四十七秀之弟淡之字仲源亦歴顯官為高祖車騎從事中郎尚書吏部郎廷尉卿左衞將軍高祖受命為侍中淡之兄弟並盡忠事高祖恭帝毎生男輒令方便殺焉或誘賂内人或密加毒害前後非一及恭帝遜位居秣陵宮常懼見禍與禇后共止一室慮有酖毒自煑食於牀前高祖將殺不欲遣人入内令淡之兄弟視禇后禇后出别室相見兵人乃踰垣而入進藥於恭帝帝不肯飲曰佛敎自殺者不得復人身乃以被掩殺之後會稽郡缺朝議欲用蔡廓高祖曰彼自是蔡家佳兒何關人事可用佛佛淡之小字也乃以淡之為會稽太守景平二年富陽縣孫氏聚合門宗謀為逆亂其支黨在永興縣潛相影響永興令羊恂覺其姦謀以告淡之淡之不信乃以誣人之罪收縣職局於是孫法亮號冠軍大將軍與孫道慶等攻没縣邑即用富陽令顧粲為令加輔國將軍遣偽建威將軍孫道仲孫公喜法殺攻永興永興民灟恭期初與賊同後反善就羊恂率吏民拒戰力少退敗賊用縣人許祖為令恂逃伏江唐山中尋復為賊所得使還行縣事賊遂磐據更相樹立遥以鄮令司馬文寅為征西大將軍孫道仲為征西長史孫道覆為左司馬與公喜法殺等建旗鳴鼔直攻山隂淡之自假凌江將軍以山隂令陸邵領司馬加振武將軍前員外散騎常侍王茂之為長史前國子博士孔欣前員外散騎常侍謝芩之並參軍事召行參軍七十餘人前鎮西諮議參軍孔寗子左光禄大夫孔季恭子山士在艱中皆起為將軍遣隊主陳願郡議曹掾虞道納二軍過浦陽江願等戰敗賊摧鋒而前去城二十餘里淡之遣陸邵督帶㦸公石綝廣武將軍陸允以水軍拒之又别遣行參軍灟恭期率歩軍與邵合力淡之率所領出次近郊恭期等與賊戰於柯亭大破之賊走還永興遣偽寧朔將軍孫倫領五百人攻錢唐與縣戍軍建武將軍戰於琦倫敗走還富陽倫因反善殺法步帥等十餘人送首京都詔遣殿中員外將軍徐卓領千人右將軍彭城王義康遣龍驤將軍丘顯率衆五百東討司空徐羡之版揚州主簿沈嗣之為富陽令領五百人於呉興道東出並未至而賊平呉郡太守江夷輕行之職停呉一宿進至富陽分别善惡執送願徙賊餘黨數百家於彭城壽陽青州諸處二年淡之卒時年四十五諡曰質子叔度名與高祖同故以字行初為太宰琅邪王參軍高祖車騎參軍事司徒左西屬中軍咨議參軍署中兵加建威將軍從伐鮮卑盡其誠力盧循攻查浦叔度力戰有功循南走高祖版行廣州刺史仍除都督交廣二州諸軍事建威將軍領平越中郎將廣州刺史桓𤣥族人開山聚衆謀掩廣州事覺叔度悉平之義熙八年盧循餘黨劉敬道窘廹詣交州歸降交州刺史杜慧度以事言統府叔度以敬道等路窮請命事非欵誠報使誅之慧度不加防録敬道招集亡命攻破九真殺太守杜章民慧度討平之叔度輒貶慧度號為奮揚將軍惡不先上為有司所糾詔原之高祖征劉毅叔度遣三千人過嶠荆州平乃還在任四年廣營賄貨家財豐積坐免官禁錮終身還至都凡諸舊及有一靣之欵無不厚加贈遺尋除太尉咨議參軍相國右司馬高祖受命為右衛將軍高祖以其名家而能竭盡心力甚嘉之乃下詔曰夫賞不道勤則勞臣增勸爵必疇庸故在功咸達叔度南北征討常管戎要西夏不度誠著嶺表可封番禺縣男食邑四百户尋加散騎常侍永初三年出為使持節監雝梁南北秦四州之南陽竟陵順陽義陽新野隨六郡諸軍事征虜將軍雝州刺史領寧蠻校尉襄陽義成太守在任每以清簡致稱景平二年卒時年四十四子恬之嗣官至南琅邪太守恬之卒子昭嗣昭卒子瑄嗣齊受禪國除叔度第二子寂之著作佐郎早卒子授尚太祖第六女琅邪貞長公主太宰參軍亦早卒秀之弟湛之字休𤣥尚高祖第七女始安哀公主拜駙馬都尉著作郎哀公主薨復尚高祖第五女呉郡宣公主諸尚公主者並用世胄不必皆有才能湛之謹實有意幹故為太祖所知歴顯位揚武將軍南彭城沛二郡太守太子中庻子司徒左長史侍中左衞將軍左民尚書丹陽尹元凶弑逆以為吏部尚書復出為輔國將軍丹陽尹統石頭戍事世祖入伐劭自攻新亭壘使湛之率水師俱進湛之因攜二息淵澄輕船南奔淵有一男始生為劭所殺世祖即位以為尚書右僕射孝建元年為中書令丹陽尹坐南郡王義宣諸子逃藏郡界建康令王興之江寧令沈道源下獄湛之免官禁錮其年復為散騎常侍左衞將軍俄遷侍中左衞如故以久疾拜散騎常侍光禄大夫加金章紫綬頃之復為丹陽尹光禄如故尋為尚書左僕射以南奔賜爵都鄉侯大明四年卒時年五十追贈侍中特進驃騎將軍給鼔吹一部左僕射如故諡曰敬侯子淵庻生宣公主以淵有才表為嫡嗣淵昇明末為司空史臣曰高祖雖累葉江南楚言未變雅道風流無聞焉爾凡此諸子並前代名家莫不望塵請職負羇先路將由庇民之道邪宋書卷五十二宋書卷五十二考證謝景仁傳景仁愛其第三弟甝而憎述嘗設饌請知高祖希命甝豫坐而高祖召述述知景仁夙意請知知字疑衍述知下一本有非字袁湛傳桓元太尉奉軍事奉當作參子淳淳子桓卒南史作子淳淳子植並早卒宋書卷五十二考證
