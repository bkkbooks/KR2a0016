body:
  text: 宋書卷五十五梁沈約撰列傳第十五臧燾徐廣傅隆臧燾字徳仁東莞莒人武敬皇后兄也少好學善三禮貧約自立操行為鄉里所稱晉孝武帝太元中衛將軍謝安始立國學徐兖二州刺史謝𤣥舉燾為助敎孝武帝追崇庶祖母宣太后議者或謂宜配食中宗燾議曰陽秋之義母以子貴故仲子成風咸稱夫人經云考仲子之宫若配食惠廟則宫無緣别築前漢孝文孝昭太后並繫子為號祭於寢園不配於髙祖孝武之廟後漢和帝之母曰恭懐皇后安帝祖母曰恭愍皇后雖不繫子為號亦祭於陵寢不配章安二帝此則二漢雖有太后皇后之異至于並不配食義同陽秋唯光武追廢吕后故以薄后配髙祖廟又衛后既廢霍光迨尊李夫人為皇后配孝武廟此非母以子貴之例直以髙武二廟無配故耳夫漢立寢扵陵自是晉制所異謂宜逺凖陽秋考宮之義近摹二漢不配之典尊號既正則罔極之情申别建寢廟則嚴禰之義顯繫子為稱兼明母貴之所由一舉而允三義固哲王之髙致也議者従之頃之去官以母老家貧與弟熹俱棄人事躬耕自業約己養親者十餘載父母䘮亾居喪六年以毁瘠著稱服闋除臨沂令義旗建為太學博士叅右將軍何無忌軍事隨府轉鎮南將軍髙祖鎮京口與燾書曰頃學尚廢弛後進頺業衡門之内清風輟響良由戎車屢警禮樂中息浮夫近志情與事染豈可不敷崇墳籍敦厲風尚此境人士子姪如林明發搜訪想聞令軌然荆玉含寶要俟開瑩幽蘭懐馨事資扇發獨習寡悟義著周典今經師不逺而赴業無聞非唯志學者鮮或是勸誘未至邪想復𢎞之參髙祖中軍軍事入補尚書度支郎改掌祠部襲封髙陵侯時太廟鴟尾災燾謂著作郎徐廣曰昔孔子在齊聞魯廟災曰必桓僖也今征西京兆四府君宜在毁落而猶列廟饗此其徵乎乃上議曰臣聞國之大事在祀與戎將營宫室宗廟為首古先哲王莫不致肅恭之誠心盡崇嚴乎祖考然後能流淳化於四海通幽感於神明固宜詳廢興於古典循情理以求中者也禮天子七廟三昭三穆與太祖而七自考廟以至祖考五廟皆月祭之逺廟為祧有二祧享嘗乃止去祧為壇去壇為墠有禱然後祭之此宗廟之次親疏之序也鄭𤣥以為祧者文王武王之廟王肅以為五世六世之祖尋去祧之言則祧非文武之廟矣周之祖宗何云去祧為壇乎明逺廟為祧者無服之祖也又逺廟則有享嘗之禮去祧則有壇墠之殊明世逺者其義彌踈也若祧是文武之廟宜同月祭於太祖雖推后稷以配天由功徳之所始非尊崇之義每有差降也又禮有以多貴者故傳稱徳厚者流光徳薄者流卑又云自上以下降殺以兩禮也此則尊卑等級之典上下殊異之文而云天子諸侯俱祭五廟何哉又王祭嫡殤下及來孫而上祀之禮不過髙祖推隆恩於下流替誠敬扵尊屬亦非聖人制禮之意也是以泰始建廟從王氏議以禮父為士子為天子諸侯祭以天子諸侯其尸服以士服故上及征西以備六世之數宣皇雖為太祖尚在子孫之位至於敬祭之日未申東向之禮所謂子雖齊聖不先父食者矣今京兆以上既遷太祖始得居正議者以昭穆未足欲屈太祖於卑坐臣以為非禮典之㫖所與太祖而七自是昭穆既足太祖在六世之外非為湏滿七廟乃得居太祖也議者又以四府君神主宜永同於殷祫臣又以為不然傳所謂毁廟之主陳乎太祖謂太祖以下先君之主也故白虎通云禘祫祭遷廟者以其繼君之體持其統而不絶也豈如四府君在太祖之前非繼統之主無靈命之瑞非王業之基昔以世近而及今則情禮已逺而當長饗殷祫永虚太祖之位求之禮籍未見其可昔永和之初大議斯禮于時虞喜范宣並以淵儒碩學咸謂四府君神主無緣永存於百世或欲瘞之兩階或欲藏之石室或欲為之改築雖所秉小異而大歸是同若宣皇既居羣廟之上而四主禘祫不已則大晉殷祭長無太祖之位矣夫理貴有中不必過厚禮與世遷豈可順而不斷故臣子之情雖篤而靈厲之諡彌彰追逺之懐雖切而遷毀之禮為用豈不有心扵加厚顧禮制不可踰爾石室則藏於廟北改築則未知所處虞主所以依神神移則有瘞埋之禮四主若饗祀宜廢亦神之所不依也准旁事例宜同虞主之瘞埋然經典難詳羣言紛錯非臣卑淺所能折中時學者多従燾議竟未施行遷通直郎髙祖鎮軍車騎中軍太尉諮議參軍髙祖北伐關洛大司馬琅邪王同行除大司馬従事中郎總留府事義熈十四年除侍中元熙元年以脚疾去職髙祖受命徵拜太常雖外戚貴顯而彌自沖約茅屋蔬飡不改其舊所得奉禄與親戚共之永初三年致仕拜光禄大夫加金章紫綬其年卒時年七十少帝追贈左光禄大夫加散騎常侍長子邃䕶軍司馬宜都太守少子綽太子中舎人新安太守邃長子諶之尚書都官郎烏程令諶之弟凝之學渉有當世才具與司空徐湛之為異常之交年少時與北地傅僧祐俱以通家子始為太祖所引見時上與何尚之論鑄錢事凝之便干其語上因回與論之僧祐引凝之衣令止凝之大言謂僧祐曰明主難再遇便應正盡所懐上與往復十餘反凝之詞韻銓序兼有理證上甚賞焉歴隨王誕後軍記室録事欲以為青州其事不果遷尚書右丞以徐湛之黨為元凶所殺子夤尚書主客郎沈攸之征西功曹為攸之盡節事在攸之傳凝之弟潭之亦有美譽太宗世歴尚書吏部郎御史中丞後廢帝元徽中為民部尚書卒官潭之弟澄之太子左積弩將軍元嘉二十七年領軍於旴𣅿為索虜所破見殺追贈通直郎綽子煥順帝昇明中為武昌大守沈攸之攻郢城煥棄郡赴之攸之敗伏誅傅僧祐祖父𢎞仁髙祖外弟也以中表歴顯官征虜將軍南譙太守太常卿子邵員外散騎侍郎妻燾女也生僧祐有吏才再為山隂令甚有能名末世令長莫及亦以徐湛之黨為元凶所殺徐廣字野民東莞姑幕人也父藻都水使者兄邈太子前衛率家世好學至廣尤精百家數術無不研覽謝𤣥為州辟廣從事西曹又譙王司馬恬鎮北參軍晉孝武帝以廣博學除為祕書郎校書秘閣増置職僚轉員外散騎侍郎領校書如故隆安中尚書令王珣舉為祠部郎李太后薨廣議服曰太皇太后名位允正體同皇極理制備盡情禮彌申陽秋之義母以子貴既稱夫人禮服從正故成風顯夫人之號僖公服三年之䘮子於父之所生體尊義重且祖不厭孫固宜遂服無屈而縁情立制若嫌明文不存則疑斯從重謂應同於為祖母後齊衰三年服従其議時㑹稽王世子元顯録尚書欲使百僚致敬臺内使廣立議由是内外竝執下官禮廣常為愧恨焉元顯引為中軍參軍遷領軍長史桓𤣥輔政以為大將軍文學祭酒義熙初髙祖使撰軍服儀注乃除鎮軍咨議參軍領記室封樂成縣五等侯轉員外散騎常侍領著作郎二年尚書奏曰臣聞左史述言右官書事乘志顯於晉鄭陽秋著乎魯史自皇代有造中興晉祀道風帝典煥乎史策而太和以降世歴三朝𤣥風聖迹倐為疇古臣等參詳宜敕著作郎徐廣撰成國史詔曰先朝至徳光被未著方䇿宜流風𬗟代永貽將來者也便敕撰集六年遷散騎常侍又領徐州大中正轉正員常侍時有風雹為灾廣獻書髙祖曰風雹變未必為灾古之聖賢輙懼而修己所以興政化而隆德敎也嘗忝服事宿眷未忘思竭塵露率誠于習明公初建義旗匡復宗社神武應運信宿平夷且恭謙儉約虚心匪懈來蘇之化功用若神頃事故既多刑德並用戰功殷積報叙難盡萬機繁湊固應難速且小細煩密羣下多懼又榖帛豐賤而民情不勸禁司互設而刼盗多有誠由俗弊未易整而望深未易炳追思義熙之始如有不同何者好安願逸萬物之大趣習舊駭新凡識所不免要當俯順羣情抑揚隨俗則朝野歡泰具瞻允康矣言無可採願矜其愚欵之志又轉大司農領著作郎皆如故十二年晉紀成凡四十六卷表上之遷秘書監初桓𤣥簒位安帝出宫廣陪列悲慟哀動左右及髙祖受禪恭帝遜位廣又哀感涕泗交流謝晦見之謂之曰徐公將無小過廣收淚答曰身與君不同君佐命興王逢千載嘉運身世荷晉徳實眷戀故主因更歔欷永初元年詔曰祕書監徐廣學優行謹歴位恭肅可中散大夫廣上表曰臣年時衰耄朝敬永闕端居都邑徒増替怠臣墳墓在晉陵臣又生長京口戀舊懐逺每感暮心息道𤣥謬荷朝恩忝宰此邑乞相隨之官歸終桑梓㣲志獲申殞没無恨許之贈賜甚厚性好讀書老猶不倦元嘉二年卒時年七十四答禮問百餘條用於今世廣子豁在良吏傳傅隆字伯祚北地靈州人也髙祖咸晉司隸校尉曽祖晞司徒屬父祖早亡隆少孤又無近屬單貧有學行不好交㳺義熙初年四十始為孟昶建威將軍員外散騎侍郎坐辭兼免復為㑹稽征虜參軍家在上虞及東歸便有終焉之志歴佐三軍首尾八年除給事中尚書僕射丹陽尹徐羡之置建威府以為録事參軍尋轉尚書祠部郎丹陽丞入為尚書左右丞以族弟亮為僕射緦服不得相臨徙太子率更令廬陵王義真車騎咨議參軍出補山陰令太祖元嘉初除司徒右長史遷御史中丞當官而行甚得司直之體轉司徒右長史時㑹稽剡縣民黄初妻趙打息載妻王死亾遇赦王有父母及息男稱息女葉依法徙趙二千里外隆議之曰原夫禮律之興葢本之自然求之情理非従天墮非從地出也父子至親分形同氣稱之於載即載之於趙雖云三世為體猶一未有能分之者也稱雖創巨痛深固無讐祖之義若稱可以殺趙趙當何以處載將父子孫祖互相殘戮懼非先王明罰咎繇立法之本㫖也向使日磾之孫砥鋒挺鍔不與二祖同戴天日則石碏秺侯何得流名百代以為美談者哉舊令云殺人父母徙之二千里外不施父子孫祖明矣趙當避王朞功千里外耳令亦云凡流徙者同籍親近欲相隨者聽之此又大通情體因親以敎愛者也趙既流移載為人子何得不從載從而稱不行豈名敎所許如此稱趙竟不可分趙雖内愧終身稱當沈痛沒齒孫祖之義自不得永絶事理固然也從之又出為義興太守在郡有能名徵拜左民尚書坐正直受節假對人未至委出白衣領職尋轉太常十四年太祖以新撰禮論付隆使下意隆上表曰臣以下愚不渉師訓孤陋閭閻面牆靡識謬䝉詢逮愧懼流汗原夫禮者三千之本人倫之至道故用之家國君臣以之尊父子以之親用之婚冠少長以之仁愛夫妻以之義順用之鄉人友朋以之三益賓主以之敬讓所謂極乎天蟠乎地窮髙逺測深厚莫尚於禮也其樂之五聲易之八象詩之風雅書之典誥春秋之微婉勸懲無不本乎禮而後立也其源逺流廣其體大而義精非夫叡哲大賢孰能明乎此哉况遭暴秦焚亡百不存一漢興始徵召故老搜集殘文其體例紕繆首尾脫落難可詳論幸髙堂生頗識舊義諸儒各為章句之説既明不獨逹所見不同或師資相傳共枝别幹故聞人二戴俱事后蒼俄已分異盧植鄭𤣥偕學馬融人各名家又後之學者未逮曩時而問難星繁充斥兼兩揺文列錦煥爛可觀然而五服之本或差哀敬之制舛雜國典未一於四海家法叅駁於搢紳誠宜考詳逺慮以定皇代之盛禮者也伏惟陛下欽明𤣥聖同規唐虞疇咨四岳興言三禮而伯夷未登微臣竊位所以大懼負乘形神交惡者無忘夙夜矣而復猥充博採之數與聞爰發之求寔無以仰酬聖㫖萬分之一不敢廢嘿謹率管穴所見五十二事上呈蚩鄙茫浪伏用竦赧明年致仕拜光禄大夫歸老在家手不釋卷博學多通特精三禮謹於奉公常手抄書籍二十八年卒時年八十三史臣曰選賢於野則治身業𢎞求士於朝則飾智風起六經奥逺方軌之正路百家淺末㨗至之偏道漢世登士閭黨為先崇本務學不尚浮詭然後可以俯拾青組顧蔑籯金於是人厲従師之志家競專門之術藝重當時所居一旦成市黌舎蹔啓著録或至萬人是故仕以學成身由義立自魏氏膺命主愛雕蟲家棄章句人重異術又選賢進士不本鄉閭銓衡之寄任歸臺閣以一人之耳目究山川之險情賢否臆斷萬不值一由是仕憑借譽學非為己崇詭遇之巧速鄙税駕之遲難士自此委笥植經各從所務早往晏退以取世資庠序黌校之士𫝊經聚徒之業自黄初至于晉末百餘年中儒敎盡矣髙祖受命議創國學宫車早晏道未及行迄于元嘉甫獲克就雅風盛烈未及曩時而濟濟焉頗有前王之遺典天子鸞旗警蹕清道而臨學館儲后冕旒黼黻北靣而禮先師後生所不嘗聞黄髮未之前覩亦一代之盛也臧燾徐廣傅隆裴松之何承天雷次宗並服膺聖哲不為雅俗推移立名於世宜矣頴川庾蔚之鴈門周野王汝南周王子河内向琰㑹稽賀道飬皆託志經書見稱扵後學蔚之略解禮記并注賀循喪服行於世云宋書卷五十五宋書卷五十五考證臧燾傳雖外戚貴顯而彌自沖約貴監本作䝿蓋因說文作䝿而訛也今改正宋書卷五十五考證
