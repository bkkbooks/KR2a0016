body:
  text: 宋書卷五十六梁沈約撰列傳第十六謝瞻孔琳之謝瞻字宣逺一名檐字通逺陳郡陽夏人衛將軍晦第三兄也年六嵗能屬文為紫石英讚果然詩當時才士莫不歎異初為桓偉安西叅軍楚臺祕書郎瞻幼孤叔母劉撫養有恩紀兄弟事之同於至親劉弟柳為吴郡将姊俱行瞻不能違解職隨從為柳建威長史尋為髙祖鎮軍琅邪王大司馬參軍轉主簿安成相中書侍郎宋國中書黄門侍郎相國從事中郎弟晦時為宋臺右衛權遇己重於彭城還都迎家賔客輻輳門巷填咽時瞻在家驚駭謂晦曰汝名位未多而人歸趣乃爾吾家素以退為業不願干豫時事交遊不過親朋而汝遂勢傾朝野此豈門户之福邪乃籬隔門庭曰吾不忍見此及還彭城言於髙祖曰臣本素士父祖位不過二千石弟年始三十志用凡近榮冠臺府位任顯密福過災生其應無逺特乞降黜以保衰門前後屢陳髙祖以瞻為吴興郡又自陳請乃為豫章太守晦或以朝廷密事語瞻瞻輙向親舊陳説以為笑戲以絶其言晦遂建佐命之功任寄隆重瞻愈憂懼永初二年在郡遇疾不肯自治幸於不永晦聞疾奔往瞻見之曰汝為國大臣又總戎重萬里逺出必生疑謗時果有訴告晦反者瞻疾篤還都髙祖以晦典禁旅不得出宿使瞻居于晉南郡公主婚羊賁故第在領軍府東門瞻曰吾有先人敝廬何為於此臨終遺晦書曰吾得啓體幸全歸骨山足亦何所多恨弟思自勉厲為國為家遂卒時年三十五瞻善於文章辭采之美與族叔混弟靈運相抗靈運父奐無才能為祕書郎早年而亡靈運好臧否人物混患之欲加裁折未有方也謂瞻曰非汝莫能乃與晦曜𢎞微等共遊戲使瞻與靈運登車便商較人物瞻謂之曰祕書早亡談者亦互有同異靈運黙然言論自此衰止弟㬭字宣鏡幼有殊行年數嵗所生母郭氏久嬰痼疾晨昬溫凊和藥捧膳不闕一時勤容戚顔未嘗暫改恐僕役營疾懈倦躬自執勞母為病畏驚㣲賤過甚一家尊卑感㬭至性咸納屨而行屏氣而語如此者十餘年初為州主簿中軍行參軍太子舎人俄遷祕書丞自以兄居權貴已䝉超擢固辭不就徐羡之請為司空長史黄門郎元嘉三年從坐伏誅時年三十一有詔宥其子世平又早卒無後孔琳之字彦琳會稽山隂人祖沈晉丞相掾父殿光禄大夫琳之彊正有志力好文義解音律能彈棊妙善草隸郡命主簿不就後辟本國常侍輕之尉桓𤣥時議欲廢錢用榖帛琳之議曰洪範八政以貨次食豈不以交易之資為用之至要者乎若使不以交易百姓用力於為錢則是妨其為生之業禁之可也今農自務榖工自務器四民各肄其業何嘗致勤於錢故聖王制無用之貨以通有用之財既無毁敗之費又省運置之苦此錢所以嗣功龜貝歴代不廢者也榖帛為寳本充衣食今分以為貨則致損甚多又勞毀於商販之手耗棄於割截之用此之為敝著於自曩故鍾繇曰巧偽之民競藴濕榖以要利制薄絹以充資魏世制以嚴刑弗能禁也是以司馬芝以為用錢非徒豐國亦所以省刑錢之不用由於兵亂積久自至於廢有由而然漢末是也今既用而廢之則百姓頓亡其財今括囊天下榖以周天下之食或倉庾充衍或糧靡斗儲以相資通則貧者仰富致之之道寔假於錢一朝斷之便為棄物是有錢無糧之民皆坐而饑困此斷錢之立敝也且據今用錢之處不為貧用榖之處不為富又民習來久革之必惑語曰利不百不易業况又錢便於榖邪魏明帝時錢廢榖用三十年矣以不便於民乃舉朝大議精力達治之士莫不以宜復用錢民無異情朝無異論彼尚舎榖帛而用錢足以明榖帛之弊著扵己試世謂魏氏不用錢久積累巨萬故欲行之利公富國斯殆不然昔晉文後舅犯之謀而先成季之信以為雖有一時之勲不如萬世之益于時名賢在列君子盈朝大謀天下之利害将定經國之要術若榖實便錢義不昧當時之近利而廢永用之通業㫁可知矣斯實由困而思革改而更張耳近孝武之末天下無事時和年豐百姓樂業便自榖帛殷阜幾乎家給人足騐之事實錢又不妨民也頃兵革屢興荒饉洊及飢寒未振寔此之由公既援而拯之大革視聽𢎞敦本之敎明廣農之科敬授民時各順其業逰蕩知反務末自休固以南畝競力野無遺壤矣于是以往升平必至何衣食之足䘏愚謂救弊之術無取於廢錢𤣥乂議復肉刑琳之以為唐虞象刑夏禹立辟葢淳薄既異致化寔同寛猛相濟惟變所適書曰刑罰世輕世重言隨時也夫三代風純而事簡故罕蹈刑辟季末俗巧而務殷故動陷憲網若三千行於叔世必省踊貴之尤此五帝不相循法肉刑不可悉復者也漢文發仁惻之意傷自新之路莫由革古創制號稱刑措然名輕而實重反更傷民故孝景嗣位輕之以緩緩而民慢又不禁邪期于刑罰之中所以見美在昔歴代詳論而未獲厥中者也兵荒後罹法更多棄市之刑本斬右趾漢文一謬承而弗革所以前賢悵恨議之而未辯鍾繇陳羣之意雖小有不同而欲右趾代棄市若從其言則所活者衆矣降死之生誠為輕法然人情慎顯而輕昧忽逺而驚近是以盤盂有銘韋弦作佩况在小人尤其所惑或目所不覩則忽而不戒日陳於前則驚心駭矚由此言之重之不必不傷輕之不必不懼而可以全其性命蕃其産育仁既濟物功亦益衆又今之所患逋逃為先屢叛不革逃身靡所亦以肅戒未犯永絶惡原至於餘條宜依舊制豈曰允中貴獻管穴𤣥好人附悅而琳之不能順㫖是以不見知遷楚臺員外散騎侍郎遭母憂去職服闋除司徒左西掾以父致仕自解時司馬休之為㑹稽内史後將軍仍以琳之為長史父憂去官服闋補太尉主簿尚書左丞揚州治中從事史所居著績衆官獻便宜議者以為宜修庠序䘏典刑審官方明黜陟舉逸拔才務農簡調琳之於衆議之外别建言曰夫璽印者所以辯章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歴代迭用襲封之印奕世相傳貴在仍舊無取改作今世惟尉一職獨用一印至於内外羣官每遷悉改討尋其義私所未逹若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣衆僚之卑何嫌於即印載籍未聞其説推例自乖其准而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚謂衆官即用一印無煩改作若有新置官又官多印少文或零失然後乃鑄則仰禆天府非唯小益又曰凶門栢裝不出禮典起自末代積習生常遂成舊俗爰自天子逹于庻人誠行之有由卒革必駭然茍無闗於情而有愆禮度存之未有所明去之未有所失固當式遵先典釐革後謬况復兼以㳺費寔為民患者乎凡人士喪儀多出閭里毎有此湏動十數萬損民財力而義無所取至于寒庶則人思自竭雖復室如懸罄莫不傾産殫財所謂𦵏之以禮其若此乎謂宜謹遵先典一罷凶門之式表以素扇足以示凶又曰昔事故飢荒米榖綿絹皆貴其後米價登復而絹于今一倍綿絹既貴蠶業者滋雖懃厲兼倍而貴猶不息愚謂致此良有其由昔事故之前軍器止用鎧而已至於袍襖裲襠必俟戰陣實在庫藏永無損毀今儀従直衛及邀羅使命有防衛迎送悉用袍襖之屬非惟一府衆軍皆然綿帛易敗勢不支久又晝以禦寒夜以寢卧曽未周年便自敗裂毎絲緜新登易折租以市又諸府競收勲有千萬積貴不已實由於斯私服為之難貴官庫為之空盡愚謂若侍衛所須固不可廢其餘則依舊用鎧小小使命送迎之屬止宜給仗不煩鎧襖用之既簡則其價自降又曰夫不恥惡食唯君子能之肴饌尚奢為日久矣今雖改張是𢎞而此風未革所甘不過一味而陳必方丈適口之外皆為説目之費富者以之示夸貧者為之單産衆所同鄙而莫能獨異愚謂宜粗為其品使奢儉有中若有不改加以貶黜則德儉之化不日而流遷尚書吏部郎義熈六年髙祖領平西將軍以為長史大司馬琅邪王從事中郎又除髙祖平北征西長史遷侍中宋臺初建除宋國侍中出為吴興太守公事免永初二年為御史中丞明憲直法無所屈撓奏劾尚書令徐羡之曰臣聞事上以奉憲為恭臨下以威嚴為整然後朝典惟明莅衆必肅斯道或替則憲綱其頽臣以今月七日預皇太子正㑹㑹畢車去幷猥臣停門待闕有何人乗馬當臣車前收捕驅遣命去何人罵詈收捕諮審欲録毎有公事臣常慮有紛紜語令勿問而何人獨罵不止臣乃使録何人不肯下馬連呌大喚有兩威儀走來擊臣收捕尚書令省事倪宗又牽威儀手力擊臣下人宗云中丞何得行凶敢録令公人凡是中丞收捕威儀悉皆縛取臣勑下人一不得鬭凶勢輈張有頃乃散又有羣人就臣車側録收捕樊馬子牙行築馬子頓伏不能還臺臣自録非本無對校而宗敢乗勢凶恣簒奪罪身尚書令臣羡之與臣列車紛紜若此或云羡之不禁或云羡之禁而不止縱而不禁既乖國憲禁而不止又不經通陵犯監司凶聲彰赫容縱宗等曽無紏問虧損國威無大臣之體不有凖繩風裁何寄羡之内居朝右外司輦轂位任隆重百辟所瞻而不能𢎞惜朝章肅是風軌致使宇下縱肆凌暴憲司凶赫之聲起自京邑所謂己有短垣而自踰之又宗為簒奪之主縦不紏問二三虧違宜有裁貶請免羡之所居官以公還第宗等簒奪之愆已屬掌故御史隨事檢處詔曰小人難可檢御司空無所問餘如奏羡之任居朝端不欲以犯憲示物時羡之領揚州刺史琳之弟璩之為治中羡之使璩之解釋琳之停寢其事琳之不許璩之固陳琳之謂曰我觸忤宰相正當罪止一身爾汝必不應從坐何須勤勤邪自是百僚震肅莫敢犯禁髙祖甚嘉之行經蘭臺親加臨幸又領本州大中正遷祠部尚書不治産業家尤貧素景平元年卒時年五十五追贈太常子邈有父風官至揚州治中從事史邈子覬别有傳覬弟道存世祖大明中歴黄門吏部郎臨海王子頊前軍長史南郡太守晉安王子勛建偽號為侍中行雍州事事敗自殺史臣曰民生所貴曰食與貨貨以通幣食為民天是以九棘播於農皇十朋興扵上代昔醇民未離情嗜踈寡奉生贍己事有易周一夫躬稼則餘食委室匹婦務織則兼衣被體雖懋遷之道通用濟乏龜貝之益為功葢輕而事有譌變姦敝代起昏作役苦故穡人去而従商商子事逸末業流而浸廣泉貨所通非復始造之意扵是競收罕至之珍逺蓄未名之貨明珠翠羽無足而馳絲罽文犀飛不待翼天下蕩蕩咸以棄本為事豐衍則同多稌之資饑凶又減田家之蓄錢雖盈尺既不療於堯年貝或如輪信無救於湯世其蠧病亦已深矣固宜一罷錢貨專用榖帛使民知役生之路非此莫由夫千匹為貨事難於懐璧萬斛為市未易扵越鄉斯可使末伎自禁㳺食知反而年世推移民與事習或庫盈朽貫而髙廩未充或家有藏鏹而良疇罕闢若事改一朝廢而莫用交易所寄旦夕無待雖致乎要術而非可卒行先宜削華止偽還淳反古抵璧幽峯捐珠清壑然後驅一世之民反耕桑之路使縑粟羡溢同於水火既而蕩滌圜法銷鑄勿遺立制垂統永傳于後比屋稱仁豈伊唐世桓𤣥知其始而不覽其終孔琳之覩其末而不統其本豈慮有開塞將一往之談可然乎宋書卷五十六宋書卷五十六考證謝瞻傳吾家素以退為業南史素字在以字下臣承蒼按素業二字乃當時常語蔡興宗傳云以業尚素立見稱即此意也素退是樸素恬退之義當從之靈運父奐奐南史作瑍使瞻與靈運登車便商較人物南史與字下有靈運共車四字謝㬭附傳母為病畏驚微賤過甚一家尊卑感㬭至性咸納屨而行屏氣而語南史驚字下有而字監本母字在為字下又賤字訛作踐今改正孔琳之傳父殿光禄大夫殿南史作廞後辟本國常侍輕之尉輕之二字疑誤史臣論一夫躬稼則餘食委室食一本作飡宋書卷五十六考證
