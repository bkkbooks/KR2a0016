body:
  text: 宋書卷六十七梁沈約撰列傳第二十七謝靈運謝靈運陳郡陽夏人也祖𤣥晉車騎將軍父瑍生而不慧為祕書郎蚤亡靈運㓜便頴悟𤣥甚異之謂親知曰我乃生瑍瑍那得生靈運靈運少好學博覽羣書文章之美江左莫逮從叔混特知愛之襲封康樂公食邑三千戸以國公例除員外散騎侍郎不就為琅邪王大司馬行參軍性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也撫軍將軍劉毅鎭姑孰以為記室參軍毅鎭江陵又以為衞軍從事中郎毅伏誅高祖版為太尉參軍入為祕書丞坐事免高祖伐長安驃騎將軍道憐居守版為諮議參軍轉中書侍郎又為世子中軍咨議黄門侍郎奉使慰勞高祖於彭城作撰征賦其序曰蓋聞昏明殊位貞晦異道雖景度回革亂多治寡是故升平難於恒運剝喪易以横流皇晉闕二字河汾來遷吳楚數歴九世年踰十紀西秦無一援之望東周有三辱之憤可謂積禍纒釁固以久矣况廼陵塋幽翳情敬莫遂日月推薄帝心彌遠慶靈將升時來不爽相國宋公得一居貞回乾運軸内匡寰表外清遐陬每以區宇未統側席盈慮値天祚攸興昧弱授機龜筮元謀符瑞景徵於是仰祗俯協順天從兆興止戈之師躬暫勞之討以義熙十有二年五月丁酉敬成九伐申命六軍治兵于京畿次師于汳上靈檣千艘靁輜萬乘羽騎盈塗飛旍蔽日别命羣帥誨謨惠策法竒於三略義祕於六韜所以鉤棘未曜殞前禽於金墉威弧始彀走鈒隼於滑臺曾不踰月二方獻㨗宏功懋德獨絶古今天子感東山之劬勞慶格天之光大明發興於鑒寐使臣遵于原隰余攝官承乏謬充殊役皇華愧於先雅靡盬顇於征人以仲冬就行分春反命塗經九守路踰千里沿江亂淮遡薄泗汳詳觀城邑周覽丘墳眷言古迹其懷已多昔皇祖作藩受命淮徐道固苞桑勲由仁積年月多歴市朝已改永為洪業纒懷清歴於是采訪故老尋履往迹而遠感深慨痛心殞涕遂寫集聞見作賦撰征俾事運遷謝託此不朽其詞曰系烈山之洪緒承火正之明光立熙載於唐后申讚事於周王疇庸命而順位錫寳珪以徹疆歴尚代而平顯降中葉以繁昌業服道而德徽風行世而化揚投前蹤以永冀省輶質以遠傷睽謀始於蓍蔡違用舍於行藏庇常善之罔棄憑曲成之不遺昭在幽而偕煦賞彌久而愈私顧晩草之薄弱仰青春之葳蕤引蔓頴於松上擢纖枝於蘭逵施隆貸而有渥報㳙塵而無期歡太階之休明穆皇道之緝熙惟王建國辨方定隅内外旣正華夷有殊惟昔小雅逮于班書戎蠻孔熾是殛是誅所以宣王用棘於獫狁高帝方事於匈奴然侵鎬至涇自塞及平闚郊伺鄙闕四字慕擕王之矯䖍階喪亂之未寧竊彊秦之三輔䧟隆周之兩京雄崤澠以制險據繞霤而作扄家永懷於故壤國願言於先塋俟太平之曠期屬應運之聖明坤寄通於四瀆乾假照於三辰水潤土以顯比火炎天而同人惟上相之叡哲當草昧而經綸總九流而貞觀恊五才而平分時來之機悟先於介石納隍之誡一援於生民龜筮允臧人鬼同情順天行誅司典詳刑樹牙選徒秉鉞抗旍弧矢罄楚孝之心智戈棘單吳子之精靈迅三翼以魚麗襄兩服以鴈逝陣未列於都甸威已振於秦薊灑嚴霜於渭城被和風於洛汭就終言以比猷考墳冊而莫契昔西怨於東徂今北伐而南悲豈朝野之恒情動萬乘之幽思歌零雨於豳風興採薇於周詩慶金墉之凱定眷戎車之遷時佇千里而感遠渉弦望而懷期詔㣲臣以勞問奉主命於河湄夕飲餞以俶裝旦出宿而言辭嵗旣晏而繁慮日將邁而戀乖闕敬恭於桑梓謝履長於庭階冐沈雲之晻藹迎素雪之紛霏凌結湍而凝清風矜籟以揚哀情在本而易阜物雖末而難懷眷余勤以就路苦憂來其城頽爾乃經雉門啟浮梁眺鍾巖越查塘覽永嘉之紊維尋建武之緝綱于時内慢神器外侮戎狄君子横流庶萌分析主晉有祀福祿來格明兩降覽三七辭厄元誕德以膺緯肈回光於陽宅明思服於下武興繼代以消逆簡文因心以秉道故恩用而刑廢孝武捨已以杖賢亦寧外而治内觀日化而就損庶雍熙之可對閔隆安之致寇傷龜玉之毁碎漏妖凶於滄洲纒舋難而盈紀時焉依於晉鄭國有䠞於百里賴英謨之經營𢎞兼濟以忘已主寰内而緩虞澄海外以漬滓至如昬祲蔽景鼎祚傾基黍離有歎鴻鴈無期瞻天命之貞符秉順動而履機率駿民之思効普邦國而同歸盪積霾之穢氛啓披隂之光暉反平陵之杳藹復七廟之依俙務役簡而農勸每勞賞而忠甄燮時雍於祖宗闕六字掃逋醜於漢渚滌僭逆於岷山羈巢處於西木引鼻飲於源淵惠要襋而思韙援冠弁而來䖍視冶城而北屬懷文獻之收揚匪元首之康哉孰股肱之惟良譬觀曲而識節似綴組以成章業彌纒而彌微事愈有而莫傷次石頭之䨇岸究孫氏之初基幸漢庶之漏網憑江介以抗維初鵲起於富春果鯨躍於川湄匝三世而國盛歴五偽而宗夷察成敗之相仍猶脣亡而齒寒載十二而謂紀豈蜀滅而吳安衆咸昧於謀兆羊獨悟於理端請廣武以誨情樹襄陽以作藩拾建業其如遺㳂萬里而誰難疾魯荒之詖辭惡京陵之譖言責當朝之憚貶對曩籍而興歎敦怙寵而判違敵既勍而國圯彼問鼎而何階必先賊於君子原性分之異託雖殊塗而歸美或卷舒以愚智或治亂其如矢謝昧迹而託規卒安身以全里周顯節而犯逆抱正情而喪已薄四望而尤眄歎王路之中鯁蠢于越之妖燼敢凌蹈於五嶺崩䨇嶽於中流擬凶威於荆郢隱雷霆於帝坐飛芒鏃於宫省于時朝有遷都之議人無守死之志師旅痛於久勤城墉闕於素備安危勢在不侔衆寡形於見事於赫淵謀研其神策緩轡待機追奔躡迹遇雷池而振曜次彭蠡而殲滌穆京甸以清晏撤多壘而寧役造白石之祠壇懟二竪之無君踐掖庭以幽辱凌祧社而火焚愍文康之罪已嘉忠武之立勲道有屈於災蝕功無謝於如仁訊落星之饗旅索舊棲於吳餘迹階戺而不見横榛卉以荒除彼生成之樂辰亦猶今之在余慨齊吟於爽鳩悲唐歌於山樞弔偽孫於徐首率君臣以奉疆時運師以伐罪偏投書於武王迄西北之落紐乏東南以振綱誠鉅平之先覺實中興之後祥據左史之攸徵胡影迹之可量過江乘而責始知遇雄之無謀厭紫微之宏凱甘陵波而遠遊越雲夢而南泝臨浙河而東浮彀連弩於川上候蛟龍於中流爰薄方與廼届歐陽入夫江都之域次乎廣陵之鄉易千里之曼曼泝江流之湯湯洊赤圻以經復越二門而起漲眷北路以興思㸔東山而怡目林叢薄路逶迤石參差山盤曲水激瀨而駿奔日映石而知旭審兼照之無偏怨歸流之難濯羡輕魵之涵泳觀翔鷗之落啄在飛沈其順從顧微躬而緬邈於是抑懐蕩慮揚𣙜易難利渉以吉天險以艱于敵伊阻在國斯便勾踐行覇於琅邪夫差爭長於黄川葛相發歎而思正曹后愧心於千魂登高堞以詳覽知吳濞之衰盛戒東南之逆氣成劉后之駴聖藉鹽鐵之殷阜臨淮楚之剽輕盛几杖而弭心怒抵局而遂爭忿爰盎之扶禍惜徒傷於家令匪條侯之忠毅將七國之陵正褒漢藩之治民竝訪賢以招明侯文辨其誰在曰鄒陽與枚生據忠辭於吳朝執義說於梁庭敷高才於兎園雖正言而免刑闕里既已千載深儒流於末學欽仲舒之睟容遵縫掖於前躅對園囿而不窺下帷幙而論屬相端非之兩驕遭𢎞偃之雙慝恨有道之無時歩險塗以側足聞宣武之大閲反師旅於此㕓自皇運之都東始昌業以濟難抗素旄於秦嶺揚朱旗於巴川懼帝系之墜緒故黜昬而崇賢嘉收功以垂世嗟在嗣而覆旃德非陟而繼宰舋踰禹其必顚造歩兵而長想欽太傅之遺武思嘉遁之餘風紹素履之落緒民志應而願稅國屯難而思撫譬乘舟之待楫象提釣之假縷總出入於和就兼仁用於黙語𢎞九流以􅰐四維復先陵而清舊宇却西州之成功指東山之歸予惜圗南之啟運恨鵬翼之未舉發津潭而逈邁逗白馬以憇舲貫射陽而望䢴溝濟通淮而薄甬城城坡陁兮淮驚波平原遠兮路交過面艽野兮悲橋梓遡急流兮苦磧沙夐千里而無山𬗟百谷而有居被宿莽以迷徑覩生烟而知墟闕六字謂信羙其可娛身少長於樂土實長歎於荒餘闕四字具瘁值歳寒之窮節視層雲之崔巍聆悲飈之掩屑彌晝夜以滯滛怨凝隂之方結望新晴於落日起明光於躋月眷轉蓬之辭根悼朔鴈之赴越披微物而疚情此思心其可悅問徭役其幾時駭閲景於興沒感曰歸於采薇予來思於雨雪豈初征之懼對冀鸛鳴之在垤闕四字踰宿鶩吾楫於邳鄉奚車正以事夏虺左相以輔湯綿三代而享邑厠踐土之一匡嗟仲幾之寵侮遂捨存以徵亡喜薛宰之善對羙士彌之能綱升曲垣之逶迤訪淮隂之所都原入跨之達恥俟遭時以遠圖捨西楚以擇木迨南漢以定謨亂孟津而魏滅攀井陘而趙徂播靈威於齊横振餘猛於龍且觀讓通而告狶曷始智而終愚迄沂上而停枻登高圯而不進石幽期而知賢張揣景而示信本文成之素心要王子於雲仞豈無累於清霄直有槩於眞吝始熙績於武關卒敷功於皇𦙍處夷險以解挫𢎞憂虞以時順矜若華之翳晷哀飛驂之落駿傷粒食而興念眷逸翮而思振戾臣山而東顧美相公之前代嗟殘虜之將糜熾餘猋於海濟驅鮐稚於淮曲暴鰥孤於泗澨託未命闕二字雲冀靈武之北閲惟授首之在晨當盛暑而選徒肅嚴威以振響漸温澤而沾腴既雲撤於朐城遂席卷於齊都曩四關其奚阻道一變而是孚傷炎季之崩弛長逆布以滔天假父子以詐愛借兄弟以偽恩相魏武以譎狂宄謨奮於東藩桴未譟於東郭身已馘於樓門審貢牧於前說證所作於舊徐聆泗川之浮磬翫夷水之蠙珠草漸苞於熾壤桐孤榦於嶧隅慨禹迹於尚世惠遺文於夏書紛征邁之淹留彌懐古於舊章商伯文於故服咸徵名於彭殤眺靈壁之曾峯投吕縣之迅梁想蹈水之行歌雖齊汨其何傷啟仲尼之嘉問告性命以依方豈茍然於迂論聆寓言於逹莊於是濫石橋登戲臺策馬釣渚息轡城隅永感四山零淚雙渠怨物華之推驛慨舟壑之遞遷謂徂嵗之悠闊結幽思之方根感皇祖之徽德爰識沖而量淵降俊明以鏡鑑廻風猷以昭宣道既底於國難惠有覃於黎元士頌歌於政教民謡詠於渥恩兼採芑之致羙協漢廣之發言彊虎氐之搏翼灟雲網於所禁驅黔萌以藴崇取園陵而湮沈錫殘落於河西序淪胥於漢隂攻方城而折扄擾譙潁其誰任世闕才而貽亂時得賢而興治救祖考之邦壤在幽人而枉志體飛書之遠情悟犒師之通識迨明達之高覽契古今而同事㧞淵謨於潛機騁神鋒於雲斾驅斥澤而風靡䠞坑谷而鳥竄中華免夫左袵江表此焉緩帯既剋黜於肥六又作鎮於彭沛晏皇塗於國内震天威於河外掃東齊而已寧指西崤而將泰值秉均而代謝實大業之興廢心無忝於樂生事有像於燕惠抱明哲之不伐奉宏勲而是稅捐七州以爰來歸五湖以投袂屈盛績於平生申遠期於暮嵗訪曩載於宋鄙採陽秋於魯經晉申好於東吳鄭憑威於南荆故反師於曹門將以塞於夷庚納五叛以長冦伐三邑以侵彭美西鉏之忠辭快韓厥之竒兵追項王之故臺迹覇楚之遺端挺宏志於總角奮英勢於弱冠氣蓋天而倒日力㧞山而傾湍始飈起於勾越中電激於衡關興偏慮於攸吝忘即易於所難忌陳錦而莫照思反鄉而有歎且夫殺義害嬰而􅀈豐疑緤賢不䇿失位誰持迨理屈而愈閉方怨天而懐悲對駿騅以發憤傷虞姝於末詞陟亞父之故營諒謀始之非託遭衰嬴之崩綱值威炎之結絡迄皓首於阜陵猶謬覺於然諾視一人於三傑豈在己之庸弱置豐沛而不舉故自同於俎鑊發汴口而游歴迄西山而弭轡觀終古之幽憤懐元王之冲粹丁戰國之權爭方恬心於道肆學浮丘以就德友三儒以成類潔流始於初源累仁基於前美撥楚族之休烈傳芳素於來祀彊見譽於清虚德致稱於千里或避寵以辭姻或遺榮而不仕政直言以安身駿絶才以喪已驅信道之成終表昧世之虧始悟介焉之已􅐔則不俟於終日既防萌於未著雖念德其何益爾乃孟陬發節雷隱蟄驚散葉荑柯芳飾萌麥萋萋於旄丘栁依依於髙城相睢鳩之集河觀鳴鹿之食苹沂泗遠兮清川急秋冬近兮緒風襲風流蕙兮水增瀾􅀈愁衿兮鑑戚顔愁盈根而蕰際戚發條而成端嗟我行之彌日待征邁而言旋荷慶雲之優渥周雙七於此年陶逸像於京甸違險難於行川轉歸弦而眷戀望脩檣而流漣願關鄴之遄清遲華鑾之凱旋穆淳風於六合溥洪澤於八埏頒賢愚於大小順規矩於方圓固四民之獲所宜稅稷於萊田苦邯鄲之難歩庶行迷之易痊長守朴以終稔亦拙者之政焉仍除宋國黄門侍郎遷相國從事中郎世子左衛率坐輒殺門生免官高祖受命降公爵為侯食邑五百户起為散騎常侍轉太子左衛率靈運為性褊激多愆禮度朝廷唯以文義處之不以應實相許自謂才能宜參權要既不見知常懐憤憤廬陵王義眞少好文籍與靈運情欵異常少帝即位權在大臣靈運構扇異同非毁執政司徒徐羡之等患之出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意游遨徧歴諸縣動踰旬朔民間聽訟不復關懐所至輒為詩詠以致其意焉在郡一周稱疾去職從弟晦曜𢎞㣲等竝與書止之不從靈運父祖竝葬始寧縣幷有故宅及墅遂移籍㑹稽修營别業傍山𢃄江盡幽居之羙與隱士王𢎞之孔淳之等縱放為娛有終焉之志每有一詩至都邑貴賤莫不競寫宿昔之間士庶皆徧遠近欽慕名動京師作山居賦幷自注以言其事曰古巢居宂處曰巖棲棟宇居山曰山居在林野曰丘園在郊郭曰城傍四者不同可以理推言心也黄屋實不殊於汾陽即事也山居良有異乎市㕓抱疾就閑順從性情敢率所樂而以作賦楊子雲云詩人之賦麗以則文體宜兼以成其美今所賦既非京都宫觀遊獵聲色之盛而叙山野草木水石穀稼之事才乏昔人心放俗外詠於文則可勉而就之求麗邈以遠矣覽者廢張左之艶辭尋臺皓之深意去飾取素儻値其心耳意實言表而書不盡遺迹索意託之有賞其辭曰謝子卧疾山頂覽古人遺書與其意合悠然而笑曰夫道可重故物為輕理宜存故事斯忘古今不能革質文咸其常合宫非縉雲之館衢室豈放勲之堂邁深心於鼎湖送高情於汾陽嗟文成之却粒願追松以遠遊嘉陶朱之鼓棹廼語種以免憂判身名之有辨權榮素其無留孰如牽犬之路既寡聼鶴之塗何由哉理以相得為適古人遺書與其意合所以為笑孫權亦謂周瑜公瑾與孤意合夫能重道則輕物存理則忘事古今質文可謂不同而此處不異縉雲放勛不以天居為所樂古合宫衢室皆非淹留鼎湖汾陽乃是所居缺文成張良却粒棄人閒事從赤松子遊陶朱范蠡臨去之際亦語文種云云謂二賢既權榮素故身名有判也牽犬李斯之歎聽鶴陸機領成都衆大敗後云思聞華亭鶴唳不可復得若夫巢穴以風露貽患則大壯以棟宇袪弊宫室以瑤璇致羙則白賁以丘園殊世惟上闕於巖壑幸兼善而罔滯雖非市朝而寒暑均和雖是築構而飭朴兩逝易云上古穴居野處後世聖人易之以宫室上棟下宇以蔽風雨蓋取諸大壯琁堂自是素故曰白賁最是上爻也此堂世異矣謂巖壑道深於丘園而不為巢穴斯免闕得寒暑之適雖是築構無妨非朝市云云昔仲長願言流水高山應璩作書邙阜洛川勢有偏側地闕周貟銅陵之奥卓氏充鈲槻之端金谷之麗石子致音徽之觀徒形域之薈蔚惜事異於栖盤至若鳯叢二臺雲夢青丘漳渠淇園橘林長洲雖千乘之珍苑孰嘉遯之所遊且山川之未備亦何議於兼求仲長子云欲使居有良田廣宅在高山流川之畔溝池自環竹木周布塲囿在前果園在後應據與程文信書云故求道田在關之西南臨洛水北據邙山託崇岫以為宅因茂林以為䕃謂二家山居不得周貟之羙楊雄蜀都賦云銅陵衍卓王孫採山鑄銅故漢書貨殖傳云卓氏之臨卭公擅山川楊雄方言梁益之間裁木為器曰鈲裂帛為衣曰槻金谷石季倫之别廬在河南界有山川林木池沼水碓其鎭下邳時過遊賦詩一代盛集謂二地雖珍麗然制作非栖盤之意也鳯臺秦穆公時秦女所居以致蕭史叢臺趙之崇館張衡謂趙築叢臺於前楚建章華於後楚之雲夢大中缺居長飲賦楚靈王遊雲夢之中息於荆臺之上前方淮之水左洞庭之波右顧彭蠡之濤南望巫山之阿遂造章華之臺亦見詣史淮南青丘齊之海外皆獵所司馬相如云秋田乎青丘徬徨乎海外漳渠史起為魏文侯所起漑水之所淇園衛之竹園在淇水之澳詩人所載橘林蜀之園林楊子雲蜀都賦亦云橘林左太冲謂戸有橘柚之園長洲吳之苑囿左亦謂長洲之茂苑因江海洲渚以為苑囿缺故缺表此園之珍缺千乘讌嬉之所非缺勢憇止之缺且山川亦不能兼茂隨地所遇耳覽明達之撫運乘機緘而理黙指嵗暮而歸休詠宏徽於刋勒狹三閭之喪江矜望諸之去國選自然之神麗盡高棲之意得余祖車騎建大功淮肥江左得免横流之禍後及太傅旣薨建圖已輟於是便求解駕東歸以避君側之亂廢興隠顯當是賢逹之心故選神麗之所以申高棲之意經始山川實基於此仰前哲之遺訓俯性情之所便奉微軀以宴息保自事以乘閑愧班生之夙悟慙尚子之晩研年與疾而偕來志乘拙而俱旋謝平生於知遊棲清曠於山川謂經始此山遺訓於後也性情各有所便山居是其宜也易云向晦入宴息莊周云自事其心此二是其所處班嗣本不染世故曰夙悟尚平未能去累故曰晩研想遲二人更以年衰疾至志寡求拙曰乘并可山居曰與知遊别故曰謝平生就山川故曰棲清曠其居也左湖右江徃渚還汀靣山背阜東阻西傾抱含吸吐款跨紆縈緜聨邪亘側直齊平枚乘曰左江右湖其樂無有此吳客說楚公子之詞當謂江都之野彼雖有江湖而乏山巖此憶江湖左右與之同而山嶽形勢池城所無也往渚還汀謂四面有水靣山背阜亦謂東西有山便是四水之裏也抱含吐吸謂中央復有川款跨紆縈謂邊背相連帶迂回處謂之邪亘平王處謂之側直近東則上田下湖西谿南谷石堟石滂閔硎黄竹決飛泉於百仞森高薄於千麓寫長源於遠江𣲖深毖於近瀆上田在下湖之水口名為田口下湖在田之下下處並有名山川西谿南谷分流谷鄣水畎入田口西谿水出始寧縣西谷鄣是近山之最高峯者西谿便是闕之背入西谿之裏得石堟以石為阻故謂為堟石滂在西谿之東從縣南入九里兩靣峻峭數十丈水自上飛下比至外谿封墱十數里皆飛流迅激左右巖壁綠竹閔硎在石滂之東谿逶迤下注良田黄竹與其連南界莆中也近南則㑹以雙流縈以三洲表裏回游離合山川崿崩飛於東峭槃傍薄於西阡拂青林而激波揮白沙而生漣雙流謂剡江及小江此二水同㑹於山南便合流注下三洲在二水之口排沙積岸成此洲漲表裏合是其兒狀也崿者謂回江岑在其山居之南界有石跳出將崩江中槃行者莫不駭慄槃者是縣故治之所在江之闕二字用石竟渚竝帶青林而連白沙也近西則楊賔接峯唐皇連縱室壁帶谿曾孤臨江竹緣浦以被緑石照澗而映紅月隱山而成隂木鳴柯以起風楊中元賔並小江之近處與山相接也唐皇便從北出室石室在小江口南岸壁小江北岸並在楊中之下壁高四十丈色赤故曰照澗而映紅曽山之西孤山之南王子所經始並臨江皆被以緑竹山高月隐便謂為隂鳥集柯鳴便謂為風也近北則二巫結湖兩􅥔通沼横石判盡休周分表引修隄之逶迆吐泉流之浩􅀈山􅑑下而回澤瀬石上而開道大小巫湖中隔一山外􅥔周回在西圻北邊浦出江竝是羙處義熙中王穆之居大巫湖經始處所猶在兩􅥔皆長溪外􅥔出山之後四五里許裏􅥔亦隔一山出新堟橫山野舍之北靣常石野舍之西北巫湖舊唐故曰修隄長谿甚遠故曰泉流常石􅑑闕四字石故曰下􅑑而回澤裏􅥔漫石數里水從上過故曰瀬上而開道休山東北周里山在休之南竝是北邊遠東則天台桐栢方石太平二韭四明五奥三菁表神異於緯牒驗感應於慶靈淩石橋之莓苔越楢谿之紆縈天台桐栢七縣餘地南帶海二韭四明五奥皆相連接竒地所無高於五嶽便是海中三山之流韭以菜為名四明方石四靣自然開窻也五奥者曇濟道人蔡氏郗氏謝氏陳氏各有一奥皆相椅角並是竒地三菁太平之北太平天台之始方石直上萬丈下有長谿亦是縉雲之流云此諸山竝見圖緯神仙所居往來要徑石橋過楢谿人跡之艱不復過此也遠南則松箴棲雞唐嵫漫石崪嵊對嶺􅀢孟分隔入極浦而邅回迷不知其所適上嶔崎而蒙籠下深沈而澆激棲雞在保口之上别浦入其中周回甚深四山之裏松箴在棲雞之上緣江唐嵫入太平水路上有瀑布數百丈漫石在唐磁下郗景興經始精舍亦是名山之流崪嵊與分界去山八十里故曰遠南前嶺鳥道正當五十里高左右所無就下地形高乃當不稱遠望􅀢山甚竒謂白爍尖者最高下有良田王敬𢎞經始精舍曇濟道人住孟山名曰孟埭芋薯之疁田清溪秀竹廻開巨石有趣之極此中多諸浦澗傍依茂林迷不知所通嶔崎深沈處處皆然不但一處遠西則缺四十四字遠北則長江永歸巨海延納崐漲𬗟曠島嶼綢㳫山縱横以布䕶水廻沈而縈浥信荒極之綿眇究風波之睽合江從山北流窮上虞堺謂之三江口便是大海老子謂海為百谷王以其善處下也海人謂孤山為崐薄洲有山謂之島嶼即洲也漲者沙始起將欲成嶼縱横無常於一處廻沈相縈擾也大荒東極故為荒極風波不恒為睽合也徒觀其南術之缺生􅑑缺成衍缺岸測深相渚知淺洪濤滿則曾石没清瀾減則沈沙顯及風興濤作水勢奔壯于嵗春秋在月朔望湯湯驚波滔滔駭浪電激雷崩飛流灑漾淩絶壁而起岑横中流而連薄始迅轉而騰天終倒底而見壑此楚貳心醉於吳客河靈懷慙於海若南術是其臨江舊宅門前對江三轉曾山路窮四江對岸西靣常石此二山之間西南角岸孤山此二山皆是狹處故曰生􅑑勇門以南上便大閬故曰成衍岸髙測深渚下知淺也江中有孤石沈沙隨水增減春秋朔望是其盛時故枚乘云楚太子有疾吳客問之舉秋濤之美得以瘳病太子國之儲貳故曰楚貳河靈河伯居河所謂河靈懼於海若事見缺莊周秋水篇爾其舊居曩宅今園枌缺槿尚援基井具存曲術周乎前後直陌矗其東西豈伊臨谿而傍沼廼抱阜而帶山考封域之靈異實兹境之最然葺駢梁於巖麓棲孤棟於江源敞南戸以對遠嶺闢東窻以矚近田田連岡而盈疇嶺枕水而通阡葺室在宅裏山之東麓東窻矚田兼見江山之美上三間故謂之駢梁門前一棟枕􅑑上存江之嶺南對江上遠嶺此二舘屬望殆無優劣也阡陌縱横塍埓交經導渠引流脉散溝并蔚蔚豐秋苾苾香秔送夏蚤秀迎秋晩成兼有陵陸麻麥粟菽候時覘節遞蓺遞孰供粒食與漿飲謝工商與衡牧生何待於多資理取足於滿腹許由云偃䑕飲河不過滿腹謂人生食足則歡有餘何待多須邪工商衡牧似多須者若少私寡欲充命則足但非田無以立耳自園之田自田之湖泛濫川上𬗟邈水區濬潭澗而窈窕除菰洲之紆餘毖温泉於春流馳寒波而秋徂風生浪於蘭渚日倒景於椒塗飛漸榭於中沚取水月之歡娛旦延隂而物清夕棲芬而氣敷顧情交之永絶覬雲客之暫如此皆湖中之美但患言不盡意萬不冩一耳諸澗出源入湖故曰濬潭澗澗長是以窈窕除菰以作洲言所以紆餘也水草則萍藻蕰菼雚蒲芹蓀蒹菰蘋蘩蕝荇菱蓮雖備物之偕美獨扶渠之華鮮播緑葉之鬱茂含紅敷之繽翻怨清香之難留矜盛容之易䦨必充給而後搴豈蕙草之空殘卷敂弦之逸曲感江南之哀歎秦筝倡而溯游往唐上奏而舊愛還搴出離騷敂弦是采菱歌江南是相和曲云江南采蓮秦筝倡蒹茄篇唐上奏蒲生詩皆感物致賦魚藻蘋蘩荇亦有詩人之詠不復具叙本草所載山澤不一靁桐是别和緩是悉參核六根五華九實二冬竝稱而殊性三建異形而同出水香送秋而擢蒨林蘭近雪而揚猗卷栢萬代而不殞伏苓千嵗而方知映紅葩於綠蔕茂素蕤於紫枝既住年而增靈亦驅妖而斥疵本草所出藥處於今不復依隨土所生耳此境出藥甚多靁公桐君古之采藥醫緩古之良工故曰别悉參核者雙核桃杏人也六根者茍七根華五茄根葛根野葛根闕二字根也五華者菫華芫華檖菊華旋覆華也九實者連前實槐實栢實兔絲實女貞三實蛇床實蔓荆實蓼實闕二字也二冬者天門麥門冬建者附子天雄烏頭水香蘭香林蘭支子卷栢伏苓並皆仙物凡此衆藥事悉見於神農其竹則二箭殊葉四苦齊味水石别谷巨細各彚旣修竦而便姢亦蕭森而蓊蔚露夕沾而悽隂風朝振而清氣捎𤣥雲以拂杪臨碧潭而挺翠蔑上林與淇澳騐東南之所遺企山陽之游踐遲鸞鷖之棲託憶崑園之悲調慨伶倫之哀籥衛女行而思歸詠楚客放而防露作二箭一者苦箭大葉一者笄箭細葉四苦青苦白苦紫苦黄苦水竹依水生甚細密吳中以為宅援石竹本科叢大以充屋榱巨者竿挺之屬細者無箐之流也修竦便娟蕭森蓊蔚皆竹貌也上林關中之禁苑淇澳衛地之竹園方此皆不如東南㑹稽之竹箭唯此地最富焉山陽竹林之游鸞鷖棲食之所崑山之竹任為笛黄帝時伶倫斬其厚均者吹之為黄鍾之宫衛女思歸作竹竿之詩楚人放逐東方朔感江潭而作七諌其木則松栢檀櫟闕字二桐榆檿柘穀棟楸梓檉樗剛柔性異貞脆質殊卑高沃塉各隨所如榦合抱以隱岑杪千仞而排虛凌岡上而喬竦䕃澗下而扶疏沿長谷以傾柯攢積石以挿衢華映水而增光氣結風而回敷當嚴勁而蔥倩承和煦而芬腴送墜葉於秋晏遲合萼於春初皆木之類選其美者載之山脊曰岡岡上澗下長谷積石各隨其方離騷云青春受謝白日昭只詩云萼不韓韚也植物既載動類亦繁飛泳騁透胡可根源觀㒵相音備列山川寒燠順節隨宜匪敦草木竹植物魚鳥獸動物獸有數種有騰者有走者走者騁騰者透謂種類旣繁不可根源但觀其㒵狀相其音聲則知山川之好興節隨宜自然之數非可敦戒也魚則􅧹鱧鮒鱮鱒鯇鰱鯿魴鮪魦鱖鱨鯉鯔鱣輯采雜色錦爛雲鮮唼藻戲浪汎苻流淵或鼓鰓而湍躍或掉尾而波旋鱸鮆乘時以入浦鰔􅨯沿瀬以出泉􅧹音優鱧音禮鮒音附鱮音叙鱒音寸衮反鯢音睨鰱音連鯿音毖仙反魴音房鮪音痏魦音沙鱖音居綴反鱨音上羊反鯔音比之反鱣音竹仚反皆說文字林音詩云錦衾有爛故云錦爛鱸鮆乘時魚鱤音感􅨯音迅皆出谿中石上恒以為翫鳥則鵾鴻鶂鵠鶖鷺鴇􅧻雞鵲繡質鶷鸐綬章晨鳧朝集時鷮山梁海鳥違風朔禽避涼荑生歸北霜降客南接響雲漢侣宿江潭聆清哇以下聽載王子而上參薄回渉以弁翰映明壑而自耽鵾音昆鴻音洪鶂音溢左傳六鶂退飛字如此鵠音下竺反􅒗音秋鷺音路鴇音䳰􅧻音相唐公之馬與此鳥色同故謂為􅧻音相鷄鵲鶷鸐見張茂先博物志鸐音翟亦雉之美者此四烏竝美采質鳧音符野鴨也常待晨而飛鷮音已消反長尾雉也論語云山梁雌雉時哉時哉海鳥爰居臧文仲不知其鳥以為神也事見左傳朔禽鴈也寒月轉往衡陽禮記霜始降鴈來賔嵗云莫鴈北向政是陽初生時荑生歸北霜降客南山缺映水自翫其羽儀者山上則猨􅏈貍獾犴獌猰􅭬山下則熊羆豺虎羱鹿麕麖擲飛枝於窮崖踔空絶於深硎蹲谷底而長嘯攀木杪而哀鳴猿音袁􅏈音魂狸音力之反獾音火九反犴音五懸反獌音曼似獾而長狼之屬一曰貙猰音安黠反􅭬音弋生反貍之黄黒者一曰似􅀈豺音在皆反羱音元野羊大角麕音鬼珉反麖音京能踔擲虎長嘯猨哀鳴鳴聲可翫緡綸不投置羅不披磻弋靡用蹄筌誰施鑑虎狼之有仁傷遂欲之無崖顧弱齡而渉道悟好生之咸宜率所由以及物諒不遠之在斯撫鷗䱔而悅豫杜機心於林池八種皆魚獵之具自少不殺至乎白首故在山中而此歡永廢莊周云虎狼仁獸豈不父子相親世云虎狼暴虐者政以其如禽獸而人物不自悟其毒害而言虎狼可疾之甚茍其遂欲豈復崖限自弱齡奉法故得免殺生之事茍此悟萬物好生之理易云不遠復無祗悔庻乘此得以入道莊周云海人有機心鷗鳥舞而不下今無害彼之心各說豫於林池也敬承聖誥恭窺前經山野昭曠聚落羶腥故大慈之𢎞誓拯羣物之淪傾豈寓地而空言必有貸以善成欽鹿野之華苑羡靈鷲之名山企堅固之貞林希菴羅之芳園雖粹容之𬗟􅥞謂哀音之恒存建招提於幽峯冀振錫之息肩庻鐙王之贈席想香積之惠餐事在微而思通理匪絶而可溫賈誼弔屈云恭承嘉惠敬承亦此之流聚落是墟邑謂歌哭諍訟有諸諠譁不及山野為僧居止也經教欲令在山中皆有成文老子云善貸且善成此道惠物也鹿苑說四眞諦處靈鷲山說般若法華處堅固林說泥洹處菴羅園說不思議處今旁林蓺園制苑彷彿在昔依然託想雖粹容緬邈哀音若存也招提謂僧不能常住者可持作坐處也所謂息肩鐙王香積事出維摩經論語云溫故知新理既不絶更宜復溫則可待為已之日用也爰初經略杖策孤征入澗水渉登嶺山行陵頂不息窮泉不停櫛風沐雨犯露乘星硏其淺思罄其短規非龜非筮擇良選竒翦榛開逕尋石覓崖四山周回雙流逶迤靣南嶺建經臺倚北阜築講堂傍危峯立禪室臨浚流列僧房對百年之高木納萬代之芬芳抱終古之泉源美膏液之清長謝麗塔於郊郭殊世間於城傍欣見素以抱樸果甘露於道塲云初經略躬自履行備諸苦辛也罄其淺短無假於龜筮貧者旣不以麗為美所以即安茅茨而已是以謝郊郭而殊城傍然清虚寂漠實是得道之所也苦節之僧明發懷抱事紹人徒心通世表是遊是憇倚石構草寒暑有移至業莫矯觀三世以其夢撫六度以取道乘恬知以寂泊含和理之窈窕指東山以㝠期實西方之潛兆雖一日以千載猶恨相遇之不早謂曇隆法流二法師也二公辭恩愛棄妻子輕舉入山外緣都絶魚肉不入口糞掃必在體物見之絶歎而法師處之夷然詩人西發不勝造道者其亦如此往石門瀑布中路高棲之游昔告離之始期生東山没存西方相遇之欣實以一日為千載猶慨恨不早賤物重已棄世希靈駭彼促年愛是長生冀浮丘之誘接望安期之招迎甘松桂之苦味夷皮褐以頽形羡蟬蛻之匪日撫雲蜺其若驚陵名山而屢憇過巖室而披情雖未階於至道且𬗟絶於世纓指松菌而興言良未齊於殤彭此一章叙仙學者雖未及佛道之高然出於世表矣浮丘公是王子喬師安期先生是馬明生師二師出列仙傳洞眞經云今學仙者亦明師以自𤼵悟故不辭苦味頽形也莊周云和以天倪倪者崖也數經歴名山遇余巖室披露其情性且獲長生方之松菌殤彭邈然有間也山作水役不以一牧資待各徒隨節競逐陟嶺刋木除榛伐竹抽笋自篁擿篛于谷楊勝所拮秋冬獲野有蔓草獵渉蘡薁亦醖山清介爾景福苦以术成甘以􅣤熟慕椹高林剝芨巖椒掘蒨陽崖擿􅀈隂摽晝見搴茅宵見索綯芟菰翦蒲以薦以茭既坭既埏品收不一其灰其炭咸各有律六月採蜜八月樸栗備物為繁略載靡悉此一章謂山水採拾諸事也然漁獵之事皆不載楊楊桃也山間謂之木子音覆字出字林詩人云六月食鬱及薁獵渉字出爾雅术术酒味苦􅣤􅣤酒味甘竝至美兼以療病􅣤治癕核术治痰冷椹音甚味似菰菜而勝刋木而作之謂之慕芨音及採以為紙蒨音倩採以為渫􅀈音􅀈採以為飯採蜜撲栗各隨其月也若廼南北兩居水通陸阻觀風瞻雲方知厥所兩居謂南北兩處各有居止峯崿阻絶水道通耳觀風瞻雲然後方知其處所南山則夾渠二田周嶺三苑九泉别澗五谷異巘羣峯參差出其間連岫複陸成其坂衆流漑灌以環近諸堤擁抑以接遠遠堤兼陌近流開湍淩阜泛波水往歩還還回往匝枉渚員巒呈美表趣胡可勝單抗北頂以葺館殷南峯以啓軒羅曾崖於戸裏列鏡瀾於窻前因丹霞以赬楣附碧雲以翠椽視奔星之俯馳顧闕二字之未牽鵾鴻飜翥而莫及何但鷰雀之翩翾氿泉傍出潺湲於東檐桀壁對跱硿礲於西霤修竹葳蕤以翳薈灌木森沈以䝉茂蘿曼延以攀援花芬薰而媚秀日月投光於柯間風露披清於㟪岫夏涼寒燠隨時取適階基回互橑櫺乘隔此焉卜寢翫水弄石邇卽回眺終歲罔斁傷美物之遂化怨浮齡之如借𦕈遯逸於人羣長寄心於雲霓南山是開創卜居之處也從江樓歩路跨越山嶺綿亘田野或升或降當三里許塗路所經見也則喬木茂竹緣畛彌阜横波疎石側道飛流以為寓目之美觀及至所居之處自西山開道迄於東山二里有餘南悉連嶺疊鄣青翠相接雲烟霄路殆無倪際從逕入谷几有三口方壁西南石門世缺南缺池東南皆别載其事緣路初入行於竹逕半路闊以竹渠澗旣入東南傍山渠展轉幽竒異處同羙路北東西路因山為鄣正北狹處踐湖為池南山相對皆有崖巖東北枕壑下則清川如鏡傾柯盤石被隩映渚西巖𢃄林去潭可二十丈許葺基構宇在巖林之中水衛石階開窻對山仰眺曾峯俯鏡濬壑去巖半嶺復有一樓逈望周眺旣得遠趣還顧西舘望對窻户緣崖下者密竹蒙逕從北直南悉是竹園東西百丈南北百五十五丈北倚近峯南眺遠嶺四山周回溪澗交過水石林竹之羙巖岫㟪曲之好備盡之矣刋剪開築此焉居處細趣密玩非可具記故較言大勢耳越山列其表側傍𬗟缺為異觀也因以小湖鄰於其隈衆流所凑萬泉所回沉濫異形首毖終肥别有山水路邈𬗟歸汎濫肥毖皆是泉名事見於詩云此萬泉所凑各有形勢求歸其路廼界北山棧道傾虧蹬閣連卷復有水逕繚繞回圓瀰瀰平湖泓泓澄淵孤岸竦秀長洲芊綿旣瞻旣眺曠矣悠然及其二川合流異源同口赴隘入險俱㑹山首瀬排沙以積丘峯倚渚以起阜石傾瀾而稍巖木映波而結藪逕南漘以横前轉北崖而掩後隱叢灌故悉晨暮託星宿以知左右往反經過自非巖澗便是水逕洲島相對皆有趣也山川澗石州岸草木旣摽異於前章亦列同於後牘山匪砠而是岵川有清而無濁石傍林而挿巖泉恊澗而下谷淵轉渚而散芳岸靡沙而映竹草迎冬而結葩樹凌霜而振綠向陽則在寒而納煦靣隂則當暑而含雪連岡則積嶺以隱嶙舉峯則羣竦以􅏭􅙙浮泉飛流以寫空沈波潛溢於洞穴凡此皆異所而咸善殊節而俱悅土山載石曰砠山有林曰岵此章謂山川衆美亦不必有故總叙其最居山之後事亦皆有尋求也春秋有待朝夕須資旣耕以飯亦桑貿衣藝菜當肴採藥救頽自外何事順性靡違法音晨聽放生夕歸研書賞理敷文奏懷凡厥意謂揚較以揮且列于言誡特此推謂寒待綿纊暑待絺綌朝夕餐飲設此諸業以待之藥以療疾又在其外事之相推自不得不然至於聽講放生研書敷文皆其所好韓非有揚較班固亦云揚較古今其義一也左思曰為左右揚較而陳之北山二園南山三苑百果備列乍近乍遠羅行布株迎早候晩猗蔚溪澗森疎崖巘杏壇㮈園橘林栗圃桃李多品棃棗殊所枇杷林檎帶谷映渚椹梅流芬於回巒椑柿被實於長浦莊周云漁父見孔子杏壇之上維摩詰經㮈樹園楊雄蜀都賦云橘林左太冲亦云戸有橘柚之園桃李所殖甚多棗棃事出北河濟之間淮頴諸處故云殊所也畦町所藝含蘂藉芳蓼蕺葼薺葑菲蘇薑綠葵眷節以懷露白薤感時而負霜寒葱摽倩以陵隂春霍吐苕以近陽葑菲見詩栢舟中管子曰北伐山戎得寒葱庾闡云寒葱挺園灌蔬自供不待外求者也弱質難恒頺齡易喪撫鬢生悲視顔自傷承清府之有術冀在衰之可壯尋名山之竒藥越靈波而憇轅採石上之地黄摘竹下之天門摭曾嶺之細辛㧞幽澗之溪蓀訪鍾乳於洞穴訊丹陽於紅泉此皆住年之藥即近山之所出有采拾欲以消病也安居二時冬夏三月遠僧有來近衆無闕法鼔卽響頌偈清發散華霖蕤流香飛越析曠劫之微言說像法之遺㫖乘此心之一豪濟彼生之萬理啓善趣於南倡歸清暢於北機非獨㥦於予情諒僉感於君子山中兮清寂羣紛兮自絶周聽兮匪多得理兮俱悅寒風兮搔屑面陽兮常熱炎光兮隆熾對隂兮霜雪愒曾臺兮陟雲根坐澗下兮越風穴在兹城而諧賞傳古今之不滅衆僧冬夏二時坐謂之安居輒几十日衆遠近聚萃法鼓頌偈華香四種是齋講之事析說是齋講之議乘此之心可濟彼之生南倡者都講北機者法師山中靜寂實是講說之處兼有林木可隨寒暑恒得清和以為適也好生之篤以我而觀懼命之盡吝景之懽分一往之仁心㧞萬族之險難招驚魂於殆化收危形於將䦨漾水性於江流吸雲物於天端覩騰翰之頏頡視鼓鰓之往還馳騁者儻能狂愈猜害者或可理攀云物皆好生但以我而觀便可知彼之情吝景懼命是好生事也能放生者但有一往之仁心便可㧞萬族之險難水性雲物各尋其生老子云馳騁田獵令人心發狂猜害者恒以忍害為心見放生之理或可得悟也哲人不存懷抱誰質糟粕猶在啟縢剖袠見柱下之經二覩濠上之篇七承未散之全樸救已穨於道術夫六蓺以宣聖敎九流以判賢徒國史以載前紀家傳以申世模篇章以陳美刺論難以覈有無兵技醫日龜筴筮夢之法風角冡宅算數律歴之書或平生之所流覽竝於今而棄諸驗前識之喪道抱一德而不渝莊周云輪扁語齊桓公公之所讀書聖人之糟粕縢者金縢之流也柱下老子濠上莊子二七是篇數也云此二書最有理過此以往皆是聖人之教獨往者所棄伊昔齠齔實愛斯文援紙握管㑹性通神詩以言志賦以敷陳箴銘誄頌咸各有倫爰曁山棲彌歴年紀幸多暇日自求諸己研精靜慮貞觀厥美懷秋成章含笑奏理謂少好文章及山棲以來别緣旣䦨尋慮文詠以盡暇日之適便可得通神㑹性以永終朝若廼乘攝持之告評養達之篇畏絶迹之不遠懼行地之多艱均上皇之自昔忌下衰之在旃投吾心於高人落賔名於聖賢廣滅景於崆峒許遁音於箕山愚假駒以表谷涓隱巖以搴芳闕十八字萊庇䝉以織畚皓棲商而頤志卿寑茂而敷詞闕六字鄭别谷而永逝梁去覇而之㑹闕六字高居唐而胥宇臺依崖而穴墀咸自得以窮年𦕈貞思於所遺老子云善攝生者莊子云謂之不善持生又云養生有無崖達生者不務生之所無奈何絶迹上皇下衰賔名義亦皆出莊周廣成子在崆峒之上黄帝之師也許由隱於箕山堯以天下讓而不取愚公居于駒阜齊桓公逐鹿入山見之涓子隱于宕山好餌术告伯陽琴心三篇庚桑偏得老子之道居㟪礨之山楚狂接輿楚王聞其賢使使者聘之於是遂游諸名山在蜀峨眉山上徐無鬼巖棲魏侯勞之問先王苦山林矣乃肯見寡人無鬼問君絀嗜欲屏好惡則耳目察矣常采芧栗老萊子耕於蒙山之陽著書十五篇言道家之事織畚為業四皓避秦亂入商洛深山漢祖召不能出司馬長卿高才而處世不樂預公卿大事闕遂與弟子别於山阿終身不反梁伯鸞隱覇陵山中耕織以自娛後復入㑹稽山臺孝威居武安山下依崖為上室采藥自給高文通居西唐山從容自娛也曁其窈窕幽深寂漠虛遠事與情乖理與形反旣耳目之靡端豈足跡之所踐蘊終古於三季俟通明於五眼權近慮以停筆抑淺知而絶簡謂此既非人跡所求更待三明五通然後可踐履耳故停筆絶簡不復多云冀夫賞音悟夫此㫖也太祖登祚誅徐羡之等徵為祕書監再召不起上使光祿大夫范㤗與靈運書敦奬之乃出就職使整理祕閣書補足闕文以晉氏一代自始至終竟無一家之史令靈運撰晉書粗立條流書竟不就尋遷侍中日夕引見賞遇甚厚靈運詩書皆兼獨絶每文竟手自寫之文帝稱為二寳旣自以名軰才能應參時政初被召便以此自許旣至文帝唯以文義見接每侍上宴談賞而已王曇首王華殷景仁等名位素不踰之並見任遇靈運意不平多稱疾不朝直穿池植援種竹樹堇驅課公役無復期度出郭游行或一日百六七十里經旬不歸旣無表聞又不請急上不欲傷大臣諷旨令自解靈運乃上表陳疾上賜假東歸將行上書勸伐河北曰自中原喪亂百有餘年流離寇戎湮没殊類先帝聰明神武哀濟羣生將欲盪定趙魏大同文軌使久凋反於正化偏俗歸於華風運謝事乖理違願絶仰德抱悲恨存生盡況陵塋未幾凶虜伺隙預在有識誰不憤歎而景平執事竝非其才且遘紛京師豈慮託付遂使孤城窮䧟莫肯極忠烈囚朔漠緜河三千翻為寇有晩遣鎭戍皆先朝之所開拓一旦淪亡此國耻宜雪被於近事者也又北境自染逆虜窮苦備罹徵調賦歛靡有止已所求不獲輒致誅殞身禍家破闔門比屋此亦仁者所為傷心者也咸云西虜舍末遠師隴外東虜乘虛呼可掩襲西軍旣反得據關中長圍咸陽還路已絶雖遣救援停住河東遂乃遠討大城欲為首尾而西寇深山重阻根本自固徒棄巢窟未足相拯師老於外國虛於内時來之㑹莫復過此觀兵燿威實在兹日若相持未己或生事變忽値新起之衆則異於今茍乖其時難為經畧雖兵食倍多則萬全無必矣又歴觀前代類以兼弱為本古今聖德未之或殊豈不以天時人事理數相得興亡之度定期居然故古人云旣見天殃又見人災乃可以謀昔魏氏之彊平定荆冀乃乘袁劉之弱晉氏之盛拓開吳蜀亦因葛陸之衰此皆前世成事著於史策者也自羌平之後天下亦謂虜當俱滅長驅滑臺席卷下城奪氣喪魄指日就盡但長安違律潼闗失守用緩天誅假延嵗月日來至今十有二載是謂一紀曩有前言况五胡代數齊世虜期餘命盡於來年自相攻伐兩取其困卞莊之形騐之今役仰望聖澤有若飢渇注心南雲為日已久來蘇之冀實歸聖明此而弗乘後則未兆卽日府藏誠無兼儲然凡造大事待國富兵彊不必乘㑹於我為易貴在得時器械旣充衆力粗足方於前後乃當有優常議損益久證冀州口數百萬有餘田賦之沃著自貢典先才經創基趾猶存澄流引源桑麻蔽野彊富之實昭然可知為國長久之計孰若一往之費邪或懲闗西之敗而謂河北難守二境形勢表裏不同闗西雜居種類不一昔在前漢屯軍霸上通火甘泉況乃遠戍之軍値新故交代之際者乎河北悉是舊戸差無雜人連嶺判阻三闗作隘若遊騎長驅則沙漠風靡若嚴兵守塞則冀方山固昔隴西傷破鼂錯興言匈奴慢侮賈誼憤歎方於今日皆為賒矣晉武中主耳値孫皓虐亂天祚其德亦由鉅平奉策荀賈折謀故能業崇當年區宇一綂况今陛下聰明聖哲天下歸仁文德與武功竝震霜威共素風俱舉協以宰輔賢明諸王美令岳牧宣烈虎臣盈朝而天或遠命亦何敵不滅矧伊頑虜假日而已哉伏惟深機志務久定神謨臣卑賤側陋竄景巖穴實仰希太平之道傾覩岱宗之封雖乏相如之筆庶免史談之憤以此謝病京師萬無恨矣久欲上陳懼在觸置䝉賜恩假暫違禁省消渇十年常慮朝露抱此愚志昧死以聞靈運以疾東歸而遊娛宴集以夜續晝復為御史中丞傅隆所奏坐以免官是歲元嘉五年靈運旣東還與族弟惠連東海何長瑜潁川荀雍太山羊璿之以文章賞㑹共為山澤之游時人謂之四友惠連㓜有才悟而輕薄不為父方明所知靈運去永嘉還始寧時方明為㑹稽郡靈運嘗自始寧至㑹稽造方明過視惠連大相知賞時長瑜教惠連讀書亦在郡内靈運又以為絶倫謂方明曰阿連才悟如此而尊作常兒遇之何長瑜當今仲宣而給以下客之食尊旣不能禮賢宜以長瑜還靈運靈運載之而去荀雍字道雍官至員外散騎郎璿之字曜璠臨川内史為司空竟陵王誕所遇誕敗坐誅長瑜文才之美亞於惠連雍璿之不及也臨川王義慶招集文士長瑜自國侍郎至平西記室參軍嘗於江陵寄書與宗人何朂以韻語序義慶州府僚佐云陸展染鬚髪欲以媚側室青青不解久星星行復出如此者五六句而輕薄少年遂演而廣之凡厥人士竝為題目皆加劇言苦句其文流行義慶大怒白太祖除為廣州所綂曾城令及義慶薨朝士詣第叙哀何朂謂袁淑曰長瑜便可還也淑曰國新喪宗英未宜便以流人為念廬陵王紹鎮尋陽以長瑜為南中郎行參軍掌記之任行至板橋遇暴風溺死靈運因父祖之資生業甚厚奴僮旣衆義故門生數百鑿山浚湖功役無已尋山陟嶺必造幽峻巖障千重莫不備盡登躡常著木履上山則去前齒下山則去後齒嘗自始寧南山伐木開逕直至臨海從者數百人臨海太守王琇驚駭謂為山賊徐知是靈運乃安又要琇更進琇不肯靈運贈琇詩曰邦君難地嶮旅客易山行在㑹稽亦多徒衆驚動縣邑太守孟顗事佛精懇而為靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言㑹稽東郭有回踵湖靈運求決以為田太祖令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運旣不得回踵又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮决湖多害生命言論毁傷之與顗遂構讐隟因靈運横恣百姓驚擾乃表其異志發兵自防露板上言靈運馳出京都詣闕上表曰臣自抱疾歸山于今三載居非郊郭事乖人間幽棲窮巖外縁兩絶守分飬命庻畢餘年忽以去月二十八日得㑹稽太守臣顗二十七日疏云比日異論噂􅊱此雖相了百姓不許寂黙今微為其防披疏駭惋不解所由便星言奔馳歸骨陛下及經山隂防衛彰赫彭排馬槍斷截衢巷偵邏縱横戈甲竟道不知微臣罪為何事及見顗雖曰見亮而裝防如此唯有㒺懼臣昔忝近侍豫蒙天恩若其罪迹炳明文字有證非但顯戮司敗以正國典普天之下自無容身之地今虛聲為罪何酷如之夫自古讒謗聖賢不免然致謗之來要有由趣或輕死重氣結黨聚羣或勇冠鄉邦劔客馳逐未聞俎豆之學欲為逆節之罪山棲之士而構陵上之舋今影迹無端假謗空設終古之酷未之或有匪吝其生實悲其痛誠復内省不疚而抱理莫申是以牽曵疾病束骸歸欵仰憑陛下天鍳曲臨則死之日猶生之年也臣憂怖彌日羸疾發動尸存恍惚不知所陳太祖知其見誣不罪也不欲使東歸以為臨川内史賜秩中二千石在郡遊放不異永嘉為有司所糾司徒遣使隨州從事鄭望生收靈運靈運執錄望生興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連耻本自江海人忠義感君子追討擒之送廷尉治罪廷尉奏靈運率部衆反叛論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕乃詔曰靈運罪釁累仍誠合盡法但謝𤣥勲參微管宜宥及後嗣可降死一等徙付廣州其後秦郡府將宗齊受至除口行逹桃墟村見有七人下路亂語疑非常人還告郡縣遣兵隨齊受掩討遂共格戰悉禽付獄其一人姓趙名欽山陽縣人云同村薛道雙先與謝康樂共事以去九月初道雙因同村成國報欽云先作臨川郡犯事徙送廣州謝給錢令買弓箭刀楯等物使道雙要合鄉里健兒於三江口簒取謝若得志如意之後功勞是同遂合部黨要謝不及旣還飢饉緣路為劫盜有司又奏依法收治太祖詔於廣州行棄市刑臨死作詩曰龔勝無餘生李業有終盡嵇公理旣迫霍生命亦殞悽悽凌霜葉網網衝風菌邂逅竟幾何修短非所愍送心自覺前斯痛久已忍恨我君子志不獲巖上泯詩所稱龔勝李業猶前詩子房魯連之意也時元嘉十年年四十九所著文章傳於世子鳯蚤卒史臣曰民禀天地之靈含五常之德剛柔迭用喜慍分情夫志動於中則歌詠外𤼵六義所因四始攸繫升降謳謡紛披風什雖虞夏以前遺文不覩禀氣懐靈理無或異然則歌詠所興宜自生民始也周室旣衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石高義薄雲天自兹以降情志愈廣王褒劉向揚班崔蔡之徒異軌同奔遞相師祖雖清辭麗曲時發乎篇而蕪音累氣固亦多矣若夫平子艶發文以情變絶唱高蹤久無嗣響至於建安曹氏基命二祖陳王咸蓄盛藻甫乃以情緯文以文被質自漢至魏四百餘年辭人才子文體三變相如巧為形似之言班固長於情理之說子建仲宣以氣質為體竝摽能擅美獨映當時是以一世之士各相慕習原其颷流所始莫不同祖風騷徒以賞好異情故意製相詭降及元康潘陸特秀律異班賈體變曹王縟旨星稠繁文綺合綴平臺之逸響採南皮之高韻遺風餘烈事極江左有晉中興𤣥風獨振為學窮於柱下博物止乎七篇馳騁文辭義單乎此自建武曁乎義熙歴載將百雖綴響聨辭波屬雲委莫不寄言上德託意𤣥珠遒麗之辭無聞焉爾仲文始革孫許之風叔源大變太元之氣爰逮宋氏顔謝騰聲靈運之興㑹摽舉延年之體裁明密竝方軌前秀垂範後昆若夫敷衽論心商𣙜前藻工拙之數如有可言夫五色相宣八音協暢由乎𤣥黄律吕各適物宜欲使宫羽相變低昂互節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異妙達此㫖始可言文至於先士茂製諷高歴賞子建函京之作仲宣霸岸之篇子荆零雨之章正長朔風之句竝直舉胷情非傍詩史正以音律調韻取高前式自騷人以來此祕未覩至於高言妙句音韻天成皆闇與理合匪由思至張蔡曹王曾無先覺潘陸謝顔去之彌遠世之知音者有以得之知此言之非謬如曰不然請待來哲宋書卷六十七宋書卷六十七考證謝靈運傳緤賢不策失位誰持迨理屈而愈閉方怨天而懷悲監本失訛夫持訛時迨訛造今據本集改正亦何議於兼求注非缺二字憇止之缺本集作非幽人憇止之鄉得道應湏慧業文人生天當在靈運前成佛必在靈運後臣照按文人應作丈人慧業斷句丈人二字屬下句丈人稱顗也今慧業文人之語遍天下而未察其文理如以文人斷句則陡接生天在靈運前仍復成語耶况南史本作丈人宋書卷六十七考證
