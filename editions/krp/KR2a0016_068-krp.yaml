body:
  text: 宋書卷六十八梁沈約撰列傳第二十八武二王彭城王義康南郡王義宣彭城王義康年十二宋臺除督豫司雍并四州諸軍事冠軍將軍豫州刺史時高祖自壽陽被徵入輔留義康代鎭壽陽又領司州刺史進督徐州之鍾離荆州之義陽諸軍事永初元年封彭城王食邑三千戸進號右將軍二年徙監南豫豫司雍并五州諸軍事南豫州刺史將軍如故三年授使持節都督南徐兗二州揚州之晉陵諸軍事南徐州刺史將軍如故太祖卽位增邑三千戸進號驃騎將軍加散騎常侍給鼓吹一部尋加開府儀同三司元嘉三年改授都督荆湘雍梁益南北秦八州諸軍事荆州刺史給班劔三十人持節常侍將軍如故義康少而聰察及居方任職事修理六年司徒王𢎞表義康宜還入輔徵侍中都督揚南徐兗三州諸軍事司徒錄尚書事領平北將軍南徐州刺史持節如故二府竝置佐領兵與王𢎞共輔朝政𢎞旣多疾且每事推謙自是内外衆務一斷之義康太子詹事劉湛有經國才義康昔在豫州湛為長史旣素經情欵至是意委特隆人物雅俗舉動事宜莫不咨訪之故前後在藩多有善政為遠近所稱九年𢎞薨又領揚州刺史其年太妃薨解侍中辭班劔十二年又領太子太傅復加侍中班劔義康性好吏職銳意文案糾剔是非莫不精盡旣專總朝權事决自己生殺大事以錄命斷之凡所陳奏入無不可方伯以下竝委義康授用由是朝野輻湊勢傾天下義康亦自强不息無有懈倦府門每旦常有數百乘車雖復位卑人微皆被引接又聰識過人一聞必記常所暫遇終生不忘稠人廣席每標所憶以示聰明人物益以此推服之愛惜官爵未嘗以階級私人凡朝士有才用者皆引入己府無施及忤㫖卽度為臺官自下樂為竭力不敢欺負太祖有虛勞疾寢頓積年每意所想便覺心中痛裂屬纊者相係義康醫藥盡心衛奉湯藥飲食非口所嘗不進或連夕不寐彌日不解衣内外衆事皆專決施行十六年進位大將軍領司徒辟召掾屬義康素無術學闇於大體自謂兄弟至親不復存君臣形迹率心逕行曾無猜防私置僮部六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘歎其形味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大供御者三寸尚書僕射殷景仁為太祖所寵與太子詹事劉湛素善而意好晩衰湛常欲因宰輔之權以傾之景仁為太祖所保持義康屢言不見用湛愈憤南陽劉斌湛之宗也有渉俗才用為義康所知自司徒右長史擢為左長史從事中郎琅邪王履主簿沛郡劉敬文祭酒魯郡孔𦙍秀並以傾側自入見太祖疾篤皆謂宜立長君上疾嘗危殆使義康具顧命詔義康還省流涕以告湛及殷景仁湛曰天下艱難詎是幼主所御義康景仁並不答而𦙍秀等輒就尚書議曹索晉咸康末立康帝舊事義康不知也及太祖疾豫㣲聞之而斌等旣為義康所寵又威權盡在宰相常欲傾移朝廷使神器有歸遂結朋黨伺察省禁若有盡忠奉國不與己同志者必構造愆舋加以罪黜每採拾景仁短長或虛造異同以告湛自是主相之勢分内外之難結矣義康欲以斌為丹陽尹言次啓太祖陳其家貧上覺其旨義康言未卒上曰以為吳郡後㑹稽太守羊𤣥保求還義康又欲以斌代之又啓太祖曰羊𤣥保欲還不審以誰為㑹稽上時未有所屬倉卒曰我已用王鴻自十六年秋不復幸東府上以嫌隙旣成將致大禍十七年十月乃收劉湛付廷尉伏誅又誅斌及大將軍錄事参軍劉敬文賊曹參軍孔邵秀中兵參軍邢懐明主簿孔𦙍秀丹陽丞孔文秀司空從事中郎司馬亮烏程令盛曇泰等徙尚書庫部郎何黙子餘姚令韓景之永興令顔遙之湛弟黄門侍郎素斌弟給事中溫於廣州王履廢於家𦙍秀始以書記見任漸預機密文秀邵秀其兄也司馬亮孔氏中表並由𦙍秀而進懐明曇㤗為義康所遇黙子景之遥之劉湛黨也其日刺義康入宿留止中書省其夕分收湛等青州刺史杜驥勒兵殿内以備非常遣人宣旨告以湛等罪舋義康上表遜位曰臣幼荷國靈爵遇踰等陛下推恩睦親以隆棠棣愛忘其鄙寵授遂崇任總内外位兼台輔不能正身率下以肅庶僚暱近失所漸不自覺致令毁譽違實賞罰謬加由臣才弱任重以及傾撓今雖罪人即戮王猷載靜飬舋貽垢實由於臣鞠躬慄悚若墯谿壑有何心顔而安斯寵輒解所職待罪私第改授都督江州諸軍事江州刺史持節侍中將軍如故出鎮豫章停省十餘日桂陽侯義融新喻侯義宗祕書監徐湛之往來慰視於省奉辭便下渚上唯對之慟哭餘無所言上又遣沙門釋慧琳視之義康曰弟子有還理不慧琳曰恨公不讀數百卷書征虜司馬蕭斌昔為義康所暱劉斌等害其寵讒斥之乃以斌為諮議參軍領豫章太守事無大小皆以委之司徒主簿謝綜素為義康所狎以為記室參軍左右愛念者並聽隨從至豫章辭州見許增督廣交二州湘州之始興諸軍事資奉優厚信賜相係朝廷大事皆報示之義康未敗東府聽事前井水忽涌溢野雉江鷗並飛入所住齋前龍驤參軍巴東扶令育詣闕上表曰蓋聞哲王不逆切旨之諫以博聞為道人臣不忌殲夷之罰以盡言為忠是故周昌極諫馮唐靣折孝惠所以克固儲嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顔違色者哉又爰盎之諫孝文曰淮南王若道遇死則陛下有殺弟之名奈何文帝不用追悔無及臣草莽微臣竊不自揆敢抱葵藿傾陽之心仰慕周易匪躬之志故不遠六千里願言命侣謹貢丹愚希垂察納伏惟陛下躬執大象首出萬物王化咸通三才必理闢大人之路開大道之門摉殊逸于巖穴招竒英於側陋窮谷無白駒之倡喬岳無遺寳之嗟豈特羅飛翮于垂天網沈鱗於溟海况於彭城王義康先朝之愛子陛下之次弟哉一旦黜削遠送南服恩絶於内形隔於遠躬離明主身放聖世草萊黔首皆為陛下痛之臣追維景平元嘉之釁幾於危殆三公託以興廢之宜宻懐不臣之計台輔伺隙於京甸强楚窺窬於上流或顯逆而陵主有生之所惴恐神祗之所忿忌也頼宗社靈長廟算流遠灑滌塵埃殲馘醜類氛霧時靖四門載清當爾之時義康豈不預參皇謀均此休否哉且陛下舊楚形勝非親勿居遂以驃騎之號任以藩夏之重撫政南郢綏民遏寇播皇宋之澤以洽幽荒陛下之潤被之九有豈直南荆之民沾渥而已焉遂召之以宰輔又寄之以和味旣居三事又牧徐揚所以幽顯齊歡人神同忭莫不言陛下授之為得義康受之為是也今如何信疑貌之似闕兄弟之恩乎若有迷謬之愆可責之罪正可數之以善惡導之以義方且廬陵王往事足以知今此乃陛下前事之殷鍳後乘之靈龜也夫曾子之不殺忠臣之篤譬二告而猶織仁王之令範故詩云無信人之言人實不信又云兄弟雖鬩不廢親也尚書曰克明俊德以親九族九族旣睦可以親百姓兄弟安可棄乎臣伏願陛下上尋往代黜廢之禍下惟近者讒言之舋廬陵王既申寃魂於后土彭城王亦弭疑愆於宋京豈徒皇代當今之計蓋乃良史萬代之美也且諂諛難辨是非易黷福始禍先古人所畏故愛身之士自為己計莫不結舌杜口孰肯冐忌干主哉臣以頑昧獨獻微管所以勤勤懇懇必訴丹誠者實恐義康年窮命盡奄忽于南遂令陛下有棄弟之責臣雖微賤竊為陛下羞之况書言記事史豈能屈典謨而諱哉脫如臣慮陛下恨之何益揚子雲曰獲福之大莫先於和穆遘禍之深莫過於内難每服斯言以為警戒矧今覩王室大事豈得韜筆默爾而已哉臣將恐天下風靡離間是懼遂令宇内遷觀民庶革心欲致康哉實為難也陛下徒云惡枝之宜伐豈悟伐柯之傷樹乃往古之所悲當今所宜改也陛下若蕩以平聽屏此猜情垂訊芻蕘之謀曲察狂瞽之計一發非意之詔逮訪博古之士速召義康返於京甸兄弟協和君臣緝穆息宇内之譏絶多言之路如是則四海之望塞讒說之道消矣何必司徒公揚州牧然後可以安彭城王哉若臣所啟違憲於國為非請即伏誅以謝陛下雖復分形赴鑊煮體烹屍始願所甘豈不幸甚表奏即收付建康獄賜死㑹稽長公主於兄弟為長太祖至所親敬義康南上後久之上嘗就主宴集甚懽主起再拜稽顙悲不自勝上不曉其意自起扶之主曰車子嵗暮必不為陛下所容今特請其生命因慟哭上流涕舉手指蔣山曰必無此慮若違今誓便負初寧陵即封所飲酒賜義康并書曰㑹稽姉飲宴憶弟所餘酒今封送車子義康小字也二十二年太子詹事范曄等謀反事逮義康事在曄傳有司上曰義康昔擅國權恣心凌上結朋樹黨苞納凶邪重舋彰著事合明罰特遭陛下仁愛深至敦惜周親封社不削爵寵無貶四海之心朝野之議咸謂皇德雖厚實撓典刑而義康曾不思此大造之德自出南服詭飾情貌外示知懼内實不悛窮好極欲干請無度聖慈含𢎞每不折舊矜釋屢加恩疇已往而隂敦行李方啟交通之謀潛資左右以要死士之命崎嶇伺隟不忘窺窬時猶隱忍罰止僕侍狂疾之性永不懲革兇心遂成悖謀仍構遠投羣醜千里相結再議宗社重闚鼎祚頼陛下至誠感神宋歴方永故姦事昭露罪人斯得周公上聖不辭同氣之刑漢文仁明無隱從兄之惡况義康舋深二叔謀過淮南背親反道自棄天地臣等參議請下有司削義康王爵收付廷尉法獄治罪詔特宥大辟於是免義康及子泉陵侯允女始寧豐城益陽興平四縣主為庻人絶屬籍徙付安成郡以寧朔將軍沈邵為安成公相領兵防守義康在安成讀書見淮南厲王長事廢書歎曰前代乃有此我得罪為宜也二十四年豫章胡誕世前吳平令袁惲等謀反襲殺豫章太守桓隆南昌令諸葛智之聚衆據郡復欲奉戴義康太尉録尚書江夏王義恭等奏曰投畀之言義著雅篇流殛之教事在書典庶人義康負舋深重罪不容戮聖仁不忍屢加遲回宥其大辟賜遷近甸斯乃至愛發天超邈終古曾不遇愆甘引而讒言同衆佷悖徼幸每形辭色内宣家人外動民聽不逞之族因以生心胡誕世假竊名號搆成凶逆杜漸除微古今所務况禍機驟發庸可忽乎臣等參議宜徙廣州逺郡放之邊表庻有防絶奏可仍以安成公相沈邵為廣州事未行値邵病卒索虜來寇𤓰歩天下擾動上慮異志者或奉義康為亂世祖時鎭彭城累啓宜為之所太子及尚書左僕射何尚之並以為言二十八年正月遣中書舍人嚴龍齎藥賜死義康不肯服藥曰佛教自殺不復得人身便隨宜見處分乃以被揜殺之時年四十三以侯禮葬安成六子允肱珣昭方曇辯允初封泉陵縣侯食邑七百戸昭方並早夭允等留安成元凶得志遣殺之世祖大明四年義康女玉秀等露板辭曰父凶滅無狀孤負天明存荷優飬没䝉加禮明罰羽山未足勑法烏鳥㣲心昧死上訴乞反葬舊塋糜骨鄉壤詔聽并加資給前廢帝永光元年太宰江夏王義恭表曰臣聞忝祖遠支猶或慮親降霜省序義重令戚故嚴道疾終嗣啓方宇阜陵愆屏身晩恩竊惟故庻人劉義康昔昧姦回自貽非命沈魂漏籍垂誡來典運革三朝嵗盈三紀天地改朔日月再升陶形賦氣咸䝉更始義康妻息漂没早違盛化衆女孤弱永淪黔首即情原舋本非已招感事哀焭俯增傷咽敢緣陛下聖化融泰春澤覃被慈育羣生仁被泉草實希洗宥還齒帝宗則施及陳荄榮施汚壤臣特憑國私冐以誠表塵觸靈威伏紙悲悸詔曰太宰表如此公緣情遣遠覧以增慨昔淮楚推恩胙流支𦙍抑法𢎞親古今成凖使以公表付外依㫖奉行故泉陵侯允横罹凶虐可特為置後太宗泰始四年復絶屬籍還為庶人南郡王義宣生而舌短澀於言論元嘉元年年十二封竟陵王食邑五千戸仍拜右將軍鎭石頭七年遷使持節都督徐兗青冀幽五州諸軍事徐州刺史將軍如故猶戍石頭八年又改都督南兗兗州刺史常鎭山陽未行明年遷中書監進號中軍將軍加散騎常侍給鼓吹一部時竟陵羣蠻充斥役刻民散改封南譙王又領石頭戍事十三年出都督江州豫州之西陵晉熙新蔡三郡諸軍事鎭南將軍江州刺史初髙祖以荆州上流形勝地廣兵彊遺詔諸子次第居之謝晦平後以授彭城王義康義康入相次江夏王義恭又以臨川王義慶宗室令望且臨川武烈王有大功於社稷義慶又居之其後應在義宣上以義宣人才素短不堪居上流十六年以衡陽王義季代義慶而以義宣代義季為南徐州刺史都督南徐州軍事征北將軍持節如故加散騎常侍而㑹稽公主每以為言上遲回久之二十一年乃以義宣都督荆雍益梁寧南北秦七州諸軍事車騎將軍荆州刺史持節常侍如故先賜中詔曰師䕶以在西久比表求還出内左右自是經國常理亦何必其應於一往今欲聽許以汝代之䕶雖無殊績潔已節用通懐期物不恣羣下此信未易非唯聲著西土朝野以為美談在彼已有次第為士庻所安論者乃謂未議遷之今之回換更在欲為汝耳汝與䕶年時一輩各有其羙物議亦互有少劣若今向事脫一減之者旣於西夏交有巨礙遷代之譏必歸責於吾矣復當為䕶怨非但一誚而已也如此則公私俱損為不可不先共善詳此事亦易勉耳無為使人動生評論也師䕶義季小字也義宣至鎮勤自課厲政事修理白晳美鬚眉長七尺五寸腰帶十圍多畜嬪媵後房千餘尼媪數百男女三十人崇飾綺麗費用殷廣進位司空改侍中領南蠻校尉二十七年索虜南侵義宣慮寇至欲奔上明及虜退太祖詔之曰善修民務不須營潛逃計也三十年遷司徒中軍將軍揚州刺史侍中如故未及就徵値元凶弑立以義宣為中書監太尉領司徒侍中如故義宣聞之即時起兵徵聚甲卒傳檄近遠㑹世祖入討義宣遣參軍徐遺寳率衆三千助為前鋒世祖卽位以義宣為中書監都督揚豫二州刺史加羽葆鼓吹給班劔四十人持節侍中如故改封南郡王食邑萬戸進諡義宣所生為獻太妃封次子宜陽侯愷為南譙王食邑千戸義宣固辭内任及愷王爵於是改授都督荆湘雝益梁寧南北秦八州諸軍事荆湘二州刺史持節侍中丞相如故降愷為宜陽縣王義宣將佐以下竝加賞秩長史張暢事在本傳咨議參軍蔡超專掌書記并參謀除尚書吏部郎仍為丞相咨議參軍南郡内史封汝南縣侯食邑千户司馬竺超民為黄門侍郎仍除丞相司馬南平内史其餘各有差義宣在鎭十年兵彊財富旣首剏大義威名著天下凡所求欲無不必從朝廷所下制度意所不同者一不遵承嘗獻世祖酒先自酌飲封送所餘其不識大體如此初臧質隂有異志以義宣凡弱易可傾移欲假手為亂以成其姦自襄陽往江陵見義宣便盡禮事在質傳及至江州每密信說義宣以為有大才負大功挾震主之威自古尠有全者宜在人前蚤有處分且萬姓莫不係心於公整衆入朝内外孰不欣戴不爾一旦受禍悔無所及義宣隂納質言而世祖閨庭無禮與義宣諸女淫亂義宣因此發怒密治舟甲克孝建元年秋冬舉兵報豫州刺史魯爽兗州刺史徐遺寳使同爽狂酒失㫖其年正月便反遣府戸曹送版以義宣補天子并送天子羽儀遺寳亦勒兵向彭城義宣及質狼狽起兵二月二十六日加都督中外諸軍事置左右長史司馬使僚佐悉稱名遣傳奉表曰臣聞博陸毗漢獲疑宣后昌國翼燕見猜惠王常謂異姓震主嫌隟易構葭莩淳戚昭亮可期臣雖庸懦少希忠謹値巨逆滔天忘家殉國雖厯算有歸㣲績不樹竭誠盡愚貫之幽顯而微疑莫監積毁日聞投杼之聲紛紜溢聽諒緣姧臣交亂成是貝錦夫澆俗之季少貞節之臣氷霜競至靡後彫之木並寢處凶世甘榮偽朝皆纓冕之所棄投畀之所取至乃位超昔寵任參大政惡直醜勲妄生邪說疑惑明主誣罔視聽又南從郡僚勞不足紀横叨天功以為己力同弊相扇圖傾宗社臧質去嵗忠節勲高古賢魯爽恊同大義志契金石此等猜毁必欲禍陷昔汲黯尚存劉安寢志孔父既逝華督縱逆臣雖不武績著艱難復肆讒狡規見誘召宗祀之危綴旒非所臣託體皇基連暉日月王室顚墜咎在微躬敢忘抵鼠之忌甘受犯墉之責輒徵召甲卒分命衆藩使忠勤申憤義夫効力戮此凶醜謝愆闕廷則進不負七廟之靈退無愧二朝之遇臨表感愧辭不自宣上詔答曰皇帝敬問朕以不天招罹屯難家國阽危剪焉將及所以身先八百雪清寃耻遠憑高算共濟艱難遂登寡闇嗣奉洪祀尊戚酬勲實表心事粃政闕職所願匡拯而嘉言蔑聞末德先著勤王之績未終毁冕之圖已及臧質嶮躁無行見棄人倫以此不識志在問鼎凶意將逞先借附從扇誘欺熾成此亂階如使羣逆並濟衆邪競逐將恐瞻烏之命未識所止搆怨連禍孰知其極公明有不照背本崇姦迷昵讒醜還謀社稷雖履霜有日諠議糾紛朕以至道無私杜遏疑議信理推誠暴於遐邇不虞物變難籌醜言遂驗是用悼心失圖忽忘寢食今便親御六師廣命羣牧告靈誓衆直造柴桑梟轘元惡以謝天下然後警蹕清江鳴鑾郢路投戈襲衮面禀規朂有宋不造家禍仍纒昔嵗事寧方承遠訓冀以虛薄永弭厥艱豈謂曾未朞稔復覩斯舋二祖之業將墜于淵仰瞻鴻基但深感慟太傅江夏王義恭又與義宣書曰頃聞之道路云二魯背叛致之有由謂不然之言絶於知者之耳忽見來表將興晉陽之甲驚愕駭惋未譬所由若主幼臣强政移冢宰或時昬下縱在上畏逼然後賢藩忠構覩難赴機未聞聖主御世百辟順軌稱兵於言興之初扶危於旣安之日以此取濟竊為大弟憂之昔歳二凶構逆四海同奮弟恊宣忠孝奉戴明主元功盛德旣已昭著皇朝欽嘉又亦優渥丞相位極人臣江左罕授一門兩王舉世希有表倍推誠彰於見事出納之宜唯意所欲裒升進益方省後命一旦棄之可謂運也吾等荷先帝慈育得及人羣思報後恩昊天罔極竭力盡誠猶懼無補奈何妄聽邪說輕造禍難國靡流言遽歸愆於二叔世無鼂錯仍襲轍於七藩棄漢蒼之令範遵齊冏之敗跡往時仲堪假兵靈寳旋害其族孝伯授之劉牢忠誠逝踵皆曩代之成事當今之殷鑒也臧質少無美行弟所具悉憑恃末戚並有微勤承乏推遷遂超倫伍藉西楚彊力圖濟其私凶謀若果恐非復池中物魯宗父子世為國寃太祖方𢎞遐略故爽等均雍齒之封令據有五州虎兕出於匣是須為劉淵耳徐遺寳是垣䕶之婦弟前因䕶之歸於吾苦求北出不樂遠西近磐桓湖陸示遣劉雍其意見可雍是徐冲舅適有密信誓倒戈自虜侵境以來公私彫弊安以撫之庶可寧靜弟復隨而擾亂吾恐邊鄙皆為禾黍宜遠尋高祖創業艱難近念家國比者禍舋時息兵戈共安社稷責躬謝過誅除險佞追保前勲傳美竹帛昔梁孝悔罪景帝垂恩阜質改過肅宗降澤忠焉之誨聊希往言禍福之機明者是察主上神武英斷羣策如林忠臣發憤虎士投袂雄騎布野舳艫蓋川吾以不才忝權節鉞總督羣帥首戒戎先指晨電舉式清南服所以積行緩期冀弟不遠而悟如其遂溺姦說者天實為之臨書慨懣不識次苐義宣移檄諸州郡加進號位遣參軍劉諶之尹周之等率軍下就臧質雝州刺史朱修之起兵奉順義宣二月十一日率衆十萬發自江津舳艫數百里是日大風船幾覆没僅得入中夏口以第八子慆為輔國將軍留鎭江陵遣魯秀朱曇韶萬餘人北討朱修之秀初至江陵見義宣旣出拊膺曰阿兄誤大事乃與癡人共作賊今年敗矣義宣至尋陽與質俱下質為前鋒至䧿頭聞徐遺寳敗魯爽於小峴授首相視失色世祖使鎭北大將軍沈慶之送爽首示義宣并與書僕荷任一方而釁生所統近聊率輕師指往翦撲軍鋒裁交賊爽授首公情契異常或欲相見及其可識指送相呈義宣質竝駭懼上先遣豫州刺史王𤣥謨舟師頓梁山洲内東西兩岸為郤月城營栅甚固義宣屢與𤣥謨書要令降𤣥謨書報曰頻奉二誨伏對戰駭先在彭泗聞諸將皆云必有今日之事以鄙意量謂無此理去年九月故遣參軍先僧瑗修書表心并宻陳入相之計欲使周旦之美復見於今豈意理數難推果至於此昔因幸㑹䝉國士之顧思報厚德甘起泉壤豈謂一旦事與願違公崇長姦回自放西服信邪細之說忘大節之重溺流狡之志滅君親之恩狎玩極寵越希非覬祖宗世祀自圖顚覆瞑目行事未有如斯之甚者也乃復枉覃書檄遠示見招此則丹心㣲款未亮於高鑑赤誠幽志虛感於平日環念周回始悟知己之為難也公但念提職在昔不思善教有本徒見徐魯去就未知仗義有人豈不惜哉有臣則欲其忠誘人而導諸逆君子忠恕其如是乎茍不忠恕則擇木之翰有所不集矣夫挑妾者愛其易求妻則敬其難若承命如響將焉用之原轂存輿無禮必及竊恐荆郢之士已當潛貳其懷非皇都陋臣秉義不徙公雖心迷迹往猶願勉建良圖抑撫軍忠壯慷慨亮誠有素新亭之勲莫與為䓁而妄信姦虛坐相貶謗不亦惑哉幸承人乏夙誡前驅精甲已次近路鎭軍駱驛繼發太傅驃騎嗣董元戎乘輿親御六師威靈遐振人百其氣慕義如林舟騎雲回赫奕千里輒屬鞬秉銳與執事周旋授命當仁理無所讓夫君道既盡民禮亦絶執筆裁答感慨交懷撫軍栁元景據姑孰為大統偏帥鄭琨武念戍南浦質逕入梁山去𤣥謨一里許結營義宣屯蕪湖五月十九日西南風猛質乘風順流攻𤣥謨西壘冗從僕射胡子友等戰失利棄壘渡就𤣥謨質又遣將龐法起數千兵從洲外趨南浦仍使自後掩𤣥謨與琨念相遇法起戰大敗赴水死略盡二十一日義宣至梁山質上出軍東岸攻𤣥謨𤣥謨分遣游擊將軍垣䕶之竟陵太守薛安都等出壘奮擊大敗質軍軍人一時投水䕶之等因風縱火焚其舟乘風勢猛盛烟爓覆江義宣時屯西岸延火燒營殆盡諸將乘風火之勢縱兵攻之衆一時奔潰義宣與質相失各單舸迸走東人士庻並歸順西人與義宣相隨者船舸猶有百餘女先適臧質子過尋陽入城取女載以西奔至江夏聞巴陵有軍被抄斷回入逕口歩向江陵衆散且盡左右唯十許人腳痛不復能行就民僦露車自載無復食緣道求告至江陵郭外遣人報竺超民超民具羽儀兵衆迎之時外猶自如舊帶甲尚萬餘人義宣旣入城仍出聽事見客左右翟靈寳誡使撫慰衆賔以臧質違指授之宜用致失利今治兵繕甲㪅為後圖昔漢高百敗終成大業而義宣忘靈寳之言誤云項羽千敗衆咸掩口而笑魯秀竺超民等猶為之爪牙欲收合餘燼㪅圖一决而義宣惛墊無復神守入内不復出左右腹心相率奔叛魯秀北走義宣不復自立欲隨秀去乃於内戎服幐囊盛糧帶佩刀攜息慆及所愛妾五人皆著男子服相隨城内擾亂白刃交横義宣大懼落馬仍便歩地超民送城外更以馬與之超民因還守城義宣冀及秀望諸將送北入虜旣失秀所在未出郭將士逃散盡唯餘慆及五妾兩黄門而已夜還向城入南郡空廨無牀席地至旦遣黄門報超民超民遣故車一乘載送刺姦義宣送止獄戸坐地歎曰臧質老奴誤我始與五妾俱入獄五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦大司馬江夏王義恭諸公王八座與荆州刺史朱修之書曰義宣反道叛恩自陷極逆大義滅親古今同准無將之誅猶或囚殺况醜文悖志宣灼遐邇鋒指絳闕兵纒近郊舋逼憂深臣主旰食頼朝略震明祖宗靈慶罪人斯得七廟弗隳司刑定罰典辟攸在而皇慈逮下愍其愚迷抑法申情屢奏不省人神悚遑省心震愓義宣自絶於天理無容受社稷之慮臣子責深便宜專行大戮以紓國難但加諸斧鉞有傷聖仁示以𢎞恩使自為所上全天德下一洪憲臨書悲慨不復多云書未達修之至江陵已於獄盡焉時年四十世祖聽還葬義宣子悰愷恢憬惔􅳜惇惂伯實業悉達法導僧喜慧正慧知明彌虜妙覺寳明凡十八人愷恢惔惇並於江陵墓所賜死􅳜悉達早卒餘並與義宣俱為朱脩之所殺蔡超及諮議叅軍顔樂之徐壽之等諸同惡竝伏誅超濟陽考城人父茂之侍廬陵王義眞讀書官至彭城王義康驃騎從事中郎始興太守超少有才學初為兖州主簿時令百官舉才超與前始寧令同郡江淳之前征南參軍㑹稽賀道養竝為興安侯義賔所表薦竺超民青州刺史竺䕫子也恢字景度旣嫡長少而辯慧義宣甚愛重之年十一拜南譙王世子除給事中義宣為荆州常停都邑太祖欲令遷西乃以為河東太守加寧朔將軍頃之徵為黄門侍郎元凶弑立恢為侍中義宣起義劭收恢及弟愷惔悰憬􅳜繫于外散騎郎沈煥防守之煥密有歸順意謂恢等曰禍福與諸郎同之願勿憂及臧質自白下上趨廣莫門劭令煥殺恢等煥乃解其桎梏率所領數十人與恢等向廣莫門欲出門者拒之煥曰臧公已至凶人走矣此司空諸郎竝能為諸君得富貴非徒免禍而已勿相留亦値質至因以得出恢至新亭卽除侍中俄遷侍中散騎常侍西中郎將湘州刺史義宣并領湘州轉恢侍中領衛尉晉氏過江不置城門校尉及衛尉官孝武欲重城禁故復置衛尉卿衛尉之置自恢始也轉右衛將軍侍中如故義宣舉兵反恢與兄弟姊妹一時逃亡恢藏江寧民陳銑家有告之者錄付廷尉恢子善藏與恢俱死愷字景穆生而養於宫内寵均皇子十嵗封宜陽縣侯仍為建威將軍南彭城沛二郡太守遷歩兵校尉轉黄門侍郎太子中庶子領長水校尉元凶以愷為散騎常侍世祖以為祕書監未拜遷輔國將軍南彭城下邳二郡太守其年轉五兵尚書進爵為王義宣反問至愷於尚書寺内著婦人衣乘問訊車投臨汝公蓋詡詡於妻室内為地窟藏之事覺收付廷尉詡伏誅恢封臨武縣侯年十八卒諡曰悼侯悰封湘南縣侯憬封祁陽縣侯徐遺寳字石儁高平金鄉人初以新亭戰功為輔國將軍衛軍司馬河東太守不之官遷兖州刺史將軍如故戍湖陸封益陽縣侯食邑二千五百尸義宣旣叛遣使以遺寳為征虜將軍徐州刺史率軍出𤓰歩遺寳遣長史劉雝之襲彭城寧朔司馬明𦙍擊破之更遣高平太守王𤣥楷與雝之復逼彭城時徐州刺史蕭思話未之鎭因詔安北司馬夏侯祖權率五百人馳往助𦙍旣至擊𤣥楷斬之雝之還湖陸遺寳復遣使人檀休祖應𤣥楷聞敗亦潰散遺寳棄城奔魯爽爽敗逃東海郡界土人斬送之傳首京邑夏侯祖權譙人也以功封祁陽縣子食邑四百戸大明中為建武將軍兖州刺史卒官諡曰烈子史臣曰襄陽龎公謂劉表曰若使周公與管蔡處茅屋之下食藜藿之羮豈有若斯之難夫天倫由子共氣分形寵愛之分雖同富貴之情則異也追味尚長之言以為太息宋書卷六十八宋書卷六十八考證彭城王義康傳前龍驤叅軍巴東扶令育南史令字在扶字上裴子野論稱曰扶育而通鑑從宋書作扶令育恐當以南史為是故詩云無信人之言人實不信又云兄弟雖䦧不廢親也臣照按兄弟雖鬩二句毛詩無此語蓋左傳富辰引兄弟鬩於牆外禦其侮而釋之曰兄弟雖有小忿不廢懿親也古人引書舉其大意徃徃如此二十八年正月遣中書舍人嚴龍龍南史作麝南郡王義宣傳義宣子悰愷恢憬惔􅳜惇慆臣承蒼按下文稱恢為嫡長又云劭收恢及弟愷惔悰憬􅳜繫於外是悰愷皆恢之弟也南史亦云長子恢此傳叙恢于悰愷之後恐誤宋書卷六十八考證
