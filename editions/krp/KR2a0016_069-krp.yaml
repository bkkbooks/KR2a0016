body:
  text: 宋書卷六十九梁沈約撰列傳第二十九劉湛范曅劉湛字𢎞仁南陽湼陽人也祖耽父柳竝晉左光祿大夫開府儀同三司湛出繼伯父淡襲封安衆縣五等男少有局力不向浮華博渉史傳諳前世舊典弱年便有宰世情常自比管夷吾諸葛亮不為文章不喜談議本州辟主簿不就除著作佐郎又不拜高祖為太尉行參軍賞遇甚厚高祖領鎭西將軍荆州刺史以湛為功曹仍補治中别駕從事史復為太尉參軍世子征虜西中郎主簿父栁亡於江州州府送故甚豐一無所受時論稱之服終除祕書丞出為相國參軍謝晦王𢎞竝稱其有器幹高祖入受晉命以第四子義康為冠軍將軍豫州刺史留鎭夀陽以湛為長史梁郡太守義康弱年未親政府州軍事悉委湛府進號右將軍仍隨府轉義康以本號徙為南豫州湛改領歴陽太守為人剛嚴用法姧吏犯贓百錢以上皆殺之自下莫不震肅廬陵王義眞出為車騎將軍南豫州刺史湛又為長史太守如故義眞時居高祖憂使帳下備膳湛禁之義眞乃使左右索魚肉珍羞於齋内别立厨帳㑹湛入因命臑酒炙車螯湛正色曰公當今不宜有此設義眞曰旦甚寒一盌酒亦何傷長史事同一家望不為異酒旣至湛因起曰旣不能以禮自處又不能以禮處人景平元年召入拜尚書吏部郎遷右衛將軍出督廣交二州諸軍事建威將軍平越中郎將廣州刺史嫡母憂去職服闋為侍中撫軍將軍江夏王義恭鎭江陵以湛為使持節南蠻校尉領撫軍長史行府州事時王𢎞輔政而王華王曇首任事居中湛自謂才能不後之不願外出是行也謂為𢎞等所斥意甚不平常曰二王若非代邸之舊無以至此可謂遭遇風雲湛負其志氣常慕汲黯崔琰為人故名長子曰黯字長孺第二子曰琰字季珪琰於江陵病卒湛求自送喪還都義恭亦為之陳請太祖答義恭曰吾亦得湛啟事為之酸懷乃不欲茍違所請但汝弱年新渉庻務八州殷曠專斷事重疇諮委仗不可不得其人量算二三未獲便相順許今答湛啟權停彼葬頃朝臣零落相係寄懷轉寡湛實國器吾乃欲引其令還直以西夏任重要且停此事耳汝慶賞黜罸豫關失得者必宜悉相委寄義恭性甚狷隘年又漸長欲專政事每為湛所裁主佐之間嫌隙遂構太祖聞之密遣使詰讓義恭并使深加諧緝義恭具陳湛無居下之禮又自以年長未得行意雖奉詔旨頗有怨言上友于素篤欲加酬順乃詔之曰事至於此甚為可嘆當今之才委授已爾宜盡相彌縫取其可取棄其可棄汝疏云泯然無際如此甚佳彼多猜不可令萬一覺也汝年已長漸更事物且羣情矚望不以幼昧相期何由故如十嵗時動止諮問但當今所專必是小事耳亦恐量此輕重未必盡得彼之疑怨兼或由此邪先是王華旣亾曇首又卒領軍將軍殷景仁以時賢零落白太祖徵湛八年召為太子詹事加給事中本州大中正與景仁竝被任遇湛常云今世宰相何難此政可當我南陽郡漢世功曹耳明年景仁轉尚書僕射領選䕶軍將軍湛代為領軍將軍十二年又領詹事湛與景仁素欵又以其建議徵之甚相感說及俱被時遇猜隙漸生以景仁專管内任謂為間已時彭城王義康專秉朝權而湛昔為上佐遂以舊情委心自結欲因宰相之力以回主心傾黜景仁獨當時務義康屢構之於太祖其事不行義康寮屬及湛諸附𨽻潛相約勒無敢歴殷氏門者湛黨劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐡干祿由敬文闇淺上負生成合門慚懼無地自處敬文之姧諂無愧如此義康擅勢專朝威傾内外湛愈推崇之無復人臣之禮上稍不能平湛初入朝委任甚重日夕引接恩禮綢繆善論治道并諳前世故事叙致銓理聽者忘疲每入雲龍門御者便解駕左右及羽儀隨意分散不夕不出以此為常及至晚節驅煽義康凌轢朝廷上意雖内離而接遇不改上嘗謂所親曰劉班初自西還吾與語常㸔日早晚慮其當去比入吾亦㸔日早晩慮其不去湛小字班虎故云班也遷丹陽尹金紫光祿大夫加散騎常侍詹事如故十七年所生母亡時上與義康形迹旣乖舋難將結湛亦知無復全地及至丁艱謂所親曰今年必敗常日正頼口舌爭之故得推遷耳今旣窮毒無復此望禍至其能久乎十月詔曰劉湛階藉門䕃少叨榮位往佐歴陽姧詖夙著謝晦之難潛使密告求心卽事久宜誅屏朕所以棄罪略瑕庶收後効寵秩優忝踰越倫匹而凶忍忌克剛愎靡厭無君之心觸遇斯發遂乃合黨連羣構扇同異附下蔽上專弄威權薦子樹親互為表裏邪附者榮曜九族乘理者推䧟必至旋觀姧慝為日已久猶欲𢎞納遵養冀或悛革自邇以來凌縱滋甚悖言懟容罔所顧忌險謀潛計䁹睨兩宫豈唯彰暴國都固亦逹于四海比年七曜違度震蝕表災侵陽之徵事符幽顯搢紳含憤義夫興歎昔齊魯不綱禍傾邦國昭宣電斷漢祚方延便收付廷尉肅明刑典於獄伏誅時年四十九子黯大將軍從事中郎黯及二弟亮儼竝從誅湛弟素黄門侍郎徙廣州湛初被收嘆曰便是亂邪仍又曰不言無我應亂殺我自是亂法耳入獄見素曰乃復及汝邪相勸為惡惡不可為相勸為善正見今日如何湛生女輒殺之為士流所怪范曅字蔚宗順陽人車騎將軍泰少子也母如厠産之額為塼所傷故以塼為小字出繼從伯𢎞之襲封武興縣五等侯少好學博渉經史善為文章能𨽻書曉音律年十七州辟主簿不就髙祖相國掾彭城王義康冠軍參軍隨府轉右軍參軍入補尚書外兵郎出為荆州别駕從事史尋召為祕書丞父憂去職服終為征南大將軍檀道濟司馬領新蔡太守道濟北征曅憚行辭以脚疾上不許使由水道統載器仗部伍軍還為司徒從事中郎頃之遷尚書吏部郎元嘉元年冬彭城太妃薨將葬祖夕僚故竝集東府曅弟廣淵時為司徒祭酒其日在直曅與司徒左西屬王深宿廣淵許夜中酣飲開北牖聽挽歌為樂義康大怒左遷曅宣城太守不得志乃删衆家後漢書為一家之作在郡數年遷長沙王義欣鎭軍長史加寧朔將軍兄暠為宜都太守嫡母隨暠在官十六年母亡報之以疾曅不時奔赴及行又攜妓妾自隨為御史中丞劉損所奏太祖愛其才不罪也服闋為始興王濬後軍長史領南下邳太守及濬為揚州未親政事悉以委曅尋遷左衛將軍太子詹事曅長不滿七尺肥黒禿眉鬚善彈琵琶能為新聲上欲聞之屢諷以微旨曅偽若不曉終不肯為上彈上嘗宴飲歡適謂曅曰我欲歌卿可彈曅乃奉旨上歌既畢曅亦止弦初魯國孔熙先博學有縱横才志文史星算無不兼善為員外散騎侍郎不為時所知久不得調初熙先父默之為廣州刺史以贓貨得罪下廷尉大將軍彭城王義康保持之故得免及義康被黜熙先密懷報效欲要朝廷大臣未知誰可動者以曅意志不滿欲引之而熙先素不為曅所重無因進說曅外甥謝綜雅為曅所知熙先嘗經相識乃傾身事綜與之結厚熙先藉嶺南遺財家甚富足始與綜諸弟共博故為拙行以物輸之綜等諸年少旣屢得物遂日夕往來情意稍欵綜乃引熙先與曅為數曅又與戲熙先故為不敵前後輸曅物甚多曅旣利其財寳又愛其文藝熙先素有詞辯盡心事之曅遂相與異常申莫逆之好始以㣲言動曅曅不回熙先乃極辭譬說曅素有閨庭論議朝野所知故門胄雖華而國家不與姻娶熙先因以此激之曰丈人若謂朝廷相待厚者何故不與丈人㛰為是門戸不得邪人作犬豕相遇而丈人欲為之死不亦惑乎曅黙然不答其意乃定時曅與沈演之竝為上所知待每被見多同曅若先至必待演之俱入演之先至嘗獨被引曅又以此為怨曅累經義康府佐見待素厚及宣城之授意好乖離綜為義康大將軍記室參軍隨鎭豫章綜還申義康意於曅求解晚隙復敦往好曅旣有逆謀欲探時旨乃言於上曰臣歴觀前史二漢故事諸蕃王政以訞詛幸災便正大逆之罸况義康奸心舋跡彰著遐邇而至今無恙臣竊惑焉且大梗常存將重階亂骨肉之際人所難言臣受恩深重故冐犯披露上不納熙先素善天文云太祖必以非道晏駕當由骨肉相殘江州應出天子以為義康當之綜父述亦為義康所遇綜弟約又是義康女夫故太祖使綜隨從南上既為熙先所奬說亦有酬報之心廣州人周靈甫有家兵部曲熙先以六十萬錢與之使於廣州合兵靈甫一去不反大將軍府史仲承祖義康舊所信念屢銜命下都亦潛結腹心規有異志聞熈先有誠宻相結納丹陽尹徐湛之素為義康所愛雖為舅甥恩過子弟承祖因此結事湛之告以密計承祖南下申義康意於蕭思話及曅云本欲與蕭結婚恨始意不果與范本情不薄中間相失傍人為之耳有法略道人先為義康所供養粗被知待又有王國寺法静尼亦出入義康家内皆感激舊恩規相拯㧞竝與熙先徃來使法略罷道本姓孫改名景𤣥以為臧質寧遠參軍熈先善於治病兼能診脉法静尼妹夫許耀領隊在臺宿衛殿省嘗有病因法静尼就熙先乞治為合湯一劑耀疾即損耀自往酬謝因成周旋熙先以耀膽幹可施深相待結因告逆謀耀許為内應豫章胡遵世藩之子也與法略甚欵亦密相酬和法靜尼南上熙先遣婢採藻隨之付以牋書陳說圖䜟法静還義康餉熙先銅匕銅鑷袍段綦奩等物熙先慮事泄酖採藻殺之湛之又謂曅等臧質見與異常歳内當還已報質悉攜門生義故其亦當解人此旨故應得健兒數百質與蕭思話欵密當仗要之二人竝受大將軍眷遇必無異同思話三州義故衆力亦不減質郡中文武及合諸處偵邏亦當不減千人不憂兵力不足但當勿失機耳乃略相署置湛之為撫軍將軍揚州刺史曅中軍將軍南徐州刺史熙先左衛將軍其餘皆有選擬凡素所不善及不附義康者又有别簿竝入死目熙先使弟休先先為檄文曰夫休否相乘道無恒泰狂狡肆逆明哲是殛故小白有一匡之勲重耳有翼戴之德自景平肇始皇室多故大行皇帝天誕英姿聰明叡哲㧞自藩國嗣位統天憂勞萬機埀心庻務是以邦内安逸四海同風而比年以來奸竪亂政刑罸乖淫隂陽違舛致使舋起蕭墻危禍萃集賊臣趙伯符積怨含毒遂縱奸凶肆兵犯蹕禍流儲宰崇樹非類傾墜皇基罪百浞􅜦過十𤣥莽開闢以來未聞斯比率土叨心華夷泣血咸懷亡身之誠同思糜軀之報湛之曅與行中領軍蕭思話行䕶軍將軍臧質行左衛將軍孔熙先建威將軍孔休先忠貫白日誠著幽顯義痛其心事傷其目投命奮戈萬殞莫顧卽日斬伯符首及其黨與雖豺狼卽戮王道惟新而普天無主羣萌莫係彭城王體自高祖聖明在躬德格天地勲溢區宇世路威夷勿用南服龍潛鳯棲于兹六稔蒼生饑德億兆渴化豈唯東征有鴟鴞之歌陜西有勿翦之思哉靈祗告徵祥之應䜟記表帝者之符上答天心下愜民望正位辰極非王而誰今遣行䕶軍將軍臧質等齎皇帝璽綬星馳奉迎百官備禮駱驛繼進竝命羣帥鎭戍有常若干撓義徒有犯無貸昔年使反湛之奉賜手勑逆誡禍亂預觀斯萌令宣示朝賢共拯危溺無斷謀事失於後機遂使聖躬濫酷大變奄集哀恨崩裂撫心摧哽不知何地可以厝身輒督厲尫頓死而後已熙先以旣為大事宜須義康意旨曅乃作義康與湛之書宣示同黨曰吾凡人短才生長富貴任情用已有過不聞與物無恒喜怒違實致使小人多怨士類不歸禍敗已成猶不覺悟退加尋省方知自招刻肌刻骨何所復補然至於盡心奉上誠貫幽顯拳拳謹慎惟恐不及乃可恃寵驕盈實不敢故為欺罔也豈苞藏逆心以招灰滅所以推誠自信不復防䕶異同率意信心不顧萬物議論遂致讒巧潛構衆惡歸集甲奸險好利負吾事深乙凶愚不齒扇長無頼丙丁趨走小子唯知諂進伺求長短共造虛說致令禍陷骨肉誅戮無辜凡在過釁竟有何徵而刑罸所加同之元惡傷和枉理感徹天地吾雖幽逼日苦命在漏刻義慨之士時有音信每知天文人事及外間物情土崩瓦解必在朝夕是為釁起羣賢濫延國家夙夜憤踊心腹交戰朝之君子及士庶白黒懷義秉理者寧可不識時運之㑹而坐待横流邪除君側之惡非唯一代況此等狂亂罪骫終古所無加之翦戮易於摧朽邪可以吾意宣示衆賢若能同心奮發族裂逆黨豈非功均剏業重造宋室乎但兵凶戰危或致侵濫若有一豪犯順誅及九族處分之要委之羣賢皆當謹奉朝廷動止聞啟往日嫌怨一時豁然然後吾當謝罪北闕就戮有司茍安社稷瞑目無恨勉之勉之二十二年九月征北將軍衡陽王義季右將軍南平王鑠出鎭上於武帳岡祖道曅等期以其日為亂而差互不得發於十一月徐湛之上表曰臣與范曅本無素舊中忝門下與之鄰省屢來見就故漸成周旋比年以來意態轉見傾動險忌富貴情深自謂任遇未高遂生怨望非唯攻伐朝士譏謗聖時乃上議朝廷下及藩輔驅扇同異恣口肆心如此之事已具上簡近員外散騎侍郎孔熙先忽令大將軍府吏仲承祖騰曅及謝綜等意欲收合不逞規有所建以臣昔䝉義康接盼又去嵗羣小為臣妄生風塵謂必嫌懼深見勸誘兼云人情樂亂機不可失䜟緯天文竝有徵騐曅尋自來復具陳此并說臣論議轉惡全身為難卽以啟聞被勑使相酬引䆒其情狀於是悉出檄書選事及同惡人名手墨翰跡謹封上呈凶悖之甚古今罕比由臣闇於交士聞此逆謀臨啟震惶荒情無措詔曰湛之表如此良可駭惋曅素無行檢少負瑕釁但以才藝可施故收其所長頻加榮爵遂參清顯而險利之性有過谿壑不識恩遇猶懐怨憤每存容養冀能悛革不謂同惡相濟狂悖至此便可收掩依法窮詰其夜先呼曅及朝臣集華林東閤止於客省先已於外收綜及熙先兄弟竝皆欵服于時上在延賢堂遣使問曅曰以卿觕有文翰故相任擢名爵期懐於例非少亦知卿意難厭滿正是無理怨望驅扇朋黨而已云何乃有異謀曅倉卒怖懼不即首欵上重遣問曰卿與謝綜徐湛之孔熙先謀逆竝已答欵猶尚未死徵據見存何不依實曅對曰今宗室磐石蕃嶽張跱設使竊發僥倖方鎭便來討伐幾何而不誅夷且臣位任過重一階兩級自然必至如何以滅族易此古人云左手據天下之圖右手刎其喉愚夫不為臣雖泥下朝廷許其觕有所及以理而察臣不容有此上復遣問曰熙先近在華林門外寧欲靣辨之乎曅辭窮乃曰熙先茍誣引臣臣當如何熙先聞曅不服笑謂殿中將軍沈邵之曰凡諸處分符檄書疏皆范曅所造及治定云何於今方作如此抵蹋邪上示以墨迹曅乃具陳本末曰久欲上聞逆謀未著又冀其事消弭故推遷至今負國罪重分甘誅戮其夜上使尚書僕射何尚之視之問曰卿事何得至此曅曰君謂是何尚之曰卿自應解曅曰外人傳庾尚書見憎計與之無惡謀逆之事聞孔熙先說此輕其小兒不以經意今忽受責方覺為罪君方以道佐世使天下無冤弟就死之後猶望君照此心也明日仗士送曅付廷尉入獄問徐丹陽所在然後知為湛之所發熙先望風吐欵辭氣不撓上竒其才遣人慰勞之曰以卿之才而滯於集書省理應有異志此乃我負卿也又詰責前吏部尚書何尚之曰使孔熙先年將三十作散騎郎那不作賊熙先於獄中上書曰囚小人猖狂識無遠槪徒狥意氣之小感不料逆順之大方與第二弟休先首為奸謀干犯國憲􅴼膾脯醢無補尤戾陛下大明含𢎞量苞天海錄其一介之節猥垂優逮之詔恩非望始没有遺榮終古以來未有斯比夫盗馬絶纓之臣懷璧投書之士其行至賤其過至微由識不世之恩以盡軀命之報卒能立功齊魏致勲秦楚囚雖身陷禍逆名節俱喪然少也忼慨竊慕烈士之遺風但墜崖之木事絶升躋覆盆之水理乖收汲方當身膏鈇鉞詒誡方來若使䰟而有靈結草無遠然區區丹抱不負夙心貪及視息少得申畼自惟性愛羣書心解數術智之所用力之所至莫不窮攬䆒其幽㣲考論旣往誠多審驗謹略陳所知條牒如故别状願且勿遺棄存之中書若囚死之後或可追存庶九泉之下少塞釁責所陳竝天文占候䜟上有骨肉相殘之禍其言深切曅在獄與綜及熙先異處乃稱疾求移考堂欲近綜等見聽與綜等果得隔壁遙問綜曰始被收時疑誰所告綜云不知曅曰乃是徐童童徐湛之小名仙童也在獄為詩曰禍福本無兆性命歸有極必至定前期誰能延一息在生已可知來緣㦎無識好醜共一丘何足異枉直豈論東陵上寧辨首山側雖無嵇生琴庻同夏侯色寄言生存子此路行復卽曅本意謂入獄便死而上窮治其獄遂經二旬曅更有生望獄吏因戲之曰外傳詹事或當長繫曅聞之驚喜綜熙先笑之曰詹事當前共疇事時無不攘袂瞋目及在西池射堂上躍馬顧盼自以為一世之雄而今擾攘紛紜畏死乃爾設令今時賜以性命人臣圖主何顔可以生存曅謂衛獄將曰惜哉薶如此人將曰不忠之人亦何足惜曅曰大將言是也將出市曅最在前於獄門顧謂綜曰今日次第當以位邪綜曰賊帥為先在道語笑初無暫止至市問綜曰時欲至未綜曰勢不復久曅既食又苦勸綜綜曰此異病篤何事彊飯曅家人悉至市監刑職司問須相見不曅問綜曰家人以來幸得相見將不暫别綜曰别與不别亦何所存來必當號泣正足亂人意曅曰號泣何關人向見道邊親故相瞻望亦殊勝不見吾意故欲相見於是呼前曅妻先下撫其子回罵曅曰君不為百嵗阿家不感天子恩遇身死固不足塞罪柰何枉殺子孫曅乾笑云罪至而已曅所生母泣曰主上念汝無極汝曾不能感恩又不念我老今日奈何仍以手擊曅頸及頰曅顔色不怍妻云罪人阿家莫念妹及妓妾来别曅悲涕流漣綜曰舅殊不同夏侯色曅收淚而止綜母以子弟自蹈逆亂獨不出視曅語綜曰姉今不來勝人多也曅轉醉子藹亦醉取地土及果皮以擲曅呼曅為别駕數十聲曅問曰汝恚我邪藹曰今日何緣復恚但父子同死不能不悲耳曅常謂死者神滅欲著無鬼論至是與徐湛之書云當相訟地下其謬亂如此又語人寄語何僕射天下決無佛鬼若有靈自當相報收曅家樂器服玩竝皆珍麗妓妾亦盛飾母住止單陋唯有一厨盛樵薪弟子冬無被叔父單布衣曅及子藹遥叔蔞孔熙先及弟休先景先思先熙先子桂甫桂甫子白民謝綜及弟約仲承祖許耀諸所連及竝伏誅曅時年四十八曅兄弟子父已亡者及謝綜弟緯徙廣州藹子魯連吳興昭公主外孫請全生命亦得遠徙世祖即位得還曅性精微有思致觸類多善衣裳器服莫不增損制度世人皆法學之撰和香方其序之曰麝本多忌過分必害沈實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息鬰金捺多和羅之屬竝被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當彌增於尤疾也此序所言悉以比類朝士麝本多忌比庾炳之零藿虛燥比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沈實易和以自比也曅獄中與諸甥姪書以自序曰吾狂釁覆滅豈復可言汝等皆當以罪人棄之然平生行己任懷猶應可尋至於能不意中所解汝等或不悉知吾少嬾學問晚成人年三十許政始有向耳自爾以來轉為心化推老將至者亦當未已也往往有㣲解言乃不能自盡為性不尋注書心氣惡小苦思便憒悶口機又不調利以此無談功至於所通解處皆自得之於胷懷耳文章轉進但才少思難所以每於操筆其所成篇殆無全稱者常恥作文士文患其事盡於形情急於薻義牽其旨韻移其意雖時有能者大較多不免此累政可類工巧圖繢竟無得也常謂情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其詞不流然後抽其芬芳振其金石耳此中情性旨趨千條百品屈曲有成理自謂頗識其數嘗為人言多不能賞意或異故也性别宫商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實證非為空談年少中謝莊最有其分手筆差易文不拘韻故也吾思乃無定方特能濟難適輕重所禀之分猶當未盡但多公家之言少於事外遠致以此為恨亦由無意於文名故也本未關史書政恒覺其不可解耳旣造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名旣任情無例不可甲乙辨後賛於理近無所得唯志可推耳博贍不可及之整理未必愧也吾雜傳論皆有精意深旨既有裁味故約其詞句至於循吏以下及六夷諸序論筆勢縦放實天下之竒作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而已欲徧作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷内發論以正一代得失意復未果賛自是吾文之傑思殆無一字空設竒變不窮同含異體乃自不知所以稱之此書行故應有賞音者紀傳例為舉其大略耳諸細意甚多自古體大而思精未有此也恐世人不能盡之多貴古賤今所以稱情狂言耳吾於音樂聽功不及自揮但所精非雅聲為可恨然至於一絶處亦復何異邪其中體趣言之不盡弦外之意虛響之音不知所從而來雖少許處而旨態無極亦嘗以授人士庻中未有一豪似者此永不傳矣吾書雖小小有意筆勢不快餘竟不成就每愧此名曅自序竝實故存之藹幼而整潔衣服竟嵗未嘗有塵㸃死時年二十曅少時兄晏常云此兒進利終破門戸終如晏言史臣曰古之人云利令智昏甚矣利害之相傾劉湛識用才能實苞經國之略豈不知移弟為臣則君臣之道用變兄成主則兄弟之義殊乎而義康數懷奸計茍相崇說與夫推長㦸而犯魏闕亦何以異哉宋書卷六十九宋書卷六十九考證范蔚宗傳在道語笑初無暫止暫止南史作慙耻推老將至者亦當未已也推一本作雖宋書卷六十九考證
