body:
  text: 宋書卷七十梁沈約撰列傳第三十袁淑袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風氣年數歳伯湛謂家人曰此非凡兒至十餘歳為姑夫王𢎞所賞不為章句之學而博渉多通好屬文辭采遒豔縱横有才辯本州命主簿著作佐郎太子舎人竝不就彭城王義康命為軍司祭酒義康不好文學雖外相禮接意好甚踈劉湛淑從母兄也欲其附已而淑不以為意由是大相乖失以乆疾免官補衡陽王義季右軍主簿遷太子洗馬以脚疾不拜衛軍臨川王義慶雅好文章請為諮議參軍頃之遷司徒左西屬出為宣城太守入補中書侍郎以母憂去職服闋為太子中庶子元嘉二十六年遷尚書吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏檢玉岱宗今其時也臣逄千載之㑹願上封禪書一萹太祖笑曰盛徳之事我何足以當之出為始興王征北長史南東海太守淑始到府濬引見謂曰不意舅遂垂屈佐淑答曰朝廷遣下官本以光公府望還為御史中丞時索虜南侵遂至𤓰歩太祖使百官議防禦之術淑上議曰臣聞函車之獸離山必斃絶波之鱗宕流則枯羯宼遺醜趨致畿甸蟻萃螽集聞已崩殪天險巖曠地限深遐故全魏戢其圖盛晉輟其議情屈力殫氣挫勇竭諒不虞於來臨本無怵扵能濟矣乃者爕定擕逺阻違授律由将有㢮拙故士少闘志圍潰之衆匪寇傾淪攻制之師空自班散濟西勁騎急戰蹵旅淮上訓卒簡備靡旗是由綏整寡衷戎昭多昧遂使栲潞入患泉伊來擾紛殄姬風泯毒禹績騰書有渭隂之廹懸𤇺均咸陽之警然而切揣虚實伏匿先彰校索伎能譎詭既顯綿地千里彌行阻深表裏躓硋後先介逼捨陵衍之習競湍沙之利今虹見萍生土膏泉動津陸䧟溢痁禍洊興蒭藳已單米粟莫係水㝢衿帯進必傾霣河隘扁固退亦堕滅所謂栖烏於烈火之上養魚扵叢棘之中或謂損緩江右寛繕淮内竊謂拯扼閩城舊史為允棄逺涼土前言稱非限此要荒猶弗委割況聨被京國咫尺神甸數州摧掃列邑殱痍山淵反覆草木塗地今丘賦千乗井笇萬集肩摩倍扵長安締袂百於臨淄什一而籍實慊氓願履畝以稅既恊農和户競戰心人含鋭志皆欲贏糧請奮釋緯乗城謂宜懸金鑄印要壮果之士重幣甘辭招摧決之将舉薦板築之下抽登臺皂之間賞之以焚書報之以相爵俄而昭才賀闕異能閒至戎貪而無謀肆而不整迷乎向背之次謬於合散之宜犯軍志之極害觸兵家之甚諱咸畜憤矣僉策戰矣稱願影從謡言緍命宜選敢悍數千騖行濳掩偃旗裹甲鉗馬銜枚檜稽而起晨壓未陣旌譟亂舉火鼔四臨使景不暇移塵不及起無不禽鎩獸讋冰觧霧散掃洗哨類漂鹵浮山如有決罦漏網逡窠逗穴命淮汝戈船遏其還逕兗部勁卒梗其歸途必剪元雄懸首麾下乃将隻輪不反戰轊無旋矣扵是信臣騰威武士繕力緹組接隂鞞柝聨響若其偽遁羸張出沒無際楚言漢斾顯黙如神固已日月蔽虧川谷蕩貿負塞殘孽阻山燼黨收險竊命憑城借土則當因威席卷乗機芟剿泗汴秀士星流電燭徐阜嚴兵雨湊雲集蹷亂桑溪之北揺潰瀚海以南絶其心根勿使能植銜索之枯幾何不蠧是由涸澤而漁焚林而狩若浚風之儛輕籜杲日之拂浮霜既而尉洽荷掠之餘望吊網悲之鬼然後天行樞運猋舉煙外青盖西廵翠華東幸經啓州野滌一軫策俾高闕再勒燕然復銘方乃奠山沉河創禮輯策闡燿炎昊之遺則貫軼商夏之舊文今衆賈拳勇而将術踈怯意者稔泰日積承平歳乆邑無驚赴之急家緩餽戰之勤闕閱訓之禮簡參屬之飾且亦薦採之法庸未蔇歟若乃邦造里選攉論深切躬擐盡幽斬帶尋逺設有沉明能照俊偉自宜誠感泉雨流通金石氣懾飛賁知窮苴起審邪正順逆之數逹昬明益損之宜能暌合民心愚叡物性登丹墀而敷䇿躡青蒲而揚謀上説辰鑒下弭素言足以安民紓國救災恤患則宜㧞過寵貴之上褒升戚舊之右别其旂章榮其班禄出得專譽使不禀命降席折節同廣武之請設壇致禮均淮隂之授必有要盟之功竊符之㨗夷裔暴狠内外侮棄始附之衆分茷無序蠱以威利勢必攜離首順之徒靡然自及今淶繹故典纒土纓緌翦焉幽播折首凶狡是猶眇者願明痿之思歩動商遄㑹功終易感刼晉在扵善覘全鄭實寄良諜多縦反間汨惑心耳發險易之前抵興喪之術衝其猜伏拂其嫌嗜汨以連率之貴餌以析壤之資罄筆端之用展辭鋒之鋭振辯則堅圍可觧馳羽而巖邑易傾必府鬲土崩枝幹瓦裂故燕樂相悔項范交疑矣或乃言約功深事邇應廣齊圉反駕趙養還君盡輿誦之道畢能事之效臣幸得出内層禁游心明代澤與身泰恩随年行無以逄迎昌運潤飾鴻法今塗有遺鏃蠆未息蜂敢思涼識少酬閎施但坐幕既乏昭文免胄不能致果竊觀都護之邊論屬國之兵謨終晁之抗辭杜耿之言事咸云及經之棘猶闕上笇燭郛之敬裁收下䇿自耻懦木智不綜㣲敢露昧見無㑹昭採淑喜為誇誕每為時人所謿始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑淑與濬書曰袁司直之視舘敢寓書扵上國之宮尹日者猥枉泉賦降委弊邑弊邑敬事是遑無或違貳懼非郊贈之禮覲饗之資不虞君王惠之扵是也是有懵焉弗圖旦夕發咫尺之記籍左右而請以為胥授失㫖爰速先幣曾是附庸臣委末學孤聞者如之何勿疑且亦聞之前志曰七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也藉恐二三諸侯有以觀大國之政是用敢布心腹弊室弱生砥節清廉好是潔直以不邪之故而貧聞天下寧有昧夫嗟金者哉不腆供賦束馬先璧以俟命唯執事所以圖之遷太子左衛率元凶将為弑逆其夜淑在直二更許呼淑及蕭斌等流涕謂曰主上信讒将見罪廢省内無過不能受枉明旦便當行大事望相與戮力淑及斌竝曰自古無此願加善思劭怒變色左右皆動斌懼乃曰臣昔忝伏事常思効節況憂廹如此輒當竭身奉令淑叱之曰卿便謂殿下眞有是邪殿下幼時嘗患風或是疾動耳劭愈怒因問曰事當克不淑曰居不疑之地何患不克但既克之後為天地之所不容大禍亦旋至耳願急息之劭左右引淑等袴褶又就主衣取錦截三尺為一叚又中破分斌淑及左右使以縳袴淑出環省繞牀行至四更乃寝劭将出已與蕭斌同載呼淑甚急淑眠終不起劭停車奉化門催之相續徐起至車後劭使登車又辭不上劭因命左右與手刃見殺於奉化門外時年四十六劭即位追贈太常賜賵甚厚世祖即位使顔延之為詔曰夫輕道重義亟聞其教世弊國危希遇其人自非逹義之至識正之深者孰能抗心衛主遺身固節者哉故太子左衛率淑文辯優洽秉尚貞慤當要逼之切意色不橈厲辭道逆氣震凶黨虐刃交至取斃不移古之懐忠隕難未云出其右者興言嗟悼無廢乎心宜在加禮永旌宋有臣焉可贈侍中太尉諡曰忠憲公又詔曰袁淑以身殉義忠烈邈古遺孤在疚特所矜懐可厚加賜䘏以慰存亡淑及徐湛之江湛王僧綽卜天與四家扵是長給稟禄文集𫝊扵世子幾敳稜凝摽敳世宗歩兵挍尉凝太宗世御史中丞出為晉陵太守太宗初與四方國反兵敗歸降以補劉湛冠軍府主簿淑諸子竝早卒史臣曰天長地乆人道則異於斯蕣華朝露未足以言也其間天遽曾何足云宜任心去留不以存没嬰心徒以靈化悠逺生不再來雖天行路嶮而未之斯遇謂七尺常存百年可保也所以據洪圖而輕天下恡寸隂而敗尺壁若乃義重乎生空炳前誥投軀殉主世罕其人若無陽源之節丹青何貴焉爾宋書卷七十宋書卷七十考證袁淑傳檜稽而起晨壓未陣袁淑本集檜作會臣承蒼按字書稽計也會稽之地亦以會諸侯之計得名應從本集然後天行樞運猋舉煙外外南史作升袁淑本集亦作升太宗初與四方國反兵敗歸降以補劉湛冠軍府主簿劉湛于太祖元嘉十七年被誅太宗時安得為冠軍將軍湛字誤宋書卷七十考證
