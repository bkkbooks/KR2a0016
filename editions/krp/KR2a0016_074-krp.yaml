body:
  text: 宋書卷七十四梁沈約撰列傳第三十四臧質魯爽沈攸之臧質字含文東莞莒人父熹字義和武敬皇后弟也與兄燾並好經籍隆安初兵革屢起熹乃習騎射志在立功嘗至溧陽溧陽令阮崇與熹共獵值虎突圍獵徒並奔散熹直前射之應弦而倒髙祖入京城熹族子穆斬桓脩進至京邑桓𤣥奔走髙祖使熹入宫収圗書器物封閉府庫有金飾樂噐髙祖問熹卿得無欲此乎熹正色曰皇上幽逼播越非所將軍首建大義劬勞王家雖復不肖無情於樂髙祖笑曰聊以戲卿爾行參髙祖鎮軍事員外散騎侍郎重參鎮軍軍事領東海太守以義功封始興縣五等侯又參髙祖車騎中軍軍事髙祖將征廣固議者多不同熹從容言曰公若凌威北境拯其塗炭寧一六合未為無期髙祖曰卿言是也及行熹求從不許以為建威將軍臨海太守郡經兵㓂百不存一熹綏緝綱紀招聚流散歸之者千餘家孫季髙海道襲廣州路由臨海熹資給發遣得以無乏徴拜散騎常侍母憂去職頃之討劉毅起為寧朔將軍從征事平髙祖遣朱齡石統大衆伐蜀命熹竒兵出中水以本號領建平巴東二郡太守蜀主譙縱遣大將譙撫之萬餘人屯牛脾又遣譙小苟重兵塞打鼻熹至牛脾撫之戰敗退走追斬之小苟聞撫之死即便奔散成都既平熹遇疾義熙九年卒於蜀郡牛脾縣時年三十九追贈光祿勲質少好鷹犬善蒱博意錢之戲長六尺七寸出靣露口秃頂拳髪年未二十髙祖以為世子中軍行參軍永初元年為員外散騎侍郎從班例也母憂去職服闋為江夏王義恭撫軍以輕薄無檢為太祖所知徙為給事中㑹稽宣長公主每為之言乃出為建平太守甚得蠻楚心南蠻校尉劉湛還朝稱為良守遷寧逺將軍歴陽太守仍遷竟陵江夏内史復為建武將軍巴東建平二郡太守吏民便之質年始出三十屢居名郡渉獵史籍尺牘便敏既有氣幹好言兵權太祖謂可大任欲以為益州事未行徴為使持節都督徐兖二州諸軍事寧逺將軍徐兖二州刺史在鎮奢費爵命無章為有司所糾遇赦與范曅徐湛之等厚善曅謀反量質必與之同㑹事發復為建威將軍義興太守元嘉二十六年太祖謁京陵質朝丹徒與何朂檀和之並功臣子時共上禮太祖設燕盡歡賜布千匹二十七年春遷南譙王義宣司馬寧朔將軍南平内史未之職㑹索虜大帥拓跋燾圍汝南汝南戍主陳憲固守告急太祖遣質輕往夀陽即統彼軍與安蠻司馬劉康祖等救憲虜退走因使質伐汝南西境刀壁等山蠻大破之獲萬餘口遷太子左衞率坐前伐蠻枉殺隊主嚴祖又納靣首生口不以送臺免官是時上大舉北討質白衣與驃騎司馬王方回等率軍出許洛安北司馬王𤣥謨攻滑臺不拔質請乘驛代將太祖不許虜侵徐豫拓跋燾率大衆數十萬遂向彭城以質為輔國將軍假節置佐率萬人北救始至盱眙燾已過淮宂從僕射胡崇之領質府司馬澄之副太子積弩將軍毛熙祚亦受統於質盱眙城東有髙山質慮虜據之使崇之澄之二軍營於山上質營城南虜攻崇之澄之二營崇之等力戰不敵衆散並為虜所殺虜又攻熙祚熙祚所領悉北府精兵幢主李灌率厲將士殺賊甚多隊主周􅏷之外監揚方生又率射賊賊垂退㑹熙祚被創死軍遂散亂其日質案兵不敢救故二營一時覆沒初仇池之平也以崇之為龍驤將軍北秦州刺史守百頃行至濁水為索虜所克舉兵敗散崇之及將佐以下皆為虜所執後得叛還至是又為虜所敗焉熙祚司州刺史脩之兄子也崇之熙祚並贈正員郎澄之事在祖父燾傳三營既敗其夕質軍亦奔散棄輜重器甲單七百人投盱眙盱眙太守沈璞完為守戰之備城内有實力三千質大喜因共守虜初南出後無資糧唯以百姓為命及過淮食平越石鼈二屯穀至是抄掠無所人馬饑困聞盱眙有積粟欲以為歸路之資既破崇之等一攻城不㧞便引衆南向城内増脩守備莫不完嚴二十八年正月初燾自廣陵北返便悉力攻盱眙就質求酒質封溲便與之燾怒甚築長圍一夜便合開攻道趣城東北運東山土石填之虜又恐城内水路遁走乃引大船欲於軍山作浮橋以絶淮道城内乘艦逆戰大破之明旦賊更方舫為桁桁上各嚴兵自衛城内更擊不能禁遂於軍山立桁水陸路並斷燾與質書曰吾今所遣鬭兵盡非我國人城東北是丁零與胡南是三秦氐羌設使丁零死者正可減常山趙郡賊胡死正減并州賊氐羌死正減闗中賊卿若殺丁零胡無不利質答書曰省示具悉姦懷爾自恃四脚屢犯國疆諸如此事不可具説王𤣥謨退於東梁坦散於西爾謂何以不聞童謡言邪虜馬飲江水佛狸死卯年此期未至以二軍開飲江之徑爾㝠期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令生全饗有桑乾哉但爾徃攻此城假令寡人不能殺爾爾由我而死爾若有幸得為亂兵所殺爾若不幸則生相鏁縛載以一驢直送都市我本不圗全若天地無靈力屈於爾韲之粉之屠之裂之如此未足謝本朝爾識智及衆力豈能勝苻堅邪頃年展爾陸梁者是爾未飲江太嵗未卯年故爾斛蘭昔深入彭城值少日雨隻馬不返爾豈憶邪即時春雨已降四方大衆始就雲集爾但安意攻城莫走糧食闕乏者告之當出廪相飴得所送劒刀欲令我揮之爾身邪甚苦人附反各自努力無煩多云是時虜中童謡曰軺車北來如穿雉不意虜馬飲江水虜主北歸石濟死虜欲渡江天不徙故質答引燾大怒乃作鐵床於其上施鐵鑱云破城得質當坐之此上質又與虜衆書曰示詔虜中諸士庶狸伐見與書如别等正朔之民何為力自取如此大丈夫豈可不知轉禍為福邪今冩臺格如别書自思之時購斬燾封開國縣侯食邑一萬户賜布絹各萬匹虜以鉤車鉤垣樓城内繋以彄絙數百人呌喚引之車不能退既夜以木桶盛人懸人出城外截鉤能獲之明日又以衝車攻城城土堅宻每至頺落不過數升虜乃肉薄登城分番相代墜而復升莫有退者殺傷萬計虜死者與城平又射殺髙梁王如此三旬死者過半燾聞彭城斷其歸路京邑遣水軍自海入淮且疾疫死者甚衆二月二日乃解圍遁走上嘉質功以為使持節監雍梁南北秦四州諸軍事冠軍將軍寧蠻校尉雍州刺史封開國子食邑五百户明年太祖又北伐使質率所統見力向潼關質頓兵近郊不肯時發獨遣司馬柳元景屯兵境上不時進軍質又顧戀嬖妾棄營單馬還城散用臺庫見錢六七百萬為有司所糾上不問也元凶弑立以質為丹陽尹加征虜將軍質家遣門生師顗報質具太祖崩問質疏顗所言馳告司空義宣又遣州祭酒從事田穎起銜命報世祖率衆五千馳下討逆自陽口進江陵義宣質諸子在都邑聞質舉義並逃亡劭欲相慰恱乃下書曰臧敦等無因自駭急便竄逸迷昧過甚良可怪歎質國戚勲臣忠誠篤亮方當顯位贊翼京輦而子弟波迸傷其乃懷可遣宣譬令還咸復本位劭尋錄得敦使大將軍義恭行訓杖三十厚給賜之義宣得質報即日舉兵馳信報世祖板進質號征北將軍質逕赴尋陽與世祖同下世祖至新亭即位以質為都督江州諸軍事車騎將軍開府儀同三司江州刺史加散騎常侍持節如故使質率所領自白下歩上直至廣莫門門者不守薛安都程天祚等亦自南掖門入與質同㑹太極殿生禽元凶仍使質留守朝堂甲仗百人自防封始興郡公食邑三千户之鎮舫千餘乘部伍前後百餘里六平乘並施龍子幡時世祖自攬威柄而質以少主遇之是事專行多所求欲及至尋陽刑政慶賞不復諮禀朝廷盆口鈎圻米輒散用之臺符屢加檢詰質漸猜懼自謂人才足為一世英傑始聞國禍便有異圗以義宣凡闇易可制勒欲外相推奉以成其志及至江陵便致拜稱名質於義宣雖為兄弟而年大近十嵗義宣驚曰君何意拜弟質曰事中宜然時義宣已推崇世祖故其計不行質每慮事泄及至新亭又拜江夏王義恭義恭愕然問質所以質曰天下屯危禮異常日前在荆州亦拜司空㑹義宣有憾於世祖事在義宣傳質因此宻信説誘陳朝廷得失又謂震主之威不可持乆主相勢均事不两立今專據閫外地勝兵彊持疑不决則後機致禍質女為義宣子採妻謂質無復異同納其説且義宣腹心將佐蔡超民之徒咸有富貴之情願義宣得欲倚質威名以成其業又勸奬義宣義宣時未受丞相質子敦為黄門侍郎奉詔敦勸道經尋陽質令敦具更譬説并言世祖短長義宣乃意定馳報豫州刺史魯爽期孝建元年秋同舉爽失㫖即便起兵遣人至京邑報弟瑜瑜席卷奔叛瑜弟𢎞為質府佐世祖遣報質質於是執臺使狼狽舉兵上表曰臣聞執藥随親非情謬於甘苦揮斤斬毒豈㤀痛於肌膚盖以先疑後順忠焉必徃忍小存大雖愛必從丞相臣義宣育悊台鉉拊聲聫服定主勤王之業勲越乎齊晉宗戚懿親之寄望崇於魯衞而惡直醜正實䌓有黨或染凶作偽疾害元功或藉勞挾寵乘威縱戾自知愆深釁重必貽剿戮乃成紫毁朱交間忠輔崇樹私徒招聚羣惡念舊愛老無一而存豈不由凶醜相扇志肆讒惑陛下垂慈狎達不稍惟疑遂令負扆席圗蔽於流議投杼市虎成於十夫鑒古揆今實懷危逼故投袂樊葉立節於本朝揮戈晉陽務清于君側臣誠庸懦奉教前朝雖恧緇衣好賢之美敢希巷伯惡惡之情固己藉風聽而宵憤撫短策而馳念況乃宏命爰格誠係宗社今奉㫖前邁星言啓行臣本凡瑣少無逺槩因縁際㑹遂班槐鼎素望既盈愜心實足豈應徼功非冀更希異寵直以蔓草難除去惡宜速是以無顧夷險慮不及身仰恃天眷察亮丹欵苟血誠不照甘心罪戮伏願陛下先鑒元輔匪躬茂節末錄庸瑣奉國㣲誠不遂淟涊之情以失四海之望昭戮馬劒顯肆市朝則結旌向國全鋒凱歸九流凝序三光平耀斯則仰説宗廟俯愜兆民裁表感慨涕言無己加魯𢎞輔國將軍下戌大雷馳報義宣義宣遣諮議參軍劉諶之萬人就𢎞世祖遣撫軍將軍柳元景統豫州刺史王𤣥謨等水軍屯梁山洲内兩岸築偃月壘水陸待之殿中將軍沈靈賜領百舸破其前軍於南陵生禽軍主徐慶安軍副王僧質至梁山亦夾陣两岸元景檄書宣告曰夫革道應運基命之洪符嗣業興邦紹歴之明算自非瑞積神𠂻德充民極孰能升臨寳位景屬天居大宋啓期理髙中世皇根帝業永流無疆夷陂遞來遘兹凶難國禍寃深人綱鬱滅主上聖略聰武孝感通神義變草木哀動精緯躬幸南郢親掃大逆道援横流德模靈造三光重照七廟載興臧質少負疵釁衣冠不齒昧利誣天著於觸事受任述職不以宣効為心專方莅民惟以侵剝為務官自賄至族以貨傾是以康周陁覆命屠宗寃達蒼昊郭伯西門遺出自皂𨽻寵越州朝往莅東守鬻爵三千率卒西討竊俘取黜荷恩彭泗貪虐以逞坑戮邊氓忽若草芥傾竭倉庾割没軍糧作牧漢南公盜府蓄矯易文簿專行欺妄及受命北伐憚役緩期師出有辰顧懷私愛匹馬棄衆宵行獨返遂復擕嬪擁姬淫宴軍幕孔范之變顯於逆辭凡此諸釁皆彰著於憲簡振曝於觀聼去嵗義舉雖豫誠欵而淹留西楚私相崇戴奉書致命形於心迹新亭之㨗大難已夷凶命假存懸在晷刻廣莫之軍曽無遺矢重關自開偽衆已潰質猶復盤桓衢巷後騎陳師勞不足甄定於朝議而虚張功伐扇動怨辭自謂斯舉勲莫已若初踐殿守忘犬馬之情奔趣帑藏頓傾天府山海𢎞量苞荒藏疾錄其一介之心掩其不逞之釁遂爵首元等職班盛級優榮溢寵莫與為疇自恣醜薄㒺知涯涘干謁陳聞曾無紀極請樂窮太子之英求器盡官府之選徐司空匪躬王室遭罹凶禍質與之少長親交兼常曾無撫孤之仁惟聞陵侮之酷尺田寸寳靡有孑遺及受命南徂臨路滋甚逼奪妻嬪略市金帛怨動京邑醜聞都鄙棄逐舊故委蔑忠勤魯尚期尹周之徒心腹所倚泣訴於御筵袁同連子敬之疇爪牙所杖一逝而不反雖上㫖頻煩屢求勞牒質但稱伐在己不逮僚𨽻託咎朝廷歸罪有司國士解心有識莫附何文敬趨走厮養天性愚狡質迷其姦諂寘懷委杖遂外擅威刑内逰房室質生與釁俱不可詳䆒擢髪數罪曽何足言丞相威重位尊任居分陜宗國倚頼實兼恒情而不及謙沖之塗弗見逆順之訓蔽同郤至理乖范爕遂乃逺忽世祀近受欺構杖納姦疏還謀社稷日者宴安上流坐觀成敗示遣疲卒衆裁三千戎馬不供軍糧靡獻皇朝直以親秩之重酬寵兼極近漸别子禮越常均茍識無所守功弗由己必為義不全終於敗德今兹放命恨心於本推諸昔嵗迹是誠非矣且家國夷險情事異常豫是臣子孰不星赴而玩㓂㤀哀曽無奔拽面蕃十稔惠政蔑聞重贜深掠縱慾己甚姬妾百房尼僧千計敗道傷俗悖亂人神民怨盈塗國謗彌嵗又賊劭未禽凶威猶彊將毁其私墳戮其諸子圖成駭機垂頼義舉㨗期云速不日告平釋怨毒之心解倒懸之急論恩叙德造育為重援人自助棄人快讒怗亂疑功未聞其比僕以不肖過䝉榮私荷佩升越光絶倫伍家本北邉志存慷慨常甘投生以徇艱棘惟恩思難激氣衝襟故以眺三湘而永慨望九江而遐憤若使身死國康誓在殞命況仰禀聖略俯鞠義徒萬全之形愚夫所照夫薛竟陵控率突騎陸道歩馳檀右衞申右率垣游擊整勒鋭師飛輪構路王豫州方舟繕甲乆已前驅僕訓卒利兵凌波電進沈鎮軍蕭安南接舳連旌首尾風合驃騎竟陵王懿親令譽問望攸歸大司馬江夏王道略明逺徽猷茂世並旄鉞臨塗雲驅齊引羣兵競邁秘駕徐啓八鑾揺饗五牛舒斾千乘雷動萬軸雲回騰威發號星流漢轉以上臨下易於轉圜加以三謀協從七緯告慶幽顯同心昭然易覩諸君或世荷恩幸或身聞教義當知君臣大節誓不可犯冠屨至誨難用倒設履安奉順聲泰事全孰與附逆居危身害名醜慈親垂白受戮弱子嬰孩就誅所以有詔遲回未震雷霆者正為諸君身拘㓂手或懷乃心吉凶由人無謂為逺今而不變後悔何及授檄之日心馳賊庭義宣亦相次係至江夏王與義宣書曰昔桓𤣥借兵於仲堪有似今日義宣由此與質相疑質進計曰今以萬人取南州則梁山中絶萬人綴𤣥謨必不敢動質浮舟外江直向石頭此上略也義宣將從之腹心劉諶之曰質求前馳此志難測不如盡鋭攻梁山事剋然後長驅萬安之計也質遣將尹周之攻胡子反柳叔政於西壘時子反渡東岸就𤣥謨計事聞賊至馳歸周之攻壘甚急劉季之水軍殊死戰賊勢盛求救於𤣥謨𤣥謨不遣崔勲之固爭乃遣勲之救之比至城已陷勲之戰死季之収衆而退子反叔政奔還東岸𤣥謨斬子反軍副李文仲質欲仍攻東城義宣黨顔樂之説義宣曰質若復㧞東城則大功盡歸之矣直遣麾下自行義宣遣劉諶之就質陳軍城南𤣥謨留羸弱守城悉精兵出戰薛安都騎軍前出垣䕶之督諸將繼之戰良乆賊陣小拔騎得入劉季之宗越又䧟其西北衆軍乘之乃大潰因風放火船艦悉見焚燒延及西岸質求義宣欲一計事密已出奔矣質不知所為亦走衆悉降散質至尋陽焚燒府舍載妓妾西奔使所寵何文敬領兵居前至西陽西陽太守魯方平質之黨也至是懷貳誑文敬曰傳詔宣敇唯捕元惡一人餘並無所問文敬棄衆而走質先以妹夫羊冲為武昌郡質往投之既至冲己為郡丞胡庇之所殺無所歸乃入南湖逃竄無食摘蓮噉之追兵至窘急以荷覆頭自沈於水出鼻軍主鄭俱兒望見射之中心兵刃亂至腸胃纒縈水草隊主裘應斬質首傳京都時年五十五錄尚書江夏王臣義恭左僕射臣宏等奏曰臧質底棄下才而藉遇深重窮愚悖常構煽凶逆變至滔天志圗泯夏違恩叛德辠過恒科梟首之憲有國通典懲戾思永去惡宜深臣等參議須辜日限意使依漢王莽事例漆其頭首藏于武庫庶為鑑戒昭示將來詔可質初下義宣以質子敦為征虜將軍雝州刺史質留子敞為監軍將敦自隨至是並為武昌郡所執送敦官至黄門郎敦弟敷司徒屬敷弟敞太子洗馬敞弟斁敦子仲璋質之二子二孫未有名同誅質之起兵也豫章太守任薈之臨川内史劉懷之鄱陽太守杜仲儒並為盡力發遣郡丁并送糧運伏誅任薈之字處茂樂安人也歴世祖南平王鑠撫軍右軍司馬長史行事太祖稱之曰望雖不足才能有餘杜仲儒杜驥兄子也豫章望蔡子相孫沖之起義招質質遣將郭㑹膚史山夫討之為沖之所破世祖發詔以為尚書都官曹郎中沖之太原中都人晉秘書監盛曽孫也官至右軍將軍巴東太守後事在劉琬傳沈靈賜以破質前軍於南陵功封南平縣男食邑三百户贈崔勲之通直郎大司馬參軍劉天賜亦梁山戰亡追贈給事中魯爽小名女生扶風郿人也祖宗之字彦仁晉孝武大元末自鄉里出襄陽歴官至南郡太守義熙元年起義襲偽雝州刺史祖蔚進向江陵以功為輔國將軍雍州刺史封宵城縣侯食邑千五百户桓謙荀林逼江陵宗之率衆馳赴事在臨川烈武王道規傳進號平北將軍髙祖討劉毅與宗之同㑹江陵進號鎮北將軍封南陽郡公食邑二千五百户子軌一名象齒爽之父也便弓馬筋力絶人為竟陵太守宗之自以非髙祖舊隸屢建大功有自疑之心㑹司馬休之見討猜懼遂與休之北奔善於撫御士民皆為盡力衞送出境盡室入羌頃之病卒髙祖定長安軌為寧南將軍荆州刺史襄陽公鎮長社世祖鎮襄陽軌遣親人程整奉書䂓欲歸順自拔致誠以昔殺劉康祖徐湛之父故不歸太祖累遣招納許以為司州刺史爽少有武藝虜主拓拔燾知之常置左右元嘉二十六年軌死爽為寧南將軍荆州刺史襄陽公鎮長社㓜染殊俗無復華風麤中使酒數有過失燾將誅之爽有七弟秀小字天念頗有意略才力過爽燾以充宿衞甚知待之偽髙梁王阿叔泥為芮芮所圍甚急使秀往救燾自率大衆繼其後燾未及至秀已擊破之拔阿叔泥而反燾壯其功以為中書郎封廣陵侯或告燾鄴民欲據城反復遣檢察并燒石虎殘宫殿秀常乘驛徃反是時病還遲為燾所詰讓秀復恐懼燾尋南㓂因從渡河先是程天祚為虜所没燾引置左右與秀闕寛勸令歸降秀納之天祚廣平人為殿中將軍有武力元嘉二十七年助戍彭城㑹世祖遣府劉泰之輕軍襲虜於汝陽天祚督戰戰敗被罰為虜所獲天祚妙善針術燾深加愛賞或與共輿常不離於側封為南安公燾北還蕃天祚因其沈醉偽若受使督切後軍者所至輕罰天祚為燾所愛羣虜並畏之莫敢問因得逃歸後為山陽太守太宗初興四方同反事在薛安都傳燾始南行遣爽隨永昌王庫仁真向夀陽與弟瑜共破劉祖於尉武仍至𤓰歩始得與秀定歸南之謀燾還至湖陸爽等請曰奴與南有讎每兵來常慮禍及墳墓乞共迎喪還葬國都虜羣下於其主稱奴猶中國稱臣也燾許之長社戍虜有六七百人爽譎之曰南更有軍可遣三百騎往界上參聼騎去爽率腹心夜擊餘虜盡殺之馳入虎牢爽唯第三弟在北餘家屬悉自隨率部曲及願從合千餘家奔汝南遣秀從許昌還夀陽奉辭於南平王鑠曰爽秀得罪本朝負釁三世生長絶域逺身胡虜兄弟闔門淪㸃偽授殞命不可還國無因近係南雲傾屬東日葢猶痿人思歩盲者願明嵩霍咫尺江河匪逺夷庚􅀢塞隔同天地痛心疾首晝慨宵悲虜主猖狂豺豕其志虐徧華戎怨結幽顯自盱眙旋軍亡殪過半昏酣沉湎恣性肆身爽秀等因民之憤藉將旅之願齊契義奮梟馘醜徒馮恃皇威肅清逋穢牢洛諸城指期克定䂓以涓塵微雪夙負方當束骸北闕待戮司㓂懦節未申伏心邉表明大王殿下以叡茂居蕃文武兼姿逺邇欽傾承風聞德願垂援拯以慰䖍望老弱百口先遣歸庇逼逼丹心仰希懷逺謹遣同義潁川聶元初奉詞陳聞鑠馳驛以聞上大説下詔曰偽寧南將軍魯爽中書郎魯秀志榦列到忠誠乆著撫兹福先闔門效欵招集義鋭梟剪􅀢醜肅定邊城獻馘象魏雖宣孟之去翟歸晉穨當之出胡入漢方之此日曽何足云朕實嘉之宜即授任逞其忠略爽可督司州陳留東郡濟陰濮陽五郡諸軍事征虜將軍司州刺史秀可輔國將軍營陽頴川二郡太守其諸子弟及同契士庶委征虜府以時申言詳加酬叙爽至汝南加督豫州之義陽宋安二郡軍事領義陽内史將軍刺史如故秀參右將軍南平王鑠軍事汝陰内史將軍如故餘弟姪並授官爵賞賜資給甚厚爽北鎮義陽北來部曲凡六千八百八十三人是嵗二十八年也虜毁其墳墓明年四月入朝時燾已死上更謀經略五月遣爽秀程天祚等率歩騎并荆州軍甲士四萬出許洛八月虜長社戍主永平公禿髮幡乃同棄城走進向大索戌戌主偽豫州刺史䟦僕蘭曰爽勇而無防我今出城必輕來據之設伏檀山必可禽也爽果夜進秀諫不止馳往繼之比曉虜騎夾𤼵頼秀縱兵力戰虜乃退還虎牢爽因進攻之本期舟師入河斷其水門王𤣥謨攻碻磝不拔敗退水軍不至爽亦収衆南還轉鬭數百里至曲彊虜候其饑疲盡鋭來攻爽身自奮撃虜乃退走三十年元凶弑逆南譙王義宣起兵入討爽即受命率部曲至襄陽與雍州刺史臧質俱詣江陵義宣進爽號平北將軍領巴陵太守度支校尉本官如故留爽停江陵事平以爽為使持節督豫司雍秦并五州諸軍事左將軍豫州刺史爽至夀陽便曲意賔客爵命士人蓄仗聚馬如㓂將至元凶之為逆也秀在京師謂秀曰我為卿誅徐湛之矣方相委任以為右軍將軍配精兵五千使攻新亭壘將戰秀命打退軍皷因此歸順世祖即位以為左軍將軍出督司州豫州之新蔡汝南汝陽潁川義陽弋陽六郡諸軍事輔國將軍司州刺史領汝南太守爽與義宣及質相結已乆義宣亦欲資其勇力情契甚至孝建元年二月義宣報爽秋當同舉爽狂酒乖謬即日便起兵馳信報弟瑜將家奔叛皆得西歸爽使其衆載黄標稱建平元年竊造法服登壇自號疑長史韋處穆中兵參軍楊元駒治中庾騰之不與己同殺之義宣質聞爽已處分便狼狽反進爽號征北將軍爽於是送所造輿服詣江陵版義宣及臧質等並起征北府户曹版文曰丞相劉今補天子名義宣車騎臧今補丞相名質平西朱今補車騎名修之皆版到奉行義宣駭愕爽所送法物並留竟陵縣不聼進爽直出歴陽自采石濟軍與質水陸俱下爽遣弟瑜守蒙籠歴陽太守張㓜緒請撃瑜世祖配以兵力遣右將軍薛安都歩騎為前驅别遣水軍入淵分路並㑹安都進次大峴爽已立營世祖以賊彊壘固未可輕拔使量宜進止幼緒便引軍退還下獄更遣驍騎將軍垣䕶之代幼緒據歴陽鎮軍將軍沈慶之使安都進軍與爽相遇於小峴爽親自前將戰而飲酒過醉安都刺爽倒馬左右范雙斬首傳送京都瑜亦為部下所斬送進平夀陽子弟並伏誅義宣初舉兵召秀加節進號征虜將軍當繼謀之俱下雝州刺史朱脩之起兵奉順更遣秀擊脩之王𤣥謨聞之喜曰魯秀不來臧質易與耳秀至襄陽大敗而反㑹益州刺史劉秀之遣軍襲江陵秀擊破之義宣還江陵秀與北走衆叛且盡秀之向城上射之中箭赴水死軍人宗敬叔康僧念斬首傳京邑贈韋處穆揚元駒給事中庾騰之員外散騎侍郎爽初南歸秀以爽武人不閑吏職白太祖請處穆為長史以輔爽太祖以補司馬後轉長史云沈攸之字仲達吳興武康人司空慶之從父兄子也父叔仁為衡陽王義季征西長史兼行參軍領隊又隨義季鎮彭城度征北府攸之少孤貧元嘉二十七年索虜南㓂發三呉民丁攸之亦被發既至京都詣領軍將劉遵考求補白丁隊主遵考謂之曰君形陋不堪隊主因隨慶之征討二十九年征西陽蠻始補隊主巴口建義南中郎府板長史兼行參軍新亭之戰身被重創事寧為太尉行參軍封平洛縣五等侯隨府轉大司馬行參軍晉世京邑二岸揚州舊置都部從事分掌二縣非違永初以後罷省孝建三年復置其職攸之掌北岸㑹稽孔璨掌南岸後又罷攸之遷員外散騎侍郎又隨慶之征廣陵屢有功被箭破骨世祖以其善戰配以仇池歩矟事平當加厚賞為慶之所抑遷太子旅賁中郎攸之甚恨之七年遭母憂葬畢起為龍驤將軍武康令前廢帝景和元年除豫章王子尚車騎中兵參軍直閤與宗越譚金等並為廢帝所寵誅戮羣公攸之等皆為之用命封東興縣侯食邑五百户尋遷右軍將軍增邑百户太宗即位以例削封宗越譚金等謀反攸之復召入直閤除東海太守未拜㑹四方反叛南賊已次近道以攸之為寜朔將軍尋陽太守率軍據虎檻時王𤣥謨為大統未發前鋒有五軍在虎檻五軍後又絡驛繼至每夜各立姓號不相禀受攸之謂軍吏曰今衆軍姓號不同若有耕夫漁父夜相呵叱便致駭亂取敗之道也乃就一軍請號衆咸從之殷孝祖為前鋒都督而大失人情攸之内撫將士外諧羣帥衆並倚頼之時南賊前鋒孫沖之薛常寳等屯據赭圻殷孝祖率衆軍攻之為流矢所中死軍主范潛率五百人投賊人情震駭並謂攸之宜代孝祖為統時建安王休仁屯虎檻總統衆軍聞孝祖死遣寧朔將軍江方興龍驤將軍劉靈遺各率三千人赴赭圻攸之以為孝祖既死賊有乘勝之心明日若不更攻則示之以弱方興名位相亞必不為己下軍政不一致敗之由乃率諸軍主詣方興謂之曰四方並反國家所保無復百里之地唯有殷孝祖為朝廷所委頼鋒鏑裁交輿尸而反文武䘮氣朝野危心事之濟否唯在明旦一戰戰若不㨗則大事去矣詰朝之事諸人咸謂吾應統之自卜懦薄幹略不辦及卿今輒相推為統但當相與勠力爾方興甚恱攸之既出諸軍主並尤之攸之曰卿忘廉藺㓂賈之事邪吾本以濟國活家豈計彼此之升降且我能下彼彼必不能下共濟艱難豈可自厝同異明旦進戰自寅訖午大破賊於赭圻城外追奔至姥山分遣水軍乘勢進討又破其水軍㧞胡白二城尋假攸之節進號輔國將軍代孝祖督前鋒諸軍事薛常寳在赭圻食盡南賊大帥劉胡屯濃湖以囊盛米繋流查及船腹陽覆船順風流下以餉赭圻攸之疑其有異遣人取船及流查大得嚢米攸之從子懐寳為賊將帥在赭圻遣親人楊公讃齎密書招誘攸之攸之斬公讃封懐寳書呈太宗尋剋赭圻遷使持節督雍梁南北秦四州郢州之竟陵諸軍事冠軍將軍領寧蠻校尉雍州刺史袁顗復率大衆來入鵲尾相持既乆軍主張興世越鵲尾上據錢溪劉胡自攻之攸之率諸將攻濃湖顗遣人傳唱錢溪已平衆懼攸之曰不然若錢溪實敗萬人中應有逃亡得還者必是彼戰失利唱空聲以惑衆耳勒軍中不得妄動錢溪信尋至果大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還攸之諸軍悉力進攻多所斬獲日暮引歸鵲尾食盡遣千人在南陵迎米為臺軍所破燒其資實胡於是棄衆而奔顗亦叛走赭圻濃湖之平也賊軍委棄貲財珍貨殷積諸軍各競収斂以彊弱為少多唯攸之張興世約勒所部不犯秋毫諸將以此多之攸之進平尋陽徙監郢州諸軍事前將軍郢州刺史持節如故不拜遷中領軍封貞陽縣公食邑二千户時四方皆已平定徐州刺史薛安都據彭城請降上雖相酬許而辭㫖簡略攸之前將軍置佐吏假節與鎮軍將軍張永以重兵徴安都安都懼要引索虜索虜引大衆援之攸之等米船在吕梁又遣軍主王穆之上民口穆之為虜攻覆米船又破運車於武原攸之等引退為虜所乘又值寒雪士衆堕指十二三留長水校尉王𤣥載守下邳積射將軍沈韶守宿預睢陵淮陽亦置戌攸之還淮隂免官以公領職復求進討上不聼入朝靣陳又不許復歸淮隂三年六月自率運送米下邳並鑿四周深塹遣龍驤將軍垣䕶之領民口還淮隂時軍主陳顯達當領千兵守下邳攸之留待顯達至虜遣清泗間人詐告攸之云安都欲降求軍迎接攸之副吳喜納其説咸謂宜遣千人參之既而來者轉多喜所執彌固攸之乃集來者告之語曰薛徐州早宜還朝今能爾深副本望但遣子弟一人來便當遣大軍相接君諸人既有志心若能與薛子弟俱來者皆即假君以本鄉縣唯意所欲如其不爾無為空勞往還自此一去不反其年秋太宗復令攸之進圍彭城攸之以清泗既乾糧運不繼固執以為非宜往反者七上大怒詔攸之曰卿春中求伐彭城吾恐軍士疲勞且去冬奔散人心未宜復用不許卿所啓今便不肯為吾行邪卿若不行便可使吳喜獨去攸之懼乃奉㫖進軍行至遲墟上悔追軍令反攸之還至下邳而陳顯達於睢口為虜所破龍驤將軍姜産之司徒參軍髙遵世戰没虜追攸之甚急因交戰被矟創㑹暮引軍入顯達壘夕衆散八月十八日也攸之棄衆南奔初呉興丘㓜弼丘隆先沈誕沈榮守呉陸道量並以文記之才隨攸之及張永北討永一奔攸之再敗㓜弼等並皆䧟没攸之之還淮隂以為持節假冠軍將軍行南兗州刺史追贈姜産之左軍將軍髙遵世屯騎校尉四年徴攸之為呉興太守辭不拜乃除左衛將軍領太子中庶子五年出為持節監郢州諸軍郢州刺史為政刻暴或鞭士大夫上佐以下有忤意輒靣加詈辱將吏一人亡叛同籍符伍充代者十餘人而曉達吏事自彊不息士民畏憚人莫敢欺聞有虎輒自圍捕往無不得一日或得兩三若逼暮不獲禽則宿昔圍守須曉自出賦斂嚴苦徴發無度繕治船舸營造器甲自至夏口便有異圗六年進監豫州之西陽司州之義陽二郡軍事進號鎮軍將軍泰豫元年太宗崩攸之與蔡興宗在外蕃同豫顧命進號安西將軍加散騎常侍給鼓吹一部未拜㑹巴西民李承明反執太守張澹蜀土騷擾時荆州刺史建平王景素被徴新除荆州刺史蔡興宗未之鎮乃遣攸之權行荆州事攸之既至㑹承明已平乃以攸之都督荆湘雝益梁寧南北秦八州諸軍事鎮西將軍荆州刺史持節常侍如故至荆州政治如在夏口營造舟甲常如敵至時幼主在位羣公當朝攸之漸懐不臣之迹朝廷制度無所遵奉江州刺史桂陽王休範密有異志以㣲㫖動攸之使道士陳公昭作天公書一函題云沈丞相送付攸之門者攸之不開書推得公昭送之朝廷後廢帝元徽二年休範舉兵襲京邑攸之謂僚佐曰桂陽今反朝廷必聲云與攸之同若不顚沛勤王必増朝野之惑於是遣軍主孫同沈懐奥興軍馳下受郢州刺史晉熙王爕節度同等始過夏口㑹休範平還進攸之號征西大將軍開府儀同三司固讓開府攸之自擅閫外朝廷疑憚之累欲徴入慮不受命乃止羣公稱皇太后令遣中使問攸之曰乆勞于外宜還京輦然任寄之重換代殊為未易還止之宜一以相委欲以觀察其意攸之答曰荷國重恩名器至此自惟凡陋本無廊廟之姿至如戍防一蕃撲討蠻蜒可彊充斯任雖自上如此豈敢厝心去留歸還之事㐲聼朝㫖朝廷逾慴憚徴議遂息四年建平王景素據京城反攸之復應朝廷景素尋平初元嘉中巴東建平二郡軍府富實與江夏竟陵武陵並為名郡世祖於江夏置郢州郡罷軍府竟陵武陵亦並殘壊巴東建平為峽中蠻所破至是民人流散存者無㡬其年春攸之遣軍入峽討蠻帥田五郡等及景素反攸之急追峽中軍巴東太守劉攘兵建平太守劉道欣並疑攸之自有異志阻兵斷峽不聼軍下時攘兵元子天賜為荆州西曹攸之遣天賜譬説之令其解甲一無所問攘兵見天賜知景素實反乃釋甲謝愆攸之待之如故後以攘兵為府司馬劉道欣堅守建平攘兵譬説不回乃與伐蠻軍攻之破建平斬道欣臺直閤髙道慶家在江陵攸之初至州道慶時在家牒其親戚十餘人求州從事西曹攸之為用三人道慶大怒自入州取教毁之而去及還都不詣攸之别道慶至都云攸之聚衆繕甲姦逆不乆楊運長等常相疑畏乃與道慶密遣刺客齎廢帝手詔以金餅賜攸之州府佐吏進其階級時有象三頭至江陵城北數里攸之自出格殺之忽有流矢集攸之馬障泥其後刺客事發廢帝既殞順帝即位進攸之號車騎大將軍開府儀同三司加班劒二十人遣攸之長子司徒左長史元琰齎廢帝刳斮之具以示攸之元琰既至江陵攸之便有異志腹心議有不同故其事不果其年十一月乃發兵反叛攸之素蓄士馬資用豐積至是戰士十萬鐡馬二千遣使要雝州刺史張敬兒梁州刺史范伯年司州刺史姚道和湘州行事庾佩玉巴陵内史王文和等敬兒文和斬其使馳表以聞伯年道和佩玉懐兩端密相應和十二月十二日攸之遣其輔國將軍中兵參軍督前鋒軍事孫同率寧朔將軍中兵參軍武寳龍驤將軍騎兵參軍朱君拔寧朔將軍沈慧真龍驤將軍中兵參軍王道起又遣司馬冠軍將軍劉攘兵率寧朔將軍外兵參軍公孫方平龍驤將軍騎兵參軍朱靈寳龍驤將軍驤兵參軍沈僧敬龍驤將軍髙茂又遣輔國將軍中兵參軍王靈秀輔國將軍中兵參軍丁珍東率寧朔將軍中兵參軍王珍之寧朔將軍外兵參軍楊景穆相繼俱下攸之自率輔國將軍錄事參軍兼司馬武茂宗輔國將軍中兵參軍沈韶寧朔將軍中兵參軍皇甫賢寧朔將軍中兵參軍胡欽之龍驤將軍中兵參軍東門道順閏十月四日至夏口攸之將發江陵使沙門釋僧桀筮之曰不至京邑當自郢州囘還意甚不悦初江津有雲氣狀如塵霧從西北來正蓋軍上至沌口云當問訊安西蹔泊黄金浦既登岸郢城出軍撃之攸之聞齊王世子據盆口震懾不敢下因攻郢城時齊王輔政遣衆軍西討尚書符征西府曰尊冠賤屨君臣之位奉順忌逆成敗斯兆未有憑凌我郊圻侵軼我河縣而不焚師殪甲靡旗亂轍者也沈攸之少長庸賤擢自閻伍邀百戰之運乘一㨗之功鐫山裂地腰金拖紫窮貴於國極富於家擁旄蕃伯便無北靣之禮受督志屏即有專征之釁橘柚不薦璆㻸罕入箕賦深斂毒被南郢枉繩矯墨害著西荆饕餮其心谿壑其性從始至終㳂壯得老今遂驅廹妖黨繕集尫卒結釁外城送死中甸是而可忍孰不可懐今遣新除使持節督郢州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黄回員外散騎常侍冠軍驍騎將軍南臨淮太守重安縣開國子軍主王敬則輔國將軍屯騎校尉長夀縣開國男王宜與輔國將軍南髙平太守軍主陳承叔輔國將軍左軍將軍南濮陽太守葛陽縣開國男軍主彭文之龍驤將軍驃騎行參軍軍主召宰精甲二萬前鋒雲騰又遣散騎常侍領游撃將軍湘南縣開國男新除使持節督湘州諸軍事征虜將軍湘州刺史軍主吕安國屯騎校尉寧朔將軍崔慧景輔國將軍軍主任侯伯輔國將軍驍騎將軍軍主蕭順之輔國將軍㳺擊將軍軍主垣崇祖寧朔將軍虎賁中郎將軍主尹略屯騎校尉南城令曹虎頭舳驢二萬駱驛繼邁又遣輔國將軍後軍將軍右軍中兵參軍事軍主苟元賔寧朔將軍撫軍中兵參軍事軍主郭文孝龍驤將軍撫軍中兵參軍事軍主程隠雋輕艓一萬截其津要新除持節督廣交越寧湘州之廣興諸軍事領平越中郎將征虜將軍廣州刺史統馬軍主沌陽縣開國子周盤龍輔國將軍後軍統馬軍主張文憘龍驤將軍軍主薛道淵冠軍將軍㳺擊將軍并州刺史南清河太守太原公軍主王敕勤龍驤將軍射聲校尉王洪軌龍驤將軍宂從僕射軍主成置等鐵馬五千龍驤後敶凡此諸帥莫不勇力動天勁志駕日接衝拔距鷹瞵鶚視顧盼則前後風生喑嗚則左右電起以此攻城何城不克以此赴敵何敶能堅然後鑾戎薄臨龍虎百萬六軍齊軌五輅舒斾丹檻發照素甲生波樓煩白羽投鞌成岳漁陽墨騎浴鐵為羣芝艾同焚悔將何及符到之日幸加三省其鋒敶營壁之主驅逼㓂手之人若有投命軍門一無所問或能因罪立績終不爾欺斬裾射玦唯功是與能斬送攸之首封三千户縣公賜布絹各五千匹信如河海皎然無貳飛火軍攝文書千里驛行齊王出頓新亭馳檄數攸之罪惡曰夫彎弓射天未見能至揮戈擊地多力安施何則逆順之勢定殊禍福之驗易原也是以違乎天者鬼神不能使其成㑹乎人者聖哲不能令其毁故劉濞頼七國連兵之勢隗嚻恃跨河據隴之資毋丘儉伐其踰海越島之功諸葛誕矜其待士愛民之德彼四子者皆當世雄傑以犯順取禍覆窟傾巢為竪子笑況乎行陳凡才斗筲小器而懐問鼎之志敢搆無君之逆哉逆賊沈攸之自出萊畝寂寥累世故司空沈公從父宗䕃愛之若子卵翼吹嘘得升官秩廢帝昏悖猜畏柱臣攸之貪競乘機凶忍趨利躬行反噬請銜誅㫖又攸之與譚金童太壹等並受寵任朝為牙爪同功共體世號三侯當時親昵情過管鮑遭仰革運凶黨懼戮攸之狡猾用數圗全賣禍既殺從父又害良朋雖呂布販君酈寄賣友方之斯人未足為酷此其不信不義言詐翻覆諸夏之所未有夷狄之所不為也泰始開闢網漏吞舟略其凶險取其摶噬故得階亂獲全因禍保福攸之空淺躁而無謀濃湖崩挫本非己力及北伐彭泗望賊宵奔重討下邳一鼓而遁再鄙王師又應肆法先帝英聖量深河海宥其回谿之敗冀収曲崤之㨗故得推遷幸㑹頓升崇顯内端戎禁外臨方牧聖靈鼎湖逺頒顧命託寄崇深義感金石而攸之知奉國諱喜見于容普天同哀己以為慶此其樂禍幸災大逆之辠一也又攸之累登蕃兵自郢遷荆晉熙殿下以皇弟代鎮地尊望重攸之肆情陵侮斷割候迎料擇士馬簡算器甲精器鋭士並取自隨郢城所留十不遺一專擅略虜㒺顧國典此其包藏禍志不恭不䖍大逆之罪二也又攸之踐荆以來恒用姦數既欲發兵宜有因假遂乃蹙廹羣蠻騷擾山谷揚聲討伐盡户發上蟻聚郭邑伺國盛衰從來積年永不解甲遂使四野百縣路無男人耕田載租皆驅女弱自古酷虐未聞有此其侮蔑朝廷大逆之罪三也去昔桂陽竒兵闕起京師内奰宗廟阽危攸之任居上流兵彊地廣救援顚沛實宜悉力國家倒懸方思身慮威遣弱卒三千並皆羸老使就郢州禀受節度欲令判否之日委辠晉熙何其平日輈張實輕周邵爾時恭謹虚重皇戚此其伏慝藏詐持疑兩端大逆之辠四也又攸之累據方州跋扈滋甚招誘輕狡往者咸納羈絆行侣過境必留仕子窮困不得歸其鄉商人畢命無由還其土叛亡入境輙加􅗙䕶逋逃出界必遣窮追此其大逆之辠五也又攸之自任專恣恃行慘酷視吏若讐遇民如草峻太半之賦暴參夷之刑鞭捶國士全用虜法一人逃亡闔宗補代毒徧嬰孩虐加斑白獄囚恒滿市血常流男不得耕女不得織奔馳道路號哭動天皇朝赦令初不遵奉欲殺欲擊故曠蕩之澤長隔彼州此其無君陵上大逆之辠六也蒼梧狂凶釁深桀紂猜貳外蕃鴞目西顧留其長息元琰以為交質父子分張彌積年稔頼社稷靈長獨夫遄戮攸之豫禀心靈宜同歡幸遂迷惑顚倒深相嗟惜舉言哀桀揚聲吠堯此其不辨是非㒺識善惡違情背理大逆之辠七也廢昏立明先代盛典交廣先到梁秦蚤及而攸之密邇内畿州塗弗逺驛書至止晏若不聞未遣章表奄積旬朔防風後至夏典所誅此其大逆之辠八也昇明肇歴恩深澤逺申其父子之情矜其骨肉之恩馳遣元琰銜使西歸並加崇授寵貴重疊元琰達西便應反命攸之得此集聚蒙誰之恩不荷盛德反生讐釁此其大逆之辠九也攸之以谿壑之性含梟鴆之腸直置天壤己稱醜穢況乃舉兵内侮逞肆姦回斯實惡熟辠成之辰決癰潰疽之日幕府過荷朝寄義百常憤董司元戎龔行天罰今皇上聖明將相仁厚約法三章輕刑緩賦年登嵗阜家給人足上有惠和之澤下無樂亂之心攸之不識天時妄圗姦逆舉無名之師驅怨讐之黨是以朝野審其易取含識判其成禽熊羆厲爪蓄攫裂之心虎豹摩牙起吞噬之憤鼓怒則氷原激電奮發則霜野奔靁以此定亂豈移晷刻雖復衆徒梗陸舉郡阻川何足以抗沸海之濤當燒山之熖彼土士民罹毒日乆逃竄無路常所憫然今復相逼起接鋒刃交戰之日蘭艾難分土崩倒戈宜為蚤計無使一人迷昧而九族就禍也𢎞宥之典有如皎日攸之盡鋭攻郢州行事柳世隆随宜距應屢摧破之攸之與武陵王賛牋曰江陵一總八州地居形勝鎮撫之重宜以上歸本欲仰移節蓋改臨荆部所以未具上聞者欲待至止面自咨申不圖重關擊􅢎覲接莫由若使匡朝之誠終蔽於聖察襲逺之舉近􅗙於郢都則無以謝烈士之心何用塞義夫之志便不犯關陵漢期一接奉若夫斬蛟䧟石之卒裂骼卷鐵之將烟騰飈迅容或驚動左右茍不獲已敢不先布下情又曰下官位重分陜富兼金穴子弟勝衣爵命已及親黨辨菽抽序便加耳倦絃歌口厭粱肉布衣若此復欲何求豈不知俛眉苟安保養餘齒何為不計百口甘冒危難誠感歴朝之遇欲報之於皇室爾昧理之徒謂下官懷無厭之願既貫誠於白日不復明心於殿下若使天必喪道忠節不立政復闔門碎滅百死無恨但髙祖王業艱難太祖劬勞日昃卜世不盡七百之期宗社已成他人之有家國之事未審於聖心何如攸之遣中兵參軍公孫方平馬歩三千向武昌太守臧渙棄郡投西陽太守王毓奔于盆口方平因據西陽建寧太守張謨率二守千人攻之方平破走攸之攻郢城乆不決衆心離沮昇明二年正月十九日夜劉攘兵燒營入降郢城衆於是離散不可復制將曉攸之斬劉天賜率大衆過江至魯山諸軍因此散走還向江陵未百餘里聞城已為雍州刺史張敬兒所據無所歸乃與第三子中書侍郎文和至華容界為封人所斬送攸之初下留元琰守江陵張敬兒尅城元琰逃走第五子㓜和㓜和弟靈和元琰子法先懿子文和子法徴㓜和子法茂並為敬兒所禽伏誅初文和尚齊王女義興憲公主公主早薨有二女至是齊王迎還第内今皇帝即位聽攸之及諸子喪還葬墓攸之第二子懿太子洗馬先攸之卒攸之弟登之新安太守去職在家為呉興太守沈文秀所収斬登之弟雍之鄱陽太守先攸之卒詔以雍之孫僧照為義興公主後雍之與攸之異生諸弟中最和謹尤見親愛攸之性儉吝子弟不得妄用財物唯恣雍之所湏輒取齋中服飾分與親舊以此為常雍之弟榮之尚書庫部郎亦先攸之卒攸之晚好讀書手不釋卷史漢事多所諳憶常歎曰早知窮達有命恨不十年讀書及攻郢城夜遇風浪米船沉没倉曹參軍崔靈鳯女㓜適柳世隆子攸之正色謂曰當今軍糧要急而卿不以在意將由與城内婚姻邪靈鳯答曰樂廣有言下官豈以五男易一女攸之歡然意解初攸之招集才力之士随郡人雙泰真有幹力召不肯來後泰真至江陵賣買有以告攸之者攸之因留之補隊副厚加料理泰真無停志少日叛走攸之遣二十人被甲追之逐討甚急泰真殺數人餘者不敢近欲過家將母去事廹不獲單身走入蠻追者既失之錄其母而去泰真既失母乃出自歸攸之不罪曰此孝子也賜錢一萬轉補隊主其矯情任笇皆如此初攸之賤時與呉郡孫超之全景文共乘小船出京都三人共上引埭有一人止而相之曰君三人皆當至方伯攸之曰豈有三人俱有此相相者曰骨法如此若有不驗便是相書悞耳其後攸之為郢荆二州超之廣州景文豫州刺史攸之初至郢州有順流之志府主簿宗儼之勸攻郢城功曹臧寅以為攻守勢異非旬日所拔若不時舉挫鋭損威今順流長驅計日可㨗既傾根本則郢城豈能自固攸之不從既敗諸將帥皆奔散惟寅曰我委質事人豈可苟免我之不負公猶公之不負朝廷也乃投水死寅字士若東莞莒人也先是攸之在郢州州從事輒與府錄事鞭攸之免從事官而更鞭錄事五十謂人曰州官鞭府職誠非體要由小人凌侮士大夫倉曹參軍事邊榮為府錄事所辱攸之自為榮鞭殺錄事攸之自江陵下以榮為留府司馬守城張敬兒將至人或説之使詣敬兒降榮曰受沈公厚恩共如此大事一朝緩急便改易本心不能行也城敗見敬兒敬兒問曰邊公何不早來榮曰沈公見留守城而委城求活所不忍也本不蘄生何湏見問敬兒曰死何難得命斬之歡笑而去容無異色太山程邕之者素依随榮至是抱持榮曰與邊公周逰不忍見邊公前死乞見殺兵不得行戮以告敬兒敬兒曰求死甚易何為不許先殺邕之然後及榮三軍莫不垂泣曰柰何一日殺二義士比之臧洪及陳容榮金城人也廢帝之殞也攸之欲起兵問其知星人葛珂之珂之曰自古起兵皆候太白太白見則成伏則敗昔桂陽以太白伏時舉兵一戰授首此近世明驗今蕭公廢昏立明政值太白時此與天合也且太白尋出東方東方利用兵西方不利故攸之止不反及後舉兵珂之又曰今嵗星守南斗其國不可伐攸之不從凡同逆丁珍東孫同裴茂仲武宗儼之並伏誅攸之表檄文疏皆儼之詞也臧渙詣盆城自歸今皇帝命斬之餘同惡或為亂軍所殺或遇赦得原史臣曰臧質雖貪虐夙樹問望多闕奉義治流本無吞噬之志也徒欲以㓜君弱政期之於世祖據有中流嗣桓庾之業既主異穆哀臣皆代黨雖禮秩外厚而疑防内深功髙位重終非自安之地至於陵天犯順其出於此乎攸之伺隙西郢年逾十載擅命專威無君已積及天厭宋道鼎運將離不識代德之紀獨迷樂推之數公休既覆其族攸之亦屠厥身夫以釁亂自終固異代如一也宋書卷七十四宋書卷七十四考證臧質傳秃頂拳髪秃南史作頽六書故頽首秃也冗從僕射胡崇之領質府司馬崇之副太子積弩將軍毛熙祚亦受統于質崇之監本作澄之臣龍官按上言胡崇之領質府司馬此言崇之副毛熙祚於文極順不應别作澄之但下文即言使崇之澄之二軍營於山上而本傳之前並未叙出澄之事當有闕文且義宣腹心將佐蔡超民之徒蔡當作竺或超下另有竺超二字兩岸築偃月壘監本岸作圻偃作堰今從南史改正魯爽傳遣爽随永昌王庫仁真向夀陽與弟瑜共破劉祖於尉武臣承蒼按庫仁真當是彼時番語勇健之稱南史侯景傳言勇兼人名為庫真部督當是此義也劉祖諸本並同㨿劉康祖傳劉下應是脱一康字中書郎魯秀志榦列到忠誠久著列到二字不可解林邑國傳亦有檀和之忠果到列之語當繼謀之俱下謀南本作諶謂徐湛之也當從之㑹益州刺史劉秀之遣軍襲江陵秀撃破之監本闕江陵二字今從南本補入宋書卷七十四考證
