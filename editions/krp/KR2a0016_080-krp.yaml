body:
  text: 宋書卷八十梁沈約撰列傳第四十孝武十四王孝武帝二十八男文穆皇后生廢帝子業豫章王子尚陳淑媛生晉安王子勛阮容華生安陸王子綏徐昭容生皇子子深何淑儀生松滋侯子房史昭華生臨海王子頊殷貴妃生始平孝敬王子鸞次永嘉王子仁與皇子子深同生何婕妤生皇子子鳯謝昭容生始安王子真江婕妤生皇子子𤣥史昭儀生邵陵王子元次齊敬王子羽與始平孝敬王子鸞同生江羙人生皇子子衡楊婕妤生淮南王子孟次皇子子況與皇子子𤣥同生次南平王子産與永嘉王子仁同生次晉陵孝王子雲次皇子子文並與始平孝敬王子鸞同生次廬陵王子輿與淮南王子孟同生次南海哀王子師與始平孝敬王子鸞同生淮陽思王子霄與皇子子𤣥同生次皇子子雍與始安王子真同生次皇子子趨與皇子子鳯同生次皇子子期與皇子子衡同生次東平王子嗣與始安王子真同生杜容華生皇子子悦安陸王子綏南平王子産廬陵王子輿並出繼皇子子深子鳯子𤣥子衡子況子文子雍未封早天子趨子期子悦未封為明帝所殺豫章王子尚字孝師孝武帝第二子也孝建三年年六嵗封西陽王食邑二千户仍都督南徐兖二州諸軍事北中郎將南兗州刺史其年遷揚州刺史大明二年加撫軍將軍三年分浙江西立王畿以浙江東為揚州命王子尚都督揚州江州之鄱陽晉安建安三郡諸軍事揚州刺史將軍如故給鼓吹一部五年改封豫章王户邑如先領㑹稽太守七年加使持節進號車騎將軍其年又加散騎常侍以本號開府儀同三司時東土大旱鄞縣多疁田世祖使子尚上表至鄞縣勸農又立左學召生徒置儒林祭酒一人學生師敬位比州治中文學祭酒一人比西曹勸學從事二人比祭酒從事前廢帝即位罷王畿復舊徴子尚都督揚南徐二州諸軍事領尚書令觧督東揚州餘如故初孝建中世祖以子尚太子母弟上甚留心後新安王子鸞以母幸見愛子尚之寵稍衰既長人才凡劣凶慝有廢帝風太宗殞廢帝稱太皇后令曰子尚頑凶極悖行乖天理楚玉婬亂縱慝義絶人經並可於第賜盡子尚時年十六楚玉山隂公主也廢帝改封為㑹稽郡長公主食湯沐邑二千户給鼓吹一部加班劒二十人未及拜受而廢帝敗楚玉肆情淫縱以尚書吏部郎禇淵貎羙請自侍十日廢帝許之淵雖承旨而行以死自固楚玉不能制也晉安王子勛字孝徳孝武帝第三子也大明四年年五嵗封晉安王食邑二千户仍都督南兗州徐州之東海諸軍事征虜將軍南兗州刺史七年改督江州南豫州之晉熈新蔡郢州之西陽三郡諸軍事前將軍江州刺史八年遷使持節都督雍梁南北秦四州郢州之竟陵隨二郡諸軍事鎮軍將軍寜蠻校尉雍州刺史未拜而世祖崩以鎮軍將軍還為江州本官如故眼患風為世祖所不愛景和元年加使持節時廢帝狂凶多所誅害前撫軍諮議參軍何邁少好武頗招集才力之士邁先尚太祖女新蔡公主帝詐云主薨殺宫人代之顯加殯葬而納主於後宫深忌邁邁慮禍及謀因帝出行為變迎立子勛事泄帝自率宿衛兵誅邁使八座奏子勛與邁通謀又手詔子勛曰何邁殺我立汝汝自計孰若孝武邪可自為其所遣左右朱景雲送藥賜子勛死景雲至盆口停不進遣信使報長史鄧琬琬等因奉子勛起兵以廢立為名太宗定亂進子勛號車騎將軍開府儀同三司琬等不受命傳檄京邑泰始二年正月七日奉子勛為帝即偽位於尋陽城年號義嘉元年備置百官四方並響應威震天下是嵗四方貢計並詣尋陽遣左衛將軍孫沖之等下據赭圻又遣豫州刺史劉胡率大衆来屯䧿尾又遣安北將軍袁顗總統衆軍䑓軍屯據錢谿斷顗等糧援胡遣將攻之大敗於是焚營遁走顗聞胡去亦棄衆南奔沈攸之諸軍至尋陽誅子勛及其母同逆皆夷滅子勛死時年十一即葬尋陽廬山松滋侯子房字孝良孝武帝第六子也大明四年年五嵗封尋陽王食邑二千户仍為冠軍將軍淮南宣城二郡太守五年遷豫州刺史將軍淮南太守如故六年改領宣城太守七年進號右將軍觧宣城餘如故前廢帝永光元年遷東揚州刺史將軍如故景和元年罷東陽州子房以本號督㑹稽東陽新安臨海永嘉五郡諸軍事㑹稽太守太宗即位改督為都督進號安東將軍太守如故又徴為撫軍領太常長史孔顗不受命舉兵反應晉安王子勛即偽位進子房號車騎將軍開府儀同三司三吳晉陵竝受命於顗太宗遣衛將軍巴陵王休若督諸將吳喜等東討戰無不捷以次平定上虞令王晏起兵殺顗囚子房送還京都上宥之貶為松滋縣侯食邑千户司徒建安王休仁以子房兄弟終為禍難勸上除之乃下詔曰不虞之釁著自終古情為法屈聖逹是遵朕埽穢定傾再全寳業逺惟鴻基猥當負荷思宏治道務盡敦睦而妖豎遘扇妄造異圖自西南阻兵東夏侵斥都邸羣凶密相唇齒路休之兄弟專作謀主規興禍亂令舍人嚴龍覘覦宫省以羽林出討宿衛單罄候隙伺間將謀竊發劉祗在蕃規相應援通言北宼引令過淮頃休範濟江潛欲拒捍賴卜祚靈長姦回弗逞隂慝已露宜盡憲辟寔以方難未夷曲加遵養今王化帖泰宜辨忠邪涓流不壅燎火難滅便可委之有司肅正刑典松滋侯子房等淪陷逆徒協同醜悖遂與籖帥羣小潛通南釁連結祗等還圖朕躬雖咎戾已彰在法無宥猶子之情良所未忍可廢為庶人徙付逺郡於是竝殺之子房時年十一路休之等以崇憲太后既崩自慮將来不立不自安劉祗在南兗州有志為逆嚴龍太祖元嘉中已為中書舍人南䑓御史世祖又以為舍人甚見委信景和泰始之際至越騎校尉右軍將軍至是懐異端故及於誅臨海王子頊字孝列孝武帝第七子也大明四年年五嵗封歴陽王食邑二千户仍為冠軍將軍吳興太守五年改封臨海王户邑如先其年遷使持節都督廣交二州湘州之始興始安臨賀三郡諸軍事征虜將軍平越中郎將廣州刺史未之鎮徙荆州刺史將軍如故八年進號前將軍前廢帝即位以本號都督荆湘雍益梁寜南北秦八州諸軍事刺史如故明帝即位觧督雍州以為鎮軍將軍丹陽尹尋留本任進督雍州又進號平西將軍長史孔道存不受命舉兵反以應晉安王子勛子勛即偽位進號衛將軍開府儀同三司䧿尾奔敗吳喜張興世等軍至子頊賜死時年十一葬巴陵始平孝敬王子鸞字孝羽孝武帝第八子也大明四年年五嵗封襄陽王食邑二千户仍為東中郎將吳郡太守其年改封新安王户邑如先五年遷北中郎將南徐州刺史領南琅邪太守母殷淑儀寵傾後宫子鸞愛冠諸子凡為上所盻遇者莫不入子鸞之府國及為南徐州又割吳都以屬之六年丁母憂追進淑儀為貴妃班亞皇后謚曰宣葬給輼輬車虎賁班劒鑾輅九旒黄屋左纛前後部羽葆鼔吹上自臨南掖門臨過喪車悲不自勝左右莫不感動上痛愛不已擬漢武李夫人賦其詞曰朕以亡事棄日閲覽前王詞苑見李夫人賦悽其有懐亦以嗟詠乆之因感而㑹焉廵靈周之殘冊畧鴻漢之遺篆弔新宫之奄映喭璧䑓之蕪踐賦流波以謡思詔河濟以崇典雖媛徳之有載竟滯悲其何遣訪物運之榮落訊雲霞之舒卷念桂枝之秋霣惜瑶華之春翦桂枝折兮沿嵗傾瑶華碎兮思聨情彤殿閉兮素塵積翠戺蕪兮紫苔生寳羅兮春幌垂珍簟空兮夏幬扄秋䑓惻兮碧煙凝冬宫冽兮朱火清流律有終深心無歇徙倚雲日裵回風月思玉歩於鳯墀想金聲於鸞闕竭方池而飛傷損圜淵而流咽端蚤朝之晨罷泛輦路之晩清轥南陸蹕閶闔轢北津警承明面縞館之酸素造松帳之葱青俛衆𦙍而慟興撫藐女而悲生雖哀終其已切將何慰於爾靈存飛榮於景路沒申藻於服車垂葆旒於昭術竦鸞劒於清都朝有儷於徴準禮無替於粹圖閟瑶光之密陛宫虚梁之餘隂俟玉羊之晨照正金雞之夕臨升雲鼛以引思鏘鴻鍾以節音文七星於霜野旗二燿於寒林中雲枝之天秀寓坎泉之曽岑屈封嬴之自古申反周乎在今遣雙靈兮逹孝思附孤魂兮展慈心伊鞠報之必至諒顯晦之同深予棄西楚之齊化畧東門之遥䘳淪漣兩拍之傷奄抑七萃之箴又諷有司曰典禮云天子有后有夫人檀弓云舜葬蒼梧云二妃不從㛰義云后立六宫有三夫人然則三妃則三夫人也后之有三妃猶天子之有三公也按周禮三公八命諸侯七命三公既尊於列國諸侯三妃亦貴於庶邦夫人據春秋傳仲子非魯惠公之元嫡尚得考彼别宫今貴妃盖天秩之崇班理應剏立新廟尚書左丞徐爰之又議宣貴妃既加殊命禮絶五宫考之古典顯有成據廟堂克構宜選將作大匠卿葬畢詔子鸞攝職以本官兼司徒進號撫軍司徒給鼓吹一部禮儀並依正公又加都督南徐州諸軍事八年加中書令領司徒前廢帝即位觧中書令領司徒加持節之鎮帝素疾子鸞有寵既誅羣公乃遣使賜死時年十嵗子鸞臨死謂左右曰願身不復生王家同生弟妹並死仍葬京口太宗即位詔曰夫紓寃申痛雖往必追緣情惻愛感事彌逺故使持節都督南徐州諸軍事撫軍將軍南徐州刺史新安王子鸞夙表成器蚤延殊寵方樹羙業克光蕃維而凶心肆忌奄羅横禍興言永傷有兼常懐宜旍夭秀以雪沈魂可贈使持節侍中都督南徐兗二州諸軍事司徒南徐州刺史王如故第十二皇女第二皇子子師俱嬰謬酷有増酸悼皇女可贈縣公主子師復先封為南海王並加徽諡又曰哀枉追逺仁道所𢎞興滅繼絶盛典斯貴朕務古思治恩禮必敷異族猶敦況在近戚故新除使持節侍中都督南徐兗二州諸軍事司徒南徐州刺史新安王子鸞年雖沖弱性識早茂鍾慈世祖冠寵列蕃値景和凶虐横羅酷禍國𦙍無主寃祀莫寄尋念痛悼夙軫于懐可以建平王景素息延年為嗣追改子鸞封為始平王食邑千户改葬秣陵縣龍山延年字徳沖泰始四年薨時年四嵗諡曰沖王明年復以長沙王纂子延之為始平王紹子鸞後順帝昇明三年薨國除永嘉王子仁字孝和孝武帝第九子也大明五年年五嵗監雍梁南北秦四州郢州之竟陵隨二郡諸軍事北中郎將寜蠻校尉雍州刺史封永嘉王食邑二千户仍遷東中郎將吴郡太守六年又遷丹陽尹七年兼衛尉前廢帝即位加征虜將軍領衛尉丹陽尹如故尋出為左將軍南兗州刺史景和元年遷南徐州刺史將軍如故泰始元年又遷中軍將軍領太常未拜徙䕶軍將軍四方平定以為使持節都督湘廣交三州諸軍事平南將軍湘州刺史太宗遣主書趙扶公宣旨於子仁曰汝一家門户不建幾覆社稷天未亡宋景命集我上流迷愚相扇四海同惡若非我修徳御天下三祖基業一朝墜地汝輩便應淪於異族之手我昔兄弟近二十人零落相繼存者無幾唯司徒年長令徳作輔皇家門户所慿唯我與司徒二人而已尚未能厭百姓姦心餘諸王亦未堪贊治我惟有太子一人司徒世子年又幼弱桂陽巴陵並未有繼體正頼汝輩兄弟相倚為彊庶使天下不敢闚覘王室汝輩始十餘嵗裁知俛仰當今諸舍細弱殆不免人輕陵若非我為主劉氏不辦今日沒諸兄弟沖眇為羣凶所逼誤遂與百姓還圖骨肉於汝在心不得無媿即日四海就寜恩化方始方今處汝湘州汝年漸長足知善惡當每思刻厲奉朝廷為心爵秩自然與年俱進我垂猶子之情著於萬物汝亦當知好憶我敕旨時司徒建安王休仁南討猶未還既還白上以將来非社稷計宜並為之所未拜賜死時年十嵗始安王子真字孝貞孝武帝第十一子大明五年年五嵗封始安王食邑二千户仍為輔國將軍吳興太守七年遷使持節監廣交二州始興始安臨賀三郡諸軍事平越中郎將廣州刺史將軍如故不之鎮遷征虜將軍南彭城太守領石頭戍事景和元年為丹陽尹將軍如故尋復為南兗州刺史將軍如故泰始二年遷左將軍丹陽尹未拜賜死時年十嵗邵陵王子元字孝善孝武帝第十三子也大明六年年五嵗封邵陵王食邑二千户八年以為度支校尉秦南沛二郡太守仍為冠軍將軍南琅邪泰山二郡太守景和元年出為湘州刺史將軍如故未之鎮至尋陽値晉安王子勛為逆留不之鎮進號撫軍將軍事平賜死時年九嵗齊敬王子羽字孝英孝武帝第十四子也大明二年生三年卒追加封謚淮南王子孟字孝光孝武帝第十六子也大明七年年五嵗封淮南王食邑二千户時世祖改豫州之南梁郡為淮南國罷南豫州之淮南郡并宣城前廢帝即位二郡並復舊子孟仍國名度食淮南郡景和元年為冠軍將軍南琅邪彭城二郡太守泰始二年改封安成王户邑如先未拜賜死時年八嵗晉陵孝王子雲字孝舉孝武帝第十九子也大明六年年四嵗封晉陵王食邑二千户未拜其年薨南海哀王子師字孝友孝武帝第二十二子也大明七年年四嵗封南海王食邑二千户未拜景和元年為前廢帝所害時年六嵗太宗即位追諡淮陽思王子霄字孝雲孝武帝第二十三子也大明五年生八年薨追加封諡東平王子嗣字孝叔孝武帝第二十七子也大明七年生仍封東平王食邑二千户繼東平沖王休倩休倩母顔性理嚴酷泰始二年子嗣所生母景寜園昭容謝上表曰故東平沖王休倩託荄璿極岐嶷夙表降年弗永遺𦙍莫傳孝武皇帝敕妾子臣子嗣出繼為後既承國祀方奉烝薦庶覃遐慶式延于逺而妾顔訓養非恩撫導乖理情闕引進義違負螟昔世祖平日詭申慈愛崩背未幾真性便發猶逼畏崇憲少欲藏掩自兹以後專縱嚴酷寔顯布宗戚宣灼宫闈用傷人倫爰惻行路妾天屬㝠至感切實深伏願乾渥廣臨曲垂照賜復改命還依本屬則妾母子雖隕之辰猶生之年許之其年賜死時年四嵗武陵王贊字仲敷明帝第九子也泰始六年生其年詔曰世祖孝武皇帝雖恃尊墮惠勲狹政弛樂飲無饜事因於寜泰任威縱費義緣於務寡故以積怨動天流殃𦙍嗣景和肇釁義嘉成禍世祖繼體陷憲無遺昔皇家中圯含生懼滅賴英孝感奮掃雪寃耻勲纘墜歴拯兹窮氓繼絶追逺禮訓攸尚況既帝且兄而缺斯典今以第九子智隨奉世祖為子武陵郡大明之世事均代邦可封智隨武陵王食邑五千户尋世祖一門女累不少既無釐總義須防閑諸侯雖不得祖稱天子而事有一家之切且歸寜有所疹疾相營得失是任閨房有禀朕應天在位恩深九族庶此足申追睦之懐敷愛之旨後廢帝元徽四年出為使持節督南徐兗青冀五州諸軍事北中郎將南徐州刺史順帝昇明元年遷持節督郢州司州之義陽諸軍事前將軍郢州刺史二年為沈攸之所圍徙都督荆湘雍益梁寜南北秦八州諸軍事安西將軍荆州刺史持節如故攸之平乃之鎮其年薨時年九嵗國除史臣曰晉安諸王提挈羣下以成其釁亂遂至九域沸騰難結天下而世祖之𦙍亦殲焉彊不如弱義在於此也宋書卷八十宋書卷八十考證豫章王子尚傳孝建三年年六嵗封西陽王三年南史作二年始平孝敬王子鸞傳檀弓云舜葬蒼梧云二妃不從南本梧下無云字又二作三史臣論彊不如弱如監本誤知今從南史宋書卷八十考證
