body:
  text: 宋書卷八十六梁沈約撰列傳第四十六殷孝祖劉勔殷孝祖陳郡長平人也曽祖羡晉光禄勲父祖並不逹孝祖少誕節好酒色有氣幹太祖元嘉末為奉朝請員外散騎侍郎世祖以其有武用除奮武將軍濟北太守入為積射將軍大明初索虜宼青州上遣孝祖北援受刺史顏師伯節度累與虜戰頻大破之事在師伯傳還授太子旅賁中郎將加龍驤將軍竟陵王誕據廣陵為逆孝祖𨽻沈慶之攻誕又有戰功遷西陽王子尚撫軍寕朔將軍南濟隂太守出為旴𣅿太守將軍如故還為虎賁中郎將仍除寧朔將軍陽平東平二郡太守又遷濟南南郡將軍如故前廢帝景和元年以本號督兖州諸軍事兖州刺史太宗初即位四方反叛孝祖外甥司徒參軍頴川葛僧韶建議銜命徴孝祖入朝上遣之時徐州刺史薛安都遣薛索兒等屯據津逕僧韶間行得至説孝祖曰景和凶狂開闢未有朝野危極假命漏刻主上聖徳天挺神武在躬曽不浹辰夷凶翦暴更造天地未足為言國亂朝危宜立長主公卿百辟人無異議泰平之隆非旦則夕而羣小相煽構造無端貪利幼弱競懐希望使天道助逆羣凶事申則主幼時艱權柄不一兵難互起豈有自容之地舅少有立功之志長以氣節成名若便能控濟義勇還奉朝廷非唯匡主静亂乃可以垂名竹帛孝祖具問朝廷消息僧韶隨方訓譬并陳兵甲精彊主上欲委以前驅之任孝祖即日棄妻子率文武二千人隨僧韶還都時普天同逆朝廷唯保丹陽一郡而永世縣尋又反叛義興賊垂至延陵内外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士人情於是大安進孝祖號冠軍假節督前鋒諸軍士遣向虎檻拒對南賊御仗先有諸葛亮筩袖鎧㡌二十五石弩射之不能入上悉以賜孝祖孝祖負其誠節凌轢諸將臺軍有父子兄弟在南者孝祖並欲推治由是人情乖離莫樂為用進使持節都督兖州青冀幽四州諸軍事撫軍將軍刺史如故時賊據赭圻孝祖將進攻之與大統王元謨别悲不自勝衆並駭怪泰始二年三月三日與賊合戰常以鼓蓋自隨軍中人相謂曰殷統軍可謂死矣今與賊交鋒而以羽儀自標顯若善射者十士攢射欲不斃得乎是日於陣為矢所中死時年五十二追贈散騎常侍征北將軍持節都督如故封秭歸縣侯食邑千户四年追改封建安縣諡曰忠侯孝祖子悉為薛安都所殺以從兄子慧達繼封齊受禪國除劉勔字伯猷彭城人也祖懐義始興太守父頴之汝南新蔡二郡太守征林邑遇疾卒勔少有志節兼好文義家貧為廣州増城令廣州刺史劉道錫引為揚烈府主簿元嘉二十七年索虜南侵道錫遣勔奉使詣亰都太祖引見之酬對稱㫖除寜逺將軍綏逺太守元嘉末蕭簡據廣州為亂勔起義討之燒其南門廣州刺史宗慤又命為府軍主簿以功封大亭侯除員外散騎侍郎孝建初荆江反叛宗慤以勔行寧朔將軍湘東内史領軍出安陸㑹事平以本號為晉康太守又徙鬰林太守大明初還都徐州刺史劉道隆請為寧朔司馬竟陵王誕據廣陵為逆勔隨道隆受沈慶之節度事平封金城縣五等侯除西陽王子尚撫軍入直閤先是遣費沈伐陳檀不克乃除勔龍驤將軍西江督䕶鬰林太守勔既至率軍進討隨宜翦定大致名馬并獻珊瑚連理樹上甚悦還除新安王子鸞撫軍中兵參軍遭母憂不拜前廢帝即位起為振威將軍屯騎校尉入直閤太宗即位加寕朔將軍校尉如故江州刺史晉安王子勛為逆四方響應勔以本官領建平王景素輔國司馬進據梁山會豫州刺史殷琰反叛徴勔還都假輔國將軍率衆討琰甲仗三十人入六門復兼山陽王休祐驃騎司馬餘如故破琰將劉順於宛唐杜叔寳於横塘事在琰傳除輔國將軍山陽王休祐驃騎諮議參軍梁郡太守假節不拜琰嬰城固守自始春至于末冬薛道摽龎孟虯並向夀陽勔内攻外禦戰無不㨗善撫將帥以寛厚為衆所依將軍王廣之求勔所自乘馬諸將帥並忿廣之叨冒勸勔以法裁之勔歡笑即時解馬與廣之復除使持節督廣交二州諸軍事平越中郎廣州刺史將軍如故不拜及琰開門請降勔約令三軍不得妄動城内士民秋毫無所失百姓感悦咸曰來蘇百姓生為立碑改督益寕二州諸軍事益州刺史持節將軍如故又不拜還京都拜太子左衛率封鄱陽縣侯食邑千户琰初求救索虜虜大衆屯據汝南泰始三年以勔為征虜將軍督西討前鋒諸軍事假節置佐本官如故先是常珍竒據汝南與琰為逆琰降因據戍䧏虜事在琰傳至是引虜西河公長社公攻圍輔國將軍汝隂太守張景逺景逺與軍主楊文萇拒擊大破之景逺尋病卒太宗嘉其功追贈冠軍將軍豫州刺史追封含洭縣男食邑三百戸以文萇代為汝隂太守除勔右衛將軍仍以為使持節都督豫司二州諸軍事征虜將軍豫州刺史餘如故四年除侍中領射聲校尉又不受進號右將軍其年虜遣汝陽司馬趙懐仁歩騎五百宼武津縣勔遣龍驤將軍曲元徳䡖兵進討虜衆驚散虜子都公閼于拔又率三百人防運車闕千兩於汝陽臺東水上結營元徳單騎直入斬拔首因進攻汝陽臺即陷外壘獲車一千三百乘斬首一百五十級勔又使司徒參軍孫臺瓘督弋陽以西㑹虜宼義陽臺瓘大破之虜上其北豫州租有車二千兩勔招荒人邀擊於許昌虜衆奔散焚燒米榖淮西人賈元友上書太宗勸北攻懸瓠可收陳郡南頓汝南新蔡四郡之地上以其所陳示勔使具條答勔對曰元友稱虜主幼弱姦偽競起内外規亂天亡有期臣以為獯醜侵縱乘藉王境盤據州郡百姓殘亡去冬衆軍失耕今春連城圍逼國家復境之畧實有不遑滅虜未及元友又云有七千餘家榖米豐積可供二萬人數年資儲臣又以為二萬人嵗食米四十八萬斛五年合湏米二百四十萬斛既理不容有恐事難稱言元友又云虜於懸瓠開驛保虜已先據若不足恃此不湏闕俱是攻城便應先圖懸瓠何更越先取郾以受腹背之災且七千餘家豐積而虜猶當逺運為糧是威不制民民非異計元友又云虜欲水陸運糧以救軍命可襲之機在於今日臣又以為開立驛道據守堅城觀其形候不似蹙弱可乘之機恐為難驗元友又云四郡民人遭虜二十七年之毒皆欲雪讐報恥伏待朝威臣又以為垣式寳等受國重恩今猶驅畧車營翻還就賊蓋是戀本之情深非報怨之宜何可輕試元友又云請勅荆雍兩州遣三千精兵從義陽依西山北下直據郾城臣又以為郾城是賊驛路要戍且經蠻接嶮數百里中裹糧潛進方出平地攻賊堅城自古名將未有能以此濟者假其尅㨗不知足南抗懸瓠北捍長社與不且賊擁據數城水陸通便而今使官以二千斷其資運於事為難元友又云虜圍逼汝隂遊魂二嵗為張景逺所挫不敢渡淮臣又以為景逺兵力寡弱不能自固逺遣救援方得少尅今定是為賊所畏不景逺前所摧傷裁至數百虜歩騎四萬猶不敢前而今必勸國家以輕兵逺討指掌可克言理相背莫復過此元友又云龍山雉水魯奴王景直等並受朝爵馬歩萬餘進討之宜唯湏勅命臣以為魯奴與虜交關彌歴年世去嵗送誠朝廷誓欲立功自蒙榮爵便即逃遁殊類姦猾豈易闇期兼王景直是一亡命部曲不過數十人既不可言又未足恃萬餘之言似不近實元友又云四郡恨忿此非類車營連結廢田二載生業已盡賊無所資糧儲已罄斷其運道最是要畧臣又以斷運湏兵兵應資食而當此過縣瓠二百里中使兵食兼足何處求辦臣竊尋元嘉以來傖荒逺人多干國議負儋歸闕皆勸討虜魯爽誕説實挫國威徒失兵力虚費金寳凡此之徒每規近説從來信納皆詒後悔界上之人唯視彊弱王師至境必壺漿候塗裁見退軍便抄截蜂起首領回師何嘗不為河畔所弊太宗納之元友議遂寑勔與常珍竒書勸令反虜珍竒乃與子超越羽林監式寳於譙殺虜子都公費拔等凡三千餘人勔馳驛以聞太宗大喜以珍竒為使持節都督司北豫二州諸軍事平北將軍司州刺史汝南新蔡縣侯食邑千户超越輔國將軍北豫州刺史潁川汝陽闕三郡太守安陽縣男式寳輔國將軍陳南頓二郡太守真陽縣男食邑三百戸珍竒為虜所攻引軍南出虜追擊破之珍竒走依山得至壽陽超越式寳為人所殺五年汝隂太守楊文萇又頻破虜於荆亭及戍西詔進勔號平西将軍豫州刺史餘如故不拜其年徴拜散騎常侍中領軍勔以世路糾紛有懐止足求東陽郡上以勔啟徧示朝臣自尚書僕射袁粲以下莫不稱贊咸謂宜許上曰巴陵建平二王並有獨往之志若世道寧晏皆當申其所請勔經始鍾嶺之南以為棲息聚石蓄水彷彿丘中朝士愛素者多往游之六年改常侍為侍中其年南兖州刺史齊王出鎮淮隂以勔為使持節都督南徐兖青冀闕五州諸軍事平北將軍侍中中領軍如故出鎮廣陵固辭侍中軍號許之以為假平北將軍七年解都督假號并節太宗臨崩顧命以守尚書右僕射中領軍如故給鼓吹一部廢帝即位加兵五百人元徽初月犯右執法太白犯上將或勸勔解職勔曰吾執心行已無愧幽明若才輕任重灾𤯝必及天道密微避豈得免桂陽王休範為亂奄至京邑加勔使持節領軍置佐史鎮扞石頭既而賊衆屯朱雀斻南右軍王道隆率宿衛向朱雀聞賊已至急信召勔勔至命閉斻道隆不聽催勔渡斻進戰率所領於桁南戰敗臨陳死之時年五十七事平詔曰夫義實天經忠惟人則篆素流采金石宣煇自非識洞情靈理感生極豈有捐驅衛主舍命匡朝者哉故持節鎮軍將軍守尚書右僕射中領軍鄱陽縣開國侯勔思懐亮粹體業淹明𢎞勲樹績譽洽華野綢繆顧託契闊屯夷方倚謀猷翌康帝道逆蕃扇禍逼擾京甸援桴誓旅奉律行師身與事滅名隨操逺朕用傷悼震慟于厥心昔王允秉誠卞壺峻節均風往徳歸茂昭先軌泉途就永寃逝無追思崇徽䇿式光惇史可贈散騎常侍司空本官侯如故諡曰忠昭公子悛嗣順帝昇明末為廣州刺史齊受禪國除勔弟斆大始中為寕朔將軍交州刺史於道遇病卒先有都鄉侯爵諡曰質侯史臣曰吴漢平蜀城内流血霑踝而其後無聞於漢陸抗定西陵歩氏禍及嬰孩而機雲為戮上國劉勔克夀春士民無遺芻委粒之歎莫不扶老擕幼歌唱而出重圍美矣宋書卷八十六宋書卷八十六考證殷孝祖傳軍中人相謂曰殷統軍可謂死矣南史死字下有將字劉勔傳宗慤又命為府軍主簿府軍南本作軍府元友又云請敕荆雍兩州遣三千精兵三千南本作二千下文劉勔條荅之語亦云二千宋書卷八十六考證
