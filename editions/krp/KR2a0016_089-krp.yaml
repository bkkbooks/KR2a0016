body:
  text: 宋書卷八十九梁沈約撰列傅第四十九袁粲袁粲字景倩陳郡陽夏人太尉淑兄子也父濯揚州秀才蚤卒祖母哀其幼孤名之曰愍孫伯叔並當世榮顯而愍孫饑寒不足母琅邪王氏太尉長史誕之女也躬事績紡以供朝夕愍孫少好學有清才有欲與從兄顗婚者伯父洵即顗父曰顗不堪政可與愍孫婚耳時愍孫在坐流涕起出蚤以操立志行見知初為揚州從事世祖安北鎮軍北中郎行參軍侍中郎主簿世祖伐逆轉記室參軍及即位除尚書吏部郎太子右衛率侍中孝建元年世祖率羣臣並於中興寺八關齋中食竟愍孫别與黄門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白世祖世祖使御史中丞王謙之糾奏並免官二年起為廷尉太子中庶子領右軍將軍出為輔國將軍西陽王子尚北中郎長史廣陵太守行兗州事仍為永嘉王子仁冠軍長史將軍太守如故大明元年復為侍中領射聲校尉封興平縣子食邑五百戸事在顏師伯傳三年坐納山隂民丁彖文貨舉為㑹稽郡孝亷免官尋為西陽王子尚撫軍長史又為中庶子領左軍將軍四年出補豫章太守加秩中二千石五年復還為侍中領長水校尉遷左衛將軍加給事中七年轉吏部尚書左衛如故其年皇太子冠上臨宴東宫愍孫勸顏師伯酒師伯不飲愍孫因相裁辱師伯見寵於上上常嫌愍孫以寒素凌之因此發怒出為海陵太守前廢帝即位除御史中丞不拜復為吏部尚書永光元年徙右衛將軍加給事中景和元年復入為侍中領驍騎將軍太宗泰始元年轉司徒左長史冠軍將軍南東海太守愍孫清整有風操自遇甚厚常著妙徳先生傳以續嵇康髙士傳以自況曰有妙徳先生陳國人也氣志淵虗姿神清映性孝履順棲沖業簡有舜之遺風先生幼夙多疾性踈嬾無所營尚然九流百氏之言雕龍談天之藝皆泛識其大歸而不以成名家貧嘗仕非其好也混其聲迹晦其心用故深交或迕俗察罔識所處席門常掩三逕裁通雖揚子寂漠嚴叟沈㝠不是過也脩道遂志終無得而稱焉又嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂唯國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水愍孫幼慕荀奉倩之為人白世祖求改名為粲不許至是言於太宗乃改為粲字景倩焉二年遷領軍將軍仗士二十人入六門其年徙中書令領太子詹事増封三百户固辭不受三年轉尚書僕射尋領吏部五年加中書令又領丹陽尹六年上於華林園茅堂講周易粲為執經又知東宫事徙為右僕射七年領太子詹事僕射如故未拜遷尚書令丹陽尹如故坐前選武衛將軍江桞為江州刺史柳有罪降為守尚書令太宗臨崩粲與褚淵劉勔並受顧命加班劒二十人給鼓吹一部後廢帝即位加兵五百人帝未親朝政下詔曰比元序愆度留熏燿晷有傷秋稼方貽民瘼朕以眇疚未𢎞政道囹圄尚繁枉滯猶積晨兢夕厲每惻于懐尚書令可與執法以下就訊衆獄使寃訟洗遂瘐弊昭蘇頒下州郡咸令無壅元徽元年丁母憂葬竟攝令親職加衛將軍不受敦逼備至中使相望粲終不受性至孝居喪毁甚祖日及祥變常發詔衛軍斷客二年桂陽王休範為逆粲扶曵入殿詔加兵自隨府置佐史時兵難危急賊已至南掖門諸將意沮咸莫能奮粲慷慨謂諸將帥曰寇賊已逼而衆情離沮孤子受先帝顧託本以死報今日當與褚䕶軍同死社稷因命左右被馬辭色哀壯於是陳顯達等感激出戰賊即平殄事寧授中書監即本號開府儀同三司領司徒以揚州解為府固不肯移三年徙尚書令衛軍開府如故並固辭服終乃受加侍中進爵為侯又不受時粲與齊王褚淵劉秉入直平決萬機時謂之四貴粲閑黙寡言不肯當事主書每往諮決或髙詠對之時立一意則衆莫能改宅宇平素器物取給好飲酒善吟諷獨酌園庭以此自適居負南郭時杖䇿獨遊素寡往來門無雜客及受遺當權四方輻湊閑居髙臥一無所接談客文士所見不過一兩人順帝即位遷中書監司徒侍中如故時齊王居東府故使粲鎮石頭粲素静退每有朝命多不即從逼切不得已然後方就及詔移石頭即便順㫖有周旋人解望氣謂粲曰石頭氣甚乖往必有禍粲不答又給油絡通幰車仗士五十人入殿時齊王功髙徳重天命有歸粲自以身受顧託不欲事二姓密有異圖丹陽尹劉秉宋代宗室前湘州刺史王藴太后兄子素好武事並慮不見容於齊王皆與粲相結將帥黄回任候伯孫曇瓘王宜興彭文之卜伯興等並與粲合昇明元年荆州刺史沈攸之舉兵齊王自詣粲粲稱疾不見粲宗人通直郎袁達以為不宜示異同粲曰彼若以主幼時艱與桂陽時不異劫我入臺便無辭以拒一如此不復得出矣時齊王入屯朝堂秉從父弟領軍將軍韞入直門下省伯興為直閤黄回諸將皆率軍出新亭粲謀克日矯太后令使韞伯興率宿衛兵攻齊王於朝堂回率軍來應秉候伯等並赴石頭本期夜發其日秉恇擾不知所為晡夜便束裝未暗載婦女席卷就粲由此事洩先是齊王遣將薛淵蘇烈王天生等領兵戍石頭云以助粲實禦之也又令腹心王敬則為直閤與伯興共總禁兵王蘊聞秉已奔歎曰今年事敗矣時齊王使蘊募人已得數百乃狼狽率部曲向石頭本期開南門時已暗夜薛淵等據門射之蘊謂粲已敗即便散走齊王以報敬則率所領收蘊殺之并誅伯興又遣軍主戴僧静向石頭助薛淵自倉門得入時粲與秉等列兵登東門僧静分兵攻府西門粲與秉欲還赴府既下城列燭自照僧静挺身暗往粲子最覺有異人以身衛粲僧静直前斬之父子俱殞左右各分散粲死時年五十八任候伯等其夜並乘輕舸自新亭赴石頭聞粲敗乃馳還其後並誅秉事在宗室傳齊永明元年詔曰昔魏矜袁紹恩給丘墳晉亮兩王榮覃餘裔斯蓋懐舊流仁原心興宥二代𢎞義前載美談袁粲劉秉並與先朝同奬宗室沈攸之於景和之世特有乃心雖末節不終而始誠可録嵗月彌往宜沾優隆粲秉前年改葬塋兆未脩材官可為經畧粗合周禮攸之及其諸子喪柩在西可符荆州以時致送還反舊墓在所營葬事史臣曰闢運剏基非機變無以通其務世及繼體非忠貞無以守其業闢運之君千載一有世及之主無乏於時闕二字湏機變之用短資忠貞之路長也故漢室闕二字文舉不屈曹氏魏鼎將移夏侯義不北面若悉以二子為心則兩代宜不亡矣袁粲清標簡貴任屬負圖朝野之望雖隆然未以大節許也及其赴危亡審存滅豈所謂義重於生乎雖不達天命而其道有足懐者昔王經被旌於晉世粲等亦改葬於聖朝盛代同符美矣宋書卷八十九
