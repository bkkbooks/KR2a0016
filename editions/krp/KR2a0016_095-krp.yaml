body:
  text: 宋書卷九十五梁沈約撰列傳第五十五索虜索頭虜姓託䟦氏其先漢将李陵後也陵降匃奴有數百千種各立名號索頭亦其一也晉初索頭種有部落數萬家在雲中惠帝末并州刺史嬴公司馬騰於晉陽為匈奴所圍索頭單于猗駞遣軍助騰懐帝永嘉三年駞弟盧率部落自雲中入鴈門就并州刺史劉琨求樓煩等五縣琨不能制且欲倚盧為援乃上言盧兄駞有救騰之功舊勲宜録請移五縣民於新興以其地處之琨又表封盧為代郡公愍帝初又進盧為代王増食常山郡其後盧國内大亂盧死子又幼弱部落分散盧孫什翼鞬勇壮衆復附之號上洛公北有沙漠南據隂山衆數十萬其後為苻堅所破執還長安後聴北歸鞬死子開字渉珪代立先是鮮卑慕容垂僭號中山晉孝武太元二十一年垂死開率十萬騎圍中山明年四月尅之遂王有中州自稱曰魏號年天賜九年治代郡桑乾縣之平城立學官置尚書曹開頗有學問曉天文其俗以四月祠天六月末率大衆至隂山謂之却霜隂山去平城六百里深逺饒樹木霜雪未嘗釋葢欲以暖氣却寒也死則潛埋無墳壟處所至於𦵏送皆虗設棺柩立冢槨生時車馬器用皆燒之以送亡者開暴虐好殺民不堪命先是有神巫誡開當有暴禍唯誅清河殺萬民乃可以免開乃滅清河一郡常手自殺人欲令其數滿萬或乗小輦手自執劔擊檐輦人腦一人死一人代毎一行死者數十夜恒變易寑處人莫得知唯愛妾名萬人知其處萬人與開子清河王私通慮事覺欲殺開令萬人為内應夜伺開獨處殺之開臨死曰清河萬人之言乃汝等也是嵗安帝義熙五年開次子齊王嗣字木末執清河王對之號哭曰人生所重者父云何反逆逼令自殺嗣代立諡開道武皇帝十三年髙祖西伐長安嗣先娶姚興女乃遣十萬騎屯結河北以救之大為髙祖所破事在朱超石等傳於是遣使求和自是使命嵗通髙祖遣殿中将軍沈範索季孫報使反命已至河未濟嗣聞髙祖崩問追報範等絶和親太祖即位方遣範等歸永初三年十月嗣自率衆至方城遣鄭兵將軍揚州刺史山陽公達奚斤呉兵將軍廣州刺史蒼梧公公孫表尚書滑稽領歩騎二萬餘人於滑臺西南東燕縣界石濟南渡輜重弱累自隨滑臺戍主寜逺將軍東郡太守王景度馳告冠軍将軍司州刺史毛徳祖戍虎牢遣司馬翟廣率參軍龎諮上黨太守劉談之等歩騎三千拒之軍次卷縣土樓虜徙營滑臺城東二里造攻具日徃脅城徳祖以滑臺戍人少使翟廣募軍中壯士遣寧逺将軍劉芳之率領助景度守芳之将八十餘人突得入城徳祖又遣討虜将軍𢎞農太守竇應明領五百人建武将軍竇覇領二百五十人並以水軍相繼發咸受翟廣節度初亡命司馬楚之等常藏竄陳留郡界虜既南渡馳相要結驅扇壃場大為民患徳祖遣長社令王法政率五百人據邵陵将劉憐領二百騎至雍丘以防之楚之於白馬縣襲憐為憐所破㑹臺送軍資至憐徃迎之而酸棗民王玉知憐南馳以告虜虜将滑稽領千乗襲倉垣兵吏悉踰城散走陳留太守嚴慢為虜所獲虜即用王玉為陳留太守給兵守倉垣十一月虜悉力攻滑臺城城東北崩壊王景度出奔景度司馬陽瓚堅守不動衆潰抗節不降為虜所殺竇應明擊虜輜重於石濟破之殺賊五百餘人斬其戍主缺連内頭張索兒等應明自石濟赴滑臺聞城已没遂進屯尹卯竇覇馳就翟廣虜既尅滑䑓并力向廣等力不敵引退轉闘而前二日一夜裁行十許里虜歩軍續至廣等矢盡力竭大敗廣覇談之等各單身迸還虜乗勝遂至虎牢徳祖出歩騎欲擊之虜退屯土樓又退還滑臺長安魏昌藍田三縣民居在虎牢下徳祖皆使入城虜别遣黑矟公率三千人至河陽欲南渡取金墉徳祖遣振威將軍河隂令竇晃五百人戍小壘緱氏令王瑜四百人據監倉鞏令臣琛五百人固小平參軍督護張季五百人屯牛蘭又遣將領馬隊與洛陽令楊毅合二百騎縁河上下隨機赴接十二月虜置守於洛川小壘徳祖遣翟廣馳徃擊之虜退走廣安立守防修治城塢復還虎牢豫州刺史劉粹遣治中髙道瑾領歩騎五百據項又遣司馬徐瓊繼之臺遣將輔伯遣姚珍杜坦梁靈宰等水歩諸軍續進徐州刺史王仲徳率軍次湖陸黑矟公遣長史將千人逼竇晃楊毅晃等逆擊禽之生獲二百人其後鄭兵將軍五千騎掩襲晃等黒矟渡與并力四面攻壘晃等力少衆散晃毅皆被重創虜將安平公鵝青二軍七千人南渡於碻磝東下至泗瀆口去尹卯百許里兖州刺史徐琰委軍鎮走於是太山諸郡並失守鄭兵與公孫表及宋兵將軍交州刺史交阯侯普㡬萬五千騎復向虎牢於城東南五里結營分歩騎自成臯開向虎牢外郭西門徳祖逆擊殺傷百餘人虜退還保營鎮北将軍檀道濟率水軍北救車騎将軍廬陵王義眞遣龍驤将軍沈叔狸三千人就豫州刺史劉粹量宜赴援少帝景平元年正月鄭兵分軍向洛攻小壘小壘守将竇晃拒戰陷没河南太守王涓之棄金墉出奔自虜分軍向洛徳祖毎戰輒破之嗣自率大衆至鄴鄭兵既尅金墉復還虎牢徳祖於城内穴城入七丈二道出城外又分作六道出虜陣後募敢死之士四百人參軍范道基率二百人為前驅參軍郭王符劉規等以二百人為後係出賊圍外掩襲其後虜陣擾亂斬首數百級焚燒攻具虜雖退散隨復更合虜又遣楚兵将軍徐州刺史安平公渉歸幡能健越兵将軍青州刺史臨菑侯薛道千陳兵将軍淮州刺史夀張子張模東擊青州所向城邑皆奔走冠軍将軍青州刺史竺夔鎮東陽城聞虜将至歛衆固守龍驤将軍濟南太守垣苖率二府郡文武奔就䕫䕫與将士盟誓居民不入城者使移就山阻燒除禾稼令虜至無所資虜衆向青州前後濟河凡六萬騎三月三萬騎前追脅城内文武一千五百人而半是𦍑蠻流雜人情駭懼竺䕫夜遣司馬車宗領五百人出城掩擊虜衆披退閒二日虜歩騎悉至繞城四圍列陣十餘里至晡退還安水結營去城二十里大治攻具日衆分歩騎常來逼城䕫夜使殿中将軍竺宗之參軍賈元龍等領百人於楊水口兩岸設伏虜将阿伏斤領三百人晨渡水兩岸伏發虜騎四迸殺傷數十人梟阿伏斤首虜又進營水南去城西北四里嗣自鄴遣兵益虎牢増圍急攻鄭兵於虎牢率歩騎三千攻潁川太守李元徳於許昌車騎将軍王元謨領千人助元徳守與元徳俱散敗虜即用潁川人庾龍為穎川太守領騎五百并發民丁以戍城徳祖出軍擊公孫表大戰從朝至晡殺虜數百㑹鄭兵軍從許昌還合圍徳祖大敗失甲士千餘人退還固城嗣又於鄴遣萬餘人從白沙口過河於濮陽城南寒泉築壘朝議以項城去虜不逺非輕軍所抗使劉粹召髙道瑾還夀陽若沈叔狸已追亦且追粹以虜攻虎牢未復南向若便攝軍捨項城則淮西諸郡無所慿依沈叔狸已頓肥口又不宜便退時李元徳率散卒二百人至項劉粹便助髙道瑾戍請宥其奔敗之罪朝議並許之檀道濟至彭城以青司二州並急而所領不多不足分赴青州道近竺䕫兵弱先救青州竺䕫遣人出城作東西南塹虜於城北三百餘歩鑿長圍䕫遣參軍閭茂等領善射五十人依墻射虜虜騎數百馳來圍墻墻内納射固墻死戰虜下焉歩進短兵接城上弓弩俱發虜乃披散虜遂塡外塹引髙樓四所蝦蟇車二十乗置長圍内䕫先鑿城北作三地道令通外塹復鑿裏塹内去城二丈作子塹遣三百餘人出地道欲燒虜攻具時回風轉爓火不得燃虜兵矢横下士卒多傷歛衆還入虜塡三塹盡平唯餘子塹蝦蟇車所不及虜以橦攻城䕫募人力於城上係大磨石堆之又出於子塹中用大麻絙張骨骨攻車近城從地道中多人力挽令折虜復於城南掘長圍進攻逾急䕫能持重垣苖有膽幹故能堅守移時然被攻日久城轉毁壊戰士多死傷餘衆困乏旦暮且陷檀道濟王仲徳兼行赴之劉粹遣李元徳襲許昌庾龍奔迸將宋晃追躡斬龍首元徳因苖綏撫并上租糧虜悦勃大肥率三千餘騎破髙平郡所統髙平方與任城金鄉亢父等五縣殺畧二千餘家殺其男子驅虜女弱兖州刺史鄭順之戍湖陸以兵卒不敢出冠軍将軍申宣戍彭城去髙平二百餘里懼虜至移郭外居民并諸營署悉入小城嗣又遣并州刺史伊樓㧞助鄭兵攻虎牢塡塞兩塹徳祖隨方抗拒頗殺虜而将士稍零落四月壬申虜聞道濟将至焚燒器械棄青州走竺䕫上言東陽城被攻毁壊不可守移鎭長廣之不期城下以固守以功進號前将軍封建陵縣男食邑四百戸䕫字祖季東莞人也官至金紫光禄大夫嗣率大衆至虎牢停三日自督攻城不能下回軍向洛陽留三千人益鄭兵停洛數日渡河北歸虜安平公等諸軍從青州退還逕趨滑臺檀道濟王仲徳歩軍乏糧追虜不及道濟於泰山分遣仲徳向尹卯道濟停軍湖陸仲徳未至尹卯聞虜已逺還就道濟共装治水軍虜安平公諸軍就滑臺西就鄭兵共攻虎牢被圍二百日無日不戰徳祖勁兵戰死殆盡而虜増兵轉多虜撞外城徳祖於内更築三重仍舊為四賊撞三城已毁共保一城晝夜相拒将士眼皆生創死者大半徳祖恩徳素結衆無離心徳祖昔在北與虜将公孫表有舊表有權畧徳祖患之乃與交通音問宻遣人説鄭兵云表與之連謀每益表書輒多所治定表以書示鄭兵鄭兵倍疑之言於嗣誅表虜衆盛檀道濟諸救軍並不敢進劉粹據項城沈狸屯髙橋二十一日虜作地道偷城内井井深四十丈山勢峻峭不可得防至其月二十三日人馬渴乏饑疫體皆乾燥被創者不復出血虜因急攻遂尅虎牢自徳祖及翟廣竇覇凡諸将佐及郡守在城内者皆見囚執唯上黨太守劉談之參軍范道基将二百人突圍南還城将潰将士欲扶徳祖出奔徳祖曰我與此城并命義不使此城亡而身在也嗣重其固守之節勒衆軍生致之故得不死司空徐羡之尚書傅亮領軍将軍謝晦表曰去年逆虜縱肆陵暴河南司州刺史臣徳祖竭誠盡力抗對强宼孤城獨守将渉朞年救師淹緩舉城淪没聖懐垂悼逺近嗟傷陛下殷憂諒闇委政自下臣等謀猷淺蔽託付無成遂令致節之臣抱忠傾覆将士殱辱王畧虧挫上墜先規下貽國恥稽之朝典無所辭責雖有司撓筆未加凖繩豈宜尸禄昧安殊寵乞䝉屏固以申國法不許徳祖榮陽南武陽人也晉末自鄉里南歸初為冠軍參軍輔國将軍道規為荆州徳祖為之将佐復為髙祖太尉參軍髙祖北伐以為王鎭惡龍驤司馬加建武将軍為鎮惡前鋒斬賊寜朔将軍趙元石於栢谷破𢎞農太守尹雅於梨城又破賊大帥姚難於涇水斬其鎭北将軍姚強鎮惡尅立大功葢徳祖之力也長安平定以為龍驤将軍扶風太守仍遷秦州刺史将軍如故時佛佛虜為宼復以徳祖為王鎮惡征虜司馬尋復為桂陽公義眞安西參軍南安太守将軍如故復徙馮翊太守髙祖東還以徳祖督司州之河東平陽二郡諸軍輔國将軍河東太守代并州刺史劉遵考戍蒲坂長安不守合部曲還彭城除世子中兵參軍将軍如故又除督司州之河東平陽河北雍州之京兆豫州之頴川兖州之陳留九郡軍事滎陽太守将軍如故又加京兆太守髙祖踐祚進號冠軍論前後功封觀陽縣男食邑四百户又除督司雍并三州豫州之潁川兖州之陳留諸軍事司州刺史将軍如故太祖元嘉六年死於虜中時年六十五世祖大明元年以徳祖弟子熙祚第二息詡之紹徳祖封虜既尅虎牢留兵居守餘衆悉北歸少帝曰故寧逺司馬濮陽太守陽瓚滑臺之逼厲誠固守投命均節在危無撓古之忠烈無以加之可追贈給事中并存䘏遺孤以慰存亡尚書令傅亮議瓚家在彭城宜即以入臺絹一百匹粟三百斛賜給文士顔延之為誄焉龍驤将軍兖州刺史徐琰東陽太守王景度並坐失守鉗髠居作琰五嵗景度四嵗時宣威将軍潁川太守李元徳戍許昌仍除滎陽太守督二郡軍事其年十一月虜遣軍并招集亡命攻逼許昌城以士人劉逺為滎陽太守李元徳欲出戰兵仗少至夜悉排女牆散潰元徳復奔還項城虜又圍汝陽太守王公度将十餘騎突圍奔項城虜又破邵陵縣殘害二千餘家盡殺其男丁驅畧婦女一萬二千口劉粹遣將姚聳夫率軍助守項城又遣司馬徐瓊五百人繼之虜掘破許昌城又毁壊鍾離城以立疆界而還嗣死諡曰明元皇帝子燾字佛貍代立母杜氏冀州人入其宫内生燾燾年十五六不為嗣所知遇之如僕𨽻嗣初立慕容氏女為后又娶姚興女並無子故燾得立壯健有筋力勇於戰闘忍虐好殺夷宋畏之攻城臨敵皆親貫甲冑元嘉五年使大将吐伐斤西伐長安生禽赫連昌中山王安定封昌為公以妹妻之昌弟赫連定在隴上吐伐斤乗勝以騎三萬討定定設伏於隴山弹筝谷破之斬吐伐斤盡坑其衆定率衆東還後尅長安燾又自攻不尅乃分軍戍大城而還燾常使昌侍左右常共單馬逐鹿深入山澗昌素有勇名諸将咸謂昌不可親燾曰天命有在亦何所懼親遇如初復攻長安尅之定西走為吐谷渾慕璝所禽赫連氏有名衛臣者種落在朔方塞外部落千餘户朔方以西西至上郡東西千餘里漢世徙謫民居之土地良沃苻堅時衛臣入塞寄田春來秋去堅雲中䕶軍賈雍掠其田者獲生口馬牛羊堅悉以還之衛臣感恩遂稱臣入居塞内其後漸强盛衛臣死子佛佛驍猛有謀算逺近雜種皆附之姚興與相抗興覆軍喪衆前後非一闗中為之傷殘髙祖入長安佛佛震懾不敢動髙祖東還即入宼北地安西将軍義眞之歸也佛佛遣子昌破之青泥俘囚諸将帥遂有闗中自稱尊號號年曰眞興元年京兆人韋元隐居飬志有髙名姚興備禮徴不起髙祖辟為相國掾宋臺通直郎又並不就佛佛召為太子庶子元應命佛佛大怒曰姚興及劉公相徵召並不起我有命即至當以我殊類不可理其故耶殺之元嘉二年佛佛死昌立至是為燾所兼燾西定隴右東滅黄龍海東諸國並遣朝貢太祖踐祚更有志北畧七年三月詔曰河南中國多湮没非所遺黎荼炭毎用矜懐今民和年豐方隅無事宜時經理以固壃場可簡甲卒五萬給右将軍到彦之統安北将軍王仲徳兖州刺史竺靈秀舟師入河驍騎將軍叚宏精騎八千直指虎牢豫州刺史劉徳武勁勇一萬以相犄角後将軍長沙王義欣可權假節率見力三萬監征討諸軍事便速備辦月内悉發先遣殿中将軍田竒銜命告燾河南舊是宋土中為彼所侵今當修復舊境不闗河北燾大怒謂竒曰我生頭髪未燥便聞河南是我家地此豈可得河南必進軍今權當歛戍相避須冬行地浄河冰合自更取之後将軍長沙王義欣出鎭彭城總統羣帥告司兖二州曰夫王者之兵以義徳相濟非徒壃理土地恢廣經畧將以大庇蒼生保全黎庶是以䝉踐霜雪踰歴險難匡國寧民肅清四表昔我髙祖武皇帝誕膺明命爰造區夏内夷簒逆外寧㓂亂靈武紛紜雷動風舉響軼龍堆聲浮雲朔陵天振地㧞山蕩海於是華域肅清謳歌允集王綱帝典煥哉惟文太和烟煴流澤洋溢中葉諒闇委政冢宰黠虜乘釁侵侮上國遂令司兖良民復蹈非所周鄭遺黎重隔王化聖皇踐祚重光開朗明哲柔逺以隆中興遐夷慕義雲騰波湧方將蹈徳履信被藝襲文増修業統作規于後勤施洽於三方恵和雍於北狄夫飬魚者除其猵獺育禽者去其豺狼故智士研其慮勇夫厲其節嘉謀動蒼天精氣貫辰緯莫府忝任禀承廟算剪爪明衣誓不顧命提呉楚之勁卒總八州之鋭士紅旗絳天素甲奪日虎歩中原龍超河渚興雲散雨慰大旱之思弔民伐罪積後已之情師以順動何征而不克况乎遵飬耆昧綏復境土而已哉昔淮泗初開狡徒縱逸王旅入闗羣竪飊扇襄邑之戰素旗授首半城之役伏尸蔽野支觧體分羽翼摧挫加以構難西虜結怨黄龍控弦熸滅首尾逼畏蜂屯蟻聚假息旦夕豈復能超蹈長河以當堂堂之陳哉夫順從貴速歸徳惡晩賞褒先附威加後服是以秦趙覉旅披榛委誠施紱乗軒剖符州郡慕容姚泓恃强作禍提挈萬里卒嬰鈇鉞皆目前之誠驗徃世之所知也聖上明發愛恤以道懐二州士民若能審決安危翻然革面率其支黨歸投軍門者當表言天臺隨才敘用如其迷心不悛竄首巢穴長圍既周臨衝四至雖欲壺漿厥篚其可得乎幸加三思詳擇利害彦之進軍虜悉歛河南一戍歸河北太祖以前征虜司馬南廣平太守尹沖為督司雍并三州豫州之頴川兖州之陳留二郡諸軍事奮威将軍司州刺史戍虎牢十一月虜大衆南渡河彦之敗退洛陽滑臺虎牢諸城並為虜所没尹沖及司馬滎陽太守崔模抗節不降投塹死沖字子順天水冀人也先為姚興吏部郎與興子廣平公弼結黨欲傾興太子泓泓立沖與弟宏俱逃叛南歸至是追贈前将軍太祖與江夏王義㳟書曰尹沖誠節志槩繼蹤古烈以為傷惋不能已已上以滑臺戰守彌時遂至陷没乃作詩曰逆虜亂壃場邉将嬰宼仇堅城効貞節攻戰無蹔休覆瀋不可拾離機難復收勢謝歸塗單於焉見幽囚烈烈制邑守舍命蹈前修忠臣表年暮貞柯見嚴秋楚莊投袂起終然報强仇去病辭髙館卒獲舒國憂戎事諒未殄民患焉得瘳撫劔懐感激志氣若雲浮願想淩扶揺弭斾拂中州爪牙申威靈帷幄騁良籌華裔混殊風率土浹王猷惆悵懼遷逝北顧涕交流其後燾又遣使通好并求婚姻太祖毎依違之十七年燾號太平眞君元年十九年虜鎭東將軍武昌王宜勒庫莫提移書益梁二州徃伐仇池侵其附屬而移書越詣徐州曰我大魏之興徳配二儀與造化並立夏殷以前功業尚矣周秦以來赫赫堂堂垂耀先代逮我烈祖重之聖明應運龍飛廓清燕趙聖朝承王業之資奮神武之畧逺定三秦西及葱嶺東平遼碣海隅服從北暨鍾山萬國納貢威風所扇想彼朝野備聞威徳往者劉石苻姚遞據三郡司馬琅邪保守揚越綿綿連連綿歴年紀數窮運改宋氏受終仍晉之舊逺通聘享故我朝廷觧甲息心東南之略是為不欲違先故之大信也而彼方君臣苞蔵禍心屢為邉宼去庚午年密結赫連侵我牢洛致師徒喪敗舉軍囚俘我朝廷仁𢎞不窮人之非不遂人之過與彼交和前好無改昔南秦王楊元識達天運於大化未及之前度越赫連逺歸忠款元既即世弟難當忠節愈固上請納女連㛰宸極任土貢珍自比内郡漢南白雉登爼御羞朝廷嘉之授以専征之任不圖彼朝計壃場之小疵不相闗移竊興師旅亡我賓屬難當将其妻子及其同義告敗闕下聖朝憮然顧謂羣臣曰彼之違信背和與牢洛為三一之為甚其可再乎是若可忍孰不可忍是以分命吾等磬聲之臣助難當報復使持節侍中都督雍秦二州諸軍事安西將軍建興公吐奚愛弼率南秦王楊難當自祁山南出直衝建安令南秦自遣信臣招集舊户使持節侍中都督雍梁益三州諸軍事安西將軍啓開府儀同三司淮隂公皮豹子員外散騎常侍平南將軍南益州刺史建徳公庫拔阿浴河引出斜谷阨白馬之險散騎常侍安南將軍雍州刺史南平公娥後延出自駱谷直截漢水冠軍將軍南蠻校尉荆州刺史建平公宗睒使持節員外散騎常侍冠軍將軍梁州刺史順陽公劉買徳平逺將軍永安侯若干内亦干出自子午東襲梁漢使持節侍中都督荆梁南雝三州諸軍事領䕶南蠻校尉征南大将軍開府儀同三司荆州刺史故晉譙王司馬文思寧逺將軍荆州刺史襄陽公魯軌南趨荆州使持節都督洛豫州及河内諸軍事鎭南大將軍開府儀同三司淮南王直勒它大翰為其後繼使持節侍中都督梁益寧三州諸軍事領護西戎校尉鎭西大将軍開府儀同三司揚州刺史晉琅邪王司馬楚之南趣夀春使持節侍中都督揚豫兖徐四州諸軍事征南將軍徐兖二州刺史東安公刁雝東趣廣陵南至京口使持節侍中都督青兖徐三州諸軍事征東將軍青徐二州刺史東海公故晉元顯子司馬天助直趣濟南十道並進連營五千歩騎百萬隐隐桓桓以此屠城何城不潰以此奮擊何堅不摧召陵踐土區區齊晉尚能克勝強楚以致一匡况大魏以沙漠之突騎兼咸夏之勁卒哉若衆軍就臨将令南海北汎江湖南溢髙岸墊為浦澤深谷積為丘陵晉餘黎民將雲集霧聚仇池之師㩻䧢山谷之中何能自固彼之所謂肆忿於目前之小得以至於敗亡之大失也昔信陵君濟窮鳩之危義士歸之故我朝廷欲救難當投命之誠為此舉動既而愛惜前好猶復沈吟多殺生生在之一亡十仁者之所不為吾等别愛後自馳檄相譬書若攝兵還反復南秦之國則諸軍同罷好睦如初若距我義言狠愎遂徃敗國亡身必成噬臍之悔望所列上彼朝惠以報告徐州答移曰知以楊難當投命告敗比之窮鳩欲動衆以相存拯救危恤難有國者之所用心雖然移書之言亦已過矣何者楊氏先世以來受晉爵號修職守藩為我西服十載之中再造逆亂號年建義猖狂妄作為臣不忠宜加誅討又知難當稱臣彼國宜是顧畏首尾兩屬求全果是純臣服事於魏何宜與人和親而聽臣下縱逸昔景平之末國祚中㣲彼乗我内難侵我司兗是以七年治兵義在經畧三帥渉河秋毫不犯但崇此信誓不負約言耳彼伺我軍仍相掩襲俘我甲士翦我邉民是彼有兩曲我有二直也司馬楚文思亡命竄伏魯軌刁雍實為蠆尾而擁其逋逃開其壃場元顯無子焉得天助謬稱假託何足以云又譏竊興師旅不相闗移若如來言又非所受黄龍國王受我正朔且渠茂䖍父子歸款彼皆殘滅俘馘豈有先言况仇池奉晉十世事宋三葉九伐所加何傷於彼僕聞師曲為老義作亂雄言貴稱情不在夸大移書本詣梁益而謬來鄙府大人不逺幸無過談二十年燾以國授其太子下書曰朕承祖宗重光之緒思闡洪基恢隆萬世自經營天下平暴除逆掃清不順武功既昭而文敎未闡非所以崇太平之治也今者域内安逸百姓富昌軍國異容宜定制度為萬世之法夫隂陽有徃復四時有代序授子任賢安全相附所以休息疲勞式固長久成其禄福古今不易之典也諸朕功臣懃勞日久皆當致仕歸第雍容髙爵頤神飬夀朝請隨時饗宴朕前論道陳謀而已不須復親有司苦劇之職其令皇太子嗣理萬機總統百揆更舉賢良以被列職皆取後進明能廣啓選才之路擇人授任而黜陟之故孔子曰後生可畏焉知來者之不如今主者明為科制宣勅施行於是王公以下上書太子皆稱臣首尾與表同唯用白紙為異是嵗燾伐芮芮虜大敗而還死者十六七不聽死家發哀犯者誅之二十三年虜安南平南府又移書兖州以南國僑置州不依城土多濫北境名號又欲逰獵具區兖州答移曰夫皇極肇建實膺神明之符生民初載實禀沖和之氣故司牧之功宣於上代仁義之道興自諸華在昔有晉混一區宇九譯承風遐戎嚮附永嘉失御天綱圯裂石容苻姚逓乗非據或棲息趙魏或保聚邠岐我皇宋屬當歸厯受終晉代北臨河濟西盡咸汧弔民伐罪流澤五都魏爾時祗徳悔禍思用和輯交通使命以祈天衷來移所謂分疆畫境其志久定者也俄而不恒其信虞我國憂侵牢及洛至于清濟徃嵗入河且欲綏理舊城是以頓兵南澨秋毫無犯軍師不能奉遵廟算保有成功回斾之日重失司兗來移云不因土立州招引亡命夫古有分土而無分民徳之休明四方繦負昔周道方隆靈臺初構民之附化八十萬家彼不思弘善政而恐人之棄己縱威肆虐老弱無遺詳觀今古畧聴輿誦未有窮凶以延期安忍而懐衆者也若必宜因土立州則彼立徐揚豈有其地徃年貴主獻書云强者為雄斯則棄徳任力逆行倒施有一於此何以能振復加欲游獵具區觀化南國今治道方融逺人必至開館飾邸則有司存來嵗元辰天人協慶鸞旗省方東廵稽嶺若欲邀恩宜赴兹㑹懐徳貴蚤無或後期又稱馳獵積年野無飛伏此邦觧網舍前矜蜫育鷇七澤八藪禽獸豐碩虞侯蒐算義非所恡三代肆覲其典雖缺呼韓入漢厥儀猶全饋餼之秋毎存豐厚先是虜中謡言滅虜者呉也燾甚惡之二十三年北地瀘水人葢呉年二十九於杏城天台舉兵反虜諸戎夷普並響應有衆十餘萬燾聞呉反惡其名累遣軍擊之輒敗呉上表歸順曰自靈祚南遷禍纒神土二京失統豹狼縱毒蒼元蹈犬噬之悲舊都哀荼蓼之痛臣以庸鄙杖義因機乗寇虜天亡之期藉二州思奮之憤故創迹天台爰暨咸雍義風一鼓率土響同威聲既張士卒効勇師不崇朝羣狡震裂殄逆鱗於函闗掃凶迹於秦土非仰協宋靈俯允羣願焉能若斯者哉今平城遺虐連兵大壇東西狼顧威形莫接長安孤危河洛不戍平陽二㜸世連土宇擁率部落控弦五萬東屯潼塞任質軍門私署安西将軍常山白廣平練甲髙平進師汧隴北漠護軍結駟連騎提戈載驅胡蘭洛生等部曲數千擬擊偽鎭闔境顒顒仰望皇澤伏願陛下給一旅之衆北臨河陜賜臣威儀兼給戎械進可以厭捍凶宼覆其巢窟退可以宣國威武鎭御舊京使中都有鳴鸞之響荒餘懐來蘇之徳謹遣使人趙綰馳表丹誠燾遣軍屢敗乃自率大衆攻之呉又上表曰臣聞天無二日地無二主昔中都失統九域分崩羣凶丘列於天邑飛鴞鴟目於四海先皇慈懐内發愍及戎荒翦偽羗於長安雪黎民之荼炭政敎既被民始寧蘇天未忘難禍亂仍起獫狁侏張侵暴中國使長安為豺狼之墟鄴洛為蜂蛇之藪縱毒生民虐流兆庶士女能言莫不歎憤傾首東望仰希拯接咸同旱苖之待天澤赤子之望慈親臣仰恩天時以義伐暴輒東西結連南北樹黨五州同盟迭相要契仰馮威靈千里雲集冀廓除榛莽以待王師義夫始臻莫不瓦觧虜主二月四日傾資倒庫與臣連營接刃交鋒無日不戰獲賊過半伏屍蔽野伏願特遣偏師賜垂拯接若天威既震足使姦虜潰亡遺民小大咸䝉生造太祖詔曰北地葢呉起衆秦川華戎響附奮其義勇頻煩克㨗屢遣表疏逺効忠款志梟逆虜以立勲績宜加爵號襃奨乃誠可以為使持節都督闗隴諸軍事安西將軍雝州刺史北地郡公使雍梁遣軍界上以相援接燾攻呉大小數十戰不能尅太祖遣使送雍秦二州所統郡及金紫以下諸將印合一百二十一紐與呉使隨宜假授屠各反叛呉自攻之為流矢所中死呉弟吾生率餘衆入木面山皆尋破散其年太原民顏白鹿私行入荒為虜所録相州刺史欲殺之白鹿詐云青州刺史杜驥使其歸誠相州刺史送白鹿至桑乾燾喜曰我外家也使其司徒崔浩作書與驥使司徒祭酒王琦齎書随白鹿南歸遣從弟髙梁王以重軍延驥入太原界攻冀州刺史申恬於歴城恬擊破之杜驥遣其寧朔府司馬夏侯祖歡中兵參軍吉淵馳往赴援虜破略太原得四千餘口牛六千餘頭尋又寇兗青冀三州遂及清東殺畧甚衆太祖思𢎞經畧詔羣臣曰吾少覧篇籍頗愛文義遊𤣥翫采未能息卷自纓紼世務情兼家國徒存日􅉴終有慙徳而區宇未一師饉代有永言斯瘼彌于其慮如疲疾稍増志隨時徃屬思之功與事而廢殘虐遊魂齊民塗炭乃眷北顧無忘𢎞拯思總羣謀掃清逋逆感慨之來遂成短韻卿等體國情深亦當義篤其懐也詩曰季父鍳禍先辛生識機始崇替非無徴興廢要有以自昔淪中畿儵焉盈百祀不覩南雲隂但見胡風起亂極治必形塗泰由積否方欲滌遺氛矧乃穢邉鄙眷言悼斯民納隍良在已逝將振宏羅一麾同文軌時乎豈再來河清難久俟駘駟安局歩騏驥志千里梁傅畜義心伊相抱深耻賞契將誰寄要之二三子無令齊晋朝取愧鄒魯士時壃場民多相侵盗二十五年虜寧南將軍豫州刺史北井矦若庫辰樹蘭移書豫州曰僕以不徳荷國榮寵受任邉州經理民物宣播政化鷹揚萬里雖盡節奉命未能令上化下布而下情上達也比者以來邉民擾動互有反逆無復為害自取誅夷死亡之餘雉莵逃竄南入宋界聚合逆黨頻為宼掠殺害良民略取資財大為民患此之界局與彼通連兩民之居烟火相接來徃不絶情偽繁興是以南姧北入北姦南叛以類推之日月彌甚姧宄之人數得侵盗之利雖加重法不可禁止僕常申令境局料其姧源而彼國牧守縱不禁御是以遂至滋蔓宼擾壃場譬猶蚤虱疥癬雖為小疴令人終嵗不安當今上國和通南北好合唯邉境民庶要約不明自古列國封壃有畔各自禁斷無復相侵如是可以保之長久垂之永世故上表臺閣馳書明曉自今以後魏宋二境宜使人迹不過自非聘使行人無得南北邉境之民烟火相望鷄狗之聲相聞至老死不相往來不亦善乎又能此亡彼歸彼亡此致則自我國家所望於仁者之邦也右將軍豫州刺史南平王鑠答移曰知以邉氓擾動多有叛逆欲杜絶姧宄兩息民患又欲迭送奔亡禁其來徃申告嘉貺實獲厥心但彼和好以來矢言每缺侵軼之弊屢違義舉任情背畔専肆暴略豈唯竊犯王黎乃害及行使頃誅討蠻髦事止畿服或有狐奔鼠竄逃首北境而輒便苞納待之若舊資其粮仗縱為宼賊徃嵗擅興戎旅禍加孩耄罔顧善隣之約不惟壃域之限來示所云彼竝行之雖豐辭盈觀即事違實興嫌長亂實彼之由反以為言将違躬厚之義壃場之民有自來矣且相期有素本不介懐若於本欲消姧弭暴永存匪石宜先謹封守斥遣諸亡驚蹄逸鏃不妄入境則邉城之下外户不閉王制嚴明豈當獨負來信若亡命奔越侵盗彼民斯固刑之所取無勞逺及自荷閫外思闡皇猷每申勅守宰務敦義讓徃誠未布能不愧怍當重約示以副至懐二十七年燾自率歩騎十萬宼汝南初燾欲為邉宼聲云獵於梁川太祖慮其侵犯淮泗廼敕邉戍小宼至則堅守拒之大衆來則㧞民户歸夀陽諸戍偵候不明虜奄來入境宣威将軍陳南頓二郡太守鄭緄綏逺将軍汝南潁川二郡太守郭道隐竝棄城奔走虜掠抄淮西六郡殺戮甚多攻圍懸瓠城城内戰士不滿千人先是汝南新蔡二郡太守徐遵之去郡南平王鑠時鎮夀陽遣左軍行參軍陳憲行郡事憲嬰城固守燾盡鋭以攻之憲自登郭城督戰起樓臨城飛矢雨集衝車攻破南城憲於内更築扞城立柵以補之虜肉薄攻城死者甚衆憲将士死傷亦過半燾唯恐夀陽有救兵不以彭城為慮燾遣從弟永昌王庫仁眞歩騎萬餘将所略六郡口北屯汝陽時世祖鎭彭城太祖遣隊主呉香鑪乗驛敕世祖遣千騎齎三日糧襲之世祖發百里内馬得千五百匹衆議舉别駕劉延孫為元帥延孫辭不肯行舉参軍劉泰之自代世祖以問司馬王元謨長史張暢暢等竝贊成之乃分為五軍以㤗之為元帥與安北騎兵行參軍垣謙之田曹行參軍臧肇之集曹行參軍尹定武陵國左常侍杜幼文五人各領其一謙之領泰之軍嗣殿中參軍程天祚督戰至譙城更簡閲人馬得精騎千一百匹直向汝陽虜不意竒兵從北來大營在汝陽北去城三里許泰之等至虜都不覺馳入襲之殺三千餘人燒其輜重營内有數區氈屋屋中皆有帳器仗甚精食具皆是金銀帳内諸大主帥悉殺之諸亡口悉得東走大呼云官軍痛與手虜衆一時奔散因追之行已經日人馬疲倦引還汝南城内有虜一幢馬歩可五百登城望知泰之無後繼又有别帥鉅鹿公餘嵩自虎牢至因引出擊泰之泰之軍未食且戰已疲勞結陣未及定垣謙之先退因是驚亂棄仗奔走行迷道趨溵水水深岸髙人馬悉走水争渡泰之獨不去曰喪敗如此何面復還下馬坐地為虜所殺肇之溺水死天祚為虜所執謙之定幼文及将士免者九百餘人馬至者四百匹世祖降安北之號為鎭軍将軍元謨延孫免官暢免所領沛郡謙之伏誅定幼文付尚方燾初聞汝陽敗又傳彭城有係軍大懼謂其衆曰但聞淮南遣軍乃復有竒兵出今年将墮人計中即燒攻具欲走㑹泰之死問續至乃停夀陽遣劉康祖救懸瓠燾亦遣任城公拒康祖與戰破之斬任城燾攻城四十二日不拔死者甚多任城又死康祖救軍漸進乃委罪大将多所斬戮倍道奔走太祖嘉憲固守詔曰右軍行參軍行汝南新蔡二郡軍事陳憲盡力捍衛全城摧寇忠敢之效宜加顯擢可龍驤将軍汝南新蔡二郡太守又以布萬疋委憲分賜汝南城内文武吏民戰守勤勞者燾雖不尅懸瓠而虜掠甚多南師屢無功為燾所輕侮與太祖書曰彼前使間諜詃略姧人竊聞朱修之申謨近復得胡崇之敗軍之将國有常刑乃皆用為方州虞我之隙以自慰慶得我普鍾蔡一豎子何所損益無異得我舉國之民厚加奉飬禽我卑将衛拔非其身各便鏁腰苦役以辱之觀此所行足知彼之大趣辨校以來非一朝一夕也頃闗中葢呉返逆扇動隴右氐𦍑彼復使人就而誘勸之丈夫遺以弓矢婦人遺以環釧是曹正欲譎誑取賂豈有逺相順從為大丈夫之法何不自來取之而以貨詃引誘我邉民募往者復除七年是賞姧人也我今來至此土所得多少孰與彼前後得我民户邪彼今若欲保全社稷存劉氏血食者當割江以北輸之攝守南度如此釋江南使彼居之不然可善敕方鎭刺史守宰嚴供張之具來秋當徃取揚州大勢已至終不相縱頃者往索眞珠璫略不相與今所馘截髑髏可當㡬許珠璫也彼徃日北通芮芮西結赫連䝉遜吐谷渾東連馮宏髙麗凡此數國我皆滅之以此而觀彼豈能獨立芮芮呉提以死其子莵害眞襲其凶迹以今年二月復死我今北征先除有足之宼彼若不從命來秋當復徃取以彼無足故不先致討諸方已定不復相釋我徃之日彼作何方計為塹城自守為築垣以自鄣也彼土小雨水便廹掖彼能水中射我也我顕然徃取揚州否彼翳行竊歩也彼來偵諜我已禽之放還其人目所盡見委曲善問之彼前使裴方明取仇池既得疾其勇功不能容有臣如此尚殺之烏得與我校邪彼非敵也彼常願欲共我一過交戰我亦不癡復不是苻堅何時與彼交戰晝則遣騎圍繞夜則離彼百里宿去彼人民好降我者驅來不好者盡刺殺之近有榖米我都噉盡彼軍復欲食噉何物能過十日邪彼呉人正有所營伎我亦知彼情離彼百里止宿雖彼軍三里安邏使首尾相次募人裁五十里天自明去此募人頭何得不輸我也彼謂我攻城日當掘塹圍守欲出來斫營我亦不近城圍彼止築隄引水灌城取之彼揚州城南北門有兩江水此二水引用自可如人意也知彼公時舊臣都已殺盡彼臣若在年㡬雖老猶有智策今已殺盡豈不天資我也取彼亦須我兵刃此有能祝婆羅門使鬼縛彼送來也此後復求通和聞太祖有北伐意又與書曰彼此和好居民連接為日已久而彼無厭誘我邉民其有徃者復之七年去春南廵因省我民即使驅還自天地啓闢已來争天下者非唯我二人而已今聞彼自來設能至中山及桑乾川隨意而行來亦不迎去亦不送若厭其區宇者可來平城居我徃揚州住且可博其土地傖人謂換易為博彼年已五十未嘗出户雖自力而來如三嵗嬰児復何知我鮮卑常馬背中領上生活更無餘物可以相與今送獵白鹿馬十二匹并氈藥等物彼來馬力不足可乗之道里來逺或不服水土藥自可療其年大舉北討下詔曰虜近雖摧挫獸心靡革驅逼遺氓復規竊暴比得河朔秦雝華戎表疏歸􅀈困棘跂望綏拯潛相糾結以候王師并陳芮芮此春因其來掠掩襲巢窟種落畜牧所亡太半連嵗相持于今未觧又猜虐互發親黨誅殘根本危敝自相殘殄芮芮間使適至所説竝符逺輸誠款誓為犄角遐邇注情既宜赴奨且水雨豐澍舟檝流通經略之㑹實在兹日可遣寧朔将軍王元謨率太子歩兵校尉沈慶之鎭軍咨議參軍申坦等戈船一萬前驅入河使持節督青冀幽三州徐州之東安東莞二郡諸軍事輔國将軍青冀二州刺史霄城侯蕭斌推三齊之鋒為之統帥持節都督徐兖青冀幽五州豫州之梁郡諸軍事鎭軍將軍徐兖二州刺史武陵王駿總四州之衆水陸竝驅太子左衛率始興縣五等侯臧質勒東宫禁兵統驍騎將軍安復縣開國侯王方囘建武將軍安蠻司馬新康縣開國男劉康祖右軍參軍事梁坦歩騎十萬逕造許洛使持節督豫司雍秦并五州諸軍事右將軍豫州刺史領安蠻校尉南平王鑠悉荆河之師方軌繼進東西齊舉宜有董一使持節侍中都督揚南徐二州諸軍事太尉領司徒録尚書太子太傅國子祭酒江夏王義恭徳望兼崇風略遐被即可三府文武并被以中儀精卒出次徐方為衆軍節度别府司空府使所督諸鎮各遣虎旅數道争先督梁南北秦三州諸軍事綏逺將軍西戎校尉梁南北秦三州刺史秀之統輔國將軍楊文徳宣武將軍巴西梓潼二郡太守劉宏宗連旗深入震盪汧隴䕶軍將軍封陽縣開國侯蕭思話部龍驤將軍枝坦寧逺將軍竟陵太守南城縣開國侯劉徳願籍荆雍之勁攬羣師之鋭宜由武闗稜威震􅹥指授之宜委司空義宣議量是嵗軍旅大起王公妃主及朝士牧守各獻金帛等物以助國用下及富室小民亦有獻私財至數十萬者又以兵力不足尚書左僕射何尚之參議發南兖州三五民丁父祖伯叔兄弟仕州居職從事及仕北徐兖為皇弟皇子從事庶姓主簿諸皇弟皇子府參軍督護國三令以上相府舍者不在發例其餘悉倩蹔行征符到十日装束縁江五郡集廣陵縁淮三郡集盱眙又募天下弩手不問所從若有馬歩衆藝武力之士應科者皆加厚賞有司又奏軍用不充揚南徐兖江四州富有之民家資滿五千萬僧尼滿二千萬者竝四分換一過此率討事息即還歴城建武府司馬申元吉率馬歩闕餘人向碻磝取泗瀆口虜碻磝戍主濟州刺史王買徳憑城拒戰元吉破之買徳棄城走獲奴婢一百四十口馬二百餘匹驢騾二百牛羊各千餘頭氈七百領麄細車三百五十乗地倉四十二所粟五十餘萬斛城内居民私儲又二十萬斛虜田五榖三百頃鐵三萬斤大小鐵器九千餘口餘器仗雜物稱此元謨攻滑臺不尅燾自率大衆渡河元謨敗走燾從弟永昌王庫仁眞發闗西兵趨汝潁從弟髙梁王阿斗埿自青州道燾自碻磝竝南出諸鎭悉斂民保城其十一月至鄒山鄒山戍主宣威将軍魯陽平二郡太守崔耶利敗没燾登鄒山是秦始皇刻石使人排倒之遣楚王樹洛眞南康侯杜道雋進軍清西至蕭城歩尼公進軍清東至留城世祖遣參軍馬文恭至蕭城江夏王義恭遣軍主嵇元敬至留城竝為覘候蕭城虜偃旗旌文㳟斥候不明卒與相遇乃捨汴趣南山東至山而虜圍合文恭戰敗僅以身免元敬亦與留城虜相値幢主華欽繼其後虜望元敬後有軍引去趨苞橋至欲渡清河沛縣民燒苞橋夜於林中擊鼓虜謂官軍大至争渡苞水水深溺死殆半先是燾遣員外散騎侍郎王老夀乗驛就太祖乞黄丼太祖餉丼十簿丼蔗千挺并就求馬曰自頃嵗成民阜朝野無虞春末當東廵吴㑹以盡㳺豫臨滄海探禹穴陟姑蘇之臺搜長洲之苑舟檝雖盛寡於良駟想能惠以逸足令及此行老夀受命未出境虜兵深入乃録還虜又破尉武戍執戍主左軍長兼行參軍王羅漢先是南平王鑠以三百人配羅漢出戍而尉武東北有小壘因據之或曰賊盛不足自固南依卑林宼至易以免羅漢以受命來此不可輒去是日虜攻之矢盡力屈遂没虜法獲生將付其三郎大帥連鎖鎖頸後羅漢夜斷三郎頭抱鎖亡走得入盱眙城永昌王破劉康祖於尉武引衆向夀陽自青岡屯孫叔敖冢脅夀陽城又焚掠馬頭鍾離南平王鑠保城固守燾自彭城南出十二月於盱眙渡淮破胡崇之等軍留尚書韓元興數千人守盱眙自率大衆南向中書郎魯秀出廣陵髙梁王阿斗埿出山陽永昌王於夀陽出横江凡所經過莫不殘害燾至𤓰歩壊民屋宇及伐蒹葦於滁口造箄筏聲欲渡江太祖大具水軍為防禦之備初領軍將軍劉遵考率軍向彭城至小澗虜已斷道召還與左軍將軍尹宏守横江少府劉興祖守白下建威將軍黄門侍郎蕭元邕守禆洲羽林左監孟宗嗣守新洲上建武將軍泰容守新洲下征北中兵參軍事向栁守貴洲司馬到元度守蒜山諮議參軍沈曇慶守北固尚書禇湛之先行京陵仍守西津徐州從事史蕭尚之守練壁征北參軍管法祖守譙山徐州從事武仲河守博落尚書左丞劉伯龍守採石尋遷建武將軍淮南太守仍總守事遊邏上接于湖下至蔡洲陳艦列營周亘江畔自採石至于曁陽六七百里船艦蓋江旗甲星燭皇太子出戍石頭城前將軍徐湛之守石頭倉城都水使者樂詢尚書水部郎劉淵之竝以装治失㫖付建康乗輿數幸石頭及莫府山觀望形勢購能斬佛狸伐頭者封八千户開國縣公賞布絹各萬匹金銀各百斤斬其子及弟偽相大軍主封四百户開國縣侯布絹各五千疋自此以下各有差又募人賫治葛酒置空村中欲以毒虜竟不能傷燾鑿𤓰歩山為盤道於其頂設氈屋燾不飲河南水以駱駞負河北水自隨一駱駞負三十斗遣使餉太祖駱駞名馬求和請婚上遣奉朝請田竒餉以珍羞異味燾得黃丼即噉之并大進酃酒左右有耳語者疑食中有毒燾不答以手指天而以孫兒示竒曰至此非唯欲為功名實是貪結姻援若能酬酢自今不復相犯秋豪又求嫁女與世祖二十八年正月朔燾㑹于山上并及土人㑹竟掠民户燒邑屋而去虜初縁江舉烽火尹宏曰六夷如此必走正月二日果退初太祖聞虜宼逆焚燒廣陵城府船乗使廣陵南沛二郡太守劉懐之率人民一時渡江虜以海陵多陂澤不敢徃山陽太守蕭僧珍亦斂居民及流奔百姓悉入城臺送粮仗給盱𣅿賊逼分留山陽又有數萬人攻具當徃滑臺亦留付郡城内垂萬家戰士五千餘人有白米陂去郡數里僧珍逆下諸處水注令滿須賊至決以灌之虜既至不敢停引去自廣陵還因攻盱眙盡鋭攻城三十日不能尅乃燒攻具退走燾凡破南兖徐兖豫青冀六州殺略不可稱計而其士馬死傷過半國人竝尤之是嵗燾病死謚為太武皇帝初燾有六子長子晃字天真為太子次曰晉王燾所住屠蘇為疾雷擊屠蘇倒見厭殆死左右皆號泣晉王不悲燾怒賜死次曰秦王烏奕肝與晃對掌國事晃疾之愬其貪暴燾鞭之二百遣鎭枹罕次曰燕王次曰呉王名可博眞次曰楚王名樹洛眞燾至汝南𤓰歩晃私遣取諸營鹵獲甚衆燾歸聞知大加搜撿晃懼謀殺燾燾乃詐死使其近習召晃迎喪於道執之及國罩以鐵籠尋殺之以烏奕肝有武用以為太子㑹燾死使嬖人宗愛立博眞為後宗愛博眞恐為奕肝所危矯殺之而自立號年承平博眞懦弱不為國人所附晃子濬字烏靁直懃素為燾所愛燕王謂國人曰博眞非正不宜立直懃嫡孫應立耳乃殺博眞及宗愛而立濬為主號年為正平先是虜寧南將軍魯爽兄弟率衆歸順二十九年太祖更遣張永王元謨及爽等北伐青州刺史劉興祖建議伐河北曰河南阻饑野無所掠脱意外固守非旬月可拔稽留大衆轉輸方勞伐罪弔民事存急速今偽帥始死兼逼暑時國内猜擾不暇逺赴闗内之衆裁足自守愚謂宜長驅中山據其闗要冀州已北民人尚豐兼麥已向熟資因為易向義之徒必應響赴若中州震動黄河以南自當消潰臣城守之外可有二千人今更發三千兵假别駕崔勲之振威將軍領所發隊并二州望族從蓋栁津直衝中山申坦率歴城之衆可有二千駱驛俱進較略二軍可七千許人既入其心腹調租發車以充軍用若前驅乗勝張永及河南衆軍便宜一時濟河使聲實兼舉愚計謬允宜竝建司牧撫柔初附定州刺史取大嶺冀州刺史向井陘并州刺史屯雁門幽州刺史塞軍都相州刺史備大行因事指麾隨宜加授畏威欣寵人百其懐濟河之日請大統版假常忿將率憚於深逺勲之等慷慨之誠誓必死効若能成功清一可待若不克㨗不為大傷竝催促装束伏聴勑㫖上意止存河南不納元謨攻碻磝不克退還世祖即位索虜求互市江夏王義恭竟陵王誕建平王宏何尚之何偃以為宜許栁元景王元謨顔竣謝荘檀和之禇湛之以為不宜許時遂通之大明二年虜宼青州為刺史顔師伯所破退走前廢帝永光元年濬死謚文成皇帝子𢎞之字弟豆𦙍代立景和中北討徐州刺史義陽王昶昶單騎奔虜太宗泰始初江州刺史晉安王子勛為逆四方反徐州刺史薛安都青州刺史沈文秀冀州刺史歴城鎮主崔道固等亦各舉兵虜謀欲納昶下書曰易稱利用行師書云恭行天罰必觀時而後施因機而後舉故夏伐有扈四海以平晉定呉㑹萬方以壹今宗室衰微凶難洊起國有殺君之逆邦罹崩離之難起自蕭墻舋流合境偽使持節散騎常侍都督徐南北兖青冀幽七州豫州之梁郡諸軍事征北將軍儀同三司徐州刺史義陽王昶踵㣲子之蹤蹈項伯之迹知機體運歸款闕庭朕錫以顯爵班同親舊昶弟湘東王進不能扶危定傾退不能降身髙謝阻兵安忍簒位自立既無闔閭静亂之功而有無知悖禮之變怠棄三正慢易天常覆敗之徴既兆危亡之應己著偽江州刺史晉安王復稱大號自立一隅荆郢二州刺史安陸臨海王劉子綏子頊大擅威令不相祗伏徐州刺史彭城鎮主薛安都青州刺史沈文秀冀州刺史歴城鎮主崔道固等皆彼之要藩懼及禍難擁衆獨據各無定主仰觀天象俯察人謀六軍爕伐之期率土同軌之日朕承休烈屬當泰運思播靈武廓寧九服豈可得臨萬乗之機遘時來之遇而不討其讎逆振其艱患哉今可分命諸軍以行九伐使持節征東大將軍安定王直懃伐伏元侍中尚書左僕射安西大將軍平北公直懃羙晨散騎常侍殿中尚書平北將軍山陽公呂羅漢領隴右之衆五萬沿漢而東直指襄陽使持節征南大將軍勃海王直懃天賜侍中尚書令安東大將軍始平王直懃渴言侯散騎常侍殿中尚書令安西將軍西陽王直懃蓋户千領幽冀之衆七萬濱海而南直指東陽使持節征南將軍京兆王直懃子侍中司徒安南大將軍新建王獨孤侯尼須散騎常侍西平公韓道人領江雍之衆八萬出洛陽直至夀陽使持節征南大將軍宜陽王直懃新成侍中太尉征東大將軍直懃駕頭拔羽直征東將軍北平公拔敦及義陽王劉昶領定相之衆十萬出濟兖直造彭城與諸軍尅期同到㑹于秣陵納昶反國定其社稷使荆陽沾徳義之風江漢被來蘇之惠邉壃將吏不得因宋衰亂有所侵損以傷我國家存救之義主者明宣所部咸使聞知稱朕意焉既而晉安王子勛事平太宗遣張永沈攸之北討薛安都大懼遣使引虜虜遣萬騎救之永攸之敗退虜攻青冀二州竝尅執沈文秀崔道固又下書朕承天序臨御兆民思闡皇風以隆治道而荆吴僭傲跨跱一方天降其殃以罰有罪簒戮發於蕭墻毒害嬰於羣庶徐州刺史薛安都司州刺史常珍竒深體逆順歸誠獻欵遭難已久饑饉荐臻或以糊口之功私力竊盗或不識王命藏竄山藪或為囚徒先被執繫元元之命甚可哀愍其曲赦淮北三州之民自天安二年正月三十日壬寅昧爽以前諸犯死罪以下繫囚見徒一切原遣唯子殺父母孫殺祖父母弟殺兄妻殺夫奴殺主不從赦例若亡命山澤百日不首復其初罪今陽春之初東作方興三州之民各安其業以就農桑有饑窮不自存通其市糶之路鎭統之主懃加慰納遵用輕典以莅新化若綏導失中令民逃亡加罪無縱其普宣下咸使聞知朕意焉此後虜復和親信餉嵗至朝廷亦厚相報答泰豫元年虜狹石鎭主白虎公安陽鎭主莫索公貞陽鎭主鵞落生襄陽王桓天生等引山蠻馬歩二萬餘人攻圍義陽縣義陽戍司州刺史王贍遣從弟司空行參軍思逺撫軍行參軍王叔瑜擊大破之虜退走自索虜破慕容蠻馬二萬餘人攻圍義陽據有中國而芮芮虜有其故地蓋漢世匈奴之北庭也芮芮一號大檀又號檀檀亦匈奴别種自西路通京師三萬餘里僭稱大號部衆殷強嵗時遣使詣京師與中國亢禮西域諸國焉耆鄯善龜兹姑墨東道諸國竝役屬之無城郭逐水草畜牧以氈帳為居隨所遷徙其土地深山則當夏積雪平地則極望數千里野無青草地氣寒凉馬牛齕枯噉雪自然肥徤國政疎簡不識文書刻木以記事其後漸知書契至今頗有學者去北海千餘里與丁零相接常南擊索虜世為仇讐故朝廷每覊縻之其東有槃槃國趙昌國渡流沙萬里又有粟特國太祖世竝奉表貢獻粟特大明中遣使獻生獅子火浣布汗血馬道中遇寇失之史臣曰久矣匈奴之與中國竝也自漢氏以前綿跨年世紛梗外區驚震中㝢周無上筭漢收下策魏代分離種落遷散數十年閒外郡無風塵之警邉城早開晩閉胡馬不敢南臨至于晉始姧黠漸著密邇畿封窺候壃場俘民畧畜者無嵗月而闕焉元康以後風雅雕喪五胡遞襲翦覆諸華及渉珪以鐵馬長驅席卷趙魏負其衆力遂與上國争衡矣髙祖宏圗盛畧欲以苞括宇宙為念逮于懸旗清洛飲馬長涇北狄衂鋭挫鋒閉重嶮而自固于時戎車外動王命相屬裳冕委蛇輅軒繼路舊老懐思古之情行人或為之殞涕自是闗河響動表裏寧壹宫車甫晏戎心外駭覆我牢滑翦我伊瀍是以太祖忿之開定司兖而兵無勝畧棄師隕衆委甲横原捐州亘水荆呉鋭卒逸氣未攄偏城孤將銜寃就虜遂蹙境延宼僅保清東自是兵摧勢弱邉隙稍廣壯騎陵突鳴鏑日至芻牧年傷禾麥嵗犯小則囚虜吏民大則俘執長守羽書繼塗奔命相屬青徐兗冀之間蕭然矣而自木末以來竝有賢才狡算妙識兵權深通戰術屬鞬凌厲氣冠百夫故能威服華甸志雄羣虜至於狸伐纂偽彌煽凶威英圖武畧事駕前古雖冒頓之鷙勇檀石之驍强不能及也遂西吞河右東舉龍碣總括戎荒地兼萬里雖裂土分區不及魏晉而華氓戎落衆力兼倍至乃連騎百萬南向而斥神華胡斾映江穹帳遵渚京邑荷檐士女喧惶天子内鎭羣心外御羣寇役竭民徭費殫府實舉天下以攘之而力猶未足也既而虜縱歸師殲累邦邑剪我淮州俘我江縣喋喋黔首跼髙天蹐厚地而無所控告强者為轉屍弱者為繫虜自江淮至于清濟户口數十萬自免湖澤者百不一焉村井空荒無復鳴鷄吠犬時嵗唯暮春桑麥始茂故老遺氓還號舊落桓山之響未足稱哀六州蕩然無復餘蔓殘搆至於乳䴏赴時銜泥靡託一枝之間連窠十數春雨裁至増巢已傾雖事舛呉宫而殲亡匪異甚矣哉覆敗之至於此也太祖懲禍未深復興外畧頓兵堅城棄甲河上是我有再敗敵有三勝也自此以後通互市納和親而侵疆軼戍于嵗連屬逮㤗始搆紛邉将外叛致夷引宼亡我四州髙祖劬勞日􅉴思一區宇旍旗卷舒僅而後克後主守文刑徳不樹一舉而弃司兖再舉而喪徐方華服蕭條鞠為茂草豈直天時抑由人事夫地勢有便習用兵有短長胡負駿足而平原悉車騎之地南習水鬭江湖固舟檝之鄉代馬胡駒出自冀北楩柟豫章植乎中土蓋天地所以分區域也若謂氊裘之民可以決勝於荆越必不可矣而曰樓船之夫可以争鋒於燕冀豈或可乎虞詡所謂走不逐飛蓋以我徒而彼騎也因此而推勝負殆可以一言蔽之宋書卷九十五宋書卷九十五考證索虜傳遣鄭兵將軍揚州刺史山陽公逹奚斤鄭兵魏書作晉兵移鎭長廣之不期城下以固守以功進號前將軍封建陵縣男下一本作䕫謂竺䕫也臣承蒼按不期當作不其下以固守以功六字當去一以字作䕫以固守功五字劉粹據項城沈狸屯髙橋沈字下當有叔字河南中國多湮没非所南本多字下有故字宜由闗稜威震􅹥􅹥字不見字書疑作殄謂震懾而殄滅之也宋書卷九十五考證
