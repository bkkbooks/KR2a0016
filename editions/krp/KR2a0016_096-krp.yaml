body:
  text: 宋書卷九十六梁沈約撰列傳第五十六鮮卑吐谷渾阿柴虜吐谷渾遼東鮮卑也父奕洛韓有二子長曰吐谷渾少曰若洛廆若洛廆别為慕容氏渾庻長廆正嫡父在時分七百户與渾渾與廆二部俱牧馬馬鬬相傷廆怒遣信謂渾曰先公處分與兄異部牧馬何不相逺而致鬬爭相傷渾曰馬是畜生食草飲水春氣發動所以致鬬鬬在於馬而怒及人邪乖别甚易今當去汝萬里於是擁馬西行日移一頓頓八十里經數頓廆悔悟深自咎責遣舊父老及長史乙那樓追渾令還渾曰我乃祖以來樹徳遼右又卜筮之言先公有二子福胙並流子孫我是卑庻理無並大今以馬致别殆天所啓諸君試擁馬令東馬若還東我當相隨去樓喜拜曰處可寒虜言處可寒宋言爾官家也即使所從二千騎共遮馬令回不盈三百歩欻然悲鳴突走聲若穨山如是者十餘軰一向一逺樓力屈又跪曰可寒此非復人事渾謂其部落曰我兄弟子孫並應昌盛廆當傳子及曾孫𤣥孫其間可百餘年我乃𤣥孫間始當顯耳於是遂西附隂山遭晉亂遂得上隴後廆追思渾作阿干之歌鮮卑呼兄為阿干廆子孫竊號以此歌為輦後大曲渾既上隴出罕开西零西零今之西平郡罕开今枹罕縣自枹罕以東千餘里曁丼松西至河南南界昴城龍涸自洮水西南極白蘭數千里中逐水草廬帳居以肉駱為糧西北諸雜種謂之為阿柴虜渾年七十二死有子六十人長吐延嗣吐延身長七尺八寸勇力過人性刻暴為昴城羌酋姜聰所刺劒猶在體呼子葉延語其大將絶㧞渥曰吾氣絶棺歛訖便逺去保白蘭白蘭地旣嶮逺又土俗懦弱易為控御葉延小意乃欲授與餘人恐倉卒終不能相制今以葉延付汝汝竭股肱之力以輔之孺子得立吾無恨矣抽劒而死嗣位十三年年三十五有子十二人葉延少而勇果年十歳縛草為人號曰姜聰每旦輙射之射中則喜不中則號呌泣涕其母曰讎賊諸將已屠膾之汝年小何煩朝朝自苦如此葉延嗚咽不自勝答母曰誠知無益然葉延罔極之心不勝其痛耳性至孝母病三日不能食葉延亦不食頗視書傳自謂曾祖奕洛韓始封昌黎公曰吾為公孫之子案禮公孫之子得氏王父字命姓為吐谷渾氏嗣立二十三年年四十三有子四人長子碎奚立碎奚性純謹三弟專權碎奚不能制諸大將共誅之碎奚憂哀不復攝事遂立子視連為世子委之事號曰莫賀郎莫賀宋言父也碎奚遂以憂死在位二十五年年四十二有子六人子視連以父憂卒不遊娱不酣宴在位十五年年四十一有子二人長曰視羆次烏紇提視羆嗣立十一年年四十二子樹洛干等並小弟烏紇提立紇提立八年年三十五視羆子樹洛干立自稱車騎將軍義熙初也樹洛干死弟阿犲自稱驃騎將軍譙縱亂蜀阿犲遣其從子西彊公吐谷渾敕來浞拓土至龍涸平康少帝景平中阿犲遣使上表獻方物詔曰吐谷渾阿犲介在遐表慕義可嘉宜有寵任今酬其來欵可督塞表諸軍事安西將軍沙州刺史澆河公未及拜受太祖元嘉三年又詔加除命未至而阿犲死弟慕璝立六年表曰大宋應運四海宅心臣亡兄阿犲慕義天朝欵情素著去年七月五日謁者董湛至宣傳眀詔顯授榮爵而臣私門不幸亡兄見背臣以懦弱負荷後任然天恩所報夲在臣門若更反覆懼停信命輙拜受寵任奉遵上㫖伏願詳處更授章䇿七年詔曰吐谷渾慕璝兄弟慕義至誠可嘉宜授䇿爵以甄忠欵可督塞表諸軍事征西將軍沙州刺史隴西公先是晉末金城東允街縣胡人乞伏乾歸擁部衆據洮河罕开自號隴西公乾歸死子熾磐立遣使詣晉朝歸順以為使持節都督河西諸軍事平西將軍公如故髙祖即位進號安西大將軍熾磐死子茂蔓立慕璝前後屢遣軍擊茂蔓率部落東奔隴右慕璝據有其地是歲赫連定於長安為索虜拓䟦燾所攻擁秦户口十餘萬西次罕开欲向涼州慕璝距擊大破之生擒定燾遣使求慕璝以定與之九年慕璝遣司馬趙敘奉貢獻并言二萬人㨗太祖加其使持節散騎常侍都督西秦河沙三州諸軍事征西大將軍西秦河二州刺史領護羌校尉進爵隴西王弟慕延為平東將軍慕璝兄樹洛干子拾寅為平北將軍阿豺子煒代鎮軍將軍詔慕璝南國將士昔沒在佛佛者竝悉致慕璝遣送朱昕之等五十五户一百五十四人慕璝死弟慕延立遣使奉表十五年除慕延使持節散騎常侍都督西秦河沙三州諸軍事征西大將軍領護羌校尉西秦河二州刺史隴西王十六年改封河南王其年以拾䖍弟拾寅為平西將軍慕延庶長子繁暱為撫軍將軍慕延嫡子瑍為左將軍河南王世子十九年追贈阿豺夲號安西秦沙三州諸軍事沙州刺史領護羌校尉隴西王索虜拓䟦燾遣軍擊慕延大破之慕延率部落西奔白蘭攻破于闐國慮虜復至二十七年遣使上表云若不自固者欲率部曲入龍涸越雟門并求牽車獻烏丸㡌女國金酒器胡王金釧等物太祖賜以牽車若虜至不自立聽入越雟虜竟不至也慕延死拾寅自立二十九年以拾寅為使持節督西秦河沙三州諸軍事安西將軍領護羌校尉西秦河二州刺史河南王拾寅東破索虜加開府儀同三司世祖大眀五年拾寅遣使獻善舞馬四角羊皇太子王公以下上舞馬歌者二十七首太宗泰始三年進號征西大將軍五年拾寅奉表獻方物以弟拾皮為平西將軍金城公前廢帝又進號車騎大將軍其國西有黄沙南北一百二十里東西七十里不生草木沙州因此為號屈眞川有鹽池丼谷嶺北有雀鼠同穴或在山嶺或在平地雀色白鼠色黄地生黄紫花草便有雀鼠穴白蘭土出黄金銅鐡其國雖隨水草大抵治慕賀州史臣曰吐谷渾逐草依泉擅彊塞表毛衣肉食取資佃畜而錦組繒紈見珍殊俗徒以商譯徃來故禮同北面自昔哲王雖存柔逺要荒回隔禮文弗被大不過子義著春秋晉宋垂典不修古則遂爵班上等秩擬台光辮髮稱賀非尚簪冕言語不通寧敷衮職雖復苞篚歲臻事惟賈道金罽氊眊非用斯急送迓煩擾獲不如亡若令肅慎年朝越裳歲饗固不容以異見書取髙前䇿聖人謂之荒服此言蓋有以也宋書卷九十六宋書卷九十六考證鮮卑吐谷渾傳廆當傳子及曾孫元孫一夲無傳字鮮卑呼兄為阿干干監夲訛于今改正在位十五年年四十一一一本作二宋書卷九十六考證
