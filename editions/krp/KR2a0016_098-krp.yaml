body:
  text: 宋書卷九十八梁沈約撰列傳第五十八氐胡略陽清水氐楊氏秦漢以來世居隴右為豪族漢獻帝建安中有楊騰者為部落大帥騰子駒勇健多計畧始徙仇池仇池地方百頃因以百頃為號四面斗絶髙平地方二十餘里羊腸蟠道三十六回山上豐水泉煑土成鹽駒後有名千萬者魏拜為百頃氐王千萬子孫名飛龍漸彊盛晋武假征西將軍還居略陽無子飬外甥令狐氏子為子名戊搜晋惠帝元康六年避齊萬年之亂率部落四千家還保百頃自號輔國將軍右賢王闗中士奔流者多依之戊搜延納撫接欲去者則衛䕶資遣之愍帝以為驃騎將軍左賢王時南陽王保在上邽又以戊搜子難敵為征南將軍建興五年戊搜卒難敵襲位與堅頭分部曲難敵號左賢王屯下辯堅頭號右賢王屯河池元帝太興四年劉曜伐難敵與堅頭俱奔晋壽臣於李雄曜退復還仇池成帝咸和九年難敵卒子毅立自號使持節龍驤將軍左賢王下辯公以堅頭子槃為使持節冠軍將軍右賢王河池公咸康元年遣使稱蕃於晋以毅為征南槃征東將軍三年毅族兄初襲殺毅并有其衆自立為仇池公臣於石虎後遣使稱蕃於穆帝永和三年以初為使持節征南將軍雍州刺史平羌校尉仇池公初子國為鎮東將軍武都太守十年改封初天水公十一年毅小弟宋奴使姑子梁式玉因侍値手刃殺初子國率左右誅式玉及宋奴復自立征西將軍桓温表國為鎮北將軍秦州刺史平羌校尉國子安為振威將軍武都太守十二年國從父楊俊復殺國自立安奔苻生俊遣使歸順升平三年以俊為平西將軍平羌校尉仇池公四年俊卒子世立復以為冠軍將軍平羌校尉武都太守仇池公海西公太和三年遷征西將軍秦州刺史以世弟統為寧東將軍武都太守五年世卒統廢世子纂自立纂一名徳聚黨殺統遣使詣簡文帝自陳復以纂為平羌校尉秦州刺史仇池公咸安元年苻堅遣楊安苻雅等討纂克之徙其民於闗中空百頃之地纂後為楊安所殺宋奴之死也二子佛奴佛狗奔逃闗中苻堅以佛奴為右將軍佛狗為撫夷䕶軍後以女妻佛奴子定以定為尚書領軍將軍孝武帝太元八年苻堅敗於淮南闗中擾亂定盡力奉堅堅死乃將家奔隴右徙治歴城城在西縣界去仇池百二十里置倉儲於百頃招合夷晋得千餘家自號龍驤將軍平羌校尉仇池公稱蕃於晋孝武帝孝武帝即以其自號假之求割天水之西縣武都之上禄為仇池郡見許十五年又以定為輔國將軍秦州刺史定已自署征西將軍又進持節都督隴右諸軍事輔國大將軍開府儀同三司校尉刺史如故其年進平天水畧陽郡遂有秦州之地自號西王至十九年攻隴西虜乞佛乾歸定軍敗見殺無子佛狗子盛先為監國守仇池襲位自號使持節征西將軍秦州刺史平羌校尉仇池公諡定為武王分諸四山氐羌為二十部䕶軍各為鎮戍不置郡縣安帝隆安三年遣使稱蕃奉獻方物安帝以盛為輔國將軍平羌校尉仇池公元興三年桓𤣥輔晋進盛平北將軍凉州刺史西戎校尉義熙元年姚興伐盛盛懼遣子難當為質興遣將王敏攻城因梁州別駕吕瑩求救於盛盛遣軍次濜口敏退以盛為都督隴右諸軍事征西大將軍開府儀同三司時益州刺史毛璩討桓元所置梁州刺史桓希敗走漢中空虚盛遣兄子平南將軍撫守漢中三年又假盛使持節北秦州刺史盛又遣將苻寧行梁州刺史代撫九年梁州刺史索邈鎭南城寧乃還髙祖踐阼進盛車騎大將軍加侍中永初三年改封武都王以長子元為武都王世子加號前將軍難當為冠軍將軍撫為安南將軍盛嗣位三十年太祖元嘉二年六月卒時年六十二私諡曰惠文王元字黄眉自號使持節都督隴右諸軍事征西大將軍開府儀同三司平羌校尉秦州刺史武都王雖為蕃臣猶奉義熙之號善待士為流舊所懐安南將軍撫有文武智畧元不能容三年因其子殺人并誅之文帝即以元為使持節征西將軍平羌校尉北秦州刺史武都王乃改義熙之號奉元嘉正朔初盛謂元曰吾年已老當為晋臣汝善事宋帝故元奉焉追贈盛驃騎大將軍餘如故六年六月元卒私諡曰孝昭王弟難當廢元子保宗一名羌奴而自立號使持節都督雍凉諸軍事秦州刺史平羌校尉武都王太祖以為冠軍將軍秦州刺史武都王九年進號征西將軍加持節都督校尉之號難當拜保宗為鎮南將軍鎮宕昌以次子順為鎮東將軍秦州刺史守上邽保宗謀襲難當事泄收繫之先是四方流民有許穆之郝恢之二人投難當並改姓為司馬穆之自云名飛龍恢之自云名康之云是晉室近戚康之尋為人所殺十年難當以益州刺史劉道濟失蜀土人情以兵力資飛龍使入蜀為㓂道濟擊斬之時梁州刺史甄法䕶刑法不理太祖遣刺史蕭思話代任難當因思話未至法䕶將軍下舉兵襲梁州破白馬獲晋昌太守張範法䕶遣參軍魯安期沈法慧等拒之並各奔退難當又遣建忠將軍趙進攻葭萌獲晋壽太守范延朗其年十一月法䕶委鎭奔洋川難當遂有漢中之地以氐苻粟持為梁州刺史又以其凶悍殺之以司馬趙温代為梁州十年正月思話使司馬蕭諱先驅進討所向剋㨗遂平梁州事在思話傳四月難當遣使奉表謝罪曰臣聞生成之徳含氣同係而榮悴殊途遭遇異兆至於恩降自然誠無答謝夫以狂聖道隔猶存克念之誠况君親莫二不期自感者哉每思自竭奉遵光訓丹誠未諒大謗已臻梁州刺史甄法䕶誣臣遣司馬飛龍擾亂西蜀諸所譛引言非一事長塗萬里無路自明風塵之聲日有滋甚與其逆生寧就清滅文武同憤制不自由遣參軍姚道賢齎書詣梁州刺史蕭思話尋續又遣詣臺歸罪道賢至西城為守兵所殺行李蔽擁日月莫照法護恇擾望風奔逃臣即回軍秋毫無犯權留少守以俟㑹通其後數旬官軍尋至守兵單弱懼不自免續遣輕兵共相迎接値秦流民懐土及本行將既旋不容禁制由臣約防無素以致斯闕臣本歴代守蕃世荷殊寵王化始基順天委命要名期義不在今日豈可假托妖妄毁敗成功如此之形灼然易見仰恃聖明必垂鑒察但臣㣲心不達迹違忠順至乃聲聞朝廷勞煩師旅負辱之深罪當誅責逺隔遐荒告謝無地謹遣兼長史齊亮聽命有司并奉送所授第十一符䇿伏待天旨太祖以其邊裔下詔曰楊難當表如此悔謝前愆可特恕宥并特還章節十二年難當釋保宗遣鎮童亭保宗奔索虜主拓䟦燾以為都督隴西諸軍事征西大將軍開府儀同三司平羌校尉南秦王遣襲上邽難當子順失守退以為雍州刺史守下辯十三年三月難當自立為大秦王號年曰建義立妻為王后世子為太子置百官具擬天朝然猶奉朝廷貢獻不絶十七年其國大旱多灾異降大秦王復為武都王十八年十月傾國南宼規有蜀土慮漢中軍出遣建忠將軍苻冲出東洛以防之梁州刺史劉道眞擊斬冲十一月難當剋葭萌獲晋壽太守申坦遂圍涪城巴西太守劉道銀嬰城固守難當攻之十餘日不剋乃還十九年正月太祖遣龍驤將軍裴方眀太子左積弩將軍劉康祖後軍參軍梁坦甲士三千人又發荆雍二州兵討難當受劉道眞節度五月方明等至漢中長驅而進道眞到武興攻偽建忠將軍苻隆剋之安西參軍韋俊建武將軍姜道盛別向下辯道眞又遣司馬夏侯穆季西取白水難當子雍州刺史順建忠將軍楊亮拒之並望風奔走閏月方眀至蘭臯難當鎮北將軍苻義徳建節將軍苻宏祖萬餘人列陣拒戰方眀擊破之斬宏祖殺二千餘人義徳遁去天水任愈之率部曲歸順難當世子撫軍大將軍和據修城方明又遣軍率愈之攻和大破之於是難當將妻子奔索虜死于虜中安西參軍魯尚期追難當出寒峽生禽建節將軍楊保熾安昌侯楊虎頭初難當遣第二子虎為鎭南將軍益州刺史守隂平聞父走逃還至下辯方明使子肅之要之生禽虎傳送京師斬于建康市仇池平以輔國司馬胡崇之為龍驤將軍秦州刺史平羌校尉守仇池索虜拓䟦燾遣安西大將軍吐奚弼平北將軍拓䟦齊等二萬人邀崇之二十年二月崇之至濁水去仇池八十里遇齊等戰敗沒餘衆奔還漢中三月前鎭東司馬苻達征西從事中郎任朏等舉義立保宗弟文徳為主拓䟦齊聞兵起遁走達追擊斬齊因據白崖分平諸戍文徳自號使持節都督秦河涼三州諸軍事征西大將軍秦河涼三州牧平羌校尉仇池公遣露板馳告朝廷太祖詔曰近者校尉仇池公表虜縱逸宼竊仇池將士挫傷民萌塗炭眷言西顧矜慨在懐楊文徳世篤忠順誠感家國糾率義徒奄殄凶醜鋒旗所向殱潰無遺氛䘲澄清蕃境寧一念功惟事良有欣嘉便可遣使慰勞宣示朝旨并敕梁州刺史申坦隨宜應援又詔曰顯録勲効盖惟國典施賞務速無或踰時楊文德志氣果到文武兼全乘機潜奮殊功仍集告㨗歸誠獻俘萬里朝無蹔土樹難自肅休烈照著朕甚嘉焉楊氏世祖西勞方忠累葉宜紹先緒膺受寵榮可使持節散騎常侍都督北秦雍二州諸軍事征西大將軍平羌校尉北秦州刺史封武都王任朏祖父岐伯父祚父綜並仕楊氏為諮議從事中郎朏有志幹文徳以為左司馬文徳既受朝命進戍茄蘆城二十五年為索虜所攻奔于漢中時世祖鎭襄陽執文徳歸之于京師以失守免官削爵土二十七年王師北討起文徳為輔國將軍率軍自漢中西入揺動汧隴文徳宗人楊髙率隂平平武羣氐據唐魯橋以拒文徳文徳水陸俱攻大破之衆並奔散髙遁走奔羌文徳追之至黎卬嶺髙單身投羌仇阿弱家追斬之隂平平武悉平又遣文徳伐啖提氐不剋梁州刺史劉秀之執送荆州使文徳從祖兄頭戍茄蘆荆州刺史南郡王義宣反文徳不同見殺世祖追贈征虜將軍秦州刺史孝建二年以保宗子元和為征虜將軍以頭為輔國將軍元和繼楊氏正統羣氐欲相宗推年小才弱不能綏御所部頭母妻子弟並為索虜所執頭至誠奉順無所顧懐朝廷旣不正元和號位部落未有定主雍州刺史王元謨上表曰被勑令臣遣使與楊元和楊頭相聞并致信餉即遣中軍行參軍吕智宗齎書并信等亦自遣使隨智宗及頭語智宗頃破家為國母妻子弟并墜沒虜中不顧孝道陳力邊捍竭忠盡誠未為朝廷所識若以元和承統宜授王爵若以其年小未堪大任則應別有所委頃來公私紛紜華戎交構皆此之由臣伏尋頭元嘉以來寔有忠誠於國棄親遺愛誠在可嘉氐羌負逺又與虜咫尺急之則反緩之則怨觀頭使人言語不敢便望仇池公所希政在西秦州假節而已如臣愚見蕃捍漢川使無慮患頭寔有力四千户荒州殆不足吝元和小弱若未可專委復數年之後必堪嗣業用之不難若才用不稱則應歸頭若茄蘆不守漢川亦無立理上不許其後立元和為武都王治白水不能自立復走奔索虜元和從弟僧嗣復自立還戍茄蘆以為寧朔將軍仇池太守太宗太始二年詔曰僧嗣逺守西疆世篤忠欵宜加旌顯以甄義槩可冠軍將軍北秦州刺史武都王太守如故三年加持節都督北秦雍二州諸軍事進號征西將軍校尉刺史如故僧嗣卒從弟文度復自立泰豫元年以為龍驤將軍略陽太守封武都王又改龍驤為寧朔將軍後廢帝元徽四年加督北秦州諸軍事平羌校尉北秦州刺史將軍如故文度遣弟龍驤將軍文宏伐仇池破戍兵於蘭臯順帝昇眀元年詔曰茂賞有章寔昭國度疇庸斯炳載宣史册督北秦州諸軍事寧朔將軍平羌校尉北秦州刺史武都王文度門乘輝寵世榮邊邑忠果既亮才勁兼彰龍驤將軍楊文宏肅恊成規躬提桴鼓申稜百頃席卷蘭臯功烈之美並足嘉歎宜膺爵授以酬勲緒文度可使持節都督北秦雍二州諸軍事征西將軍刺史校尉悉如故文宏輔國將軍略陽太守其年虜破茄蘆文度見殺追贈本官加㪚騎常侍以文宏督北秦州諸軍事平羌校尉北秦州刺史襲封武都王將軍如故退治武興大且渠䝉遜張掖臨松盧水胡人也匈奴有左且渠右且渠之官䝉遜之先為此職羌之酋豪曰大故且渠以位為氏而以大冠之世居盧水為酋豪䝉遜髙祖暉仲歸曽祖遮皆雄健有勇名祖祁復延封狄地王父法宏襲爵苻氏以為中田䕶軍䝉遜代父領部曲有勇略多計數為諸胡所推服吕光自王於涼州使䝉遜自領營人配箱直又以䝉遜叔父羅仇為西平太守安帝隆安三年春吕光遣子鎮東將軍纂率羅仇伐枹罕虜乞伏乾歸為乾歸所敗光委罪羅仇殺之四月䝉遜求還葬羅仇因聚萬餘人叛光殺臨松䕶軍屯金山五月光揮纂擊破䝉遜將六七人逃山中家户悉亡散時䝉遜兄男成將兵西守晋昌聞䝉遜反引軍還殺酒泉太守疊滕推建康太守叚業為主業自號龍驤大將軍涼州牧建康公以男成為輔國將軍男成及晋昌太守王徳圍張掖剋之業因據張掖䝉遜率部曲投業業以䝉遜為鎮西將軍臨池太守王徳為酒泉太守尋又以䝉遜領張掖太守三年四月業使䝉遜將萬人攻光弟子純於西郡經旬不剋乃引水灌城窘急乞降執之以歸時王德叛業自稱河州刺史業使䝉遜西討徳焚城將部曲走投晋昌太守唐瑶蒙遜追德至沙頭大破之虜其妻子部落而還轉西安太守將軍如故四年五月䝉遜與男成謀殺業男成不許䝉遜反譛男成於業業殺男成䝉遜乃謂其部曲曰叚公無道枉殺輔國吾為輔國報讎遂舉兵攻張掖殺叚業自稱車騎大將軍建號永安元年是月敦煌太守李暠亦起兵自號冠軍大將軍西胡校尉沙州刺史太守如故稱庚子元年與䝉遜相抗其冬暠遣唐瑶及鷹揚將軍宋繇攻酒泉獲太守大且渠益生蒙遜從叔也吕光死子纂立元年為從弟隆所簒姚興攻涼州隆稱臣請降䝉遜亦遣使詣興興以為鎭西將軍沙州刺史西海侯二年二月䝉遜與西平虜秃髪傉檀共攻涼州為隆所破十月傉檀復攻隆三年三月隆以蒙遜傉檀交逼遣弟超詣姚興求迎七月興遣將齊難迎隆隆說難伐䝉遜䝉遜懼遣弟為質獻寳貨於難乃止以武衛將軍王尚行涼州刺史而還義熙元年正月李暠改稱大將軍大都督涼州牧䕶羌校尉涼公五月移據酒泉姚興假傉檀涼州刺史代王尚屯姑臧二年九月䝉遜襲李暠至安彌去城六十里暠乃覺引軍出戰大敗退還閉城自守䝉遜亦歸六年䝉遜攻破傉檀傉檀走屯樂都武威人焦朗入姑臧自號驃騎大將軍臣于李暠八年蒙遜攻焦朗殺之據姑臧自號大都督大將軍河西王改稱𤣥始元年立子正德為世子十三年五月李暠死子歆立六月歆伐䝉遜至建康䝉遜拒之歆退走追到西支閒蒙遜大敗死者四千餘人乃収餘衆増築建康城置兵戍而還十四年蒙遜遣使詣晋奉表稱藩以蒙遜為涼州刺史髙祖踐阼以歆為使持節都督髙昌敦煌晉昌酒泉西海玉門堪泉七郡諸軍事護羌校尉征西大將軍酒泉公永初元年七月䝉遜東略浩舋李歆乘虚攻張掖䝉遜回軍西歸歆退走追至臨澤斬歆兄弟三人進攻酒泉剋之歆弟敦煌太守恂據郡自稱大將軍十月䝉遜遣世子正徳攻恂不下三年正月䝉遜自徃築長堤引水灌城數十日又不下三月恂武衛將軍宋丞廣武將軍宏舉城降恂自殺李氏由是遂亡於是鄯善王比龍入朝西域三十六國皆稱臣貢獻髙祖以䝉遜為使持節散騎常侍都督涼州諸軍事鎮軍大將軍開府儀同三司涼州刺史張掖公十二月晉昌太守唐契反復遣正徳攻契景平元年三月克之契奔伊吾八月芮芮來抄䝉遜遣正徳拒之正徳輕騎進戰軍敗見殺乃以次子興國為世子是歲進䝉遜侍中都督涼秦河沙四州諸軍事驃騎大將軍領護匈奴中郎將西夷校尉涼州牧河西王開府持節如故太祖元嘉元年枹罕虜乞伏熾槃出貂渠谷攻河西白草嶺臨松郡皆沒執䝉遜從弟成都從子日蹄頗羅等而去三年改驃騎為車騎世子興國遣使奉表請周易及子集諸書太祖並賜之合四百七十五卷䝉遜又就司徒王宏求搜神記宏寫與之六年䝉遜征枹罕時乞伏熾槃死矣子茂蔓大破䝉遜生禽興國殺三千餘人䝉遜贖興國送穀三十萬斛竟不遣䝉遜乃立興國母弟菩提為世子朝廷未知也七年以興國為冠軍將軍河西王世子其年夏四月西虜赫連定為索虜拓䟦燾所破奔上邽十一月茂蔓聞定敗將家户及興國東征欲移居上邽八年正月至南安定率衆禦茂蔓大破之殺茂蔓執興國而還四月定避拓䟦燾欲渡河西撃蒙遜五月率部曲至治城峽口渡河濟未半為吐谷渾慕璝所邀見獲興國被創數日死九年以菩提為冠軍將軍河西王世子十年四月䝉遜卒時年六十六私諡曰武宣王菩提年㓜䝉遜第三子茂䖍時為酒泉太守衆議推茂䖍為主襲䝉遜為號十一年茂䖍上表曰臣聞功以濟物為髙非竹帛無以述徳名以當寔為美非諡號無以休終先臣蒙遜西復涼城澤憺崑裔芟夷羣暴清灑區夏曁運鍾有道備大宋之宗臣爵班九服享惟永之丕祚功名昭著剋固貞節考終由正而請名之路無階懿跡雖𢎞而敘述之美有缺臣子痛感咸用不安謹案諡法剋定禍亂曰武善聞周達曰宣先臣廓清河外勲光天府標榜稱迹寔兼斯義輙上諡為武宣王若允天聽垂之史筆則幽顯荷榮始終無恨詔曰使持節侍中都督秦河沙涼四州諸軍事車騎大將軍開府儀同三司領護匈奴中郎將西夷校尉涼州牧河西王蒙遜才兼文武勲濟西服爰自萬里款誠夙著方仗忠果翼宣逺略奄至薨隕悽悼于懐便遣使弔祭并加顯諡嗣子茂䖍纂戎前軌乃心彌彰宜䝉寵授紹兹蕃業可持節㪚騎常侍都督涼秦河沙四州諸軍事征西大將軍領護匈奴中郎將西夷校尉涼州刺史河西王河西人趙􅜫善厯􅀢十四年茂䖍奉表獻方物并獻周生子十三卷時務論十二卷三國總略二十卷俗問十一卷十三州志十卷文檢六卷四科傳四卷燉煌寔錄十卷涼書十卷漢皇徳傳二十五卷王典七卷魏駮九卷謝艾集八卷古今字二卷乘邱先生三卷周髀一卷皇帝王厯三合紀一卷趙􅜫傳并甲寅元厯一卷孔子讚一卷合一百五十四卷茂䖍又求晉趙起居注諸雜書數十件太祖賜之十六年閏八月拓䟦燾攻涼州茂䖍兄子萬年為虜内應茂䖍見執茂䖍弟安彌縣侯無諱先為征西將軍沙州刺史都督建康以西諸軍事酒泉太守第六弟武興縣侯儀德為征東將軍秦州刺史都督丹領以西諸軍事張掖太守燾既獲茂䖍遣軍擊儀徳棄城奔無諱於是無諱儀德擁家户西就從弟燉煌太守唐兒燾使將守武威酒泉張掖而還十七年正月無諱使唐兒守燉煌自與儀徳伐酒泉三月剋之攻張掖臨松得四萬餘户還據酒泉十八年五月唐兒反無諱留從弟天周守酒泉復與儀徳討唐兒唐兒將萬餘人出戰大敗執唐兒殺之復據燉煌七月拓䟦燾遣軍圍酒泉十月城中饑萬餘口皆餓死天周殺妻以食戰士食盡城乃陷執天周至平城殺之于時虜兵甚盛無諱衆饑懼不自立欲引衆西行十一月遣弟安周五千人伐鄯善堅守不下十九年四月無諱自率萬餘家棄燉煌西就安周未至而鄯善王比龍將四千餘家走因據鄯善初唐契自晉昌奔伊吾是年攻髙昌髙昌城主闕爽告急八月無諱留從子豐周守鄯善自將家户赴之未至而芮芮遣軍救髙昌殺唐契部曲奔無諱九月無諱遣將衛尞夜襲髙昌爽奔芮芮無諱復據髙昌遣常侍氾儁奉表使京師獻方物太祖詔曰往年狡虜縱逸侵害涼土河西王茂䖍遂至不守淪䧟宼逆累世著誠以為矜悼次弟無諱克紹遺業保據方隅外結鄰國内輯民庻係心闕庭踐修貢職宜加朝命以褒篤勲可持節散騎常侍都督涼河沙三州諸軍事征西大將軍領䕶匈奴中郎將西夷校尉涼州刺史河西王無諱卒弟安周立二十一年詔曰故征西大將軍河西王無諱弟安周才略沈到世篤忠款統承遺業民衆歸懐雖亡士喪師孤立異所而能招率殘寡攘㓂自全宜加榮授垂軌先烈可使持節散騎常侍都督涼河沙三州諸軍事領西域戊已校尉涼州刺史河西王世祖大眀三年安周奉獻方物史臣曰氐藉世業之資胡因倔起之衆結根百頃跨有河西雖戎夷猾夏自擅荒服而才力雄富頗尚禮文楊氏兵精地險境接華漢伺隙邊闗首䑕疆場遂西入白馬東出黄金乘晉壽之㨗構圍涪之舋規吞黒水志傾井絡紀郢之勢方危樊鄧之心屢駭天子聽朝不怡有懐辛李之將而齊之宣皇率偏旅數百定命先驅推鋒直指勢踰風電雲徹席卷致届南城逐北追奔全勝萬里敵人皆裹骨輿屍越至險而自竄其餘皆膏身山野委骸川澤既而裴劉二將藉其威聲故使濁水靡旗蘭臯失險氐族轉徙奔亾遺燼不滅者若線梁土獲乂以迄于今由此而言功烈可謂盛矣宋書卷九十八宋書卷九十八考證氐胡傳闗中士奔流者多依之中字下一本有人字十二年難當釋保宗遣鎮童亭後魏書作薫亭水經注作董亭楊氏世祖西勞方忠累葉勞字當在忠字下宋書卷九十八考證
