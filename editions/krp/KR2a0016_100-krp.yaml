body:
  text: 宋書卷一百梁沈約撰列傳第六十自序昔少皥金天氏有裔子曰昧為𤣥㝠師生允格䑓駘䑓駘能業其官宣汾洮障大澤以處太原帝顓頊嘉之封諸汾川其後四國沈姒蓐黄沈子國今汝南平輿沈亭是也春秋之時列於盟㑹定公四年諸侯㑹召陵伐楚沈子不㑹晋使蔡伐沈滅之以沈子嘉歸其後因國為氏自兹以降譜諜罔存秦末有沈逞徴丞相不就漢初逞曽孫保封竹邑侯保子遵自本國遷居九江之夀春官至齊王太傅敷徳侯遵子達驃騎将軍達子乾尚書令乾子宏南陽太守宏子勗河内守勗子奮御史中丞奮子恪將作大匠恪子謙尚書闗内侯謙子靖濟隂太守靖子戎字威卿仕州為從事說降劇賊尹良漢光武嘉其功封為海昬縣侯辭不受因避地徙居㑹稽烏程縣之餘不鄉遂世家焉順帝永建九年分㑹稽為吴郡復為吴郡人靈帝初平五年分烏程餘杭為永安縣吴孫晧寶鼎二年分吴郡為吴興郡復為郡人雖邦邑屢改而築室不遷晋武帝平吴後太康二年改永安為武康縣史臣七世祖延始居縣東鄉之博陸里餘烏邨王父從官京師義熙十一年髙祖賜舘于建康都亭里之運巷戎子酆字聖通零陵太守致黄龍芝草之瑞第二子滸字仲髙安平相少子景河間相演之慶之曇慶懐文其後也滸子鸞字建光少有髙名州舉茂才公府辟州別駕從事史時廣陵太守陸稠鸞之舅也以義烈政績顯名漢朝復以女妻鸞年二十三早卒子直字仲平州舉茂才亦有清名年二十八卒子儀字仲則少有至行兄瑜十嵗儀九嵗而父亡居䘮過禮毁瘠過於成人外祖㑹稽盛孝章漢末名士也深加憂傷每撫慰之曰汝竝黄中沖爽終成竒器何為逾制自取殄滅邪三年禮畢殆至滅性故兄弟竝以孝著瑜早卒儀篤學有雄才以儒素自業時海内大亂兵革竝起經術道弛士少全行而儀淳深隠黙守道不移風操貞堅不妄交納唯與族子仲山叔山及吴郡陸公紀友善州郡禮請二府交辟公車徵竝不屈以夀終子憲字元禮左中郎新都都尉定陽侯才志顯於吴朝子矯字仲桓以節氣立名仕為立武校尉偏將軍封列侯建威将軍新都太守孫皓時有將帥之稱吴平後為鬱林長沙太守竝不就太康末卒子陵字景髙太傅東海王越辟為從事元帝之為鎭東将軍命參軍事徐馥作亂殺吴興太守袁琇陵討平之子延字思長桓温安西參軍潁川太守子賀字子寧桓沖南中郎參軍圍袁眞於夀陽遇疾卒子警字世明惇篤有行業學通左氏春秋家世富殖財產累千金仕郡主簿後將軍謝安命為參軍甚相敬重警内足於財為東南豪士無仕進意謝病歸安固留不止乃謂警曰沈參軍卿有獨善之志不亦髙乎警曰使君以道御物前所以懷徳而至既無用佐時故遂飲啄之願爾還家積載以素業自娱前將軍青兗二州刺史王恭鎭京口與警有舊好復引為參軍手書慇懃苦相招致不得已而應之尋復謝職子穆夫字彥和少好學亦通左氏春秋王恭命為前軍主簿與警書曰足下既執不㧞之志髙臥東南故屈賢子共事非以吏職嬰之也初錢唐人杜子恭通靈有道術東土豪家及京邑貴望竝事之為弟子執在三之敬警累世事道亦敬事子恭子恭死門徒孫泰泰弟子恩傳其業警復事之隆安三年恩於㑹稽作亂自稱征東將軍三吳皆響應穆夫時在㑹稽恩以為前部參軍振武將軍餘姚令其年十二月二十八日恩為劉牢之所破輔國將軍髙素於山隂囬踵埭執穆夫及偽吴郡太守陸瓌之吴興太守丘尫竝見害函首送京邑事見隆安故事先是宗人沈預素無士行為警所疾至是警聞穆夫預亂逃藏将免矣預以告官警及穆夫弟仲夫任夫預夫佩夫竝遇害唯穆夫子淵子雲子田子林子䖍子獲全淵子字敬深少有志節隨髙祖克京城封繁畤縣五等侯參鎮軍車騎中軍事又為道規輔國征西參軍領寕蜀太守與劉基共斬蔡猛於大簿還為太尉參軍從征司馬休之與徐逵之同没時年三十五子正字元直淹詳有器度美風姿善容止好老莊之學弱冠州辟從事宗人光祿大夫演之稱之曰此宗中千里駒也出為始寕烏傷婁令母憂去職服闋為隨王誕後軍安南行參軍誕鎭㑹稽復參安東軍事元嘉三十年元凶弑立分江東為㑹州以誕為刺史誕將受命正說司馬顧琛曰國家此禍開闢未聞今以江東義鋭之衆為天下倡始若馳一介四方詎不響應以此雪朝廷寃耻大明臣子之節豈可北面凶逆使殿下受其偽寵琛曰江東忘戰日久士不習兵雖云逆順不同然彊弱又異當須四方有義舉者然後應之不為晩也正曰天下若有無父之國則可矣茍其不爾寧可自安讎耻而責義於餘方今正以弑逆寃醜義不同戴舉兵之日豈求必全耶馮衍有言大漢之貴臣將不如荆齊之賤士乎况殿下義兼臣子事寔家國者哉琛乃與正俱入說誕誕猶預未决㑹尋陽義兵起世祖使至誕乃加正寧朔將軍領軍繼劉季之誕入為驃騎大將軍正為中兵參軍遷長水校尉孝建元年移青州鎮歴城臨淄地空除寕朔將軍齊北海二郡太守委以全齊之任未拜二年卒時年四十三正生好樂厚自奉飬既終之後家無餘財淵子弟雲子元嘉中為晋安太守雲子子煥字士蔚少為駙馬都尉奉朝請元凶之入弑也煥時兼中庶子直坊逼從入䑓劭既自立以為羽林監辭不拜拜員外㪚騎侍郎使防南譙王義宣諸子事在義宣傳仍除丞相行參軍員外㪚騎侍郎南昌令有能名晋平王休祐驃騎中兵記室參軍同僚皆以諂進煥獨不頃之記室參軍周敬祖等為太宗所責得罪轉煥諮議參軍後廢帝元徽中以為寧逺將軍交州刺史未至鎭病卒時年四十五田子字敬光雲子弟也從髙祖克京城進平京邑參鎮軍軍事封營道縣五等侯義熙五年髙祖北伐鮮卑田子領偏師與龍驤將軍孟龍符為前鋒慕容超屯臨朐以距大軍龍符戰沒田子力戰破之及盧循逼京邑髙祖遣田子與建威將軍孫季髙由海道襲廣州加振武将軍循黨徐道覆還保始興田子復與右将軍劉藩同共攻討循尋還廣州圍季髙田子慮季髙孤危謂藩曰廣州城雖險固本是賊之巢穴今循還圍之或有内變且季髙衆力寡弱不能持久若使賊還據此凶勢復振下官與季髙同履艱難汎滄海於萬死之中克平廣州豈可坐視危逼不相拯救於是率軍南還比至賊已收其㪚卒還圍廣州季髙單守危廹聞田子忽至大喜田子乃背水結陳身率先士卒一戰破之於是摧鋒追討又破循於蒼梧鬱林寧浦還至廣州而季髙病死既兵荒之後山賊競出攻沒城郭殺害長吏田子隨宜討伐旬日平殄刺史褚升度至乃還京師除太尉參軍振武將軍淮陵内史賜爵都鄉侯復參世子征虜軍事将軍内史如故八年從討劉毅十一年復從討司馬休之領别軍與征虜將軍趙倫之參征虜軍事振武將軍扶風太守十二年髙祖北伐田子與順陽太守傅宏之各領别軍從武闗入屯據青泥姚泓欲自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率歩軍數萬奄至青泥田子本為疑兵所領裁數百欲擊之傅宏之曰彼衆我寡難可與敵田子曰師貴用竒不必在衆宏之猶固執田子曰衆寡相傾勢不兩立若使賊圍既固人情䘮沮事便去矣及其未整薄之必克所謂先人有奪人之志也便獨率所領鼓而進合圍數重田子撫其士卒曰諸君捐親戚棄墳墓出矢石之間正希今日爾封侯之業其在此乎乃棄糧毁舎躬勒士卒前後奮擊所向摧陷所領江東勇士便習短兵鼓譟奔之賊衆一時潰㪚所殺萬餘人得泓偽乗輿服御髙祖表言曰參征虜軍事振武將軍扶風太守沈田子率領勁銳背城電激身先士卒勇冠戎陳奮寡對衆所向必摧自辰及未斬馘千數泓䘮旗棄衆奔還覇西咸陽空盡義徒四合清蕩餘燼勢在跂踵天子慰勞髙祖曰逋宼阻隘晏安假日舉斧函谷規延王誅羣師勤王將離寒暑公躬秉鈇鉞稜威首塗戎輅載脂則郊壘疊卷崤陜甫踐則潼塞開扄姚泓窘逼棄城送死藍田偏師覆之霸川甲首成林俘獲蔽野偽首奔迸華戎雲集積紀逋寇旦夕夷殄長安既平髙祖燕于文昌殿舉酒賜田子曰咸陽之平卿之功也即以咸陽相賞田子謝曰咸陽之平此實聖略所振武臣效節田子何力之有即授咸陽始平二郡太守大軍既還桂陽公義眞留鎭長安以田子為安西中兵參軍龍驤將軍始平太守時佛佛來寇田子與安西司馬王鎭惡俱出北地禦之初髙祖將還田子及傳宏之等竝以鎭惡家在闗中不可保信屢言之髙祖髙祖曰今留卿文武將士精兵萬人彼若欲為不善正足自滅勿復多言及俱出北地論者謂鎭惡欲盡殺諸南人以數千人送義眞南還因據闗中反叛田子與宏之謀矯髙祖令誅之併力破佛佛安闗中然後南還謝罪田子宗人沈敬仁驍果有勇力田子於宏之營内請鎭惡計事使敬仁於坐殺之率左右數十人自歸義眞長史王修收殺田子於長安槀倉門外是嵗義熙十四年正月十五日也時年三十六田子初以功應封因此事寢髙祖表天子以田子卒發狂易不深罪也無子弟林子以第二子亮為後亮字道眀清操好學善屬文未弱冠州辟從事㑹稽太守孟顗在郡不法亮糾劾免官又言災異轉西曹主簿時三吳水渰榖貴民饑刺史彭城王義康使立議以救民急亮議以東土災荒民凋榖踊富民蓄米日成其價宜班下所在隠其虛實令積蓄之家聼留一年儲餘皆勒使糶貨為制平價此所謂常道行於百世權宜用於一時也又緣淮嵗豐邑富地穣麥既已登黍粟行就可析其估賦仍就交市三吳饑民即以貸給使強壯轉運以贍老弱且酒有喉唇之利而非飡餌所資尤宜禁斷以息遊費即竝施行世祖出鎭歴陽行參征虜軍事民有盗發冡者罪所近村民與符伍遭刼不赴救同坐亮議曰尋發冡之情事止竊盗徒以侵亡犯死故同之嚴科夫穿掘之侶必銜枚以晦其迹刼掠之黨必讙呼以威其事故赴凶赫者易應潜密者難且山原為無人之鄉丘壟非恒塗所踐至於防救不得比之村郭督實效名理與刼異則符伍之坐居宜降矣又刼罰之科雖有同符伍之限而無逺近之斷夫冡無村界當以比近坐之若不域之以界則數歩之内與十里之外便應同罹其責防民之禁不可頓去止非之憲宜當其律愚謂相去百歩同赴告不時者一嵗刑自此以外差不及罰又啟太祖陳府事曰伏見西府兵士或年㡬八十而猶伏隸或年始七嵗而已從役衰耗之體氣用湮微兒弱之軀肌膚未實而使伏勤昏稚騖苦傾晩於理旣薄為益實輕書制休老以六十為限役少以十五為制若力不周務故當粗存優減詔曰前已令卿兄改革尋値遷囘竟是不施行耶今更勅西府也時營創城府功課嚴促亮又陳之曰經始城宇莫非造創基築既廣夫課又嚴不計其勞茍務其速以嵗月之事求不日之成比見役人未眀土作閉鼓乃休呈課旣多理有不逮至於息日拘備闗限方渉暑雨多有死病頃日所承亦頗有逃逸竊惟此既内藩事殊外鎭撫莅之宜無繫早晩若得少寛其工課稍均其優劇徒隸既苦易以悦加考其卒功廢闕無㡬臣聞不居其職不謀其事庖割有主尸不越樽豈臣疎小所當預議但臣泳恩嵗厚服義累世茍是所懷忘其常體詔答曰啟之甚佳此亦由來常患比屢敕之猶復如此甚為無理近復令孟休宣㫖想當不同卿比可密觀其優劇也始興王濬臨揚州復為主簿秣陵令善擿奸伏有非必禽太祖稱其能入為尚書都官郎襄陽地接邊闗江左來未有皇子重鎭元嘉二十二年世祖出為撫軍將軍雍州刺史天子甚留心以舊宛北接二闗咫尺崤陜蓋襄陽之北扞且表裏彊蠻盤𢃄疆場以亮為南陽太守加揚武将軍邊蠻畏服皆納賦調有數村狡猾亮悉誅之遣吏廵行諸縣孤寡老疾不能自存者皆就蠲養耆年老齒嵗時有餼時儒學崇建亮開置庠序訓授生徒民多發冡并婚嫁違法皆嚴為條禁郡界有古時石堨蕪廢嵗久亮籖世祖修治之曰施生興業首教農畝立民崇政訓本播穡故能殷邦康俗禮節用成頃北洛侵蕪南宛彫毁獫狁肆凶犬夷充疆逺肅𤇺驛近虞郊閈遂使沃衍弗井巨防莫修窘力輟耕闕於分地凶荒無待流冗及今禮化孚内威禁清外斯實去盗修畝昭農緒稼之時𢎞圖廣務拓土祈年之日殿下降心育物振民復古且方提封榛棘綏入殊荒竊見郡境有舊石堨區野腴潤實為神臯而蕪決稍積久廢其利凡管所見謂宜創立昔文翁守官起沃成產偉連撫民開奥増業惠昭二邦庸列兩漢雖效政圖功不見所絶聯事惟沗憂同職同闕又修治馬人陂民獲其利在任四年遷南譙王義宣司空中兵參軍詔曰陜西心膂須才故授卿此職隨王誕鎭襄陽復為後軍中兵領義成太守亮莅官清約為太祖所嘉賜以車馬服玩前後累積毎逺方貢獻絶國勲器輙班賚焉又賜書二千卷二十七年卒官時年四十七所著詩賦頌讚三言誄哀辭祭告請雨文樂府挽歌連珠教記白事牋表籖議一百八十九首林子字敬士田子弟也少有大度年數嵗隨王父在京口王恭見而竒之曰此兒王子師之流也與衆人共見遺寳咸爭趨之林子直去不顧年十三遇家禍時雖逃竄而哀號晝夜不絶聲王母謂之曰汝當忍死彊視何為空自殄絶林子曰家門酷横無復假日之心直以至讎未復故且茍存爾一門既陷妖黨兄弟竝應從誅逃伏草澤常慮及禍而沈預家甚彊富志相陷滅林子與諸兄晝藏夜出即貨所居宅塋墓葬父祖諸叔凡六䘮儉而有禮時生業已盡老弱甚多東土饑荒易子而食外迫國網内畏彊讎沈伏山草無所投厝時孫恩屢出㑹稽諸將東討者相續劉牢之髙素之徒縱其下虜暴縱横獨髙祖軍政嚴眀無所侵犯林子乃自歸曰妖賊擾亂僕一門悉被驅逼父祖諸叔同罹禍難猶復偷生天壤者正以仇讎未復親老漂寄爾今日見將軍伐惡旌善是有道之師謹率老弱歸罪請命因流涕哽咽三軍為之感動髙祖甚竒之謂曰君既是國家罪人彊讎又在鄉里唯當見隨還京可得無恙乃載以别船遂盡室移京口髙祖分宅給焉博覧衆書留心文義從髙祖尅京城進平都邑時年十八身長七尺五寸沈預慮林子為害常被甲持戈至是林子與兄田子還東報讎五月夏節日至預正大集會子弟盈堂林子兄弟挺身直入斬預首男女無長㓜悉屠之以預首祭父祖墓仍為本郡所命毅又板為冠軍叅軍竝不就林子以家門荼蓼無復仕心髙祖敦逼至彌年不起及髙祖為揚州辟為從事謂曰卿何由遂得不仕頃年相申欲令萬物見卿此心爾固辭不得已然後就職領建熙令封資中縣五等侯時年二十一義熙五年從伐鮮卑行叅鎭軍軍事大軍於臨朐交戰賊遣虎班突騎馳軍後林子率精勇東西奮擊皆大破之慕容超退守廣固復與劉敬宣攻其西隅廣固既平而盧循奄至初循之下也廣固未㧞循潜遣使結林子及宗人叔長林子即宻白髙祖叔長不以聞反以循㫖動林子叔長素驍果髙祖以超未平隠之還至廣固乃誅叔長謂林子曰昔魏武在官渡汝兖之士多懐貳心唯李通獨斷大義古今一也循至蔡州貴遊之徒皆議逺徙唯林子請移家京邑髙祖怪而問之對曰耿純盡室從戎李典舉宗居魏林子雖才非古人實受恩深重髙祖稱善久之林子時領别軍於石頭屢戰摧冦循毎戰無功乃偽揚聲當悉衆於白石歩上而設伏於南岸故大軍初起白石留林子與徐赤將斷拒查浦林子乃進計曰此言妖詐未必有實宜深為之防髙祖曰石頭城險且淮柵甚固留卿在後足以守之大軍既去賊果上赤將將擊之林子曰賊聲徃白石而屢來挑戰其情狀可知矣賊飬鋭待期而吾衆不盈二旅難以有功今距守此險足以自固若賊偽計不立大軍尋反君何患焉赤將曰今賊悉衆向白石留者必皆羸老以鋭卒擊之無不破也便鼓譟而出賊伏兵齊發赤將軍果敗棄軍奔北岸林子率軍收赤將㪚兵進戰摧破之徐道覆乃更上鋭卒㳂塘數里林子䇿之曰賊㳂塘結陣戰者不過一隊今我據其津而阨其要彼雖鋭師數里不敢過而東必也於是乃斷塘而鬬久之㑹朱齡石救至與林子并勢賊乃㪚走大軍至自白石殺赤將以殉以林子叅中軍軍事從征劉毅轉叅太尉軍事十一年復從討司馬休之髙祖毎征討林子輒摧鋒居前雖有營部至於宵夕輒勅還内侍賊黨郭亮之招集蠻衆屯據武陵武陵太守王鎭惡出奔林子率軍討之斬亮之於七里澗納鎭惡武陵既平復討魯軌於石城軌棄衆奔襄陽復追躡之襄陽既定權留守江陵十二年髙祖領平北將軍林子以太尉叅軍復叅平北軍事其冬髙祖伐羌復叅征西軍事悉署三府中兵加建武将軍統軍為前鋒從汴入河時襄邑降人董神虎有義兵千餘人髙祖欲綏懐初附即板為太尉叅軍加揚武將軍領兵從戎林子率神虎攻倉垣尅之神虎伐其功徑還襄邑林子軍次襄邑即殺神虎而撫其衆時偽建威將軍河北太守薛帛先據觧縣林子至馳徃襲之帛棄軍奔闗中林子收其兵糧偽并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎭惡攻潼闗姚泓聞大軍至遣偽東平公姚紹爭據潼闗林子謂道濟曰今蒲坂城堅池深不可旬日而剋攻之則士卒傷守之則引日久不如棄之還援潼闗且潼闗天阻所謂形勝之地鎭惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力爭之若潼闗事㨗尹昭可不戰而復道濟從之既至紹舉闗右之衆設重圍圍林子及道濟鎭惡等時懸師深入糧輸艱逺三軍疑阻莫有固志道濟議欲渡河避其鋒或欲棄捐輜重還赴髙祖林子按劔曰相公勤王志清六合許洛已平闗右將定事之濟否所係前鋒今捨已㨗之形棄垂成之業大軍尚逺賊衆方盛雖欲求還豈可復得下官受命前驅誓在盡命今日之事自為將軍辦之然二三君子或同業艱難或荷恩罔極以此退撓亦何以見相公旗鼓耶塞井焚舎示無全志率麾下數百人犯其西北紹衆小靡乗其亂而薄之紹乃大潰俘虜以千數悉獲紹器械資實時諸將破賊皆多其首級而林子獻㨗書至每以實聞髙祖問其故林子曰夫王者之師本有征無戰豈可復増張虚獲以自夸誕國淵以事實見賞魏尚以盈級受罰此亦前事之師表後乗之良轍也髙祖曰乃所望於卿也初紹退走還保定城留偽武衛將軍姚鸞精兵守嶮林子銜枚夜襲即屠其城劓鸞而坑其衆髙祖賜書曰頻再破賊慶快無譬旣屢摧破想不復乆爾紹復遣撫軍將軍姚讃將兵屯河上絶水道讃壘塹未立林子邀擊連破之讃輕騎得脫衆皆奔敗紹又遣長史領軍將軍姚伯子寧朔將軍安鸞䕶軍姚黙騾平逺將軍河東太守唐小方率衆三萬屯據九泉憑河固險以絶糧援髙祖以通津阻要兵糧所急復遣林子爭據河源林子率太尉行叅軍嚴綱竺靈秀卷甲進討累戰大破之即斬伯子黙騾小方三級所俘馘及騾馬器械甚多所虜獲三千餘人悉以還紹使知王師之𢎞兵糧兼儲三軍鼔行而西矣或曰彼去國逺鬬其鋒不可當林子白髙祖曰姚紹氣蓋闗右而力以勢屈外兵屢敗衰亡恊兆但恐㐫命先盡不得以釁齊斧爾尋紹忽死可謂天誅於是讃統後事鳩集餘衆復襲林子林子率師禦之旗鼔未交一時披潰讃輕騎遁走既連戰皆㨗士馬旌旗其盛髙祖賜書勸勉并致縑帛肴漿髙祖至閿鄉姚泓掃境内之民屯兵堯桞時田子自武闗北入屯軍藍田泓自率大衆攻之髙祖慮衆寡不敵遣林子歩自秦嶺以相接援比至泓已摧破兄弟復共追討泓乃舉衆奔覇西田子欲窮追進取長安林子止之曰往取長安如指掌爾復尅賊城便為獨平一國不賞之功也田子乃止復叅相國事總任如前林子威聲逺聞三輔震動闗中豪右望風請附西州人李焉等竝求立功孫妲羗雜夷及姚泓親屬盡相率歸林子髙祖以林子綏略有方頻賜書褒羙并令深慰納之長安既平殘羗十餘萬口西奔隴上林子追討至寡婦水轉鬬達于槐里尅之俘獲萬計大軍東歸林子領水軍於石門以為聲援還至郡髙祖器其才智不使出也故出仕以來便管軍要自非戎軍所指未嘗外典焉後太祖出鎮荆州議以林子及謝晦為蕃佐髙祖曰吾不可頓無二人林子行則晦不宜出乃以林子為西中郎中兵叅軍領新興太守林子思議𢎞深有所陳畫髙祖未嘗不稱善大軍還至彭城林子以行役既久士有歸心深陳事宜并言聖王所以戒慎祗肅非以崇威立武寔乃經國長民宜廣建蕃屏崇嚴宿衛髙祖深相訓納俄而謝翼謀反髙祖歎曰林子之見何其眀也太祖進號鎭西隨府轉加建威將軍河東太守時髙祖以二虜侵擾復欲親戎林子固諌髙祖答曰吾輒當不復自行髙祖踐阼以佐命功封漢夀縣伯食邑六百戸固讓不許傅亮與林子書曰班爵疇勲歴代常典封賞之發簡自帝心主上委寄之懷實叅休否誠心所期同國榮戚政復是卿諸人共𢎞建内外爾足下雖存挹退豈得獨為君子邪除府諮議參軍將軍太守如故尋召暫下以中兵局事副錄事參軍王華上以林子清公勤儉賞賜重疊皆散於親故家無餘財未嘗問生產之事中表孤貧悉歸焉遭母憂還東葬乗輿躬幸信使相望葬畢詔曰軍國多務内外須才前鎭西諮議建威將軍河東太守沈林子不得遂其情事可起輔國將軍林子固辭不許賜墨詔朔望不復還朝毎軍國大事輒詢問焉時領軍將軍謝晦任當國政晦毎疾寧輒攝林子代之林子居䘮至孝髙祖深相憂愍頃之有疾上以林子孝性不欲使哭泣減損逼與入省日夕撫慰敕諸公曰其至性過人卿等數慰視之小差乃出上尋不豫被勑入侍醫藥㑹疾動還外永初三年薨時年四十六羣公知上深相矜重恐以實啓必有損慟毎見呼問輒答疾病還家或有中㫖亦假為其答髙祖尋崩竟不知也賜東園秘器朝服一具衣一襲錢二十萬布二百疋詔曰故輔國將軍沈林子器懐眞審忠績允著才志未遂傷悼在懐可追贈征虜將軍有司率常典也元嘉二十五年諡曰懐伯林子簡泰亷靖不交接世務義讓之羙著於閨門雖在戎旅語不及軍事所著詩賦賛三言箴祭文樂府表牋書記白事啓事論老子一百二十一首太祖後讀林子集歎息曰此人作公應繼王太保子邵嗣邵字道輝羙風姿渉獵文史襲爵駙馬都尉奉朝請太祖以舊恩召見入拜便流涕太祖亦悲不自勝㑹彊弩將軍缺上詔錄尚書彭城王義康曰沈邵人身不惡吾與林子周旋異常可以補選事見宋文帝中詔於是拜彊弩將軍出為鍾離太守在郡有惠政夾淮人民慕其化逺近莫不投集郡先無市時江夏王義恭為南兗州啓太祖置立焉事見宋文帝中詔義恭又啓太祖曰旴𣅿太守劉顯眞求自解說邵往莅任有績彰於民聽若重授旴𣅿足為良二千石上不許曰其願還經年方復作此流遷必當大罔罔也事見宋文帝中詔上勑州辟邵弟亮邵以從弟正蚤孤乞移恩於正上嘉而許之在任六年入為衡陽王義季右軍中兵參軍始興王濬初開後軍府又為中兵義季在江陵安西府中兵久缺啓太祖求人上答曰稱意才難得沈邵雖未經軍事旣是腹心作鍾離郡及在後軍府房中甚修理或欲遣之其事不果事見宋文帝中詔入為通直郎時上多行幸還或侵夜邵啓事陳論即為簡田前後密陳政要上皆納用之深相寵待晨夕兼侍毎出游或勑同輦時車駕祀南郊特詔邵兼侍中負璽代眞官陪乗大將軍彭城王義康出鎭豫章申謨為中兵參軍掌城防之任廬陵王紹為江州以邵為南中郎府錄事參軍行府州事事未行㑹謨丁艱邵代謨為大將軍中兵加寧朔將軍事見宋文帝中詔邵南行上遂相任委不復選代仍兼錄事領城局後義康被廢邵改為廬陵王紹南中郎參軍將軍如故義康徙安成邵復以本號為安成相在郡以寛和恩信為南土所懐郡民王孚有學業志行見稱州里邵莅任未㡬而孚卒邵贈以孝亷板教曰前文學主簿王孚行絜業淳棄華息競志學修道老而彌篤方授右職不幸暴亡可假孝亷檄薦以特牲緬想延陵以遂本懷邵慰䘏孤老勸課農桑前後累蒙賞賜邵疾病使命累續遣御醫上藥異味逺珍金帛衣裘相望不絶元嘉二十六年卒時年四十三上甚相痛悼子侃嗣官至山陽王休祐驃騎中兵叅軍南沛郡太守侃卒子整應襲爵齊受禅國除璞字道眞林子少子也童孺時神意閑審有異於衆太祖問林子聞君小兒器質不凡甚欲相識林子令璞進見太祖竒璞應對謂林子曰此非常兒年十許嵗智度便有大成之姿好學不倦善屬文時有憶識之功尤練究萬事經耳過目人莫能欺之居家精理姻族資賴弱冠吴興太守王韶之再命不就張邵臨郡又命為主簿除南平王左常侍太祖引見謂曰吾昔以弱年出蕃卿家以親要見輔今日之授意在不薄王家之事一以相委勿以國官乖清塗為罔罔也元嘉十七年始興王濬為揚州刺史寵愛殊異以為主簿時順陽范曅為長史行州事曅性頗疎太祖召璞謂曰神畿之政既不易理濬以弱年臨州萬物皆屬耳目賞罰得失特宜詳慎范曅性疎必多不同卿腹心所寄當密以在意彼雖行事其實委卿也璞以任遇既深乃夙夜匪懈其有所懐輒以密啓毎至施行必從中出曅正謂聖眀留察故深更恭愼而莫見其際也在職八年神州大治民無謗黷璞有力焉二十二年范曅坐事誅于時濬雖曰親覽州事一以付璞太祖從容謂始興王曰沈璞奉時無纎介之失在家有孝友之稱學優才贍文義可觀而沈深守静不求名譽甚佳汝但應委之以事乃宜引與晤對濬既素加賞遇又敬奉此㫖璞嘗作舊宫賦久而未畢濬與璞疏曰卿嘗有速藻舊宫何其淹耶想行就爾璞因事陳答辭義可觀濬重教曰卿沈思淹日向聊相敦還白斐然遂兼紙翰昔曹植有言下筆成章良謂逸才贍藻誇其辭說以今況之方知其信執省躊躇三復不已吾逺慙楚元門盈申白之賓近愧梁孝庭列枚馬之客欣恧交至諒唯深矣薄因末牘以代一面又與主簿顧邁孔道存書曰沈璞淹思踰嵗卿研慮數旬瓌麗之美信同在昔向聊問之而逺答累翰辭藻豔逸致慰良多既欣股肱備此髦楚還慙于躬無徳而稱復裁少字宣志於璞聊因尺紙使卿等具知厥心此書真本猶存濬年既長璞固求辭事上雖聼許而意甚不恱以璞為濬始興國大農尋除秣陵令時天下殷實四方輻輳京邑二縣號為難治璞以清嚴制下端平待物奸吏歛手猾民知懼其閭里少年博徒酒客或財利爭鬬妄相誣引前後不能判者璞皆知其名姓及巧詐縁由探擿是非各標證據或辨甲有以知乙或驗東而西事自顯莫不厭伏有如神眀以疾去職太祖厚加存問賞賜甚厚濬出為南徐州謂璞曰濬既出蕃卿故當臥而䕶之與濬詔曰沈璞累年主簿又經國卿雖未嘗為行佐今故當正參軍耶若爾正當署餘曹兼房任不爾便宜行佐正署中兵恐於選體如不多爾事見宋文帝中詔乃為正佐俄遷宣威將軍旴𣅿太守時王師北伐彭汴無虞璞以彊寇對陣事未可測郡守淮隅道當衝要乃修城壘浚重隍聚財石積鹽米為不可勝之算衆咸不同朝㫖亦謂為過俄而賊大越逸索虜大帥託䟦燾自率歩騎數十萬陵踐六州京邑為之騷懼百守千城莫不奔駭腹心勸璞還京師璞曰若賊大衆不盼小城故無所懼若肉薄來攻則成禽也諸君何嘗見數十萬人聚在一處而不敗者昆陽合淝前事之明驗此是吾報國之秋諸君封侯之日衆既見璞神色不異老㓜在焉人情乃定收集得二千精手謂諸將曰足矣但恐賊不過爾賊既濟淮諸軍將帥毛遐祚胡崇之臧證之等為虜所覆無不殄盡唯輔國將軍臧質挺身走收散卒千餘人來向城衆謂璞曰若不攻則無所事衆若其來也城中止可容見力爾地狹人多鮮不為患且敵衆我寡人所共知雖云攻守不同故當粗量彊弱知難而退亦用兵之要若以今衆法能退敵完城者則全功在我若宜避賊歸都㑹資舟檝則更相蹂踐正足為患今閉門勿受不亦可乎璞歎曰不然賊不能登城為諸君保之舟檝之計固已久息賊之殘害古今之未有屠剝之刑衆所共見其中有福者不過得驅還北國作奴婢爾彼雖烏合寧不惮此耶所謂同舟而濟胡越不患異心也今人多則退速人少則退遲吾寧欲專功緩賊乎乃命開門納質質見城隍阻固人情輯和鮭米豐盛器械山積大喜衆皆稱萬嵗及賊至四面蟻集攻城璞與質隨宜應拒攻守三旬殄其太半燾乃遁走有議欲追之者璞曰今兵士不多又非素附雖固守有餘未可以言戰也但可整舟艫示若欲渡岸者以速其走計不須實行咸以為然臧質以璞城主使自上露板璞性謙虚推功於質既不自上質露板亦不及焉太祖嘉璞功效遣中使深相褒羙太祖又别詔曰近者險急老弱殊當憂廹耶念卿爾時難為心想百姓流轉已還此遣部運尋至委卿量所贍濟也始興王濬亦與璞書曰狡虜狂凶自送近服偽將即斃酋長傷殘實天威所䘮卿諸人忠勇之効也吾式遏無素致境蕪民瘠負乗之愧允當其責近乞退謝愆不蒙垂許故以報卿宣城太守王僧達書與璞曰足下何如想舘舎正安士馬無恙離析有時音㫖無日憂詠沈吟増其勞望間者獯獫扈横掠剝邉鄙郵販絶塵坰介靡達瞻江盼淮眇然千里吾聞涇陽梗棘伊滑荐遁鳥集泫絶患深自古承知廼昔冦苦城境勝胄朝飡伍甲宵舎烽鼓交警羽鏑驟合而足下砥兵礪伍總厲豪彥師請一奮氓無貳情遂能固孤城覆嚴對䧟死地覿生光古之田孫何以尚兹商驛始通粗知梗槩崇讃膽智嘉賀文猛甚善甚善吾近以戎暴横斥規効情命收龜落簮星舎京里既獲遄至胡馬卷迹支離霑徳復繼前緒行葦之懽實恊初慮但乖塗重隔顧増慨涕比恒疾臥憂委兼疊裁書送想無斁久懐徴還淮南太守賞賜豐厚日夕讌見朝士有言璞功者上曰臧質姻戚又年位在前盱眙元功當以歸之沈璞每以謙自牧唯恐賞之居前此士爕之意也時中書郎缺尚書令何尚之領吏部舉璞及謝莊陸展事不行事見文帝中詔凡中詔今悉在䑓猶法書典書也三十年元凶弑立璞乃號泣曰一門蒙殊常之恩而逢若斯之運悠悠上天此何人哉日夜憂歎以至動疾㑹二凶逼令送老弱還都璞性篤孝尋聞尊老應幽執輒哽咽不自勝疾遂増篤不堪逺迎世祖義軍至界首方得致身先是琅邪顔竣欲與璞交不酬其意竣以致恨及世祖將至都方有䜛說以璞奉迎之晩横罹世難時年三十八所著賦頌讃祭文誄七弔四五言詩牋表皆遇亂零失今所餘詩筆雜文凡二十首璞有子曰闕伯玉字徳潤䖍子子也温恭有行業能為文章少除世祖武陵國侍郎轉右常侍南中郎行參軍自國入府以文義見知文章多見世祖集世祖踐阼除員外㪚騎郎不拜左衛顏竣請為司馬出補句容令在縣有能名復為江夏王義恭太宰行參軍與奉朝請謝超宗何法盛校書東宫復為餘姚令還為衛尉丞世祖舊臣故佐普皆升顯伯玉自守私門朔望未嘗問訊顏師伯戴法興等竝有蕃邸之舊一不造問由是官次不進上以伯玉容狀似畫圖仲尼像常呼為孔丘舊制車駕出行衛尉丞直門常戎服張永謂伯玉曰此職乖卿志王景文亦與伯玉有舊常陪輦出指伯玉白上孔丘竒形容上於是特聼伯玉直門服𤣥衣出為晉安王子勛前軍行參軍侍子勛讀書隨府轉鎭軍行佐前廢帝時王景文領選謂子勛典籖沈光祖曰鄧琬一旦為長史行事沈伯玉先帝在蕃闕佐今猶不改民生定不應佳戴法興聞景文此言乃轉伯玉為參軍事子勛初起兵轉府功曹及即偽位以為中書侍郎初伯玉為衛尉丞太宗為衛尉共事甚羙及子勛敗伯玉下獄見原猶以在南無誠被責除南䑓御史尋轉武陵國詹事又轉大農母老解職貧薄理盡閑臥一室自非弔省親舊不嘗出門司徒袁粲司空褚淵深相知賞選為永世令轉在永興皆有能名廢帝元徽三年卒時年五十七伯玉性至孝奉親有聞未嘗妄取於人有物輒㪚之知故温雅有風味和而能辨與人共事皆為深交弟仲玉泰始末為寧朔長史蜀郡太守益州刺史劉亮卒仲玉行府州事巴西李承眀為亂仲玉遣司馬王天生討平之廢帝詔以為安成王撫軍中兵參軍加建威將軍沈攸之請為征西諮議未拜卒史臣年十三而孤少頗好學雖棄日無功而伏膺不改常以晉氏一代竟無全書年二十許便有撰述之意泰始初征西將軍蔡興宗為啓眀帝有勑賜許自此迄今年逾二十所撰之書凡一百二十卷條流雖舉而採掇未周永眀初遇盗失第五秩建元四年未終被勑撰國史永眀二年又忝兼著作郎撰次起居注自兹王役無暇搜撰五年春又被𠡠撰宋書六年二月畢功表上之曰臣約言臣聞大禹刋木事炳虞書西伯戡黎功煥商典伏惟皇基積峻帝烈𢎞深樹徳往朝立勲前代若不觀風唐世無以見帝媯之羙自非覩亂秦餘何用知漢祖之業是以掌言未記爰動天情曲詔史官追述大典臣實庸妄文史多闕以兹不才對揚盛旨是用夕惕載懐忘其寢食者也臣約頓首死罪竊惟宋氏南面承歴統天雖世窮八主年減百載而兵車亟動國道屢屯垂文簡牘事數繁廣若夫英主啓基名臣建績拯世夷難之功配天光宅之運亦足以勒銘鍾鼎昭被方䇿及虐后暴朝前王罕二國釁家禍曠古未書又可以式規萬葉作鍳于後宋故著作郎何承天始撰宋書草立紀傳止於武帝功臣篇牘未廣其所撰志唯天文律厯自此外悉委奉朝請山謙之謙之孝建初又被詔撰述尋値病亡仍使南䑓侍御史蘓寳生續造諸傳元嘉名臣皆其所撰寳生被誅大眀中又命著作郎徐爰踵成前作爰因何蘓所述勒為一史起自義熙之初訖于大眀之末至於臧質魯爽王僧達諸傳又皆孝武所造自永光以來至於禅讓十餘年内闕而不續一代典文始末未舉且事屬當時多非實錄又立傳之方取捨乖衷進由時㫖退傍世情垂之方來難以取信臣今謹更創立製成新史始自義熙肇號終於昇眀三年桓元譙縱盧循馬魯之徒身為晉賊非闋後代吳隐謝混郗僧施義止前朝不宜濫入宋典劉毅何無忌魏詠之檀憑之孟昶諸葛長民志在興復情非造宋今竝刋除歸之晋籍臣逺愧南董近謝遷固以閭閻小才述一代盛典屬辭比事望古慙良鞠躬跼蹐靦汗亡厝本紀列傳繕冩已畢合志表七十卷臣今謹奏呈所撰諸志須成續上謹條目錄詣省拜表奉書以聞臣約誠惶誠恐頓首頓首死罪死罪宋書卷一百宋書卷一百考證自序髙祖深相訓納訓疑當作詶諸軍將帥毛遐祚胡崇之臧證之等臧質傳遐祚作熙祚證之作澄之璞有子曰闕伯玉字徳潤䖍子子也臣承蒼按梁書沈約傳云父淮南太守璞南史約傳前半篇悉依約自序其序璞事後亦云有子曰約是所闕之字即為約字無疑苐約自序于璞有子曰約之後復序伯玉兄弟事忽接云史臣年十三而孤壹似有意錯互其辭令人不可曉者昔裴子野作宋略書云戮淮南太守璞以其不從義師故也約懼徒跣謝罪請两釋焉今約所自序固未必盡實然且下筆羞澀如此廢帝元徽三年廢字上一夲有後字永眀二年又奏兼著作郎撰次起居注自兹王役無暇搜撰五年春又被𠡠撰宋書六年二月畢功表上之臣承蒼按沈約自序宋書成于齊武帝永眀六年今刻本題曰梁沈約撰盖要其終而命之為梁臣非言此書為梁時書也宋書卷一百考證
