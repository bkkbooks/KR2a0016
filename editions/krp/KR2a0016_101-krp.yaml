body:
  text: 侍讀學士臣萬承蒼謹言齊永明中太子家令兼著作郎沈約受勅撰宋書踰年上之本紀十志三十列傳六十凡一百卷書成於齊代而題曰梁沈約撰者以約仕終於梁從隋書經籍志之舊也伏見唐虞三代之時聖人在位不獨公卿皆賢即為史臣者亦能深知道徳之意足以發揚至治垂教無窮漢之司馬遷班固猶眀此義魏晉而下風斯冺矣宋髙祖以英雄之姿建功晉室顧其志急於改歩非有深仁厚澤漸漬人心累世相承法制不立帝子甫離襁褓即典方州所任臣僚多取世族治民統軍罕得其道其後轉相猜忌偏信小人遂至不振而當時史官若何承天蘓寳生徐爰之徒率非其人約以貪榮嗜利之心逞其浮靡之習嵗月未乆遽成此書大扺因何徐舊本而稍更益之永光以後不免遷就以合時君之㫖雖自謂創立新史取舎是非未必皆當又况其喜造竒說以誣前代如王邵之所譏者耶姚察稱其髙才博洽名亞遷董要非此書定論然自晋義熙至宋昇眀七十四年之事迹粗在於是不可以無傳也趙宋嘉祐中以宋齊梁陳魏北齊周書舛繆殘缺始詔舘職校讐治平中曽鞏校定南齊梁陳三書上之劉恕等上後魏書王安國上周書而校宋書者不著其名今書苐四十六卷末附載臣穆所記一條論到彦之傳之闕辨趙倫之王懿張邵三傳之非約書臣考宋史言鄭穆在舘閣三十年嘗編校集賢院書籍當即其人然苐舉三傳中稱帝號魏主證其與南史同體而張邵傳不避武帝廟諱重出張暢傳皆略不及則其考据亦不可謂精也故七史之中惟宋書最多訛謬其所從來乆矣臣等奉勅校勘是編訪求裴子野宋略二十卷鮑衡卿王琰宋春秋各二十卷皆已不傳自監本而外惟虞山毛晋所刻汲古閣本差可叅攷又得文淵閣所藏南監舊本字畫磨滅間有與諸本異者敬謹叅校詳求厥中擇其合者錄為正本其或字雖互異義可兼通仍從監本舊文别為宋書考證若干條附於各卷之後當時文人遺集及所見他書有可相發眀者亦間採焉至若諸本悉誤無可據依姑闕所疑不敢擅改臣承蒼等見聞寡陋辭意淺膚吮墨濡毫戰汗交集謹言
